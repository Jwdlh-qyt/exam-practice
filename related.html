  {"id":736,"topic":"专题八 其他相关法律","type":"multiple","question":"根据植物新品种保护条例及相关规定，下列哪些说法是错误的？（多选）","options":{"A": "申请品种权的，应当提交请求书、说明书、该品种的照片以及权利要求书", "B": "申请人可以在品种权授于前修改或者撤回品种权申请", "C": "授予品种权的植物新品种应当具备的特异性、是指一个植物品种有一个以上性状明显区别于已知品种", "D": "授予品种权的植物新品种应当具备的稳定性、是指一个植物品种的特性，除可预期的自然变异外、群体内个体间相关的特征或者特性表现一致。"},"answer":"AC","explanation":"。A选项，（布图设计保护条例》第26条第2款规定：“给于使用布图设计非自忍许可的专圈八其他相关法律决定…其范国应当限于为公共目的非前业性便用……”，A违项正崎，B选项（布图设计保护条例>第27条规定：“取佛使用布图设计准自说许可的自修人、法人成者其他理贷不享有偿占的使用仅，并且无权允许他人使用”，因北自您人可以取挥律自限许可，B选项借误。C选项，《布图议计保护条例>第25条规定：“…成者经人民法院、不正当党争行有堂管检查部门银法认定布图设计权利人有不正当免争行力西需要给平补教时，国养院知识产权行攻部门可以俗平使用其布图设计的事自厚许可”，因此C逸项正确，D选项，《布图设计保护条例》第26条能3款规定：“事自厚许可的现由消除井不再发生时，国务院扣识产权行攻部门应当限据布图设计权利人的请求，经审查后作出终止使用布图设计你自思许可的决定”，因北D逸项借误。（所瑜）关保护条例识","chapter":"第二章 植物新品种保护"},
  {"id":737,"topic":"专题八 其他相关法律","type":"multiple","question":"根据植物新品种保护条例的规定，下列哪些申请品种权的林木新品种具备新颖性？多选）","options":{"A": "在申请日前其繁殖材料、收获材料未被销售、推广", "B": "在申请日前，经申请权人许可，其繁殖材料、收获材料在中国境内销售、推广未超过1年", "C": "在境外，木本、藤本植物品种销售、推广未超过4年", "D": "在境外，除木本、藤本植物以外的植物品种销售、推广未超过4年"},"answer":"ABD","explanation":"。《海关保护条例）第2条规定：“本条例所称知识产权海关保护，是指海关对与进出口货物有关井受中华人民共和回法律、行政法规保护的商标专用权、著作权和与著作权有关的权利、专利权（以下统称知识产权）实施的保护”，A、B、D选项正确，C选项不属于知识产权海关保护条例的保护范畴。（2012）","chapter":"第二章 植物新品种保护"},
  {"id":738,"topic":"专题八 其他相关法律","type":"multiple","question":"根据植物新品种保护条例及相关规定，在没有合同约定的情况下，下列哪些说法是正确的？多选）","options":{"A": "执行本单位的任务所完成的职务育种，植物新品种的申请权属于该单位", "B": "主要是利用本单位的物质条件所完成的职务育种，植物新品种的申请权属于完成育种的个人", "C": "合作育种，植物新品种的申请权属于共同完成育种的单位和个人", "D": "委托育种，植物新品种的申请权属于委托人"},"answer":"BCD","explanation":"。八选项，低据（海关保护条例）的？第2条的规定，海关对与进口和出口货物有关的知识产权实范保护，A选项借误。B选项，海关实意保护的包括商标专用权、著作著权和与著作权有关的权利、专利权，B选项正确。C选项，《海关保护条例）第+条规定：“知识产权权利人请求海关实施知识产权保向护的，应当向海关提出采取保护措施的中请”，C选项正确。D选项，（海关保护条例）业第6条规定：“海关实施知识产权保护时，应当保守有关当事人的商业密”，D选项正。（2013）","chapter":"第二章 植物新品种保护"},
  {"id":739,"topic":"专题八 其他相关法律","type":"multiple","question":"张某于2025年10月11日独立完成了某植物新品种的育种，王某于2026年2月14日也独立完成了该植物新品种的育种。张某和王某均于2026年6月18日分别就该植物新品种申请品种权。如果张某和王某就该植物新品种提交的品种权申请均符合授予品种权的其他条件，则品种权应当授予何人？（单选）","options":{"A": "张某", "B": "王某", "C": "由张某和主某协商确定，不愿协商或协商不成的，以抽签的方式确定申请人", "D": "由张某和王某协商确定，不愿协商或协商不成的，驳回张某和王某的申请"},"answer":"ABC","explanation":"。A、B选项，《海关保护条例）第14条规定：“知识产权权利人请求海关扣留侵权嫌疑货物的，应当向海关提供不起过货物等值的担保，用于赔偿可能因申请不当给收货人、发货人造成的捐失，以及支付货物由海关扣留后的仓储、保管和处置等费用·…..”，A、B选项正确。C选项，（海关保护条例>第24条规定：“有下列情形之一的，海关应当放行被扣留的役权疑货物：·（三）涉嫌侵犯专利权货物的收货人成者发货人在向海关提供与货物等值的担保金后，请求海关放行其货物的……”，C逸项正确。D选项，（海关保护条例》第27条第1款现定：“被扣留的侵权嫌疑货物，经海关调查后认定役犯知识产权的，由海关子以没收”，D选项错误。（2012）","chapter":"第二章 植物新品种保护"},
  {"id":740,"topic":"专题八 其他相关法律","type":"multiple","question":"根据《植物新品种条例》及相关规定，对于植物新品种申请需要初步审查哪些内容：（多选）","options":{"A": "是否属于植物品种保护名录列举的植物属或者种的范围", "B": "是否符合新颖性的规定", "C": "植物新品种的命名是否适当", "D": "植物新品种是否具有稳定性"},"answer":"ABC","explanation":"。《海关保护条例》第7条第1款规定：“知识产权权利人可以依原本条例的规定，将其知识产权向海关总暑中请备案：申请备案的，应当提交申请书。申请书应当包括下列内容：（一）知识产权权利人的名称或者姓名、注册地成者国籍等：（二）知识产权的名称、内容及其相关信息：（三）知识产权许可行使状况….”，因此A、B、C选项正确。海关备案不需要稳定性初步证明文件，D选项错误。（新编）","chapter":"第二章 植物新品种保护"},
  {"id":741,"topic":"专题八 其他相关法律","type":"multiple","question":"王某对于审批机关驳回其品种权申请的决定不服，拟提起复审。根据植物新品种保护条例及相关规定，下列关于复审程序的说法哪些是正确的？（多选）","options":{"A": "复审请求应当向植物新品种复审委员会提出", "B": "王某应当自收到通知之日起3个月内提出复审请求", "C": "植物新品种复审委员会应当在收到复审请求书的3个月内作出决定", "D": "申请人对复审决定不服的，应当在收到通知之日起3个月内向人民法院提起诉讼"},"answer":"ABC","explanation":"。A选项，《海关保护条例》第31条规定：“个人携带或者邮寄进出境的物品，超出自用、合理数量，并役犯本条例第2条规定的知识产权的，按照侵权货物处理”，A选项正确。B选项，（海关保护条例>第11条第1款规定：“知识产权备案情况发生改变的，知识产权权利人应当自发生改交之日起30个工作日内，向海关总署办理备案变更或者注销手续”，B选项正确。C选项，《海关保护条例>第24条规定：“有下列情形之一的，海关应当放行被扣留的侵权嫌疑货物：…（五）在海关认定被扣留的侵权疑货物为役权货物之前，知识产权权利人撒回","chapter":"第二章 植物新品种保护"},
  {"id":742,"topic":"专题八 其他相关法律","type":"multiple","question":"根据植物新品种保护条例及相关规定，关于植物新品种权的无效，下列说法正确的是？多选）","options":{"A": "请求宣告品种权无效的期限为自公告授予品种权之日起6个月后", "B": "对于不具备一致性的植物新品种，植物新品种复审委员会可以依据职权宣告品种权无效", "C": "对于不具备稳定性的植物新品种，植物新品种复审委员会可以依据任何单位或个人的书面请求宣告品种权无效235-2028年中科代理师安协考技", "D": "品种权人对于宜告其品种权无效的决定不服的，可以向人民法院起诉"},"answer":"BCD","explanation":"。A选项，根据（海关保护条例）第24条的规定，海关做月本条例第15条的现定口曾权地康货物，自扣留之日起20个工作日内决收到人民法院协助执行通如的，海关血当放行口留的设权地货物。因北，A念项借误，B、C.D选项均局于放行条件，（2007）保护","chapter":"第二章 植物新品种保护"},
  {"id":743,"topic":"专题八 其他相关法律","type":"multiple","question":"根据植物新品种保护条例及相关规定、下列哪些使用授权品种的繁殖材料的生产行为、应经品种权人许可？（多选）","options":{"A": "为商业目的重复使用授权品种进行生产或者繁殖的另一品种", "B": "未经许可使用授权品种的繁殖材料而获得的收获材料", "C": "未经许可使用授权品种的实质性派生品种的繁殖材料", "D": "未经许可使用授权与授权品种相比，不具备明显区别的品种"},"answer":"ABC","explanation":"（展会扣识产权保护办法》第8票现定：“扣识产权权利人可以向是会如识产权投诉机构投诉也可置提向如识产权行政管理部门投诉、权利人匀投诉机构设诉的，应当是交以下村料：（一）合法有效的识产权权具证明：（二）沙墩便权当事人的基本信息：（三）涉域设权的理由和证语：（四）委托代理人投诉的，应提交投权委托节”，A、B、C选项正同、财产担保证明无提交，D选项错误。（2009）","chapter":"第二章 植物新品种保护"},
  {"id":744,"topic":"专题八 其他相关法律","type":"multiple","question":"根据植物新品种保护条例及相关规定，下列哪些行为应经品种权人许可？（多选）","options":{"A": "许诺销售授权品种的殖材料", "B": "农民自自用授权品种的殖材料", "C": "出口授权品种的繁殖材料", "D": "储存为繁殖授权品种的繁殖材料"},"answer":"ABCD","explanation":"。（展会扣识产权保护办法）第17亲规定：“有下月情形之一的，地方知识产权局对使见专利权的投诉或者处理请裳不干受理：（一）投诉人或者请求人已经向人民法院提起专利便权诉的：（二）专利权正处于无效宜告请求但序之中的：（三）专利权存在权属纠分，正处于人民法院的审理程序成者管理专利工作的部门的调解程序之中的：（四）专利权已经终止，专利权人正在办理权利恢复的”，因此A、B、C、D选项均正。（2008）","chapter":"第二章 植物新品种保护"},
  {"id":745,"topic":"专题八 其他相关法律","type":"multiple","question":"根据植物新品种保护条例及相关规定，下列关于品种权的保护期限的说法哪项是正确的？多选）","options":{"A": "木本的品种权保护期限为25年，自申请之日起算", "B": "木本的品种权保护期限为25年，自授权之日起算", "C": "草本植物的品种权保护期限为20年，自授权之日起算", "D": "藤本植物的品种权保护期限为25年，自申请之日起算"},"answer":"ABC","explanation":"。（展会如识产权保护办法）第20条规定：“有下列情形之一的，地方工商行政管理部门对设犯商标专用权的投诉戏者处理请求不予受理：（一）投诉人成者请求人已经向人民法院提起商标侵权诉讼的：（二）商标权已经无效或者被数销的”，因此A、B、C选项正确，D选项错误。（新编）1.C。A、B、C选项，《对外贸易法》第15条第3定：“进出口属于自由进出口的技术，应当向院对外贸易主管部门成者其委托的机构办理备案登记”，因此A、B选项错误，C选项正确。页，（对外贸易法》第19条第1、2款规定：“国家制进口或者出口的货物，实行配额、许可证等管理：对限制进口或者出口的技术，实行许可理。实行配额、许可证管理的货物、技术，应熟国务院规定经国务院对外贸易主管部门或其会同国务院其他有关部门许可，方可进口出口”，因此D选项错误。（2007）","chapter":"第二章 植物新品种保护"},
  {"id":746,"topic":"专题八 其他相关法律","type":"multiple","question":"根据集成电路布图设计保护条例及相关规定.下列说法哪些是正确的？（多选）","options":{"A": "受保护的集成电路布图设计应当具有创性", "B": "集成电路布图设计专有权经国务院知识产权行政部门登记产生", "C": "对集成电路布图设计的保护不延及思想、处理过程、操作方法或者数学概念等", "D": "集成电路布图设计专有权的保护期为十五年"},"answer":"ACD","explanation":"。A选项，《技术进出口管理条例》第规定：“属于限制出口的技术，实行许可证管未经许可，不得出口”，因此A选项正确。B选技术进出口管理条例》第34条规定：“技术出请经批准的，由国务院外经贸主管部门发给出口许可意向书。申请人取得技术出口许可书后，方可对外进行实质性谈判，签订技术出同”，因此B选项错误。C、D选项，《技术进出","chapter":"第三章 集成电路布图设计"},
  {"id":747,"topic":"专题八 其他相关法律","type":"single","question":"关于集成电路布图设计的独创性.下列邮项说法是正确的？（单选）","options":{"A": "布图设计是创作者自己独立创作的，也可能不具有独创性", "B": "是否具有独创性，应以提出登记时为到断时间点", "C": "是否具有独创性，应从本领域技术人员的角度判断", "D": "由常规设计组成的布图设计、不具有独创性"},"answer":"A","explanation":"。（促进科技成果转化法》第16条规定：“科技成果持有者可以采用下列方式进行科技成果转化：①自行投资实施转化：②向伦人转让该科技成果：③许可他人使用该科技成果：④以达科技成果作为合作条件，与他人共同实施转化：G以该科技成果你价投资，折算股份成者出资比例：其他协商确定的方式”，因此，A选项留仪，B、C、D选项正确。（新编）进步法术进步法）第34条的规定：“国家放励利用财政性资目所形成的知识产权首先在境内使用。前款规定成者个人转让，成者许可境外的组织成者个人经占几构批准；法律、行政法规对批准机构另有规定的，错误。根据《科学技术进步法》第32条的规定：：“利技术计划项目所形成的科技成果，在不损害国家安公共利益的前提下，投权项目承担者依法取得相关依法自行投资实施转化、向他人转让、联合他人共或者作价投资等。项目承担者应当依法实施前款取保护措施，并就实施和保护情况向项目管理机构内没有实施且无正当理由的，国家可以无偿实，或者无偿实施。项目承担者依法取得的本条第一家安全、国家利益和重大社会公共利益的需要，国可他人有偿实施成者无偿实施。”因此B选项错误，什条约","chapter":"第三章 集成电路布图设计"},
  {"id":748,"topic":"专题八 其他相关法律","type":"multiple","question":"根据集成电路布图设计保护条例及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "集成电路布图设计登记申请表", "B": "集成电路布图设计的说明书和权利要求书", "C": "集成电路布图设计的复制件或者图样", "D": "集成电路布图设计已投人商业利用的，提交含有该布图设计的集成电路样品"},"answer":"AB","explanation":"（世慧公>第1茶（=）境定：“工产权的保护对复是专村、关消销登、工安外功计、商标、服券谢券、厂谢名、灸那你记设准产成名以及利止不正当党”，A.B项正境、法意作以和与事作以循关的权利、以庆所失的如识产权們勿情物新品停和集成电专旧设计不任（巴靠公价）保护范谊市.（2013）","chapter":"第三章 集成电路布图设计"},
  {"id":749,"topic":"专题八 其他相关法律","type":"single","question":"根据集成电路布图设计保护条例及相关规定，下列说法哪项是正确的？单选）","options":{"A": "布图设计专有权经国家知识产权局登记产生", "B": "布图设计专有权自创作完成之日起自动产生", "C": "布图设计专有权的保护期为15年，自布图设计登记申请之日起计算", "D": "布图设计专有权的保护期为15年，自布图设计创作完成之日起计算"},"answer":"D","explanation":"、提竭（巴掌公》第1条（二）的规定，成电鸡不属于工业产岳的览国，D古项正身，(2014)","chapter":"第三章 集成电路布图设计"},
  {"id":750,"topic":"专题八 其他相关法律","type":"single","question":"根据《布图设计保护条例》及其他相关规定，下列哪些说法是正确的？（多选）","options":{"A": "布图设计首次商业利用之日起2年内，未提出登记申请的，国家知识产权局不予登记", "B": "国家知识产权局应当对布图设计登记申请进行初步审查", "C": "国家知识产权局应当对布图设计登记申请进行实质审查", "D": "布图设计明显不符合该条例所规定的布图设计定义的，国家知识产权局应当作出驳回决定"},"answer":"D","explanation":"（巴攀公均》第工茶（一）规定：“本跌显任何国农的回民，在保护工业产权万面，应在木司其他国第内享有各该国注体现在成今后可愿的子国民的各种利庄：…“，本随题干地的是回民待通原则，D走项正确。（2017）","chapter":"第三章 集成电路布图设计"},
  {"id":751,"topic":"专题八 其他相关法律","type":"multiple","question":"根据集成电路布图设计保护条例及相关规定，布图设计登记申请人对国家知识产权局驳回其登记申请的决定不服的，可以选择下列哪种救济途径？（单选）","options":{"A": "自收到通知之日起3个月内向国家知识产权局申请行政复议", "B": "自收到通知之日起3个月内向国家知识产权局请求复审", "C": "自收到通知之日起3个月内向国家知识产权局申诉", "D": "自收到通知之日起3个月内直接向人民法院提起行政诉讼"},"answer":"ABCD","explanation":"。BCD，（已掌公的）第2（二）内规定：“对于本联且回家的回民，不得境足在体实求保护的回京须有住所范董业所才促享有工业产权”。本随中，甲、乙方（已事企）或氏田，回此，他们的国民在对万国部平有回民华进，西不论其住所是在甲国、乙国或丙回，B、C.D项正确。A选项，（巴靠公约）靠3条规定：“本襄互口小各国的国民，在本里一个国家的领土内世有住所或有真实和有效的工商业营业所的，应享有与本联困国家国民间样的侍透\"，丙虽运不是（巴算公约）成员国，但其国民在甲回有住所，他可以享有国民侍遇，A选项正确（2006）","chapter":"第三章 集成电路布图设计"},
  {"id":752,"topic":"专题八 其他相关法律","type":"multiple","question":"当事人对国家知识产权局作出的下列哪项具体行政行为不服的，不能申请复议？（单选）","options":{"A": "不予受理布图设计申请的", "B": "驳回布图设计登记申请的", "C": "将布图设计申请视为撤回的", "D": "给予使用其布图设计的非自愿许可的"},"answer":"ABCD","explanation":"。根据（巴公约》第3某的规定，中国属于（巴擎公约）成月国，中国国民无论是否在美国有住所成曾业所，在美国均可享有国民侍遇，A、B、C、D选项均正确。（2014）","chapter":"第三章 集成电路布图设计"},
  {"id":753,"topic":"专题八 其他相关法律","type":"multiple","question":"根据集成电路布图设计保护条例及相关规定，下列哪些说法是正确的？多选）","options":{"A": "布图设计自其在世界任何地方首次商业利用之日起1年内未向国务院知识产权行政部门提出登记申请的，国务院知识产权行政部门不再予以登记", "B": "布图设计自其在世界任何地方首次商业利用之日起2年内未向国务院知识产权行政部门提出登记申请的，国务院知识产权行政部门不再予以登记", "C": "无论是否登记或者投人商业利用，布图设计自其创作完成之日起满10年的，不再受保护", "D": "无论是否登记或者投人商业利用，布图设计自其创作完成之日起满15年的，不再受保护"},"answer":"ABC","explanation":"。《巴公约》第2条（三）规定：“木联每一国家法律中关于何法和行政程序管辖权以及指定送达地址成委派代理人的规定等，工业产权法中可能有要求的，均明确地予以保留”，木陌考查国民待透的例外规定，因此A、B、C选项正确，D选项不属于例外规定对象。（2013）","chapter":"第三章 集成电路布图设计"},
  {"id":754,"topic":"专题八 其他相关法律","type":"multiple","question":"根据集成电路布图设计保护条例及相关规定，布图设计权利人享有下列哪些专有权？（多选）","options":{"A": "将受保护的布图设计投人商业利用", "B": "将含有受保护布图设计的集成电路以及含有该集ULL相关法剪化600路2026年科八理结成电路的物品投人商业利用", "C": "对变保护的布图设计的全部进行复制", "D": "对变保护的布图设计的任何具有独创性的部分进行复制"},"answer":"BCD","explanation":"。A、B选项，《巴黎公约>第4条之二规定：“（一）本联显国家的国民向本联固各国中请的专利、与在本联皿其他国家，不论是否本联皿的成员国，就同一发明所取得的专利是相互独立的。（二）上述规定，应从不受限制的意义米理解，特别是指在优先权期间内申请的各项专利，就其无效和丧失权利的理由以及其正常的期问而官，是相互独立的”，A选项错误，B选项正确。C选项，（巴黎公约》第4条之二（五）规定：“在本联显各国，因享有优先权的利益而取得的专利的期限，与没有优先权的利益而申请或投子的专利的期限相同”，C选项正确。D选项，（巴黎公约》第4条之四规定：“不得以专利产品的销售或依专利方法制造的产品的销售受到本国法律的禁止或限制为理由，而拒绝投予专利或使专利无效”，D选项正确。（2008）","chapter":"第三章 集成电路布图设计"},
  {"id":755,"topic":"专题八 其他相关法律","type":"single","question":"根据集成电路布图设计保护条例及相关规定、集感电路布图设计权利人甲公司可以要求行为人停止下列感些未经其许可的行为？多选）","options":{"A": "某大学教授赵某为教学目的而复制甲公司受保护的布图设计", "B": "乙公司将自己独立创作的与甲公司受保护的布图设计相同的布图设计投人商业利用", "C": "内公司为商业目的复制甲公司受保护的布图设计中具有创性的部分", "D": "丁公司为商业目的销售含有甲公司受保护的布图设计的集成电路"},"answer":"C","explanation":"。根据（巴黎条约》第4条之二规定的专利独立原则，一件专利在中国被投权或者被驳回，与其在美国的审查结果没有关系。美国的专利中请应当按照美国的专利制度审查，C选项正确。(2019)","chapter":"第三章 集成电路布图设计"},
  {"id":756,"topic":"专题八 其他相关法律","type":"multiple","question":"甲购进一批集成电路用于销售，但不知道也没有合理理由应当知道该集成电路含有受保护的布图设计。甲销售了一半后，收到布图设计权利人乙的明确通知，告知其销售的集成电路中含有非法复制的布图设计。对此，下列哪些说法是正确的？多选）","options":{"A": "甲的行为构成侵权", "B": "甲的行为不视为侵权", "C": "甲应当就其在接到乙的明确通知前销售的集成电路，向乙补偿一定的费用", "D": "甲在接到乙的明确通知后，可以继续销售另一半存货，但应当向乙支付合理的报酬"},"answer":"ABD","explanation":"。（巴黎公约》第4条A（1）规定：“已经在本联显的一个国家正式提出专利、实用新型注册、外观设计注册或商标注册的申请的任何人，或其权利继受人，为了在其他国家提出申请，在规定的期同内应享有优先权”，根据本规定，专利、实用新型、外观设计均可享有优先权，A、B、D选项正确，C选项错误。（2012）保护工业产权巴黎公约与马拉喀什条约","chapter":"第三章 集成电路布图设计"},
  {"id":757,"topic":"专题八 其他相关法律","type":"multiple","question":"根据集成电路布图设计保护及相关条例规定，侵犯布图设计专有权，引起纠纷的，布图设计权利人或者利害关系人可以向下列哪一部门请求处理？（单选）","options":{"A": "国务院工商行政管理部门", "B": "国务院知识产权行政部门", "C": "国务院科学技术行政部门", "D": "省级管理专利工作的部门"},"answer":"ABD","explanation":"。A违班，哲《巴集公约）带4条A（2）的规定，依凤本联旦任何成员国国家的本国立法，成依原本映盟各国之间协结的从进成多边条约，与正规的国农中请借当的任何中请，应收来认为产生优先权，A选项正确。B逸项，根哲（巴算公约>第4条D（1）的脱足，佳何人奇型利用以滑是出的一项中请的优先权的，肾是作出声明，说明提出该申请的日期和受该中请的国家。每一国家应定必须作出该项当明的最后日期，B逸项正吻。C逸项，根据《巴等公伤>第四条C（1）的现定，外观设计的优免权期回为6个月：E（1）的规定，依靠以实用新型中请为基础的优先权百在一个国案提出工业品外观设计中请的，优先权的期间应与对工业品外现设计现定的优免权期间一样，即为6个月，C逸项借误。D逸项，根据（已馨公约>第四条B（2）规定，做靠以专利中请力基础的优先权资在一个国家提出实用新型的中请是许可的，反之亦一样，D逸项正确。（2007）","chapter":"第三章 集成电路布图设计"},
  {"id":758,"topic":"专题八 其他相关法律","type":"multiple","question":"关于集成电路布图设计的非自愿许可，下列哪些说法是正确的？（多选）","options":{"A": "其范围应当限于为公共目的非商业性使用", "B": "非自愿许可不得给予自然人", "C": "其原因可以是经人民法院、不正当竞争行为监督检查部门依法认定布图设计权利人有不正当竞争行为而需要给予的补救", "D": "非自愿许可的理由消除并不再发生时，国务院知识产权行政部门应当主动及时作出终止使用布图设计非自愿许可的决定"},"answer":"AB","explanation":"。A、B、C选项，根据（巴攀公均）第4条C（1）、E（1）、E（2）的规定，以实用折型专利为基础提出发明专利或者实用新型专利新中请部可以享有优先权，优先权期同为12个月。以实用新型专利为基础提出外观设计专利也可以享有优先权，优先权期间为6个月，A、B选项正确，C选项错误。D选项，（巴攀公约）第四条A（2)、A（3）款规定：“依凤本联回任何国家的本国立法，或依座本联盟名国之间缔结的及边成多边条约，与正规的国家中请相当的任何申请，应被示认为产生优先权。正规的国家中请是指在有关国家中足以确定提出申请日期的任何申请，面不问该申请以后的结局如何”，因此国家申请技驳回或被投权都不影响其作为优先权基础，D选项错误。（新编）","chapter":"第三章 集成电路布图设计"},
  {"id":759,"topic":"专题八 其他相关法律","type":"multiple","question":"根据知识产权海关保护条例及相关规定，下列哪些产权的权利人可以请求海关实施知识产权海关保护？多选","options":{"A": "注册商标专用权", "B": "著作权和与著作权有关的权利", "C": "集成电路布图设计专有权", "D": "专利权"},"answer":"ABC","explanation":"。A、B选项，（巴黎公约》第4条C（1）-（3）规定：“优先权的期回…·这些期问应自之内。如果期间的最后一日在请求保护地国家是法定仅日或有是主管局不接受中请的日子，期问应是至其后的第一个工作日”，A、B选项正确。C、D选项，根报（巴靠公约）第11条规定，国际展览会的临时保护不仅适用于发明、实用新型和工业品外观设计，而且适用于商标，但不应延展第4条（优先权）规定的期限，C选项正确，D选项错误。(2011)","chapter":"第四章 知识产权海关保护"},
  {"id":760,"topic":"专题八 其他相关法律","type":"multiple","question":"根据知识产权海关保护条例，下列哪些说法是正矿（多选）","options":{"A": "海关仅对与出口货物有关的知识产权实施保护", "B": "海关实施保护的知识产权包括专利权、商标专用作权和与著作权有关的权利", "C": "知识产权权利人请求海关实施知识产权保护的，应海关提出采取保护措施的申请", "D": "海关实施知识产权保护时，应当保守有关当事人的秘密2026年专利代理师贵格考状"},"answer":"ABCD","explanation":"。A选项，《巴黎公约》第4条D（1）规定：“任何人希望利用以前提出的一项中请的优先权的，带要作出声明，说明提出该申请的日期和受理该中请的国家……….”，A选项正确。B选项，（巴黎公约》第4条D（3）规定：“本联团国家可以要求作出优先权声明的任何人提交以前提出的申请（说明书、附图等）的副本…”，B选项正确。C选项，（巴黎公约）第4条A（2）规定：“依照本联盟任何国家的本国立法，或依風本联塑各国之间缔结的双边或多边条约，与正规的国家申请相当的任何申请，应当被承认为产生优先权”，C选项正确。D选项，（巴黎公约>第4条E（1）规定：“依靠以实用新型申请为基础的优先权而在一个国家提出工业品外观设计申请的，优先权期问应与工业品外观设计规定的优先权期间一样”，D选项正确。（2016）","chapter":"第四章 知识产权海关保护"},
  {"id":761,"topic":"专题八 其他相关法律","type":"multiple","question":"根据知识产权海关保护条例及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "知识产权权利人请求海关扣留侵权嫌疑货物的，应当向海关提供不超过货物等值的担保", "B": "海关依规定扣留侵权嫌疑货物的，知识产权权利人应当支付有关的仓储、保管和处置费用", "C": "涉嫌侵犯专利权货物的收货人或者发货人在向海关提供与货物等值的担保金后、请求海关放行其货物的，海关应予放行", "D": "被扣留的侵权嫌疑货物、经海关调查后认定役犯知识产权的，海关应将其交给知识产权权利人处理"},"answer":"BD","explanation":"。A选项，《巴黎公约>第4条之四规定：“不得以专利产品的销售或依专利方法制造的产品的销售受到本国法律的禁止成限制为理由，面拒绝投予专利或体效”，A选项错识定：“中选项，已约保护工业产权巴黎公约与马拉喀什条约","chapter":"第四章 知识产权海关保护"},
  {"id":762,"topic":"专题八 其他相关法律","type":"multiple","question":"根据知识产权海关保护条例及相关规定，知识产权权利人可以将其知识产权向海关总署申请备案。申请备案的，应当提交申请书。申请书应当包括下列哪些内容？多选）","options":{"A": "知识产权许可行使状况", "B": "知识产权的名称、内容及其相关信息", "C": "知识产权权利人的名称或者姓名、注册地或者国籍等", "D": "知识产权稳定性初步证明文件"},"answer":"BD","explanation":"。A选项，《巴繁公约>第S条A（2）规定：“本联且各国部有权采取立法指虑况定投干强制许可，以防止由于行使专利所赋于的专有仅面可能产生的溢用，例如：不实施”，A选项错误。B、C逸项，（巴靠公约）第5条A放（4）况定：“…这种强制许可是非偿占性的，而且除与利用试许可的部分企业成商替一起转让外，不得转让，甚至以授千分许可证的形式在内”，B选项正确，C选项借误，D逸项，尽管《巴睾公约>没有明确规定强制改许可人应当向专利权人支付使用费，但其是许可条体之一，获得强胡许可的微许可人应当向专利权人支付使用费.D迄项正确。（2014）","chapter":"第四章 知识产权海关保护"},
  {"id":763,"topic":"专题八 其他相关法律","type":"multiple","question":"根据知识产权海关保护条例及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "个人携带或者邮寄进出境的物品，超出自用、合理数量，并侵犯知识产权的，按照侵权货物处理", "B": "知识产权备案情况发生改变的，知识产权权利人应当自发生改变之日起30个工作日内，向海关总署办理备案变更或者注销手续", "C": "在海关认定被扣留的侵权嫌疑货物为侵权货物之前，知识产权权利人撤回扣留侵权嫌疑货物的申请的，海关应当放行被扣留的侵权嫌疑货物", "D": "对被没收的无法用于社会公益事业且知识产权权利人无收购意愿的进口假冒商标货物，在清除货物上的商标标识后海关即可允许其进人商业渠道"},"answer":"BCD","explanation":"。A、B逸项，《巴公约>第5条A（2）规定：“本联显各国部有权采取立法措地规定投子强明许可，以防止由于行使专利所款子的专有权百可能产生的温用，例如：不实览”：（巴算公均》第5条A（S）规定：“上述各有规定（即关于强例许可的规定）准用于实用新型”，A选项借误，B逸项正确。C选项，《巴幕公约》第5条A（3）规定：“除湿制许可的投于不足以防止上述溢用外，不应规定专利的取消”，C选项正确。D选项，很据（已攀公约）第5条A（4）的规定，针对专利权授予的强制许可是非独占性的，D选项正确。（2012）","chapter":"第四章 知识产权海关保护"},
  {"id":764,"topic":"专题八 其他相关法律","type":"multiple","question":"根据知识产权海关保护条例及其实施办法的规定.下列哪些说法是正确的？（多选）","options":{"A": "知识产权权利人申请扣留侵权娘疑货物.海关依法扣留侵权嫌疑货物后，自扣留之日起15个工作日内未收到人民法院协助执行通知的，海关应当放行被扣留的侵权娘疑货物", "B": "知识产权权利人接到海关发现涉娘役犯其备案知识产权的进出口货物的书面通知后，逾期未提出扣留侵权货物申请或者未提供担保的，海关不得扣留货物", "C": "涉嫌侵犯专利权货物的收货人或者发货人在向海关提供与货物等值的担保金后，请求海关放行其货物的.海关应当放行被扣留的侵权嫌疑货物", "D": "海关认为收货人或者发货人有充分的证据证明其货物未侵犯知识产权权利人的知识产权的，应当放行被扣留的役权嫌疑货物"},"answer":"ABCD","explanation":"。A选项，根据（已算公约）第7条的规定，使用商标的商品的性质在任何情况下不应妨母该商标的注册，八选项正确。B选项，根据（巴黎公约》第5条A（4)的规定，自提出专利申请之日起4年届满以前，成自设于专利之日起3年届满以前，以后满期的期问为准，不得以不实施成不充分A（5）的规定，有关专利的上述规定准用于实用新型，B选项正确。C选项，根据（巴黎公约）第5条B的规定，对外观设计的保护，在任何情况下，都不得以不实施或进口物品与受保护者相同为理由而使其丧失，C选项正确。D选项，根据《巴黎公约）第5条之二（1）的规定，缴纳规定的工业产权维持费、应给予不少于6个月的宽限期，D选项正确。(2008)","chapter":"第四章 知识产权海关保护"},
  {"id":765,"topic":"专题八 其他相关法律","type":"multiple","question":"根据展会知识产权保护办法的规定，知识产权权利人向展会知识产权投诉机构投诉的，应当提交下列哪些材斜？多选）","options":{"A": "合法有效的知识产权权属证明", "B": "涉嫌侵权当事人的基本信息", "C": "涉嫌侵权的理由和证据", "D": "财产担保证明"},"answer":"AD","explanation":"。A选项，（巴黎公约）第5条之二（1）规定：“关于规定的工业产权维持费的缴纳，应给于不少于6个月的宽限期，但是如果木国法律有规定，应缴纳附加费”，因此人选项正确。B选项，（巴黎公约》第19条规定：“木联显国家在与本公约的规定不相抵触的范国内，保留有相互间分别签订关于保护工业产权的专门协定的权利”，因此B选项错误。C选项，《巴黎公约》第5条之三规定：“在本联且任何国家内，下列情况不应认为是役犯专利权人的权利：1.本联型其他国家的船舶暂时成偶然地进入上述国家的领水时，在该船的船身、机器、船具、装备及其他附件上使用构成专利对象的器核，但以专为该船的得要而使用这些器核为限…”，但船舶上的酒水吧台不是以专为该船的雷要而使用，因此构成役权，C选项错误。D选项，《巴黎公约》第10条之二规定：“（1）本联回国家有义务对各该国国民保证给子制止不正当竞争的有效保护。（2）凡在工商业事务中违反诚实的习惯做法的竞争行为构成不正当竞争的行为”，因此D选项正确。（新编）","chapter":"第五章 展会知识产权保护"},
  {"id":766,"topic":"专题八 其他相关法律","type":"single","question":"根据展会知识产权保护办法的规定，下列哪些情形下，地方知识产权局对展品侵犯专利权的投诉或者处理请求不予受理？（多选）","options":{"A": "投诉人或者请求人已经向人民法院提起专利侵权诉讼的", "B": "专利权正处于无效宣告请求程序之中的", "C": "专利权存在权属纠纷，正处于人民法院的审理程序之2026年事利代理纤告格考校中的", "D": "专利权已经终止，专利权人正在办理权利恢复的"},"answer":"D","explanation":"。A选项，《马拉喀什条约>第2条（一）规定：“作品是指文学和艺术作品，形式为文字、符号和（或）相关图示，不论是已出版的作品，还是以其他方式通过任何媒介公开提供的作品”，因此A选项错误。B选项，香港特别行政区适用《马拉喀什条约），但不适用于澳门特别行政区，因此B选项错误。C选项，（马拉喀什条约》于2013年6月27日在马拉喀什签署，于2016年9月30日生效，并于2022年5月5日对中国生效，因此C选项错误。D选项，（马拉喀什条约》第14条规定：“与本条约有关的行政工作应由世界知识产权组织国际局股行\"，因此D选项正确。（新编）","chapter":"第五章 展会知识产权保护"},
  {"id":767,"topic":"专题八 其他相关法律","type":"multiple","question":"根据展会知识产权保护办法的规定，有下列哪些情形的、地方知识产权行政管理部门对侵犯商标权的投诉成者处理请求不予受理？（多选）","options":{"A": "而标权已经被撤销的", "B": "商标权已经无效的", "C": "投诉人成者请求人已经向人民法院提起商标侵权诉讼的", "D": "商标权存在权属纠纷，正处于人民法院的审理程序之中的"},"answer":"BCD","explanation":"。A、B、C逸项，（与贝易有关的加识产权协定》第1条第1款规定：“各成员应当实地本协定的规定。各成员可以，但没有义务，在其法律中规定比本协定的妥求更为广泛的保护，只要此种保护不造反本协定的现定。各成贝有权在其各自的法体制度和实段中确定实您本协定规定的造当方法”，A选项借误，B、C选项正确。D途项，（与贸易有关的知识产权协定》第1条第3款规定：”各成员应当将该协定规定的待遇给予其他成员的国民”，D选项正确。（2009）","chapter":"第五章 展会知识产权保护"},
  {"id":768,"topic":"专题八 其他相关法律","type":"single","question":"根据对外贸易法的规定，下列哪项说法是正确的？数（单选）国","options":{"A": "进出口属于自由进出口的技术，无需办理任何合手续D", "B": "国务院对外贸易主管部门可以对自由进出口的技对术实行进出口自动许可方", "C": "进出口属于自由进出口的技术，应当办理合同备证案登记", "D": "进出口属于限制进出口的技术，应当经省级对外者贸易主管部门许可或"},"answer":"C","explanation":"。《与贸易有关的知识产权协定》第3条“国民待通”规定：”每一或贝给子其他成员国民的待通不应比其给子本国国民的待通较为不利”.C选项正确。（2016）","chapter":"第六章 对外贸易法"},
  {"id":769,"topic":"专题八 其他相关法律","type":"single","question":"根据技术进出口管理条例的规定，下列说法哪些是正确的？（多选）理","options":{"A": "风于限制出口的技术，实行许可证管理；未经许项可，不得出口口", "B": "对于限制出口的技术，应当先签订技术出口合同，技然后再向外经贸主管部门申请技术出口许可意向书意", "C": "技术出口经许可的，由外经贸主管部门颁发技术出口许可证口国", "D": "对于限制出口的技术，技术出口合同自技术出口术许可证颁发之日起生效四"},"answer":"C","explanation":"。《与贸易有关的知识产权定》第4条“最意回侍遵”规定：“关干知识产权的保护，一成员对任何其他国家的国民投子的任何利益、优惠、特权或唇免，应当立即无条件地给于所有其他成员的国民”，C选项正确。（2015）","chapter":"第六章 对外贸易法"},
  {"id":770,"topic":"专题八 其他相关法律","type":"multiple","question":"根据技术进出口管理条例及相关规定，对回务院外经贸主管部门作出的有关技术进出口的批准，许可、登记或者行政处罚决定不服的，下列哪些说法是正确的？（多选）","options":{"A": "提起诉讼前必须先复议（", "B": "不可复议，只可诉讼", "C": "可以向人民法院提起诉讼外", "D": "可以申请行政复议国"},"answer":"AD","explanation":"。《巴黎公约）没有规定最惠国侍遇原则和造明度原则，（已黎公约）与贸易有关的知识产权协定》均规定了国民侍通原则和防止滋用原则，A、D选项正确，B、C选项错误。（2019）","chapter":"第六章 对外贸易法"},
  {"id":771,"topic":"专题八 其他相关法律","type":"multiple","question":"根据技术进出口管理条例及相关规定，技术进出口所指的转移技术的行为不包括：（单选）实","options":{"A": "专利实施许可", "B": "技术服务", "C": "技术秘密转让", "D": "技术合作开发"},"answer":"ABC","explanation":"。根据（与贸易有关的知识产权协议）第二部分的规定，知识产权范图包括版权与有关权利、商标、地理标志、工业品外观设计、专利、集成电路的布图设计和未公开信息的保护，A、B、C选项正确，D选项借误。（2006）","chapter":"第六章 对外贸易法"},
  {"id":772,"topic":"专题八 其他相关法律","type":"multiple","question":"根据刑法及相关规定，下列说法哪些是见罪，应当负正确的？（多选）意杀人、数意","options":{"A": "已满12周岁不满18周岁的人犯罪，应当放火、爆炸、从轻或者减轻处罚岁不消14周", "B": "已满75周岁的人故意犯罪的，应当从轻以持别技忍或者减轻处罚民检察院", "C": "又聋又哑的人犯罪，可以从轻、减轻或者追究事责免除处罚因此A选项", "D": "精神病人在不能控制自己行为的时候造周岁的人故成危害结果，经法定程序鉴定确认的，不负刑事应当从轻交责任第19条规定成者免除处款规定：“精"},"answer":"BCD","explanation":"。A选项，（与易有关的知识产权协定》第9条第2款规定：“版权的保护应当及于表达，而不及于构思、程序、操作方法成者数学概念木身”，A选项佣误。B、C选项，（与贸具有关的知识产权协定）第10条第1款规定：“计算机程序，不论是以源代码还是以目标代码表达，应当根据《伯尔尼公约>（1971年）作为文字作品加以保护”，B、C选项正确。D选项，（与贸易有关的知识产权协定》第14条规定了对表演者、录音制品制作者和广播组织的保护，D选项正确。（2013）","chapter":"第七章 刑法"},
  {"id":773,"topic":"专题八 其他相关法律","type":"single","question":"B。放、甲为摆脱乙、在疾驶时突然急刹车，导致乙着危害社会的地身亡。根据刑法及相关规定，甲对乙死亡的心犯罪的，是的理态度属于下列哪一选项？（单选）车，甲应该","options":{"A": "直接故意脱乙的检查", "B": "问接故意故任的主观", "C": "过于自信的过失确。（新编）", "D": "疏忽大意的过失"},"answer":"D","explanation":"。（与贸易有关的知识产权协定》第10条第2款规定：“数据或者其他资料的汇编，不论是用机器可读形式还是其他形式，由于对其内容的选择或者安排而构成智力创作，应当加以保护。这种保护不涉及数据成者资料本身，不应损害存在于数据或者资料本身的任何版权”，D选项正确，A、B、C选项错误。（2011）","chapter":"第七章 刑法"},
  {"id":774,"topic":"专题八 其他相关法律","type":"multiple","question":"王某因婚外情产生杀害妻子张某的想的儿子中毒法。某日早晨，王某在给张某炸油条时投放了可了他不希望以致死的“毒鼠强”。王某为防止其5岁的儿子的间接故意吃油条中毒，将其子送到幼儿园，并啊咐其子等定：应当预他来接。不料，张某当日提前下班后，将其子接大意面没有回来一起吃油条。王某得知后，赶忙回到家中，种结果的，其妻、子已中毒身亡。根据刑法及相关规定，本能发生其子案中下列哪项说法是正确的？单选）免其子中毒","options":{"A": "王某对其妻、子的死亡具有直接故意心态应当认", "B": "王某对其子的死亡具有间接故意《刑法》第1是不是出于", "C": "王某对其子的死亡具有过失的原因所引", "D": "王某对其子的死亡属于意外事件于竞外事件"},"answer":"BCD","explanation":"。《与贸易有关的知识产权协定》第11条规定：“至少就计算机程序和电影作品而盲，一成员应给予作者及其合法继承人准许成禁止向公众商业性出租其有版权作品的原件或复制品的权利。一成员对电影作品可不承担此义务，除非此种出租已导致对该作品的广泛复制，从而实质性减报该成员投子作者及其合法继示人的专有复制权。就计算机程序而盲，如该程序本身不是出租的主要标的，则这一义务不适用于出租”；（与贸易有关的知识产权协定》第14条第4数规定：“第11条关于计算机程序的规定应当比原适用于录音制品制作者以及成员法体规定的录音制品的任何其他权利持有人。如果在1994年4月15日，成员在录音制品的出租方面已经实施对权利持有人给于","chapter":"第七章 刑法"},
  {"id":775,"topic":"专题八 其他相关法律","type":"single","question":"根据刑法及相关规定，下列哪种行为构人许可，在成侵犯知识产权罪？（单选）标，情节严","options":{"A": "未经注册商标所有人许可，在同一种商节特别严重品上使用与其注册商标近似的商标，情节严重的选项中为近", "B": "以营利为目的，出版他人享有专有出版《刑法》第2权的图书，违法所得数额巨大的者与若作", "C": "D选项不", "D": "未经植物新品种权人许可，以商业目的有出般权的销售授权品种的繁殖材料，违法所得数额较大的"},"answer":"D","explanation":"。（与贝导有关的知识产仅协定>第I5条第1款规定：“任何标记或标记的组合，他将一企业的商品或质务与其他企业的商品成服务区别开来的，就能构成前标。这类标记，光其是文字（包括人名）、字册、数字、图形赛兼和色彩的组合，以及这类标记的任何组合，均造合于作力商标平以注册，如渠标记缺乏区别有美商品成服务的固有能力，各成员可以将该标记可否注册取决于使用后所获得的显著性。名成员可以要求你说觉可以鸣与的标记作为注册的条件”，D选项正确，A、B、C逸项说法过干绝对。（2011）","chapter":"第七章 刑法"},
  {"id":776,"topic":"专题八 其他相关法律","type":"multiple","question":"根据刑法及相关规定，下列关于假冒注规定，商品册商标罪、销售假冒注册商标的商品罪的说法正售渠道等力确的有？多选）商品的，应","options":{"A": "只要商品名称不同，则不属于“在同一种服务”。因商品、服务上使用与其注册商标相同的商标”解释>第2", "B": "在注册商标上仅增加商品型号，并未增号等缺乏显加注册商标的显著性特征，仍属于“在同一种商当认定为售标”。因北品、服务上使用与其注册商标相同的商标”释>第8条", "C": "实施假冒注册商标犯罪，又销售该假冒犯罪，又销注册商标的商品，构成犯罪的，应当实行数罪冒注册商并罚标哪定哪久", "D": "无正当理由以明显低于市场价格销售假的规定.销冒注册商标的商品，属于销售假冒注册商标的商场价格进负品罪中规定的“明知”品罪中规定"},"answer":"BC","explanation":"。A、B选项，《与贸易有关的如识产权协定》第15条第3款规定：“各战员可以将可否注府取决干使用。然百，不应将前标的实际使用作力提交注开中请的条件”，A途项错误，B途项正确。C、D途项，（与马有关的知识产权协定》第19条第1款现定：“如果使用是堆持注册的必要条件，只有在至少连续3年不使用以后，才可以取消其注册·…·.”，C选项正确，D选项借误：（2016）","chapter":"第七章 刑法"},
  {"id":777,"topic":"专题八 其他相关法律","type":"single","question":"根据《促进科技成果转化法》相关规定，以下关于职务科技成果收益分配的说法，正确的是：（单选）","options":{"A": "国家设立的研究开发机构、高等院校转化科技成果所获得的收人需上交一部分至上级主管部门", "B": "职务科技成果转化后，由科技成果完成单位对所有参与人员给予奖励和报酬", "C": "科技成果完成单位制定奖励和报酬相关规定时，无需听取本单位科技人员意见", "D": "若国家设立的研究开发机构将某项职务科技成果作价投资，且未规定奖励报酬方式和数额，应从该项科技成果形成的股份或者出资比例中提取不低于50%的比例给予完成、转化该项成果的重要贡献人员"},"answer":"A","explanation":"。（与贸易有关的知识产权协议》第18条规定：“商标的首次注示和每次块展保护期限不少干7年”，A选项正，B、C、D选项错误。（2006）","chapter":"第八章 促进科技成果转化法"},
  {"id":778,"topic":"专题八 其他相关法律","type":"single","question":"根据《促进科技成果转化法》相关规定、下列不属于科技成果持有者可采用的科技成果转化方式的是：（单选）","options":{"A": "将科技成果捐赠给公益组织", "B": "以科技成果作价投资，折算股份", "C": "许可他人使用该科技成果", "D": "自行投资实施科技成果转化"},"answer":"B","explanation":"。A选项，（与贸乌有关的知识产权协定》第17条规定：“各成员可以对商标所设干的权利规定有限的例外，诸如说明性词语的合理使用…….”，A选项错误。B选项，（与贸易有关的知识产权协定》第16条第1款规定：“注册商标所有人应当享有排他权…但上述权利不应担害任何现有的在先权利，也不应当影响各成员根据使用投于权利的可能性”，B选项正确。C、D选项，（与贝易有关的如识产权协定）第21条规定：“各成员可以规定商标的许可和转让的条件：这应理解为，商标的强制许可是不允许的，并且注册商标所有人有权将商标连同成不连同其所属的企业一起转让”，C、D选项错误。（2013）","chapter":"第八章 促进科技成果转化法"},
  {"id":779,"topic":"专题八 其他相关法律","type":"multiple","question":"根据《科学技术进步法》的金设立的科学技术计规定，利用财政性资金设立的科学的知识产权向境外的技术计划项目所形成的专利，下列实施的，应当经项目管说法正确的是？（多选）依照其规定。”因此A选","options":{"A": "形成的专利应当首先在境用财政性资金设立的内使用全、国家利益和重大社", "B": "形成的专利实施转化前，知识产权，项目承担者应当经项目管理机构批准同实施转化、许可他人", "C": "D选项正确（新编）", "D": "形成的专利归项目承担者也可以许可他人有偿数规定的知识产权，为所有家可以无偿实施，也可"},"answer":"ABCD","explanation":"。A、B选项，（与贝易有关的如识产权协定》第22条第2款规定：“就地理标志而盲，各成员应向利害关系方提供法律手及以防止：（一）在商品的名称成外表上使用任何手及标明成暗示所涉货物来源于真实原产地之外的一地理区坡，从而在该货物的地理来源方面使公众产生误解……”.A、B选项正确。C、D选项，（与贸易有关的知识产权协定》第23条第1款规定：“每一成员应为利害关系方提供法律手段，以防止将识别葡萄酒的地理标识用于并非来源于所涉地理标识所标明地方的葡萄酒，或防止将识别烈酒的地理标识用于并非来源于所涉地理标识所标明地方的烈酒，即使对货物的真实原产地已标明……….，C、D选项正确。（2007）","chapter":"第九章 科学技术进步法"},
  {"id":780,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"下列哪些居（巴禁公约》规定的工业产权","options":{"A": "专利权", "B": "商标权", "C": "版权", "D": "植物新品种权"},"answer":"ABCD","explanation":"。（与贸易有关的知识产权协定）第24条第5款规定：“如果（a）在某一成员按第六部分规定适用这些规定以前，或者（b）在地理标志在其米源国获得保护以前，某一商标已经善意地提出申请或者获得注册，或者商标权利已经通过善意使用而获得，则为实施本节规定而采取的措施不应因该商标与某一地理标志相间或类似，而损害商标的注册资格或商标注册的有效性，或者损害使用该商标的权利”。A、B选项属于该条（a）项规定的情形，C、D选项属于该条（b）项规定的情形，A、B、C、D选项均正确。（2009）"},
  {"id":781,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"根据（巴黎公约》的规定，下列哪项不属于工业产权的保护对象？（单选）","options":{"A": "外观设计", "B": "原产地名称", "C": "货源标记", "D": "集成电路布图设计"},"answer":"ABCD","explanation":"。A、B、C选项，（与贸易有关的知识产权协定》第25条第1款规定：“各成员应当规定保护独立创作而且是新颖的或者原创的工业品外观设计。各成员可以规定，外观设计如果与已知的外观设计或者已"},
  {"id":782,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"《巴黎公约》规定，本联盟任何国家的国民，在保护工业产权方面，在本联盟所有其他国家内应享有各该国法律现在授予或今后可能授予国民的各种利益；一切都不应损害本公约特别规定的权利。因此，他们应和国民享有同样的保护，对侵犯他们的权利享有同样的法律上的救济手段，但是他们遵守对国民规定的条件和手续为限。上述规定可以概括为什么原则？（单选）","options":{"A": "对等原则", "B": "差别待遇原则", "C": "最惠国待遇原则", "D": "国民待遇原则"},"answer":"ABD","explanation":"。《与贸易有关的知识产权协定>第26条第1款规定：“受保护的工业品外现设计所有人，应有权到止第三方未径许可百为前业目的制造、销售或进口零有戏体现有变保护设计的复制品成实质性复制品之物品”.A、B、D逸项正项.C选项借误。（2015）"},
  {"id":783,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"甲国、乙国为《巴黎公约》的成员国，丙国为非成员2026年专利代理师节格考试国。根据该公约的规定，下列哪些说法是正确的？（多选）","options":{"A": "在甲国有住所的丙国公民在乙国可以享有国民待遇", "B": "在乙国没有住所的甲国公民在乙国可以享有国民待巡", "C": "在丙国有住所的乙国公民在甲国可以享有国民待遇", "D": "在丙国有住所的甲国公民在乙国可以享有国民待遇"},"answer":"BD","explanation":"。A选项，（与贸易有关的知识产权协定》第33条规定：“可获得的保护期限不得在自中请之日起计算的20年期满前结束”，即保护期应当不少于20年，A选项错误。B选项，（与贸易有关的知识产权协定）第27条2规定：“各成员可拒绝对某些发明投于专利权，如在其领土内阻止对这些发明的商业利用是维护公共铁序或道售，包括保护人类、动物或植物的生会或健康或避免对环境造成产重损害所必诺的，只宴此柠拒绝投予井非仅因为此种利用为其法体所禁止”，B选项正确。C选项，（与贸马有关的知识产权协定》第32条规定：“任何有关缴销成宜布一专利无效的决定应可进行司法审查”，C选项错误。D选项，（与贸易有关的知识产权协定》第29条2规定：“各成员可要求专利申请人提供关于中请人相应的国外中请和投予情况的信息”，D选项正确。（2019）"},
  {"id":784,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"根据《巴黎公约》的规定，在工业产权保护方面、下列哪些人可在该公约成员国之一的美国享有国民待遇？（多选）","options":{"A": "在美国有住所的中国公民", "B": "在美国没有住所的中国公民", "C": "在美国有营业所的中国企业", "D": "在美国没有营业所的中国企业"},"answer":"ABC","explanation":"。A选项，根据<与贸易有关的知识产权协定》第27条第2款的规定，各成员可以拒绝某些发明投予专利，以这种拒绝并非仅仅因为法律禁止实地为限，人选项正确。日选项，（与贸昌有关的知识产权协定）第29条规定：“1.各成员应当要求专利中请人以足清楚和完整的方式公开发明，使熟恶有关技术的人他实施该发明”，B选项正确。D选项，国外专利的审查情况仅作为投权的参者、不会直接决定是否投权，D选项错误。C选项，（与贸昌有关的知识产权协定》第30条规定：“各成员可以对专利所投于的推他权规定有限的例外，但是，在顾及第三方合法利益的情况下，这些例外以并未与专利的正常利用不合理地相冲突，而且也并未不合理地损害专利所有人的合法利益为限”，C选项正确。（2018）"},
  {"id":785,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"根据《巴黎公约》，巴黎联盟成员国的法律可对下列哪些事项作出国民待遇原则的例外规定？（多选）","options":{"A": "司法和行政程序管辖权", "B": "指定送达地址", "C": "委派代理人", "D": "权利受侵犯时法律上的救济手段"},"answer":"ABCD","explanation":"。A选项，（与贸易有关的知识产权协定）第27条第1款规定：“专利的获得和专利权的享有，不应因发明地点、技术领城以及产品是进口还是本国生产的不同而受到歧视”，A选项正确。B选项，（与贸易有关的知识产权协定>第27条第3款规定：“各成员可将医治人或动物的诊断、治疗和手术方法排除在可享专利性以外”，B选项正确。C选项，（与贸易有关的知识产权协定》第33条规定：“权利可享有的保护期间，自专利申请提交之日起计算的20年期间届满前不应终止”，C选项正确。D选项，（与贸易有关的知识产权协定》第32条规定：“对撒销或取消专利的任何决定，均应提供司法审查的机会”，D选项正确。（2012）"},
  {"id":786,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"根据《巴黎公约》的规定，下列哪些说法是正确的？（多选）","options":{"A": "就同一发明在优先权期限内向不同成员国申请并取得的专利，在某一成员国被无效的，在其他成员国亦被当然无效", "B": "成员国的国民在某一成员国取得的专利，与在其他成员国或者非成员国就同一发明取得的专利各不相关", "C": "在同一成员国因享有优先权而取得的专利与不享专有优先权而取得的专利的有效期间相同", "D": "成员国不得以专利产品的销售受到国内法的限制为由而使专利无效"},"answer":"AD","explanation":"。（与贸易有关的知识产权协定》第31条规定：“如果成员的法律允许，未经权利持有人许可即可对专利的主题作其他的使用，包括政府使用成经政府许可的第三方使用，则应当尊重下列规定：（a）这种使用的许可应当根据个案情况于以考虑：（b）这种使用应尽快通知权利持有人……（d）这种使用应当是非独占性的（e）这种使用不得转让，但与享有这种使用的企业或者"},
  {"id":787,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"王某就同一项发明先后在中国和美国提出了专利申请，其美国申请以在中国的申请为基础要求了优先权，根据《巴黎公约》的规定，下列说法哪项是正确的？（单选）","options":{"A": "如果王某在中国的专利申请被驳回，则其在美国的专利申请同样应当被驳回", "B": "如果王某在中国的专利申请被授予专利权，则其在美国的专利申请同样应当被授子专利权", "C": "对于王某在美国的专利申请，应当按照美国的法律规定来确定能否授予专利权", "D": "对于王某在美国的专利申请，应当按照与中国相同的审查标准来确定能否授予专利权"},"answer":"CD","explanation":"。A选项，根据<与贸易有关的知识产权定>第31条的规定，这种使用不得转让，但与享有这待使用的企业成者商誉一起转让的不在此限，A逸项借误。B逸项，这种使用只有在使用前，意图使用的人曾经务力按合理的前业条款和条件请求权利持有人给子许可，但在合理的期问内这种务力没有成功的，才能允许。但在回家处干紧忽状态成有其他极培紧急的情形，成者在公共的非商业性使用的情形，成员可以放这一曼求，B选项借误。C逸项，这种使用在半导体技术的情形下，只能限于为公共的非商业性使用，成者用于经可法或行政程序确定为反竞争行为面给予的补教，C选项正确。D选项，在对被许可人的合法利益给子足够保护的前提下，如果以及在导致这种许可的情况已不存在，井且不大可能再发生时，这种使用的许可应即终止，D选项正确。（2010）"},
  {"id":788,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"根据《巴黎公约》的规定，成员国国民就其在本国提出的下列哪些工业产权的首次申请，又在其他成员国提出申请的，可以享有优先权？（多选）","options":{"A": "专利", "B": "工业品外观设计", "C": "原产地名称", "D": "实用新型"},"answer":"BC","explanation":"。《与贸易有关的知识产权定）第27条第3款（b）规定：….…各成员应当规定依专利或依有效的特别制度，或依二者的结合，保护植物的品种…”，A、D选项措误，B、C选项正确。（2019）"},
  {"id":789,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"根据《巴黎公约》的规定，下列关于优先权的说法哪些是正确的？多选）","options":{"A": "作为产生优先权的基础的首次申请可以是与正规的国家申请相当的任何申请", "B": "要求优先权的，应当在各成员国规定的期限内提出要求优先权的声明", "C": "根据实用新型申请的优先权而在另一成员国提出外观设计申请的，优先权的期间应当为12个月", "D": "成员国可以准许根据实用新型申请的优先权提出2026年专利代理师货格考试专利申请"},"answer":"BCD","explanation":"。（与贸易有关的知识产权协定》第38条规定：“1.在以登记作为保护条件的成员中，布图设计的保护期问自登记申请提交之日算起，或者自其在世界上任何地方第一次商业利用算起10年期同届满前不应终止。2.在不以登记作为保护条件的成员中，布图设计的保护期问自其在世界上任何地方第一次商业利用之日算起不少干10年。3.尽管有本条第1款和第2款，成员可以规定，布图设计自创作以后15年，保护应当终止”，A选项错误，B、C、D选项正确。（2011）"},
  {"id":790,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"王某在中国提出了一件实用新型专利申请、并在自申请日起的第九个月时就相同主题在《巴黎公约》的其他几个成员国分别提出了专利、实用新型和外观设计申请。根据（巴黎公约》的规定，下列说法哪些是正确的？（多选）","options":{"A": "王某在其他成员国提出的专利申请，能够以在中国提出的实用新型专利申请为基础享有优先权", "B": "王某在其他成员国提出的实用新型申请，能够以在中国提出的实用新型专利申请为基础享有优先权", "C": "王某在其他成员国提出的外观设计申请，能够以在中国提出的实用新型专利申请为基础享有优先权", "D": "如果王某在中国的实用新型专利申请被驳回，则其在其他成员国的申请均不能以该实用新型专利申请为基础享有优先权"},"answer":"AD","explanation":"）。A选项，（与页易有关的知识产权协定》第31条规定了专利的“未经权利特有人投权的其他使用”，即规定了对专利权的强制许可，人选项正确。D选项，根据（与贸昌有关的知识产权协定）第21条的规定，商标的强制许可是不允许的，日选项错误。C选项，（与页易有关的如识产权协定）未规定工业品外观设计的强制许可成非白愿许可，C选项钳误。D选项，《与贸岛有关的知识产权协定）第37条第2欺规定：“布图设计通有任何非自愿许可，或未经权利持有人许可面由政府成为政府而使用时，应当比风适用第31条（a）项至（k）所列规定的条件”，D选项正确。（2012）"},
  {"id":791,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"根据（巴黎公约》的规定，下列说法哪些是正确的？（多选）","options":{"A": "优先权的期间应自第一次提出申请之日起算，申请日不计算在期间之内", "B": "如果优先权期间的最后一日在请求保护地国家是法定假日，该期间应延至其后的第一个工作日", "C": "国际展览会的临时保护不应延展优先权的期间", "D": "国际展览会的临时保护适用于发明、实用新型、工业品外观设计但不适用于商标"},"answer":"ACD","explanation":"。（与贸易有关的知识产权协定》第39条第2款规定：“自然人和法人应有可能制止他人未得其同意，以违反诚实的商业做法的方式，将其合法控制下的信息向他人公开，或者获得或使用此种信息，只要这种信息符合下列条件：（1）符合这样意义的秘密，即该信息的整体或其部分的确切排列和组合，并不是通常从事有关这类信息的人所普遍了解或容易获得的：（2）由于是保密信息面具有商业上的价值：和（3）合法控制该信息的人已经根据情况采取了合理措施予以保密”，A、C、D选项正确。商业科密没有登记备案要求，B选项错误。（2018）"},
  {"id":792,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"根据《巴黎公约》的规定，下列哪些说法的？（多选）","options":{"A": "要求优先权的，应当在各成员国出要求优先权的声明", "B": "成员国可以要求作出优前提出的申请的副本专", "C": "作为产生优先权的基础的首次申请可以是与正规的国家申请相当的任何申请", "D": "成员国可以准许根据实用新型申请的优先权提出工业品外观设计申请"},"answer":"ABC","explanation":"。（与贸易有关的知识产权协定》第40条第2款规定：“本协定的任何规定均不得阻止各成员在其立法中明确规定，在特定情况下可构成对知识产权的滋用例如，排他性返投条件、制止对知识产权有效任提出质疑的条件以及强制性一揽子投权许可”，A、B、C选项正确，D选项错误。（2019）"},
  {"id":793,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"根据《巴黎公约》关于专利的规定，下列哪些说法是正确的？（多选）","options":{"A": "成员国可以以专利产品的销售受到本国法律禁止为由拒绝授予专利权", "B": "发明人有在专利中被记载为发明人的权利", "C": "成员国可以将在商品上载明专利作为收得保护的条件", "D": "一成员国国民向各成员国申请的专利，与在其他国家就同一发明所取得的专利是相互独立的"},"answer":"BCD","explanation":"。A选项属于刑事措施，B、C、D选项为民事措施。（2006）"},
  {"id":794,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"根据《巴黎公约》的规定，关于专利的强制许可下列说法哪些是正确的？（多选）","options":{"A": "成员国不得以不实施专利为由颁发强制许可", "B": "强制许可是非独占性的", "C": "强制许可在任何情况下都不可转让", "D": "强制许可的被许可人应当向专利权人支付使用费"},"answer":"AB","explanation":"。根据（与贸易有关的知识产权协定）第61条的规定，各成员应规定至少将"},
  {"id":795,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"根据《巴黎公约》的规定，下列哪些说法是正确的？多选）2026年专利代理师货格考试","options":{"A": "使用商标的商品的性质在任何情况下不应妨碍该商标的注册", "B": "自提出实用新型申请之日起4年届满以前，或者自投于实用新型之日起3年届满以前、以后届满的期间为准，不得以不实施为理由申请强制许可", "C": "对外观设计的保护，在任何情况下、都不得以不实施为理由而使其丧失", "D": "缴纳规定的工业产权维持费的宽限期不得少于6个月"},"answer":"ABCD","explanation":"。A选项，根据<与贸易有关的知识产权协定>第50条第2款的规定，可法机关应当有权在造当情况下，尤其是在任何退延可能对权利持有人造成不可弥补惯害的情况下，不作预先通知首即采取临时措选，A选项正确。B选项，概据<与贸身有关的知识产权协定>第50条第3效的规定，可法机关应当有权要求中请人提供可以合理地获得的任何证据，并有权要求中请人提供足以保护被告和防止滥用此种措施的保证金成相当的担保，B选项正确。C逸项，根据《与贸易有关的知识产权协定》第50条第S数的规定，执行临时措选的主管机关可要求中请人提供确认有关货物的其他必婴信息，C选项正确。D选项，根据（与贸易有关的知识产权协定>第50条第7款的规定，如果造时措施被撒销，则司法机关根据被告的请求，应当有权命今申请人向由于这些措施面受到损害的被告提供适当的补偿，D选项正确。（2007）"},
  {"id":796,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"multiple","question":"根据《巴黎公约》的规定，下列哪些说法是正确的？（多选）","options":{"A": "缴纳规定的工业产权维持费的宽限期不得少于6个月", "B": "各成员国之间可签订关于保护工业产权的专门协定，其中与《巴黎公约》的规定相抵触的，则各成员国之间应遵照该专门协定的规定", "C": "美国的船舶暂时进人中国海域过境时，其船舶上配置的酒水吧台与中国某吧台的专利产品相同，该船舶上的吧台不视为侵犯专利权", "D": "在工商业事务中违反诚实的习惯做法的竞争行为构成不正当竞争的行为，各成员国应予以制止"},"answer":"ABCD","explanation":"。A、B选项，根据（与贸易有关的知识产权协定）第50条第1款规定，司法机关应当有权命令采取迅速和有效的临时措施以便：（a）制止任何侵犯知识产权行为的发生：（b）保存被指控设权的有关证据，A、B选项正确。C选项，根据（与贸易有关的知识产权协定》第50条第2款的规定，在适当时，特别是在任何迟延可能对权利持有人造成不可补救的报害时，或存在证据被销毁的显而易见的风险时，司法机关有权采取不作预先通知的临时措施，C选项正确。D选项，根据（与员易有关的知识产权协定》第50条第3款的规定，司法机关应当有权要求申请人提供足以保护被告和防止滋用此种措施的保证金或相当的担保，D选项正确。（2018）"},
  {"id":797,"topic":"专题九 保护工业产权巴黎公约与马拉喀什条约","type":"single","question":"根据马拉喀什条约及相关规定，下列说法哪个是正确的？（单选）","options":{"A": "该条约中的“作品”仅指已出版的作品", "B": "该条约适用于中华人民共和国澳门特别行政区", "C": "该条约于2016年9月30日在中华人民共和国生效", "D": "与该条约有关的行政工作由世界知识产权组织国际局履行"},"answer":"C","explanation":"。（与贸易有关的知识产权协定）第51条规定：“各成员应当遵照规定制订程序，以便权利持有人在有确实根据的理由怀疑假冒商标货物成盗版货物可能进口时，能向行政成可法主管机关提出书面中请，要求海关当局对这种货物中止放行，以免进入白由流通”，（与贸岛有关的如识产权协定）第S8条规定：允许各成贝县求主管机关在获得初步证据证明知识产权正受到有关货物的侵犯时主动采取行动，中止该货物的放行”，A、B、D选项错误，C选项正确。（2012）"},
  {"id":798,"topic":"专题十 与贸易有关的知识产权协定","type":"multiple","question":"根据《与贸易有关的知识产权协定》.下列说法哪些是正确的？多选）","options":{"A": "世界贸易组织成员应当实施该协定的规定，不得在其法律中规定比该协定的要求更为广泛的保护", "B": "世界贸易组织成员没有义务在其法律中规定比该协定的要求更为广泛的保护", "C": "世界贸易组织成员有自由在其法律制度和实践中确定实施该协定规定的适当方法", "D": "世界贸易组织成员应当将该协定规定的待迎给予其他成员的国民"},"answer":"ABC","explanation":"。A选项，根据《与贸易有关的知识产权协定>第41条第2款的规定，知识产权的执法程序应公平合理。它们不得过于复杂或花费过高成包合不合理的时效成无保障的拖延，A选项正确。B选项，根据（与贸易有关的知识产权协定）第41条第3款的规定，就各案的是非作出的判决，最好采取书面形式，并应说明判决的理由，B选项正确。C选项，根据（与贸易有关的知识产权协定>第41条第4数的规定，对于行政的终局决定，诉讼当事人应有机会提交司法当局复审，C选项正确。D选项，根据（与贸易有关的知识产权协定》第41条第5款的规定，本部分之规定被认为并不产生下列义务：为知识产权执法，而代之以不同于一般法律的执行的司法制度，D选项错误。（2015）"},
  {"id":799,"topic":"专题十 与贸易有关的知识产权协定","type":"multiple","question":"根据《与贸易有关的知识产权协定》的规定，在知识产权保护方面，除该协定规定的特殊情形之外，每一成员给予其他成员国民的待遇不应比其给予本国国民的待遇较为不利。上述规定可以概括为什么原则？（单选）","options":{"A": "对等原则", "B": "差别待遇原则", "C": "国民待巡原则", "D": "最惠国待巡原则"},"answer":"ABC","explanation":"。根据《与贸易有关的知识产权协定》第63条第1款的规定，任何成员已经生效的与该协定内容（即知识产权的备有、范围、获得、执法和防止滥用）有关的法律和规章，以及普遍适用的终局司法判决和终局行政决定，均应以本国语盲公布，如果公布实际上不可行，则应以本国语盲向公众提供，以便各成员政府和权利持有人能够知。任何成员的政府或政府机构和另一成员的政府或政府机构之间有关该协定内容的有"},
  {"id":800,"topic":"专题十 与贸易有关的知识产权协定","type":"multiple","question":"根据《与贸易有关的知识产权协定》的规定，关于知识产权的保护，一成员对任何其他国家的国民授予的任何利益、优惠、特权或豁免，除该协定规定的特殊情形之外应当立即无条件地给予所有其他成员的国民。上述规定可以概括为什么原则？（单选）","options":{"A": "对等原则2026年专利代理师管格考试", "B": "差别待逃原则", "C": "最惠国待巡原则", "D": "国民待巡原则"},"answer":"ABD","explanation":"。A、B、D选项，概据<与贸易有关的知识产权协定>第63条第4款的规定，不要求各成员公开会妨研法体执行成违反公共利益的机密信息，或者损害特定的公有成私有企业的合法商业利益的机密信息，A、B、D逸项正确。C逸项，根据《与贝易有关的知识产权协定>第63条第1款的规定，任何成员已经生效的与本协定内容有关的法律和规章，均应以本国语言公布，C逸项错误。（2009）"},
  {"id":801,"topic":"专题十 与贸易有关的知识产权协定","type":"multiple","question":"下列关于《巴黎公约》和《与贸易有关的知识产权协定》的说法正确的是？多选）","options":{"A": "两者都规定了国民待遇原则", "B": "两者都规定了最惠国待巡原则", "C": "两者都规定了透明度原则", "D": "两者都规定了防止权利滥用的原则"},"answer":"BCD","explanation":"。A选项，（与贸易有关的知识产权协定>由与贸易有关的知识产权理事会管理，A选项借误。B、C选项，（与贸易有关的知识产权协定》第3条、第4条分别规定了国民待通原则和最国待通原则，B、C选项正确。D选项，根据（与贸易有关的知识产权协定>第8条第2款的规定，为了防止权利持有人避用知识产权，或者采用不合理边限例贸易成不利于国际技术转让的做法，可以采取适当措施，但这些措施是以符合本协定规定为限，D选项正确。（2010，思维扩展）"},
  {"id":802,"topic":"专题十 与贸易有关的知识产权协定","type":"single","question":"下列哪些属于《与贸易有关的知识产权协议》规定的知识产权的范围？多选）","options":{"A": "版权", "B": "工业品外观设计", "C": "地理标志", "D": "实用新型"},"answer":"A","explanation":"。A选项，《与贸易有关的知识产权协定>第16条第2款对用于服务的驰名商标明确提出了保护要求，A选项正确。B选项，《巴黎公约》第6条之二规定了对驰名商标的保护，但是在巴黎公约中的商标指商品商标，不包拾股务类商标，B选项错误。C、D选项，《洛迎诺协定》及《市达俱斯条约》均不涉及商标保护，C、D选项错误。（2011，思维扩展）"},
  {"id":803,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据《与贸易有关的知识产权协定》，下列哪些应当受版权或者和版权有关的权利的保护？（多选）","options":{"A": "数学概念本身", "B": "以源代码表达的计算机程序", "C": "以目标代码表达的计算程序", "D": "录音制品"},"answer":"","explanation":""},
  {"id":804,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据《与贸易有关的知识产权协定》的规定，数据库满足下列哪项条件的，成员应当给予著作权保护？（单选）","options":{"A": "该数据库的开发投入了相当的资金", "B": "该数据库包含相当数量的数据", "C": "该数据库的开发投人了相当的资金并且包含有相当数量的数据", "D": "对该数据库内容的选择或者安排构成智力创作"},"answer":"","explanation":""},
  {"id":805,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据《与贸易有关的知识产权协定》中关于出租权的规定，下列哪些说法是正确的？多选）","options":{"A": "成员有义务对以类似摄制电影的方法创作的作品提供出租权保护", "B": "录音制品本身是商业性出租的主要客体的，成员有义务对其提供出租权保护", "C": "计算机程序本身是商业性出租的主要客体的，成员有义务对其提供出租权保护", "D": "在电影作品的商业性出租已导致对作品的广泛复制，大大损害了权利人的复制排他权时，成员有义务对其提供出租权的保护"},"answer":"","explanation":""},
  {"id":806,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据《与贸易有关的知识产权协定》的规定，下列关于商标的说法哪项是正确的？（单选）","options":{"A": "任何标记或者标记的组合都可以构成商标", "B": "只有视觉可以感知的标记或者此类标记的组合才可以构成商标", "C": "只有数字或者文字以及这类标记的组合才可以构成商标", "D": "只要是能将一企业的商品或服务与其他企业的商品或服务区别开来的标记或者标记的组合都可以构成商标"},"answer":"","explanation":""},

  {"id":808,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据《与贸易有关的知识产权协议》的规定，下列说法哪项是正确的？（单选）2026年心利代理师资格考认","options":{"A": "商标的首次注册期限至少为7年", "B": "商标的首次注册期限至多为10年", "C": "注册商标的续展期限每次至少为10年", "D": "注册商标的续展期限每次至多为20年"},"answer":"","explanation":""},
  {"id":809,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据《与贸易有关的知识产权协定》、下列哪种说法是正确的？（单选）","options":{"A": "世界贸易组织成员不得对注册商标所有人享有的权利规定任何例外", "B": "世界贸易组织成员授于注册商标所有人享有的排他权不应损害任何现有的在先权利", "C": "世界贸易组织成员必要时可以规定商标的强制许可", "D": "世界贸易组织成员可以规定商标所有人只能将商标连同其所属的企业一起转让"},"answer":"","explanation":""},
  {"id":810,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据《与贸易有关的知识产权协定》关于地理标志的规定，各成员应当为有利害关系的各方提供制止下列哪些行为的法律手段？多选）","options":{"A": "在商品的名称上使用任何方法，以明示有关商品来源于真实原产地以外的一个地理区域，在某种意义上对商品的地理来源误导公众", "B": "在商品的外表上使用任何方法，以暗示有关商品来源于真实原产地以外的一个地理区域，在某种意义上对商品的地理来源误导公众", "C": "将识别葡萄酒的地理标志用于标示不是来源于该地理标志所指明地方的葡萄酒", "D": "将识别烈酒的地理标志用于标示不是来源于该地理标志所指明地方的烈酒，但同时标示了商品的真实来源地"},"answer":"","explanation":""},
  {"id":811,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据《与贸易有关的知识产权协定》有关地理标志保护的规定，如果某一商标和一项地理标志相同，下列哪些情形下，世界贸易组织成员不应因两者相同而驳回该商标注册申请或者撤销该商标？多选）","options":{"A": "《与贸易有关的知识产权协定》关于地理标志的规定在该成员适用之前，某人已经在该成员普意地提出该商标的注册申请", "B": "《与贸易有关的知识产权协定》关于地理标志的规定在该成员适用之前，某人已经在该成员通过善意使用获得该商标权", "C": "在该地理标志的来源国对其给予保护之前，某人已经在该成员善意地提出该商标的注册申请", "D": "在该地理标志的来源国对其给予保护之前，某人已经在该成员通过善意使用获得该商标权"},"answer":"","explanation":""},
  {"id":812,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据《与贸易有关的知识产权协定》的规定，下列关于工业品外观设计的哪些说法是正确的？多选）","options":{"A": "各成员应当规定保护独立创作而且是新额的或者原创的工业品外观设计", "B": "各成员可以规定，外观设计如果与已知的外观设计或者者原创的外观设计", "C": "各成员可以规定，工业品外观设计的保护不应延及主要是根据技术或功能的考虑而作出的外观设计", "D": "受保护的工业品外观设计的所有人，应当有权制止第三方未得所有人同意而为商业目的制造、销售或进口载有或体现受保护的外观设计的复制品或实质上是复制品的物品"},"answer":"","explanation":""},
  {"id":813,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据《与贸易有关的知识产权协定》的规定，受保护的工业品外观设计的所有人，对于载有或体现受保护的外观设计的复制品或者实质上是复制品的物品，应当有权制止第三方未经其同意而为商业目的进行下列哪些行为？多选）","options":{"A": "制造", "B": "进口", "C": "许诺销售", "D": "销售2020年4利代理师资格考试"},"answer":"","explanation":""},
  {"id":814,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据（与贸易有关的知识产权协定》的规定，下列说法正确的是？多选）","options":{"A": "专利权的保护期限为自授予专利权之日起20年", "B": "如果一项发明的商业性实施会导致对环境的严重损害、各成员可以不授予专利权", "C": "各成员因未缴纳专利年费而撤销专利的决定可以不提供司法审查的机会", "D": "各成员可以要求专利申请人提供关于其相应的外国申请和授予专利的信息"},"answer":"","explanation":""},
  {"id":815,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据《与贸易有关的知识产权协定》的规定，关于专利的规定哪些是正确的：（多选）","options":{"A": "各成员可拒绝对某些发明授予专利，只要此种拒绝授予并非仅因为此种利用方式为其法律所禁止", "B": "各成员应要求专利申请人以足够清晰和完整的方式披露其发明，使该专业的技术人员能够实施该发明", "C": "各成员可对专利授予的专有权规定有限的例外，只要此类例外不会对专利的正常利用发生无理抵触，也不会无理损害专利所有权人的合法权益，同时考虑第三方的合法权益", "D": "各成员可以要求专利申请人提供关于申请人相应的国外申请和授予情况的信息，该信息会直接决定在该国是否会给予授权"},"answer":"","explanation":""},
  {"id":816,"topic":"专题十 与贸易有关的知识产权协定","type":"unknown","question":"根据《与贸易有关的知识产权协定》关于专利的规定，下列哪些说法是正确的？多选）","options":{"A": "专利的获得和专利权的享有，不应因发明地点、技术领域以及产品是进口还是本国生产的不同而受到歧视", "B": "治疗动物疾病的外科手术方法可以被排除在可享专利性以外", "C": "专利权可享有的保护期间，自专利申请提交之日起计算的20年期间届满前不应终止", "D": "对撤销或取消专利的任何决定，均应提供司法审查的机会-uyc-"},"answer":"","explanation":""},

const TOTAL = ALL_QUESTIONS.length;
const SINGLE_COUNT = ALL_QUESTIONS.filter(q=>q.type==='single').length;
const MULTI_COUNT = ALL_QUESTIONS.filter(q=>q.type==='multiple').length;

// Replace placeholders
document.querySelector('.header p').textContent = '10大专题 · ' + TOTAL + '道题 · 含答案解析';

// State
let currentScope = 'all';
let selectedTopic = null;
let practiceList = [];
let answered = {};  // id -> {selected:[],correct:bool}
let wrongSet = new Set(JSON.parse(localStorage.getItem('rl_wrong') || '[]'));

function saveWrong() {
  localStorage.setItem('rl_wrong', JSON.stringify([...wrongSet]));
}

function getFilteredQuestions() {
  let list = [...ALL_QUESTIONS];
  if (currentScope === 'single') list = list.filter(q=>q.type==='single');
  else if (currentScope === 'multi') list = list.filter(q=>q.type==='multiple');
  else if (currentScope === 'wrong') list = ALL_QUESTIONS.filter(q=>wrongSet.has(q.id));
  else if (currentScope === 'random50') {
    list = [...ALL_QUESTIONS].sort(()=>Math.random()-0.5).slice(0,50);
  }
  if (selectedTopic !== null) {
    list = list.filter(q=>q.topic === selectedTopic);
  }
  if (selectedChapter !== null) {
    list = list.filter(q=>q.chapter === selectedChapter);
  }
  return list;
}

function setScope(scope, btn) {
  currentScope = scope;
  document.querySelectorAll('.filter-bar .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // Close topic filter unless it's topic mode
  if (scope !== 'topic') {
    // Keep topic filter open/close state
  }
  startPractice();
}

function toggleTopicFilter() {
  const el = document.getElementById('topic-filter');
  el.classList.toggle('open');
}

let selectedChapter = null;

function selectTopic(name, el) {
  if (selectedTopic === name) {
    // Toggle off: deselect topic
    selectedTopic = null;
    selectedChapter = null;
    el.classList.remove('active');
    el.classList.remove('expanded');
    // Hide chapters
    const chGrid = el.nextElementSibling;
    if (chGrid && chGrid.classList.contains('chapter-grid')) chGrid.remove();
  } else {
    selectedTopic = name;
    selectedChapter = null;
    document.querySelectorAll('.topic-item').forEach(e => {
      e.classList.remove('active');
      e.classList.remove('expanded');
      const ch = e.nextElementSibling;
      if (ch && ch.classList.contains('chapter-grid')) ch.remove();
    });
    el.classList.add('active');
    // Toggle expand chapters
    const isExpanded = el.classList.contains('expanded');
    if (!isExpanded) {
      el.classList.add('expanded');
      const topic = TOPICS.find(t => t.name === name);
      if (topic && topic.chapters && topic.chapters.length > 0) {
        let chHtml = '<div class="chapter-grid">';
        topic.chapters.forEach(ch => {
          chHtml += '<div class="chapter-item" onclick="selectChapter(\'' + ch.name.replace(/'/g, "\\'") + '\', this, event)">';
          chHtml += '<span>' + ch.name + '</span>';
          chHtml += '<span style="color:var(--text-muted);font-size:0.8rem">' + ch.count + '题</span>';
          chHtml += '</div>';
        });
        chHtml += '</div>';
        el.insertAdjacentHTML('afterend', chHtml);
      }
    } else {
      el.classList.remove('expanded');
      const chGrid = el.nextElementSibling;
      if (chGrid && chGrid.classList.contains('chapter-grid')) chGrid.remove();
    }
  }
  // Deactivate scope buttons
  document.querySelectorAll('.filter-bar .filter-btn').forEach(b => b.classList.remove('active'));
  startPractice();
}

function selectChapter(chapterName, el, event) {
  event.stopPropagation();
  if (selectedChapter === chapterName) {
    selectedChapter = null;
    el.classList.remove('active');
  } else {
    selectedChapter = chapterName;
    document.querySelectorAll('.chapter-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
  }
  startPractice();
}

function startPractice() {
  practiceList = getFilteredQuestions();
  renderQuestions();
  updateStats();
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  if (practiceList.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text3)"><p style="font-size:1.2em;margin-bottom:8px">没有可练习的题目</p><p>试试其他筛选条件</p></div>';
    return;
  }
  let html = '';
  practiceList.forEach((q, idx) => {
    const a = answered[q.id];
    const isAnswered = !!a;
    const tagClass = q.type === 'multiple' ? 'multi' : 'single';
    const tagText = q.type === 'multiple' ? '多选' : '单选';
    const isMulti = q.type === 'multiple';

    // Topic display
    let topicDisplay = q.topic || '';
    if (q.chapter) topicDisplay += ' > ' + q.chapter;
    if (q.section) topicDisplay += ' > ' + q.section;

    html += '<div class="q-card" id="qcard-' + q.id + '">';
    html += '<div class="q-header">';
    html += '<span class="q-num">#' + q.id + '</span>';
    html += '<span class="q-tag ' + tagClass + '">' + tagText + '</span>';
    html += '</div>';
    if (topicDisplay) html += '<div class="q-topic">' + topicDisplay + '</div>';
    html += '<div class="q-text">' + escapeHtml(q.question) + '</div>';

    // Options
    html += '<div class="options" id="opts-' + q.id + '">';
    ['A','B','C','D'].forEach(letter => {
      if (!q.options[letter]) return;
      let cls = 'option';
      if (isAnswered) {
        cls += ' disabled';
        if (a.selected.includes(letter)) cls += a.correct ? ' correct' : ' wrong';
        else if (q.answer && q.answer.includes(letter)) cls += ' correct';
      }
      html += '<div class="' + cls + '" onclick="selectOption(' + q.id + ',\'' + letter + '\')">';
      html += '<div class="opt-letter">' + letter + '</div>';
      html += '<div class="opt-text">' + escapeHtml(q.options[letter]) + '</div>';
      html += '</div>';
    });
    html += '</div>';

    // Submit button for multi-choice
    if (isMulti && !isAnswered) {
      html += '<button class="submit-btn" id="submit-' + q.id + '" disabled onclick="submitMulti(' + q.id + ')">提交答案</button>';
    }

    // Result & Explanation
    if (isAnswered) {
      if (a.correct) {
        html += '<div class="result-indicator correct">✓ 回答正确</div>';
      } else {
        html += '<div class="result-indicator wrong">✗ 回答错误，正确答案：' + (q.answer||'?') + '</div>';
      }
    }

    if (q.explanation) {
      html += '<div class="explanation" id="expl-' + q.id + '" style="display:' + (isAnswered ? 'block' : 'none') + '">';
      html += '<div class="ans-label">答案：' + (q.answer||'暂无') + '</div>';
      html += '<div>' + escapeHtml(q.explanation) + '</div>';
      html += '</div>';
    }

    html += '</div>';
  });
  container.innerHTML = html;
}

function selectOption(qid, letter) {
  if (answered[qid]) return;
  const q = ALL_QUESTIONS.find(x=>x.id===qid);
  if (!q) return;

  if (!answered[qid]) answered[qid] = {selected:[], correct:null};

  if (q.type === 'multiple') {
    let sel = answered[qid].selected;
    let idx = sel.indexOf(letter);
    if (idx >= 0) sel.splice(idx, 1);
    else sel.push(letter);
    // Enable/disable submit
    const btn = document.getElementById('submit-' + qid);
    if (btn) btn.disabled = sel.length === 0;
    // Update visual
    updateOptionVisual(qid);
  } else {
    // Single choice - immediate check
    answered[qid].selected = [letter];
    checkAnswer(qid);
  }
}

function updateOptionVisual(qid) {
  const sel = answered[qid]?.selected || [];
  const opts = document.getElementById('opts-' + qid);
  if (!opts) return;
  opts.querySelectorAll('.option').forEach(el => {
    const letter = el.querySelector('.opt-letter').textContent;
    el.classList.toggle('selected', sel.includes(letter));
  });
}

function submitMulti(qid) {
  if (answered[qid]?.selected?.length > 0) {
    checkAnswer(qid);
  }
}

function checkAnswer(qid) {
  const q = ALL_QUESTIONS.find(x=>x.id===qid);
  if (!q || !answered[qid]) return;

  const sel = answered[qid].selected.sort().join('');
  const ans = (q.answer || '').toUpperCase().split('').sort().join('');
  answered[qid].correct = (sel === ans);

  if (!answered[qid].correct) {
    wrongSet.add(qid);
  } else {
    wrongSet.delete(qid);
  }
  saveWrong();

  // Re-render this question
  renderQuestions();
  updateStats();

  // Show explanation
  const expl = document.getElementById('expl-' + qid);
  if (expl) expl.style.display = 'block';
}

function updateStats() {
  const scopeAnswered = practiceList.filter(q=>answered[q.id]);
  const correctCount = scopeAnswered.filter(q=>answered[q.id]?.correct);
  const wrongCount = scopeAnswered.filter(q=>answered[q.id] && !answered[q.id]?.correct);
  const rate = scopeAnswered.length > 0 ? Math.round(correctCount.length / scopeAnswered.length * 100) : 0;
  const pct = practiceList.length > 0 ? Math.round(scopeAnswered.length / practiceList.length * 100) : 0;

  document.getElementById('stat-total').textContent = practiceList.length;
  document.getElementById('stat-done').textContent = scopeAnswered.length;
  document.getElementById('stat-correct').textContent = correctCount.length;
  document.getElementById('stat-wrong').textContent = wrongCount.length;
  document.getElementById('stat-rate').textContent = rate + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = scopeAnswered.length + '/' + practiceList.length;
  document.getElementById('progress-pct').textContent = pct + '%';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Bank
function renderBank() {
  // Topic bar
  const bar = document.getElementById('bank-topic-bar');
  let html = '<button class="filter-btn active" onclick="bankFilter(null,this)">全部</button>';
  TOPICS.forEach(t => {
    html += '<button class="filter-btn" onclick="bankFilter(\'' + t.name.replace(/'/g,"\\'") + '\',this)">' + t.name + ' (' + t.count + ')</button>';
  });
  bar.innerHTML = html;

  filterBank();
}

let bankTopicFilter = null;
function bankFilter(topic, btn) {
  bankTopicFilter = topic;
  document.querySelectorAll('#bank-topic-bar .filter-btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  filterBank();
}

function filterBank() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let list = ALL_QUESTIONS;
  if (bankTopicFilter) list = list.filter(q=>q.topic === bankTopicFilter);
  if (search) list = list.filter(q=>q.question.toLowerCase().includes(search) || (q.explanation||'').toLowerCase().includes(search));

  const container = document.getElementById('bank-container');
  if (list.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">没有找到匹配的题目</div>';
    return;
  }
  let html = '';
  list.forEach(q => {
    const tagClass = q.type === 'multiple' ? 'multi' : 'single';
    const tagText = q.type === 'multiple' ? '多选' : '单选';
    html += '<div class="bank-item" onclick="jumpToQuestion(' + q.id + ')">';
    html += '<div class="bank-q">' + escapeHtml(q.question.substring(0, 100)) + (q.question.length > 100 ? '...' : '') + '</div>';
    html += '<div class="bank-meta"><span class="q-tag ' + tagClass + '" style="margin-right:6px">' + tagText + '</span>#' + q.id + ' · ' + (q.topic||'') + '</div>';
    html += '</div>';
  });
  container.innerHTML = html + '<div style="text-align:center;padding:12px;color:var(--text3)">共 ' + list.length + ' 道题</div>';
}

function jumpToQuestion(qid) {
  switchTab('practice');
  // Find the question in current practice list
  const idx = practiceList.findIndex(q=>q.id===qid);
  if (idx >= 0) {
    const el = document.getElementById('qcard-' + qid);
    if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
  } else {
    // Reset scope to all and find
    currentScope = 'all';
    selectedTopic = null;
    document.querySelectorAll('.filter-bar .filter-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.filter-bar .filter-btn').classList.add('active');
    startPractice();
    setTimeout(()=>{
      const el = document.getElementById('qcard-' + qid);
      if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
    }, 100);
  }
}

// Stats tab
function renderStatsDetail() {
  let totalAnswered = Object.keys(answered).length;
  let totalCorrect = Object.values(answered).filter(a=>a.correct).length;
  let totalWrong = totalAnswered - totalCorrect;
  let rate = totalAnswered > 0 ? Math.round(totalCorrect/totalAnswered*100) : 0;

  let html = '<div class="q-card">';
  html += '<h3 style="margin-bottom:16px;color:var(--accent)">📊 总体统计</h3>';
  html += '<div class="stats-bar" style="margin-bottom:20px">';
  html += '<div class="stat-item"><div class="stat-value">' + TOTAL + '</div><div class="stat-label">总题数</div></div>';
  html += '<div class="stat-item"><div class="stat-value">' + totalAnswered + '</div><div class="stat-label">已练习</div></div>';
  html += '<div class="stat-item"><div class="stat-value" style="color:var(--correct)">' + totalCorrect + '</div><div class="stat-label">正确</div></div>';
  html += '<div class="stat-item"><div class="stat-value" style="color:var(--wrong)">' + totalWrong + '</div><div class="stat-label">错误</div></div>';
  html += '<div class="stat-item"><div class="stat-value">' + rate + '%</div><div class="stat-label">正确率</div></div>';
  html += '</div>';

  // Per-topic stats
  html += '<h3 style="margin-bottom:12px;color:var(--accent)">📚 各专题统计</h3>';
  TOPICS.forEach(t => {
    const tqs = ALL_QUESTIONS.filter(q=>q.topic===t.name);
    const tAns = tqs.filter(q=>answered[q.id]);
    const tCor = tAns.filter(q=>answered[q.id]?.correct);
    const tRate = tAns.length > 0 ? Math.round(tCor.length/tAns.length*100) : 0;
    const pct = tAns.length > 0 ? Math.round(tAns.length/tqs.length*100) : 0;
    const barColor = tRate >= 70 ? 'var(--correct)' : tRate >= 40 ? 'var(--highlight)' : 'var(--wrong)';

    html += '<div style="margin-bottom:12px">';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:0.9em">';
    html += '<span>' + t.name + '</span>';
    html += '<span style="color:var(--text3)">已做 ' + tAns.length + '/' + tqs.length + ' · 正确率 <span style="color:' + barColor + ';font-weight:600">' + tRate + '%</span></span>';
    html += '</div>';
    html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
    html += '</div>';
  });

  // Action buttons
  html += '<div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">';
  html += '<button class="filter-btn" onclick="resetAll()" style="padding:10px 20px;font-size:0.95em">🗑️ 清除所有记录</button>';
  html += '<button class="filter-btn" onclick="resetWrong()" style="padding:10px 20px;font-size:0.95em">🔄 清除错题本</button>';
  html += '</div>';

  html += '</div>';
  document.getElementById('stats-detail').innerHTML = html;
}

function resetAll() {
  if (!confirm('确定清除所有练习记录？此操作不可撤销。')) return;
  answered = {};
  wrongSet = new Set();
  localStorage.removeItem('rl_wrong');
  startPractice();
  renderStatsDetail();
}

function resetWrong() {
  if (!confirm('确定清除错题本？')) return;
  wrongSet = new Set();
  saveWrong();
  startPractice();
  renderStatsDetail();
}

// Tab switching
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');

  if (name === 'bank') renderBank();
  if (name === 'stats') renderStatsDetail();
}

// Scroll to top button
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scroll-top');
  btn.classList.toggle('show', window.scrollY > 400);
});

// Init
function init() {
  // Render topic grid
  const grid = document.getElementById('topic-grid');
  let html = '';
  TOPICS.forEach(t => {
    html += '<div class="topic-item" onclick="selectTopic(\'' + t.name.replace(/'/g,"\\'") + '\',this)">';
    html += '<span class="t-name">' + t.name + '</span>';
    html += '<span class="t-count">' + t.count + '题</span>';
    html += '</div>';
  });
  grid.innerHTML = html;

  startPractice();
}

init();
</script>

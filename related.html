  {"id":281,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于财产保全相关事项说法错误的是：（多选）","options":{"A": "财产保全采取查封、扣押、冻结或者法律规定的其德方法", "B": "法院可以指定被保全人负责保管被查封、扣押、冻结的财产", "C": "被查封、扣押、冻结的财产，其上的质权、留置权因采取保全措施而消灭", "D": "由人民法院指定被保全人保管的财产，被保全人不得继续使用"},"answer":"ACD","explanation":"。《民诉法）第122条规定：“起诉必须符合下列条件：（一）原告是与本案有直接利害关系的公民、法人和其他组织；（二）织有明确的被告；（三）有具体的诉讼请求和事织实、理由：（四）属于人民法院受理民事诉讼院的范国和受诉人民法院管辖”，因此A、C、D选项正确。对于被告的要求只要求明确，不要求适格，因此B选项错误（新编）","chapter":"第六章 保全"},
  {"id":282,"topic":"专题三 民事诉讼法","type":"multiple","question":"王某早年丧妻，独自一人抚养儿子王小某。王小某成年后，从未支付赠养费。王某起诉王小某支付赠养费，诉讼过程中，王某生病，急需支付住院费。王小某把自已存款3万元转到一个朋友的账户上。对此，王某可以向法院申请采取的措施是？（多选）","options":{"A": "对妨害民事诉讼的强制措施", "B": "诉讼保全措施", "C": "证据保全措施", "D": "先予执行措施"},"answer":"AC","explanation":"。A、C选项，王某死亡、乙公司注销后，执告主体不存在，不属于“有明售”。B选项符合起诉条件，应子以多（新编）","chapter":"第六章 保全"},
  {"id":283,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，就发明专利侵权提起诉讼的，起诉必须符合下列哪些条件？（多选）","options":{"A": "原告是与本案有直接利害关系的公民、法人和其他", "B": "被告是与本案有直接利害关系的公民、法人和其他", "C": "属于人民法院受理民事诉讼的范围和受诉人民管辖", "D": "有具体的诉讼请求和事实、理由2026年年利代理师资纳考试"},"answer":"AD","explanation":"。A选项，根据《民诉法制208条第3款的规定，立案后发现不的诉条件的，裁定驳回起诉，因此A造项B选项，《民诉法解释》第211条规定：，院没有管辖权的案件，售知原告向有管！的人民法院起诉：原告坚持起诉的，做！予受理：立案后发现本院没有管辖权的当将案件移送有管辖权的人民法院”B选项错误。C选项，（民诉法解释）第条规定：“原告撤诉或者人民法院按据理后，原告以同一诉讼请求再次起诉的民法院应子受理”，因此C选项错误。项，《民诉法解释）第212条规定：“载定受理、驳回起诉的案件，原告再次起诉，起诉条件且不属于民事诉讼法第127定情形的，人民法院应子受理”，因此D正确。（2011）","chapter":"第七章 民事审判第一审程序"},
  {"id":284,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，对于下列哪些情形，法院应当裁定不于受理？（多选）","options":{"A": "李集起诉王某，人民法院发现王某已于起诉前死亡", "B": "李某起诉王某，要求王某支付精神损害赔偿金一亿元", "C": "甲公司起诉乙公司，人民法院发现乙公司已经注销", "D": "甲公司起诉乙公司，人民法院发现乙公司与本案没有直接利害关系"},"answer":"BC","explanation":"。《民诉法》中规定的起诉条共有4项：①原告适格：②有明确的被有具体的诉讼请求和事实、理由；④属院主管和受诉法院管辖。A选项，根诉法》第123条的规定，起诉并不要求书面起诉状，也可以口头起诉，由法院笔录，并告知对方当事人，因此A选项B选项，起诉条件中要求有明确的被被告需要具备诉讼权利能力，无诉讼权力的被告，如已经死亡的自然人或已经的公司，属于没有明确的被告，因此B正确。C选项，起诉条件中要求原告：即原告是与本案有直接利害关系的公人和其他组织，C选项正确。D选项，声件中仅要求有具体的诉讼请求和事：由。未要求该事实、理由有证据证明要求该诉讼请求能够得到法律支持，选项错误。（法考2022，思维扩展）","chapter":"第七章 民事审判第一审程序"},
  {"id":285,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于起诉与受理的说法哪些是正确的？（多选）","options":{"A": "立案后发现起诉不符合受理条件的，人民法院应当裁定驳回起诉", "B": "对本院没有管辖权的案件，人民法院应当告知原告向有管辖权的人民法院起诉；原告坚持起诉的，应予受理并移送至有管辖权的人民法院", "C": "当事人撤诉后，又以同一诉讼请求再次起诉的，人民法院不予受理", "D": "裁定驳回起诉的案件，原告再次起诉的，如果符合起诉条件的，人民法院应予受理"},"answer":"ABCD","explanation":"，《民诉法）第130条规定：“人民法院受理案体后，当事人对管错权有异议的，应当在提交答障快明间提出，人民法院对当事人提出的靠议，应当市查。算议成立的，越定将案作修透有管辖权的人民法院：异以不成立的，我定驳回。当事人来提出管锯异以，并自诉答降或普提出尺诉的，视为支诉人民法院有管辖权，但造质级别管辖和专属管辖规定的除外”，因此A、B、C、D透项均正确。（2013）","chapter":"第七章 民事审判第一审程序"},
  {"id":286,"topic":"专题三 民事诉讼法","type":"multiple","question":"我国实行立案登记制，关于民事第一审普通程序，下列表述正确的是？多选）","options":{"A": "原告必须提交书面起诉状", "B": "被告具有诉讼权利能力", "C": "原告应与案件有直接利害关系", "D": "原告应提供支持自己诉讼请求的证据"},"answer":"BCD","explanation":"。A透项，（民诉法）第137条第1款现定：人民法院审理民事案件，除沙及回家的密、个人隐私或者法律另有规定的以外，应当公开逃行”，因此A选项错误。B选项，（民诉法》第151条第1款规定：“人民法院对公开审理或者不公开审理的案件，一律公开宣告判决”，因此B透项正确。C选项，《民诉法》第139条规定：“人民法院审理民事案件，应当在开庭3日前通知当事人和其他诉讼参与人”，因此C选项正确。D选项，《民诉法》第138条规定：“人民法院审理民事案件，根据要进行巡回审理，就地办案”，因此D选项正确。（2017）","chapter":"第七章 民事审判第一审程序"},
  {"id":287,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，有关管辖权异议的下列哪些说法是正确的？（多选）","options":{"A": "人民法院受理案件后，当事人对管辖权有异议的，应当在提交答辩状期间提出", "B": "当事人未提出管辖权异议，并应诉答辩或者提出反诉的，视为受诉人民法院有管辖权，但违反级别管辖和专属管辖规定的除外", "C": "经审查管镇仅异议成立的，人民法院越定将案件移送有管销权的法院", "D": "经申真管辖权异议不成立的，人民法院战定驳回"},"answer":"BD","explanation":"。A选项，涉及商业秘密的案件不公开需依申请，因此A选项错误。B选项，《民诉法》第142条第2款规定：“当事人经法庭许可，可以向证人、鉴定人、勘验人发问”，因此B选项正确。C选项，《民诉法）第146条规定：“原告经传票传唤，无正当理由拒不到庭的，或者未经法庭许可中途退庭的，可以按撒诉处理；被告反诉的，可以缺席判决”，因此C选项错误。D选项，《民诉法）第148条规定：“宣判前，原告申请撒诉的，是否准许，由人民法院裁定。人民法院裁定不准许撤诉的，原告经传票传映，无正当理由拒不到庭的，可以缺席判决”，因此D选项正确。（2018）","chapter":"第七章 民事审判第一审程序"},
  {"id":288,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列美于民事诉讼第一审普通程序的哪些说法是正确的？（多选）","options":{"A": "人民法院审理民事案件，一律应当公开进行", "B": "人民法院审理民事案件，一律公开宣告判决", "C": "人民法院审理民事案件，应当在开庭三日前通知当事人和其他诉讼参与人", "D": "人民法院审理民事案件，根据需要进行巡回审理、就地办案"},"answer":"BD","explanation":"。A选项，根据《民诉法）第146条的规定，原告经传票传唤，无正当理由拒不到庭的，可以按撤诉处理，因此A选项错误。B选项，（民诉法）第147条规定：票传映：无正当理由把不到败的，或法庭许可中途逍庭的，可以缺席判决。正确。（2011）定期宣判的，宣判后立即发给判决书”，项正确。因此，D选项正确。（法考2012）","chapter":"第七章 民事审判第一审程序"},
  {"id":289,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于第一审普通程序的说法正确的是？多选）","options":{"A": "涉及商业秘密的案件，应当不公开审理", "B": "当事人经法庭许可，可以向证人、鉴定人、勘验人发问", "C": "原告未经法庭许可中途退庭的，应当缺席判决", "D": "宣判前，原告申请撤诉，人民法院裁定不准许撤诉的，原告经传票传唤，无正当理由拒不到庭的，可以缺席判决"},"answer":"ABC","explanation":"。《民诉法）第149规定：“1列情形之一的，可以延期开庭审理：（-须到庭的当事人和其他诉讼参与人有王理由没有到庭的；（二）当事人临时提出E申请的；（三）需要通知新的证人到庭，调新的证据，重新鉴定、勘验，或者要补充查的；（四）其他应当延期的情形”，因此B、C 选项正确。D选项属于中止诉诊的形。（2012）","chapter":"第七章 民事审判第一审程序"},
  {"id":290,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，关于第一审普通程序，下列说法哪些是正确的？（多选）","options":{"A": "原告经传票传唤，无正当理由拒不到庭的，应当缺席判决", "B": "被告未经法庭许可中途退庭的，可以缺席判决", "C": "宣判前，原告申请撤诉的，人民法院应当准许", "D": "宣判前，原告申请撤诉的，是否准许，由人民法院裁定"},"answer":"ABCD","explanation":"。《民诉法解释）第243定：“民事诉讼法第152规定的审限，是有立案之日起至裁判宜告、调解书送达之日的期间，但公告期问、鉴定期间、双方当事和解期间、审理当事人提出的管辖异议以处理人民法院之间的管辖争议期间不应计在内”，因此A、B、C、D选项均正确。（2009）","chapter":"第七章 民事审判第一审程序"},
  {"id":291,"topic":"专题三 民事诉讼法","type":"multiple","question":"关于民事案件的开庭审理，下列说法正确的是？","options":{"A": "开庭时由书记员核对当事人身份", "B": "法院收集的证据是否需要进行质证，由法院决定2026年专利代理师费络考试", "C": "合议庭评议实行少数服从多数，形成不了多数意见时以审判长意见为准", "D": "法院定期宣判的，法院应当在宣判后将判决书发给当事人"},"answer":"ABDA","explanation":"、D透项，根据《民诉法）第153条的规定，一方当事人先亡，哥要等得继东人表明是否参加诉论的，诉讼中止：本紧必须以另一案的审理结果为依据，而另一紧尚未审结的，诉讼中止。因此，A、D逸项正确。B选项，对于肾要通知新的适人到庭，调取新的证据，重新鉴定、助验，成者育要补充调查的，法院可以延期审理，因此B选项正确。C透项，属于当事人的笑更，不属于诉讼终结的情形，应当以合并后的公司作为当事人继续参加诉讼，C选项错误。（法考2008改编，思维扩展）","chapter":"第七章 民事审判第一审程序"},
  {"id":292,"topic":"专题三 民事诉讼法","type":"single","question":"根据民事诉讼法及相关规定，下列哪些情形下可以延期开庭审理？（多选）","options":{"A": "必须到庭的当事人有正当理由没有到庭的", "B": "当事人临时提出回避申请的", "C": "需要通知新的证人到庭的", "D": "本案必须以另一案的审理结果为依据，而另一案又尚未审结的"},"answer":"B","explanation":"。A选项，根据（民诉法）第149条的规定，当事人临时提出回避申请的，可以延期开庭审理，刘某临时中请回避属于延期审理情形，而不是中止诉讼，因此A选项错误。B选项，（民诉法解释）第248条规定：“城判发生法律效力后，发生新的事实，当事人再次提起诉讼的，人民法院应当依法受理”，法院驳回乙的诉讼请求之后甲的房屋漏水，发生了新的事实，不属于一事不再理的情形，法院依法受理的做法正确，因此B选项正确。C、D选项，根据《民诉法》第154条的规定，高婚案件一方当事人死亡的，终结诉讼：追索赠养费、扶养费、抚养费以及解除收养关系案件的一方当事人死亡的，终结诉讼，C、D选项的时间均发生于诉讼过程中，属于终结诉讼的情形，而不是驳回起诉或驳回诉讼请求，因此C、D选项错误。（法考2019，思维扩展）","chapter":"第七章 民事审判第一审程序"},
  {"id":293,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，人民法院适用普通程序审理民事诉讼案件的期限为六个月，但该期限不包括下列哪些期间？（多选）","options":{"A": "公告期间", "B": "鉴定期间", "C": "审理当事人提出的管辖权异议期间", "D": "处理人民法院之间的管辖权争议期间"},"answer":"ABC","explanation":"。《民诉法）第153条规定：“有下列情形之一的，中止诉讼：……（二）一方当事人丧失诉讼行为能力，尚未确定法定代理人的…（四）一方当事人因不可抗拒的事由，不能参加诉讼的：（五）本案必须以另一案的审理结果为依据，而另一案尚未审结的….”，因此A、B、C选项正确，D选项属于诉讼终结的情形。（2016）","chapter":"第七章 民事审判第一审程序"},
  {"id":294,"topic":"专题三 民事诉讼法","type":"multiple","question":"法院对于诉讼中有关情况的处理，下列哪做法是正确的？多选）","options":{"A": "杨某与赵某损害赔偿一案，杨某在去往法院开庭的路上，突遇车祸，当场死亡。法院认为需要等待继承人表明是否参加诉讼，遂裁定中止诉讼", "B": "毛某与安某专利侵权纠纷一案，法庭审理过程中，发现需要重新进行鉴定，法院决定延期审理", "C": "甲公司诉乙公司合同纠纷一案，审理过程中，甲公司与其他公司合并，法院裁定诉讼终结", "D": "丙公司诉丁公司租赁纠纷一案，法院审理中，发现本案必须以另一案的审理结果为依据而该案又尚未审结，遂裁定诉讼中止"},"answer":"ACD","explanation":"。《民诉法》第154条规定：“有下列情形之一的，终结诉讼：（一）原告死亡，没有继承人，或者继承人敖葬···（三）高婚案一方当*）（四）追索养费、扶养费、托养费形。（2012）","chapter":"第七章 民事审判第一审程序"},
  {"id":295,"topic":"专题三 民事诉讼法","type":"single","question":"下列法院对于诉讼中出现的各种情况的处理，做法正确的是？（单选）","options":{"A": "刘某与韩某买卖合同纠纷案，法庭审理过程中，刘某新发国建事项，临时申请回避，法院战定对本案诉讼中止", "D": "老李向小明追索赠养费，在诉讼过程中小明心脏病突发", "C": "陈某（男）和昌某（女）婚后性格不合，陈某诉至法院要求离婚。诉讼过程中，昌某不幸车祸身亡，法院裁定驳回陈某的起诉死亡，法院判决驳回老李的诉讼请求"},"answer":"C","explanation":"。《民诉法》第153条规定，讼的，诉讼中止。本题中法庭料论结欢。等待继承人表明是否维线诉讼，西此时》承人黄小某下落不明，尚无法确定，故本当诉讼中止，C选项正确。（法考2018）","chapter":"第七章 民事审判第一审程序"},
  {"id":296,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列哪些情形下中止诉讼？（多选）","options":{"A": "一方当事人丧失诉讼行为能力，尚未确定法定代理人的", "B": "本案必须以另一案的审理结果为依据，而另一案尚未审结的", "C": "一方当事人因不可抗拒的事由，不能参加诉讼的", "D": "解除收养关系案件的一方当事人死亡的"},"answer":"AD","explanation":"。根据《民诉法》第157条的频对于不予受理、管辖权异议、驳回起诉的可以提出上诉，因此A、D选项正确。（2019）我诉讼。A选项，《民诉法》第160条规定：“基层辰出的法庭审理事实清楚、权利义务关大的简单的民事案件，适用本章规定。和它派出的法庭审理前数规定以外的民：双方也可以约定适用简易程序”，因此简去院依职权适用，也可以由当事人协议适现定。B选项，（民诉法解释）第261条第1简易程序审理案件，人民法院可以依照民条、第162条的规定采取销口信、电话、短邮件等简便方式传唤双方当事人、通知公文书”，因此B选项符合规定。C选项，261条第2数规定：“以简便方式送达的当事人确认或者没有其他证据证明当事人民法院不得缺席判决”，因此C选项诉法解释》第140条规定：“适用简易程用公告送达”，因此D选项违法。（法考201CD。A、B、C选项，《民诉法）第166条审理下列民事案件，不适用小额诉论的关系、财产确权案件；（二）涉外案件；（三）定或者对诉前评估、鉴定结果有异议","chapter":"第七章 民事审判第一审程序"},
  {"id":297,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列哪些情形下民事诉讼终结？多选）","options":{"A": "原告死亡，没有继承人的", "B": "一方当事人丧失诉讼行为能力，尚未确定法定代理人的", "C": "离婚案件一方当事人死亡的", "D": "追索赠养费案件的一方当事人死亡的"},"answer":"AC","explanation":"，模据《民诉法）第165条规定，基层人民法院和电最出的法庭审理事实清楚、权利义务美系明确、争以不大的筒单金钱给付民事案件，标的领为各省、自治区、直辖市上年度就业人员年平均工资百分之五十以下的，适用小额诉讼的程序审理，实行一审终审，因此A透项正确，B透项错误。C、D选项，根据（民诉法解释）第275条的规定，小额诉讼案件的举证期限由人民法院确定，也可以由当事人协离一致并经人民法院准许，但一般不超过7日。当事人到庭后表示不需要举证期限和答辩期问的，人民法院可立即开庭审理。因此C逸项正确，D选项忽略了法院的审查准许，因此错误。（新编）","chapter":"第七章 民事审判第一审程序"},
  {"id":298,"topic":"专题三 民事诉讼法","type":"multiple","question":"黄某向法院起诉陈某，以被欺诈为由请求撤销二人订立的买卖合同，法庭辩论结束第二天，黄某遇车祸死亡，黄某的唯一继承人黄小某一直下落不明，关于本案的处理正确的是？（单选）","options":{"A": "裁定诉讼终结", "B": "裁定视为撤诉", "C": "裁定诉讼中止", "D": "根据法庭辩论作出判决"},"answer":"ABCD","explanation":"。（人民法院在线诉讼规则）第21条第1款规定：“人民法院开庭审理的案件，应当根据当事人意愿、案件情况、社会影响、技术条件等因素，决定是否采取视频方式在线庭审，但具有下列情形之一的，不得适用在线庭审：·（三）醫要通过庭审现场查明身份、核对原件、查验实物的：（四）案件疑难复杂、证据繁多，适用在线庭审不利于查明事实和适用法律的：（五）案件涉及国家安全、国家秘密的；（六）案件具有重大社会影响，受到广泛关注的…….…”，因此A、B、C、D选项均正确。（新编）","chapter":"第七章 民事审判第一审程序"},
  {"id":299,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，当事人对人民法院在民事诉讼第一审程序中作出的下列哪些裁定不服的，可以提起上诉？（多选）","options":{"A": "不予受理的裁定", "B": "不准许撤诉的裁定", "C": "中止诉讼的裁定", "D": "驳回起诉的裁定"},"answer":"CD","explanation":"。《民诉法）第165条规定，基层人民法院和它派出的法庭审理上述民事案件，标的额超过各省、自治区、直辖市上年度就业人员年平均工资50%但在2倍以下的，当事人双方也可以约定适用小额诉讼的程序。张某起诉李某归还借款6万元，标的额超过了该省上年度就业人员年平均工资的50%，但在2倍以下，当事人可以协议适用小额诉讼的程序，故法院在张某、李某同意适用小额诉讼的程序审理的情况下，法院可以适用小额诉讼的程序审理。但审理过程中李某对张某提出了反诉，根据（民诉法》第166条规定，当事人提出反诉的案件不得适用小额诉讼的程序审理，因此本案不能继续适用小额诉讼的程序审理，应当适用筒易程序的其他规定审理或者裁定将案件转为普通程序。当然，当事人也可以对法院适用小额诉讼的程序提出异议。因此，C、D选项正B选项销误。（法考2022）","chapter":"第七章 民事审判第一审程序"},
  {"id":300,"topic":"专题三 民事诉讼法","type":"multiple","question":"法院和楚、权利义务关系明确、争议不大的案件，但双方当事确、争议人约定适用简易程序进行审理，法院同意并以电子邮人民法件的方式向双方当事人通知了开庭时间（双方当事人件，当均未回复）。开庭时被告万雷无正当理由不到庭，法序可以院作出了缺席判决。送达判决书时法院通过各种方选项符定：“适式均未联系上万雷，遂采取了公告送达方式送达了判讼法第决书。对此，法院下列的哪些行为是违法的？（多选）传真、电","options":{"A": "同意双方当事人的约定，适用简易程序对案和送达件进行审理法解释", "B": "以电子邮件的方式向双方当事人通知开庭通知，未经收到时间D选项", "C": "作出缺席判决案件，不", "D": "采取公告方式送达判决书"},"answer":"ABD","explanation":"。A、B选项，（民诉法解料）单261信、传真、电子邮件等简便方式传唤双方证人和送达诉讼文书”，小赖诉诊程序作为程序、适用简易程序的一般规定，A、B选理选项，《民诉法》第165条规定：“基层人民法》的法庭审理事实消楚、权利义务关系明确、简单金线给付民事案件，标的额为各省、自为上年度就业人员年平均工资百分之五十以下，额诉讼的程序审理，实行一审终申”，本案属子给付案件，标的额为200元，法院可以适用小审理，实行一审终审，C选项错误，D选项正确、B、D选项正确。（法考2022）程序","chapter":"第八章 简易程序及在线诉讼"},
  {"id":301,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据《民事诉讼法》及相关规定，下列哪些案（一）人评估、件不适用小额诉讼程序？多选）","options":{"A": "人身关系案作", "B": "涉外民事案件", "C": "需要评店、鉴定的案件", "D": "发回重审的案件"},"answer":"BD","explanation":"。A选项，（民事诉讼法）第41条第规定：“中级人民法院对第一审适用简易程序或者不服裁定提起上诉的第二审民事案件，清楚、权利义务关系明确的，经双方当事人；可以由审判员一人独任审理”，因此A选项B选项，（民事诉讼法）第175条规定：“第二审法院应当对上诉请求的有关事实和适用法律审查”，因此B选项正确。C选项，（民事诉讼173条第1款规定：“上诉状应当通过原审人民提出……”，因此C选项错误。D选项，《民事法》第177条第1款第（四）项规定：“原判决遗事人或者违法缺席判决等严重违反法定程用戴定撤销原判决，发回原审人民法院重审”，因选项正确。（新编）","chapter":"第八章 简易程序及在线诉讼"},
  {"id":302,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据（民事诉讼法）及相关司法解释中关于小额诉会的规定，下列说法正确的有：（多选）","options":{"A": "人民法院审理小额诉讼案件，实行一审终审", "B": "标的额为各省、自治区，直辖市上年度就业人员年平均工资百分之三十以下的，适用小额诉讼的程序审理", "C": "小额诉讼程序可以免去举证期限和答解期间", "D": "小额诉讼案件的举证期限，当事人协商一致即可确定"},"answer":"ACD","explanation":"。A、B选项，《民诉法）第179条规“第二审人民法院审理上诉案件，可以造解…”，因此A选项正确，B选项错误。C走《民诉法》第182条规定：“第二审人民法院的判裁定，是终审的判决、裁定”，因此C选项正有选项，《民诉法》第176条第2数规定：第二室","chapter":"第八章 简易程序及在线诉讼"},
  {"id":303,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据人民法院在线诉讼规则及相关规定，下列案件哪些不得适用在线庭审？（多选）","options":{"A": "需要通过庭审现场查明身份、核对原件、查验实物的", "B": "案件疑难复杂、证据繁多，适用在线庭审不利于查明事实和适用法律的", "C": "案件涉及国家安全、国家秘密的", "D": "案件具有重大社会影响，受到广泛关注的"},"answer":"BD","explanation":"，A选项，（民诉法）等175条观定：“第三审人民法院应普对上诉请求的有关市实和遗用法体进行审查”，因此A连项错误。B逸项，（民诉法）第178条规定：“第二审人民法院对不顾第一审人民法院定的上诉案体的处里，一律使用定”，国此B造项正确。C远项，（民诉法）第179条属定：“第二审人民海院审理上诉案件，可以进行调解”，因此C透项错误。D逸项，（民诉法）第177条第2教规定：原审人民法院对发回重审的案件作出判决后，当事人提起上诉的，第二审人民法院不得再次发回重审”，因此D选项正确。（2015）","chapter":"第八章 简易程序及在线诉讼"},
  {"id":304,"topic":"专题三 民事诉讼法","type":"single","question":"某省上年度就业人员年平均工资为8万元。张某诉李某归还借款6万元，该省某基层法院受理案件后，张某和李某均同意适用小额诉讼的程序审理。在审理过程中，李某对张某提出反诉，要求张某归还欠款8万元，法院应当如何处理？（多选）","options":{"A": "法院应当继续适用小额诉讼的程序审理", "B": "如果张某、李某同意适用小额诉讼的程序审理的，法院应当适用小额诉讼的程序审理", "C": "当事人可以对法院适用小额诉讼的程序审理2026年专利代理部费结考试提出异议", "D": "法院应当适用简易程序的其他规定审理或者裁定将案件转为普通程序"},"answer":"D","explanation":"。《民诉法）第179条规定：“第二审人民法院审理上诉案件，可以进行调解。调解达成协议，应当制作调解书调解书送达后，原审人民法院的判决即视为微销”，因此A、B、C选项错误，D选项正确。（2013）","chapter":"第八章 简易程序及在线诉讼"},
  {"id":305,"topic":"专题三 民事诉讼法","type":"single","question":"甲起诉乙归还借款200元，某区法院受理后适用小额诉讼的程序审理。关于本案，下列说法正确的是？（多选）","options":{"A": "法院可以采用短信方式传唤当事人", "B": "法院可以采用短信送达裁判文书", "C": "本案不得适用小额诉讼的程序审理", "D": "本案法院所作判决一审终审"},"answer":"C","explanation":"。A选项，一审普通程序是（民诉法）规定最为完善的程序，在二审、再审程序中，没有作出特别规定的，都应当适用一审普通程序的规定，因此A选项正确。B选项，（民诉法）第176条第1款规定：“第二审人民法院对上诉案件应当开庭审理。经过回卷、调查和询问当事人，对没有提出新的事实、证据或者理由，人民法院认为不要开庭审理的，可以不开庭审理”，因此B选项正确。C选项，《民诉法）第179条规定：“·调解书送达后，原审人民法院的判决即视为撤销”，即二审调解书有撤销一审判决的效力，但不是在调解书中写明撤销原判，因此C选项错误。D选项，《民诉法）第41条第1款规定：“人民法院审理第二审民事案件，由审判员组成合议庭。合议庭的成员人数，必须是单数”，因此D选项正确。（法考2012）","chapter":"第八章 简易程序及在线诉讼"},
  {"id":306,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，关于第二审程序，下列说法哪些是正确的？多选）","options":{"A": "第二审人民法院审理上诉案件，应当由审判员组成合议庭", "B": "第二审人民法院应当对上诉请求的有关事实和适用法律进行审查", "C": "上诉状可以通过原审人民法院提出，也可以向第二审人民法院直接提出", "D": "原判决严重违反法定程序的，第二审人民法院应当裁定撤销原判决，发回原审人民法院重审"},"answer":"ACD","explanation":"。根据《民诉法》第177的规定，第二审人民法院对上诉案件，经过审理，认为原判决、裁定认定事实错误或者适用法律错误的，以判决、载定方式依法改列、微销或有变更，医气项正聘，B选项销误。（2006）","chapter":"第九章 第二审程序"},
  {"id":307,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于民事诉讼第二审程序的哪些说法是正确的？（多选）","options":{"A": "第二审人民法院审理上诉案件，可以进行调解", "B": "第二审人民法院审理上诉案件，不得进行调解", "C": "第二审人民法院的判决、裁定，是终审的判决、裁定", "D": "第二审人民法院审理上诉案件，可以到案件发生地通行"},"answer":"ABCD","explanation":"。（民诉法解释）能331务规货，中人民法院对下列上诉案件，依顾民事药业176条规定可以不开庭审理：（一）不厦管辖权异议和驳回起诉载定的：（二）路的上诉请求明显不能成立的：（三）摩月次、定事实消楚，但适用法律错误的（四）原）遗反法定程序，同要发同重申的”，回此A、B选项均正确。（新编）","chapter":"第九章 第二审程序"},
  {"id":308,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉偿法及相关规定，下列美手第二审程序的易些说法是正确的多选）","options":{"A": "第二审人民法院仅对一审判决的法律适用进行审查", "B": "第二审人民法院对不服第一审人民法院裁定的上诉案件的处理，一律使用裁定", "C": "第二审人民法院审理上诉案件，不得进行调解", "D": "原审人民法院对发回重审的案件作出判决后，当事人提起上诉的，第二审人民法院不得再次发回重审"},"answer":"BD","explanation":"。A选项，二审程序是二申法院根诉人的上诉，就一申法院尚未发生法律效力的决或裁定认定的事实和适用法律进行的审理，审只能基于当事人的上诉而启动，检察院扶诉能启动二审，而是启动再审，A选项错误。B选《民诉法》第175条规定：“第二审人民法院应上诉请求的有关事实和适用法律进行审查”，项正确。C选项，《民诉法》第179条规定：“调送达后，原审人民法院的判决即视为撤销”，用在调解书中写明撤销原判，C选项错误。D项，第二审人民法院对上诉案件应当开庭审月《民诉法解释》第331条规定：“经过阅卷、调查和问当事人，对没有提出新的事实、证据或者理人民法院认为不需要开庭审理的，可以不开良理”，D选项正确。因此，B、D选项正确。（法2014，思维扩展）","chapter":"第九章 第二审程序"},
  {"id":309,"topic":"专题三 民事诉讼法","type":"single","question":"民事诉讼第二审人民法院对上诉案件进行调解后达成协议，并依法制作了调解书。根据民事诉讼法及相关规定，对于原审人民法院的判决，下列哪种说法是正确的？（单选）","options":{"A": "第二审人民法院应作出裁定，撤销原审人民法院的判决", "B": "第二审人民法院应在调解书中注明撤销原审人民法院的判决", "C": "原审人民法院应主动撤销原判决", "D": "调解书送达后，原审人民法院的判决即视为撤销"},"answer":"D","explanation":"。《民诉法》第173条规定：“上诉状应当：过原审人民法院提出，并按照对方当事人或者：表人的人数提出副本。当事人直接向第二审人！法院上诉的，第二审人民法院应当在5日内共上i状移交原审人民法院”，原审法院接到上诉状后；衢审查，应当向上级法院完成文书送达和案想送工作。上诉案件是否立案应当由二审法院制判断后作出决定，故一审法院没有决定是否主1的权利。本案中，一审法院即使发现上诉人上i期已过，仍应当将上诉状和案卷材料移送至上法院，由上级法院作出是否立案的决定，因此，1","chapter":"第九章 第二审程序"},
  {"id":310,"topic":"专题三 民事诉讼法","type":"multiple","question":"关于民事诉讼二审程序的表述，下列哪一选项是错误的？（单选）","options":{"A": "二审案件的审理，遇有二审程序没有规定的情形，应当适用一审普通程序的相关规定", "B": "二审案件的审理，以开庭审理为原则", "C": "二审案件调解的结果变更了一审判决内容的，应当在调解书中写明“撤销原判”", "D": "二审案件的审理，应当由法官组成的合议庭进行审理-99.-2020年专利代理普热专认"},"answer":"ABC","explanation":"。（民诉法解释）第321条规定：“第二审人民法院应当国绕当事人的上诉请求进行审理。当事人没有提出请求的，不予审理，但一审判决遗反法律集止性规定，或者损害国家利益、社会公共利益、他人合法权益的除外。“因此，二审法院只能对上诉请求进行审理并作出判决，本题中二审法院超出上诉请求作出判决的做法错误。A、B选项正确。《民诉法解释》第324条规定：“对当事人在第一审程序中已经提出的诉讼请求，原审人民法院未作审理、判决的，第二审人民法院可以根据当事人自愿的原则进行调解；调解不成的，发回重审。”对于一审遗漏的赔礼道款的诉讼请求，二审法院可以组织当事人调解，调解不成的，撤销原判，发回重审。故C选项正确，D选项错误。（法考2020）督程序下","chapter":"第九章 第二审程序"},
  {"id":311,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法的规定，第二审人民法院对上诉案件经过审理，认为原判决认定事实错误或者适用法律错误的，应当如何处理？（多选）","options":{"A": "变更原判决", "B": "要求原审人民法院改判", "C": "裁定撤销原判决", "D": "依法改判"},"answer":"ABCD","explanation":"。《民诉法》第211条规定：“当事人的申请符合下列情形之一的，人民法院应当再审：（一）有新的证据，足以推翻原判决、裁定的：：（四）原判决、裁定认定事实的主要证据未经质证的：；（十一）原判决、裁定遗漏或者超出诉讼请求的；（十二）据以作出原判决、裁定的法律文书被撒销或者变更的；….”，因此A、B、C、D选项均正确。（2014改编）","chapter":"第九章 第二审程序"},
  {"id":312,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，对下列哪些上诉案件、第二审人民法院可以不开庭审理？（多选）","options":{"A": "原判决严重违反法定程序，需要发回重审的", "B": "当事人提出的上诉请求明显不能成立的", "C": "不服管辖权异议裁定的", "D": "原判决认定事实清楚，但适用法律错误的"},"answer":"BCD","explanation":"。有新证据不一定界的再审的情形，当选。（2018）院申请再中……当事人中请再审申的，不判决、裁定的执行”，因此A选项正确项错误。B选项，（民诉法）第212条规“当事人对已经发生法律效力的调解出证据证明调解违反自阅原则或者满议的内容违反法律的，可以申请再因此B选项正确。C选项，《民诉法）第条规定：“当事人对已经发生法律效力除婚姻关系的判决、调解书，不得中审”，因此C选项正确。（2016）","chapter":"第九章 第二审程序"},
  {"id":313,"topic":"专题三 民事诉讼法","type":"multiple","question":"关于民事诉讼二审程序，下列哪些选项是正确的？（多选）","options":{"A": "二审既可因为当事人的上诉而发生，也可能因为检察院的抗诉而发生", "B": "二审既是事实审，也是法律审", "C": "二审调解书应当写明撤销原判", "D": "二审原则上应当开庭审理，特殊情况下可不开庭审理"},"answer":"ABC","explanation":"。A、B、D选项，（民诉法）第条规定：“当事人对已经发生法律效力！决、裁定，认为有错误的，可以向上一级人法院申请再审，当事人一方人数众多或事人双方为公民的案件，也可以向原审；法院申请再审。当事人中请再审的，不简判决、裁定的执行，原被告双方均为公可以向原审法院申请，也可以向上一级申请，因此A、B选项正确，D选项错误。项，《民诉法》第216条规定：“当事人申审，应当在判决、裁定发生法律效力后（月内提出”，因此C选项正确。（2019）","chapter":"第九章 第二审程序"},
  {"id":314,"topic":"专题三 民事诉讼法","type":"multiple","question":"长江公司向甲市A区法院起诉乙公司，区法院判决驳回甲公司的诉讼请求，长江公司不服一审判决，通过甲市A区法院提交上诉状，A区法院发现长江公司的上诉已经超过上诉期，应当如何处理？（单选）","options":{"A": "不予接受上诉材料", "B": "提请上级法院裁定驳回上诉", "C": "裁定驳回上诉", "D": "将上诉状和上诉材料一并移交上级法院"},"answer":"BCD","explanation":"。A选项，如果调解违反自则或者调解协议的内容违反法律的，可以请再审，因此A选项错误。B选项，（民法》第213条规定：“当事人对已经发生法效力的解除婚姻关系的判决、调解书，不申请再审”，B选项正确。C选项，《民第217条规定：“按照审判监督程序决定审的案件，裁定中止原判决、裁定、调解执行……，因此C选项正确。D选项（诉法》第218条第2款规定：“人民法氏","chapter":"第九章 第二审程序"},
  {"id":315,"topic":"专题三 民事诉讼法","type":"multiple","question":"垦审理、一审法院判决告王某支付原告刘某欠本息具计22万元，主某不限提出上诉，二审中，双方达和量兽议，的定：王某分三个月向刘某偿付20万元，刘美放身利息请求，案作经正某申请撤回上诉而终结，约定易限属满后，正是只支付了15万元。刘某应当如何教济（单选）","options":{"A": "向一审法院重新起诉", "B": "向一审法院申请执行判决", "C": "向一申法院申请执行和解协议", "D": "向二审法院提出上诉"},"answer":"BC","explanation":"《民诉法）第219条规定：“最高人民检察院难各级人民法院已经发生法馆效力的判决、裁定，上级人民检察院对下级人民法院已经发生法律效力的判决、规定，发现有本法第211条规定情形之一的，或者发观调解书惯客国家利益、社会公共利益的，应当提出抗诉。地方各级人民检察院对同级人民法院已经发生法律效力的判决、线定，发现有本法第211条规定情形之一的，成者发现调解书损害国家利益、社会公共利益的，可以向同级人民法院提出检察建议，并报上级人民检察院备案：也可以提请上级人民检察院向同级人民法院提出抗诉”。检察院的检察建议直接向同级人民法院提出，并报上级人民检察院备案，抗诉是提请上一级检察院向同级法院提出的，因此A、D选项错误，B、C选项正确。（2013）","chapter":"第九章 第二审程序"},
  {"id":316,"topic":"专题三 民事诉讼法","type":"multiple","question":"2万元，对赔礼道款的诉讼请求未作判决。张某不服一审判决，提起上诉，请求法院改判李某向张某赔偿损失2万元。二审法院维持1.2万的判项，同时判决李某向张某赔礼道歉。关于本案表述正确的是？（多选）","options":{"A": "二审法院只能对上诉请求进行审理并作出判决", "B": "二审法院超出上诉请求作出判决的做法错误", "C": "二审法院应当对上诉请求作出判决，对一审遗漏的诉讼请求进行调解，调解不成撤销原判发回重审", "D": "因为一审法院遗漏诉讼请求，故二审法院应当直接撤销原判，发回重审"},"answer":"ACD","explanation":"。A、B选项，（民诉法）第218条第1款规定：“发生法律效力的判决、定是由第二审法院作出的，按照第二审程序审理，所作的判决、裁定，是发生法律效力的判决、裁定；上级人民法院按照审判监督程序提审的，按照第二审程序审理，所作的判决、裁定是发生法律效力的判决、裁定”，原审案件已经经过两审，省高级人民法院提审或者指定再审的，按照第二审程序审理，因此A选项正确，B选项错误。C选项，按照审判监督程序决定再审的案件，应当裁定中止原判决、裁定、调解书中止执行，C选项正确。D选项，（民诉法）第220条第1款规定：“有下列情形之一的，当事人可以向人民检察院申请检察建议或者抗诉：…（三）再审判决、裁定有明显错误的”，如果省高级人民法院作出的再审判决有明显错误的，王某可以向人民检察院申请检察建议或者抗诉，因此D选项正确。（2017）","chapter":"第九章 第二审程序"},
  {"id":317,"topic":"专题三 民事诉讼法","type":"single","question":"根据民事诉讼法及相关规定，当事人的再审申请符列哪些情形的，人民法院应当再审？（多选）","options":{"A": "有新的证据，足以推翻原判决的", "B": "原判决认定事实的主要证据未经质证的", "C": "据以作出原判决的法律文书被撤销的", "D": "原判决超出诉讼请求的"},"answer":"D","explanation":"。根据《民诉法）第219条的规定，地方各级人民检察院对同级人民法院已经发生法律效力的判决、裁定，发现有本法第211条规定再审情形之一的，应人民检察院向同级人民法院提出轨中，乙市人民检察院拟肩动审的、应当提请上级人民检察院向属级人院提出抗诉，因此A、B、C选项售镇，b正确。（2011，思维扩展）","chapter":"第十章 审判监督程序"},
  {"id":318,"topic":"专题三 民事诉讼法","type":"single","question":"甲公司诉乙公司侵害发明专利权纠纷一案，一审法院判决驳回甲公司的全部诉讼请求，甲公司不服提起上诉，二审法院改判乙公司停止被控侵权行为并赔偿甲公司经济损失及合理费用。根据民事诉讼法及相关规定，乙公司的申请符合以下哪些情形的，人民法院应当再审？（多选）","options":{"A": "有新的证据", "B": "二审判决认定事实的主要证据未经质证的", "C": "二审判决适用法律确有错误的", "D": "二审判决遗漏或者超出诉讼请求的"},"answer":"A","explanation":"1D。《民诉法）第210条规定人对已经发生法律效力的判决、载定，有错误的，可以向上一级人民法院审：当事人一方人数众多或者当事人双）公民的案件，也可以向原市人民法院中审”，本案中，江苏省高院是作出生效判头徐州中院的上一级法院，故当事人可以一级人民法院申请再审，A选项正确。（法》第222条规定：“人民检察院提出杭济案件，接受抗诉的人民法院应当自收到参书之日起三十日内作出再审的载定”，项错误。《民诉法）第217条规定：“按顾审监督程序决定再审的案件，裁定中业决、裁定、调解书的执行”，裁定再审的同并不撤销原判，在再审的审理阶段经过理，原判确有错误才可以裁定微销原判选项错误，D选项正确。因此，A、D选确。（法考2013，思维扩展）","chapter":"第十章 审判监督程序"},
  {"id":319,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于民事诉讼审判监督程序的哪些说法是正确的？（多选）","options":{"A": "当事人对已经发生法律效力的裁定，认为有错误的，可以向上一级人民法院申请再审", "B": "当事人对已经发生法律效力的调解书，提出证据证明调解违反自愿原则的，可以申请再审", "C": "当事人对已经发生法律效力的解除婚姻关系的判决，不电量热申能", "D": "当事人申请再审的，应当停止判决、裁定的执行"},"answer":"BD","explanation":"。A选项，《民诉法）第23S条款规定：“发生法律效力的民事判决、以及刑事判决、裁定中的财产部分，由审人民法院或者与第一审人民法院同！被执行的财产所在地人民法院执行”，A选项错误。B选项，（民诉法）第236定：“当事人、利害关系人认为执行行为：法律规定的，可以向负责执行的人民法！出书面异议………”，因此B选项正确。项，《民诉法》第241条第1款规定：“在：中，双方当事人自行和解达成协议的，员应当将协议内容记入笔录，由双方当","chapter":"第十章 审判监督程序"},
  {"id":320,"topic":"专题三 民事诉讼法","type":"single","question":"郑某与王某因专利权属纠纷诉至北京知识产权法院。北京知识产权法院作出的一审判决发生法律效力后，郑某认为一审判决适用法律错误，欲申请再审。根据民事诉讼法及相关规定，下列说法正确的是？多选）","options":{"A": "郑某可以向北京知识产权法院申请再审", "B": "郑某可以向北京知识产权法院的上一级法院申请再审", "C": "郑某申请再审的，应当在一审判决发生法律效力后六个月内提出", "D": "郑某申请再审的，人民法院应当裁定停止原判决的执行"},"answer":"C","explanation":"。（民诉法）第241条第1教院定：“在执行中，从方当事人自行和解达成协议，执行员应当将协议内容记入笔录，由及方当事人签名或者盗章”，因此执行程序中可以和解，C选项正确。（2019）","chapter":"第十章 审判监督程序"},
  {"id":321,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于审判监督程序的哪种说法是正确的？（多选）","options":{"A": "当事人对已经发生法律效力的调解书，一律不得申请", "B": "当事人对已经发生法律效力的解除婚姻关系的判决，不电址县中信", "C": "按周审判监督程序决定再审的案件，裁定中止原判决的执行", "D": "人民法院审理再审案件，应当另行组成合议庭"},"answer":"ABCD","explanation":"。A选项，（民诉法）第235条第1款规定：“发生法律效力的民事判决、裁定，以及刑事判决、概定中的财产部分，由第一审人民法院或者与第一审人民法院同级的慎执行的财产所在地人民法院执行”，因此A选项正确。B选项，（民诉法）第237条规定：人民法院自收到申请执行书之日起超过6个月未执行的，申请执行人可以向上一级人民法院申请执行.”，因此B选项正确。C选项，（民诉法》第241条规定：“在执行中，双方当事人自行达成和解协议的，执行员应当将协议内容记入笔录，由双方当事人签名或者盖章”，因此C选项正确。D选项，《民诉法》第268条规定：“有下列情形之一的，人民法院裁定终结执行：……·（二）据以执行的法律文书被撤销的…”，因此D选项正确。（2017）","chapter":"第十章 审判监督程序"},
  {"id":322,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "上级人民检察院对下级人民法院已经发生法律效力的判决，发现适用法律确有错误的，可以向下级人民法院提出检察建议，并报上级人民检察院备案", "B": "上级人民检察院对下级人民法院已经发生法律效力的判决，发现适用法律确有错误的，应当提出抗诉", "C": "地方各级人民检察院对同级人民法院已经发生法律效力的判决，发现适用法律确有错误的，可以向同级人民法院提出检察建议，并报上级人民检察院备案", "D": "地方各级人民检察院对同级人民法院已经发生法律效力的判决，发现适用法律确有错误的，应当提出抗诉"},"answer":"ABCD","explanation":"。A、B选项，《民诉法）第256条第1款的规定：“人民法院查封、扣押财产时，被执行人是公民的，应当通知被执行人或者他的成年家属到场；被执行人是法人或者其他组织的，应当通知其法定代表人或者主要负责人到场”，因此A、B选项正确。C选项，《民诉法》第257条规定：“被查封的财产，执行员可以指定被执行人负责保管”，因此C选项正确。D选项。《民诉法）第256条第2款的规定：“对被查封、扣押的财产，执行员必须造具清单，由在场人签名或者盖章后，交核执行人一份。铁执行人是分正确。（2012）列情形之一的，人民法院应当教党案外人对执行标的提出确有理由的的…（四）你为一方当事人的法人其他组织终止。尚未确定权利义务系的.…\"，因此A、C、D选项正确，B选项执行终结的情形。（2018）","chapter":"第十章 审判监督程序"},
  {"id":323,"topic":"专题三 民事诉讼法","type":"multiple","question":"张某起诉王某违约并要求继续履行合同、支付迟延履行违约金，经县市两级人民法院审理均胜诉。王某以生效的二审判决适用法律错误为由申请再审。根据民事诉讼法及相关规定，下列哪些说法是正确的？（多选）A：省高级人民法院按照审判监督程序提审的，按照第二审程序审理","options":{"B": "省高级人民法院交原审人民法院再审的，原审人民法院应当按照第一审程序审理", "C": "省高级人民法院决定再审的，裁定中止原判决的执行", "D": "省高级人民法院驳回再审申请的，王某可以向人民检察院申请抗诉"},"answer":"ABCD","explanation":"。《民诉法）第268条规定：下列情形之一的，人民法院载定终结（一）申请人撤销申请的；（二）据以执行律文书被撒销的·（四）追索赠养费养费、抚养费案件的权利人死亡的；（五为被执行人的公民因生活困难无力偿通，无收入来源，又丧失劳动能力的.因此A、B、C、D选项均正确。（2010）","chapter":"第十章 审判监督程序"},
  {"id":324,"topic":"专题三 民事诉讼法","type":"single","question":"某债务纠纷案件已由甲县人民法院一审、乙市中级人民2026年专利代理师责格考试法院二审终结，二审判决已发生法律效力。现乙市人民检察院发现该判决确有错误，拟启动审判监督程序。根据民事诉讼法及相关规定，下列说法哪项是正确的？（单选）","options":{"A": "乙市人民检察院应当向甲县人民法院提出抗诉", "B": "乙市人民检察院应当向乙市中级人民法院提出抗诉", "C": "乙市人民检察院应当提请上级人民检察院向乙市中级人民法院提出抗诉", "D": "乙市人民检察院应当提请上级人民检察院向同级人民法院提出抗诉"},"answer":"D","explanation":"。《民诉法》第242条规定：“在中，被执行人向人民法院提供担保，并些请执行人同意的，人民法院可以决定暂行及暂缓执行的期限。被执行人逾期履行的，人民法院有权执行被执行人的：担保人的财产时无需另行起诉，执行人！产是否能清偿债权人的财产并不是执保人财产的前提，只要暂缓执行期问层；有履行，即可以恢复执行，因此D选项正（法考2009改编，思维扩展）公程序ABC。《民诉法）第276条规定：“因涉外民1中华人民共和国领域内没有住所的被关系以外的诉讼，如果合同签订地、台见标的物所在地、可供扣押财产所在地、慢！","chapter":"第十章 审判监督程序"},
  {"id":325,"topic":"专题三 民事诉讼法","type":"multiple","question":"周某因合同纠纷起诉，江苏省徐州市的县市两级法院均驳回其诉讼请求。周某申请再审，但被驳回。周某又向检察院申请抗诉，检察院以原审主要证据系伪造为由提出抗诉，法院裁定再审。关于启动再审的表述，下列哪些说法是正确的？（多选）","options":{"A": "周某可以向江苏省高院申请再审", "B": "检察院抗诉后，应当由接受抗诉的法院审查后，作出是否再审的裁定", "C": "法院应当在裁定再审的同时，裁定撤销原判", "D": "法院应当在裁定再审的同时，裁定中止执行"},"answer":"BCD","explanation":"。A选项，根据《民事诉讼法）第274条境定：“外国人、无国籍人、外国企业和组织在人民法院起诉、应诉，育要委托律师代理诉讼的，必须委托中华人民共和回的律师”，除委托律师外，外国人还可以委托近来属参加诉讼，因此A选项错误。B选项，根据《民事诉讼法》第272条规定：“对享有外交待权与药免的外国人、外国组织或者国际组织提起的民事诉讼，应当依照中华人民共和国有关法律和中华人民共和国缘结或者参加的国际条约的规定办理”，因此B选项正确。C选项，根据（民事诉讼法）第277条规定：“涉外民事纠纷的当事人书面协议选择人民法院管辖的，可以由人民法院管辖”，因此C选项正确。D选项，根据《民事诉讼法）第279条规定：“下列民事案件，由人民法院专属管辖：（二）因与在中华人民共和国领域内审查授子的知识产权的有效性有关的纠纷提起的诉讼”，因此D选项正确。（新编，思维扩展）","chapter":"第十章 审判监督程序"},
  {"id":326,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于发生法律效力的民事判决执行的说法哪些是正确的？（多选）","options":{"A": "发生法律效力的民事判决，应当由被执行的财产所在地基层人民法院执行", "B": "当事人认为执行行为违反法律规定的，可以向负责执行的人民法院提出书面异议", "C": "在执行中，双方当事人自行达成的和解协议无效", "D": "在执行中，被执行人向人民法院提供担保，并经申请执行人同意的，人民法院可以决定暂缓执行及暂缓执行的期限"},"answer":"ABCD","explanation":"。A、B选项，根据《民事诉讼法）第279条规定：“下列民事案件，由人民法院专属管辖：（一）因在中华人民共和国领域内设立的法人或者其他组织的设立、解散、清算，以及该法人或者其他组织作出的决议的效力等纠纷提起的诉讼：（二）因与在中华人民共和国领域内审查投子的知识产权的有效性有关的纠纷提起的诉讼：（三）因在中华人民共和国领域内履行中外合资经营企业合同、中外合作经营企业合同、中外合作勘探开发自然资源合同发生纠纷提起的诉讼”，因此A、B选项正确。C选项，根据《民事诉讼法》第277条规定：“涉外民事纠纷的当事人书面协议选择人民法院管辖的，可以由人民法院管辖”，因此C选项正确。D选项，根据《民事诉讼法》第278条的规定：“当事人未提出管辖异议，并应诉答辩或者提出反诉的，视为人民法院有管辖权”，因此D选项正确。（新编，思维扩展）念、基本原则和范围正为复第13条的规定，复议机关对其他规范性文件进附带审查，无权对规章的合法性进行审查，因此选项错误。C选项，根据《复议法》第4条的规定行政复议机关办理行政复议事项的机构是行政期议机构，上级行政复议机构对下级行政复议机时的行政复议工作进行指导、监督，因此C选项正。D选项，《复议法》第5条第1数规定：“行政复议关办理行政复议案件，可以进行调解”，因此D选正确。（新编）","chapter":"第十一章 执行程序"},
  {"id":327,"topic":"专题三 民事诉讼法","type":"multiple","question":"人民法院受理甲出版社、乙报社著作权纠纷案，判决乙偿甲十五万元，并登报婚儿道。判决生效后，乙交付十五万元，但来赠礼道款，甲申请握制执行。执行中，甲，乙自行达成和解议，尊定乙免于精礼道款，但另付甲五万元。根据民事诉讼法及相美规定，下月关于人民法院做法的说法，哪个是正确的？（单选）","options":{"A": "不免许，因协以内容超出判决范围，应当继续执行生效判决", "B": "允许，人民法院视为申请人敬销执行申请", "C": "允许，将当事人协议内容记人笔录，由甲、乙签字或盖章", "D": "允许，根据当事人协议内容制作调解书"},"answer":"BD","explanation":"。《复议法》第3条规定：“行政复议机关效、便民、为民的原则，坚持有错必纠，保障法律、法规的正确实施。”，因此B、D选项正确。（新编）有？","chapter":"第十一章 执行程序"},
  {"id":328,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于执行程序的哪些说法是正确的？（多选）","options":{"A": "发生法律效力的民事判决，由第一审人民法院或者与第一审人民法院同级的被执行的财产所在地人民法院执行", "B": "人民法院自收到申请执行书之日起超过6个月未执行的，申请执行人可以向上一级人民法院申请执行", "C": "双方当事人在执行中自行和解达成协议的，执行员应当将协议内容记人笔录，由双方当事人签名或者盖章", "D": "据以执行的法律文书被撤销的，人民法院裁定终结执行"},"answer":"AD","explanation":"。A选项，根据《复议法》第5 条的规定，调解适用于行政复议案件办理的全过程，即在更行理审查过程中和审理阶段，均可以进行调解，推行政争议的实质性化解，因此A选项正确。B项，原则上，所有的行政复议案件都可以进行解，不限于行政补偿、赔偿及自由裁量案件，因！选项错误。C选项，调解只是行政复议机关可以自","chapter":"第十一章 执行程序"},
  {"id":329,"topic":"专题三 民事诉讼法","type":"single","question":"根据民事诉讼法及相关规定，下列关于执行过程中查封、扣押财产的哪些说法是正确的？（多选）","options":{"A": "人民法院查封、扣押财产时，被执行人是公民的，应当通知被执行人或者其成年家属到场", "B": "人民法院查封、扣押财产时，被执行人是法人或其他组织的，应当通知其法定代表人或者主要负责人到场", "C": "被查封的财产，执行员可以指定被执行人负责保管", "D": "对被查封、扣押的财产，执行员必须造具清单，由在场人签名或者盖章后，交被执行人一份，被执行人是公民的，也可以交他的成年家属一份"},"answer":"C","explanation":"。A选项，行政复议既审查合法性义审查合理性，A选项错误。B透项，（复议法）第10条规定：“公民、法人或者其他组织对行政复议决定不顺的，可以依照《中华人民共和国行政诉讼法》的规定向人民法院提起行政诉讼，但是法律规定行政复议决定为最终裁决的除外”，因此B逸项错误。C逸项，《复议法》第5条规定：行政复议机关办理行政复议案件，可以进行调解。”，因此C选项正确。D选项，根据《复议法》第24-25条的规定，省、自治区、直辖市人民玖府同时管辖对本机关作出的行政行为不服的行政复议案件，国务院部门管辖对本部门作出的行政行为不服的行政复议案件，因此D选项错误。（新编）","chapter":"第十一章 执行程序"},
  {"id":330,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，以下哪些情形下，人民法2026年专利代理师警格考试院应当裁定中止执行：（多选）","options":{"A": "申请人表示可以延期执行的", "B": "据以执行的法律文书被撤销的", "C": "案外人对执行标的提出确有理由的异议的", "D": "作为一方当事人的法人终止，尚未确定权利义务承受人的"},"answer":"ABC","explanation":"。A、B、C选项，（复议法）第23条第1款规定：“有下列情形之一的，申请人应当先向行政复议机关申请行政复议，对行政复议决定不服的，可以再依法向人民法院提起行政诉讼：（一）对当场作出的行政处罚决定不服：（二）对行政机关作出的侵犯其已经依法取得的自然资源的所有权或者使用权的决定不服；（三）认为行政机关存在本法第11条规定的未履行法定职责情形”，因此A、B、C选项正确。D选项，只有已经依法取得的自然资源所有权或使用权受到行政行为侵害的，才属于复议前置情形，因此D选项不属于复议前置情形。（新编）","chapter":"第十一章 执行程序"},
  {"id":331,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，在执行过程中出现下列哪些情形的，人民法院裁定终结执行？（多选）","options":{"A": "作为被执行人的公民因生活困难无力偿还借款，无收人来源，又丧失劳动能力的", "B": "追索抚育费案件的权利人死亡的", "C": "申请人撤销执行申请的", "D": "据以执行的法律文书被撤销的"},"answer":"CD","explanation":"。《复议法）第23条第1款第（二）项所规定的侵犯土地资源所有权或使用权复议前置的情形，针对的是已经取得的土地所有权或使用权。本题中，新锐公司尚未取得土地所有权或使用权，不属于复议前置的情形，A、B选项属于对申请行政许可决定不服，当事人可以复议，也可以直接向人民法院提起行政诉讼。C、D选项属于行政机关侵犯已经取得的土地资源所有权、使用权，应当先复议，后起诉，D选项中集体土地使用权被侵犯的，村民以自已名义申请复议是可以的，但是件，考虑到本期考点不在于谁可以提出复认因此C、D选项正确。（2018）","chapter":"第十一章 执行程序"},
  {"id":332,"topic":"专题三 民事诉讼法","type":"multiple","question":"在民事执行中，被执行人朱某申请暂缓执行，提出由吴某以自有房屋为其提供担保，申请执行人刘某同意。法院作出暂缓执行裁定，期限为6个月。对于暂缓执行期限届满后朱某仍不履行义务的情形，下列哪一选项是正确的？（单选）","options":{"A": "刘某应起诉吴某，取得执行依据可申请执行吴某的担保房产", "B": "朱某财产不能清偿全部债务时刘某方能起诉吴某，取得执行依据可申请执行吴某的担保房产", "C": "朱某财产不能清偿刘某债权时法院方能执行吴某的担保房产", "D": "刘某可申请法院执行吴某的担保房产"},"answer":"ABC","explanation":"。A、B、C选项，根据《复法）11的规定，对行政机关作出的行政强制插路、行制执行决定不服的：申请行政许可，行政机美多。或者在法定期限内不予答复的：对行政机美的征收征用决定及其补偿决定不服的，均量政复议的受案范国，因此A、B、C选项正确。U项，根据《复议法》第12条的规定，行政机关对员纠纷作出的调解不属于行政复议的受案范因，此D选项错误。（2011改编）","chapter":"第十一章 执行程序"},
  {"id":333,"topic":"专题三 民事诉讼法","type":"multiple","question":"外国人黄某在中国没有住所，但在海口有一处房产，其加人外国国籍前住所在南宁。中国公民温某与纷，黄某在长沙签订货物买卖合同，约定交货地点为深圳。除身后黄某因货源紧张，未按照合同约定交货。如果温某向地、人民法院起诉，则下列哪些地方的人民法院有权管辖？（多造）","options":{"A": "长沙", "B": "保圳", "C": "海日", "D": "南中"},"answer":"ABCD","explanation":"。根据《复议法》第11条的规定，A项属于第（四）项对行政机关作出的确认自继资》的所有权或者使用权的决定不服；B选项属子（十四）项认为行政机关在政府信息公开工作中学犯其合法权益：C选项属于第（七）项对行政机关出的不予受理工伤认定申请的决定或者工伤认：结论不服；D选项属于第（六）项对行政机关作白赔偿决定或者不子赔偿决定不服；因此A、B、C.选项均属于行政复议受案范围。（新编）","chapter":"第十二章 涉外民事诉讼"},
  {"id":334,"topic":"专题三 民事诉讼法","type":"multiple","question":"关于涉外民事诉讼程序，下列说法正确的有哪些？多选）","options":{"A": "外国人在人民法院起诉、应诉，必须委托中华人民共和国的律师", "B": "对享有外交特权与豁免的外国人提起的民事诉讼，应当依照中华人民共和国有关法律和中华人民共和国缔结或者参加的国际条约的规定办理", "C": "涉外民事纠纷的当事人书面协议选择人民法院管辖的，可以由人民法院管辖", "D": "因与在中华人民共和国领域内审查授子的知识产权的有效性有关的纠纷提起的诉讼，由人民法院专属管辖"},"answer":"BCD","explanation":"。A选项，属于《复议法》第11条中定的，认为行政机关不依法订立、不依法履行、未按照约定履行或者违法变更、解除政府特许经协议、土地房屋征收补偿协议等行政协议的情形属于行政复议受案范围，因此A选项正确。B.CJ选项，《复议法》第12条规定：“下列事项不属于政复议范围（二）行政法规、规章或者行政关制定、发布的具有普遍约束力的决定、命令等范性文件；（三）行政机关对行政机关工作人员奖惩、任免等决定；（四）行政机关对民事纠纷作的调解”；B选项属于行政机关对工作人员的惩易决定，C选项属于对民事纠纷作出的调解，D《专利审查指南》属于规章，B、C、D选项均不行政复议受案范围。（2017改编）","chapter":"第十二章 涉外民事诉讼"},
  {"id":335,"topic":"专题三 民事诉讼法","type":"multiple","question":"关于涉外民事诉讼程序的管辖，下列说法正确的有哪些？多选）","options":{"A": "因在中华人民共和国领域内履行中外合资经营企业合同、中外合作经营企业合同、中外合作勘探开发自然资源合同发生纠纷提起的诉讼，由人民法院专属管辖", "B": "因在中华人民共和国领域内设立的法人或者其他组织的设立、解散、清算，以及该法人或者其他组织作出的决议的效力等纠纷提起的诉讼，由人民法院专属管辖", "C": "涉外民事纠纷的当事人书面协议选择人民法院管辖的，可以由人民法院管辖", "D": "当事人未提出管辖异议，并应诉答辩或者提出反诉的，视为人民法院有管辖权"},"answer":"BC","explanation":"。《复议法》第13条规定：“公民、法人者其他组织认为行政机关的行政行为所依据的下","chapter":"第十二章 涉外民事诉讼"},
  {"id":336,"topic":"专题四 行政复议法","type":"single","question":"根据行政复议法及相关规定，下列说法哪些确的？（多选）","options":{"A": "行政复议是解决行政争议的主要渠道", "B": "行政复议机构应当审查申请行政复议的行政所依据的规章是否合法", "C": "上级行政复议机构对下级行政复议机构的行议工作进行指导、监督", "D": "行政复议机关办理行政复议案件可以进行调"},"answer":"D","explanation":"。A选项，（中华人民共和国专利法实施细则）属于行玖法规：B选项，（专利保护条例》属于地方性法规：C选项，（专利行政执法办法）属子国家知识产权局制定的部门规章：因此，A、B、C选项均不属于行政复议可以审查的范图。D选项，省知识产权局制定的（关于加强专利保护的规定）属干县级以上地方各级人民政府及其工作部门的规范性文件，可以一并向行政复议机关提出附带审查申请，因此D选项正确。（新编，思维扩展）","chapter":"第一章 行政复议的相关规定"},
  {"id":337,"topic":"专题四 行政复议法","type":"multiple","question":"下列哪些是行政复议机关在履行行政复议职必须遵循的原则？（多选）","options":{"A": "合理、合法", "B": "公正、公开", "C": "公平、公正", "D": "高效、便民"},"answer":"ACD","explanation":"。A选项，（复议法）第11条规定：“有下列情形之一的，公民、法人或者其他组织可以依照本法申请行政复议：（三）申请行政许可，行政机关拒绝或者在法定期限内不予答复，或者对行政机关作出的有关行政许可的其他决定不股：（四）对行政机关作出的确认自然资源的所有权或者使用权的决定不服（十四）认为行政机关在政府信息公开工作中侵犯其合法权益……”因此A、C、D选项属于行政复议受案范国。B选项，补正材料通知书属于准备性行政行为，不具有终局性，不必然影响当事人的权利义务，不属于行政复议受案范围。因此，A、C、D选项正确。（新编，思维扩展）行政复议机关","chapter":"第一章 行政复议的相关规定"},
  {"id":338,"topic":"专题四 行政复议法","type":"multiple","question":"关于行政复议案件的调解，以下说法正确的（多选）","options":{"A": "在行政复议受理过程和审查阶段，均可以调解", "B": "调解限于行政补偿、赔偿及自由裁量案件", "C": "行政复议案件的调解是行政复议的必经程序", "D": "行政复议案件的调解应当遵循合法、自愿的"},"answer":"ACD","explanation":"。（复议法）第14条规定：“有权申请行政复议的公民死亡的，其近亲属可以申请行政复议。有权中请行政请行法人或者其他组织终止的，其权利又多人可以申请行政复议。有权申请行班：其法的公民为无民事行为能力人或者限制！行为能力人的，其法定代理人可以代为，的，其行政复议”，因此法定代理人是以赞代！名义申请复议，B选项错误，A、C、D通权利确。（新编）","chapter":"第一章 行政复议的相关规定"},
  {"id":339,"topic":"专题四 行政复议法","type":"multiple","question":"有关行政复议，下列哪项说法是正确的7","options":{"A": "行政复议只申查具体行政行为是否合法", "B": "复议机构依法复议后，不得再提起行政诉讼", "C": "复议机美审理复议案件，可以适用调解", "D": "公民、法人或其他组织认为行政机关的行政行为侵犯其合法权益，不可以向该行政机关申请复议"},"answer":"ABC","explanation":"。A、B选项，（复议条例）第1款规定：“合伙企业申请行政复认的说当以核准登记的企业为申请人，由执行事务的合伙人代表该企业参加行政复训为申他合伙组织申请行政复议的，由合伙人申请行政复议”，因此A、B选项正确。项，根据《复议条例》第7条的规定，股其合企业的股东会、董事会认为行政机关作具体行政行为侵犯企业合法权益的，可行政企业的名义申请行政复议，因此C选行政确，D选项错误。（2011）","chapter":"第一章 行政复议的相关规定"},
  {"id":340,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，下列哪些情形申请人应当先向行政复议机关申请行政复议，对行政复议决定不服的，可以再依法向人民法院提起行政诉讼？多选）","options":{"A": "对当场作出的行政处罚决定不服", "B": "对行政机关作出的侵犯其已经依法取得的自然资源的使用权的决定不服", "C": "认为行政机关未履行其法定职责", "D": "对行政机关作出的确认自然资源的使用权的决定不服"},"answer":"BC","explanation":"。（复议法）第15条规定：“同为侵政复议案件申请人人数众多的，可以由人推选代表人参加行政复议。代表人行政复议的行为对其所代表的申请人正确效力，但是代表人变更行政复议请求、行政复议申请、承认第三人请求的，应被代表的申请人同意”，因此A、D选人均误，B、C选项正确。（新编）","chapter":"第一章 行政复议的相关规定"},
  {"id":341,"topic":"专题四 行政复议法","type":"multiple","question":"新锐公司兴建厂房需要一块土地。恰逢甲市政府出让一块土地，新锐公司和好客来公司同时提出申请，市政府拒绝了新锐公司的申请，向好客来公司颁发了国有土地使用权证。此后，丰年村认为政府向好客来公司发放的国有土地使用权证所认定的面积包括了该村的集体土地。下列说法正确的是？（多选）","options":{"A": "新锐公司对政府拒绝其申请的行为，应当先申请行政复议才能提起诉讼", "B": "新锐公司对政府向好客来公司颁发国有土地使用权的行为，应当先申请复议才能提起诉讼", "C": "丰年村对政府向好客来公司颁发国有土地使用权的行为，应当先申请复议才能提起诉讼", "D": "集体土地使用权被侵犯的丰年村村民也可以以自已的名义申请行政复议"},"answer":"ACD","explanation":"。A选项，（复议法）第17意定：“申请人、第三人可以委托一至二师、基层法律服务工作者或者其他代理代表为参加行政复议。申请人、第三人委托人的，应当向行政复议机构提交授权书、委托人及被委托人的身份证明文件有？权委托书应当载明委托事项、权限限”，因此A、C、D选项正确，B选误。在行政复议程序可委托的代理人参加","chapter":"第一章 行政复议的相关规定"},
  {"id":342,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，下列哪些情形可以申请行政复议？（多选）","options":{"A": "李某对某行政机关作出的行政强制措施执行决定不服", "B": "齐某向某行政机关申请行政许可，在法定期限内，行政机关未予答复", "C": "何某对某行政机关作出的征收征用决定不服", "D": "孙某对某市场监督管理局就其与货某之间的专利侵权纠纷作出的赔偿调解不服"},"answer":"BD","explanation":"。A选项，（复议法）第19条规定：“公民、法人或者其他组织对行政行为不厦申请行政复议的，作出行政行为的行政机关或者法律、法规、规章设权的组织是被申请人。两个以上行政机关以共同的名义作出同一行政行为的，共同作出行政行为的行政机关是被申请人。行政机关委托的组织作出行政行为的，委托的行政机关是被申请人。作出行政行为的行政机关被缴销或者职权变更的，继续行使其职权的行政机关是被中请人”，因此A、C选项错误，B、D选项正确。（新编）","chapter":"第一章 行政复议的相关规定"},
  {"id":343,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，下列哪些情形可以申请行政复议？（多选）","options":{"A": "村民李某认为乡政府批准给村民张某的宅基地侵占了其承包的耕地", "B": "孙某认为市公安局发布的其在高铁上与他人争抢座位的处理决定侵害了其隐私权", "C": "赵某对劳动行政部门作出的工伤认定结论不服", "D": "刘某因受到公安机关的刑讯通供而服刑，出狱后要求行政机关给予赔偿，对行政机关作出不予赔偿的决定不服"},"answer":"AC","explanation":"。A、D选项，（复议条例）第14条规定：行政机关设立的派出机构、内设机构或者其他组织，未经法律、法规授权，对外以自己名义作出具体行政行为的，该行政机关为被申请人”，因此A选项正确，D选项错误。B选项，（复议条例）第12条第1款规定：“行政机关与法律、法规授权的组织以共同的名义作出具体行政行为的，行政机关和法律、法规投权的组织为共同被申请人”，因此B选项错误。C选项，（复议条例）第13条规定：“下级行政机关依照法律、法规、规章规定，经上级行政机关批准作出具体行政行为的，批准机关为被申请人”，因此C选项正确。（2011改编）","chapter":"第一章 行政复议的相关规定"},
  {"id":344,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，下列哪些情形不可以申请行政复议？多选）","options":{"A": "王某对县政府解除特许经营协议不服", "B": "公务员李某对其所在的行政机关对其作出的记大过行政处分不服", "C": "赵某对某行政机关就其与周某之间的民事纠纷作出的调解不服", "D": "曾某对国家知识产权局《专利审查指南》中有关创造性判断方法相关规定不服"},"answer":"ABCD","explanation":"。根据（复议法》第17条，申请人、第三人委托代理人的，应当向行政复议机构提交授权委托书、委托人及被委托人的身份证明文件。授权委托书应当载明委托事项、权限和期限。申请人、第三人变更或者解除代理人权限的，应当书面告知行政复议机构。因此A、B、C、D选项正确。（新编）","chapter":"第一章 行政复议的相关规定"},
  {"id":345,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，公民在对具体行政行为申请行政复议时，可以对下列哪些规定一并提出审查申请？（多选）","options":{"A": "国务院部门规章", "D": "地方人民政府规章", "C": "乡、镇人民政府的规定"},"answer":"ABC","explanation":"。《行政复议法实地务纠）规定：“行政复议期问，行政复议机构请人以外的公民、法人或者其他组织与变的具体行政行为有利害关系的，可以其作为第三人参加行政复议。行政问，申请人以外的公民、法人或者其他与被审查的具体行政行为有利害关系的以向行政复议机构申请作为第三人政复议。第三人不参加行政复议，不影政复议案件的审理”，因此A、B、C：确，D选项错误。（新编）","chapter":"第一章 行政复议的相关规定"},
  {"id":346,"topic":"专题四 行政复议法","type":"single","question":"当事人对某省知识产权局的行政行为不服提起行政复议时，可以一并请求行政复议机关对该行政行为所依据的下列哪一文件进行审查？（单选）","options":{"A": "《中华人民共和国专利法实施细则》", "B": "该省人大常委会制定的《专利保护条例》", "C": "国家知识产权局制定的《专利行政执法办法》", "D": "该省知识产权局制定的《关于加强专利保护的规定》"},"answer":"B","explanation":"。根据《复议法）第24条的频县级以上地方各级人民政府管辖对本民政府工作部门作出的行政行为不展政复议案件。本题中，县农业农村局和林公安局以共同名义作出处罚，应向其县人民政府申请行政复议，因此A、C项错误，B选项正确。（新编）","chapter":"第一章 行政复议的相关规定"},
  {"id":347,"topic":"专题四 行政复议法","type":"single","question":"下列当事人提起的复议，哪些属于行政复议受案范围？（多选）","options":{"A": "某造纸厂向市水务局申请发放取水许可证，市水务局作出不予许可决定，该厂不服而申请复议", "B": "食品药品监管局向申请餐饮服务许可证的李某告知补正申请材料的通知，李某认为通知内容违法而申请复议", "C": "化肥厂附近居民要求生态环境局提供对该厂排污许可证监督检查记录，遭到拒绝后申请复议大中", "D": "某国土资源局以建城市绿化带为由撤回向甲公司发放的国有土地使用权证，该公司不服而申请复议"},"answer":"B","explanation":"。本题中，区教育局属于人民工作部门，对其行政行为不服，根据（法》第24条的规定，可以向该部门的本民政府即该区政府申请复议，因此A、选项错误，B选项正确。（2012改编）","chapter":"第一章 行政复议的相关规定"},
  {"id":348,"topic":"专题四 行政复议法","type":"single","question":"根据行政复议法及相关规定，下列哪些说法是正确（多选）","options":{"A": "有权申请行政复议的公民死亡的、其近亲属市政复议", "B": "有权申请行政复议的公民为无民事行为能力定代理人可以以自己的名义申请行政复议", "C": "有权申请行政复议的公民为限制民事行为能法定代理人可以代为申请行政复议", "D": "有权申请行政复议的法人或者其他组织终止义务承受人可以申请行政复议"},"answer":"A","explanation":"。根据（复议法）第24条第1规定，对本级人民政府依法设立的派出作出的行政行为不服的，由本级人民致辖，因此A选项正确，B、C、D选项等（新编）","chapter":"第二章 行政复议参加人"},
  {"id":349,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，下列关于复议申法哪些是正确的？（多选）","options":{"A": "合伙企业申请行政复议的，应当以核准登记的请人", "B": "合伙企业以外的其他合伙组织申请行政复议伙人共同申请行政复议", "C": "股份制企业的股东会认为某行政机关作出的行为侵犯该企业合法权益的，可以以该企业的名义复议", "D": "股份制企业的董事会认为行政机关作出的行犯企业合法权益的，可以以董事会的名义申请行政复"},"answer":"AC","explanation":"。A选项，根据（行政诉论法）条的规定，张某对省人民政府的行政行服可以直接向法院提起行政诉讼，因此项正确。B选项，根据（复议法）第26条定，张某可以申请复议，对行政复议决！服可以再提起行政诉讼，也可以向国务！","chapter":"第二章 行政复议参加人"},
  {"id":350,"topic":"专题四 行政复议法","type":"single","question":"关于行政复议代表人的行为效力，以下哪些说的？多选）","options":{"A": "代表人参加行政复议的所有行为对其代表的发生效力", "B": "代表人变更行政复议请求应当经被代表的申请", "C": "代表人承认第三人请求应当经被代表的申请人", "D": "代表人承认被申请人提出证据的真实性应当的申请人同意"},"answer":"D","explanation":"。根据（复议法）第26条的规定，对省人民政府、国务院部门作出的（限于省级政府机关成国务院本部门作出的行政行为）行政复议决定不服的，可以向人民法院提起行玖诉讼：也可以向国务院申请裁决，国务院依照本法的规定作出最终裁决，因此D选项正确。（新编）","chapter":"第二章 行政复议参加人"},
  {"id":351,"topic":"专题四 行政复议法","type":"single","question":"关于行政复议中的委托代理人，以下说法正（多选）","options":{"A": "申请人或第三人最多可以委托2名代理人复议", "B": "申请人或第三人只能委托律师、基层法律服务工作者、近亲属代为参加复议", "C": "委托代理人应当向复议机构提交授权委托书，委托人以及被要托人的身份证明文件", "D": "委托书应当载明委托事项的权限和期限"},"answer":"B","explanation":"。（复议法）第24条第3款规定：“省、自治区人民政府依法设立的派出机关参照设区的市级人民政府的职资权限，管辖相关行政复议案件”，大兴安岭地区行政公暑是黑龙江省人民政府设立的派出机关，对该派出机关下属的区人民玫府行政行为不服，应向该派出机关即大兴安岭地区行政公暑申请行政复议，因此B选项正确。（新编）","chapter":"第二章 行政复议参加人"},
  {"id":352,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，下列关于行政复议被申请人的哪些说法是正确的？（多选）","options":{"A": "两个以上行政机关以共同的名义作出同一行政行为的，其中任何一个行政机关可以单独作为被申请人", "B": "法律、法规、规章授权的组织作出行政行为的，该组织是被申请人", "C": "行政机关委托的组织作出行政行为的，被委托的组织是被申请人", "D": "作出行政行为的行政机关被撤销或者职权变更的，继续行使其职权的行政机关是被申请人"},"answer":"ABCD","explanation":"。A、B、C选项，（复议法）第25条规定：“国务院部门管辖下列行政复议案件：（一）对本部门作出的行政行为不服的；（二）对本部门依法设立的派出机构依照法律、行政法规、部门规章规定，以派出机构的名义作出的行政行为不服的：（三）对本部门管理的法律、行政法规、部门规章投权的组织作出的行政行为不服的”，因此A、B、C选项正确。D选项，（复议法）第19条第3款规定：“行政机关委托的组织作出行政行为的，委托的行政机关是被申请人”，国务院部门委托其他单位作出行政行为的，该国务院部门是被申请人，应当向该国务院部门申请复议，因此D选项正确。（新编）","chapter":"第二章 行政复议参加人"},
  {"id":353,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，下列关于行政复议的被申请人的说法哪些是正确的？（多选）","options":{"A": "行政机关设立的派出机构，未经法律、法规授权，对外以自己名义作出具体行政行为的，该行政机关为被申请人", "B": "行政机关与法律、法规授权的组织以共同的名义作出具体行政行为的，仅行政机关为被申请人", "C": "下级行政机关依照法律、法规、规章规定，经上级行政机关批准作出具体行政行为的，批准机关为被申请人", "D": "行政机关设立的内设机构，未经法律、法规授权，对外以自己名义作出具体行政行为的，该内设机构为被申请人"},"answer":"BC","explanation":"。根据（复议法》第24条、第25条的规定，省、自治区、直辖市人民政府管辖对本机关作出的行政行为不展的行政件：国务院部门管辖对木部门作出的行票出行政行为的行政机构自身复认的气务院部门和省级政府，因此A、1)选项的B、C选项正确。（新编）","chapter":"第二章 行政复议参加人"},
  {"id":354,"topic":"专题四 行政复议法","type":"multiple","question":"对于复议申请人委托代理人参加复议的，以下哪些文件应当提交至行政复议机构？多选）","options":{"A": "载明委托事项、权限和期限的授权委托书", "B": "委托人身份证明文件2026年专利代理师资格考议", "C": "变更代理人权限的书面文件", "D": "被委托人身份证明文件"},"answer":"AC","explanation":"。A、C选项，（复议法）第27导的行政机关、税务和国家安全机关的行议”，因此A、C选项正确。B选项，根物（1议法》第24条的规定，县级以上地方名级人民政府管辖对本级人民政府工作部门作的行政行为不服的行政复议案件，县级公机关属于县政府的工作部门，应当向县动申请复议，不能向上一级公安机关中请议，因此B选项错误。D选项，根据（复法》第24条的规定，省、自治区、直辖市人员政府管辖对本机关作出的行政行为不原行政复议案件，不能向国务院申请行动议，因此D选项错误。（2011改编）","chapter":"第二章 行政复议参加人"},
  {"id":355,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，有关行政复议第三人，下列说法哪些是正确的？（多选）","options":{"A": "行政复议机构可以通知第三人参加复议程序", "B": "第三人可以向行政复议机构申请参加行政复议", "C": "第三人同申请行政复议的具体行政行为应当有利害关系", "D": "第三人不参加行政复议会影响复议案件的申请"},"answer":"BC","explanation":"。《复议法》第28条规定：“对行行政复议机构职责的地方人民政府司行政部门的行政行为不服的，可以向本级人民政府申请行政复议，也可以向上一级司主行政部门申请行政复议”，河西区司法局河西区政府的司法行政部门，并且负责河西区政府的行政复议案件，对该部门作的行政行为，可以向本级政府即河百区政申请复议，也可以向上一级司法行政部门天津市司法局申请复议，因此A、D选误，B、C选项正确。（新编）","chapter":"第二章 行政复议参加人"},
  {"id":356,"topic":"专题四 行政复议法","type":"multiple","question":"根据某地级市人民政府关于保护水域生态环境、打击涉渔违法行为的部署安排，某县农业农村局和该县森林公安局对某水库开展联合执法巡查。在巡查过程中，两部门以共同名义对李某非法捕鱼的设备进行了收缴。李某不服，拟申请行政复议。根据行政复议法及相关规定，李某应当向下列哪个机关申请行政复议？（单选）","options":{"A": "该市人民政府", "B": "该县人民政府", "C": "该市农业农村局", "D": "该市森林公安局"},"answer":"BC","explanation":"。A选项，必须是侵犯已经发取得的自然资源权益，才属于复议前量的件，肖某是初次申请使用农村宅基地，不！要复议前置，因此A选项错误。B选项，","chapter":"第二章 行政复议参加人"},
  {"id":357,"topic":"专题四 行政复议法","type":"multiple","question":"张某对某市辖区教育局作出的一项行政行为不服，欲申请行政复议。根据行政复议法及相关规定，下列哪项说法是正确的？（单选）","options":{"A": "张某可向该区教育局申请行政复议", "B": "张某可向该区政府申请行政复议", "C": "张某可向该市教育局申请行政复议", "D": "张某可向该市政府申请行政复议"},"answer":"CD","explanation":"。A选项，提出行政复议有时间限制，因此A选项错误。B、C选项，（复议法》第87条规定：“行政复议机关受理行政复议申请，不得向申请人收取任何费用。”，因此B选项错误，C选项正确。D选项，《复议法》第22条规定：“申请人申请行政复议，可以书面申请：书面申请有困难的，也可以口头申请。”，因此D选项正确。（新编）","chapter":"第二章 行政复议参加人"},
  {"id":358,"topic":"专题四 行政复议法","type":"multiple","question":"对本级人民政府设立的派出机关作出的行政行为不服114-的，应当向下列哪个机关申请行政复议？（单选）","options":{"A": "本级人民政府", "B": "本级人民政府的上一级政府", "C": "作出该行政行为的派出机关", "D": "人民法院"},"answer":"ABCD","explanation":"。一般情况下，提出行政复议申请的期限为自知道或者应当知道行政行为之日起60日，若行政机关未告知申请行政复议的权利、行政复议机关和申请期限的，申请期限自知道或者应当知道行政行为内容之日起最长不得超过1年，若申请人一直不知道行政行为的，可以自行政行为作出之日起5年内申请行政复议，涉及不动产的，可以自行政行为作出之日起20年内申请行政复议，因不可抗力或者其他正当理由耽误法定申请期限的，申请期限自障碍消除之日起他续计算、因此A、B、C、D孩项均蒸情：（新编）","chapter":"第二章 行政复议参加人"},
  {"id":359,"topic":"专题四 行政复议法","type":"multiple","question":"张某不服河北省人民政府作出的征收征用补偿决定，可以通过下列哪些途径寻求救济？多选）","options":{"A": "直接向人民法院提起行政诉讼", "B": "直接向国务院申请裁决", "C": "向该省人民政府提出行政复议申请", "D": "向国务院提出行政复议申请"},"answer":"ABC","explanation":"。A、B选项，根据（复该头）繁22条的规定，申请人申请行政复议，可以面申请：书面申请有图难的，也可以口头请。书丽申请的，可以通过邮寄或者行政复议机关指定的互联网渠道等方式银文行政复议申请书，也可以当团银交行改复议中请书，因此A、B选项正确。C通项，（复议条例）第18条第1款规定：“申请人书5面中请行政复议的，可以采服当面递交、邮寄成者传真等方式提出行政复议申请”，因此C选项正确。D选项，（复议法》第22条第4款规定：“申请人对两个以上行政行为不服的，应当分别申请行政复议”，因此D选项错误。（2013改编）","chapter":"第二章 行政复议参加人"},
  {"id":360,"topic":"专题四 行政复议法","type":"multiple","question":"对省级人民政府的复议决定不服的，下列哪项说法是正确的？（单选）","options":{"A": "只能向人民法院提起诉讼", "B": "先向国务院申请裁决，如果仍然不服的，向人民法院提起诉讼", "C": "只能向国务院申请作出最终裁决", "D": "向人民法院提起行政诉讼或者申请国务院作出最终裁决"},"answer":"ABCD","explanation":"。《复议条例》第18条规定：中请人书面中请行政复议的，可以采取当面递交、邮寄或者传真等方式提出行政复议申请。有条件的行政复议机构可以接受以电子邮件形式提出的行政复议申请”，因此A、B、C、D选项均正确。（新编）","chapter":"第二章 行政复议参加人"},
  {"id":361,"topic":"专题四 行政复议法","type":"multiple","question":"大兴安岭地区行政公署是黑龙江省人民政府设立的派出机关，张某对其下属的加格达奇区人民政府作出的强制拆除房屋附属设施的行政行为不服，应当向下列哪个机关申请复议？（单选）","options":{"A": "黑龙江省人民政府", "B": "大兴安岭地区行政公署", "C": "加格达奇区人民政府", "D": "呼伦贝尔市人民政府"},"answer":"ABC","explanation":"。《复议法）第30条第1款规定：“行政复议机关收到行政复议申请后，应当在五日内进行审查。对符合下列规定的，行政复议机关应当子以受理：（一）有明确的中请人和符合本法规定的被申请人（三）有具体的行政复议请求和理由：（六）属于本机关的管辖范围；（七）行政复议机关未受理过该申请人就同一行政行为提出的行政复议申请，并且人民法院未受理过该申请人就同一行政行为提起的行政诉讼”，因此A、B、C选项符合受理条件，D选项不符合受","chapter":"第二章 行政复议参加人"},
  {"id":362,"topic":"专题四 行政复议法","type":"single","question":"国务院部门管辖下列哪些行政复议案件？多选）","options":{"A": "对本部门作出的行政行为不服2026年专利代理师资格考议", "B": "对本部门依法设立的派出机构依照法律、行政法规、部门规章规定，以派出机构的名义作出的行政行为不服", "C": "对本部门管理的法律、行政法规、部门规章授权的组织作出的行政行为不服", "D": "对本部门委托的其他单位作出的行政行为不服"},"answer":"B","explanation":"，根据（复误法）诺30条第1恢的规定，行政复以机关收行政复议中请府，应当在5日内选行审益，因此段选项正确。（祈编）","chapter":"第二章 行政复议参加人"},
  {"id":363,"topic":"专题四 行政复议法","type":"multiple","question":"行政复议案件中，下列哪些情形属于原作出行政行为的行政机关自身复议的？（多选）","options":{"A": "对副省级城市的市级政府所作行政决定不服而申请行政复议的", "B": "对国务院各部门所作行政决定不服而申请行政复议的", "C": "对省级政府所作行政决定不服而申请行政复议的", "D": "对下级行政机关依法律规定经上级行政机关批准而作出的行政决定不服的，提起行政复议"},"answer":"BC","explanation":"，A.B透项，（复以法）第30条第2款规定：“对不符合规定的行政笑议申请，行政复以机关应当在审查期限内央定不予受理并说明理由：不属干本机美管错的，还应当在不予受理决定中告知申请人有管权的行政复以机美”，国此A选项错误，B逸项正确。C、D选项，（复误法）第31条规定：“行玖复议申请材料不齐全或者教递不清施，无法判断行政复议中请是否符合（复议法》有关受理条件规定的，行政复议机关应当自收到申请之日起S日内书面通知申请人补正中请人应当自收到补正通知之日起10日内提交补正材料。有正当理由不能按期补正的，行政复议机关可以延长合理的补正期限。无正当理由逾期不补正的，视为申请人放弃行政复议申请，并记录在案”，因此C选项正确，D选项错误。（新编）","chapter":"第二章 行政复议参加人"},
  {"id":364,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，下列关于行政复议受理机关的说法哪些是正确的？多选）","options":{"A": "对外汇管理行政机关的行政行为不服的，向其上一级主管部门申请行政复议", "B": "对县级公安机关的行政行为不服的，可以向该县人民政府申请行政复议，也可以向上一级公安机关申请行政复议", "C": "对海关的行政行为不服的，向其上一级主管部门申请行政复议", "D": "对省级人民政府的行政行为不服的，可以向省人民政府申请行政复议，也可以向国务院申请行政复议"},"answer":"ABCD","explanation":"。《复议法）第32条规定：“对当场作出或者依据电子技术监控设备记录的违法事实作出的行政处罚决定不服申请行政复议的，可以通过作出行政处罚决定的行政机关提交行政复议申请。行政机关收到行政复议申请后，应当及时处理；认为需要维持行政处罚决定的，应当自收到行政复议申请之日起五日内转送行政复议机关”。本题中，张某除可以直接向复议机关北京市政府提交行政复议申请外，也可以通过原行政机关北京市公安局交通管理局向北京市政府提交行政复议申请，因此A、B、C、选项均正确。D选项，北京市公安局交通管理局收到复议申请后，认为决定不合法的，应当及时处理，即变更或据销原列销决定，因致1选项正确。（新编）","chapter":"第二章 行政复议参加人"},
  {"id":365,"topic":"专题四 行政复议法","type":"single","question":"天津市河西区司法局是河西区政府受理的行政复议的复议机构，对河西区司法局针对某律师事务所作出的处罚决定，该律师事务所不服，可以向下列哪些机关申请复议？（多选）","options":{"A": "天津市人民政府", "B": "天津市河西区人民政府", "C": "天津市司法局", "D": "天津市河西区司法局"},"answer":"D","explanation":"。根据（复议法）第33条的规货，行政复议机关受理行政复议申请后，发现适行政复议申请不符合《行政复议法）有关受理条件规定的，应当决定股回申请并说明理由。王某在申请行政复议之前已向人民法院提起行政诉讼并被受理，不符合行政复议申请条件，但行政复议机关是在受理该申请后才发现其不符合受理条件，应驳回该行政复议申请，因此A、B、C选项错误，D选项正确。（新编）","chapter":"第二章 行政复议参加人"},
  {"id":366,"topic":"专题四 行政复议法","type":"single","question":"育某提出农村宅基地用地申请，乡政府审核后报县政有审批。肖某收到批件后，不满批件所核定的而积。下列哪些选项是正确的7（多选）","options":{"A": "肖某频先中请复议，方能提起行政诉讼", "B": "肖某申请行政复议，复议机关为县政府的上一级政府", "C": "肖某中请行政复议，应当自签收批件之日起60日内提出复议申请", "D": "肖某申请行政复议，县政府是被申请人，乡政府为第三人"},"answer":"B","explanation":"。根据（复议条例）第48条第1款的规定，受理行政复议中请后，发现该行玖复议申请不符合行政复议法和本条例规定的受理条件的，行政复议机关应当决定驳回行政复议申请，因此A、C、D选项错误，B选项正确。（新编）","chapter":"第二章 行政复议参加人"},
  {"id":367,"topic":"专题四 行政复议法","type":"single","question":"某专利代理机构对吊销其专利代理机构执业许可证的决定不服，拟申请行政复议。根据行政复议法及相关规定，下列说法哪些是正确的？多选）","options":{"A": "该专利代理机构可以随时提出书面申请", "B": "行政复议机关受理行政复议申请，应当向该专利代理机构收取复议申请费", "C": "行政复议机关受理行政复议申请，不得向该专利代理机构收取任何费用", "D": "该专利代理机构可以在法定期限内口头申请"},"answer":"B","explanation":"。《复议法》第35条规定：“公民、法人或者其他组织依法提出行政复议申请，行政复议机关无正当理由不予受理、驳回中请或者受理后超过行政复议期限不作答复的，申请人有权向上级行政机关反映，上级行政机关应当贵令其纠正；必要时，上级行政复议机关也可以直接受理”；因此A、C、D选项错误，B选项正确。（2019改编）","chapter":"第三章 行政复议程序"},
  {"id":368,"topic":"专题四 行政复议法","type":"single","question":"因李某长期在外打工，其存放在路边的一辆电动车被街道办事处当作无主物予以没收处理，以下说法哪些是正确的？（多选）","options":{"A": "李某不服该决定的，应当自知道或者应当知道该决定之日起60日内申请行政复议", "B": "通知书中未载明当事人申请行政复议期限及复议机关，李某可以自知道或者应当知道决定之日起1年内申请行政复议2026年专利代理师费格考试", "C": "李某一直不知道其电动车被没收，可以自决定作出之日起5年内申请行政复议", "D": "因不可抗力或者其他正当理由耽误法定申请期限的，申请期限自障碍消除之日起继续计算"},"answer":"A","explanation":"。《复议法》第31条第2款规定：中请人应当自收到补正通知之日起10日内提交补正材料”，因此，A选项正确。（新编）","chapter":"第三章 行政复议程序"},
  {"id":369,"topic":"专题四 行政复议法","type":"multiple","question":"林某不服县教育局对其作出的某行政行为，欲向行政复议机关申请行政复议。根据行政复议法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "林某若书面申请有困难，可以口头申请行政复议", "B": "林某可以通过互联网渠道以电子方式书面申请行政复议", "C": "林某可以通过传真方式申请行政复议", "D": "林某对县教育局两个以上行政行为不服的，可以一同申请行政复议"},"answer":"ABCD","explanation":"。《复议法）第37条第1款规定：“行政复议机关傲服法律、法规、规章审星行政复以案体”，因此A、B、C、D选项均正确。新编）","chapter":"第三章 行政复议程序"},
  {"id":370,"topic":"专题四 行政复议法","type":"multiple","question":"关于行政复议的申请方式，下列说法哪些是正确的？（多选）","options":{"A": "申请人可以采取当面递交方式提出行政复议申请", "B": "有条件的行政复议机构可以接受以电子邮件形式提出的行政复议申请", "C": "申请人可以采取邮寄方式提出行政复议申请", "D": "申请人可以采取传真方式提出行政复议申请"},"answer":"BD","explanation":"。A、B透项，（复议法）第44条第1款规定：“被中请人对其作出的行政行为的合法性，适当性负有举证责任”，因此A选项错误，B选项正确。根据（复议法）第44条第2款的规定，中请人认为被申请人不履行法定职责或者提出行政赔偿请求的，申请人负有举证责任，因此C选项错误，D选项正确。（新编）","chapter":"第三章 行政复议程序"},
  {"id":371,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，以下哪些符合行政复议的受理条件？多选）","options":{"A": "申请人明确", "B": "行政复议请求和理由具体", "C": "属于复议机关的管辖范围", "D": "行政复议机关就同一行政行为受理过申请人提出的行政复议申请"},"answer":"AB","explanation":"。A、B选项，行政复议机关调查取证方式有两种，一是主动调查取证，二是根据申请人的申请调查取证，因此A、B选项正确。C选项，由于行政机关本身具有较强的调查取证能力，且应当在行政行为作出之前就完成调查取证，因此行政机关不能申请复议机关调查取证，C选项错误。D选项，《复议法》第45条第2款规定：“调查取证时，行政复议人员不得少于两人…”，因此D选项错误。（新编）","chapter":"第三章 行政复议程序"},
  {"id":372,"topic":"专题四 行政复议法","type":"multiple","question":"S1","options":{"C": "711", "D": "10"},"answer":"AD","explanation":"。A选项，《复议法）第41条规定：“行政复议期间有下列情形之一的，行政复议机关决定终止行玫复议：（一）申请人数回行政复议申请，行政复议机构准予撤回”，因此行政复议申请可以撤回，A选项正确。B、C、D选项，（复议法）第47条规定：“行政复议期间，申请人、第三人及其委托代理人可以按照规定查阅、复制被申请人提出的书面答复、作出行政行为的证据、依操和其他有关材料，除沙及国农秘密、商业秘宙、个人隐私成者可他危及国家安全、公[μ共安全：社会稳定的情形外，行改复议机约应当同意”，因此B、C选项错误，D选项正确。（新编）","chapter":"第三章 行政复议程序"},
  {"id":373,"topic":"专题四 行政复议法","type":"multiple","question":"关于行政复议机关收到行政复议申请后，对材料进行审查，以下做法正确的有？（多选）","options":{"A": "行政复议机关认为不属于本机关管辖，应当作出驳回行政复议申请的决定", "B": "行政复议机关认为不属于本机关管辖，应当作出不予受理的决定", "C": "行政复议机关认为复议申请材料表述不清楚，无法判断是否符合受理条件，通知申请人进行补正", "D": "行政复议申请人收到补正通知书后，无正当理由不补正的，行政复议机关应当作出不予受理的决定"},"answer":"CD","explanation":"。A选项，行政复议机关应当在收到行政复议中请的5日内审查是否符合受理条件，因此A选项借误。B选项，木题不符合适用简易程序的条件，应当适用普通程序，行政复议机构应当自行政复议中请受理之日起7日内将中请书副水或笔录复印件发送价被中请人，因此B选项借误。C造项，（复议法》第31条第1款规定：“行政复议中请材料不齐全或者表述不清楚，无法判断行政复议中请是否符合本法第30条第1款规定的，行政复议机关应当自收到中请之日起5日内书面通知中请人补正….”，因此C选项正确。D选项，《复议法》第48条规定：“被申请人应当自收到行政复议申请书副本或者行政复议申请笔录复印件之日起10日内，提出书面答复，并提交作出行政行为的证据、依据和其他有关材料”，因此对于适用普通程序的案件，D选项正确。（新编）","chapter":"第三章 行政复议程序"},
  {"id":374,"topic":"专题四 行政复议法","type":"multiple","question":"张某对北京市公安局交通管理局依据电子技术监控设备记录的违法事实作出的行政处罚决定不服申请行政复议，以下说法哪些是正确的？多选）","options":{"A": "张某可以直接向北京市政府提交行政复议申请", "B": "张某可以通过北京市公安局交通管理局向北京市政府提交行政复议申请", "C": "北京市公安局交通管理局收到复议申请后，认为需要维持行政处罚决定的，应当自收到行政复议申请之日起5日内转送北京市政府", "D": "北京市公安局交通管理局收到复议申请后，认为决定不合法的，应当变更或撤销原行政处罚决定"},"answer":"BD","explanation":"。《复议法》第52条规定：“县级以上各级人民政府应当建立相关政府部门、专家、学者等参与的行政复议委员会，为办理行政复议案件提供咨询意见，并就行政复议工作中的重大事项和共性问题研究提出意见。行政复议委员会的组成和开展工作的具体办法，由国务院行政复议机构制定。审理行政复议案件涉及下列情形之一的，行政复议机构应当提请行政复议委员会提出咨询意见：（一）案情重大、疑难、复杂；…（三）省、自治区、直辖市对本机关作出的行政行为不服进行管辖的行政复议案件：”，.A选项复议委员会只能作出咨询意见，不能作出复议决定；B选项属于提请复议委员会作出咨询意见的情形：C选项目前并未要求国务院工作部门也成立行政复议委员会：D专圆四行政算议法请明甘关是以委爸质责的选法正喻.（辨循）","chapter":"第三章 行政复议程序"},
  {"id":375,"topic":"专题四 行政复议法","type":"multiple","question":"某行政复议机关受理王某提出的行政复议申请后，发现王某在申请行政复议之前已向人民法院提起行政诉讼并被受理。根据行政复议法及相关规定，该行政复议机关应当如何处理？（单选）相关店强化600院2026年专利代理师资格有认","options":{"A": "通知人民法院中止审理该行政诉讼", "B": "将该案移送人民法院一并审理", "C": "中止审理，在人民法院作出生效判决后维续审理", "D": "驳回该行政复议申请"},"answer":"AB","explanation":"。A违项，干非业济是，付义券失底明高，争以不大的囊作才以连用简疹世庐：光外。非才普非人同意，以个以进用简府偿岸，回光人违府正喻，日通爪，进用简享偿岸的行皮健以其作，可以不当劳散居见、井证，用共进停节普理，因此仔选项正崎。C逐项，简侵序中，民中请人应首自收时行政复以前本之日超今日内提交作出行议行力的证据，做和赁他价英桥，旧北C资项借供。D选项，紧作湾庆获3000完以下俏，米可以造用信身程序，因此D逸项借读。（瞬）","chapter":"第三章 行政复议程序"},
  {"id":376,"topic":"专题四 行政复议法","type":"multiple","question":"某行政复议机关受理行政复议申请后、发现该行政复议申请不符合行政复议法和行政复议法实施条例规定的受理条件。根据行政复议法及相关规定，该行政复议机关应当如何受理？（单选）","options":{"A": "作出终止行政复议的决定", "B": "作出驳回行政复议申请的决定", "C": "作出不予受理的决定", "D": "作出维持具体行政行为的决定"},"answer":"AC","explanation":"。A.D逸项，（凭以决》46签第1峡院定：“行攻复以期问，快中请人不得自行句中请人和其他有关单位成着个人收集还借：自行收集的证不作力认定行次行力合法偿、连当性的次语”，四北A逸项正确，D选项借候。B逸项，（复议法》铭48条规定：”·.使中请人血当自收到行政复以中请节副本成行政复以申请笔染复印体之日起10日内，提出仔留容复，并提交作出行攻行力的证据、依据和其他有关材料”，国此B选项错误。C逸项，（复议法》第70条规定：“申请人不授本法第48条、第54条的规定提出卡面答复、提交作出行政行力的证据、依据和其他有关材料的，规为该行政行为没有证据、依物，行政复议机关决定缴销、部分盛销谊行政行劳，确认设行政行方进法、无效或者决定中请人在一定限内是行…”，因此C选项正确（2011改编）","chapter":"第三章 行政复议程序"},
  {"id":377,"topic":"专题四 行政复议法","type":"multiple","question":"公民、法人或者其他组织依法提出行政复议申请，行政复议机关无正当理由不予受理的情况下，下列说法正确的是？（单选）","options":{"A": "上级行政机关应当责令其纠正，但不可以直接受理", "B": "上级行政机关应当责令其纠正，必要时，上级行政机关也可以直接受理", "C": "上级行政机关无权责令其纠正，必要时，上级行政机关可以直接受理", "D": "上级行政机关无权责令其纠正，也不能直接受理"},"answer":"ABC","explanation":"。（复议法）第39条第1款规定：“行政复议期回有下列情形之一的，行政复议中止：（二）作为申请人的公民丧失参加行政复议的行为能力，尚未确定法定代理人参加行政复以：（三）作为申请人的公民下落不明…（八）行政复议聚件审理需要以其他案件的审理结果为依据，面其他紫件尚未申结”，因此A、B、C选项属复议中止情形，D选项属干复议终止情形。（新福）","chapter":"第三章 行政复议程序"},
  {"id":378,"topic":"专题四 行政复议法","type":"multiple","question":"行政复议申请材料不齐全或者表述不清楚，无法判断行政复议申请是否符合受理条件的，行政复议机关应当书面通知申请人补正，申请人收到行政机关发出的补正通知书后，应当自收到补正通知之日起（）日内提交补正材料？（单选）","options":{"A": "10", "B": "7", "C": "15", "D": "30"},"answer":"ABC","explanation":"。（复议法）第41条规定：“行改复议期向有下列情形之一的，行政复议机关决定终正行政复议：（一）申请人撤回行政复议申请，行政复议机构准予撒回：（二）作为申请人的公民死亡，没有近亲属或者其近亲属放弃行政复议权利：（三）作为申请人的法人或者其他组织终止，没有权利义务承受人或者其权利义务承受人放弃行政复议权利；（四）申请人对行政拘留或者限制人身自由的行政强制措施不服申请行政复议后，因同一违法行为涉嫌犯罪，被采取刑事强制措施...”，因此A、B、C选项属于可以终止复议情形，D选项因其他违法行为涉嫌犯罪对该行政复议不子终止。（新编）","chapter":"第三章 行政复议程序"},
  {"id":379,"topic":"专题四 行政复议法","type":"multiple","question":"以下哪些属于行政复议机关审理行政复议案件的依据？（多选）","options":{"A": "法律", "B": "法规", "C": "国务院部门规章", "D": "地方各级人民政府规章"},"answer":"BCD","explanation":"。《复议法》第42条规定：“行政复议期间行政行为不停止执行；但是有下列情形之一的，应当停止执行：（一）被申请人认为需要停止执行；（二）行政复议机关认为需要停止执行；（三）申请人、第三人申请停止执行，行政复议机关认为其要求合理，决定停止执行……”，A选项中的说法过于绝对，因此A选项错误，B、C、D选项正确。（新编）","chapter":"第四章 行政复议审查"},
  {"id":380,"topic":"专题四 行政复议法","type":"multiple","question":"对于行政复议审理过程中举证责任的分配，以下说法正确的有？多选）","options":{"A": "被申请人只对其作出的行政行为的合法性负有举证责任", "B": "被申请人对其作出的行政行为的合法性、适当性都负有举证责任", "C": "申请人不承担举证责任", "D": "申请人认为被申请人不履行法定职责的，负有举证责任"},"answer":"ACD","explanation":"。A选项，《复议条例》第37条规定：“行政复议期间涉及专门事项需要鉴定的，当事人可以自行委托鉴定机构进行鉴定，也可以申请行政复议机构委托鉴定机构进行鉴定”，A选项正确。B选项，《复议法》第50条第2款规定：“行政复议机构认为有必要听证，或者申请人请求听证的，行政复议机构可以组织听证”，B选项错误。C选项，根据《复议法》第41条的规定，申请人自愿撤回复议申请，经行政复议机构同意，可以撤回，行政复议终止，C选项正确。D选项，《复议法》第45条第2款规定：“调查取证时，行政复议人员不得少于两人，并应当出示行政复议工作证件”，D选项正确。因此，A、C、D选项正确。（法考2017，思维扩展）","chapter":"第四章 行政复议审查"},
  {"id":381,"topic":"专题四 行政复议法","type":"multiple","question":"下列有关行政复议机关调查取证说法正确的有？","options":{"A": "行政复议机关可以主动调查取证", "B": "行政复议机关可以根据申请人的申请调查取证", "C": "行政复议机关可以根据行政机关的申请调查取证", "D": "行政复议机关调查取证时，行政复议人员不得少于3人"},"answer":"CD","explanation":"。A、B选项，《复议法》第56条规定：“申请人依照本法第13条的规定提出对行有关规范性文件的附带审查申请，行政复议在机关有权处理的，应当在30日内依法处理；","chapter":"第四章 行政复议审查"},
  {"id":382,"topic":"专题四 行政复议法","type":"single","question":"根据行政复议法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "行政复议决定作出前，申请人可以撤回行政复议申请", "B": "在行政复议期间，只有申请人才可以查阅、复制被申请人提出的有关材料", "C": "在行政复议期间，申请人可以查阅、复制所有的证据、2026年专利北理师资协考伙材料", "D": "在行政复议期间，申请人、第三人及其委托代理人以按规定查阅、复制被申请人的证据、材料"},"answer":"C","explanation":"。根据《复议法》第62条的规定，适用普通程序审理的行政复议案件，行政复议机关应当自受理申请之日起60日内作出行政复议决定，不能在规定期限内作出行政复议决定的，经批准，可以延长，延长期限最多不得超过30日，故最多为90日，因此C选项正确。（新编）","chapter":"第四章 行政复议审查"},
  {"id":383,"topic":"专题四 行政复议法","type":"single","question":"甲市乙区卫健委因韩某未取得《医疗机构执业许可证》擅自执业，经研究，作出没收违法所得1200元和罚款7000元的决定。韩某不服，申请行政复议。关于此案，下列说法正确的是：（多选）","options":{"A": "乙区政府应当在3日内进行审查，决定是否予以受理", "B": "乙区政府应当自受理之日起5日内将申请书副本发送给乙区卫健局", "C": "韩某申请复议材料不齐全的，自收到该行政复议申请之日起5日内书面通知韩某补正", "D": "乙区卫健局应当自收到行政复议申请副本之日起10日内提交作出行政行为的证据、依据和其他有关材料"},"answer":"A","explanation":"。《复议法》第62条第2款规定：“适用简易程序审理的行政复议案件，行政复议机关应当自受理申请之日起30日内作出行政复议决定”，因此A选项正确。（新编）","chapter":"第四章 行政复议审查"},
  {"id":384,"topic":"专题四 行政复议法","type":"single","question":"关于行政复议委员会，以下说法正确的有？","options":{"A": "行政复议机构认为审理的行政复议案件案情重大、复杂、疑难，应当提请行政复议委员会作出复议决定", "B": "省政府对本机关作出的行政行为进行复议，应当提请行政复议委员会作出咨询意见", "C": "国务院工作部门应当建立行政复议委员会", "D": "行政复议委员会除对行政复议案件提供咨询意见外，还可以就行政复议工作中的共性问题研究提出意见"},"answer":"B","explanation":"。A选项，王某对区公安局的行政行为不服，应当向区政府申请复议，因此A选项错误。B选项，《复议法》第17条第1款规定：“申请人、第三人可以委托1至2名律师、基层法律服务工作者或者其他代理人代为参加行政复议”，因此B选项正确。C选项，根据《复议法》第62条的规定，适用普通程序审理的行政复议案件，行政复议机关应当自受理申请之日起60日内作出行政复议决定，不能在规定期限内作出行政复议决定的，经批准，可以延长，因此C选项错误。D选项，《复议法》第87条规定：“行政复议机关受理行政复议申请，不得向中请人收取任何费用“，因此D选项佣误。（2018改纳）","chapter":"第四章 行政复议审查"},
  {"id":385,"topic":"专题四 行政复议法","type":"multiple","question":"下列有关行政复议简易程序说法正确的是？（多选）","options":{"A": "如果行政复议案件争议较大，经当事人各方同意，也可以适用简易程序", "B": "适用简易程序的行政复议案件，可以只进行书面审理", "C": "适用简易程序的行政复议案件，申请人应当自收到行政复议副本之日起7日内提交作出行政行为的证据、依据和其他有关材料", "D": "案件涉及款额5000元以下的，可以适用简助序"},"answer":"AC","explanation":"。A选项，（复议条例>策32条规定：“行政复议机构审理行政复议案作，应当由2名以上行政复议人员参加”，因此A选项违反规定。日选项，（复议法》第62条第1数规定：“适用普通程序审理的行政复议案件，行政复议机关应当自受理申请之日起60日内作出行政复议决定·”，因此B选项符合规定。C逸项，（复议法》第63条第2款规定：“行政复议机关不得作出对申请人更为不利的交更决定…”，因此C选项违反规定。D选项，《复议法》第50条第1款规定：“审理重大、疑难、复杂的行政复议案件，行政复议机构应当组织听证”，因此D选项符合规定。（2018改编）","chapter":"第四章 行政复议审查"},
  {"id":386,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，下列关于行政复议证据的说法哪些是正确的？（多选）","options":{"A": "在行政复议过程中，被申请人不得自行向申请人和其他有关单位或者个人收集证据", "B": "被申请人应当自收到行政复议申请书副本15日内，提交作出行政行为的证据", "C": "被申请人未在规定的期限内提交作出行政行为的证据的，视为该行政行为设有证据，行政复议机关可以决定撤销该行政行为", "D": "被申请人自行收集的证据可以作为认定行政行为合法性、适当性的依据"},"answer":"ABC","explanation":"。《复议法》第63条第1款规定：“行政行为有下列情形之一的，行改复议机关决定变更该行政行为：（一）事实清楚，证据确凿，适用依据正确，程序合法，但是内容不适当：（二）事实清楚，证据确凿，程序合法，但是未正确适用依据：（三）事实不清、证据不足，经行政复议机关查清事实和证据”，因此A、B、C选项正确，D选项属于应当撒销行政行为的情形。（新编）","chapter":"第四章 行政复议审查"},
  {"id":387,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，下列哪些情形下行政复议中止？（多选）","options":{"A": "作为申请人的公民丧失参加行政复议的行为能力，尚未确定法定代理人参加行政复议", "B": "作为申请人的公民下落不明", "C": "案件审理需要以其他案件的审理结果为依据，而其他案件尚未审结", "D": "作为申请人的法人或者其他组织终止，其权利义务的承受人放弃行政复议权利"},"answer":"ABCD","explanation":"。（复议法》第64条第1数规定：“行政行为有下列情形之一的，行政复议机关决定撤销或者部分撤销该行政行为，并可以责令被申请人在一定期限内重新作出行政行为：（一）主要事实不清、证据不足；（二）违反法定程序：（三）适用的依据不合法：（四）超越职权或者溢用职权”，因此A、B、C、D选项均正确。（2016改编）","chapter":"第四章 行政复议审查"},
  {"id":388,"topic":"专题四 行政复议法","type":"multiple","question":"行政复议期间出现哪种情形后，行政复议终止？（多选）","options":{"A": "申请人撤回行政复议申请，行政复议机构准予撤回", "B": "作为申请人的公民死亡，其近亲属放弃行政复议权利", "C": "作为申请人的法人终止，没有权利义务承受人", "D": "申请人对行政拘留不服申请复议后，因其他违法行为涉嫌犯罪，被采取刑事强制措施"},"answer":"CD","explanation":"。A、B选项，具体行政行为主要事实不清、证据不足的，超越职权或者巡用职权的，应当决定撤销或者部分撤销该行政行为，并可以责令被申请人在一定期限内重","chapter":"第四章 行政复议审查"},
  {"id":389,"topic":"专题四 行政复议法","type":"multiple","question":"某县公安局以钟某扰乱社会秩序为由对其作出行政处罚决定，钟某不服，向县政府申请行政复议。根据行政复议法及相关规定，关于行政复议期间该行政处罚决定的执行，下列哪些说法是正确的？（多选）","options":{"A": "该行政处罚决定应当停正执行", "B": "该县公安局认为需要停止执行的，应当停止执行该行政处罚决定", "C": "该县政府认为需要停止执行的，应当停止执行该行政处罚决定", "D": "钟某申请停止执行，该县政府认为其要求合理决定停止执行的，应当停止执行该行政处罚决定"},"answer":"ABCD","explanation":"。A违，《复以法》68靠膜定：“行改柠方认定尊美清是，递借费备，逸用你通正嘴，提序合法：内容迎当的，行次复以机关决定鹰持行政行分”四北人逐项正确。B逸项《凭以法》66鲁定：“览中请人不境行法定职费的，行攻凭议机关决定中请人在一定期院内提行”，四北B逸项正确。C逸项，据《复以法》能63条的现定，事实不清，证据不足，经行改复以机义整清事实和证据，行政凭议机炎决定受更说行政行力，旧此C选项正确。D选项，概据（复仪法》第64条的规定，生是事实不清、证据不足的，决定缴镜或者部分撤销该行政行力，并可以货今被中请人在一定用限内重新作出行政行为，因此D选项正确。（2017改编）","chapter":"第四章 行政复议审查"},
  {"id":390,"topic":"专题四 行政复议法","type":"multiple","question":"关于行政复议案件的审理和决定，下列哪些说法是正确的？多选）","options":{"A": "行政复议期间涉及专门事项需要鉴定的，当事人可自行委托鉴定机构进行鉴定", "B": "审理行政复议案件，申请人提出采取听证方式审理的，行政复议机构应当采取听证方式审理", "C": "申请人在行政复议决定作出前自愿撤回行政复议申请的，经行政复议机构同意，可以撤回", "D": "行政复议人员调查取证时应向当事人或者有关人员出示证件"},"answer":"CD","explanation":"。A选项，（复议条例）第39基规定：“行政复议期问按中请人政变原具体行政行为的，不影响行玫复议能件的审理。但是，申请人依法微回行政复议中请的康外”因此A选项借误。报据（复议法）第65条的规定，拉中请人改变原违法行政行为，中请人仍要求缴销或者确认该行政行为违法的，行政复议机关确认该行改行为造法。本题中，石家庄市市场监督管理局取消了处罚决定，井对没收的产品于以归还，已经改受原违法行政行为，申请人仍要求缴销或者确认该行政行为违法，行政复议机关应当确认该行政行为违法，并不要缴销原行政行为，因此B选项错误，C、D选项正确。（新编）","chapter":"第四章 行政复议审查"},
  {"id":391,"topic":"专题四 行政复议法","type":"multiple","question":"下列有关行政复议附带审查程序说法正确的有？多","options":{"A": "申请人认为行政机关所依据的规范性文件不合法政复议机关提出附带审查，行政复议机关有权处理的，应10日内进行处理", "B": "申请人认为行政机关所依据的规范性文件不合法，向行政复议机关提出附带审查，行政复议机关无权处理的，应当在5日内转送有权处理的行政机关进行处理", "C": "行政复议机关认为被申请人作出的行政行为所依据的规范性文件不合法，行政复议机关有权处理的，应当在30日内进行处理", "D": "行政复议机关认为被申请人作出的行政行为所依据的规范性文件不合法，行政复议机关无权处理的，应当在7日内转送有权处理的行政机关进行处理"},"answer":"BCD","explanation":"。A选项中违反法定程序复机关可以选择决定撤销成者部分撤销该行政行为、并可以责今被中请人在一定期限内重新作出行政行为，不能进行变更。B选项中行政行为不适当可以变更。C选项中行改行为如果合法且适当可以作出维特决定，D选项，行政复议机关办理行政复议案件，可以进行调解，因此D选项正确。（2018改编）","chapter":"第四章 行政复议审查"},
  {"id":392,"topic":"专题四 行政复议法","type":"single","question":"适用普通程序审理的行政复议案件，行政复议机关应当自受理申请之日起最长（）日内作出行政复议决定？（单选）","options":{"A": "30", "B": "60", "C": "90", "D": "45"},"answer":"D","explanation":"。（复议法》第69条规定：“行政复议机关受理申请人认为被申请人不履行法定职责的行政复议申请后，发现被申请人汉有相应法定职责或者在受理前已经履行法定职贵的，决定驳回中请人的行政复议请求”，因此A、B、C选项借误，D选项正确。(2012）","chapter":"第五章 行政复议决定"},
  {"id":393,"topic":"专题四 行政复议法","type":"multiple","question":"适用简易程序审理的行政复议案件，行政机关应当自受理申请之日起（）日内作出行政复议决定？（单选）","options":{"A": "30", "B": "60", "C": "15", "D": "10"},"answer":"ABC","explanation":"。《复议法》第70条规定：“被中请人不按照本法第48条、第54条的规定提出书面答复、提交作出行政行为的证据、依据和其他有关材料的，视为该行政行为没有证据、依据，行政复议机关决定撤销、部分数销该行政行为，确认该行政行为违法、无效或者决定被中请人在一定期限内履行，但是行政行为涉及第三人合法权益，第三人提供证据的除外”，因此A、B、C选项正确。D选项，第三人提交了行政机关作出行政行为的证据，如果能够证明行政行为合法的，应当作为行政行为合法的依据，因此D选项错误。（新编）","chapter":"第五章 行政复议决定"},
  {"id":394,"topic":"专题四 行政复议法","type":"multiple","question":"王某在未取得营业执照的情况下，在街道上销售活鸡鸭，市城管局查获王某的无照经营行为，扣押了王某的电子秤一个，鸡鸭数只，王某在城管局实施扣押的过程中与城管人员发生冲突阻碍扣押，城管人员报警，区公安局对王某作出行政拘留5日的处罚决定，王某不服，申请行政复议，下列哪一说法是正确的？（单选）","options":{"A": "王某申请行政复议，应当向市公安局提出2026年专利代理师井格考试", "B": "王某可以委托2名代理人参加行政复议", "C": "复议机关应当在60天内作出复议决定，不得延长", "D": "复议机关可以向王某收取办理行政复议案件所需的费用"},"answer":"ABC","explanation":"。A选项，根据（复议法》第72条第1款的规定，申请行政复议时可以一井提出行政赔偿请求，因此A选项正确。B选项，《复议法》第72条第2款规定：“申请人在申请行政复议时没有提出行政赔偿请求的，行政复议机关在依法决定撤销或者部分逝销、变更罚款，撤销或者部分撤销违法集资、没收财物、征收征用、摊派费用以及对财产专圆四行政复议法的益片，世即、请等仟皮行力时，应当同时费个段中请人跌连财户，解座叶对户的计、拍界、亦结借案，良并培偿借应的价校”因出日选项正项、C.D违项，（使议法）第75答常2款定：“行政货议决定节一经进达：即发生法体发力”，因化C连项正崎，D连讯借误（折）","chapter":"第五章 行政复议决定"},
  {"id":395,"topic":"专题四 行政复议法","type":"multiple","question":"定中公司在某县建立了一家生鸡养殖场，通过暗管的方式违法排污，县生态环境局对其罚款50万元。定中公司不服，向县政府申请行政复议。本案的下列做法违反法律规定的有：（多选）","options":{"A": "县政府指定县政府法制办干部胡某单独审理此案", "B": "县政府在60日内作出了复议决定", "C": "县政府认为处罚过轻，将罚款变更为60万元", "D": "县政府认为本案疑难复杂，主动组织听证"},"answer":"ABCD","explanation":"。A连项，体特经各方普人签半或普签靠生发.井世厉金行政复议机关印集后生发。B选项，如装健议机关认方和解内容造法，成者俱警国求、世会、作人合法权益，应当不于准降。C选项，一版情况下，申请人缴回复议申请的，一事不得，但是中请人德修证明园行攻复议中价违傍其真实危现的除外。D选项，解未达成协议成者阅需传生放前一方反修的，行攻复以机英点当优法审查或者及时作出行攻凭以火定。回此A、B.C、D选项均错俱。（新编）","chapter":"第五章 行政复议决定"},
  {"id":396,"topic":"专题四 行政复议法","type":"single","question":"根据行政复议法及相关规定，以下哪些情形复议机关应当变更行政行为？多选）","options":{"A": "事实清楚，证据确凿，适用依据正确，程序合法，但是内容不适当", "B": "事实清楚，证据确凿，程序合法，但是未正确适用依据", "C": "事实不清、证据不足，经行政复议机关查清事实和证据", "D": "违反法定程序"},"answer":"D","explanation":"。A选项，控中请人是否报调解，必须基千自愿，回此人选项徘误。B途项，行政复议调解必须以调解节形式结案，因此B项错误。C选项，小王在调解卡生效前反悔，行政复议机关应当及时作出行政复议决定，因此C选项错误。D选项，行政复议调解要共干合法原则，若违反了合法原则，行政复议机关可决定缴销、变更行政行为，因此D选项正确。（司法改编）","chapter":"第五章 行政复议决定"},
  {"id":397,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法及相关规定，行政行为具有下列哪些情形的，行政复议机关可以决定撤销该行政行为，并可以责令被申请人在一定期限内重新作出行政行为？（多选）","options":{"A": "主要事实不清、证据不足", "B": "违反法定程序", "C": "滥用职权", "D": "适用的依据不合法"},"answer":"ABC","explanation":"。A选项，根据（复议法）第74条的规定，当事人达成和解后，由中请人向行政复议机构缴回行政复议申请。行政复议机构准干缴回行政复议申请、行政复议机关决定终止行致复议的，申请人不得再以同一事实和理由提出行政复议中请，因此八选项正确。B选项，根据（复议法）第22条的规定，书面申请的，可以通过邮寄成者行政复议机关指定的互联网集道等方式提交行政复议申请书，因此B选项正确。C选项，对行政复议决定不服的，可以向人民法院提起行政诉讼，因此C选项正确。D选项，国家知识产权局属于国务院部门，该商标代理机构应向国家知识产权局而不是向国务院申请行政复议，因此D选项错误。（新编）","chapter":"第五章 行政复议决定"},
  {"id":398,"topic":"专题四 行政复议法","type":"single","question":"行政复议机构对案件进行审查讨论通过后，依据不同情况可以作出哪些复议决定？（多选）","options":{"A": "具体行政行为主要事实不清、证据不足，决定确认该具体行政行为违法，并责令被申请人在一定期限内重新作出其体行政行为", "B": "被申请人超越职权的，决定变更该具体行政行为", "C": "具体行政行为违反法定程序，决定撤销该具体行政行为", "D": "被申请人不履行法定职责的，决定其在一定期限内行"},"answer":"D","explanation":"。《复议法》第77条第2款规定：“被申请人不履行或者无正当理由拖延履行行政复议决定书、调解书、意见书的，行政复议机关或者有关上级行政机关应当责令其限期履行”，因此田某可以请求某县政府责令某县公安局登记，A、B、C选项错误，D选项正确。（法考2008）","chapter":"第五章 行政复议决定"},
  {"id":399,"topic":"专题四 行政复议法","type":"single","question":"根据行政复议法及相关规定，下列关于行政复议决定的鄂些说法是正确的？（多选）","options":{"A": "行政行为认定事实清楚，证据确凿，适用依据正确，程序合法，内容适当的，行政复议机关决定维持该行政行为", "B": "被申请人不股行法定职责的，行政复议机关决定被申请人在一定期限内履行", "C": "事实不清、证据不足，经行政复议机关查清事实和证据。决定变更该行政行为", "D": "主要事实不清、证据不足，行政复议机关可以撤销该行政行为"},"answer":"A","explanation":"。根据《复议法》第78条的规定，申请人、第三人逾期不起诉又不履行维持行政行为的行政复议决定书，由作出行政行为的行政机关依法强制执行，或申请人民法院强制执行。本题中，复议机关维持原决定，应当由作出处罚决定的机关县税务局强制执行或申请人民法院强制执行，因此A选项正确，B、C、D选项错误。（2019改编）","chapter":"第五章 行政复议决定"},
  {"id":400,"topic":"专题四 行政复议法","type":"multiple","question":"河北省石家庄市市场监督管理局在市场调查过程中，认为某商户所销售的化妆品为假冒专利产品，对该产品予以设收并进行处罚，该商户不服，向石家庄市人民政府提出行政复议请求，在行政复议申请过程中，该商户提交了专利证明文件，石家庄市市场监督管理局取消了处罚决定，并对没收的产品予以归还，关于行政复议机关的处理，以下说法正确的有？多选）","options":{"A": "由于行政机关已经改变了其行政行为，因此行政复议机关应当终止审理", "B": "行政复议机关应当撤销原行政行为", "C": "如果申请人要求撤销原行政行为的，行政复议机关应当确认该行政行为违法", "D": "如果申请人要求确认该行政行为违法的，行政复议机关应当确认该行政行为违法"},"answer":"BCD","explanation":"。《复议法》第78条规定：“申请人、第三人逾期不起诉又不履行行政复议决定书、调解书的，或者不履行最终裁决的行政复议决定的，按照下列规定分别处理：（一）维持行政行为的行政复议决定书，由作出行政行为的行政机关依法强制执行，或者申请人民法院强制执行：（二）变更行政行为的行政复议决定书，由行政复议机关依法强制执行，或者申请人民法院强制执行：（三）行政复议调解书，由行政复议机关依法强制执行，或者申请人民法院强制执行”，因此A选项缺少条件错误，B、C、D选项正确。（2007改编）","chapter":"第五章 行政复议决定"},
  {"id":401,"topic":"专题四 行政复议法","type":"multiple","question":"甲公司通过暗管的方式直接将污水排人地下，被区生态环境局吊销排污许可证，罚款500万元。甲公司对此不服，申2026年专利代理师节格考试请行政复议，下列说法正确的是：（多选）","options":{"A": "复议机关若认定该行为违反法定程序，可以决定变更", "B": "复议机关若认定罚款500万合法但不适当，可以决定变更", "C": "复议机关若认定吊销排污许可证和罚款均合法且适当，作出维持决定", "D": "复议机关可以对双方进行调解"},"answer":"BCD","explanation":"。A、B选项，商务部是国务院部门，该企业应当向商务部申请复议，因此A选项错误，B选项正确。C选项，根据《复","chapter":"第五章 行政复议决定"},
  {"id":402,"topic":"专题四 行政复议法","type":"multiple","question":"王某认为某行政机关不履行法定职资而申请行政复议，行政复议机关受理后发现该行政机关没有相应法定职责。根据行政复议法及相关规定，该行政复议机关应当如何处理？（单选）","options":{"A": "作出确认原行政行为无效的决定", "B": "作出终止该行政复议的决定", "C": "作出该行政复议申请视为撤回的决定", "D": "作出驳回该行政复议请求的决定"},"answer":"ACD","explanation":"。A选项，《复议条例）第39条规定：“行政复议期间被申请人改变原具体行政行为的，不影响行政复议案件的审理。但是，申请人依法撒回行政复议申请的除外”，行政机关改变原行政行为，复议程序并不当然中止，A选项错误，当选。B选项，国家金融监督管理总局作为国务院部门，复议机关应当为国家金融监督管理总局，B选项正确。C选项，根据《复议法》第74条的规定，当事人达成和解后，由申请人向行政复议机构撒回行政复议申请。和解并不是一种复议的结案方式，不能起到中止复议的作用，C选项错误，当选。D选项，根据《复议法）第20条的规定，公民、法人或者其他组织可以自知道或者应当知道该行政行为之日起60日内提出行政复议申请；但是法律规定的申请期限超过60日的除外，D选项错误当选。（新编，思维扩展）","chapter":"第五章 行政复议决定"},
  {"id":403,"topic":"专题四 行政复议法","type":"multiple","question":"行政复议机关在受理行政复议申请后，将有关材料转送至被申请人，要求被申请人在收到材料之日起10日内提出书面答复、提交作出行政行为的证据、依据和有关材料，期满后被申请人未提交，行政复议机关可以作出下列哪些决定？（多选）","options":{"A": "视为该行政行为没有证据、依据，行政复议机关决定撤销或者部分撤销该行政行为", "B": "视为该行政行为没有证据、依据，行政复议机关确认该行政行为违法", "C": "视为该行政行为没有证据、依据，行政复议机关确认该行政行为无效", "D": "如果该行政行为涉及第三人合法权益，第三人提供了被申请人作出行政行为的证据和依据，行政复议机关仍应视为该行政行为没有证据、依据"},"answer":"AB","explanation":"。A选项，根据《复议法》第17条的规定，申请人、第三人可以委托一至二名代理人代为参加行政复议，A选项正确。B选项，《复议法》第46条第1款规定：“行政复议期间，被申请人不得自行向申请人和其他有关单位或者个人收集证据；自行收集的证据不作为认定行政行为合法性、适当性的依据”，B选项正确。C选项，根据《复议法》第50条的规定，应当听证的情形为，重大、疑难、复杂的行政复议案件，本题中没有相应的情形，因此C选项错误。D选项，根据《复议法》第63条的规定，行政行为内容不适当的，复议机关应当决定变更，D选项错误。因此，A、B选项正确。（新编，思扩展）","chapter":"第五章 行政复议决定"},
  {"id":404,"topic":"专题四 行政复议法","type":"single","question":"根据行政复议法及相关规定，下列说法正确的是？（多选）","options":{"A": "申请人在申请行政复议时可以一并提出行政赔偿请求", "B": "申请人在申请行政复议时没有提出行政赠偿请求的，对财产权的行政行为，行政复议机关也可作出行政赠偿决定", "C": "行政复议决定书一经送达，即发生法律效力", "D": "行政复议决定书送达后，15个工作日后未起诉的，发生法律效力"},"answer":"D","explanation":"。A选项，（行改处切法》第32条第1数规定：”当事人有权进行陈述和中料。行政机关必须充分听取当事人的意见，对当事人提出的事实、理由和证据进行复核，并采纳合理的部分”，该权利任何时侯都不得被剥夺、A选项借误。B选项，（复议法）绍63条第2款规定：“行政复议机关不得作出对中请人更为不利的变更决定，但是第三人提出相反请求的除外”，交更为10万元罚数属于对申请人更为不利的变更决定，B选项错误。C选项，根据（复议法》第74条的规定，当事人达成和解后，由申请人向行政复议机构撤回行政复议申请。和解井不是一种复议的结案方式，C选项错误。D选项，抵据《复议法》第63条的规定，行政行为事实不清、证据不足，经行政复议机关查清事实和证据，行政复议机关决定变更该行政行为，D选项正确。（新编，思维扩展）况","chapter":"第五章 行政复议决定"},
  {"id":405,"topic":"专题四 行政复议法","type":"multiple","question":"关于行政复议过程中的和解或调解，以下说法错谈的有？多选）","options":{"A": "当事人经调解达成协议的，行政复议机关应当制作行政复议调解书，并加盖行政复议机关印章，调解书即具有法律效力", "B": "当事人达成和解后，申请人应当向行政复议机关撤回行政复议申请，行政复议机关应当予以批准", "C": "当事人达成和解后，行政复议机关批准撤回行政复议申请的，申请人一律不得再以同一事实和理由提出行政复议申请", "D": "调解书生效之前，一方当事人反悔的，行政复议机关应当驳回行政复议请求"},"answer":"BC","explanation":"。《行政诉讼法》第1条规定：“力保证人民法院公正、及叶审理行政紧作，解决行攻争议，保护公民、决人和其您雅顶的合法权益，篮督行攻机关依法行使取权，提据光法，划定本海”，四是A.D透项借促，B、C逸项正崎。（沂境）","chapter":"第五章 行政复议决定"},
  {"id":406,"topic":"专题四 行政复议法","type":"multiple","question":"根据《治安管理处罚法》第76条，偷开他人机动车的，处1000元以上2000元以下罚款；情节严重的，处10日以上15日以下拘留，可以并处2000元以下罚款。小王因偷开单位的轿车被县公安局处以拘留12日，并处罚款1500元。小王承认自己确实偷开单位的轿车，但认为县公安局的处罚太重而向县政府申请复议。在复议过程中的下列哪一做法是正确的？（单选）","options":{"A": "在复议过程中，小王申请县政府调解，而县公安局认为自己的处罚合法、适当，故不愿接受调解，县政府要求县公安局接受调解", "B": "在复议过程中，经县政府调解，小王与县公安局达成对小王仅罚款1500元的口头调解协议，县政府决定复议终止", "C": "在复议过程中，经县政府调解，双方达成一致意见，但是小王在调解书生效前反悔，调解书生效", "D": "在复议过程中，经县政府调解，小王与县公安局达成对小王不罚款的调解协议，县政府认为协议内容违法，不予认可，并决定撤销拘留12日，维持罚款1500元的决定"},"answer":"CD","explanation":"。《行攻诉运法》第6签规定：“人民法院审理行政紫件，对行政行力是否合法进行审查”，合法性审查是人民法院对资诉具体行政行为合法性的全面审查，晚审资视伴上的合法性，也审登实体上的合法性，因此A选项错读，C选项正明。B选项差地过干地对，原则上人民法院做合法性审查，但是也不推除在特定情况下进行合理性审资。D选项，（行政诉讼法》第6条所表达的合义为人民法院审查对家为具体行政行为，D选项表进也过于绝对，但是考虑到本题为多选，D选项正确的概申更高。（折编，思维扩展）","chapter":"第五章 行政复议决定"},
  {"id":407,"topic":"专题四 行政复议法","type":"multiple","question":"某商标代理机构存在严重违法行为，国家知识产权局依法决定永久停止受理其办理商标代理，该商标代理机构不服，依法申请行政复议。根据行政复议法及相关规定，下列说法哪些是正确的？(多选）","options":{"A": "如在复议过程中，该商标代理机构与国家知识产权局达成和解后撤回复议申请，行政复议机构准予撤回行政复议申请、行政复议机关决定终止行政复议的，不得再以同一事实和理由提出复议申请", "B": "该商标代理机构可以通过行政复议机关指定的互联网渠道提交申请书", "C": "该商标代理机构如果对行政复议决定不服，可以提起行政诉讼", "D": "该商标代理机构可以向国务院申请行政复议"},"answer":"AD","explanation":"。A选项，《行政诉讼法）第8条规定：“当事人在行改诉讼中的法体地位平等”，因此A选项正确。B选项，（行改诉讼法）第60条第1款规定：“人民法院申理行政案件，不适用词解。但是，行政赔偿、补偿以及行改机关行使法体、法规规定的自由披量权的案件可以调解”，因此B选项借误。C选项，（行政诉讼法）第6条规定：“人民法院审理行政案件，对行政行为是否合法进行审查”，因此C选项错误【注意和第2题B选项表达语气上的差异】。D选项，（行政诉论法》第5条规定：“人民法院审理行政案件，以事实为根据，以法体为准绳”，因此D选项正确。（新编）","chapter":"第五章 行政复议决定"},
  {"id":408,"topic":"专题四 行政复议法","type":"multiple","question":"某县政府依田某申请作出复议决定，撤销某县公安局对田某车辆的错误登记，责令在30日内重新登记，但某县公安局拒绝进行重新登记。田某可以采取下列哪一项措施？（单选）","options":{"A": "申请法院强制执行", "B": "对某县公安局的行为申请行政复议", "C": "向法院提起行政诉讼", "D": "请求某县政府责令某县公安局登记"},"answer":"BCD","explanation":"。A选项是行政机关对民事纠纷的调解，不属于行政诉讼受案范团。B、C、D选项均属于受案范围。（2018）","chapter":"第五章 行政复议决定"},
  {"id":409,"topic":"专题四 行政复议法","type":"multiple","question":"张某对县税务局的行政处罚不服，向市税务局申请行政复议，但复议机关维持了原处罚决定，张某逾期不履行该行政复议决定，也未向法院起诉，对此，下列说法正确的是？（单选）","options":{"A": "由县税务局依法强制执行，或者申请人民法院强制执行", "B": "由市税务局依法强制执行，或者申请人民法院强制执行", "C": "县税务局不能强制执行，只能申请人民法院强制执行", "D": "市税务局不能强制执行，只能申请人民法院强制执行"},"answer":"ACD","explanation":"。A、D选项，《行政诉讼算）第1条第2款规定：“下列行为不属于人民法院行政诉讼的受案范图：（六）行政机关为作出行政行为而实施的准备、论证、所克、层报、咨询等过程性行为：（七）行政机关短据人民法院的生效载判、协功执行通知书你出的执行行为，但行政机关扩大头行范图放者采取违法方式实施的除外…”，A选灭属于上述第（七）项情形，D选项展于上述第（六）项情形，均不具于行政诉讼受案范显。C选项，行政决定履行值告书不是行最决定，不属于行政诉讼受案范围。日选项行武处罚层于行政诉讼受案范图。（2019）","chapter":"第五章 行政复议决定"},
  {"id":410,"topic":"专题四 行政复议法","type":"multiple","question":"根据行政复议法的规定，行政复议决定作出后申请人逾期不起诉又不履行行政复议决定、调解书的，应当如何处理？（多选）","options":{"A": "由作出行政行为的行政机关强制执行", "B": "行政复议调解书由行政复议机关强制执行或申请人民法院强制执行", "C": "维持行政行为的行政复议决定，由作出行政行为的行政机关依法强制执行，或者申请人民法院强制执行", "D": "变更行政行为的行政复议决定，由行政复议机关依法强制执行，或者申请人民法院强制执行"},"answer":"AD","explanation":"。A选项，全国人大常委会表专利法的决定具于其有登退约束方的未定，不属于行致诉讼的受案范围。D选项，为行政调解行为，不具于行致诉讼的受案范。（新摄）","chapter":"第五章 行政复议决定"},
  {"id":411,"topic":"专题四 行政复议法","type":"multiple","question":"商务部对某一企业作出处以30万元罚款的行政处罚，该企业不服，申请行政复议，下列说法正确的是？（多选）","options":{"A": "该企业可以向国务院申请复议", "B": "该企业可以向商务部申请复议", "C": "该企业如果对行政复议决定不服，可以提起行政诉讼", "D": "如在复议过程中，企业自愿撤回复议申请的，不得再以同一事实和理由提出行政复议申请"},"answer":"BCD","explanation":"。根据（行政诉讼解）第1票的规定，心安、国家安全等机关标利事示讼法的明确投权实庭的行为不属于人民法院行政诉讼的受案距里，因此A选项睡泥。B、C选项、根据（行政诉讼法》黑13素的浆定，对行致按管、暂扣或老昂经许可运示永顾、资令体产供业、烫收迷法所得、没农要法财物、规数、警各零行秋处规不服的，灵于行政诉讼的受案范图，因文，B、C选项三典。D选项、根据（最离人民法既关于审理行欢学议繁件若干月题的竞定）第2条的定，土","chapter":"第五章 行政复议决定"},
  {"id":412,"topic":"专题四 行政复议法","type":"multiple","question":"国家金融监督管理总局以某银行金融机构未按照规定提供报表、报告等资料，依据《银行业监督管理法》对其处以20万元罚款。该机构不服，申请行政复议，下列说法不正确的是？（多选）","options":{"A": "如果复议期间国家金融监督管理总局将罚款数额改为10万元，行政复议中止", "B": "复议机关应当是国家金融监督管理总局", "C": "如果该机构与国家金融监督管理总局在复议决定作出前自愿达成和解协议，行政复议中止", "D": "申请行政复议期间为行政行为作出之日起6个月"},"answer":"BD","explanation":"。A选项，对民事纠纷河解不展既不能中请行玖复议也不能提起行玖诉讼，A选项错误。B、D选项既可以中请行改复议，也可以提起行政诉讼。C选项，根据（专利法》中相关规定，对无效决定不股只能诉讼，不能申请行政复议。（新编）","chapter":"第五章 行政复议决定"},
  {"id":413,"topic":"专题四 行政复议法","type":"multiple","question":"某区市场监督管理局对一公司未取得出版物经营许可证销售电子出版物100套的行为，予以取缔，并罚款6000元。该公司向区政府申请复议。下列哪些说法是正确的？（多选）","options":{"A": "公司可委托代理人代为参加行政复议", "B": "在复议过程中区市场监督管理局不得自行向申请人和其他有关组织或个人收集证据", "C": "区政府应采取听证方式审查此案", "D": "如果区市场监督管理局的决定明显不当，区政府应予以撤销"},"answer":"CD","explanation":"。A选项，对民事纠纷调解不股既不能申请行政复议也不能提起行政诉讼。B选项，《出境入境管理法》第64条第1款规定：“外国人对依愿本法规定对其实施的牌续盘问、拘留审查、成制浩动范围、造送出境措施不的，可以依法中请行政复议，该行政复议决定为最终决定”，因此B选项可以复议但不可以提起行政诉讼，B选项错误。C选项，对行政机关作出的关于确认自然资源的所有权或者使用权的决定不股的可以中请行政复议，也可以提起行政诉讼，因此C选项正确。D选项，对国家知识产权局作出的有关专利申请、专利权的行政行为不可以申请行政复议也可以提起行政诉讼，因此D选项正确。（新输）","chapter":"第五章 行政复议决定"},
  {"id":414,"topic":"专题四 行政复议法","type":"multiple","question":"县生态环境局以甲公司在生产过程中使用不符合国家标准的锅炉设备，超标排放污染物质为由，查封甲公司用以生产的锅炉，后对甲公司罚款8万元，甲公司不服，向县政府申请复议，下列哪一说法是正确的？（单选）","options":{"A": "紧急情况下，查封可以不听取甲公司的陈述申辩", "B": "如果县政府认为本案事实清楚，证据确凿，适用法律正确，程序合法，但是内容不适当，将对甲公司罚款改为罚款10万元", "C": "在复议决定作出前当事人达成和解协议，复议程序自动终止", "D": "如果县政府认为本案事实不清，经审核事实清楚后，可以变更决定"},"answer":"ABCD","explanation":"。《行政诉讼法》第7条规定，人民法院审理行政案件，依法实行合议、回避、公开审判和两审终中制度，因此A、B、C、D选项均正确。（2015）","chapter":"第五章 行政复议决定"},
  {"id":415,"topic":"专题五 行政诉讼法","type":"multiple","question":"下列哪些是行政诉讼法的基本功能？","options":{"A": "打击行政领城的犯罪现象，维护社会治安", "B": "保证法院公正、及时地审理行政案件", "C": "保障公民、法人或者其他组织的合法权益", "D": "维护和监督行政机关依法行使行政职权"},"answer":"ACD","explanation":"。《行政诉讼法》第55条规定：“当事人认为申判人员与本案有利害关系或者有其他关系可能影响公正审判，有权中请审判人员回避前两款规定，适用于书记员、译人员、签定人、勘验人……审判人员的回避，由院长决定。其他人员的回避，由审判长决定”，因此审判员辛某的回避由院长决定，书记员张某的回避由审判长决定，A、C、D选项正确，B选项错误。（2016）","chapter":"第一章 行政诉讼法概述"},
  {"id":416,"topic":"专题五 行政诉讼法","type":"multiple","question":"关于行政诉讼中的合法性审查原则，下列哪些说法是正确的？（多选）","options":{"A": "只对被诉请的行政行为实体上是否合法进行审查", "B": "只对被诉请的行政行为做合法性审查，不做合理性审查", "C": "审查的主体是人民法院", "D": "只对具体行政行为进行审查，不对抽象行政行为进行审查"},"answer":"ABCD","explanation":"。根据（行政诉讼法》第14-17条的规定，基层人民法院、而级人民法院、最高人民法院、中级人民法院对第一审行政案件均有管辖权，因此A、B、C、D选项均正确。（新编）","chapter":"第一章 行政诉讼法概述"},
  {"id":417,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，关于人民法院审理行政案件应当遵循的基本原则，下列说法哪些是正确的？多选）","options":{"A": "当事人在行政诉讼中的法律地位平等", "B": "人民法院审理所有行政案件都不适用调解", "C": "人民法院审理行政案件，对行政行为是否合理进行审查", "D": "人民法院审理行政案件，以事实为依据，以法律为准绳"},"answer":"ABCD","explanation":"。《行政诉讼法》第15条规定：“中级人民法院管辖下列第一审行政案件：（一）对国务院部门成者具级以上地方人民政府所作的行政行为提起诉讼的案件1（二）海关处理的案件：（三）本辖区内重大、复杂的案件……”，因此A、B、C、D选项均正确。(2019)","chapter":"第一章 行政诉讼法概述"},
  {"id":418,"topic":"专题五 行政诉讼法","type":"multiple","question":"下列当事人提起的诉讼，属于行政诉讼受案范围的有？（多选）","options":{"A": "张某和王某是邻居，因生活琐事产生纠纷，打架斗段，经公安局调解达成调解协议", "B": "李某向生态环境局申请设立垃圾焚烧站，环保局以影响环境为由作出不予准许的决定。李某不服提起诉讼", "C": "张某因卖淫被县公安局处以10日行政拘留，1个月后张某向县政府申请行政复议，县政府不予受理。张某不服起诉", "D": "某公司与县政府签订天然气特许经营协议，双方发生纠纷后该公司以县政府不依法履行协议为由向法院起诉"},"answer":"AC","explanation":"。A、C选项，（行政诉讼法》第15条规定：“中级人民法院管辖下列第一审行政案件：（一）对国务院部门成者县级以上地方人民政府所作的行政行为提起诉讼的案件………（三）本辖区内重大、复杂的案件.”，因此A、C选项正确。B选项，根据《专利法》中相关规定，驳回决定不服·只能复审，不能直接起诉，因此B选项错误。D选项，《行政诉讼法》第23条第2款规定：“人民法院对管辖权发生争议，由争议双方协商解决。协商不成的，报它们的共同上级人民法院指定管辖”，并非一定由中级法院管辖，因此D选项错误。（2018）","chapter":"第一章 行政诉讼法概述"},
  {"id":419,"topic":"专题五 行政诉讼法","type":"single","question":"当事人不服下列行为提起诉讼的，不底于行政诉讼受案范围的有？多选）","options":{"A": "根据法院的生效判决，国家知识产权局专利局变更了专利权人姓名", "B": "北京市海淀区市场监督管理局作出的没收违法所得的行政处罚决定", "C": "根据已作出的行政决定，北京市海淀区市场监督管理局作出了行政决定履行催告书", "D": "北京市海淀区市场监督管理局作出了撤销行政许可（登记）听证告知书"},"answer":"A","explanation":"。对省人民政府的工作部门作出的具体行政行为不服提起的诉讼，应由基层人民法院管辖，如果被告是省政府或者国务院工作部门，则由中级人民法院管辖，因此A选项正确，B、C、D选项错误。（2008）","chapter":"第一章 行政诉讼法概述"},
  {"id":420,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列哪些不属于行政诉讼的受案范围？多选）","options":{"A": "公民王某对全国人大常委会修改专利法的决定不服的", "B": "商标局不受理张某的商标注册申请，张某不服的", "C": "乙公司对本市知识产权局责令其停止侵犯丙公司专利权的决定不服的", "D": "对北京市知识产权局作出的权属纠纷调解不眼的"},"answer":"ABD","explanation":"。A选项，（行政诉讼法》第20条规定：“因不动产提起的行改诉讼，由不动","chapter":"第一章 行政诉讼法概述"},
  {"id":421,"topic":"专题五 行政诉讼法","type":"multiple","question":"人民法院应当受理公民、法人或者其他组织对下列些事项提起的行政诉讼？多选）","options":{"A": "公安机关对李某作出的刑事拘留的决定", "B": "地方知识产权执法部门作出的对假冒专利的处罚", "C": "专利管理部门对专利代理机构的违法行为作出的警告", "D": "某村民认为当地政府违法变更土地房屋征收补偿协议"},"answer":"ABCD","explanation":"。（行改诉讼法>第19条规定：对限勿人身自山的行攻强制借不服提起的诉讼，由告所在坊戏者厚善所在均人民法院管辖”《行攻诉讼筛馨》第8条规定：“行攻诉讼法第19条规定的'展售所套所包括原告的户得所在地、经官局售地和健限制人身自由地”，四北A.B、C、D选项均正确。（新）","chapter":"第一章 行政诉讼法概述"},
  {"id":422,"topic":"专题五 行政诉讼法","type":"multiple","question":"当事人对下列哪些事项既可以申请行政复议又可以提起行政诉讼（多选）","options":{"A": "对行政机关作出民事纠纷调解不服的", "B": "对公安机关作出的行政拘留决定不服的", "C": "专利权人对国家知识产权局作出的宣告专利权全部无效的决定不服的", "D": "对国务院部门作出的具体行政行为不服的"},"answer":"AC","explanation":"。A、B、D选项，《行政诉讼法》第21条规定：“两个以上人民法院都有管辖权的案件，原告可以选择其中一个人民法院起诉，原告向两个以上有管辖权的人民法院提起诉讼的，由最先立案的人民法院管辖”，回此A选项正确，B、D选项借误。C选项，（行政诉讼法》第22条规定：“人民法院发现受理的案件不属于本院管辖的，应当移送有管辖权的人民法院，受移送的人民法院应当受理”，因此C选项正确。（新墙）","chapter":"第一章 行政诉讼法概述"},
  {"id":423,"topic":"专题五 行政诉讼法","type":"multiple","question":"当事人对下列哪些事项既可以申请行政复议也可以提起行政诉讼？多选）","options":{"A": "行政机关对民事纠纷的调解", "B": "出人境边防检查机关对外国人采取的遣送出境措施", "C": "对申请宅基地不予批准的决定", "D": "对专利局作出的专利申请不予受理的决定"},"answer":"ACD","explanation":"。A选项，（行政诉讼法》第24条规定：“上级人民法院有权审理下级人民法院管辖的第一审行政案件”，因此A选项正确。B选项，（行政诉讼法》第21条规定：“两个以上人民法院都有管辖权的案件，原告可以选择其中一个人民法院提起诉讼”，因此B选项错误。C选项，（行改诉讼法）第23条规定：“有管辖权的人民法院由干特珠原因不能行使管辖权的，由上级人民法院指定管辖”，因此C选项正确。D选项，《行政诉讼法》第22条规定：“人民法院发现受理的案件不属于木院管辖的，应当移送有管销权的人民法院…”，因此D选项正确。（2012）","chapter":"第一章 行政诉讼法概述"},
  {"id":424,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，关于人民法院审理行政案件应当遵循的制度，下列哪些说法是正确的？（多选）","options":{"A": "依法实行合议制度", "B": "依法实行回避制度", "C": "依法实行公开审判制度", "D": "依法实行两审终审制度"},"answer":"A","explanation":"。（行政诉讼法》第23条第2款规定：“人民法院对管辖权发生争议，由中议双方协商解决。协商不成的，报它们的共间上级人民法院指定管辖”，因此A选项正确、（新编）1人","chapter":"第一章 行政诉讼法概述"},
  {"id":425,"topic":"专题五 行政诉讼法","type":"multiple","question":"江某对某行政机关作出的行政处罚决定不服，向人民法院提起行政诉讼。江某认为本案书记员张某、审判员李某与该行政机关有利益关系可能会影响公正审判。根据行政诉讼法及相关规定，下列些说法是正确的？多选）","options":{"A": "江某有权申请李某回避", "B": "江某无权申请张某回避", "C": "李某的回避，由院长决定", "D": "张某的回避，由审判长决定"},"answer":"ABCD","explanation":"。A选项，《行政诉讼法》第25条1数规定：“行政行为的相对人以及其他与行行为有利害关系的公民、法人或者其他组织，权提起诉讼”，因此A选项正确。B、C、D选（行政诉讼解释》第12条规定：“有下列情形一的，属于行政诉讼法第25条第1款规定的行政行为有利害关系’：（一）被诉的行政行涉及其相邻权或者公平竞争权的：（二）在行复议等行政程序中被追加为第三人的：（三）求行政机关依法追究加害人法律责任\"，因此B、C、D选项正确。（2011）","chapter":"第一章 行政诉讼法概述"},
  {"id":426,"topic":"专题五 行政诉讼法","type":"multiple","question":"下列可以管辖第一审行政案件的法院有？","options":{"A": "基层人民法院", "B": "高级人民法院", "C": "最高人民法院", "D": "中级人民法院"},"answer":"ABCD","explanation":"。A、B、C选项，《行政诉讼法》第条第1、2款规定：“行政行为的相对人以及其与行政行为有利害关系的公民、法人或者其组织，有权提起诉讼。有权提起诉讼的公民亡，其近亲属可以提起诉讼”，因此A、B、C选正确。D选项，（行政诉讼法》第25条第4款定：“人民检察院在履行职责中发现生态环境资源保护、食品药品安全、国有财产保护、国","chapter":"第二章 管辖"},
  {"id":427,"topic":"专题五 行政诉讼法","type":"single","question":"下列哪些案件属于中级人民法院管辖的第一审行政案件？（多选）","options":{"A": "对国务院部门所作的行政行为提起诉讼的案件", "B": "对县级以上地方人民政府所作的行政行为提起诉讼的案件", "C": "海关处理的案件", "D": "本辖区内重大、复杂的案件"},"answer":"A","explanation":".《行皮诉讼解带>诺1S等第上放的现定：“合伙企业向人民法院展诉讼的，庄普以核准建记的学守方香”，因北人选项正明8、C、D选项借供，（2012）","chapter":"第二章 管辖"},
  {"id":428,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，中级人民法院对下列哪些一审案件具有管辖权？（多选）","options":{"A": "对某省人民政府作出的具体行政行为不服的案件", "B": "对国家知识产权局驳回专利申请不服的案件", "C": "本辖区内社会影响重大的集团诉讼案件", "D": "辖区内甲县人民法院与乙县人民法院就管辖权产生争议的案件"},"answer":"AB","explanation":"，模拖《行攻诉岱得带>管16条的规定，联营企业、中外各资或普合作企业的装售、合资、合作各方，认力联售、合资、合作企业权益成者自己一方合法权意受行攻行力侵害的，可以自己的名久提是诉论。回北人、B逸项正，C、D逸项借误。（2019）","chapter":"第二章 管辖"},
  {"id":429,"topic":"专题五 行政诉讼法","type":"multiple","question":"对省人民政府工作部门作出的具体行政行为不服提起诉讼的，由下列哪级人民法院管辖？（单选）","options":{"A": "基层人民法院", "B": "中级人民法院", "C": "高级人民法院", "D": "最高人民法院"},"answer":"ABCD","explanation":"。A、C、D逸项，《行攻诉讼法）第31条第2款规定：”下列人员可以要托力诉讼代理人：（一）体师、蓝居法你服务工作（三）当事人所在社区、单位以及有关会团体推券的公民”，因此A、C、D选项正确。B达项，《行政诉讼解称>第33条第2款规定：“专利代理人经中华全国专利代理人协会推荐，可以在专利行政累件中担任诉讼代理人”，国此D选项正确。（新编）","chapter":"第二章 管辖"},
  {"id":430,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列关于行政诉讼地域管辖的说法哪些是正确的？（多选）","options":{"A": "因不动产提起的行政诉讼，由不动产所在地人民法院管辖", "B": "行政案件由最初作出具体行政行为的行政机关所在地人民法院管辖", "C": "经复议的行政案件，复议机关改变原具体行政行为的，应由复议机关所在地人民法院管辖", "D": "对限制人身自由的行政强制措施不服提起的诉讼，由被杏所在地或者原告所在地人民法院管辖"},"answer":"AD","explanation":"。《行政诉讼法》第26条规定：“公民、法人或若其他组织直接向人民法院提起诉讼的，作出行玖行为的行政机关是被告。经复议的案件，复议机关决定维持原行改行为的，作出原行政行为的行政机关和复议机关是共同被告.雨个以上行政机关作出同一行政行为的，共同作出行政行为的行改机关是共同被告。行政机关委托的组织所作的行改行为，至托的行政机关是被告”，因此A、D选项正局，B、C选项错误。（2011）","chapter":"第二章 管辖"},
  {"id":431,"topic":"专题五 行政诉讼法","type":"multiple","question":"关于对限制人身自由的行政强制措施不服提起的行政诉讼，下列哪些说法是正确的？多选）","options":{"A": "可以在原告的户籍所在地提起诉讼", "B": "可以在被告所在地提起诉讼", "C": "可以在原告的经常居住地提起诉讼", "D": "可以在被限制人身自由所在地提起诉讼"},"answer":"CD","explanation":"。A、B选项，根据（行改诉讼法）第26条的规定，复议机关决定维持原行政行为的，作出原行政行为的行政机关和复议机关是共同顿售，因此，甲、乙行政机关应为共间告，A、B选项错误。根据《行政诉讼法》第18条的规定，经复议的案件，原行政机关所在地、复议机关所在地人民法院均有管辖权。因此，甲地、乙地人民法院均有管辖权，C、D选项正确。（新编）","chapter":"第二章 管辖"},
  {"id":432,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列关于行政诉讼管辖的哪些说法是正确的？多选）","options":{"A": "两个以上人民法院都有管辖权的案件，原告可以选择其中一个人民法院提起诉讼", "B": "原告向两个以上有管辖权的人民法院提起诉讼的，由最先收到起诉状的人民法院管辖", "C": "人民法院发现受理的案件不属于本院管辖的，应当移送有管辖权的人民法院，受移送的人民法院应当受理", "D": "两个以上人民法院都有管辖权的案件，原告应当向其共同的上级人民法院起诉"},"answer":"AC","explanation":"。A、D选项，《行政诉讼法》第26条第3款规定：“复议机关在法定期限内未作出复议决定，公民、法人成者其他组织起诉原行政行为的，作出原行政行为的行政机关是被告：起诉复议机关不作为的，复议机关是被告”，若张某对该行政处罚决定提起诉讼，应以作出原具体行政行为的县公安局为被告，若张某对县人民政府不作为提起诉讼，应以复议机关县人民政府为被告，因此A、C选项正确，B、D选项错误。（2013）","chapter":"第二章 管辖"},
  {"id":433,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列关于管辖的哪些说法是正确的？多选）","options":{"A": "上级人民法院有权审判由下级人民法院管辖的第一审行政案件", "B": "两个以上人民法院都有管辖权的案件，原告应当向其共同的上级人民法院起诉", "C": "有管辖权的人民法院由于特殊原因不能行使管辅权的，由上级人民法院指定管辖", "D": "人民法院发现受理的案件不属于自已管辖时，应当移送有管辖权的人民法院"},"answer":"BC","explanation":"。根据《行政诉讼法》第26条的规定，复议机关改变原行政行为的，复议机关是被告，复议机关市人民政府改判行政拘留期限由15天改为10天，属于改变原行政行为，因此市人民政府为被告，应由中院管辖。本题属于经复议的案件，市公安局及市政府所在地的中级人民法院均有管辖权。综上，A、D选项错误，B、C选项正确。（2015改编）","chapter":"第二章 管辖"},
  {"id":434,"topic":"专题五 行政诉讼法","type":"single","question":"人民法院对行政诉讼案件的管辖权发生争议，由争议双方协商解决，协商不成的，报（）指定管辖。（单选）","options":{"A": "共同上级人民法院", "B": "先立案的法院", "C": "当地高级人民法院", "D": "最高人民法院"},"answer":"B","explanation":"。A、B、C选项，根据《行政诉讼解释）第22条的规定，“复议机关改变原行政行为”，是指复议机关改变原行政行为的处理结果。复议机关改变原行政行为所认定的主要事实和证据、改变原行政行为所适用的规范依据，但未改变原行政行为处理结果的，视为复议机关维持原行政行为。本题中市人民政府改变了规范依据，但是未改变处罚结果，视为维持原行改行为，因此被告是原行政机关（市食药局）和复议机关（市政府），A、C选项错误，B选项正确。D选项，根据《行政诉讼解释》第134条的规定，原行政机关和复议机关作共同被告，原告只起诉","chapter":"第二章 管辖"},
  {"id":435,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，下列哪些主体可以依法提起行政诉讼？多选）","options":{"A": "与被诉的行政复议决定有法律上利害关系的公民", "B": "被诉的具体行政行为涉及其公平竞争权的法人", "C": "在复议程序中被追加为第三人的法人", "D": "要求主管行政机关依法追究加害人法律责任的公民"},"answer":"A","explanation":"。媒行改行力作出了不平认定工伤的决定，复以机关区政府《不平认定工伤使议决定节）质传改突了行力定性的法带依据，他未改受界行政行力处屋塔集的，悦力复议现关维你原行改行力，本震的告世当力区人局和区政府。但张集以区人社局方善身法院提培诉讼，概据《行政诉讼解希》第134条的规定，法院应当告知即告追加嫂告，原告不同您追加的，法院应当将另一机关列力共回资告。四北A选项正确，B.C、D选项错误。（法考2021改编）","chapter":"第三章 行政诉讼参加人"},
  {"id":436,"topic":"专题五 行政诉讼法","type":"single","question":"下列可以作为行政诉讼中的原告的是？","options":{"A": "行政行为的相对人", "B": "已经死亡的有权提起行政诉讼的公民的近亲属", "C": "与具体行政行为有利害关系的公民、法人或者其他组织", "D": "人民检察院"},"answer":"B","explanation":"。《行攻诉讼法》第26条第4旅规定：“调个以上行政机关作出同一行政行有的，共则作出行政行为的行政机关是持同设告”：报据（行政诉讼解帮>第26条的规定，应当追加控告百原告不同意追加的，人民法院应当遗扣其以第三人的身份参加诉论。本题中，市市场监督管理局和公安局共同作出的行政行为，属于共同被告，如果原告不同意追加，人民法院应当通知其以第三人的身份参加诉讼，因此A、C、D选项错误，B选项正确。（2016）","chapter":"第三章 行政诉讼参加人"},

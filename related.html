  {"id":137,"topic":"专题二 民法典合同编","type":"multiple","question":"甲、乙同为儿童玩具生产商。六一节前夕，丙与甲商谈进货事宜。乙知道后向丙提出更优惠条件，并指使丁假借订货与甲接洽，报价高于丙以阻止甲与丙签约。丙经比较与乙签约，丁随即终止与甲的谈判，甲因此遭受损失。对此，下列哪一说法是正确的？（单选）2026年专形代理资格考认","options":{"A": "乙应对甲示担缔约过失责任", "B": "丙应对甲示担缔约过失资任", "C": "丁应对甲承担缔约过失责任", "D": "乙、丙、丁无须对甲承担缔约过失责任"},"answer":"ACD","explanation":"。本题中，德肌公司是贡商，且泄露商业秘密构：成缔约过失应承担赔偿责任，对德凯公司所付出的工作成本，真诚公司并无过错，无留财偿，因此A、C、D选项错误，B选项正确。（法考2017）C。根据《民法典》第153条第1款的规法律、行政法规的强制性规定的民事法","chapter":"第二章 合同的订立"},
  {"id":138,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司于6月5日以传真方式向乙公司求购一台机床，要求“立即回复”。乙公司当日回复“收到传真”。6月10日，甲公司电签订合同书。6月15日，甲公司前往签约，乙公司要求加价，未获同意，乙公司遂拒绝签约。对此、下列哪一种说法是正确的？（单选）","options":{"A": "买卖合同于6月5日成立", "B": "买卖合同于6月10日成立", "C": "买卖合同于6月15日成立", "D": "甲公司有权要求乙公司承担缔约过失责任"},"answer":"BCD","explanation":"。A、C选项，《民法类>第1S7条规定：“民事法律行为无效、设微信戏者确定不发生效力后，行为人因该行为取得的财产，应当予以返还：不能返还戏者设有必要返还的，应当折价补偿。有过借的一方应当赔偿对方由北所受到的损失”该买奖合同资微销后，自拍无效，不能再请求承担造约党任，但可以请求王某承担约过失货任，A选项错误，C选项正确。B、D选项，《民法奖》第148条规定：“一方以欺诈乎段，使对方在造背真实意思的情况下实施的民事法律行为，受欺诈方有权请求人民法院戏者仲机构予以逝销”，因此B、D选项正确。（新编）","chapter":"第二章 合同的订立"},
  {"id":139,"topic":"专题二 民法典合同编","type":"single","question":"德凯公司拟为新三板上市造势，在无真实交易意图的情况下，短期内以业务合作为由邀请多家公司来其主要办公地点洽谈。其中，真诚公司安排授权代表往返十余次，每次都准备了详尽可操作的合作方案，德凯公司伴装感兴趣并次表达将签署合同的意愿，但均在最后一刻推脱拒签。其间，德凯公司还将知悉的真诚公司的部分商业秘密不当泄露。对此，下列哪些说法是错误的？（多选）","options":{"A": "未缔结合同，则德凯公司就商事宜无需承担责任", "B": "虽未缔结合同，但德凯公司构成恶意商，应赔偿损失", "C": "未缔结合同，则商业秘密属于真诚公司自愿披露，不应禁止外泄", "D": "德凯公司也付出了大量的工作成本，可向真诚公司主张赔偿"},"answer":"C","explanation":"。《民法莫》第504条规定：“法人的法定代表人或者非法人组织的负责人起越权限订立的合同，除相对人知道或者应当知道其赵龙权限外，该代表行为有效，订立的合同对法人或者非法人组织发生效力”，因此并不是所有代表行为都发生效力，A选项错误。《民法奠》第505条规定：“当事人起越经营范国订立的合同的效力，应当依煎《民法典》总则编中有关民事法律行为效力的规定以及合同编中的其他相关规定确定，不得仅以超越经营范国确认合同无效”，因此B选项错误。《民法英》第503条规定：“无权代理人以被代理人的名义订立合同，被代理人已经开始履行合同义务或者接受相对人履行的，视为对合同的追认”，紫云公司接受绿田公司的电脑并付款视为对合同的追认，C选项正确。《民法典》第502条第2款规定：“.应当办理申请批准等手续的当事人未履行义务的，对方可以请求其承担违反该义务的资任”，借误。（新编）","chapter":"第二章 合同的订立"},
  {"id":140,"topic":"专题二 民法典合同编","type":"single","question":"甲乙两公司签订了一份购销合同，该合同标的是法律禁止流通的物品，其余条款均齐备并符合规定，并有独立！定，存在的有关解决争议方法的条款。根据民法典合同编及相关规定：下列关于该合间效力的说法哪些是正确的7（单选）","options":{"A": "该合同所有条款均无效", "B": "该合同有效，但无法履行", "C": "该合同无效，但不影响合同中独立存在的有关解决争议方法的条款的效力", "D": "该合同的效力待定"},"answer":"D","explanation":"。A选项商业广告和宜传原所上婴约遗请，但是，内容具体确定则属于要约在校内二手平台上发布的出售自行车的位容具体确定，履于婴约而非婴约邀请。故A错误。B、C、D选项，甲发布的商业广分和属于要约，价款1000元。乙先出价900元，同意。后乙又给甲发微信“就按你说的价1100元”。其中，如果以“就按你说的价来”！乙的意思表示含义，则价款为1000元，且乙！表示是自己打错了。因此，应当认定两人1立了1000元的合同。故B、C项错误，D项正（法考2023，思维扩展）","chapter":"第三章 合同的效力"},
  {"id":141,"topic":"专题二 民法典合同编","type":"single","question":"李某在二手车市场向王某购买了一辆二手车，并签订了车辆买卖合同。该车里程表显示行驶里程3万公里，但实际上该车已经行驶了20万公里。王某明知里程有误，却故意隐瞒该事实，以较高价格将该车卖给李某。李某购买该二手车后发现上述问题，与王某产生纠纷，向人民法院提起诉讼。根据民法典总则编、合同编及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "如果李某请求撤销车辆买卖合同，可以同时请求王某承担违约责任", "B": "李某有权请求人民法院予以撤销车辆买卖合同", "C": "如果李某请求撤销车辆买卖合同，可以同时请求王某承担缔约过失责任", "D": "车辆买卖合同中有仲裁条款的，李某有权请求仲裁机构予以撤销该合同"},"answer":"B","explanation":"。《合同编司法解释》第22条规定“5代表人、负责人或者工作人员以法人、非法织的名义订立合同且未超越权限，法人、非注组织仅以合同加盖的印章不是备案印章或我伪造的印章为由主张该合同对其不发生列的，人民法院不予支持。”法定代表人在合同签字并加盖公章的行为，表明其是以法人名签订合同，是其实的意惠表示，属于有权代因此合同已生效，不能仅以公章是假的为白认合同效力。（法考2024，思维扩展）行","chapter":"第三章 合同的效力"},
  {"id":142,"topic":"专题二 民法典合同编","type":"multiple","question":"关于合同效力，下列说法正确的有哪项？","options":{"A": "甲是蓝天公司的法定代表人，甲代表蓝天公司订立的所有合同均对蓝天公司发生效力", "B": "乙是白云公司员工，超越该公司的经营范围与黄沙公司签订合同，该合同无效", "C": "丙在未被紫云公司授权的情况下，以紫云公司的名义与绿田公司签订电脑买卖合同，绿田公司向紫云公司发货，紫云公司收到货后向绿田公司付款，电脑买卖合同对紫云公司和绿田公司发生效力", "D": ".丁与黑石公司签订土地买卖合同，约定相关手续由2026年专利代理师齐格考试黑石公司办理，手续完成后买卖合同生效，后因土地价格上涨，黑石公司拒不办理相关手续，黑石公司因合同未生效因此不用承担违约责任"},"answer":"CD","explanation":"。A、B、C选项，（民法典）第S：条规定：“合同生效后，当事人就质量、价：成者报酬、履行地点等内容没有约定成者生定不明确的，可以协议补充；不能达成补协议的，按照合同相关条款或者交易习惯定”，因此未明确质量可通过协议补充确定不会导致合同不成立成未生效，因此A、B项错误，C选项正确。D选项，（民法兵）旨","chapter":"第三章 合同的效力"},
  {"id":143,"topic":"专题二 民法典合同编","type":"multiple","question":"甲在校园网站发布出售一辆二手自行车的广告，标价1000元。乙认识甲，到甲的宿舍表示以900元购买，甲不同意。乙于是对甲说：“行！就按你说的，1100元。\"乙通过手机给甲转账1000元后，甲要求乙再付100元，乙表示刚才口误，本欲说1000元说成了1100元，甲不同意。关于甲、乙间的这一二手自行车的买卖，下列表述正确的是？（单选）","options":{"A": "甲在校园网站发布的广告属于要约邀请", "B": "甲、乙未达成合意，自行车买卖合同不成立", "C": "甲、乙间成立售价为1100元的自行车买卖合同", "D": "甲、乙间成立售价为1000元的自行车买卖合同"},"answer":"BD","explanation":"。根据《民法典>第511条的规定，履行地点不明确，给付货币的，在接受货币一方所在地履行：履行期限不明确的，债务人可以随时履行，债权人也可以随时请求履行，但是应当命对方必要的准备时间。因此A、C选项借误，B、D选项正确。（2006）","chapter":"第三章 合同的效力"},
  {"id":144,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司和乙公司签订钢材购销合同，双方法定代表人经董事会授权签字盖章，后发现甲公司的章是假的。对此，下列说法正确的是？（单选）","options":{"A": "合同效力待定", "B": "有效", "C": "无效", "D": "合同不成立"},"answer":"ABC","explanation":"。A选项，《民法典》第S22条第1款规定：”当事人约定由货务人向第三人履行债务，债务人未向第三人履行债务或者履行债务不符合约定的，应当向债权人承担违约责任”，因此A选项正确。B选项，（民法典》第522条第2款规定：“法律规定戎者当事人约定第三人可以直接请求债务人向其履行货务，第三人未在合理期限内明确拒绝，债务人未向第三人履行债务或者履行债务不符合约定的，第三人可以请求债务人承担违约责任”，因此B选项正确。C、D选项，《民法英》第523条规定：“当事人约定由第三人向债权人履行债务，第三人不履行债务或者履行债务不符合约定的，债务人应当向债权人承担违药责任”，因此C选项正确、D选项错误。（新编）","chapter":"第三章 合同的效力"},
  {"id":145,"topic":"专题二 民法典合同编","type":"multiple","question":"甲酒厂欲从乙粮库购买一千吨高梁，业务员因为疏忽买卖合同中未写明高梁质量。关于该合同，下列哪些说法是确的？多选）","options":{"A": "质量是民法典合同编规定的合同条款，欠缺该条款的同不成立", "B": "该合同明确了买卖标的物但未明确质量，因此成立但生效", "C": "该合同已经生效，但甲乙仍可就质量条款进行进一步商以确定具体标准", "D": "如果当事人对质量标准达不成一致，可以参考国家标准、行业标准成者通常标准以及按照合同目的确定展行标准"},"answer":"ABD","explanation":"。乙公司的行为依法构成第三人代为清偿。因乙公司仅代为清偿部分债权2万元。因此，甲公司尚欠澄某1万元。第三人乙公司代为履行2万元后，基于“法定的债权转让”享有对甲公司的2万元追偿权。因此，A、B、D选项正确，C选项（法考2023改编）","chapter":"第四章 合同的履行"},
  {"id":146,"topic":"专题二 民法典合同编","type":"multiple","question":"湖南A工厂向四川B公司购买一批物品，合同对付款地点和交货期限没有约定，事后未能达成补充协议，并且按照合同有关条款或交易习惯也不能确定。根据民法典合同编的规定，下列哪些说法是正确的？多选）","options":{"A": "湖南A工厂付款给四川B公司应在湖南限行", "B": "湖南A工厂付款给四川B公司应在四川股行", "C": "四川B公司可以随时交货给湖南A工厂，A工厂不得有异议", "D": "四川B公司可以随时交货给湖南A工厂，但是应当给该厂必要的准备时间"},"answer":"BC","explanation":"（民法典》第523条规定：自人约定由第三人向债权人履行债务，第三不履行债务成者履行货务不符合约定价，务人应当向货权人承担违约贵任”。本中，就乙、丙间的买实合同固官，是一个的三人甲履行的合间，甲未履行政跃逸行，应由乙向丙承担违约贵任，闪不能向主张违约资任，因此A、D选项借误，B、C项正确。（法考2010改编）","chapter":"第四章 合同的履行"},
  {"id":147,"topic":"专题二 民法典合同编","type":"single","question":"根据《民法典》合同编及相关规定，下列说法哪些是正确？（多选）","options":{"A": "合同当事人约定由债务人向第三人履行债务的，债务人未向第三人履行债务，应当向债权人承担违约责任", "B": "合同当事人约定由债务人向第三人履行债务的，且约定第三人可以直接请求债务人向其履行债务，第三人并未拒绝，债担违约责任", "C": "合同当事人约定由第三人向债权人履行债务的，第三人不履行债务，价务人应当向债权人承担违约责任", "D": "合同当事人约定由第三人向债权人履行债务的，第三人履行债务不符合约定，应当由第三人向债权人承担违约责任"},"answer":"A","explanation":"。甲与乙签订钢材买卖合同：约第三人丙可以直接请求债务人乙向其履第三人丙对此知情且未拒绝。因此，第三丙基于债权人甲、债务人乙之间的约定取了独立的请求权；第三人丙可以请求债务乙向其履行100吨钢材，如债务人乙不付，第三人丙可以直接迫究债务人乙的违责任。债务人乙基于买卖合同对债权人的抗辩，可以向第三人丙主张。因此A选正确，C、D选项错误。虽然第三人丙取得立的请求权，但并不会导致合同直接当事甲丧失相应的权利和义务。如乙不交100吨钢材，甲亦可追究乙的违约：贵任。此B选项错误。（法考2020）","chapter":"第四章 合同的履行"},
  {"id":148,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司因经营不善歇业，欠专职司机潘某工资3万元，潘某多次催要未给，一气之下把公司一辆面包车开走。甲公司的母公司乙公司知道此事主动偿还潘某2万元。关于本案，下列说法正确的是？（多选）","options":{"A": "甲公司尚欠潘某1万元", "B": "乙公司行为属于第三人代为清偿", "C": "甲公司尚欠潘某3万元", "D": "乙公司有权利要求甲公司支付2万元"},"answer":"ABCD","explanation":"。A选项，《民·法典》第509第1款规定：“当事人应当按照约定全面行自己的义务”，因此A选项正确。B选习（民法典》第525条规定：“当事人互负债务没有先后履行顺序的，应当同时履行因此B选项正确。C选项，《民法）第S:条规定：“当事人互负债务，有先后履行序，应当先履行债务一方未履行的，后月一方有权拒绝其履行请求……”，因此Ci项正确。D选项，《民法典》第527条第11规定：“应当先履行债务的当事人，有确切","chapter":"第四章 合同的履行"},
  {"id":149,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司与乙公司签订了一份手机买卖合同、约定：甲公司供给乙公司某型号手机1000部，每部单价1000元，乙公司支付定金30万元，任何一方违约应向对方支付合同总价款30%的违约金。合同签订后，乙公司向甲公司支付了30万元定金，并将该批手机转售给丙公司，每部单价1100元，指明由甲公司直接交付给丙公司。但甲公司未按约定期间交货。关于甲、乙、丙公司间违约资任的承担，下列表述正确的是：（多选）","options":{"A": "如乙公司未向丙公司承担违约责任，则丙公司有权请求甲公司向自己承担违约责任", "B": "如乙公司未向丙公司承担违约责任，则丙公司无权请求申公司向自己承担违约费任", "C": "如甲公司迟延向丙公司交货，则丙公司有权请求乙公司承担迟延交货的违约责任", "D": "如甲公司迟延向丙公司交货，则丙公司无权请求乙公司承担迟延交货的违约费任"},"answer":"ACD","explanation":"。《民法集》第S27集规定：“世游先度行借券的当事人，有切证证明对方有下列情形之一的，可以中止履行：（一）经管状况严重乃化”，（民法典》第S28条规定：“当事人侬据前条规定中止履行的，应当及叶通知对方..”，因此A、C、D逸项借供，当逸。（2013改）","chapter":"第四章 合同的履行"},
  {"id":150,"topic":"专题二 民法典合同编","type":"multiple","question":"甲欠丙100吨钢材，为偿还该价务，甲与乙订立了100吨钢材的买卖合同，约定由乙向丙直接交付钢材，丙也可以直接向乙请求履行，丙对此知情，也未拒绝，以下说法正确的是？（单选）","options":{"A": "如乙不交付，丙可请求其履行且要求承担违约责任", "B": "甲对乙已经没有任何义务", "C": "乙不能向丙主张其对甲的抗辩", "D": "因合同相对性，丙不能直接向乙请求履行交付义务"},"answer":"ABCD","explanation":"。A逸项，甲公司、乙公司儿负债务且没有先后履行顺序的，应当回时厦行。甲公司在乙公司履行之前有权拒绝其履行请求，因此人选项正确。B选项，合同约定先供货后付款，应当先履行的甲公司米履行，则后履行一方乙公司有权拒绝其履行请求，因此B选项正确。C、D选项，根据《民法典>第527条的规定，应当先履行债务的当事人，有确切证据证明对方有经营状况产重是化，丧失商业信誉的情形，可以中止履行，因此C、D选项正确。（2015）","chapter":"第四章 合同的履行"},
  {"id":151,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列关于合同履行的哪些说法是正确的？（多选）","options":{"A": "甲公司应当无条件地继续履行该合同", "B": "甲公司可以中止履行该合同，并及时通知对方", "C": "甲公司可以直接解除该合同", "D": "甲公司可以要求乙公司承担违约资任"},"answer":"CD","explanation":"。《民法典》第529条规定：“债权人分立、合并或者变更住所没有通知债务人，致使履行债务发生因难的，债务人可以中止展行或者将标的物提存”，因此A、B选项错误，C、D选项正确。（2015，思维扩展）","chapter":"第四章 合同的履行"},
  {"id":152,"topic":"专题二 民法典合同编","type":"single","question":"甲公司与乙公司达成买卖合同，约定甲公司有偿向乙公司供应原料。根据民法典合同编及相关规定，下列关于合同履行抗辩权的哪些说法是正确的？（多选）","options":{"A": "合同未明确履行顺序，甲公司在乙公司付款之前有权拒绝其履行要求", "B": "合同约定先供货后付款，甲公司未按时供货，乙公司有权拒付货款", "C": "合同约定先供货后付款，甲公司有确切证据证明乙公司经营状况严重恶化，可以中止履行合同", "D": "合同约定先供货后付款，甲公司有确切证据证明乙公司丧失商业信誉，可以中止履行合同"},"answer":"A","explanation":"。A选项，在乙公司表示要涨价的情况下，甲公司有理由认为自己支付价款后，乙公司有可能不交付汽车，甲公司有权行使不安抗辩权，中止支付第二期价款，不构成违约，因此A选项正确。B选项，乙公司并未催告甲公司支付第二期价款，且在乙公司主张解除合同之前，甲公司已经支付了第二期价款，乙公司不得解除合同，因此B选项错误。C选项，甲公司已经交付了第二期价款，乙公司不得主张先履行抗辩权，因此C选项借误。D选项，乙公司主张班乡理由是原材料价格上涨，当事人订立合目应当预见到原材料价格的正常设动，属子常市场风险，乙公可不得主张班价，医年选项错误。（法考2014，思维扩展）","chapter":"第四章 合同的履行"},
  {"id":153,"topic":"专题二 民法典合同编","type":"single","question":"甲乙两公司订立合同，约定甲公司送货到乙公司住所。后乙公司变更住所，未及时通知甲公司，导致甲公司无法按照约定地点交货。根据民法典合同编及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "甲公司应当及时联络乙公司并继续履行合同", "B": "甲公司可以解除合同", "C": "甲公司可以中止履行2026年专利代理师齐格考认", "D": "甲公司可以将标的物提存"},"answer":"C","explanation":"。A选项、在合同关系中，自几则是指双方的自并达成合意，旧0一为事人的单方自民，因此人选项倡议。比项，建设工程合间对于工程款的约定，以疫情对工程款的影响等，均不沙及公共利和善良风俗，因此B选项错识。C选项.（法典》第533条规定：“合同的基础条件发了当事人在订立合同时无法预见的、不具商业风险的重大变化，继续履行合同对于事人一方明显不公平的，受不利影响的当人可以与对方重新协商；在合理期限内协不成的，当事人可以请求人民法院或老机构变更或者解除合同。人民法院或者栽机构应当结合案件的实际情况，抵据公原则变更或者解除合同”，因疫情导致原料价格大幅上涨，后果是合同履行明显不平，不能实现乙建筑公司的缔约目的，属情势变更的范畴，因此C选项正确。D项，情势变更本身即意味若商业风险自负有例外的，因此D选项错误。（新编，息：扩展）","chapter":"第四章 合同的履行"},
  {"id":154,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司向乙公司购买小轿车，约定7月1日预付10万元，10月1日预付20万元，12月1日乙公司交车时付清尾款。甲公司按时预付第一笔款。乙公司于9月30日发函称因原材料价格上涨，需提高小轿车价格。甲公司于10月1日拒绝，等待乙公司答复未果后于10月3日向乙公司汇去20万元。乙公司当即拒收，并称甲公司迟延付款构成违约、要求解除合同，甲公司则要求乙公司继续履行。下列哪一表述是正确的？（单选）","options":{"A": "甲公司不构成违约", "B": "乙公司有权解除合同", "C": "乙公司可行使先履行抗辩权", "D": "乙公司可要求提高合同价格"},"answer":"ABCD","explanation":"。《民法典》第535条第1、2日规定：“因债务人息于行使其债权或者与司债权有关的从权利，影响价权人的到期债实现的，债权人可以向人民法院请求以自己的名义代位行使债务人对相对人的权利，且是该权利专属于债务人自身的除外。代组","chapter":"第四章 合同的履行"},
  {"id":155,"topic":"专题二 民法典合同编","type":"multiple","question":"甲置业公司与乙建筑公司因某小区业务缔结建设工程承包合同，甲置业公司为发包人，乙建筑公司为总承包人，双方约定了固定款额事项以及不适用的特殊事项。施工期间，因受全球疫情影响，某施工原材料价格上涨至150%，乙建筑公司提出调整申请，遭到甲置业公司拒绝。关于乙建筑公司的主张，下列说法正确的是：（单选）","options":{"A": "符合自愿原则", "B": "违背公序良俗", "C": "适用情势变更", "D": "符合商业自担风险"},"answer":"AD","explanation":"。携据《民法典》箔S3S余的规定，甲公司欠乙公可工偿S0万元已期，同时带集欠甲公可80万元货故也已到期，甲公可乌于行使其债权从西影有了乙公司借权的实现。乙公可可以以自己的名义代位行使甲公司对常集的债权，代位权行便的范图为50方元，乙公可行使代位权的必变费用，由货务人甲公可负担，因北A、D逸项正确，B、C选项错误。（2014）","chapter":"第四章 合同的履行"},
  {"id":156,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，债权人代位行使债务人的债权，应当同时符合哪些条件？（多选）","options":{"A": "债权人对债务人的债权合法", "B": "债务人怠于行使其到期债权，对债权人造成损害", "C": "债务人的债权已经到期", "D": "价务人的债权不是专属于价务人自身的债权"},"answer":"BCD","explanation":"。A、C逸项，零某可以以自己的名义起诉张某，不能以王某名义起诉张某，因此A选项正确，C选项带误。B选项，节某诉讼请求效额为80万元，因此B逸项借误。D选项，代位权只能向法院起诉，不能仲，因此D选项错误。（2019）","chapter":"第五章 合同的保全"},
  {"id":157,"topic":"专题二 民法典合同编","type":"single","question":"甲公司欠乙公司工程款50万元，务到期后甲公司因资金不足人拖不还。同时，李某欠甲公司的80万元货款也已到期，但甲公司未以任何方式催促李某还款，对乙公司造成了损害。根据民法典合同编及相关规定，下列关于乙公司行使代位权的哪些说法是正确的7（多选）","options":{"A": "乙公司可以向人民法院请求以自已的名义代位行使甲公司对李某的债权", "B": "乙公司可以向人民法院请求以甲公司的名义代位行他甲公司对李某的债权", "C": "乙公司代位权行使的范围为80万元", "D": "乙公司行使代位权的必要费用，由甲公司负担"},"answer":"D","explanation":"。赠养费、劳动报酬、人身伤害赔偿费均为专属于债务人自身的权利，不可代位行使，因此A、B、C选项错误，D选项正确。（2008)","chapter":"第五章 合同的保全"},
  {"id":158,"topic":"专题二 民法典合同编","type":"multiple","question":"王某享有对张某的到期债权100万元，同时，王某欠李某80万元，该债务已到期。此时，王某没有其他财产偿还给李某，但为逃避该笔债务，王某一直不积极催讨对张某的到期债权。根据民法典合同编及相关规定，下列关于李某行使代位权的说法错误的是？多选）","options":{"A": "李某可以以自己的名义起诉张某", "B": "李某的诉讼请求为100万元", "C": "李某既可以以自己的名义起诉张某，也可以以王某的名义起诉张某", "D": "李某可以以张某为被申请人向仲裁机构申请仲裁"},"answer":"AD","explanation":"。A选项，（民法典》第538条规定：“债务人以放弃其债权、放弃债权担保、无偿转让财产等方式无偿处分财产权益，或者恶意延长其到期债权的履行期限，影响债权人的债权实现的，债权人可以请求人民法院撤销债务人的行为”，债务人甲公司将其财产无偿转让给丙公司，给债权人乙公司造成了损害，乙公司可以行使其微销权，因此A选项正确。B选项，《民法典》第541条规定：“撤销权自债权人知道或者应当知道销事由之日起一年内行使。自货务人的行为发生之日起五年内没有行使撤销权的，该撤销权消灭”，因此B选项错误。C、D选项，《民法典》第540条规定：“撒销权的行使范国以值权人的债权为限。信权人行使！权的必要费用，由务人负担”，乙公罚！权行使的范国为100万元，因此C设！误，D选项正确。（2017）","chapter":"第五章 合同的保全"},
  {"id":159,"topic":"专题二 民法典合同编","type":"multiple","question":"甲为乙的债权人。对乙享有的已经到期的下列哪项债权，甲可以向人民法院请求以自己的名义代位行使？（单选）","options":{"A": "乙的儿子应当给付的赡养费", "B": "丙欠乙的劳动报酬", "C": "丁欠乙的人身伤害赔偿费", "D": "戊欠乙的货款"},"answer":"ABC","explanation":"。A选项，甲将冰柜等物无4与丙、无论丙是否知情，乙均能行使微谢因此A逸项正确。B逸项，甲将市值10；的店面以5万元的价格实给丁是有信的丁不知情的前提下，乙不能行使撤销权此B选项正确。C、D选项，《民法典》绍条规定：“撤销权自债权人知道或者应！道撤销事由之日起一年内行使。自货：的行为发生之日起五年内没有行使缴的，该撤销权消灭”，甲高价收购戊的厨！备发生于2021年9月5日，乙行使其《的期限至2026年9月5日届满，因此C3正确。D选项申请行使撤销权超出5年限，错误。（2018改编）","chapter":"第五章 合同的保全"},
  {"id":160,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司欠乙公司工程款100万元，务到期后甲公司因资金不足久拖不还。同时，甲公司将价值200万元的200件产品-49 -2026年专利代理师货格考试无偿转让给丙公司，给乙公司造成了损害。根据民法典合同编及相关规定，下列关于乙公司行使撤销权的哪些说法是正确的？（多选）","options":{"A": "乙公司可以请求人民法院撤销甲公司的无偿转让行为", "B": "乙公司在其知道或者应当知道撤销事由之日起5年内均可行使撤销权", "C": "乙公司撤销权行使的范围为200万元", "D": "乙公司行使撤销权的必要费用，由甲公司负担"},"answer":"BD","explanation":"。A、B选项，《民法莫》第545的规定，当事人约定金钱债权不得转让！不得对抗第三人，甲公司和乙公司约定了钱债权不得转让，该约定不得对抗第三人公司，因此A选项错误，B选项正确。C、D项，（民法典》第546条第1款规定：“债权转让债权，未通知债务人的，该转让对债人不发生效力”，债权人转让债权只需通专顺二民法典合同编债券人，无臂經债券人回房，因此C遗项借膜，D途项正嘀。（2015以）","chapter":"第五章 合同的保全"},
  {"id":161,"topic":"专题二 民法典合同编","type":"multiple","question":"甲因开饭馆向乙借款10万元，2021年8月借款期限届满。因经营不善，甲的饭馆濒临倒闭。为逃避对乙的债务，2021年9月5日，甲将店内的冰柜等物赠与丙，将市值10万元的店面以5万元的价格卖给其亲戚丁，并以两倍于市价的高价收购戊的厨房设备。丙、丁不知道该情形，戊知情。现甲无力清偿欠乙的借款。对此，下列哪些说法是正确的？多选）","options":{"A": "即使丙不知情，乙也能对甲的赠与行为行使撤销权", "B": "因为丁不知情，故乙不能对甲将其中一间店面卖给丁的行为行使撤销权", "C": "若乙于2022年11月8日知道甲高价收购戊的厨房设备，则乙可以自知道之日起1年内向法院申请行使撤销权", "D": "若乙于2027年3月5日知道甲高价收购戊的厨房设备，则乙可以自知道之日起1年内行使撤销权"},"answer":"BC","explanation":"。A选埃，《民法典》策S47条策1款规定：“价权人转让债权的，史让人取得与价权有关的从权有，但是该从权利专属于价权人自所的除外”，因此人逸项带误。B逸项，《民法典》第S46条第1款规定：“债权人转让价以，未通知价务人的，该转让对债券人不次生级方”，因北B逸项正确。C、D逸项，《民法典》第551条第1款规定：“价务人将债务的全部成者部分转移给第三人的，应出经货权人同”，因此C选项正确，D选项错误。（2011改编）","chapter":"第五章 合同的保全"},
  {"id":162,"topic":"专题二 民法典合同编","type":"single","question":"甲公司和乙公司双方订立买卖合同，并约定价权债务均不得转让。甲公司向乙公司交付后，甲公司欲将其200万货款的债权转让给丙公司。根据民法典合同编及相关规定，下列哪些说法是正确的？多选）","options":{"A": "按照合同约定，甲公司不得转让其债权", "B": "甲公司和乙公司價权不得转让的约定，不得对抗第三人", "C": "如果甲公司转让债权未经债务人乙公司同意，甲公司就不能转让", "D": "如果甲公司将使权转让给丙公司，应当通知优务人乙公司，否则该转让对乙公司不发生效力"},"answer":"C","explanation":"。A选项，演出活动具有人身专属性，歌星乙应当亲自履行演出义务，其未经中同党自行决定让欧手丙代为演出不符合法律规定。B选项，《民法实》第SSS条规定：“当事人一方经对方同意，可以将自己在合同中的权利和义务一井转让给第三人”，乙公司未经甲同意不符合法律规定。C选项，中打电话通知乙，债权转让发生效力。D选项，《民法典》第923条规定：“受托人应当亲自处理委托事务，经委托人同意，受托人可以转委托”乙公司未经甲同意格该货物转由丙公司运输的行为不符合法律规定。（2007改编）","chapter":"第六章 合同的转让"},
  {"id":163,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列关于合同转让的说法哪些是正确的？（多选）","options":{"A": "侦权人转让权利的，所有与债权有关的从权利亦由受让人收得", "B": "债权人转让权利的，应当通知侦务人，否则，该转让对价务人不发生效力", "C": "债务人将合同的义务全部转移给第三人的，应当经债权人同意", "D": "债务人将合同的义务部分转移给第三人的，可以不经债权人同意"},"answer":"ABC","explanation":"。A选项，（民法典）第67条第1款规定：“法人合并的，其权利和义务由合并后的法人享有和承担”，因此A选项正确。B选项，根据《民法典》第546条第1款、第548条的规定，债权人转让债权，未通知债务人的，该转让对债务人不发生效力，货务人接到债权转让通知后，债务人对让与人的抗辩，可以向受让人主张，因此B选项正确。C选项，《民法典》第551条第1款规定：“货务人将债务的全部成者部分转移给第三人的，应当经债权人同意”，因此C选项正明。1选项，（民法典》第553条规定：“债务人外多债务的，新债务人可以主张原债务人对货如人的抗排”，因此D选项带误。（2013）","chapter":"第六章 合同的转让"},
  {"id":164,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编的规定，下列哪项合同的转让是合法的？（单选）","options":{"A": "甲举办商业演出，邀请歌星乙演唱歌曲，乙表示同意，后因演出当天乙另有演出任务，便自行决定让歌手丙代为演出", "B": "专利权人甲与乙公司签订专利实施许可合同，后乙公司未经甲同意，将合同权利义务一并转让给丙公司", "C": "债权人甲因出国急需用钱便将债务人乙欠自己的两万元债权以1万5千元的价格转让给了丙，并将此事打电话通知了乙", "D": "甲委托乙公司运输货物，后乙公司未经甲同意，将该货物转由丙公司运输"},"answer":"AC","explanation":"。A、B选项，《民法典>第5558规定：“当事人一方经对方同宽，可以络自在合同中的权利和义务一并转让伯館三人”，因此A选项正确，B选项错误。C、DA项，《民法典》第548条规定：“债务人接到台权转让通知后，债务人对让与人的执赔，可以向受让人主张”，《民法典》第553条规定-“债务人转移债务的，新债务人可以主张目债务人对债权人的抗”，因此乙公司有向丙公司主张其对甲公司的抗辩，C选项王确，D选项错误。（2016改编）","chapter":"第六章 合同的转让"},
  {"id":165,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列关于合同权利和义务的哪些说法是正确的？（多选）","options":{"A": "当事人订立合同后合并的，由合并后的法人行使合同权利，履行合同义务", "B": "债权人转让权利的，应当通知债务人，货务人接到债权转让通知后，价务人对让与人的抗辩，可以向受让人主张", "C": "价务人将债务全部转移给第三人的，应当经债权人同意", "D": "价务人转移价务的，新债务人不得主张原债务人对债权人的抗辩"},"answer":"AD","explanation":"。A、B选项，《民法典》第546多第1款规定：“货权人转让债权，未通知债务人的，该转让对债务人不发生效力”，乙转训债权通知了甲，对甲发生效力，因此A选习正确，B选项错误。C、D选项，《民法典》氛549条规定：“有下列情形之一的，货务人司以向受让人主张抵销：（一）债务人接到债方转让通知时，债务人对让与人享有债权，且债务人的债权先于转让的债权到期或者目时到期……”，在甲欠乙的10万元中，其中万元可以主张抵销，债务人甲主张抗辩时可以向新债权人丙主张，因此C选项错误，选项正确。（2018改编）","chapter":"第六章 合同的转让"},
  {"id":166,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司和乙公司签订了一份服务器买实合同。在合同履行期间，甲公司拟将其在合同中的全部权利义务转让给丙公司，根据民法典合同编及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "该转让需要经过乙公司同意", "B": "该转让需要通知乙公司，但无需经其同意", "C": "转让后，乙公司有权向丙公司主张其对甲公司的抗辩", "D": "转让后，乙公司不得向丙公司主张其对甲公司的抗辩"},"answer":"BC","explanation":"。A选项，甲、丙公司之间依法由立的债权转让协议在甲、丙公司自签订时月18日即生效，因此A选项错误。B选项乙公司接收通知后，货权转让对乙公司生效，因此B选项正确。C选项，《民法》第549条规定：“有下列情形之一的，债务人可以向受让人主张抵销：（一）债务人接到货转让通知时，债务人对让与人享有债权，且","chapter":"第六章 合同的转让"},
  {"id":167,"topic":"专题二 民法典合同编","type":"multiple","question":"甲欠乙10万元，后乙通知甲将该债权转让给丙。甲接到该通知时，乙欠甲5万元，并且甲的债权先于转让的债权到期。根据民法典合同编的规定，下列说法哪些是正确的？（多选）","options":{"A": "本案中乙的债权转让对甲发生效力", "B": "本案中乙的债权转让不对甲发生效力", "C": "甲可以向乙主张抵销", "D": "甲可以向丙主张抵销"},"answer":"AD","explanation":"。A、B逸项，根据《民法臭>铭S46条第1放的规定，价权人转让价权，通加债务人，对债务人发生效力，梁集转让属平合同权利转让，通知即生效，因北A逸项逐确，B选项借况。C.D逸项，飛据《民法典》第551条第1款的规定，货务人将债务转移倍第三人的，应当经债权人同意，旅行公司转让属于合同义务转让，需零征得权利人韩某的同意才能生效，因此C选项借误，D选项正确。（新编）","chapter":"第六章 合同的转让"},
  {"id":168,"topic":"专题二 民法典合同编","type":"multiple","question":"乙公司欠甲公司30万元，于2020年9月20到期。同时甲公司须在2020年9月20日清偿对乙公司的20万元货款。甲公司在同年9月18日与丙公司签订书面协议，转让其对乙公司的30万元债权。同年9月24日，乙公司接到甲公司关于转让债权的通知后，便主张20万元的抵销权。下列说法哪些是正确的？多选）","options":{"A": "甲公司与丙公司之间的债权转让合同于9月24日生效", "B": "乙公司接到债权转让通知后，即负有向丙公司清偿30万元的义务", "C": "乙公司可以向丙公司主张20万元的抵销权", "D": "丙公司可以就30万元债务的清偿，要求甲公司和乙公司承担连带责任"},"answer":"ABC","explanation":"。A选项，《民法典>第548条规定：“货务人接到债权转让通知后，货务人对让与人的抗辩，可以向受让人主张”，因此A选项符合法律规定。B选项，很据《民法典）第549条的规定，债务人对让与人享有的债权，且债务人的债权先于转让的债权到期，债务人可以向受让人主张抵销，因此B选项符合法律规定。C选项，债务人的债权和转让的债权是基于同一合同产生的，因此C选项符合法律规定。D选项，债权人甲转让债权不需要债务人乙同意，通知即生效，因此D选项不符合法律规定。（新缩）","chapter":"第六章 合同的转让"},
  {"id":169,"topic":"专题二 民法典合同编","type":"multiple","question":"梁某与甲旅游公司签订合同，约定梁某参加甲公司组织的旅游团赴某地旅游。旅游出发前15日，梁某因出卷通知甲公司，由韩某警代银用旅游。到达限行地后，为保证游客更好体验当地风情，未正得韩某同意，甲公司将其旅游业务转给当他的乙公司。下列郡些表述是正确的？（多选）","options":{"A": "山于梁某与甲公司之间签订的合同并未约定不得转让，因此梁某通知甲公司即发生合同转让效力", "B": "由于梁某与甲公司之间签订的合同并未约定不得转让，因此梁某应当与甲公司协商一致后合同转让才生效", "C": "为保证游客更好地体验当地风情，甲公司将其旅游业务转给当地的乙公司，转让有效", "D": "甲公司未与韩某协商，甲公司将其旅游业务转给当地的乙公司不生效"},"answer":"ABC","explanation":"。《民法典》第552条规定：“第三人与债务人约定加入债务并通知债权人，或者第三人向债权人表示愿意加入价务，债权人未在合理期限内明确拒绝的，货权人可以请求第三人在其愿意承担的债务范围内和债务人承担连带债务”，丙公司加入甲公司的债务，通知债权人乙公司时对乙公司生效，甲公司、丙公司示担连带债务，因B、C选项正确，D选项销误。（新编）","chapter":"第六章 合同的转让"},
  {"id":170,"topic":"专题二 民法典合同编","type":"multiple","question":"2021年2月1日，甲、乙签订买卖合同并约定半个月后同时履行。合同到期后，甲延迟一周交货，乙收到货物后未付货款10万元。2021年3月1日，甲与丙签订合同，将甲对乙的10万元债权转让给丙。2021年3月3日甲就转让通知乙。根据《民法典》的相关规定，乙的哪些主张符合法律规定：（多选）","options":{"A": "乙向丙提出只支付6万元，因为甲交付的货物有40%不合格", "B": "乙提出因甲欠乙4万元债务，且于2021年2月15日到期，因此只需支付丙6万元", "C": "乙主张只需支付6万元，因为合同约定，如果延迟履行合同，甲应当承担4万元违约金", "D": "乙提出因甲并未与其协商即转让债权，转让无效，只能按照合同约定向甲偿还"},"answer":"AB","explanation":"。在甲公司与因公司约定1可加入甲公司对乙公可的值务。该值！担协议自通知乙公司时对乙公可有放。此、A选项正确，D选项错误。中公可人公司约定丙公司加入甲公司对乙公可的务，但只永诺还100万元。因此，第三人公司仅在100万元范困内和价务人甲么一起对债权人乙公句承担述业贵任。用公司偿还了50万元。因此，乙公句有和求丙再支付50万元而非150万元。因此选项正确，C选项错误。（法考2020，甩扩展）终止","chapter":"第六章 合同的转让"},
  {"id":171,"topic":"专题二 民法典合同编","type":"multiple","question":"丙公司办公室改建装修，由甲装修公司包工包料进行施工，合同款首付10万元，验收合格后再支付10万元。装修开始后，丙并未支付首付款。甲公司向乙公司购买10万元建材，用于丙公司装修使用，约定货到付款。但是货运到后，甲公司未付款。乙公司向甲公司催款，甲、丙向乙联合发函：丙公司同意2026年专利代理师先格考试就10万元建材款承担还款责任。乙公司收到函件后、未进行回应。根据民法典的相关规定，以下说法哪些是正确：（多选）","options":{"A": "乙公司可以就其债权向甲公司主张偿还", "B": "乙公司可以就其价权向丙公司主张偿还", "C": "乙公司可以要求甲、丙承担连带价务", "D": "由于乙公司未同意丙公司还款，基于合同相对性，只能请求甲公司偿还债务"},"answer":"ABD","explanation":"。A选项；《民法典》第S57条2款规定：“合同解除的，该合同的权利义关系终止”，因此A选项正确。B选项，法典》第567条规定：“合同的权利义务关终止，不影响合同中结算和清理条款的力”，因此B选项正确。C、D选项，《民法第566条第：1款规定：“合同解除后，尚未行的，终止履行；已经履行的，根据履行情和合同性质，当事人可以请求恢复原状成采取其他补救措施，并有权请求赔偿损失因此C选项错误，D选项正确。（2015改编）","chapter":"第六章 合同的转让"},
  {"id":172,"topic":"专题二 民法典合同编","type":"multiple","question":"申公司欠乙公司200万元货款，甲公司与丙公司约定丙公司加人甲公司对乙公司的债务，但只承诺还100万元，并及时将情况通知了乙公司，乙公司表示同意，后丙公司偿还了50方元。根据《民法典》，下列哪些选项是正确的？（多选）","options":{"A": "该务承担协议自通知乙公司时对乙公司有效", "B": "乙公司有权请求丙再支付50万元", "C": "乙公司有权请求丙支付150万元", "D": "该务承担协议自乙公司同意时对乙公司有效"},"answer":"CD","explanation":"。A选项，《民法典》第565条第款规定：“当事人一方未通知对方，直接以起诉讼或者申请仲裁的方式依法主张解目合同，人民法院或者仲裁机构确认该主习的，合同自起诉状副本或者仲裁申请书副送达对方时解除”，A选项缺少“人民法院目专顾二民法典合回编认读解除合可的生张”的前提，因此A违项借误。日途项，非集与乙公可之间的转让及变更平合法合虎，不属千可欧销的民单法体行力：因此B逸项借误。C逸项，《民法类》诺563集诺1放规定：“有下列情形之一的，单人可以解除合同：·.（二）在质行财限届游前，当事人一方明确示成省以自已的行力农明不履行坐要价务“常袋在甲公司支付转让费启，停谈专利权转让价乙公可并办理完成专利权人受更乎馈，以自已的行为表明不履行对甲公司的债务，甲公可可以单方解除读专利权转让合同，因北C逸项正确。D逸项，根据《民法典》第566条第2款的规定，甲公可和带某之同的转让合同因学集的违约除，甲公可可以请求帮某承扭造约货任，因此D逸项正确。（新编）","chapter":"第六章 合同的转让"},
  {"id":173,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，关于合同解除的效力，下列哪些说法是正确的？（多选）","options":{"A": "合同解除的，合同的权利义务关系终止", "B": "合同的权利义务关系终止不影响合同中结算和清理条款的效力", "C": "合同解除后，已经履行的，当事人必须恢复原状", "D": "合同解除后，尚未履行的，终止履行"},"answer":"ABD","explanation":"。《民法奥》第563条第1效规定：“有下列情形之一的，当事人可以解除合同：（一）因不可抗力致使不能实现合同目的：（二）在履行期限届满之前，当事人一方明确表示或者以自己的行为表明不履行主要货务：（三）当事人一方退延履行主要债务，经催告后在合理期限内仍未厦行：（四）当事人一方退延履行债务或者有其他违约行为致使不能实现合同目的：（五）法律规定的其他情形”，因此A、B、D选项属于解除合同的情形，C选项不符合解除合同的条件。（2019）","chapter":"第七章 合同的权利义务终止"},
  {"id":174,"topic":"专题二 民法典合同编","type":"multiple","question":"李某和甲公司签订专利权转让合同。合同约定，李某将其名下的专利权转让给甲公司，甲公司支付转让费100万元。在甲公司支付转让费后，李某将该专利权转让给乙公司并办理完成专利权人变更手续。根据民法典合同编的规定，下列哪些说法是正确的？（多选）","options":{"A": "甲公司直接以提起诉讼的方式依法主张解除其与李某签订的专利权转让合同的，合同自起诉状刷本送达幸某时解除", "B": "甲公司可以请求人民法院微销李某将专利权转让给乙公司的行为", "C": "申公司可以单方解除其与李某签订的专利权转让合同", "D": "甲公司与李某签订的专利权转让合同解除后，甲公司可以请求李某承担违约责任"},"answer":"ABD","explanation":"。A选项，在尚未导致不能实现合同目的的状况下，甲延迟履行主要债务，乙应当先向甲催告，未催告情形下乙无权解除合同。B选项，合同主要债务已经履行，合同目的已经实现，一方当事人无权解除合同。C选项，电视机没有声音致使不能实现合同目的，一方当事人有权解除合同。D选项，电视机屏幂有坏点可以要求更换，不会致使不能实现合同目的，一方当事人无权解除合同。（2018改编）","chapter":"第七章 合同的权利义务终止"},
  {"id":175,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，有下列哪些情形之一的，当事人可以解除合同？多选）","options":{"A": "因不可抗力致使不能实现合同自的", "B": "当事人一方迟延履行主要债务，经催告后在合理期限内仍未履行", "C": "当事人一方不完全履行，但不影响合同目的的实现", "D": "在履行期限届满之前，当事人一方明确裘示或者以自己的行为表明不履行主要债务"},"answer":"AC","explanation":"。A选项，由于合同尚未到期，甲已将合同的标的物卖给了第三方丙，在甲乙之间的合同到期后，甲无法履行合同，因此甲的行为属于预期违约，人选项正确，选项，甲以自已的行为表明不履行生享多务，乙可以在到期之前除合同，因是项佣误，C选项正确。D遗项，甲与丙之同合同已展行完毕，且不存在《民法身）中知的无效情形：合同是有效的，因此D项年误。（2018）","chapter":"第七章 合同的权利义务终止"},
  {"id":176,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列哪些情况下，一方当事人无权解除合同？（多选）","options":{"A": "甲、乙签订钢材购销合同，约定甲在11月1日前向乙交付钢材500吨，货到付款。当过了11月1日，甲仍未向乙履行交付义务", "B": "甲、乙签订钢材购销合同，约定甲在11月1日前向乙交付钢材500吨，货到付款。11月1日，甲向乙交付钢材450吨，剩余50吨经催告后，仍未予交付", "C": "甲从商店购买电视机一台，回家后发现图像正常，但没有声音", "D": "甲从商店购买电视机一台，回家发现品质良好，只是画面边角处有一个“坏点”"},"answer":"BD","explanation":"。本题中，因甲向场到农历八》十五时仍未收到月饼，政使不能实现合同目的，甲商场可以解除合间，但是皮当通知乙食品厂，解除合同后，甲商场可以婴求乙化品厂承担违约费任，因此人、C选项错议，BD选项正确。（2008）","chapter":"第七章 合同的权利义务终止"},
  {"id":177,"topic":"专题二 民法典合同编","type":"single","question":"甲、乙订立房屋买卖合同，约定在1个月后甲将其自己的房屋过户登记给乙。但在交房日期到来之前，甲将该房高价出卖给了丙，并且办理了过户登记，下列哪些说法是正确的？（多选）2020年专利代现所并格考试","options":{"A": "甲的行为构成预期违约", "B": "乙只能在合同规定的交房日期到来后要求甲承担违约资任", "C": "乙有权解除与甲的房屋买实合同", "D": "甲与丙签订的房屋买卖合同无效"},"answer":"B","explanation":"。根据《民法典》第563条第1款的规定，因不可抗力致使不能实现合同目的的，当事人可以解除合同，农场因发生异司干早颗粒无收属于因不可抗力致使不能3现合同目的，因此农场可以单方解除合同，A选项错误，B选项正确。C选项，合同交更带要当事人协商一致，粮食加工厂不能单方变更合同，C选项错误。D选项，《民法典》580条第1款规定：“当事人一方不履行非会钱债务或者履行非金钱债务不符合约定的，对方可以请求履行，但是有下列情形之一的除外：（一）法律上或者事实上不能履行：（二）债务的标的不适于强制履行或者履行费用过商：（三）债权人在合理期限内未请京履行。”本题中属于事实上不能履行的情形。因此，粮食加工厂不能要求农场继续履行。D选项错误。（新编）","chapter":"第七章 合同的权利义务终止"},
  {"id":178,"topic":"专题二 民法典合同编","type":"multiple","question":"甲商场为在中秋节前销售月饼、与乙食品厂签订了一份月饼供销合同，约定乙食品厂在农历八月初五交货。后乙食品厂因人员变动等原因，未能按照约定及时交货。甲商场到农历八月十五时仍未收到月饼。对此，下列哪些说法是正确的？（多选）","options":{"A": "甲商场可以解除合同，但必须征得乙食品厂同意", "B": "甲商场可以解除合同，但是应当通知乙食品厂", "C": "甲商场不得解除合同，因为未向乙食品厂进行催告", "D": "甲商场可以要求乙食品厂承担违约责任"},"answer":"AD","explanation":"。《民法典》第568条规定：“当事人互负债务，该债务的标的物种类、品质相同的，任何一方可以将自己的债务与对方的到期债务抵销；但是，根据债务性质、按屋当事人约定或者依照法律规定不得抵销的际外。当事人主张抵销的，应当通知对方。通知自到达对方时生效。抵销不得附条件或者附期限”。本题中，甲公司欠乙商场的货款和乙商场欠甲公司的装修费都属于金债务，债务性质相同，可以主张抵销：申公司专隧二民法典合同编半张错应班加乙商进，无前住萨乙商间唐，出A、D造价正B、C连准借谈。（20tt改）时，","chapter":"第七章 合同的权利义务终止"},
  {"id":179,"topic":"专题二 民法典合同编","type":"multiple","question":"东北某农场和某粮食加工厂于2021年2月签订稻谷购销合同，约定农场于2021年12月底向加工厂供应稻谷1000吨，货到后付款。后农场因当地在2021年发生异常干阜而导致颗粒无收，无法履行供货合同。在此情形下，下列说法哪项是正确的？（单选）","options":{"A": "农场可以单方中止履行合同", "B": "农场可以单方解除合同", "C": "粮食加工厂可以单方变更合同", "D": "粮食加工厂可以要求农场继续履行合同"},"answer":"AC","explanation":"。A递项，乙以空谢市历仪收疗总法由世危史领的行方属平无正将理世世地处馈，甲听以提体，因比人逸质正喻。B、C选质：携存启的成资以及提存购用应当由乙来俱，调此B选货借，C连项正项，D连价，其若自提存之日是S年内乙不價取坚时，悦情况决定空归甲所有成者归国策所督，因此D途项借供。（法单2003）资任","chapter":"第七章 合同的权利义务终止"},
  {"id":180,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司欠乙商场货款12万元，同时乙商场应付甲公司装修费12万元。现甲公司欠款到期，甲公司欲以已到期的装修费冲抵货款。根据民法典合同编及相关规定，下列说法哪些是正确的？多选）","options":{"A": "甲公司可以将自己的债务与乙商场的债务抵销", "B": "双方债务性质不同，不得抵销", "C": "甲公司主张抵销的，须经乙商场同意", "D": "甲公司主张账前的、应当通知乙而坊"},"answer":"ABCD","explanation":"。《民法奖>第510条规定：“合同生放后，当事人统质业、价款或者报酬、厦行地点等内容没有约定成者约定不明确的，可以协以补完：不能达成补充协以的，按照合同相关条款或交易习惯确定”，《民法失》第582条规定：“履行不符合约定的，应当按凰当事人的约定承担违约责任。对造约贵任没有约定或者约定不明确，依据本法第510条的规定仍不能确定的，受损害方根据标的的性质以及损失的大小，可以合理选择请求对方承担侈理、重作、更换、退货、减少价款或者报酬等违约资任”，因此A、B、C、D选项均正确。（新编）","chapter":"第七章 合同的权利义务终止"},
  {"id":181,"topic":"专题二 民法典合同编","type":"multiple","question":"甲与乙签订销售空调100台的合同.但当甲向乙交乙以空调市与软为由，拒绝荣领，要求甲送还货款。下挪型是正确的？多造）","options":{"A": "甲可以向有关部们提存这批空调", "D": "若自提存之日起5年内乙不领取空调，则归甲所有", "C": "提存费用应由乙支付"},"answer":"ABCD","explanation":"。A、B、C选项，《民法典>第S7T条规定：“当事人一方不履行合同义务或者履行合同义务不符合约定的，应当承担继续履行、采取补救措施成者赔偿损失等违约资任”，因此A、B、C选项正确。D选项，《民法典》第585条第1款规定：“当事人可以约定一方违约时应当根据违约情况向对方支付一定效额的违约金，也可以约定因违约产生的损失赔偿额的计算方法”，因此D选项正确。（2012）","chapter":"第七章 合同的权利义务终止"},
  {"id":182,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，关于违约资任，下列说法哪些是正确的？（多选）","options":{"A": "合同对违约责任没有约定的，当事人可以签订补充协议", "B": "合同对违约责任没有约定又无法依法确定的，可以合理选择请求对方承担减少价款或者报酬等违约责任", "C": "合同对违约责任约定不明确又不能达成补充协议的，可以按照交易习惯确定", "D": "合同对违约责任没有约定又无法依法确定的，可以合理选择请求对方承担修理、重作、更换、退货等违约责任"},"answer":"ABCD","explanation":"。《民法典》第580条第1款规定：“当事人一方不履行非金钱债务成者履行非金钱债务不符合约定的，对方可以请隶规行，但是有下形之一的除外：（一）法律上成者事实上不能局与（二）债务的标的不适于强制履行战者履行费凡！商：（三）债权人在合理期限内未请求履行“，A、B、C、D选项均正确。（2017）","chapter":"第八章 违约责任"},
  {"id":183,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列关于违约责任的哪些说法是正确的？多选）","options":{"A": "当事人一方不履行合同义务的，应当承担违约责任", "B": "当事人一方履行合同义务不符合约定的，应当承担违约责任", "C": "承担违约责任的方式包括继续履行、采取补救措施、赔偿损失等-57.-2020年利代理邮其格考式", "D": "当事人可以约定一方违约时应当根据违约情况间对方支付一定数额的违约金，也可以约定因违约产生的损失赔偿额的计算方法"},"answer":"ABC","explanation":"。A选项，《民法典》第577条朔定：事人一方不履行合同义务成者履行合同义务不合约定的、应当示担他续履行、呆取补收增隐度赔偿损失等违约费任”，乙公句履行义务不特合定，甲公司有权求继续履行并支付违约会，因A逸项正确。B、D逃项，根据《民法典》第563条值款的规定，当事人一方退延履行价务或者有其价约行为致使不能实现合同目的的，当事人可以合同，因此B选项正确，D选项错误。C选项，（民典》第566条第12欺规定：“合同解除后，尚未团的，终正履行；已经履行的，根据履行情况和合自质，当事人可以请求恢复原状或者采取其他补变施，并有权请求赔偿损失。合同因违约解除的除权人可以请求违约方承担违约责任，但是当习另有约定的除外”，因此C选项正确。（2008）","chapter":"第八章 违约责任"},
  {"id":184,"topic":"专题二 民法典合同编","type":"single","question":"根据民法典合同编及相关规定，合同当事人一方不履行非金钱价务的，下列哪些情形下，另一方当事人不能要求其继续履行？多选）","options":{"A": "该债务的标的不适于强制履行", "B": "债权人在合理期限内未要求履行", "C": "该债务在法律上不能履行", "D": "该债务在事实上不能履行"},"answer":"A","explanation":"。《合同编通则解释》第65条规定：“约1违约金超过造成损失的30%的；人民法院一般1认定为过分高于造成的损失。”本题中约定的金为18万元，未超过实际损失15万元的30%，成约定的违约金过分商于造成的损失的情形，E甲应向乙支付18万元违约金。违约金本身就：偿损失、支付其他费用的作用，且已涵盖15万：损失，支付18万违约金后，无需再赔偿其他损因此A选项正确，B、C、D选项错误。（法考2013）","chapter":"第八章 违约责任"},
  {"id":185,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司和乙公司签订合同，约定：由乙公司按照要求为甲公司制造专用机床一台，甲公司预付款300万元，一方违约的应当向另一方支付违约金。机床交付后，经多次调试，仍不能实现合同目的。据此，下列哪些说法是正确的？多选）","options":{"A": "甲公司有权要求乙公司继续履行合同并支付违约金", "B": "因无法实现合同目的，甲公司有权要求解除合同", "C": "甲公司要求解除合同的，有权要求乙公司返还预付款并赔偿损失", "D": "合同已经履行完毕，甲公司无权要求解除合同"},"answer":"AD","explanation":"。《民法典》第588条第1款规定：“当：既约定违约金，又约定定金的，一方违约时，对：以选择适用违约金或者定金条款”；《民法典》第条规定：“债务人履行债务的，定金应当抵作价：者收回。给付定金的一方不履行债务或者履：务不符合约定，致使不能实现合同目的的，无.求返还定金；收受定金的一方不履行债务或者专隧二民法典合回价体不作合所定：实使不能类成合间自的的，应蓝双倍退还定金”。逃街金和定会个以摊共一，不傲间叶匠用，收变是金的一方乙公可不晨柠价券，使不他其就合同甘的的，世当状借选连定金，回此A、D连质正质：B、C连项借供。（2010收）","chapter":"第八章 违约责任"},
  {"id":186,"topic":"专题二 民法典合同编","type":"multiple","question":"甲乙签订一份买卖合同，约定违约方应向对方支付18万元违约金。后甲违约，给乙造成损失15万元。下列哪一表述是正确的？(单选）","options":{"A": "甲应向乙支付违约金18万元，不再支付其他费用或者赔偿损失", "B": "甲应向乙赔偿损失15万元，不再支付其他费用或者赔偿损失", "C": "甲应向乙赔偿损失15万元并支付违约金18万元，共计33万元", "D": "甲应乙偿脚失15万元皮其利息"},"answer":"ABC","explanation":"。根据《南法费>策S88靠第（款的规定：从借监还定金身支件遂均金不能同时进用，毕余造费佳承想券光舟平以并用，因此A、B、C逸货正确，D选项借供。（2017）","chapter":"第八章 违约责任"},
  {"id":187,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司与乙公司签订了一份购销合同，合同总价款为20万元，双方约定，一方进约的，需支付总价款3%的违约金，甲公司还依约定所乙公司支付了定金1万元。后乙公司未殿行合同约定的义。根民法典合同编及相关规定，下列说法挪些是正确的？（多选）","options":{"A": "甲公司可以婴求乙公司双借返还定金", "B": "甲公司只能要求乙公司支付违约金", "C": "甲公司可以要求乙公司双倍返还定金，同时支付违约金", "D": "甲公司可以选择适用定金或者违约金条款"},"answer":"AB","explanation":"。A.D途项，（民淤典）铭S93集规定：“当事人一方因铭当人的康因造成选均的，底当货法府财方承据违约费任”因乙公何的原因导甲公可对带集造街的，应山甲公司向带集承推造街费任，因此A逸项正确，D途项借供。B、C逸项，《民典》第590条规定：”些事人一方因不可抗力不能展行合同的，报据不可抗力的影响，部分成者全部免除费任，但是法你另有规定的除外。因不可抗力不能履行合同的，应当及时通知对方，以减轻可能给对方造成的摄失，并应当在合理期限内是供证明。当事人运延履行后发生不可抗力的，不免除其违约责任。”，突通山洪属干不可抗力因素，但乙公司晚于甲公司要求的时间开始运输，属干退延履行，不能免除其选约责任，因此B选项正确，C选项错误。（新编）","chapter":"第八章 违约责任"},
  {"id":188,"topic":"专题二 民法典合同编","type":"single","question":"根据民法典合同编及相关规定，下列哪些属于可以并用的违约责任承担方式？多选）","options":{"A": "继续履行与赔偿损失", "B": "继续履行与支付违约金", "C": "采取补救措施与赔偿损失", "D": "双倍返还定金与支付违约金"},"answer":"A","explanation":"。《民法典》第593条规定：“当事人一方因第三人的原因造成违约的，应当依法向对方承担违药资任。当事人一方和第三人之间的纠纷，依煎法律规定成者按照约定处理”。本题中，汽车买卖合同的当事人双方为甲公司和乙公司，因此当甲公司无法交货，乙公司有权请求甲公司承担违约责任，甲公司可以按照零部件买卖合同要求丙公司承担违约资任，丙公司可以按照运输合同要求丁公司承担违约资任，因此A选项正确，B、C、D选项错误。(2017)","chapter":"第八章 违约责任"},
  {"id":189,"topic":"专题二 民法典合同编","type":"single","question":"2022年9月1日，李某在网站上购买甲公司的商品，同年9月2日，甲公司将该商品交付承运人乙公司，要求乙公司于同年9月7日前将该商品送达李某。乙公司迟至同年9月8日开始运输，同年9月9日，乙公司在运输过程中因突巡山洪导致该商品灭失。根据民法典合同编的规定，下列说法哪些是正确的？多选）","options":{"A": "甲公司应当向李某承担违约责任", "B": "乙公司不得免除违约责任", "C": "乙公司可以部分或者全部免除违约责任", "D": "甲公司和乙公司应当向李某承担违约责任"},"answer":"C","explanation":"。根据《民法典》第586条第2款规定，定金的数额由当事人约定；但是，不得超过主合同标的额的20%，翅过部分不户生定会的力，实久付的定金数期多于成非少于约定数额的，税为变贝约定的定金数额。本期中、实际支付定金15万元，并朱超出主合同的20%，以实标文付定金为准。乙公可收受定金后一直未交货，致使不能实现分局的，甲公司可请求乙公司或还双信的定舍即20万元，因此C通项正确。（新编）","chapter":"第八章 违约责任"},
  {"id":190,"topic":"专题二 民法典合同编","type":"single","question":"北京甲公司和上海乙公司签订汽车买卖合同，约定甲公司组装生产并向乙公司出售500辆汽车。甲公司2026年专利代理师井格考试递与内公司签订零部件买奖合同.向丙公司购买组装生产汽车所需要的车轮。丙公司与丁公司签订车轮的运输合同，运输途中，由于丁公司驾驶员的疏忽发生交通事故致货物受损，由此导致甲公司无法交货。根据民法典合同编及相关规定，下列哪种说法是正确的？（单选）","options":{"A": "乙公司有权请求甲公司承担违约资任", "B": "乙公司有权请求丙公司承担违约责任", "C": "乙公司有权请求丁公司承担违约责任", "D": "乙公司有权请求丁公司驾驶员承担违约责任"},"answer":"C","explanation":"。根据（民法典》第586条、角587线义：“定金的数额由当事人约定1但是，不得超过里合同标的额的20%，超过部分不产生定金的效力。实际交付的定金数额多于或者少于药定数额的，键为变更药定的定金数额。债务人履行债务的，定金应当抵作价款或者收回。给付定金的一方不履行债务或者履行债务不符合约定，致使不他实现合同目的的，无权请求返还定金；收受定金的一方不是行债务或者履行债务不符合约定，致使不能实现合同目的的，应当双倍返还定金。“本题中甲交付给乙的15万元定金超过合同标的的20%，仅只有10万元认定为定金，另外5万元不发生定金效力，在乙违约后双倍退还定金应当退还20万定金，加上5万元，共计应当退还25万元。因此C选项正确。（新编）","chapter":"第八章 违约责任"},
  {"id":191,"topic":"专题二 民法典合同编","type":"single","question":"甲公司向乙公司购买价值100万元的货物。合同约定由甲公司向乙公司支付定金10万元，甲公司支付定金15万元。后乙公司未交货，致使不能实现合同目的。根据民法典合同编的规定，甲公司能请求乙公司返还的定金数额是？（单选）","options":{"A": "10万元", "B": "15万元", "C": "30万元", "D": "20万元"},"answer":"A","explanation":"。A、D选项，詹某与小翠之间成立合同关系，小翠无正当理由未履行一个月的钢琴投课合同义务，应当承担违约责任。根据《民法典》第581条规定：“当事人一方不履行货务或者履行债务不符合约定，根据债务的性质不得强制履行的，对方可以请求其负担由第三人替代履行的费用。”据此，小翠无正当理由未对詹某履行提供钢琴投课的合同义务，借某可请求第三人履行该义务，并请求小翠承担相应的费用。因此A项正确，D项错误。BC选项，根据《民法典》第584条规定：“当事人一方不履行合同义务或者履行合同义务不符合约定，造成对方损失的，损失赔偿额应当相当于因违约所通成的损失，包括合同履行后可以获得的利益；但是不得超过违约一方订立合同时预见到或者应当五专二民法典合回编其到的因进片才进成的携失。“未题中，小准进时给詹基资成的只骨董境携失（詹基支山的谈借2000元），无叶体付查价失。同时，满格博向小詹提供销禁恢课与小第向小詹他供销季便课，均他送列相间的清借发票，詹集来因北道受惯失。因北，个禁应对詹集采俱造身携步赔售他围仅方2000元。（法考","chapter":"第八章 违约责任"},
  {"id":192,"topic":"专题二 民法典合同编","type":"single","question":"甲与乙签订一份货款为人民币50万元的买卖合同，并依约定交付给乙定金人民币15万元。后乙违约没有履行该合同。乙应返还给甲人民币？（单选）","options":{"A": "10万元", "B": "20万元", "C": "25万元", "D": "30万元"},"answer":"B","explanation":"维护展）","chapter":"第八章 违约责任"},
  {"id":193,"topic":"专题二 民法典合同编","type":"multiple","question":"詹某将房屋租给音乐生小翠，约定小翠教詹某儿子小詹弹钢琴，每晚一小时，课时费抵房租。上了几个月的课后，小翠消失了一个月，詹某只能另请洪老师上课，一个月课时费2000元。一个月后小翠回来，詹某可以向小翠主张多少数额的违约责任？单选）","options":{"A": "其支出的课酬2000元", "B": "当蜓音乐生的平均课酬3000元", "C": "当越平均房包4000元", "D": "小菜无细支付任何费用"},"answer":"CD","explanation":"。定叁的效馈由游单人均定：但是，不得超过合同标的质的20%，题连带分不产生定金的效力。河怎和带集之间的美费合同你的级力！万元，定金最多力2000元，哥带提向刘装义付5000完定金。因此，5000元中，2000元产业定金的效力，3000元不产生定金的发力。后刘集不小心将崇烟党博碑，导政根本违均，优法应当承据及倍逻还定金的罚则，即4000元，那加上不产生定金效力的3000元，刘某应当向学集返还7000元。因北，A、B选项错误，C选项正确。D选项，低据《民法澳》第593条规定”当事人一方因第三人的原因造成违约的，应当依法向对方承担违约资任。”李某因刘某的原因造成对胡某的违约，依法应当向胡某承担造约责任，即及倍返还胡某向李某给付的2万元定会。因此，D选项正确。（法考2022改编，思维扩展）","chapter":"第八章 违约责任"},
  {"id":194,"topic":"专题二 民法典合同编","type":"multiple","question":"幸某在吉院店发规刘某以「万元出售一只清代烟壶，李某知道这壹是一对。收藏家胡果寻求另一只正以10万元报价在古园内收购，幸集与刘某达成协议以1万元购买，于3日后付款，并向刘某支付5000元定金。零某前往胡某家中以10万元达成协以，3日内交货，胡某向零某支付2万元定金。3日后刘某取出时不小心将紫烟壶碎。关于本案，下列哪一说法是正确的？（多选）","options":{"A": "刘某只需将定金返还给李某", "B": "刘某应当向李某返还5000元双倍定金", "C": "刘某应当向李某返还7000元定金", "D": "李某应当向胡某返还20000元双倍定金"},"answer":"ABD","explanation":"。A选项，房地产公司展示的模型与小区实际设计不符，构成对赵某的欺诈，因此购房合同属于可销合同，赵某有权要求退房，A选项正确。B、D选项，撤销后有过错的房地产公司应承担缔约过失责任，如果赵某不中请缴销，则可以违约为由，请求房地产公司承担违约责任，因此B、D选项正确。C选项，买卖合同的解除或者缴销均无双倍返还的规定，因此C选项错误。（新编）合同","chapter":"第八章 违约责任"},
  {"id":195,"topic":"专题二 民法典合同编","type":"multiple","question":"喜好网球和游泳的赵某从某房地产公司购买某小区商品房一套，交房时发现购房时该公司售楼部所展示的该小区模型中的网球场和游泳池并不存在。经查，该小区设计中并无网球场和游泳池。根据民法典合同编及相关规定，下列说法正确的是？多选）","options":{"A": "因房地产公司的行为构成欺诈，赵某有权要求退房", "B": "赵某如不要求退房，有权请求该房地产公司承担违约责任", "C": "赵某如要求退房，有权请求该房地产公司双倍返还购房款", "D": "赵某如要求退房，有权请求该房地产公司承担缔约过错责任2020年利代理所并格考供"},"answer":"BD","explanation":"。根据《民法典》所确定的有尔合同典：19种、具体包括：买实合同、供用电、水、气、然为同，赠与合间，借款合同，保证合间，租货合同，租货合同，保理合同，承揽合同，建设工报合同，输合同、技术合间，保管合同，仓储合同，委托合目物业服务合同，行纪合同，中介合同，合伙合同，此B、D选项正确，A、C逃项借误。（2018）","chapter":"第八章 违约责任"},
  {"id":196,"topic":"专题二 民法典合同编","type":"multiple","question":"下列哪些合同属于《民法典》中规定的有名合同？（多选）","options":{"A": "合作经营合同", "B": "融资租赁合同", "C": "劳务派遗合同", "D": "技术合同"},"answer":"BCD","explanation":"。A遇项，根据《民法典》第859、860的规定，当事人之间可以约定申请专利的权利，！约定优先，因此A选项技术合同有效。B、C、D：项，《民法典》第850条规定：“非法垄断技术或者1害他人技术成果的技术合同无效”，《最高人民法！关于审理技术合同纠纷案件适用法律若干问题解释》第10条规定：“下列情形，属于民法典第8！条所称的·非法垄断技术：…（二）限制当事人方从其他来源获得与技术提供方类似技术或者.其竞争的技术（四）要求技术接受方接受并：实施技术必不可少的附带条件，包括购买非必得！技术、原材料、产品、设备、服务以及接收非必密自人员等…（六）禁止技术接受方对合同标的技知识产权的有效性提出异议或者对提出异议附分条件”，因此B、C、D选项中技术合同均无效。（200改编）","chapter":"第九章 技术合同"},
  {"id":197,"topic":"专题二 民法典合同编","type":"single","question":"根据民法典合同编的规定，下列哪些技术合同无效？（多选）","options":{"A": "甲公司与乙公司签订的技术开发合同，约定就开发完成的发明创造申请专利的权利属于甲公司", "B": "丙公司与丁公司签订的技术服务合同，约定丁公司不得从其他公司获得类似技术或者其他竞争性技术", "C": "戊公司与已公司签订的技术转让合同，约定已公司购买与实施该技术无关的大型设备五台", "D": "庚公司与辛公司签订的专利实施许可合同，约定辛公司不得对该专利提出无效宜告请求"},"answer":"B","explanation":"。《民法典》第850条规定：“非法垄断技和或者侵害他人技术成果的技术合同无效”。A过项，技术转让合同标的为他人技术秘密，属于侵害他人技术成果的技术合同，合同无效，因此甲公司应当承担缔约过失责任，除返还乙公司支付的对价，还应当赔偿乙公司因此受到的损失，A选项错误。《最高人民法院关于审理技术合同纠纷案件适用法律若干问题的解释》第12条规定：“根据民法典第850条的规定，侵害他人技术秘密的技术合同专随二民法典合回健确认无效府：除法体，行改法展定件规定的以外：等度联阵读长术协管的一方当本人叶以企比放作叶的尚团内腾医使用滨使来传世：但应当身快科人支仟合唐府侠用算并来世依借义养。“B通项：世千七公可本中公可传让的快术债管使府公时府快米成展并不册情且文停了合磨对价：属于善房限件，乙公司呼以在地联得时的范国内應使用该米防：但虚向内公可支停合限的使用，四北B选项正确。C、D选项，甲公可身乙公司雀的收长普转让合同因使事诱公可的术成果府光效，乙公司财甲公可递过不正当币伙从请公司谈得术杨诺并不知情，展善宽的，偿权费任应自让与人甲公司单德承想，面非非有甲公司和乙公司向附公司承扭连带党任，因此C、D逸项借误。（新编）","chapter":"第九章 技术合同"},
  {"id":198,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司向乙公司转让了一项技术秘密。技术转让合同履行完毕后，经查该技术秘密是甲公司通过不正当手段从丙公司获得的，但乙公司对此并不知情，且支付了合理对价。下列哪项说法是正确的？（单选）","options":{"A": "乙公司有权要求甲公司返还其支付的对价，但不能要求甲公司赔偿其因此受到的损失", "B": "乙公司可在其取得时的范围内继续使用该技术秘密，但应向丙公司支付合理的使用费", "C": "技术转让合同无效，甲公司和乙公司应向丙公司承担连带责任", "D": "技术转让合同有效，但甲公司应向丙公司承担侵权责任"},"answer":"BD","explanation":"。《民法实》第859条规定：“资托开发完成的发明创造，除法另有规定或当事人另有约定外，申请专利的权利属于研克开发人。研兜开发人取得专利权的，委托人可以依法实施该专利。研究开发人转让专利申请权的，交托人享有以同等条件优先受让的权利”。本题中，乙研完所为受托人，实际完成了研发，在甲公司和乙研究所没有约定的前提下，申请专利的权利属于乙研克所，若乙研究所的该专利申请被设予专利权，则甲公司可以依法实施该专利，若乙研究所转让该专利申请权，则甲公司享有以同等条件优先受让的权利，因此A、C选项错误，B、D选项正确。（2013改编）","chapter":"第九章 技术合同"},
  {"id":199,"topic":"专题二 民法典合同编","type":"single","question":"甲公司委托乙研究所为其开发一钟技术，井签订了技术开发合同.但双方没有约定提术成果的归属，乙究所按约定文付丁符合要求的技术成果，甲公司按约定支付了胡究并发经费和提酬。后乙研究所就该技术成果交了专利申请。根民法典合同编及相关规定，下列哪些说法是正确的（多选）","options":{"A": "乙研究所就该技术成果申销专利的行为侵犯了甲公司就该技术成果申请专利的权利", "B": "乙研究所享有就该技术成果申请专利的权利，但若乙研究所转让该专利申请权，则甲公司享有以同等条件优先受让的权利", "C": "如果乙研究所的该专利申请被授予专利权，则甲公司未经乙研究所许可，不得以生产经营为目的实施该专利", "D": "如果乙研究所的该专利申请被授予专利权，则甲公司可以依法实施该专利"},"answer":"A","explanation":"。《民法实》第860条规定：“合作开发完成的发明创造，申请专利的权利属于合作开发的当事人共有；当事人一方转让其共有的专利中请权的，其他各方享有以同等条件优先受让的权利。但是，当事人另有约定的除外合作开发的当事人一方不同意申请专利的，另一方或者其他各方不得申请专利”，因此A选项正确，B、C、D选项错误。(2015)","chapter":"第九章 技术合同"},
  {"id":200,"topic":"专题二 民法典合同编","type":"single","question":"张某和李某合作开发完成一项发明创造，但未约定权利归属。该项发明创造完成后，张某想要申请专利，而李某则想通过商业秘密保护，不同意申请专利。根据民法典合同编及相关规定，下列哪种说法是正确的？（单选）","options":{"A": "张某不得申请专利", "B": "张某可以申请专利，获得授权后专利权归张某和李某共有", "C": "张某可以申请专利，获得授权后专利权归张某所有，李某可以免费实施该专利", "D": "张某可以申请专利，获得授权后专利权归张某所有，但获得的收益应在两人之间分配"},"answer":"A","explanation":"。A、B、D选项，《民法典》第860条规定：“合作开发完成的发明创造，申请专利的权利属干合作开发的当事人共有当人一方让实专利申请权的，共他各力享有以何等务作优久的权利，但是，当事人另有约定的除外，台分的当事人一方市明放齐其共有的专利中请软！当事人另有约定外，可以由另一方单验中调其他各方共同中请。中请人取得专利权的，放利申请权的一方可以免费实施慎专利。合什的当事人一方不同意申请专利的、月一力或会各方不得申请专利”，因此A选项销议，B、D通确。C选项，（民法典》第863条邻3款规定：“转让合同和技术许可合同应当染用书面形式此C选项正确。（2018）","chapter":"第九章 技术合同"},
  {"id":201,"topic":"专题二 民法典合同编","type":"multiple","question":"甲、乙订立合作开发协议，约定共同完成一项发明，但就该项发明的专利申请权未作约定，下列说法错误的是？（单选）2020年专利代理部先格考试","options":{"A": "如果甲不同意申请专利，乙可以自行申请", "B": "如果甲放弃申请专利，乙可以单独申请，但取得专利后，甲有免费使用的权利", "C": "如果甲准备转让其专利申请权、必须订立书面合同", "D": "如果甲准备转让其专利申请权、乙在同等条件下有优先受让的权利"},"answer":"AD","explanation":"。A选项，《民法典》第851条规定：1开发合同是当事人之问就新技术、新产品、新工新品种或者新材料及其系统的研究开发所订！合同。技术开发合同包括委托开发合同和合发合同”，甲公司委托乙公司完成技术开发，为引技术开发合同，因此A选项正确。B选项，甲、2司约定于未来订立设备买卖合同，为买卖合同的约，买卖合同尚未成立，不属于附条件的合同，因B选项错误。C选项，乙公司将设备出卖给丙公不违反法律规定的合同有效要件，其合同有效，此C选项错误。D选项，乙公司将设备出卖给两司，导致无法与甲公司订立买卖合同，构成预约同的违约，乙公司应承担违约资任，因此D选项确。（法考2017改编）","chapter":"第九章 技术合同"},
  {"id":202,"topic":"专题二 民法典合同编","type":"multiple","question":"甲、乙两公司约定：甲公司向乙公司付5万元研发费用，乙公司完成某专用设备的研发生产后双方订立买实合同，将该设备出售给甲公司，价格暂定为100万元，具体条款另行商定。乙公司完成研发生产后，却将该设备以120万元实给丙公司，甲公司得知后提出异议。下列哪些选项是正确的？多选）","options":{"A": "甲、乙两公司之间的协议为技术开发合同", "B": "甲、乙两公司之间的协议系附条件的买卖合同", "C": "乙、丙两公司之间的买卖合同无效", "D": "甲公司可请求乙公司承担违约责任"},"answer":"BCD","explanation":"。A选项，相关法律法规没有对技术询合同来用的形式作出限制。B、C选项，（民法身第863条第3款规定：“技术转让合同和技术许可同应当采用书面形式”，因此B、C选项正确。Di项，（民法典》第851条第3款规定：“技术开发合1应当采用书面形式”，因此D选项正确。（2008改编","chapter":"第九章 技术合同"},
  {"id":203,"topic":"专题二 民法典合同编","type":"single","question":"根据民法典合同编的规定，下列哪些合同应当采用书面形式？（多选）","options":{"A": "技术咨询合同", "B": "技术许可合同", "C": "技术转让合同", "D": "技术开发合同"},"answer":"D","explanation":"。A选项，《民法典》第863条第2、3款短定：“技术许可合同包括专利实施许可、技术秘密债用许可等合同。技术转让合同和技术许可合同应当采用书面形式”，因此A选项错误。BC选项，专避二民法典合同《民法集）举86S等质定：“专村安鼎作叶合间伙在资专科权的华读期展内件收。专村似有农所膜府满或普专利以资堂告无发的，专有以人不阶院设中错黄。D逸质，《民决费》带866靠境定：“专利觉虏降可合同的许可人应当偿展伤定可使才人学唐专利，交件实虏专利体笑的技术费料，提供必限的快术指导”因此D选项正响。（2017改）","chapter":"第九章 技术合同"},
  {"id":204,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列关于专利实施许可合同的哪种说法是正确的？（单选）","options":{"A": "专利实施许可合同可以采用口头形式", "B": "专利权有效期限届满的，专利权人仍然可以就该专利与他人订立专利实施许可合同", "C": "专利权被宣布无效的，专利权人仍然可以就该专利与他人订立专利实施许可合同", "D": "专利实施许可合间的许可人应当照约定作可波许可人实施专利，交付实他专利有关的技术贷料，是供必婴的技术指导"},"answer":"ACD","explanation":"。A虑项，《民决质>第863兼第3款比是：”使求转让合同和术毕可合同应当来用恰资形式”，因此A逸项正崎。B途项《民决类>第875条规定：当事人审以偿照蓝利的限则，雀合同中街定实属节利、便用提术秘曾后续改进的性术成集的分事办货：没有均定或者钧定不明确，依据木法第510条的规定仍不能确定的，一万后续改进的技术成果，其他各方无权分享”，因此B途项错误。C逸项，《民法典》第871条规定：“技术转让合同的受让人和技术许可合同的被许司人应当按履约定的范国和期限，对让与人、许可人提供的技术中尚未公开的密部分，承担保密义务”，因此C选项正确。D选项，《民法实》第865条规定：”专利实施许可合同仅在该专利权的存续期限内有效。专利权有效期限届满或者专利权被宜告无效的，专利权人不得就该专利与他人订立专利实施许可合同”，因此D选项正确。（新编）","chapter":"第九章 技术合同"},
  {"id":205,"topic":"专题二 民法典合同编","type":"multiple","question":"供将民法典及相关规定，下列关于技术转让合同的邮些战法局正确的？（多选）","options":{"A": "技术秘密转让应当采用书而形式", "D": "专利实施许可合同只在该专利权的存续期限内", "C": "专利实施许可合同的被许可人应当按照约定的范围和期限，对让与人提供的技术中尚未公开的秘密部分，承担保密义务有效"},"answer":"AD","explanation":"。《民法典》第874条规定：“受让人或者被许可人按凰约定实施专利、使用技术秘密侵害他人合法权益的，由让与人或者许可人承担责任，但是当事人另有约定的除外”，如果甲乙公司之间对损害赔偿有约定，则按照约定进行赔偿，如果甲乙公司之间对损害赔偿没有约定，应由让与人乙公司向丙公司承担赔偿资任，因此A、D选项正确，B、C选项错误。（2019）","chapter":"第九章 技术合同"},
  {"id":206,"topic":"专题二 民法典合同编","type":"single","question":"甲公司利用从乙公司受让的一项专利技术所生产的专利产品被丙公司指控为侵权，人民法院判决侵权成立，并要求甲公司赔偿损失2000万元。根据民法典合同编及相关规定，下列说法正确的是？多选）","options":{"A": "如果甲乙公司之间对损害赔偿没有约定，应由乙公司向丙公司承担赔偿责任", "B": "如果甲乙公司之间对损害赔偿没有约定，应由甲公司向丙公司承担赔偿责任", "C": "如果甲乙公司之间对损害赔偿没有约定，由甲公司、乙公司承担连带责任", "D": "如果甲乙公司之间对损害赔偿有约定，则按照约定进行赔偿"},"answer":"D","explanation":"。《民法典》第878条第1款规定：“技术咨询合同是当事人一方以技术知识为对方就特定技术项目提供可行性论证、技术预测、专题技术调查、分析评价报告等所订立的合同”，因此A.BC员习储误：D选项正确（新编）","chapter":"第九章 技术合同"},
  {"id":207,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，当事人一方以技术知识为对方就特定技术项目提供可行性论证所订立的合同属于下列哪种合同？（单选）","options":{"A": "该合同属于技术咨询合同", "B": "如果乙研究所未按期提供咨询报告，则应当承担", "C": "如果双方没有约定，则乙研究所利用甲单位提供的技术资料和工作条件完成的新的技术成果，属于甲单位", "D": "如果双方没有约定，则甲单位按照乙研究所符合约定要求的咨询报告和意见作出决策所造成的损失，由乙研究所承担"},"answer":"AB","explanation":"。A选项、《民法典》第878条帛1身定：“技术欲询合同是当事人一力以技水识为方就特定技术项目提供可行性论证、收水预思、期技术调查、分析诉价报告等所订立的合同”，经同属于技术咨询合同，因此A选项Ⅱ确。Ⅱ跑具，《民法典》第881条第2数规定：“技术咨询合同的费托人未按期提出咨询报告或提出的咨询银合不符合约定的、应当承担减收或常免收报时等违约受任”，因此B选项正确。C遇项，《民法典》第885告规定：“技术咨询合同、技术服务合同履行过程中，受托人利用委托人提供的技术资料和工作条件究成的新的技术成果，属于受托人”，因此C选习错误。D选项，《民法典》第881条第3款规定：“包术咨询合同的委托人按照受托人符合约定要求药咨询报告和意见作出决策所造成的损失，由委托人承担，但是当事人另有约定的除外”，因此D选项误。（2012改编）合同","chapter":"第九章 技术合同"},
  {"id":208,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列关于委托合同的哪些说法是正确的？（多选）","options":{"A": "委托合同是委托人和受托人约定，由受托人处理委托人事务的合同", "B": "受托人应当亲自处理委托事务，经委托人同意，受托人可以转委托", "C": "受托人应当按照委托人的要求，报告委托事务的处理情况", "D": "有偿的委托合同，因受托人的过错给委托人造成损失的，委托人可以要求赔偿损失"},"answer":"ABCD","explanation":"。A选项，《民法典》第：919条规定：“委托合同是委托人和受托人约定，由受托人处互委托人事务的合同”，因此A选项正确。B选项，《民法典》第923条规定：“受托人.应当亲自处理委托事务。经委托人同意，受托人可以转委托………”，因此B选项正确。C选项，《民法典》第924条规定：“受光人应当按照委托人的要求，报告委托事务的处理情况·….”，因此C选项正确。D选项，《民法）第929条第1款规定：“有偿的委托合同，因受托人的过错造成委托人损失的，委托人可以请求赔偿损失……”，因此D选项正确。（2012改编）","chapter":"第十章 委托合同"},
  {"id":209,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编的规定，下列关于委托合同的说法哪些是正确的？（多选）","options":{"A": "娄托合间可以来用非书面形式", "B": "委托合间可以是无偿的", "C": "姿托合同可以就一项或教项事务特别委拍受托人处理，也可以低括安托受托人处理一印事务", "D": "学托人处理委托事务收得的财产，应当转交给委托人"},"answer":"ABCD","explanation":"。A选项，委托合同原则上属于不县式合同，当事人可以采用口头形式或书面形式，因此A选项正确。B选项，《民法典》第929条第1款规专二民法典合同是：“有偿的要任合同，回史化人的过借造虎奥任人携失的，要怡人可以请是赠信借失。无借情委格合同，因变人尚齿意成护重大过失逸成食论人价失的，零人可以请来赠借价失”，因此委格合同可以是完信的，日医项正，C连项，（民法类>第920靠现定：“委人听以侍财委坨变化人处理一低业普数项单券，世呼以履倍委倍变化人处理一切单券”因此C速项正衡。D选项，（民决货>铭927常规定：更化人处理委化事务限得的财产，应当传突作资托人“，因此D选项正确。（2007改）","chapter":"第十章 委托合同"},
  {"id":210,"topic":"专题二 民法典合同编","type":"multiple","question":"甲农场委托乙运输公司将农场的水果运往集市水果市场。合同签订后，乙运输公司有更大的运输业务，欲将运输甲农场水果的任务委托给丙运输公司。恨民法典合同编及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "乙运输公司经甲农场同意，可以转委托丙运输公司运输甲农场的水果", "B": "乙运输公司有权转委托丙运输公司，仅需事后通知甲农场", "C": "转委托未经甲农场同意的，乙运输公司应当对丙运输公司的行为承担责任", "D": "转委托未经甲农场同意的，乙运输公司仅需就其对丙运输公司的指示承担责任"},"answer":"AC","explanation":"。《民溃集》第923养规定：“变坨人应条自处理费坨事务。悠委托人同兔，变人可以转资托。转要托经同意成追认的，委托人可以就资托事务置核指常转委托的第三人，受托人仅就第三人的选任及其对第三人的指示承担费任。转委托未经同意或者追认的，受托人应出对转责托的第三人的行为承担费任：但是，在震忽情况下变托人为了维护委托人的利益得要转变托第三人的除外”，因此A、C选项正确，B、D选项误。（2015改编）","chapter":"第十章 委托合同"},
  {"id":211,"topic":"专题二 民法典合同编","type":"multiple","question":"王某委托胡某销售一批货物，双方约定胡某不收取报酬。根据民法典合同编及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "胡某有权请求王某偿还为处理委托事务垫付的必要费用及其利息", "B": "胡某因为故意给王某造成损失的，王某可以要求胡某赔偿", "C": "胡某因为重大过失给王某造成损失的，王某可以要求胡某赔偿", "D": "如果胡某转委托第三人处理王某委托的事务，应经过王某同意"},"answer":"ABCD","explanation":"。A选项，（民法典）第92I条规定：“委托人应当预付处理委托事务的费用。受托人为处理委托事务垫付的必要费用，类托人应当偿还该费用并支付利息”，因此A选项正确。B、C选项，《民法美>第929条第1款规定：“…无偿的娄托合同，因受托人的故意成者重大过失造成委托人报失的，委托人可以请求赔偿损失”，因此B、C选项正确。D选项，根据（民法典》第923条的规定，经委托人同意，受托人可以转委托，因此D选项正确。（2010改编）","chapter":"第十章 委托合同"},
  {"id":212,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司委托乙专利代理机构代为处理本公司专利2026年专利代理师开格考试事务。对此，下列说法哪些是正确的？（多选）","options":{"A": "即使合同没有提及乙处理相关事务的费用负担，甲公司仍有义务支付乙事务所为处理委托事务而垫付的费用", "B": "经甲公司同意，乙可以转委托，同时对第三人的行为承担责任", "C": "乙可以随时解除与甲公司的合同", "D": "因不可归责于乙的事由，委托事务不能完成的，甲公司应当向乙支付相应的报酬"},"answer":"ACD","explanation":"。A选项，《民法典》第921条规定：“委托人应当预付处理委托事务的费用。受托人为处理委托事务垫付的必要费用，委托人应当偿还该费用并支付利息”，因此A选项正确。B选项，（民法典》第923条规定：“转委托经同意成者追认的，委托人可以就委托事务直接指示转委托的第三人，受托人仅就第三人的选任及其对第三人的指示示担贵任”，受托人就第三人的行为不录抱任、因此B选项佣误：C通项：（民法典>第933多定：“委托人成者受托人可以随时朔除我死同…”因此C通项正确。D选项，（民法典）928条第2款规定：“因不可归贵于受托人的事由委托合同解除成者委托事务不他究成的，委人，当向受托人支付相应的报酬…”，因此D选项.确。（2018）","chapter":"第十章 委托合同"},
  {"id":213,"topic":"专题二 民法典合同编","type":"single","question":"甲公司委托姚某购买一批化肥。在甲公司的授权范围内，姚某以自己的名义与乙公司签订了一份化肥买卖合同，并在订立合同的过程中，将他与甲公司之间的代理关系告诉了乙公司。根据民法典合同编及相关规定，下列关于该买卖合同的说法哪项是正确的？（单选）","options":{"A": "该合同直接约束姚某和乙公司，但有确切证据证明该合同只约束甲公司和乙公司的除外", "B": "该合同直接约束甲公司和乙公司，但有确切证据证明该合同只约束姚某和乙公司的除外", "C": "该合同直接约束甲公司、乙公司和姚某", "D": "该合同无效，对甲公司、乙公司和姚某均没有约束力"},"answer":"B","explanation":"。（民法典》第925条规定：“受托人以自的名义，在类托人的投权范图内与第三人订立的同，第三人在订立合同时知道受托人与委托人之！的代理关系的，该合间直接约求委托人和第三人但是有确切证据证明该合同只约束受托人和第：人的除外”。本题中，姚某以自已的名：义，在甲公1的投权范围内与乙公司订立合同，并且姚某将他！甲公司之向的代理关系告诉了乙公司，因此该合目直接约束甲公司和乙公司，但有确切证据证明该合同只约束姚某和乙公司的除外，因此A、C、D选项误，B选项正确。（2010改编）","chapter":"第十章 委托合同"},
  {"id":214,"topic":"专题二 民法典合同编","type":"single","question":"甲委托乙购买一批货物，但要求以乙的名义签订合同，乙同意，遂与丙签订了买卖合同。后由于甲的原因，乙不能按时向丙支付货款。乙向丙说明了自己是受甲委托向丙购买货物。对此，下列哪项说法是正确的？（单选）","options":{"A": "丙只能要求甲支付货款", "B": "丙只能要求乙支付货款", "C": "丙选定甲作为相对人要求其支付货款后，不得再变更为乙", "D": "丙选定乙作为相对人要求其支付货款后，乙的财产不足以清偿债务的，可以重新选择甲作为相对人"},"answer":"C","explanation":"。《民法典）第926条第2款规定：“受托月因委托人的原因对第三人不履行义务，受托人应当向第三人披露委托人，第三人因此可以选择受托人或者委托人作为相对人主张其权利，但是第三人不得变更选定的相对人”。本题中，甲为委托人，乙为受托人，丙为第三人，乙以自己的名义与丙签订合同，但因为甲的原因未能按时履行合同义务，在乙向丙披露了委托人甲后，丙有权选择甲或者乙作为相对人主张其权利，但丙不得变更选定的相对人，因此A、B、D选项错误，C选项正确。（2008）","chapter":"第十章 委托合同"},
  {"id":215,"topic":"专题二 民法典合同编","type":"multiple","question":"某律师事务所指派吴律师担任某案件的一、二审姿托代理人。第一次开庭后，吴律师感览案件复杂，本人和该事务所均难以胜任，建议不再继续代理。但该事务所坚持代理。一审判决委托人败诉。下列哪些表述是正确的7（多选）","options":{"A": "律师事务所有权单方解除委托合同，但须承担赠偿责任", "B": "律师事务所在委托人一审败诉后不能单方解除合同", "C": "即使一审胜诉，委托人也可解除委托合同，但须承担赔偿责任", "D": "只有存在故意或者重大过失时，该律师事务所才对败诉承担赔偿责任"},"answer":"AC","explanation":"。A、B、C选项，《民法典》第933条规定：“委托人或者受托人可以随时解除委托合同。因解除合同造成对方损失的，除不可归贵于该当事人的事由外，无偿委托合同的解除方应当赔偿因解除时间不当造成的直接损失，有偿委托合同的解除方应当赔偿对方的直接损失和合同履行后可以获得的利益”，律师事务所（受托入）和委托人均有权单方","chapter":"第十章 委托合同"},
  {"id":216,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "民事诉讼当事人有平等的诉讼权利", "B": "当事人有权在法律规定的范围内处分自己的民事权利和诉讼权利", "C": "在少数民族聚居的地区，人民法院应当一律使用汉语言文字审理和发布法律文书", "D": "人民法院审理民事案件，应当根据自愿和合法的原则进行调解；调解不成的，应当及时判决"},"answer":"ABD","explanation":"。A选项，《民诉法》第8条规定：“民事诉讼当事人有平等的诉讼权利…”，因此人选项正确。B选项，《民诉法》第13条第2款规定：“当事人有权在法律规定的范围内处分自己的民事权利和诉讼权利”，因此B选项正确。C选项，《民诉法）第11条第2款规定：“在少数民族聚居或者多民族共同居住的地区，人民法院应当用当地民族通局的语盲、文字进行审理和发布法律文书”，因此C选项错误。D选项，《民诉法》第9条规定：“人民法院审理民事案件，应当根据自愿和合法的原则进行调解；调解不成的，应当及时判决”，因此D选项正确。（2015)","chapter":"第一章 民事诉讼法概述"},
  {"id":217,"topic":"专题三 民事诉讼法","type":"single","question":"某县人民法院对王某诉张某侵权纠纷一案未经开庭审理即作出了判决，该审判行为直接违反了民事诉讼法哪一项原则或者制度？（单选）","options":{"A": "违反了辩论原则", "B": "违反了处分原则", "C": "违反了合议制度", "D": "违反了回避制度"},"answer":"A","explanation":"。《民诉法》第12条规定：“人民法院审理民事案件时，当事人有权进行辩论”。本题中，未经开庭即作出判决违反了辩论原则，因此A选项正确，B、C、D选项错误。（2019)","chapter":"第一章 民事诉讼法概述"},
  {"id":218,"topic":"专题三 民事诉讼法","type":"single","question":"关于民事诉讼法基本原则在民事诉讼中的具体体现，下列哪一说法是正确的？（单选）","options":{"A": "当事人有权决定是否委托代理人代为进行诉讼是诉讼权利平等原则的体现", "B": "当事人均有权委托代理人代为进行诉讼，是处分原则的体现", "C": "原告与被告在诉讼中有一些不同但相对应的权利，是同等原则的体现", "D": "当事人达成调解协议不仅要自愿，内容也不得递法，是法院调解自愿和合法原则的体现"},"answer":"D","explanation":"。A选项，委托代理人是当事人的诉讼权利，当事人有权决定是否委托，是处分原则的体现，因此A选项错误。B选项，当事人均有权委托，说明当事人权利相同，是平等原则的体现，因此B选项错误。C选项，原告与被告权利虽然不同，包是相对应，是平等原则的体现，而不是同等原则，因此C选项错误。D选项，调解原则包括自愿和合法，因此D选项正确。（法考2011）","chapter":"第一章 民事诉讼法概述"},
  {"id":219,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于辩论原则的说法哪些是正确的？多选）","options":{"A": "督促程序不适用辩论原则", "B": "当事人辩论权的行使局限于一、二审程序中开庭审理的法庭辩论阶段", "C": "当事人向法院提出起诉状和答辩状是其行使辩论权的一种表现", "D": "证人出庭陈述证言是证人行使辩论权的一种表现"},"answer":"AC","explanation":"。A选项，辨论原则只适用于诉讼程序，","chapter":"第一章 民事诉讼法概述"},
  {"id":220,"topic":"专题三 民事诉讼法","type":"single","question":"吴某通过网络购物平台购买了甲公司销售的电热毯，后来因为电热毯质量问题，吴某起诉甲公司。法院受理案件后就开庭方式征求当事人意见，甲公司明确表示同意通过线上方式开庭，而吴某拒绝通过线上方式开庭。关于本案表述正确的是？（单选）","options":{"A": "由于本案是发生在互联网上的纠纷，故应当由互联网法院专属管辖", "B": "法院可以依职权决定通过在线方式开庭审理C：法院可以组织甲公司在线上开庭，吴某线下开庭的方式进行审理", "D": "既然吴某不同意线上开庭，故本案不能通过在线开庭方式审理"},"answer":"C","explanation":"。根据《民事诉讼法》第16条规定，经当事人同意，民事诉讼活动可以通过信息网络平台在线进行。如果一方当事人同意在线诉讼，另外一方当事人不同意在线诉讼，则对同意的一方采取在线方式，对不同意的一方采取线下方式。中公司同意线上开庭，吴某不同意线上开庭，则法院对甲公司组织线上开庭，对吴某组织线下开庭方式审理即可，因此C选项正确，B、D选项错误。互联网法院不存在专属管辖的问题。互联网法院的管辖称为集中管辖。具体的，互联网法院集中管辖所在市（北京、广州、杭州）的辖区内应当由基层法院管辖的发生在互联网上的合同纠纷、役权纠纷等。因此，A选项错误。（法考2022）","chapter":"第一章 民事诉讼法概述"},
  {"id":221,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法的规定，下列说法中哪些说法是正确的？（多选）","options":{"A": "人民法院审理第二审民事案件，不能由一名审判人员独任审理", "B": "人民法院审理第一审民事案件，只有简易程序才能由一名市判人员独任审理", "C": "人民陪审员在参加审判活动时，除法律另有规定外，与审判员有同等的权利义务", "D": "合议庭评议案件中的不同意见、必须如实记人笔录"},"answer":"CD","explanation":"。A选项，《民诉法》第41条第2款规定：“中级人民法院对第一审适用简易程序审结或者不展裁定提起上诉的第二审民事案件，事实清楚、权利义务关系明确的，经双方当事人同意，可以由审判员一人独任审理”，因此二审也可以适用独任制。B选项，《民诉法》第40条第2款规定：“适用筒易程序审理的民事案件，由审判员一人独任审理。基层人民法院审理的基本事实清楚、权利义务关系明确的第一审民事案件，可以由审判员一人适用普通程序独任审理”，因此不只有简易程序才适用独任制。C选项，《民诉法》第40条第3款规定：“人民降审贝在参加审判活动时，除法律另布外，与审判员有同等的权利义务”，因此C选确。D选项，（民诉法》第45条规定：“合议息评议中的不同意见，必须如实记入笔录”，因此项正确。（新编）","chapter":"第一章 民事诉讼法概述"},
  {"id":222,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法的规定，下列哪些说法是正确的？（多选）","options":{"A": "人民法院审理第一审民事案件，可以由审判员和人民陪审员组成合议庭审理", "B": "人民法院审理第二审民事案件，只能由审判员组成合议庭", "C": "发回重审的案件，原审人民法院应当按照第一审程序另行组成合议庭", "D": "人民法院审理再审案件，只能由审判员另行组成合议庭"},"answer":"ABC","explanation":"。A选项，《民诉法》第40条绍1定：“人民法院审理第一审民事案件，山审判员民陪审员共同组成合议庭成者由审判贝组成庭……”，因此A选项正确。B选项，《民诉法）1条第1款规定：人民法院审理第二审民事案件审判员组成合议庭，因此B选项正确。：衢要注意，B选项强调的二审合议庭的组成人不是考察二审可以组成合议庭，特殊情况下以一名审判员独任。C选项，《民诉法》第41条数规定：“发回重审的案件，原审人民法院应照第一审程序另行组成合议庭”，因此C选项正D选项，《民诉法》第41条第4款规定：“审理再审件，原来是第一审的，按照第一审程序另行组成议庭；原来是第二审的或者是上级人民法院提的，按照第二审程序另行组成合议庭”，因此如按一审程序再审的案件，人民陪审员可以参加审，D选项错误。（新编）","chapter":"第一章 民事诉讼法概述"},
  {"id":223,"topic":"专题三 民事诉讼法","type":"single","question":"根据民事诉讼法及相关规定，下列哪类民事案件应当由合议庭审理？（单选）","options":{"A": "适用简易程序审理的第一审民事案件", "B": "基层人民法院审理的基本事实清楚，权利义务关系明确的第一审民事案件", "C": "发回重审的案件", "D": "中级人民法院审理的第二审民事案件"},"answer":"C","explanation":"。A、B选项，《民事诉讼法》第40条第2规定：“适用简易程序审理的民事案件，由审判一人独任审理。基层人民法院审理的基本事实：楚、权利义务关系明确的第一审民事案件，可以！审判员一人适用普通程序独任审理”，因此A、B项错误。C选项，《民事诉讼法》第41条第3款定：“发回重审的案件，原审人民法院应当按3一审程序另行组成合议庭”，因此C选项正确。[选项，（民事诉讼法》第41条第2款规定：“中级人民法院对第一审适用简易程序审结或者不股板定提起上诉的第二审民事案件，事实清楚、权利义务关系明确的，经双方当事人同意，可以由审判员一人独任审理”，因此D选项错误。（新编）","chapter":"第一章 民事诉讼法概述"},
  {"id":224,"topic":"专题三 民事诉讼法","type":"single","question":"星辉公司起诉皓月公司合同纠纷一案，一审法院适用简易程序，由张法官独任审理，判决驳回星辉公司诉讼请求，星辉公司不服一审判决提起上诉，二审法院认为本案一审程序违法，剥夺当事人辩论权，裁定撤销一审判决，发回一审法院重新审理。关于本案重新审理表述正确的是？（单选）","options":{"A": "一审法院应当适用普通程序，由张法官以外的法官独任审理", "B": "一审法院应当适用普通程序，张法官不得参与重审合议庭", "C": "一审法院应当适用简易程序，由张法官以外的法官独任审理", "D": "一审法院应当适用普通程序，张法官和人民陪审员不得参与重新审理"},"answer":"B","explanation":"。简易程序仅仅适用于基层法院及其滋","chapter":"第一章 民事诉讼法概述"},
  {"id":225,"topic":"专题三 民事诉讼法","type":"single","question":"甲公司因为合同纠纷起诉乙公司，某县人民法院适用简易程序审理后判决甲公司败诉。甲公司不服一审判决，提起上诉，二审法院指定吴法官对本案独任审理，乙公司当庭表示异议，关于本案，下列说法正确的是？（单选）","options":{"A": "二审只能组成合议庭审理，不能适用独任制", "B": "简易程序一审终审，不得上诉", "C": "二审法院有权直接指定法官适用独任制审理", "D": "二审法院应裁定转为合议庭审理"},"answer":"D","explanation":"。《民诉法》第41条规定，人民法院审理第二审民事案件，由审判员组成合议庭。合议庭的成员人效，必须是单效。中级人民法院对第一审适用简岛程序审结成者不股裁定提起上诉的第二审民事案件，事实清楚、权利义务关系明确的，经及方当事人同意，可以由审判员一人独任审理。因此，二审程序如果符合条件的可以适用独任制，A选项错误。本题乙公司当庭对二审法院适用独任侧提出异议，即表明未取得双方当事人同意，故本案二审不得适用独任制，C选项错误。法院在审理过程中，发现案件不宜由审判员一人独任审理的，应当裁定转由合议庭审理。本题中，二审不能适用独任制审理，乙公司的异议成立，法院应当裁定将案件转为合议庭审理，D选项正确。简易程序不存在一审终审的相关规定，B选项错误。（法考2022）","chapter":"第一章 民事诉讼法概述"},
  {"id":226,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列哪些情况下，当事人可以申请回避？（多选）","options":{"A": "签定人陈某，其与本案有利害关系", "B": "审判人员李某，担任过本案的鉴定人的", "C": "律师韩某是本案当事人近亲属的", "D": "人民陪审员赵某接受过本案当事人宴请的"},"answer":"ABD","explanation":"。A选项，根据《民诉法》及《民诉法解释》的规定，担任过本案的证人、鉴定人、辩护人、诉讼代理人、翻译人员的审判人员，当事人有权申请其回避；与本案有利害关系的鉴定人，当事人有权申请其回避；接受本案当事人及其受托人宴请，或者参加由其支付费用的活动的审判人员，当事人有权申请其回避，因此A、B、D选项正确。C选项，律师属于诉讼代理人，不适用回避的规定。（新编）","chapter":"第一章 民事诉讼法概述"},
  {"id":227,"topic":"专题三 民事诉讼法","type":"multiple","question":"某民事案件审理过程中，当事人对合议庭组成人员提出回避请求，根据民事诉讼法及相关规定，下列说法正确的是？多选）","options":{"A": "当事人申请审判人员回避的，应由审判委员会决定", "B": "当事人申请陪审员回避的，应由审判长决定", "C": "当事人对人民法院驳回回避申请的决定不服，可以向原人民法院申请复议一次", "D": "人民法院驳回当事人的回避申请，当事人不服申请复议的，复议期间被申请回避人不停止参与本案的审理工作"},"answer":"CD","explanation":"。A、B选项，根据《民诉法》第49条的规定，审判人员的回避，由院长决定，因此审判员、陪审员的回避均由院长决定，A、B选项错误。C、D选项《民诉法》第50条规定：“人民法院对多率人提出的回避申请，皮当在中请提出的三日内，以口头成书面形式作出决定。申请人对决定不月的、可以在接到决定时申请复议一次。复议别另，被申请回避的人员，不停止参与木案的工作.\"，因此C、D选项正确。（2019）","chapter":"第一章 民事诉讼法概述"},
  {"id":228,"topic":"专题三 民事诉讼法","type":"single","question":"某区法院审理原告许某与被告某饭店食物中纠纷一案。审前，法院书面告知许某合议庭由审判员甲、乙和人民陪审员丙组成时，许某未提出回避申请。开庭后，许某始知人民陪审员丙与被告法定代表人是亲兄弟，逆捉出回避申请。关于本案的回避，下列哪一说法是正确的？（单选）","options":{"A": "许某可在知道丙与被告法定代表人是亲兄弟时提出回避申请", "B": "法院对回避申请作出决定前，丙不停止参与本案审理", "C": "应由审判长决定丙是否应回避", "D": "法院作出回避决定后，许某可对此提出上诉"},"answer":"A","explanation":"。A进项，根据《民诉法》第47条的期定，审判人员是本案当事人近亲属的，当事人有切申请他们回进：根据（民事诉讼法）第48条第1数的规定，回避事由在案件开始审理后知道的，可以在法庭论终结前提出；A选项中，人民陪审员而属于审判人员，丙与被告法定代表人是亲兄弟属于近亲属，许某在开庭后得知时可以提出回迎申请，因此A选项正确。B选项，《民诉法》第48条多2款规定：“被申请回避的人员在人民法院作出是否回避的决定前，应当暂停参与本案的工作，但累件需要采取紧急措施的除外”，因此丙应当暂停乡与本案的工作，B选项错误。C选项，根据《民诉法》第49条的规定，丙作为审判人员的回造，应白院长决定，因此C选项错误。D选项，根据（民诉法》第50条的规定，申请人对决定不的，可以在接到决定时申请复议一次，因此对于回避决定不服，救济途径是申请复议，而不是上诉，因此·D选项错误。（法考2015）","chapter":"第一章 民事诉讼法概述"},
  {"id":229,"topic":"专题三 民事诉讼法","type":"single","question":"王某诉马某侵权损害赔偿纠纷一案，经开庭审理后，合议庭经评议，拟支持王某的诉讼请求。法院通知双方当事人8月1日进行宣判，马某发现本案书记员张某是原告的表妹夫，遂于7月31日向法院提出书记员张某回避的申谓。关于本案，表述正确的是？（单选）","options":{"A": "以书记员不属于应当回避人员为由，驳回马某的回避申请", "B": "以马某的申请不符合法定回避的情形为由，驳回马某的回避申请", "C": "因为马某超过了法定申请回避的期限，法院对马某的申请不予审查", "D": "法院应当决定延期宣判，对马某提出的回避申请予以审查"},"answer":"C","explanation":"。《民事诉讼法》第47条规定：“审判人员有下列情形之一的，应当自行回避，当事人有权用口头或者书面方式申请他们回避：（一）是本案当事人或者当事人、诉讼代理人近亲属的首三款规定，适用于法官助理、书记员…”，A、B选项错误。根据《民事诉讼法》第48条的规定，回避申请最迟在法庭料论终结前提出，本案法庭制论已经终结，故马某不能申请回避，法院对马某的回避申请应当不于审查，因此C选项正确、D选项错误。（法考2023）","chapter":"第一章 民事诉讼法概述"},
  {"id":230,"topic":"专题三 民事诉讼法","type":"single","question":"根据民事诉讼法及相关规定，下列说法哪项是正确的？（单选）","options":{"A": "涉及商业秘密案件不得公开审理", "B": "涉及离婚案件是否公开审理由当事人协商决定", "C": "涉及离婚案件当事人申请不公开审理的，一律不另商公开审理不", "D": "涉及商业秘密案件当事人申请不公开审理的，可公以不公开审理是C"},"answer":"D","explanation":"。《民诉法》第137条规定：“人民法院审理民事案件，除涉及国家科密、个人隐私或者法律","chapter":"第一章 民事诉讼法概述"},
  {"id":231,"topic":"专题三 民事诉讼法","type":"single","question":"根据民事诉讼法及相关规定，关于第一审民事案件的级别管辖，下列哪个表述是正确的？（单选）","options":{"A": "基层人民法院管辖所有第一审民事案件", "B": "中级人民法院管辖所有涉外的第一审民事案件", "C": "高级人民法院管辖在本辖区有重大影响的第一审民事案件", "D": "最高人民法院仅管辖在全国有重大影响的第一审民事案件"},"answer":"C","explanation":"。A、B选项，根据《民诉法》第18、19条的规定，层人民法院可以管辖一审案件，但是专利纠纷一审和亚大沙外等民事案件基层法院没有管辖权，也不是所有的沙外案件一审都在中级法院，只有重大涉外案件才裔要中级法院管辖，因此A、B选项说法过于货对。C选项《民诉法》第20条规定：“商级人民法院管辖在本辖区有重大影响的第一审民事案件”，因此C选项正确。D选项，根据《民诉法》第21条的规定，最高人民法院不仅管辖在全国有重大影响的案件，还管辖认为应当由本院审理的案件，因此D选项说法错误。（新编）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":232,"topic":"专题三 民事诉讼法","type":"single","question":"根据民事诉讼法及相关司法解释，下列关于中级人民法院的哪项说法是正确的？单选）","options":{"A": "对案件所作出的判决均为终审判决", "B": "审理案件均须以开庭审理的方式进行", "C": "既可受理一审涉外案件，也可受理一审非涉外案件", "D": "审理案件组成合议庭时，均不可邀请人民陪审员参加"},"answer":"C","explanation":"。A选项，当中院作为一审法院时，当事人有权对其作出的判决提起上诉，因此A选项错误。B选项，根据《民诉法》第176条第1款的规定，第二审人民法院认为不需要开庭审理的，可以不开庭审理。因此中院作为二审法院时，可以不开庭审理案件，B选项错误。C选项，（民诉法》第19条规定：“中级人民法院管辖下列第一审民事案件：（一）重大涉外案件：（二）在本辖区有重大影响的案件：（三）最高人民法院确定由中级人民法院管辖的案件”，因此C选项正确。D选项，根据《民诉法）第40条的规定，人民法院审理第一审民事案件，由审判员、人民陪审员共同组成合议庭或者由审判员组成合议庭，中院作为一审法院时，可以由审判员、人民陪审员共同组成合议庭，因此D选项销误。（新编）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":233,"topic":"专题三 民事诉讼法","type":"single","question":"根据最高人民法院关于第一审知识产权民事、行政案件管辖的若干规定，下列说法哪个是正确的？（单选）","options":{"A": "外观设计专利第一审行政案件，经最高人民法院批准，可以由基层人民法院管辖", "B": "外观设计专利的侵权纠纷第一审民事案件，经最高人民法院批准，可以由基层人民法院管辖", "C": "实用新型专利的权属纠纷第一审民事案件可以由最高人民法院确定的基层人民法院管辖", "D": "技术秘密的侵权纠纷第一审民事案件可以由最高人民2026年专利代理即资格考试法院确定的基层人民法院管辖"},"answer":"B","explanation":"。A、B选项，《最高人民法院头第一审如识产权民事、行政案件管综的冬子规定》第2条第1款规定：“外观设计句所权属、促权纠纷以及沙胞名商标认定留一民事、行政案件由知识户权法院和中级人月法院管辖：经最商人民法院批准，也可以么基层人民法院管辖，但外观设计专利行政息件除外”，因此A通项借误，B选项正确。CD逸项，（最商人民法院关于第一审如议权民事、行政案件管辖的若干规定》第1号第1款规定：“发明专利、实用新型专利、理物新品种、集成电路布图设计、技术秘密、计算机软件的权属、权纠纷以及垄断纠纷驾一审民事、行政案件由知识产权法院，省、自治区、直辖市人民政府所在地的中级人民法院和最商人民法院确定的中级人民法院管辖”，因此C、D选项错误。（新编）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":234,"topic":"专题三 民事诉讼法","type":"multiple","question":"王某欲以刘某和赵某为共同被告提起民事诉讼。经查，王某的住所地和经常居住地均为甲地；刘某的住所地为乙地、经常居住地为丙地；赵某的住所地和经常居住地均为丁地。根据民事诉讼法及相关规定，下列哪些人民法院对该案有管辖权？（多选）","options":{"A": "甲地人民法院", "B": "乙地人民法院", "C": "丙地人民法院", "D": "丁地人民法院"},"answer":"CD","explanation":"。《民诉法》第22条规定：“对公民提起的民事诉讼，由被告住所地人民法院管辖；被告住所地与经常居住地不一致的，白经常居住地人民法院管辖.同一诉讼的几个被告住所地、经常居住地在两个以上人民法院辖区的，各该人民法院都有管辖权”，因此被告刘某和赵某的经常居住地丙地示丁地均有管辖权，A、B选项错误，C、D选项正确。（2014）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":235,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列哪些案件由原告住所地或者经常居住地人民法院管辖？（多选）","options":{"A": "对宣告失踪的人提起的有关财产关系的诉讼", "B": "对下落不明的人提起的有关身份关系的诉讼", "C": "对不在中华人民共和国领域内居住的人提起的有关身份关系的诉讼", "D": "对不在中华人民共和国领域内居住的人提起的有关财产关系的诉讼"},"answer":"BC","explanation":"。《民事诉讼法》第23条规定：下列民事诉讼，由原告住所地人民法院管辖；原告住所地与经常居住地不一致的，由原台经常居住地人民法院管辖：（一）对不在中华人民共和国领域内居住的人提起的有关身份关系的诉讼：（二）对下落不明或者宜告六踪的人提起的有关身份关系的诉讼：（三）对被采取强制性教育措施的人提起的诉讼：（四）对被监禁的人提起的诉讼”，因此A.D选项错误，B、C选项正确。（新编）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":236,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，关于地域管辖，下列说法正确的是？多选）","options":{"A": "因侵权行为提起的诉讼，由侵权行为地或者被告住所地人民法院管辖", "B": "因合同纠纷提起的诉讼，由被告住所地或者合同履行地人民法院管辖", "C": "因继承遗产纠纷提起的诉讼，由被继承人死亡时住所地或者主要遗产所在地人民法院管辖", "D": "因公司设立纠纷提起的诉讼，由公司住所地人民法院管辖"},"answer":"ABCD","explanation":"。A选项，《民诉法》第29条规","chapter":"第二章 民事诉讼的基本制度"},
  {"id":237,"topic":"专题三 民事诉讼法","type":"multiple","question":"住所地在上海市闵行区的原告甲认为住所地在深圳市福田区的被告乙公司在北京市生产的产品使地了自已的专利权，在乙公司设于广州市的销售部购买了破控役权产品，以役咨发明专利权到纷为由提起民事诉讼，下列哪些法院有管辖权？（多选）","options":{"A": "上海知识产权法院", "D": "广州知识产权法院", "C": "北京知识产权法院"},"answer":"BCD","explanation":"。《民诉法》第29条规定：“因仪权行为提起的诉讼，由使权行为地成者被告住所地人民法院管辖”。本题中，深圳是披杏住所地，北京是制造地，广州是销售地，北京和广州均属于便权行为地，因此深圳、北京、广州均具有管辖权，A选项错误，B、C、D选项正确。（2018）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":238,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，与信息网络管物说法正确有哪些？多选）","options":{"A": "信息网络方式订立的买卖合同，通过信息网络交付标的的，以买受人住所地为合同履行地", "B": "信息网络方式订立的买卖合同，通过信息网络以外的方式交付标的的，收货地为合同履行地", "C": "信息网络侵权中，实施被诉侵权行为的计算机等信息设备所在地不属于侵权行为实施地", "D": "信息网络侵权中，侵权结果发生地包括被侵权人住所地"},"answer":"ABD","explanation":"。A、B选项，根据《民诉法解释》第20条规定：“以信息网络方式订立的买卖合同，通过信息网络交付标的的，以买受人住所地为合同履行地：通过其他方式交付标的的，收货地为合同履行地。合同对履行地有约定的，从其约定”，因此A、B选项正确。C、D选项，根据（民诉法解释》第25条规定：“信息网络役权行为实施地包括实施被诉设权行为的计算机等信息设备所在地，侵权结果发生地包括被役权人住所地”，因此C选项错误，D选项正确。（新编）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":239,"topic":"专题三 民事诉讼法","type":"single","question":"甲和乙是同乡，现都在北京市海淀区工作。甲在深圳市南山区有一套住房，经协商，同意以400万元的价格将房屋卖给乙。双方在北京签订了合同，乙一次性支付了房款，后办理了房屋产权过户手续。现甲之妻以卖房未经其同意为由，要求乙返还房产。据此，本案应当由哪个人民法院管辖？（单选）","options":{"A": "北京市海淀区人民法院", "B": "深圳市南山区人民法院", "C": "北京市海淀区人民法院或者深圳市南山区人民法院", "D": "最先受理甲之妻起诉的人民法院"},"answer":"B","explanation":"。根据《民诉法解释》第28条的规定，不动产纠纷是指因不动产的权利确认、分割、相邻关系等引起的物权纠纷。本题的诉讼是对房屋所有权权利的确认，属于专属管辖。B选项正确。（2018）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":240,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，关于专属管辖，下列说法哪些是正确的？（多选）","options":{"A": "因商品房相邻关系引起的物权纠纷，由该商品房所在地人民法院管辖2026年专剩代理所资格考试", "B": "商品房买实合同纠纷，由该商品房所在地人民法院管辖", "C": "房屋租货合同纠纷、由该房屋所在地人民法院管辖", "D": "政策性房屋买实合同纠纷，由该房屋所在地人民法院管辖"},"answer":"ACD","explanation":"。《民诉法解释》第28条规定：“不动产纠纷是指因不动产的权别确认、分割、相邻关系等别起的物权纠纷。农村土地承包经营合同纠纷、房屋租货合同纠纷，降设工程施工合同纠纷、政策性房屋买实合目纠纷、按照不动产纠纷确定竹辖”，因化人题项的相邻关系纠纷、C通项的房屋租货合具纠纷、D逸项的政策性房屋买实合间纠场目于专属管辖，B选项的前品房买奖合同纠场按一般管辖确定管辖地。（新编）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":241,"topic":"专题三 民事诉讼法","type":"multiple","question":"家住天津市河东区的李某，在七夕情人节当天在某宝网上购买了位于天津市西青区的“玫瑰有约”花店的99朵玫瑰花，送给位于天津市和平区的女友，直接由花店送达女友住处。女友收到后发现玫瑰花已经枯萎，经与花店协商未果，李某向天津市河东区法院起诉该花店。法院受理后认为没有管辖权！遂将案件移送天津市和平区法院。关于本案的管辖，下列哪些说法是正确的？（多选）","options":{"A": "天津市河东区法院有管辖权", "B": "天津市西青区法院有管辖权", "C": "天津市和平区法院有管辖权", "D": "天津市河东区法院移送管辖不符合法律规定"},"answer":"BC","explanation":"。A、B、C选项，《民诉法>第2条规定：“因合同纠纷提起的诉讼，由被告住所地或者合同履行地人民法院管辖”，《民诉法解释》第20条规定：“以信息网络方式订立的买卖合同，通过信息网络交付标的的，以买受人住所地为合同限行地；通过其他方式交付标的的，收货地为合同履行地。合同对履行地有约定的，从其约定”，A选项为原告所在地法院，无管辖权，B选项为被告所在地、C选项为合同履行地，均有管辖权，因此A选项错误，B、C选项正确。D选项，极部《民诉法》第37条的规定，人民法院发现受理的案件不属于本院管辖的，应当移送有管辖权的人民法院。因此，天津市河东区法院移送符合规定，D选项错误。（新编）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":242,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，在不违反民事诉讼法对级别管辖和专属管辖规定的情况下，合同双方当事人可以就合同纠纷通过书面协议选择下列哪些人民法院管辖？（多选）","options":{"A": "被告住所地人民法院", "B": "合同履行地人民法院", "C": "合同签订地人民法院", "D": "标的物所在地人民法院"},"answer":"ABCD","explanation":"。《民诉法》第35条规定：“合同或者其他财产权益纠纷的当事人可以部面协议选择被告住所地、合同履行地、合同签订地、原告住所地、标的物所在地等与争议有实际联系的地点的人民法院管辖，但不得违反本法对级别管辖和专属管辖的规定”，因此A、B、CD选项均正确。（2012）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":243,"topic":"专题三 民事诉讼法","type":"multiple","question":"甲公司与乙公司签订了家具买卖合同，并欲就发生合同纠纷时的管辖问题进行约定。根据民事诉讼法及相关规定，在不违反级别管辖和专属管辖规定的情况下，下列哪些约定符合规定？多选）","options":{"A": "双方书面约定由合同签订地人民法院管辖", "B": "双方口头约定由合同签订地人民法院管辖", "C": "双方书面约定由原告住所地人民法院管辖", "D": "双方口头约定由原告住所地人民法院管辖"},"answer":"AC","explanation":"。根据《民诉法》第35条的规定，协议管辖应当采用书面协议，面不是口头协议，并可以选择合同签订地或原告住所地人民法院管辖，因此A、C选项正确，B、D选项错误。（2013）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":244,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，对于两个以上人民法院都有管辖权的民事诉讼案件，下列说法正确的是7多选）","options":{"A": "先立案的人民法院可以将案件移送给另一个有管辖权的人民法院", "B": "人民法院在立案前发现其他有管辖权的人民法院已先立案的，不得重复立案", "C": "人民法院在立案后发现其他有管辖权的人民法院已先立案的，裁定将案件移送给先立案的人民法院", "D": "有管辖权的人民法院受理案件后，不得以行政区城变更为由，将案件移送给变更后有管辖权的人民法院"},"answer":"BCD","explanation":"。A、B、C选项，《民诉法解释）第36条规定：“两个以上人民法院都有管辖","chapter":"第二章 民事诉讼的基本制度"},
  {"id":245,"topic":"专题三 民事诉讼法","type":"multiple","question":"李某在北京市海淀区新购一套住房，并请北京市大兴区的装修公司对其新房进行装修。在装修过程中，装修工人不慎将水管弄破，导致楼下住户的家具被淹毁。李某与该装修公司就赔偿问题交涉未果，遂向北京市大兴区法院起诉装修公司侵权。大兴区法院认为该案应由海淀区法院审理，于是裁定将该案移送至海淀区法院，海淀区法院认为该案应由大兴区法院审理，不接受移送，又将案件退回大兴区法院。关于本案的管辖，下列哪些选项是正确的？（多选）","options":{"A": "北京市海淀、大兴区法院对该案都有管辖权", "B": "只有北京市海淀区法院有管辖权", "C": "北京市大兴区法院的移送管辖是错误的", "D": "海淀区法院不接受移送，将案件退回大兴区法院是错误的"},"answer":"ACD","explanation":"。A、B逸项，《民诉法>第29条规定：“因侵权行为提起的诉讼，由役权行为地成者被告住所地人民法院管辖”：本题中，海淀区是便权行为地，大兴区是被告住所地，两地法院都有管辖权，本题不属于专属管辖范图，因此A选项正确，B选项借误。C选项，根据《民诉法解释>第36条规定，两个以上人民法院都有管辖权的诉讼，先立案的人民法院不得将案件移送给另一个有管辖权的人民法院，因此大兴区法院立案后不能将案件移送海淀区法院，C选项正确。D选项，根据《民事诉讼法》第37条的规定，受移送的人民法院认为受移送的案件依愿规定不属于本院管辖的，应当报请上级人民法院指定管辖，不得再自行移送，因此海淀区法院不能将案件退回，只能报请上级法院指定管辖，D选项正确。（法考2008，思维扩展）ABCD。《民诉法》第52条第1、2款规定：“当权委托代理人，提出回避申请，收集、提供进行辩论，请求调解，提起上诉，申请执行。可以查阅本案有关材料，并可以复制本案料和法律文书。查圆、复制本案有关材料的范围和办法由最商人民法院规定”，四允C、D选项均正确。（2011）","chapter":"第二章 民事诉讼的基本制度"},
  {"id":246,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "民事诉讼当事人有权请求调解证", "B": "民事诉讼当事人有权提出回避申请有", "C": "民事诉讼当事人有权申请执行", "D": "民事诉讼当事人可以按照相关规定查阅本案有关材料"},"answer":"AD","explanation":"《民事诉讼法）第60条规定：“无切为能力人由他的监护人作为法定代理人代讼”（民事诉讼法解释》第67条规定：“无民事能力人、限制民事行为他力人投成他人俱事民事行为他力人、限制民事行为能力人和其人为共同被份”，王某作为役权法律关系中的人，为适格原告：由于起诉时王某尚未成年，由其监护人作为法定代理人提起诉讼。四此王某是原告，王某的父母是原否的法定代习张某为未成年人，应当以役权人张某和其监为共同被告。因此本案中张某和张某的父母同被告。因此A、D选项正确。（新编）","chapter":"第三章 诉讼参加人"},
  {"id":247,"topic":"专题三 民事诉讼法","type":"multiple","question":"10岁的张某在公交车上玩耍，不慎将手中的玩具砸到邻座8岁的王某致其受伤、双方父母对损害赔偿问题发生争议，王某的父母决定向法院提起诉讼，关于本案当事人的说法，下列哪些说法正确？多选）","options":{"A": "王某是原告", "B": "王某和王某的父母是共同原告", "C": "张某是被告", "D": "张某和张某的父母是共同被告"},"answer":"ABCD","explanation":"。A选项，《民诉：法》第S9条第1定：“对当事人双方的诉讼标的，第三人认为：立请求权的，有权提起诉讼”，因此A选项正确选项，根据《民诉法解释》第81条第1款的规定独立请求权的第三人有权向人民法院提出诉i求和事实、理由，成为当事人，因此B选项正C、D选项，《民诉法>第59条第2款规定：“对当1双方的诉讼标的，第三人虽然没有独立请求权案件处理结果同他有法律上的利害关系的，司申请参加诉讼，成者由人民法院通知他参加诉人民法院判决承担民事责任的第三人，有当事的诉讼权利义务”，因此C、D选项正确。（2010）","chapter":"第三章 诉讼参加人"},
  {"id":248,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于民事诉讼第三人的说法哪些是正确的？多选）","options":{"A": "对当事人双方的诉讼标的，第三人认为有独立请求权的，有权提起诉讼", "B": "有独立请求权的第三人有权向人民法院提出诉讼请求和事实、理由，成为当事人", "C": "对当事人双方的诉讼标的，第三人虽然没有独立请求权，但案件处理结果同他有法律上的利害关系的，可以申请参加诉讼", "D": "人民法院判决承担民事责任的第三人，有当事人的诉讼权利义务"},"answer":"ACD","explanation":"。《民诉法解释》第82条规定：“在一诉讼中，无独立请求权的第三人无权提出管辖议，无权放弃、变更诉讼请求或者申请撤诉，被决承担民事贵任的，有权提起上诉”，诉讼参加都有提出回避的权利，包括无独立请求权的第人，因此A、C、D选项正确，B选项错误。（20改编）","chapter":"第三章 诉讼参加人"},
  {"id":249,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，在民事诉讼一审程序中，无独立请求权的第三人不享有下列哪项诉讼权利？（多选）","options":{"A": "申请撤诉", "B": "提出回避申请", "C": "变更诉讼请求", "D": "对案件的管辖权提出异议"},"answer":"BC","explanation":"。本题中，争议双方主体是乙公司和i公司，申和案件处理结果有利害关系，是无独立i求权的第三人，可以申请参加诉讼，但是不能提","chapter":"第三章 诉讼参加人"},
  {"id":250,"topic":"专题三 民事诉讼法","type":"single","question":"专利权人甲与乙公司签订了专利独占实施许可合同，又将专利转让给了丙公司，乙公司因与丙公司就实施许可发生纠纷向人民法院提起诉讼，甲作为第三人在该案中阜有哪些权利？多选）","options":{"A": "提起诉讼", "B": "申请参加诉讼", "C": "若被判决承担民事资任，则有权提起上诉", "D": "在一审诉讼中提出管辖异议"},"answer":"D","explanation":"，本题中，房屋买英合同从方当事人是刘某和除集，河某作为原告，陈集作为被告，赵某不能作为共同原告参加诉讼，但赵某对干除某和测某之间事执的标的物主张所有权，应作为有德立请求权的第三人参与诉讼，因此A、B、C逸项错误，D选项正确。（法考2018）","chapter":"第三章 诉讼参加人"},
  {"id":251,"topic":"专题三 民事诉讼法","type":"multiple","question":"赵某与刘某将共有商铺出租给陈某。刘某着赵某，与陈某签订房屋买实合同，将商铺转让给陈某，后因该合同履行发生纠纷，刘某将陈某诉至法院。赵某得知后，坚决不同意刘某将商铺让与陈某。关于本案相关人的诉讼地位，下列哪一说法是正确的？（单选）","options":{"A": "法院应依职权追加赵某为共同原告", "B": "赵某应以刘某侵权起诉，陈某为无独立请求权第三人", "C": "赵某应作为无独立请求权第三人", "D": "赵某应作为有独立请求权第三人"},"answer":"BC","explanation":"。《民诉法解>第296条规定：“第三人提起缴销之诉，人民泌院应当将该第三人列为原告，生效判决、裁定、调解书的当事人列为被告，但生效判决、我定、调解书中没有承担资任的无独立请求权的第三人列为第三人”。本题中，原审中是原告，丙是被告，乙是无独立请求权的第三人，所以在第三人缴销之诉中，应当以原中原告中和原审被告丙为被货，面原审无独立请求权的第三人乙在第三人缴销之诉中的诉讼地位应当视其在生效裁判文节中是否承担义务而定，原生效调解书约定的内容是“丙将价值100万元的货物交付给申”，显然无独立请求权的第三人乙不承担贵任，因此在第三人撒销之诉中乙应当作为第三人，不能作为被告，A、D选项错误，B、C选项正确。（法考2006，惠维扩展）","chapter":"第三章 诉讼参加人"},
  {"id":252,"topic":"专题三 民事诉讼法","type":"multiple","question":"甲公司对乙公司有100万元权到期，乙公司对丙公司有100万债权。甲公司对丙公司提起代位权诉讼，法院依法将乙公司列为第三人。诉讼中甲、丙达成调解协议，约定丙公司将价值100万一批货物交付给甲，用于清偿该笔债务，法院依法制作调解书送达当事人。丁主张货物是自己的，欲提出第三人撤销之诉，该撤销之诉中，下列关于当事人地位的说法哪些是正确的？（多选）","options":{"A": "乙是被告", "B": "丙是被告", "C": "乙是第三人", "D": "丙是第三人"},"answer":"AB","explanation":"。《民诉法》第55条规定：“当事人一方或者双方为二人以上，其诉讼标的是共同的，或者诉讼标的是同一种类、人民法院认为可以合并审理并经当事人同意的，为共同诉讼。共同诉讼的一方当事人对诉讼标的有共同权利义务的，其中一人的诉讼行为经其他共同诉讼人承认，对其他共同诉讼人发生效力；对诉讼标的没有共同权利义务的，其中一人的诉讼行为对其他共同诉讼人不发生效力”。由此可知，共同诉讼包括必要共同诉讼和普通共同诉讼，必要共同诉讼当事人的诉讼标的是共同的（只有一个），普通共同诉讼当事人的诉讼标的为同一种类（有若干个），因此A、B选项正确。但是对荫者的诉讼请求数是以及诉诉讼行为一致性没有婴求，因此C、D选项1（新编）9.入。A选项，《民诉法际释》第283务邹规定：“公益诉讼案件由使权行为地成有软介地中级人民决院管辖，但法律、可法解员有的除外”，因此A选项正确。B通项，《民诉次级第288条规定：“公益诉讼案仆的原告在法良终结后申请撤诉的，人民法院不予准许”，国益诉讼案件的原否可以在法庭解论终结前摄选项错误。C、D选项，《民诉法解释》第287数规定：“对公益诉讼案件，当事人可以和解，法院可以调解”，因此C、D选项错误。（2017）","chapter":"第三章 诉讼参加人"},
  {"id":253,"topic":"专题三 民事诉讼法","type":"multiple","question":"关于必要共同诉讼与普通共同诉讼的区别，下列哪项说法是正确的？（多选）2026年专利代理师价格考试","options":{"A": "必要共同诉讼的诉讼标的是共同的，普通共同诉讼的诉讼标的是同种类的", "B": "必要共同诉讼的诉讼标的只有一个、普通共同诉讼的诉讼标的有若干个", "C": "必要共同诉讼的诉讼请求只有一个，普通共同诉讼的诉讼请求有若干个", "D": "必要共同诉讼中共同诉讼人的诉讼行为必须一致，普通共同诉讼中共同诉讼人的诉讼行为不需要一致"},"answer":"ABCD","explanation":"。《民诉法解释》第87条第1款灯“根据民事诉讼法第61条第2款第（三）项规定关社会团体推荐公民担任诉讼代理人的，应合下列条件：（一）社会团体属于依法登记设者依法免予登记设立的非营利性法人组织；（被代理人属于该社会团体的成员，或者当事，方住所地位于该社会团体的活动地域：（三）事务属于该社会团体章程载明的业务范围；（被推荐的公民是该社会团体的负责人成者与会团体有合法劳动人事关系的工作人员”，因B、C、D选项均正确。（2016）","chapter":"第三章 诉讼参加人"},
  {"id":254,"topic":"专题三 民事诉讼法","type":"single","question":"某消费者权益保护协会认为，某手机生产商在手机出厂前预装大量程序，并且未告知消费者卸载方式。该消费者权益保护协会以上述行为侵害众多消费者合法权益、损害社会公共利益为由提起公益诉讼。根据民事诉讼法及相关规定，下列哪种说法是正确的？（单选）","options":{"A": "本案可以由侵权行为地或者被告住所地中级人民法院管辖", "B": "作为公益诉讼案件原告的该消费者权益保护协会一律不得申请撤诉", "C": "人民法院不得对该公益诉讼案件进行调解", "D": "该公益诉讼案件的当事人不能和解"},"answer":"B","explanation":"。A选项，《民诉法解释》第85条规“与当事人有夫妻、直系血亲、三代以内旁系血近烟亲关：系以及其他有抚养、养关系的亲属以当事人近亲属的名义作为诉讼代理人”，原岳父属于诉讼当事人的近姻亲，可以作为委书理人。B、D选项，《民诉法》第61条第2数规定：列人员可以被委托为诉讼代理人：（一）律师、签法律服务工作者；（二）当事人的近亲属或者工人员”，公司的实习生不属于单位的工作员，不能作为诉讼代理人，基层法律服务所的工人员可以作为代理人。C选项，《民诉法解释）第条第2数规定：“专利代理人经中华全国专利代","chapter":"第三章 诉讼参加人"},
  {"id":255,"topic":"专题三 民事诉讼法","type":"single","question":"根据民事诉讼法及相关规定，下列哪些属于有关社会团体推荐公民担任诉讼代理人应当符合的条件？（多选）","options":{"A": "社会团体属于依法登记设立或者依法免予登记设立的非营利性法人组织", "B": "被代理人属于该社会团体的成员，或者当事人一方住所地位于该社会团体的活动地域", "C": "代理事务属于该社会团体章程载明的业务范围", "D": "被推荐的公民是该社会团体的负责人或者与该社会团体有合法劳动人事关系的工作人员"},"answer":"C","explanation":"《民诉法）第60条规定：无诉讼行方能人由您的蓝护人作为法定代理人代力诉讼。张丧失行为能力，应当由其法定代理人代为诉讼。据《民法典）第23条境定，无、限制民事行力能力成年人，由下列有当护能力人的人该序担任炉人：（一）配偶：（二）父、子女：（三）其他近亲（四）其他得惠想任监护人的个人和组织，但必经过微监护人所在地的居民委员会、村民委质或者民政部门同您。故张集的要子是第一顾故应当由张某的姿子超任代理人。因此，本案当追加张集的费子为法定代理人，诉讼继续进.C选项正确，D选项错误。张集的姿子应当是告张某的法定代理人，不是当事人，不能追加其共同原告或者原告，A、B选项错误。（法考2021）","chapter":"第三章 诉讼参加人"},
  {"id":256,"topic":"专题三 民事诉讼法","type":"multiple","question":"下列主体中，不可以作为民事诉讼委托代理人的是？（单选）","options":{"A": "原告的岳交", "B": "公司的实习生", "C": "专利纠纷诉讼中，由中华全国代理师协会推荐的专利代理师", "D": "离婚诉讼中，某基层法律服务所的工作人员"},"answer":"BCD","explanation":"。《民诉法）第62条第1、2款规定：“委他人代为诉讼，必须向人民法院提交由委托人名或者盖章的授权委托节。投权委托书必须记委托事项和权限。诉讼代理人代为承认、放弃、更诉讼请求，进行和解，提起反诉或者上诉，必有委托人的特别投权”，全权委托代理视为无特授权，A选项提出管辖权异议不需要特别授权，C、D选项的行为需要特别投权。（2019）","chapter":"第三章 诉讼参加人"},
  {"id":257,"topic":"专题三 民事诉讼法","type":"multiple","question":"张某因为合同纠纷起诉甲公司，在诉讼中张某突发脑梗，经抢救后，张某仍然丧失行为能力。张某的父亲希望撤回起诉，以专心为张某治疗；张某的妻子表示希望继续诉讼。本案法院应当如何处理？（单选）","options":{"A": "法院应当追加张某的妻子为共同原告", "B": "法院应当变更张某的妻子为原告，诉讼继续进行", "C": "追加张某的妻子为法定代理人，诉讼继续进行", "D": "根据张某父亲的请求，裁定准予撤回起诉"},"answer":"ACD","explanation":"。（民诉法解释）第88条规定：“诉讼理人除根据民事诉讼法第62条规定提交授权委书外，还应当按照下列规定向人民法院提交相材料：（一）律师应当提交律师执业证、律师事务证明材料…”，律师作为诉讼代理人不要求提本人身份证件，因此A、C、D选项正确。（新编）","chapter":"第三章 诉讼参加人"},
  {"id":258,"topic":"专题三 民事诉讼法","type":"single","question":"王某因与甲公司发生合同纠纷，遂委托李律师全权代理诉讼，但未作具体的授权。此种情况下，李律师在诉讼中无权实施下列哪些行为？多选）","options":{"A": "提出管辖权异议", "B": "提起反诉）C.提起上诉", "D": "部分变更诉讼请求"},"answer":"A","explanation":"。A选项，《民事诉讼法）第64条规定：代理诉讼的律师和其他诉讼代理人有权调查收证据，可以查阅本案有关材料…”，因此A选项确。B选项，（民事诉讼法）第63条规定：“诉讼理人的权限如果变更或者解除，当事人应当书告知人民法院，并由人民法院通知对方当事人”，因此目选项销误。C选项，全权委托代理规为无特别投权，代为变更诉讼请求也应当有特财权，因此C遇项借误。D选项，（民事诉讼法）第条规定：“离婚案件有诉讼代理人的，本人除不表达意思的以外，仍应出庭：确因特珠情况无法也庭的，必须向人民法院提交书调意见”，D选项的象述过于绝对，因此D选项借误。（新编，思维扩展）公证据","chapter":"第三章 诉讼参加人"},
  {"id":259,"topic":"专题三 民事诉讼法","type":"single","question":"根据民事诉讼法及相关规定，律师作为诉讼代理人，应当向人民法院提交下列哪些材料？（多选）","options":{"A": "律师执业证", "B": "本人身份证件c.律师事务所证明材料", "D": "授权委托书"},"answer":"A","explanation":"。A选项，《民诉法解释）第116条第3数规定：“存储在电子介质中的录音资料和影像资料，适用电子数据的规定”，因此A选项正确。B选项，（民诉法）第75条第1款规定：“凡是知道案件情况的单位和个人，都有义务出庭作证”，因此单位和个人都可以作为证人，B选项错误。C选项，（民诉法解释》第112条规定：“书证在对方当事人控制之下的，承担举证证明责任的当事人可以在举证期限届满前书面申请人民法院责令对方当事人提交。申请理由成立的，人民法院应当责令对方当事人提交，因提交书证所产生的费用，由申请人负担…”，因此C选项错误。D选项，《民诉法）第73条规定：“书证应当提交原件·提交原件或者诉法解释》第111条的规定，提交书证原件有困难的条件包括原件在对方当事人控制之下，经合法通知提交而拒不提交的情形，因此对于原件在对方当事人控制之下的书证，需经合法通知提交页拒不提交的，才可提交复制品，D选项错误。（2018）","chapter":"第三章 诉讼参加人"},
  {"id":260,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，关于诉讼代理人，下列说法哪个是正确的？（单选）","options":{"A": "律师之外的其他诉讼代理人有权调查收集证据，查阅本案有关材料", "B": "诉讼代理人的权限变更的，可以由诉讼代理人书面告知人民法院", "C": "当事人委托诉讼代理人全权代理的，诉讼代理人可以代为变更诉讼请求", "D": "离婚案件有诉讼代理人的，本人仍应出庭"},"answer":"ABC","explanation":"。A选项，《民诉法》第66条规定：“证可作为民事诉讼证据，A选项正确。B选项，（民调法》第68条第2数规定：“…当事人在该期限提供证据确有困难的，可以向人民法院申请延步期限，人民法院根据当事人的申请适当多长…”，因此B选项正确。C选项，根据《民诉法第73条的规定，书证提交原件或者原物确有因1","chapter":"第三章 诉讼参加人"},
  {"id":261,"topic":"专题三 民事诉讼法","type":"multiple","question":"关于民事诉讼证据的理解，下列选项中正确的有？（单选）","options":{"A": "存储在电子介质上的录音资料，适用电子数据的相关规定", "B": "民事诉讼中的证人只能是自然人", "C": "法院责令对方当事人提交相关书证，则因提交书证所产生的费用，应当由申请人垫付，由对方当事人最终承担", "D": "书证应当提交原件，但如果原件在对方当事人控制之下，则可以提交复制品"},"answer":"ABC","explanation":"。《民诉法解释）第123条规定：人民法院可以对出庭的具有专门知识的人进行询问。经法庭准许，当事人可以对出庭的具有专门知识的人进行询问，当事人各自申请的具有专门知识的人可以就案件中的有关问题进行对质。具有专门知识的人不得参与专业问题之外的法庭审理活动”，限据（民诉法解释）第122条的规定，具有专门知识的人在法庭上就专业问题提出的意见，视为当事人的陈述。因此A、B、C选项正确，D选项错误。（2016)","chapter":"第四章 民事证据"},
  {"id":262,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，当事人的下列哪些做法符合关于证据的规定？多选）","options":{"A": "原告赵某以电子数据作为证据来证明提出自己的主张", "B": "原告张某因在人民法院确定的期限内提供证据确有困难，向人民法院申请延长期限", "C": "被告李某因提交某书证原件确有困难，提交了经人民法院核对无异的复制件", "D": "被告王某提交外文书证作为证据，未附中文译本"},"answer":"BC","explanation":"。A选项，有专门知识的人的作用是标助中请方当事人对签定意见进行质证或者就专业问题发表意见，无需保持中立，故不适用回避制度，A选项错误。（民诉法解释）第122条第2款规定：“具有专门知识的人在法庭上就专业问题提出的意见，视为当事人陈述”，当事人陈述属于法定证据种类之一，B选项正确。（民诉法解释》第123条第1款规定：“经法庭准许，当事人可以对出庭的具有专门知识的人进行询问”，C选项正确。《民诉法解释》第122条第3款规定：人民法院准许当事人申请的，相关费用由提出申请的当事人负担”，而非败诉方当事人承担，D选项错误。因此，B、C选项正确。（法考2014）","chapter":"第四章 民事证据"},
  {"id":263,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于具有专门知识的人出庭的哪些说法是正确的？多选）","options":{"A": "人民法院可以对出庭的具有专门知识的人进行询间", "D": "有专门知识的人提出的意见视为证人证言", "C": "经法庭准许，当事人各自申请的具有专门知识的人可以就案件中的有美同题进行对质"},"answer":"CD","explanation":"。A选项，作为证人需要满足两个条件，一是了解案件事实，二是能够正确表达，本案中钱某虽然是乙公司的工作人员，但其具有证人资格，且无需经过对方当事人同意，A选项错误。B选项，证人应当客观陈述其亲身感受的事实，不得宣读事先准备的书面材料，B选项错误。C选项，证人作证应当分别进行，其他证人不得在场，但必要时法院可以安排证人之间进行对质，C选项正确。D选项，《民诉法）第76条规定：“有下列情形之一的，经人民法院许可，可以通过书面证言、视听传输技术或者视听资料等方式作证：··（二）因路途逼远，交通不便不能出庭的”，本案中证人赵某因为路途遇远不能出庭作证，经法院同意后可以通过书而证育、视听传输技术成考税明方式作证，且无需经过对方当事人网意，1)类确。四此，C、D选项正确。（法考2023）","chapter":"第四章 民事证据"},
  {"id":264,"topic":"专题三 民事诉讼法","type":"multiple","question":"在一起专利侵权诉讼中，原告申请由其弟袁某（某大学计算机系教授）作为专家辅助人出庭对专业技术问题予以说明。下列哪些表述是正确的？（多选）","options":{"A": "被告以袁某是原告的近亲属为由申请其回避，法院应批准", "B": "袁某在庭上的陈述是一种法定证据", "C": "被告可对袁某进行询问", "D": "袁某出庭的费用，由败诉方当事人承担"},"answer":"ABC","explanation":"。A选项，《证据规定）第67年级2规定：“待证事实与其年龄、智力铁况或，康状况相道应的无民事行为能力人和限制民。，为能力人，可以作为证人”，何小某报结为限，事行为能力人，但是可以作为证人，A选项销证人不适用四避制度，B选项错误。证保规定）90条规定：“无民事行为能力人或者限制民事行能力人所作的与其年龄、智力状况或者精神健目状况不相当的证言，与一方当事人或者其代理)有利害关系的证人陈述的证言，不能单独作为定案件事实的根据”，何小某作为限制民事行为力人，即便其所作证官与其年龄智力状况不相或是与当事人有利害关系，依旧具有证明力，只是证明力较小，不能单独作为认定案件事实的根驾C选项错误，D选项正确。本题选择不正确的到项，因此A、B、C选项当选。（法考2017，思维扩展）","chapter":"第四章 民事证据"},
  {"id":265,"topic":"专题三 民事诉讼法","type":"multiple","question":"甲、乙两公司因合同纠纷提起诉讼，甲公司申请丙运输公司的赵某作为证人出庭作证，乙公司申请本公司的仓库保管员钱某作为证人出庭作证，以下表述正确的是？（多选）","options":{"A": "何小某只有11岁、不具有证人资格", "B": "何小某是何某的弟弟，应回避", "C": "何小某作为未成年人，其所有证言依法都不具有", "D": "何小某作为何某的弟弟，证言具有明显的倾向性、其证言不能单独作为定案依据"},"answer":"AD","explanation":"。A、C选项，《民诉法》第79条第1数物定：“当事人可以就查明事实的专门性问题向人法院中请鉴定。当事人申请鉴定的，由双方当事据.…”，因此B选项错误。D选项，《民诉法》第旨识的人出庭，就鉴定人作出的鉴定意见或者专业问题提出意见”，因此D选项正确。（2018）","chapter":"第四章 民事证据"},
  {"id":266,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列哪些关于鉴定的说法正确的是？多选）","options":{"A": "当事人可以就查明事实的专门性问题向人民法院申请鉴定", "B": "当事人对鉴定意见有异议的，鉴定人不出庭作证，是否采纳该鉴定意见由法院决定", "C": "人民法院准许当事人鉴定申请的，应当在名录中指定鉴定人", "D": "当事人可以申请人民法院通知有专门知识的人出庭，就鉴定人作出的鉴定意见或者专业问题提出意见"},"answer":"BC","explanation":"。A、B、C选项，《民诉法》第81条规定：“当事人对鉴定意见有异议或者人民法院认为差定人有必要出庭的，鉴定人应当出庭作证。经人民法院通知，鉴定人拒不出庭作证的，鉴定意见不得作为认定事实的根据；支付鉴定费用的当事人可以要求返还鉴定费用”，因此A选项错误，B、C项正确。D选项，如果鉴定意见未被采纳，由负有","chapter":"第四章 民事证据"},
  {"id":267,"topic":"专题三 民事诉讼法","type":"multiple","question":"在某专利侵权诉讼中，原告张某依法向人民法院申请鉴定。具备资格的某鉴定人依法出具了鉴定意见，张某支付了鉴定费用。案件审理过程中，被告王某对该鉴定意见有异议，人民法院通知该鉴定人出庭作证，但其拒不出庭作证。据此，根据民事诉讼法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "人民法院应当拘传该鉴定人出庭作证", "B": "该鉴定意见不得作为认定事实的根据", "C": "张某可以要求该鉴定人返还鉴定费用", "D": "人民法院应当贵令张某确定其他鉴定人重新作出鉴定"},"answer":"ABCD","explanation":"。（医诉法解华）第93条规定：“下列准买，当事人无须普证证明：（一）自悠规律以及定星、定律：（二）众所周短的事实（三）根据法律规定推定的事实：（四）根据已短的事实和日需生活经验法则推定出的另一事实”，因此A、B、C、D选项均正确。（2015）","chapter":"第四章 民事证据"},
  {"id":268,"topic":"专题三 民事诉讼法","type":"single","question":"根据民事诉讼法及相关规定，下列哪些事实当事人无须举证证明？（多选）","options":{"A": "众所周知的事实R.根揭法律规定推定的事实", "C": "自然规律以及定理、定律", "D": "晨居已知的事实和日常生活经验法则推定出的另一小实"},"answer":"B","explanation":"，A、B选项，概据《民诉法解举）第93条的规定，已为人民法院发生法律须力的概判所确认的事实，当事人无须举证证明，但是有相尺证据是以推翻的除外。美干化肥质量与惯害结果之间的因果关系，已有生效的法律文书确认，刘月无须对此事承担举证资任，甲公司可以用相反证据推翻生效判决认定的因果关系这一事实。甲公司应当提供证据证明化院质量问题与农作物生长异常不存在因果关系，因此A选项错误，B选项正确。C、D选项，证明责任只能由法律、司法解释预先规定，不存在法院依职权裁量以及当事人协议分配的可能，因此，C、D选项错误。（法考2016，思维扩展）","chapter":"第四章 民事证据"},
  {"id":269,"topic":"专题三 民事诉讼法","type":"multiple","question":"刘月购买甲公司的化肥，便用后农作物生长异常。刘月向法院起诉，要求甲公司退款并赔偿损失，诉讼中甲公司否认刘月的损失是因其出售的化肥质量同题造成的，刘月向法院提供了本村吴某起诉甲公司损害赔偿案件的判决书，以证明甲公司出售的化肥有质量问题且与其所受损害有因果关系。关于本案刘月所受损害与使用甲公司化肥因果关系的证明责任分配，下列哪一选项是正确的？（单选）","options":{"A": "应由刘月负担有因果关系的证明资任", "B": "应由甲公司负担无因果关系的证明责任", "C": "应由法院依职权裁量分配证明责任", "D": "应由双方当事人协商分担证明责任"},"answer":"ABC","explanation":"。A、B、C选项，（民诉法）第67条第2款规定：“当事人及其诉讼代理人因客观原因不能自行收集的证据，或者人民法院认为审理案件需要的证据，人民法院应当调查收集”，《民诉法解释》第94条第1款规定：“民事诉讼法第67条第2款规定的当事人及其诉讼代理人因客观原因不能自行收集的证据包括：（一）证据由国家有关部门保存，当事人及其诉讼代理人无权查阅调取的；（二）涉及国家秘密、商业秘密或者个人隐私的；（三）当事人及其诉讼代理人因客观原因不能自行收集的其他证据”，因此A、B、C选项正确。D选项，《民诉法解释）第96条第1款规定：“民事诉讼法第67条第2款规定的人民法院认为审理案件需要的证据包括：（一）涉及可能损害国家利益、社会公共利益的”，因此D选项属于法院主动收集证据的情形，D选项错误。（2019）","chapter":"第四章 民事证据"},
  {"id":270,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列哪些情形当事人及其诉讼代理人可以申请人民法院调查取证？（多选）","options":{"A": "申请调查收集的证据属于国家有关机关保存并须人民法院依职权调取的档案材料", "B": "当事人及其诉讼代理人确因客观原因不能自行收集的其他材料", "C": "涉及国家秘密、商业秘密、个人隐私的材料", "D": "涉及可能损害国家利益、社会公共利益或者他人合法权益的事实"},"answer":"ACD","explanation":"。A、C、D选项，《证据规定）第56条规定：“人民法院依照民事诉讼法第133条第4项的规定，通过组织证据交换进行审理前准多据交换之日举证期限居满。证据交换的时所由当事人协商一致并经人民法院认可，他写人民法院指定….，因此A、C、D选项正。B选项错误。（2018）条的规定，证据应当在法庭上出示，由当事人质证。未经当事人质证的证据，不得作为认定76条的规定，对于确有出庭困难的证人，经人民院许可，可以通过书面证官、视听传输技术成者听资料等方式作证，因此D选项说法过于绝对选项错误。（新编）","chapter":"第四章 民事证据"},
  {"id":271,"topic":"专题三 民事诉讼法","type":"multiple","question":"关于民事诉讼证据交换，下列说法哪些是正确的？（多选）","options":{"A": "人民法院在开庭前可以组织交换证据", "B": "证据交换可以在审判人员或书记员的主持下进行", "C": "交换证据的时间可由人民法院指定", "D": "人民法院组织当事人交换证据的、交换证据之日举证期限届满"},"answer":"ACD","explanation":"。民诉法）第84条第1数规定：“在据可能灭失或者以后难以取得的情况下，当事可以在诉讼过程中向人民法院申请保全证据，民法院也可以主动采取保全措施”因此A选项确，B选项错误。C选项，《民诉法解释》第98条？数规定：“当事人根据民事诉讼法第84条第1期定申请证据保全的，可以在举证期限届满前书提出”，因此C选项正确。D选项，（民诉法解释）98条第2款规定：“证据保全可能对他人造成报的，人民法院应当责令申请人提供相应的担保因此D选项正确。（2017）","chapter":"第四章 民事证据"},
  {"id":272,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定、下列哪种说法是错误的？（单选）","options":{"A": "证据应当在法庭上出示，由当事人质证", "B": "未经质证的证据，不能作为认定案件事实的根据", "C": "涉及商业秘密的证据，不得在开庭时公开质证", "D": "未出庭作证的证人证言不能作为认定案件事实的依据"},"answer":"ACD","explanation":"。A选项，（民诉法）第9条的？定：“人民法院审理民事案件，应当根据自正确。B选项，（民诉法）第97条第1数定：“人民法院进行调解，可以由审判员一主持，也可以由合议庭主持，因此！项错误。C选项，（民诉法）第99条规调解协议的内容不得违反法律规定因此C选项正确。D选项，《民诉法）第些","chapter":"第四章 民事证据"},
  {"id":273,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于证据保全的哪些说法是正确的？多选）","options":{"A": "在证据可能灭失的情况下，当事人可以在诉讼过程中申请保全证据", "B": "证据保全只能依当事人申请进行，人民法院不得主动采取保全措施", "C": "当事人申请证据保全的，可以在举证期限届满前书面提出", "D": "证据保全可能对他人造成损失的，人民法院应当责令申请人提供相应的担保"},"answer":"ACD","explanation":"。A选项，（民诉法解释）第147条第1款规定：“人民法院调解案件时，当事人不他出庭的，经其待别收权，可由其委托代理人参加调解….”，因北A透项正确。B选项，（民诉法解释》第142条规定：“人民法院失理案伴后，经审查，认为法律关系明确、事实清楚，在征得当事人及方同意后，可以径行调解”，径行调解应先征得双方当事人同意，因此B逸项错误。C选项，（民诉法）第98条规定：“人民法院进行调解，可以邀请有关单位和个人协助”因此C选项正确。D选项，（民诉法）第100条第3款规定：“调解书经及方当事人签收后，即具有法律效力”，因此D选项正确。（2009）","chapter":"第四章 民事证据"},
  {"id":274,"topic":"专题三 民事诉讼法","type":"single","question":"关于民事诉讼中的调解，下列哪些说法是正确（多选）","options":{"A": "调解应当根据自愿和合法的原则进行", "B": "人民法院进行调解的，应当由合议庭主持", "C": "调解协议的内容不得违反法律的规定", "D": "调解书送达前一方反悔的，人民法院应当及时判决"},"answer":"A","explanation":"。A、B选项，（民诉法）第101条第1款规定：“下列案件调解达成协议，人民法院可以不制作调解书：……（二）调解维持收养关系的案件：（三）能够即时履行的案件………….”，因此A选项正确，B选项错误。C选项，《民诉法》第213条规定：“当事人对已经发生法律效力的解除婚姻关系的判决、调解书，不得申请再审”，因此C选项错误。D选项，《民诉法》第102条规定：“调解未达成协议或者调解书送达前一方反悔的，人民法院应当及时判决”，因此D选项错误。（2017）","chapter":"第五章 调解"},
  {"id":275,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列有关调解的说法是正确的？（多选）","options":{"A": "人民法院调解案作时，当事人本人不能出庭的，经特别侵权，可由其委托代理人参加调解", "B": "人民法院受理案件后，经审查，认为法律关系明确、事实清楚，可以检行调解", "C": "人民法院进行调解，可以邀请有关单位和个人协助", "D": "调解书经双方当事人签收后，即具有法律效力"},"answer":"CD","explanation":"。A选项，（民诉法》第96条规定：“人民法院审理民事案件，根据当事人自愿的原则，在事实清楚的基础上，分清是非，进行调解”，因此调解以当事人同意为前提，并不是一律先行调解，A选项错误。B选项，《民诉法》第145条规定：“法庭辩论终结，应当依法作出判决。判决前能够调解的，还可以进行调解，调解不成的，应当及时判决”，因此B选项错误。C选项，《民诉法》第179条规定：“第二审人民法院审理上诉案件，可以进行调解”，因此C选项正确。D选项，（民诉法）第100条第3款规定：“请多列经发方当事人签收后，即具有法律场力此D选项正确（新编）由","chapter":"第五章 调解"},
  {"id":276,"topic":"专题三 民事诉讼法","type":"single","question":"根据民事诉讼法及相关规定，下列关于民事诉讼调解的哪种说法是正确的？（单选）","options":{"A": "能够即时履行的案件调解达成协议，人民法院可以不制作调解书", "B": "调解维持收养关系的案件调解达成协议，人民法院应当制作调解书", "C": "当事人对已经发生法律效力的解除婚姻关系的调解书，可以申请再审", "D": "调解书送达前一方反悔的，人民法院可以留置送达该调解书"},"answer":"D","explanation":"。《最高人民法院关于人民法院）事调解工作若干问期的规定）第13务组给“当事人以民事调解书与调解协议的限免：一致为由提出异议，人民法院审查后认为议成立的，应当根据调解协议载定补正民调解书的相关内容”，因此A、B、C选项误，D选项正确。（法考2018）","chapter":"第五章 调解"},
  {"id":277,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列有关调解的哪些说法是正确的？多选）","options":{"A": "当事人起诉到人民法院的民事纠纷，一律应当先行调解", "B": "第一审普通程序中法庭辩论终结后，人民法院一律不再进行调解", "C": "第二审人民法院审理上诉案件，可以进行调解", "D": "调解达成协议的，人民法院制作的调解书经双方当事人签收后，即具有法律效力"},"answer":"ABC","explanation":"。A选项，《民诉法》第104条第1数定：利害关系人因情况紧急，不立即申请保全会使其合法权益受到难以弥补的损害的，可以提起诉讼或者中请仲裁前向被保全财产所在业被申请人住所地或者对案件有管辖权的人民法申请采取保全措施…”，因此A选项正确。B项，《民诉法）第103条第1款规定：“人民法院对可能因当事人一方的行为或者其他原因，使判难以执行或者造成当事人其他损害的案件，想对方当事人的申请，可以裁定对其财产进行保贵令其作出一定行为或者禁止其作出一定行当事人没有提出申请的，人民法院在必要时也以载定采取保全措施”，因此B选项正确。C选《民诉法》第108条规定：“申请有错误的，申请人当赔偿被申请人因保全所遗受的损失”，因此（项正确。D选项，民诉法）第104条第3款规“申请人在人民法院采取保全措施后30日内不法提起诉讼或者申请仲裁的，人民法院应当保全”，因此D选项错误。（2017改编）","chapter":"第五章 调解"},
  {"id":278,"topic":"专题三 民事诉讼法","type":"multiple","question":"周某（男）与张某（女）婚后因感情纠纷诉至法院，请求离婚。诉讼中双方达成调解协议：约定两个孩子由女方抚养，两套房屋均归女方所有，男方每月支付抚养费1万元，法院依据调解协议制作调解书送达给双方当事人。张某发现法院调解书上关于房屋部分的内容错误，将调解协议中约定都归她所有的两套2026年专利代理师费特专试房屋写成了周某和张某一人一套，遂提出异议。关于本案说法正确的有？（单选）","options":{"A": "调解书已经生效，不能提出异议，可以违反自愿原则电址染中", "B": "调解书不生效，法院收回调解书，重新制作后再送双方", "C": "法院审查后认为异议成立的，及时作出判决", "D": "法院审查后认为异议成立的、作出裁定予以补正"},"answer":"BC","explanation":"。A、B选项，人民法院不能主动采前保全措施，可以依申请采取诉前保全，因此！项错误，B选项正确。C选项，《民诉法）第10412数规定：“人民法院接受申请后，必须在48小作出载定·，因此C选项正确。D选项，诉！","chapter":"第五章 调解"},
  {"id":279,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于保全的哪些说法是正确的？（多选）","options":{"A": "利害关系人因情况紧急，不立即申请保全将会使其合法权益受到难以弥补的损害的，可以在提起诉讼前向被保全财产所在地或被申请人住所地人民法院申请采取保全措施", "B": "人民法院在民事诉讼中对于可能因一方当事人的原因使判决难以执行的案件，可以根据对方当事人的申请，作出财产保全的裁定", "C": "申请保全有错误的，申请人应当赔偿被申请人因保全所遭受的损失", "D": "申请人在人民法院采取诉前财产保全措施后10日内不起诉的，人民法院应当解除财产保全"},"answer":"CD","explanation":"，A通项，（居诉法）第106条规定第1款：“财产保全采联查片、扣押、冻结成着法体规定的其他方法”，因此A选项正响。B、C适项，（民诉法解称》第154条第1教现定：“人民法院在财产保全中采取查封、扣押、冻结财产增滤叶，应当妥善保管被查封、加押、冻结的财产。不宜由人民法院保管的，人民法院可以指定做保全人负责保管：不宜自被保全人保管的，可以委托他人或者申请保全人保管。查封、扣押、冻结担保物权人占有的担保财产，一版由担保物权人保管：由人民法院保管的，质权、留置权不因采取保全措施而消灭”，因此B选项正确，C选项错误。D选项，（民诉法解释》第155条规定：“由人民法院指定被保全人保管的财产，如果键续使用对该财产的价值无重大影响，可以允许被保全人继续使用…”，因此D选项错误。（2018）","chapter":"第六章 保全"},
  {"id":280,"topic":"专题三 民事诉讼法","type":"multiple","question":"根据民事诉讼法及相关规定，下列关于诉前财产保全的说法，正确的是？（多选）","options":{"A": "人民法院可以依职权主动采取诉前财产保全措施", "B": "利害关系人因情况紧急，不立即申请财产保全将会使其合法权益受到难以弥补的损害的，可以申请诉前财产保全", "C": "人民法院接受申请后，必须在48小时内作出裁定", "D": "申请人可以不提供担保"},"answer":"BD","explanation":"。A选项，王小某并未实施妨码诉讼或者执行的行为，不能对其采取强制措施，因此A选项错误。B、C、D选项，王某急蓄支付住院费，属于情况紧急的情形，王某可以申请法院先予执行，王小某将钱转到朋友账户上，可能导致将来判决难以执行，王某有权向法院申请财产保全，而不是证据保全，因此B、D选项正确，C选项错误。（法考2009，思维扩展）审普通程序事","chapter":"第六章 保全"},

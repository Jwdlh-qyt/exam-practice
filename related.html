<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026专利代理师 · 相关法练习系统</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0f1a;
  --bg2: #111827;
  --bg3: #1a2332;
  --card: #1e293b;
  --card-hover: #243447;
  --border: #2d3a4a;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #10b981;
  --accent2: #34d399;
  --accent-dim: rgba(16,185,129,0.15);
  --correct: #10b981;
  --wrong: #ef4444;
  --wrong-dim: rgba(239,68,68,0.15);
  --correct-dim: rgba(16,185,129,0.15);
  --highlight: #fbbf24;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

/* Header */
.header {
  text-align: center;
  padding: 30px 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

.header h1 {
  font-size: 1.6em;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2), #a7f3d0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}

.header p {
  color: var(--text3);
  font-size: 0.9em;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  background: var(--bg2);
  padding: 4px;
  border-radius: var(--radius);
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.95em;
  font-weight: 500;
  color: var(--text2);
}

.tab:hover { background: var(--bg3); color: var(--text); }
.tab.active {
  background: var(--accent);
  color: #fff;
  font-weight: 600;
}

/* Filter bar */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}

.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  font-size: 0.85em;
  transition: all 0.2s;
}

.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* Topic filter */
.topic-filter {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  margin-bottom: 0;
}

.topic-filter.open {
  max-height: 500px;
  margin-bottom: 16px;
}

.topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
  padding: 12px 0;
}

.topic-item {
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg2);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.85em;
}

.topic-item:hover { border-color: var(--accent); }
.topic-item.active {
  border-color: var(--accent);
  background: var(--accent-dim);
}

.topic-item .t-name { color: var(--text); font-weight: 500; }
.topic-item .t-count { color: var(--text3); font-size: 0.85em; margin-left: 6px; }

/* Stats bar */
.stats-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: var(--bg2);
  border-radius: var(--radius);
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}

.stat-item {
  text-align: center;
}

.stat-value {
  font-size: 1.4em;
  font-weight: 700;
  color: var(--accent);
}

.stat-label {
  font-size: 0.75em;
  color: var(--text3);
}

/* Progress bar */
.progress-wrap {
  margin-bottom: 16px;
}

.progress-bar {
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 0.3s;
}

.progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 0.8em;
  color: var(--text3);
  margin-top: 4px;
}

/* Question card */
.q-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.q-card:hover { border-color: rgba(16,185,129,0.3); }

.q-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 6px;
}

.q-num {
  font-weight: 700;
  color: var(--accent);
  font-size: 1.1em;
}

.q-tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.75em;
  font-weight: 600;
}

.q-tag.single { background: rgba(59,130,246,0.15); color: #60a5fa; }
.q-tag.multi { background: rgba(168,85,247,0.15); color: #c084fc; }

.q-topic {
  font-size: 0.8em;
  color: var(--text3);
  margin-bottom: 8px;
}

.q-text {
  font-size: 1.05em;
  line-height: 1.8;
  margin-bottom: 16px;
  color: var(--text);
}

/* Options */
.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}

.option {
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 0.95em;
}

.option:hover { border-color: var(--accent); background: var(--accent-dim); }

.option.selected { border-color: var(--accent); background: var(--accent-dim); }
.option.correct { border-color: var(--correct); background: var(--correct-dim); }
.option.wrong { border-color: var(--wrong); background: var(--wrong-dim); }
.option.disabled { pointer-events: none; }

.opt-letter {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.9em;
  flex-shrink: 0;
}

.option.selected .opt-letter { background: var(--accent); color: #fff; }
.option.correct .opt-letter { background: var(--correct); color: #fff; }
.option.wrong .opt-letter { background: var(--wrong); color: #fff; }

.opt-text { flex: 1; }

/* Submit button for multiple choice */
.submit-btn {
  padding: 10px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.95em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
}

.submit-btn:hover { background: var(--accent2); }
.submit-btn:disabled { opacity: 0.4; cursor: default; }

/* Explanation */
.explanation {
  padding: 16px;
  background: var(--bg2);
  border-radius: 8px;
  border-left: 3px solid var(--accent);
  margin-top: 12px;
  font-size: 0.9em;
  line-height: 1.8;
  color: var(--text2);
}

.explanation .ans-label {
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 6px;
}

/* Result indicator */
.result-indicator {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 0.85em;
  font-weight: 600;
  margin-bottom: 12px;
}

.result-indicator.correct { background: var(--correct-dim); color: var(--correct); }
.result-indicator.wrong { background: var(--wrong-dim); color: var(--wrong); }

/* Search */
.search-box {
  margin-bottom: 16px;
}

.search-input {
  width: 100%;
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 0.95em;
  outline: none;
  transition: border-color 0.2s;
}

.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }

/* Question bank list */
.bank-item {
  padding: 14px 16px;
  background: var(--card);
  border-radius: 8px;
  border: 1px solid var(--border);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.bank-item:hover { border-color: var(--accent); }

.bank-q { font-size: 0.9em; color: var(--text); margin-bottom: 4px; }
.bank-meta { font-size: 0.8em; color: var(--text3); }

/* Tab content */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 12px; }
  .header h1 { font-size: 1.3em; }
  .q-card { padding: 16px; }
  .tab { font-size: 0.85em; padding: 8px; }
  .topic-grid { grid-template-columns: 1fr; }
}

/* Scroll to top */
.scroll-top {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 1.2em;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
  z-index: 100;
  transition: transform 0.2s;
}

.scroll-top:hover { transform: scale(1.1); }
.scroll-top.show { display: flex; }

.chapter-grid { display: grid; grid-template-columns: 1fr; gap: 6px; padding: 8px 0 8px 16px; border-left: 2px solid var(--border); margin-top: 6px; }
.chapter-item {
    padding: 8px 12px; border-radius: 6px; border: 1px solid transparent;
    background: transparent; cursor: pointer;
    transition: all 0.2s ease; display: flex; justify-content: space-between; align-items: center;
    font-size: 0.88rem;
}
.chapter-item:hover { background: var(--bg-hover); border-color: var(--border); }
.chapter-item.active { border-color: var(--accent); background: var(--accent-dim); }
.topic-item .expand-arrow { font-size: 0.7rem; transition: transform 0.2s ease; color: var(--text-muted); }
.topic-item.expanded .expand-arrow { transform: rotate(90deg); }

</style>
</head>
<body>

<div class="container">
  <div class="header">
    <a href="index.html" style="display:inline-block;color:var(--text-muted);text-decoration:none;font-size:0.85rem;opacity:0.7;margin-bottom:8px">&larr; 返回主页</a><br>
  <h1>2026专利代理师 · 相关法强化600题</h1>
    <p>10大专题 · 832道题 · 含答案解析</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('practice')">练习模式</div>
    <div class="tab" onclick="switchTab('bank')">题库浏览</div>
    <div class="tab" onclick="switchTab('stats')">学习统计</div>
  </div>

  <!-- Practice Tab -->
  <div id="tab-practice" class="tab-content active">
    <!-- Scope filter -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setScope('all',this)">全部({ALL_COUNT})</button>
      <button class="filter-btn" onclick="setScope('single',this)">单选({SINGLE_COUNT})</button>
      <button class="filter-btn" onclick="setScope('multi',this)">多选({MULTI_COUNT})</button>
      <button class="filter-btn" onclick="setScope('wrong',this)">错题重练</button>
      <button class="filter-btn" onclick="setScope('random50',this)">随机50题</button>
      <button class="filter-btn" onclick="toggleTopicFilter()">按专题</button>
    </div>

    <!-- Topic filter -->
    <div id="topic-filter" class="topic-filter">
      <div class="topic-grid" id="topic-grid"></div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">总题数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-done">0</div>
        <div class="stat-label">已做</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-correct" style="color:var(--correct)">0</div>
        <div class="stat-label">正确</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-wrong" style="color:var(--wrong)">0</div>
        <div class="stat-label">错误</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-rate">0%</div>
        <div class="stat-label">正确率</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-text">
        <span id="progress-label">0/0</span>
        <span id="progress-pct">0%</span>
      </div>
    </div>

    <!-- Questions -->
    <div id="questions-container"></div>
  </div>

  <!-- Bank Tab -->
  <div id="tab-bank" class="tab-content">
    <div class="search-box">
      <input type="text" class="search-input" id="search-input" placeholder="搜索题目内容..." oninput="filterBank()">
    </div>
    <div class="filter-bar" id="bank-topic-bar"></div>
    <div id="bank-container"></div>
  </div>

  <!-- Stats Tab -->
  <div id="tab-stats" class="tab-content">
    <div id="stats-detail"></div>
  </div>
</div>

<button class="scroll-top" id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const ALL_QUESTIONS = [
  {"id":1,"topic":"专题一 民法典总则编","type":"single","question":"根据民法典总则编及相关规定，因下列哪些行为所产生的当事人之间的关系属于民法调整的范围？（单选）","options":{"A": "国家知识产权局与商标注册证打印纸供应商之间的关系", "B": "国家知识产权局与非正常专利申请行为人之间的关系", "C": "国家知识产权局与外聘专利审查辅助人员之间的关系", "D": "国家知识产权局与专利代理事务所之间的关系"},"answer":"A","explanation":"。A选项行政机关参与民事活动属于平等主体之间的财产关系，属于民法调整的范围。B、D选项均属于行政机关与行政相对人之间的行政法律关系，不属于民法调整的范围。C选项为劳动合同关系，不属于民法调整范国。（新编）","chapter":"第一章 民法基本原则与民事法律关系"},
  {"id":2,"topic":"专题一 民法典总则编","type":"single","question":"根据法律规定，下列哪一种社会关系应由民法调整？","options":{"A": "甲请求税务机关退还其多缴的个人所得税", "B": "乙手机丢失后发布寻物启事称：“拾得者送还手机，本人当面酬谢”", "C": "丙发微信朋友圈承诺：“如我在上海找到工作，就陪女友去欧洲旅游”", "D": "丁作为青年志愿者，定期去福利院做帮工"},"answer":"B","explanation":"。A选项属于行政机关与相对人之间的行政关系，不由民法调整。B选项属于单方允诺，应由民法调整。C、D选项属于好意施惠，不是意思表示，不由民法调整。（法考2016)","chapter":"第一章 民法基本原则与民事法律关系"},
  {"id":3,"topic":"专题一 民法典总则编","type":"single","question":"下列哪一情形下，乙的请求依法应得到支持？","options":{"A": "甲应允乙同看演出，但迟到半小时。乙要求甲赔偿损失", "B": "甲听说某公司股票可能大涨，便告诉乙，乙信以为真大量购进，事后该支股票大跌。乙要求甲赔偿损失", "C": "甲与其妻乙约定，如因甲出轨导致离婚，甲应补偿乙50万元，后二人果然因此离婚。乙要求甲依约赔偿", "D": "甲对乙承诺，如乙比赛夺冠，乙出国旅游时甲将陪同，后乙果然夺冠，甲失约。乙要求甲承担赔偿责任"},"answer":"C","explanation":"。A、D选项，甲的行为均属于好意施惠行为，不产生财产关系，乙的请求不能依法得到支持。B选项，甲向乙传递小道消息，乙作为完全民事行为能力人对自己的投资行为应进行独立的判断，造成损失应自行承担。C选项，甲与乙的约定属于“离婚过错损害赔偿”的约定，乙要求甲依约赔偿的请求依法应得到支持。（法考2010）","chapter":"第一章 民法基本原则与民事法律关系"},
  {"id":4,"topic":"专题一 民法典总则编","type":"single","question":"甲诉某专利的专利权利人乙专利权权属纠纷一案正在审理中，证据交换阶段乙觉得自已胜诉无望，随即向国家知识产权局提出放弃该专利的申请，乙的行为违背民法典的下列哪一基本原则？（单选）","options":{"A": "平等原则", "B": "自愿原则", "C": "公平原则", "D": "诚信原则"},"answer":"D","explanation":"。本题中，乙在权属纠纷存在败诉可能性的情况下，撤回专利申请，其目的是希望甲即使胜诉也得不到专利权，属于权利泄用，因此违背诚信原则，D遇项正确。（2018）","chapter":"第一章 民法基本原则与民事法律关系"},
  {"id":5,"topic":"专题一 民法典总则编","type":"multiple","question":"胡某在自家菜园里发现一只甲虫，非常好奇遂拍照发到网上，付某出价30万元购买。后来发现该甲虫是濒危动物，国家二级保护动物。此种情形违反以下民法的哪一个原则？（多选）","options":{"A": "公序良俗原则", "B": "自愿原则", "C": "绿色原则", "D": "诚信原则"},"answer":"AC","explanation":"。期某与付某二人买卖国家二级保护动物的行为违反了《野生动物保护法），故其违反了合法与公序良俗原则。且售实野生动物不利于保护生态环境，故其违反了绿色原则。（法考2024）","chapter":"第一章 民法基本原则与民事法律关系"},
  {"id":6,"topic":"专题一 民法典总则编","type":"single","question":"某公司挖天然气管道途经郝某家耕地，不影响耕地使用。郝某报出高价索赔，否则不让挖掘。经过协商，某公司以行业规定最高标准给予补偿。后郝某觉得补偿太少，要求补上之前索要高价的差额。郝某的行为违反了哪种原则？（单选）","options":{"A": "违反公序良俗原则", "B": "违反诚信原则", "C": "违反平等原则", "D": "违反公平原则"},"answer":"B","explanation":"。某公司挖天然气管道途经郝某家耕地，郝某请求补偿理所当然，但是，趁机索要商价，属于权利游用行为。因此，郝某的行为违反了诚信原则，B选项正确。（法考2023）","chapter":"第一章 民法基本原则与民事法律关系"},
  {"id":7,"topic":"专题一 民法典总则编","type":"single","question":"关于民事法律关系，下列哪一选项是正确的？","options":{"A": "民事法律关系只能由当事人自主设立", "B": "民事法律关系的主体即自然人和法人", "C": "民事法律关系的客体包括不作为", "D": "民事法律关系的内容均由法律规定"},"answer":"C","explanation":"。A、D选项，有些民事法律关系由当事人自主设立，如合同关系；有些民事法律关系由法律直接规定，如物权的种类和内容，因此A、D选项错误。B选项，民事法律关系的主体包括自然人、法人和非法人组织，因此B选项错误。C选项；民事法律关系的客体，包括作为和不作为；作为的客体，例如买卖合同之债，买方基于债权可以请求卖方交付标的物，卖方基于债权可以请求买方支付价款，在买卖合同中法律关系的客体是请求对方做出某种行为；再如专利权人获得专利投权，获得了对该技术的排他权，该法律关系的客体是其他人未经许可不得使用其专利技术，即不作为，因此C选项正确。（法考2008，思维扩展）","chapter":"第一章 民法基本原则与民事法律关系"},
  {"id":8,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列哪些属于限制民事行为能力人？（多选）","options":{"A": "6岁上初中的神童甲", "B": "18岁侬靠父母资助上大学的乙", "C": "9岁在读小学生丙", "D": "16岁已经掌握一定维修技术的技校生丁"},"answer":"CD","explanation":"，A选项，6岁的甲办无民事行为能力人。B逸项，18岁的乙为常全民事行为能力人.A、B逸项借误。C、D逸项，9岁的丙为限例民事行为能力人，16步的丁员零一定维修术，低不是以自己的劳动收入为主要生活源，仍为限制民事行为能力人，因此C、D选项正确。（2018）","chapter":"第二章 自然人"},
  {"id":9,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编的规定，关于民事行为能力下列哪些表述是错误的？多选）","options":{"A": "十六周岁以上的自然人是成年人，具有完全民事行为能力，可以独立进行民事活动，是完全民事行为能力人", "B": "十四周岁以上不满十六周岁的自然人，以自己的劳动收人为主要生活来源的，视为完全民事行为能力人", "C": "十周岁以上的未成年人是限制民事行为能力人，进行民事活动应当征得他的法定代理人的同意", "D": "无民事行为能力人、限制民事行为能力人的监护人是他的法定代理人"},"answer":"ABC","explanation":"。A逸项，（民法典》第17条规定：“十八周岁以上的自然人为成年人。不满十八周岁的自人为未成年人”，因此A选项错误。B选项，《民法典》第18条第2款规定：“十六周岁以上的未成年人，以自己的劳动收入为主要生活来源的，视为完全民事行为能力人”，因此B选项错误。C选项，《民法典》第19条规定：八周岁以上的未成年人为限制民事行为能力人……可以独立实施纯获利益的民事法律行为或者与其年龄、智力、精神健康状况相造应的民事法律行为”，C选项错误。D选项，《民法典》第23条规定：“无民事行为能力人、限制民事行为能力人的监护人是其法定代理人”，因此D选项正确。【注意】学员注意第2题和第1题之间的区别，第2题为法条题，严格按法条说法选答案，第1题为案例题，按照实际情况选答案。（2019）","chapter":"第二章 自然人"},
  {"id":10,"topic":"专题一 民法典总则编","type":"multiple","question":"下列选项中哪些属于无民事行为能力人？","options":{"A": "跟随母亲来中国旅游的外国籍7岁儿童", "B": "30岁的精神病人，经鉴定其智商只有5岁", "C": "16岁的脑瘫患者，不能辨认自己的行为", "D": "7岁小学生，已经可以通过网络直播收人为主要生活来源"},"answer":"ABCD","explanation":"。《民法典》第12条中规定“中华人民共和国领域内的民事活动，适用中华人民共和国法律。法律另有规定的，依照其规定。“其他法律中未明确规定外国籍未成年人在中国进行民事法律活动时行为能力判断的适用标准，因此，应适用《民法典》中的规定，A选项正确。B选项，按照鉴定其智商属于不能辨认自己的行为，属于无民事行为能力人。C选项，不能辨认自己行为的人属于无民事行为能力人。D选项，不满8m岁，即他能够以自已的劳动收入为主要生活来源，其收入也需要监护人代为收取，本人属于无民事行为能力人。（新编）","chapter":"第二章 自然人"},
  {"id":11,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，关于民事权利能力和民事行为能力，下列哪些说法是正确的？（多选）","options":{"A": "自然人从出生时起到死亡时止，具有民事权利能力，依法享有民事权利，承担民事义务", "B": "自然人的民事权利能力一律平等", "C": "限制民事行为能力人可以进行与其年龄、智力相适应的民事活动", "D": "无民事行为能力人的民事活动由其法定代理人代理"},"answer":"ABCD","explanation":"。A选项，《民法典》第13条规定：“自然人从出生时起到死亡时止，具有民事权利能力、依法享有民事权利，承担民事义务”、因此A选项正确。B选项，《民法典》第14条规定：“自然人的民事权利能力一律平等”，因此B选项正确。C选项，根据《民法典》第22条的规定；限制民事行为能力人可以独立实施纯获利益的民事法律行为成者与其智力、精神健康状况相适应的民事法律行为，因此C选项正确。D选项，根据《民法典》第20、21条的规定，无民事行为能力人由其法定代理人代理实施民事法律行为，因此D选项正确。（2013改编）","chapter":"第二章 自然人"},
  {"id":12,"topic":"专题一 民法典总则编","type":"multiple","question":"甲男、乙女为夫妻、生子丙，甲男去世。丙6岁的时候、甲父赠送给丙一幅价值百万元的名画。丙8岁的时候，甲父再赠送给丙一块价值10万元的名表。以下说法哪些正确？（多选）","options":{"A": "因为是纯获利益的行为，故名画赠与合同有效", "B": "因为在受赠名画时，丙为无民事行为能力人，故名画赠与合同无效", "C": "因为是纯获利益的行为，故名表赠与合同有效", "D": "因为在受赠名表时，丙为限制民事行为能力人，故名表赠与合同无效"},"answer":"BC","explanation":"。A、B选项，由于赠与名画时丙仅6岁，属于无民事行为能力人，其独立实施的民事法律行为一律无效，因此A选项错误，B选项正确。C、D选项，由于赠与名表时丙已8岁，属于限制民事行为能力人，且接受名表属于纯获利益的行为，赠与合同有效，因此C选项正确，D选项错误。（新编）","chapter":"第二章 自然人"},
  {"id":13,"topic":"专题一 民法典总则编","type":"single","question":"王某户籍所在地是上海，大学毕业后在北京工作了两年。因身体原因前往广州就医，并在广州某医院住院一年半。痊愈后在深圳居住工作，至今已逾半年。根据民法典总则编及相关规定，王某在下列哪个城市的居住地视为其现在的住所？（单选）","options":{"A": "上海", "B": "北京", "C": "广州", "D": "深圳"},"answer":"A","explanation":"。（民法典》第25条规定：“自然人以户籍登记或者其他有效身份登记记载的居所为住所；经常居所与住所不一致的，经常居所视为住所”。本题中，王某现居住地为深圳，还不到一年，因此应当以户籍所在地为住所，因此A选项正确。（2009改编）","chapter":"第二章 自然人"},
  {"id":14,"topic":"专题一 民法典总则编","type":"single","question":"陆某因诈骗罪被判人狱，和妻子协议离婚，双方约定，12岁的儿子由陆某抚养，但实际是由陆某父母抚养。下列哪一说法是正确的？（单选）","options":{"A": "陆某是唯一监护人", "B": "陆某的妻子是唯一监护人", "C": "夫妻二人均为监护人", "D": "陆某的父母为监护人"},"answer":"C","explanation":"。（民法典》第27条第1款规定：“父母是未成年子女的监护人。”父母分居或者离婚的，不影响监护能力。不论谁是陆某12岁的儿子的实际抚养人，父母都为其监护人。因此C选项正确。（法考2020）","chapter":"第二章 自然人"},
  {"id":15,"topic":"专题一 民法典总则编","type":"single","question":"李某是无民事行为能力的精冲病人，其近亲属对担任幸某的监护人有争议，并且对李某住所地居民委员会的指定不服，向人民法院提起诉讼。根据民法典总则编及相关规定，人民法院一般应按照下列哪项中的顺序指定监护人？单选）","options":{"A": "（1）配偶：（2）父母、子女：（3）其他近亲属", "B": "（1）配偶、成年子女：（2）父母：（3）其他近亲属", "C": "（1）父母：（2）配偶、子女：（3）其他近亲属", "D": "（1）父母、子女；（2）配偶；（3）其他近亲属"},"answer":"A","explanation":"。（民法典》第28条规定：“无民事行为能力或者限制民事行为能力的成年人，由下列有监护能力的人按顺序担任监护人：（一）配偶；（二）父母、子女；（三）其他近亲","chapter":"第二章 自然人"},
  {"id":16,"topic":"专题一 民法典总则编","type":"multiple","question":"陈某夫妇因意外事敌双亡，二人的儿子陈畅刚刚年满3周岁。根据民法典总则编及相关规定，下列关于陈畅的监护人的哪些说法是正确的？（多选）","options":{"A": "可以由陈畅的祖父母、外祖父母中的一人或数人担任监护人", "B": "对担任监护人有争议的，可以由陈畅住所地的居民委员会在近亲属中指定", "C": "陈畅的祖父被指定担任监护人后，可以自行变更监护人", "D": "若关系密切的其他亲属、朋友愿意承担监护责任，经陈畅住所地的居民委员会同意，也可以作为陈畅的监护人"},"answer":"ADD","explanation":"。A.D逸项《底法典>策27条第2款携定：“未成年人的父母已经死亡成者没有监护优力的，由下列有篮护能力的人楼质伴担任监护人：（一）谁父每、外祖父母（三）其他愿考担任篮护人的个人成者维织，但是须经未成年人住所地的居民委员会，村民委员会成者民政部门同您”，因此A、D逸项正确。B选项，《民法集》第31条第1放规定：“对查护人的确定有事议的，由被监护人住所地的居民委员会、村民委员会成者民玖郎门指定监护人…”，因此B逸项正确。C选项，《民法典》第31条第4款规定：“监护人指定后，不得擅自受更”，因此C选项错误。（2017改编）","chapter":"第二章 自然人"},
  {"id":17,"topic":"专题一 民法典总则编","type":"multiple","question":"余某与其妻婚后很久才育有一女小翠。不久后余某与妻子离婚，小翠由余某抚养。现余某身患重病，为自己和幼女小翠的未来担忧，欲作相应安排。下列哪些选项是正确的？多选）","options":{"A": "余某可通过遗指定其弟弟在其身故后担任小翠的监护人", "B": "余某可与前妻协议确定，余某不再承担监护职责", "C": "余某可与其堂兄事先协商以书面形式确定堂兄为自己的监护人", "D": "如余某病故，应由余某父母担任小翠的监护人"},"answer":"AC","explanation":"。A逸项，（民法典》第29条规定：“被监护人的父母担任监护人的，可以通过遗爆指定监护人”，A选项意欲表达余某“可以”通过遗为小翠指定监护人，该遗寝是否能够生效还密要看余某前斐的态度，因此A选项正确。B选项，根据<总则编司法解释>第8条，订立协议约定免除具有监护能力的父母的监护职资的，人民法院不子支持，因此B选项错误。C选项，《民法典）第33条规定：“具有完全民事行为能力的成年人，可以与其近亲属、其他愿意担任监护人的个人或者组织事先协商，以书面形式确定自己的监护人，在自己丧失或者部分丧失民事行为能力时，由该监护人股行监护职贵”，因此C选项正确。D选项，父母是子女的当然监护人，余某去世后，余某前妻是监护人，因此D选项错误。（法考2017改编）","chapter":"第二章 自然人"},
  {"id":18,"topic":"专题一 民法典总则编","type":"single","question":"丧偶的汪某（70岁）有成年子女但独立生活，与同样丧偶的肖某（50岁）十分投缘，汪某与肖某订立书面监护协议约定：“若汪某完全或部分丧失行为能力，由肖某担任汪某的监护人，若肖某履行监护义务、汪某死后遗产一半归肖某所有。对此，下列表述正确的是？（单选）","options":{"A": "因汪某有成年子女，监护协议无效", "B": "监护协议中关于遗产处理的部分无效", "C": "汪某丧失或部分丧失行为能力时，肖某按约定成为汪某的监护人", "D": "监护协议的全部约定于注某死亡时生效"},"answer":"C","explanation":"。A选项，根据《民法典》第33条意定监护的有关规定，在效力上，成年协议监护优先于法定监护，因此A选项错误。汪某与肖某书面约定有偿设立成年协议监护，该约定符合法律规定，因此B选项错误。关于该监护协议生效的时间，肖某取得汪某一半遗产的约定，为死因行为，须自汪某死亡时才生效：肖某负担监护贵任（负担履行监护义务）的生效时间，为汪某完全成部分丧失行为能力之时。因此C选项正确，D逸项误。（法考2019）","chapter":"第二章 自然人"},
  {"id":19,"topic":"专题一 民法典总则编","type":"multiple","question":"李小某三岁时，其父母离异，其与父亲李某和祖母王某共同生活，后李某和王某相继离世，其母张某在明知家中已无其他近亲属照料、抚养孩子的情况下，仍不闻不问，拒不履行监护职责，导致李小某处于危困状态。根据民法典总则编及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "指定监护人前，可以由民政部门担任季小某的临时监护人", "B": "李某、王某和张某均是李小某的监护人", "C": "张某的监护人资格被撤销后，可以不再履行负担李小某抚养费的义务", "D": "李小某就读的小学可以向人民法院申请撤销张某的监护人资格"},"answer":"AD","explanation":"。A选项，《民法典》第31条第3欺规定：“依据本条第1款规定指定监护人前，被监护人的人身权利、财产权利以及其他合法权益处于无人保护状态的，由被监护人住所地的居民委员会、村民委员会、法律规定的有关组织或者民政部门担任临时监护人”，因此A选项正确。B选项，父母是米成年子女的当然监护人。未成年人李某的父母首先作为其监护人，在其父母均死亡成没有监护能力的情况下，才可由其祖母王某担任监护人，因此B选项错误。C选项，《民法典》第37条规定：“依法负担被监护人抚养费、赠养费、扶养费的父母、子女、配偶等，被人民法院撤销监护人资格后，应当继续履行负担的义务”，因此C选项错误。D选项，根据《民法典》第36条的规定，有权向人民法院申请撤销监护人资格的撤销人包括：①其他依法具有监护资格的人：②居民委员会、村民委员会、学校、医疗机构、妇女联合会、残疾人联合会、未成年人保护组织、依法设立的老年人组织、民政部门等。因此D选项正确。（新编）","chapter":"第二章 自然人"},
  {"id":20,"topic":"专题一 民法典总则编","type":"multiple","question":"监护人因发生突发事件等紧急情况暂时无法履行监护职责，被监护人的生活处于无人照料状态的，应当为被监护人安排必要的临时生活照料措施的组织有？多选）","options":{"A": "被监护人住所地的居委会", "B": "被监护人住所地的村委会", "C": "被监护人住所地的民政部门", "D": "被监护人住所地的学校"},"answer":"ABC","explanation":"。《民法典》第34条第4款规定：“因发生突发事件等紧急情况，监护人暂时无法履行监护职贵，被监护人的生活处于无人照料状态的，被监护人住所地的居民委员会、村民委员会或者民政部门应当为被监护人安排必要的临时生活照料措施”，因此A、B、C选项正确，D选项错误。（新编）","chapter":"第二章 自然人"},
  {"id":21,"topic":"专题一 民法典总则编","type":"multiple","question":"关于监护，下列哪一表述是错误的？","options":{"A": "市民甲、乙之子丙5周岁，甲乙离婚后对谁担任丙的监护人发生争议，受理离婚案件的人民法院有权指定", "B": "甲的幼子乙在寄宿制幼儿园期间，甲的监护职资全部转移给幼儿园", "C": "甲丧夫后携幼子乙改嫁，乙的爷爷有权要求法院确定自已为乙的法定监护人", "D": "市民甲、乙之子丙5周岁，甲乙离婚后对谁担任丙的监护人发生争议，丙住所地的居民委员会有权指定"},"answer":"ABCD","explanation":"。A选项，父母是未成年子女的监护人，父母高婚不影响法定监护的效力，受理离婚案件的法院无需指定，也无权指定监护人，A选项表述错误。B选项，监护人可以将监护职责部分或全部委托给他人，","chapter":"第二章 自然人"},
  {"id":22,"topic":"专题一 民法典总则编","type":"multiple","question":"甲乙婚后生子丙，乙死亡。在丙12岁时，甲因吸毒处分被监护人财产而被撤销监护人资格。以下说法正确的是？（多选）","options":{"A": "甲的监护资格撤销后，无需再承担对丙的抚养费义务", "B": "甲的监护资格撤销后，可通过遗指定其母在其死后成为丙的监护人", "C": "甲戒毒成功后可以申请重新担任丙的监护人", "D": "甲能否重新担任丙的监护人需尊重丙的意愿"},"answer":"AD","explanation":"。医院有权申请缴销监护，监护人的资格只能由法院撤销，因此A选项正确，B选项错误。C选项，父母为未成年子女的当然监护人，张某的监护人资格被撤销后，李某监护权依然存在，不涉及指定监护的问题，C选项错误。D选项，监护人因对被监护人故意犯罪，监护权撤销后不能恢复，D选项正确。（新编）","chapter":"第二章 自然人"},
  {"id":23,"topic":"专题一 民法典总则编","type":"multiple","question":"张某和李某婚后育有一女，因有智力障碍，遭到父母嫌弃。后张某和李某离婚，女儿由张某抚养。某日张某酒后殴打其女，并将其嘴唇剪破，酒醒后将其女送至医院。以下说法正确的有：（多选）","options":{"A": "医院可以向人民法院申请撤销监护权", "B": "医院可以向民政部门申请撤销监护权", "C": "张某的监护权被撤销后，法院应当按照有利于被监护人的原则指定监护人", "D": "张某的监护权被撤销后，不可恢复"},"answer":"ABCD","explanation":"。根据《民法典》第36条的规定，有权向人民法院申请撒销监护人资格的撤销人包括：①其他依法具有监护资格的人：②居民委员会、村民委员会、学校、医疗机构、妇女联合会、残疾人联合会、未成年人保护组织、依法设立的老年人组织、民政部门等。因此A、B、C、D选项均正确。（新编）","chapter":"第二章 自然人"},
  {"id":24,"topic":"专题一 民法典总则编","type":"multiple","question":"有权向法院提出申请，要求撤销监护人资格的主体有？（多选）","options":{"A": "学校", "B": "医疗机构", "C": "未成年人保护组织", "D": "残疾人联合会2020年专刊代理中普格考认"},"answer":"AB","explanation":"。A、B、C选项，《民法典>第39条第1款规定：“有下列情形之一的，监护关系终止：（一）被监护人取得或者恢复完全民事行为能力；（二）监护人丧失监护能力；（三）被监护人或者监护人死亡：（四）人民法冬止有院认定监护关系终止的其他情形”，固此人、B逸项正确：监护关系终止应由法院认定，民政部门无救认定监护关系终止，因此C选项借误。D选项，监护人与被监护人无权自行协商解除监护关系，因此D选项确误。（2018）系","chapter":"第二章 自然人"},
  {"id":25,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，导致监护关系以下哪些原因？（多选）","options":{"A": "被监护人或者监护人死亡", "B": "监护人丧失监护能力", "C": "经民政部门认定监护关系终止", "D": "监护人与未成年的被监护人协商一致解除监护关"},"answer":"AC","explanation":"。A选项，《民法典》第40条规定：“自然人下落不明满二年的，利害关系人可以向人民法院申请宜告该自然人为失踪人”，因此A选项正确。B选项，宜告失踪不是宣告死亡的必经程序，B选项错误。C选项，《民法典》第42条第1款规定：“失踪人的财产由其配偶、成年子女、父母或者其他愿意担任财产代管人的人代管”，因此C选项正确。D选项，《民法典》第43条第2款规定：“失踪人所欠税款、债务和应付的其他费用，由财产代管人从失踪人的财产中支付”，因此D选项错误。（2013改编）","chapter":"第二章 自然人"},
  {"id":26,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，关于宣告失踪的下列哪些说法是正确的？多选）","options":{"A": "自然人下落不明满二年的，利害关系人可以向人民法院申请宣告其为失踪人", "B": "宜告失踪是宣告死亡的必经程序", "C": "失踪人的财产由其配偶、成年子女、父母或者其他愿意担任财产代管人的人代管", "D": "宣告失踪后，失踪人所欠税款、债务和应付的其他费用应暂停支付"},"answer":"ABD","explanation":"。《民法典》第46条规定：“自然人有下列情形之一的，利害关系人可以向人民法院申请宣告该自然人死亡：（一）下落不明满四年；（二）因意外事件，下落不明满二年。因意外事件下落不明，经有关机关证明该自然人不可能生存的，申请宜告死亡不受二年时间的限制”，因此A、B、D选项正确。《民法典》第41条规定：“自然人下落不明的时间自其失去音讯之日起计算。战争期问下落不明的，下落不明的时间自战争结束之日或者有关机关确定的下落不明之日起计算”，因此C选项错误。（2015改编）","chapter":"第二章 自然人"},
  {"id":27,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列关于宣告失踪和宣告死亡的哪种说法是正确的？（多选）","options":{"A": "自然人下落不明满四年的，利害关系人可以向人民法院申请宣告他死亡", "B": "因意外事件，下落不明满两年，利害关系人可以向人民法院申请宣告他死亡", "C": "因战争下落不明的，从下落不明之日起满2年可以申请宜告失踪", "D": "因意外事件下落不明，经有关机关证明该自然人不可能生存的，申请宣告死亡不受2年时间的限制"},"answer":"ACD","explanation":"。A选项，（民法典》第42条第2款的规定：“代管有争议，没有前款规定的人，或者前款规定的人无代管能力的，由人民法院指定的人代管”，因此A选项正确。B、C选项，（民法典》第43条的规定：“失踪人所欠税款、债务和应付的其他费用，由财产代管人从失踪人的财产中支付。财产代管人因故意或者重大过失造成失踪人财产损失的，应当承担赔专脑一民法典总则编借资任”，因出的选项借谈心通项正嘴。D选项（民法翼》管4案属定：“赔产代管人不展行代管职费、使害失除人财产快些成普失代管能力的，失综人的利关系人可以向人民法院中济受更赔产代管人。”因此D选项正崎。（游）","chapter":"第二章 自然人"},
  {"id":28,"topic":"专题一 民法典总则编","type":"multiple","question":"下列关于财产代管人，说法正确的有哪些？（多选）","options":{"A": "对担任财产代管人有争议的，由法院指定", "B": "失踪人所欠税款、债务和应付的其他费用，由财产代管人垫付", "C": "财产代管人因故意或者重大过失造成失踪人财产携失的，应当形担赠偿责任", "D": "财产代管人不履行代管职责，失踪人的利害关系人可以向人民法院申请变更财产代管人"},"answer":"ACD","explanation":"。A途项，飞机失单属干意外准件，因此华集的配偏在单收发生之日题满2年可申请宣告其究亡，A逸项正确。B逸项，《民法类》第48条规定：“因考外事体下蒙不明宣告死亡的，意外非体发生之日视为其见亡的日期”，因此零袋死亡日期为2021年6月1日，B逸项借供。C逸项，《民涨类》第49条现定：“自然人售死亡但是并来死亡的，不影响该自人在被宣告死亡期间实虑的民事法律行为的效力”，C逸项为一般笼境性说法，正确。D逸项，《民法典》第50规定：“被宣告死亡的人重新出现，经本人或者利害关系人申请.人民法院应当撒销死亡宣告”：因此D选项正确。（新编）","chapter":"第二章 自然人"},
  {"id":29,"topic":"专题一 民法典总则编","type":"multiple","question":"李某因所乘飞机失事自2021年6月1日至今下落不明。根据民法典总则编及相关规定，下列哪些说法是正确的？(多选）","options":{"A": "李某的配偶申请宜告其死亡，可以自2021年6月1日起满2年向人民法院申请", "B": "如果人民法院宜告李某死亡，则判决宣告之日为李某死亡的日期", "C": "若李某被宜告死亡但并未死亡，其在被宜告死亡期间实施的民事法律行为有效", "D": "若李某重新出现，经其本人申请，人民法院应当撤销死亡宣告"},"answer":"ABCD","explanation":"。A选项，宣告死亡的申请人（利窖关系人）不存在顺序先后的限制，因此人选项错误。B选项，刘某因意外事件下落不明，满2年即可宜告死亡，因此B选项错误。C选项，刘某因意外事件下落不明，意外事件发生之日视为其死亡的日期，刘某死亡的日期应是2020年6月1日，因此C选项错误。D选项，自然人被宜告死亡但是并未死亡的，不影响该自然人在被宣告死亡期回实施的民事法律行为的效力，但是其在被宣告死亡期间所实施的民事法律行为的效力应具体情况具体分析（可能有效、无效、效力待定，可撤销），并非一定有效，因此D选项错误。（新编）","chapter":"第二章 自然人"},
  {"id":30,"topic":"专题一 民法典总则编","type":"multiple","question":"2020年6月1日，家住北京市通州区的刘某乘坐某航班从马来西亚飞回北京。飞机中途失事，至今下落不明。刘某的父母担心刘某妻子带房改嫁，于2022年8月15日向通州区人民法院申请宜告刘某死亡。下列哪些说法是错误的？（多选）","options":{"A": "如果刘某的妻子不宣告刘某死亡，刘某的父母不能申请宣告刘某死亡", "B": "刘某的父母申请宣告刘某死亡距刘某下落不明尚不满4年，不符合宣告死亡的要求", "C": "如通州区法院宣告刘某死亡，则判决作出之日视为刘某死亡的日期", "D": "如通州区法院宣告刘某死亡但是刘某并未死亡的，在被宣告死亡期间刘某所实施的民事法律行为均有效"},"answer":"ABD","explanation":"。A选项，《民法典》第51条规定：“被宣告死亡的人的婚姆关系，自死亡宜告之日起消除。死亡宣告被撒销的，婚姻关系自撤销死亡宣告之日起自行恢复。但是，其配偶再婚或者向婚姻登记机关书面声明不愿意恢复的除外”，甲的死亡宣告被撤销，乙未再婚，也未向婚姻登记机关书面声明不愿意恢复其与甲的婚姻关系，因此甲、乙之向的婚姻关系自撒销死亡宣告之日起自行恢复，A选项正确。B、D选项，甲被宜告死亡后，作为其唯一地永人的乙堆永了中所有财产，乙将家里桥车册送给弟弟内的行为属于有权久分，川与合同合法有效，丙无退还轿车的义务，因此B、D项均正确。C选项，甲被宜告死亡但是并未苑亡。不影响甲在被宜告死亡期间实施的民事法律行为的力、因此甲与丁签订的买实合同，不会因为甲被宜告死亡而无效。另外甲单独处理共有财产属于无权处分，《合间编通则可法解释）第19条规定：“以转让成者设定财产权利为目的订立的合同，当事人成者其正权利人仅以让与人在订立合同时对标的出没有所有权成者处分枚为由主张合同无效的、人民法院不予支持”。因此该买卖合同不会因为甲对于住房的无权处分行为因无效，因此C选项错误。（法考题改编，思维扩展）","chapter":"第二章 自然人"},
  {"id":31,"topic":"专题一 民法典总则编","type":"multiple","question":"申出境经商下落不明，2025年9月其妻乙请求2026年本代理格考社某县法院宜告死亡。其后乙未再婚，乙是甲唯一的继承人。2026年3月、乙将家里的一辆轿车赠送给了弟弟丙，交付并办理丁过户登记。2026年4月，经商失败的甲返回该县，为还侦将登记于自已名下的一套夫妻共有住房私自买给知情的丁。同年7月，甲的死亡宜告被撤销。根据民法典及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "甲、乙的婚姻关系自撤销死亡宜告之日起自行恢复", "B": "乙有权赠与该轿车", "C": "甲出卖房屋的行为无效", "D": "丙可不返还该轿车"},"answer":"BD","explanation":"。A选项，袁某被宜告失踪后，其民事行为能力不受影响，因此A选项错误。B选项，《总则编司法解释>第16条规定，被申请人的债权人、债务人、合伙人等民事主体不能认定为宜告死亡的利害关系人，债权人胡某无权向法院申请宜告袁某死亡，因此B选项正确。C选项，自然人下落不明满2年的，利害关系人可以向人民法院申请宜告该自然人为失踪人。其中，配偶和父母均为利害关系人且申请宣告失踪无顺序先后的限制。袁某的配偶祖某有权申请袁某失踪，袁某父母不同意的，不可以申请撤回失踪宣告，因此C选项错误。D选项，《民法典》第1079条规定，一方被宜告失踪，另一方提起离婚诉讼的，应当准子高婚，因此祖某提出离婚诉讼，法院应当准许；D选项正确。（法考2022，思维扩展）","chapter":"第二章 自然人"},
  {"id":32,"topic":"专题一 民法典总则编","type":"multiple","question":"袁某和祖某系夫妻，后二人吵架，袁某离家出走。2年后，依祖某申请，法院宣告袁某失踪。四年后，因袁某一直未偿还借款债务，债权人胡某申请法院宣告袁某死亡。关于本案，下列说法正确的有？（多选）","options":{"A": "袁某被宣告失踪后，丧失民事行为能力", "B": "胡某的宣告申请，法院不应予以支持", "C": "袁某父母不同意，可以申请撤回失踪宜告", "D": "祖某提出离婚诉讼的，法院应当准许"},"answer":"AB","explanation":"。雪崩属于意外事件，因此甲的妻子可以在重崩之日起满2年宜告甲死亡，A选项正确。《民法典》第47条规定：“对同一自然人，有的利害关系人中请宜告死亡，有的利害关系人申请宣告失踪，符合本法规定的宜告死亡条件的，人民法院应当宣告死亡”，B选项正确。甲因意外事件下落不明被宜告死亡的，意外事件发生之日视为其死亡的日期，C选项错误。甲被宜告死亡后重新出现，可以由其本人或者利害关系人申请撤销死亡宜告，D选项错误。（新编）专一民法典总则编维续","chapter":"第二章 自然人"},
  {"id":33,"topic":"专题一 民法典总则编","type":"multiple","question":"甲于2023年1月1日在攀爬雪山返程途中不幸遭遇雪崩而下落不明，根据民法典总则编以及相关规定，下列说法正确的有哪些？（多选）","options":{"A": "甲的妻子可以自2023年1月1日之日起满两年向法院申请宣告甲死亡", "B": "如果甲的父母申请宣告死亡，甲的妻子申请宜告失踪的，法院应当宜告死亡", "C": "如果人民法院宜告甲死亡，则甲的死亡日期为法院判决宜告之日", "D": "如果甲重新出现，只能由甲向人民法院撤销死亡宜告"},"answer":"ACD","explanation":"，A连堆《底法）第13条展定：“自船人从出生叶是吃亡时止，其有府董权利能力，你法集有事权付，世民业义券”，因此大逸项正嘴。遇项，自终人账货年协和情净快步分力不同快的民事行能力，集民难存为偿力不是从出生时即产生，因此B逸项借误。C、D逐，《民法美>诺S9条境定：“法人的陷董权利能方和民事行办能力，从法人成业时产生，到决人终止时消灭”，因此C、D逸项函确。（2012）","chapter":"第二章 自然人"},
  {"id":34,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编皮相关规定，关于民事仅利能力和民事行为能力，下列哪些说法是正确的？多选）","options":{"A": "自然人的民事权利能力出生时产生，死亡时消灭", "B": "自然人的民事行为能力出生时产生，死亡时消灭", "C": "法人的民事权利能力成立时产生，终止时消灭", "D": "法人的民事行为能力成立时产生，终止时消灭"},"answer":"AB","explanation":"。A逸项，法人的民业权利力和民事行为能力，从涨人成立时产生，到法人终止时消灭，因此美新公司从其依法成立时具有民事权利能力和民事行为能力，A逸项正确。B、C、D选项，《民法典》第60条规定：“法人以其全部财产独立承担民事贵任”：《民法典》第61条规定：“代表法人从事民事活动的负费人，为法人的法定代表人。法定代表人以法人名义从事的民事活动，其法律后果由法人承受…”线某为英新公司的法定代表人，其经营活动以及美新公司在经营活动中的债务均由美新公司独立承担，因此B选项正确，C、D选项错误。（2011）","chapter":"第三章 法人和非法人组织"},
  {"id":35,"topic":"专题一 民法典总则编","type":"multiple","question":"村民钱某与村办食品厂共同设立了具有独立法人资格的“美新农副产品有限资任公司\"（以下简称“美新公司\"）.战某担任公司的法定代表人。根据民法典总则编及相关规定，下列说法哪些是正确的？多选）","options":{"A": "美新公司从其依法成立时具有民事权利能力和民事行为能力", "B": "美新公司对钱某的经营活动承担民事责任", "C": "美新公司在经营活动中产生的务由钱某、食品厂按各自的出资比例承担", "D": "钱某和食品厂对美新公司在经营活动中产生的务承担连带责任"},"answer":"ABCD","explanation":"。《民法典》第75条的规定：“设立人为设立法人从事的民事活动，其法律后果由法人承受；法人未成立的，其法律后果由设立人承受，设立人为二人以上的，享有连带债权，承担连带债务。设立人为设立法人以自己的名义从事民事活动产生的民事贵任，第三人有权选择请求法人或者设立人承担”，因此A、B、C选项正确。《民法典》第74条的规定：“法人可以依法设立分支机构…分支机构以自己的名义从事民事活动，产生的民事责任由法人承担………”，D选项正确。（新编）","chapter":"第三章 法人和非法人组织"},
  {"id":36,"topic":"专题一 民法典总则编","type":"single","question":"甲乙丙丁戊五个人均为执业两年以上的专利代理师，协商一致打算成立知识产权代理有限责任公司，关于公司设立过程中法律后果的承担，以下说法正确的有哪些？（多选）","options":{"A": "该协议仅对乙丙两公司具有约束力，对甲公司的债权人", "B": "该协议无效，应当由乙丙两公司对甲公司的优务承担连", "C": "该协议有效，甲公司的债权人只能请求乙公司对甲公司", "D": "该协议效力待定，应当由甲公司的债权人选择分立后的公司清偿债务"},"answer":"A","explanation":"（民法典》第67条第2款现定：“次人分立的，分立后的法人享有连带借权，承担连带债务，但是债权人和债务人另有约定的除外”。木题中，甲公司分立为乙丙两公司后的约定对内有效，对外并不当然有效，除非债权人和债务人另有约定，因此人选项正确，B、C、D逸项错误。（法考2019）","chapter":"第三章 法人和非法人组织"},
  {"id":37,"topic":"专题一 民法典总则编","type":"multiple","question":"下列情形中，属于法人解散的原因的有哪些？","options":{"A": "被吊销营业执照", "B": "被吊销登记证书", "C": "章程规定的存续期间届满", "D": "变更名称"},"answer":"ABC","explanation":"。《民法典》第69条规定：“有下列情形之一的，法人解傲：（一）法人章程规定的存续期间届满成者法人章程规定的其他解散事由出现：（二）法人的权力机构决议解：（三）因法人合并或者分立需要解攸：（四）法人依法被吊销营业执照、登记证书，被责令关闭或者被撤销；（五）法律规定的其他情形。”，变更名称不属于上述情形，因此A、B、C选项正确，D选项错误。（新编）","chapter":"第三章 法人和非法人组织"},
  {"id":38,"topic":"专题一 民法典总则编","type":"multiple","question":"关于法人，下列哪一表述是正确的？","options":{"A": "社会团体法人均属非营利法人", "B": "基金会法人属于捐助法人", "C": "社会团体法人可以属于营利法人", "D": "民办非企业单位法人属于营利法人"},"answer":"AB","explanation":"。《民法典》第87条规定“非营利法人包括事业单位、社会团体、基金会、社会服务机构等”，因此，A选项正确、C选项错误，D选项中的民办非企业单位属于社会服务机构，因此属于非营利法人，D选项错误。《民法典》第92条规定，“具备法人条件，为公益目的以捐助财产设立的基金会、社会服务机构等，经依法登记成立，取得捐助法人资格”，因此B选项正确。（新编）","chapter":"第三章 法人和非法人组织"},
  {"id":39,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典及相关规定，下列关于事业单位法人的说法哪些是错误的？多选）","options":{"A": "具备法人条件的事业单位从成立之日起取得法人资格", "B": "事业单位法人名誉权遭受侵害的，有权诉请精神损害赔偿", "C": "所有事业单位法人的全部经费均来自国家财政拨款", "D": "国家举办的事业单位对其直接占有的动产享有所有权"},"answer":"ABCD","explanation":"。A选项，《民法典》第88条规定：“具备法人条件，为适应经济社会发展要，提供公益服务设立的事业单位，经依法登记成立，取得事业单位法人资格；依法不需要办理法人登记的，从成立之日起，具有事业单位法人资格”，因此A选项错误。B选项，只有自然人享有主张精神损害赔偿的权利，法人不具有主张精神损害赔偿的权利，因此B选项错误。C选项，事业单位分为全额按款、自负盈亏的事业编制，并非所有事业单位的经费均来自国家财政按款，因此C选项错误。D选项，《民法莫》第256条规定：“国家举办的事业单位对其直接支配","chapter":"第三章 法人和非法人组织"},
  {"id":40,"topic":"专题一 民法典总则编","type":"single","question":"关于民法典对法人分类的规定，下列哪些表述是正确的？（单选）","options":{"A": "社团法人、营利法人、机关法人", "B": "营利法人、非营利法人、特别法人", "C": "机关法人、企业法人、特别法人", "D": "企业法人、非营利法人、财团法人"},"answer":"B","explanation":".根据《民法典>第一启则编第三章的规定，对法人分类色榜警利法人、非管利法人、特别法人，因此A、C、D逸项借误，B逸项正嚼。（2018）","chapter":"第三章 法人和非法人组织"},
  {"id":41,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典及相关规定，下列哪些组织属于非营利法人多选）","options":{"A": "社会服务机构", "B": "事业单位", "C": "金会", "D": "行政机关"},"answer":"ABC","explanation":"。非管利法人包括事业单位、社会团体、基金会、社会服务机构等，因北A、B、C选项正确。D逸项，行政机关属于特别法人，D选项带误。（新编）","chapter":"第三章 法人和非法人组织"},
  {"id":42,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，关于非法人组织，下列说法哪些是正确的？多选）","options":{"A": "非法人组织不具有法人资格，不能以自己的名义从事民事活动", "B": "非法人组织的财产不足以清偿债务的，其出资人或者设立人承担无限责任", "C": "非法人组织解散的，应当依法进行清算", "D": "非法人组织只能确定一人代表该组织从事民事活动"},"answer":"BC","explanation":"。A逸项，《民法英》第102条铭1款规定：“非法人组织是不具有法人资格，但是能够依法以自己的名义从事民事活动的组织”，因此A选项错误。B选项，《民法典》第104条规定：“非法人组织的财产不足以清偿价务的，其出资人成者设立人承担无限责任…….”，因此B选项正确。C选项，《民法英》第107条规定：“非法人组织解散的，应当依法进行清算”，因此C选项正确。D选项，《民法典》第105条规定：“非法人组织可以确定一人成者数人代表该组织从事民事活动”，因此D选项错误。（新编）","chapter":"第三章 法人和非法人组织"},
  {"id":43,"topic":"专题一 民法典总则编","type":"single","question":"甲企业是由自然人安琚与乙企业（个人独资）各出资500万设立的普通合伙企业，甲企业欠丙企业货款50万元，由于经营不善，甲企业全部资产仅剩20万元。现所欠货款到期，相关各方因货款清偿发生纠纷。对此，下列哪一表述是正确的？（单选）","options":{"A": "丙企业只能要求安琚与乙企业各自承担15万元的清偿责任", "B": "丙企业只能要求甲企业承担清偿责任", "C": "欠款应先以甲企业的财产偿还，不足部分由安琚与乙企业承担无限连带责任", "D": "就乙企业对丙企业的应偿债务，乙企业投资人不承担责任"},"answer":"C","explanation":"。A、B、C选项，甲为合伙企业，合伙企业属于非法人组织，其债务应先以其全部财产进行清偿，合伙企业财产不能清偿到期债务的，合伙人承担无限连带责任，连带贵任由法律规定或者当事人约定，不只是合伙人平均承担责任，或只要求合伙企业承担清偿责任，因此A、B选项错误，C选项正确。D选项，乙企业为个人独资企业，属于非法人组织，其债务应先以其全部财产进行清偿，个人独资企业财产不能清偿到期债务的，企业主承担无限责任，因此D选项错误。（法考2016）","chapter":"第三章 法人和非法人组织"},
  {"id":44,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，非法人组织享有下列哪些民事权利？（多选）","options":{"A": "隐私权", "B": "健康权", "C": "名誉权", "D": "名称权"},"answer":"CD","explanation":"。《民法典》第110条规定：“自包人享有生命权、身体权、健康权、姓名权、肖像权、名誉权、荣誉权、隐私权、婚烟自主权等权利。法人、非法人组织享有名称权、名誉权和荣誉权”，因此A、B选项错误，C、D选项正确。（2019）","chapter":"第四章 民事权利"},
  {"id":45,"topic":"专题一 民法典总则编","type":"single","question":"根据民法典总则编及相关规定，下列哪种民事主体享有姓名权？（单选）","options":{"A": "法人", "B": "自然人", "C": "个体工商户", "D": "个人合伙企业"},"answer":"B","explanation":"。只有自然人享有姓名权，法人、个体工商户和个人合伙企业享有名称权，四此A、C、D选项错误，B选项正确。（2017）","chapter":"第四章 民事权利"},
  {"id":46,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "自然人享有姓名权，有权依法决定、使用、变更自己的姓名，禁止他人干涉、盗用、假冒", "B": "法人享有名称权，但是不得转让自己的名称", "C": "自然人享有肖像权，未经肖像权人同意，不得以任何目的使用公民的肖像", "D": "法人享有名誉权，禁止用侮辱、谤等方式损害法人的名誉"},"answer":"AD","explanation":"。A选项，《民法典》第1012条规定：“自然人享有姓名权，有权依法决定、使用、变更或者许可他人使用自已的姓名，但是不得违背公序良俗”；《民法典》第1014条规定：“任何组织或者个人不得以干涉、盗用、假冒等方式侵害他人的姓名权或者名称权”；因此A选项正确。B选项，《民法典》第1013条规定：“法人、非法人组织享有名称权，有权依法决定：使用：变更、转让或者许可他人使用自己的名称”；因此B选项错误。C选项，《民法典》第1018条第1款规定：“自然人享有肖像权，有权依法制作、使用、公开或者许可他人使用自己的肖你”；根据《民法典》第1020条的规定，合理实施可以不经肖像权人同意，因此C选项错误。D选项，《民法典》第1024条第1款规定：“民事主体享有名誉权。任何组织或者个人不得以侮母、谁谤等方式役害他人的名誉权”，法人作为民事主体享有名誉权，因此D选项正确。（2011）","chapter":"第四章 民事权利"},
  {"id":47,"topic":"专题一 民法典总则编","type":"single","question":"根据民法典总则编及相关规定，下列哪项属于不当得利？（单选）","options":{"A": "债务人偿还未到期的债务", "B": "债务人清偿已超过诉讼时效的债务", "C": "养子女向生父母给付赡养费", "D": "顾客多付售货员的货款"},"answer":"D","explanation":"。A、B选项，债务人偿还债务是芸于债权，C选项养子女给付赔养费是基于其负有的赠养义务，以上均是依据法律规定应当得到的利益，不属于不当得利；D选项售","chapter":"第四章 民事权利"},
  {"id":48,"topic":"专题一 民法典总则编","type":"single","question":"根据民法典总则编及相关规定.下列哪些情形下当事人获得的利益构成不当得利？单选）","options":{"A": "居民何某位于地快沿线的商品房因地供通车大度升值", "B": "乙公司接收了物流公司误送的甲公司的货物", "C": "蒋某走失的宠物狗得到石某的喂养、照顾", "D": "李某屋内的积水由邻居帮助排出"},"answer":"B","explanation":"。A违项，何其的收些属干自增值，不悔虑不当作待。B项，乙公司接收供选的货物设有合法模：属平不当得利。C选埃属干无因管理，不悔成不监得利。D违项属于带里正，不悔成不当排利。(2011)","chapter":"第四章 民事权利"},
  {"id":49,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编对知识产权的相关规定，以下属于知识产权客体的是？多选）","options":{"A": "发明", "B": "网络虚拟财产", "C": "商业秘密", "D": "个人信息"},"answer":"AC","explanation":"。A、C逸项，（民法典）第123条第2款规定：知识产权是权待人依法就下列容单有的专有的权科：（二）发明、实用新型、外观设计：：（企）离业秘密：…\"，因此A、C逸项正确。B逸项网络虚拟财产属于财产权，D逸项个人信息属干人身权，均不属于知识产权客体，因此B、D选项错误。（2018）","chapter":"第四章 民事权利"},
  {"id":50,"topic":"专题一 民法典总则编","type":"single","question":"甲公司向法院起诉乙公司产品侵犯其专利权，法院未作出判决前，甲公司在社交媒体上对乙公司产品侵犯其专利权的情况进行了宣传，根据民法典总则编规定，甲公司的行为侵犯了乙公司的哪项权利？（单选）","options":{"A": "名誉权", "B": "荣誉权", "C": "隐私权", "D": "名称权"},"answer":"A","explanation":"。甲公司在法院未判决前，就在社交媒体上宣传乙公司产品便犯其专利权，可能会使公众对乙公司的商业信誉、产品声誉产生负面评价，犯了乙公司的名权。（新编）为","chapter":"第四章 民事权利"},
  {"id":51,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列关于民事法律行为的哪些说法是正确的？（多选）","options":{"A": "民事法律行为是民事主体设立、变更、终止民事法律关系的行为", "B": "意思表示真实是民事法律行为有效的条件之一", "C": "民事法律行为一律不能采取口头形式", "D": "民事法律行为从成立时生效，法律另有规定或当事人另有约定的除外"},"answer":"ABD","explanation":"。A选项，《民法典》第133条规定：“民事法律行为是民事主体通过意思表示设立、变更、终止民事法律关系的行为”，因此A选项正确。B选项，《民法典》第143条规定：“具备下列条件的民事法律行为有效：（二）意思表示真实……，因此B选项正确。C选项，（民法典》第135条规定！“民事法律行为可以采用书面形式、口头形式成者其他形式”，因此C选项仆误。D选项，（民法典）第136条第1救规定：“民事法律行为自成立时生效，但是法律另有规定成者当事人另有约定的除外”，因此D选项正确。（2015改编）","chapter":"第五章 民事法律行为"},
  {"id":52,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列哪些情形构成意思表示？多选）","options":{"A": "孙某临终前在日记中写道：若离人世，愿将个人藏书赠与好友汪某", "B": "何某向一台自动售货机投币购买饮料", "C": "张某对李某说：我儿子如果考上重点大学，我一定请你", "D": "潘某在寻物启事中称，愿向送还失物者付酬金500元"},"answer":"ABD","explanation":"。A选项，孙某通过日记将其个人藏书赠与好友汪某的行为属于遗赠行为，构成意思表示。B选项，自动售货机的价格设亚属于要约，购买人的投币行为属于承诺，因此何某向一台自动售货机投币购买伙料的行为构成意思表示。C选项，请客吃饭属于好意施惠，是日常生活中的人际交往情谊行为，张某的行为不构成意思表示。D选项，悬赏广告属于单方允诺的意思表示，潘某的行为构成意思表示。（新编）","chapter":"第五章 民事法律行为"},
  {"id":53,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列哪些属于无效民事法律行为？（多选）","options":{"A": "无民事行为能力人实施的民事法律行为", "B": "恶意申通，损害他人利益的民事法律行为", "C": "行为人对行为内容有重大误解的民事法律行为", "D": "一方当事人利用对方处于危困状态，致使显失公平的民事法律行为"},"answer":"AB","explanation":"。A选项，（民法典》第144条规定：“无民事行为能力人实施的民事法律行为无效”，因此A选项正确。B选项，《民法典》第154条规定：“行为人与相对人恶意串通，损害他人合法权益的民事法律行为无效”，因此B选项正确。C、D选项，（民法）第147条规定：“基于重大误解实施的民事法律行为，行为人有权请求人民法院或者仲装机构予以撤销\"：（民法典>第151条规定：“一方利用对方处于危困状态、缺乏判断能力等情形，致使民事法律行为成立时显失公平的，受损害方有权请求人民法院或者仲裁机构予以撤销”，因此C、D选项属于可撒销的民事法律行为，不属于无效的民事法律行为。（2012改编）","chapter":"第五章 民事法律行为"},
  {"id":54,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列哪些民事行为无效？（多选）","options":{"A": "周某因欠赌價而向孟某出具欠条", "B": "甲与乙签订了一份购房合同，后因房价上涨，申申通丙订立了另一份购房合同，并将该房屋过户给丙，致使乙无法获得房屋", "C": "12岁的小学生给游戏账户充值一万元", "D": "王某利用李某没有经验，以1万元的价格从李某手中购进一套价值50万元的旧版人民币"},"answer":"AB","explanation":"。A选项，周某欠赌债属于违反法律规定的民事法律行为，该民事法律行为无效。B选项，甲串通丙恶意损害乙的利益，使乙无法取得房屋的所有权，甲和丙的行为属于思意串通，这行为无效。C选项，","chapter":"第五章 民事法律行为"},
  {"id":55,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典的规定，下列哪些行为属于无效的民事法律行为？（多选）","options":{"A": "7岁儿童刘某给游戏主播打赏的民事法律行为", "B": "张某在受欺诈状态下所实施的民事法律行为", "C": "甲装饰公司卖给乙公司100盛吸顶灯，乙公司发现甲公司营业执照上的核准经营范围仅为装饰业务，遂起诉请求法院确认该买卖合同无效", "D": "李某将其合法持有的猎枪出售给未取得持枪许可的朋友"},"answer":"AD","explanation":"。A选项无民事行为能力人实施民事法律行为无效。B选项受欺诈而实施的民事法律行为属于可缴销的民事法体行为。C选项甲销售吸顶灯的行为只是超出营业执照的经管范围，并未违反法律、行政法规的强别性规定，因此不属于无效的民事法律行为。D选项买卖借枪违反了法律、行玫法规的强制性规定，属于无效的民事法律行为。（新编）","chapter":"第五章 民事法律行为"},
  {"id":56,"topic":"专题一 民法典总则编","type":"single","question":"中和乙签订了两份房屋买卖合同，第一份约定房屋价款500万元，注明房屋过户备案事项不按此合同履行。第二份合同约定房屋价款200万元，房屋过户备案事项按此合同履行。关于两份合同，下列哪一选项正确？（单选）","options":{"A": "第一份合同部分无效，第二份合同无效", "B": "第一份合同有效，第二份合同部分无效", "C": "两份合同均无效", "D": "两份合同均有效"},"answer":"B","explanation":"。（民法典）第146条规定：“行为人与相对人以虚假的意思表示实施的民事法律行为无效。以虚假的意思表示隐的民事法律行为的效力，依照有关法体规定处理。”虚假的意思表示以及隐限的民事法律行为常表现为“阴阳合同”。本题中，甲乙二人为房屋过户备案事项签订的第二份合同为“阳合同”。该合同中关于“房屋价款200万元“的约定系虚假的意思表示，该合同中有关价款的部分无效。以虚假的意思表示隐蓝的民事法律行为的效力，即“阴合同”，本题中第一份房屋买卖合同为甲乙二人真实的意思表示，该份合同有效。因此，B选项正确。（法考2020，思维扩展）","chapter":"第五章 民事法律行为"},
  {"id":57,"topic":"专题一 民法典总则编","type":"single","question":"下列属于可撤销合同情形的是？","options":{"A": "违反法律法规强制规定的", "B": "以恶意串通损害他人利益的", "C": "因重大误解签订的", "D": "以虚假的意思表示签订的"},"answer":"C","explanation":"。A选项，违反法律、行政法规的强制性规定的民事法律行为无效。B选项，恶意串通损害他人利益的民事法律行为无效。C选项，基于重大误解实施的民事法律行为可撤销。D选项，以虚假的意思表示实施的民事法律行为无效。（新编）","chapter":"第五章 民事法律行为"},
  {"id":58,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典及相关规定，下列哪些属于当事人可以请求人民法院撤销的合同？多选）","options":{"A": "甲公司与乙公司恶意申通签订的损害丙公司利益的买卖合同", "B": "贾某以欺诈的手段使齐某在违背真实意思的情况下与之订立的买卖合同", "C": "韩某把一个古董花瓶错当成现代仿制花瓶与赵某签订的买卖合同", "D": "非法垄断技术的技术合同"},"answer":"BC","explanation":"。A选项恶意串通损害他人利益的民事法律行为无效。B选项，以欺诈手段实施的民事法律行为可撤俏。C选项，够其的行为构成重大误解，因此C选项属于可缴销合同。D选项，（民法典》第850条规定：“业法垄断技术成者使害他人技术成果的技术分间无效”，因此D选项属于无效合同。（2012）","chapter":"第五章 民事法律行为"},
  {"id":59,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编关于显失公平民事法律行为的相应2026年专利代理师井格考认规定，一方利用对方处于以下哪种情形时，致使民事法律行为成立时显失公平，受损害方有权请求予以撤销？多选）","options":{"A": "无民事行为能力", "B": "处于危困状态", "C": "缺乏判断能力", "D": "虚假意思表示"},"answer":"BC","explanation":"。根据《民法典》第151条的规定，显失公平是指，一方利用对方处于充团状态、缺乏判断能力等情形，致使民事法律行为成立时显失公平，受损事方有权请求人民法院或者仲载机构予以撤销。因此A、D选项错误，B、C选项正确。（2018）","chapter":"第五章 民事法律行为"},
  {"id":60,"topic":"专题一 民法典总则编","type":"single","question":"王某明知自己某项专利技术落人他人专利保护范围，仍与不知情的甲公司签订专利权转让合同，并隐了专利侵权的问题。根据民法典及相关规定，下列关于该合同效力的说法哪个是正确的？（单选）","options":{"A": "有效", "B": "无效", "C": "效力待定", "D": "可撤销"},"answer":"D","explanation":"。本题中，王某隐萌专利俊权的事实，构成欺诈，基于欺诈所签订的合间属于可撤销的合同，因此A、B、C选项钳误，D选项正确。（2019）","chapter":"第五章 民事法律行为"},
  {"id":61,"topic":"专题一 民法典总则编","type":"multiple","question":"金某家中有一块祖传玉佩。当地著名企业家孟某甚是喜爱，多次上门求购，均被金某拒绝。2022年2月1日，孟某的生意伙伴曹某为讨孟某欢心，对金某讲：“三日内不将玉佩卖给孟某，小心金某在某高中上学的女儿”。金某心生恐惧，次日主动以5万元出售给孟某。2025年3月2日，女儿留学德国，金某再无后顾之优，于3月10日向法院起诉要求撤销玉佩买卖合同。关于本案，下列哪一说法是正确的？多选）","options":{"A": "无论孟某是否知道曹某胁迫金某一事，金某均有权请求撤销与孟某的玉佩买卖合同", "B": "只有当孟某知道曹某胁迫金某一事，金某才有权请求撤销与孟某的玉佩买卖合同", "C": "金某基于受胁迫撤销玉佩买卖合同的权利因超过1年除斥期间而不予支持", "D": "金某最迟应当自2022年2月2日起五年内行使撤销权"},"answer":"AD","explanation":"。根据《民法典》第150条的规定：“一方或者第三人以胁迫手段，使对方在违背真实意思的情况下实施的民事法律行为，受胁迫方有权请求人民法院或者仲裁机构予以撤销。”本题属于第三人胁迫，第三人实施胁迫行为不论相对人是否知情，受胁迫方都可以行使撤销权。曹某以金某上商中的女儿相威胁，金某出于恐俱心理，将祖传玉佩出售给了孟某。曹某实施的胁迫行为不论孟某是否知情，金某均有权要求撤销其与孟某问的买卖合同，因此A选项正确，B选项错误。根据（民法典）第152条的规定，当事人受胁迫，自胁迫行为终止之日起一年内没有行使撤销权的，撤销权消灭。当事人自民事法律行为发生之日起五年内没有行使撤销权的，撤销权消灭。本题中，金某的女儿2025年3月2日出国留学，励追行为终止，因此，金某起诉时并未超过除斥期问，C选项错误。金某受胁迫将玉佩出售给孟某的时同为2022年2月2日，因此金某应当自该行为发生之日起5年内行使撤销权，D选项正确。（新编）","chapter":"第五章 民事法律行为"},
  {"id":62,"topic":"专题一 民法典总则编","type":"single","question":"齐某扮成建筑工人模样，在工地旁摆放一尊廉价购得的旧蟾蜍石雕，冒充新挖出文物等待买主。甲曾以5000元从齐某处买过一尊同款石雕，发现被骗后正在和齐某交涉时，乙过来对乙说：“我之前从他这买了一个，转手就赚了，这个你不要我就要了。“乙信以为真，以5000元买下石雕。关于所涉民事法律行为的效力，下列哪一说法是正确的？（单选）","options":{"A": "乙可向甲主张撤销其购买行为", "B": "乙可向齐某主张撤销其购买行为", "C": "甲不得向齐某主张撤销其购买行为", "D": "乙的撤销权自购买行为发生之日起1年内不行使则消灭"},"answer":"B","explanation":"。A、B，甲关欺诈行为，使乙在违背其实宽愿的情况下以5000元购买了并某的石隐：并某在坊却未作反对获示，应认定为其知道甲实此诈行为，受欺诈方乙可以请求法院成仲裁机构改销与养某的购买行为，因此A选项借误，B选项正确。C选项，齐其将度价石难以5000元的价格出售给甲的行为构成欺谁，甲可以向齐某主张缴销其购买行为，因此，C选项错误。D选项，当事人自知道成者应当知道缴销本由之日起1年内成是当事人自民事法律行为发生之日起5年内没有行使微销权的，缴销权消灭，因此乙应在其知晓受欺诈事实的1年以内行使激销权，且缴销权最迟应在购买行为发生之日起5年内行使，D逸项错误。（法考2017）","chapter":"第五章 民事法律行为"},
  {"id":63,"topic":"专题一 民法典总则编","type":"multiple","question":"乙公司以国产牛肉为样品，伪称某国进口牛肉，与甲公司签订了买卖合同，后甲公司得知这一事实。此时恰某国流行疯牛病，某国进口牛肉滞销，国产牛肉价格上涨。下列哪些说法是正确的？多选）","options":{"A": "甲公司有权自知道样品为国产牛肉之日起一年内主张撤销该合同", "B": "乙公司有权自合同订立之日起一年内主张撤销该合同", "C": "甲公司有权决定履行该合同，乙公司无权拒绝履行", "D": "在甲公司决定撤销该合同前，乙公司有权按约定向甲公司要求支付货款"},"answer":"ACD","explanation":"。A、B选项，乙公可以国产牛内伪称某国进口牛肉的行为构成欺许，受败诈方即申公司有权向法院主张缴销合同，欺诈方乙公司则无此权利，受欺诈方应当自知道或应当知道缴销事由之日起1年内行使数销权，因此A选项正确，B选项错误。C、D选项，可缴销的民事法律行为（合同）在没有被缴销前是有效的，因此，甲公司有权决定履行该合同，乙公司无权拒绝，乙公司履行合同后也有权按约定向甲公司要求支付货款，因此C、D选项正确。（法考2009）","chapter":"第五章 民事法律行为"},
  {"id":64,"topic":"专题一 民法典总则编","type":"multiple","question":"王某与张某签订了一个二手汽车买卖合同，但王某隐瞒了该汽车存在重大质量瑕疵的情况。根据民法典及相关规定，下列说法哪些是正确的？多选）","options":{"A": "张某有权请求人民法院确认该买卖合同无效", "B": "张某有权请求人民法院撤销该买卖合同", "C": "张某有权请求仲裁机构确认该买卖合同无效", "D": "张某有权请求仲裁机构撤销该买卖合同"},"answer":"BD","explanation":"。本题中，王某隐明了该汽车存在重大质量瑕疫，属于欺诈行为，根据《民法典》第148条的规定，张某有权请求人民法院或仲裁机构撤销该买卖合同，因此A、C选项错误，B、D选项正确。（新编）","chapter":"第五章 民事法律行为"},
  {"id":65,"topic":"专题一 民法典总则编","type":"multiple","question":"钱某做生意时，因销售商刘某亏损无钱支付货款90余万，于是刘某在2020年2月28日便将其早年拍卖会上以100多万元拍得一幅徐悲鸿奔马图抵价。钱某不喜收藏，欲将该画出售给古玩商高某。2020年3月6日，高某伙同艺术品鉴定家孟某欺骗钱某该画是高仿品，价值不超过10万元、钱某信以为真，非常快恼，但是并未出售。钱某无奈，在2020年3月15日以10万元的价格将该奔马图卖给了不知情的陈某。2020年8月7日，刘某找出了当年拍得奔马图后请徐悲鸿遗端廖静文女士签定为真品的证明书，钱某才知道其售出的奔马图确为真品，目前市场价格为500万元。根据民法典及相关规定，下列说法哪些是正确的？多选）","options":{"A": "钱某因受欺诈而出售奔马图，可以请求人民法院予以撤销", "B": "钱某因重大误解而出售奔马图，可以请求人民法院予以撤销", "C": "钱某可以在知道重大误解事由之日起90日内书面通知陈某，声明因重大误解而撤销奔马图买卖合同", "D": "如果钱某一直不知道撤销事由，自2020年3月15日起5年内没有行使撤销权的，撤销权消灭"},"answer":"BD","explanation":"。本题中，钱某将真品画作误认为质品出售，并未受到陈某欺诈，而高某和孟某欺诈钱某，陈某并不知情，钱某将奔马图低价出售给陈某的行为并不是因欺诈面为的行为，钱某将名画出售给陈某时因受商某、孟某的欺诈而陷入对标的物的认识错误，进而将价值500万元的奔马图以10万元出售于陈某，属于重大误解，可以自知道撒销事由之日（2020年8月7日）起90日内请求人民法院成者仲机构撤销该买实合同，而不是书面通知床某撤销，伐某自民事法律行为发生之日（2020年3月15日）起5年内没有行使撤销权的，撒销权消灭，因此A、C选项错误；B、D选项正确。（新编）","chapter":"第五章 民事法律行为"},
  {"id":66,"topic":"专题一 民法典总则编","type":"multiple","question":"某日，李某醉酒搭乘出租车回家，车程20公里。李某下车前用手机支付车费。误将80元输错成8080元。司机收到后，未提醒李某。对此，下列哪些选项是正确的？（多选）","options":{"A": "该运输合同因显失公平而可撤销", "B": "对于多付的8000元视为李某对司机的赠与", "C": "醉酒不影响该运输合同的效力", "D": "李某有权请求出租车司机返还8000元不当得利"},"answer":"CD","explanation":"。A、C选项；显失公平，是指一方利用对方处于危困状态、缺乏判断能力等情形，致使民事法律行为成立时显失公平。李某醉酒打车，与出租车公司订立了运输合同。出租车公司的司机并未利用李某因醉酒而缺乏判断力与其实施显失公平的民事法律行为。因此，不影响该运输合同的效力，A选项错误，C选项正确。B、D选项，不当得利是指，因他人没有法律根据，取得不当利益，受损失的人有权请求其返还。李某将8000元给予司机欠缺法律上的依据，且李某并无赠子的意思表示；李某与司机之向、构成了不当得利之债，受损害方李某有权要求司机返还，因此B选项错误，D选项正确。（法考2020）","chapter":"第五章 民事法律行为"},
  {"id":67,"topic":"专题一 民法典总则编","type":"single","question":"某日，古玩爱好者王某在本地经常光顾的古玩街花费数万元购买了一对青铜烛台，疑为明代真品。后经鉴定，该烛台为现代仿品，仅值数百元，对此，下列哪一说法是正确的？（单选）","options":{"A": "王某可主张存在重大误解，请求撤销合同", "B": "王某意思表示真实有效，无权请求撤销合同", "C": "王某可主张存在显失公平，请求撤销合同", "D": "王某可主张其被出卖人欺诈，请求撤销合同"},"answer":"B","explanation":"。重大误解，是指行为人对行为的性质、对方当事人或标的物的品种、质量、规格、价格、数量等产生错误认识，按照通常理解如果不发生该错误认识行为人就不会作出相应意思表示。本题中，双方当事人交易的标的物是“古玩”，属于特殊商品，由买受人通过实物查看，自行判断商品价值，并与出卖人达成交品合意，即便买受人确实对商品价值存在误判，也不构成法律上所认可的重大误解。因此，A项错误；B项正确。C选项，虽然王某花费数万元购买了仅值数百元的背铜烛台，客观上价格相差悬殊。但是，主观上，出卖人并未“利用”王某处于危困状态、缺乏判断能力。因此，不符合显失","chapter":"第五章 民事法律行为"},
  {"id":68,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列哪些说法是正确的7（多选）","options":{"A": "在订立合同时显失公平的，受损害方有权请求人民法院成者仲裁机构撤销", "B": "合同被依法撤销的，该合同自人民法院判决撤销之日起丧失法律约束力", "C": "合同部分无效，不影响其他部分效力的，其他部分仍然有效", "D": "合同被撤销后，因该合同取得的财产应当予以返还；不能返还或者没有必要返还的，应当折价补偿"},"answer":"ACD","explanation":"。A逸项，根据《民法典》第151条的规定，显失公平的民事法体行为，受损害方有权请求人民法院成者仲提机构予以收销，因此A逸项正确。B选项，（民法典》第155条规定：“无效的或者被激销的民事法律行为自始没有法律约来力”，因此B选项错误。C逸项，《民法块》第156条规定：“民事法律行为部分无效，不影响其他部分效力的，其他部分仍然有效”，因此C选项正确。D选项，《民法典》第157条规定：“民事法律行为无效、被缴销或者确定不发生效力后，行为人因该行为取得的财产，应当予以返还：不能返还成者没有必要返还的，应当折价补偿……”，因此D选项正确。（2017）","chapter":"第五章 民事法律行为"},
  {"id":69,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，关于无效、被撤销的民事行为，下列说法正确的是？多选）","options":{"A": "无效的民事行为从行为开始起就没有法律约束力", "B": "无效的民事行为从人民法院确认无效之日起没有法律约束力", "C": "被撤销的民事行为从人民法院撤销该民事行为之日起没有法律约束力", "D": "被撤销的民事行为从行为开始起就没有法律约束力"},"answer":"AD","explanation":"。根据《民法典》第155条的规定，无效的或者被撤销的民事法律行为自始没有法律约束力，因此A、D选项正确，B、C选项错误。（2019)","chapter":"第五章 民事法律行为"},
  {"id":70,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列关于可撤销合同的哪些说法是正确的？多选）","options":{"A": "因重大误解订立的合同，行为人有权请求人民法院或者仲裁机构撤销", "B": "合同被依法撤销的，该合同自人民法院判决撤销之日起丧失法律约束力", "C": "因重大误解订立的合同，具有撤销权的当事人自知道或者应当知道撤销事由之日起90日内没有行使撤销权的，撤销权消灭", "D": "当事人自民事法律行为发生之日起一年内没有行使撤销权的，撤销权消灭"},"answer":"AC","explanation":"。A选项，基于重大误解订立的合同，行为人有权请求人民法院或者仲裁机构予以数销，因此A选项正确。B选项，无效的或者被撤销的民事法律行为自始没有法律约束力，因此B选项错误。C选项，（民法典）第152条规定，重大误解的当事人自知道或者应当知道撤销事由之日起90日内没有行使撤销权的，撒销权消灭，因此C选项正确。D选项，当事人自民事法律行为发生之日起5年内没有行使撤销权的，撒销权消灭，因此D选项错误。（新编）","chapter":"第五章 民事法律行为"},
  {"id":71,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典及相关规定，合同无效后可能产生下列哪些法律后果？（多选）","options":{"A": "赔偿损失", "B": "返还财产", "C": "折价补偿", "D": "继续履行"},"answer":"ABC","explanation":"。民事法律行为无效、被撤销成者确定不发生效力后，可能产生的法律后果有：返还财产，折价补偿，赔偿损失，因此A、B、C选项正确i能续履行不属于合同无效后产生的法体后果、因此D选项相误。（断您）22、C。A、B、C选项，（民法典）第14S条第1款规定：“限制民事行为能力人实施的纯获利益的民事法律行为成者与其年、智力、精神健康状况相适应的民事法律行为有效：实施的其他民事法律行为经法定代理人同意成者迫认后有效”：15当的毕某为限制民事行为能力人，以50万元的价格转让专利不属于与其年龄、智力相适应的民事法律行为，合同效力待定，需经李某的法定代理人追认后，该合同方为有效，因此A、B选项错误，C选项正确。D选项，《民法典》第145条第2数规定：“相对人可以催告法定代理人自收到通知之日起三十日内予以追认。法定代理人未作表示的，视为拒绝追认。民事法律行为被追认前：善意相对人有撤销的权利。撤销应当以通知的方式作出”，该公司可以在李某的法定代理人追认前撤销该合同，追认之后合同即生效；不能再撤销该合同，因此D选项错误。（2007改编）","chapter":"第五章 民事法律行为"},
  {"id":72,"topic":"专题一 民法典总则编","type":"single","question":"十五岁的中学生李某作出了一项发明创造，并就此获得了一项发明专利。某公司认为该项技术市场前景较好，遂与李某签订了专利权转让合同，以50万元的价格受让该项专利。根据民法典总则编及其他相关规定，该转让合同的效力应当如何认定？（单选）","options":{"A": "合同自签订之日起有效", "B": "由于李某不具有完全民事行为能力，因此该合同自始无效", "C": "经李某的法定代理人追认后，该合同方为有效", "D": "在李某的法定代理人追认之后，该公司有权以李某不具有完全民事行为能力为由撤销该合同"},"answer":"C","explanation":"。本题中，小韩的创作行为在性质上属于事实行为，与民事行为能力无关，小韩是该作品的作者，无论是否发表，都享有该作品的著作权，其父母不享有著作权，但由于九岁的小韩为限制民事行为能力人，其转让行为既不属于纯获利益的民事法律行为，也不属于与其年龄、智力相适应的民事法律行为，其父母作为法定代理人不同意该转让行为，则该网络传播权转让合同自始无效，因此A、B、D选项错误，C选项正确。（法考2009改编）","chapter":"第五章 民事法律行为"},
  {"id":73,"topic":"专题一 民法典总则编","type":"multiple","question":"小韩从小就显示出很高的文学天赋，九岁时写了小说《隐形翅膀》，并将该小说的网络传播权转让给某网站。小韩的父母反对该转让行为。下列哪一说法是正确的？（单选）","options":{"A": "小韩父母享有该小说的著作权，因为小韩是无民事行为能力人", "B": "小韩及其父母均不享有著作权，因为该小说未发表", "C": "小韩对该小说享有著作权，但网络传播权转让合同无效", "D": "因小韩父母反对，网络传播权转让合同自反对意见送到某网站时无效"},"answer":"ABCD","explanation":"。10岁的李小某属于限制民门事行为能力人，其向游戏账户充值2万元的民事法律行为超出了与其年龄和智力相适应的范围，该行为须经其法定代理人王某同意或者追认后有效，否则该行为无效，若王","chapter":"第五章 民事法律行为"},
  {"id":74,"topic":"专题一 民法典总则编","type":"multiple","question":"李某和王某离婚后，其子李小某由王某抚养，李小某于其10岁的一年间，陆续向其游戏账户充值共2万元。游戏公司发现充值人系未成年人后，向王某发出催告要求王某在30日内确认。根据民法典及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "对游戏公司的追认催告，王某未作表示的，视为拒绝追认", "B": "李小某的充值行为经王某同意或者追认后有效", "C": "王某明确表示对李小某的充值行为不子追认的，该民事法律行为无效", "D": "李某和王某是李小某的法定代理人"},"answer":"BD","explanation":"。本题中，事务所与张某达成约定时该约定已经成立，但未生效，所附生效条件为张集一年内通过专利代理师资格考试，若该条件成说，则该约定生效，资助张某出国进修三个月，因此A、C逸项借误，B、D逸项正确。此题考坐疑问较多，此处做进一步说明区分：附条件是不确定的偶然性事实，阶期限是确定的必然性事实。本题中“一年内通过专代考试”，属干不确定的条件，如果题目改为“2026年12月资助出回进修3个月”则因期低是明确的时间点，是一定会到来的，则为附期展的民事法律行为。故此题应为附条件，而不是附期限。（2019）","chapter":"第五章 民事法律行为"},
  {"id":75,"topic":"专题一 民法典总则编","type":"single","question":"张某在某专利代理事务所实习，表现优异。该事务所与张某达成约定，如果张某一年内通过专利代理师资格考试，将资助其出国进修三个月。根据民法典总则编及相关规定，在张某通过专利代理师资格考试之前，下列说法正确的是？多选）","options":{"A": "该约定既未成立，也未生效", "B": "该约定已经成立，但未生效", "C": "该约定是附期限的民事法律行为", "D": "该约定是附条件的民事法律行为"},"answer":"A","explanation":"。本题中，李某和赵某的合同约定于2021年3月1日生效，属于附生效期限的合同，因此A选项正确，B、C、D选项错误。（2016改缩）","chapter":"第五章 民事法律行为"},
  {"id":76,"topic":"专题一 民法典总则编","type":"multiple","question":"2020年11月1日，李某和赵某签订房屋租赁合同，约定2021年3月1日该合同生效。根据民法典总则编及相关规定，下列关于该合同的哪种说法是正确的？单选）","options":{"A": "该合同为附生效期限的合同", "B": "该合同为附终止期限的合同", "C": "该合同为附生效条件的合同", "D": "该合同为附解除条件的合同"},"answer":"AC","explanation":"。刘某与史某约定不在甲公司上班，将公寓卖给史某，属于附条件生效的约定，因此A选项正确，B选项错误。《民法典）第159条规定：“附条件的民事法律行为，当事人为自己的利益不正当地阻止条件成就的，视为条件已经成就；不正当地促成条件成就的，视为条件不成就”，史某贿路公司经理让刘某被辞退，属于不正当促进条件成就，因此C选项正确，D选项错误。（法考2020）","chapter":"第五章 民事法律行为"},
  {"id":77,"topic":"专题一 民法典总则编","type":"single","question":"刘某与史某约定，如将来刘某不在甲公司上班，刘某即将其在甲公司附近一套自有公寓卖给史某。史某为尽快购得该房屋，贿赂甲公司经理，让其辞退了刘某。刘某和史某关于刘某不在甲公司上班的约定，下列哪一说法是正确的？（多选）","options":{"A": "该约定属于附生效条件的约定", "B": "该约定属于附生效期限的约定", "C": "应视为条件不成就", "D": "应视为约定无效"},"answer":"B","explanation":"。A选项，甲为限制民事行为能力人，甲获赠电脑为纯获利的民事法律行为，因此不论其法定代理人（父母）追认或是否认，该行为均有效，因此，A、C、D选项错误。B选项，甲高考前，能否取得优异的成绩是不确定的事实，该赠与合同明确约定了取得优异成绩这一条件、系附生效条件的赠与合间，即在甲商考取得优异成绩前，赠与合同成立但未生效。而甲商考取得优异成绩后，条件成就、附生效条件的赠与合同成立并生效，因此、B选项正确。（新编）","chapter":"第五章 民事法律行为"},
  {"id":78,"topic":"专题一 民法典总则编","type":"single","question":"甲今年16岁，成绩优异。与其阿姨乙约定，若甲高考成续优异，将赠与甲一台价值一方元的笔记本电脑。下列哪些选项是正确的？（单选）","options":{"A": "甲为限制民事行为能力人，故该赠与合同无效", "B": "甲与其阿乙约定时，该赠与合同成立未生效", "C": "甲的母亲丁得知此事后，认为笔记本电脑过于贵重，表示坚决反对，该赠与合同因其母亲丁的反对而无效", "D": "甲受赠电脑的行为需要其父母追认才能生效"},"answer":"D","explanation":"。A选项，《民法典》第161条第2数规定：“依照法律规定、当事人约定：或者民事法律行为的性质，应当由本人亲自实施的民事法律行为，不得代理”，因此A选项错误。B选项，《民法典》第162条规定：“代理人在代理权限内，以被代理人名义实施的民事法律行为，对被代理人发生效力”，因此B选项错误。C选项，《民法典》第135条规定：“民事法律行为可以采用书面形式、口头形式或者其他形式……”，因此C选项错误。D选项，《民法典》第164条第1款规定：“代理人不履行或者不完全履行职责，造成被代理人损害的，应当承担民事贵任”，因此D选项正确。（2014）","chapter":"第五章 民事法律行为"},
  {"id":79,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列关于代理的哪种说法是正确的？（单选）","options":{"A": "民事主体的任何民事法律行为，均可通过代理人实施", "B": "代理人应当在代理权限内，以自己的名义实施民事法律行为", "C": "民事法律行为的委托代理，应当采用书面形式", "D": "代理人不履行职责而给被代理人造成损害的，应当承担民事责任"},"answer":"AC","explanation":"。B、D选项；代理是代理人以被代理人的名义在代理权限内与第三人实施法律行为，B、D选项的行为由于具有人身属性，均属于不能代理的行为。A选项为委托代理，C选项属于职务代理行为。（新编）","chapter":"第六章 代理"},
  {"id":80,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列哪些情形属于代理行为？（多选）","options":{"A": "甲律师接受法院指定担任被告人乙的辩护代理人", "B": "某明星甲让明星乙代替其参加春节晚会表演节目", "C": "甲公司法定代表人乙委托员工丙与丁公司签订合同", "D": "某高校教授甲让教授乙代替他去主持一场学术交流会"},"answer":"ABCD","explanation":"。A选项，（民法典》第162条规定：“代理人在代理权限内，以被代理人名义实施的民事法律行为，对被代理人发生效力”，因此A选项正确。B选项，《民法典》第167条规定：“代理人知道或者应当知道代理事项违法仍然实施代理行为，或者被代理","chapter":"第六章 代理"},
  {"id":81,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列有关代理的哪些说法是正确的？（多选）","options":{"A": "代理人在代理权限内，以被代理人名义实施的民事法律行为，对被代理人发生效力", "B": "代理人知道或者应当知道代理事项违法仍然实施代理行为，或者被代理人知道或者应当知道代理人的代理行为违法未作反对表示的，被代理人和代理人应当承担连带责任", "C": "相对人知道或者应当知道行为人无权代理的，相对人和行为人按照各自的过错承担责任", "D": "代理人和相对人恶意申通，损害被代理人合法权益的，代理人和相对人应当承担连带责任"},"answer":"ABC","explanation":"。A逸项，《民法类》第163条第1款规定：“代理包括委托代理和涨定代理”，因此A选项正确。B逸项，《民法典>第162条规定：“代理人在代理权限内，以被代理人名义实施的民事法律行为，对被代理人发生效力”，因此B逸项正确。C逸项，（民法奖》第161条第2款规定：“依凰法律规定、当事人约定成者民事法律行为的性质，应当由本人亲自实施的民事法律行为，不得代理”，因此C选项正确。D选项，《民法典>第169条第3款规定：“转委托代理未经技代理人同意或者追认的，代理人应当对转委托的第三人的行为承担资任：但是，在紧急情况下代理人为了维护被代理人的利益借要转委托第三人代理的除外”，因此D选项错误。（2012）","chapter":"第六章 代理"},
  {"id":82,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列关于代理的哪些说法是正确的？（多选）","options":{"A": "代理包括委托代理和法定代理", "B": "代理人应当在代理权限内，以被代理人的名义实施民事法律行为", "C": "依照法律规定应当由本人实施的民事法律行为，不得代理", "D": "委托代理人需要转委托他人代理的，在任何情况下均应当取得被代理人的同意"},"answer":"CD","explanation":"。A、B、C选项，甲公司与张某明确约定须由张某亲自完成书高，张某不得转委托其学生王某代为完成，因此A、B选项错误，C选项正确。D选项，张某的转委托行为未经委托人甲的同意，因此张某应当对王某的行为承担责任，因此D选项正确。（2016）","chapter":"第六章 代理"},
  {"id":83,"topic":"专题一 民法典总则编","type":"single","question":"甲公司特邀请知名画家张某为公司庆典创作一幅书画作品，并明确约定须由张某亲自创作完成。张某在构思过程中因事务繁忙无法在规定期限内完成作品，遂请其学生王某代为完成画作，但并未告知甲公司，甲公司收到画作后支付给张某约定的画款。根据民法典总则编及相关规定，下列哪些说法是正确的？多选）","options":{"A": "张某因故无法在规定期限内完成作品，可以转委托他人", "B": "张某系为甲公司利益着想，可以转委托他人完成作品", "C": "根据甲公司与张某的约定，该画作应当由张某亲自完成，不能转委托他人", "D": "张某应当对其学生王某的行为承担责任"},"answer":"C","explanation":"。《民法典》第172条规定：“行为人没有代理权、超越代理权或者代理权终止后，仍然实施代理行为，相对人有理由相信行为人有代理权的，代理行为有效”。本题中，刘某凭借保管公可印案的便利，与张集签订合同并加蓝了其公司的印章，张其有现由相仿刘某是代表其公司签订合同，构成费见代理、刘某签订合同的行为有效、印使该公司对该买实合同不予追认，该合同的当事人仍为该公司与张某，因此A、D、D选项倡误，C选项正确。（2008）7、ABD。A逸项，相对人可以催告代理人自收到通知之日起30日内予以追认，因此A选项错误。B也项，曾您相对人有销的权利，因此B选项错误。C选项，相对人知道或者应当知道行为人无权代理的，相对人和行为人按顾各自的过错承担责任，因此C选项正确。D选项，被代理人未作出表示的，视为拒绝追认，因此D选项错误。(2018)","chapter":"第六章 代理"},
  {"id":84,"topic":"专题一 民法典总则编","type":"multiple","question":"某公司的印章由其工作人员刘某保管。刘某未经该公司授权以该公司的名义与张某签订买卖合同，并加盖该公司印章，将该公司的一批产品卖给张某。对此，下列哪些说法是正确的？（单选）","options":{"A": "该公司与张某之间的买卖合同无效", "B": "该公司与张某之间的买卖合同效力待定", "C": "该公司与张某之间的买卖合同有效", "D": "如果该公司对该买卖合同不予追认，则该合同的当事人为刘某与张某"},"answer":"ABC","explanation":"。本题中，丙公司未审核乙代理公司的代理权限，存在疏忽，不构成表见代理，属于无权代理，因此甲公司有追认权，善意的丙公司有催告权和撤销权，A、B、C选项正确，D选项错误。（2019）","chapter":"第六章 代理"},
  {"id":85,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编关于无权代理民事法律行为的相关规定，下列哪些关于无权代理法律后果的表述是错误的？（多选）","options":{"A": "相对人可以催告被代理人自收到通知之日起两个月内予以追认", "B": "行为人实施的行为未被追认的，普意相对人只能就其受到的损害请求行为人赔偿", "C": "相对人知道或者应当知道行为人无权代理的，相对人和行为人按照各自的过错承担责任", "D": "被代理人未作出表示的，视为同意追认"},"answer":"ABC","explanation":"。A选项，行为人代理权终止后，仍然实施代理行为，未经被代理人追认的，对被代理人不发生效力，因此A选项正确。B选项构成表见代理，代理行为有效，B选项正确。C、D选项，相对人知道或者应当知道行为人无权代理的，相对人和行为人按照各自的过错承担贵任，因此C选项正确，D选项错误。（2016)","chapter":"第六章 代理"},
  {"id":86,"topic":"专题一 民法典总则编","type":"multiple","question":"甲公司委托乙代理机构与丙公司谈判购买一项专利权，乙代理机构委派代理师王某与丙公司谈判。谈判过程中王某认为丙公司的另一项专利更好，便自作主张以甲公司的名义与丙公司签订了该项专利的转让合同。丙公司未审核乙代理机构的代理权限，便与之订立了专利权转让合同。根据民法典总则编及相关规定，下列说法正确的是？多选）","options":{"A": "申公司对该项合同有追认权", "B": "丙公司对该项合同有催告权", "C": "丙公司对该项合同有撤销权", "D": "甲公司对该项合同有撤销权"},"answer":"BC","explanation":"。甲委托乙代买彩票，虽然款项由乙垫付，彩票也暂由乙保管，但乙是基于甲的委托实施购买彩票的行为，代理行为的后果应由被代理人甲承担，所以奖金应归甲所有，但乙为甲垫付了购买彩票的款项，乙有权要求甲返还该款项，因此，A、D选项错误，B、C选项正确。（新编）","chapter":"第六章 代理"},
  {"id":87,"topic":"专题一 民法典总则编","type":"single","question":"根据民法典总则编及相关规定，对于代理人在代理权终止后的代理行为，下列哪些说法是正确的？（多选）","options":{"A": "未经被代理人追认的，对被代理人不发生效力", "B": "相对人有理由相信行为人有代理权的，代理行为有效", "C": "相对人知道或者应当知道行为人无权代理的，相对人和行为人按照各自的过错承担责任", "D": "相对人知道或者应当知道行为人无权代理的，相对人和行为人各承担百分之五十的责任"},"answer":"D","explanation":"。A连项，甲官用乙兰省不有成代基。日途项：法是代获人以公可义笑选单行，代农行办，不梅成代隐。C连筑，冒用他人名义不悔成代理，此外资试是其有人终专属性的行务，不优遗过代理实虑。D选项，带集寿代理人，推销货相对人，关集为行券人，但关集并不其有代理权，梅成充权代理。（法考2009改旗，思维护展）","chapter":"第六章 代理"},
  {"id":88,"topic":"专题一 民法典总则编","type":"multiple","question":"甲委托乙代其购买彩票，款项由乙垫付，票世暂由乙保管。开奖后、该形票中奖，奖金为1000万，对于奖金归属二人发生纠纷。下列哪一说法是正确的7（多选）","options":{"A": "因彩票款项由乙支付，因此奖金应归乙所有", "D": "甲乙对于彩票中奖均有货献，因此应平分奖金", "C": "彩票中奖后，乙无权领取奖金，但有权婴求甲返还购买彩票的款项"},"answer":"ACD","explanation":"。2024年6月1日，相对人乙公可得知行为人肖某惊开除，即没有代理权。因此，肖某为无权代理。无权代理，烟草买奖合同效力待定，在设代理人甲烟章公可追认或否认前，停意相对人乙公可事有缴销权，D选项正确。2024年6月10日，甲烟草公可拒绝追认肖某的无权代理行力，烟靠买实合同对申公司不发生效力。申公可无须履行合同，B选项错误。善意相对人乙有权要求行为人肖某履行合同或是赔偿报失。因此，A、C选项正确。（法考2020）","chapter":"第六章 代理"},
  {"id":89,"topic":"专题一 民法典总则编","type":"multiple","question":"下列哪一情形构成无权代理？","options":{"A": "甲冒用乙的姓名从某杂志社领取乙的论文稿酬据为已有", "B": "某公司法定代表人超越权限以本公司名义为他人提供担保", "C": "刘某受同学周某之托冒充丁某参加求职面试", "D": "关某代收某推销员谎称关某的邻居李某订购的保健品并代为付款"},"answer":"AC","explanation":"。A选项，行为人超越代理权实施代理行为，相对人有理由相信行为人有代理权的，代理行为有效，因此A选项正确。B选项，代理人和相对人恶意串通，担害被代理人合法权益的，代理人和相对人应当承担连带责任，因此B选项错误。C选项，代理人知道成者应当知道代理事项违法仍然实施代理行为，被代理人和代理人应当承担连带责任，因此C选项正确。D选项，属于狭义无权代理，是效力待定的民事法律行为，经被代理人追认有效，被代理人不予追认则对被代理人不发生效力，因此D选项错误。（新编）","chapter":"第六章 代理"},
  {"id":90,"topic":"专题一 民法典总则编","type":"single","question":"肖某系甲烟草公司经理，因违纪被开除，后伪造公章，于2024年5月25日以甲公司名义与不知情的乙公司约定，向乙公司出售烟草50箱，价款50万元。2024年6月1日，乙公司得知肖某被开除，询问甲公司是否认可该合同，2024年6月10日，甲公司通知乙公司不承认肖某所订立的香烟合同。下列说法正确的是？（多选）","options":{"A": "2024年6月10日后，乙公司有权请求肖某赔偿损失", "B": "2024年6月10日后，乙公司有权请求甲公司履行合同", "C": "2024年6月10日后，乙公司有权请求肖某履行合同", "D": "2024年6月10日前，乙公司有权通知甲公司撤销"},"answer":"B","explanation":"。本题中，因公章系伪造，甲的代理行为不构成表见代理，而属于狭义的无权代理，相对人丙享有催告权与撤销权。A、B选项，如果合同由被代理人乙公可追认，日便不将再因无权代理而行使相对人的身权，人选项借误，但是甲的行为还构成对到的欺诉，丙作为被许人享有向法院中请！撤俏权，因此B选项正确。C选项，如果公司追认，丙公可只他向法院中请因你的撤销、不能因无权代理向乙公可通如微价C选项错误。1D选项，如果乙公句拍绝追认丙公司无权娶求乙公句履行，D选项错误，（新编）","chapter":"第六章 代理"},
  {"id":91,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，关于代理，下列说法哪些是正确的？多选）","options":{"A": "行为人超越代理权实施代理行为，相对人有理由相信行为人有代理权的，代理行为有效", "B": "代理人和相对人恶意申通，损害被代理人合法权益的，代理人和相对人按照过错大小承担按份资任", "C": "代理人知道代理事项违法仍然实施代理行为的，被代理人和代理人承担连带责任", "D": "行为人代理权终止后、仍然实施代理行为的，对被代理人不发生效力"},"answer":"ABCD","explanation":"。《民法典》第173条规定：“有下列情形之一的，委托代理终止：（一）代理期问届满或者代理事务完成：（二）被代理人取消委托成者代理人辞去委托：（三）代理人丧失民事行为能力：（四）代理人成者被代理人死亡；（五）作为代理人或者被代理人的法人、非法人组织终止”，因此A、B、C、D选项均正确。（2019）","chapter":"第六章 代理"},
  {"id":92,"topic":"专题一 民法典总则编","type":"multiple","question":"甲用伪造的乙公司公章，以乙公司名义与不知情的丙公司签订食用油买卖合同，以次充好，将劣质食用油卖给丙公司。关于该合同，下列哪一表述是正确的？（单选）","options":{"A": "如乙公司追认，则丙公司有权通知乙公司撤销", "B": "如乙公司追认，则丙公司有权请求法院撤销", "C": "无论乙公司是否追认，丙公司均有权通知乙公司撤销", "D": "无论乙公司是否追认，丙公司均有权要求乙公司行"},"answer":"ABCD","explanation":"。《民法典》第174条第1款规定：“被代理人死亡后，有下列情形之一的，委托代理人实施的代理行为有效：（一）代理人不知道且不应当知道被代理人死亡；（二）被代理人的继承人子以承认；（三）投权中明确代理权在代理事务完成时终止：（四）被代理人死亡前已经实施，为了被代理人的继承人的利益继续代理”；因此A、B、C、D选项均正确。（2008改编）","chapter":"第六章 代理"},
  {"id":93,"topic":"专题一 民法典总则编","type":"single","question":"根据民法典总则编及相关规定，下列哪些情形下委托代理终止？（多选）","options":{"A": "代理期间届满或者代理事务完成", "B": "被代理人死亡", "C": "代理人死亡或者作为代理人的法人终止", "D": "代理人丧失民事行为能力"},"answer":"C","explanation":"。被代理人死亡后，投权中明确代理权在代理事务完成时终止的，委托代理人实施的代理行为有效。本题中，王甲委托周某帮忙购买祖宅时明确约定“直至买到祖宅为止”。因此，即使王甲死亡，周某以王甲的名义和李某签订的房屋买卖合同仍然有效，因此B、D选项错误。房屋买卖合同的当事人是王甲和李某，周某为王甲的代理人。因此，李某无权请求周某继续履行合同。因专顺一民法典总则编此，人连填借供。主中七府，共唯一的儿于主乙概情健未主甲的进产（院包唐权利业包糖义券。因此，带集有权济求王乙健读度行合间，C违填正衡。（法考2024）","chapter":"第六章 代理"},
  {"id":94,"topic":"专题一 民法典总则编","type":"multiple","question":"某专利代理机构受孙某的委托代为办理专利申请事务。代理事项尚未完成时，孙某意外身亡。在下列哪些情况下，该代理机构在孙某死亡后实施的代理行为有效？（多选）","options":{"A": "该代理机构在孙某死亡前已经进行，而在孙某死亡后为了孙某的继承人的利益继续完成的", "B": "该代理机构不知道且不应知道孙某死亡的", "C": "孙某和该代理机构约定到代理事项完成时代理权终止的", "D": "孙某的继承人均予以承认的"},"answer":"ABCD","explanation":".（底法集>第17S余定：“有下列情形之一的，法定代理终止：（一）代理人收得成普恢建党会民华柠疗他力：（二）代理人丧失民事行为他力：（三）代理人成者收代理人见亡（四）法律境定的其他情形”因此A、B.C、D逸项均正确。（2013）","chapter":"第六章 代理"},
  {"id":95,"topic":"专题一 民法典总则编","type":"multiple","question":"王甲委托同某带忙购买自已曾经的且宅，委托合间写明全权委托，直至买到祖宅为止。同某后来以王甲的名义与准宅现住人李某达成房屋买卖合间.准备展行合同时发现王甲已于上礼拜过世。王甲的唯一儿子王乙农示对购买祖宅一事不知情，并且拒绝迫认合同。关于此合同，下列说法正确的是？（单选）","options":{"A": "李某有权请求周某继续履行合同", "B": "因为王甲去世，合同无效", "C": "李某有权请求王乙继续履行合同", "D": "因为王乙拒绝追认，合同无效"},"answer":"ABC","explanation":"。本题中，甲、乙为连带债务人，丙为债权人，丙有权要求甲或乙清偿全部货务，甲和乙都负有清偿全部债务的义务，甲偿还了全部债务后，有权要求乙偿付乙应当承担的40%的货务，甲和乙之间对债务偿还的约定不得对抗债权人丙，因此人、B、C选项正确，D选项错误。（2007）","chapter":"第六章 代理"},
  {"id":96,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列哪些情形下法定代理终止？多选）","options":{"A": "被代理人取得完全民事行为能力", "B": "被代理人死亡", "C": "代理人死亡", "D": "代理人丧失民事行为能力"},"answer":"ABCD","explanation":"。《民法典》第179条第1款规定：“承担民事贵任的方式主要有：（一）停止促害……（五）恢复原状……·（七）继续展行…（）·恢复名誉…，因此A、B、C、D选项均正确。（新编）","chapter":"第六章 代理"},
  {"id":97,"topic":"专题一 民法典总则编","type":"multiple","question":"甲和乙为丙的连带债务人。后甲和乙约定，甲负资偿还60%的债务，乙负责偿还40%的债务。对此，根据民法典总则编的规定，下列哪些说法是正确的？（多选）","options":{"A": "丙可以要求甲偿还全部债务", "B": "丙可以要求乙偿还全部债务", "C": "甲偿还了全部债务后，有权要求乙偿付其应当承担的40%的债务", "D": "甲有权拒绝偿还超过60%的债务"},"answer":"ACD","explanation":"。知识产权役权承担方式包括：停止便害；赔偿损失：消除影响，没收违法所得属于行政处罚的方式，因此A、C、D选项正确：B选项错误。（2011）","chapter":"第七章 民事责任"},
  {"id":98,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列哪些属于承担民事责任的方式？多选）","options":{"A": "继续履行", "B": "恢复原状", "C": "停止促害", "D": "恢复名誉"},"answer":"ABCD","explanation":"。A逸项，《民法典》第180多第1款规定：“因不可抗力不能规行民事义务的，不承担民事贵任”，因此人选项正码，B选项，（民法典）第182条第1款规定：“罚紧急避险造成捐害的，由引起险情发生的人承担民事贵任”，因此D逸项正确。C选项，（民法典》第181条规定：“因正当防卫皮损害的，不承担民事贵任”，因此C选项正确。D逸项，（民法典》第184条规定：“四白愿实施紧急救助行为造成受助人损害的，敬助人不承担民事贵任”，因此D选项正确。（2018)","chapter":"第七章 民事责任"},
  {"id":99,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定、下列哪些属于侵犯知识产权的民事责任承担方式？（多选）","options":{"A": "赔偿损失", "B": "没收违法所得", "C": "停止侵害", "D": "消除影响"},"answer":"BD","explanation":"。A、B选项，《民法典》第183条规定：“因保护他人民事权益使自已受到损害的，由役权人承担民事资任，受益人可以给予适当补偿。没有役权人、俊权人逃逸或者无力承担民事贵任，受害人请求补偿的，受益人应当给予适当补偿”，马某的行为属于见义勇为，马某的损失应由侵权人赵某赔偿，何某作为受益人，其责任为适当补偿责任，而非赔偿责任，因此A选项错误，B选项正确。C、D选项，因紧急避险造成损害的，由引起险情发生的人承担民事资任，马某用吕某的雨伞打狗，构成紧急避险，吕某的损失也应由引起险情发生的人赵某赔偿，因此C选项错误，D选项正确。（法考2018）","chapter":"第七章 民事责任"},
  {"id":100,"topic":"专题一 民法典总则编","type":"single","question":"根据民法典总则编及相关规定，下列哪些属于法定减轻或免除民事责任的情形？（多选）","options":{"A": "不可抗力", "B": "紧急避险", "C": "正当防卫", "D": "紧急救助"},"answer":"D","explanation":"。《民法典》第188条规定：“向人民法院请求保护民事权利的诉讼时效期问为三年。法律另有规定的，依照其规定。诉讼时效期问自权利人知道或者应当知道权利受到损害以及义务人之日起计算。法律另有规定的，依照其规定。但是，自权利受到","chapter":"第七章 民事责任"},
  {"id":101,"topic":"专题一 民法典总则编","type":"single","question":"何某被恶狗咬，马某用吕某的雨伞打狗，伞坏人伤。经查，恶狗为赵某所蒙养。关于本案，下列哪些说法是正确的？（多选）","options":{"A": "马某的医疗费应由何某赔偿", "B": "马某的医疗费应由赵某赔偿", "C": "吕某的雨伞损害应由马某赔偿", "D": "吕某的雨伞损害应由赵某赔偿"},"answer":"C","explanation":"。《民法奥>第196条境定：“下列请求权不选用诉论时发的规定：（一）请求停止便害、排除纺、消除危险：（二）不动产物权和登记的动产省权的权利人请求返还财产：（三）请求文付抚养费、磨养费成者恢养费：（四）依法不追用诉讼时效的其他请求权”，因此A、B、D选项均追用诉讼时发的规定，C选项不追用诉讼时效的规定。（新编）","chapter":"第七章 民事责任"},
  {"id":102,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列关于诉讼时效期间的哪种说法是错误的？（单选）","options":{"A": "向人民法院请求保护民事权利的诉讼时效期间为3年，法律另有规定的除外", "B": "诉讼时效期间自权利人知道或者应当知道权利受到损害以及义务人之日起计算", "C": "自权利受到损害之日起超过二十年的，人民法院不予保护", "D": "诉讼时效期间一排不得延长"},"answer":"AC","explanation":"。A选项，赔偿携失请求权，为一股的货权请求权，适用诉讼时效，因此人选项正确。B、C、D选项，请求停止役害、排除妨碍、消除危险不适用诉讼时效的规定：不动产物权和登记的动产物权的权利人请求返还财产不适用诉讼时效的规定，因此B、D选项不适用诉讼时效，面未经登记的动产物权人的返还原物请求权，应适用诉讼时效，因此乙请求申返还自行车适用时效，C选项正确。（法考2020）","chapter":"第八章 诉讼时效"},
  {"id":103,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列哪些民事案件不适用诉讼时效的规定？（单选）","options":{"A": "赔偿损失", "B": "返还财产", "C": "停止侵害", "D": "继续履行"},"answer":"ABC","explanation":"。根据（民法莫》第196条的规定，A选项属于请求停止役害，不适用诉讼时效的规定，B选项属于不动产物权的权利人请求返还财产，不适用诉讼时效的规定，C选项属于请求支付抚养费，不适用诉讼时效的规定，因此A、B、C选项正确。D选项的自行车属于不需要登记的动产，适用诉讼时效的规定，D选项错误。（新编）","chapter":"第八章 诉讼时效"},
  {"id":104,"topic":"专题一 民法典总则编","type":"multiple","question":"甲将一辆油罐车擅自停在邻居乙的院子里，还把乙没上锁的自行车骑走了。3年后，乙可采取的措施中，下列哪些选项属于甲可以时效经过为由主张的抗辩？（多选）","options":{"A": "赔偿损失", "B": "消除危险", "C": "返还财物", "D": "停止侵害"},"answer":"ACD","explanation":"。A、C、D选项，《民法莫》第195条规定：“有下列情形之一的，诉讼时效中断，从中断、有关程序终结时起，诉讼时效期同重新计算：（一）权利人向义务人提出履行请求；（二）义务人同意履行义务：（三）权利人提起诉讼或者申请仲裁：（四）与提起诉讼成者中请仲裁具有同等效力的其化情形因此A、C、D选项正确。B选项展于诉论效中止的情形。（2013）","chapter":"第八章 诉讼时效"},
  {"id":105,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，以下哪些选项属于不适用诉讼时效的情形？多选）","options":{"A": "甲购买的别墅附带赠送了地下车库，其同一小区的邻居乙占用该赠送的地下车位，甲要求邻居乙不得占用其车位", "B": "甲购买商品房获得产权后一直未居住，被物业公司转售给乙，甲要求乙返还", "C": "甲与妻子离婚后，一直未支付其子的抚养费，甲妻以其子的名义起诉，要求甲支付抚养费", "D": "甲的自行车被邻居乙长期使用，现要求返还"},"answer":"AC","explanation":"。甲于2018年2月8日得如其利受到担害，于2021年10月起诉已知过讼时效三年期限，因此A选项正确。B、C选项，（民法典》第192条第2款规定：“时效期问届满后，义务人同意履行的，不以诉讼时效期间届满为山抗解：义务人已自愿履行的，不得请求退还”，甲获得该花不属于不当得利，人民法院对乙的诉讼请应当不予支持，因此B、D选项错误，C选：正确。（2008）","chapter":"第八章 诉讼时效"},
  {"id":106,"topic":"专题一 民法典总则编","type":"single","question":"根据民法典总则编及相关规定，下列哪些属于诉讼时效中断的事由？多选）","options":{"A": "权利人向法院提起诉讼", "B": "因不可抗力导致权利人不能行使请求权", "C": "权利人向义务人提出履行请求", "D": "义务人同意履行债务"},"answer":"C","explanation":"。A选项，诉讼时效中断，从中断有关程序终结时起，诉讼时效期问重新i算，A选项错误。B选项，自中止时效的原！消除之日起满六个月，诉讼时效期问届满因此B选项错误。C、D选项，诉讼时效期间届满后，义务人同意履行的，不得以诉讼时效期问届满为由抗辩；义务人已经自愿履行的，不得请求返还，因此C选项正确，D选项错误。（新编）","chapter":"第八章 诉讼时效"},
  {"id":107,"topic":"专题一 民法典总则编","type":"multiple","question":"甲从其朋友乙处购买一件古董花瓶、约定乙于甲付款后5日内交付花瓶。甲于2018年2月8日付款后，乙一直未交付该花瓶。甲于2021年10月向人民法院起诉、要求乙交付该花瓶。乙得知后，主动将该花瓶交给甲，甲撤诉。后乙反悔，以甲的起诉超过诉讼时效期间为由向人民法院起诉，要求甲返还该花瓶。对此，下列哪些说法是正确的？（多选）","options":{"A": "甲的起诉超过诉讼时效期间", "B": "甲获得该花瓶属于不当得利", "C": "人民法院对乙的诉讼请求应当不予支持", "D": "人民法院对乙的诉讼请求应当予以支持"},"answer":"AB","explanation":"。A选项，甲乙虽离婚，但乙并未丧失监护权，甲在监护期问实施了侵害被监护人的行为，乙可以请求法院撤销甲的监护权，因此A选项正确。B选项，甲段打丙且卖掉了丙的玉佩，役害了丙的合法权益，丙可以请求甲承担赔偿责任，因此B选项正确。C选项，丙对段打及卖掉玉佩的赔偿请求权的诉讼时效为3年，从法定代理终止起算，因此C、D选项错误。（新编）","chapter":"第八章 诉讼时效"},
  {"id":108,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，下列关于诉讼时效的哪项说法是正确的？（单选）","options":{"A": "诉讼时效因提起诉讼而中断，从中断的原因消除之日起，诉讼时效期间继续计算", "B": "诉讼时效中止的，从中止时效的原因消除之日起，诉讼时效期间重新计算", "C": "超过诉讼时效期间，当事人自愿履行的，不受诉讼时效限制", "D": "超过诉讼时效期间，义务人履行义务后又以超过诉讼时效为由反悔的，应当予以支持"},"answer":"AC","explanation":"。A、C选项，《民法典》第194条第1款规定：“在诉讼时效期问的最后六个月内，因下列障码，不能行使请求权的，诉讼时效中止：（一）不可抗力；（二）无民事行为能力人或者限制民事行为能力人没有法定","chapter":"第八章 诉讼时效"},
  {"id":109,"topic":"专题一 民法典总则编","type":"single","question":"甲乙是夫妻，育有一子丙（4岁）。后甲、乙因感情不和协议离婚，双方约定儿子丙归甲抚养。后甲沉迷赌博，时常殴打丙，并将甲母赠与丙的两块玉佩卖掉做赌资。对比，下列哪些说法正确？（多选）","options":{"A": "乙可以申请法院撤销甲的监护权", "B": "丙可以请求甲承担赔偿损失", "C": "丙对甲殴打致损的赔偿请求权不受诉讼时效的限制", "D": "丙对甲卖掉玉佩的赔偿请求权诉讼时效期间为自丙知请之日起3年"},"answer":"A","explanation":"。《民法典》第464条规定：“合同是民事主体之间设立、变更、终止民事法律关系的协议。婚姻、收养、监护等有关身份关系的协议，适用有关该身份关系的法律规定：没有规定的，可以根据其性质参履适用本编规定”。A选项是民事主体之间设立民事法律关系的协议，适用合同编的规定。B选项的收养协议、D选项的婚姻协议均属于身份关系的协议，不适用合同编的规定。C选项属于行政法调整范围，不适用合同编的规定。（2017）","chapter":"第八章 诉讼时效"},
  {"id":110,"topic":"专题一 民法典总则编","type":"multiple","question":"根据民法典总则编及相关规定，在诉讼时效期间的最后6个月内，因下列哪些障碍，不能行使请求权的，诉讼时效中止？（多选）","options":{"A": "限制民事行为能力人没有法定代理人", "B": "义务人同意履行义务", "C": "不可抗力", "D": "权利人提起诉讼或者申请仲裁"},"answer":"ABD","explanation":"。A选项，《民法典》第464条第1款规定：“合同是民事主体之向设立、交更、终止民事法律关系的协议”，因此A选项正确。B选项，《民法典》第7条规定：“民事主体从事民事活动，应当遵循诚信原则，乘持诚实，恪守承诺”，因此B选项正确。C选项，合同中存在无偿合同，如赠与合同，无偿保管合同等，因此C选项错误。D选项，《民法典》第5条规定：“民事主体从事民事活动，应当遵自愿原则，按照自己的意思设立、变更、终止民事法律关系”，因此D选项正确。（2019）","chapter":"第八章 诉讼时效"},
  {"id":111,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列哪种情形适用合同编的规定？（单选）","options":{"A": "商标权人林某与某公司签订的商标权转让协议", "B": "张某与某福利院签订的收养该福利院孤儿的协议", "C": "房屋征收部门对被征收人郑某作出的征收决定及其补偿决定", "D": "刘某与徐某签订的解除婚姻关系协议"},"answer":"ABCD","explanation":"。根据《民法典》第466条第1款的规定，当事人对合同条款的理解有争议的，应当按照所使用的词句，结合相关条款、行为的性质和目的、习惯以及诚信原则，确定争议条款的含义，因此A、B、C、D选项均正确。（2017）","chapter":"第一章 一般规定"},
  {"id":112,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列说法正确的是？（多选）","options":{"A": "合同关系是发生在平等的民事主体之间的法律关系", "B": "当事人缔结合同应当遵循诚实信用的原则", "C": "合同关系应当为有偿关系", "D": "合同关系的缔结以当事人间的自愿为基础"},"answer":"BCD","explanation":"。甲发布的平物启本属干恶赏广告，根据《民法类>策499集的脱定，是赏人以公开方式声明对光成特定行为的人文付报的，光成谈行为的人可以请求其支付。甲医狗后发布平狗启事，乙检到约后归还，作为完成特定行为人的乙有权索要报限，即使乙不知道事启事的内容均不影有其向甲家要报酬。因此，A选项错误，B、D逸项正确。根据《民法典>第139条的规定，以公告方式作出的意思示，公告变布时生效。因此C逸项正确。（法考2024改编）","chapter":"第一章 一般规定"},
  {"id":113,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，当事人对合同条款的理解有争议的，应当按照下列哪些因素确定该条款的真实意思？（多选）","options":{"A": "合同所使用的词句", "B": "合同的有关条款", "C": "合同的目的", "D": "交易习惯以及诚实信用原则"},"answer":"AD","explanation":"。A选项，根据《民法典》第472条的规定，要约是希望与他人订立合同的意思表示，因此A选项正确。B选项，根据《民法典》第473条第1款的规定，要约邀请是希望他人向自己发出要约的表示，并非意思表示，因此B选项错误。C、D选项，根据（民法典）第137、第474条的规定，要约在到达受要约人时生效，要约以对话方式发出的，相对人知道其内容时生效，因此C选项错误，D选项正确。（2012改编）","chapter":"第一章 一般规定"},
  {"id":114,"topic":"专题二 民法典合同编","type":"multiple","question":"甲丢了一只小狗，发了高价寻狗启事。乙不知道这件事，捡到小狗后归还。甲给了乙200元答谢，乙表示不用。后乙知道了商价寻狗启事，找甲索要报酬，被甲拒绝。关于本案，下列说法正确的有？（多选）","options":{"A": "乙已经拒绝，不得索耍报酬", "B": "乙有权索报酬", "C": "甲发布寻狗启事时，该悬赏广告生效", "D": "不论乙是否知晓寻狗启事的内容，甲均应支付报酬"},"answer":"ABC","explanation":"。A、B、C选项符合要约构成条件。D选项，《民法典》第473条第1款规定：“要约邀请是希望他人向自己发出要约的表示。拍卖公告、招标公告、招股说明书、债券募集办法、基金招募说明书、商业广告和宣传、寄送的价目表等为要约邀请”，D选项构成要约邀请。（2019）","chapter":"第二章 合同的订立"},
  {"id":115,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "要约是希望和他人订立合同的意思表示", "B": "要约邀请是希望他人向自己发出要约的意思表示", "C": "要约在发出时生效", "D": "要约以对话方式发出的，相对人知道其内容时生效"},"answer":"AC","explanation":"。根据《民法典》第475务价规定，撤回要约的通如应当在要约到达受要约人之前成者与要约同时到达受要约人，因此A、C选项正确，B、D选项错误。（2009）","chapter":"第二章 合同的订立"},
  {"id":116,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列哪些选项属于要约？（多选）","options":{"A": "超市货架上的商品标价陈列B：自动售货机上标明可口可乐2.5元一罐", "C": "在拍卖现场，举牌竞拍", "D": "发布招股说明书，募集股份"},"answer":"AD","explanation":"。A、B选项，根据（民法身）第473条的规定，招标公告为要约通请，因此A选项正确，B逸项借误。C选项，撤回要约的通知应当在要约到达受要约人之前或者与要的同时到达受县约人，乙的投标书构成婴约，撤回通知应当在投标书到达甲公司之前或者与投标书同时到达甲公司，因此C选项错误。D选项，《民法典》第477条规定：“撤销要约的意思表示以非对话方式作出的，应当在受要约人作出永诺之前到达受要约人”，撤销通知应当在甲公司发出承诺通知之前到达甲公司，因此D选项正确。（2017）","chapter":"第二章 合同的订立"},
  {"id":117,"topic":"专题二 民法典合同编","type":"multiple","question":"申公司欲出售一批货物给乙公司，甲公司向乙公司发出要约后，因进货渠道发生困难而欲撤回要约。根据民法典合同编及相关规定，下列哪些情形下，甲公司发出的要约可以被撤回？多选）","options":{"A": "撤回要约的通知在该要约到达乙公司之前到达乙公司", "B": "撤回要约的通知在乙公司发出承诺通知之前到达乙公司", "C": "撤回要约的通知与该要约同时到达乙公司", "D": "撤回要约的通知在乙公司发出承诺通知的同时到达乙公司"},"answer":"BCD","explanation":"。A选项，根据《民法典》第477条的规定，撤销要约应当在受要约人作出承诺之前到达受要约人，因此A选项要约可以撤销。B、C、D选项，（民法典》第476条规定：“要约可以撤销，但是有下列情形之一的除外：（一）要约人以确定承诺期限或者其他形式明示要约不可撤销：（二）受要约人有理由认为要约是不可撤销的，并已经为履行合同做了合理准备工作”，因此B、C、D选项要约不可撤销。（2014）","chapter":"第二章 合同的订立"},
  {"id":118,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司发布招标公告，选择专利代理机构办理专利复审事务。乙专利代理机构根据该招标公告制作并提交了投标书参加投标。根据民法典合同编及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "甲公司发布的招标公告是要约邀请", "B": "甲公司发布的招标公告是要约", "C": "乙专利代理机构提交的投标书可以撤回，撤回该投标书的通知应当在甲公司发出承诺通知之前到达甲公司", "D": "乙专利代理机构提交的投标书可以撤销，撤销该投标书的通知应当在甲公司发出承诺通知之前到达甲公司"},"answer":"ACD","explanation":"。（民法典》第478条规定：“有下列情形之一的，要约失效：（一）要约被拒绝：（二）要约被依法撤销：（三）承诺期限届满，受要约人未作出承诺；（四）受要约人对要约的内容作出实质性交更”，因此A、C、D选项正确，B选项","chapter":"第二章 合同的订立"},
  {"id":119,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，在下列哪些情形下，要约不得撤销？（多选）","options":{"A": "要约已经到达受要约人", "B": "要约人确定了承诺期限", "C": "要约人明示要约不可撤销", "D": "受要约人有理由认为要约是不可撤销的，并已经为履行合同做了合理准备工作"},"answer":"ABD","explanation":"。A透项属干要的他绝读要的失发。B逸项属于来诺期账届满，史要的人未作出来诺，谈要约失放。D选琪属干受要均人对婴约的内容作出实质性处更，婴约失效。C选项，要已明采诺期限，不可微俏，未失放。（2018改编）","chapter":"第二章 合同的订立"},
  {"id":120,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，有下列哪些情形之一的，要约失效？多选）","options":{"A": "要约被拒绝", "B": "要约被依法撤回", "C": "承诺期限届满，受要约人未作出承诺", "D": "受要约人对要约的内容做出实质性变更"},"answer":"AC","explanation":"。根据<民法集>箔472条规定，婴约是希望与他人订立合同的意您我荣，且内容其体确定，因此甲公司向乙公可的去函是要约百不是要约遂请，A选项正确，B选项借误。《民法实》第488条规定：“承诺的内容应出与婴约的内容一致。受要约人对要约的内容作出实质佐变更的，为新要约。有关合同标的、数量、质量、价款成者报酬、履行期限、履行地点和方式、违约贵任和解决争议方法等的变更，是对要约内容的实质性变更”。C、D选项，乙公可回函变更了价格，属于对要约的内容作出实质性交更，构成新要约，因此C选项正确，D选项错误。（2016改编）","chapter":"第二章 合同的订立"},
  {"id":121,"topic":"专题二 民法典合同编","type":"single","question":"根据民法典合同编的规定，下列哪些情形下要约失效？（多选）","options":{"A": "甲对乙讲：“我有八成新电脑一台，5000元卖给你，买吗？\"乙表示不买", "B": "甲发传真给乙，表明“现有大米1万吨，批发价格每斤1元，款到发货，请于收到传真后一周内答复”。乙收到该传真后一直未于答复", "C": "甲为将某物卖给乙而发送电子邮件询问，请乙在一周内回复，发信后即感报价过低而后悔，当天致电乙表明撤销该要约", "D": "甲对乙表示愿将数码相机30000元转让给乙，乙表示感意以15000元的价格购买"},"answer":"B","explanation":"。由于甲公司的宴约中规定了承诺期限，因此宴约不可撤销，6月14日的缴销要约达到乙公司，并不能发生要约失效的结果。6月13日乙公司的回复中变更了合同标的，对要约的内容作出实质性变更，到达申公司时，申公司要约失效。因此B选项正确。（法考2008）","chapter":"第二章 合同的订立"},
  {"id":122,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司向乙公司去函表示，“我公司生产的W型路由器，每台单价200元。如果需要请与我公司联系。”乙公司回函，“我公司愿向货公司订购W型路由器500台，每台单价150元，如无异议，请于一个月内供货。”十天后，甲公司向乙公司发出500台路由器，并要求乙公司按照每台200元的价格付款，乙公司拒收。根据民法典合同编及相关规定，下列哪些说法是正确的？多选）","options":{"A": "甲公司向乙公司的去函是要约", "B": "甲公司向乙公司的去函是要约邀请", "C": "乙公司向甲公司的回函是新要约", "D": "乙公司向甲公司的回函是承诺"},"answer":"AB","explanation":"。A选项，张某对杨某发出的是要约，杨某对张某的回复为承诺，承诺一经作出即生效，合同成立。B选项，（民法典》第490条第1款规定：在签名、盖章成者按指印之前，当事人一方已经履行主要义务，对方接受时，该合同成立”，电防公可将电运通到销售公司，已经履行主要义务，且售公司全部予以股收，因此合同成文。C选项，食品厂的回复改变了婴约内息的实质性条件，属于新要约，因此合月不成立。D选项，马某对那某火出的赛约未置可否，没有作出永诺，因此合同不成立。（2007以编）","chapter":"第二章 合同的订立"},
  {"id":123,"topic":"专题二 民法典合同编","type":"multiple","question":"甲公司于6月10日向乙公司发出要约订购一批红木，要求乙公司于6月15日前答复。6月12日，甲公司欲改向丙公司订购红木，遂向乙公司发出撤销要约的信件，于6月14日到达乙公司。而6月13日，甲公司收到乙公司的回复，乙公司表示红木缺货，问甲公司能否用杉木代替。甲公司的要约于何时失效？（单选）","options":{"A": "6月12日", "B": "6月13日", "C": "6月14日", "D": "6月15日"},"answer":"ABCD","explanation":"。甲摆设自动贩实机的行为属于要约，乙投入硬币的行为属于承诺，合同成立。因此A、B选项正确。C、D选项，乙购买咖啡的两枚硬币已经归属于甲所有，因机器故降跳出，乙将其归为已有，没有法律上的根据，甲因此财产受损，乙构成不当得利，甲有权请求乙返还不当利益，因此C、D选项正确。（法考2018）","chapter":"第二章 合同的订立"},
  {"id":124,"topic":"专题二 民法典合同编","type":"single","question":"根据民法典合同编的规定，下列哪些情形中，合同已经成立？（多选）","options":{"A": "张某对杨某说：“我这块手表1000块钱卖给你，要不要？\"杨某说：“好，一言为定。”", "B": "某电脑公司与某销售公司签订了销售500台电脑的合同，双方就合同的全部条款都已经协商完毕，打印好后各执一份，但没2026年专利代理师货格考试有签字章。不久该电脑公司便按合同约定将电脑运送到了该销售公司，该销售公司全部予以验收。", "C": "某超市发传其给某食品厂，上面写着“请速运200箱牛肉味方便面来我超市”。该食品厂立即传真回复：“现有200箱鸡肉味方便面，如需要，明日送货上门。”", "D": "郭某打电话给马某说：“昨天你想买的那枚珍珠我决定卖给你了，8000块钱。”马某未置可否。"},"answer":"C","explanation":"。《民法英》第491条第1款规定：“当事人采用信件、数据电文等形式订立合同要求签订确认书的，签订确认书时合同成立”。乙于6月19日在确认书签字，合同成立，因此C选项正确。（新编）","chapter":"第二章 合同的订立"},
  {"id":125,"topic":"专题二 民法典合同编","type":"multiple","question":"甲在某大学摆设饮料自动贩卖机，乙投人两枚硬币购买了一咖啡，咖啡出来后，两枚硬市因机器故障跳出。乙见四处无人，乃取两枚硬币放人口袋。这一场景恰好被甲的职员丙发现，遂产生纠纷。关于本案，下列哪些说法是正确的？（多选）·","options":{"A": "甲摆设自动贩卖机的行为属于要约", "B": "乙投币购买咖啡的行为底于承诺", "C": "乙将两枚硬币放人口袋的行为构成不当得利", "D": "甲有权请求乙返还该两枚硬币"},"answer":"BC","explanation":"。A、B选项，购物网站标价出售电脑，能够确定电脑的价格、配置、特定品牌等，应认定内容具体确定，属于要约，因此A选项错误，B选项正确。C、D选项，《民法典》第491条第2数规定：“当事人一方通过互联网等信息网络发布的商品成者服务信息符合要约条件的，对方选择该商品或者服务并提交订单成功时合同成立，但是当事人另有约定的除外”。张三提交订单成功后，买卖合同即成立，因此C选项正确，D选项错误。（新编）","chapter":"第二章 合同的订立"},
  {"id":126,"topic":"专题二 民法典合同编","type":"multiple","question":"甲6月10日向乙发信，表示欲购某型号钢材。6月13日乙与甲通话表示同意，并与之商定了钢材的型号、单价和数量，并约定签订合同确认书，乙随即制作了合同确认书并寄出，甲于6月16日在确认书上签字后寄往乙处，乙收到后于6月19日签字，6月22日双方经商议签订了合同书。甲乙之间的合同于何时成立？（单选）","options":{"A": "6月13日", "B": "6月16日", "C": "6月19日", "D": "6月22日"},"answer":"ABD","explanation":"。A选项，《民法典》第487","chapter":"第二章 合同的订立"},
  {"id":127,"topic":"专题二 民法典合同编","type":"multiple","question":"京东商家出售某品牌电脑，张三根据网站页面提交了购买订单，随后收到了京东商家发送的订单信息，京东商家于次日发货。关于该合同，下列说法正确有哪些？（多选）","options":{"A": "购物网站页面标价出售电脑属于要约邀请", "B": "购物网站页面标价出售电脑属于要约", "C": "张三提交订单成功时，买卖合同成立", "D": "张三收到商家发送的订单信息，买卖合同成立"},"answer":"AD","explanation":"。A选项，（民法典）第496条第1款规定：“格式条数是当事人为了重复使用面预先拟定，并在订立合同时未与对方协商的条款”，因此A选项正确。B选项，（民法典》第497条规定，提供格式条款一方不合理地免除或者减轻其责任、加重对方贵任、限制对方主要权利的格式条款无效。因此对对方主要权利的限制需要达到不合理程度的格式条款才是无效的，并不是一律无效，B选项错误。C、D选项，（民法典）第498条规定：“对格式条款的理解发生争议的，应当按照通常理解予以解释。对格式条款有两种以上解释的，应当作出不利于提供格式条款一方的解释。格式条款和非格式条款不一致的，应当采用非格式条款”，因此C选项错误，D选项正确。（2019改编）","chapter":"第二章 合同的订立"},
  {"id":128,"topic":"专题二 民法典合同编","type":"single","question":"根据民法典合同编及相关规定，关于合同的成立，下列说法正确的是？（多选）","options":{"A": "受要约人在承诺期限内作出承诺，该承诺因送达原因而迟判的，除要约人及时通知受婴约人因承诺超过期限不接受该承诺的以外，该承诺有效", "B": "采用数据电文形式订立合同的，收件人没有主营业地的，其住所地为合同成立的地点", "C": "采用数据电文形式订立合同的，发件人有主营业地的，其主营业地为合同成立的地点", "D": "法律规定采用书面形式订立合同，当事人没有采用书面形式，但一方履行了主要义务，对方也接受的，合同成立"},"answer":"C","explanation":"。A选项，加重对方资任需要达到不合理的度，才属于无放的始乐款。B选项已经合理提示减轻的格式条款不一定无效。C选项，张（民法典）第153条的规定，违反法鲁行政法倪的强制性规定的民事法德！为无效，因此C选项的格式条散亢效D选项、根据（民法典》第S10条的规定内算不够具体确定的，可以通过谷订充协议等方式确定，因此D选项的移式条款有效。（新编）","chapter":"第二章 合同的订立"},
  {"id":129,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列关于格式条款的说法正确的是？多选）","options":{"A": "格式条款是当事人为了重复使用而预先拟定，并在订立合同时未与对方协商确定的条款", "B": "提供格式条款一方限制对方主要权利的条款一律无效", "C": "对格式条款有两种以上解释的，应当作出有利于提供格式条款一方的解释", "D": "格式条款和非格式条款不一致的，应当采用非格式条款"},"answer":"ABC","explanation":"。A选项，格式条款是当事人为了重复使用而预先拟定，并在订立合同时未与对方协商的条款，因此读贵任条款属于格式条款，A选项正确。B、C、D选项，根据《民法典》第506条的规定，造成对方人身损害的免责条款无效，因此该责任条款无效，但是并不会影响该合同的效力，B、C选项正确，D选项错误。（2016改编）","chapter":"第二章 合同的订立"},
  {"id":130,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，下列哪些选项属于无效的格式条款？（单选）","options":{"A": "提供格式条款的一方所提供的格式条款含有加重对方责任的内容", "B": "提供格式条款的一方采取合理方式提请对方注意减轻其责任的内容", "C": "违反法律、行政法规强制性规定的", "D": "内容不够具体确定的"},"answer":"ABC","explanation":"。A、B选项，（民法典》第497条规定：“有下列情形之一的，该格式条款无效：（二）提供格式条款一方不合理地免除或者减轻其资任、加重对方贵任、限制对方主要权利：（三）提供格式条款一方排除对方主要权利”，因此A、B选项正确。C、D选项，《民法典》第506条规定：“合同中的下列免责条款无效：（一）造成对方人身损害的；（二）因故意或者重大过失造成对方财产损失的”，因此C选项正确，D选项错误。（新编）","chapter":"第二章 合同的订立"},
  {"id":131,"topic":"专题二 民法典合同编","type":"single","question":"某家具制造商与批发商签订的合同是该家具制造商为了2026年专利代理牌井格考试重复使用而预先拟定的合同书，订立合同时并未与该批发商协商相关条款。该合同书中规定，如果因为家具质量原因给消费者造成损害的，家具制造商概不负资。根据民法典合同编及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "该资任条款是格式条款", "B": "如果家具因为质量原因给消费者造成损害，该家具制造商应当承担责任", "C": "该责任条款无效", "D": "该合同无效"},"answer":"D","explanation":"。根据《民法典》第496条的规定，提供格式条款的一方未履行提示成者说明义务，致使对方没有注意成者理解与其有重大利害关系的条款的，对方可以主张该条款不成为合同的内容。","chapter":"第二章 合同的订立"},
  {"id":132,"topic":"专题二 民法典合同编","type":"multiple","question":"根据民法典合同编及相关规定，关于格式条款的合同，下列说法哪些是正确的？多选）","options":{"A": "提供格式条款一方不合理地加重对方资任的，该格式条款无效", "B": "提供格式条款一方排除对方主要权利的，该格式条款无效", "C": "合同中造成对方人身损害的免责条款无效", "D": "合同中因一般过失造成对方财产损失的免责条款无效"},"answer":"CD","explanation":"，A连项，航堂公司美于退票手房费的境定已提注意与说明，并光发条款，大逸货借误。四滑天气原因飞机质缓定成账容身体惯伤的，一体不承世赔信资任，属于免除人身情将费任的条款，读格式条款无效，D选项正。B.C逸项，对机票价格的解释有今以，应当资照不利予提供格式条教的一万进行解释，刘集以600元订购了机票，其退累手续费应力600×30%=180元，回此B选项错误，C选项正确。（法考2008改编，思维扩晟）","chapter":"第二章 合同的订立"},
  {"id":133,"topic":"专题二 民法典合同编","type":"multiple","question":"甲驾车起步时不小心撞死了坐在院子里甲的外婆。甲向保险公司索赔，保险公司拒绝赔付，并指出保险合同中约定：“保险车辆造成被保险人或其允许的驾驶员及他们的家庭成员人身伤亡，保险公司均不赔偿”。经查实，在签订保险合同时保险公司并未提示甲注意该格式条款。甲可以主张该条款？（单选）","options":{"A": "可撤销", "B": "无效", "C": "效力待定", "D": "不成为合同内容"},"answer":"AC","explanation":"。《民法典>第506条规定：“合同中的下列免费条款无效：（一）造成对方人身报害的：（二）回故意成者重大过失造成对方财产损失的”，因此人、C选项正确。（2018改编）","chapter":"第二章 合同的订立"},
  {"id":134,"topic":"专题二 民法典合同编","type":"single","question":"刘某在订票网站上提前两周以600元订购了海鸥航空公司全价1000元的六折机票，在订单生成页面，网站提示起飞前2小时内退票按机票价格收取30%手续费，并重点提示因遇天气原因飞机颠簸造成旅客身体损伤的，一律不承担赔偿责任。后刘某因临时改变行程，刘某于航班起飞前1小时在订票网站办理退票手续。下列哪些选项是正响的（多选）","options":{"A": "迎票手续费的规定未尽提示注意与说明义券，是无效俗式条款", "B": "对30失的手续费应当解样为刘某应当支付300元的遮票手您费", "C": "对30%的手续费应当解样为刘某应当支付180元的退票手续费", "D": "航空公司规定的因心天气原因飞机巅造成旅客身体损伤的，一律不承担赔偿费任属于无效格式系款"},"answer":"A","explanation":"a《民法典》第495条规定：“当事人约定在将来一定期限内订立合同的认购节、订购节、预订书等，构成预约合同。当事人一方不履行预约合同约定的订立合同义务的，对方可以请求其承担预约合同的违约资任”。本题中，甲公司与乙公司签订的《合作意向节》属于预约合同，《合作开发合同》为本约合同，预约合同具有法律约束力，一方不订立本约合同，另外一方有权追究违约资任，因此A选项正确，B选项错误；甲公司拒绝与乙公司签订《合作开发合同），构成对预约合同的违约，应当承担预约合同的违约责任，不承担本约合同内的违约金：因此C选项带误。乙公依《合作意向书》向甲公司支付了11万元“预付欺”，其性质未明确约定，“定金”，甲公句不应向乙公司“双倍”：还预付款，因此D选项借误。（法2020，思维扩展）","chapter":"第二章 合同的订立"},
  {"id":135,"topic":"专题二 民法典合同编","type":"single","question":"根据民法典合同编及相关规定，合同中出现的下列免费条款，哪些条款会被认定为无效？多选）","options":{"A": "造成对方人身伤害的", "B": "因意外事件造成对方财产损失的", "C": "因故意造成对方财产损失的", "D": "因过失造成对方财产损失的"},"answer":"C","explanation":"。A逸项，乙始终未曾与甲商，甲、乙之间不存在缔约关系，因图：存在缔约过失贵任，因此A选项错误B选项，丙终止与甲的碰商，并经比1与乙签约，是正常的商业行为，并不反诚信原则，不须承担缔约过失费任因此B选项错误。C、D选项，丁假借立合同：与甲恶意磁商，应向甲承担约过失贵任，因此C选项正确，D选项误。（法考2010，思维扩展）","chapter":"第二章 合同的订立"},
  {"id":136,"topic":"专题二 民法典合同编","type":"single","question":"某日，甲公司与乙公司订立《合作意向书》，约定待甲公司取得某地建设用地使用权后双方订立《合作开发合同》，并初步约定了出资比例、收益分享等事宜，当日乙公司依《合作意向书》向甲公司支付了100万元预付款。甲公司取得建设用地使用权后，因决定与其他公司合作而拒绝与之签订《合作开发合同》。以下说法正确的是？（单选）","options":{"A": "乙公司有权请求甲公司承担违约责任", "B": "《合作意向书》不具有法律约束力", "C": "乙公司有权请求甲公司支付《合作开发合同》项下的违约金", "D": "甲公司应向乙公司双倍返还预付款"},"answer":"D","explanation":"。A、B、C选项，甲、乙就售已经达成一致，双方商定要签合同节但由于乙拒绝签字，合同的形式要件失未具备，所以甲乙向的合同并未成立因此A、B、C选项均错误。D选项，乙与甲达成合意后又反悔，属于违背诚信目则的行为，应承担缔约过失责任，因此D选项正确。（法考2005）","chapter":"第二章 合同的订立"},

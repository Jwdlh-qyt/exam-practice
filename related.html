  {"id":587,"topic":"专题六 商标法","type":"multiple","question":"根据商标法的相关规定，商标的使用是指（），用以识别来源的行为。（多选）","options":{"A": "将商标用于商品上", "B": "将商标用于广告宣传、展览等其他商业活动中", "C": "将商标用在商品包装或容器上", "D": "将商标用于商品交易文书上"},"answer":"BCD","explanation":"。A选项，程据《最高人民法院于审理商标民事纠汾集伟造用法体干问题的解>第4条第2款的规定，在发生法册前标专用权收贷害时，挣他使用许可合同的许可人可以和商标注册人共回起诉，也可以在商标注册人不起诉的情况下，自行提起诉讼，因此人选项正确。B、C选项，（商标法》第47条第2款规定：“宣告注后前标无效的决定或者发定，对宜告无效首人民法院改出井已执行的商标权囊件的判决、定、词解书和工商行政管理部门做出井已执行的商标役权案件的处理决定以及已经行的商标转让或者使用许可合同不具有追测力。但是，因商标注册人的恶意给他人逾成的投失，应当给干赔偿”，注册商标被宜告无效所产生的效力对于此前已经完结的商标设权赔偿、商标许可使用费原则上不具有进湖力，乙公司无权请求返还许可费，丙公司也无权请求返还权赔偿费，因此B、C选项错误。D选项，甲公司的注册商标犯了T公司的落作权，应当承担相应的使权责任，但甲公司获得的使权赔偿费与犯T公司的落作权之同并不具有因果关系，也没有直接的联系，因此甲公司获得的权赔偿费不应转付给T公司，D选项错误。（法考2008）","chapter":"第四章 注册商标专用权的消灭"},
  {"id":588,"topic":"专题六 商标法","type":"multiple","question":"根据商标法相关规定，商标注册人可以在其商品上标明以下哪些内容表示其已经注册？多选）","options":{"A": "“注册商标”", "B": "“国家知识产权局商标局”", "C": "@", "D": ""},"answer":"ABCD","explanation":"。A、B选项，（商标法）第66条规定：为明止便权行为，在证据可他天失成者以后难以取得的情况下，商标注舟人成者利害关系人可以依法在起诉前向人民法院中请保全证据”，因此A、B选项正确。C、D选项，（商标法》第65条规定：“商标注舟人成者利害关系人有证据证明他人正在实成者即将实施役犯其注册商标专用权的行为，如不及时制止将会使其合法权盐文到息以弥补的损事的，可以依法在起诉前向人尺法院申请采取贵令停止有关行为和财产俱全的拼施”，因此C、D逸项正确。（2018）","chapter":"第四章 注册商标专用权的消灭"},
  {"id":589,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，商标注册人在使用注册商标的过程中，具有下列哪些情形的，由负资商标执法的部门资令限期改正，期满不改正的，可撤销其注册商标？（多选）","options":{"A": "自行改变注册商标", "B": "自行改变注册人名义", "C": "注册商标成为其核定使用的商品的通用名称", "D": "没有正当理由连续三年不使用"},"answer":"D","explanation":"。《商标法》第62杀第1款中规定，负资商标执法的部门根据已经取得的违法嫌疑证据或者举报，对沙嫌役犯他人注册向标专用权的行为进行查处时，可以行使下列职权：（一）询问有关当事人，调查与犯他人注册商标专用权有关的情况···（三）对当事人涉从事侵犯他人注册商标专用权活动的场所实施现场检查：（四）检查与役权活动有关的物品：对有证据证明是役犯他人注册商标专用权的物品，可以查封成者扣押，A、B、C选项属于县级以上工商行政管理部门查处商标侵权可以行使的职权，D选项不属于负责商标执法的部门查处商标侵权可以行使的职权，因此D选项正确。（2016）","chapter":"第四章 注册商标专用权的消灭"},
  {"id":590,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，对于下列哪些裁定或者决定不服的，当事人可以直接向人民法院起诉？（多选）A：国家知识产权局针对商标异议作出的决定","options":{"B": "国家知识产权局作出的撤销注册商标的决定", "C": "商标评审部门作出的撤销注册商标的复审决定", "D": "商标评审部门宜告注册商标无效的裁定"},"answer":"D","explanation":"。（商标法》第63条第3款规定：“权利人因被促权所受到的实际损失、役权人因侵权所获得的利益、注册商标许可使用费难以确定的，由人民法院根据俊权行为的情节判决给子500万元以下的赔偿”，因此A、B、C选项错误，D选项正确。（2015）","chapter":"第四章 注册商标专用权的消灭"},
  {"id":591,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，当事人对下列哪些决定不服可在收到通知之日起十五日内申请复审？（多选）","options":{"A": "对驳回申请、不予公告不服的", "B": "对不予撤销注册商标的决定不服的", "C": "对经过异议程序中异议不成立，决定被异议商标准予注册不服的", "D": "被异议人对商标不予注册决定不服的"},"answer":"BD","explanation":"。A选项，负贵商标执法的部门有权处理商标役权纠纷，A选项错误。B选项，根据《商标法）第60条第2款规定，负资商标执法的部门处理时，认定促权行为成立的，责令立即停止俊权行为，没收、销毁促权商品和主要用于制造役权商品、伪造注册商标标识的工具，并可以进行罚款，因此B选项符合规定。C、D选项，负资商标执法的部","chapter":"第四章 注册商标专用权的消灭"},
  {"id":592,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列有关注册商标撤销和无效的哪些说法是正确的？多选）","options":{"A": "被撤销的注册商标，应予以公告，该注册商标专用权自公告之日起终止", "B": "被撤销的注册商标，应予以公告，该注册商标专用权视为自始即不存在", "C": "被宣告无效的注册商标，应予以公告，该注册商标专用权自公告之日起终止", "D": "被宣告无效的注册商标，应予以公告，该注册商标专用权视为自始即不存在"},"answer":"A","explanation":"。（商标法》信64条规定：“注册商标专用权人请求偿，披控便权人以注册商标专用权人未使用注册商标提出抗脚的，人民法院可以要求注册商标专用权人提供化前三年内实际使用该注册商标的证据。注册商标专用权人不使证明此首三年内尖际使用过该注行商标，也不能证明因侵权行为受到其他损失的，被控使权人不示担赔偿责任。销售不知道是役犯注册商标专用权的商品，能证明该商昌是自己合法取得并说明提供者的，不承担赔偿资任”，因此人选项正确，B、C、D选项错误。（2019）","chapter":"第四章 注册商标专用权的消灭"},
  {"id":593,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "注册商标被撤销的，自撤销之日起一年内，与该商标相同的商标注册申请，不予核准", "B": "被撤销的注册商标，撤销理由仅及于部分指定商品的，在其他部分指定商品上使用的商标注册视为一并撤销", "C": "注册商标期满不再续展的，自注销之日起一年内，与该商标相同的商标注册申请，不予核准", "D": "当事人对撤销注册商标的决定不服的，可以自收到通知之日起30日内向人民法院起诉"},"answer":"ABCD","explanation":"。（商标条例）第79条规定：“下列情形属于商标法第64条规定的能证明该商品是自己合法取得的情形：（一）有供货单位合法签章的供货清单和货款收据且经查证属实成者供货单位认可的：（二）有供俏双方签订的进货合同且经查证已真实员法行的：（三）有合法进货发票且发票记载事项与沙案商品对应的：（四）其他他够证明合法证取得沙案商品的情形”，因此A、B、C、D选项均正确。（2019）示制度","chapter":"第四章 注册商标专用权的消灭"},
  {"id":594,"topic":"专题六 商标法","type":"multiple","question":"某县甲公司未经漫画家乙许可，将其创作的一幅漫画作品作为商标申请，并于2020年3月3日被核准注册。乙认为其著作权受到侵害，与甲发生纠纷。乙应当采取下列哪种方式保护自己的合法权益？（单选）","options":{"A": "向甲公司所在地基层法院提起侵犯著作权之诉", "B": "向有管辖权的法院提起撤销甲公司的注册商标之诉", "C": "请求宜告该注册商标无效", "D": "请求撤销该注册商标到进"},"answer":"ACD","explanation":"。A选项，《最商人民法院关于审理商标民事纠纷案件适用法体若干问题的解释》第22条第1款规定：“人民法院在审理商标纠纷案件中，根据当事人的请求和案件的具体情况，可以对涉及的注册商标是否驰名依法作出认定”，因此A选项正确。B选项，根据《商标法》第14条的规定，只有国务院商标管理部门和最商人民法院指定的人民法院可以进行认定，因此B选项错误。C、D选项，根据《商标法>第14条第2、3款规定，在商标注册审查、商标争议处理或者查处商标违法案件过程中，当事人主张驰名商标权利的，国务院商标管理部门根据审查、处理案件的需要，可以对商标驰名情况作出认定。因此C、D选项正确。（2011改编）","chapter":"第四章 注册商标专用权的消灭"},
  {"id":595,"topic":"专题六 商标法","type":"multiple","question":"个体经营户王小小从事理发服务业，使用“一帅直措没“作为未注册商标长期使用，享有较高声。王小小通过签订书而合同许可其同一城区的表妹张使用“一帅不即没“商标从事理发业务。后张薇以自己的名义申请”一平使剪没”商标使用于理发业务并获得注册。下列说法正确的你”，日价是？（单选）以，","options":{"A": "该商标使用许可合同自双方签字之日起生效乙的", "B": "该商标使用许可合同备案后生效著作", "C": "王小小有权自“一剪没“注册之日起5年内请求宜审奶告该注册商标无效考20", "D": "王小小无权请求宜告该注册商标无效小小同，"},"answer":"AD","explanation":"。A选项，（商标法》第14条第1款规定：“驰名商标应当根据当事人的请求，作为处理涉及商标案件要认定的事实进行认定”，因此A选项正确。B、C选项，根据《商标法》第14条第2、3款的规定，驰名商标只能依照当事人主张，根据审查、处理案件的猎要作出认定，不能主动对商标驰名情况作出认定，因此B、C选项错误。D选项，（商标法》第14条第5款规定：“生产、经营者不得将驰名商标'字样用于商品、商品包装成者容器上·..”，因此D选项正确。（2014）","chapter":"第四章 注册商标专用权的消灭"},
  {"id":596,"topic":"专题六 商标法","type":"multiple","question":"下列哪些商标在申请注册时，有可能会被商标注小册部门认定为不以使用为目的恶意注册申请？（多选）张薇","options":{"A": "某旅游公司在多个类别商品上申请百余件商标注行为日起册申请，其中大量为“终南山”、“安地斯”、“棕榈岛”、“铜正确湾”字样的注册商标申请", "B": "某贸易公司在多个类别商品上申请多件商标注册区，申请，其中一半以上为“十七街”、“宸光文具”、“威斯汀”字“十样的注册商标申请其”", "C": "某地产公司为其开发的楼盘申请“桂语听”、意知名是意景澜庭”“清溪”、“云舒”等注册商标请的", "D": "某餐饮公司已经注册“李小老”作为其商标，后在请。相同的类别上又大量申请“张小老”、“王小老”、“刘小老”册岗等不同姓氏百余件商标申请用为"},"answer":"ABCD","explanation":"。《商标法》第14条第1款规定：“驰名商标应当根据当事人的请求，作为处理涉及商标专随六商标法常件得要认定的事实进行认定。认定驰名商标应当出下列四：（一）借关公众对谈商标的加但度：（二）设育标使用的持货叶间：（三）设育标的任何宣传工作的特偿叶间、信度和海理他国：（四）该育标作力确名剪标受保护的记乘…”，因比A、B.C、D选项均正（新）","chapter":"第四章 注册商标专用权的消灭"},
  {"id":597,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列哪些行为属于侵犯注册商标专用权的行为？（多选）","options":{"A": "未经商标注册人的许可，在同一种商品上使用与其注册商标相同的商标的", "B": "未经商标注册人同意，更换其注册商标并将该更换商标的商品又投人市场的", "C": "故意为侵犯他人商标专用权行为提供便利条件，帮助他人实施侵犯商标专用权行为的", "D": "未经商标注册人的许可，在类似商品上使用与其注册商标近似的商标，容易导致混淆的"},"answer":"A","explanation":"。模语（商你法）第33条规定，对初少审定公告的郎标，自公告之日起3个月内，在先以科人、科客关系人认力透反本法13条第3款（不相同成者不相类似前品中请注后的前你是复制.基仿戏者自币化人已经在中国注后的驰名岗终）院定的，可以向国务院商棕管增部门提出异议，四此入选项正确，B.C.D选项借供。（2014院）","chapter":"第五章 注册商标专用权的保护"},
  {"id":598,"topic":"专题六 商标法","type":"multiple","question":"甲公司在衬衫商品上注册了“百合”文字商标。根据商标法及相关规定，下列哪些行为侵犯其注册商标专用权？多选）","options":{"A": "乙公司未经甲公司许可，在衬衫商品上使用与甲公司“百合”注册商标相近似的文字作为商标品交易的电子商务，使相关公众产生误认", "C": "丁公司购人甲公司生产的“百合”牌衬衫后，未经甲公司同意将商标更换为“茉莉”并将该更换商标的衬衫商品又投人市场销售", "D": "戊公司伪造甲公司的“百合“注册商标标识，但并未将该伪造标识与衬衫商品结合投人市场销售"},"answer":"ABC","explanation":"。A、B选项，（前标法）第13条第2、3款现定：“就相同戏者类似商品中请注后的商场是复制、华仿或者画昂他人兼在中回注册内说名前标，容易导改溉清的，不予注册并情止便用，就不相同或者不相类似商品申请注形的前标是复制、基仿或者幽译他人已经在中回注册的驰名商标，误导公众，政便该施名商标注册人的利应司他变到机害的，不子注册并能止使用”，因此A、B选项正确。C选项，概据《商标法》第45条第1致现定，已经注册的商标，造反本法，自前标注册之日起五年内，在先权利人或者利害关系人可以请求商标评审部门宜告该注册商标无效。对恶危注开的，驰名商标所有人不受五年的时同限制，因此C选项正确。D选项，根据《商标法》第14条第5款的规定，生产、经营者不得将“驰名商标”字样用干广告宣传、展览以及其他商业活动中，因此D选项错误。（2019）注册","chapter":"第五章 注册商标专用权的保护"},
  {"id":599,"topic":"专题六 商标法","type":"multiple","question":"甲公司为其生产的啤酒申请注册了“冬雨之恋”商标，但记。下列哪些行为侵犯甲公司的商标权？多选）","options":{"A": "乙公司误认为该商标属于未注册商标，故在自己生产的啤酒产品上也使用“冬雨之恋”商标", "B": "丙公司不知某公司假曾“冬雨之恋”酒而予以运输", "C": "丁饭店将购买的甲公司“冬雨之恋”啤酒倒人自制啤酒桶，自制“侠客”牌散装啤酒出售", "D": "戊公司明知某企业生产假冒“冬雨之恋”酒而向其出租仓库"},"answer":"ABC","explanation":"。（商标条例》第35条规定：“以中国为实有效的营业所，或者在中国有住所，或者拥有中国国箱”，因此A、B、C选项正确，D选项销误。(2019)","chapter":"第五章 注册商标专用权的保护"},
  {"id":600,"topic":"专题六 商标法","type":"multiple","question":"甲公司注册了商标“露滴”，使用于日用化妆品等商品上，下列选项说法错误的有？多选）","options":{"A": "甲公司要将该商标改成“滴露”，应提出变更申请", "B": "乙公司在化妆品上擅自使用“滴露”为商标，甲公司有权禁止", "C": "申公司因经营不善连续三年停正使用该商标，该商标可储破注销", "D": "甲公司签订该商标转让合同后，应单独向国家知识产权局提出转让申请"},"answer":"CD","explanation":"。A选项，根据《商标条例》第37条的规定，以中国为原属国中请商标国际注府的，位当遗过国家知识产权局向世界知识产权组织国际局中请办理，因此人选项错误。B选项，根据（商标条例》第37条的规定，以中国为原属国的，与马德里协定有关的商标国际注册的后期指定、放办、江销，应当通过国家知识产权局向国际局申请办理，因此B选项错误。C选项，根据《商标条例》第39条的规定，商标国际注册申请指定的商品或者服务不得超出国内基础申请或者基础注册的商品或者服务的范围，因此C选项正确。D选项，根据《商标条例>第40条的规定，商标国际注册中请手续不齐备或者未按照规定填写申请书的，国家知识产权局不子受理，申请日不予保留，因此D选项正确。（新编）","chapter":"第五章 注册商标专用权的保护"},
  {"id":601,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列哪些情形属于国家知识产权局商标局主动撤销其注册商标的理由？（多选）","options":{"A": "商标注册人在便用注册商标的过程中，自行改变注册商标", "B": "注册商标成为其核定使用的商品的通用名称", "C": "注册商标没有正当理由连续三年不使用", "D": "商标注册人在使用注册商标的过程中，自行改变注册人名义"},"answer":"B","explanation":"。A、B、D选项，（商标条例>第37条第2数中规定以中国为原属国的，与马德里协定有关的商标国际注册的后期指定、放弃、注销，应当通过国家知识产权局向国际局申请办理：与马德里协定有关的商标国际注册的转让、刷减、交更、续晨，可以通过国家知识产权局向国际局申请办理，也可以直接向国际局申请办理”，因此A、D选项错误，B选项正确。C选项，《商标条例》第37条第1款规定，以中国为原属国申请商标国际注册的，应当通过国家知识产权局向世界知识产权组织国际局申请办理”，因此C选项错误。（新编）志产品ABC。（地理标志产品保护办法》第2条规定：“地理品，是指产自特定地城，所具有的质量、声誉成者其本质上取决于该产地的自然因素、人文因素的产品。志产品包括：（一）来自本地区的种植、养殖产吕；专随六商标法开科全部来自术地区成青阶分东自共佛逃区，井在安风特定工艺生产和加工的产品”因此A、B违项正标为产品保护办法》第7等2属定：“地理标可以是由具有地理指示功倪的旨你和厌噢产品真为通用名称成的眉合名你，也可以是其有长久使有均定俗成的名你。”因北C逸项正喻、《地理惊产办法）第3条规定：海标为产马应当馬谷集实性、特岸性和关联性，因北D透项借供。（新）ABCD，《均理标书产品保护水法》第9条境定：“理品保护中请，由提出产场党语的乒使以上人民改指定的兵有代农性的社会团体、保护中请现梅（以下请人）提出”，因北A逸项正确。《均理你志产品保护11条规定：“地理标书产易的集护事请材料应函向识产权管理部门提交。中请种包悟：（一）有关场玫府炎于划定地理标龙产品产地泥围的建以.理标志产品的相关材料，包括：·与产熔的自然因文因素之同关最的说明”，因北，因此B、C、D念（新增）ABCD。《地理标志产品保护办法》第13条现定：“国产权局对收到的中请进行形式审查”，因此人途《地理标志产品保护办法》第14条规定：“对受理的志产品保护中请，国家知识产权局组织开展技术审，因此B选项正确。《地理标忘产品保护办法》第S条国家知识产权局负责全回地理标志产品以及专用标理和保护工作：统一受理和审查地理标志产岳保护农法认定地理标志产品。地方知识产权管理部门负政区城内的地理标志产品以及专用标志的管理和保，因此C、D选项正确。（新输）BCD。《地理标志产品保护办法》第15条规定：“有关者个人对初步认定公告的地理标志产品有异议的，初步认定公告之日起2个月内向国家知识产权局提“，因此A选项错误。《地理标志产品保护办法》第27：“有下列情形之一，自国家知识产权局发市认定公起，任何单位或者个人可以请求国家知识产权局标志产品保护…（二）连续3年未在生产销售中使标志产品名称的”，因此B选项正喻。（地理标志产品保护办法》第30条规定：“有下列行为之一：依据相头法体法规处理：（一）在产地范国外的相同或者类似户品上使用受保护的地理标志产品名称的…”因此C逸项正确。《地理标志产品保护办法）第31条规定：…戏者已迁出地理标志产品产地范围的国家如识产权局注销其地理标志专用标志使用注册登记，停止其使用地理标为专用标志并发布公告”，因此D选项正确。（新编）的客体","chapter":"第五章 注册商标专用权的保护"},
  {"id":602,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "张某的注册商标含有本商品的通用名称，张某无权禁止他人正当使用", "B": "王某的注册商标中含有本商品的型号，王某无权禁止他人正当使用", "C": "李某的注册商标中含有的地名，李某无权禁止他人正当使用", "D": "赵某的三维标志注册商标中含有的商品自身性质产生的形状，赵某无权禁止他人正当使用"},"answer":"ABCD","explanation":"。《著作权法》第3条现定：“本法所称的作品，是指文华、艺术和科学领域内具有独创性并能以一定形式农现的智力成果，包怡：…；（二）口述作品：（三）音乐、龙厕、曲艺、焊蹈、杂技艺术作品……（五）摄影作品…，因A、B、C、D选项均正确。（2012）","chapter":"第五章 注册商标专用权的保护"},
  {"id":603,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列哪些情形于商标的正当使用，不构成商标侵权：（多选）","options":{"A": "甲公司有权禁止乙公司继续使用该商标并要求其赔偿", "B": "甲公司有权禁止乙公司继续使用该商标，但无权要求其", "C": "甲公司无权禁止乙公司在原使用范围内继续使用该商", "D": "甲公司无权禁止乙公司在原使用范围内继续使用该商标，但可以要求其附加适当区别标识"},"answer":"ABD","explanation":"。A选项符合（容作权法）第3条的规定。B选项，（答作权条例）第4条第（一）项规定：“文字作品，是指小说、诗词、做文、论文等以文字形式表现的作品”，因此B选项正确。C选项，概据《著作权条例》第4条第（十二）项的规定，C选项描迷的属于困形作品，因此C选项借误。D选项，推据《著作权条例》第4条第（十三）项的规定，为晨示、试险成者观测等用途，根据物体的形状和结构按屋一定比例制成的立体作品属于携型作品，因此D选项正确。（2019）","chapter":"第五章 注册商标专用权的保护"},
  {"id":604,"topic":"专题六 商标法","type":"multiple","question":"甲公司将其生产的白酒独创性地取名为“逍遥乐”，并在该酒的包装、装潢和广告中突出宜传酒名，致“逍遇乐”被消费者作为自己所产白酒的商标使用并抢先注册。该商标注册申请经初步审定后公告。下列哪些说法是正确的？（多选）","options":{"A": "甲公司有权在异议期内提出异议，反对核准乙公司的注册申请", "B": "如“逍遥乐”被核准注册，甲公司有权主张先用权", "C": "如“逍遥乐“被核准注册，甲公司有权请求撤销该商标", "D": "甲公司有权向法院起诉请求乙公司停止使用并赔偿损失"},"answer":"BD","explanation":"。A选项的小说属于文字作品，C选项的地图属于图形作品，均造用著作权法规定。B、D选项，《著作权法》第5条规定：“本法不适用干：（一）法伴、法规，国家机关的决议、决定、命令和其他具有立法、行政、司法性质的文件，及其官方正式译文；（二）单纯事实消息：…，因此B、D选项不适用若作权法规定。（2014)","chapter":"第五章 注册商标专用权的保护"},
  {"id":605,"topic":"专题六 商标法","type":"single","question":"甲公司在纸手帕等纸制产品上注册了“茉莉花”文字商标。下列哪项未经许可的行为构成侵权？（单选）","options":{"A": "乙公司在其制造的纸手帕包装上突出使用“茉莉花”图形", "C": "丁公司长期制造茉莉花香型的纸手帕，并在包装上标注“茉莉花香型”", "D": "戊公司在甲公司申请商标之前，已经在纸平帕上使用“茉莉花“作为商标，并有一定影响力，但是未注册，在甲公司获得注册后继续使用"},"answer":"A","explanation":"。A选项，《落作权法》第5条规定：“本法不适用于：（三）历法、通用效表、通用表格和公式”因此人选项不属于著作权保护客体。B、C、D选项，根据《著作权法》第3条的规定、工程设计图、产品设计图、地图、示意图等图形作品和模型作品属于著作权法所保护的作品，因此B、C、D选项属于著作权保护客体。（新编）","chapter":"第五章 注册商标专用权的保护"},
  {"id":606,"topic":"专题六 商标法","type":"multiple","question":"甲公司许可乙公司独占使用其注册商标，在合同履行期间，市场上出现大量俊犯该注册商标专用权的商品。对此，下列关于俊权诉讼的说法哪些是正确的？多选）","options":{"A": "甲公司可以自行提起诉讼", "B": "乙公司可以自行提起诉讼", "C": "甲和乙应当共同起诉", "D": "在甲不起诉的情况下，乙才可以自行提起诉讼"},"answer":"AD","explanation":"。A、D选项，根据《著作权条例>第4条的规定，A选项的论文属于文字作品，D选项属于杂技艺术作品，均属于著作权法保护的客体。B、C选项，根据《落作权法》第5条的规定，B选项的列决书和C选项的化学元素周期表均不属于著作权法保护的客体。（2016）","chapter":"第五章 注册商标专用权的保护"},
  {"id":607,"topic":"专题六 商标法","type":"multiple","question":"甲公司为其牛奶产品注册了“润语”商标后，通过签订排他许可合同许可乙公司使用。丙公司在其酸奶产品上使用“润雨”商标，甲公司遂起诉丙公司停止侵害并赔偿损失，法院判决支持了甲公司的请求。在该判决执行完毕后，“润语”注册商标因侵犯丁公司的著作权被依法宜告无效。下列哪些选项是错误的？（多选）","options":{"A": "甲公司和乙公司可以作为共同原告起诉丙公司", "B": "甲公司与乙公司的许可合同应当认定为无效合同，乙公司应当申请返还许可费", "C": "甲公司获得的侵权赔偿费构成不当得利，应当返还给丙公司", "D": "甲公司获得的侵权赔偿费应当转付给丁公司"},"answer":"ABD","explanation":"。A、B选项，法院判决书和《与.贸易有关的知识产权协定》的官方中文译文均属于法律、法规，国家机关的决议、决定、命今和其他具有立法、行政、司法性质的文件，及其官方正式译文，不属于《著作权法》保护客体。C选项，《著作权法》第2条规定：“中国公民、法人或者非法人组织的作品，不论是否发表，依照本法享有落作权。外国人、无国籍人的作品根据其作者所属国或者经营居住地国间中国签订的协议或者共同参加的国际条约享有的著作权，受本法保护”，C选项不当选。D选项，创意属于思想观念的范時，其没有通过一定形式表现出来形成作品，不受《著作权法》的保护。因此，A、B、D选项正确（法考2011）的主体兑法正","chapter":"第五章 注册商标专用权的保护"},
  {"id":608,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，对于保全的哪些说法是正确的：（多选）","options":{"A": "为制止侵权行为，在证据可能灭失的情况下，商标注册人可以依法在起诉前向法院申请证据保全", "B": "为制止侵权行为，在证据以后难以取得的情况下，注册商标的利害关系人可以依法在起诉前向法院申请证据保全", "C": "商标注册人或者利害关系人有证据证明他人正在实施或者即将实施侵犯其注册商标专用权的行为，如不及时制止将会使其合法权益受到难以弥补的损害的，可以依法在起诉前向人民法院申请采取财产保全的措施", "D": "商标注册人或者利害关系人有证据证明他人正在实施或者即将实施侵犯其注册商标专用权的行为，如不及时制止将会使其合法权益受到难以弥补的损害的，可以依法在起诉前向人民法院申请采取责令停止有关行为的措施"},"answer":"B","explanation":"。《著作权法》第2条规定：“中国公民、法人或者非法人组织的作品，不论是否发表，依履本法享有若作权。保护外国人、无国籍人的作品根据其作者所保护属国或者经常居住地国同中国签订的普作权协议成者共同参加的国际条约享有的加了相若作权，受本法保护。外国人、无国籍人的作品首先在中国境内出版的，依本法享有著作权。未与中国签订协议","chapter":"第五章 注册商标专用权的保护"},
  {"id":609,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列哪项不属于负责商标执法的部门对涉嫌商标侵权行为进行查处时可以行使的职权？（单选）","options":{"A": "询问有关当事人", "B": "对当事人涉嫌从事侵犯他人注册商标专用权活动的场所实施现场检查", "C": "检查与侵权活动有关的物品", "D": "对涉嫌侵权人予以拘留"},"answer":"B","explanation":"《答作以等例>诺6条规定：“普作权自作昌例作完成之日是产生”。本题中，张集作品创作完成之日方2016年9月9日，四此A.C.D选项借供，B选项正确，（2016）","chapter":"第五章 注册商标专用权的保护"},
  {"id":610,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，在侵犯商标专用权纠纷案件中，权利人因被侵权所受到的实际损失、侵权人因侵权所获得的利益、注册商标许可使用费难以确定的，赔偿数额应当如何确定？（单选）","options":{"A": "由人民法院根据侵权行为的情节判决给予五十万以下的赔偿", "B": "由人民法院根据侵权行为的情节判决给予一百万以下的赔偿", "C": "由人民法院根据侵权行为的情节判决给予三百万以下的赔偿", "D": "由人民法院根据侵权行为的情节判决给予五百方以下的赔偿"},"answer":"A","explanation":"《著作权法》11条第3款规定：由法人成者非法人组识主持，代袭法人成省事法人组识党惠创作，并由法人成者非法人恒织承推费任的作品，法人成者和法人组织现力作者”。本题中，工作总结由甲小学主持，代教甲小华的意志创作，井由甲小学承担费任，因此甲小学视力谊工作总结的作并且享有著作权，A逸项正确，B.C、D透项借误。（2016）","chapter":"第五章 注册商标专用权的保护"},
  {"id":611,"topic":"专题六 商标法","type":"single","question":"甲公司以乙公司侵犯其注册商标专用权为由请求负资商标执法的部门处理。对此，负责商标执法的部门的下列做法中哪些是合法的？（多选）","options":{"A": "以商标侵权纠纷为民事纠纷、应当由人民法院处理为由拒绝受理甲公司的请求", "B": "认定役权行为成立后，资令乙公司立即停止侵权，议收侵权商品以及主要用于制造役权商品的工具，并处以罚款", "C": "认定役权行为成立后，资令乙公司应向甲公司偿50万元人民币", "D": "认定侵权行为成立后，根据当事人的请求对赔偿数额进行调解"},"answer":"A","explanation":"。本题中，绩效考核办法是由公司主持，代公可危忘创作，由公司承担责任的作品，因此该公司视为该绩效考核办法的作者并享有著作权，A选项正确，B、C、D选项错误。（2017）","chapter":"第五章 注册商标专用权的保护"},
  {"id":612,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列关于注册商标专用权的说法正确的是？多选）","options":{"A": "注册商标中含有的地名，注册商标专用权人无权禁止他人正当使用", "B": "注册商标的专用权，以核准注册的商标和核定使用的商品为限", "C": "侵犯注册商标专用权的赔偿数额应当包括权利人为制止侵权行为所支付的合理开支", "D": "商标注册人申请商标注册前，他人已经在同一种商品上先于商标注册人使用与注册商标相同的商标的，注册商标专用权人可以禁止该使用人继续使用该商标"},"answer":"C","explanation":"。《著作权法》第11条第2款规定：“创作作品的自信人是作者”：《容作权条例）第3条第2款规定：“为他人创作进行组织工作，提供咨询意见、物质条件，或者进行其他辖助工作，均不视为创作”。本题中，提供资会的标某和提供咨询意见的王某均不是作者，该小说由李某完成，且不是常某自传体小说，因此半某是作者，A、B、D选项带误，C选项正确。（2016）","chapter":"第五章 注册商标专用权的保护"},
  {"id":613,"topic":"专题六 商标法","type":"multiple","question":"在某商标侵权案件中，注册商标专用权人请求赔偿的，被控侵权人以什么理由提出抗辩可能会免于承担赔偿责任？（单选）","options":{"A": "注册商标专用权人未使用注册商标", "B": "注册商标专用权人未合理使用注册商标", "C": "注册商标专用权人使用注册商标未满三年", "D": "使用该注册商标的产品质量不达标"},"answer":"ACD","explanation":"。《落作权法》第14条第2款规定：“合作作品的落作权由合作作者通过协商一致行使：不他协商一致，又无正当理由的，任何一方不得阻止他方行使除转让、许可他人专有使用、出质以外的其他权利，但是所得收丝应当合理分配给所有合作作者”，因此A、C、D选项正确，B选项借误。（新编）","chapter":"第五章 注册商标专用权的保护"},
  {"id":614,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，销售不知道是侵犯注册商标专用权的商品，能证明该商品是自己合法取得并说明提供者的不承担赔偿责任。下列哪些情形属于能证明该商品是自己取得的情形？（多选）","options":{"A": "有供货单位合法签章的供货清单和货款收据且经属实的", "B": "有供销双方签订的进货合同且经查证已经真实履行", "C": "有合法进货发票且发票记载事项与涉案商品对应的", "D": "以上都是"},"answer":"ABC","explanation":"。甲、乙、戊都不是作者，完成初稿的丁和修改的丙是你者，丁和可享有若作权。《著作权法》第14条第2款规定：“合作作品的落作权由合作作者通过协商一致行使；不能协商一致，又无正当理由的，任何一方不得阻止他方行使除转让、许可他人专有使用、出质以外的其他权利，但是所得收益应当合理分配给所有合作作者”：因此丁有权不经甲、乙、丙的同意行使发表权，A、B、C选项错误，D选项正确。（法考2007)","chapter":"第五章 注册商标专用权的保护"},
  {"id":615,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，关于驰名商标的认定，下列说法哪些是正确的？多选）","options":{"A": "人民法院在审理商标纠纷案件中，根据当事人的请求和案件的具体情况，可以对涉及的注册商标是否驰名依法作出认定", "B": "在名牌推进战略实施过程中，可由相关行业协会进行认定", "C": "在商标注册过程中产生争议时，有关当事人认为其商标构成驰名商标的，国务院商标管理部门可以对商标驰名情况作出认定", "D": "在商标评审过程中产生争议时，有关当事人认为其商标构成驰名商标的，国务院商标管理部门可以对商标驰名情况作出认定"},"answer":"ABC","explanation":"。《若作权法》第8条第1数规定：“著作权人和与若作权有关的权利人可以投权著作权集体管理组织行使若作权或者与若作权有关的权利。依法设立的著作权集体管理组织是非营利法人，被投权后可以以自己的名义为著作权人和与若作权有关的权利人主张权利，并可以作为当事人进行涉及著作权成者与若作权有关的权利的诉讼、仲裁、调解活动”，因此A、B、C选项正确，D选项错误。（2017）","chapter":"第六章 驰名商标"},
  {"id":616,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列有关驰名商标的哪些说法是正确的？（多选）","options":{"A": "驰名商标应当根据当事人的请求，作为处理涉及商标案件需要认定的事实进行认定", "B": "在商标注册审查过程中，根据审查需要，可以主动对商标驰名情况作出认定", "C": "在商标争议处理过程中，根据处理案件需要，可以主动对商标驰名情况作出认定", "D": "生产、经营者不得将“驰名商标”字样用于商品、商品包装成者容器上"},"answer":"AD","explanation":"。本题中，赵某和程某为该小说的合作作者，共同享有落作权，许可该出版社出版该小说不属于许可他人专有使用，程某无正当理由不得阻止赵某许可该出版社出版该小说，但赵某由此所得收益应当合理分配给程某，因此A、D选项正确，B、C选项错误。（2014）","chapter":"第六章 驰名商标"},
  {"id":617,"topic":"专题六 商标法","type":"single","question":"下列哪些选项属于认定驰名商标应当考虑的因素？（多选）","options":{"A": "该商标的持续使用时间", "D": "相关公众对该商标的知晓程度", "C": "该商标作为驰名商标受保护的记录"},"answer":"B","explanation":"。本题中，甲、乙可以不经丙、丁同意以普通许可方式许可他人使","chapter":"第六章 驰名商标"},
  {"id":618,"topic":"专题六 商标法","type":"multiple","question":"针对经初步审定公告的某商标，某公司认为该商标仿其已经在中国注册的驰名商标，误导公众并致使公司利益受到损害。根据商标法及相关规定，该公司可以如何处理？（单选）","options":{"A": "自公告之日起三个月内提出异议", "B": "自公告之日起三个月内申请审", "C": "自公告之日起三个月内申请行政议", "D": "自公告之日起三个月内向法院起诉"},"answer":"BC","explanation":"。A逸项，《等作权杀例》第6条规定：“著作权自作品创作完成之日起产生”，金某千2012年12月24日例作完成了该小说，因此A逸项借误。B选项，《著作权法》第13条规定：“改编、留诺、注释、签理已有作品百产生的作品，其著作权由改编、相语、注幕、整理人章有，但行使著作权时不得使现原作品的著作权”，因此张某对其改编的电影剧本享有落作权，B逸项正确。C、D选项，《答作权法》第17条第1款规定：“视听作品中的电影作品、电视剧作品的著作权由制作者享有，但编别、导演、摄影、作询、作曲等作者享有署名权，井有权按愿与谢作者签订的合同获得报码”，因此该电影作品的著作权由制作者甲公司享有，C逸项正确，D选项错误。（2014）","chapter":"第六章 驰名商标"},
  {"id":619,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，关于驰名商标说法正确的是？多选）","options":{"A": "对未在中国注册的驰名商标，在相同或者类似商品上予以保护", "B": "对已在中国注册的驰名商标，在不相同或者不相类似商品上予以跨类保护", "C": "驰名商标所有人基于相对理由对恶意注册的商标请求宣告无效的申请，其不受五年的时间限制", "D": "经营者可以将“驰名商标”字样用于广告宣传"},"answer":"D","explanation":"。《若作权法》第19条规定：“受委托创作的作品，著作权的归属由资托人和受托人通过合同约定。合同未作明确约定或者没有订立合同的，著作权属于受托人”：《著作权纠纷解释）第12条规定：“按同著作权法第17条规定委托作品若作权具干受托人的情形，委托人在约定的使用范国内享有使用作品的权利…”。本题中，受托人味某享有该院微的著作权，该学院在约定的使用范国内享有使用的权利，因此A、B、C选项错误，D选项正确。（2014）","chapter":"第六章 驰名商标"},
  {"id":620,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，以中国为原属国申请商标国际注册的，应当至少符合以下哪个条件？（多选）","options":{"A": "在中国设有真实有效的营业所2026年专利代理部资格考试", "B": "在中国有住所", "C": "拥有中国国籍", "D": "必须同时符合以上所有条件"},"answer":"AD","explanation":"。（著作权法）第15条规定：“汇编若干作品、作品的片段成者不构成作品的数据或者其他材料，对其内容的选择或者编排体现独创性的作品，为汇编作品，其著作权由汇编人享有，但行使著作权时，不得使犯原作品的著作权”，因此A、D选项正确，B、C选项倡误。（2014）","chapter":"第七章 商标国际注册"},
  {"id":621,"topic":"专题六 商标法","type":"multiple","question":"关于马德里国际商标注册下列哪些说法是正确的？多选）","options":{"A": "以中国为原属国申请商标国际注册的可以直接向世界知识产权组织国际局申请办理", "B": "以中国为原属国，与马德里协定有关的商标国际注册的后期指定可以直接向世界知识产权组织国际局申请办理", "C": "商标国际注册申请指定的商品或服务不得超过国内基础申请或基础注册商品或服务范围", "D": "未按照规定填写的商标国际注册申请书的商标申请不予受理"},"answer":"ACD","explanation":"。A、B、C选项，（落作权法》第17条第1款规定：“祝听作品中的电影作品、电视剧作品的著作权由制作者享有，但编剧、导演、摄影、作词、作曲等作者享有署名权，井有权按照与制作者签订的合同获得报酬”，因此例作者甲公司是该电影的落作权人，编剧某享有署名权，并有权按照与甲公司签订的合同获得报图，A、C选项正确，B选项错误。D选项，（落作权法）第17条第3款规定：“视听作品中的剧本、音乐等可以单独使用的作品的作者有权单独行使其落作权”，因此电影音乐创作人周某有权单独行使电影音乐的落作权.D选项正确。（2017）","chapter":"第七章 商标国际注册"},
  {"id":622,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列哪个事务可以直接向世界知识产权组织国际局申请办理？（单选）","options":{"A": "以中国为原属国的，与马德里协定有关的商标国际注册的后期指定", "B": "以中国为原属国的，与马德里协定有关的商标国际注册的转让", "C": "以中国为原属国申请商标国际注册的", "D": "以中国为原属国的，与马德里协定有关的商标国际注册的放弃"},"answer":"A","explanation":"。《溶作权纠纷解释》第14条规定：“当事人合意以特定人物经历为题材完成的自传体作品，当事人对若作权权属有约定的，依其约定：没有约定的，若作权归该特定人物享有，执笔人或整理人对作品完成付出劳动的，若作权人可以向其支付适当的报函”，因此A选项正确，B、C、D选项错误。（2011）","chapter":"第七章 商标国际注册"},
  {"id":623,"topic":"专题六 商标法","type":"multiple","question":"下列关于地理标志产品的规定，哪些说法标志是正确的（多选）","options":{"A": "地理标志产品是指产自特定地域，所具有他特的质量、声誉或者其他特性本质上取决于该产地的地理（二自然因素、人文因素的产品本", "B": "原材料部分来自其他地区，并在本地区按照特定工艺生产和加工的产品，属于地理标志产品产", "C": "地理标志产品名称可以是由具有地理指示实功能的名称和反映产品真实属性的通用名你构成用的组合名称品", "D": "地理标志产品应当具备新颖性、地城性、待地异性和稳定性标"},"answer":"AD","explanation":"。A、B选项，根据（若作权法>第19条的规定，受委托创作的作品，双方未约定若作权的归属，该随塑著作权属于受托人王某，因此A选项正确，B选项错误。C、D选项，《若作权法）第20条第1款规定：“作品原件所有权的转移，不改变作品若作权的归属，但美术、摄影作品原件的展览权由原件所有人享有”，随塑属于美术作品，原件所有人该公司享有塑原件的展览权，因此C选项错误，D选项正确。（2012）","chapter":"第八章 地理标志"},
  {"id":624,"topic":"专题六 商标法","type":"multiple","question":"下列关于地理标志产品申请的规定，哪些成说法是正确的（多选）简办","options":{"A": "地理标志产品保护申请可以由县级以上政省府提出方", "B": "地理标志产品保护申请材料应向省级知识（三产权管理部门提交素", "C": "地理标志产品的保护申请材料包括有关地项方人民政府关于划定地理标志产品产地范围的建议京", "D": "地理标志产品的保护申请材料包括与产地项的自然因素和人文因素之间关系的说明地"},"answer":"BD","explanation":"。A、B选项，根据<落作权法>第19条的定，曾国答传记属干委托作品，未约定权利归属的，完成人张某为著作权人，因北A选项借误，B逸项正确。C、D逸项，王某传记属于特定人物自传体作品，未约定权利归属的，特定人物王某为溶作权人，因北C逸项借误，D逸项正确。（2018）","chapter":"第八章 地理标志"},
  {"id":625,"topic":"专题六 商标法","type":"multiple","question":"下列关于地理标志产品的规定，哪些说法规志是正确的(多选）申","options":{"A": "地理标志产品保护申请由国家知识产权局进行形式审查护", "B": "地理标志产品保护申请由国家知识产权局组织开展技术审查单", "C": "地方知识产权管理部门负责本行政区域内应的地理标志产品以及专用标志的管理和保护工作出", "D": "国家知识产权局负贵全国地理标志产品以条及专用标志的管理和保护工作告销"},"answer":"BC","explanation":"。《著作权法》第20条第1款规定：“作品原件所有权的转移，不改受作品客作权的归属，但美术、摄影作品原件的展览权由原件所有人享有”。本题中，齐其享有该高原件的所有权和展览权，唐某享有除展览权之外著作权中的其他权利.因此A、D逸项借误，B、C选项正确。（2016）","chapter":"第八章 地理标志"},
  {"id":626,"topic":"专题六 商标法","type":"multiple","question":"下列关于地理标志产品的规定，哪些说法！用是正确的（多选）","options":{"A": "地理标志产品自初步认定公告之日起3个月内，任何人可以向国家知识产权局提出异议", "B": "连续3年未在生产销售中使用地理标志产品名称的，任何人可以申请请求撤销地理标志产品保护", "C": "在产地范围外的类似产品上使用受保护的地理标志产品名称的，属于侵犯地理标志产品", "D": "已迁出地理标志产品产地范围的，国家知识产权局注销其地理标志专用标志使用注册登记"},"answer":"BC","explanation":"。《著作权法》第18条规定：“自人为完成法人或者非法人组织工作任务所创作的作品是取务作品.有下列情形之一的职务作品，作者享有暑名权，若作权的其他权利由法人或者非法人组织享有，法人或者非法人组织可以给子作者奖励：（一）主要是利用法人或者非法人组织的物质技术条件创作，并由法人或者非法人组织承担责任的工程设计图、产品设计图、地图、示意图、计算机软件等职务作品…”。本题中，产品设计图为职务作品，张某享有该产品设计图的暑名权，包括复制权在内的若作权的其他权利由甲公司享有，因此A、D选项错误，B、C选项正确。（2017）","chapter":"第八章 地理标志"},
  {"id":627,"topic":"专题七 著作权法","type":"single","question":"下列各项中，哪些风于我国著作权法规定的作品？（多选）","options":{"A": "口述作品", "B": "摄影作品", "C": "曲艺作品", "D": "戏剧作品"},"answer":"B","explanation":"。根据《著作权法》第18条的规定，本题中的产品设计图作品为职务作品，王某仅享有署名权和获得奖励的权利，其他权利归单位，因此A、C、D选项错误，B选项正确。（2019）","chapter":"第一章 著作权客体"},
  {"id":628,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列有关作品的说法正确的是？（多选）","options":{"A": "作品应当具有独创性并能以一定形式表现", "B": "文字作品，是指小说、诗词、散文、论文等以文字形式表现的作品", "C": "反映地理现象、说明事物原理或者结构的地图属于美术作品", "D": "为展示、试验或者观测等用途，根据物体的形状和结构按照一定比例制成的立体模型属于模型作品"},"answer":"ABC","explanation":"。本题中，该论文选属于汇编作品，专利代理师协会是汇编人，享有萧作权，但其行使落作权时，不得便犯原作品的著作权，即汇编权的产生衢要征得原论文萧作权人的回宽，且要支付报酬，他人复制该论文选的问时复们了论文，还应当取得伦文作办的同意，是否俊犯他人的权利和是否对白已的作品享有权利是两个不间的问题，如果代理师协会未经论文落作权人同意而收绿有关论文，则役犯了作者的著作权，但该役权行为并不影响代理师协会对该论文选享有若作权，因此A、B、C选项错误，D选项正确。（2018）","chapter":"第一章 著作权客体"},
  {"id":629,"topic":"专题七 著作权法","type":"multiple","question":"下列哪些不适用我国著作权法的规定？","options":{"A": "某9岁儿童创作的短篇小说", "B": "某电视台报道的单纯事实消息", "C": "某城市交通电子地图", "D": "某法律的官方英文译文"},"answer":"ACD","explanation":"。A选项，《若作权法》第2条第1款规定：“中国公民、法人成者非法人组织的作品，不论是否发表，依本法享有著作权”，甲虽然居住在英国，但仍然是我国公民，其著作权自作品创作完成时自动保护，无需发表，因此A选项错误。B选项，《著作权法》第13条规定：“改编、翻译、注释、整理已有作品而产生的作品，其著作权由改编、跑译、注释、整理人享有，但行使著作权时不得役犯原作品的著作权”，翻译、改编均属于对原作品的演绎，因此乙翻译的小，说、丙改编的电影文学剧本均属于演绎作品，B选项正确。C、D选项，《落作权法》第16条规定：“使用改编、翻译、注释、整理、汇编已有作品而产生的作品进行出版、演出和制作录音录像制品，应当取得该作品的著作权人和原作品的著作权人许可，并支付报酬”，因此丙留要征得演绎作品著作权人乙和原作品著作权人甲的同意并向其支付报卧，丁杂志社爵要征得甲、乙、丙均同意并向其支付费用，C、D选项错误。（法考2012）","chapter":"第一章 著作权客体"},
  {"id":630,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪项不属于著作权保护的作品？（单选）","options":{"A": "公式", "B": "产品设计图", "C": "模型作品", "D": "地图"},"answer":"BD","explanation":"。A选项，自然人享有姓名权，辛某并未对周某的姓名进行任何操作，没有侵犯姓名权，A选项错误。B选","chapter":"第一章 著作权客体"},
  {"id":631,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪些属于我国著作权法保护的客体？（多选）","options":{"A": "某专利审查员发表的关于如何答复审查意见通知书的论文", "B": "某人民法院就某专利权属纠纷案件作出的民事判决书", "C": "化学元素周期表", "D": "某艺术家表演的杂技艺术"},"answer":"BCD","explanation":"。A、B选项，《著作权条例》第15条第2款规定：“若作权无人逃承又无人受遗赠的，其暑名权、改权和保护作品完整权由著作权行玫管理部门保护”，因此A选项错误，B选项正确。C选项，（落作权条例》第17条规定：“作者生前未发表的作品，如果作者未明确表示不发表，作者死亡后50年内，其发表权可由逃示人或者受遗赔人行使：没有继承人又无人受遗赔的，由作品原件的所有人行使”，因此C选项正确。D选项，根据《若作权条例》第14条的规定，合作作者之一死亡后，其对合作作品享有的著作权法第10条第1款第五项至第十七项规定的权利（均属于财产权）无人继承又无人受遗赠的，由其他合作作者享有，因此D选项正确。（2012）","chapter":"第一章 著作权客体"},
  {"id":632,"topic":"专题七 著作权法","type":"multiple","question":"我国《著作权法》不适用于下列哪些选项？","options":{"A": "法院判决书", "B": "《与贸易有关的知识产权协定》的官方中文译文", "C": "《伯尔尼公约》成员国国民的未发表且未经我国有关部门审批的境外影视作品", "D": "奥运会开幕式火炬点燃仪式的创意"},"answer":"AB","explanation":"。《若作权法》第20条第1款规定：作品原件所有权的转移，不改变作品著作权的归属，但美术、摄影作品原件的展览权由原件所有人享有”《著作权条例》第17条规定：“作者生前未发表的作品，如果作者未明确表示不发表、作者死亡后50年内，其发表权可由他承人或者受建赠人行使：没有他承人又无人受进赠的，由作品原件的所有人行使”。本题中，李某的关术作品尿件归王某所有，王某享有该作品的展览权，辛某享有除展览权以外的其他权利，学某死亡后没有继承人又无人受道赠，其发表权由作品原件所有人王某行使，因此A、B选项正确，C、D选项借误。（新编）","chapter":"第一章 著作权客体"},
  {"id":633,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，关于著作权的保护，下列确的是？（单选）","options":{"A": "如果文章不是在我国境内创作的，不受我国著作权", "B": "外国人在我国境内首先出版的文章受我国著作权法", "C": "中国人首先在非洲某国家发表的文章，是否受我国法保护，取决于该非洲国家是否与我国签订了协议或共同关国际条约", "D": "只有已发表的文章受我国著作权法保护"},"answer":"BC","explanation":"。《若作权法）第10条第1款规定：“著作权包括下列人身权和财产权：（一）发表权，即决定作品是否公之于众的权利（三）修改权，即修改或者投权他人修改作品的权利…（七）出租权，即有偿许可他人临时使用视听作品、计算机软件的原件成者复制件的权利，计算机软件不是出租的主要标的的除外：（八）展览权，即公开陈列美术作品、摄影作品的原件或者复制件的权利…”，祝听作品和计算机软件都享有出租权，因此A、D选项错误，B、C选项正确。(2010)","chapter":"第二章 著作权主体"},
  {"id":634,"topic":"专题七 著作权法","type":"single","question":"作家张某撰写一部短篇小说《专利代理师的率福生活》，2016年8月9日开始创作，2016年9月9日创作完成，2016年10月9日办理了作品登记，2016年10月30日该作品在杂志上发表。根据著作权法及相关规定，该作品著作权从何时起产生？（单选）","options":{"A": "2016年8月9日", "B": "2016年9月9日", "C": "2016年10月9日", "D": "2016年10月30日"},"answer":"C","explanation":"。根据（若作权法）第10条第1款的规定，A选项的发表权（决定作品是否公之于众的权利）、B选项的修改权（修改或者投权他人修改作品的权利）、D选项的暑名权（表明作者身份，在作品上暑名的权利）均属于人身权。C选项的展览权（公开陈列关术作品、摄影作品的原件成者复制件的权利）属于财产权。（2013）","chapter":"第二章 著作权主体"},
  {"id":635,"topic":"专题七 著作权法","type":"single","question":"甲小学主持起革2015年学校工作总结并上报区教育局。其间，校办公室主任张某接受该小学指派承担了具体提写工作。根据著作权法及相关规定，下列哪种说法是正确的？（单选）","options":{"A": "甲小学视为该工作总结的作者", "B": "该工作总结的作者是张某，该工作总结的著作权人是甲小学", "C": "该工作总结的署名权由张某享有，该工作总结的复制权由甲小学享有", "D": "该工作总结的著作权由张某享有"},"answer":"B","explanation":"。（著作权法）第10条第1数第（五）项规定：“复制权，即以印刷、复印、拓印、录音、录像、翻录、物拍、数字化等方式将作品制作一份成者多份的权利”。（若作权法）第20条第1款规定：“作品原件所有权的转移，不改交作品若作权的归属，但美术、摄影作品原件的展览权由原件所有人享有”。本题中，王某将字送给申板店，除展览权以外的若作权仍归王某享有，因此乙食品公司犯","chapter":"第二章 著作权主体"},
  {"id":636,"topic":"专题七 著作权法","type":"multiple","question":"某公司主持起草新的绩效考核办法，该公司人力资源部王某接受公司指派承担了具体撰写工作，并上报该公司董事会审议通过。根据著作权法及相关规定，下列哪种说法是正确的？单选）","options":{"A": "该公司视为该绩效考核办法的作者", "B": "该续效考核办法的作者是王某，该绩效考核办法的著作权人也是王某", "C": "该续效考核办法的作者是王某，该绩效考核办法的著作权人是该公司", "D": "该续效考核办法的署名权由王某享有，该续效考核办法的复制权由该公司享有"},"answer":"ABD","explanation":"，A.B选项，《答作权法》第10条第1款规定：“等作权他怡下列人身权和财产权：……（二）容名以，即老明作着身份.在作昌上并名的权利：（三）修改权，即修改成者授权人修改作昌的以利”因此A.B选项正喻。C、D选项，《客作以条例》第15条第1故规定：“作省死亡后.其容作权中的署名权、侈改权和保护作高完整权由作誉的承人戏者义造赠人保护”，暑名权不可施杀，因北C选项错误，D逸项正确。（2016）","chapter":"第二章 著作权主体"},
  {"id":637,"topic":"专题七 著作权法","type":"single","question":"李某以专利代理师常某为原型创作了一部小说。在创作过程中，杨某提供了资金，王某提供了一些咨询意见。根据著作权法及相关规定，下列关于该小说作者的哪种说法是正确的？（单选）","options":{"A": "杨某是作者", "B": "王某是作者", "C": "李某是作者", "D": "常某是作者"},"answer":"B","explanation":"。《著作权法）第10条第1款第（七）项规定：出租权，即有借许可他人签时使用现听作品、计算机软件的原伴成者复制体的权利，计算机软件不是出租的主要标的的除外”，只有规听作品、计算机致件享有出租权，小说不享有出租权：电视剧光盘属于现斤作品之一，出租电视则光盘构成侵犯出租权，但租借供个人观看不构成侵犯出租权：因此A、C、D选项错误，B选项正确。（2016）","chapter":"第二章 著作权主体"},
  {"id":638,"topic":"专题七 著作权法","type":"single","question":"根据著作权法及相关规定，对于不可以分割使用的合作作品，各合作作者就著作权的行使不能协商一致，又无正当理由的，任何一方可以阻止他方行使下列哪些权利？多选）","options":{"A": "转让", "B": "发行", "C": "出质", "D": "许可他人专有使用"},"answer":"C","explanation":"。《蓉作权法》第10条第1款第（七）项规定：“出租权，印有偿许可他人选时使旧视听作品、计算机软件的原件或者复制件的权利，计算机软件不是出祖的三要标的的隙外”，因此只有视听作品和计算机软件享有出租权，A、B、D选项错误，C选项正明(2017)","chapter":"第二章 著作权主体"},
  {"id":639,"topic":"专题七 著作权法","type":"multiple","question":"甲提供资金，乙组织丙和丁以乡村教师戊为原型创作小说《小河弯弯》。在创作中丙写提纲，丁写初稿，丙修改，戊提供了生活素材，乙提供了一些咨询意见。下列哪些选项是错误的？（多选）","options":{"A": "甲提供资金是完成创作的保障，应为作者", "B": "乙作为组织者并提供咨询意见，应为作者", "C": "戊提供了生活素材，应为作者", "D": "丁有权不经甲、乙、丙的同意发表该小说"},"answer":"BCD","explanation":"。本题中，张某已经将美术作品送给王某，王某不设犯所有权：王某将总画作品送出版社出版，役犯了张某的发行权和复制权；王某将绘画作品暑名自己，使犯了张某的暑名权：因此A选项错误，B、C、D选项正确。（2019）","chapter":"第二章 著作权主体"},
  {"id":640,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列关于著作权集体管理组织的哪些说法是正确的？多选）","options":{"A": "著作权人可以授权著作权集体管理组织行使著作权", "B": "著作权集体管理组织被授权后，可以以自己的名义为与著作权有关的权利人主张权利", "C": "著作权集体管理组织可以作为当事人进行涉及著作权的诉讼活动", "D": "著作权集体管理组织只能作为诉讼代理人进行涉及与著作权有关的权利的诉讼活动"},"answer":"AD","explanation":"。本题中，网络公司将张某的绘画作品放到网站上，是发表作品的行为，役权作者的发表权：将绘画作品放到网站上供在线询览下载，是网络传播行为，役权作者的信息网络传插权：因此A、D选项正确，B、C选项信化。（2019）","chapter":"第二章 著作权主体"},
  {"id":641,"topic":"专题七 著作权法","type":"single","question":"赵某和程某合作创作了一部不可分割使用的小说。某出版社与赵某联系欲出版该小说，程某表示坚决反对，两人不能协商一致。根据著作权法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "赵某和程某为该小说的合作作者，共同享有著作权", "B": "未经程某同意，赵某不得许可该出版社出版该小说", "C": "程某无正当理由不得阻止赵某许可该出版社出版该小说，赵某由此所得收益无需分配给程某", "D": "程某无正当理由不得阻止赵某许可该出版社出版该小说，但赵某由此所得收益应当合理分配给程某"},"answer":"A","explanation":"日。木是中，账某为工偏作品的等作权人，出股社未经张某作可复制井史行的行为、促犯了张某的复制权和发行权，未役犯张某的民编权和汇编权，因此A、日逸项正摘，C、D选项错误。（2015）","chapter":"第二章 著作权主体"},
  {"id":642,"topic":"专题七 著作权法","type":"single","question":"甲、乙、丙、丁四人合作创作一部小说，甲欲将该小说许可给某电影制片厂改编后拍成电影，乙则想把它许可给某网站在网络上传播，丙对这两种做法均表示反对，丁则不置可否。对此，下列哪一选项是正确的？（单选）","options":{"A": "如果丙坚持反对，甲、乙均不能将作品许可他人使用", "B": "甲、乙有权不顾丙的反对，将作品许可他人使用", "C": "如果丁同意，则甲、乙可以不顾丙的反对将作品许可他人使用", "D": "如果丁也表示反对，则甲、乙不能将作品许可他人使用"},"answer":"B","explanation":"。A选项，周某在同站发表小说已经行使发表权，因此网站则除小说不役犯史来权，A选项错议。D选项，网站檀自更改署本便犯丁作者的鼎名权，因此日选项正确。C选项，以编作品还应获得作者许可，因此C选项借误。D选项，电视剧的落作权人皮当为制作者面非导测，D选项倡误。（2018)","chapter":"第二章 著作权主体"},
  {"id":643,"topic":"专题七 著作权法","type":"multiple","question":"金某于2012年12月24日创作完成了某小说，并于2013年2月14日发表于某网络文学网站。经金某许可，张某将该小说改编为电影剧本，甲公司作为电影制作者将该剧本拍摄成电影，导演为周某。根据著作权法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "金某自2013年2月14日起对该小说享有著作权", "B": "该电影剧本的著作权由张某享有", "C": "该电影作品的著作权由甲公司享有", "D": "该电影作品的著作权由张某和周某共同享有"},"answer":"ABC","explanation":"。《落作权法实龙条例>第L3条规定：“作者身份不明的作品，由作品原件的所有人行使除名权以外的落作权。作者身份确定后，由作者成者其施承人行使著作权”，因此A、B、C选项正确，D通项借误。（新编）","chapter":"第二章 著作权主体"},
  {"id":644,"topic":"专题七 著作权法","type":"single","question":"某学院委托设计师陈某为其设计院徽，双方约定了院徽的使用范围，但未约定其著作权归属。该学院使用院徽一段时间后，双方对该院徽的著作权归属产生了争议。根据著作权法及相关规定，下列哪种说法是正确的？（单选）","options":{"A": "该学院享有该院微的著作权", "B": "该学院和陈某共同享有该院微的著作权", "C": "陈某享有该院微的著作权、有权要求该学院停止使用", "D": "陈某享有该院微的著作权，但该学院在约定的使用范围内享有使用的权利"},"answer":"A","explanation":"。A通项，支制权晨于若作财产权，由于港作财产权已经超过保护期，丙的行为不构成役犯甲的复制权，因此A选项错误。B逸项，《落作权法>第22条规定：“作者的署名权、修改权、保护作品完整权的保护期不受限制”，因此丙出服署名为另一著名联星丁使犯了甲的署名权，B选项正确。C选项，《民法典》第1014条规定：“任何组织或者个人不得以干涉、盗用、很冒等方式使害他人的姓名权或者名称权”，丙出版社来经丁同意，将自己出版的《大灰>逾话署名为丁，丁对此并不知情，因此丙出版侵犯了丁的姓名权（由于丁没有参与创作，其姓名未经许可被他人使用侵犯的不是名权，因是姓名权），C选项正确。D逸项，丙未经乙同意使用其注册商标，使化了乙的商标权，因此D选项正确。（法考2009，思维扩展）","chapter":"第二章 著作权主体"},
  {"id":645,"topic":"专题七 著作权法","type":"single","question":"根据著作权法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "汇编若干作品的片段，对其内容的选择或者编排体现独创性的作品，属于汇编作品", "B": "汇编作品不包括对不构成作品的数据或者其他材料进行的汇编", "C": "汇编作品的著作权由汇编人和原作品的著作权人共同享有", "D": "汇编作品的著作权由汇编人享有，但行使著作权时不得侵犯原作品的著作权"},"answer":"D","explanation":"。《著作权条例》第13条规定：“作请身份不明的作品，由你品原件的所有人行使除署名权以外的落作权。作者身份确定专随七普作权法后，由作格或格其他来人行他善作仅”，美术信作为原件所有普，享有阶界告权之外的著作权，僵世仰张其只是得高作自怕成凤片。没有加入摄彭的债创性因款，应当认定为对作的复制，张其不是答作权人。四此，A、B.C透项借误，D通项正响（法考2023.思维扩展）","chapter":"第二章 著作权主体"},
  {"id":646,"topic":"专题七 著作权法","type":"multiple","question":"《专利代理师的成长历程》是由李某编剧、张某导演的一部电影，制作者为甲公司，音乐人周某创作了可以单独使用的电影音乐。根据著作权法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "甲公司是该电影的著作权人", "B": "张某是该电影的著作权人", "C": "李某享有署名权，并有权按照与甲公司签订的合同获得报酬", "D": "周某有权单独行使电影音乐的著作权"},"answer":"ABC","explanation":"、A速项，《答作权法》靠22条定：“作普的暑名权、修改权、保护作品完签权的保护期不受限制”.国北人遗项正喻。B图项，自法人的作昌，其发丧权、财产权（爱行权易于时产以之一）的渠护期为作普终生及其死亡后50年，B逸项正。C逸项，（容你仅法》第23条馆3款规定：“视听作品，其···木法信十条第一款那五项至第十七项规定的权利（包括放映权）的限护划为50年，截止于作品首次变表后第50年的12月31日，但作品自剂作完或后S0年内未发表的，木法不再保护”，C选项正确。D选项，《著作权法》事23条第2款规定：“法人或者非法人组织的作品、答作权（晋名权除外）山法人成者非法人祖织享有的双基作品，其变表权的保护期为50年，数止于作品测作完成后第50年的12月31日……”，因此D过项错误。（2010）","chapter":"第二章 著作权主体"},
  {"id":647,"topic":"专题七 著作权法","type":"single","question":"黄某请李某执笔以黄某的人生经历为素材创作一本自传体小说。在小说写作过程中，黄某给李某提供了素材，在小说完成后，黄某向李某支付了5万元，但双方并未约定著作权的归属。根据著作权法及相关规定，下列说法哪些是正确的？（单选）","options":{"A": "该小说的著作权应当由黄某享有", "B": "该小说的著作权应当由李某享有", "C": "该小说的著作权应当由黄某和李某共同享有", "D": "该小说的著作权应当由李某享有，黄某可以无偿使用"},"answer":"A","explanation":"。A选项.（著作权法）靠22長现定：“作者的署名权、协改权、保护作品完整权的限护期不处限明”，国此人选项正确。B、C、D选项、根据（著作权法）第23实的规定，发表权以及改输权、发行权等害作财产权均其有一定保护期限，国北B、C、D追项借误。（折）1S.BD。A、B选项，普作权自作品创你完或之日起产生，因此作品著作权自2014年6月1日完成起产生、A边项误、B选项正确。C、D选项，答作财产仪的保护期截止到张某元亡后第50年的12月31日，即2067年12月31日、因此C通项错很，D通项正喻。（2017）","chapter":"第二章 著作权主体"},
  {"id":648,"topic":"专题七 著作权法","type":"single","question":"术学院教投王某受某公司委托，创作了一件象征该公司文化和精神的雕塑，并按照合同约定将该雕塑原件交付给该公司，但双方未约定该雕塑著作权的归。根据著作权法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "王某享有该雕塑的著作权", "B": "该公司享有该雕塑的著作权", "C": "王某享有该雕塑原件的展览权", "D": "该公司享有该雕塑原件的展览权"},"answer":"A","explanation":"《若作权条的>第6条规定：“若作权白你品则你究成之日起产生”《哲作权法》第23条第1款规定：“自然人的作品，其发表权、木法第10条第1款第五项至第十七项规定的权利的保护期为作者你生及其死亡后50年，截止于作者死亡后第50年的12月31日1如果是合你作品，截止千最后死亡的作死亡后第50年的12月31日“。木期中，李某的发表权自共作品究成之日2022年1月1日产止，岁某于2022年6月1日办世，发表权保护期截止于2022年6月1日之后第50年的12月31日，即2072年12月31日，因此A选项正确，B、C、D选项借误。（新编）","chapter":"第二章 著作权主体"},
  {"id":649,"topic":"专题七 著作权法","type":"single","question":"张某是一名优秀的传记作家，笔下传记人物深受读者喜爱。某出版社准备出版一本关于古代人物曾国藩的传记，自然人王某拟出版一本关于自己成长历程的传记，二者分别向张某约稿，但均未明确约定著作权归属。对此，下列说法正确的是：（多选）","options":{"A": "曾国满传记著作权归出版社所有", "B": "曾国藩传记著作权归张某所有", "C": "王某传记著作权归张某所有", "D": "王某传记著作权归王某所有"},"answer":"D","explanation":"。A、B选项，虽然江某已经去世，其著作权仍然受到保护，因此人选项错误。著作财产权的保护期截止于2068年12月31日，B选项错误。C选项，发表权保护期有时问限制，C选项错误。D选项，《若作权法实施条例》第17条规定：“作者生前未发表的作品，如果作者未明确表示不发表，作者死亡后50年内，其发表权可由幽承人或者受遗赠人行使：没有继永人又无人受遗财的，由作品原件的所有人行使”，因此D选项正确。（2018）","chapter":"第二章 著作权主体"},
  {"id":650,"topic":"专题七 著作权法","type":"multiple","question":"唐某创作了一幅国画，交给某慈善机构拍卖，所得款项全部用于救助失学儿童。齐某在拍卖会上以80万元的价格购得该画。根据著作权法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "齐某享有该画的复制权", "B": "齐某享有该画原件的所有权", "C": "齐某享有该画原件的展览权", "D": "齐某享有该画的发表权"},"answer":"AC","explanation":"。A、B、C选项，《落作权法》第24条第1款规定：“在下列情况下使用作品，可以不经落作权人许可，不向其支付报，但应当指明作者姓名成者名称、作品名称，并且不得影响该作品的正常使用，也不得不合理地损害著作权人的合法权益：（一）为个人学习、研究成者欣赏，使用他人已经发表的作品…（十一）将中国公民、法人或者非法人组织已经发表的以国家通用语官文字创作的作品翻译成少数民族语首文字作品在国内出版发行：（十二）以回读障母者够感知的无障码方式向其提供已经发表的作品…..”，因此A、C选项正确；B选项的说法与上述法条的规定相反，B选项错误。D选项，根据《若作权法》第25条第1政的规定，为实施义务教育和国家教育规划西给写出","chapter":"第二章 著作权主体"},
  {"id":651,"topic":"专题七 著作权法","type":"single","question":"甲公司设计师张某为完成该公司的工作任务，主要利用该公司的物质技术条件创作了产品设计图，并由该公司承担资任。根据著作权法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "张某享有该产品设计图的复制权", "B": "甲公司享有该产品设计图的复制权", "C": "张某享有该产品设计图的署名权", "D": "甲公司享有该产品设计图的署名权"},"answer":"A","explanation":"。A选项符合合理使用的条件，A选项正喻。B选项使用“他人未发花的作品”肾要获得许可，B边项借误。C选项“美回公民”以交“英文论文“不符合曾溶成少歌民族语言的合理使用的情形.C选项借误。D选项条件不全，但即使D选项出股教科书属干国求教育境划，也属干法定许可，应支付投.D选项借误。（2015）","chapter":"第二章 著作权主体"},
  {"id":652,"topic":"专题七 著作权法","type":"single","question":"某设计公司的设计师王某接受该公司指派，绘制了一张产品设计图。该设计图主要是利用设计公司的物质技术条件创作，并由该设计公司承担费任。王某与该设计公司没有就设计图的著作权归属进行约定。根据著作权法及相关规定，下列说法正确的是？（单选）","options":{"A": "王某享有该设计图的著作权，该设计公司可无偿使用", "B": "王某享有该设计图的署名权，该设计公司享有该设计图著作权的其他权利", "C": "王某享有该设计图的发表权、署名权、修改权和保护作品完整权，该设计公司享有该设计图著作权的其他权利", "D": "该设计公司享有该设计图除发表权以外的所有著作权，同时应当给予王某相应的奖励"},"answer":"C","explanation":"。A逸项，《著作权法》第2S茶第1款现定：“为实地义务教育和国家敬育规划百编写出版教科书，可以不经落作权人许可，在教科书中汇编已经发表的作品片段成者短小的文字作品、音乐作品成者单福的炎术作品、摄影作品、田形作品，促应当按规定向答作权人支付报酬…”因此人逸项借误。B逸项，（等作权法》第46条第2款规定：“广播电台、电视台播放他人已发的作品，可以不经著作权人许可，但应当按卧规定支付投前”，因北B逸项借误。C选项，《著作权法》第24条第1款规定：“在下列情况下使用作品，可以不经容作权人许可，不向其支付报酬，但应当指明作者姓名或者名称、作品名称，井且不得形响该作品的正舍使用，也不得不合理地报害著作权人的合法权益：…（十二）以团读障码者能岛知的无障母方式向其提供已经发的作品…”，因此C选项正确。D选项，（落作权法）第42条第2款规定：“录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品，可以不经落作权人许可，但应当按凤规定支付报酬…”，因此D选项错误。（新编）","chapter":"第二章 著作权主体"},
  {"id":653,"topic":"专题七 著作权法","type":"multiple","question":"中华全国专利代理师协会为提高专利代理师的执业水平，促进我国专利代理行业的健康发展，将2001-2020年国内学者已发表的有关创造性的论文之中的佳作，按照论文发表的时间、创造性判断的顺序等汇编而成了《创造性判断论文选》。下列哪些说法是错误的：（多选）","options":{"A": "被选编人论文选的论文已经发表，故代理师协会不需征得论文著作权人的同意", "B": "该论文选具有公益性，故代理师协会不需向论文著作权人支付报酬", "C": "他人复制该论文选只需征得代理师协会同意并支付报酬", "D": "如代理师协会未经论文著作权人同意而将有关论文收录，代理人协会对该论文集仍享有著作权"},"answer":"ABC","explanation":"。歌曲的落作财产权人为唱片公司。A选项中在个人演唱会的演唱行为设犯了若作权人的活表演权。日选项，将歌曲提供给线上平台点播的行为便犯了著作权人的信息网络传播权。C选项，重唱重拍的MV属于视听作品，郑某享有该作品的萧作权，但是演绎作品的著作权人在行使著作权时不得役犯原作品的著作权，郑某投权KTV损放的行为促犯丁原作品的机械表演权。D选项，根据《落作权法》第42条第2款及《著作权条例>第31条的规定，录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品，可以不经著作权人许可，但应当按照规定支付报酬：若作权人加明不许使用的不得使用。落作权人声明不得对其作品制作录音制品的，应当在该作品合法录制为录音制品时声明。唱片公司在初次录郑某的歌曲为唱片时未声明不允许使用，郑某在重新录制时不得要经过唱片公司的许可，但是应当支付报酬。此时，原唱片公司不许可使用的声明不产生法律效力。因此D选项中郑某的行为未役犯唱片公司的若作权。（新编）","chapter":"第二章 著作权主体"},
  {"id":654,"topic":"专题七 著作权法","type":"multiple","question":"居住在美国的我国公民甲创作一部英文小说，乙经许可将该小说翻译成中文小说，丙经许可将该翻译的中文小说改编成电影文学剧本，并向丁杂志社投稿。下列哪些说法是错误的？（多选）","options":{"A": "甲的小说必须在我国或美国发表才能受我国著作权法保护", "B": "乙翻译的小说和丙改编的电影文学剧本均属于演绎作品", "C": "丙只需征得乙的同意并向其支付报酬yUu", "D": "丁杂志社如要使用丙的作品还应当分别征得甲、乙的同但只需向丙支付报酬"},"answer":"ACD","explanation":"。《著作权法》第24条第1款规定：“在下列情况下使用作品，可以不经著作权人许可，不向其支付报酬，但应当指明作者姓名成者名称、作品名称，并且不得影响该作品的正常使用，也不得不合理地损害著作权人的合法权益：·（七）国家机关为执行公务在合理范围内使用已经发表的作品….”，因此A、C、D选项正确，B选项错误。（2019）","chapter":"第二章 著作权主体"},
  {"id":655,"topic":"专题七 著作权法","type":"multiple","question":"周某是厨师和美食博主，拥有相当数量的粉丝。周某制了一段自己做菜的视频，命名为“周氏爆妙龙虾”上传到网络平因为独特的拍摄场景布置、角度选择、音像配合以及巧妙的剪辑到广大网友的追捧，很快点击量就过千万。李某看到视频后，运虾”上传至网络平台，点击是过万，李某侵犯了周某的哪些权（多选）","options":{"A": "姓名权", "B": "肖像权", "C": "名誉权", "D": "著作权"},"answer":"ABD","explanation":"。A选项，《著作权法》第27条第1数规定：“转让本法第10条第1款第（五）项至第（十七）项规定的权利，应当订立书面合同”，因此A选项正确。B选项，《著作权条例》第23条规定：“使用他人作品应当同著作权人订立许可使用合同，许可使用的权利是专有使用权的，应当采取书面形式，但是报社、期刊社刊登作品除外”，因此B选项正确。C选项，《著作权法》第29条规定：“许可使用合同和转让合同中若作权人未明确许可、转让的权利，未经著作权人同意，另一方当事人不得行使”，因此C选项错误。D选项，《若作权条例》第25条规定：“与","chapter":"第二章 著作权主体"},
  {"id":656,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，关于著作权的继承，下列哪些说法是正确的？（多选）","options":{"A": "作者死亡后，其著作权无人继承又无人受遗赠的，其署名权、修改权和保护作品完整权不再受著作权法保护", "B": "作者死亡后，其著作权无人继承又无人受遗赠的，其署名权、修改权和保护作品完整权由著作权行政管理部门保护", "C": "作者生前未发表的作品，如作者未明确表示不发表，且没有继承人又无人受遗赠的，作者死亡后50年内，其发表权由作品原件的所有人行使", "D": "合作作品作者之一死亡的，其对合作作品享有的著作权中的财产权无人继承又无人受遗赠的，由其他合作作者享有"},"answer":"ABCD","explanation":"。A选项，（落作权法）第29条规定：“许可使用合同和转让合同中等作权人未明确许可、转让的权利，未经落作权人同意，另一方当事人不得行使”，因此A选项正确。B.C逸项，《溶作权法》第10条第3款现定：“著作权人可以全部或省佛分转让本条第I款第（五）项至第（十七）项规定的权利，并做原约定成省本法有关规定获得报图”，上述法条规定的第（五）项至第（十七）项权利属于著作权中的财产权，因此B、C逸项正确。D逸项，（落作权法》第27条第1款：“转让本法第10条第1款第（五）项至第（十七）项规定的权利，应当订立书面合同”，因此D逸项正确。（新编）","chapter":"第三章 著作权的内容"},
  {"id":657,"topic":"专题七 著作权法","type":"single","question":"李某是油画《蓟门烟树图》的作者，该油画创作完成后，李某将其卖给王某并交付油面原件，李某死亡后，没有继承人文无人受遗赠，如果李某生前未发表且未明确表示不发表该油画，根据著作权法及相关规定，在李某死亡后50年内，王某可以行2026年专利代理师货格考试使下列哪些权利？（多选）","options":{"A": "展览权", "B": "发表权", "C": "修改权", "D": "复制权"},"answer":"D","explanation":"。A选项，客作权转让应当订立书面合同，正确。B选项，寻名权属于人身权，不能转让。C选项，改竭权属于财产权，可以转让。D选项，一般情况下，合同自成立时生效，D选项错误。（2014）","chapter":"第三章 著作权的内容"},
  {"id":658,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "只有视听作品才享有出租权", "B": "展览权是指公开陈列美术作品、摄影作品原件或者复制件的权利", "C": "发表权是决定作品是否公之于众的权利", "D": "修改权是指改变作品，创作出具有独创性的新作品的权利"},"answer":"ABCD","explanation":"。《作权法）第26条第2款规定：“许可使用合同包括下列主要内容：（一）许可使用的权利种类：（二）许可使用的权利是专有使用权或者非专有使用权：（三）许可使用的地城范图、期间：（四）付留标准和办法….”，因此A、B、C、D选项均正确。(2017)权利","chapter":"第三章 著作权的内容"},
  {"id":659,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪项属于著作权中的财产权？（单选）","options":{"A": "决定作品是否公之于众的权利", "B": "授权他人修改作品的权利", "C": "公开陈列美术作品复制件的权利", "D": "表明作者身份，在作品上署名的权利"},"answer":"ABCD","explanation":"。（若作权条例）第26条规定：“答作权法和本条例所称与著作权有关的权益，是指出版者对其出版的图书和期刊的版式设计享有的权利，表演者对其表演享有的权利，录音录像制作者对其制作的录音录依制品享有的权利，广播电台、电视台对其播放的广指、电视节目享有的权利”，因此A、B、C、D选项均正确。（新编）","chapter":"第三章 著作权的内容"},
  {"id":660,"topic":"专题七 著作权法","type":"multiple","question":"书法家王某为甲饭店题了一幅字，同意其在店内展示。乙食品公司未经王某和甲饭店许可，将该字幅拍摄照片后印制在其生产的产品包装上。根据著作权法及相关规定，下列哪项说法是正确的？（单选）","options":{"A": "乙食品公司侵犯了王某的发表权", "B": "乙食品公司侵犯了王某的复制权", "C": "乙食品公司侵犯了王某的展览权", "D": "乙食品公司侵犯了甲饭店的复制权"},"answer":"ABC","explanation":"。A选项，《作权法》第32条规定：“图书出版者出版图书皮当和著作权人订立出版合间，并支付报酬”，因此人选项正确。B选项，《落作权法》第36条第1款规定：“图书出版者经你者许可，可以对作品侈改、删节，因此B选项正确。C选项，《若你权法》第37条第1款规定：“出版者有权许可成者止他人使用其出版的图书、期刊的版式设计”，因此C选项正确。D选项，《若作权法》第34条第3款规定：“图书出版者重印、再版作品的，应当通知落作权人，并支付报酬……”，因此D选项错误。（2011）","chapter":"第三章 著作权的内容"},
  {"id":661,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列关于著作人身权的哪些说法是正确的？多选）","options":{"A": "署名权是表明作者身份，在作品上署名的权利", "B": "修改权是修改或者投权他人修改作品的权利", "C": "作者死亡后，有继承人的，署名权由其继承人继承", "D": "作者死亡后，有继承人的，修改权由其继承人保护"},"answer":"BD","explanation":"。A、B选项，《落作权法》第35条第1款规定：“著作权人向报社、期刊社投的，自稿件发出之日起15日内未收到报社通知决定刊登的，成者自稿件发出之日起30日内未收到期刊社通知决定刊登的，可以将同一作品向其他报社、期刊社投稿。双方另有约定的除外”，因此A选项错误，B选项正确。C选项，《著作权法》第35条第2款规定：“作品刊登后，除若作权人声明不得转载、摘编的外，其他报刊可以转载或者作为文摘、资料刊登，但应当按照规定向落作权人支付报酬”，因此C选项错误。D选项，《著作权法》第36条第2款规定：“报社、期刊社可以对作品作文宇性修改、刷节。对内容的修改，应当经作者许可”，因此D选项正确。（2009）","chapter":"第三章 著作权的内容"},
  {"id":662,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪种行为侵犯了著作权人的出租权？（单选）","options":{"A": "甲未经著作权人许可，开设店铺出租其购买的武侠小说", "B": "乙未经著作权人许可，开设店铺出租其购买的电视剧光盘", "C": "丙未经著作权人许可，从出租商店租借武伙小说个人阅读", "D": "丁未经著作权人许可，从出租商店租借电视剧光盘个人观看"},"answer":"ACD","explanation":"。《若作权法》第36条第2款规定：“报社、期刊社可以对作品作文字性修改、刷节。对内容的修改，应当经作者许可”，因此A、C、D选项正确，B选项错误。（新编）","chapter":"第三章 著作权的内容"},
  {"id":663,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪种作品的著作权人享有出租权？（单选）","options":{"A": "武侠小说", "B": "戏剧剧本", "C": "计算机软件", "D": "美术作品"},"answer":"ABD","explanation":"。A、B选项，（若作权法）第36条第1款规定：“图书出版者经作者许可，可","chapter":"第三章 著作权的内容"},
  {"id":664,"topic":"专题七 著作权法","type":"multiple","question":"王某将画家张某赠送给自己的20幅绘画作品，署名王某自己送出版社出版，取得10万元稿酬。王某的行为侵犯了张某的下列哪些权利？（多选）","options":{"A": "张某对其作品的财产所有权", "B": "张某对其作品的发行权", "C": "张某对其作品的署名权", "D": "张某对其作品的复制权"},"answer":"ACD","explanation":"。A选项，《落作权法》第3S条第2款规定：“作品刊登后，除落作权人声明不得转设、指偏的外，其他报刊可以转设戏者作为文指、资斜刊登，但应当按质规定向若作权人支付报图”，因此A逸项正确。B选项，《著作权法》第38条规定：“使用他人作品演出，表演者应当取得溶作权人许可，并支付报酬。演出组织者组织演出，由该组织者取得落作权人许可，并支付报酬”，因此B选项错误。C选项，《溶作权法）第46条第2款规定：“广播电台、电视台播放他人已发表的作品，可以不经落作权人许可，但应当按凰规定支付报图”，因此C选项正确。D选项，《著作权法）第42条第3款规定：“录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品，可以不经著作权人许可，但应当按烈规定支付报酬：落作权人声明不许使用的不得使用”，因此D选项正确。（新编）","chapter":"第三章 著作权的内容"},
  {"id":665,"topic":"专题七 著作权法","type":"single","question":"某网络公司未经许可将张某刚刚创作完成的一幅绘画作品放到其网站上，供在线浏览和下载。根据著作权法及相关规定，该网络公司的行为侵犯了张某的下列哪些权利？（多选）相关店强化600题2026年卡利代理牌货格考认","options":{"A": "该出版社侵犯了张某的复制权", "B": "该出版社侵犯了张某的发行权", "C": "该出版社侵犯了张基的改编权", "D": "该出版社侵犯了张某的汇编权"},"answer":"D","explanation":"。A选项，报刊和网站转载该杂文应向甲支付报酬，无偿转载行为构成使权，A选项错误。B、C、D选项，丙将该杂文译成维文在国内出版，是将中国作者的汉文作品翻译为少数民族语盲在国内发行，属于合理使用，不构成侵权；而乙将该杂文译成法文在国内出版，不属于合理使用，未征得甲的同意，也未支付报酬，构成设权，B、C选项错误，D选项正确。（法考2009）","chapter":"第三章 著作权的内容"},
  {"id":666,"topic":"专题七 著作权法","type":"single","question":"周某在甲网站发表小说《公民的名义》，该网站以故事情节设计不合理为由将小说删除。周某交涉无果后，不得已以“木森“为笔名向乙网站投稿，乙网站认为作者原名更有利于作品的传播，遂直接将小说署名更改为作者原名周某并提供在线阅读。丙编剧征得乙网站许可后，将小说改编为电视剧本，最后由著名导演李大路执导拍摄同名电视剧。该剧播出后，迅速走红。对此，下列哪一说法是正确的？（单选）","options":{"A": "甲网站删除小说的行为侵犯了周某发表权", "B": "乙网站更改署名的行为侵犯了周某署名权", "C": "丙编剧改编小说的行为符合著作权法规定", "D": "同名电视剧的著作权人归属于导演李大路"},"answer":"C","explanation":"。A选项，作者有权决定署真实姓名也可以界非真实娃名，A选项得评。B型项，发表权是一次性权利，该诗人在甲月的的发表权已经行使完毕，因此B选项得或，C选项，丙的行为属于法定许可，可以不见该诗人同意，但应当按风规定支付报明，罗此C选项正确。D选项，T网站未经过等作权人该诗人同意而转载该作品构成役权，包甲网站并非落作权人，因此不冒要经过甲网站同意，D选项钳误。（法考2011）","chapter":"第三章 著作权的内容"},
  {"id":667,"topic":"专题七 著作权法","type":"multiple","question":"李某在二手市场购得一张照片，照片上标明其拍摄日期为2022年1月1日，但未标明作者，根据著作权法及相关规定，在作者身份确定之前，李某享有下列哪些权利？（多选）","options":{"A": "发表权", "B": "复制权", "C": "爬览权", "D": "臀名权"},"answer":"ABCD","explanation":"。《著作权法》第39条第1数规定：“表演者对其表演享有下列权利：（一）明表演者身份：（二）保护表演形象不受亚曲：（三）许可他人从现场直播和公开传送其现场表演，并获得报酬（五）许可他人复制、发行、出租录有其表演的录音录像制品，并获得报酬….\"，因此A、B、C、D选项均正确。（2016)","chapter":"第三章 著作权的内容"},
  {"id":668,"topic":"专题七 著作权法","type":"multiple","question":"甲创作并出版的经典童活《大灰狼》超过著作财产权保别上并状准注册。丙出版社随后未经甲和乙同意出版了甲的《大灰狼》室话，并使用了“大灰狼“文字及图形，但署名为另一著名歌星丁，丁对此并不知情。关于丙出版社的行为，下列哪一说法是错误的7（单选）","options":{"A": "侵犯了甲的复制权", "B": "侵犯了甲的署名权", "C": "侵犯了丁的姓名权", "D": "侵犯了乙的商标权"},"answer":"ACD","explanation":"。A选项，《落作权法）第42条第1款规定：“录音录像制作者使用他人作品制作录音录像制品，应当取得若作权人许可，并支付报酬”，因此A选项正确。B选项，（若作权法》第42条第2款规定：“录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品，可以不经著作权人许可，但应当按照规定支付报酬；著作权人声明不许使用的不得使用”，因此B选项错误。C选项，《著作权法》第43条规定：“录音录像制作者制作录音录像制品，应当同表演者订立合同，并支付报酬”，因此C选项正确。D选项，（若作权法）第44条第1款规定：“录音录像制作者对其制作的录音录像制品，享有许可他人复制、发行、出租、通过信息网络向公众传插并获得报酬的权利·……”，因此D选项正确。（2014）","chapter":"第三章 著作权的内容"},
  {"id":669,"topic":"专题七 著作权法","type":"multiple","question":"美术馆收藏了一幅山水画的原件，该幅画是1993年创作完成，但原作者不详。美术馆打算举办一场线上展览活动，请摄影师张某将包括该幅山水画在内的50幅画作拍摄并在网上展出，并加了水印“作者：佚名、拍摄者：张某，美术馆收藏”、李某将山水画下截去掉水印后，在自已的公众号发布，下列说法正确的是？（单选）","options":{"A": "李某侵犯了张某的信息网络传插权", "B": "李某侵犯了张某的署名权", "C": "李某侵犯了张某的发表权", "D": "李某侵犯了美术馆的信息网络传插权"},"answer":"ABC","explanation":"。A、B、C选项，电视连续剧中使用音乐作品作为背景音乐，属于复制行为。音乐作品的若作权人、表演者、录音制","chapter":"第三章 著作权的内容"},
  {"id":670,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "作者的名权的保护期不受限制", "B": "自然人的作品，发表权与发行权保护期一致", "C": "视听作品自创作完成后五十年内未发表的，其放映权不再受著作权法保护", "D": "名权由作者享有、著作权的其他权利由法人享有的职务作品，保护期为作者终生及死亡后五十年2026年中利代江体音格考认"},"answer":"AC","explanation":"。A、B选项，（容作权法》第46条第1款规定：“广腾电合、电说台放他人来发的作品，应当联得著作权人许可，并次付投酬”，因此A远项正身，B逸项借误。C选项，《落作权法》第46条第2数规定：“广播电台、电视台播放他人已发的作品，可以不经著作权人许可，但应当校履规定支付报酬”，因此C逸项正确。D逸项，（著作权法）第48条规定：“电视台播放他人的悦听作品、录像制品，应出取得视听作品奢作权人或者录像制作者许可，并支付报酬：播放他人的录像制品，还应当取得客作权人许可，井支付报酬”，因此D选项错误。（2019）","chapter":"第三章 著作权的内容"},
  {"id":671,"topic":"专题七 著作权法","type":"single","question":"根据著作权法及相关规定，下列哪项权利的保护期不受限制？（单选）","options":{"A": "修改权", "B": "发表权", "C": "改编权", "D": "发行权"},"answer":"A","explanation":"。A选项，李某从2016年8月4日创作完成之日起对小说享有著作权，A选项错误。B选项，张某对其改遍的剧本享有著作权，B选项正确。C选项，甲公司将张某改编的剧本拍成电视剧应取得演译作品著作权人张某以及原作品作者幸某的许可并支付报酬，C选项正确。D选项，乙电视台播放该电视剧（视斤作品）应当取得落作权人甲公司许可并支付报酬，D选项正确。（法考2008)","chapter":"第三章 著作权的内容"},
  {"id":672,"topic":"专题七 著作权法","type":"multiple","question":"2012年1月1日，张某、韩某共同构思一部小说《波涛消的专利战》。2014年6月1日，张某、韩某共同创作完成该小说。韩某于2016年7月1日去世，张某于2017年10月1日去世。根据著作权法及相关规定，以下说法正确的是？（多选）","options":{"A": "该作品著作权自2012年1月1日起产生", "B": "该作品著作权自2014年6月1日起产生", "C": "该作品复制权的保护期截止到2067年10月1日", "D": "该作品复制权的保护期截止到2067年12月31日"},"answer":"AC","explanation":"。本题中，申既是作者又是表演者，乙公司擅自将该歌曲制成彩铃在网络上提供免费下载的行为，役犯了甲的信息网络传播权和表演者权，因此A、C选项正确，B、D选项错误。（法考2007）","chapter":"第三章 著作权的内容"},
  {"id":673,"topic":"专题七 著作权法","type":"multiple","question":"2022年1月1日，作家李某创作完成一部短篇小说。2022年3月1日，李某对该小说办理了版权登记。2022年6月1日，李某因病去世。李某生前未发表该小说，也未明确表示不发表。根据著作权法及相关规定，关于李某发表权的保护期，下列说法哪个是正确的？","options":{"A": "李某的发表权自2022年1月1日产生，截止于2072年12月31日", "B": "李某的发表权自2022年3月1日产生，截止于2072年12月31日", "C": "李某的发表权自2022年3月1日产生，截止于2072年6月1日", "D": "李某的发表权自2022年1月1日产生，截止于2072年6月1日"},"answer":"CD","explanation":"。A选项，发行权属干著作权财产权，保护期为作者终生及其死亡后50年，截止于作者死亡后第50年的12月31日，A选项借误。B选项，修改权属于人身权，保护期不受限制，D选项借误。C选项，表演者对其表演享有的许可他人录音录像：并获得报附的权利，保护期为50年，截止于该表演发生后第50年的12月31日，C逸项正确。D选项，录音录像制作者对其制作的录音录像制品，享有许可他人发制、业行、出租、通过信息网络向公众传插并获得报酬的权利：权利的保护期为50年，截止于该制品首次制作完成后第50年的12月31日，D选项正确。（2013）","chapter":"第三章 著作权的内容"},
  {"id":674,"topic":"专题七 著作权法","type":"multiple","question":"江某早年丧偶，育有两儿一女。其根据自身经历于2017年12月份撰写完成回忆录一册。但碍于个人隐私，犹豫不决，生前未将该回忆录公之于世，但亦未明确表示不发表该回忆录。后江某于2018年5月1日去世。下列说法正确的是：（单选）","options":{"A": "江某已去世，其著作权不再受到法律保护", "B": "该回忆录的著作财产权截止于2068年5月1日", "C": "江某关于回忆录的署名权、发表权、修改权、保护作品完整权的保护期不受限制", "D": "在江某死亡后50年内，其子女可以决定该回忆录是否发表"},"answer":"ABCD","explanation":"。A选项，某公司复制唱片并发行，需要经过著作权人、演唱者、录像制作者的许可并付费，某公司没有经过若作权人的许可，属于役权行为。B选项，某航空公司购买正版录音制品在飞机上插放供乘客欣赏经过了著作权人甲的许可，并未役犯作品的表演权，但是播放录音制品，录音制作者有收取报酬的权利，航空公司仅获得著作权人许可，未向录音制作者支付报酬，仍属于役权行为。C选项，电影公司将歌曲作为插曲，应同时经过甲、乙、丙三人许可，仅经过乙、丙许可，侵犯申的复制权。D选项，某学生役犯了著作权人、录音制作者以及表演者的信息网络传插权。（2018）","chapter":"第三章 著作权的内容"},
  {"id":675,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪些情况下使用作品，可以不经著作权人许可，不向其支付报酬，但不能役犯著作权人依照著作权法享有的其他权利？（多选）","options":{"A": "为个人欣赏使用他人已经发表的作品", "B": "将中国公民已经发表的以少数民族语盲文字创作的作品翻译成国家通用语言文字作品在国内出版发行", "C": "将已经发表的作品改成以阅读障碍者能够感知的无障碍方式提供", "D": "为实施义务教育和国家教育规划而编写出版教科书"},"answer":"AB","explanation":"。A选项，广插电台、电视台有转插权，乙电视台未经许可转插，甲电视台有权禁止，A选项正确。B选项，表演者有许可他人从现场直播和公开传送共现场表演的权利，乙电视台未经许可转插其演唱的行为侵犯了其表演者权，因此B选项正确。C选项，音像店出租录音录像制品，应当取得表演者以及录音录像制作者丙的许可并支付报到，不能只获得二者之一的许可，C选项错误。D选项，音乐作品的著作权人、表演者、录音录像制作者均享有信息网络传据权，因此戊通过信息网络向公众传指仅取得","chapter":"第三章 著作权的内容"},
  {"id":676,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪项行为可以不经著作权人许可，不向其支付报酬？（单选）","options":{"A": "某大学教授张某为研究某课题，少量复制了已经发表的某篇论文供课题组内部使用", "B": "王某为说明某一问题，在作品中引用他人未发表的作品", "C": "某出版社将美国公民李某已经发表的英文论文翻译成少数民族语言文字在我国国内出版", "D": "某出版社为编写出版大学教科书，汇编已经发表的单幅美术作品"},"answer":"AB","explanation":"。A选项，雁灾义演只是不向滨员文付报厕，仿然要观众文付费用，因此不属于合星使用情形，搬某应征得中某同意并文付报酬，A选项正确。B逸项，有级得唱片公可永制谈欧曲应当征得叶某、郝某同意并文付报，B选项正确。C、D迄项，星星电台播放该唱片不妥向落作权人、录音制作者许可，但需要向著作权人、涤音制作者支付报酬，因此无露经叶某和南极解唱片公罚同意，C、D逸项错误。（法考2009","chapter":"第三章 著作权的内容"},
  {"id":677,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪个行为可以不经著作权人许可，不向其支付报酬？（单选）","options":{"A": "开个人演唱会上演唱歌曲", "B": "将唱片上的歌曲提供给线上平台点播", "C": "重唱重拍MV，授权KTV播放", "D": "重录为黑胶唱片，同时支付原唱片公司报酬，但是原唱片公司拒收并声明不许可使用"},"answer":"ACD","explanation":"。床某是剧本的作者，对剧本享有著作权，有权指止他人将则本通过信息网络传插，A选项正确。甲剧团滨员为完成单位的演出任务面进行的表演活动为识务叛演，表演者权由甲剧团享有，甲剧团有权禁止他人未经许可将该歌剧通过信息网络传据，B选项错误，C正确。东方卫视对于该歌剧据放形成的信号，享有广标组织者权，咕哈网未经许可将其电视信号上传至网络.使犯了东方卫视的广播组织者权，D选项正确。综上所述，A、C、D选项正确。（法考2023）利的保护","chapter":"第三章 著作权的内容"},
  {"id":678,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法的规定，关于国家机关为执行公务在合理范围内使用已经发表的作品，下列说法正确的是？（多选）","options":{"A": "可以不经著作权人许可", "B": "应当向著作权人支付报酬", "C": "可以不向著作权人支付报酬", "D": "应当指明作者姓名、作品名称"},"answer":"ABCD","explanation":"。《著作权法）第50条第1款规定：“下列情形可以避开技术措施，但不得向他人提供避开技术措施的技术、装显或者部件，不得役犯权利人依法享有的其他权利：（一）为学校课堂教学或者科学研究，提供少量已经发表的作品，供教学或者科研人员使用，而该作品无法通过正常途径获取：（二）不以管利为目的，以阅读障母者能够感知的无障碍方式向其提供已经发表的作品，而该作品无法通过正常途径获取（三）国农机吴依凰行政、监察、司法权序执行公务：（四）对计算机及其系统成者网络的安全性他理行测试·”，因此A、B、C、D选项均正喻。（2010）","chapter":"第三章 著作权的内容"},
  {"id":679,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "著作权转让合同应当采取书面形式", "B": "著作权人许可录音录像制作者专有使用其作品的，应当订立书面许可使用合同", "C": "著作权转让合同中著作权人未明确转让的权利，视为一并转让", "D": "与著作权人订立专有许可使用合同的，可以向著作权行政管理部门备案"},"answer":"ABCD","explanation":"。（著作权法>第52条规定：”有下列侵权行为的，皮当根据情况，承担停止便事、消除影响、路礼道默、路偿损失等民事贵任：（一）未经著作权人许可，发表其作品的………（三）没有参加创作，为谋取个人名利，在他人作品上暑名的……（九）未经出版者许可，使用其出版的图书、期刊的版式设计的：（十）未经表演者许可，从现场直据或者公开传送其现场表演，或者录制其表演的…….”，因此A、B、C、D选项均正确。(2013)","chapter":"第三章 著作权的内容"},
  {"id":680,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列关于著作权转让的哪些说法是正确的？（多选）","options":{"A": "著作权转让合同中著作权人未明确转让的权利，未经著作权人同意，另一方当事人不得行使", "B": "著作权人只可以转让其依法享有的著作权中的财产权", "C": "著作权人可以全部或者部分转让其著作权中的财产权", "D": "著作权转让合同应当采用书面形式"},"answer":"ABCD","explanation":"。根据《著作权法>第53条的规定，损害公共利益的，可由主管客作权的部门给予行政处罚。A选项属于未经表演者许可，通过信息网络向公众传播其表演；B选项属于未经落作权人许可，复例、发行其作品；C选项属于出版他人享有专有出版权的图书：D选项属于未经录音录像制作者许可，复制、发行录音录像制品；上述A、B、C、D选项均属于著作权法53条规定的情形。（新编）","chapter":"第三章 著作权的内容"},
  {"id":681,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列关于著作权转让合同的说法哪项是错误的？单选）","options":{"A": "著作权转让合同应当采用书面形式", "B": "著作权中的署名权不得转让", "C": "著作权中的改编权可以转让", "D": "著作权转让合同自向著作权行政管理部门备案之日起生效"},"answer":"BD","explanation":"。A、C选项构成侵权但不损害公共利益，仅需承担民事贵任。B、D选项役权同时损害公共利益，可由主管著作权的部门给予行政处罚。（2011改编）","chapter":"第三章 著作权的内容"},
  {"id":682,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，著作权许可使用合同包括下列哪些内容？多选）","options":{"A": "许可使用的权利种类", "B": "许可使用的权利是专有使用权或者非专有使用权", "C": "许可使用的地域范围、期间", "D": "付酬标准和办法"},"answer":"BCD","explanation":"。A、D选项，甲公司和乙公司对产品包装盒的著作权、专利权归属没有约定，著作权、申请专利的权利应属于受托人乙公司，因此A选项错误、D选项正确。B选项，乙在设计、制作包装盒的过程中，未经丙许可复制了丙的画《翠竹》作为背景图案，役","chapter":"第三章 著作权的内容"},
  {"id":683,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪些属于著作权法所称与著作权有关的权益？多选）","options":{"A": "电视台对其播放的电视节目享有的权利", "B": "录音录像制作者对其制作的录音录像制品享有的权利", "C": "出版者对其出版的图书的版式设计享有的权利", "D": "广播电台对其播放的广播节目享有的权利2026年专利代理师资格考达"},"answer":"ABCD","explanation":".（容作以法》第S2茶规定：“有下月侵以行为的，应当展据情况，承担停止使事、准除影响、赔礼道歌、陪信横失等民事费任…..因北A、B、C、D逸项均正，(2016)","chapter":"第四章 与著作权相关的权利"},
  {"id":684,"topic":"专题七 著作权法","type":"multiple","question":"李某将自已创作的一部小说交某出版社出版。根据著作权法及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "该出版社应当与李某订立出版合同，并支付报酬", "B": "经李某许可，该出版社可以对小说进行删节", "C": "该出版社有权禁止其他出版社使用该小说的版式设计", "D": "该出版社再版该小说的，可以不通知李某，但应支付报酬"},"answer":"ABCD","explanation":"。（薯作权纠脉解称>第4条第1收境定：“因使事募作权行赤是起的民事诉讼，由客作权法第S2条、第S3条所现定侵权行力的实境、使权复制品销显地戏者壹对扣押、良告住所地人民法院管管”，因北A、B、C、D逸项均正确。（2016）","chapter":"第四章 与著作权相关的权利"},
  {"id":685,"topic":"专题七 著作权法","type":"multiple","question":"王某将其撰写的一篇论文向某期刊社投稿，且双方没有任何约定。根据著作权法及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "自稿件发出之日起十五日内未收到该期刊社通知决定刊登的，王某可以将该论文向其他期刊社投稿", "B": "自稿件发出之日起三十日内未收到该期刊社通知决定刊登的，王某可以将该论文向其他期刊社投稿", "C": "如果该期刊社刊登了该论文，且王某未声明不得转载，则其他期刊社可以不经王某许可转载该论文，不需向其支付报酬", "D": "该期刊社刊登该论文的，可以对该论文作文字性删节，无需经王某许可"},"answer":"ABCD","explanation":"《容作权法》第S3条规定：“有下列使权行力的，应进根据情况，承推本法第S2条现定的民事费任（停止使害、消康影响、路礼造款、路偿损失）：便权行为同时损害公共利益的，由三管客作权的部门贵令停止便权行为，予以警告，没收造法所得，没收、无营化毁处理使权复明品以及主婴用于制作权复制品的材料、工具、设备等，法经管颌5万元以上的，可以并处违法经营额1倍以上5倍以下的罚款：没有违法经营额、违法经管镇难以计算或者不足5方元的，可以并处25万元以下的罚款：内成犯的，依法追究刑事资任：…（八）制作、出售假冒他人暑名的作品的”，因此A、B、C、D选项均正确。（2018）","chapter":"第四章 与著作权相关的权利"},
  {"id":686,"topic":"专题七 著作权法","type":"multiple","question":"刘某授权某期刊社刊登其一篇文章。根据著作权法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "该期刊社对该文章进行文字性删节，可以不经刘某许可", "B": "该期刊社对该文章内容的修改，可以不经刘某许可", "C": "该期刊社对该文章进行文字性修改，可以不经刘某许可", "D": "该期刊社对该文章内容的修改，应当经刘某许可"},"answer":"ABCD","explanation":"。（作权法）第54条第1、2、3款规定：“侵犯著作权成者与作权有关的权利的，便权人应当按尽权利人因此史到的实际损失或者使权人的造法所得给予赔偿；权利人的实际损失成者使权人的违法所得限以计算的，可以参凤该权利使用费给于醇偿。对故竞侵犯著作权成者与等作仅有具的权利，情节严重的，可以在按风上迅方还确定数额的1倍以上S倍以下给于信，仅利人的实际担失、便权人的违法所目、权利使用费难以计算的，由人民法院根据使权行为的情节，判决给予500元以上500万元以下的赔借。赔借数额还应当包括权利人分制止使权行为所支付的合理开支”，因此入.B、C、D选项均正确。（2011）","chapter":"第四章 与著作权相关的权利"},
  {"id":687,"topic":"专题七 著作权法","type":"single","question":"王某拍摄了一系列自然风光照片，授权某图书出版社在国内出版该摄影集。根据著作权法及相关规定，下列说法正确的是？多选）","options":{"A": "出版过程中，该出版社对该系列照片的再处理应当经王某许可", "B": "出版过程中，该出版社如果想删除该系列照片中的某些照片，应当经王某同意", "C": "该图书的版式设计完成50年内，该出版社有权禁止他人使用其出版的版式设计", "D": "该图书首次出版后10年内，该出版社有权禁止他人使用其出版的该图书的版式设计"},"answer":"C","explanation":"。（著你权法》第54条规定：“侵忆落作权成者与著作权有关的权利的，便权人应当按凰权利人因此受到的实际投失政者便权人的违法所得给子赔偿赔偿数吸还应当包括权利人为制止使权行为所支付的合理开支”，因此甲公司应当给子乙公司的赔偿数额为乙公司的实际损失与乙公司为制止役权行为所支付合理开支的总额，即200万元+10万元=210万元，A、B、D选项错误，C选项正确。（2019）","chapter":"第四章 与著作权相关的权利"},
  {"id":688,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，在著作权人没有事先声明不许使用、转载的情况下，下列哪些行为可以不经著作权人许可，但应当按照规定支付报酬？","options":{"A": "期刊刊登其他期刊已经发表的关于经济问题的时事性文章", "B": "表演者使用他人已经发表的歌曲进行演出", "C": "电视台播放他人已经发表的作品", "D": "录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品"},"answer":"AB","explanation":"。（若作权法）第56条第1欺规定：“若作权人成者与著作权有关的权利人有证据证明他人正在实施或者即将实施役犯其权利、妨碍其实现权利的行为，如不及时制止将会使其合法权益受到难以弥补的损害的，可以在起诉前依法向人民法院中请采取财产保全、责令作出一定行为或者禁止作出一定行为等措施”，因此A、B选项正确，C、D选项错误。（2010）","chapter":"第四章 与著作权相关的权利"},
  {"id":689,"topic":"专题七 著作权法","type":"multiple","question":"甲创作的一篇杂文，发表后引起较大轰动。该杂文被多家报刊、网站无偿转载。乙将该杂文译成法文，丙将之译成维文，均在国内出版，未征得甲的同意，也未支付报酬。下列哪一观点是正确的？（单选）","options":{"A": "报刊和网站转载该杂文的行为不构成侵权", "B": "乙和丙的行为均不构成侵权", "C": "乙的行为不构成侵权，丙的行为构成侵权", "D": "乙的行为构成侵权，丙的行为不构成侵权"},"answer":"ABD","explanation":"。《若作权法》第60条规定：“著作权纠纷可以调解，也可以根据当事人达成的书面仲裁协议或者著作权合同中的仲载条款，向仲裁机构中请仲裁。当事人没有书面仲裁协议，也没有在著作权合同中订立仲裁条款的，可以直接向人民法院起诉”，因此A、B、D选项正确，C选项错误。（新编）","chapter":"第四章 与著作权相关的权利"},
  {"id":690,"topic":"专题七 著作权法","type":"multiple","question":"某诗人署名“漫动的音符”，在甲网站发表题为“天堂向左”的诗作，乙出版社的《现代诗集》收录该诗，丙义务教材编写单位将该诗作为范文编人《语文》教材，丁文学网站转载了该诗。下列哪一说法是正确的？（单选）","options":{"A": "该诗人在甲网站署名方式不合法", "B": "“天堂向左\"在《现代诗集》中被正式发表2026年专利代理邦货格考试", "C": "丙可以不经该诗人同意使用“天堂向左”、但应当按照规定支付报酬", "D": "丁网站未经该诗人和甲网站同意而转载、构成侵权行为"},"answer":"ABCD","explanation":"《牧件答例>第6等规定：“本签列对收体容作权的保护不延及开定您件所用的感得、处理过侵、慢作方法求者敏学股企带，因党A、B、C、D逸项均正确。(2016)","chapter":"第四章 与著作权相关的权利"},
  {"id":691,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪些属于表演者对其表演享有的权利？多选）","options":{"A": "表明表演者身份", "B": "保护表演形象不受歪曲", "C": "许可他人从现场直播和公开传送其现场表演，并获得报酬", "D": "许可他人出租录有其表演的录音录像制品，并获得报酬"},"answer":"AC","explanation":"。A、C选项.（软体票例）靠4袋规定：“受本条例保护的软件必须由开食者信立开发，并已国定宿基停有形彻体上”，因北人、C逸项正身。B、D连项，《收外条例》第[4条第1款规定：“收停营作权自收件开定完成之日起产生”，无罚是记和公开，因此B、D逸项借误。（2020）","chapter":"第四章 与著作权相关的权利"},
  {"id":692,"topic":"专题七 著作权法","type":"single","question":"根据著作权法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "录音录像制作者使用他人作品制作录音录像制品，应当取得著作权人许可，并支付报酬", "B": "录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品，可以不经著作权人许可，无需支付报酬", "C": "录音录像制作者制作录音录像制品，应当同表演者订立合同，并支付报酬", "D": "录音录像制作者对其制作的录音录像制品，享有许可他人通过信息网络向公众传播并获得报酬的权利"},"answer":"A","explanation":"。A选项.《较件条明》第2条规定：“本条例所称计靠机软件是指计算理序及其有关文格”，因此入逸项正喻。日选项，根据《软件票列》馆3景品（一）项的见定，同一计算机提序的源银序和目标但序为同一作品，因此B途项借误。C逸项，（软件条明》第14条第1款规定：“软件薯作权自件开发完成之日起产生”，软件著作权与是否登记无关，回此C选项借误。D选项，《农件条例）第6条规定：本条例对表件答作权的保护不延及开发软件所用的思据、处理过理、操作方法成者数学概念等”，回此D选项错误。（2012）","chapter":"第四章 与著作权相关的权利"},
  {"id":693,"topic":"专题七 著作权法","type":"single","question":"某影视中心在一电视连续剧中为衬托剧情，使用了某正版唱片中的局部音乐作品作为背景音乐。中国音乐著作权协会是该唱片授权行使著作权及相关权利组织，以该使用行为未经许可为由要求该影视中心支付酬劳。该协会的要求被拒绝后，遂向法院起诉。以下说法哪些是正确的？（多选）","options":{"A": "播放行为侵犯了音乐表演者的权利", "B": "播放行为侵犯了音乐作品著作权人的权利", "C": "播放行为侵犯了录音制品制作者的权利", "D": "中国音乐著作权协会不是正当原告"},"answer":"B","explanation":"《软件条例》第8第1款规定“软件著作权人享有下列各项权利：（液权……（二）署名权……（三）修改长（四）复制权…（五）文行权…（六）出权…（七）信息网悠传措以…（八）译以…（九）应当由软件作权人享有的其他权利”，四此A.C、D选项正响、B逸项的保扩作品完整权不属于软件著作权人享有的权利。（2018）","chapter":"第四章 与著作权相关的权利"},
  {"id":694,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，关于广播电台电视合播放者的权利义务，下列哪些说法是正确的7（多选）","options":{"A": "广播电台播放他人未发表的作品，应当取得著作权人许可.并支付报酬", "B": "广播电台播放他人未发表的作品，应当取得著作权人许可，但无需支付报酬", "C": "电视台播放他人已发表的作品，可以不经著作权人许可，但应当支付报酬", "D": "电视台播放他人的录像制品，可以不经著作权人许可，但应当支付报酬"},"answer":"ABCD","explanation":"。（软件条例>第16条规定：“软件的合法复制品所有人享有下列权利：（一）根据使用的得要把该软件装入计算机等具有信息处理能力的装置内：（二）为了防止复制品损坏而制作备份复们品：（三）为了把该软件用于实际的计算机应用环境成者改进其功能、性能而进行必要的修改：但是，除合同另有约定外，未经该软件落作权人许可，不得向任何第三方提供修改后的软件”，因此A、B、C、D选项均正确。（2007）","chapter":"第四章 与著作权相关的权利"},
  {"id":695,"topic":"专题七 著作权法","type":"multiple","question":"李某于2016年8月4日创作完成小说《别来烦我》，2017年3月5日发表于某文学刊物后被张某改编成剧本，甲公司根据该剧本拍成同名电视剧，乙电视台将该电视剧进行播放。对此，下列哪一选项是错误的？（单选）","options":{"A": "李某从2017年3月5日起对小说享有著作权", "B": "张某对剧本享有著作权", "C": "甲公司将该剧本拍成电视剧应当取得李某和张某的许可并支付报酬", "D": "乙电视台播放该电视剧应当取得甲公司许可并支付报酬"},"answer":"ACD","explanation":"。A选项，未约定若作权归属，完成者乙公司享有著作权，A选项正确。B选项，丙公司的侵权行为在起诉时仍在持续，因此未过时效，B选项错误。C、D选项，《软件条例》第30条规定：“软件的复制品持有人不知道也没有合理理由应当知道该软件是役权复制品的，不承担赔偿责任；但是，应当停止使用、销毁该促权复制品”丙公司可以不承担役权赔偿资任，但应停止使用并销毁软件，因此C、D选项正确。（2018）","chapter":"第四章 与著作权相关的权利"},
  {"id":696,"topic":"专题七 著作权法","type":"multiple","question":"甲创作并演唱了《都是玫瑰惹的祸》，乙公司擅自将该歌曲制成彩铃在网络上供免费下载。乙公司侵犯了甲的哪些权利？（多选）","options":{"A": "信息网络传播权", "B": "广播权", "C": "表演者权", "D": "发行权"},"answer":"CD","explanation":"。A、C选项，《软件条例》第7条第1款规定：“软件若作权人可以向国务院著作权行政管理部门认定的软件登记机构办理登记。软件登记机构发放的登记证明文件是登记事项的初步证明”，因此A选项错误，C选项正确。B、D选项，（软件条例）第14条规定：“软件著作权自软件开发完成之日起产生…法人成者其他组织的软件著作权，保护期为50年，截止于软件首次发表后第50年的12月31日，但软件自开发完成之日起50年内未发表的，本条例不再保护”，因此B选项错误，D选项正确。（2010改编）","chapter":"第四章 与著作权相关的权利"},
  {"id":697,"topic":"专题七 著作权法","type":"single","question":"袁某创作完成了一部小说，并发表在某杂志上。此后，经许可，赵某将该小说改编成舞台剧剧本，陈某在某剧院公开演出该舞台剧，某电视台对该演出进行了现场录像并制作成光盘。2026年专利代理萨井格考达根据著作权法及相关规定、下列哪些说法是正确的？（多选）","options":{"A": "袁某对该小说的发行权保护期截止于首次发表后第五十年的12月31日", "B": "赵某对该舞台剧剧本的修改权保护期截止于首次公开汶出后第五十年的12月31日", "C": "陈某享有许可电视台对其表演的该舞台剧进行录像并获得报酬的权利，此项权利的保护期限藏正于该表演发生后第五十年的12月31日", "D": "该电视台享有许可他人对其制作的该光盘进行复制并获得报酬的权利，此项权利的保护期限截止于该光盘首次制作完成后第五十年的12月31日"},"answer":"C","explanation":"。《网路传播条例>第2条规定：“权利人享有的信息同络传播权受落作权法和本条例保护。除法体、行政法脱另有虎定的外，任何组织成者个人将他人的作品、发演、录音录像制品造过信息网悠向公众提供，应当取得权利人许可，并支付报酬”。本题中中网站没有取得落作权人、表演客的许守，也没有向其支付报酬，构成使权行为，C透项正确。（2005）","chapter":"第四章 与著作权相关的权利"},
  {"id":698,"topic":"专题七 著作权法","type":"single","question":"甲创作了一首歌曲《告白气球》，乙获得许可后在个人演唱会上进行演唱，丙唱片公司制成录音制品并公开发行。针对该录音制品，下列哪些属于侵权行为？（多选）","options":{"A": "某公司翻录后进行销售，同时向甲、乙、丙寄送报酬", "B": "某航空公司购买正版唱片后在飞机上广播供乘客欣赏，仅经过甲的许可", "C": "某电影公司将其作为电插曲使用，同时经过乙和丙的许可", "D": "某学生购买正版唱片试听后将其上传到网上供网友个人欣赏"},"answer":"B","explanation":"。A选项，平未经许可上传至乙网站，便害了答作权人的信息网络传播权，八选项说法正确。B选项，乙网站属于明知所链接内容设权情况，应当示担共同级权费任，B选项说法错误。C选项，丙的行为具于回除权利管理电子信息的行为，构成使权，C选项说法正确。D选项，《网络传播条例）第13条规定：“著作权行政管理部门为了查处设犯信息网络传措权的行为，可以要求网络展务提供者提供涉堪侵权的服务对象的姓名（名称）、联系方式、网络地址等资料”，D选项说法正确。（2018）","chapter":"第四章 与著作权相关的权利"},
  {"id":699,"topic":"专题七 著作权法","type":"multiple","question":"甲电视台获得了某歌星演唱会的现场直播权，乙电视台未经许可对甲电视台直播的演唱会实况进行转播，丙广播电台经过许可将现场演唱制作成CD，丁音像店从正规渠道购买到CD用于出租，戊未经许可将丙广播电台播放的演唱会录音录下后上传到网站上传播。下列哪些选项是正确的？（多选）","options":{"A": "甲电视台有权禁止乙电视台的转播", "B": "乙电视台侵犯了该歌星的表演者权", "C": "丁音像店应取得该歌星或丙广播电台的许可并向其支付报酬", "D": "戊的行为只需取得丙广播电台的许可并应向其支付报酬"},"answer":"ACD","explanation":"。A选项，根据《网络传措条例）第14条第1款的规定，对提供信息存储空间或者提供搜索、接限务的网络服务提供者，权利人认为其限务役犯自己的信息网络传播权，可以向该网络股务提供者提交书面通知，通知书应当包合构成侵权的初步证明材料、A选项正确。B选项，根据（网络传播条例>第15条的规定，网络服务提供者接到权利人的通知书后，应当立即删除涉嫌侵权作品，并同时将通知书转送提供作品、表演、录音录像制品的服务对象，B选项借误。C选项，根据（网络传播条例）第16条第1款的规定，服务对象接到网络服务提供者转送的通知书后，认为其提供的作品未侵犯他人权利的，可以向网络服务提供者提交书面说明，要求恢复被刷除的作品，C选项正确。D选项，根据《网络传插条例》第17条的规定，网络服务提供者接到服务对象的书面说明后，应当立即恢复被副除的作品，同时将务对象的书面说明转送权利人。权利人不得再通知网络服务提供者刷除该作品，D选项正确。（2018）竞争法","chapter":"第四章 与著作权相关的权利"},
  {"id":700,"topic":"专题七 著作权法","type":"multiple","question":"叶某创作《星光灿烂》同曲并发表于音乐杂志，郝某在个人举办的贩灾义演中演唱该歌曲，南极熊唱片公司录制并发行郝某的演唱会唱片，星星电台购买该唱片并插放了该歌曲。下列哪些说法是正确的？多选）","options":{"A": "郝某演唱《星光灿烂》应征得叶某同意并支付报酬", "B": "南极熊唱片公司录制该歌曲应当征得郝某同意并支付报酬", "C": "星星电台播放该歌曲应征得叶某同意", "D": "星星电台播放该歌曲应征得南极熊唱片公司同意"},"answer":"BCD","explanation":"。《反不正当党争法>第7条规定：“经管者不得实施下列混济行为，引人误认为是他人商品或者与他人存在特定联系：（一）擅自使用与他人有一定影响的商品名称、包装、装溃等相回成者近似的标识：（三）擅自使用他人有一定影响的城名主体部分、网站名称、网页、新城体账号名称、应用程序名称或者图标等：提自将他人注商标、未注册的驰名商标作为企业名称中的字号使用，或者将他人商品名称、企业名称（包括简称、宇号等）、注册商标、未法册的驰名商标等设置为投索关健司，引人误认为是他人商品或者与他人存在特定联系的，属于前款规定的混滑行为。…”，B、C、D选项属于不正当竞争行为。A选项，未引起误认或与他人存在特定联系的，不属于不正当竞争行为。（前竭）","chapter":"第四章 与著作权相关的权利"},
  {"id":701,"topic":"专题七 著作权法","type":"multiple","question":"陈某创作一部戏剧剧本《等待》，甲剧团安排本单位的演员进行了演出，但没有约定著作权相关的权利归底。东方卫视经授权对该歌舞剧进行了现场直播，咕响网未经许可将东方卫视播出的歌舞剧同步至网络供用户付费点播和下载。下列有关说法正确的是？（多选）","options":{"A": "咕响网侵犯了陈某的信息网络传播权", "B": "咕响网侵犯了甲剧团演员们的信息网络传播权", "C": "咕响网侵犯了甲剧团的信息网络传播权", "D": "咕响网侵犯了东方卫视的广播组织者权"},"answer":"AC","explanation":"。（反不正当竞争法）第9条第1款规定：“经营者不得对其商品的性能、功能、质量、销售状况、用户评价、曾获荣誉等作虚假或者引人误解的商业宣传，疆、误导消费者和其他经营者。”，甲公司宜称“甲公司原装进口实木地板质量佳、服务好”属于虚假宜传，A选项正确，B选项错误。（反不正当竞争法》第12条规定：“经营者不得编造、传措或者指使他人追造、传措虚假信息或者误导性信息，损害其他经营者的商业信誉、商品声誉。”.甲公司宜称“乙公司生产的木地板甲醛严重超标”属于编进、传播虚假信息，报害老争对手的商业信、商品方整，C选项正确，D选项相误。（201G）","chapter":"第四章 与著作权相关的权利"},
  {"id":702,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法的规定，在下列哪些情形下，个人或者组织可以避开技术措施，但不得向他人提供避开技术措施的技术、装置或者部件，也不得侵犯权利人依法享有的其他权利？（多选）","options":{"A": "为学校课堂教学，向少数教学人员提供少量已经发表的作品，而该作品无法通过正常途径获取向其提供已经发表的作品，而该作品无法通过正常途径获取", "C": "国家机关依照行政、司法程序执行公务", "D": "对计算机及其系统或者网络的安全性能进行测试2020年专付代理账劳格考试"},"answer":"AD","explanation":"。根据（反不正当竞伞法>第9条的规定，经情者不得通过组织虚交易、虚假评价等方式，每助其他经管者进行虚们成者引人误解的育业宜传。A选项构成不正当伞。日选项具于商标役权，不构成不正当伞。（反不正当充伞法）第11条规定：“经管者进行有奖俏售不得存在下列信形：：（三）拍笑式的有奖俏售，最商奖的金超过五万元”，C选项不具于不正当竞争行为。（反不正当竞伞法>第14条规定：“平台经管者不得强制成者交相强制平合内经营者按应其定价规月，以低于成本的价裕销售商品、扰乱市运竞令铁序。“因此D选项属于不正当竞争行为。（编）","chapter":"第五章 著作权及其相关权利的保护"},
  {"id":703,"topic":"专题七 著作权法","type":"multiple","question":"根据作权法及相关规定，下列哪些行为侵犯了著作权或与著作权有关的权利？多选）","options":{"A": "张某未经王某许可、发表了王某创作完成的小说", "B": "郑某为谋取个人名利，在许某创作完成的作品上需名", "C": "甲出版社未经乙出版社的许可，使用了其出版的图书的版式设计", "D": "丙电视台未经歌垦张某许可，录制了其表演"},"answer":"ABCD","explanation":"。《反不正当竞争法》第13条规定：“营者利用网从事生产些营活动，应当速守本法的各项规定。经管老不得利用数据和算生、扶未、平合貌则等，通迁题官用户选择或者其他方式，实选下列呼、缺坏其他是营者合法提供的月络产品或者服务正售运行的行为：（一）未些其运经营者同意，在其合法提供的网些户品成老服务中，插入接、强制进行目标民转：（三）是意对其他点营者合法提供的网些户品或者服务实途不兼客：一些营老不得以欺诉、卧迪、造元式者获坏技术管理垂选等不正当方式，获取、使用其证经當者合注共有的数据，报害其促些管普的合法权益、就至市运竞争表序。些营者不再温用平会完则、直接或老指使他人对其他些营者实运宣尝交及、查额评价或考恶意连贷与行为、额害其继色营誉的合法权益，批至市运变争民序。，国政、B、C、D进步三。（201S）","chapter":"第五章 著作权及其相关权利的保护"},
  {"id":704,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪些侵权行为损害公共利益的，可由主管著作权的部门给予行政处罚？多选）","options":{"A": "孙某未经舞蹈家王某许可，现场录制其舞蹈表演并上传到互联网提供免费下载", "B": "赵某未经作家李某许可，擅自复制、发行其小说", "C": "甲出版社出版乙出版社享有专有出版权的图书", "D": "钱某未经丙音像公司许可复制、发行其音像制品"},"answer":"ACD","explanation":"《天不王当竞争法）条14条规定：干经管套不票亚到或老变祖醒制干合内运雷老按服买定价更则、以低于成本齿价站链售商品，我至市运变争秩序。医武A选项具于不正当变争行为，B选项是页户的促髓手衣，不属于不王当竞争行责。《灭不王当竞争生》票15条题定：“大里全业要经营者不再造用自身变全、技术、交高渠连、行业鄂响方等方重药武带运位、要求中小全业接受","chapter":"第五章 著作权及其相关权利的保护"},
  {"id":705,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，下列哪些侵权行为损害公共利益的，可由主管著作权的部门给予行政处罚？多选）","options":{"A": "未经作者许可，发表其论文的", "B": "未经演唱者许可，对其表演制作录音制品并出版的", "C": "未经钢琴演奏者许可，从现场直播其独奏音乐会的", "D": "未经教学视频录像制作者许可，复制发行其制作的录像制品的"},"answer":"ABCD","explanation":"《反不正当宠争法>第10条昂1-3款规定：“经管哲不师买德下月使范前业是出的行为：（一）以些、购嗒、晚、房追、电于使入戏台其他不正当手及笑取权利人的前业秘曾：（二）惊、使用成告允许他人使用以當项乎贫泉的权利人的南业衍密：（三）造尺保密义务或普造反权利人有关你守剪业良留的要求.捷您、使用或普允许他人便用其所军的前业秘留：（四）教交、引谱、学助他人违反保密义务戏者造反权利人有关保守育业秘密的要求，庆取、校建、便用成智免许他人使用权利人的罚业秘密。盈管著以外的其他自然人、法人和非法人组织实地曾散所列造法行为的，视为使犯育业积密。第三人明知或考应加商业秘密权利人的目工、曾贝工成者其他单位、个人实施本条第一款所列造法行为，仍氏取、按愿、使用或者充许他人使用该商业民世的，现为使见商业长密。“本恩中，第三人马某明如技术民断为王其所有取，仿按露、使用该技术秘密，现力使犯声业长密，A、B、D选项属于被露白取的扶木长密的行为，C选项属亏使用奇双的技木民密的行为，回此A、B、C、D选项均三。（新喻）","chapter":"第五章 著作权及其相关权利的保护"},
  {"id":706,"topic":"专题七 著作权法","type":"multiple","question":"甲公司委托乙公司设计并制作产品包装盒，未签订书面合同。内在市场上发现该产品包装盒上未经其许可使用了其画《翠竹》作为背景图案。如果该产品包装盒的整体设计也构成美术图案，下列哪些选项是正确的？多选）","options":{"A": "产品包装盒的版权属于甲公司", "B": "乙公司侵害了丙的复制权", "C": "甲公司对乙公司的侵权行为不知情，但仍构成侵权", "D": "甲公司不能对产品包装盒获得外观设计专利申请权"},"answer":"AC","explanation":"。根据（反不正当党争法）第10条的规定，甲公司员工以安取的手及获得配方、属于经见商业积密，乙公司主明扣的情况下使用该配方，以为使卫贡业长，A、C选项正确（新编）S.ACD。祖据（反不正当竞争法）第10条第4新药现定，贡业长密构或宴件包结：积密世（不为公会所如悉）、保座性（权利人对其采取了担应保密按意）、份值性（其有茵业价值），A、C、D选项正确（新编）","chapter":"第五章 著作权及其相关权利的保护"},
  {"id":707,"topic":"专题七 著作权法","type":"multiple","question":"根据落作权法及相关规定，下列哪些属于役犯著作权承担的民事资任？多选）","options":{"A": "停止役害", "B": "赔偿损失", "C": "消除影响", "D": "赔礼道"},"answer":"BD","explanation":"。提据（反不正当竞争法）策10条的规定，违反保密义是或者违反权利人有关保守责业积密的要交，按信、使用成者元许他人使用其所案亚的商业密、具亏便化商业秘密的行为，A选项祺.B选项正确，（民注典）第501基规定：音拿人在订主合同过目中知悉的商业联密或者吴他包宫保密的他息，元论合所是否成立，不师法厚成号不正音地使同：滑厚、不正当地使同试商业账管成看信息，造成对方损失的、应当开胆赔偿费任”.D选项正响。C选项，甲公司与乙公明街未订立合属，因此不罚示提违约费任，C速项健误。（2006）","chapter":"第五章 著作权及其相关权利的保护"},
  {"id":708,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，因侵犯著作权行为提起的民事诉讼，可以由哪些人民法院管辖？多选）","options":{"A": "侵权行为的实施地人民法院", "B": "侵权复制品储藏地人民法院", "C": "侵权复制品查封扣押地人民法院", "D": "被告住所地人民法院"},"answer":"CD","explanation":"。自行开发研制成者反向工程等方式获再的商业长密，属于王含的科研活动，A、B选项不属于使见责业秘密的行为。经据《反不正见命法》第10条第1、3数的规定，C、D选项层于侵死商业密的行为。（2008）","chapter":"第五章 著作权及其相关权利的保护"},
  {"id":709,"topic":"专题七 著作权法","type":"multiple","question":"甲制作、出售了大量冒用乙署名的作品，其承担责任的方式可能为：（多选）","options":{"A": "根据情况，甲需承担停止侵害、消除影响、赔礼道激、赔偿损失等民事责任", "B": "若甲的行为损害了公共利益，可以由主管著作权的部门责令停止侵权行为，没收违法所得，没收、无害化销毁侵权复制品，并可处以罚款", "C": "若甲的行为损害了公共利益，可以由主管署作权的部门没收主要用于制作侵权复制品的材料、工具、设备等", "D": "若构成犯罪的，可依法道究甲的刑事资任"},"answer":"BD","explanation":"。程据（反不正当竞争法）第10条第4数的规定，克业秘密构成要件之一为它性。A活项收集的公开数据不满足秘密性，不真于商业长密。C选项中如果是发明专利申请，则公元前具示秘密，公开后就不属于积密，题干中只表送“未疫权之首”，该技术可能已起先期公元，不满足性的要求，不晨于商业积密。B、D选项正确。（2018）","chapter":"第五章 著作权及其相关权利的保护"},
  {"id":710,"topic":"专题七 著作权法","type":"multiple","question":"甲公司开发了一套财务管理软件，乙公司未经甲公司同意复制了大量该软件进行销售。甲公司向人民法院提起诉讼要求乙公司赔偿。下列关于赔偿数额的说法哪些是正确的？（多选）","options":{"A": "赔偿数额应当按照甲公司因此受到的实际损失或者乙公司的违法所得计算", "B": "甲公司的实际损失或者乙公司的违法所得难以计算的，2026年专持代理所井格考试赔偿数额可以参照该权利使用费计算", "C": "甲公司的实际损失和乙公司的违法所得不能确定的，由人民法院根据侵权行为的情节判决给于500元以上500万元以下的赔偿", "D": "赔偿数额还应当包括甲公司为制止役权行为所支付的合理开支"},"answer":"ACD","explanation":"。根据（反不正当竞争法）第22条的规定，因不正当竞争行为受到报害的经管者的赔偿数额，按其因被使权所受到的实际损失成者便权人因侵权所获得的利益确定。管者故意实应役犯商业秘密行为，情节严重的，可以在按巨上述方法确定数的一倍以上五倍以下确定赔俭数额。经管者违反本法第七条、第十条规定，权利人因被使权所受到的实际损失、使权人因侵权所获得的利益难以确定的，由人民法院根据权行为的情节判决给子权利人500万元以下的赔位。因此，A、D选项正确，B选项错误。根据《反不正当竞争法》第26条的规定，经营者以及其他自然人、法人和非法人组织违反本法第十条规定役犯商业长密的，由督检查部门贵令停止违法行为，没收违法所得，处十万元以上一百万元以下的罚款；情节产重的，处一百万元以上五百万元以下的罚款。因此，C选项正确。（新编）","chapter":"第五章 著作权及其相关权利的保护"},
  {"id":711,"topic":"专题七 著作权法","type":"multiple","question":"在某案审理中，人民法院确认了以下事实：甲公司侵犯乙公司的著作权，乙公司因此遭受到的实际损失为200万元，乙公司为制止侵权行为所支付的合理开支为10万元。根据作权法及相关规定，甲公司应当给予乙公司的赔偿数额是多少？（单选）","options":{"A": "100万元", "B": "200万元", "C": "210万元", "D": "310万元"},"answer":"ACD","explanation":"。A透项，继望（继管品仲客测）14县的现定，中治昌停收的物所高仲应济具于国泉植份昌伸保护名录中阴票的健物内属皮景种.因此人急项三确。B悉项.《馈物昌停是外》第19条信2质观定：下月名账不每用于品障命名：（一）仅以级字良示的”，因元B进项得识。C逸项，《催所品种冬例）容19条官1良见定：“变于昌种权的植物阶品应出具各造当的名些，并与初同或者相近的值他局成誉中已口品伸内名称相区到….”.因北C逸项正确。D选项，（所品种条明>第17条现定：“授干品神仅的植物歌昌种应进其各一欢性。一致性，是指一个放份品种的持性，录可预用的自感突异外，呼体内个体网相关的持任或者持性费见一致。”，因比D达项正司。（2012改编）","chapter":"第五章 著作权及其相关权利的保护"},
  {"id":712,"topic":"专题七 著作权法","type":"multiple","question":"甲公司有证据证明乙网络公司正在非法传播其享有著作权的某部影视作品，如不及时制止将会使其合法权益受到难以弥补的损害。根据著作权法及相关规定，甲公司可以在起诉前向人民法院申请采取下列哪些措施？多选）","options":{"A": "贵令乙网络公司停止传播行为", "B": "对乙网络公司采取财产保全措施", "C": "责令乙网络公司先行赔付", "D": "没收乙网络公司的服务器"},"answer":"ABD","explanation":"。A、C选项，（植物新品种条例）第2条规定：“本买例所称随物所马种，延指经过人工心育或者对发现的好生植物与以改变，具各旨顾性、持异性、一致性、稳定性和造当命名的拉信及种：”，因此A选项正确，C选项进误，B透项、吸险（植物新品种条到）第14桌的昆定，中读互仅的植物新品种应当具于国震植团品种保护名衰中对举的植物的属或者种，回花日遗项王师。D途项，限据（植物所品种条明）第19条第2款的舰定、违反社会公德的名称不得用于受仅高种的命名，回此D选项正硕（新填）","chapter":"第五章 著作权及其相关权利的保护"},
  {"id":713,"topic":"专题七 著作权法","type":"multiple","question":"根据著作权法及相关规定，当事人可以通过下列哪些途径解决著作权侵权纠纷？（多选）","options":{"A": "根据著作权合同中的仲裁条款，向仲裁机构申请仲裁", "B": "调解", "C": "向国家著作权主管部门申请裁决", "D": "向人民法院起诉"},"answer":"AD","explanation":"。A选项，（拉物新品停条图）邻22基1款想定：中请品种权的，立当商国务民农业衣村、林业草原主管部门提交符合现定倍式县求的中请文件。”主管部门妮定的中请文件中不包合权利要求书，因此A选项误。B选项，（放物所品种条例）第26条规定：“中请人可以在品种权投于前改成者撤回品种权申请。“因此B选项正确。C选项，（植物新品种条例>第16条规定：“投予品种权的植物新品种应当具备特异性。特异性，是指一个植物品种有一个以上性状明显区别于已知品种。”，因此C选项正确。D选项，《植物新品种条例>第18条规定：“投于品种权的植物新品种应当具备稳定性。魏定性，是指一个植物品种经过反复繁殖后或者在特定紫殖周期结求时，其主要性状保持不变。”，D选项描述的是一致性，因此D选项错误。（新编）","chapter":"第五章 著作权及其相关权利的保护"},
  {"id":714,"topic":"专题七 著作权法","type":"multiple","question":"根据计算机软件保护条例的规定，计算机软件著作权的保庐不延及下列哪些内容？多选）","options":{"A": "开发软件所用的思想", "B": "开发软件所用的处理过程", "C": "开发软件所用的操作方法", "D": "开发软件所用的数学概念"},"answer":"ABD","explanation":"。《植物新品种条例）第15条规定：“投予品种权的植物新品种应当具备新颖性。新颖性，是指申请品种权的植物新品种在申请日前该品种繁殖材料、收获材料未被销售、推广，或者经申请权人自行或者同意销售、推广该品种繁殖材料、收获材料，在中国境内未超过1年；在境外，木本、藤本植物品种未超过6年，其他植物品种未超过4年。”，因此A、B、D选项正确，C选项错误。（新编）","chapter":"第六章 计算机软件著作权"},
  {"id":715,"topic":"专题七 著作权法","type":"multiple","question":"根据计算机软件保护条例的规定.下列哪些说法是正确的？（多选）","options":{"A": "计算机软件要获得著作权保护，应当是权利人独立开发的，剩窃他人的计算机软件不能获得著作权保护", "B": "计算机软件要获得著作权保护，应当按照规定进行著作权登记", "C": "计算机软件要获得著作权保护，应当已被固定在某种有形物体上", "D": "计算机软件要获得著作权保护，首先需要公开"},"answer":"AC","explanation":"。A、B选项，根据《植物新品种条例>第9条第1款的规定，执行本单位的任务或者主要是利用本单位的物质技术条件所完成的职务育种，品种权的申请权属于该单位，因此A选项正确，B选项错误。C、D选项，《植物新品种条例》第9条第2款规定：“委托育种或者合作育种，当事人可以在合同中约定品种权的申请权归属：没有合同约定的，品种权的申请权属于受委托完成或者共同完成育种的单位或者个人。”，因此C选项正确，D选项错误。（2013）","chapter":"第六章 计算机软件著作权"},
  {"id":716,"topic":"专题七 著作权法","type":"single","question":"根据著作权法及相关规定，下列关于计算机软件的哪种说法是正确的？（单选）","options":{"A": "受著作权保护的计算机软件包括计算机程序及其有关文档", "B": "同一计算机程序的源程序和目标程序为两个不同的作品", "C": "未经登记的计算机软件不受我国著作权法保护", "D": "对软件著作权的保护延及开发软件所用的处理过程和操作方法"},"answer":"A","explanation":"。《植物新品种条例》第10条规定：“一个植物新品种只能投子一项品种权。两个以上的申请人分别就同一个植物新品种申请品种权的，品种权投于最先申请的人；同时申请的，品种权投子最先完成该植物新品种育种的人。”。本题中，张某和王某于同日申请，但张某完成育种在先，品种权应当投予张某，A选项正确。（2017）","chapter":"第六章 计算机软件著作权"},
  {"id":717,"topic":"专题七 著作权法","type":"multiple","question":"下列不属于软件著作权人享有的权利的是：","options":{"A": "署名权", "B": "保护作品完整权", "C": "出租权", "D": "信息网络传播权"},"answer":"ABC","explanation":"《值物新品种条例>第28茶规定：“中请人缴纳中请费后，国务院农业农村、休业草原主管部门对品种权申请的下列内容进行初少市查：（一）是否属于植物品种保护名录列举的植物具戏者种的范回：（二）是否符合本条例第二十一条的规定：（三）是否符合新额性的规定：（四）值物衍品种的合名是否适当。，A，B、C逸项正确。对于易定性，无法通过初步审查符出结论，D逸项借误。(2018)","chapter":"第六章 计算机软件著作权"},
  {"id":718,"topic":"专题七 著作权法","type":"multiple","question":"根据计算机软件保护条例的规定、计算机软件的合法复制品所有人享有下列哪些权利？多选）","options":{"A": "根据使用的需要把该计算机软件装人计算机等具有信息处理能力的装置内", "B": "为了防止复制品损坏而制作备份复制品", "C": "为了改进计算机软件功能、性能而进行必要的修改", "D": "为了把该计算机软件用于实际的计算机应用环境而进行必要的修改"},"answer":"AB","explanation":"。低据《植物新品神条例》第33条的现定，对驳回品种权中请的决定不展的，申请人可以自收到通知之日起3个月内，向复审变员会请求复审。复审请求符合规定的，复审委员会应当自收到之日起6个月内作出决定，并通知中请人。依法带要检测、测试签定的，所需时同不计算在规定期限内。中请人对复审委员会的复审决定不展的，可以依法提起诉讼。根据《行政诉讼法》的相关规定，对复议决定不服的，可以在收到复议决定书之日起15日内向人民法院提起诉讼，因此A、B选项正确，C、D选项错误。（2011改编）","chapter":"第六章 计算机软件著作权"},
  {"id":719,"topic":"专题七 著作权法","type":"multiple","question":"甲公司委托乙公司开发库存产品信息追踪软件，付费50万元，没有明确约定著作权的归属。后甲公司以高价向善意的丙公司出售了该软件的复制品。丙公司安装使用5年后，丙公司自行开发的同类软件已经在试运行中，此时乙公司起诉要求丙公司停正使用并销毁该软件。下列哪些表述是正确的：（多选）","options":{"A": "该软件的著作权属于乙公司", "B": "乙公司的起诉已超过诉讼时效", "C": "丙公司可不承担赔偿责任", "D": "丙公司应停止使用并销毁该软件"},"answer":"BCD","explanation":"。根据《植物新品种条例）第38条规定，自公告投子品种权之日起，复审委员会可以依据职权或者依据任何单位成者个人的节面请求，对不符合《植物新品种条例）第15条（所颖性）、第16条（特异性）、第17条（一致性）和第18条（稳定性）规定的，宜告品种权元效。当事人对复审委员会的无效宣告决定不限的，可以依法提起诉讼。因此，自审批机关公告投于品种权之日起，印可请求无效，A选项错误，B、C、D选项正确。（2019）","chapter":"第六章 计算机软件著作权"},
  {"id":720,"topic":"专题七 著作权法","type":"multiple","question":"根据计算机软件保护条例的规定，下列说法哪些是正确的？（多选）","options":{"A": "软件著作权人应当向国务院著作权行政管理部门认定的软件登记机构办理登记", "B": "计算机软件著作权自计算机软件登记之日起产生，保护期为自软件登记之日起50年", "C": "软件登记机构发放的登记证明文件是登记事项的初步证明", "D": "法人或者其他组织的软件著作权，自开发完成之日起50年内未发表的不再受保护"},"answer":"ABCD","explanation":"。（植物新品种条例）第7条规定，除法律和本条例另有规定外，任何单位或者个人未经品种权人许可，不得对该投权品种的紫殖材料，实施下列行为：①生产、繁殖和为紫殖面进行处理：②许诺销售、销售；③进口、出口：①为实施本款第1项至第3项行为进行储存。实施前款规定的行为，涉及由未经许可使用投权品种的繁殖材料丙获件的纹在村料的、应当供到品种权人的许可：但是，品种权人对警痘材料已有合理机会行使其权利的险外。对下列品种实地努1数、期2数规定的行为、应当得到授权品种的品种权人的许可：①授权品种的实质性派生品种，但该投权品种本身不是实质性液生品种：与投权品种相比，不具备本条例第十六条规定的明是区别的品种：为商业目的重复使用授权品种进行生户或者繁独的另一品种。因比，A、B、C、D选项中的生产行为均应经品种权人的许可。（新编）","chapter":"第六章 计算机软件著作权"},
  {"id":721,"topic":"专题七 著作权法","type":"multiple","question":"根据信息网络传播权保护条例的规定，下列哪些是信息网络传播权的权利人？（多选）","options":{"A": "著作权人", "B": "表演者", "C": "录音录像制作者", "D": "网络用户"},"answer":"ACD","explanation":"。《植物新品种条例>第7条规定，欧法体和本条例另有规定外，任何单位或者个人未经品种权人许可，不得对该授权品种的繁殖材料，实施下列行为：①生产、紫殖和为繁拉而进行处理：②许诺销售、销售：③进口、出口：④为实施本款第一项至第三项行为进行储存。因此，A、C、D选项的行为应经品种权人许可。（植物新品种条例》第12条规定：“在下别情况下使用授权品种的，可以不经品种权人许可，不向其支付使用费，但是不得便犯品种权人依愿本条例和有关法体、行政法规享有的其他权利：（一）利用投权品种进行育种及其他科研活动；（二）农民自繁自用授权品行的繁殖材料。”，因此B选项具于合理使用的情形。（2016改墙）","chapter":"第七章 信息网络传播权"},
  {"id":722,"topic":"专题七 著作权法","type":"multiple","question":"甲网站与乙唱片公司签订录音制品的信息网络传插权许可使用合同，按约定支付报酬后，即开展了网上原版音乐下载业务。对甲网站的行为应如何认定？（单选）","options":{"A": "是合法使用行为", "B": "构成侵权行为，因为该行为应取得著作权人的许可，而不是取得录音制作者的许可", "C": "构成侵权行为，因为该行为还须取得著作权人、表演者的许可并支付报酬", "D": "构成侵权行为，因为该行为虽然无须取得著作权人的许可，但必须取得表演者的许可"},"answer":"BC","explanation":"。（植物新品种条例》第35冬规定：“品种权的保护期限，自投权公告之日起，木本、本植物为25年，其他植物为20年。”，因此A、D选项错误，B、C选项正确。（2011改编）","chapter":"第七章 信息网络传播权"},
  {"id":723,"topic":"专题七 著作权法","type":"multiple","question":"电视剧《一切为了人民》播出后迅速走红。在该电视剧在各大卫视分集热播阶段，甲聘请丙将播放画面中的“李大路出品，复制必究”的水印去除，然后将全集上传至乙网站供公众免费点播，乙网站为提高浏览量默许甲的行为。权利人江东电视台知晓后，要求乙网站断开链接、删除内容，乙网站接到通知立即采取了上述措施。下列哪一说法是错误的？（单选）","options":{"A": "甲侵害了权利人的信息网络传播权", "B": "乙网站无须对权利人承担侵权责任", "C": "丙实施了删除权利管理电子信息的行为构成侵权", "D": "著作权行政管理部门有权要求乙网站提供甲的姓名和网络地址"},"answer":"ABC","explanation":".A当项，（布设计限护事得）端4集第1收偶定：史须护的与四遗计每多真年值创换，即出步画迎计是创作兽自己的售行勿治见是，年偿具创修时设专四设计出图设计创申普和集现电那创逾想中不是公认的需銀迎计”，人遇项还确，B念项.（与盈设计体护例）愿多品累1歌见建：“与图灸计令有权经国身现如识产设行玻易门望记产生”，B念项五端，C途项，《考图迎计须品明）雷5品见定：本最月鸡市票证计集护，不延及思男、处用过理、地作方遗观数华费分事”，C也项王确，D老项.（句面设计集护易列）B12规定：“布图设计今有权内渠护翻分10年，自年图证计登记身请之已设歌型世很任何地方售次设入商业利用之已起计加，以婴雷三增方增，慢是，无论是咨些记业者受入雨业利司，布回说计自到你完成之日起1S年后，不其更本暑例保护”，D也变德误。（2009）","chapter":"第七章 信息网络传播权"},
  {"id":724,"topic":"专题七 著作权法","type":"single","question":"唱片公司认为千度公司作为存储服务提供者，其网站上提供的涉及唱片公司享有著作权的某歌曲侵犯了自己的信息网络传播权。唱片公司向千度公司提交书面通知要求其删除侵权作品。对此，下列哪些选项是正确的：（多选）","options":{"A": "唱片公司的通知书应当包含该作品构成侵权的初步证明材料", "B": "千度公司接到书面通知后，可在合理时间内删除涉嫌侵权作品，同时将通知书转送该作品的提供者", "C": "该影视作品提供者接到千度公司转送的书面通知后，认为提供的作品未侵犯唱片公司的权利的，可以向千度公司提出书面说明，要求恢复被删除作品", "D": "千度公司收到该影视作品提供者的书面说明后应即恢复被删除作品，同时将该影视作品提供者的说明转送唱片公司的，则唱片公司不得再通知千度公司删除该作品"},"answer":"A","explanation":".A选项，创性的布图设计应核是划者自己的看方旁动成果，但是自己恒工创惊的也可施不具有应创位，A选项正确，B、C途项.（司国设计保护条明>第4某第1教或定，变促护的布西设计应当具有独创性，印注市困设计是划作物售己的看方劳动民集，并旦主实到作过设布图证计三布图设计创作者和复成电培制造书中不是公认西常抱设计”，因是月断是百其有位到性，应望以创作对为具断时同点，日选项砸误：延否其有回边性应以市图设计创作者和集成电悠射进普的凭民纠所，C选项链误。D选项，（有困设计保护套明）第4条第2致规定，受保护由由答规记计组成的市图设计，其进合作为整体应当好合首政规定的冬件”，因此由客规设计组或的有图设计，包可吃具有独创性，D选项错误：（暂指）","chapter":"第七章 信息网络传播权"},
  {"id":725,"topic":"专题八 其他相关法律","type":"multiple","question":"根据反不正当竞争法及相关规定，下列哪种行为风于不正当竞争行为？（多选）","options":{"A": "将他人注册商标作为企业字号，但是并未引起误认为是他人商品或与他人存在特定联系", "B": "使用与他人有一定影响的商品名称、包装、装满等相同或者近似的标识", "C": "使用他人有一定影响的新媒体账号名称", "D": "将他人未注册的驰名商标作为企业字号，引人误认为是他人商品或者与他人存在特定联系"},"answer":"ABD","explanation":"。A、B选项，（布图设计保护条例）第9条第12数规定：“布图设计专有权具于布图设计创作者、本条例另有规定的除外。由法人成者其他组织主持，依据法人成者其他组织的意志因创作、并由法人成者其他组织承担责任的布图设计，该法人成有其他组织是创作书”，A、B选项正确。C选项，《布图设计保护条例>第11条规定：“交委托创作的布图设计，其专有权的归属由姿托人和受托人双方约定：未作的定或者约定不明的，其专有权由受托人享有”，C选项错误。D选项，《布图设计保护条例》第10条规定：“两个以上自然人、法人或者其他组织合作创作的布图设计，其专有权的归属由合作者约定：未作约定或者约定不明的，其专有权由合作者共同享有”，D选项正确。（2010）","chapter":"第一章 反不正当竞争法"},
  {"id":726,"topic":"专题八 其他相关法律","type":"multiple","question":"甲公司在某地电视台投放广告，宣称“甲公司原装进口实木地板质量佳、服务好”，同时捏造虚伪事实宣称“乙公司生产的木地板甲醛严重超标”。此后，乙公司木地板销量锐减。经查明，甲公司生产的实木地板是用国内木材加工而成。根据反不正当竞争法及相关规定，下列关于该广告行为的哪些说法是正确的？多选）","options":{"A": "甲公司宣称“甲公司原装进口实木地板质量佳、服务好”的行为是不正当竞争行为", "B": "甲公司宣称“甲公司原装进口实木地板质量佳、服务好”的行为是正当竞争行为", "C": "甲公司宣称“乙公司生产的木地板甲醛严重超标”的行为是不正当竞争行为", "D": "甲公司宣称“乙公司生产的木地板甲醛严重超标”相美片银化600题2020专村代理静资的中队的行为是正当或争行为"},"answer":"ACD","explanation":"。《布图设计保护条例》第16条规定：“中请布图设计登记，应当提交：（一）布图设计登记申请表：（二）布图设计的复制件或者图样：（三）布图设计已投入商业利用的，提交合有该布图设计的集成电路样品：（四）国务院知识产权行政部门规定的其他材料”，A、C、D选项正确。不需要提交权利要求书，B选项错误。（2009）","chapter":"第一章 反不正当竞争法"},
  {"id":727,"topic":"专题八 其他相关法律","type":"single","question":"根根尺不正当效争法规定、下列哪种行为属于不正当必争行为兴本意）","options":{"A": "将读技术隧密通过学术论文会开表", "C": "将该技术秘密用于生产经营", "B": "将该技术秘密向其好友赵某披露", "D": "将该技术秘密以自己的名义向国家知识产权局申请专利"},"answer":"A","explanation":"。A、B选项，根据《布图设计保护条例》第8条第1款的规定，布图设计专有权经国务院知识产权行政部门登记产生，A选项正确，B选项错误。C、D选项，根据《布图设计保护条例》第12条的规定，布图设计专有权的保护期为10年，自布图设计登记申请之日成者在世界任何地方首次投入商业利用之日起计算，以较前日期为准，C、D选项错误。(2011)","chapter":"第一章 反不正当竞争法"},
  {"id":728,"topic":"专题八 其他相关法律","type":"multiple","question":"甲公司的伙科配方是甲公司核心商业秘密，甲公司员工秘密窃取该科配方后，与甲公司竞争对手乙公司联系，乙公司以高薪聘请该员工，使用其提供的甲公司饮料配方开展生产，获取高额利润。下面说法正确的是？（多选）","options":{"A": "该员工役犯了甲公司商业秘密", "B": "该员工未侵犯甲公司商业秘密", "C": "乙公司的行为视为侵犯商业秘密行为", "D": "乙公司未直接窃取甲公司饮料配方，有应佣员工的自由，乙公司行为不视为侵犯商业秘密行为"},"answer":"ABD","explanation":"。A选项，《布图设计保护条例》第17条规定：“布图设计自其在世界任何地方首次商业利用之日起2年内，未向国务院知识产权行政部门提出登记申请的，国务院知识产权行政部门不再予以登记”，A选项正确。B选项，（布图设计保护条例>第18条规定：“布图设计登记申请经初步审查，未发现驳回理由的，由国务院知识产权行政部","chapter":"第一章 反不正当竞争法"},
  {"id":729,"topic":"专题八 其他相关法律","type":"single","question":"技术信息或者经营信息必须具备下列哪些要件，才能构成反不正当竞争法所称的商业秘密？多选）","options":{"A": "不为公众所知悉", "B": "具有实用性", "C": "权利人对其采取了保密措施", "D": "具有商业价值"},"answer":"B","explanation":"《布图设计保护条例>第19条现定：“每图设计记中请人对回务院知识产以行攻部门放回其登记中请的决定不的，可以自收到通加之日起3个月内，向国务院知识产权行攻部门请求复审…，B逸项正晴，（2014）","chapter":"第一章 反不正当竞争法"},
  {"id":730,"topic":"专题八 其他相关法律","type":"single","question":"甲公司与乙公司数码相机购销协议进行治谈，其间，乙的商业密被甲公司获悉。甲公司将该商业秘密泄漏给乙公司的竞争对手，导致乙的市场份额减。据此、下列哪些说法是正确的？多选）","options":{"A": "甲的行为属于正营的商业行为", "B": "甲的行为侵犯了乙的商业秘密", "C": "甲应当承担违约资任", "D": "甲应当承担损害赔偿资任"},"answer":"B","explanation":"。《布回说计保护条例细则）第28案规定：“当事人对国家扣识产权局作出的下列其体行攻行力不服成有争议的，可以向国家知识产权身行政复议部门中请复议：（一）不予变理市图设计中请的：（二）将布图设计中请现力激回的…：（四）其他设犯当事人合法权监的具体行改行为”A、C选项可以申请复议，D选项属干行政决定，是具体行政行为，可以中请复议。报据《布图设计保护条例》第19条的规定，对驳回登记申请的决定不度的尺能复审，B选项不使中请复议。（2018）","chapter":"第一章 反不正当竞争法"},
  {"id":731,"topic":"专题八 其他相关法律","type":"multiple","question":"根据反不正当竞争法的规定、下列要些行为属于2026年+H只理排侵犯商业秘密的行为？多选）","options":{"A": "李某通过自行研发获得了某项技术，该技术与他人的技术秘密相同", "B": "孙某通过反向工程获得了他人的技术秘密", "C": "唐某违反权利人有关保守商业秘密的要求，向他人披露其掌握的商业秘密", "D": "赵某明知商业秘密是他人以胁迫方式获得的，仍然加以使用"},"answer":"BD","explanation":"。A、B选项，（布图设计保护条例）第17条规定：“市图设计自其在世界任何地方首次商业利用之日起2年内，未向国务院知识产权行政部门提出登记申请的，国务院知识产权行政部门不再予以登记”，A选项错误，B选项正确。C、D选项，《布图设计保护条例》第12条规定：“市国设计专有权的保护期为10年，自布图设计登记中请之日或者在世界任何地方首次投入商业利用之日起计算，以较前日期为准。但是，无论是否登记或者投入商业利用，市图设计自创作完成之日起15年后，不再受本条例保护”，C选项错误，D选项正确。(2012)","chapter":"第一章 反不正当竞争法"},
  {"id":732,"topic":"专题八 其他相关法律","type":"multiple","question":"根据反不正当竞争法的规定，下列哪些采取了保密措施的信息属于商业秘密：（多选）","options":{"A": "某社交网络公司将用户在互联网上公开的个人信息收集后形成的数据集合", "B": "某销售公司将自己多年经营的客户信息整理后形成的信息集合", "C": "某公司研发一种新的产品后将产品的技术特征写成专利申请文件后向国家知识产权局提交专利申请，在未授权之前专利申请文件中载明的信息属于商业秘密", "D": "某文化创意公司策划推出一部新的游戏作品，涉及游戏的具体设计、情节、装备、规则、人物等信息在未向社会披露之前属于商业秘密"},"answer":"ABCD","explanation":"。《市图设计保护条例》第7条规定：“布图设计权利人享有下列专有权：（一）对受保护的布图设计的全部或者其中任何具有独创性的部分进行复制：（二）将受保护的布图设计、含有该布图设计的集成电路戏有合有该焦成电路的物品投入商业利用“，因此A、B.C、D选项均正确。（2014）","chapter":"第一章 反不正当竞争法"},
  {"id":733,"topic":"专题八 其他相关法律","type":"multiple","question":"根据反不正当竞争法的规定，对于侵犯商业秘密的法律费任，下列说法正确的是？（多选）","options":{"A": "赔偿数额按照实际损失或者侵权所获得的利益确定", "B": "经营者故意实施侵犯商业秘密行为，情节严重的，可以在按照法定赔偿额的一倍以上三倍以下确定赔偿数额", "C": "经营者侵犯商业秘密的，由监督检查部门责令停止违法行为，没收违法所得，处以罚款", "D": "权利人受到的实际损失、侵权人所获得的利益难以确定的，由人民法院可以判决给予权利人500万元以下的赔偿"},"answer":"CD","explanation":"。A、B选项，（布图设计保护条例》第23条规定：“下列行为可以不经布图设计权利人许可，不向其支付报酬：（一）为个人目的成者单纯为评价、分析、研究、教学等目的因复制受保护的布图设计的（二）在依据前项评价、分析受保护的布图设计的基础上，创作出具有独例性的布图设计的1（三）对自已独立创作的与他人相同的布图设计进行复制或者将其投入商业利用的”，A、B选项属于合理使用的情形。C、D选项，（布图设计保护条例）第30条第1款规定：“除本条例另有规定的外，未经布图设计权利人许可，有下列行为之一的，行为人必须立即停止便权行为，并承担赔偿责任：（一）复制受保护的布图设计的全部成者其中任何具有独创性的部分的：（二）为商业目的进口、销售或者以其他方式提供受保护的布图设计、含有该布图设计的集成电路或者合有该集成电路的物品的”，C、D选项属于役权行为。（2010）","chapter":"第一章 反不正当竞争法"},
  {"id":734,"topic":"专题八 其他相关法律","type":"multiple","question":"根据植物新品种保护条例及相关规定，下列邮种说法是正确的？（多选）","options":{"A": "申请品种权的植物新品种应当属于国家植物品种保护名录中列举的植物的属或者种", "B": "授子品种权的植物新品种的名称可以仅以数宇组成", "C": "投予品种权的植物新品种应当具备适当的名称，并与相同或者相近的植物属或者种中已知品种的名称相区别", "D": "授于品种权的植物新品种应当具备的一致性，是指一个植物品种的特性，除可预期的自然变异外，体内个体间相关的特征或者特性表现一致"},"answer":"BD","explanation":"。（布图设计保护条例）第33条规定：“在获得合有受保护的布图设计的集成电路或者含有该集成电路的物品时，不知道也没有合理理由应当知道其中含有非法复制的布图设计，而将其投入商业利用的，不视为使权。，前敷行为人得到其中合有非法复制的布图设计的明确通知后；可以继续将现有的存货或者此前的订货投入商业利用，但应当向布图设计权利人支付合理的报酬”，A、C选项错误，B、D选项正确。（2008）","chapter":"第二章 植物新品种保护"},
  {"id":735,"topic":"专题八 其他相关法律","type":"single","question":"根据植物新品种保护条例及相关规定，下列邮些说法是正确的？（多选）","options":{"A": "植物新品种是指经过人工选育的或者对发现的野生植物加以改良获得的新品种", "B": "未列人国家植物品种保护目录中的植物新品种不受植物新品种保护条例保护", "C": "授予品种权的植物新品种应当同时具备新额性、创造性、一致性和稳定性", "D": "违反社会公德的名称不得用于授权品种的命名"},"answer":"B","explanation":"。《布图设计保护条例》第31条规定：“未经布图设计权利人许可，使用其布图设计，即犯其布图设计专有权，引起纠纷的也可以请求国务院知识产权行政部门处理”，因此B选项正确。（2013）","chapter":"第二章 植物新品种保护"},

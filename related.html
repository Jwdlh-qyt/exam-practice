  {"id":437,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，合伙企业向人民法院提起诉讼的，下列哪种说法是正确的？（单选）","options":{"A": "应当以核准登记的字号为原告", "B": "应当以所有合伙人为共同原告", "C": "应当以执行合伙企业事务的合伙人为原告", "D": "可以任一合伙人为原告"},"answer":"B","explanation":"。《行政诉讼法》第20条规定：“因不动产提起的行政诉讼，由不动产所在地人民法院管辖”。本题中，省政府复议后改变了原行改行为，复议机关省政府是被告，应由中级人民法院管辖，由于土地权虞纠纷属于不动产案件，应由不动产所在地法院专属管辖，印争议土地所在地的中级人民法院，因此B选项正确。（法考2007）","chapter":"第三章 行政诉讼参加人"},
  {"id":438,"topic":"专题五 行政诉讼法","type":"multiple","question":"中外合资企业甲认为其企业权益受行政行为使害的，下列说法正确的是？（多选）","options":{"A": "外方投资者可以以自己的名义提起行政诉讼", "B": "企业甲可以以自己的名义提起行政诉讼", "C": "外方投资者若以保护企业权益为由提起行政诉讼，其应以企业甲的名义提起行政诉讼", "D": "外方投资者以保护自己的权益为由提起行政诉讼的，其应以企业甲的名义提起行政诉讼"},"answer":"BD","explanation":"。A选项，市自然资源局直接将市政府的批复予以执行，对某公司的权利义务产生了具体的影响，属干具体行改行为，属于行政诉讼的受案范围，因此A选项错误。B、C选项，1某公罚对批复不服提起行政诉讼，由作出该投复的市政府作为被告，因此B选项正确、C选项销误。D选项，若公可对批复不展中请行政复议，则由你出该批复的市政府作为被中请人，D选项正确。（法考2020改编）","chapter":"第三章 行政诉讼参加人"},
  {"id":439,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列哪些人员可以被委托为诉讼代理人？多选）","options":{"A": "当事人所在社区、单位推荐的公民", "B": "在专利行政案件中，经中华全国专利代理师协会推荐的专利代理师", "C": "基层法律服务工作者", "D": "律师"},"answer":"BCD","explanation":"。（行政诉讼法）第29条规定：“公民、法人或者其他组织同被诉行政行为有利雾关系但没有提起诉讼，成者同案件处理结果有利害关系的，可以作为第三人申请参加诉讼，成者由人民法院通知参加诉讼。人民法院列决第三人承担义务或者减损第三人权益的，第三人有权依法提起上诉”，因此A选项错误，B、C、D选项正确。（2017）","chapter":"第三章 行政诉讼参加人"},
  {"id":440,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列关于行政诉讼被告的说法哪些是正确的？多选）","options":{"A": "公民、法人或者其他组织直接向人民法院提起诉讼的，作出具体行政行为的行政机关是被告", "B": "经复议的案件，复议机关决定维持原具体行政行为的，复议机关是被告", "C": "由行政机关委托的组织所作的具体行政行为，该组织是被告", "D": "两个以上行政机关作出同一具体行政行为的，共同作出具体行政行为的行政机关是共同被告"},"answer":"ACD","explanation":"。《行政诉讼解释》第30条规定：“行政机关的间一行政行为涉及两个以上利客关系人，其中一部分利害关系人对行政行为不服提起诉讼，人民法院应当通知没有起诉的其他利害关系人作为第三人参加诉讼。与行改案件处理结果有利害关系的第三人，可以中请乡加诉讼，成者由人民法院通知其参加诉讼。”。本题中，甲、乙两人被拘留，甲作为原告起诉区公安局，郭某是受害人，属于行政行为中未起诉的利害关系人，法院应当通知郭某作为第三人参加诉讼。乙与甲的诉讼案件处理结果有利害关系，法院可以通知乙作为第三人参加诉讼。丙在该案件中没有受到行政处罚，与甲的诉讼戴判结果没有利害关系，不应作为第三人参加诉讼。因此，A、C选项正确，B选项错误。《行改复议法>第16条规定，申请人以外的同被申请行政复议的行政行为或者行政复议案件处理结果有利害关系的公民、法人或者其他组织，可以作为第三人申请参加行政复议，或者由行政复议机构通知其作为第三人参加行政复议，因此，行政复议机关可以通知郭某作为第三人参加行政复议，D选项正确。（2018改编）","chapter":"第三章 行政诉讼参加人"},
  {"id":441,"topic":"专题五 行政诉讼法","type":"multiple","question":"甲行政机关以违反法律相关规定为由对某公司进行了处罚。该公司不服，向乙复议机关申请行政复议。乙复议机关作出维持原具体行政行为的复议决定。该公司仍不服，2026年专利代理部资格考试欲向人民法院提起诉讼。根据行政诉讼法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "应以甲行政机关为被告", "B": "应以乙复议机关为被告", "C": "甲行政机关所在地人民法院对此案有管辖权", "D": "乙复议机关所在地人民法院对此案有管辖权"},"answer":"BD","explanation":"。《行政诉讼法》第3条第3款规定：专五行政诉讼法“饮诉行改抗失负范人应当出底庄诉。不德出庭的，应当安托行政机关借应的工作人质出庭“《行攻诉论解等》第12H等院是：“行政诉论法信3等靠了款规定的行改优关负费人，包情行皮机关的正职、阶职负费人以庆其信鲁与分管的负费人。行政悦关负黄人出庭应诉的，可以芳行委托一至二名诉讼代人。行次机笑费人不出息的，应当委花行改机关相应的工作人员出庭，不停仪委化体奶出庭”。水题中，区公安局货党人不仅限于区公安局局长，还以包格国职负费人以及贷他参与分管的货党人，行政机关的负费人和工作人员不出庭，不得仪要托律师出庭，四此A.C逸项误，B、D遗项正。（2018）","chapter":"第三章 行政诉讼参加人"},
  {"id":442,"topic":"专题五 行政诉讼法","type":"multiple","question":"某县公安局对张某作出了一项行政处罚决定。张某不服，遂向该县人民政府申请行政复议，但该县人民政府未在法定期限内作出复议决定。张某欲向人民法院提起行政诉讼。根据行政诉讼法及相关规定，下列哪些说法是正确的？多选）","options":{"A": "张某因对该行政处罚决定不服提起诉讼的，应当以该县公安局为被告", "B": "张某因对该行政处罚决定不服提起诉讼的，应当以该县人民政府为被告", "C": "张某因对该县人民政府不作为不服提起诉讼的，应当以该县人民政府为被告", "D": "张某因对该县人民政府不作为不服提起诉讼的，应当以该县人民政府和县公安局作为共同被告"},"answer":"BC","explanation":"。A逸项，《行攻诉讼法》馆28条境定：“当事人一方人效众多的共同诉讼，可以出监事人推选代教人进行诉讼”，四此人途项借误。B逸项，《行政诉讼法》第2T条规定：“当事人一方成双方为二人以上，四同一行政行为发生的行政案件，或者因回类行政行为发生的行政案件、人民法院认方可以合井审理并经当事人同意的，为共同诉讼”，因此B逸项正确。C选项，银据《行政诉讼法》第29条的规定，公民、法人或者共他组织同技诉行政行为有利害关系但没有提起诉讼，或者同案件处理结果有利害关系的，可以作为第三人申请参加诉讼，或右由人民法院通知参加诉讼。因此C选项正确。根据《行政诉讼法》第28条的规定，代表人的诉讼行为对其所代表的当事人发生效力，但代表人变更、放弃诉讼请求或者承认对方当事人的诉讼请求，应当经被代表的当事人同意。因此，D选项错误。（2015改编）","chapter":"第三章 行政诉讼参加人"},
  {"id":443,"topic":"专题五 行政诉讼法","type":"multiple","question":"王某不服某市公安局作出的对其拘留15天的行政处罚，向市人民政府申请复议，市人民政府改为行政拘留10天，王某仍然不服，欲提起行政诉讼。根据行政诉讼法及相关规定，下列关于被告的哪种说法是正确的？（多选）","options":{"A": "应当以该市公安局为被告", "B": "应当以该市人民政府为被告", "C": "可以由市公安局所在地中级人民法院管辖", "D": "可以由市人民政府所在地基层人民法院管辖"},"answer":"BCD","explanation":"。A选项，（行政诉讼解释》第79条第2款规定：“第三人经传票传唤无正当理由拒不到庭，成者未经法庭许可中途退庭的，不发生阻止案件审理的效果”，因此A选项错误。B、C、D选项，李某同执诉行政行为有别害关系。可以作为第三人中请参加诉讼成者由人民法院项如李某参加诉讼，人民法院判决减报学某权丝的、李某有权提起上诉，因此B、C、D选项说法正确。（新编）","chapter":"第三章 行政诉讼参加人"},
  {"id":444,"topic":"专题五 行政诉讼法","type":"multiple","question":"市食药局根据《食品安全法》第一百二十三条，以“用回收食品作为原料生产食品”为由对甲公司作出罚款300万元、责令停产停业一年的决定。甲公司不服，向市人民政府申请行政复议。市人民政府根据《食品安全法》第一百二十四条，以“用超过保质期的食品原料生产食品“为由对申公司作出罚款300万元、资令停产停业一年的决定。甲公司不服，提起行政诉讼。下列说法正确的是：（单选）","options":{"A": "本案的被告是市人民政府", "B": "本案的被告是市食药局和市人民政府", "C": "本案的被告是市人民政府，市食药局是第三人", "D": "若甲拒绝追加市人民政府为被告，人民法院应当通知市人民政府作为第三人参加诉讼"},"answer":"ABC","explanation":"。A选项，根据（行政诉讼法）第26条的规定，复议机关决定维持原行政行为的，价出原行政行为的行政机关和复议机关是共同格告，省人民政府作出价持原行政行为的复议决定，省公安厅和省人民政府是共同被告，因此人选项正确。B、C、D逸项，根据《行政诉讼法》第18条的规定，经复议的案件，山最初你出行改行为的行政机关所在地成复议机关所在地人民法院管辖，根据《行政诉讼解释》第134条的规定，作出原行政行为的行政机关和复议机关为共同被告的，以作出原行政行为的行政机关确定案件的级别管辖。原行政机关是省公安厅，属于省政府部门，应由基层法院管辖。同时，本题属于经复议的案件，因此，可由该省公安厅所在地成者省玫府所在地的基层法院管辖，因此B、C选项正确，D选项错误。（新编）","chapter":"第三章 行政诉讼参加人"},
  {"id":445,"topic":"专题五 行政诉讼法","type":"multiple","question":"张某以患尘肺病为由向区人社局申请工伤认定，区人社局以张某无法提供惠病证据为由，作出不子认定工伤的决定，张某向区政府申请行政复议，区政府以不属于工伤为由，下发了《不予认定工伤复议决定书》，张某以区人社局为被告向法院提起诉讼。下列选项中，人民法院哪一做法是正确的？（单选）","options":{"A": "通知张某追加区政府为共同被告", "B": "告知张某变更被告", "C": "驳回张某的起诉", "D": "驳回张某的诉讼请求"},"answer":"ABC","explanation":"。A、C选项，《行政诉讼解释>第134条第2款规定：“行政复议决定既有维持原行政行为内容，又有改变原行政行为内容或者不予受理申请内容的，作出原行政行为的行政机关和复议机关为共同被告”，本案复议决定既有维持，又有改交，则区市监局和区政府为共同被告，A、C选项错误。B选项，复议机关作共同被告的案件，以作出原行政行为的行政机关确定案件的级别管辖，本案中，作出原行政行为的行政机关为市监局，则为基层法院管辖，B选项错误。D选项，根据《行政诉讼解释》第134条的规定，法院应当告知原告追加被告，原告不同意追加的，法院应当将另一机关列为共同被告。因此D选项正确。本题选择错误选项，则A、B、C选项当选。（法考2022改编）专五行政诉讼法","chapter":"第三章 行政诉讼参加人"},
  {"id":446,"topic":"专题五 行政诉讼法","type":"single","question":"某市市场监督管理局和公安局共同对某公司作出行政处罚决定，该公司不服，以市市场监督管理局为被告向人民法院提起行政诉讼。经过审理，人民法院向原告建议增加市公安局为被告，原告不同意。根据行政诉讼法及相关规定，人民法院应当如何处理？（单选）","options":{"A": "依职权追加市公安局为被告", "B": "通知市公安局以第三人身份参加诉讼", "C": "裁定驳回起诉", "D": "判决驳回原告的诉讼请求"},"answer":"C","explanation":"。物证是借以其外管特任、非成存在块况等米汪明震作事共的皆昌皮底迹，涂改的价交证明是道过收流改的能连未迁明涂改的事实，属千物还，国北A、B、D逸项借候，C选项正鸣。（新）","chapter":"第三章 行政诉讼参加人"},
  {"id":447,"topic":"专题五 行政诉讼法","type":"multiple","question":"甲、乙两村分别位于某市两县境内，因土地权属纠纷向市政府申请解决，市政府裁决争议土地属于甲村所有。乙村不服，向省政府申请复议，复议机关确认争议的土地属于乙村所有。甲村不服行政复议决定，提起行政诉讼。下列哪个法院对本案有管辖权？（单选）","options":{"A": "争议土地所在地的基层人民法院", "B": "争议土地所在地的中级人民法院", "C": "市政府所在地的基层人民法院", "D": "省政府所在地的中级人民法院"},"answer":"ABCD","explanation":"，A逸项，《行攻诉讼证惕规定>第28案第1款规是：人民法院依质行改诉讼法第三十六条规定保全匠语的，可以悦据其体情况，采取壹封、扣押、怡质、永音、录像、复勿、签定、助验、外作资问名录等保全借施”，因北A选项正确。B选项，（行攻诉价法》第33条第1收规定：证惕色怡：（七）签定您见：（八）助叠笔录、现场笔录”因此B逸项正。C逸项，《行攻诉讼解察）第115条第1故规定：“审登亦审中请期间，再中中请人中请人民法院委托婴定、场验的，人民法院不予准许”，回此C选项正喻。D选项，《行政诉讼证据规定）第33条第1款规定：”人民法院可以依当事人中请改者依职权勘验现场”，因此D选项正确。（新）","chapter":"第三章 行政诉讼参加人"},
  {"id":448,"topic":"专题五 行政诉讼法","type":"multiple","question":"市政府对市自然资源局作出批复，同意其提交的收回某公司国有土地使用权方案。市自然资源局收到批复后，将批复交市自然资源局下属的内设机构土地储备中心执行。某公司不服批复，向法院提起行政诉讼。下列说法正确的是？（多选）","options":{"A": "批复不属于行政诉讼受案范围", "B": "被告为市政府", "C": "被告为市自然资源局", "D": "若公司对批复不服申请行政复议，市政府为被申请人"},"answer":"ACD","explanation":"。A、C、D选项，《行政诉讼法）第41条规定：“与本案有关的下列证，原告成者第三人不能自行收集的，可以申请人民法院调取：（一）由国家机关保存面须由人民法院调取的证据：（二）涉及国家秘密、商业秘密和个人隐私的证据…….”，因此A、C、D选项正确。B选项，《行政诉讼法）第40条规定：“人民法院有权向有关行政机关以及其他组织、公民调取证据。但是，不得为证明行致行为的合法性调取被告作出行政行为时未收集的证据”，因此B选项错误。（新酒）","chapter":"第三章 行政诉讼参加人"},
  {"id":449,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，下列关于行政诉讼参加人的哪些说法是正确的？（多选）","options":{"A": "公民、法人或者其他组织同被诉行政行为有利害关系但没有提起诉讼，不得作为第三人申请参加诉讼", "B": "公民、法人或者其他组织同案件处理结果有利害关系的，可以由人民法院通知参加诉讼", "C": "人民法院判决第三人承担义务的，第三人有权依法提起上诉", "D": "人民法院判决减损第三人权益的，第三人有权依法提起上诉"},"answer":"D","explanation":"。（行政诉讼解释》第41条规定：“有下列情形之一，原告成者第三人要求相关行政执法人员出庭说明的，人民法院可以准许：（一）对现场笔录的合法性成者真实性有异议的：（二）对扣押财产的品种或者数量有异议的1（三）对检验的物品取样成者保管有异议的：（四）对行政执法人员身份的合法性有异议的：（五）得要出庭说明的其他情形。“因此A、B、C选项法院于以准许，D选项法院不予准许。（2019）","chapter":"第三章 行政诉讼参加人"},
  {"id":450,"topic":"专题五 行政诉讼法","type":"multiple","question":"甲、乙、丙三友人一同在某餐厅就餐。由于餐品质量与餐厅经理郭某产生纠纷。纠纷过程中，将餐厅经理郭某打伤。区公安局将甲拘留10日，乙拘留5日。甲不服，提起行政诉讼。关于该案的第三人，下列说法正确的是：（多选）","options":{"A": "法院可以通知乙作为第三人参加诉讼", "B": "法院可以通知丙作为第三人参加诉讼", "C": "法院应当通知郭某作为第三人参加诉讼", "D": "若甲不服向区人民政府复议的，区人民政府可以通知郭某作为第三人参加复议"},"answer":"ACD","explanation":"。A、B选项，《行政诉讼法》第34条规定：“执告对作出的行政行为负有举证责任，应当提供作出该行政行为的证鹅和所依据的规范性文件。被告不提供成者无正当理由逾期提供证据，视为没有相应证据…”，因此A逸项正确，B选项借误。C选项，《行政诉讼法》第36.条第2款规定：“原告或者第三人提出了其在行政处理程序中没有提出的理由成者证据的，经人民法院准许，被告可以补充证据”，因此C选项正确。D选项，（行政诉讼法》第37条规定：“原告可以提供证明行政行为违法的证据。原告提供的证据不成立的，不免除被告的举证贵任”，因此D选项正确。（2017）","chapter":"第三章 行政诉讼参加人"},
  {"id":451,"topic":"专题五 行政诉讼法","type":"single","question":"甲、乙、丙三友人一同在某餐厅就餐。由于餐品质量与餐厅经理郭某产生纠纷。纠纷过程中，将餐厅经理邪某打伤。区公安局将印拘留10日，乙拘留5日。甲不服，提起行政诉讼。区公安局出庭应诉，下列说法正确的是：（多选）","options":{"A": "区公安局负资人出庭的，应当由区公安局局长出庭应诉", "B": "区公安局局长出庭应诉的，可以另行委托1-2名诉讼代理人", "C": "区公安局负资人和工作人员不出庭，委托2名律师出庭", "D": "主管相关业务的副局长属于行政机关负资人"},"answer":"A","explanation":"。（行政诉讼法》第67条第1款规定：“被告应当在收到起诉状副本之日起15日内向人民法院提交作出行政行为的证据和所依据的规范性文件，并提出答料状…….”，因此A选项正确，B、C、D选项错误。（新编）","chapter":"第三章 行政诉讼参加人"},
  {"id":452,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列关于行政诉讼参加人的哪些说法是正确的？多选）","options":{"A": "当事人一方人数众多的共同诉讼，应当由法院指定代表人进行诉讼", "B": "当事人一方或者双方为二人以上，因同一行政行为发生的行政案件为共同诉讼", "C": "公民、法人或者其他组织同被诉行政行为有利害关系但没有提起诉讼的，可以作为第三人申请参加诉讼", "D": "代表人变更放弃诉讼请求，可以不经被代表的当事人同意"},"answer":"ABCD","explanation":"。《行政诉讼解释》第35条规定：“原告或者第三人应当在开庭审理前或者人民法院指定的交换证据清单之日提供证据。因正当事由申请延期提供证据的，经人民法院准许，可以在法庭调查中提供原告成者第三人在第一审程序中无正当事由未提供而在第二审程序中提供的证据，人民法院不子接纳”，因此A、B、C、D选项均正确。（2018）","chapter":"第三章 行政诉讼参加人"},
  {"id":453,"topic":"专题五 行政诉讼法","type":"multiple","question":"李某以同事王某对其寻蚌滋事为由，向某区公安局报案，某区公安局立案调查后，对王某作出治安拘留十日的行政处罚。王某不服，提起行政诉讼。根据行政诉讼法及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "当李某作为第三人参加诉讼，其经传票传唤无正当理由拒不到庭，或者未经法庭许可中途退庭的，案件审理中止", "B": "李某可以由人民法院通知其作为第三人参加诉讼", "C": "李某可以作为第三人申请参加诉讼", "D": "李某作为第三人参加诉讼，人民法院判决减损其权益的，李某有权提起上诉"},"answer":"ABCD","explanation":"。A、B选项，《行政诉讼法》第34条规定：“被告对作出的行政行为负有举证贵任，应当提供作出该行政行为的证据和所依据的规范性文件”，因此A、B选项正身。C、D选项，《行政诉讼法》第42条规定：“在证据可能灭失或者以后难以取得的情况下，","chapter":"第三章 行政诉讼参加人"},
  {"id":454,"topic":"专题五 行政诉讼法","type":"multiple","question":"李某对某省公安厅对其作出的行政行为不服，向省人民政府申请行政复议，省人民政府作出的复议决定维持原行政行为。李某仍不服，向人民法院提起诉讼，下列哪些说法是正确的？多选）","options":{"A": "该行政诉讼案件中某省公安厅和省人民政府是共同被告", "B": "李某可以向省公安厅所在地的基层人民法院提起诉讼", "C": "李某可以向省人民政府所在地的基层人民法院提起诉讼", "D": "李某可以向省人民政府所在地的中级人民法院提起诉讼"},"answer":"ABCD","explanation":".（行政诉俭法）带41券定：“与长震有失的下列证，展告也普常三人不能自行收联的，可以中请人民法院调放：（一）由国术机失体存诗须由人底法院词放的证据：（二）交国术债、前业债和个人高私的证据.…“，因此A.B、C.D逸项片正吻。（2015）","chapter":"第三章 行政诉讼参加人"},
  {"id":455,"topic":"专题五 行政诉讼法","type":"multiple","question":"贝果公司在生产经营中存在用非食品原料生产食品的违法行为。区市监局对其作出没收用于违法生产经营的非食品原料、没收违法所得、罚款10万元的行政处罚。贝果公司不服，向区政府申请复议，区政府将罚款改为8万元后，维持了其他处罚。贝果公司不服，提起诉讼，下列说法哪些是错误的？多选）","options":{"A": "本案被告是区市监局", "B": "本案可以由区市监局所在地的中院管辖", "C": "本案被告是区政府", "D": "如果贝果公司以区政府为被告提起诉讼且拒绝追加被告，法院应当追加区市监局为共同被告"},"answer":"BD","explanation":"。A造项，法院审限行改爱体，只有設诉行政行为才可以成疗泌院的审理对象，当事人行为不是法院审理对策，因北法院只审登行攻处罚的合法性，不审登药厂行力的合法作，A逸项得候。B选项，（行攻诉讼消》第37条规定：“限告可以提供证明行攻行力违法的证损。原告提供的证据不成立的，不免除告的华证费任”，进北B边项正确。C选项，《行政诉讼证据规定》第43采规定：”当事人中请证人出庭作证的，应当在华证湖度届满前是出，井经人民法院许可。人民法院准许证人出庭作证的，应当在开庭审理前通知证人出庭作证。当事人在庭审过程中要求证人出庭作证的，法可以低据审理案件的其体情况，决定是否准许以及是否延期中理”，C选项的表逃过干绝对，因此C选项册误。D选项，法院投判行玖案件，应当以证据证明的案件事实为依培的说法正确。（法考2012，思维扩晨）L1.ABCD。概据《行政诉讼证据规定》第24条的规定，当事人中请人民法院调取证据的，应当在举证期展内提交调取证据中请节。因此，中请法院调敢证据应当在举证期限届满前提出，A选项正确。根据（行政诉讼解释》第135条的规定，作出原行政行为的行政机关和复议机关对原行政行为合法性共同承担举证贵任，可以由其中一个机关实施举证行为。本题中，应由原行政机关区交警大队和复议机关区改府共同对罚款500元决定的合法性承担举证资任，B选项正确。根据（行政诉讼解释》第135条的约定，复议机关作共同披告的案件，复议机头在复议程序中依法收集和补充的证据，可以作为人民法院认定复议决定和原行政行另合法的依据，因此，C选项正确。D选项，据（行政诉讼证据规定》第38条规定，人民法院依职权调取的证据，由法庭出示，并可就调取该证据的情况进行说明，听取当事人意见。因此，法院依职权调取的证据，不冒要进行质证，D逸项正确。（法考2024，给扩展）","chapter":"第三章 行政诉讼参加人"},
  {"id":456,"topic":"专题五 行政诉讼法","type":"multiple","question":"动物卫生监督机构在监督检查过程中，发现甲某涂改了检疫证明的数量和日期，动物卫生监督管理机构对其进行了行政处罚。彼涂改的检疫证明在证据的分类上属于7（单选）","options":{"A": "书证", "B": "视听资料", "C": "物证", "D": "当事人陈述"},"answer":"ABD","explanation":"。A选项，《行政诉讼解）仍56条第1款规定：“法律、法规规定应当先中请复议，公民、法人成者其他组织未中请复议直接提起诉讼的，人民法院裁定不子立案”，即不子受理，因此A选项正确。B选项，根据《行政诉讼法》第13条的规定，法律规定由行政机关最终裁决的行政行为，人民法院不于受理，因此B选项正确。C选项，根据《行政诉讼法》第45条的规定，复议机关逾期不作决定的，中请人可以在复议期满之日起15日内向人民法院提起诉讼，因比C选项错误。D选项，《行政诉讼解释》第60条第1款规定：“人民法院裁定准许原告缴诉后，原告以同一事实和理由亚新起诉的，人民法院不子立案”，即不予受理，因此D选项正确。（2012）","chapter":"第四章 证据"},
  {"id":457,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "鉴定和勘验均是证据保全措施之一", "B": "鉴定意见和勘验笔录均是证据种类之一", "C": "审查再审申请期间，再审申请人申请人民法院委托鉴定、勘验的，人民法院不予准许", "D": "人民法院可以依当事人申请或者依职权勘验现场"},"answer":"D","explanation":"。《行政诉讼法》第46条第1款规定：“公民、法人成者其他组织直接向人民法院提起诉讼的，应当自知道或者应当知道作出行政行为之日起6个月内提出…….”，因此A、B、C选项错误，D选项正确（2019）","chapter":"第四章 证据"},
  {"id":458,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，关于人民法院调查取证，下列说法哪些是正确的？（多选）","options":{"A": "涉及商业秘密的证据，原告或者第三人不能自行收集的，可以申请人民法院调取", "B": "人民法院可以为证明行政行为的合法性调取被告作出行政行为时未收集的证据", "C": "涉及个人隐私的证据，原告或者第三人不能自行收集的，可以申请人民法院调取", "D": "由国家机关保存而须由人民法院调取的证据，原告或者第三人不能自行收集的，可以申请人民法院调取"},"answer":"CD","explanation":"。本题针对政府工作部门提出复议，复议机关应当是该县政府，因此A选项错误。B选项，申请复议的期限为60日，B选项错误。C选项，《行政诉讼法》第45条规","chapter":"第四章 证据"},
  {"id":459,"topic":"专题五 行政诉讼法","type":"multiple","question":"行政诉讼中，原告要求相关行政执法人员作为证人出庭说明，在下列何种情形下，法院通常不予准许？（单选）","options":{"A": "原告对现场笔录的合法性有异议的", "B": "原告对现场笔录的真实性有异议的", "C": "原告对行政执法人员身份的合法性有异议的", "D": "原告对被起诉的行政决定有异议的"},"answer":"AB","explanation":"。提《行政诉会法>籍S1余带4款的增定，对于不收展诉快、收局诉快后不山具传资凭任，以庆不一次佳管如当事人赠婴外正的提诉模内浆的，劳单人可以句上版人民法院悦诉。携借《行改诉论法>铭52条的规定，人民法院既不立案，又不作出不中立案定的，当事人可以向上一便人民浙院起诉，因北A.B逸项正，C.D选项误。（2017)","chapter":"第四章 证据"},
  {"id":460,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "行政诉讼被告对作出的行政行为负有举证责任，应当提供作出该行政行为的证据和所依据的规范性文件", "B": "行政诉讼被告无正当理由不提供证据的，人民法院应当依职权调查收集相应证据", "C": "原告在行政诉讼中提出了其在行政处理程序中没有提出的证据的，经人民法院准许，被告可以补充证据", "D": "原告可以提供证明行政行为违法的证据，原告提供的证据不成立的，不免除被告的举证费任"},"answer":"AB","explanation":"，A选项，（行攻诉讼法》第60条第1教现定：”人民法院审理行政装作，不道用调解…….”，因北A选项正。B也项，《行政诉讼法）第35条规定：“在诉讼过程中，被告及其诉讼代理人不得自行向原否、第三人和证人收集证据”，因北B选项正境。C选项，低据《行玫诉讼法》第56条的规定，诉论期同，被告认为需要停止执行的，可以截定停止执行，回此C选项借误。D选项，（行政诉讼法）第62条规定：“人民法院对行政案件宜告判决或者裁定前，原告中请缴诉的，或者被告改变其所作的行政行为，原告同意井中请缴诉的，是否准许，由人民法院发定”，因此D选项错误。（2006）","chapter":"第四章 证据"},
  {"id":461,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，行政诉讼的被告应当在何时就其作出的具体行政行为向人民法院提供证据？（单选）","options":{"A": "收到起诉状副本之日起15日内", "B": "第一审庭审结束前", "C": "第一审法庭辩论终结前", "D": "第一审判决作出前"},"answer":"C","explanation":"。《行政诉讼解释）第26条第1款规定：“原告所起诉的被告不适格，人民法院应当告知原告交更被告；原告不同意变更的，定驳回起诉”，法院认为被告应当是县公安局，而原告起诉时认为被告为派出所，法院应当告知原告变更被告，原告不同意变更的，战定取回起诉，因此C选项正确。（法考2007）","chapter":"第四章 证据"},
  {"id":462,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "原告应当在开庭审理前或者人民法院指定的交换证据清单之日提供证据", "B": "第三人应当在开庭审理前或者人民法院指定的交换证据清单之日提供证据", "C": "原告因正当事由申请延期提供证据的，经人民法院准许，可以在法庭调查中提供", "D": "第三人在第一审程序中无正当事由未提供而在第二审程序中提供的证据，人民法院不予接纳"},"answer":"B","explanation":"。（行玫复议法）第20条第1款规定：“公民、法人成者共他组执认为行致行分促犯其合法权益的，可以自知道成省应肖道该行政行为之日起60日内提出行改复中请：但是法体规定的中请期限超过60日的除外。“杨某3月10日得知了具政府的行政行为，并于4月20日提起复议，未超过命请行政复议60日的期限，因此，A选项价误。杨某认为县政府为汪某须发集体土地使用证的行为侵犯了其已经取得的集体土地使用权，属于复议前置案件。杨某向市政府申请行政复议，市政府并未对原行政行为进行审理，而是以超过中请期为山驳回了复议中请，属于复议不作为。复议前置的案件，当事人可以起诉复议机关不作为，但是不能直接对原行政行为提起诉讼。因此，法院应当定驳回杨某的起诉，B选项正确。复议前翌的案件，未经复议的，法院不应受理，更不应当进行判决，C、D选项：错误。（法考2020，思维扩展）","chapter":"第四章 证据"},
  {"id":463,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列哪些说法是正确的！（多选）","options":{"A": "被告应当提供作出被诉具体行政行为的证据", "B": "被告应当提供作出被诉具体行政行为所依据的规范性文件", "C": "在证据可能灭失的情况下，原告可以向人民法院申请保全证据", "D": "在证据可能灭失的情况下，人民法院可以主动采收保全措施"},"answer":"ABC","explanation":"。A、B选项，根据《行改诉讼法）第67条的规定，人民法院应当在立案之日起5日内，将起诉状副本发送被告。被告应当在收到起诉状副本之日起15日内向人民法院提交作出行政行为的证据和所依据的规范性文件，并提出答辩状，因此A、B选项正确。C选项，《行政诉讼法》第67条第2款规定：“被告不提出答辩状的，不影响人民法院审理”，因此C选项正确。D选项，《行文诉讼法》第68条规定：“人民法院审理行动案件，由审判员组成合议庭，或者由审判目、陪审员组成合议庭，合议庭不仅由陪审员组成，因此D选项错误。（2019）","chapter":"第四章 证据"},
  {"id":464,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，下列哪些与本案有关的证（多选）","options":{"A": "由国家机关保存而须由人民法院调取的证据", "B": "涉及国家秘密的证据", "C": "涉及商业秘密的证据", "D": "涉及个人隐私的证据"},"answer":"A","explanation":"。A选项，《行政诉讼法》第55条规定：“当事人认为审判人员与本案有利害关系成者有其他关系可能影响公正审判，有权专圆五行政诉讼法中许市其人回建”：世本人包唐原告使杏，国光人资哦正、日连，供（行改诉险法）常56等内属定，诉资物间质对上不体止行改件方的质行，仪凭原杏认方得要停止不是以世定停止决仟：因光目齿代借供。C医班，（行改诉俭法）带62等居定：“人民法院对行成囊作宜告有决战普债定追：原杏中济胶诉的，或普使告皮受地作的行皮行力，原告同意本中请散诉的，是善准，由人是法院战定”，回北C透次借供。D资珠，（行攻诉浴法>第60崇第1政规定：人店法院审理行该震作，不适用河解”，时北D选项借侠（2012）","chapter":"第四章 证据"},
  {"id":465,"topic":"专题五 行政诉讼法","type":"multiple","question":"某药厂以本厂过期药品作为主原料，更改生产日期和批号生产出售。甲市乙县药监局以该厂违反《药品管理法》第49条第1款关于违法生产药品规定，决定没收药品并处罚款20万元。药厂不服向县政府申请复议，县政府依据《药品管理法》第49条第3款关于生产劣药行为的规定，决定维持处罚决定。药厂起诉。关于本案的举证与审理裁判，下列说法正确的有？（多选）","options":{"A": "法院应对被诉行政行为和药厂的行为是否合法一并审理和裁判", "B": "药厂提供的证明被诉行政行为违法的证据不成立的，不免除被告对被诉行政行为合法性的举证资任", "C": "如在本案庭审过程中，药厂要求证人出庭作证的，法院不予准许", "D": "法院对本案的裁判，应当以证据证明的案件事实为依据2026年卡利代理师普格考试"},"answer":"ABCD","explanation":"，《行改诉论法>第S6条第1款规定：“诉治期闻，不停止行攻行方的忧行。但有下列情形之一的，截定停止执行：（一）峻告认力需受停止执行的：（二）医合或者付害关展人中请停止执行，人民院认疗该行政行疗的执行会造成准以资外的惯失，并且停止执行不播零团家利签、击会公共村的：（三）人民法院认方谈行政行方的执行会给国家利益，社会公共利监逾成重大惯害的：（四）法律、法规规定停止执行的”，回此A、B、C、D选项均正确。（所编）","chapter":"第四章 证据"},
  {"id":466,"topic":"专题五 行政诉讼法","type":"multiple","question":"区交警大队以左某逆向行驶为由对其作出罚款500元的处罚决定，左某向区政府申请复议，区政府作出维持决定后，左某不服，提起行政诉讼。对此，下列说法正确的是？（多选）","options":{"A": "左某申请法院调取证据应当在举证期限内提出", "B": "由区交警大队和区政府共同对罚款决定的合法性承担举证责任", "C": "区政府在复议程序中依法收集和补充的证据，可以作为法院认定罚款决定合法性的依据", "D": "法院依职权调取的证据不需要进行质证"},"answer":"CD","explanation":"。批招《行政诉讼法）第63条的规定，人民法院审理行政罪件，以法律和行政法规、地方性法境方依据，参风原章，回此C、D选项正确。（2018）","chapter":"第四章 证据"},
  {"id":467,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，对于下列哪些诉讼请求，人民法院不予受理？（多选）","options":{"A": "法律、法规规定应当先申请行政复议，公民、法人或其他组织未申请复议而直接提起诉讼的", "B": "法律规定由行政机关最终裁决的具体行政行为，公民、法人或其他组织不服该具体行政行为，向人民法院提起诉讼的", "C": "复议机关在法定期限内不作出复议决定，公民、法人或其他组织不服，依法向人民法院提起诉讼的", "D": "人民法院裁定准许原告撤诉后，原告以同一事实和理由重新提起诉讼的"},"answer":"C","explanation":"。（行政诉讼法）第81条规定：“人民法院应当在立案之日起6个月内作出第一审判决。有特味情况要延长的，由高圾人民法院批准，而级人民法院审理第一审案件要廷长的，由最商人民法院批准”。本题中，作出第一审行政判决的为基层人民法院，因此A、B、D选项错误，C选项正确。（2015）","chapter":"第五章 起诉与受理"},
  {"id":468,"topic":"专题五 行政诉讼法","type":"multiple","question":"当事人王某不服某市知识产权局作出的行政处罚决定，直接向人民法院提起诉讼，下列说法正确的是？（单选）","options":{"A": "其应当自知道或者应当知道作出行政行为之日起15.日内提出", "B": "其应当自知道或者应当知道作出行政行为之日起1个月内提出", "C": "其应当自知道或者应当知道作出行政行为之日起3个月内提出", "D": "其应当自知道或者应当知道作出行政行为之日起6个月内提出"},"answer":"AC","explanation":"。（行政诉讼法）第81条规定：“人民法院应当在立案之日起6个月内作出第一审判决。有特珠情况需要廷长的，由高级人民法院批准，高级人民法院审理第一审案件得要延长的，由最商人民法院批准”，因A、C选项正确。B、D选项错误。（新纳）","chapter":"第五章 起诉与受理"},
  {"id":469,"topic":"专题五 行政诉讼法","type":"multiple","question":"（反不正当竞争法）第29条规定，当事人对监险查部门作出的决定不服的，可以依法申请行政复议或者提危行政诉讼。某县市场监督管理局认定某企业利用广告对商品作引人误解的假宜传，构成不正当竞争，处10万元罚款。该企业不服，申复议。下列哪些说法是正确的：（多选）","options":{"A": "复议机关应当为该县市监局的上一级市监局", "B": "申请复议期限为15日", "C": "如复议机关作出维持决定，该企业向法院起诉，起诉期限为15日", "D": "对划款决定，该企业可以不经复议直接向法院起诉"},"answer":"BC","explanation":"。A、B、C选项，《行政诉讼法》第63条规定：“人民法院审理行政案件，以法律和行政法规、地方性法规为依据。地方性法规适用于本行政区城内发生的行改案件人民法院审理行政案件，参风规章”因此A选项错误，B、C选项正确。D选项，机据《中华人民共和国立法法》第106条第1款第（三）项的规定，部门规章之间、部门规章与地方政府规章之间对间一事项的规定不一致时，由国务院决：最高人民法院不他对规章进行解释或决，因此D选项借误。（2011）","chapter":"第五章 起诉与受理"},
  {"id":470,"topic":"专题五 行政诉讼法","type":"single","question":"刘某向某人民法院提起行政诉讼，受诉人民法院在7日内既不立案，又不作出裁定，根据行政诉讼法及相关规定，刘某可以如何处理？多选）","options":{"A": "向上一级人民法院投诉", "B": "向上一级人民法院起诉", "C": "向上一级人民检察院抗诉", "D": "请求同级人民检察院抗诉"},"answer":"B","explanation":"。A选项，根据《行政诉讼解》第71条的规定，人民法院适用节通程序审理案件，应当在开庭三日前用传票传唤当事人。当事人成者其他诉讼参与人在外地的，应当留有必要的在途时问。因此人选项铅误。B选项，根据《行政诉讼法》第58条的规定，经人民法院传票传唤，原告无正当理由拒不到庭，或者未经法庭许可中途退庭的，可以按照撤诉处理。上诉人未经法庭许可中途退庭应当比一审原告处理，因此B选项正确。C选项，（行政诉讼解释》第79条规定：“原告或者上诉人申请撤诉，人民法院报定不予准许的，原告或者上诉人经传票传无正当理由拒不到庭，或者未经法庭许可中途退庭的，人民法院可以缺席判决”，因此C选项错误。D选项，根据《行政诉讼解释》第81条第3款的规定，原告不撤诉的，法院应当依法作出确认判决，不会按照撤诉处理，因此D选项错误。（2018）","chapter":"第五章 起诉与受理"},
  {"id":471,"topic":"专题五 行政诉讼法","type":"multiple","question":"关于行政诉讼案件，下列说法哪些是正确的？","options":{"A": "在行政诉讼过程中，被告无权请求调解", "B": "在行政诉讼过程中，被告无权自行向原告和证人收集证据", "C": "在行政诉讼过程中，被告无权作出停止执行原具体行政行为的决定", "D": "在行政诉讼过程中，被告无权改变自己所作的具体行政行为"},"answer":"ABCD","explanation":"。《行政诉讼法》第58条规定：“经人民法院传票传唤，原告无正当理由拒不到庭，或者未经法庭许可中途退庭的，可以按照撤诉处理；被告无正当理由拒不到庭，或者未经法庭许可中途退庭的，可以缺席判决”，因此A、B、C、D选项均正确。（新编）","chapter":"第五章 起诉与受理"},
  {"id":472,"topic":"专题五 行政诉讼法","type":"multiple","question":"某派出所以扰乱公共秩序为由扣押了高某的拖拉机。高不服，以派出所为被告提起行政诉讼。诉讼中，法院认为被告应是县公安局，要求变更被告，高某不同意。法院下列哪种做法是正确的？（单选）2020年专利代理牌许格考认","options":{"A": "以派出所为被告继续市理本案", "B": "以县公安局为被告市理本案", "C": "裁定驳回起诉", "D": "裁定终结诉讼"},"answer":"AB","explanation":"。《行政诉讼解释》第87条规定：","chapter":"第五章 起诉与受理"},
  {"id":473,"topic":"专题五 行政诉讼法","type":"multiple","question":"汪某和邻居杨某因集体土地使用权产生争议、2010年3月10日，县政府为注某颁发集体土地使用证并通知了杨某，4月20日，杨某认为该行为侵犯了自已已有的集体土地使用权，向市政府申请复议，市政府认为杨某的复议请求超过了复议申请期，于是驳回了杨某的复议申请，4月25日，杨某就县政府颁发集体土地使用证行为向法院提起行政诉讼。下列哪一说法是正确的？（单选）","options":{"A": "杨某申请复议超过了复议申请期", "B": "法院应当以未经过复议为由，裁定驳回杨某的起诉", "C": "法院可以受理本案", "D": "法院应当驳回杨某起诉，并判决确认复议决定违法"},"answer":"ABC","explanation":"。A、B、C遗项，《皮昨讼解>第16集第（次规定：人民法房对于口一方券事人行力此普其佗账因，个使行攻行方战普人民法院生发貌列不俊戏护准以执行的类作，携对方尊事人的中准，个以定对其财产进行信全、费今其作出一定行为成者止其作出一定行力：尊事人没有提出申请的，人民法院套为婴时世下以微定来取上逃保全惜境”，四北人.B、C迄项正。D选项，提据（行攻诉讼解华）常101条第1.2款的现定，只有不予立需、收回起诉.管信异议这三种截定可以上诉，财产保全德定不上诉，因业D选项信误。（2007）","chapter":"第五章 起诉与受理"},
  {"id":474,"topic":"专题五 行政诉讼法","type":"multiple","question":"张某不服某市税务局作出的行政处罚决定，起诉至人民法院，根据行政诉讼法及相关规定，下列说法正确的是？（多选）","options":{"A": "人民法院应当在立案之日起5日内，将起诉状副本发送某市税务局", "B": "该市税务局应当在收到起诉状副本之日起15日内向人民法院提交作出行政行为的证据和所依据的规范性文件", "C": "如果该市税务局不提交答辩状的，不影响人民法院审理", "D": "合议庭可以全部由审判员组成，也可以由审判员、陪审员组成，或者全部由陪审员组成"},"answer":"ABD","explanation":"。A、B途项，（行现诉诊法）馆69条规定：“行政行力证据确留，造用法常、法规正确，符合法定程序的，成康告中请被告履行法定职责成者给付义务理由不成立的，人民法院判决驳回原告的诉讼请求”，因此A、B选项正确。C选项，（行政诉讼法）第70条规定：“行改行方有下列情形之一的，人民法院应当判决批销或者部分微销，井可以判决按告重新作出行政行力（三）违反法定租序”，因此C选项借误。D选项，《行政诉讼法》第71条规定：“人民法院判决被告重新作出行改行为的，按告不得以同一的事尖和理由作出与原行政行力基本相同的行政行为”，因此D选项正。(2015)","chapter":"第六章 第一审程序"},
  {"id":475,"topic":"专题五 行政诉讼法","type":"multiple","question":"王某不服某行政机关作出的具体行政行为，依法向人民法院提起行政诉讼。根据行政诉讼法及相关规定，下列哪种说法是正确的？（单选）","options":{"A": "王某和该行政机关均有权申请审判人员回避", "B": "王某认为需要停止执行该其体行政行为的，该行政机关应当停止执行", "C": "在人民法院对该行政案件宣告判决或者裁定前，该行政机关不能改变其所作的具体行政行为", "D": "人民法院可以根据该行政机关的请求对该行政案件进行调解"},"answer":"ABD","explanation":"。A、B、D选项，（行改诉讼法）第70条规定：“行改行为有下列情形之一的，人民法院判决撒销或者部分虽销，并可以判决被告重新作出行政行为：（一）主县证据不足的：（二）适用法律、法规错退的（六）明显不当的”，因此A、B、D选项正确。C选项，根据（行政诉讼法》第74条的规定，行政行为程序轻微违法，但对原告权利不户生实际影响的，人民法院判决确认违法，但不罚要撤俏成者判决履行，因此C选项错误。（2016）","chapter":"第六章 第一审程序"},
  {"id":476,"topic":"专题五 行政诉讼法","type":"single","question":"行政诉讼期间，不停止行政行为的执行，但是下列哪些情况，人民法院应当停止执行？多选）","options":{"A": "行政行为的执行会给国家利益造成重大损失的", "B": "被告申请停止执行，人民法院认为该行政行为的执行会给社会公共利益造成重大损害的", "C": "被告认为需停止执行的", "D": "原告申请停止执行，人民法院认为该行政行为的执行会造成难以弥补的损失的"},"answer":"B","explanation":"。《行政诉讼法》第70条规定：“行政行为有下列情形之一的，人民法院判决撒俏或者部分撤俏，并可以列决被告重新作出行政行为（三）违反法定程序的…本题中，乙某的身份被盗川，属于违反法定程序的情形，应予撤销，撤销无效决定后，因无效请求人不符合请求人资格条件，国家知识产权局应当作出不予受理决定，而不是重新作出无效决定，因此A、C、D选项错误，B选项正确。（2018改编）","chapter":"第六章 第一审程序"},
  {"id":477,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法的规定，下列说法哪些是正确的？（多选）","options":{"A": "人民法院审理行政案件，参照行政法规", "B": "人民法院审理行政案件，参照地方性法规", "C": "人民法院审理行政案件，参照国务院部委根据法律或者行政法规制定、发布的规章", "D": "人民法院审理行政案件，参照直辖市人民政府根据法律或者行政法规制定、发布的规章"},"answer":"ABCD","explanation":"。《行政诉讼法》第77条规定：“行政处罚明显不当，或者其他行政行为涉及对款额的确定、认定确有错误的，人民法院可以判决变更。人民法院判决变更，不得加重原告的义务或者减损原告的权益·..….”，因此A、B、C、D选项均正项。(2019)","chapter":"第六章 第一审程序"},
  {"id":478,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，基层人民法院有特殊情况不能在立案之日起6个月内作出第一审行政判决，需要延长期限的，应如何处理？（单选）","options":{"A": "由该基层人民法院院长批准", "B": "由上一级人民法院批准", "C": "由高级人民法院批准", "D": "由最高人民法院批准"},"answer":"ABCD","explanation":"。《行政诉讼法》第74条规定：“行政行为有下列情形之一的，人民法院到决确认违法，但不撤销行政行为：（一）行政行为依法应当撤销，但撒销会给国家利益、社会公共利益造成重大损害的；（二）行政行为程序轻微违法，但对原告权利不产生实际影响的。行玫行为有下列情形之一，不要撤销或者判决履行的，人民法院判决确认违法：（一）行政行为违法，但不具有可销内容的：（二）被告改变原违法行政行为，原告仍要求确认原行政行为违法的”，因此A、B、C、D选项均正确。（2019）","chapter":"第六章 第一审程序"},
  {"id":479,"topic":"专题五 行政诉讼法","type":"multiple","question":"当事人甲不服某行政机关乙作出的行政处罚决定，向该机关所在地的基层人民法院提起行政诉讼，该法院适用普通程序审理此案并作出判决。下列哪些说法是正确的？（多选）","options":{"A": "一般情况下，该基层法院应当在立案之日起的6个月内作出判决", "B": "如果在审理过程中，如有特殊情况，经该基层人民法院申请，中级人民法院可以批准延长审理期限", "C": "如果在审理过程中，如有特殊情况，经该基层人民法院申请，高级人民法院可以批准延长审理期限", "D": "一般情况下，该基层法院应当在立案之日起的1年内作出判决"},"answer":"ABD","explanation":"。A、B、D选项，《行政诉讼法）第69条规定：“行政行为证据确凿，适用法律、法规正确，符合法定程序的，或者原告申","chapter":"第六章 第一审程序"},
  {"id":480,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "人民法院审理行政案件，以法律和行政法规、部门规章和地方性法规为依据", "B": "人民法院审理行政案件，地方性法规适用于本行政区域内发生的行政案件", "C": "人民法院审理行政案件，参照国务院部、委制定、发布的规章", "D": "人民法院审理行政案件，认为国务院部、委制定、发布的规章之间不一致的，由最高人民法院作出解释或者裁决"},"answer":"B","explanation":".《行改诉讼法）74等第2状院定：“行改行力有下列情形之一，不罚要微销成者判决厦行的，人民法院判决喻认造法：（一）行政行力造法，但不其并可微信内名的……”。本题中，货拆行为造反法定程序，房屋已经试拆除，癌决定已经实塘光单，无法微销和变更，应判决确认违法，因北人、C、D选项借误，B选项正喻，（法考2015）","chapter":"第六章 第一审程序"},
  {"id":481,"topic":"专题五 行政诉讼法","type":"single","question":"行政诉讼过程中，在下列哪项情形下，人民法院可以按照撤诉处理？（单选）","options":{"A": "外地原告开庭前一天收到传票无法出庭的", "B": "上诉人认为人民法院偏祖被上诉人，未经法庭许可中途退庭的", "C": "原告申请撤诉，人民法院裁定不予准许，经合法传唤无正当理由拒不到庭的", "D": "被告改变原具体行政行为，原告不撤诉的"},"answer":"C","explanation":"《行攻诉讼解师>第81条规定：“被客在一审期同改党收诉行政行力的，应当书面告知人民法院。原告或考第三人对政变后的行政行力不服提起诉讼的，人民法院应当就改变后的行政行为进行审理。杏改变原违法行政行力，原售仍要求确认原行政行为违法的，人民法院应资依法作出确认判决。原告起诉被告不作为，在诉讼中被告作出行政行为，原告不缴诉的，人民法院应当就不作为依法作出确认判决”。本题中，行政机关改变了原具体行政行为，将罚款5000元改为罚款3000元，该公可仍要求确认原行政行为违法，人民法院应当依法作出确认判决，因此A、B、D选项错误，C选项正确。（新编）","chapter":"第六章 第一审程序"},
  {"id":482,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "被告未经法庭许可中途退庭的，可以缺席市判", "B": "经人民法院传票传唤，原告无正当理由拒不到處的，可以按照撤诉处理", "C": "原告未经法庭许可中途退庭的，可以按照撤诉处理", "D": "经人民法院传票传唤，被告无正当理由拒不到庭的，可以缺席审判"},"answer":"B","explanation":"。（行政诉讼法》第81条规定：“人民法院应当在立案之日起6个月内作出第一审判决，因此A、C、D选项借误，B选项正确。（2007）","chapter":"第六章 第一审程序"},
  {"id":483,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，在下列哪些情形下，人民法院中止行政诉讼？多选）","options":{"A": "原告死亡，须等待其近亲属表明是否参加诉讼的", "B": "案件的审判须以相关民事案件的审理结来为依据，而相关案件尚未审结的", "C": "原告死亡，没有近亲属或者近亲属放弃诉讼权利的", "D": "作为原告的法人或者其他组织终止后，其权利义务的承受人放弃诉讼权利的"},"answer":"BD","explanation":"。A、B、C选项，根据《行政诉讼解释）第101条的规定，仅对不子立案、驳回起诉、管辖异议的投定，当事人可以上诉，因此A、C选项错误，B选项正确。D选项，对干判决不展可以提起上诉，因此D选项正确。(2018)","chapter":"第六章 第一审程序"},
  {"id":484,"topic":"专题五 行政诉讼法","type":"single","question":"关于行政诉讼中的财产保全，下列哪些说法是正确的？（多选）","options":{"A": "对于因一方当事人的行为，可能使人民法院生效裁判难以执行的案件，人民法院可以根据对方当事人的申请作出财产保全的裁定", "B": "对于因一方当事人的行为，可能使被诉具体行政行为难以执行的案件，人民法院可以根据对方当事人的申请作出财产保全的裁定", "C": "当事人没有提出财产保全申请的，人民法院在必要时可以依法采取财产保全措施", "D": "当事人对财产保全的裁定不服的，可以上诉"},"answer":"B","explanation":"。根据（行政诉讼解》第22的规定，复议机关确认原行改行为违法，周干改变原行政行为，但复议机关以违反法定程序为由确认原行政行为违法的除外。以程序违法为由确认原行为违法应梅其视为维持。因此，原机关区公安分局和复议机关区政府是共同被告，人选项借误。根据（行政复议法）第51条的规定，执申请人的负负人应当参加听证。不能参加的，应当说明由并委托相应的工作人员参加听证。四比，被申请人区公安分局的负贵人应出参加听证，B选项正确。根据《行政诉讼解释》第134条的规定，复议机关作共回被告的案件，以作出原行政行为的行政机关确定案件的级别管辖。应以区公安分局来确定案件的级别管辖为基层法院，因此C选项错误。根据《行政诉讼解释》第79条的规定，第三人经传票传唤无正当理由拒不到庭，或者未经法庭许可中途退庭的，不发生阻止案件审理的效果。因此D选项错误。（法考2024）","chapter":"第六章 第一审程序"},
  {"id":485,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列有关人民法院第一审判决的哪些说法是正确的？多选）","options":{"A": "行政行为证据确凿，适用法律、法规正确，符合法定程序的，人民法院判决驳回原告的诉讼请求", "B": "原告申请被告履行法定职资理由不成立的，人民法院判决驳回原告的诉讼请求", "C": "行政行为违反法定程序、但认定事实清楚且适用法律、法规正确的，人民法院判决维持该行政行为", "D": "人民法院判决被告重新作出行政行为的，被告不得以同一的事实和理由作出与原行政行为基本相同的行政行为"},"answer":"BCD","explanation":"。A选项，相关法律法规没有规定法院适用简品程序应当庭宜判，因此A选项错误。B选项，（行政诉讼法》第83条规定：“适用简易程序审理的行政案件，由审判员一人独任审理，并应当在立案之日起四十五日内审结”，因此B选项正确。C选项，根据《行政诉讼法》第82条的规定，人民法院审理第一审行政案件，认为事实清楚、权利义务关系明确、争议不大的，可以适用简易程序，当事人各方同意适用简易程序的，可以适用简易程序，因此C选项正确。D选项，《行政诉讼解释》第103条第1款规定：“适用简易程序审理的行政案件，人民法院可以用口头通知、电话、短信、传真、电子邮件等简便方式传唤当事人、通知证人、送达裁判文书以外的诉讼文书”，因此D选项正确。（新编）","chapter":"第六章 第一审程序"},
  {"id":486,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定、行政行为有下列哪些情形的，人民法院判决撤销或者部分撤销，并可以判决被告重新作出行政行为？多选）","options":{"A": "主要证据不足的", "B": "适用法律、法规错误的", "C": "行政程序轻微违法，但对原告权利不产生实际影响的", "D": "明显不当的"},"answer":"AC","explanation":"。（行政诉讼法》第83条规定：专五行政诉讼法用店医作中理的行资满作，由审为件人债佳市理，片庄当在立装兰日是45日带告。“因出，A资巩正确，B连项错供。人法实在申理迁使中，发普体不置速用俏但岸的，提定传方等遵偿序，C击项正喷，责项，人民决院审意行改激体，伙法实行审终审制度，简疗健序只定对审应径序的化，世当造用两章终审，当本人仿本上诉权，旧北，D连项借供，（法2016","chapter":"第六章 第一审程序"},
  {"id":487,"topic":"专题五 行政诉讼法","type":"multiple","question":"甲某对国家知识产权局作出的宣告其专利权全部无效的审查决定不服提起行政诉讼，经审理查明，无效宜告请求人乙某的身份被盗用，授权委托书上的签名系伪造，下列裁判方式正确的是？（单选）","options":{"A": "撤销无效宜告审查决定，并判令国家知识产权局就该无效请求重新作出审查决定", "B": "撤销无效宣告审查决定", "C": "鉴于专利法规定任何人均可以提出无效宣告请求，判决驳回甲的诉讼请求", "D": "鉴于专利法规定任何人均可以提出无效宣告请求，判决维持无效宣告审查决定"},"answer":"ABC","explanation":"。根协《行次诉检法）答S7现定，人民法院对愿诉行政机美改有收法付院世会、歌偏生溶保障金和工份、医疗会保险金的菌件，以符义养关具功项、不予执行将严重影有展告生治的，可以慢鲁的申请，定先予次行。希是可以院题生活保障金申请党予抗行，人逸项正确。事人对先予执行我定不展的，可以申请复一次，四北B逸项正。行攻机英未厦行定取费的案件，当事人应当先中请行政复才够提起行政诉讼。本题中，民攻局在定期限内未作容复，属于行政机关不行定职费的情形，属于雷要凭议信显的定，因此C选项正确。本题中没有给出判断绝给付最低生活保障金行力是否造法的件，不判所该行政行为是否进法，因此选项错误。（法考2020改编，馬维扩展）C。A选项，《行政诉讼法》第85条规定：不展人民法院第一审判决的，有权在判决日起15日内向上一级人民法院提起上因此A选项正确。B选项，《行政诉讼法）见定：“人民法院对上诉案件，应当组成合庭审理。经过阅卷、调资和询问当事人，出新的事实、证据或者理由，合议庭认为庭审理的，也可以不开庭审理”，因此B选项错误。C逸项，（行政诉讼法》第87条规定：“人民法院审理上诉案件、应当对原中人民法院的购决、载定和被诉行政行为进行全面审查”，四比C返项正确。D选项，（行政诉讼法》第89条第2数规定：“原审人民法院对发回重审的案件作出列决后，当事人提起上诉的，第二审人民法院不得再次发回重审”，因此D选项错误。（2017）","chapter":"第六章 第一审程序"},
  {"id":488,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，有关法院判决变更，下列说法正确的是？多选）","options":{"A": "行政处罚明显不当，法院可以判决变更", "B": "涉及对款额的确定确有错误的行政行为，法院可以判决变更", "C": "法院判决变更，通常不得加重原告的义务", "D": "法院判决变更，通常不得减损原告的权益"},"answer":"A","explanation":"。A、B选项，《行政诉讼法》第86条规定：“人民法院对上诉案件，应当组成合议庭，开庭审理。经过间卷、调查和询问当本人，对没有提出新的事实、证据成者理由，合议庭认为不要开庭审理的，也可以不开庭审理”，因此人选项正确，B选项错误。C、D选项，《行政诉讼法》第87条规定：“人民法院审理上诉案件，应当对原审人民法院的判决、裁定和被诉行政行为进行全面审查”，因此C、D选项错误。（2017）","chapter":"第六章 第一审程序"},
  {"id":489,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列哪些情况，法院应判决确认违法但不撤销或不需要撤销行政行为？（多选）","options":{"A": "行政行为依法应当撤销，但撤销会给国家利益、社会公共利益造成重大损害的", "B": "行政行为程序轻微违法，但对原告权利不产生实际影响的", "C": "被告改变原违法行政行为，原告仍要求确认原行政行为违法的", "D": "行政行为违法，但不具有可撤销内容的"},"answer":"BC","explanation":"。《行政诉讼法》第89条规定：“人民法院审理上诉案件，按照下列情形，分别处理：（二）原判决、裁定认定事实错误或者适用法律、法规错误的，依法改判、撤销或者变更；（三）原判决认定基本事实不清、证据不足的，发回原审人民法院重审，或者查清事实后改判：（四）原判决遗滴当事人或者违法缺席判决等严重违反法定程序的，裁定撤销原判决，发回原审人民法院重审。原审人民法院对发回重审的案件作出判决后，当事人提起上诉的，第二审人民法院不得再次发回重申…”，因此B、C选项正确，A选项应依法交更，无必要发回重审，D选项原判决是对发回重审的案件作出的，不能再次发回重审。（2018）","chapter":"第六章 第一审程序"},
  {"id":490,"topic":"专题五 行政诉讼法","type":"multiple","question":"行政诉讼案件有下列哪些情形的，人民法院应当判决驳回原告的诉讼请求？（多选）","options":{"A": "行政行为证据确凿，适用法律、法规正确", "B": "符合法定程序", "C": "合法但明显不当", "D": "原告申请被告履行法定职责或者给付义务理由不成立"},"answer":"ABD","explanation":"。A、B、D选项都属于违反法定程序，应撤销原判，发回重审，因此A、B、D选项正确。C选项，（行政诉讼解释》第109条第4、5款规定：“原审判决遗漏行政赔偿请求，第二审人民法院经审查认为依法不应当子以赔偿的，应当判决驳回行政赔偿请求。原审判决遗漏行政赔偿请求，第二审人民法院经审理认为依法应当子以赔偿的，在确认被诉行政行为违法的同时，可以就行政赔偿专通五行政诉讼法同息进行调解：调解不展的，应当然行改赔价最分史回重审”，回此C连巩错读。（辨）S.BCD，A岛，对干岳改许提局的行次诉，一市庄由中限人民法院管借，人逸项借供、目违项，一市进為赔信请求，二市童价捷出，属于个所的理由，二市皮当开庭审理，B连项正确、C逻项，（行政诉论法）第W务现定：“人民法实审理上诉件，应当才度审人民法岗的持决、定在诉行政行力进行全面审益”，因此C这项正吻。D逸项（行政诉讼法解称）第109案答4款规定：“原市判决遣希行政赔偿请求，第二审人民法院经申整认力依法不应当予以暗借的，座费身决孜罚行攻赔偿请求”，回北D选项正喻，（淡考2017）","chapter":"第六章 第一审程序"},
  {"id":491,"topic":"专题五 行政诉讼法","type":"multiple","question":"某镇政府以一公司所建钢架大棚未取得乡村建设规划许可证为由责令限期拆除。该公司逾期不拆除，镇政府现场向其送达强拆通知书，组织人员拆除了大棚。该公司向法院起诉要求撤销强拆行为。如一审法院审理认为强拆行为违反法定程序，可作出的判决有：（单选）","options":{"A": "撤销判决", "B": "确认违法判决", "C": "履行判决", "D": "变更判决"},"answer":"AB","explanation":"。A选项，機物《民事诉语法>的相关别定，当事人可以在诉伦控程中命法院中请保全证德，利害英系人可以左提起诉讼曾有法院中请保全证据。百行政诉讼中证据保全只在诉讼中提出，因此A逸项正确。B逸项，不论民事诉讼还是行政诉讼，惩层法院一审的定件当事人及方可以约定透用简易租序，因此B途项正确。C逸项，民事诉讼中追循谁主张谁华证的原购，行政诉讼中微告对作出的行政行为负有举证费任，回业C选项借误。D选项，（行玖诉讼法》第8名规定：”当事人在行政诉讼中的法律地位平等”，因此D选项错误。（新增）","chapter":"第六章 第一审程序"},
  {"id":492,"topic":"专题五 行政诉讼法","type":"multiple","question":"某公司就某行政机关对其作出的罚款5000元的行政处罚决定向人民法院起诉。在诉讼中，该行政机关变更了原处罚决定，将罚款数额改为3000元，并书面告知了人民法院，但该公司仍要求确认原行政行为违法。根据行政诉讼法及相关规定，下列说法哪项是正确的？（单选）","options":{"A": "人民法院应当裁定终结诉讼，并告知该公司另行起诉", "B": "人民法院应当对改变后的行政处罚决定进行审理", "C": "人民法院应当依法作出确认判决", "D": "人民法院应当对改变后的行政处罚决定和原行政处罚决定一并进行审理"},"answer":"BD","explanation":"。A选项，行政复议案件审资行政行方的合法性和合理性，行政诉讼案件原则上只申查行政行为的合法性，因此A选项错误。请号生对比","chapter":"第六章 第一审程序"},
  {"id":493,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法的规定，如果不存在需要延长审理期限的特殊情况，人民法院应当在下列哪个期限内作出行政案件的第一审判决？（单选）","options":{"A": "收到起诉状之日起6个月", "B": "立案之日起6个月", "C": "收到起诉状之日起3个月", "D": "立案之日起3个月"},"answer":"BD","explanation":"。A、B选项，（行致诉讼法）第90条规定：”当事人对已经发生法律效力的列决、就定，认为确有借误的，可以向上一级人民法院申请再申…”，因此A选项借俱，B选项正确。C、D选项，《行政诉讼法》算92条规定：“各级人民法院院长对本院已经发生法律效力的判决、定，认为需要再审的，应当提交审判委员会讨论决定上级人民法院对下级人民法院已经发生法律效力的判决、定，有权提审成者指令下级人民法院再审”，因此C选项错误，D选项正确。（2011）","chapter":"第六章 第一审程序"},
  {"id":494,"topic":"专题五 行政诉讼法","type":"multiple","question":"对下列哪些行政裁判，当事人可以提起上诉？","options":{"A": "裁定不停止执行行政行为", "B": "裁定不予立案", "C": "裁定中止诉讼", "D": "判决驳回原告的诉讼请求"},"answer":"ABCD","explanation":"。A选项，《行政诉讼法》第90条规定：“当事人对已经发生法律效力的列决、裁定，认为确有错误的，可以向上一级人民法院中请再申…….”，因此A选项正确。B、C选项，（行政诉讼法》第91条规定：“当事人的申请符合下列情形之一的，人民法院应当再审：··（六）原判决、裁定遗涌诉讼请求的：（七）据以作出原判决、定的法律文书被撤销或者交更的……”，因此B、C选项正确。D选项，《行政诉讼法》第93条第1款规定：“最商人民检察院对各级人民法院已经发生法律效力的判决、定，上级人民检察院对下级人民法院已经发生法律效力的判决、裁定，发现有本法第91条规定情形之一，或者发现调解书损害国家利益、社会公共利益的，应当提出抗诉”，因此D选项正确。（2017）","chapter":"第六章 第一审程序"},
  {"id":495,"topic":"专题五 行政诉讼法","type":"multiple","question":"王某将沈某打成轻微伤，区公安分局给予王某行政拘留5日并罚款2000元的处罚。王某向区政府申请行政复议，区政府经听证以区公安分局超期办案为由作出确认违法决定。王某不服，提起行政诉讼，法院通知沈某作为第三人参加诉讼，下列说法正确的是？","options":{"A": "被告应为区政府", "B": "区公安分局负责人应当参加复议听证", "C": "应由区政府所在地中院管辖", "D": "沈某未经许可中途退庭，法院应中止审理"},"answer":"ABD","explanation":"。A、B选项，《行政诉讼法》第92条第2款规定：…….，上级人民法院对下级人民法院已经发生法律效力的判决、发定，发现有本法第91条规定情形之一，成者发现调解违反自愿原则或者调解书内容违法的，有权提审或者指令下级人民法院再审”，因此A、B选项正确。C、D选项，根据《行政诉讼法》第93条的规定，上级人民检察院对下级人民法院已经发生法律效力的判决、裁定，发现有本法第91条规定情形之专圆五行政诉讼法一，世世甚出抗诉，世是考以定缴销村决，因岳C违式借供，D违项正府.（2014）","chapter":"第六章 第一审程序"},
  {"id":496,"topic":"专题五 行政诉讼法","type":"multiple","question":"关于法院适用简易程序审理行政案件，下列哪项说法是正确的？（多选）","options":{"A": "法院应当庭宜判", "B": "应当在立案之日起45日内审结", "C": "如果中级人民法院是第一市法院，其也可以适用简易序审理行政案件", "D": "法院可以用电话的方式传唤当事人"},"answer":"BCD","explanation":"，（行皮诉治法）管01等属定：“当华人的中请许合下月情形之一的，人法院皮当再…（六）账列决，定进酒昨俗请求的……（行次诉论法>增93奔第1.2款脱定：“成前人民院对作人民法院已经发生法体放力的列决，截定，上人民检事观对下级人民法院已经发生法体发方的判决、截定，发现有本淡骼91靠院定债形之一，成普发现调解节惯费国发利监、任会公共利监的，应当提出杭诉。方各段人民检察院对回股人民决院已经发生法体效力的列次、盛，发现年法信91景规定情形之一，成者发现创解督惯券国家利点，社会公共利益的，可以向同级人民决院是出检客建议，并报上级人民检事院备期：也习以堤请上级人民检事院向呵级人民法院堤出抗诉”：因此A选项信误，B.C、D逸项正确。（2016)","chapter":"第六章 第一审程序"},
  {"id":497,"topic":"专题五 行政诉讼法","type":"single","question":"交警大队以方某闯红灯为由当场处以50元罚款，方某经复议后不服起诉。法院适用简易程序审理。关于简易程序，下列哪些说法是正确的？多选）","options":{"A": "由审判员一人独任审理", "B": "法院应在立案之日起30日内审结，有特殊情况需延长的经批准可延长", "C": "法院在审理过程中发现不宜适用简易程序的，减定转为普通程序", "D": "对适用简易程序作出的判决，当事人不得提出上诉"},"answer":"C","explanation":"。《国家赔偿法》第5条规定：“属于下列情一的，回家不承担赔偿费任：（一）行政机关工员与行使职权无关的个人行为”，张某的晨千个人行为，和取务无关，回家不承担赔偿因此A、B、D选项错误，C选项正确。（2019）","chapter":"第六章 第一审程序"},
  {"id":498,"topic":"专题五 行政诉讼法","type":"single","question":"李某失业后向民政局申请最低生活保障金，民政局在规定期限内未作答复，李某经复议后提起行政诉讼，下列哪些说法是正确的？多选）","options":{"A": "李某可以申请先予执行", "B": "如果法院作出先予执行裁定，民政局不服可以申请复议", "C": "李某经行政复议后方能提起行政诉讼", "D": "本案应适用确认违法判决"},"answer":"A","explanation":"。A选项，市政府指导定议是展行行政职行为，因此A选项正确。B、C选项，（行政诉讼释）第1条第2款规定：“下列行为不属于人民行政诉讼的受案范图：（三）行政指导行”，因此行政指导行为不属于行政诉讼受案，也无留给予补偿，B、C选项错误。D选项，赔偿法》第3条规定：“行政机关及其工作人行使行政职权时有下列役犯人身权情形之一害人有取得赔偿的权利：……（三）以打、等行为或者使、放纵他人以段打、虑待等行为进成公民身休伤害成者死亡的……”因此稍奖不服黄某人身役权行为的：可以提起行致诉论.D逸项错误。（2018）","chapter":"第六章 第一审程序"},
  {"id":499,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列关于行政诉讼“当事第二审程序的哪些说法是正确的？多选）书送","options":{"A": "当事人不服人民法院第一审行政判决的，有权在诉...判决书送达之日起15日内向上一级人民法院提起上诉第86", "B": "人民法院对行政上诉案件，一律应当开庭审理议庭，", "C": "人民法院审理上诉案件，应当对原审人民法院的对没判决、裁定和被诉行政行为进行全面审查不需县2026年专利代理师货格考试", "D": "原审人民法院对发回重审的案件作出判决后，当事人提起上诉的，第二审人民法院仍然可以再次发回审"},"answer":"ABD","explanation":"。A选项，（国家赔偿法》第11条规完：“赔偿请求人根据受到的不同损害，可以同时提出数项赔偿要求”，因此A选项正确。B选项，（国家赔偿法》第9条第2款规定：“赔偿请求人要求赔偿应当先向赔偿义务机关提出，也可以在申请行政复议成者提起行政诉讼时一并提出”，因此B也项正确。C选项，（国家赔偿法》第10条规定：“赔偿请求人可以向共同赔偿义务机关中的任何一个路偿义务机关要求赔偿，该赔偿义务机关应当先子赔偿”，因此C选项错误。D选项，（国家赔偿法）信15条第1款规定：“人民法院审理行政赔偿案件，赔偿请求人和赔偿义务机关对自已提出的主张，应当提供证据”，因此D选项正确。（2014）","chapter":"第七章 第二审程序"},
  {"id":500,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列关于行政诉讼第二审程序的说法哪项是正确的？（单选）","options":{"A": "第二审人民法院对没有提出新的事实、证据或者理由，合议庭认为不需要开庭审理的，可以不开庭审理", "B": "第二审人民法院对行政上诉案件应当一律开庭审理", "C": "第二审人民法院审理行政上诉案件，只限于审查原审人民法院作出的裁判是否合法", "D": "第二审人民法院审理行政上诉案件，只限于审查被诉行政行为是否合法"},"answer":"ABC","explanation":"。A、B选项，（国家赔偿法》第4条规定：“行政机关及其工作人员在行使行政职权时有下列役犯财产权情形之一的，受害人有取得赔偿的权利：（一）违法实施罚款、吊销许可证和执烈、责令停产停业、没收财物等行政处罚的：（二）违法对财产采取查封、扣押、冻结等行政强制措施的”，因此A、B选项正确。C选项，《国家赔偿法》第3条规定：“行政机关及其工作人员在行使行政职权时有下列役犯人身权情形之一的，受害人有取得赔偿的权利：（一）违法拘留或者违法采取限制公民人身自由的行政强制措施的……”因比C选项正确。D选项，《国家赔偿法》第5条规定：“属于下列情形之一的，国家不承担赔偿责任：（一）行政机关工作人员与行使职权无关的个人行为…”，因此D选项错误。（新编）","chapter":"第七章 第二审程序"},
  {"id":501,"topic":"专题五 行政诉讼法","type":"multiple","question":"人民法院审理行政上诉案件，在下列哪些情形下可以裁定撤销原判，发回重审？多选）","options":{"A": "原判决认定事实清楚，但适用法律错误", "B": "原判决遗漏了当事人", "C": "原判决认定基本事实不清，证据不足", "D": "原判决是对发回重审的案件作出的"},"answer":"ABCD","explanation":"。A、B、C选项，（国家赔偿法）第3条规定：“行政机关及其工作人员在行使行政职权时有下列役犯人身权情形之一的，受害人有取得赔偿的权利：（二）非法拘禁或者以其他方法垂法剥夺公民人身自由的：（三）以段打、虑待等行为","chapter":"第七章 第二审程序"},
  {"id":502,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，关于法院审理上诉案件，下列说法正确的是？多选）","options":{"A": "原审判决遗漏当事人，第二审法院应裁定撤销原判决，发回原审人民法院重审", "B": "原审判决违法缺席判决，第二审法院应裁定撤销原判决，发回原审人民法院重审", "C": "原审判决遗漏行政赔偿请求，第二审法院应裁定撤销原判决，发回原审人民法院重审", "D": "原审判决中应当回避的审判人员未回避的，第二审法院应裁定撤销原判决，发回原审人民法院重审"},"answer":"ABCD","explanation":"。《商标法》第3条第1款中规定，经国务院商标管理部门核准注册的商标为注册商标，包括商品商标、服务商标和集体商标、证明商标，因此A、B、C、D选项均正确。（新编）","chapter":"第七章 第二审程序"},
  {"id":503,"topic":"专题五 行政诉讼法","type":"multiple","question":"县政府以某化工厂不符合国家产业政策、污染严重为由，决定强制关闭该厂。该厂向法院起诉要求撤销医决定，并提出赔偿请求。一审法院认定县政府决定进法，于以撤销，但未对赔偿请求作出裁判，县政府提出上诉。下列说法正确的是：（多选）","options":{"A": "本案第一审应由县法院管辖", "B": "二审法院不得以不开庭方式审理该上诉案件", "C": "二审法院应对一审法院的判决和被诉行政行为进行全面审查", "D": "如二审法院经审查认为依法不应给予该厂偿的，应判决股回其赔偿请求"},"answer":"AC","explanation":"。A、B、C选项，（商标法）第3条第3数规定：“本法所称证明商标，是指由对某种商品成者股务具有监督能力的组织所控制，而由该组织以外的单位成者个人使用于共商品成者务，用以证明该商品成者服务的原产地、原料、制造方法、质量或者其他特定品质的标志”，因此A、C选项正确，B选项错误。D选项，《商标法》第3条第2款规定：“本法所称集体商标，是指以团体、协会成者其他组织名义注册，供该组织成员在商事活动中使用，以表明使用者在该组织中的成员资格的标志”，因此D选项描述的是集体商标，D选项错误。（2011）","chapter":"第七章 第二审程序"},
  {"id":504,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据民事诉讼法和行政诉讼法的规定，下列哪些说法是正确的？（多选）","options":{"A": "民事诉讼可以申请诉前证据保全，而行政诉讼只能在诉讼中提出", "B": "基层法院一审，双方协商一致可以适用简易程序", "C": "都遵循谁主张谁举证的原则", "D": "民事诉讼中当事人的法律地位平等，行政诉讼中当事人的法律地位不平等"},"answer":"ABD","explanation":"。A、B、D选项，《商标法>第8条规定：“任何能够将自然人、法人成者其他组织的商品与他人的商品区别开的标志，包括文字、图形、字母、数字、三维标志、顾色组合和市音等，以及上述要素的组合，均可以作为商标申请注册”，因此A、B、D选项正确。C选项，气味不可以作为商标申请注册，因此C选项错误。（2015）","chapter":"第七章 第二审程序"},
  {"id":505,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政复议法、行政诉讼法及相关规定，关于行政复议和行政诉讼，下列说法哪些是正确的？（多选）","options":{"A": "行政复议案件和行政诉讼案件都可以审理行政行为的合理性和合法性", "B": "行政复议案件和行政诉讼案件的审理期限不同", "C": "行政复议机关收取的复议费用和人民法院收取的诉讼费用相同", "D": "提出行政复议申请的期限和提起行政诉讼的期限不同"},"answer":"AC","explanation":"。A选项，顾色得要和商标的其他要素组合起来才能作为商标获得注册，单一顾色不作为商标注册。C选项，我国没有位置商标。B、D","chapter":"第七章 第二审程序"},
  {"id":506,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "当事人对已经发生法律效力的判决、裁定，认为确有错误的，可以向原审人民法院提出再审", "B": "当事人对已经发生法律效力的判决、裁定、认为确有错误的，可以向原审人民法院的上一级人民法院提出再审", "C": "人民法院院长对本院已经发生法律效力的判决、裁定，发现违反法律、法规规定认为需要再审的，有权决定再审", "D": "上级人民法院对下级人民法院已经发生法律效力的判决、裁定，发现违反法律、法规规定的，有权提审或者指令下级人民法院再审"},"answer":"AB","explanation":"。A、H走项，《前标等供》第4等第1次昆定：“育标法第16等定的意层标为，个以依贷商标法在术券何的定，作方连啡标成书震体筒标中请迷册“，因出A.B图项正噜。C.D连项，高昌筒标和限券标是换指定使准对算分共，渠体育综和连明谢你是你有人主体分处，休商标、证明你所可以是前品院你设展券官你，旧北C.D选项借谈。（2012）","chapter":"第八章 行政诉讼的审判"},
  {"id":507,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，下列关于审判监督程序的哪些说法是正确的？（多选）","options":{"A": "当事人对已经发生法律效力的判决，认为确有错误的，可以向上一级人民法院申请再审", "B": "原判决遗漏诉讼请求，当事人提出再审申请的，人民法院应当再审", "C": "据以作出原判决的法律文书被撤销，当事人提出再审申请的，人民法院应当再审", "D": "上级人民检察院发现下级人民法院已经发生法律效力的判决遗漏诉讼请求的，应当提出抗诉"},"answer":"A","explanation":"。A逸项，《商婷条例>诺4条债1款规定：“商标法第16条规定的湾理你考，可以质岗你决和本条例的规定，作力证明前惊选德集体前你中请注后”，因北A选项正。B、C选项，《商桥法）第16条第1散现定：胃你中有品的您理你考，调淡南品井非来源于该你店所标采的坊区，便导公众的，不予注册并禁止使用：但是，已经善念取得法厨的继续有效”，四北B、C逸项借供。D选项，（河标法）第30条中现定，中请注感的前标，几不将合本法有关规定成者购他人在罚一种诱昌或者类仅前品上已经注册的或者初少审定的言标相同或指近仅的，由国务院商标管理部门回中请，不子公告，该规定井未将除地理标志，因此D选项错退。(2018)","chapter":"第八章 行政诉讼的审判"},
  {"id":508,"topic":"专题五 行政诉讼法","type":"single","question":"根据行政诉讼法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "上级人民法院对下级人民法院已经发生法律效力的判决，发现违反法律、法规规定的，有权提审", "B": "上级人民法院对下级人民法院已经发生法律效力的判决，发现违反法律、法规规定的，有权指令下级人民法院再审", "C": "人民检察院对人民法院已经发生法律效力的判决，裁定撤销判决", "D": "上级人民检察院对下级人民法院已发生法律效力的判决，按照审判监督程序提出抗诉"},"answer":"D","explanation":"。《商标条例》第4条第I致规定：商标法第16条的地理标方，可以依原商标法和本条例的规定，作方证明商标或者集体商标中请注所”，回此A、B、C选项错误，D选项正确。（2019）","chapter":"第八章 行政诉讼的审判"},
  {"id":509,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据行政诉讼法及相关规定，下列关于审判监督程序的哪些说法是正确的？（多选）","options":{"A": "地方各级人民检察院发现同级人民法院已经发生法律效力的判决遗漏诉讼请求的，可以向同级人民法院提出抗诉", "B": "地方各级人民检察院发现同级人民法院已经发生法律效力的判决进漏诉讼请求的，可以提请上级人民检察院向同级人民法院提出抗诉", "C": "上级人民检察院发现下级人民法院已经发生法律效力的判决遗漏诉讼请求的，应当提出抗诉", "D": "最高人民检察院发现各级人民法院已经发生法律效力的判决遗漏诉讼请求的，应当提出抗诉"},"answer":"ABCD","explanation":"。A选项，《商标法）第11条第I款规定：“下列标志不得作为商标注册：（一）仅有本商品的通用名称、国形、型号的……（三）其他联乏是若特征的”，因此A选项不得作为商标注册。B、C、D选项，《商标法》第12条规定：“以三维标志申请注册简标的，仅由筒品自身的性质产生的形状、为获得技术效果而雷有的商品形状或者使商品具有实质性价值的形状，不得注册”，因此B、C、D选项不得作为商标注册。（新编）","chapter":"第八章 行政诉讼的审判"},
  {"id":510,"topic":"专题五 行政诉讼法","type":"multiple","question":"某县公安局干警张某在协助县林业局执行公务形时，遇到往日有嫌隙的王某，张某借故将王某殴打致死，对作王某的死亡承担赔偿义务的是？（单选）行","options":{"A": "该县公安局", "B": "该县人民政府", "C": "张某权", "D": "该县林业局为"},"answer":"BC","explanation":"。A、B、D选项，《商标法）第10条第1款规定：“下列标志不得作为而标他用：（一）间中年人民共和国的国家名称、国旗、国徽、国歌、军、军徽、军歌、助章等相同或书近似的·（三）同政府问国际组织的名称、旗积、微记等相同成者近依的，但经该组织同意成者不易误导公众的险外…（五）同红十字、红新月的名称、标志相同或者近似的…”，因此A、D逸项不得作为向标使用，B选项经组织同意的可以作为商标使用。C选项，（商标法》第11条第1款规定：“下列标志不得作为商标注册：·（三）其他缺乏显落特征的”，因此C选项缺乏显著特征不得作为而标注册，但是可以使用。（2014）","chapter":"第九章 国家赔偿"},
  {"id":511,"topic":"专题五 行政诉讼法","type":"multiple","question":"养殖户梅某根据市政府的建议，扩大了生猪养殖，为结果全国生猪养殖产能过剩，猪肉价格暴跌，该养殖户损范失200万。该市畜牧局执法人员黄某到梅某养殖基地进员行检疫时，梅某阻拦，黄某将梅某打成轻微伤。下列说法的正确的是？（单选）","options":{"A": "市政府的行为是履行行政职权的行为", "B": "梅某不服市政府的行为，可以提起行政诉讼", "C": "市政府应当对梅某的养殖损失进行补偿", "D": "梅某不服黄某人身侵权行为的，不可以提起行政诉讼，但可以提起民事诉讼"},"answer":"ABD","explanation":"。A、B、D选项，《商标法》第10条第1数规定：“下列标志不得作为商标使用：（二）同外国的国家名称、国旗、国徽、军旗等相同或者近似的，但经该国政府同意的除外…（六）带有民族歧视性的：（七）带有欺骗性，容易使公众对商品的质量等特点或者产地产生误认的”，因此A、B、D选项不得作为商标使用。C选项，《商标法）第11条第1款规定：“下列标志不得作为商标注册：（二）仅直接表示商品的质量、主要原料、功能、用途、亚量、数量及共他特点的.\"因此C选项不得作为商标注册，但可以使用。（2016）","chapter":"第九章 国家赔偿"},
  {"id":512,"topic":"专题五 行政诉讼法","type":"single","question":"根据国家赔偿法及相关规定，下列哪些说法是正确的？多选）","options":{"A": "赔偿请求人根据受到的不同损害，可以同时提出数项行政赔偿请求", "B": "赔偿请求人可以在提起行政复议时一并提出行政赔偿请求", "C": "存在共同赔偿义务机关的，赔偿请求人应当向所有共同赔偿义务机关同时要求赔偿", "D": "人民法院审理行政赔偿案件时，赔偿请求人对自己提出的主张，应当提供证据"},"answer":"B","explanation":"。一般情况下，声音商标需经长期使用才能取得显著特征，因此A、C、D选项错误，B选项正确。（新编）","chapter":"第九章 国家赔偿"},
  {"id":513,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据国家赔偿法的规定，行政机关及其工作人员在行使行政职权时，有下列哪些情形时，受害人有取得赔偿的权利？（多选）","options":{"A": "违法实施罚款的", "B": "违法对财产采取冻结的", "C": "违法采取限制公民人身自由的行政强制措施的", "D": "行政机关工作人员与行使职权无关的个人行为"},"answer":"BD","explanation":"。A、C选项，申请注册的商标没有新颖性、实用性和美感的要求，因此A、C选项错误。B、D选项，（商标法》第9条第1款规定：“申请注册的商标，应当有显著特征，便于识别，并不得与他人在先取得的合法权利相冲突”，因此B、D选项正确。（2007）","chapter":"第九章 国家赔偿"},
  {"id":514,"topic":"专题五 行政诉讼法","type":"multiple","question":"根据国家赔偿法的规定，行政机关及其工作人员在行使行政职权时有下列哪些情形的，受害人有取得赔偿的权利？多选）","options":{"A": "非法拘禁的", "B": "咬使、放纵他人股打造成公民身体伤害的", "C": "咬使、放纵他人虐待造成公民身体伤害的", "D": "违法征用财产的"},"answer":"CD","explanation":"。A、B选项，（商标法》第10条第2款规定：“县级以上行政区划的地名成者公众知晓的外国地名，不得作为商标。但是，地名具有其他合义成者作为集体商标、证明商标组成部分的除外；已经注册的使用地名的商标继续有效”，因此“鸽专六商标法其费集”可以作方跟体言标成骨迁明育标注册，A、日离巩许合法体规定。C逸项，当集的形快为产遗川形快，无应等性，不他注府剪标，C遇项不许合官标法的定。D选项，音熊属干前直的透用名停，不信注册，四此D透项不作合言你法的定。（折偏）","chapter":"第九章 国家赔偿"},
  {"id":515,"topic":"专题五 行政诉讼法","type":"multiple","question":"某县市场监督管理局和卫生局共同对张某的餐厅进行查封，给其造成了损失。张某认为该查封行为进法，费欲要求国家赔偿。根据国家赔偿法及相关规定，下列哪些说法是正确的？（多选）庆","options":{"A": "该县市场监督管理局和卫生局为共同赔偿义务机关（", "B": "该县人民政府为赔偿义务机关", "C": "张某可以在提起行政诉讼时一并提出赠偿要求", "D": "张某可以在申请行政复议时一并提出赔偿要求的养项中此"},"answer":"AD","explanation":"。A、B选项，证明商棕是开放的，直换证明品质，集体前棕是肆闭的，还明年价。“可川“商标是由可川县為技会中请注后，偿定货川在驾校商品上，许可本会成员便用，属产焦保商标因不是证明闻标，因此A逸项正嘴，B选项错误。C逸项，“河川“闻标顶燃健用了县使以上行改区划名称，但由干“可川“有其他合久，且已经法猎方你，可以他续使用，四北C途项借误。D选项，是市作为品的经售者，力了加以区购，对千自己销售的前品可以另行注册标，使川在产品的包装上，因此D选项正响。（法考2015）","chapter":"第九章 国家赔偿"},
  {"id":516,"topic":"专题六 商标法","type":"multiple","question":"下列可以在我国申请注册的商标种类有？多选）","options":{"A": "证明商标", "B": "服务商标", "C": "集体商标", "D": "商品商标"},"answer":"ABCD","explanation":"。A逸项，红新月不得作力商标使用。B选项，“叫只府”用在餐等度务中无不民影响，但用在酒店、桑伞等服务中存在不民形响、有害社会主义道德风岗，不得作为商标使用。C途项，国农知识产权局的标志属于中央国家机关的标志，不得作为商标使用。D选项，”中国强勿性产品认证（CCC）”标忘属于与尖施控制、子以保证的官方标志相同或近似的标记，不能作为商标使用。（2018，思维扩展）","chapter":"第一章 注册商标专用权的客体"},
  {"id":517,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列关于证明商标的说法哪些是正确的？（多选）","options":{"A": "由对某种商品或者服务具有监督能力的组织所控制", "B": "由对某种商品或者服务具有监督能力的组织成员内的单位或者个人使用于其商品或者服务", "C": "用以证明该商品或者服务的原产地、原料、制造方法、质量或者其他特定品质", "D": "以团体、协会或者其他组织名义注册，供该组织成员在商事活动中使用，以表明使用者在该组织中的成员资格"},"answer":"D","explanation":"。A、C选项，由于2020年新冠情的账响，以雷神山、停市山注册商标属于《商标法>第10条第1款第（八）项规定的有害于社会主义道德风尚成者有其他不良影响的情形，因此A、C选项不可以注册商标。B选项，根据《商标法>第10条第2款的规定，昆山属于县级以上行政区划的地名，不可以注册商标。D选项，本山可以注册商标。（新编，思维扩展）","chapter":"第一章 注册商标专用权的客体"},
  {"id":518,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列哪些可以作为商标申请注册？（多选）","options":{"A": "三维标志", "B": "声音", "C": "气味", "D": "朗色组合"},"answer":"ABCD","explanation":"。A选项，国家知识产权局作为国家机关不能申请商标，因此A选项不能作为商标注册。B选项，“扬州炒饭”是中餐莱肴通用名称，因此B选项不能作为而标注册。C选项，中回立任因此C选项不他作为而标注册。D选项，跟值店役犯了居咖呦的姓名权，因此D选项不能作为商标注册。（新编，思维扩展）","chapter":"第一章 注册商标专用权的客体"},
  {"id":519,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列哪些商标不能在我国获准注册？（多选）","options":{"A": "单一颜色商标", "B": "立体商标", "C": "位置商标", "D": "声音商标"},"answer":"ACD","explanation":"。A选项，一般商品在市场销售，不一定使用注册商标，目前只有烟草类产品必须使用注册商标，因此A选项错误。D选项，《我不是神》为电影名称，享有著作权，该所标报害其在先权利，不能获得注册，因此B选项正确。C选项，“我不是药神”作为商标能区分出商品或服务的规供者、具有显著性，因此C选项错谈。D选项，由干“我不是药神”享有著作权，一旦在市场上销售，格会役犯若作权，因此D选项错误。（2018，思维扩展）","chapter":"第一章 注册商标专用权的客体"},
  {"id":520,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列关于证明商标、集体商标的哪些说法是正确的？（多选）","options":{"A": "地理标志可以作为证明商标申请注册", "B": "地理标志可以作为集体商标申请注册", "C": "集体商标只能是服务商标", "D": "证明商标只能是商品商标"},"answer":"A","explanation":"。《商标法》第32条规定：“申请商标注册不得损害他人现有的在先权利，也不得以不正当手及抢先注册他人已经使用并有一定影响的商标”。本题中，米老风形象属于迪士尼公司的作品，因此侵犯他人的著作权，A选项正确。（新编）","chapter":"第一章 注册商标专用权的客体"},
  {"id":521,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，关于地理标志的说法正确的是：（单选）","options":{"A": "地理标志注册为商标必须为集体商标或证明商标", "B": "商标中有商品的地理标志，误导公众的，不予注册但可以使用", "C": "商标中有商品的地理标志，由于该商品并非来源于该标志所标示的地区，误导公众，即便已经善意取得注册仍可宜告无效", "D": "地理标志商标与普通商标之间不能进行近似性比较"},"answer":"BCD","explanation":"。A、B选项，《商·标法》第4条第1数中规定，自然人、法人或者其他组织在生产经营活动中，对其商品或者服务帘要取得商标专用权的，应当向国务院商标管理部门申请商标注册，因此商标申请人不得要在中国实际经营，但是应当有经管的资格，因此A选项错误，B选项正确。C选项，《商标法》第17条规定：“外国人或者外国企业在中国申请商标注册的，应当按其所属国和中华人民共和国签订的协议或者共同参加的国际条约办理，或者按对等原则办理”，外国人中请注舟商标没有居所的限定，因此C选项正确。D选项，（岗标法》第5条中规定，两个以上的自然人、法人或者其他组织可以共同向国务院商标管理部门申请注册同一商标，共同享有和行使该商标专用权，因此D选项正确。（2006）","chapter":"第一章 注册商标专用权的客体"},
  {"id":522,"topic":"专题六 商标法","type":"multiple","question":"“慈溪蜜梨”产于浙江省宁波市慈溪市，因其不同于一般裂子，果大，水分特别充足，营养极为丰富而出名。现该地区欲对“慈溪密梨”地理标志进行注册保护，在商标法体系下可以如何申请注册？（单选）","options":{"A": "申请注册普通商标", "B": "申请注册地名商标2026年专利代理师普格考试", "C": "申请注册组合商标", "D": "申请注册证明商标"},"answer":"ABD","explanation":"。《商标法>第4条第1款中规定，自人、法人或者其他组织在生产经营活动中，对其商品或者服务留要取得商标专用权的，应当向国务专通六商标法良商标管理细门中济商标连进：资标连用干商业经营，店管进供，企业法人片可以从单生产迹管济，可以作方商标连后中请人，党政机关不能从单生产腔管语动，不中请注册声标，单业单位罚分情况，自负盈亏的华业单位可以从本生产经管，也可以作力前标注府中请人，全设收市业单位你馈国食牧，不能从卓生产径售，但是厚日中并来财事业单位的类登进行区分，只偿您院的说法，事业单位可以作力标注府中请人，因北A、B.D选项正嘴，C选项借误。（新偏）","chapter":"第一章 注册商标专用权的客体"},
  {"id":523,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列哪些不得作为商标注册的三维标志？（多选）","options":{"A": "仅有指定使用商品的通用形状、无显著特征的", "B": "仅由商品自身的性质产生的形状", "C": "使商品具有实质性价值的形状", "D": "为获取技术效果而需有的商品形状"},"answer":"BCD","explanation":"，A选项，《离你法》信18象规定：“中请商标注册成普办理其您商场事宜，平以自行办理，也可以类论依设立的商标代是机梅办理。外国人成者外国企业在中国中请场注滑和办理其他商标事宜的，应收费托优法设文的薄标代理机构办理”，四北人选项借视。B逸项，（资你决）容19条第2款规定：“要托人中请注册的商标可能存在本法规定不得注册情形的，读坏代理机构应当明确否知委托人”，回此B逸项正确。C选项，（闻标法）第19条第4款规定：“薄标代理机将除对其代理股务中请商标注册外，不得中请法册其他商标”，因此C选项正确。D选项，（前标法》第19条馆1款规定：“商标代理机构：对在代理过程中知录的被代理人的商业秘密，负有保密义务”，回此D选项正确。（2014）","chapter":"第一章 注册商标专用权的客体"},
  {"id":524,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列哪些标志可以作为商标使用？多选）","options":{"A": "同中华人民共和国国歌近似的", "B": "同政府间国际组织的名称近似，但经该组织同意的", "C": "缺乏显著特征的标志", "D": "同“红十字”的名称近似的"},"answer":"AB","explanation":"。《商标法》第18条第2款规定：“外国人或者外国企业在中国中请商标注册和亦理其他商标事宜的，应当委托依法设立的商标代理机构办理”，《商标条例》第5条第4款规定：“商标法第18条所称外国人成者外国全业，是指在中国设有经常居所或者营业所的外国人成者外国企业”，国此A、B选项得要委托代理机构，C、D选项元委托代理机构。（2012）","chapter":"第一章 注册商标专用权的客体"},
  {"id":525,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列哪些标志不得作为商标使用？（多选）","options":{"A": "带有民族歧视性的", "B": "带有欺骗性，容易使公众对商品的产地产生误认的", "C": "仅直接表示商品的质量、主要原料、功能、用途、重量、数量及其他特点的", "D": "同某国的国旗近似且未获得该国政府同意的"},"answer":"ABCD","explanation":"。根据《商标法》第68冬的规定，商标代理机构有下列行为的，由负资商标执法的部门责令限期改正，给子警告：构成犯罪的，依法迫究刑事资任：以证双其他商标代理机构等手段招休商标代理业务或者以其他不正当手段批乱岗标代理市场秩序的：代理不以他用为目的的吊宽前标注册申请：商标代理机构知道成者应当知通委托人申请注册的而标属于不得接受委托俏形，接收其委托的：商标代理机构除对其代理服务中请商标注册外，申请注册其他商标。四此A、B、C、D选项说法均正确。（新编）","chapter":"第一章 注册商标专用权的客体"},
  {"id":526,"topic":"专题六 商标法","type":"multiple","question":"声音商标如何才能取得显著特征？","options":{"A": "可以用文字进行描述的声音", "B": "长期使用", "C": "设计独特", "D": "注册"},"answer":"BD","explanation":"。A选项，根据《商标条例>第85条的规定，商标代理从业人员不得以个人名义自行愤受委托，因此A选项错误。B选项，（商标法》第19条第4款规定：“商标代理机构除对其代理風务中请商标注册外，不得中请注册其他商标”，因此B选项正确。C选项，根据《商标法》第19条的规定，商标代理机构对在代理过程中知悉的被代理人的商业科密，负有保密义务，因此C选项错误。D选项，《商标法》第19条第2款规定：“委托人申请注册的商标可能存在本法规定不得注册情形的，商标代理机构应当明确告知委托人”，因此D选项正确。（新编）","chapter":"第一章 注册商标专用权的客体"},
  {"id":527,"topic":"专题六 商标法","type":"multiple","question":"根据商标法的规定，下列哪些说法是正确的？（多选）","options":{"A": "申请注册的商标应当有新颖性", "B": "申请注册的商标应当有显著特征，便于识别", "C": "申请注册的商标应当有实用性，富有美", "D": "申请注册的商标不得与他人在先取得的合法权利相冲突"},"answer":"ABC","explanation":"。根据《商标法>第19条第3款的规定，商标代理机构知道或者应当知道委托人中请注册的商标属于商标法第4条（不以使用为目的的恶意申请）、第15条（代理人、代表人或其他特定关系人的抢注）和第32条（损害他人现有的在先权利或抢注已经使用并有一定影响的商标）规定情形的，不得接受其委托，因此A、B、C选项正确，D选项错误。（新编）","chapter":"第一章 注册商标专用权的客体"},
  {"id":528,"topic":"专题六 商标法","type":"multiple","question":"河北省魏县出产的鸭梨营养丰富，口感独待，远近闻名，当地有关单位拟对其采取的保护措施中，哪些是不符合商标法规定的？（多选）梨上","options":{"B": "将“魏县鸭裂”申请注册为证明商标，使用于鸭梨上", "C": "将鸭裂的形状申请注册为立体商标，使用于鸭梨上", "D": "将“香裂“申请注册为文字商标，使用于鸭裂上"},"answer":"AC","explanation":"。A选项，商标代理机构的股东不晨于商标代理的从业人员，因此可以以其他公司的名义申请商标，A选项正确。B选项，（商标法》第19条第3款规定：“商标代理机构知道或者应当知道委托人申请注册的商标属于本法第4条、第15条和第32条规定情形的，不得接受其委托”，因此B选项错误。C选项，《商标法》第19条第4款规定：“商标代理机构除对其代理服务申请商标注册外，不得申请注册其他商标”，因此C选项正确。D选项，（商标条例》第85条第2款规定：“商标代理从","chapter":"第一章 注册商标专用权的客体"},
  {"id":529,"topic":"专题六 商标法","type":"multiple","question":"河川县盛产荔枝，远近闻名。该县成立了河川县荔枝协会，申请注册了“河川”商标，核定使用在荔枝商品上，许可本协会成员使用。加人该荔枝协会的农户将有“河川\"商标包装的荔枝批发给盛联超市销售。超市在销售该批荔枝时，在荔枝包装上还加贴了自己的注册商标“盛联”。下列哪些说法是正确的？多选）","options":{"A": "“河川”商标是集体商标", "B": "“河川\"商标是证明商标", "C": "“河川”商标使用了县级以上行政区划名称，应被宣告无效", "D": "盛联超市的行为没有侵犯商标权"},"answer":"AC","explanation":"。A.D选项，健<商标代是宣信管理定>第5答的定，商标代屋机梅从非回发加识产权局主管的商标事宜代理业券的，应当依法庆叶向回求知识产权府各震。筒标代理机均等震的有效期力了年。梦次居虎谷紧的有发期力3单，自原各震有效期满次日起计算，因此左遗项正确，D选项借误。B透项，（剪标代理篮管管观规定>第7条虎定：”闻标代理机析各爱信乌交生变化的，应当自实际发生受化虎管有关主管部门促记、他准之日起30日内向国双加识产权局办交更谷案，并提交相应片料”，因此B逸项借煲。C逸项，（司标代理宣管管理现定》第8条第3款规定：吻你代定不再从事商标代理业务前，成省自接对缴销、吊销决定书、水久停止受理其办理前际代理业务决定之日起30日内，按所法你法规现定和合同所定安客处理未办结的剪标代理业务”国此C逸项正确。（新）","chapter":"第一章 注册商标专用权的客体"},
  {"id":530,"topic":"专题六 商标法","type":"multiple","question":"根据《商标法》及相关规定，下列哪些标识不得作为商标使用？（多选）","options":{"A": "“红新月”名称及标志", "B": "“叫只鸡“在酒店等服务上", "C": "国家知识产权局的标志", "D": "“中国强制性产品认证（CCC）“标志"},"answer":"ABCD","explanation":"。A选项，（商标代理监督管理规定》第21条规定：以下信息应资记入商标代理机构和商标代理从业人员信用档紫：（一）商标代理机构和商标代理从业人员受到行政处罚的信息….”，因此A逸项正确。B选项，《商标代理生督管理规定》第22条规定：商标代理机构应当按凤国家有关规定报送年度投告”，因此B选项正确。C选项，《商标代理监督管理规定》第24条规定：“知识产权管理部门依法对商标代理机构和商标代理从业人员代理行为进行监督检查商标代理机构和商标代理从业人员应当干以协助配合”，《商标代理监管管理规定》第25条第2款规定：“对存在商标代理违法违规行为的商标代理机构或者商标代理从业人员，知识产权管理部门可以依职资对其进行约谈、提出意见，督促其及时整改”，因此C选项正确。D选项，《商标代理监督管理规定》第23条规定：“商标代理机构故意犯知识产权，提交恶意商标注册申请，捐社会公共利丝，从事严重违法而标代理行为，性质恶劣、情节严重、社会危害较大，受到较重行政处罚的：按照《市场督管理严重违法失信名单管理办法》等有关规定列入严重违法失信名单”、因此D选项正确。（新编）又的取得","chapter":"第一章 注册商标专用权的客体"},
  {"id":531,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列哪项名称可以注册商标？（单选）","options":{"A": "雷神山", "B": "昆山", "C": "钟南山", "D": "泰山"},"answer":"ABCD","explanation":"。A选项，《商标条例》第13条第1款中规定，每一件商标注册申请应当向国务院商标管理部门提交《商标注册申请书》1份、商标图样1份，因此A选项正确。B选项，《商标条例>第13条第7款规定：“商标为外文或者包含外文的，应当说明合义”，因此B选项正确。C选项，《商标条例》第15条第2款规定：“商标注册中请等有关文件以纸质方式提出的，应当打字或者印别”，因此C选项正确。D选项，根据《商标条例》第14条的规定，中请商标注册的，申请人应当提交其身份证明文件，因此D选项正确。（2012）","chapter":"第一章 注册商标专用权的客体"},
  {"id":532,"topic":"专题六 商标法","type":"multiple","question":"下列哪些标记不能作为商标注册？多选）","options":{"A": "国家知识产权局对其局徽申请商标", "B": "扬州市烹饪协会申请“扬州炒饭”作为地理标志集体商标，指定服务为饭店、餐厅", "C": "中国烹饪协会申请“烹任名师”作为证明商标", "D": "某眼镜店申请“屠呦呦”商标，指定商品为眼镜"},"answer":"AC","explanation":"。《商标法》第22条第2、3款规定：“商标注册申请人可以通过一份申请就多个类别的商品申请注册同一商标。商标注册申请等有关文件，可以以书面方式成者数据电文方式提出”，因此AC选项正确，B、D选项错误。（2016）","chapter":"第一章 注册商标专用权的客体"},
  {"id":533,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，某企业在其生产的人用药品上使用“我不是药神”作为商标使用，但未进行注册，下列哪些说法是错误的：（多选）","options":{"A": "该商标未经注册，不得在市场销售", "B": "该商标损害他人在先权利，不能获得注册", "C": "该商标不具备显著性，不能注册", "D": "该商标不需要经过注册即可使用，也可以在市场上销售"},"answer":"BD","explanation":"。《商标法》第22条第3款规定：“商标注册申请等有关文件，可以以书面方式或者数据电文方式提出”，因此B、D选项正确。（新编）","chapter":"第一章 注册商标专用权的客体"},
  {"id":534,"topic":"专题六 商标法","type":"multiple","question":"某企业未经许可将迪士尼公司的米老鼠形象擅自作为商标申请注册使用在白酒上，该企业的行为属于？（单选）","options":{"A": "侵犯他人的著作权进行注册", "B": "虚构事实真相申请注册", "C": "模仿他人的作品作为商标进行注册", "D": "使用商标法禁止使用的图形进行注册"},"answer":"CD","explanation":"。A选项，《商标法》第23条规定：“注册商标得要在核定使用范图之外的商品上取得商标专用权的，应当另行提出注册申请”，因此A选项错误。B选项，（商标法》第24条规定：“注册商标留要改变其标志的，应当重新提出注册申请”，因此B选项错误。C、D选项，（商标法》第41条规定：“注册商标得要变更注册人的名义、地址或者其他注","chapter":"第一章 注册商标专用权的客体"},
  {"id":535,"topic":"专题六 商标法","type":"multiple","question":"根据商标法的规定，下列说法哪些是正确的？（多选）","options":{"A": "商标注册申请人应当是已经在我国生产商品或者提供服务的经营者", "B": "商标注册申请人应当有生产经营活动的资格", "C": "商标注册申请人可以是在中国没有经常居所的外国人", "D": "商标注册申请人可以是两个或两个以上的自然人"},"answer":"ACD","explanation":"。A.B选项，（前擦法）第2S茶规定：“商标注册中请人自其前标在外回第一次提出闻标注册中请之日起6个月内，又在中回相同商品以同一商标捷出商标注册中请的，优质该外回向中国签订的协议或者共同多加的回际签约，或者按图相互承认优先权的愿则，可以享有优先权”，享有优先权必须统相回商品以同一商标提出中请的，因此A选项正确，B选项借误。C、D途项，（商标法》第26条规定：“前标在中国政府主办的或者承认的国际展览会展出的商品上首次使用的，自该商品展出之日起6个月内，该商标的注册中请人，可以享有优先权”，因此C、D选项正喻。（2006）","chapter":"第一章 注册商标专用权的客体"},
  {"id":536,"topic":"专题六 商标法","type":"multiple","question":"下列哪些法人或组织可以作为商标注册申请人？（多选）","options":{"A": "慈普组织", "B": "企业法人", "C": "党政机关", "D": "事业单位"},"answer":"CD","explanation":"。概据《商标法》第25条的规定，商标注册中请人自其商标在外国第一次提出商标注册中请之日起6个月内，又在中国就相同商品以同一商标提出商标注册中请的，依原该外国同中国签订的协议或者共同参加的国际冬约，或者按国相互承认优先权的原则，可以享有优先权，依应前款要求优先权的，应当在提出商标注册中请的时食提出书面声明，并且在3个月内提交第一次提出的商标注册中请文件的副本；未提出书西声明或者逾期未提交商标注册申请文件副本的，视为未要求优先权，因此A、B选项错误，C、D选项正确。(2011)","chapter":"第一章 注册商标专用权的客体"},
  {"id":537,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列关于商标代理机构的哪些说法是正确的？多选）","options":{"A": "申请商标注册或者办理其他商标事宜，应当委托商标代理机构办理", "B": "委托人申请注册的商标可能存在商标法规定不得注册情形的，商标代理机构应当明确告知委托人", "C": "商标代理机构除对其代理服务申请商标注册外，不得申请注册其他商标", "D": "商标代理机构对在代理过程中知悉的被代理人的商业秘密，负有保密义务"},"answer":"BCD","explanation":"。A、B选项，（商标法）第30条中规定，中请注册的商标，凡不符合本法有关规定政同他人在同一种商品成者类似商品上已经注册的戏者初步审定的商标相同或者近似的，由国务院育标管理部门驳回中请，不子公告，因此人选项销识，B选项正确。C选项，《商标法》第31条规定：“两个成者两个以上的商标注册申请人，在同一种商品或者类似商品上，以相同成者近似的商标申请注册的，初步申定并公告中请在先的商标”，因此C选项正确。D选项，（商标法）第32条规定：“中请商标注册不得损害他人现有的在先权利，也不得以不正当手抢先注册他人已经使用并有一定影响的商标”，因此D选项正确。（2017）","chapter":"第一章 注册商标专用权的客体"},
  {"id":538,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，在中国申请注册商标或办理其他商标事宜的，下列哪些应当委托国家认可的具有商标代理资格的组织代理？多选）","options":{"A": "在中国没有经常居所的美国人", "B": "在中国没有营业所的英国企业", "C": "在中国有经常居所的美国人", "D": "在中国有营业所的英国企业"},"answer":"BD","explanation":"。A、B、C选项，《商标条例》第19条中规定，两个或者两个以上的中请人，在同一种商品成者类似商品上，分别以相同成者近似的商标在同一天申请注册的，应当自收到国务院商标管理部门通知之日起30日内提交使用证据。同日使用成者均未使用的，可以自收到通知之日起30日内自行协商，并将书面协议报送国务院商标管理部门；不愿协商或者协商不成的，国务院商标管理部门通知各申请人以抽签的方式确定一个申请人，回其他人的注册申请，国务院商标管理部门已经通知但申请人未参加抽签的，视为放弃申请。因此A、C选项错误，B选项正确。D选项，根据《商标法》第31条的规定，两个或者两个以上的商标注册申请人，在同一种商品或者类似商品上，以相同或者近似的商标申请注册的，初步审定并公告申请在先的商标，因此D选项正确。（新编）","chapter":"第一章 注册商标专用权的客体"},
  {"id":539,"topic":"专题六 商标法","type":"multiple","question":"商标代理机构有下列哪些情形的，需要承担法律责任？多选）","options":{"A": "以低毁其他商标代理机构等手段招徕商标代理业务或者以其他不正当手段扰乱商标代理市场秩序的", "B": "代理不以使用为目的的恶意商标注册申请", "C": "商标代理机构知道或者应当知道委托人申请注册的商标风于不得接受委托情形，接受其委托的", "D": "商标代理机构除对其代理服务申请商标注册外，申请注册其他商标"},"answer":"AC","explanation":"。A、B、C选项，《商标法》第31条规定：“两个成者两个以上的商标注册申请人，在同一种商品或者类似商品上，以相同成者近似的商标申请注册的，初步审定并公告申请在先的商标；同一天申请的，初步审定并公告使用在先的商标，回其他人的申请，不予公告”，因此A、C选项正确，B选项错误。D选项，根据《商标条例》第19条的规定，同日申请但均未使用的，各申请人先协商，协","chapter":"第一章 注册商标专用权的客体"},
  {"id":540,"topic":"专题六 商标法","type":"multiple","question":"关于商标代理机构，下列哪些说法是正确的？（多选）","options":{"A": "商标代理从业人员可以以个人名义自行接受委托", "B": "商标代理机构除对其代理服务申请商标注册外，不得申请注册其他商标", "C": "商标代理机构对在代理过程中知悉的被代理人的商业秘密，没有保密义务", "D": "委托人申请注册的商标可能存在商标法不得注册情形的，商标代理机构应当明确告知委托人"},"answer":"ABC","explanation":"。A去项属于（标法）第10条第1款第（八）项规定的不您作力弯标使用的情形，B透项属千（前标法）第11等路1使信（三）项胱是的不能作力剪标注府的情形，C当项符合《岗标法>第30集造反注府在先限别的敬回理由，四此A.B、C速项均居于段回屋由。D选项，（育标条例）第18等第2放中规定，中请手偿不并各，未接质增是境万申请文件或者未激纳费用的，国务院前标曾师门不千，书面通知申请人并说明由，四北D选项术微费不是改回观由。（2019）[2.CD。A选项，概费《前标法》第32条的现定，以不正当手段抢先注后他人已险使用并有一定影响的商标不得合规定，但不属平政回曝由，通过异议戏无放解决该问题，因北A选项借误，B选项的情况应当先房，协弯不成拍答，不易于敬回情形，因北B选项错误。C选项，（育标法）第4条第1款规定：”不以使用力目的的感意剪坏注册中请，应当子以税回”，因北C念项正。D途项，概据（商标法》第10、30条的规定，以不得作方商标使用的标志中请注册言标不符合规定，应资予以驳回，因此D选项正确。（新缩）","chapter":"第一章 注册商标专用权的客体"},
  {"id":541,"topic":"专题六 商标法","type":"single","question":"商标代理机构应当遵循诚实信用原则，知道或者应当知道委托人申请商标注册属于下列哪些情形，不得接受其委托？多选）","options":{"A": "申请人申请注册商标属于不以使用为目的的恶意申请注册的", "B": "恶意抢注他人在先具有一定知名度商标的", "C": "申请人与他人存在合同或业务往来关系，就同一种商品或者类似商品申请注册的商标与他人在先使用的-170 -未注册商标相同或者近似的", "D": "申请人申请注册的商标可能与他人在先已注册商标相同成近似的"},"answer":"B","explanation":"。概据（商标法》第34条的规定，对敬回申请、不子公告的商标，商标注中请人不展的。可以自收到通知之日起15日内向商标评审部门中请复审，当事人对商标评审部门的决定不度的，可以自收到通知之日起30日内向人民法院起诉，因此A、C、D选项错误，B选项正确。（新输）","chapter":"第一章 注册商标专用权的客体"},
  {"id":542,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，关于商标代理机构申请国际注册的说法，下列哪些是正确的？（多选）","options":{"A": "商标代理机构的股东可以以其他公司的名义申请商标", "B": "商标代理机构可以接受委托人所有自愿申请商标的委托", "C": "商标代理机构只能申请代理服务上的商标", "D": "商标代理机构从业人员可以以个人名义接受委托"},"answer":"BC","explanation":"。A选项，对初步审定商标提出异议的主体井没有国籍的限创，因此A选项错误。（商标法》第33条中规定，对初步审定公告的商标，自公告之日起3个月内，在先权利人、利害关系人认为违反商标法第30条的，可以向国务院商标管理部门提出异议。公告期满无异议的，于以核准注后，发给商标注册证，并子公告，因此B选项正确。C选项，根据（商标法》第18条规定，外国人或者外国企业在中国中请商标注册和办理共他商标事宣的、应当委托依法设立的商标代理机构办理，团此，汤姆的异议中请应委托代理机构代为提出，C选项正确。D选项，根据《商标法》第35条规定，自公告期满之日起12个月内佩出是否准于注舟的块定，并书面通知异议人和被异议人。有特殊情况蒋要延长的，经批准，可以延长6个月。因此，异议审理期限最长可以为18个月，D选项仆误。（2011改编）","chapter":"第一章 注册商标专用权的客体"},
  {"id":543,"topic":"专题六 商标法","type":"multiple","question":"以下关于商标代理机构备案说法正确的是？（多选）","options":{"A": "商标代理机构从事国家知识产权局主管的商标事宜代理业务的，应当依法及时向国家知识产权局备案，备案的有效期为3年", "B": "商标代理机构备案信息发生变化的，应当自实际发生变化或者有关主管部门登记、批准之日起3个月内向国家知识产权局办理变更备案，并提交相应材料", "C": "商标代理机构应当在申请市场主体注销登记或者自行决定不再从事商标代理业务前，按照法律法规规定和合同约定妥善处理未办结的商标代理业务", "D": "商标代理机构每次延续备案的有效期为3年，自办理备案之日起计算"},"answer":"ABCD","explanation":"。根据《商标法》第33条的规定，对初步审定公告的商标，自公告之日起3个月内，在先权利人、利害关系人认为违反商标法第13条第2数和第3款（复例、基仿、翻译他人驰名商标）、第15条、第16条第1款、第30条、第31条、第32条（损事他人现有的在先权利或抢注已经使用并有一定影响的商标）规定的，可以向国务院商标管理部门提出异议。因此A、B、C、D选项均正确。（2016）","chapter":"第一章 注册商标专用权的客体"},
  {"id":544,"topic":"专题六 商标法","type":"single","question":"以下关于对商标代理机构的监管说法正确的是？（多选）","options":{"A": "对商标代理机构和商标代理从业人员受到行政处罚的信息，应记人信用档案", "B": "商标代理机构应当按照国家有关规定报送年度报告", "C": "知识产权管理部门可以对商标代理机构和商标代理从业人员代理行为进行监督检查，对存在商标代理违法违规行为的商标代理机构或者商标代理从业人员，知识产权管理部门可以依职责对其进行约谈", "D": "商标代理机构故意侵犯知识产权，受到较重行政处罚的，应按照有关规定列人严重违法失信名单"},"answer":"C","explanation":"。A选项，只有提出的异议理由属于不符合商标法第10条、第11条等这类绝对理由时，才可由任何人提出异议，如果提出的异议理由属于不符合商标法第13条第2款或第13条第3数等这类相对理由时，只能由利害关系人提出异议，因此A选项错误。B、C选项，根据《商标法》第36条第2数的规定，经审查异议不成立而准子注册的言标，商标注册申请人取得商标专用权的时问自初步审定公告3个月期满之日起计算，因此B选项错误，C选项正确。D选项，根据《商标法》第35条的规定，国务院商标管理部门做出准予注册决定，异议人不服的，可以向商标评审部门请求宣告该注册商标无效；国务院商标管理部门做出不予注册决定，被异议人不服的，可以向商标评审部门申请复申，因此D选项错误。（新编）","chapter":"第一章 注册商标专用权的客体"},
  {"id":545,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列关于商标注册申请的哪些说法是正确的？多选）","options":{"A": "申请商标注册应当提交《商标注册申请书》和商标图样", "B": "申请注册的商标为外文或者包含外文的，应当说明其含义", "C": "商标注册申请等有关文件以纸质方式提出的，应当打字或者印刷", "D": "商标注册申请人应当提交其身份证明文件"},"answer":"AD","explanation":"。根据《商标条例>第26条规定，商标异议申请有下列情形的，国务院商标管理部门不予受理，书面通知申请人并说明理由：（一）未在法定期限内提出的：（二）申请人主体资格、异议理由专圆六商标法不许合前标法常33集定时：（三）无啡的单理山，事实和法律依措的：（四）何一岸议人以惜同的项山，事实和法律依培针对间一资标再次捷出以中请的，因此A.D选明属干不平变理以伪情形，日选项，根赠前标游诺3等的规定，在先权村人，相害关系人可以中请指议。C选项，同一异以人扑充了新证据，比异以可变理，（折）","chapter":"第二章 商标专用权的取得"},
  {"id":546,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "商标注册申请人可以通过一份申请就多个类别的商品申请注册同一商标", "B": "商标注册申请人不得通过一份申请就多个类别的商品申请注册同一商标", "C": "商标注册申请等文件可以以数据电文方式提出", "D": "商标注册申请等文件不得以数据电文方式提出"},"answer":"C","explanation":"。根据（商标法）第35条第2.3次的定，回务院博标管量部门效出准予连册决定的，没给商标注册证，并中公告。异议人不展的，可以依圆本法第44条、第45条的规定句育济审部门请次宜告很泌册前标无效。异议人不度的，可以自收到通扣之日起15日内句育标评审佛门申请凭审，被异议人对商你评审部门的决定不股的，可以自收到通知之日起30日内向人民法院起诉，四北A、B、D选项错误，C选项正确。（新价）","chapter":"第二章 商标专用权的取得"},
  {"id":547,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，商标注册申请等有关文件可以什么方式提出？多选）","options":{"A": "由申请人本人录音录像", "B": "书面方式", "C": "在商标受理窗口口头提出", "D": "数据电文"},"answer":"C","explanation":"。《剪标法》第3S条第3数中现定，国务院标管理部门做出不予注册决定，异议人不度的，可以自收到通知之日起15日内向商标评审部门中请复中，被异议人对商标评审部门的决定不服的，可以自收到通知之日起30日内向人民法院起诉。人民法院应当通知异议人作力第三人多加诉讼，因此A、B、D选项错误，C选项正确。（2017）","chapter":"第二章 商标专用权的取得"},
  {"id":548,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "注册商标需要在核定使用范围之外的商品上取得商标专用权的，应当提出变更申请", "B": "注册商标需要改变其标志的，应当提出变更申请", "C": "注册商标需要变更注册人地址的，应当提出变更申请", "D": "注册商标需婴变更注册人名义的，应当提出变更申请"},"answer":"D","explanation":"。A选项中“精卫”印指“精卫马”，二者合义相同，构成近仅商标。B、C选项中商标文字结构相近，使商标的整体外观近仅，属于近似商标。D选项两件商标虽然读音相同，但是合义与整体外观区别明显，不属于近依商标。（新增，思维扩展）峰”合义相同，构成近似商标。B选项中“北英风情”和“北欧风情”文字读音、字形明是不同，不属于近似商标。C选项虽读音相同，但是合义区别较大，不属于近似商标。D选项“球王”和“球”合义区别明显，不属于近似商标。（新编；思维扩展）","chapter":"第二章 商标专用权的取得"},
  {"id":549,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，在下列哪些情形下，应当提出新的商标注册申请？多选）","options":{"A": "注册商标需要在核定使用范围之外的商品上取得商标专用权的", "B": "商标注册申请人变更其名义的", "C": "注册商标需要改变其标志的", "D": "商标注册申请人删减指定的商品的"},"answer":"ABD","explanation":"。A选项，“凰”和“凤凰“仅为简体和紫体的区别，属于相同商标。B选项，“Susanna”和“SUSANNA“仅为大写和小写的区别，属于和词商标。C选项，“亚美航空“和“美亚医疗”的育标会义成呼叫区别明显，不易使相关公众对商昌成者凰务的来源户生混消，既不是相同商标也不是近似商标。D选项，“新康得“和“新得康”的汉字构成相同，推列顺序不同，属于近似商标。（新编，息维扩展）","chapter":"第二章 商标专用权的取得"},
  {"id":550,"topic":"专题六 商标法","type":"multiple","question":"根据商标法的规定，下列哪些情形下，巴黎公约成员国的商标注册申请人可以在中国享有优先权？多选）","options":{"A": "申请人自其商标在巴黎公约成员国第一次提出商标注册申请之日起6个月内，又在中国就相同商品以同一商标提出商标注册申请的", "B": "申请人自其商标在巴黎公约成员国第一次提出商标注册申请之日起6个月内，又在中国就类似商品以同一商标提出商标注册申请的", "C": "申请人在中国政府主办的国际展览会展出的商品上首次使用的商标，自该商品展出之日起6个月内，在中国就相同商品以同一商标提出商标注册申请的", "D": "申请人在中国政府承认的国际展览会展出的商品上首次使用的商标，自该商品展出之日起6个月内，在中国就相同商品以同一商标提出商标注册申请的"},"answer":"AD","explanation":"。A选项，“CATANA”和“KATANA”為然首字母不同，但读并及整体外观近似，属于近位近似，但“喜马拉雅”为公众所熟知，因“享马辣鸭”包合特定设计离意，二者整体外观区别明显，不属于近似商标。C选项，“LOVE”和“EOVE”首字母发音及字形明显不同，区别明显，不易使相关公众产生泥滑，不属于近似商标。D选项，“业拉圆莎”和“梦拉丽莎”虽然首字不同，但读音相近且合义无明显差异，为近似商标。（新编，思维扩展）","chapter":"第二章 商标专用权的取得"},
  {"id":551,"topic":"专题六 商标法","type":"multiple","question":"巴黎公约某成员国的公民史密斯，首次将某商标向其所在国提出申请，此后欲就该商标向中国提出商标注册申请并要求优先权。根据商标法及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "其优先权期限为自史密斯对该商标在该外国第一次提出商标注册申请之日起十二个月", "B": "其优先权期限为自史密斯对该商标在该外国第一次获得商标注册之日起六个月", "C": "为享有优先权，史密斯应当在提出商标注册申请的时候提出要求优先权的书面声明", "D": "为享有优先权，史密斯应当在中国就相同商品以该商标提出商标注册申请"},"answer":"BD","explanation":"。A选项，相关公众可以区分红旗与我国的国旗、八一军旗，“红旗”文字商标使用于油落商品上可以注册，A选项不当选。B选项，“灭蚊”文字商标使用于整致商品上仅仅直接表示商品的功能，因此不可以注册，应当驳回。C选项，“光明”并非直接表示灯泡商品的功能，可以注册。D选项，红高梁是高梁酿制白酒的主要原料，不能作为文字商标注册，应当驳回，D选项正确。（法考2007，思维扩展）","chapter":"第二章 商标专用权的取得"},
  {"id":552,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列哪些说法是正确的？（多选）","options":{"A": "申请注册的商标，同他人在类似商品上已经注册的商标近似的，可以予以核准注册", "B": "申请注册的商标，同他人在同一种商品上已经注册的商标近似的，驳回申请，不予公告", "C": "两个商标注册申请人在类似商品上以相同的商标申请注册的，初步审定并公告申请在先的商标", "D": "申请商标注册时，不得以不正当手段抢先注册他人已经使用并有一定影响的商标"},"answer":"B","explanation":"。A选项，（集体商标、证明商标注册和管理规定》第6条规定：“集体商标、证明商标使用管理规则应当进行公告。注册人修改使用管理规则的，应当提出变更申请，经国家知识产权局审查核准，并自公告之日起生效。”，因此A选项错误。B选项，《集体商标、证明商标注册和管理规定》第13条规定：“证明商标注册人准许他人使用其商标的，注册人应当在许可后3个月内报国家知识产权局备案，并由国家知识产权局公告。”，因此证明商标注册人可以准许他人使用其证明商标，B选项正专圆六商标法，C违啡，（展体育标、注明高标注带管屋期定）赠15茶靠2软定：“晨体商惊注府人不啡件资集体商际作才作旭体此质便用”，因比C资代借供。D选项，（其体前际，注明前标注府和管风定>靠16签展定：“任才标注府人不啡在自已世供的前品上使用还明前标”，因出D选项借读。（昕詹）","chapter":"第二章 商标专用权的取得"},
  {"id":553,"topic":"专题六 商标法","type":"multiple","question":"甲乙两企业都拟在其所生产的服装商品上注册“蓝调”牌商标，均递交了注册申请。下列哪些说法是正确的？（多选）","options":{"A": "如果二者同一天申请且均未使用或同日使用的，应自行协商确定，协商不成的，将驳回双方申请", "B": "如果二者在同一天申请的，初步审定并公告使用在先的", "C": "如果二者在同一天申请的，各申请人应当在60天内交送第一次使用该商标的日期证明", "D": "如果二者均未使用”蓝调\"牌商标，应初步审定并公告申请在先的"},"answer":"ABCD","explanation":"，A透项.（建保前修、注听前保注后和管理规定>第3等器2发党定：“中请以海是你书作力集体剪标注后的团体、协合成者其您证织，建成质皮业来自谈地理你考你宗的医念谱内。”，因北大选项正噢。F选项，提据《醇你条9）第4条第2放观定：”…以均理标作方集体剪标注后的，其商品符合使用滨地理你考条体的自他人、法人或者其他旧识，可以婴求参如以波场理标名作力集体商标注册的团体、会成管其他旧仅…”，四化B逸项正确。C逸项，提据（体育标、证明商标注册和管理规定》够5物规定：“申请以地理标志作力证明前标、是体商标注所的，应附送管辖该地理标所标示地区的县级以上人民政府成者主管部门的抵准文件”，国此C选项正确。D选项，低据（集体商标、证明高标注册和管理办法》第7条规定：“以地理标志作方证明责标、怎体商标注册的，可以是该地理标志标示地区的名称，也可以是使修标示某育品来源于该地区的其他标志”，因此D选项说法正确。（新墙）的内容","chapter":"第二章 商标专用权的取得"},
  {"id":554,"topic":"专题六 商标法","type":"single","question":"甲、乙两公司均在同一种商品上申请注册“伊人”商标。根据商标法及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "如果甲公司先于乙公司一天提出注册申请，但乙公司便用在先，则应初步审定并公告甲公司申请注册的商标", "B": "如果甲公司先于乙公司一天提出注册申请，但乙公司使用在先，则应初步审定并公告乙公司申请注册的商标", "C": "如果甲、乙两公司同一天提出注册申请，但乙公司使用在先，则初步审定并公告乙公司申请注册的商标", "D": "如果甲、乙两公司同一天提出注册申请，且甲、乙公司均未使用该商标，则应直接通知甲、乙两公司以抽签的方式确定一个申请人，驳回另一人的注册申请"},"answer":"C","explanation":"。A、B选项，《商标法》第39条规定：“注册商标的有效期为10年，自核准注册之日起计算”，因此人、B选项错误。C选项，（商标法》第40条规定：“注册商标有效期满，得要继续使用的，商标注册人应当在期满前12个月内按照规定办理续展于续：在此期问未能办理的，可以给予6个月的宽展期。每次续展注册的有效期为10年……”，因此C选项正确。D选项，对续展次数没有限制，因此D选项错误。（2012）","chapter":"第二章 商标专用权的取得"},
  {"id":555,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列哪些情形的商标注册申请应当予以驳回？多选）","options":{"A": "申请注册的标志用作商标易产生不良影响的", "B": "申请注册的标志不具有显著特征的", "C": "申请注册的标志同他人在类似商品上已经注册的商标相同或者近似的", "D": "未缴纳商标申请费用的"},"answer":"D","explanation":"。根据《商标法》第39条的规定，注册商标的有效期为10年，自核准注册之日起计算。本题中，该商标于2017年6月5日公告期满，即该日被核准注册，因此自该日起有效，A、B、C选项错误，D选项正确。（2018）","chapter":"第二章 商标专用权的取得"},
  {"id":556,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列哪些属于应当驳回商标注册申请的情形？（多选）","options":{"A": "以不正当手段抢先注册他人已经使用并有一定影响的商标", "B": "两个或者两个以上的申请人，在同一种商品或者类似商品上，分别以相同或者近似的商标在同一天申请注册，且均未使用", "C": "不以使用为目的的恶意商标注册申请", "D": "以不得作为商标使用的标志申请注册商标"},"answer":"A","explanation":"。A、B、D选项，《商标法》第40条规定：“注册商标有效期满，留要继续使用的，商标注册人应当在期满前12个月内按照规定办理续展手续；在此期问未能办理的，可以给予6个月的宽展期。每次续晨注册的有效期为10年，自该商标上一届有效期满次日起计算。期满未办理续展手续的，注销其注册商标”。本题注册商标的届满日为2025年6月1日，某公司可以在该日前12个月期问提出续展注册中请，未办理的，还有6个月宽展期，商标权自该商标上一届有效期满次日起计算，不是从核准续晨注册日起算，因此A选项正确，B、D选项错误。C选项，根据《商标条例》第33条规定，注册商标衢要续展注册的，应当向国务院商标管理部门提交商标续展注册申请书。国务院商标管理部门核准商标注册续展申请的，发给相应证明并于以公告，因此带要经过国家知识产权局核准，不能收到续展注册申请后直接于以公告，C选项错误。（新编）","chapter":"第二章 商标专用权的取得"},
  {"id":557,"topic":"专题六 商标法","type":"single","question":"李某对驳回其商标注册申请的决定不服。根据商标法及相关规定，下列说法哪项是正确的？（单选）","options":{"A": "李某可以自收到通知之日起十五日内提出行政复议", "B": "李某可以自收到通知之日起十五日内申请复审", "C": "李某可以自收到通知之日起三个月内申请复审", "D": "李某可以自收到通知之日起三个月内向北京知识产权法院提起行政诉讼"},"answer":"D","explanation":"，A违项，中公可的偿准注浩日办年3月23日，有效期至2028年3月22满，四化中公可庄当在2027年3月23028年9月22日期间内是出终晨注册A选项借误。B逸项，商你续展后的有应自2028年3月23日是计靠，四北B借识。C选项（敬荡人民法院关于审标民事的份集体透用法律若干同厕的第5条现定：“标注后人成者利事关在注册商标续展定展明内堤出埃展中获核准前，以他人贷犯其注册简你中提起诉论的，人民法院应当史理”，四比项借误。D选项，《醇标法》靠50条中现生册前标微数销、微宜香无效或护期消续展的，自微得、宜告无放戏者注价之1年内，国务院商标管理部门对与该商同成者近似的商标注册中请，不予核自此D选项正确。（2011改编）","chapter":"第二章 商标专用权的取得"},
  {"id":558,"topic":"专题六 商标法","type":"multiple","question":"澳大利亚人汤姆逊认为我国初步审定并予以公告的某商标和其拥有的中国商标相近，欲提出异议。根据商标法及相关规定，下列说法哪些是正确的？多选）","options":{"A": "汤姆逊无权对该商标提出异议", "B": "汤姆逊有权提出异议，提出异议的时间期限为自公告之日起三个月内", "C": "汤姆逊有权提出异议，但应委托代理机构代为提出", "D": "汤姆逊有权提出异议，其异议审理期限最长为12个月"},"answer":"BCD","explanation":"。A、B选项.（商标法》靠42条欧规定：“转让注册商标的.首标注形人在同一种商品上注册的近依的商标，成类仅商品上注册的相同或近仅的商应当一并转让”，因此A选项进误，B选确。C选项，低据（商标法）第42条第1定，转让注册商标的，转让人和受让人签订转让协议，并共同向回务比商标管门提出中请，因此C选项正喻。D选商标法》第42条第4款规定：“转让注册经核准后，于以公告。受让人自公告之享有商标专用权”，因此D选项正确。2)","chapter":"第二章 商标专用权的取得"},
  {"id":559,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，对初步审定公告的商标，自公告之日起三个月内，在先权利人、利害关系人可以基于下列哪些理由提起异议？（多选）","options":{"A": "就类似商品申请注册的商标是基仿他人未在中国注册的驰名商标，容易导致混消的", "B": "就相同商品申请注册的商标是翻译他人未在中国注册的驰名商标，容易导致混消的", "C": "申请商标注册损害他人现有的在先权利的-176 -", "D": "以不正当手段抢先注册他人已经使用并有一定能响的商标的"},"answer":"ABCD","explanation":"。根据<商标条例>第69条的，许可他人使用其注册商标的，许可人应当在许可合同有效期内向商标局各案斗报送备案材料。备案材料应当说明注册商标使用许可人、被许可人、许可期限、许可使用的商品成者瓜务范国等事项。因此，A、B、C、D均正确。（新编）","chapter":"第二章 商标专用权的取得"},
  {"id":560,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列关于异议程序的说法哪项是正确的？（单选）","options":{"A": "初步审定的商标，先予以公告，自公告之日起三个月内，任何人均可以对其提出异议", "B": "经裁定异议不成立而核准注册的，商标注册申请人取得商标专用权的时间自异议裁定生效之日起计算", "C": "经裁定异议不成立而核准注册的，商标注册申请人取得商标专用权的时间自初审公告三个月期满之日起计算", "D": "当事人不服异议裁定的，可以自收到通知之日起三十日内向人民法院起诉"},"answer":"CD","explanation":"。A选项，《最商人民法院关干审理商标民事纠纷案件适用法律若干问期的解释）第19条规定：“而标使用许可合同未经备案的，不影响该许可合回的效力…….因此A选项借误。B、D选项，（最高人民法院关于审理商标民事纠纷案件适用法律若干问题的解释》第4条第2款规定：“在发生注册商标专用权被役害时，独占使用许可合同的被许可人可以向人民法院提起诉讼”，乙公司作为独占被许可人可以单独向人民法院起诉，因此B选项错误，D选项正确。C选项，如无特殊约定，甲公司作为商标注册人有权利向人民法院提起诉论，乙公司作为独占被许可人可以与甲公司共同提起诉讼，因此C选项正确。（2008）","chapter":"第二章 商标专用权的取得"},
  {"id":561,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列哪些选项风于不予受理的商标异议申请的情形？多选）","options":{"A": "申请人无明确异议理由", "B": "在先权利人、利害关系人共同提出异议申请", "C": "同一异议人为补充证据材料以相同的理由针对同一商标再次提出异议申请的", "D": "在商标初审公告之日起三个月后提出异议申请"},"answer":"BCD","explanation":"。A选项，（最高人民法院关于审理商标民事纠纷案件适用法律若干问题的解释>第19条规定：“商标使用许可合同未经备案的，不影响该许可合同的效力.…..”，因此A选项错误。B、C、D选项，《商标法》第43条规定：“许可人应当丝督被许可人使用其注册商标的商品质量。被许可人应当保证使用该注册商标的商品质量。经许可使用他人注册商标的，必须在使用该注册商标的商品上标明被许可人的名称和商品产地…….”，因此B、C、D选项正确。（2018）","chapter":"第二章 商标专用权的取得"},
  {"id":562,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，经审查对商标异议案件作出决定后，当事人不服的，下列关于救济程序的哪种说法是正确的？（单选）","options":{"A": "作出准予注册决定的，异议人不服的，可以申请复审", "B": "作出准予注册决定的，异议人不服的，可以申请行政复议", "C": "作出不予注册决定的，被异议人不服的，可以申请复审", "D": "作出不予注册决定的，被异议人不服的，可以向人2026年专利代理师井格考试民法院提起行政诉讼"},"answer":"BCD","explanation":"。《最高人民法院关于审理商标民事纠纷案件适用法律若干问题的解释）第3条第1数规定：“商标法第43条规定的商标使用许可包括以下三类：（一）独占使用许可··…（二）排他使用许可·（三）普通使用许可”，因此A选项错误，B、C、D选项正确。（2019）专圆六商标法权的消灭","chapter":"第二章 商标专用权的取得"},
  {"id":563,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，被异议人对不予注册的复审决定不服的，向人民法院起诉，下列哪种说法是正确的？（单选）","options":{"A": "人民法院应当通知异议人作为原告参加诉讼", "B": "人民法院应当通知异议人作为被告参加诉讼", "C": "人民法院应当通知异议人作为第三人参加诉讼", "D": "人民法院应当通知异议人作为证人参加诉讼"},"answer":"ABC","explanation":"。A.B.C选项.根借《商标法>笔44条第1款隐定，已经注所的你，造庆本法第10等定的，成者是以败离平胶改鲁其信不正出平反取注府的，由国务院剪标管理仍门宜告该注府商标无放：其他单位办音个人可以请求前棕评审部门宜杏该注府商标无发，人.B选项均属于违反商标法第10条规定的情形，因北A、B、C逸项可以由其他单位戏者个人请求宜告元效。D透项，根易（河标法>第45条第1款规定，已经注后的商将，违庆本法第32条规定的，自商标注府之日起5年内，在免权利人或者利害关系人可以请求前你评审部门宜告该注册商标无放，D选项属于违尺商桥法第32条规定的情形，因北应由在先权利人成者利事关系人请求商标诉审部门宜告无收。（201S）","chapter":"第二章 商标专用权的取得"},
  {"id":564,"topic":"专题六 商标法","type":"multiple","question":"下列哪组商标不构成近似商标？","options":{"A": "“精卫鸟”与“精卫”", "B": "“花中王”与“花中玉”", "C": "“酷几”与“酷儿”", "D": "“幸运树”与“幸运数”"},"answer":"ABC","explanation":"。A、B选项，（剪标法）第44条第1款中规定，已经注册的商标是以腐平民或其他不正当手取得注册的，由国务院商标管理部门宜告该注册商标无效：其他单位或者个人可以请求商标评审部门宜告该注府商标无效.因此A、B选项正确。C、D选项，（商标法）第44条中规定，国务院商标管理部门做出宣告注厅商标无效的决定，应当节面通知当事人。当事人对国务院商标管理部门的决定不展的，可以自收到通知之日起15日内向商标评审部门申请复中：当事人对商标评审部门的提定不度的，可以自收到通知之日起30日内向人民法院起诉。当事人对国务院商标管理部门的决定不展的，可以中请复审，但是对于商标评审部门的定不展的，只使向人民法院进行起诉。因此C选项正确，D选项错误。（2016改编）","chapter":"第二章 商标专用权的取得"},
  {"id":565,"topic":"专题六 商标法","type":"single","question":"下列哪组商标不构成近似商标？","options":{"A": "“珠穆朗玛”与“珠穆朗玛峰”", "B": "“北美风情”与“北欧风情”", "C": "“好哥”与“好歌”", "D": "“球王”和“球”"},"answer":"C","explanation":"。《商标法》筑45条中规定，已经注册的商标，违反本法第13条第2款和第3款、第15条、第16条第1款、第30条、第31条、第32条规定的，自商标注册之日起5年内，在先权利人或者利害关系人可以请求商标评审部门宜告该注册商标无效，商标代理机构未经投权，以自己的名义将被代理人甲公可的商标进行注册，属于违反了《商标法）第15条规定的情形，甲公司属于利事关系人，可以请求宜告该注册商标无效，因此A、B、D选项错误，C选项正确。（2016改编）","chapter":"第二章 商标专用权的取得"},
  {"id":566,"topic":"专题六 商标法","type":"single","question":"下列哪些属于相同或近似的商标？","options":{"A": "“风凰”和“凤凰”", "B": "“Susanna”和“SUSANNA”", "C": "“亚美航空”和“美亚医疗”", "D": "“新康得”和“新得康”"},"answer":"A","explanation":"。A选项，根据《商标法》第45条的规定，已经注册的商标、违反本法第32条规定（拍害他人现有的在先权利成抢注已经使用并有一定影响的商标）的，在先权利人成者利事关系人可以请求商标评审部门宜告该注册商标无效，人逸项周某的行为违反商标法第32条规定，在先权利人成者利害关系人可以请求商标评审部门宜告无效，因此人选项正确。B、C、D选项，根据《商标法》第44条第1款的规定，已经注册的商标，违反商标法第11条，由国务院商标管理部门宜告该注册商标无放，B、C、D选项均违反商标法第11条规定，任何单位次者个人都可以请求宜告该注册商标无效，因此B、C、D选项正确。（2017改编）","chapter":"第二章 商标专用权的取得"},
  {"id":567,"topic":"专题六 商标法","type":"multiple","question":"下列哪项属于近似的商标？","options":{"A": "“CATANA”和“KATANA”", "B": "“喜马辣鸭”和“喜马拉雅”", "C": "“LOVE\"和\"EOVE”", "D": "“蒙拉丽莎”和“梦拉丽莎”"},"answer":"ABD","explanation":"。（商标法》第47条第2款规定：“宜告注册商标无效的决定成者裁定，对宜告无效前人民法院做出并已执行的商标俊权案件的判决、裁定、调解书和负责商标执法的部门做出并已执行的商标役权案件的处理决定以及已经履行的商标转让成者使用许可合同不具有追溯力。但是，因商标注册人的恶意给他人造成的损失，应当给子赔偿”，因此A、B、D选项正确，C选项错误。（2019）","chapter":"第二章 商标专用权的取得"},
  {"id":568,"topic":"专题六 商标法","type":"multiple","question":"下列哪些注册申请应当依法予以驳回7","options":{"A": "将“红旗“文字商标使用于油读商品上", "B": "将“灭蚊\"文字商标使用于昭蚊商品上", "C": "将“光明“文字商标使用于灯泡商品上", "D": "将“红高梁“文字商标使用于高梁酿制的白酒类商品上"},"answer":"ACD","explanation":"。A、C、D选项，《商标法》第52条中规定，将未注册商标冒充注册商标使用的，或者使用未注册商标违反本法第10条规定的，由负贵商标执法的部门予以制止，限期改正，因此A选项正确，C、D选项均属于《商标法》第10条规定的不得作为商标使用的情形，因此C、D选项正确。B选项，缺乏显著特征属于《商标法》第11条规定的不得作为商标注册的情形，因此B选项错误。（2011）","chapter":"第二章 商标专用权的取得"},
  {"id":569,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列说法哪个是正确的？（单选）","options":{"A": "集体商标注册人对使用管理规则的任何修改，自修改之日起生效", "B": "证明商标注册人可以准许他人使用其证明商标", "C": "集体商标注册人可以许可非本集体成员使用其集体商标", "D": "证明商标注册人可以在自己提供的商品上使用该证明商标"},"answer":"D","explanation":"。《商标法》第48条规定：“商标法所称商标的使用，是指将商标用于商品、商品包装或者容器以及商品交易文书上，成者将商标用于广告宜传、展览以及其他商业活动中，用于识别商品未源的行为”，使用商标不一定要将商品贴附在商品上，广告宜传时，商标可以脱高商品而使用，商标","chapter":"第二章 商标专用权的取得"},
  {"id":570,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列说法哪些是正确的？（多选）","options":{"A": "申请以地理标志作为集体商标注册的团体，应当由来自该地理标志标示的地区范围内的成员组成", "B": "以地理标志作为集体商标注册的，其商品符合使用该地理标志条件的自然人，可以要求参加以该地理标志作为集体商标注册的团体", "C": "申请以地理标志作为集体商标的，还应当附送管辖该地理标志所标示地区的人民政府或者行业主管部门的批准文件", "D": "作为集体商标申请注册的地理标志，可以是该地理标志标示地区的名称，也可以是能够标示某商品来源于该地区的其他可视性标志"},"answer":"ABCD","explanation":"《商标法》能48等属定：“本法所同标的使用，是指桦商标用干商昌，商昌包悠次督容赐以及商品交易文节上，成青体朗标用干广告宣传、展筑以及其伤商业浩动中，消干识别高品米源的行方”，因此A.B、C、D透项均正磷.（辨）","chapter":"第二章 商标专用权的取得"},
  {"id":571,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列关于注册商标有效期的哪种说法是正确的？（单选）","options":{"A": "注册商标的有效期自申请之日起计算", "B": "注册商标的有效期为20年", "C": "注册商标有效期满，未办理续展手续的，可以给予6个月的宽展期", "D": "注册商标续展注册最多不得超过5次"},"answer":"AC","explanation":"。A.C项.（商你等例）第63签现定：“使用注册前标，可以在前昌、商品包袋、现明节发者其他附物上标明注府标或普注府擦记。注分标记包括和。使用注册棕记，应当标注在商标的右上俏戏者右下角”，四此人.C选项正确。B选项无标注合义，D选项为事有答作权的标记，四此B、D选项借谈。（2019）","chapter":"第三章 注册商标专用权的维持"},
  {"id":572,"topic":"专题六 商标法","type":"multiple","question":"某食品厂于2011年6月5日在其生产的糕点上使用了X商标。2015年10月20日该厂正式申请注册该商标。2017年3月5日该商标经初步审定并予公告。2017年6月5日公告期满；该商标被核准注册。据此，该注册商标有效期自何时起计算？（单选）","options":{"A": "2011年6月5日", "B": "2015年10月20日", "C": "2017年3月5日", "D": "2017年6月5日"},"answer":"AB","explanation":"。根据《商标法》第49条规定，商标注册人在使用注册标的过程中，自行改受注滑剪标、注册人名义、地址成者其他注册事项的，由地方负资前标执法的部门资今限期改正：期消不改正的，由回务院前标管现部门销其注册商标。注册商标成为其核定使用的品的通用名称戏者没有正当理由连续3年不使用的，任何单位戏者个人可以向国务院商标管理部门中请批销该注册询标，因此A、B选项正确。C、D选项的情形可宜接向国家知识产权局中请缴销注册商标，无带经负责商标执法的部门责今限期改正，因此.C、D选项错误。（2018改）","chapter":"第三章 注册商标专用权的维持"},
  {"id":573,"topic":"专题六 商标法","type":"multiple","question":"某公司注册商标的有效期将于2025年6月1日届满，该公司需要继续使用该商标。对此，下列说法哪项是正确的？（单选）","options":{"A": "某公司可以在2025年6月1日前的12个月内申请续展注册", "B": "对于某公司在2025年6月1日之后提出的续展注册申请，该申请不予受理，并注销其注册商标", "C": "续展注册申请送达后即予以公告", "D": "每次续展注册的有效期为10年，自核准续展注册之日起计算"},"answer":"CD","explanation":"。A选项，根据《商标法》第35条的规定，国务院商标管理部门做出准于注册决定，异议人不股的，可以向商标评审部门请求宜告该注册商标无效：国务院商标管理部门做出不子注册块定，被异议人不的，可以自收到通知之日起15日内向商标评审部门中请复审，就商标异议的决定不能直接向人民法院起诉，因此A选项借误。B选项，（商标法》第54条中规定，对国务院商标管理部门缴销或者不子销注册商标的决定，当事人不的，可以自收到通知之日起15日内向商标评审部门申请复审。当事人对商标评审部门的决定不限的，可以自收到通知之日起30日内向人民法院起诉。因此B选项借误，C选项正确。D选项，根据《商标法》第44、45条的规定，当事人对商标评审门的定不瓜的，可以自收到通知之日起30日内向人民法院起诉，因此D选项正确。（2008改编）","chapter":"第三章 注册商标专用权的维持"},
  {"id":574,"topic":"专题六 商标法","type":"multiple","question":"甲公司于2009年5月8日提交了一份商标注册申请，该商标于2010年2月8日获准注册，目前该商标仍为有效商标。年如果甲公司需要继续使用该商标，最迟应于哪天提交注册商标续展申请？（单选）6个","options":{"A": "2030年2月7日", "B": "2030年2月8日", "C": "2030年8月7日", "D": "2030年8月8日日日"},"answer":"ABD","explanation":"。A选项，根据（商标法>第34条的规定，对驳回中请、不于公告的商标，商标注后中请人不服的，可以自收到通知之日起15日内向商标评审部门中请复审，因此A选项正确。B选项，相据（商标法》第54条的规定，对国务院商标管理部门撒销成者不予撒销注册商标的决定，当事人不服的，可以自收到通如之日起15日内向商标诉申部门中请复申，因此B选项正确。C选项，根据《商标法》第35条第2款规定，国务院商标管理部门做出准予注册决定的，发给商标注册证，并予公告。异议人不服的，可以依照商标法第44条、第45条的规定向商标评审部门请求宜告该注册商标无效。对于不予注册决定，被异议人不股的，可以自收到通知之日起15日内向商标评审部门申请复审。因此C选项错误，D选项正确。（新编）","chapter":"第三章 注册商标专用权的维持"},
  {"id":575,"topic":"专题六 商标法","type":"multiple","question":"2018年3月23日，甲公司获得“明解\"商标的核准注册，中核定使用在金属合页商品上。乙公司于2018年6月3日开始在发金属合页商品上使用“明辉”商标。甲公司欲续展其“明解”商逸理标。根据商标法及相关规定，下列说法哪项是正确的？（单选）","options":{"A": "甲公司应当在2027年9月23日至2028年3月23日期间内提出续展注册申请", "B": "若甲公司的续展申请获得核准，则该商标的有效期自用2028年3月24日起计算C定", "C": "在甲公司提出续展申请后获得核准前，甲公司以乙公司不侵犯其注册商标专用权提起诉讼的，人民法院可以不子受理日", "D": "若甲公司在商标有效期满后未续展，则对于乙公司2028标年10月对其金属合页商品提出“明辉”商标的注册申请，应不予准核准注册"},"answer":"AD","explanation":"。A、B选项，根据《商标法》第55条第2款规定，被撤销的注册商标，由国务院商标管理部门子以公告，该注册商标专用权自公告之日起终止，因此A选项正确，B选项错误。C、D选项，根据《商标法）第47条第1款规定，依凰商标法第44条、第45条的规定宜告无效的注册商标，由国务院商标管理部门子以公告，该注册商标专用权视为自始即不存在，因此C选项错误，D选项正确。（2014）","chapter":"第三章 注册商标专用权的维持"},
  {"id":576,"topic":"专题六 商标法","type":"multiple","question":"张某在同一种商品上注册了两件近似的商标。现其欲者转让给王某。根据商标法及相关规定，下列哪些说法是正确的？标（多选）项","options":{"A": "张某可以仅将这两件商标之一转让给王某", "B": "张某应将这两件商标一并转让给王某应", "C": "张某应当和王某签订转让协议，共同提出转让申请理项", "D": "张某和王某的转让注册商标申请经核准后，予以公告，商王某自公告之日起享有商标专用权"},"answer":"AC","explanation":"。A、C选项，（商标法》第50条中规定，注册商标被撤销、被宜告无效或者期满不再续展的，自撤销、宜告无效或者注销之日起1年内，国务院商标管理部门对与该商标相同成者近似的商标注册申请，不予核准，因此A、C选项正确。B选项，《商标条例》第68条规定，国务院商标管理部门销注册商标或者宜告注册商标无效，撤销或者宜告无效的理由仅及于部分指定商品的，对在该部分指定商品上使用的商标注册子以撤销成者宜告无效，因此B选项错误。D选项，根据《商标法》第54条的规定，对国务院商标管理部门销或者不予撤销注册商标的决定，当事人不股的，可以自收到通知之日起15日内向商标评审部门申请复审；","chapter":"第三章 注册商标专用权的维持"},
  {"id":577,"topic":"专题六 商标法","type":"multiple","question":"关于商标许可备案，需要向商标局报送的备案材料中必须包括：（多选）","options":{"A": "因未进行备案，该许可合同不发生效力", "B": "乙公司无权向人民法院起诉丙公司侵权", "C": "许可使用的商品或服务范围", "D": "乙公司可以单独向人民法院起诉丙公司侵权"},"answer":"ABCD","explanation":"。（商标法》第S7条规定：“有下行为之一的，均属役犯注册商标专用权：）未经商标注册人的许可，在同一种商品使用与其注册商标相同的商标的：（二）未经商标注册人的许可，在同一种商品上使用与其注册商标近依的商标，成者在类仅商品上使用与其注册商标相同成者近仅的商标，容易导致泥滑的…（五）未经商标注舟人同意，更换其注册商标非将该更换商标的育品又投入市场的：（六）故意为役犯他人商标专用权行为提供便利条件，帮助他人实侵犯商标专用权行为的…”，因此A、B、CD选项均属于使犯注册商标专用权的行为。（2014)","chapter":"第三章 注册商标专用权的维持"},
  {"id":578,"topic":"专题六 商标法","type":"multiple","question":"甲公司享有“友善熊“注册商标的专用权，核定在玩具上使用。甲公司许可乙公司在其生产玩具上使用该注册商标。对此，下列说法哪些是正确的？多选）","options":{"A": "甲公司对乙公司的商标使用许可备案后生效", "B": "乙公司应当保证使用该商标的玩具的质量", "C": "甲公司应当监督乙公司使用该商标的玩具的质量", "D": "乙公司应当在使用该商标的玩具上，标明乙公司的名称和玩具产地"},"answer":"ABCD","explanation":"。A、C、D选项属于《商标法）第57条规定的役犯注册商标专用权的情形。B选项，《设高人民法院关于审理商标民事纠纷案件适用法律若干问题的解释>第1条规定：“下列行为属于商标法第57条第（七）项规定的给他人注册商标专用权进成其他损害的行为：·（三）将与他人注册商标相同成者相近似的文字注册为域名，井且通过该城名进行相关商品交易的电子商务，容易使相关公众产生误认的”，因此B选项属于役犯注册商标专用权的情形。（2011）","chapter":"第三章 注册商标专用权的维持"},
  {"id":579,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，商标注册人可以通过签订商标使用许可合同，许可他人使用其注册商标。这里规定的商标使用许可包括哪些类型？多选）","options":{"A": "分割使用许可", "B": "独占使用许可", "C": "排他使用许可", "D": "普通使用许可"},"answer":"ACD","explanation":"。A选项，乙公司主观上虽无是意，但仍然构成了《商标法》第57条第（一）、（三）项规定的役权情形。C选项，丁饭店的行为属于《商标法）第57条第（五）项规定的俊权情形。B选项，丙为运输者，主观上无故意，不属于《商标法》第57条中规定的役权情形。D选项，戊公司主观有故意，其仓储行为属于（商标法》第57条第（六）项规定的役权情形。（法考2013改编）","chapter":"第三章 注册商标专用权的维持"},
  {"id":580,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，对于已经注册的商标，下列哪些风于任何单位或个人可以请求宜告该注肝商标无效的理由7（多选）","options":{"A": "有害于社会主义道德风尚的", "B": "其标志与我国国旗相同的", "C": "以骗手段或者其他不正当手段取得注册的", "D": "申请商标注册损害他人现有的在先权利的"},"answer":"ACD","explanation":"。A选项，《商标法》第24条规定：“注册商标需要改交其标志的，应当重新提出注册申请”，甲公司将“露滴”商标改成“滴露”属于改交注册标志的行为，应当重新提出注册申请，而不是提出变更申请，因此A选项错误。B选项，根据（商标法）第57条第（二）项的规定，乙公司在同一种商品上使用与甲公司注册商标相近似的商标，属于侵犯注册商标专用权的行为，甲公司有权禁","chapter":"第四章 注册商标专用权的消灭"},
  {"id":581,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，下列关于注册商标无效宜告的哪些说法是正确的？多选）","options":{"A": "已经注册的商标是以欺骗手段取得注册的，任何单位或个人可以申请宜告该注册商标无效", "B": "已经注册的商标是以欺骗手段取得注册的，国家知识产权局有权宣告该注册商标无效", "C": "宜告注册商标无效的决定，应当书面通知当事人", "D": "当事人对宜告注册商标无效的决定或裁定不服的，都可以申请复审"},"answer":"ABCD","explanation":"。A、B、C选项，（商标法）第S9条第1款规定：“注册商标中合有的本商品的通用名称、图形、型号，成者直接表示商品的质量、主要原料、功他、用途、重量、效量及其他特点，或者合有的地名，注册筒标专用权人无权禁止他人正当使用”，因此A、B、C选项正确。D选项，（商标法）第59条第2款规定：“三维标志注册商标中合有的商品自身的性质产生的形状注开商标专用权人无权禁止他人正当使用”，因此D选项正确。（2017）","chapter":"第四章 注册商标专用权的消灭"},
  {"id":582,"topic":"专题六 商标法","type":"multiple","question":"某商标代理机构未经授权，以自己的名义将被代理人甲公司的商标进行注册，在获得核准注册后，甲公司可以自该商标注册之日起五年内采取下列哪种措施维护自身合法权益？（单选）","options":{"A": "请求撤销该注册商标", "B": "请求注销该注册商标", "C": "请求宣告该注册商标无效", "D": "对该注册商标提出异议申请"},"answer":"ABC","explanation":"。《商标法》第S9条第1款规定：“注册商标中合有的本商品的通用名称、图形、型号、成者直接表示商品的质量、主婴原料、功能、用途、重量、数量及其他特点，现者含有的地名，注册商标专用权人无权禁止伦人正当使用”。A、B、C选项中的”有机”、“数量的通用内容，可以正当使用。D选项不属于上述法条规定的可以正当使用的情形。（2018)","chapter":"第四章 注册商标专用权的消灭"},
  {"id":583,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，下列哪些情形仅可以由在先权利人或者利害关系人宣告该注册商标无效？（单选）","options":{"A": "周某申请商标注册损害他人现有的在先权利2026年专利代理师货格考试", "B": "李某的注册商标仅有本商品的通用名称", "C": "王某的注册商标仅直接表示商品的质量", "D": "丁某的注册商标仅直接表示商品的主要原料"},"answer":"D","explanation":"。《商标法》第59条第3款规定：“商标注册人申请商标注册前，他人已经在同一种商品成者类似商品上先于商标注册人使用与注册商标相同或者近似并有一定影响的商标的，注册商标专用权人无权势止该使用人在原使用范围内继续使用该商标，但可以要求其附加适当区别标识”，因此A、B、C选项错误，D选项正确。（2014）","chapter":"第四章 注册商标专用权的消灭"},
  {"id":584,"topic":"专题六 商标法","type":"multiple","question":"根据商标法及相关规定，宜告注册商标无效的决定或者裁定，对哪些法律文书不具有追溯力？（多选）","options":{"A": "对宣告无效前人民法院做出并执行的商标侵权案件的判决不具有追溯力", "B": "对宣告无效前人民法院做出并执行的商标侵权案件的调解书不具有追溯力", "C": "对已经具备履行条件的使用许可合同不具有追溯力", "D": "对已经履行的商标转让合同不具有追溯力"},"answer":"AB","explanation":"。A选项，“逍逼乐”被消费者熟知，声誉良好，具有一定影响，乙公司的行为属于恶意注册，甲公司可以在异议期内向国家知识产权局提出异议，A选项正确。B选项，（商标法》第59条第3款规定：“商标注册人申请商标注册前，他人已经在同一种商品成者类似商品上先于商标注册人使用与注册商标相同或者近似井有一定影响的商标的，注册商标专用权人无权禁止该使用人在原使用范国内继续使用该商标，但可以要求其附加造当区别标识”，因此甲公司享有先用权，可以在原有范国内继续使用该商标，B选项正确。C选项，甲公司有权申请宣告该注册商标无效，而不是向国家知识产权局请求撤销该商标，C选项错误。D选项，甲公司的“逍遥乐”属于未注册商标，甲公司没有商标的专用权，对于未注册的商标是不于赔偿的，因此D选项错误。（法考2012）","chapter":"第四章 注册商标专用权的消灭"},
  {"id":585,"topic":"专题六 商标法","type":"single","question":"根据商标法及相关规定，使用未注册商标有下列哪些情形的，由负责商标执法的部门予以制止，限期改正？（多选）","options":{"A": "冒充注册商标", "B": "商标标志缺乏显著特征", "C": "带有欺骗性容易使公众产生误认", "D": "同中央国家机关的名称相同"},"answer":"B","explanation":"。A选项使用茉莉花图形不会对文字商标构成侵权。B选项作为赔品进行促销活动仍属于销售行为，构成商标促权。C选项，《商标法》第59条第1款规定：“注册商标中含有的本商品的通用名称、图形、型专随六商标法守，皮普直提老示商告的质盛，生要原科、功信、用遗、重量、数查庆其他件点，次普合价的坞若，注册商标川以人无以热止化人正当使用”，案莉花香是“是指原科气宋，不世成使他中商你专用权的行方，因此C选项借谈。D违项，戊公可具有先用权，不成使权（法考2007改詹）","chapter":"第四章 注册商标专用权的消灭"},
  {"id":586,"topic":"专题六 商标法","type":"multiple","question":"关于商标法所称的“商品商标的使用”，以下说法正确的是：（单选）","options":{"A": "商标的使用必须将商标贴附在商品上", "B": "商标的使用不能脱离商品而使用", "C": "商标的使用可以在非商业活动中", "D": "商标的使用是指商标能够识别商品来源的行为"},"answer":"AB","explanation":"。《最高人民法院关于市理商标民事纠汾囊件追用法修搭干问厕的解择>信4条第2款规定：“在发生注府阅你专用权效便害时，独占使用许可合回的健许可人可以向人民法院提起诉讼.”因北AB逸项正磅，C.D选项借供。（2018）","chapter":"第四章 注册商标专用权的消灭"},

乙公司签订专利实施许可合同，后乙公司未经甲同意，将合同权利义务一并转让给丙公司"}, {"letter": "C", "content": "债权人甲因出国急需用钱便将债务人乙欠自己的两万元债权以1万5千元的价格转让给了丙，并将此事打电话通知了乙"}, {"letter": "D", "content": "甲委托乙公司运输货物，后乙公司未经甲同意，将该货物转由丙公司运输"}], "answer": "BC"}, {"id": 149, "question": "甲公司和乙公司签订了一份服务器买实合同。在合同履行期间，甲公司拟将其在合同中的全部权利义务转让给丙公司，根据民法典合同编及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "该转让需要经过乙公司同意"}, {"letter": "B", "content": "该转让需要通知乙公司，但无需经其同意"}, {"letter": "C", "content": "转让后，乙公司有权向丙公司主张其对甲公司的抗辩"}, {"letter": "D", "content": "转让后，乙公司不得向丙公司主张其对甲公司的抗辩"}], "answer": "ABC"}, {"id": 150, "question": "甲欠乙10万元，后乙通知甲将该债权转让给丙。甲接到该通知时，乙欠甲5万元，并且甲的价权先于转让的债权到期。根据民法典合同编的规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "本案中乙的债权转让对甲发生效力"}, {"letter": "B", "content": "本案中乙的债权转让不对甲发生效力"}, {"letter": "C", "content": "甲可以向乙主张抵销"}, {"letter": "D", "content": "甲可以向丙主张抵销"}], "answer": "AC"}, {"id": 151, "question": "乙公司欠甲公司30万元，于2020年9月20到期。同时甲公司须在2020年9月20日清偿对乙公司的20万元货款。甲公司在同年9月18日与丙公司签订书面协议，转让其对乙公司的30万元债权。同年9月24日，乙公司接到甲公司关于转让债权的通知后，便主张20万元的抵销权。下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "甲公司与丙公司之间的债权转让合同于9月24日生效"}, {"letter": "B", "content": "乙公司接到债权转让通知后，即负有向丙公司清偿30万元的义务"}, {"letter": "C", "content": "乙公司可以向丙公司主张20万元的抵销权"}, {"letter": "D", "content": "丙公司可以就30万元债务的清偿，要求甲公司和乙公司承担连带责任"}], "answer": "AD"}, {"id": 152, "question": "梁某与甲旅游公司签订合同，约定梁某参加甲公司组织债券人的价收先干转止的价收对业作时的旅游团赴某地旅游。旅游出发前15日，梁某因出港通知甲公司，由韩某警代银用旅游。到达展行地后，为保证游客更好体验当地风情，未征得韩某同意，甲公司将其旅游业务转给当他的乙公司。下列哪些表述是正确的？", "type": "多选", "options": [{"letter": "A", "content": "山于梁某与申公司之间签订的合同并未约定不得转让，因此梁某通知中公司即发生合同转让效力"}, {"letter": "B", "content": "由于梁某与中公司之间签订的合同并未约定不得转让，因此梁某应当与甲公司协商一致后合同转让才生效"}, {"letter": "C", "content": "为保证游客更好地体验当地风情，甲公司将其旅游业务转给当地的乙公司，转让有效"}, {"letter": "D", "content": "甲公司未与韩某协商，甲公司将其旅游业务转给当地的乙公司不生效"}], "answer": "BC"}, {"id": 153, "question": "2021年2月1日，甲、乙签订买卖合同并约定半个月后同时履行。合同到期后，甲延迟一周交货，乙收到货物后未付货款10万元。2021年3月1日，甲与丙签订合同，将甲对乙的10万元债权转让给丙。2021年3月3日甲就转让通知乙。根据《民法典》的相关规定，乙的哪些主张符合法律规定：", "type": "多选", "options": [{"letter": "A", "content": "乙向丙提出只支付6万元，因为甲交付的货物有40%不合格"}, {"letter": "B", "content": "乙提出因甲欠乙4万元债务，且于2021年2月15日到期，因此只需支付丙6万元"}, {"letter": "C", "content": "乙主张只需支付6万元，因为合同约定，如果延迟履行合同，甲应当承担4万元违约金"}, {"letter": "D", "content": "乙提出因甲并未与其协商即转让价权，转让无效，只能按照合同约定向甲偿还"}], "answer": "AD"}, {"id": 154, "question": "丙公司办公室改建装修，由甲装修公司包工包料进行施工，合同款首付10万元，验收合格后再支付10万元。装修开始后，丙并未支付首付款。甲公司向乙公司购买10.万元建材，用于丙公司装修使用，约定货到付款。但是货运到后，甲公司未付款。乙公司向甲公司催款，甲、丙向乙联合发函：丙公司同意司的债务，通知债权人乙公司时对乙公司生应。根据民法典的相关规定，以下说法哪些是正确：", "type": "多选", "options": [{"letter": "A", "content": "乙公司可以就其债权向甲公司主张偿还"}, {"letter": "B", "content": "乙公司可以就其债权向丙公司主张偿还"}, {"letter": "C", "content": "乙公司可以要求甲、丙承担连带债务"}, {"letter": "D", "content": "由于乙公司未同意丙公司还默，基于合同相对性、只能请求甲公司偿还债务"}], "answer": "ABC"}, {"id": 155, "question": "甲公司欠乙公司200万元货款，甲公司与丙公司约定丙公司加人甲公司对乙公司的债务，但只承诺还100万元，并及时将情况通知了乙公司，乙公司表示同意，后丙公司偿还了50万元。根据《民法典》，下列哪些选项是正确的？", "type": "多选", "options": [{"letter": "A", "content": "该债务承担协议自通知乙公司时对乙公司有效"}, {"letter": "B", "content": "乙公司有权请求丙再支付50万元"}, {"letter": "C", "content": "乙公司有权请求丙支付150万元"}, {"letter": "D", "content": "该债务承担协议自乙公司同意时对乙公司有效下列哪些说法是正确的？多选）"}], "answer": "ABC"}, {"id": 156, "question": "根据民法典合同编及相关规定，有下列哪些情形之一的，当事人可以解除合同？多选）", "type": "多选", "options": [{"letter": "A", "content": "因不可抗力致使不能实现合同自的"}, {"letter": "B", "content": "当事人一方迟延履行主要债务，经催告后在合理期限内仍未履行"}, {"letter": "C", "content": "当事人一方不完全履行，但不影响合同目的的实现"}, {"letter": "D", "content": "在履行期限届满之前，当事人一方明确表示或者以自己的行为表明不履行主要债务"}], "answer": "CD"}, {"id": 157, "question": "根据民法典合同编及相关规定，下列哪些情况下，一方当事人无权解除合同？多选）", "type": "多选", "options": [{"letter": "A", "content": "甲、乙签订钢材购销合同，约定甲在11月1日前向乙交付钢材500吨，货到付款。当过了11月1日，甲仍未向乙履行交付义务"}, {"letter": "B", "content": "甲、乙签订钢材购销合同，约定甲在11月1日前向乙交付钢材500吨，货到付款。11月1日，甲向乙交付钢材450吨，剩余50吨经催告后，仍未予交付"}, {"letter": "C", "content": "甲从商店购买电视机一台，回家后发现图像正常，但没有声音"}, {"letter": "D", "content": "甲从商店购买电视机一台，回家发现品质良好，只是画面边角处有一个“坏点”"}], "answer": "ABD"}, {"id": 158, "question": "甲、乙订立房屋买卖合同，约定在1个月后甲将其自己的房屋过户登记给乙。但在交房日期到来之前，甲将该房高价出卖给了丙，并且办理了过户登记，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "甲的行为构成预期违约"}, {"letter": "B", "content": "乙只能在合同规定的交房日期到来后要求甲承担违约资任"}, {"letter": "C", "content": "乙有权解除与甲的房屋买实合同"}, {"letter": "D", "content": "申与丙签订的房屋买买合同无效"}], "answer": "ABD"}, {"id": 159, "question": "甲商场为在中秋节前销售月饼、与乙食品厂签订了一份月饼供销合同，约定乙食品厂在农历八月初五交货。后乙食品厂因人员变动等原因，未能按照约定及时交货。甲商场到农历八月十五时仍未收到月饼。对此、下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "甲商场可以解除合同，但必须征得乙食品厂同意"}, {"letter": "B", "content": "甲商场可以解除合同，但是应当通知乙食品厂"}, {"letter": "C", "content": "甲商场不得解除合同，因为未向乙食品厂进行催告"}, {"letter": "D", "content": "甲商场可以要求乙食品厂承担违约责任"}], "answer": "AC"}, {"id": 160, "question": "东北某农场和某粮食加工厂于2021年2月签订稻谷购销合同，约定农场于2021年12月底向加工厂供应稻谷1000吨，货到后付款。后农场因当地在2021年发生异常干阜而导致颗粒无收，无法履行供货合同。在此情形下，下列说法哪项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "农场可以单方中止履行合同"}, {"letter": "B", "content": "农场可以单方解除合同"}, {"letter": "C", "content": "粮食加工厂可以单方变更合同"}, {"letter": "D", "content": "粮食加工厂可以要求农场继续履行合同"}], "answer": "BD"}, {"id": 161, "question": "甲公司欠乙商场货款12万元，同时乙商场应付甲公司装修费12万元。现甲公司欠款到期，甲公司欲以已到期的装修费冲抵货款。根据民法典合同编及相关规定，下列说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "甲公司可以将自己的债务与乙商场的债务抵销"}, {"letter": "B", "content": "双方债务性质不同，不得抵销"}, {"letter": "C", "content": "甲公司主张抵销的，须经乙商场同意"}, {"letter": "D", "content": "甲公司主张据前的、应当通知乙而所"}], "answer": "B"}, {"id": 162, "question": "根据民法典合同编及相关规定，关于违约资任，下列说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "合同对违约责任没有约定的，当事人可以签订补充协议"}, {"letter": "B", "content": "合同对违约资任没有约定又无法依法确定的，可"}, {"letter": "C", "content": "合同对违约责任约定不明确又不能达成补充协议的，可以按照交易习惯确定"}, {"letter": "D", "content": "合同对违约责任没有约定又无法依法确定的，可以合理选择请求对方承担修理、重作、更换、退货等违约责任"}], "answer": "AC"}, {"id": 163, "question": "根据民法典合同编及相关规定，合同当事人一方不履行非金钱价务的，下列哪些情形下、另一方当事人不能要求其继续履行？多选）", "type": "多选", "options": [{"letter": "A", "content": "该债务的标的不适于强制履行"}, {"letter": "B", "content": "债权人在合理期限内未要求履行"}, {"letter": "C", "content": "该债务在法律上不能履行"}, {"letter": "D", "content": "该债务在事实上不能履行"}], "answer": "ABCD"}, {"id": 164, "question": "甲公司和乙公司签订合同，约定：由乙公司按照要求为甲公司制造专用机床一台，甲公司预付款300万元，一方违约的应当向另一方支付违约金。机床交付后，经多次调试，仍不能实现合同目的。据此，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "甲公司有权要求乙公司继续履行合同并支付违约金"}, {"letter": "B", "content": "因无法实现合同目的，甲公司有权要求解除合同"}, {"letter": "C", "content": "甲公司要求解除合同的，有权要求乙公司返还预付款并赔偿损失"}, {"letter": "D", "content": "合同已经履行完毕，申公司无权要求解除合同"}], "answer": "ABCD"}, {"id": 165, "question": "甲公司与乙公司签订了一份购销合同，合同总价款为20万元，双方约定，一方进约的.需支付总价款3%的违约金：甲公司述依约定间乙公司支付了定金1万元。后乙公司未履行合同约定的义务。根民法典合同编及相关规定，下列说法挪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "甲公司可以要求乙公司双储返还定金"}, {"letter": "B", "content": "甲公司只能要求乙公司支付违约金"}, {"letter": "C", "content": "甲公司可以要求乙公司双倍返还定金，同时支付“当事人一穷因第乏人的康因造此造均的，底当供违约金"}, {"letter": "D", "content": "甲公司可以选择适用定金或者违约金条款"}], "answer": "A"}, {"id": 166, "question": "根据民法典合同编及相关规定，下列哪些属于可以并用的违约责任承担方式？多选）", "type": "多选", "options": [{"letter": "A", "content": "继续履行与赔偿损失"}, {"letter": "B", "content": "继续履行与支付违约金"}, {"letter": "C", "content": "采取补救措施与赔偿损失"}, {"letter": "D", "content": "双倍返还定金与支付违约金"}], "answer": "AD"}, {"id": 167, "question": "2022年9月1日，李某在网站上购买甲公司的商品，同年9月2日，甲公司将该商品交付承运人乙公司，要求乙公司于同年9月7日前将该商品送达李某。乙公司迟程中因突遇山洪导致该商品灭失。根据民法典合同编的规定，下列说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "甲公司应当向李某承担违约责任"}, {"letter": "B", "content": "乙公司不得免除违约责任"}, {"letter": "C", "content": "乙公司可以部分或者全部免除违约责任"}, {"letter": "D", "content": "甲公司和乙公司应当向李某承担违约责任"}], "answer": "ABC"}, {"id": 168, "question": "北京甲公司和上海乙公司签订汽车买卖合同，约定甲公司组装生产并向乙公司出售500辆汽车。甲公司！金的数额由当事人约定；但是，不得超过主合同标递与内公司签订零部件买奖合同.向丙公司购买组装生产汽车所需要的车轮。丙公司与丁公司签订车轮的运输合同，运输途中，由于丁公司驾驶员的疏忽发生交通事故致货物受损，由此导致甲公司无法交货。根据民法典合同编及相关规定，下列哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "乙公司有权请求申公司承担违约资任"}, {"letter": "B", "content": "乙公司有权请求丙公司承担违约责任"}, {"letter": "C", "content": "乙公司有权请求丁公司示担违约责任"}, {"letter": "D", "content": "乙公司有权请求丁公司驾驶员承担违约资任"}], "answer": "AB"}, {"id": 169, "question": "甲公司向乙公司购买价值100万元的货物。合同约定由甲公司向乙公司支付定金10万元，甲公司支付定金15万元。后乙公司未交货，致使不能实现合同目的。根据民法典合同编的规定，甲公司能请求乙公司返还的定金数额是？单选）", "type": "单选", "options": [{"letter": "A", "content": "10万元"}, {"letter": "B", "content": "15万元"}, {"letter": "C", "content": "30万元"}, {"letter": "D", "content": "20万元"}], "answer": "A"}, {"id": 170, "question": "甲与乙签订一份货款为人民币50万元的买卖合同，并依约定交付给乙定金人民币15万元。后乙违约没有履行该合同。乙应返还给甲人民币？", "type": "单选", "options": [{"letter": "A", "content": "10万元"}, {"letter": "B", "content": "20万元"}, {"letter": "C", "content": "25万元"}, {"letter": "D", "content": "30万元"}], "answer": "C"}, {"id": 171, "question": "詹某将房屋租给音乐生小翠，约定小翠教詹某儿子小詹弹钢琴，每晚一小时，课时费抵房租。上了几个月的课后，小翠消失了一个月，詹某只能另请洪老师上课，一个月课时费2000元。一个月后小翠回来，詹某可以向小翠主张多少数额的违约资任？", "type": "单选", "options": [{"letter": "A", "content": "余其支出的课赠2000元"}, {"letter": "B", "content": "当越音乐生的平与课酬3000元"}, {"letter": "C", "content": "当越平均房盘4000元"}, {"letter": "D", "content": "小菜无细支付任何费用"}], "answer": "C"}, {"id": 172, "question": "幸某在吉院店发规刘某以1万元出售一只清代费烟壶，李某知且这壶是一对。收期家胡果寻求另一只正以10万元报价在古虎圆内收购，幸集与刘集达成协议以1万元购买，于3日后付款，并向刘集支付5000完定金。零某前往胡某家中以10万元达成协以，3日内交货，湖某向李某支付2万元定金。3日后刘某取出时不小心将紫期壶碎。关于本案，下列哪一说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "刘某只需将定金返还给李某"}, {"letter": "B", "content": "刘某应当尚季某返还5000元双倍定金"}, {"letter": "C", "content": "刘某应当向李某返还7000元定金"}, {"letter": "D", "content": "李某应当向胡某返还20000元双倍定金"}], "answer": "A"}, {"id": 173, "question": "喜好网球和游泳的赵某从某房地产公司购买某小区商品房一套，交房时发现购房时该公司售楼部所展示的该小区模型中的网球场和游泳池并不存在。经查，该小！区设计中并无网球场和游泳池。根据民法典合同编及相关规定，下列说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "因房地产公司的行为构成欺诈，赵某有权要求合同属于可撤销合同，赵某有权要求退房，八选项退房"}, {"letter": "B", "content": "赵某如不要求退房，有权请求该房地产公司承担违约责任"}, {"letter": "C", "content": "赵某如要求退房，有权请求该房地产公司双倍返还购房款"}, {"letter": "D", "content": "赵某如要求退房，有权请求该房地产公司承担缔约过错责任"}], "answer": "CD"}, {"id": 174, "question": "下列哪些合同属于《民法典》中规定的有名合同？", "type": "多选", "options": [{"letter": "A", "content": "合作经营合同"}, {"letter": "B", "content": "融资租货合同"}, {"letter": "C", "content": "劳务派遗合同"}, {"letter": "D", "content": "技术合同"}], "answer": "ABD"}, {"id": 175, "question": "根据民法典合同编的规定，下列哪些技术合同无效？", "type": "多选", "options": [{"letter": "A", "content": "甲公司与乙公司签订的技术开发合同，约定就开发完成的发明创造申请专利的权利属于甲公司"}, {"letter": "B", "content": "丙公司与丁公司签订的技术服务合同，约定丁公司不得从其他公司获得类似技术或者其他竞争性技术"}, {"letter": "C", "content": "戊公司与己公司签订的技术转让合同，约定已公司购买与实施该技术无关的大型设备五台"}, {"letter": "D", "content": "庚公司与辛公司签订的专利实施许可合同，约定辛公司不得对该专利提出无效宜告请求"}], "answer": "BD"}, {"id": 176, "question": "甲公司向乙公司转让了一项技术秘密。技术转让合同履行完毕后，经查该技术秘密是甲公司通过不正当手段从丙公司获得的，但乙公司对此并不知情，且支付了合理对价。下列哪项说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "乙公司有权要求甲公司返还其支付的对价，但不能要求甲公司赔偿其因此受到的损失"}, {"letter": "B", "content": "乙公司可在其取得时的范围内继续使用该技术秘密，但应向丙公司支付合理的使用费"}, {"letter": "C", "content": "技术转让合同无效，甲公司和乙公司应向丙公司承担连带责任"}, {"letter": "D", "content": "技术转让合同有效，但甲公司应向丙公司承担侵权费任"}], "answer": "BCD"}, {"id": 177, "question": "甲公司委托乙研究所为其开发一钟技术，并签订了技术开发合同，但双方没有约定提术成果的归属。乙究所按约定文付了尊合要求的技术成果，甲公司按的定支付了胡究并发经费和提酬。后乙研究所就该技术成果交了专利申请，根陷民法典合同编及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "乙研究所就该技术成果申销专利的行为侵犯了甲公司就该技术成果申请专利的权利"}, {"letter": "B", "content": "乙研究所享有就该技术成果申请专利的权利，但若乙研究所转让该专利申请权，则甲公司享有以同等条伴优先受让的权利"}, {"letter": "C", "content": "如果乙研究所的该专利申请被授予专利权，则甲公司未经乙研究所许可，不得以生产经营为目的实施该专利"}, {"letter": "D", "content": "如果乙研究所的该专利申请被授予专利权，则甲公司可以依法实施该专利"}], "answer": "B"}, {"id": 178, "question": "张某和李某合作开发完成一项发明创造，但未约定权利归属。该项发明创造完成后，张某想要申请专利，而李某则想通过商业秘密保护，不同意申请专利。根据民法典合同编及相关规定，下列哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "张某不得申请专利"}, {"letter": "B", "content": "张某可以申请专利，获得授权后专利权归张某和李某共有"}, {"letter": "C", "content": "张某可以申请专利，获得授权后专利权归张某所有，李某可以免费实施该专利"}, {"letter": "D", "content": "张某可以申请专利，获得授权后专利权归张某所有，但获得的收益应在两人之间分配"}], "answer": "BD"}, {"id": 179, "question": "申、乙订立合作开发协议，约定共同完成一项发明，但就该项发明的专利申请权未作约定，下列说法错误的是？", "type": "单选", "options": [{"letter": "A", "content": "如果甲不同意申请专利，乙可以自行申请"}, {"letter": "B", "content": "如果甲放弃申请专利，乙可以单独申请，但取得专利后，甲有免费使用的权利"}, {"letter": "C", "content": "如果甲准备转让其专利申请权、必须订立书面合同"}, {"letter": "D", "content": "如果甲准备转让其专利申请权、乙在同等条件下有优先受让的权利"}], "answer": "A"}, {"id": 180, "question": "甲、乙两公司约定：甲公司向乙公司付5万元研发费用，乙公司完成某专用设备的研发生产后双方订立买实合同，将该设备出售给甲公司、价格暂定为100万元，具体条款另行商定。乙公司完成研发生产后，却将该设备以120万元卖给丙公司，甲公司得知后提出异议。下列哪些选项是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "甲、乙两公司之间的协议为技术开发合同"}, {"letter": "B", "content": "甲、乙两公司之间的协议系附条件的买卖合同"}, {"letter": "C", "content": "乙、内两公司之间的买卖合同无效"}, {"letter": "D", "content": "申公司可请求乙公司承担违约资任"}], "answer": "A"}, {"id": 181, "question": "根据民法典合同编的规定，下列哪些合同应当采用书面形式？多选）", "type": "多选", "options": [{"letter": "A", "content": "技术咨询合同"}, {"letter": "B", "content": "技术许可合同"}, {"letter": "C", "content": "技术转让合同"}, {"letter": "D", "content": "技术开发合同"}], "answer": "AD"}, {"id": 182, "question": "根据民法典合同编及相关规定，下列关于专利实施许可合同的哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "专利实施许可合同可以采用口头形式"}, {"letter": "B", "content": "专利权有效期限届满的，专利权人仍然可以就该专利与他人订立专利实施许可合同"}, {"letter": "C", "content": "专利权被宣布无效的，专利权人仍然可以就该专利与他人订立专利实施许可合同"}, {"letter": "D", "content": "专利实施许可合间的许可人应当胺照约定诈可|《民法集》靠86S等定：“专村需作叶合时伙在许可人实施专利，交付实专利有关的技术贷料，是供必婴的技术指导"}], "answer": "BCD"}, {"id": 183, "question": "积揭民法典及相关规定，下列关于技未转让合同的邮营战法居正确的？", "type": "多选", "options": [{"letter": "A", "content": "技术秘密转让应当采用书面形式"}, {"letter": "B", "content": "技术私密转让合同的当事人未就他用校术秘密后续改进技术成果的分享办法作出约定的，一方后续改逃的技术成果，其他各方均有权分享"}, {"letter": "C", "content": "专利实施许可合同的被许可人应当按照约定的范围和期限，对让与人提供的技术中尚未公开的秘密部分，承担保密义务"}, {"letter": "D", "content": "专利实施许可合同只在该专利权的存续期限内有效"}], "answer": "D"}, {"id": 184, "question": "甲公司利用从乙公司受让的一项专利技术所生产的专利产品被丙公司指控为侵权，人民法院判决侵权成立，并要求甲公司赔偿损失2000万元。根据民法典合同编及相关规定，下列说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "如果甲乙公司之间对损害赔偿没有约定，应由乙公司向丙公司承担赔偿资任"}, {"letter": "B", "content": "如果甲乙公司之间对损害赔偿没有约定，应由甲公司向丙公司承担赔偿费任"}, {"letter": "C", "content": "如果甲乙公司之间对损害赔偿没有约定，由甲公司、乙公司承担连带责任"}, {"letter": "D", "content": "如果甲乙公司之间对损害赔偿有约定，则按照约定进行赔偿"}], "answer": "ACD"}, {"id": 185, "question": "根据民法典合同编及相关规定，当事人一方以技术知识为对方就特定技术项目提供可行性论证所订立的合同属于下列哪种合同？", "type": "单选", "options": [{"letter": "A", "content": "技术培训合同-65 -"}, {"letter": "B", "content": "技术开发合同"}, {"letter": "C", "content": "技术中介合同"}, {"letter": "D", "content": "技术咨询合同"}], "answer": "AD"}, {"id": 186, "question": "申单位委托乙研究所就某技术项目提供可行性论证。双方在合同中约定乙研究所在三个月内提供咨询报告、甲单位在收到符合约定要求的报告后应支付乙研究所10万元报酬。根据民法典合同编及相关规定，下列哪种说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "该合同属于技术咨询合同"}, {"letter": "B", "content": "如果乙研究所未按期提供咨询报告，则应当承担减收或者免收报酬等违约责任"}, {"letter": "C", "content": "如果双方没有约定，则乙研究所利用甲单位提供的技术资料和工作条件完成的新的技术成果，属于甲单位"}, {"letter": "D", "content": "如果双方没有约定，则甲单位按照乙研究所符合约定要求的咨询报告和意见作出决策所造成的损失，由乙研究所承担"}], "answer": "D"}, {"id": 187, "question": "根据民法典合同编及相关规定，下列关于委托合同的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "委托合同是委托人和受托人约定，由受托人处理委托人事务的合同"}, {"letter": "B", "content": "受托人应当亲自处理委托事务，经委托人同意，受托人可以转委托"}, {"letter": "C", "content": "受托人应当按照委托人的要求，报告委托事务的处理情况"}, {"letter": "D", "content": "有偿的委托合同，因受托人的过错给委托人造成损失的，委托人可以要求赔偿损失说法哪些是正确的？多选）"}], "answer": "AB"}, {"id": 188, "question": "甲农场委托乙运输公司将农场的水果运集市水果市场。合同签订后，乙运输公司有更大的运输业务，欲将运输甲农场水果的任务委托给内运输公司。根据民法典合同编及相关规定，下列些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "乙运输公司经甲农场同意，可以转委托丙运输公司运输甲农场的水果"}, {"letter": "B", "content": "乙运输公司有权转委托丙运输公司，仅需事后通知甲农场"}, {"letter": "C", "content": "转委托未经甲农场同意的，乙运输公司应当对丙运输公司的行为承担责任"}, {"letter": "D", "content": "转委托未经甲农场同意的，乙运输公司仅需就其对丙运输公司的指示承担责任"}], "answer": "ABCD"}, {"id": 189, "question": "王某委托胡某销售一批货物，双方约定胡某不收费用并支付利息\"，因此A选项正确。B、C选项，取报酬。根据民法典合同编及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "胡某有权请求王某偿还为处理委托事务垫付的必要费用及其利息"}, {"letter": "B", "content": "胡某因为故意给王某造成损失的，王某可以要求胡某赔偿"}, {"letter": "C", "content": "胡某因为重大过失给王某造成损失的，王某可以要求胡某赔偿"}, {"letter": "D", "content": "如果胡某转委托第三人处理王某委托的事务，应经过王某同意"}], "answer": "ABCD"}, {"id": 190, "question": "甲公司委托乙专利代理机构代为处理本公司专利！人，受托人仅就第三人的选任及其对第三人的指示事务。对此，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "即使合同没有提及乙处理相关事务的费用负担，甲公司仍有义务支付乙事务所为处理委托事务而垫付的费用"}, {"letter": "B", "content": "经甲公司同意，乙可以转委托、同时对第三人的行为承担资任"}, {"letter": "C", "content": "乙可以随时解除与甲公司的合同"}, {"letter": "D", "content": "因不可归责于乙的事由，委托事务不能完成的，甲公司应当向乙支付相应的报酬"}], "answer": "AC"}, {"id": 191, "question": "甲公司委托姚某购买一批化肥。在甲公司的授权范围内，姚某以自己的名义与乙公司签订了一份化肥买卖合同，并在订立合同的过程中，将他与甲公司之间的代理关系告诉了乙公司。根据民法典合同编及相关规定，下列关于该买卖合同的说法哪项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "该合同直接约束姚某和乙公司，但有确切证据证明该合同只药束甲公司和乙公司的除外"}, {"letter": "B", "content": "该合同直接约束申公司和乙公司，但有确切证据证明该合同只约束姚某和乙公司的除外"}, {"letter": "C", "content": "该合同直接约束甲公司、乙公司和姚某"}, {"letter": "D", "content": "该合同无效，对甲公司、乙公司和姚某均没有约！束力"}], "answer": "ABCD"}, {"id": 192, "question": "甲委托乙购买一批货物，但要求以乙的名义签订合同，乙同意，遂与丙签订了买卖合同。后由于甲的原因，乙不能按时向丙支付货款。乙向丙说明了自己是受甲委托向丙购买货物。对此，下列哪项说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "丙只能要求甲支付货款"}, {"letter": "B", "content": "丙只能要求乙支付货款"}, {"letter": "C", "content": "丙选定甲作为相对人要求其支付货款后，不得再变更为乙"}, {"letter": "D", "content": "丙选定乙作为相对人要求其支付货款后，乙的财产不足以清偿债务的，可以重新选择甲作为相对人"}], "answer": "ACD"}, {"id": 193, "question": "某律师事务所指派吴律师担任某案件的一、二审姿托代理人。第一次开庭后，吴律师感览案件复杂，本人和该事务所均难以胜任，建议不再继续代理。但该事务所坚持代理。一审判决委托人败诉。下列哪些表述是正确的7", "type": "多选", "options": [{"letter": "A", "content": "律师事务所有权单方解除委托合同，但须承担赠偿资任"}, {"letter": "B", "content": "律师事务所在委托人一审败诉后不能单方解除合同"}, {"letter": "C", "content": "即使一审胜诉，委托人也可解除委托合同，但须承担赔偿责任"}, {"letter": "D", "content": "只有存在故意或者重大过失时，该律师事务所才对败诉承担赔偿责任"}], "answer": "B"}, {"id": 194, "question": "根据民事诉讼法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "民事诉讼当事人有平等的诉讼权利"}, {"letter": "B", "content": "当事人有权在法律规定的范围内处分自己的民事权利和诉讼权利"}, {"letter": "C", "content": "在少数民族聚居的地区，人民法院应当一律使用汉语言文字审理和发布法律文书"}, {"letter": "D", "content": "人民法院审理民事案件，应当根据自愿和合法的原则进行调解；调解不成的，应当及时判决"}], "answer": "C"}, {"id": 195, "question": "某县人民法院对王某诉张某侵权纠纷一案未经开庭审理即作出了判决，该审判行为直接违反了民事诉讼法哪一项原则或者制度？", "type": "单选", "options": [{"letter": "A", "content": "违反了辩论原则"}, {"letter": "B", "content": "违反了处分原则"}, {"letter": "C", "content": "违反了合议制度"}, {"letter": "D", "content": "违反了回避制度"}], "answer": "AC"}, {"id": 196, "question": "关于民事诉讼法基本原则在民事诉讼中的具体体现，下列哪一说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "当事人有权决定是否委托代理人代为进行诉讼，是诉讼权利平等原则的体现"}, {"letter": "B", "content": "当事人均有权委托代理人代为进行诉讼，是处分原则的体现"}, {"letter": "C", "content": "原告与被告在诉讼中有一些不同但相对应的权利，是同等原则的体现"}, {"letter": "D", "content": "当事人达成调解协议不仅要自愿，内容也不得违法，是法院调解自愿和合法原则的体现"}], "answer": "ABD"}, {"id": 197, "question": "根据民事诉讼法及相关规定，下列关于辩论原则的说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "督促程序不适用辩论原则"}, {"letter": "B", "content": "当事人辩论权的行使局限于一、二审程序中开庭审理的法庭辩论阶段"}, {"letter": "C", "content": "当事人向法院提出起诉状和答辩状是其行使辩论权的一种表现"}, {"letter": "D", "content": "证人出庭陈述证言是证人行使辩论权的一种表现"}], "answer": "A"}, {"id": 198, "question": "根据民事诉讼法的规定，下列说法中哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "人民法院审理第二审民事案件，不能由一名审判人员独任审理"}, {"letter": "B", "content": "人民法院审理第一审民事案件，只有简易程序才用独任制。C选项，《民诉法》第40条第3款规定：能由一名审判人员独任市理"}, {"letter": "C", "content": "人民降审员在参加审判活动时，除法律另有规定外，与审判员有同等的权利义务"}, {"letter": "D", "content": "合议庭评议案件中的不同意见、必须如实记人笔录"}], "answer": "AC"}, {"id": 199, "question": "根据民事诉讼法的规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "人民法院审理第一审民事案件，可以由审判员和人民陪审员组成合议庭审理"}, {"letter": "B", "content": "人民法院审理第二审民事案件，只能由审判员组成合议庭"}, {"letter": "C", "content": "发回重审的案件，原审人民法院应当按照第一审程序另行组成合议庭"}, {"letter": "D", "content": "人民法院审理再审案件，只能由审判员另行组成合议庭"}], "answer": "C"}, {"id": 200, "question": "根据民事诉讼法及相关规定，下列哪类民事案件应当由合议庭审理？", "type": "单选", "options": [{"letter": "A", "content": "适用简易程序审理的第一审民事案件"}, {"letter": "B", "content": "基层人民法院审理的基本事实清楚，权利义务关系明确的第一审民事案件"}, {"letter": "C", "content": "发回重审的案件"}, {"letter": "D", "content": "中级人民法院审理的第二审民事案件"}], "answer": "CD"}, {"id": 201, "question": "星辉公司起诉皓月公司合同纠纷一案，一审法院适用简易程序，由张法官独任审理，判决驳回星辉公司诉讼请求，星辉公司不服一审判决提起上诉，二审法院认为本案一审程序违法，剥夺当事人辩论权，裁定撤销一审判决，发回一审法院重新审理。关于本案重新审理表述正确的是？", "type": "单选", "options": [{"letter": "A", "content": "一审法院应当适用普通程序，由张法官以外的法官独任审理"}, {"letter": "B", "content": "一审法院应当适用普通程序，张法官不得参与重出法庭审理的第一审民事案件.且发回重审成者审合议庭"}, {"letter": "C", "content": "一审法院应当适用简易程序，由张法官以外的法官独任审理"}, {"letter": "D", "content": "一审法院应当适用普通程序，张法官和人民陪审员不得参与重新审现"}], "answer": "ABC"}, {"id": 202, "question": "甲公司因为合同纠纷起诉乙公司，某县人民法院适用简易程序审理后判决甲公司败诉。甲公司不服一审判决，提起上诉，二审法院指定吴法官对本案独任审理，乙公司当庭表示异议，关于本案，下列说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "二审只能组成合议庭审理，不能适用独任制"}, {"letter": "B", "content": "简易程序一审终审，不得上诉"}, {"letter": "C", "content": "二审法院有权直接指定法官适用独任制审理"}, {"letter": "D", "content": "二审法院应裁定转为合议庭审理"}], "answer": "C"}, {"id": 203, "question": "根据民事诉讼法及相关规定，下列哪些情况下，当事人可以申请回避？", "type": "多选", "options": [{"letter": "A", "content": "鉴定人陈某，其与本案有利害关系"}, {"letter": "B", "content": "审判人员李某，担任过本案的鉴定人的"}, {"letter": "C", "content": "律师韩某是本案当事人近亲属的"}, {"letter": "D", "content": "人民陪审员赵某接受过本案当事人宴请的"}], "answer": "B"}, {"id": 204, "question": "某民事案件审理过程中，当事人对合议庭组成人员提出回避请求，根据民事诉讼法及相关规定，下列说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "当事人申请审判人员回避的，应由审判委员会决定"}, {"letter": "B", "content": "当事人申请陪审员回避的，应由审判长决定"}, {"letter": "C", "content": "当事人对人民法院驳回回避申请的决定不服，可以向原人民法院申请复议一次"}, {"letter": "D", "content": "人民法院驳回当事人的回避申请，当事人不服申规定，审判人员的回避，由院长决定，因此审判员、请复议的，复议期间被申请回避人不停止参与本案的审理！陪审员的回避均由院长决定，A、B选项错误。C、D-73 -工作"}], "answer": "D"}, {"id": 205, "question": "某区法院审理原告许某与被告某饭店食物中纠纷一案。审前，法院书面告知许某合议庭由审判员甲、乙和人民陪审员丙组成时，许某未提出回避申请。开庭后，许某始知人民陪审员丙与被告法定代表人是亲兄弟，遂捉出回避申请。关于本案的回避，下列哪一说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "许某可在知道丙与被告法定代表人是亲兄弟时提出回避申请"}, {"letter": "B", "content": "法院对回避申请作出决定前，丙不停止参与本案审理"}, {"letter": "C", "content": "应由审判长决定丙是否应回避"}, {"letter": "D", "content": "法院作出回避决定后，许某可对此提出上诉"}], "answer": "ABD"}, {"id": 206, "question": "王某诉马某侵权损害赔偿纠纷一案，经开庭审理后，合议庭经评议，拟支持王某的诉讼请求。法院通知双方当事人8月1日进行宣判，马某发现本案书记员张某是原告的表妹夫，遂于7月31日向法院提出书记员张某回避的申请。关于本案，表述正确的是？", "type": "单选", "options": [{"letter": "A", "content": "以书记员不属于应当回避人员为由，驳回马某的回避申请"}, {"letter": "B", "content": "以马某的申请不符合法定回避的情形为由，驳回马某的回避申请"}, {"letter": "C", "content": "因为马某超过了法定申请回避的期限，法院对马某的申请不予审查"}, {"letter": "D", "content": "法院应当决定延期宣判，对马某提出的回避申请予以审查"}], "answer": "CD"}, {"id": 207, "question": "根据民事诉讼法及相关规定，下列说法哪项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "涉及商业秘密案件不得公开审理"}, {"letter": "B", "content": "涉及离婚案件是否公开审理由当事人协商决定"}, {"letter": "C", "content": "涉及离婚案件当事人申请不公开审理的，一律不！另有规定的以外，出当公开进行。高造案件，沙及公开审理"}, {"letter": "D", "content": "涉及商业秘密案件当事人审请不公并审理的，可以不公开审理"}], "answer": "A"}, {"id": 208, "question": "根据民事诉讼法及相关规定，关于第一审民事案件的级别管辖，下列哪个表述是正确的？", "type": "单选", "options": [{"letter": "A", "content": "基层人民法院管辖所有第一审民事案件"}, {"letter": "B", "content": "中级人民法院管辖所有涉外的第一审民事案件"}, {"letter": "C", "content": "高级人民法院管辖在本辖区有重大影响的第一审民事案件"}, {"letter": "D", "content": "最高人民法院仅管辖在全国有重大影响的第一审民事案件"}], "answer": "C"}, {"id": 209, "question": "根据民事诉讼法及相关司法解释，下列关于中级人民法院的哪项说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "对案件所作出的判决均为终审判决"}, {"letter": "B", "content": "审理案件均须以开庭审理的方式进行"}, {"letter": "C", "content": "既可受理一审涉外案件，也可受理一审非涉外案件"}, {"letter": "D", "content": "审理案件组成合议庭时，均不可邀请人民陪审员参加"}], "answer": "D"}, {"id": 210, "question": "根据最高人民法院关于第一审知识产权民事、行政案件管辖的若干规定，下列说法哪个是正确的？", "type": "单选", "options": [{"letter": "A", "content": "外观设计专利第一审行政案件，经最高人民法院批准，！可以由基层人民法院管辖"}, {"letter": "B", "content": "外观设计专利的侵权纠纷第一审民事案件，经最高人民法院批准，可以由基层人民法院管辖"}, {"letter": "C", "content": "实用新型专利的权属纠纷第一审民事案件可以由最高人民法院确定的基层人民法院管辖"}, {"letter": "D", "content": "技术秘密的侵权纠纷第一审民事案件可以由最高人民审判员、人民陪审员共同组成合议庭，因此法院确定的基层人民法院管辖"}], "answer": "C"}, {"id": 211, "question": "王某欲以刘某和赵某为共同被告提起民事诉讼。经查，王某的住所地和经常居住地均为甲地；刘某的住所地为乙地、经常居住地为丙地；赵某的住所地和经常居住地均为丁地。根据民事诉讼法及相关规定，下列哪些人民法院对该案有管辖权？", "type": "多选", "options": [{"letter": "A", "content": "甲地人民法院"}, {"letter": "B", "content": "乙地人民法院"}, {"letter": "C", "content": "丙地人民法院"}, {"letter": "D", "content": "丁地人民法院"}], "answer": "C"}, {"id": 212, "question": "根据民事诉讼法及相关规定，下列哪些案件由原告住所地或者经常居住地人民法院管辖？", "type": "多选", "options": [{"letter": "A", "content": "对宣告失踪的人提起的有关财产关系的诉讼"}, {"letter": "B", "content": "对下落不明的人提起的有关身份关系的诉讼"}, {"letter": "C", "content": "对不在中华人民共和国领域内居住的人提起的有关身份关系的诉讼"}, {"letter": "D", "content": "对不在中华人民共和国领域内居住的人提起的有关财产关系的诉讼"}], "answer": "B"}, {"id": 213, "question": "根据民事诉讼法及相关规定，关于地域管辖，下列说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "因侵权行为提起的诉讼，由侵权行为地或者被告住所地人民法院管辖"}, {"letter": "B", "content": "因合同纠纷提起的诉讼，由被告住所地或者合同履行地人民法院管辖"}, {"letter": "C", "content": "因继承遗产纠纷提起的诉讼，由被继承人死亡时住所地或者主要遗产所在地人民法院管辖"}, {"letter": "D", "content": "因公司设立纠纷提起的诉讼，由公司住所地人民法院管辖"}], "answer": "CD"}, {"id": 214, "question": "住所地在上海市闵行区的原告甲认为住所地在深圳市用区的被告乙公司在北京市生产的产品使犯了自已的专利定：“因使权行为展居的诉讼，由使权行为均权.在乙公司设于广州市的销售部购买了被控役权产品，以役客发明专利权纠纷为由提起民事诉讼，下列哪些法院有管辖权？", "type": "多选", "options": [{"letter": "A", "content": "上海知识产权法院"}, {"letter": "B", "content": "深圳市中级人民法院"}, {"letter": "C", "content": "北京知识产权法院"}, {"letter": "D", "content": "广州知识产权法院"}], "answer": "BC"}, {"id": 215, "question": "根据民事诉讼法及相关规定，与信息网络管辖说法正确有哪些？多选）", "type": "多选", "options": [{"letter": "A", "content": "信息网络方式订立的买卖合同，通过信息网络交付标的的，以买受人住所地为合同履行地"}, {"letter": "B", "content": "信息网络方式订立的买卖合同，通过信息网络以外的方式交付标的的，收货地为合同履行地"}, {"letter": "C", "content": "信息网络侵权中，实施被诉侵权行为的计算机等信息设备所在地不属于侵权行为实施地"}, {"letter": "D", "content": "信息网络侵权中，侵权结果发生地包括被侵权人住所地"}], "answer": "ABCD"}, {"id": 216, "question": "甲和乙是同乡，现都在北京市海淀区工作。甲在深圳市南山区有一套住房，经协商，同意以400万元的价格将房屋卖给乙。双方在北京签订了合同，乙一次性支付了房款，后办理了房屋产权过户手续。现甲之妻以卖房未经其同意为由，要求乙返还房产。据此，本案应当由哪个人民法院管辖？", "type": "单选", "options": [{"letter": "A", "content": "北京市海淀区人民法院"}, {"letter": "B", "content": "深圳市南山区人民法院"}, {"letter": "C", "content": "北京市海淀区人民法院或者深圳市南山区人民法院"}, {"letter": "D", "content": "最先受理甲之妻起诉的人民法院"}], "answer": "BCD"}, {"id": 217, "question": "根据民事诉讼法及相关规定，关于专属管辖，下列说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "因商品房相邻关系引起的物权纠纷，由该商品房所在地人民法院管辖"}, {"letter": "B", "content": "商品房买实合同纠纷，由该商品房所在地人民法院管辖"}, {"letter": "C", "content": "房屋租货合同纠纷、由该房屋所在地人民法院管辖"}, {"letter": "D", "content": "政策性房屋买实合同纠纷，由该房屋所在地人民法院管辖"}], "answer": "ABD"}, {"id": 218, "question": "家住天津市河东区的李某，在七夕情人节当天在某宝网上购买了位于天津市西青区的“玫瑰有约”花店的99朵玫瑰花，送给位于天津市和平区的女友，直接由花店送达女友住处。女友收到后发现玫现花已经枯萎，经与花店协商未果，李某向天津市河东区法院起诉该花店。法院受理后认为没有管辖权，遂将案件移送天津市和平区法院。关于本案的管辖，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "天津市河东区法院有管辖权"}, {"letter": "B", "content": "天津市西青区法院有管辖权"}, {"letter": "C", "content": "天津市和平区法院有管辖权"}, {"letter": "D", "content": "天津市河东区法院移送管辖不符合法律规定"}], "answer": "B"}, {"id": 219, "question": "根据民事诉讼法及相关规定，在不违反民事诉讼法对级别管辖和专属管辖规定的情况下，合同双方当事人可以就合同纠纷通过书面协议选择下列哪些人民法院管辖？", "type": "多选", "options": [{"letter": "A", "content": "被告住所地人民法院"}, {"letter": "B", "content": "合同履行地人民法院"}, {"letter": "C", "content": "合同签订地人民法院"}, {"letter": "D", "content": "标的物所在地人民法院"}], "answer": "ACD"}, {"id": 220, "question": "甲公司与乙公司签订了家具买卖合同，并欲就发生合同纠纷时的管辖问题进行约定。根据民事诉讼法及相关规定，在不违反级别管辖和专属管辖规定的情况下，下列哪些约定符合规定？", "type": "多选", "options": [{"letter": "A", "content": "双方书面约定由合同签订地人民法院管辖"}, {"letter": "B", "content": "双方口头约定由合同签订地人民法院管辖"}, {"letter": "C", "content": "双方书面约定由原告住所地人民法院管辖"}, {"letter": "D", "content": "双方口头约定由原告住所地人民法院管辖"}], "answer": "BC"}, {"id": 221, "question": "根据民事诉讼法及相关规定，对于两个以上人民法院都有管辖权的民事诉讼案件，下列说法正确的是7", "type": "多选", "options": [{"letter": "A", "content": "先立案的人民法院可以将案件移送给另一个有管辖权的人民法院"}, {"letter": "B", "content": "人民法院在立案前发现其他有管辖权的人民法院已先立案的，不得重复立案"}, {"letter": "C", "content": "人民法院在立案后发现其他有管辖权的人民法院已先立案的，裁定将案件移送给先立案的人民法院"}, {"letter": "D", "content": "有管辖权的人民法院受理案件后，不得以行政区城变更为由，将案件移送给变更后有管辖权的人民法院"}], "answer": "ABCD"}, {"id": 222, "question": "李某在北京市海淀区新购一套住房，并请北京市大兴区的装修公司对其新房进行装修。在装修过程中，装修工人不慎将水管弄破，导致楼下住户的家具被淹毁。李某与该装修公司就赔偿问题交涉未果，遂向北京市大兴区法院起诉装修公司侵权。大兴区法院认为该案应由海淀区法院审理，于是裁定将该案移送至海淀区法院，海淀区法院认为该案应由大兴区法院审理，不接受移送，又将案件退回大兴区法院。关于本案的管辖，下列哪些选项是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "北京市海淀、大兴区法院对该案都有管辖权"}, {"letter": "B", "content": "只有北京市海淀区法院有管辖权"}, {"letter": "C", "content": "北京市大兴区法院的移送管辖是错误的"}, {"letter": "D", "content": "海淀区法院不接受移送，将案件退回大兴区法院是错误的"}], "answer": "AC"}, {"id": 223, "question": "10岁的张某在公交车上玩要，不慎将手中的玩具砸到邻座8岁的王某致其受伤、双方父母对损害赔偿问题发生争议，王某的父母决定向法院提起诉讼，关于本案当事人的说法，下列哪些说法正确？", "type": "多选", "options": [{"letter": "A", "content": "王某是原告"}, {"letter": "B", "content": "王某和王某的父母是共同原告"}, {"letter": "C", "content": "张某是被告"}, {"letter": "D", "content": "张某和张某的父母是共同被告"}], "answer": "ACD"}, {"id": 224, "question": "根据民事诉讼法及相关规定，下列关于民事诉讼第三人的说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "对当事人双方的诉讼标的，第三人认为有独立请求权的，有权提起诉讼"}, {"letter": "B", "content": "有独立请求权的第三人有权向人民法院提出诉讼请求和事实、理由，成为当事人"}, {"letter": "C", "content": "对当事人双方的诉讼标的，第三人虽然没有独立请求权，但案件处理结果同他有法律上的利害关系的，可以申请参加诉讼"}, {"letter": "D", "content": "人民法院判决承担民事责任的第三人，有当事人的诉讼权利义务"}], "answer": "ABCD"}, {"id": 225, "question": "根据民事诉讼法及相关规定，在民事诉讼一审程序中，无独立请求权的第三人不享有下列哪项诉讼权利？", "type": "多选", "options": [{"letter": "A", "content": "申请撤诉"}, {"letter": "B", "content": "提出回避申请"}, {"letter": "C", "content": "变更诉讼请求"}, {"letter": "D", "content": "对案件的管辖权提出异议同：又将专利转让给了丙公司，乙公司因与丙公司就实施诉讼：也没有提出管错权异议的权科，当法院判决许可发生纠纷向人民法院提起诉讼，甲作为第三人在该案中享有哪些权利？（多选）"}], "answer": "AD"}, {"id": 226, "question": "赵某与刘某将共有商铺出租给陈某。刘某着赵某，与陈某签订房屋买卖合同，将商转让给陈某，后因该合同履行发生纠纷，刘某将陈某诉至法院。赵某得知后，坚决不同意刘某将商铺让与陈某。关于本案相关人的诉讼地位，下列哪一说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "法院应依职权追加赵某为共同原告"}, {"letter": "B", "content": "赵某应以刘某侵权起诉，陈某为无独立请求权第三人"}, {"letter": "C", "content": "赵某应作为无独立请求权第三人"}, {"letter": "D", "content": "赵某应作为有独立请求权第三人"}], "answer": "ABCD"}, {"id": 227, "question": "甲公司对乙公司有100万元债权到期，乙公司对丙公司有100万债权。甲公司对丙公司提起代位权诉讼，法院依法将乙公司列为第三人。诉讼中甲、丙达成调解协议，约定丙公司将价值100万一批货物交付给甲，用于清偿该笔债务，法院依法制作调解书送达当事人。丁主张货物是自己的，欲提出第三人撤销之诉，该撤销之诉中，下列关于当事人地位的说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "乙是被告"}, {"letter": "B", "content": "丙是被告"}, {"letter": "C", "content": "乙是第三人"}, {"letter": "D", "content": "丙是第三人"}], "answer": "ACD"}, {"id": 228, "question": "某消费者权益保护协会认为，某手机生产商在手机出厂前预装大量程序，并且未告知消费者卸载方式。该消费者权益保护协会以上述行为侵害众多消费者合法权益、损害社会公共利益为由提起公益诉讼。根据民事诉讼法及相关规定，下列哪种说法是正确的？单选）", "type": "单选", "options": [{"letter": "A", "content": "本案可以由侵权行为地或者被告住所地中级人民法院管辖"}, {"letter": "B", "content": "作为公益诉讼案件原告的该消费者权益保护协会一律不得申请撤诉"}, {"letter": "C", "content": "人民法院不得对该公益诉讼案件进行调解"}, {"letter": "D", "content": "该公益诉讼案件的当事人不能和解"}], "answer": "D"}, {"id": 229, "question": "根据民事诉讼法及相关规定，下列哪些属于有关社会团体推荐公民担任诉讼代理人应当符合的条件？", "type": "多选", "options": [{"letter": "A", "content": "社会团体属于依法登记设立或者依法免予登记设立的非营利性法人组织"}, {"letter": "B", "content": "被代理人属于该社会团体的成员，或者当事人一方住所地位于该社会团体的活动地域"}, {"letter": "C", "content": "代理事务属于该社会团体章程载明的业务范围"}, {"letter": "D", "content": "被推荐的公民是该社会团体的负责人或者与该社会团体有合法劳动人事关系的工作人员是（单选）"}], "answer": "BC"}, {"id": 230, "question": "张某因为合同纠纷起诉甲公司，在诉讼中张某突发脑梗，经抢救后，张某仍然丧失行为能力。张某的父亲希望撤回起诉，以专心为张某治疗；张某的妻子表示希望继续诉讼。本案法院应当如何处理？", "type": "单选", "options": [{"letter": "A", "content": "法院应当追加张某的妻子为共同原告"}, {"letter": "B", "content": "法院应当变更张某的妻子为原告，诉讼继续进行"}, {"letter": "C", "content": "追加张某的妻子为法定代理人，诉讼继续进行"}, {"letter": "D", "content": "根据张某父亲的请求，裁定准予撤回起诉"}], "answer": "AB"}, {"id": 231, "question": "根据民事诉讼法及相关规定，关于诉讼代理人，下列说法哪个是正确的？", "type": "单选", "options": [{"letter": "A", "content": "律师之外的其他诉讼代理人有权调查收集证据，查阅本案有关材料"}, {"letter": "B", "content": "诉讼代理人的权限变更的，可以由诉讼代理人书面告知人民法院"}, {"letter": "C", "content": "当事人委托诉讼代理人全权代理的，诉讼代理人可以代为变更诉讼请求"}, {"letter": "D", "content": "离婚案件有诉讼代理人的，本人仍应出庭"}], "answer": "C"}, {"id": 232, "question": "关于民事诉讼证据的理解，下列选项中正确的有？", "type": "单选", "options": [{"letter": "A", "content": "存储在电子介质上的录音资料，适用电子数据的相关规定"}, {"letter": "B", "content": "民事诉讼中的证人只能是自然人"}, {"letter": "C", "content": "法院责令对方当事人提交相关书证，则因提交书证所产生的费用，应当由申请人垫付，由对方当事人最终承担"}, {"letter": "D", "content": "书证应当提交原件，但如果原件在对方当事人控制之下，则可以提交复制品"}], "answer": "BCD"}, {"id": 233, "question": "根据民事诉讼法及相关规定，当事人的下列哪些做法符合关于证据的规定？", "type": "多选", "options": [{"letter": "A", "content": "原告赵某以电子数据作为证据来证明提出自己的主张"}, {"letter": "B", "content": "原告张某因在人民法院确定的期限内提供证据确有困难，向人民法院申请延长期限"}, {"letter": "C", "content": "被告李某因提交某书证原件确有困难，提交了经人民法院核对无异的复制件"}, {"letter": "D", "content": "被告王某提交外文书证作为证据，未附中文译本"}], "answer": "ACD"}, {"id": 234, "question": "在一起专利侵权诉讼中，原告申请由其弟袁某（某大学计算机系教授）作为专家辅助人出庭对专业技术问题予以说明。下列哪些表述是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "被告以袁某是原告的近亲属为由申请其回避，法院应批准"}, {"letter": "B", "content": "袁某在庭上的陈述是一种法定证据"}, {"letter": "C", "content": "被告可对袁某进行询问"}, {"letter": "D", "content": "袁某出庭的费用，由败诉方当事人承担"}], "answer": "A"}, {"id": 235, "question": "甲、乙两公司因合同纠纷提起诉讼，甲公司申请丙运输公司的赵某作为证人出庭作证，乙公司申请本公司的仓库保管员钱某作为证人出庭作证，以下表述正确的是？", "type": "多选", "options": [{"letter": "A", "content": "因钱某是乙公司员工，需经过甲公司同意方具有证人资格"}, {"letter": "B", "content": "为提高效率，赵某提前写好证词当庭宣读C8"}, {"letter": "C", "content": "法院可安排赵某和钱某当庭对质"}, {"letter": "D", "content": "赵某因路途遥远申请视频作证，法院未询问乙公司意见直接同意"}], "answer": "ABC"}, {"id": 236, "question": "杨某（15岁）与何某（14岁）两人经常打闹，一次，杨某失手将何某推倒，致何某成为了植物人，当时在场的还有何某的弟弟何小某（11岁）。法院审理时，何小某以证人身份出庭。关于何小某作证，下列哪些说法不能成立？", "type": "多选", "options": [{"letter": "A", "content": "何小某只有11岁、不具有证人资格"}, {"letter": "B", "content": "何小某是何某的弟弟，应回避"}, {"letter": "C", "content": "何小某作为未成年人，其所有证盲依法都不具有证明力"}, {"letter": "D", "content": "何小某作为何某的弟弟，证言具有明显的倾向性，其证言不能单独作为定案依据"}], "answer": "ABC"}, {"id": 237, "question": "根据民事诉讼法及相关规定，下列哪些关于鉴定的说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "当事人可以就查明事实的专门性问题向人民法院申请鉴定"}, {"letter": "B", "content": "当事人对鉴定意见有异议的，鉴定人不出庭作证，是否采纳该鉴定意见由法院决定"}, {"letter": "C", "content": "人民法院准许当事人鉴定申请的，应当在名录中指定鉴定人"}, {"letter": "D", "content": "当事人可以申请人民法院通知有专门知识的人出庭，就鉴定人作出的鉴定意见或者专业问题提出意见"}], "answer": "BC"}, {"id": 238, "question": "在某专利侵权诉讼中，原告张某依法向人民法院申请鉴定。具备资格的某鉴定人依法出具了鉴定意见，张某支付了鉴定费用。案件审理过程中，被告王某对该鉴定意见有异议，人民法院通知该鉴定人出庭作证，但其拒不出庭作证。据此，根据民事诉讼法及相关规定，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "人民法院应当拘传该鉴定人出庭作证"}, {"letter": "B", "content": "该鉴定意见不得作为认定事实的根据"}, {"letter": "C", "content": "张某可以要求该鉴定人返还鉴定费用"}, {"letter": "D", "content": "人民法院应当贵令张某确定其他鉴定人重新作出鉴定"}], "answer": "CD"}, {"id": 239, "question": "根据民事诉讼法及相关规定，下列哪些事实当事人无须举证证明？", "type": "多选", "options": [{"letter": "A", "content": "众所周知的事实"}, {"letter": "B", "content": "根据法律规定推定的事实"}, {"letter": "C", "content": "自然规律以及定理、定律"}, {"letter": "D", "content": "根据已知的事实和目常生活经验法则推定出的另一小实"}], "answer": "ABC"}, {"id": 240, "question": "刘月购买甲公司的化肥，使用后农作物生长异常。刘月向法院起诉，要求甲公司退款并赠偿损失。诉讼中甲公司否认刘月的损失是因其出售的化肥质量向题造成的，刘月向法院提供了本村吴某起诉甲公司损害赔偿案件的判决书，以证明甲公司出售的化肥有质量问题且与其所受损害有因果关系。关于本案刘月所受损害与使用甲公司化肥因果关系的证明责任分配，下列哪一选项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "应由刘月负担有因果关系的证明资任"}, {"letter": "B", "content": "应由甲公司负担无因果关系的证明责任"}, {"letter": "C", "content": "应由法院依职权裁量分配证明责任"}, {"letter": "D", "content": "应由双方当事人协商分担证明责任"}], "answer": "AD"}, {"id": 241, "question": "根据民事诉讼法及相关规定，下列哪些情形当事人及其诉讼代理人可以申请人民法院调查取证？", "type": "多选", "options": [{"letter": "A", "content": "申请调查收集的证据属于国家有关机关保存并须人民法院依职权调取的档案材料"}, {"letter": "B", "content": "当事人及其诉讼代理人确因客观原因不能自行收集的其他材料"}, {"letter": "C", "content": "涉及国家秘密、商业秘密、个人隐私的材料"}, {"letter": "D", "content": "涉及可能损害国家利益、社会公共利益或者他人合法权益的事实"}], "answer": "BC"}, {"id": 242, "question": "关于民事诉讼证据交换，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "人民法院在开庭前可以组织交换证据"}, {"letter": "B", "content": "证据交换可以在审判人员或书记员的主持下进行"}, {"letter": "C", "content": "交换证据的时间可由人民法院指定"}, {"letter": "D", "content": "人民法院组织当事人交换证据的、交换证据之日举证期限届满"}], "answer": "ABCD"}, {"id": 243, "question": "根据民事诉讼法及相关规定、下列哪种说法是错误的？", "type": "单选", "options": [{"letter": "A", "content": "证据应当在法庭上出示，由当事人质证"}, {"letter": "B", "content": "未经质证的证据，不能作为认定案件事实的根据"}, {"letter": "C", "content": "涉及商业秘密的证据，不得在开庭时公开质证"}, {"letter": "D", "content": "未出庭作证的证人证言不能作为认定案件事实的依据"}], "answer": "B"}, {"id": 244, "question": "根据民事诉讼法及相关规定，下列关于证据保全的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "在证据可能灭失的情况下，当事人可以在诉讼过程中申请保全证据"}, {"letter": "B", "content": "证据保全只能依当事人申请进行，人民法院不得主动采取保全措施"}, {"letter": "C", "content": "当事人申请证据保全的，可以在举证期限届满前书面提出"}, {"letter": "D", "content": "证据保全可能对他人造成损失的，人民法院应当责令申请人提供相应的担保"}], "answer": "ABC"}, {"id": 245, "question": "关于民事诉讼中的调解，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "调解应当根据自愿和合法的原则进行"}, {"letter": "B", "content": "人民法院进行调解的，应当由合议庭主持"}, {"letter": "C", "content": "调解协议的内容不得违反法律的规定"}, {"letter": "D", "content": "调解书送达前一方反悔的，人民法院应当及时判决是正确的？（多选）"}], "answer": "ACD"}, {"id": 246, "question": "根据民事诉讼法及相关规定，下列关于民事诉讼调解的哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "能够即时履行的案件调解达成协议，人民法院可以不制作调解书"}, {"letter": "B", "content": "调解维持收养关系的案件调解达成协议，人民法院应当制作调解书"}, {"letter": "C", "content": "当事人对已经发生法律效力的解除婚姻关系的调解书，可以申请再审"}, {"letter": "D", "content": "调解书送达前一方反悔的，人民法院可以留置送达该调解书"}], "answer": "D"}, {"id": 247, "question": "根据民事诉讼法及相关规定，下列有关调解的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "当事人起诉到人民法院的民事纠纷，一律应当先行调解"}, {"letter": "B", "content": "第一审普通程序中法庭辩论终结后，人民法院一律不再进行调解"}, {"letter": "C", "content": "第二审人民法院审理上诉案件，可以进行调解"}, {"letter": "D", "content": "调解达成协议的，人民法院制作的调解书经双方当事人签收后，即具有法律效力"}], "answer": "ACD"}, {"id": 248, "question": "周某（男）与张某（女）婚后因感情纠纷诉至法院，请求离婚。诉讼中双方达成调解协议：约定两个孩子由女方抚养，两套房屋均归女方所有，男方每月支付抚养费1万元，法院依据调解协议制作调解书送达给双方当事人。张某发现法院调解书上关于房屋部分的内容错误，将调解协议中约定都归她所有的两套房屋写成了周某和张某一人一套，遂提出异议。关于本案，下列说法正确的有？", "type": "单选", "options": [{"letter": "A", "content": "调解书已经生效，不能提出异议，可以违反自愿原则为由申请再审"}, {"letter": "B", "content": "调解书不生效，法院收回调解书，重新制作后再送达给双方"}, {"letter": "C", "content": "法院审查后认为异议成立的，及时作出判决"}, {"letter": "D", "content": "法院审查后认为异议成立的，作出裁定予以补正"}], "answer": "ACD"}, {"id": 249, "question": "根据民事诉讼法及相关规定，下列关于保全的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "利害关系人因情况紧急，不立即申请保全将会使其合法权益受到难以弥补的损害的，可以在提起诉讼前向被保全财产所在地或被申请人住所地人民法院申请采取保全措施"}, {"letter": "B", "content": "人民法院在民事诉讼中对于可能因一方当事人的原因使判决难以执行的案件，可以根据对方当事人的申请，作出财产保全的裁定"}, {"letter": "C", "content": "申请保全有错误的，申请人应当赔偿被申请人因保全所遭受的损失"}, {"letter": "D", "content": "申请人在人民法院采取诉前财产保全措施后10日内不起诉的，人民法院应当解除财产保全"}], "answer": "ACD"}, {"id": 250, "question": "根据民事诉讼法及相关规定，下列关于诉前财产保全的说法，正确的是？", "type": "多选", "options": [{"letter": "A", "content": "人民法院可以依职权主动采取诉前财产保全措施"}, {"letter": "B", "content": "利害关系人因情况紧急，不立即申请财产保全将会使其合法权益受到难以弥补的损害的，可以申请诉前财产保全"}, {"letter": "C", "content": "人民法院接受申请后，必须在48小时内作出裁定"}, {"letter": "D", "content": "申请人可以不提供担保"}], "answer": "A"}, {"id": 251, "question": "王某早年丧姿，独自一人抚养儿子王小某。王小某成年后，从未支付赠养费。王某起诉王小某支付赠养费， stion": "根据民事诉讼法及相关规定，下列美手民事诉讼第一审普通程序的哪些说法是正确的多选）", "type": "多选", "options": [{"letter": "A", "content": "人民法院审理民事案件，一律应当公开进行"}, {"letter": "B", "content": "人民法院审理民事案件，一律公开宣告判决"}, {"letter": "C", "content": "人民法院审理民事案件，应当在开庭三日前通知当事人和其他诉讼参与人"}, {"letter": "D", "content": "人民法院审理民事案件，根据需要进行巡回审理、就地办案"}], "answer": "AD"}, {"id": 258, "question": "根据民事诉讼法及相关规定，下列关于第一审普通程序的说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "涉及商业秘密的案件，应当不公开审理"}, {"letter": "B", "content": "当事人经法庭许可，可以向证人、鉴定人、勘验人发问"}, {"letter": "C", "content": "原告未经法庭许可中途退庭的，应当缺席判决"}, {"letter": "D", "content": "宣判前，原告申请撤诉，人民法院裁定不准许撤诉的，原告经传票传唤，无正当理由拒不到庭的，可以缺席判决"}], "answer": "BC"}, {"id": 259, "question": "根据民事诉讼法及相关规定，关于第一审普通程序，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "原告经传票传唤，无正当理由拒不到庭的，应当缺席判决"}, {"letter": "B", "content": "被告未经法庭许可中途退庭的，可以缺席判决"}, {"letter": "C", "content": "宣判前，原告申请撤诉的，人民法院应当准许"}, {"letter": "D", "content": "宜判前，原告申请撤诉的，是否准许，由人民法院裁定"}], "answer": "BCD"}, {"id": 260, "question": "根据民事诉讼法及相关规定，下列哪些情形下可以延期开庭审理？", "type": "多选", "options": [{"letter": "A", "content": "必须到庭的当事人有正当理由没有到庭的"}, {"letter": "B", "content": "当事人临时提出回避申请的"}, {"letter": "C", "content": "需要通知新的证人到庭的"}, {"letter": "D", "content": "本案必须以另一案的审理结果为依据，而另一案又尚未审结的"}], "answer": "BD"}, {"id": 261, "question": "根据民事诉讼法及相关规定，人民法院适用普通程序审理民事诉讼案件的期限为六个月，但该期限不包括下列哪些期间？", "type": "多选", "options": [{"letter": "A", "content": "公告期间"}, {"letter": "B", "content": "鉴定期间"}, {"letter": "C", "content": "审理当事人提出的管辖权异议期间"}, {"letter": "D", "content": "处理人民法院之间的管辖权争议期间"}], "answer": "D"}, {"id": 262, "question": "法院对于诉讼中有关情况的处理，下列哪做法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "杨某与赵某损害赔偿一案，杨某在去往法院开庭的路上，突遇车祸，当场死亡。法院认为需要等待继承人表明是否参加诉讼，遂裁定中止诉讼"}, {"letter": "B", "content": "毛某与安某专利侵权纠纷一案，法庭审理过程中，发现需要重新进行鉴定，法院决定延期审理"}, {"letter": "C", "content": "甲公司诉乙公司合同纠纷一案，审理过程中，甲公司与其他公司合并，法院裁定诉讼终结"}, {"letter": "D", "content": "丙公司诉丁公司租赁纠纷一案，法院审理中，发现本案必须以另一案的审理结果为依据而该案又尚未审结，遂裁定诉讼中止"}], "answer": "ABC"}, {"id": 263, "question": "根据民事诉讼法及相关规定，下列哪些情形下中止诉讼？", "type": "多选", "options": [{"letter": "A", "content": "一方当事人丧失诉讼行为能力，尚未确定法定代理人的"}, {"letter": "B", "content": "本案必须以另一案的审理结果为依据，而另一案尚未审结的"}, {"letter": "C", "content": "一方当事人因不可抗拒的事由，不能参加诉讼的"}, {"letter": "D", "content": "解除收养关系案件的一方当事人死亡的"}], "answer": "ABD"}, {"id": 264, "question": "根据民事诉讼法及相关规定，下列哪些情形下民事诉讼终结？", "type": "多选", "options": [{"letter": "A", "content": "原告死亡，没有继承人的"}, {"letter": "B", "content": "一方当事人丧失诉讼行为能力，尚未确定法定代理人的"}, {"letter": "C", "content": "离婚案件一方当事人死亡的"}, {"letter": "D", "content": "追索赠养费案件的一方当事人死亡的"}], "answer": "B"}, {"id": 265, "question": "黄某向法院起诉陈某，以被欺诈为由请求撤销二人订立的买卖合同，法庭辩论结束第二天，黄某遇车祸死亡，黄某的唯一继承人黄小某一直下落不明，关于本案的处理正确的是？-95", "type": "单选", "options": [{"letter": "A", "content": "裁定诉讼终结"}, {"letter": "B", "content": "裁定视为撤诉"}, {"letter": "C", "content": "裁定诉讼中止"}, {"letter": "D", "content": "根据法庭辩论作出判决"}], "answer": "ABC"}, {"id": 266, "question": "根据民事诉讼法及相关规定，当事人对人民法院在民事诉讼第一审程序中作出的下列哪些裁定不服的，可以提起上诉？", "type": "多选", "options": [{"letter": "A", "content": "不予受理的裁定"}, {"letter": "B", "content": "不准许撤诉的裁定"}, {"letter": "C", "content": "中止诉讼的裁定"}, {"letter": "D", "content": "驳回起诉的裁定"}], "answer": "ACD"}, {"id": 267, "question": "郑飞诉万雷侵权纠纷一案，虽不属于事实清楚、权利义务关系明确、争议不大的案件，但双方当事人约定适用简易程序进行审理，法院同意并以电子邮件的方式向双方当事人通知了开庭时间（双方当事人均未回复）。开庭时被告万雷无正当理由不到庭，法院作出了缺席判决。送达判决书时法院通过各种方式均未联系上万雷，遂采取了公告送达方式送达了判决书。对此，法院下列的哪些行为是违法的？", "type": "多选", "options": [{"letter": "A", "content": "同意双方当事人的约定，适用简易程序对案件进行审理"}, {"letter": "B", "content": "以电子邮件的方式向双方当事人通知开庭时间"}, {"letter": "C", "content": "作出缺席判决"}, {"letter": "D", "content": "采取公告方式送达判决书"}], "answer": "AD"}, {"id": 268, "question": "根据《民事诉讼法）及相关司法解释中关于小额诉讼的规定，下列说法正确的有：", "type": "多选", "options": [{"letter": "A", "content": "人民法院审理小额诉讼案件，实行一审终审"}, {"letter": "B", "content": "标的额为各省、自治区，直辖市上年度就业人员年平均工资百分之三十以下的，适用小额诉讼的程序审理"}, {"letter": "C", "content": "小额诉讼程序可以免去举证期限和答辩期间"}, {"letter": "D", "content": "小额诉讼案件的举证期限，当事人协商一致即可确定"}], "answer": "ABCD"}, {"id": 269, "question": "根据人民法院在线诉讼规则及相关规定，下列案件哪些不得适用在线庭审？多选）", "type": "多选", "options": [{"letter": "A", "content": "需要通过庭审现场查明身份、核对原件、查验实物的"}, {"letter": "B", "content": "案件疑难复杂、证据繁多，适用在线庭审不利于查明事实和适用法律的"}, {"letter": "C", "content": "案件涉及国家安全、国家秘密的"}, {"letter": "D", "content": "案件具有重大社会影响，受到广泛关注的"}], "answer": "AC"}, {"id": 270, "question": "某省上年度就业人员年平均工资为8万元。张某诉李某归还借款6万元，该省某基层法院受理案件后，张某和李某均同意适用小额诉讼的程序审理。在审理过程中，李某对张某提出反诉，要求张某归还欠款8万元，法院应当如何处理？", "type": "多选", "options": [{"letter": "A", "content": "法院应当继续适用小额诉讼的程序审理"}, {"letter": "B", "content": "如果张某、李某同意适用小额诉讼的程序审理的，法院应当适用小额诉讼的程序审理"}, {"letter": "C", "content": "当事人可以对法院适用小额诉讼的程序审理法院适用小额诉讼的程序提出异议。因此，C、D选项正提出异议"}, {"letter": "D", "content": "法院应当适用简易程序的其他规定审理或者裁定将案件转为普通程序"}], "answer": "ABCD"}, {"id": 271, "question": "甲起诉乙归还借款200元，某区法院受理后适用小额诉讼的程序审理。关于本案，下列说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "法院可以采用短信方式传唤当事人"}, {"letter": "B", "content": "法院可以采用短信送达裁判文书"}, {"letter": "C", "content": "本案不得适用小额诉讼的程序审理"}, {"letter": "D", "content": "本案法院所作判决一审终审"}], "answer": "CD"}, {"id": 272, "question": "根据民事诉讼法及相关规定，关于第二审程序，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "第二审人民法院审理上诉案件，应当由审判员组成合议庭"}, {"letter": "B", "content": "第二审人民法院应当对上诉请求的有关事实和适用法律进行审查"}, {"letter": "C", "content": "上诉状可以通过原审人民法院提出，也可以向第二审人民法院直接提出"}, {"letter": "D", "content": "原判决严重违反法定程序的，第二审人民法院应当裁定撤销原判决，发回原审人民法院重审"}], "answer": "BD"}, {"id": 273, "question": "民事诉讼第二审人民法院对上诉案件进行调解后达成协议，并依法制作了调解书。根据民事诉讼法及相关规定，对于原审人民法院的判决，下列哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "第二审人民法院应作出裁定，撤销原审人民法院的判决"}, {"letter": "B", "content": "第二审人民法院应在调解书中注明撤销原审人民法院的判决"}, {"letter": "C", "content": "原审人民法院应主动撤销原判决"}, {"letter": "D", "content": "调解书送达后，原审人民法院的判决即视为撤销"}], "answer": "D"}, {"id": 274, "question": "关于民事诉讼二审程序的表述，下列哪一选项是错误的？", "type": "单选", "options": [{"letter": "A", "content": "二审案件的审理，遇有二审程序没有规定的情形，应当适用一审普通程序的相关规定"}, {"letter": "B", "content": "二审案件的审理，以开庭审理为原则"}, {"letter": "C", "content": "二审案件调解的结果变更了一审判决内容的，应当在调解书中写明“撤销原判”"}, {"letter": "D", "content": "二审案件的审理，应当由法官组成的合议庭进行电"}], "answer": "C"}, {"id": 275, "question": "根据民事诉讼法的规定，第二审人民法院对上诉案件经过审理，认为原判决认定事实储误或者适用法律错误的，应当如何处理？", "type": "多选", "options": [{"letter": "A", "content": "变更原判决"}, {"letter": "B", "content": "要求原审人民法院改判"}, {"letter": "C", "content": "裁定撤销原判决"}, {"letter": "D", "content": "依法改判"}], "answer": "ACD"}, {"id": 276, "question": "根据民事诉讼法及相关规定，对下列哪些上诉案件、第二审人民法院可以不开庭审理？", "type": "多选", "options": [{"letter": "A", "content": "原判决严重违反法定程序，需要发回重审的"}, {"letter": "B", "content": "当事人提出的上诉请求明显不能成立的"}, {"letter": "C", "content": "不服管辖权异议裁定的"}, {"letter": "D", "content": "原判决认定事实清楚，但适用法律错误的"}], "answer": "ABCD"}, {"id": 277, "question": "关于民事诉讼二审程序，下列哪些选项是正确的？", "type": "多选", "options": [{"letter": "A", "content": "二审既可因为当事人的上诉而发生，也可能因为检察院的抗诉而发生"}, {"letter": "B", "content": "二审既是事实审，也是法律审"}, {"letter": "C", "content": "二审调解书应当写明撤销原判"}, {"letter": "D", "content": "二审原则上应当开庭审理，特殊情况下可不开庭审理"}], "answer": "D"}, {"id": 278, "question": "长江公司向甲市A区法院起诉乙公司，区法院判决驳回甲公司的诉讼请求，长江公司不服一审判决，通过甲市A区法院提交上诉状，A区法院发现长江公司的上诉已经超过上诉期，应当如何处理？", "type": "单选", "options": [{"letter": "A", "content": "不予接受上诉材料"}, {"letter": "B", "content": "提请上级法院裁定驳回上诉"}, {"letter": "C", "content": "裁定驳回上诉"}, {"letter": "D", "content": "将上诉状和上诉材料一并移交上级法院"}], "answer": "ABC"}, {"id": 279, "question": "经审理，一审法院判决破告王集支付原告刘集欠量本息具计22万元，主某不服提出上诉。二审中，双方达框量协议，均足：王某分三个月向刘某偿付20万元，刘某基弃利息请求，案作经正某申请撤回上诉而终结。约定易限属满后，正某只支付了15万元。刘某应当如何教精（单话）", "type": "单选", "options": [{"letter": "A", "content": "向一审法院重新起诉"}, {"letter": "B", "content": "向一申法院申请执行判决"}, {"letter": "C", "content": "向一审法院申请执行和解协议"}, {"letter": "D", "content": "向二审法院提出上诉"}], "answer": "ABCD"}, {"id": 280, "question": "2万元，对赔礼道款的诉讼请求未作判决。张某不服一审判决，提起上诉，请求法院改判李某向张某赔偿损失2万元。二审法院维持1.2万的判项，同时判决李某向张某赔礼道款。关于本案表述正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "二审法院只能对上诉请求进行审理并作出判决"}, {"letter": "B", "content": "二审法院超出上诉请求作出判决的做法错误"}, {"letter": "C", "content": "二审法院应当对上诉请求作出判决，对一审遗漏的诉讼请求进行调解，调解不成撤销原判发回重审"}, {"letter": "D", "content": "因为一审法院遗漏诉讼请求，故二审法院应当直接撤销原判，发回重审"}], "answer": "BCD"}, {"id": 281, "question": "根据民事诉讼法及相关规定，当事人的再审申请符合下列哪些情形的，人民法院应当再审？", "type": "多选", "options": [{"letter": "A", "content": "有新的证据，足以推翻原判决的"}, {"letter": "B", "content": "原判决认定事实的主要证据未经质证的"}, {"letter": "C", "content": "据以作出原判决的法律文书被撤销的"}, {"letter": "D", "content": "原判决超出诉讼请求的"}], "answer": "ABC"}, {"id": 282, "question": "甲公司诉乙公司侵害发明专利权纠纷一案，一审法院判决驳回甲公司的全部诉讼请求，甲公司不服提起上诉，二审法院改判乙公司停止被控侵权行为并赔偿甲公司经济损失及合理费用。根据民事诉讼法及相关规定，乙公司的申请符合以下哪些情形的，人民法院应当再审？", "type": "多选", "options": [{"letter": "A", "content": "有新的证据"}, {"letter": "B", "content": "二审判决认定事实的主要证据未经质证的"}, {"letter": "C", "content": "二审判决适用法律确有错误的"}, {"letter": "D", "content": "二审判决遗漏或者超出诉讼请求的"}], "answer": "BCD"}, {"id": 283, "question": "根据民事诉讼法及相关规定，下列关于民事诉讼审判监督程序的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "当事人对已经发生法律效力的裁定，认为有错误的，可以向上一级人民法院申请再审"}, {"letter": "B", "content": "当事人对已经发生法律效力的调解书，提出证据证明调解违反自愿原则的，可以申请再审"}, {"letter": "C", "content": "当事人对已经发生法律效力的解除婚姻关系的判决，不电量热电影"}, {"letter": "D", "content": "当事人申请再审的，应当停止判决、裁定的执行"}], "answer": "ACD"}, {"id": 284, "question": "郑某与王某因专利权属纠纷诉至北京知识产权法院。北京知识产权法院作出的一审判决发生法律效力后，郑某认为一审判决适用法律错误，欲申请再审。根据民事诉讼法及相关规定，下列说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "郑某可以向北京知识产权法院申请再审"}, {"letter": "B", "content": "郑某可以向北京知识产权法院的上一级法院申请再审"}, {"letter": "C", "content": "郑某申请再审的，应当在一审判决发生法律效力后六个月内提出"}, {"letter": "D", "content": "郑某申请再审的，人民法院应当裁定停止原判决的执行"}], "answer": "D"}, {"id": 285, "question": "根据民事诉讼法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "上级人民检察院对下级人民法院已经发生法律效力的判决，发现适用法律确有错误的，可以向下级人民法院提出检察建议，并报上级人民检察院备案"}, {"letter": "B", "content": "上级人民检察院对下级人民法院已经发生法律效力的判决，发现适用法律确有错误的，应当提出抗诉"}, {"letter": "C", "content": "地方各级人民检察院对同级人民法院已经发生法律效力的判决，发现适用法律确有错误的，可以向同级人民法院提出检察建议，并报上级人民检察院备案"}, {"letter": "D", "content": "地方各级人民检察院对同级人民法院已经发生法律效力的判决，发现适用法律确有错误的，应当提出抗诉"}], "answer": "C"}, {"id": 286, "question": "张某起诉王某违约并要求继续履行合同、支付迟延履行违约金，经县市两级人民法院审理均胜诉。王某以生效的二审判决适用法律错误为由申请再审。根据民事诉讼法及相关规定，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "省高级人民法院按照审判监督程序提审的，按照第二审程序审理"}, {"letter": "B", "content": "省高级人民法院交原审人民法院再审的，原审人民法院应当按照第一审程序审理"}, {"letter": "C", "content": "省高级人民法院决定再审的，裁定中止原判决的执行"}, {"letter": "D", "content": "省高级人民法院驳回再审申请的，王某可以向人民检察院申请抗诉"}], "answer": "ABCD"}, {"id": 287, "question": "某债务纠纷案件已由甲县人民法院一审、乙市中级人民发生法律效力的判决、裁定，发现有本法第法院二审终结，二审判决已发生法律效力。现乙市人民检察院发现该判决确有错误，拟启动审判监督程序。根据民事诉讼法及相关规定，下列说法哪项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "乙市人民检察院应当向甲县人民法院提出抗诉"}, {"letter": "B", "content": "乙市人民检察院应当向乙市中级人民法院提出抗诉"}, {"letter": "C", "content": "乙市人民检察院应当提请上级人民检察院向乙市中级人民法院提出抗诉"}, {"letter": "D", "content": "乙市人民检察院应当提请上级人民检察院向同级人民法院提出抗诉"}], "answer": "ABCD"}, {"id": 288, "question": "周某因合同纠纷起诉，江苏省徐州市的县市两级法院均驳回其诉讼请求。周某申请再审，但被驳回。周某又向检察院申请抗诉，检察院以原审主要证据系伪造为由提出抗诉，法院裁定再审。关于启动再审的表述，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "周某可以向江苏省高院申请再审"}, {"letter": "B", "content": "检察院抗诉后，应当由接受抗诉的法院审查后，作出是否再审的裁定"}, {"letter": "C", "content": "法院应当在裁定再审的同时，裁定撤销原判"}, {"letter": "D", "content": "法院应当在裁定再审的同时，裁定中止执行"}], "answer": "ACD"}, {"id": 289, "question": "根据民事诉讼法及相关规定，下列关于发生法律效力的民事判决执行的说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "发生法律效力的民事判决，应当由被执行的财产所在地基层人民法院执行"}, {"letter": "B", "content": "当事人认为执行行为违反法律规定的，可以向负责执行的人民法院提出书面异议"}, {"letter": "C", "content": "在执行中，双方当事人自行达成的和解协议无效"}, {"letter": "D", "content": "在执行中，被执行人向人民法院提供担保，并经申请执行人同意的，人民法院可以决定暂缓执行及暂缓执行的期限偿甲十五万元，并登报婚礼道。判决生效后，乙交付十五万元，但来儿道，甲申请通制执行。执行中，甲，乙自行达成和解物议，约定名免于赠礼道款，但另付甲五万元。根据民事诉讼法及相美规定，下列关干人民法院做法的说法，哪个是正确的？（单选）"}], "answer": "ABCD"}, {"id": 290, "question": "根据民事诉讼法及相关规定，下列关于执行程序的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "发生法律效力的民事判决，由第一审人民法院或者与第一审人民法院同级的被执行的财产所在地人民法院执行"}, {"letter": "B", "content": "人民法院自收到申请执行书之日起超过6个月未执行的，申请执行人可以向上一级人民法院申请执行"}, {"letter": "C", "content": "双方当事人在执行中自行和解达成协议的，执行员应当将协议内容记人笔录，由双方当事人签名或者盖章"}, {"letter": "D", "content": "据以执行的法律文书被撤销的，人民法院裁定终结执行"}], "answer": "D"}, {"id": 291, "question": "根据民事诉讼法及相关规定，下列关于执行过程中查封、扣押财产的哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "人民法院查封、扣押财产时，被执行人是公民的，应当通知被执行人或者其成年家属到场"}, {"letter": "B", "content": "人民法院查封、扣押财产时，被执行人是法人或其他组织的，应当通知其法定代表人或者主要负责人到场"}, {"letter": "C", "content": "被查封的财产，执行员可以指定被执行人负责保管"}, {"letter": "D", "content": "对被查封、扣押的财产，执行员必须造具清单，由在场人签名或者盖章后，交被执行人一份，被执行人是公民的，也可以交他的成年家属一份"}], "answer": "ABC"}, {"id": 292, "question": "根据民事诉讼法及相关规定，以下哪些情形下，人民法院应当裁定中止执行：", "type": "多选", "options": [{"letter": "A", "content": "申请人表示可以延期执行的"}, {"letter": "B", "content": "据以执行的法律文书被撤销的"}, {"letter": "C", "content": "案外人对执行标的提出确有理由的异议的"}, {"letter": "D", "content": "作为一方当事人的法人终止，尚未确定权利义务承受人的"}], "answer": "BCD"}, {"id": 293, "question": "根据民事诉讼法及相关规定，在执行过程中出现下列哪些情形的，人民法院裁定终结执行？", "type": "多选", "options": [{"letter": "A", "content": "作为被执行人的公民因生活困难无力偿还借款，无收人来源，又丧失劳动能力的"}, {"letter": "B", "content": "追索抚育费案件的权利人死亡的"}, {"letter": "C", "content": "申请人撤销执行申请的"}, {"letter": "D", "content": "据以执行的法律文书被撤销的"}], "answer": "ABCD"}, {"id": 294, "question": "在民事执行中，被执行人朱某申请暂级执行，提出由吴某以自有房屋为其提供担保，申请执行人刘某同意。法院作出暂缓执行裁定，期限为6个月。对于暂缓执行期限届满后朱某仍不履行义务的情形，下列哪一选项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "刘某应起诉吴某，取得执行依据可申请执行吴某的担保房产"}, {"letter": "B", "content": "朱某财产不能清偿全部债务时刘某方能起诉吴某，取得执行依据可申请执行吴某的担保房产"}, {"letter": "C", "content": "朱某财产不能清偿刘某债权时法院方能执行吴某的担保房产"}, {"letter": "D", "content": "刘某可申请法院执行吴某的担保房产"}], "answer": "BD"}, {"id": 295, "question": "外国人黄某在中国没有住所，但在海口有一处房产，其加人外国国籍前住所在南宁。中国公民温某与黄某在长沙签订货物买卖合同，约定交货地点为深圳。后黄某因货源紧张，未按照合同约定交货。如果温某向人民法院起诉，则下列部些地方的人民法院有权管辖？（多造）", "type": "单选", "options": [{"letter": "A", "content": "长沙"}, {"letter": "B", "content": "保圳"}, {"letter": "C", "content": "海日"}, {"letter": "D", "content": "南宁"}], "answer": "AD"}, {"id": 296, "question": "关于涉外民事诉讼程序，下列说法正确的有哪些？", "type": "多选", "options": [{"letter": "A", "content": "外国人在人民法院起诉、应诉，必须委托中华人民共和国的律师"}, {"letter": "B", "content": "对享有外交特权与豁免的外国人提起的民事诉讼，应当依照中华人民共和国有关法律和中华人民共和国缔结或者参加的国际条约的规定办理"}, {"letter": "C", "content": "涉外民事纠纷的当事人书面协议选择人民法院管辖的，可以由人民法院管辖"}, {"letter": "D", "content": "因与在中华人民共和国领域内审查授予的知识产权的有效性有关的纠纷提起的诉讼，由人民法院专属管辖"}], "answer": "C"}, {"id": 297, "question": "关于涉外民事诉讼程序的管辖，下列说法正确的有哪些？多选）", "type": "多选", "options": [{"letter": "A", "content": "因在中华人民共和国领域内履行中外合资经营企业合同、中外合作经营企业合同、中外合作勘探开发自然资源合同发生纠纷提起的诉讼，由人民法院专属管辖"}, {"letter": "B", "content": "因在中华人民共和国领域内设立的法人或者其他组织的设立、解散、清算，以及该法人或者其他组织作出的决议的效力等纠纷提起的诉讼，由人民法院专属管辖"}, {"letter": "C", "content": "涉外民事纠纷的当事人书面协议选择人民法院管辖的，可以由人民法院管辖"}, {"letter": "D", "content": "当事人未提出管辖异议，并应诉答辩或者提出反诉的，视为人民法院有管辖权"}], "answer": "ABC"}, {"id": 298, "question": "根据行政复议法及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "行政复议是解决行政争议的主要渠道"}, {"letter": "B", "content": "行政复议机构应当审查申请行政复议的行政行为所依据的规章是否合法"}, {"letter": "C", "content": "上级行政复议机构对下级行政复议机构的行政复议工作进行指导、监督"}, {"letter": "D", "content": "行政复议机关办理行政复议案件可以进行调解"}], "answer": "CD"}, {"id": 299, "question": "下列哪些是行政复议机关在履行行政复议职责时必须遵循的原则？", "type": "多选", "options": [{"letter": "A", "content": "合理、合法"}, {"letter": "B", "content": "公正、公开"}, {"letter": "C", "content": "公平、公正"}, {"letter": "D", "content": "高效、便民"}], "answer": "ABC"}, {"id": 300, "question": "关于行政复议案件的调解，以下说法正确的有？", "type": "多选", "options": [{"letter": "A", "content": "在行政复议受理过程和审查阶段，均可以进行调解"}, {"letter": "B", "content": "调解限于行政补偿、赔偿及自由裁量案件"}, {"letter": "C", "content": "行政复议案件的调解是行政复议的必经程序"}, {"letter": "D", "content": "行政复议案件的调解应当遵循合法、自愿的原则"}], "answer": "ABCD"}, {"id": 301, "question": "有关行政复议，下列哪项说法是正确的7", "type": "单选", "options": [{"letter": "A", "content": "行政复议只申查具体行政行为是否合法"}, {"letter": "B", "content": "复议机构依法复议后，不得再提起行政诉讼"}, {"letter": "C", "content": "复议机美审理复议案件，可以适用调解"}, {"letter": "D", "content": "公民、法人或其他组织认为行政机关的行政行为侵犯其合法权益，不可以向该行政机关申请复议"}], "answer": "BCD"}, {"id": 302, "question": "根据行政复议法及相关规定，下列哪些情形申请人应当先向行政复议机关申请行政复议，对行政复议决定不服的，可以再依法向人民法院提起行政诉讼？多选）", "type": "多选", "options": [{"letter": "A", "content": "对当场作出的行政处罚决定不服"}, {"letter": "B", "content": "对行政机关作出的侵犯其已经依法取得的自然资源的使用权的决定不服"}, {"letter": "C", "content": "认为行政机关未履行其法定职责"}, {"letter": "D", "content": "对行政机关作出的确认自然资源的使用权的决定不服"}], "answer": "BC"}, {"id": 303, "question": "新锐公司兴建厂房需要一块土地。恰逢甲市政府出让一块土地，新锐公司和好客来公司同时提出申请，市政府拒绝了新锐公司的申请，向好客来公司颁发了国有土地使用权证。此后，丰年村认为政府向好客来公司发放的国有土地使用权证所认定的面积包括了该村的集体土地。下列说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "新锐公司对政府拒绝其申请的行为，应当先申请行政复议才能提起诉讼"}, {"letter": "B", "content": "新锐公司对政府向好客来公司颁发国有土地使用权的行为，应当先申请复议才能提起诉讼"}, {"letter": "C", "content": "丰年村对政府向好客来公司颁发国有土地使用权的行为，应当先申请复议才能提起诉讼"}, {"letter": "D", "content": "集体土地使用权被侵犯的丰年村村民也可以以自已的名义申请行政复议"}], "answer": "D"}, {"id": 304, "question": "根据行政复议法及相关规定，下列哪些情形可以申请行政复议？", "type": "多选", "options": [{"letter": "A", "content": "李某对某行政机关作出的行政强制措施执行决定不服"}, {"letter": "B", "content": "齐某向某行政机关申请行政许可，在法定期限内，行政机关未予答复"}, {"letter": "C", "content": "何某对某行政机关作出的征收征用决定不服"}, {"letter": "D", "content": "孙某对某市场监督管理局就其与货某之间的专利侵权纠纷作出的赔偿调解不服"}], "answer": "ACD"}, {"id": 305, "question": "根据行政复议法及相关规定，下列哪些情形可以申请行政复议？多选）", "type": "多选", "options": [{"letter": "A", "content": "村民李某认为乡政府批准给村民张某的宅基地侵占了其承包的耕地"}, {"letter": "B", "content": "孙某认为市公安局发布的其在高铁上与他人争抢座位的处理决定侵害了其隐私权"}, {"letter": "C", "content": "赵某对劳动行政部门作出的工伤认定结论不服"}, {"letter": "D", "content": "刘某因受到公安机关的刑讯通供而服刑，出狱后要求行政机关给予赔偿，对行政机关作出不予赔偿的决定不服"}], "answer": "ACD"}, {"id": 306, "question": "根据行政复议法及相关规定，下列哪些情形不可以申请行政复议？", "type": "多选", "options": [{"letter": "A", "content": "王某对县政府解除特许经营协议不服"}, {"letter": "B", "content": "公务员李某对其所在的行政机关对其作出的记大过行政处分不服"}, {"letter": "C", "content": "赵某对某行政机关就其与周某之间的民事纠纷作出的调解不服"}, {"letter": "D", "content": "曾某对国家知识产权局《专利审查指南》中有关创造性判断方法相关规定不服"}], "answer": "ABC"}, {"id": 307, "question": "当事人对某省知识产权局的行政行为不服提起行政复议时，可以一并请求行政复议机关对该行政行为所依据的下列哪一文件进行审查？", "type": "单选", "options": [{"letter": "A", "content": "《中华人民共和国专利法实施细则》"}, {"letter": "B", "content": "该省人大常委会制定的《专利保护条例》"}, {"letter": "C", "content": "国家知识产权局制定的《专利行政执法办法》"}, {"letter": "D", "content": "该省知识产权局制定的《关于加强专利保护的规定》"}], "answer": "ACD"}, {"id": 308, "question": "下列当事人提起的复议，哪些属于行政复议受案范围？", "type": "多选", "options": [{"letter": "A", "content": "某造纸厂向市水务局申请发放取水许可证，市水务局作出不予许可决定，该厂不服而申请复议"}, {"letter": "B", "content": "食品药品监管局向申请餐饮服务许可证的李某告知补正申请材料的通知，李某认为通知内容违法而申请复议"}, {"letter": "C", "content": "化肥厂附近居民要求生态环境局提供对该厂排污许可证监督检查记录，遭到拒绝后申请复议大中"}, {"letter": "D", "content": "某国土资源局以建城市绿化带为由撤回向甲公司发放的国有土地使用权证，该公司不服而申请复议分人"}], "answer": "BD"}, {"id": 309, "question": "根据行政复议法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "有权申请行政复议的公民死亡的、其近亲属可以申请行政复议"}, {"letter": "B", "content": "有权申请行政复议的公民为无民事行为能力人的，其法定代理人可以以自己的名义申请行政复议"}, {"letter": "C", "content": "有权申请行政复议的公民为限制民事行为能力人的，其法定代理人可以代为申请行政复议"}, {"letter": "D", "content": "有权申请行政复议的法人或者其他组织终止的，其权利义务承受人可以申请行政复议"}], "answer": "AC"}, {"id": 310, "question": "根据行政复议法及相关规定，下列关于复议申请人的说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "合伙企业申请行政复议的，应当以核准登记的企业为申请人"}, {"letter": "B", "content": "合伙企业以外的其他合伙组织申请行政复议的，由其合伙人共同申请行政复议"}, {"letter": "C", "content": "股份制企业的股东会认为某行政机关作出的具体行政行为侵犯该企业合法权益的，可以以该企业的名义申请行政复议"}, {"letter": "D", "content": "股份制企业的董事会认为行政机关作出的行政行为侵犯企业合法权益的，可以以董事会的名义申请行政复议"}], "answer": "ABCD"}, {"id": 311, "question": "关于行政复议代表人的行为效力，以下哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "代表人参加行政复议的所有行为对其代表的申请人均发生效力"}, {"letter": "B", "content": "代表人变更行政复议请求应当经被代表的申请人同意"}, {"letter": "C", "content": "代表人承认第三人请求应当经被代表的申请人同意"}, {"letter": "D", "content": "代表人承认被申请人提出证据的真实性应当经被代表的申请人同意"}], "answer": "ABC"}, {"id": 312, "question": "根据行政复议法及相关规定，下列关于行政复议被申请人的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "两个以上行政机关以共同的名义作出同一行政行为的，其中任何一个行政机关可以单独作为被申请人"}, {"letter": "B", "content": "法律、法规、规章授权的组织作出行政行为的，该组织是被申请人"}, {"letter": "C", "content": "行政机关委托的组织作出行政行为的，被委托的组织是被申请人"}, {"letter": "D", "content": "作出行政行为的行政机关被撤销或者职权变更的，继续行使其职权的行政机关是被申请人"}], "answer": "B"}, {"id": 313, "question": "对于复议申请人委托代理人参加复议的，以下哪些文件应当提交至行政复议机构？", "type": "多选", "options": [{"letter": "A", "content": "载明委托事项、权限和期限的授权委托书"}, {"letter": "B", "content": "委托人身份证明文件"}, {"letter": "C", "content": "变更代理人权限的书面文件"}, {"letter": "D", "content": "被委托人身份证明文件"}], "answer": "AC"}, {"id": 314, "question": "根据行政复议法及相关规定，有关行政复议第三人，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "行政复议机构可以通知第三人参加复议程序"}, {"letter": "B", "content": "第三人可以向行政复议机构申请参加行政复议"}, {"letter": "C", "content": "第三人同申请行政复议的具体行政行为应当有利害关系"}, {"letter": "D", "content": "第三人不参加行政复议会影响复议案件的申请"}], "answer": "D"}, {"id": 315, "question": "根据某地级市人民政府关于保护水域生态环境、打击涉渔违法行为的部署安排，某县农业农村局和该县森林公安局对某水库开展联合执法巡查。在巡查过程中，两部门以共同名义对李某非法捕鱼的设备进行了收缴。李某不服，拟申请行政复议。根据行政复议法及相关规定，李某应当向下列哪个机关申请行政复议？", "type": "单选", "options": [{"letter": "A", "content": "该市人民政府"}, {"letter": "B", "content": "该县人民政府"}, {"letter": "C", "content": "该市农业农村局"}, {"letter": "D", "content": "该市森林公安局"}], "answer": "B"}, {"id": 316, "question": "张某对某市辖区教育局作出的一项行政行为不服，欲申请行政复议。根据行政复议法及相关规定，下列哪项说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "张某可向该区教育局申请行政复议"}, {"letter": "B", "content": "张某可向该区政府申请行政复议"}, {"letter": "C", "content": "张某可向该市教育局申请行政复议"}, {"letter": "D", "content": "张某可向该市政府申请行政复议"}], "answer": "ABCD"}, {"id": 317, "question": "对本级人民政府设立的派出机关作出的行政行为不服的，应当向下列哪个机关申请行政复议？", "type": "单选", "options": [{"letter": "A", "content": "本级人民政府"}, {"letter": "B", "content": "本级人民政府的上一级政府"}, {"letter": "C", "content": "作出该行政行为的派出机关"}, {"letter": "D", "content": "人民法院"}], "answer": "BC"}, {"id": 318, "question": "张某不服河北省人民政府作出的征收征用补偿决定，可以通过下列哪些途径寻求救济？多选）", "type": "多选", "options": [{"letter": "A", "content": "直接向人民法院提起行政诉讼"}, {"letter": "B", "content": "直接向国务院申请裁决"}, {"letter": "C", "content": "向该省人民政府提出行政复议申请"}, {"letter": "D", "content": "向国务院提出行政复议申请"}], "answer": "AC"}, {"id": 319, "question": "对省级人民政府的复议决定不服的，下列哪项说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "只能向人民法院提起诉讼"}, {"letter": "B", "content": "先向国务院申请裁决，如果仍然不服的，向人民法院提起诉讼"}, {"letter": "C", "content": "只能向国务院申请作出最终裁决"}, {"letter": "D", "content": "向人民法院提起行政诉讼或者申请国务院作出

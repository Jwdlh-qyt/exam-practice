  {id: 667, topic: "专题二十六 专利纠纷司法程序", type: "single", question: "关于侵犯专利权的诉讼时效，下列说法正确的有：", options: {"A": "侵犯专利权的诉讼时效自专利权人或者利害关系人得知或者应当得知侵权行为之日起计算", "B": "侵犯专利权的诉讼时效为2年", "C": "侵犯专利权的诉讼时效为3年", "D": "侵犯专利权的诉讼时效自专利权人或者利害关系人知道或者应当知道侵权行为以及侵权人之日起计算"}, answer: "B", explanation: "根据PCT实施细则第46.1条的规定， PCT第19条的期限应为自国际检索单位将国际检 索报告传送给国际局和申请人之日起2个月，或者 自优先权日起16个月，以后到期者为准。本题中， 国际检索报告传送日为2023年7月17日，2个月期 满为2023年9月17日，优先权日为2022年4月11 日，16个月期满为2023年8月11日，以后到期者为 准，因此B选项正确。（2017)"},
  {id: 668, topic: "专题二十六 专利纠纷司法程序", type: "multiple", question: "甲公司研发了某化学创新药，相关专利申请已被授予专利权。乙公司针对该化学创新药开发了仿制药，向国家药品监督管理局提出了仿制药上市许可申请。其后，甲公司向国家知识产权局请求行政裁决。关于药品专利纠纷早期解决机制、下列说法正确的有：", options: {"A": "如果乙公司提出仿制药上市许可申请时作出了四类专利声明，甲公司可以就仿制药技术方案是否落人其保护范围向人民法院提起诉讼", "B": "甲公司对四类专利声明有异议，拟向国家知识产权局请求行政裁决的，仅限于仿制药的技术方案是否落人其专利权保护范围提出", "C": "甲公司对四类专利声明有异议，拟向国家知识产权局请求行政裁决的，应当在药物监督管理部门公开该药品上市许可申请之日起45日内提出", "D": "甲公司相关专利没有在中国上市药品专利信息登记平台登记的，不能对仿制药采取药品专利纠纷早期解决机制"}, answer: "ACD", explanation: "A、B选项，根据PCT第19条的规 定，申请人在收到国际检索报告后，有权在规定的 期限内对国际申请的权利要求向国际局提出修 改；根据PCT实施细则第46.1条的规定，PCT第19 条的期限应为自国际检索单位将国际检索报告传 送给国际局和申请人之日起2个月，或者自优先权 日起16个月，以后到期者为准。因此A选项正确； B选项修改提出时间不对，且不能修改说明书和附 图，因此B选项错误。C、D选项，根据PCT第34条 的规定，申请人在国际初步审查报告作出之前，申 请人有权依规定的方式，在规定的期限内修改权 利要求书、说明书和附图；根据PCT实施细则第66 专利合作条约及其他与专利相关的国际条约 条的规定，申请人可以根据PCT第34条在提交国 际初步审查要求书时提出修改，也可以在国际初 步审查报告作出之前提出修改，因此C、D选项正 确。（2019)"},
  {id: 669, topic: "专题二十六 专利纠纷司法程序", type: "multiple", question: "甲制药公司就一项药品的制备方法及新用途分别获得了中国发明专利授权，并取得了药品上市许可。乙制药公司开发了仿制药，也向药品监督管理局提出上市许可申请。就该药品在中国上市药品专利信息登记平台登记及专利纠纷，下列说法正确的有：", options: {"A": "甲制药公司应当在获得药品注册证书的30日内自行登记药品及专利的相关信息，如未进行登记，乙制药公司获得上市许可并制造销售仿制药品后，甲制药公司不能再就专利纠纷提起诉讼", "B": "甲制药公司的两项专利中只有药品的新用途专利可以在中国上市药品专利信息平台上进行登记，制备方法不能进行登记", "C": "乙制药公司在仿制药申请被受理后10个工作日内，应当将药品专利声明及声明依据通知甲制药公司", "D": "甲制药公司对乙制药公司作出的四类声明有异议，可以自收到仿制药上市许可申请声明的45日内，向人民法院提起诉讼"}, answer: "BC", explanation: "A、D选项，根据PCT第19条的规定， 申请人在收到国际检索报告后，有权享受一次机 会，在规定的期限内对国际申请的权利要求向国 际局提出修改。PCT第19条修改仅限于权利要 求，因此A、D选项错误。B、C选项，根据PCT第34 条的规定，申请人在国际初步审查报告作出之前， 申请人有权依规定的方式，在规定的期限内修改 权利要求书、说明书和附图；根据PCT实施细则第 66条的规定，申请人可以根据PCT第34条在提交 国际初步审查要求书时提出修改、也可以在国际 初步审查报告作出之前提出修改，因此B、C选项 正确。（新编）"},
  {id: 670, topic: "专题二十六 专利纠纷司法程序", type: "multiple", question: "甲公司就一项原研药获得发明专利授权，乙公司对该化学创新药开发了仿制药，向国家药品监督管理局提出仿制药上市许可申请。乙公司认为相关专利权应当被宣告无效，并提出了无效宣告请求，关于仿制药上市许可以下说法正确的有：", options: {"A": "由于乙公司提出了无效宣告请求，国家药品监督管理局应当对其仿制药注册申请设置9个月的等待期", "B": "如果甲公司的专利被宣告无效，乙公司的仿制药是首个获得上市许可的药品，其他同品种的仿制药上市许可将不会再获得上市许可", "C": "如果甲公司的专利被宣告无效，乙公司的仿制药是首个获得上市许可的药品，其他同品种的仿制药将在其获得上市许可日起12个月内不会获得许可", "D": "如果甲公司的专利被宣告无效，乙公司的仿制药是首个获得上市许可的药品，其他同品种的仿制药将在其无效之日起-240 -12月内不会获得许可"}, answer: "BCD", explanation: "，A选项，根据PCT实施细则第48.3 条的规定，如果国际审请是用中文提出的、该宇请 应以其提出时使用的语言公布，A选项错误。B、C 选项，根据PCT第21条的规定，在申请人没有提出 请求的情况下，国际局在该申请的优先权日起满 18个月后迅速予以办理；如果国际申请在其公司 的技术准备完成以前被回或被认为效回，即不 进行国际公布，因此B、C选项正确。D选项、根据 PCT实施细则第48.2条的规定，国际检索报告在国 际公布的技术准备工作完成前已作出的，国际检 索报告将随申请文件一起进行国际公布，D选项正 确。（2014) 18、ACD。A选项，《巴黎公约》和（专利合作 条约》是向国外提出专利申请的两种途径，A选项 正确。B选项，国际初步审查是申请人可以选择的 程序，不是必经程序，B选项错误。C选项，根据 《审查指南》第三部分臀二章第5.1节的规定，国际 申请的国际初步审查是根据专利合作条约第33条 (1)的规定对请求保护的发明看起来是否有新颖 性、是否有创造性（非显而易见性）和是否有工童 实用性提出初步的无约束力的意见。D选项，《审 查指南》第三部分第二章第5.2节规定：“进入国家 阶段的国际申请属于专利法第5条或专利法第25 条规定不授予专利权的发明创造（例如赌博工具、 原子核变换方法）的，即使其申请主题不属于专利 合作条约实施细则第39条规定所排除的内容，也 不能被授予专利权”，因此D选项正确。（2017）"},
  {id: 671, topic: "专题二十六 专利纠纷司法程序", type: "multiple", question: "关于药品专利链接制度，以下说法正确的有：", options: {"A": "获得药品专利的专利权人应当在专利获得授权的30日内在中国上市药品专利信息登记平台上登记", "B": "可以在中国上市药品专利信息登记平台上登记的药品专利包括含活性成分的药物组合物专利、中药组合物专利、中药提取物专利、化学药中间体专利等", "C": "专利权人或者利害关系人对四类声明未提出异议的，药品上市许可申请人可以向人民法院起诉或者向国家知识产权局申请行政裁决产权法院管辖专利争议行政程序", "D": ""}, answer: "BC", explanation: "A选项，根据《细则》第119条的规 定，已确定国际申请日并指定中国的国际申请，其 国际申请日视为中国专利的申请日，因此A选项错 误。B选项，根据《细则》第120条的规定，国际申 请的申请人应当在优先权日起30个月内，办理进 入中国国家阶段的手续；在缴纳宽限费后，可以在 自优先权日起32个月内办理进入中国国家阶段的 手续。因此申请人应在2024年1月6日至2024年 3月5日之间向国家知识产权局办理进入国家阶段 手续的，需要缴纳宽限费，B选项正确。C选项，根 据《细则》第127条第2款的规定，申请人应当自进 入日起2个月内缴纳优先权要求费，因此C选项正 确。D选项，根据《细则》第123条的规定，申请人 要求以国际阶段经修改的申请文件为基础进行审 查的，应当自进入日起2个月内提交修改部分的中 文译文，因此D选项正确。（2011)"},
  {id: 672, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "广州市的甲公司发现天津市的乙公司未经其许可在重庆市销售涉嫌侵犯其专利权的产品。甲公司可以请求哪些知识产权局处理？", options: {"A": "天津市知识产权局", "B": "重庆市知识产权局", "C": "广州市知识产权局", "D": "广东省知识产权局"}, answer: "AC", explanation: "A选项，根据《审查指南》第三部分第 一章第2.2.2节的规定，如果申请人由于不可抗拒 的事由耽误进入国家阶段的期限，可以请求恢复 权利，如果由于正当理由耽误进入国家阶段的期 限，不可以请求恢复权利，因此A选项正确。B、D 选项，根据《审查指南》第三部分第一章第3.1.2节 的规定，办理进入国家阶段手续时，应当选择要求 获得的是“发明专利”或者“实用新型专利”，两者 新型专利”，选择后不能修改要求保护的类型，因 此B、D选项错误。C选项，申请人在缴纳宽限费 专利合作条约及其他与专利相关的国际条约 后，可以在自优先权出起32个月内力理进入中国 国家阶段的手续。本题中，国际申请优失权日为 2021年6月1日.32个月期满日分2024年2月1 日，因此C选项正确。（折编）"},
  {id: 673, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "对于专利权属纠纷调解案件，应由下列哪个管理专利工作的部门管辖？", options: {"A": "请求人住所地", "B": "被请求人住所地", "C": "专利产品制造地", "D": "专利产品销售地"}, answer: "CD", explanation: "，A选项，根据PCT募结结则第49.3条 (a)的规定，如果国标审普是用英语提出所，诗单 请应以其提出对使用的谱重公每，可化A选项等 误。B、C选项，（审查市》第三部分第一留6.1 亏规定：“专利局对进人国家阶及指国申请进行 初步审查，认为合格之后，自当及时进行国家小布 的准备工作”，因此B选项错误。银《规则》等 132条第1款的规定，国际申请以甲光其外指文掌 提出的，应当公布申请文的中文语文，器C选 项正确。D选项，国际局是以类文进行公布待， 法在中国获得临时保护，只能在进入剪中国国家 阶段之后、自国务院专测插政部门公带之日起，申 请人可以要求实施其发明的单位或者个人支付通 当的费用，因此D选项正确，（2011炭绘）"},
  {id: 674, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "以下有关管理专利工作的部门管辖的说法正确的是：", options: {"A": "某香港公司认为深圳市民甲侵犯其专利权，可以请求深圳市市场监督管理局进行处理", "B": "侵权行为地涉及宁波市、温州市，并造成重大影响的专利纠纷行政裁决和调解案件，可以由浙江省市场监督管理局处理", "C": "北京市知识产权局受理的专利纠纷案件可以指定北京市朝阳区市场监督管理局管辖", "D": "某专利纠纷案件被告住所地位于北京市朝阳区，北京市朝阳区市场监督管理局可以受理该案件"}, answer: "AB", explanation: "，《细则》第121条第1股：“申请人 依照本担则第103条的规足办理进入年国园家阶 段的手续的，应当符合下列要求：…（三）国际学 通以外文提出的、提交原始国际申请的说明书所 权利要求书的守文译文……（目）国际申请中 未写明文明人匆，在上这声明中写明明人的拾 名；（六）在国际阶段同国际两已交理事齿人更见 手续的，必要时提供究更后的手请（享有平食报 的证明材料.……”，因此A、B选项正确。（选项，爱 据2023年专利运买焉级剧的修订，无短不需要平 请人提变变更旨的乎请人享页丰动的证明 料。D选项，根据2023年专利法实施细题的疆订、 国际申诵以中文提出的，只需要提交（进入中国国 家阶段声明》而不需要提交其他文件，D选项错误。 （新） 23、ABC。A选项，《经则》第136条规定：国 际申请涉及的发明创造依赖遗传资源完成的，申 请人应当在国际申请进入中国国家阶段的书面声 明中予以说明，并填写国务院专利行政部门制定 的表格”，即遗传资源来源披露登记表，因此A选项 正确。B选项，依赖遗传资源完成的发明创造，申 请人无法说明原始来源的，应当陈述理由，B选项 正确。C选项，违反获得遗传资源属于驳回理由，C 选项正确。D选项，遗传资源来源填写不符合规定 的，审查员应当发出补正通知书，补正后仍不合 格，才被驳回，D选项错误。（2011)"},
  {id: 675, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "以下有关于专利部门处理专利纠纷案件的说法正确的是：", options: {"A": "当事人可以在提交答辩书期间提出管辖权异议", "B": "管理专利工作的部门发现专利纠纷案件不属于该部门管辖的，不予立案", "C": "管理专利工作的部门立案后发现对该案没有管辖权的，应作撤案处理", "D": "管理专利工作的部门立案后发现对该案没有管辖权的，应将案件移送至有管辖权的管理专利工作的部门处理"}, answer: "CD", explanation: "A、D选项，已确定国际申请日并指 定中国的国际申请，视为向国务院专利行政部门 提出的专利申请，该国际申请日视为中国专利的 申请日，专利保护期应从国际申请日起算，因此A 选项错误，D选项正确。B选项，PCT国际申请不涉 及外观设计，B选项错误。C选项，根据《审查指 南》第三部分第一章第5.2.1节的规定，进入国家阶 段不允许提出新的优先权要求，C选项正确。 (2015)"},
  {id: 676, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "甲公司拥有一项药品的专利权，现发现印度乙公司在印度仿制生产该药品，并通过上海海关进口到中国，现由上海海关查扣，甲公司欲行使权利，应当由哪个部门处理？", options: {"A": "商务部", "B": "上海市知识产权局", "C": "国家知识产权局", "D": "上海市海关"}, answer: "BCD", explanation: "A选项，从修改时间上看，选项内 容涉及根据PCT第19条的修改，在这个时间内只 能修改权利要求书，不能修改说明书和附图，因此 A选项错误。B、C选项，根据PCT第34条的规定， 申请人在国际初步审查报告作出之前，申请人有 权依规定的方式，在规定的期限内修改权利要求 书、说明书和附图；根据PCT实施细则第66条的规 定，申请人可以根据PCT第34条在提交国际初步 审查要求书时提出修改，也可以在国际初步审查 报告作出之前提出修改，因此B、C选项正确。D选 项，《审查指南》第三部分第一章第5.7节规定：“当 国际申请进入国家阶段时，申请人明确要求以按 照专利合作条约第28条或第41条作出的修改为 审查基础的，可以在提交原始申请译文的同时提 交修改文件”，因此D选项正确。（2018）"},
  {id: 677, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "下列哪些属于管理专利工作的部门应当依申请或者依职权中止案件处理的情形：", options: {"A": "已对涉案实用新型、外观设计专利权申请宣告无效", "B": "专利权评价报告未发现实用新型或者外观设计专利权存在不符合授予专利权条件的缺陷", "C": "该案必须以另一案的审理结果为依据，而另一案尚未审结", "D": "被请求人撤回无效宣告请求后，管理专利工作部门恢复审理，又再次提出无效宣告请求"}, answer: "ABD", explanation: "根据PCT第25条的规定，如果受理 局拒绝给予国际申请日，或者宣布国际申请已被 专利合作条约及其他与专利相关的国际条约 视为撤回，或者如果国际局在规定的期限内没有 收到登记本，国际申请被视为撤回，国际局应该根 据申请人的请求，立即将档案中任何文件的副本 送交申请人指明的任何指定局进行复查，因此A、 B、D选项正确，C选项不属于请求复查的情形。 (2017) 27。AB。A选项，PCT实施细则第13之二.3条 规定：“对保藏的生物材料的记载应说明下列事 项：(i)进行保藏的保戴单位的名称和地址；(ii)在 该单位保藏生物材料的日期；(iii)该单位对保物 给予的入藏号”，因此A选项正确。B选项，《细则》 第125条第1款规定“….申请人应当在进入中 国国家阶段声明中指明记载生物材料样品保藏事 项的文件以及在该文件中的具体记载位置”，因此 B选项正确。C、D选项，对于补正未提交的，应当 视为生物材料样品未保藏，而不是视为撤回，因此 C、D选项错误。(2017)"},
  {id: 678, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "以下有关管理专利工作的部门处理专利侵权纠纷行政裁决案件的结案形式说法正确的有：", options: {"A": "经审理认为专利侵权行为成立，应当向当事人发出行政裁决书", "B": "请求人撤回请求，应当发出撤销专利侵权纠纷案件决定书", "C": "当事人达成调解协议的，能当场执行的，可以直接结案", "D": "经审理认为专利侵权行为不成立，应当向当事人发出撤案决定书"}, answer: "ABD", explanation: "根据《细则》第130条第2款的规 定，要求获得发明专利权的国际申请，发明专利申 请人在提出实质审查请求时以及在收到国务院专 利行政部门发出的发明专利申请进入实质审查阶 段通知书之日起的3个月内，可以对发明专利申请 主动提出修改。此外，《审查指南》第三部分第一 章第5.7节规定：“当国际申请进入国家阶段时，申 请人明确要求以按照专利合作条药第28条或第41 条作出的修改为审查基础的，可以在提交原始申 请译文的同时提交修改文件，该修改视为按照专 利法实施细则第112条的规定主动提出的修改”。 因此A、B、D选项正确，C选项错误。（新编） 29、ABC。A选项，根据《细则》第121条第1 款的规定，国际申请以外文提出的，提交原始国际 申请的说明书、权利要求书和摘要的中文译文；附 图中有文字的，将其替换为对应的中文文字，A选 项正确。B选项，根据《审查指南》第三部分第一章 第3.1.6节的规定，审查基础文本声明中提及国际 阶段的修改的，应当自进入日起2个月内提交该修 改文件的译文，B选项正确。C选项，根据《细则》 第131条的规定，申请人发现中文译文存在错误 的，可以在国务院专利行政部门作好公布发明专 利申请或者公告实用新型专利权的准备工作之 前；或在收到国务院专利行政部门发出的发明专 利申请进入实质审查阶段通知书之日起3个月内 提出译文错误改正，因此C选项正确。D选项，基 于国际申请授予的专利权，由于译文错误导致国 际申请的原文所表达的保护范围和授权时保护范 围不一致，以保护范围小的为准，D选项错误。 (2017)"},
  {id: 679, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "针对下列专利侵权纠纷案件，哪些属于管理专利工作的部门可以撤销的情形：", options: {"A": "立案后发现不符合受理条件", "B": "请求人死亡，没有继承人", "C": "被请求人死亡，没有遗产且无应当承担义务的人", "D": "涉案专利的权利要求书有两项以上权利要求，请求人未明确被侵犯专利权的权利要求项，管理专利工作的部门要求请求人明确，请求人仍不予明确"}, answer: "BCD", explanation: "根据PCT第17条的规定，如果国际 申请不符合发明单一性的要求，该国际检索单位 应要求申请人缴纳附加费。国际检索单位应对国 际申请的权利要求中首先提到的发明（“主要发 明”）部分作出国际检索报告，在规定期限内付清 要求的附加费后，再对国际申请中已经缴纳该项 费用的发明部分作出国际检索报告。因此A选项 错误，B选项正确。C选项，根据PCT实施细则第 40条的规定，申请人在规定期限内缴纳检索附加 费和异议费的，如果异议完全成立，检索附加费和 异议费将被退回，C选项正确。D选项，根据《审查 指南》第三部分第二章第5.5节的规定，对于申请 人因未缴纳单一性恢复费而删除的发明，申请人 不得提出分案申请，D选项正确。（2017)"},
  {id: 680, topic: "专题二十七 专利争议行政程序", type: "single", question: "甲未经专利权人乙许可，使用乙的专利方法生产商品，并通过某电子商务平台进行销售。管理专利工作的部门认定侵权行为成立后，可采取下列哪些措施制止侵权行为？", options: {"A": "责令甲立即停止生产该商品", "B": "责令甲立即停止销售该商品", "C": "责令销毁生产该商品的专用设备", "D": "通知电子商务平台经营者屏蔽相应商品的购买链接"}, answer: "B", explanation: "A选项，根据PCT第17条第3款（a)项 规定，如果国际检索单位认为国际申请不符合细 则中规定的发明单一性的要求，该检索单位应要 求申请人缴纳附加费。国际检索单位应对国际申 请的权利要求中首先提到的发明（“主要发明”）部 分作出国际检索报告；在规定期限内付清要求的 附加费后，；再对国际申请中已经缴纳该项费用的 发明部分作出国际检索报告，A选项说法正确。B 选项，根据PCT第34条、PCT实施细则第66、68条 专利合作条约及其他与专利相关的国际条约 的规定，对由于申请人未在规定期限内缴纳附加 检索费，而导致没有作出国际检索报告的发明的 权利要求不进行国际初步审查，B选项说法错误。 C选项，《细则》第133条第2款规定：“在国际阶段， 国际检索单位或者国际初步审查单位认为国际申 请不符合专利合作条约规定的单一性要求时，申 请人未按照规定缴纳附加费，导致国际申请些 部分未经国际检索或者未经国际初步审查，在进 入中国国家阶段时，申请人要求将所述部分作为 审查基础，国务院专利行政部门认为国际检索单 位或者国际初步审查单位对发明单一性的判断正 确的，应当通知申请人在指定期限内级纳单一性 恢复费……”，C选项说法正确。D选项，根据《审 查指南》第三部分第二章第5.5节的规定、经审查 认定申请人提出的作为审查基础的审请文件中要 求保护的主题不存在缺乏单一性的问题，但是与 国际单位所作出的结论不一致的，则应当对所有 要求保护的主题进行审查，D选项说法正确。 (2018)"},
  {id: 681, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "管理专利工作的部门处理专利侵权纠纷，最迟应当自立案之日起（)内结案：", options: {"A": "3个月", "B": "4个月", "C": "6个月", "D": "8个月"}, answer: "BC", explanation: "根据（审查指南》第三部分第二章第 5.5节的规定，在国际阶段的检索和查中，国际单 位未提出单一性问题，而实际上甲请存在单一性 缺陷的，国家知识产权局应当对该专利申请的单 一性进行审查，对于因未纳单一性依复贵页 除的发明，不得提出分案申请，因此A、D选项错 误，B、C选项正确。(2019)"},
  {id: 682, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "刘某认为王某侵犯其专利权，请求管理专利工作的部门进行处理。2025年5月16日，管理专利工作的部门作出责令王某立即停止侵权行为的决定，王某于2025年5月23日收到该处理通知。如果王某对该处理决定不服，他最迟可以在何时向人民法院起诉？", options: {"A": "2025年5月31日", "B": "2025年6月7日", "C": "2025年8月23日", "D": "2025年3月14日"}, answer: "BC", explanation: "（细则）第135条规定：“基于国际申请 授予的专利权，由于译文错误，致使依照专利法第 64条规定确定的保护范围超出国际申请的原文所 表达的范围的，以依据原文限制后的保护范图为 准；致使保护范围小于国际申请的原文所表达的 范围的，以授权时的保护范围为准”，因此A、D选 项错误，B、C选项正确。（2018） 34、ABCD。A选项属于没有优先权的国际申 请遗漏部分文件、申请人补交遗漏文件应当变更 国际申请日。B选项属于有优先权的国际申请、其 遗漏的文件可以通过援引加入的方式补入，不会 导致国际申请日的变化，因此A、B选项正确。C、D 选项，根据《审查指南》第三部分第一章第5.3节的 规定，在国际阶段以援引加入方式修改了申请文 件，申请人在办理进入国家阶段手续时应当提交 与援引加入相关的在先申请文件副本的中文译 文，进入国家阶段时应当声明，并指明该修改在优 先权文本中的位置以及在国际申请原始文本中的 位置，因此C、D选项正确。（新编）"},
  {id: 683, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "甲公司未经其许可销售乙公司的专利权的产品，乙公司在收到管理专利工作的部门作出的立即停止侵权行为的行政裁决后，始终不停止侵权行为也不起诉，下列有关做法正确的是？", options: {"A": "管理专利工作的部门可以自乙公司履行期限届满之日起3个月内申请人民法院强制执行", "B": "管理专利工作的部门可以自乙公司履行期限届满之日起6个月内申请人民法院强制执行", "C": "若管理专利工作的部门未申请强制执行，甲可以在乙公司履行期限届满之日起3个月内申请人民法院强制执行", "D": "若管理专利工作的部门未申请强制执行，甲可以在乙公司履行期限届满之日起6个月内申请人民法院强制执行"}, answer: "CD", explanation: "A选项，PCT国际申请的专利权期限 应自其国际申请日2023年3月2日起算，A选项错 误。B选项，根据《审查指南》第三部分第一章第 5.2.1节的规定，进入国家阶段不允许提出新的优 先权要求，B选项错误。C选项，《审查指南》第三 部分第一章第5.2.5节规定：“国际申请在进入国家 阶段后，由于下述情形之一导致视为未要求优先 权的，可以根据专利法实施细则第6条的规定请求 恢复要求优先权的权利：（1)申请人在国际阶段没 有提供在先申请的申请号，进入声明中仍未写明 在先申请的申请号……...”，C选项正确。D选项，根 据《审查指南》第三部分第一章第5.2.6节的规定， 在先申请是在中国提出的，要求优先权的国际申 请进入国家阶段，应当看作是要求本国优先权，D 选项正确。（新编）"},
  {id: 684, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "洪某拥有一项中药提取物的制备方法的发明专利权，其主张甲公司侵害该项专利权，并提供了甲公司生产方法的初步证据。下列关于管理专利工作的部门调查取证处理案件的方式正确的有？", options: {"A": "管理专利工作的部门可以从涉嫌依照该方法直接生产的药物中抽取一部分作为样品", "B": "管理专利工作的部门可以要求甲公司提供生产方法的相关资料，甲公司无正当理由拒不提供的，管理专利工作的部门可认可洪某提交的初步证据成立", "C": "管理专利工作的部门可以对甲公司使用的生产相关产品的生产线进行登记保存", "D": "管理专利工作的部门应当向洪某指定不少于30天的举证期限"}, answer: "ACD", explanation: "A、B选项，国际申请的申请日在优 先权期限届满之后2个月内，在国际阶段受理局已 经批准恢复优先权的，视为已经依照细则第36条 的规定提出了恢复优先权请求，因此A选项正确， B选项错误。C、D选项，在国际阶段，申请人未请 求恢复优先权，或者提出了恢复优先权请求但受 理局未批准，申请人有正当理由的，可以自进入日 起2个月内向国务院专利行政部门请求恢复优先 权，因此C、D选项正确。（新编）"},
  {id: 685, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "下列关于重大专利侵权纠纷的说法正确的是？", options: {"A": "对于在全国有重大影响的专利侵权纠纷案件，专利权人或者利害关系人只能请求国务院专利行政部门处理", "B": "省、自治区、直辖市管理专利工作的部门已经受理的重大专利侵权纠纷案件，不能再报请国家知识产权局进行行政裁决", "C": "对于在全国有重大影响的专利侵权纠纷案件，人民法院未就该专利侵权纠纷立案的，可以请求国务院专利行政部门处理", "D": "专利权人或者利害关系人请求国务院专利行政部门处理其重大专利侵权纠纷的，应当提交其案件符合重大专利侵权纠纷情形的证明材料"}, answer: "ABC", explanation: "A选项，《海牙协定》于2022年5月 专利合作条约及其他与专利相关的国际条约 5日在中国生效，A选项正确。B、C、D选项，根据 《关于加入<海牙协定>后相关业务处理暂行办法》 第1条第1-2款的规定，申请人可以直接向国际局 提交工业品外观设计国际注册申请，也可以通过 国家知识产权局转交；通过国家知识产权局转交 工业品外观设计国际注册申请的，应当以符合（海 牙协定》和国家知识产权局规定的纸件形式或电 子形式提交相关材料；《海牙协定》规定的相关费 用，由申请人直接向国际局缴纳，因此B、C选项 正确，D选项错误。（新编）"},
  {id: 686, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "以下哪些属于在全国有重大影响的专利侵权纠纷案件？", options: {"A": "涉及重大公共利益", "B": "对行业发展有重大影响", "C": "跨省、自治区、直辖市区域的重大案件", "D": "专利权人认为可能有重大影响"}, answer: "AC", explanation: "A选项，除申请文件中存在导致申请 日推后的不规范情形外，直接提交给国际局的国 际注册申请，以国际局收到国际注册申请的3期 为申请日，因此A选项正确，B选项、同接提交给 国际局的国际注册申请，如果绪约方局在收到圆 际注册申请之日起一个月内传递至国际局，以须 约方局收到国际注册幸请之日为国际申请的申请 日，因此B选项错误。C选项，根据海牙协定第9条 的规定，国际注册申请中缺少对指定的缔约方说 明的，属于存在会致使国际申请的甲请日推后的 不规范（如未使用规定语言），申请日应为国际局 收到对此种不规范作出更正的日期，因此C选项正 确。D选项，一般情况下，国际注册日即国际申请 日，如果国际注册申请中存在额外内容的不规范 情形（例如缺少权利要求书），国际注勋日应为对 此种不规范情形作出更正的日期，因此D选项说法 过于绝对。（新编）"},
  {id: 687, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "以下有关调解专利纠纷的说法正确的是：", options: {"A": "被请求人提交意见陈述书并同意调解的，管理专利工作的部门可以立案", "B": "被请求人不接受调解，但是其提交了意见陈述书，管理专利工作的部门也可以立案", "C": "请求人无正当理由不参加调解，视为其主动撤回调解请求", "D": "被请求人无正当理由不参加调解，该案件撤销"}, answer: "AC", explanation: "A选项，根据《细则》第137条的规 定，按照海牙协定已确定国际注册日并指定中国 的外观设计国际申请，视为向国务院专利行政部 门提出的外观设计专利申请、该国际注册日视为 中国申请的申请日，因此A选项正确。B选项，根 据《细则》第139条的规定、国际局公布的外观设计 国际申请中包括一项或者多项优先权的，视为已 经依照专利法的规定提出了书面声明，无需再次 声明，因此B选项错误。C选项，根据《细则》第142 条的规定，国际局公布的外观设计国际申请中包 括含设计要点的说明书的，视为已经依照规定提 交了简要说明，因此C选项正确。D选项，根据《细 则》第143条的规定，国务院专利行政部门作出给 予保护的决定后，予以公告，该外观设计专利权自 公告之日起生效，因此D选项错误。（新编）"},
  {id: 688, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "管理专利工作的部门调解专利权权属纠纷，最长结案时间是：", options: {"A": "15天", "B": "30天", "C": "2个月", "D": "3个月"}, answer: "BCD", explanation: "A选项，《专利合作条约》适用于发 明和实用新型，不适用于外观设计，外观设计国际 申请通过海牙协定途径申请，因此A选项错误。B 选项，《布达佩斯条约》涉及的内容是生物保藏有 关要求，根据条约的规定，其范围包括发明和实用 新型，因此B选项正确。C选项，《斯特拉斯堡协 定》即国际专利分类法，适用于发明和实用新型， 因此C选项正确。D选项，《洛迦诺协定》即工业品 外观设计分类法，仅适用于外观设计，因此D选项 正确。（2008年）"},
  {id: 689, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "乙于2023年2月3日提交了一项发明专利申请，该申请于2024年12月17日公布，随后乙对该专利申请进行分案，分案申请于2025年2月1日公布，2025年3月28日专利申请获得授权，2025年4月2日分案申请获得授权。甲公司使用了分案申请的技术，针对乙要求甲公司支付的临时保护期费用应当从哪天起算？", options: {"A": "2023年2月3日", "B": "2024年12月17日", "C": "2025年2月1日", "D": "2025年3月28日"}, answer: "ABC", explanation: "《海牙协定》是适用于工业设计领域 的国际知识产权协定，与《商标国际注册马德里协 定》《专利合作条约》共同构成工业产权领域三大 服务体系，由世界知识产权组织管理，因此A、B、C 选项正确。D选项中《马拉喀什条约》是关于为盲 人、视力障碍者或其他印刷品阅读障碍者获得已 出版作品提供便利的国际条约。（新编）"},
  {id: 690, topic: "专题二十七 专利争议行政程序", type: "single", question: "下列哪些属于假冒专利的行为？", options: {"A": "专利权被宣告无效后继续在产品或者其包装上标注专利标识", "B": "专利权终止前依法在专利产品上标注专利标识，在专利权终止后许诺销售该产品", "C": "在产品说明书等材料中将未被授予专利权的技术称为专利技术", "D": "未经许可在产品包装上标注他人的专利号"}, answer: "B", explanation: "外现设计专利原行本包括：渗 页、彩色外观设计图片或普原片以及简说 明，B选项正确、（2011）"},
  {id: 691, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "甲公司的一件实用新型专利申请于2020年11月20日被授予专利权，该专利权于2024年4月8日终止。下列行为哪些构成假冒专利的行为？", options: {"A": "甲公司在专利权终止后继续销售2024年2月生产并标注了该实用新型专利标识的产品", "B": "乙公司未经甲公司同意，在其生产的类似产品上标注甲公司的专利号", "C": "甲公司在2024年5月3日生产的产品说明书上仍标明该产品是专利产品", "D": "甲公司为了申报高新技术企业，将实用新型专利证书变造成发明专利证书"}, answer: "BC", explanation: "发明专用申请库行本的第页台 普录事项、、恶附图级成，说明书充酶 要 图的，则没有要图，因此D、C选项正确、 (2009) 2616098 (13） 30.03.2023 DataofAPublication CL: R016.29/788(2006.00 1L27M2(2005.01) 3K5/126(2023.01） caimeptsChect US20210038029A1 4166274A1 U&20170294456A1 201703382S2A1 20170162698 A1 dafSasrche CLH01L,HK her.WPLEPQDOC 寸使用）"},
  {id: 692, topic: "专题二十七 专利争议行政程序", type: "single", question: "以下说法正确的是？", options: {"A": "侵犯专利权的，不仅应承担民事责任、还可能被追究刑事责任", "B": "假冒专利的，不仅应承担民事责任、还可能被追究刑事责任", "C": "侵犯专利权的，应承担民事责任、但不涉及刑事责任", "D": "假冒专利的，应承担民事责任、但不涉及刑事责任"}, answer: "A", explanation: "从图1所示的著录项目信息可 以看出，（12)UKPatentApplication以及 （19)GB显示出这是一件英国专利文献，A 选项正确。(2004)"},
  {id: 693, topic: "专题二十七 专利争议行政程序", type: "single", question: "甲公司拥有一项产品发明专利权，乙公司未经甲公司许可制造了该专利产品，并在产品上标注了甲公司的专利号；丙公司从乙公司处采购该产品并对外销售。下列哪些说法是正确的？", options: {"A": "乙公司和丙公司的行为构成了假冒专利行为", "B": "乙公司和丙公司的行为构成了专利侵权行为", "C": "专利执法部门查封、扣押乙公司和丙公司产品的，应当经人民法院批准", "D": "丙公司若能证明其不知道所销售产品为侵权产品，并且是通过合法途径、以合理价格采购了该产品，则不承担赔偿责任，但应停止销售"}, answer: "C", explanation: "代码（13）后面的字母表明文 种类，文献种类代码为“A”代表发明专利申 请单行本，即申请公开文献。从“UKPal entApplication”中也可看出这是一份申请 公开文献，因此C选项正确。（2004）"},
  {id: 694, topic: "专题二十七 专利争议行政程序", type: "single", question: "以下关于专利侵权行为与假冒专利行为的说法正确的是：", options: {"A": "管理专利工作的部门对于专利侵权纠纷进行处理的行为属于行政裁决", "B": "查处假冒专利行为是专利执法的部门依职权进行的单方面具体行政行为", "C": "对于假冒专利行为，任何人都可以举报", "D": "对于专利侵权行为，只有专利权人或利害关系人才能提出行政裁决请求"}, answer: "D", explanation: "代码（30)PriorityData表示优 先权信息，其中代码（31)为优先权号（即在 先申请的申请号），代码（32)为优先权申请 日，代码（33）为在先申请国别，因此D选项 正确。（2004) US 6,640,992 B1 ntNo.: ofPatent: Nov.4,2003 A*619.78Korsh.ak...220603 A*6/198.Panic..220/603 A.3994Bouch.r….220603 miner inerJosephM.Moy ABSTRACT aventiondisclosesatoddler\'sdrinkingcup toddler\'sandchildrenhowtodrinkproperly kingmotion.Thethreepieceself-righting Kingcupcomprisingalidwiththreads,a ehavingaledgeencirclingtheoutsideofthe aslitadaptedfordrinkingandanairventing with matching threads,aweightedrubber andtwodiametricallyopposedhandles;and adaptedforsealingthelid tothe cylinder. 20 Claims, 2 Drawing Sheets"},
  {id: 695, topic: "专题二十七 专利争议行政程序", type: "single", question: "李某在其制造的玩具小汽车上标注了某公司的一项汽车外观设计专利的专利号，销售后获利1万元。下列哪些说法是正确的？", options: {"A": "李某的行为构成了假冒他人专利行为", "B": "该公司可以请求国家知识产权局对李某的行为进行处理", "C": "可以处罚李某25万元以下的罚款", "D": "应该没收李某的违法所得，如果构成犯罪的，依法追究刑事责任"}, answer: "A", explanation: "从扉页信息看，该专利的申请人 （76Inventors）是Berger等人，申请日（22 Filed）是2003年2月20日，国际分类号（51 int.CI）是A47G19/22，授权号（10Patent No.）是US6640992B1，因此A选项正确。 (2011)"},
  {id: 696, topic: "专题二十七 专利争议行政程序", type: "single", question: "甲获得了一项产品发明专利。甲与乙签订《专利使用协议》，该协议约定，甲允许乙对该专利产品进一步开发、并在产品中标注甲的专利号。该协议同时约定，“双方在开发的产品正式投产之前再行签订正式详尽的合同”。乙在开发过程中，试制了一批甲的专利产品，并进行研发，研发制得新的产品相对于甲的专利权利要求的范围删除了一些不必要的部件、增加了一些具有实质性区别的新的功能部件，相对于原专利产品实现了明显的技术效果改进。但乙未申请该新产品的专利。随后，乙在未与甲进一步签订正式详尽合同的情况下批量制造其研发的新产品、并向市场销售该新产品，所销售新产品上标注有甲的专利号。则以下说法正确的是：", options: {"A": "因为乙与甲没有按照协议约定签订正式详尽的合同，所以乙在产品开发中制造、使用甲的专利产品的行为属于侵犯甲的专利权的行为", "B": "即便乙与甲没有按照协议约定签订正式详尽的合同，乙在产品开发中制造、使用甲的专利产品的行为也不属于侵犯甲的专利权的行为", "C": "乙在所销售新产品上标注甲的专利号的行为构成假冒专利的行为", "D": "乙与甲签订的《专利使用协议》中明确约定“乙可以在产品中标注甲的专利号”，因此乙在所销售新产品上标注甲的专利号的行为不构成假冒专利的行为"}, answer: "B", explanation: "本题考查专利文献 中国别代码.B选项中英国的 准代码。 代码应为CB.B选项存在错误。 (2012)"},
  {id: 697, topic: "专题二十七 专利争议行政程序", type: "single", question: "以下哪个情形可以申请行政复议？", options: {"A": "专利申请人对驳回专利申请决定不服的", "B": "复审请求人对复审请求不予受理通知书不服的", "C": "复审请求人对复审请求审查决定不服的", "D": "集成电路布图设计登记申请人对驳回登记申请的决定不服的"}, answer: "D", explanation: "同族专利指拥有至 少一个相同优先权，在不同富 家或国际专利组织申请的一组 专利文，因此D选项正确， （新编） 次公布或"},
  {id: 698, topic: "专题二十七 专利争议行政程序", type: "single", question: "对下列哪些情形，当事人可以向国家知识产权局申请行政复议？", options: {"A": "专利申请人对不予受理其申请不服的", "B": "专利权人对专利权终止不服的", "C": "专利代理机构对停止承接新业务的处罚不服的", "D": "专利申请人对驳回其申请的决定不服的"}, answer: "C", explanation: "专审请号中第5 专利的共 位为申请种类号，用1位数字 表示、所使用数字的含义规定 如下：1表示发明专月申请；2 表示实用新型专利申请：3表示 外限设计专利申请：8表示进入 中国国家段的PCT发明专利 申请；9表示进入中国国家阶段 的PCT实用新型专利申请、因 请的申请 昆C选项正确。(2011)"},
  {id: 699, topic: "专题二十七 专利争议行政程序", type: "multiple", question: "对下列哪些情形，当事人可以向国家知识产权局申请行政复议？", options: {"A": "对专利复审或者无效的程序性决定不服的", "B": "对给予专利权期限补偿的决定不服的", "C": "对专利开放许可实施期间是否予以年费减缴的决定不服的", "D": "对予以公告专利开放许可声明的决定不服的专利许可"}, answer: "ABC", explanation: "，根据《专利申请 号标准》（ZC0006-2003），专利 申请号中第5位为申请种类 号、局1位数字表示、暂使用数 字的含义规定如下：I表示定明 专利申请；2表示买用影型专利 甲诵：3表示限设计专付事 请号中申 请：表云进入宁国国家兵民的 PCT发游专利率请；9表示进入 中国国家阶段的PCT实用新型 专利申请，此A、B、C选项正 确、D选项错误。（2015）"},
  {id: 700, topic: "专题二十八 专利许可", type: "multiple", question: "下列关于专利推广应用的说法正确的是？", options: {"A": "实用新型专利可以被推广应用", "B": "只有国有企事业单位的发明专利才能被推广应用", "C": "国内专利权人的专利都可以被推广应用", "D": "推广应用后，实施单位需要向人民政府支付使用费"}, answer: "ABCD", explanation: "国家如识产 权局在受理专科审谢时给予专 利审请号和校验位。A造项中 餐5位为3.表示外避设计专利 定中国的：申读；B选项中第5位为6、表示 指定中国的外观设计国际注册 申请；C选项中第5位为8，表示 进入中国国家阶段的PCT发明 位 专利申请，因此A、B、C、D选项 都正确。(新编） 号可以"},
  {id: 701, topic: "专题二十八 专利许可", type: "multiple", question: "下列哪些情形属于专利运用？", options: {"A": "公司C以独占许可的方式许可公司D实施其专利", "B": "公司E以一项发明专利权作价出资人股公司F", "C": "公司G把一项发明专利权质押给银行H获得贷款", "D": "公司A向公司B转让一项发明专利权"}, answer: "AD", explanation: "本题考察的是专 利文献号与中国国家代码CN、 专利文献种类标识代码的联合 使用的编码规则。“CN”是中国 国家代码，“A”是发明申请公布 的专利文献种类标识代码，中 间9位数字“100378905”是专 利文献号，其中首位数字1表 是正确 示该专利为发明专利申请，因 此A、D选项正确。(2015)"},
  {id: 702, topic: "专题二十八 专利许可", type: "single", question: "甲拥有一项产品发明专利权，为了扩大产能，甲欲行生产的同时许可乙公司生产该专利产品。下列说法哪些确的？", options: {"A": "甲可以将该专利权独占许可给乙", "B": "甲可以将该专利权排他许可给乙", "C": "甲可以将该专利权普通许可给乙", "D": "甲与乙订立实施许可合同的，应当向国家知识产权案，未经备案不生效"}, answer: "D", explanation: "专利文献号最后 一位大写字母是专利文献种类 标识代码，其含义为：A发明专 分无效 利申请公布、B发明专利授权 公告、C宣告发明专利权部分 无效的公告、U实用新型专利 吴的是？ 授权公告、Y宣告实用新型专 利权部分无效的公告、S外观设 计专利授权公告或宣告专利权 部分无效的公告，因此D选项 正确，A、B、C选项错误。（2016)"},
  {id: 703, topic: "专题二十八 专利许可", type: "single", question: "甲公司就一项14纳米芯片的封装技术申请并获得明专利授权，乙公司在甲公司专利的基础上又进行了改进，得了发明专利授权，该发明专利的实施有赖于甲公司的发利，下列说法正确的有：", options: {"A": "甲公司可以不经乙公司的同意而实施其发明专利~251-", "B": "乙公司可以不经甲公司的同意而实施其发明专利", "C": "甲、乙公司可以通过交叉许可实施乙公司的发明专利", "D": "甲公司获得乙公司的实施许可后，可以让其子公司实施该发明专利"}, answer: "D", explanation: "专利文献号最后 一位大写字母是专利文献种类 标识代码，其含义为：A发明专 类名，请 利申请公布、B发明专利授权 公告、C宣告发明专利权部分 无效的公告、U实用新型专利 授权公告、Y宣告实用新型专 利权部分无效的公告、S外观设 计专利授权公告或宣告专利权 部分无效的公告，因此A、B、C 说法哪些 选项说法正确，D选项说法错 误。(2019)"},
  {id: 704, topic: "专题二十八 专利许可", type: "multiple", question: "下列关于开放许可的说法正确的是？", options: {"A": "专利权人提出开放许可声明时，只能以纸质书面形式提交", "B": "实用新型和外观设计的专利权人在提出开放许可声明时，需要提供专利权评价报告", "C": "任何单位或者个人有意愿实施开放许可的专利的，可以通知专利权人，并与专利权人进一步协商许可使用费的支付方式和标准", "D": "当事人就实施开放许可发生纠纷的，可以由国务院专利行政部门进行调解，也可以向人民法院起诉"}, answer: "ABD", explanation: "A选项中G部 应为物理，错误；B选项中E部 应为固定建筑物，错误；D选项 中H部应为电学，错误，因此 A、B、D选项当选。(2016)"},
  {id: 705, topic: "专题二十八 专利许可", type: "multiple", question: "下列关于开放许可的说法错误的是？", options: {"A": "专利权人一旦向国务院专利行政部门声明愿意许可任何单位或者个人实施其专利，则不能再将其开放许可声明撤回", "B": "专利权人撤回开放许可的，在先给予的开放许可也随之终止", "C": "实行开放许可的专利权人可以与被许可人就许可使用费进行协商后给予普通许可、独占许可或排他许可", "D": "开放许可实施期间，对专利权人缴纳专利年费相应给予减免"}, answer: "AD", explanation: "：在国际专利分类 法(IPC)中，部是用英文大写字 母A一H表示；大类的类号是古 部的类号及在其后加上两位数 字组成；小类的类号白大类类 号加上一个英文大写字母组 式；大组的类号由小类类号加 上一个1一3位的阿拉伯数字 及“/00\"组成；小组的类号由小 列哪些分 类类号加上一个1一3位数，后 首灵着头线“广，再加上一个除 “00”以外的至少两位的数组 戎。本题中，A、D选项正确。B 选项COSF代表小类，C选项 H01C1/00代表大组：(2013)"},
  {id: 706, topic: "专题二十八 专利许可", type: "single", question: "以下关于开放许可说法正确的有：", options: {"A": "声明对专利实施开放许可的，应当在公告授予专利权后提出", "B": "开放许可声明中，专利许可使用费一般不高于2000万元", "C": "专利开放许可合同自公告之日起生效", "D": "专利权人提供虚假材料获得了专利年费减免，国家知识产权局可对其处10万元以下罚款"}, answer: "B", explanation: "根据《国际专利分 类表>，H01FLA4表示按其并项 力区分的包括硬查合金的无机 材料的改体，与B选项“包苦硬 过分金的无机村科的世条”对 应的最低一级小经是1/04，因 此B选项正确。(2006)"},
  {id: 707, topic: "专题二十八 专利许可", type: "single", question: "下列关于开放许可的说法正确的是？", options: {"A": "专利开放许可声明自手续合格发文之日起生效", "B": "对国家知识产权局作出的关于不予公告专利开放许可声明的决定不服的，可以提出行政复议", "C": "通过开放许可达成专利实施许可的，专利权人或者被许可人应当凭能够证明达成许可的书面文件向国务院专利行政部门备案，未经备案专利年费不能获得减免", "D": "专利权人对国家知识产权局作出的关于专利开放许可实施期间不予年费减缴的决定不服的，可以向国家知识产权局申请行政复议"}, answer: "B", explanation: "专利申请的分类 应当按照国际分类表分到最低 位置：二氧化钛是金属氧化 初、因龙分类号应当为H01G4( 容器”的专 10，因此B选项正确。（2014) 19、C。中国采用国际专 利分类对发明专利申请和实用 新型专利申请进行分类，采用 国际外观设计分类法（即洛迦 诺分类法）对外观设计专利申 请进行分类。因此A、B、D选项 说法正确，C选项说法错误，当 选。（2015)"},
  {id: 708, topic: "专题二十八 专利许可", type: "single", question: "专利权有下列哪些情形的，专利权人不得对其实行开放许可：", options: {"A": "专利尚未获得授权", "B": "专利处于中止程序中", "C": "专利权已经终止", "D": "专利权被宣告部分无效"}, answer: "", explanation: ""},
  {id: 709, topic: "专题二十八 专利许可", type: "single", question: "关于专利实施的强制许可，以下说法错误的是？", options: {"A": "具备实施条件的单位或个人可以“未实施或未充分实施其专利”的由，请求给予实施某项芯片发明专利的强制许可", "B": "可以给予强制许可实施“某型具体产品所涉及的全部的专利”，而不必逐一列明所涉及的专利号", "C": "除出口专利药品的强制许可之外，强制许可的实施应主要为了供应国内市场", "D": "某公司的某型产品因为采用特殊的专利外观设计大获市场好评、一货难求、价格高昂，具备实施条件的单位或个人可以“未实施或未充分实施其专利”的由，针对该外观设计专利提出强制许可请求"}, answer: "", explanation: ""},
  {id: 710, topic: "专题二十八 专利许可", type: "single", question: "在下列哪些情形下申请强制许可的，应当提供其以合理的条件请求专利权人许可实施专利但未能在合理的时间内获得许可的证据？", options: {"A": "因专利权人无正当理由未实施其专利而申请给予强制许可", "B": "专利权人行使专利权的行为被依法认定为垄断行为，为消除或者减少该行为对竞争产生的不利影响而申请给予强制许可", "C": "为了公共利益的目的申请给予强制许可", "D": "针对半导体技术申请给予强制许可"}, answer: "", explanation: ""},
  {id: 711, topic: "专题二十八 专利许可", type: "single", question: "世界贸易组织成员国X国爆发了一场流行疾病，甲公司在中国拥有治疗该疾病药品的专利权。乙公司向国家知识产权局提出申请，请求对甲公司的药品专利给予强制许可。下列说法哪些是正确的？", options: {"A": "国家知识产权局在作出给予强制许可的决定前应当组织听证", "B": "给予强制许可的决定应当写明给予强制许可的范围和期限", "C": "乙公司获得强制许可后，无须向甲公司交纳专利使用费", "D": "乙公司获得强制许可后，应当将制造的药品全部出口到X国"}, answer: "", explanation: ""},
  {id: 712, topic: "专题二十八 专利许可", type: "single", question: "关于专利实施强制许可，以下说法正确的是？", options: {"A": "根据“国家出现紧急状态或非常情况，或为了公共利益制许可的，不适用听证程序", "B": "在国家知识产权局作出驳回强制许可申请的决定的情况下，强制许可的请求人可以向法院起诉", "C": "专利权人与取得强制许可的单位或个人不能就强制许可的使用费达成协议的，可以直接向法院提起诉讼，无需先经过国家知识产权局裁决", "D": "对专利强制许可的使用费裁决不服的，可以向国家知识产权局提起行政复议"}, answer: "", explanation: ""},
  {id: 713, topic: "专题二十八 专利许可", type: "single", question: "下列关于强制许可的说法哪些是正确的？", options: {"A": "国务院专利行政部门作出给予实施强制许可的决定，应当及时通知专利权人，并予以登记和公告", "B": "国务院专利行政部门在作出驳回强制许可请求的决定前，应当通知请求人和专利权人拟作出的决定及其理由", "C": "专利权人对国务院专利行政部门关于实施强制许可的决定不服的，可以自收到通知之日起三个月内向人民法院起诉", "D": "专利权人对国务院专利行政部门关于实施强制许可的使用费的裁决不服的，可以自收到通知之日起三个月内向人民法院起诉"}, answer: "", explanation: ""},
  {id: 714, topic: "专题二十八 专利许可", type: "single", question: "下列关于强制许可的说法哪些是正确的？", options: {"A": "任何强制许可的实施只能为了供应国内市场，不能出口", "B": "取得实施强制许可的单位或者个人享有独占的实施权，但无权允许他人实施", "C": "专利权人对国家知识产权局关于实施强制许可的决定不服的，可以申请行政复议", "D": "提出强制许可时，申请人应当提供其以合理的条件请求专利权人许可其实施专利，但未能在合理的时间内获得许可的证据"}, answer: "", explanation: ""},
  {id: 715, topic: "专题二十八 专利许可", type: "single", question: "甲在乙的发明专利基础上开发了一项具有显著经济意义并有着重大技术进步的技术方案，就该技术方案甲申请了发明专利并获得授权，甲实施其发明专利时有赖于乙的发明专利的实施。下列说法哪些是正确的？", options: {"A": "甲可以向国务院专利行政部门申请强制许可，说明理由并附具有关证明文件", "B": "如果甲与乙就强制许可使用费不能达成协议，可以请求国务院专利行政部门裁决C，甲或乙对强制许可使用费的行政裁决不服的，可以提起行政复议", "D": "如果甲获得了实施乙专利的强制许可,则乙自动获得实施甲专利的强制许可-255.-专利合作条约及其他与专利相关", "C": "甲或乙对强制许可使用费的行政裁决不服的，可以提起行政复议"}, answer: "", explanation: ""},
  {id: 716, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "根据《专利合作条约》的相关规定，下列说法哪些是正确的？", options: {"A": "《专利合作条约》述及“专利”应解释为述及发明人证书、实用证书、实用新型、外观设计证书等", "B": "通过《专利合作条约》途径提出的专利申请只能获得发明专利保护", "C": "《专利合作条约》中所述及的“受理局”，是指受理国际申请的国家局或者政府间组织", "D": "经国际专利合作联盟大会决定，申请人是《保护工业产权巴黎公约》缔约国但不是《专利合作条约》缔约国的居民或者国民也可以提出国际申请"}, answer: "", explanation: ""},
  {id: 717, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "某PCT国际申请有两个申请人，第一申请人的国籍和居所均为美国，第二申请人的国籍为韩国、居所为中国。下列说法错误的是？", options: {"A": "中国国家知识产权局不可以作为该国际申请的主管受理局", "B": "美国专利商标局可以作为该国际申请的主管受理局", "C": "申请人可以向国际局提交该国际申请", "D": "韩国知识产权局可以作为该国际申请的主管受理局"}, answer: "", explanation: ""},
  {id: 718, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "美籍华人张某长期居住在上海，就其在上海工作期间完成的发明创造提交PCT国际申请，下列说法哪些是正确的？", options: {"A": "张某可以直接向美国专利商标局提交国际申请", "B": "张某可以直接向国家知识产权局提交国际申请", "C": "张某可以直接向国际局提交国际申请", "D": "该国际申请进人中国国家阶段时，申请人可以要求发明或实用新型专利保护"}, answer: "", explanation: ""},
  {id: 719, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "multiple", question: "下列关于PCT国际申请的说法哪些是正确的？", options: {"A": "香港特别行政区的居民可以向国家知识产权局提交PCT国际申请，也可以向国际局提交PCT国际申请", "B": "不能就外观设计提出PCT国际申请", "C": "国家知识产权局作为主管受理局仅接受以中文提出的国际专利申请", "D": "PCT国际申请在进人国家阶段之前必须经过国际初步审查"}, answer: "", explanation: ""},
  {id: 720, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "国籍和居所为中国的申请人李某准备用中文提交一件PCT国际申请，并要求一项德国优先权，下列说法正确的是：", options: {"A": "国家知识产权局可以作为该国际申请的受理局", "B": "主管国际检索单位可以为国家知识产权局或德国专利商标局", "C": "主管国际初步审查单位可以为国家知识产权局或德国专利商标局", "D": "国际局可以作为该国际申请的受理局"}, answer: "", explanation: ""},
  {id: 721, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "在PCT国际申请体系中，中国国家知识产权局承担以下哪些职能？", options: {"A": "受理PCT国际申请", "B": "负责PCT国际申请的公布出版", "C": "作为国际检索单位，制定国际检索报告", "D": "作为国际初步审查单位，制定专利性国际初步报告"}, answer: "", explanation: ""},
  {id: 722, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "下列关于PCT国际申请的优先权说法哪些是正确的？", options: {"A": "申请人可以要求在世界贸易组织成员中提出的在先申请作为PCT国际申请优先权的基础", "B": "PCT国际申请的优先权日不在国际申请日前12个月内但在14个月内的，申请人可以提出恢复优先权的请求", "C": "PCT国际申请中的优先权要求未写明在先申请号，该优先权要求不能仅因为此原因被视为未提出", "D": "申请人在PCT国际申请提出后的一定期限内可以对优先权声明进行改正或者增加"}, answer: "", explanation: ""},
  {id: 723, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "某一申请人于2022年11月1日提出了一件实用新型专利申请，2023年7月5日该申请被授权公告。2023年12月1日该申请人拟就同样的主题向国家知识产权局提出一件国际申请，并要求该实用新型专利申请的优先权。下述说法中哪些是错误的？", options: {"A": "申请人可以通过恢复程序恢复该实用新型的优先权", "B": "申请人不能享受该实用新型的优先权，因为提出国际申请只能以发明专利申请作为优先权基础", "C": "由于该实用新型已经公告，受理局不受理申请人提出的国际申请", "D": "由于自该实用新型申请日起算已经超过12个月，而且该实用新型已经公开，所以申请人提出国际申请是没有意义的"}, answer: "", explanation: ""},
  {id: 724, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "向国家知识产权局提出的PCT国际申请，在满足其它受理条件的情况下，下列哪些情形可以将收到该申请之日记录为国际申请日？", options: {"A": "申请人以日文提交申请", "B": "申请中未按规定方式写明申请人的姓名或者名称", "C": "申请人提交的申请文件中有一部分表面上看像是说明书", "D": "申请人提交的权利要求书中含有表格"}, answer: "", explanation: ""},
  {id: 725, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "下列哪些情形的国际申请，不能以受理局收到国际申请文件之日作为国际申请日？", options: {"A": "申请中没有按规定写明发明人的姓名", "B": "申请人没有签字", "C": "没有缴纳国际申请费和手续费", "D": "国际申请没有用规定的语言撰写"}, answer: "", explanation: ""},
  {id: 726, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "对处于国际阶段的PCT国际申请，下列哪种情形可能导致重新确定国际申请日？", options: {"A": "摘要使用的语言跟说明书和权利要求使用的语言不一致", "B": "申请人未在申请中写明发明名称", "C": "申请人未在规定期限内缴纳国际申请费", "D": "申请文件中遗漏了一页说明书"}, answer: "", explanation: ""},
  {id: 727, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "申请人于2023年6月1日通过邮局向国家知识产权局寄出一份PCT国际申请。国家知识产权局于2023年6月9日收到该申请。经审查发现，申请人提交了请求书、说明书和权利要求书，但未提交摘要，且未在请求书上签字。后申请人于2023年7月6日补交经申请人签字的请求书替换页，于2023年7月7日补交摘要，则该PCT申请的国际申请日是？", options: {"A": "2023年6月1日", "B": "2023年6月9日", "C": "2023年7月6日", "D": "2023年7月7日"}, answer: "", explanation: ""},
  {id: 728, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "关于国际检索，下列说法正确的是？", options: {"A": "国际检索是在原始国际申请文件的基础上进行的", "B": "如果在国际公布的技术准备工作完成前，国际局已得到国际检索报告，国际检索报告将随申请文件一起进行国际公布", "C": "国际检索单位应当在其作出国际检索报告的同时，作出书面意见", "D": "申请日为2023年2月1日的国际申请（未要求优先权），国际检索单位收到检索本的日期为2023年3月1日，则完成国际检索报告及书面意见的期限为2023年11月1日"}, answer: "", explanation: ""},
  {id: 729, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "一件PCT国际申请，国际申请日是2023年3月29日，优先权日是2022年4月11日。国际检索单位于2023年7月17日将国际检索报告传送给国际局和申请人。根据专利合作条约第19条的规定，对权利要求书提出修改的最晚期限是？", options: {"A": "2023年8月11日", "B": "2023年9月17日", "C": "2023年10月15日", "D": "2024年2月11日"}, answer: "", explanation: ""},
  {id: 730, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "关于PCT国际申请国际阶段的修改，下列说法正确的是？", options: {"A": "在国际检索报告传送给申请人之日起2个月内，申请人可依据专利合作条约第19条对权利要求书提出修改", "B": "在国际公布的技术准备工作完成之前，申请人可依据专利合作条约第19条对说明书和附图提出修改", "C": "在提出国际初步审查要求时，申请人可依据专利合作条约第34条对权利要求书提出修改", "D": "在国际初步审查报告作出之前，申请人可依据专利合作条约第34条对说明书和附图提出修改"}, answer: "", explanation: ""},
  {id: 731, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "李某于2022年12月1日向国家知识产权局提交了一件PCT国际申请，优先权日为2021年12月1日，国际检索单位于2023年3月1日发出国际检索报告和检索单位书面意见，如果李某拟在国际阶段修改国际申请的说明书，下列哪些修改可以被接受：", options: {"A": "李某于2023年5月30日根据PCT条约第19条提交修改", "B": "在国际初步审查单位开始制定国际初步审查报告之前，李某根据PCT条约第34条多次提交修改", "C": "李某于2023年9月1日在提交国际初步审查请求的同时根据PCT条约第34条提交修改", "D": "李某于2023年4月1日根据PCT条约第19条提交修改"}, answer: "", explanation: ""},
  {id: 732, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "某中国公司以中文向国家知识产权局提交了一件PCT国际申请，其优先权日为2022年8月8日，国际申请日为2023年8月8日。下列关于该申请国际公布的说法哪些是正确的？", options: {"A": "国际公布应当以英文或法文进行，因此国际局还需将该申请全部内容翻译成英文或法文进行国际公布", "B": "申请人想通过撤回国际申请来避免国际公布，则该撤回通知应在国际公布的技术准备完成之前到达国际局", "C": "如果申请人不要求提前公布，则该申请将在2024年2月8日之后迅速进行国际公布", "D": "国际检索报告在国际公布的技术准备工作完成前已作出的，国际公布应当公布国际检索报告"}, answer: "", explanation: ""},
  {id: 733, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "multiple", question: "下列关于PCT国际申请的说法哪些是正确的？", options: {"A": "申请人可以依据《专利合作条约》提交PCT国际申请，也可以依据《保护工业产权巴黎公约》直接向外国提交专利申请", "B": "国际初步审查程序是PCT国际申请的必经程序", "C": "国际检索单位书面意见和专利性国际初步报告是国际单位对作为国际申请主题的发明是否有新颖性、创造性和工业实用性提出的初步的、无约束力的意见", "D": "有些PCT国际申请的主题，如原子核变换方法，即使国际单位经检索认为其具备新颖性和创造性，也无法在中国获得专利权"}, answer: "", explanation: ""},
  {id: 734, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "一件优先权日为2021年7月5日、国际申请日为2022年3月26日的PCT国际申请，现欲办理进入中国国家阶段的手续。下列说法哪些是正确的？", options: {"A": "该申请应当被视为于2021年7月5日向国家知识产权局提出的专利申请", "B": "申请人在2024年1月6日至2024年3月5日之间向国家知识产权局办理进人国家阶段手续的，应当缴纳宽限费", "C": "申请人应当自进人日起2个月内缴纳优先权要求费", "D": "申请人要求以国际阶段的修改作为审查基础的，最迟应当自进人日起2个月内提交修改部分的中文译文"}, answer: "", explanation: ""},
  {id: 735, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "申请人于2022年6月1日提出一件PCT国际申请，并要求了在先申请日为2021年6月1日的优先权，下列说法正确的有：", options: {"A": "申请人由于不可抗拒事由耽误国际申请进人中国国家阶段的期限的，可以请求恢复权利", "B": "申请人可以在进人中国国家阶段之后修改要求保护的类型", "C": "在缴纳宽限费的情况下，申请人最迟应当在2024年2月1日前办理进入中国国家阶段的手续", "D": "申请人在进人中国国家阶段时可以指明在中国要求保护“发明专利”和“实用新型专利”"}, answer: "", explanation: ""},
  {id: 736, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "某申请人用英文向国家知识产权局提交了一件了公布。该申请进人中国国家阶段时要求的保护类型为发明，国家知识产权局在初审合格后进行了公布。下列说法哪些是正确的？", options: {"A": "该申请应当以中文进行国际公布", "B": "国家知识产权局应当在该申请的进入日后一个月内进行国家公布", "C": "国家知识产权局进行国家公布时应当公布该申请文件的中文译文", "D": "自国家公布之日起该申请人可以要求实施其发明的单位或者个人支付适当的费用"}, answer: "", explanation: ""},
  {id: 737, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "下列关于PCT国际申请进人中国国家阶段手续的说法哪些是正确的？", options: {"A": "国际申请中未写明发明人的，在进人中国国家阶段的声明中应当写明发明人的姓名", "B": "国际申请以外文提出的，申请人应当提交原始国际申请的说明书和权利要求书的中文译文", "C": "在国际阶段向国际局已办理申请人变更手续的，申请人应当提供变更后的申请人享有申请权的证明材料", "D": "国际申请以中文提出的，申请人应当提交国际公布文件中的摘要并指定摘要附图"}, answer: "", explanation: ""},
  {id: 738, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "multiple", question: "一件进人中国国家阶段的PCT国际申请涉及依赖于遗传资源完成的发明创造，下列说法哪些是正确的？", options: {"A": "申请人应当在进人声明中予以说明，并填写遗传资源来源披露登记表", "B": "申请人应当说明该遗传资源的直接来源和原始来源；无法说明原始来源的，应当陈述理由", "C": "该遗传资源是违反行政法规的规定获取的，该申请不能被授予专利权", "D": "该申请未说明该遗传资源直接来源的，国家知识-263产权局将直接作出驳回该申请的决定"}, answer: "", explanation: ""},
  {id: 739, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "某PCT申请的国际申请日为2021年10月26日，进人中国国家阶段的日期为2024年2月26日。下列说法哪些是正确的？", options: {"A": "该申请应当视为2024年2月26日向国家知识产权局提出的专利申请", "B": "在进人中国国家阶段时，申请人可以选择外观设计作为保护类型", "C": "申请人不能在该申请进入中国国家阶段后提出新的优先权要求", "D": "如果该申请被授予专利权，则专利权的期限自2021年10月26日起计算"}, answer: "", explanation: ""},
  {id: 740, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "对于PCT国际申请在国际申请阶段或进人中国国家阶段申请人所做的修改，以下哪些是允许的？", options: {"A": "申请人自国际检索单位向申请人和国际局传送国际检索报告之日起2个月、或者自优先权日起16个月向国际检索单位提交的权利要求书、说明书及附图的修改替换页", "B": "申请人在提交国际初审要求书时，向国际初审单位提交的权利要求书、说明书及附图的修改替换页", "C": "申请人在国际初审单位传送专利性国际初步报告制定之前，向国际初审单位提交的权利要求书、说明书及附图的修改替换页", "D": "申请人在该PCT申请进人中国国家阶段时，提交的权利要求书、说明书及附图的修改替换页"}, answer: "", explanation: ""},
  {id: 741, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "根据《专利合作条约》的规定，允许申请人在国家阶段提出复查请求的情况包括？", options: {"A": "受理局拒绝给予国际申请日", "B": "受理局宣布国际申请已被视为撤回", "C": "国际检索单位宣布不作出国际检索报告", "D": "国际局由于在规定期限内没有收到国际申请的登记本而宣布该申请被视为撤回"}, answer: "", explanation: ""},
  {id: 742, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "multiple", question: "对于一件涉及生物材料的PCT国际申请，如果申请人请求进人中国国家阶段，则下列说法哪些是正确的？", options: {"A": "申请人应当在国际阶段对生物材料样品的保藏作出说明，包括保藏单位名称和地址、保藏日期、保藏编号", "B": "申请人应当在进人声明中指明记载生物材料样品保藏事项的文件以及在该文件中的具体记载位置", "C": "申请人未在进人声明中指明生物材料样品保藏事项的，应当自进人日起4个月内补正，期满未补正的，该申请视为撤回", "D": "申请人应当自进人日起4个月内提交生物材料样品保藏证明和存活证明，期满未提交的，该申请视为撤回"}, answer: "", explanation: ""},
  {id: 743, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "一件PCT国际申请进人中国国家阶段时选择要求获得发明专利，在国家阶段申请人何时可以对申请文件主动提出修改？", options: {"A": "请求进入国家阶段的同时", "B": "提出实质审查请求时", "C": "自进入日起2个月内", "D": "收到进人实质审查阶段通知书之日起的3个月内"}, answer: "", explanation: ""},
  {id: 744, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "关于PCT国际申请在中国国家阶段提交的译文，下列说法哪些是正确的？", options: {"A": "国际申请以外文提出的，在进入国家阶段时，应当提交原始国际申请的说明书、权利要求书、摘要和附图中的文字的译文", "B": "审查基础文本声明中提及国际阶段的修改的，应当自进人日起2个月内提交该修改文件的译文", "C": "申请人可以在国家知识产权局作好公布发明专利申请或者公告实用新型专利权的准备工作之前，或是在收到国家知识产权局发出的发明专利申请进人实质审查阶段通知书之日起3个月内主动提出改正译文错误", "D": "基于国际申请授予的专利权，译文有误时，以国家知识产权局授权时的保护范围为准"}, answer: "", explanation: ""},
  {id: 745, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "multiple", question: "如果国际检索单位认为一件PCT国际申请没有满足发明单一性的要求，则下列说法哪些是正确的？", options: {"A": "申请人未在规定期限内缴纳检索附加费的，国际检索单位应当宣布不作出国际检索报告", "B": "申请人在规定期限内缴纳检索附加费的，国际检索单位应当对国际申请的全部权利要求作出国际检索报告", "C": "申请人在规定期限内缴纳检索附加费和异议费的，如果异议成立，检索附加费和异议费将被退回", "D": "申请人未在规定期限内缴纳检索附加费的，且在进人中国国家阶段后，未按规定缴纳单一性恢复费的，申请人不得提出分案申请"}, answer: "", explanation: ""},
  {id: 746, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "如果国际检索单位认为一件PCT国际申请没有满足发明单一性的要求，则下列说法错误的是？", options: {"A": "申请人未在规定期限内缴纳附加检索费的，则国际检索单位仅对该国际申请权利要求中首先提到的发明部分作出国际检索报告", "B": "该申请提出国际初审的，国际初审单位对于没有作出国际检索报告的权利要求也需进行国际初步审查", "C": "由于申请人未按国际单位的要求缴纳附加检索费或附加审查费，而导致该PCT申请部分权利要求未经国际检索或国际初步审查时，在进人中国国家阶段后，申请人要求将所述部分作为审查基础的，专利审查部门认为国际检索单位或者国际初步审查单位对发明单一性的判断正确的，应当通知申请人在指定期限内缴纳单一性恢复费", "D": "在PCT申请进入中国国家阶段后，专利审查部门经审查认定申请人提出的作为审查基础的申请文件中要求保护的主题不存在缺乏单一性的问题，但是与国际单位所作出的结论不一致的，则应当对所有要求保护的主题进行审查"}, answer: "", explanation: ""},
  {id: 747, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "PCT国际申请进人国家阶段时涉及单一性问题的，下列说法正确的是？", options: {"A": "在国际阶段的检索和审查中，国际单位未提出单一性问题的，国家知识产权局不能再提出存在单一性缺陷的问题", "B": "在国际阶段的检索和审查中，国际单位未提出单一性问题，而实际上存在单一性缺陷的，国家知识产权局可以提出存在单一性缺陷的问题", "C": "对于申请人因未缴纳单一性恢复费而删除的发明，申请人不得提出分案申请", "D": "对于申请人因未缴纳单一性恢复费而删除的发明，申请人可以提出分案申请"}, answer: "", explanation: ""},
  {id: 748, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "国际申请进人中国国家阶段后被授予专利权，下列说法正确的是？", options: {"A": "由于译文错误，致使授权的权利要求书确定的保护范围超出国际申请原文所表达的范围的，应以授权时的保护范围为准", "B": "由于译文错误，致使授权的权利要求书确定的保护范围超出国际申请原文所表达的范围的，应依据原文限制后的保护范围为准", "C": "由于译文错误，致使授权的权利要求书确定的保护范围小于国际申请原文所表达的范围的，应以授权时的保护范围为准", "D": "由于译文错误，致使授权的权利要求书确定的保护范围小于国际申请原文所表达的范围的，应以原文的保护范围为准-267.-"}, answer: "", explanation: ""},
  {id: 749, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "对申请人在国际申请遗漏部分文件的情形,下列说法正确的是？", options: {"A": "申请人提交的国际申请的说明书、权利要求书或者附图一部分被遗漏或看似被遗漏，申请人可以通过提交遗漏部分使国际申请变得完整，该国际申请日应当修改为收到该遗漏部分之日", "B": "如果国际申请要求了一件在先申请的优先权，该国际申请的说明书、权利要求书或附图的某一部分遗漏，但是全部包含在在先申请中，则该部分可以经由确认，援引加人到该国际申请中，该国际申请日不需要修改", "C": "如果在国际阶段通过援引加入方式修改了申请文件，在办理进入国家阶段手续时应当提交与援引加入相关的在先申请文件副本的中文译文", "D": "如果在国际阶段通过援引加入方式修改了申请文件，在办理进入国家阶段手续时应当在声明中正确指明援引加入的文件在原始文件译文和在先申请文件副本译文中的位置"}, answer: "", explanation: ""},
  {id: 750, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "申请人在韩国提出了一件PCT国际申请，国际申请日是2023年3月2日。申请人在国际阶段办理了恢复优先权手续，经审查合格后确定的优先权日是2022年2月14日。该PCT国际申请于2024年4月14日进入中国国家阶段。下列说法哪些是正确的？", options: {"A": "如果该申请被授予专利权，则专利权的期限自2022年2月14日起计算", "B": "进入中国国家阶段后，申请人可以要求增加一项新的优先权，该在先申请的申请日为2022年4月11日", "C": "对于一项因在国际阶段未提供在先申请的申请号，进人声明中仍未写明在先申请的申请号而被视为未要求的优先权，申请人可以在进人中国国家阶段后请求恢复该项优先权", "D": "如果作为优先权基础的在先申请是一件中国国家申请，应当看作是要求本国优先权"}, answer: "", explanation: ""},
  {id: 751, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "申请人在美国提出了一件PCT国际申请，国际申请日是2023年6月18日，要求2022年4月28日的优先权。该PCT国际申请于2024年8月19日进人中国国家阶段。下列说法哪些是正确的？", options: {"A": "如果在国际阶段，美国专利商标局已经批准恢复优先权，在进人中国国家阶段时不需要再请求优先权超期恢复", "B": "如果在国际阶段，美国专利商标局已经批准恢复优先权，在进人中国国家阶段时仍需要请求优先权超期恢复", "C": "如果在国际阶段申请人未请求恢复优先权，申请人有正当理由的，可以自进人日起2个月内向国务院专利行政部门请求恢复优先权", "D": "如果在国际阶段申请人提出了恢复优先权请求但受理局未批准，申请人有正当理由的，可以自进人日起2个月内向国务院专利行政部门请求恢复优先权"}, answer: "", explanation: ""},
  {id: 752, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "关于《工业品外观设计国际注册海牙协定》，下列说法正确的是？", options: {"A": "《海牙协定》在我国生效的时间是2022年5月5日", "B": "申请人可以直接向国际局提交，也可以请求国家知识产权局转交", "C": "申请人通过国家知识产权局转交工业品外观设计国际注册申请的，应当以符合海牙协定和国家知识产权局规定的纸件形式或者电子形式提交相关材料", "D": "申请人通过国家知识产权局转交工业品外观设计国际注册申请的，相关费用可以直接向国家知识产权局缴纳"}, answer: "", explanation: ""},
  {id: 753, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "《工业品外观设计国际注册海牙协定》中关于国际注册的说法正确的有？A，国际注册申请直接交给国际局的，一般以国际局收到该国际注册申请的日期为申请日", options: {"B": "通过国家知识产权局提交的国际注册申请，以国际局收到转交的国际注册申请的日期为申请日", "C": "国际局收到国际注册申请后，发现缺少对指定的缔约方的说明，以国际局收到申请人作出的更正的日期为申请日", "D": "国际注册日即国际注册申请的申请日", "A": ""}, answer: "", explanation: ""},
  {id: 754, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "关于指定中国的外观设计国际注册申请，以下说法正确的有：", options: {"A": "按照海牙协定确定的国际注册日即为指定中国的外观设计申请的申请日", "B": "外观设计国际申请要求一项或多项优先权的，在指定中国时，应当提出优先权声明", "C": "国际局公布的外观设计国际申请中包括含设计要点的说明书的，无需再提交简要说明", "D": "外观设计国际申请经国务院专利行政部门审理后作出给予保护的决定后，该外观设计专利权自国际注册日起生效"}, answer: "", explanation: ""},
  {id: 755, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "multiple", question: "下列有关国际条约的说法哪些是正确的？", options: {"A": "专利合作条约适用于发明专利、实用新型和外观设计申请", "B": "布达佩斯条约适用于发明专利和实用新型申请", "C": "斯特拉斯堡协定适用于发明专利和实用新型申请", "D": "洛迦诺协定仅适用于外观设计申请"}, answer: "", explanation: ""},
  {id: 756, topic: "专题二十九 专利合作条约及其他与专利相关的国际条约", type: "single", question: "构成工业产权领域三大服务体系的国际协定或条约包括：", options: {"A": "海牙协定", "B": "商标国际注册马德里协定", "C": "专利合作条约", "D": "马拉喀什条约专利文献与专利分类"}, answer: "", explanation: ""},
  {id: 757, topic: "专题三十 专利文献与专利分类", type: "single", question: "外观设计专利单行本包括下列哪些部分?", options: {"A": "扉页、说明书、权利要求书、说明书附图", "B": "扉页、彩色外观设计图片或者照片、简要说明", "C": "请求书、彩色外观设计图片或者照片、简要说明", "D": "扉页、权利要求书、彩色外观设计图片或者照片说明"}, answer: "", explanation: ""},
  {id: 758, topic: "专题三十 专利文献与专利分类", type: "single", question: "国家知识产权局公布的发明专利说明书扉页中包列哪些内容？", options: {"A": "说明书附图", "B": "摘要", "C": "著录事项", "D": "权利要求书UK Patent ApplicationGE(12)(21) Application No:"}, answer: "", explanation: ""},
  {id: 759, topic: "专题三十 专利文献与专利分类", type: "single", question: "图1所示是哪一个国家的专利文献？", options: {"B": "中国", "A": "英国", "D": "德国", "C": "美国"}, answer: "", explanation: ""},
  {id: 760, topic: "专题三十 专利文献与专利分类", type: "single", question: "图1中代码（13)后面的字母A表示该文献是什么文献？", options: {"A": "授权文献", "B": "审定授权文献", "C": "申请公开文献", "D": "专利证书"}, answer: "", explanation: ""},

  {id: 762, topic: "专题三十 专利文献与专利分类", type: "single", question: "根据上图所示的美国专利文献，可以看出哪些专利信息?", options: {"A": "该专利的申请人是Berger等人", "B": "该专利的申请日是2003年11月4日", "C": "该专利的国际分类号220/603，220/710.5", "D": "该专利的专利授权号是US10/369453"}, answer: "", explanation: ""},
  {id: 763, topic: "专题三十 专利文献与专利分类", type: "single", question: "下列各组用以表示公布专利文献的国家或机构的国际哪组存在错误？", options: {"A": "法国FR、西班牙ES、奥地利AT", "B": "欧洲专利局EP、英国UK、韩国KR", "C": "澳大利亚AU、瑞士CH、俄罗斯联邦RU", "D": "日本JP、瑞典SE、世界知识产权组织IB"}, answer: "", explanation: ""},
  {id: 764, topic: "专题三十 专利文献与专利分类", type: "single", question: "同族专利是指在不同国家或国际专利组织多次申请、批准的内容相同或基本相同的一组专利文献。下列哪些是同同点？", options: {"A": "具有共同发明人", "B": "具有共同申请人", "C": "具有相同专利分类", "D": "具有共同优先权"}, answer: "", explanation: ""},
  {id: 765, topic: "专题三十 专利文献与专利分类", type: "single", question: "下列哪个号码是进人中国国家阶段的PCT发明专利号？", options: {"A": "200710077832.3", "B": "200930143483.0", "C": "200480002090.2", "D": "200490000001.3"}, answer: "", explanation: ""},
  {id: 766, topic: "专题三十 专利文献与专利分类", type: "single", question: "根据ZC0006—2003专利申请号标准，下列关于专利请种类号的说法哪些是正确的？", options: {"A": "1表示发明专利申请", "B": "2表示实用新型专利申请", "C": "3表示外观设计专利申请", "D": "4表示进人中国国家阶段的PCT发明专利申请"}, answer: "", explanation: ""},
  {id: 767, topic: "专题三十 专利文献与专利分类", type: "multiple", question: "下列关于专利申请号的说法正确的有：A，201730362288.1是外观设计专利申请", options: {"B": "202360012345.9是按照海牙协定已确定国际注册日并外观设计国际申请", "C": "201780002091.2是进人中国国家阶段的发明专利申请", "D": "国家知识产权局在受理专利申请时给予专利申请号和校", "A": ""}, answer: "", explanation: ""},
  {id: 768, topic: "专题三十 专利文献与专利分类", type: "single", question: "某专利文献扉页上印有“CN100378905A”，由此专利文分析出下列哪些信息？", options: {"A": "这是一篇中国专利文献", "B": "这是一篇实用新型专利文献", "C": "该专利申请已被授予专利权", "D": "第一位数字1表示发明专利申请"}, answer: "", explanation: ""},
  {id: 769, topic: "专题三十 专利文献与专利分类", type: "single", question: "以下关于专利文献种类标识代码中字母含义的说法哪的？", options: {"A": "字母“B”表示发明专利申请公布", "B": "字母“Y”表示发明专利权部分无效宣告的公告", "C": "字母“U”表示实用新型专利权部分无效宣告的公告", "D": "字母“S”表示外观设计专利授权公告或外观设计专利权宣告的公告"}, answer: "", explanation: ""},
  {id: 770, topic: "专题三十 专利文献与专利分类", type: "single", question: "下列关于文献种类代码与专利类型对应关系说法错", options: {"A": "U、Y用于标识实用新型专利", "B": "A用于标识发明专利申请", "C": "C用于标识发明专利", "D": "S用于标识外观设计专利"}, answer: "", explanation: ""},
  {id: 771, topic: "专题三十 专利文献与专利分类", type: "single", question: "下列各组表示了国际专利分类表部的类号所指示的部！判断哪些组存在错误？F部：机械工程、照明", options: {"A": "G部：固定建筑物C部：化学、冶金", "B": "E部：电学", "C": "A部：人类生活必需D部：纺织、造纸B部：作业、运输", "D": "H部：物理"}, answer: "", explanation: ""},
  {id: 772, topic: "专题三十 专利文献与专利分类", type: "single", question: "下列关于专利分类号H01C1/00或C08F110/02中含义白是正确的？", options: {"A": "H代表部", "B": "C08F代表大类", "C": "H01C1/00代表小组", "D": "C08F110/02代表小组"}, answer: "", explanation: ""},
  {id: 773, topic: "专题三十 专利文献与专利分类", type: "single", question: "下表为国际专利分类表的部分节选：H01F1/00·按所用磁性材料区分的磁体或磁性物体H01F1/01·无机材料的H01F1/03··按其矫顽力区分的H01F1/032···硬磁材料的H01F1/04·.··金属或合金H01F1/047·..··按其成分区分的合金类是正确的？", options: {"A": "H01F1/01、H01F1/03、H01F1/032和H01F1/04", "B": "H 01F 1/04", "C": "H 01F 1/047", "D": "H 01F 1/00"}, answer: "", explanation: ""},
  {id: 774, topic: "专题三十 专利文献与专利分类", type: "single", question: "下表为国际专利分类表的节选：“H01G4/00固定电容器；及其制造方法H01G4/002·零部件H01G4/018··电介质H01G4/04···液体电介质H01G4/06···固体电介质H01G4/08····无机电介质H01G4/10····金属氧化物电介质H01G4/12.····陶瓷电介质”对于一件技术主题为“一种以二氧化钛薄膜为电介质的电利申请，下列哪个分类是正确的？", options: {"A": "H01G4/08", "B": "H01G4/10", "C": "H01G4/08、H01G4/10", "D": "H01G4/00、H01G4/002、H01G4/018、H01G4/06、H01G4/08"}, answer: "", explanation: ""},
  {id: 775, topic: "专题三十 专利文献与专利分类", type: "single", question: "下述说法哪个是错误的？", options: {"A": "中国采用国际专利分类法对发明专利申请进行分类", "B": "中国采用国际专利分类法对实用新型专利申请进行分类", "C": "中国采用洛迦诺分类法对实用新型专利申请进行分类", "D": "中国采用洛迦诺分类法对外观设计专利申请进行分类"}, answer: "", explanation: ""},
];


const RELATED_QUESTIONS = [
  {id: 1, topic: "专题一 民法典总则编", type: "single", question: "根据民法典总则编及相关规定，因下列哪些行为所产生的当事人之间的关系属于民法调整的范围？", options: {"A": "国家知识产权局与商标注册证打印纸供应商之间的关系", "B": "国家知识产权局与非正常专利申请行为人之间的关系", "C": "国家知识产权局与外聘专利审查辅助人员之间的关系", "D": "国家知识产权局与专利代理事务所之间的关系"}, answer: "A", explanation: "。A选项行政机关参与民事活动属于平等主体之间的财产关系，属于民法调整的范围。B、D选项均属于行政机关与行政相对人之间的行政法律关系，不属于民法调整的范围。C选项为劳动合同关系，不属于民法调整范国。（新编）", chapter: "第一章 民法基本原则与民事法律关系"},
  {id: 2, topic: "专题一 民法典总则编", type: "single", question: "根据法律规定，下列哪一种社会关系应由民法调整？", options: {"A": "甲请求税务机关退还其多缴的个人所得税", "B": "乙手机丢失后发布寻物启事称：“拾得者送还手机，本人当面酬谢”", "C": "丙发微信朋友圈承诺：“如我在上海找到工作，就陪女友去欧洲旅游”", "D": "丁作为青年志愿者，定期去福利院做帮工"}, answer: "B", explanation: "。A选项属于行政机关与相对人之间的行政关系，不由民法调整。B选项属于单方允诺，应由民法调整。C、D选项属于好意施惠，不是意思表示，不由民法调整。（法考2016)", chapter: "第一章 民法基本原则与民事法律关系"},
  {id: 3, topic: "专题一 民法典总则编", type: "single", question: "下列哪一情形下，乙的请求依法应得到支持？", options: {"A": "甲应允乙同看演出，但迟到半小时。乙要求甲赔偿损失", "B": "甲听说某公司股票可能大涨，便告诉乙，乙信以为真大量购进，事后该支股票大跌。乙要求甲赔偿损失", "C": "甲与其妻乙约定，如因甲出轨导致离婚，甲应补偿乙50万元，后二人果然因此离婚。乙要求甲依约赔偿", "D": "甲对乙承诺，如乙比赛夺冠，乙出国旅游时甲将陪同，后乙果然夺冠，甲失约。乙要求甲承担赔偿责任"}, answer: "C", explanation: "。A、D选项，甲的行为均属于好意施惠行为，不产生财产关系，乙的请求不能依法得到支持。B选项，甲向乙传递小道消息，乙作为完全民事行为能力人对自己的投资行为应进行独立的判断，造成损失应自行承担。C选项，甲与乙的约定属于“离婚过错损害赔偿”的约定，乙要求甲依约赔偿的请求依法应得到支持。（法考2010）", chapter: "第一章 民法基本原则与民事法律关系"},
  {id: 4, topic: "专题一 民法典总则编", type: "single", question: "甲诉某专利的专利权利人乙专利权权属纠纷一案正在审理中，证据交换阶段乙觉得自已胜诉无望，随即向国家知识产权局提出放弃该专利的申请，乙的行为违背民法典的下列哪一基本原则？", options: {"A": "平等原则", "B": "自愿原则", "C": "公平原则", "D": "诚信原则"}, answer: "D", explanation: "。本题中，乙在权属纠纷存在败诉可能性的情况下，撤回专利申请，其目的是希望甲即使胜诉也得不到专利权，属于权利泄用，因此违背诚信原则，D遇项正确。（2018）", chapter: "第一章 民法基本原则与民事法律关系"},
  {id: 5, topic: "专题一 民法典总则编", type: "multiple", question: "胡某在自家菜园里发现一只甲虫，非常好奇遂拍照发到网上，付某出价30万元购买。后来发现该甲虫是濒危动物，国家二级保护动物。此种情形违反以下民法的哪一个原则？", options: {"A": "公序良俗原则", "B": "自愿原则", "C": "绿色原则", "D": "诚信原则"}, answer: "AC", explanation: "。期某与付某二人买卖国家二级保护动物的行为违反了《野生动物保护法），故其违反了合法与公序良俗原则。且售实野生动物不利于保护生态环境，故其违反了绿色原则。（法考2024）", chapter: "第一章 民法基本原则与民事法律关系"},
  {id: 6, topic: "专题一 民法典总则编", type: "single", question: "某公司挖天然气管道途经郝某家耕地，不影响耕地使用。郝某报出高价索赔，否则不让挖掘。经过协商，某公司以行业规定最高标准给予补偿。后郝某觉得补偿太少，要求补上之前索要高价的差额。郝某的行为违反了哪种原则？", options: {"A": "违反公序良俗原则", "B": "违反诚信原则", "C": "违反平等原则", "D": "违反公平原则"}, answer: "B", explanation: "。某公司挖天然气管道途经郝某家耕地，郝某请求补偿理所当然，但是，趁机索要商价，属于权利游用行为。因此，郝某的行为违反了诚信原则，B选项正确。（法考2023）", chapter: "第一章 民法基本原则与民事法律关系"},
  {id: 7, topic: "专题一 民法典总则编", type: "single", question: "关于民事法律关系，下列哪一选项是正确的？", options: {"A": "民事法律关系只能由当事人自主设立", "B": "民事法律关系的主体即自然人和法人", "C": "民事法律关系的客体包括不作为", "D": "民事法律关系的内容均由法律规定"}, answer: "C", explanation: "。A、D选项，有些民事法律关系由当事人自主设立，如合同关系；有些民事法律关系由法律直接规定，如物权的种类和内容，因此A、D选项错误。B选项，民事法律关系的主体包括自然人、法人和非法人组织，因此B选项错误。C选项；民事法律关系的客体，包括作为和不作为；作为的客体，例如买卖合同之债，买方基于债权可以请求卖方交付标的物，卖方基于债权可以请求买方支付价款，在买卖合同中法律关系的客体是请求对方做出某种行为；再如专利权人获得专利投权，获得了对该技术的排他权，该法律关系的客体是其他人未经许可不得使用其专利技术，即不作为，因此C选项正确。（法考2008，思维扩展）", chapter: "第一章 民法基本原则与民事法律关系"},
  {id: 8, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列哪些属于限制民事行为能力人？", options: {"A": "6岁上初中的神童甲", "B": "18岁侬靠父母资助上大学的乙", "C": "9岁在读小学生丙", "D": "16岁已经掌握一定维修技术的技校生丁"}, answer: "CD", explanation: "，A选项，6岁的甲办无民事行为能力人。B选项，18岁的乙为常全民事行为能力人.A、B选项借误。C、D选项，9岁的丙为限例民事行为能力人，16步的丁员零一定维修术，低不是以自己的劳动收入为主要生活源，仍为限制民事行为能力人，因此C、D选项正确。（2018）", chapter: "第二章 自然人"},
  {id: 9, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编的规定，关于民事行为能力下列哪些表述是错误的？多选）", options: {"A": "十六周岁以上的自然人是成年人，具有完全民事行为能力，可以独立进行民事活动，是完全民事行为能力人", "B": "十四周岁以上不满十六周岁的自然人，以自己的劳动收人为主要生活来源的，视为完全民事行为能力人", "C": "十周岁以上的未成年人是限制民事行为能力人，进行民事活动应当征得他的法定代理人的同意", "D": "无民事行为能力人、限制民事行为能力人的监护人是他的法定代理人"}, answer: "ABC", explanation: "。A选项，（民法典》第17条规定：“十八周岁以上的自然人为成年人。不满十八周岁的自人为未成年人”，因此A选项错误。B选项，《民法典》第18条第2款规定：“十六周岁以上的未成年人，以自己的劳动收入为主要生活来源的，视为完全民事行为能力人”，因此B选项错误。C选项，《民法典》第19条规定：八周岁以上的未成年人为限制民事行为能力人……可以独立实施纯获利益的民事法律行为或者与其年龄、智力、精神健康状况相造应的民事法律行为”，C选项错误。D选项，《民法典》第23条规定：“无民事行为能力人、限制民事行为能力人的监护人是其法定代理人”，因此D选项正确。【注意】学员注意第2题和第1题之间的区别，第2题为法条题，严格按法条说法选答案，第1题为案例题，按照实际情况选答案。（2019）", chapter: "第二章 自然人"},
  {id: 10, topic: "专题一 民法典总则编", type: "multiple", question: "下列选项中哪些属于无民事行为能力人？", options: {"A": "跟随母亲来中国旅游的外国籍7岁儿童", "B": "30岁的精神病人，经鉴定其智商只有5岁", "C": "16岁的脑瘫患者，不能辨认自己的行为", "D": "7岁小学生，已经可以通过网络直播收人为主要生活来源"}, answer: "ABCD", explanation: "。《民法典》第12条中规定“中华人民共和国领域内的民事活动，适用中华人民共和国法律。法律另有规定的，依照其规定。“其他法律中未明确规定外国籍未成年人在中国进行民事法律活动时行为能力判断的适用标准，因此，应适用《民法典》中的规定，A选项正确。B选项，按照鉴定其智商属于不能辨认自己的行为，属于无民事行为能力人。C选项，不能辨认自己行为的人属于无民事行为能力人。D选项，不满8m岁，即他能够以自已的劳动收入为主要生活来源，其收入也需要监护人代为收取，本人属于无民事行为能力人。（新编）", chapter: "第二章 自然人"},
  {id: 11, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，关于民事权利能力和民事行为能力，下列哪些说法是正确的？", options: {"A": "自然人从出生时起到死亡时止，具有民事权利能力，依法享有民事权利，承担民事义务", "B": "自然人的民事权利能力一律平等", "C": "限制民事行为能力人可以进行与其年龄、智力相适应的民事活动", "D": "无民事行为能力人的民事活动由其法定代理人代理"}, answer: "ABCD", explanation: "。A选项，《民法典》第13条规定：“自然人从出生时起到死亡时止，具有民事权利能力、依法享有民事权利，承担民事义务”、因此A选项正确。B选项，《民法典》第14条规定：“自然人的民事权利能力一律平等”，因此B选项正确。C选项，根据《民法典》第22条的规定；限制民事行为能力人可以独立实施纯获利益的民事法律行为或者与其智力、精神健康状况相适应的民事法律行为，因此C选项正确。D选项，根据《民法典》第20、21条的规定，无民事行为能力人由其法定代理人代理实施民事法律行为，因此D选项正确。（2013改编）", chapter: "第二章 自然人"},
  {id: 12, topic: "专题一 民法典总则编", type: "multiple", question: "甲男、乙女为夫妻、生子丙，甲男去世。丙6岁的时候、甲父赠送给丙一幅价值百万元的名画。丙8岁的时候，甲父再赠送给丙一块价值10万元的名表。以下说法哪些正确？", options: {"A": "因为是纯获利益的行为，故名画赠与合同有效", "B": "因为在受赠名画时，丙为无民事行为能力人，故名画赠与合同无效", "C": "因为是纯获利益的行为，故名表赠与合同有效", "D": "因为在受赠名表时，丙为限制民事行为能力人，故名表赠与合同无效"}, answer: "BC", explanation: "。A、B选项，由于赠与名画时丙仅6岁，属于无民事行为能力人，其独立实施的民事法律行为一律无效，因此A选项错误，B选项正确。C、D选项，由于赠与名表时丙已8岁，属于限制民事行为能力人，且接受名表属于纯获利益的行为，赠与合同有效，因此C选项正确，D选项错误。（新编）", chapter: "第二章 自然人"},
  {id: 13, topic: "专题一 民法典总则编", type: "single", question: "王某户籍所在地是上海，大学毕业后在北京工作了两年。因身体原因前往广州就医，并在广州某医院住院一年半。痊愈后在深圳居住工作，至今已逾半年。根据民法典总则编及相关规定，王某在下列哪个城市的居住地视为其现在的住所？", options: {"A": "上海", "B": "北京", "C": "广州", "D": "深圳"}, answer: "A", explanation: "。（民法典》第25条规定：“自然人以户籍登记或者其他有效身份登记记载的居所为住所；经常居所与住所不一致的，经常居所视为住所”。本题中，王某现居住地为深圳，还不到一年，因此应当以户籍所在地为住所，因此A选项正确。（2009改编）", chapter: "第二章 自然人"},
  {id: 14, topic: "专题一 民法典总则编", type: "single", question: "陆某因诈骗罪被判人狱，和妻子协议离婚，双方约定，12岁的儿子由陆某抚养，但实际是由陆某父母抚养。下列哪一说法是正确的？", options: {"A": "陆某是唯一监护人", "B": "陆某的妻子是唯一监护人", "C": "夫妻二人均为监护人", "D": "陆某的父母为监护人"}, answer: "C", explanation: "。（民法典》第27条第1款规定：“父母是未成年子女的监护人。”父母分居或者离婚的，不影响监护能力。不论谁是陆某12岁的儿子的实际抚养人，父母都为其监护人。因此C选项正确。（法考2020）", chapter: "第二章 自然人"},
  {id: 15, topic: "专题一 民法典总则编", type: "single", question: "李某是无民事行为能力的精冲病人，其近亲属对担任幸某的监护人有争议，并且对李某住所地居民委员会的指定不服，向人民法院提起诉讼。根据民法典总则编及相关规定，人民法院一般应按照下列哪项中的顺序指定监护人？单选）", options: {"A": "（1）配偶：（2）父母、子女：（3）其他近亲属", "B": "（1）配偶、成年子女：（2）父母：（3）其他近亲属", "C": "（1）父母：（2）配偶、子女：（3）其他近亲属", "D": "（1）父母、子女；（2）配偶；（3）其他近亲属"}, answer: "A", explanation: "。（民法典》第28条规定：“无民事行为能力或者限制民事行为能力的成年人，由下列有监护能力的人按顺序担任监护人：（一）配偶；（二）父母、子女；（三）其他近亲", chapter: "第二章 自然人"},
  {id: 16, topic: "专题一 民法典总则编", type: "multiple", question: "陈某夫妇因意外事故双亡，二人的儿子陈畅刚刚年满3周岁。根据民法典总则编及相关规定，下列关于陈畅的监护人的哪些说法是正确的？", options: {"A": "可以由陈畅的祖父母、外祖父母中的一人或数人担任监护人", "B": "对担任监护人有争议的，可以由陈畅住所地的居民委员会在近亲属中指定", "C": "陈畅的祖父被指定担任监护人后，可以自行变更监护人", "D": "若关系密切的其他亲属、朋友愿意承担监护责任，经陈畅住所地的居民委员会同意，也可以作为陈畅的监护人"}, answer: "ABD", explanation: "。A.D选项《民法典>策27条第2款规定：“未成年人的父母已经死亡或者没有监护能力的，由下列有监护能力的人按顺序伴担任监护人：（一）祖父母、外祖父母（三）其他愿意担任监护人的个人或者组织，但是须经未成年人住所地的居民委员会，村民委员会或者民政部门同意”，因此A、D选项正确。B选项，《民法典》第31条第1款规定：“对查护人的确定有争议的，由被监护人住所地的居民委员会、村民委员会或者民政郎门指定监护人…”，因此B选项正确。C选项，《民法典》第31条第4款规定：“监护人指定后，不得擅自变更”，因此C选项错误。（2017改编）", chapter: "第二章 自然人"},
  {id: 17, topic: "专题一 民法典总则编", type: "multiple", question: "余某与其妻婚后很久才育有一女小翠。不久后余某与妻子离婚，小翠由余某抚养。现余某身患重病，为自己和幼女小翠的未来担忧，欲作相应安排。下列哪些选项是正确的？多选）", options: {"A": "余某可通过遗指定其弟弟在其身故后担任小翠的监护人", "B": "余某可与前妻协议确定，余某不再承担监护职责", "C": "余某可与其堂兄事先协商以书面形式确定堂兄为自己的监护人", "D": "如余某病故，应由余某父母担任小翠的监护人"}, answer: "AC", explanation: "。A选项，（民法典》第29条规定：“被监护人的父母担任监护人的，可以通过遗爆指定监护人”，A选项意欲表达余某“可以”通过遗为小翠指定监护人，该遗寝是否能够生效还密要看余某前斐的态度，因此A选项正确。B选项，根据<总则编司法解释>第8条，订立协议约定免除具有监护能力的父母的监护职资的，人民法院不子支持，因此B选项错误。C选项，《民法典）第33条规定：“具有完全民事行为能力的成年人，可以与其近亲属、其他愿意担任监护人的个人或者组织事先协商，以书面形式确定自己的监护人，在自己丧失或者部分丧失民事行为能力时，由该监护人股行监护职贵”，因此C选项正确。D选项，父母是子女的当然监护人，余某去世后，余某前妻是监护人，因此D选项错误。（法考2017改编）", chapter: "第二章 自然人"},
  {id: 18, topic: "专题一 民法典总则编", type: "single", question: "丧偶的汪某（70岁）有成年子女但独立生活，与同样丧偶的肖某（50岁）十分投缘，汪某与肖某订立书面监护协议约定：“若汪某完全或部分丧失行为能力，由肖某担任汪某的监护人，若肖某履行监护义务、汪某死后遗产一半归肖某所有。对此，下列表述正确的是？", options: {"A": "因汪某有成年子女，监护协议无效", "B": "监护协议中关于遗产处理的部分无效", "C": "汪某丧失或部分丧失行为能力时，肖某按约定成为汪某的监护人", "D": "监护协议的全部约定于注某死亡时生效"}, answer: "C", explanation: "。A选项，根据《民法典》第33条意定监护的有关规定，在效力上，成年协议监护优先于法定监护，因此A选项错误。汪某与肖某书面约定有偿设立成年协议监护，该约定符合法律规定，因此B选项错误。关于该监护协议生效的时间，肖某取得汪某一半遗产的约定，为死因行为，须自汪某死亡时才生效：肖某负担监护贵任（负担履行监护义务）的生效时间，为汪某完全成部分丧失行为能力之时。因此C选项正确，D选项误。（法考2019）", chapter: "第二章 自然人"},
  {id: 19, topic: "专题一 民法典总则编", type: "multiple", question: "李小某三岁时，其父母离异，其与父亲李某和祖母王某共同生活，后李某和王某相继离世，其母张某在明知家中已无其他近亲属照料、抚养孩子的情况下，仍不闻不问，拒不履行监护职责，导致李小某处于危困状态。根据民法典总则编及相关规定，下列说法哪些是正确的？", options: {"A": "指定监护人前，可以由民政部门担任季小某的临时监护人", "B": "李某、王某和张某均是李小某的监护人", "C": "张某的监护人资格被撤销后，可以不再履行负担李小某抚养费的义务", "D": "李小某就读的小学可以向人民法院申请撤销张某的监护人资格"}, answer: "AD", explanation: "。A选项，《民法典》第31条第3欺规定：“依据本条第1款规定指定监护人前，被监护人的人身权利、财产权利以及其他合法权益处于无人保护状态的，由被监护人住所地的居民委员会、村民委员会、法律规定的有关组织或者民政部门担任临时监护人”，因此A选项正确。B选项，父母是米成年子女的当然监护人。未成年人李某的父母首先作为其监护人，在其父母均死亡成没有监护能力的情况下，才可由其祖母王某担任监护人，因此B选项错误。C选项，《民法典》第37条规定：“依法负担被监护人抚养费、赠养费、扶养费的父母、子女、配偶等，被人民法院撤销监护人资格后，应当继续履行负担的义务”，因此C选项错误。D选项，根据《民法典》第36条的规定，有权向人民法院申请撤销监护人资格的撤销人包括：①其他依法具有监护资格的人：②居民委员会、村民委员会、学校、医疗机构、妇女联合会、残疾人联合会、未成年人保护组织、依法设立的老年人组织、民政部门等。因此D选项正确。（新编）", chapter: "第二章 自然人"},
  {id: 20, topic: "专题一 民法典总则编", type: "multiple", question: "监护人因发生突发事件等紧急情况暂时无法履行监护职责，被监护人的生活处于无人照料状态的，应当为被监护人安排必要的临时生活照料措施的组织有？多选）", options: {"A": "被监护人住所地的居委会", "B": "被监护人住所地的村委会", "C": "被监护人住所地的民政部门", "D": "被监护人住所地的学校"}, answer: "ABC", explanation: "。《民法典》第34条第4款规定：“因发生突发事件等紧急情况，监护人暂时无法履行监护职贵，被监护人的生活处于无人照料状态的，被监护人住所地的居民委员会、村民委员会或者民政部门应当为被监护人安排必要的临时生活照料措施”，因此A、B、C选项正确，D选项错误。（新编）", chapter: "第二章 自然人"},
  {id: 21, topic: "专题一 民法典总则编", type: "multiple", question: "关于监护，下列哪一表述是错误的？", options: {"A": "市民甲、乙之子丙5周岁，甲乙离婚后对谁担任丙的监护人发生争议，受理离婚案件的人民法院有权指定", "B": "甲的幼子乙在寄宿制幼儿园期间，甲的监护职资全部转移给幼儿园", "C": "甲丧夫后携幼子乙改嫁，乙的爷爷有权要求法院确定自已为乙的法定监护人", "D": "市民甲、乙之子丙5周岁，甲乙离婚后对谁担任丙的监护人发生争议，丙住所地的居民委员会有权指定"}, answer: "ABCD", explanation: "。A选项，父母是未成年子女的监护人，父母高婚不影响法定监护的效力，受理离婚案件的法院无需指定，也无权指定监护人，A选项表述错误。B选项，监护人可以将监护职责部分或全部委托给他人，", chapter: "第二章 自然人"},
  {id: 22, topic: "专题一 民法典总则编", type: "multiple", question: "甲乙婚后生子丙，乙死亡。在丙12岁时，甲因吸毒处分被监护人财产而被撤销监护人资格。以下说法正确的是？", options: {"A": "甲的监护资格撤销后，无需再承担对丙的抚养费义务", "B": "甲的监护资格撤销后，可通过遗指定其母在其死后成为丙的监护人", "C": "甲戒毒成功后可以申请重新担任丙的监护人", "D": "甲能否重新担任丙的监护人需尊重丙的意愿"}, answer: "ACD", explanation: "本题考查监护制度。A选项，《民法典》第36条规定，被申请人住所地的居民委员会、村民委员会、民政部门或者法院有权申请撤销监护，故撤销监护的申请主体多元，题目说甲因吸毒处分被监护人财产而被撤销监护人资格，此为正确表述。B选项，甲监护资格被撤销后，依法仍可立遗嘱指定监护人，但需经被监护人住所地的居民委员会、村民委员会或者民政部门同意，选项中缺少该同意要件，且\"遗\"字疑似\"遗嘱\"之漏字，B选项错误。C选项，根据《民法典》第38条，被监护人的父母或者子女被人民法院撤销监护人资格后，除对被监护人故意犯罪的外，确有悔改表现的，可以申请恢复其监护人资格，C选项正确。D选项，根据《民法典》第38条，恢复监护人资格需尊重被监护人真实意愿，D选项正确。综上，本题答案为ACD。（新编）", chapter: "第二章 自然人"},
  {id: 23, topic: "专题一 民法典总则编", type: "multiple", question: "张某和李某婚后育有一女，因有智力障碍，遭到父母嫌弃。后张某和李某离婚，女儿由张某抚养。某日张某酒后殴打其女，并将其嘴唇剪破，酒醒后将其女送至医院。以下说法正确的有：", options: {"A": "医院可以向人民法院申请撤销监护权", "B": "医院可以向民政部门申请撤销监护权", "C": "张某的监护权被撤销后，法院应当按照有利于被监护人的原则指定监护人", "D": "张某的监护权被撤销后，不可恢复"}, answer: "ABCD", explanation: "。根据《民法典》第36条的规定，有权向人民法院申请撒销监护人资格的撤销人包括：①其他依法具有监护资格的人：②居民委员会、村民委员会、学校、医疗机构、妇女联合会、残疾人联合会、未成年人保护组织、依法设立的老年人组织、民政部门等。因此A、B、C、D选项均正确。（新编）", chapter: "第二章 自然人"},
  {id: 24, topic: "专题一 民法典总则编", type: "multiple", question: "有权向法院提出申请，要求撤销监护人资格的主体有？", options: {"A": "学校", "B": "医疗机构", "C": "未成年人保护组织", "D": "残疾人联合会2020年专刊代理中普格考认"}, answer: "AB", explanation: "。A、B、C选项，《民法典>第39条第1款规定：“有下列情形之一的，监护关系终止：（一）被监护人取得或者恢复完全民事行为能力；（二）监护人丧失监护能力；（三）被监护人或者监护人死亡：（四）人民法冬止有院认定监护关系终止的其他情形”，固此人、B选项正确：监护关系终止应由法院认定，民政部门无救认定监护关系终止，因此C选项借误。D选项，监护人与被监护人无权自行协商解除监护关系，因此D选项确误。（2018）系", chapter: "第二章 自然人"},
  {id: 25, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，导致监护关系以下哪些原因？", options: {"A": "被监护人或者监护人死亡", "B": "监护人丧失监护能力", "C": "经民政部门认定监护关系终止", "D": "监护人与未成年的被监护人协商一致解除监护关"}, answer: "AC", explanation: "。A选项，《民法典》第40条规定：“自然人下落不明满二年的，利害关系人可以向人民法院申请宜告该自然人为失踪人”，因此A选项正确。B选项，宜告失踪不是宣告死亡的必经程序，B选项错误。C选项，《民法典》第42条第1款规定：“失踪人的财产由其配偶、成年子女、父母或者其他愿意担任财产代管人的人代管”，因此C选项正确。D选项，《民法典》第43条第2款规定：“失踪人所欠税款、债务和应付的其他费用，由财产代管人从失踪人的财产中支付”，因此D选项错误。（2013改编）", chapter: "第二章 自然人"},
  {id: 26, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，关于宣告失踪的下列哪些说法是正确的？多选）", options: {"A": "自然人下落不明满二年的，利害关系人可以向人民法院申请宣告其为失踪人", "B": "宜告失踪是宣告死亡的必经程序", "C": "失踪人的财产由其配偶、成年子女、父母或者其他愿意担任财产代管人的人代管", "D": "宣告失踪后，失踪人所欠税款、债务和应付的其他费用应暂停支付"}, answer: "ABD", explanation: "。《民法典》第46条规定：“自然人有下列情形之一的，利害关系人可以向人民法院申请宣告该自然人死亡：（一）下落不明满四年；（二）因意外事件，下落不明满二年。因意外事件下落不明，经有关机关证明该自然人不可能生存的，申请宜告死亡不受二年时间的限制”，因此A、B、D选项正确。《民法典》第41条规定：“自然人下落不明的时间自其失去音讯之日起计算。战争期问下落不明的，下落不明的时间自战争结束之日或者有关机关确定的下落不明之日起计算”，因此C选项错误。（2015改编）", chapter: "第二章 自然人"},
  {id: 27, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列关于宣告失踪和宣告死亡的哪种说法是正确的？", options: {"A": "自然人下落不明满四年的，利害关系人可以向人民法院申请宣告他死亡", "B": "因意外事件，下落不明满两年，利害关系人可以向人民法院申请宣告他死亡", "C": "因战争下落不明的，从下落不明之日起满2年可以申请宜告失踪", "D": "因意外事件下落不明，经有关机关证明该自然人不可能生存的，申请宣告死亡不受2年时间的限制"}, answer: "ACD", explanation: "。A选项，（民法典》第42条第2款的规定：“代管有争议，没有前款规定的人，或者前款规定的人无代管能力的，由人民法院指定的人代管”，因此A选项正确。B、C选项，（民法典》第43条的规定：“失踪人所欠税款、债务和应付的其他费用，由财产代管人从失踪人的财产中支付。财产代管人因故意或者重大过失造成失踪人财产损失的，应当承担赔专脑一民法典总则编借资任”，因出的选项借谈心通项正嘴。D选项（民法翼》管4案属定：“赔产代管人不展行代管职费、使害失除人财产快些成普失代管能力的，失综人的利关系人可以向人民法院中济变更赔产代管人。”因此D选项正崎。（游）", chapter: "第二章 自然人"},
  {id: 28, topic: "专题一 民法典总则编", type: "multiple", question: "下列关于财产代管人，说法正确的有哪些？", options: {"A": "对担任财产代管人有争议的，由法院指定", "B": "失踪人所欠税款、债务和应付的其他费用，由财产代管人垫付", "C": "财产代管人因故意或者重大过失造成失踪人财产携失的，应当形担赠偿责任", "D": "财产代管人不履行代管职责，失踪人的利害关系人可以向人民法院申请变更财产代管人"}, answer: "ACD", explanation: "。A途项，飞机失单属干意外准件，因此华集的配偏在单收发生之日题满2年可申请宣告其究亡，A选项正确。B选项，《民法类》第48条规定：“因考外事体下蒙不明宣告死亡的，意外非体发生之日视为其见亡的日期”，因此零袋死亡日期为2021年6月1日，B选项借供。C选项，《民涨类》第49条现定：“自然人售死亡但是并来死亡的，不影响该自人在被宣告死亡期间实虑的民事法律行为的效力”，C选项为一般笼境性说法，正确。D选项，《民法典》第50规定：“被宣告死亡的人重新出现，经本人或者利害关系人申请.人民法院应当撒销死亡宣告”：因此D选项正确。（新编）", chapter: "第二章 自然人"},
  {id: 29, topic: "专题一 民法典总则编", type: "multiple", question: "李某因所乘飞机失事自2021年6月1日至今下落不明。根据民法典总则编及相关规定，下列哪些说法是正确的？(多选）", options: {"A": "李某的配偶申请宜告其死亡，可以自2021年6月1日起满2年向人民法院申请", "B": "如果人民法院宜告李某死亡，则判决宣告之日为李某死亡的日期", "C": "若李某被宜告死亡但并未死亡，其在被宜告死亡期间实施的民事法律行为有效", "D": "若李某重新出现，经其本人申请，人民法院应当撤销死亡宣告"}, answer: "ABCD", explanation: "。A选项，宣告死亡的申请人（利窖关系人）不存在顺序先后的限制，因此人选项错误。B选项，刘某因意外事件下落不明，满2年即可宜告死亡，因此B选项错误。C选项，刘某因意外事件下落不明，意外事件发生之日视为其死亡的日期，刘某死亡的日期应是2020年6月1日，因此C选项错误。D选项，自然人被宜告死亡但是并未死亡的，不影响该自然人在被宣告死亡期回实施的民事法律行为的效力，但是其在被宣告死亡期间所实施的民事法律行为的效力应具体情况具体分析（可能有效、无效、效力待定，可撤销），并非一定有效，因此D选项错误。（新编）", chapter: "第二章 自然人"},
  {id: 30, topic: "专题一 民法典总则编", type: "multiple", question: "2020年6月1日，家住北京市通州区的刘某乘坐某航班从马来西亚飞回北京。飞机中途失事，至今下落不明。刘某的父母担心刘某妻子带房改嫁，于2022年8月15日向通州区人民法院申请宜告刘某死亡。下列哪些说法是错误的？", options: {"A": "如果刘某的妻子不宣告刘某死亡，刘某的父母不能申请宣告刘某死亡", "B": "刘某的父母申请宣告刘某死亡距刘某下落不明尚不满4年，不符合宣告死亡的要求", "C": "如通州区法院宣告刘某死亡，则判决作出之日视为刘某死亡的日期", "D": "如通州区法院宣告刘某死亡但是刘某并未死亡的，在被宣告死亡期间刘某所实施的民事法律行为均有效"}, answer: "ABD", explanation: "。A选项，《民法典》第51条规定：“被宣告死亡的人的婚姆关系，自死亡宜告之日起消除。死亡宣告被撒销的，婚姻关系自撤销死亡宣告之日起自行恢复。但是，其配偶再婚或者向婚姻登记机关书面声明不愿意恢复的除外”，甲的死亡宣告被撤销，乙未再婚，也未向婚姻登记机关书面声明不愿意恢复其与甲的婚姻关系，因此甲、乙之向的婚姻关系自撒销死亡宣告之日起自行恢复，A选项正确。B、D选项，甲被宜告死亡后，作为其唯一地永人的乙堆永了中所有财产，乙将家里桥车册送给弟弟内的行为属于有权久分，川与合同合法有效，丙无退还轿车的义务，因此B、D项均正确。C选项，甲被宜告死亡但是并未苑亡。不影响甲在被宜告死亡期间实施的民事法律行为的力、因此甲与丁签订的买实合同，不会因为甲被宜告死亡而无效。另外甲单独处理共有财产属于无权处分，《合间编通则可法解释）第19条规定：“以转让或者设定财产权利为目的订立的合同，当事人或者其正权利人仅以让与人在订立合同时对标的出没有所有权或者处分枚为由主张合同无效的、人民法院不予支持”。因此该买卖合同不会因为甲对于住房的无权处分行为因无效，因此C选项错误。（法考题改编，思维扩展）", chapter: "第二章 自然人"},
  {id: 31, topic: "专题一 民法典总则编", type: "multiple", question: "申出境经商下落不明，2025年9月其妻乙请求2026年本代理格考社某县法院宜告死亡。其后乙未再婚，乙是甲唯一的继承人。2026年3月、乙将家里的一辆轿车赠送给了弟弟丙，交付并办理丁过户登记。2026年4月，经商失败的甲返回该县，为还侦将登记于自已名下的一套夫妻共有住房私自买给知情的丁。同年7月，甲的死亡宜告被撤销。根据民法典及相关规定，下列哪些说法是正确的？", options: {"A": "甲、乙的婚姻关系自撤销死亡宜告之日起自行恢复", "B": "乙有权赠与该轿车", "C": "甲出卖房屋的行为无效", "D": "丙可不返还该轿车"}, answer: "BD", explanation: "。A选项，袁某被宜告失踪后，其民事行为能力不受影响，因此A选项错误。B选项，《总则编司法解释>第16条规定，被申请人的债权人、债务人、合伙人等民事主体不能认定为宜告死亡的利害关系人，债权人胡某无权向法院申请宜告袁某死亡，因此B选项正确。C选项，自然人下落不明满2年的，利害关系人可以向人民法院申请宜告该自然人为失踪人。其中，配偶和父母均为利害关系人且申请宣告失踪无顺序先后的限制。袁某的配偶祖某有权申请袁某失踪，袁某父母不同意的，不可以申请撤回失踪宣告，因此C选项错误。D选项，《民法典》第1079条规定，一方被宜告失踪，另一方提起离婚诉讼的，应当准子高婚，因此祖某提出离婚诉讼，法院应当准许；D选项正确。（法考2022，思维扩展）", chapter: "第二章 自然人"},
  {id: 32, topic: "专题一 民法典总则编", type: "multiple", question: "袁某和祖某系夫妻，后二人吵架，袁某离家出走。2年后，依祖某申请，法院宣告袁某失踪。四年后，因袁某一直未偿还借款债务，债权人胡某申请法院宣告袁某死亡。关于本案，下列说法正确的有？", options: {"A": "袁某被宣告失踪后，丧失民事行为能力", "B": "胡某的宣告申请，法院不应予以支持", "C": "袁某父母不同意，可以申请撤回失踪宜告", "D": "祖某提出离婚诉讼的，法院应当准许"}, answer: "AB", explanation: "。雪崩属于意外事件，因此甲的妻子可以在重崩之日起满2年宜告甲死亡，A选项正确。《民法典》第47条规定：“对同一自然人，有的利害关系人中请宜告死亡，有的利害关系人申请宣告失踪，符合本法规定的宜告死亡条件的，人民法院应当宣告死亡”，B选项正确。甲因意外事件下落不明被宜告死亡的，意外事件发生之日视为其死亡的日期，C选项错误。甲被宜告死亡后重新出现，可以由其本人或者利害关系人申请撤销死亡宜告，D选项错误。（新编）专一民法典总则编维续", chapter: "第二章 自然人"},
  {id: 33, topic: "专题一 民法典总则编", type: "multiple", question: "甲于2023年1月1日在攀爬雪山返程途中不幸遭遇雪崩而下落不明，根据民法典总则编以及相关规定，下列说法正确的有哪些？", options: {"A": "甲的妻子可以自2023年1月1日之日起满两年向法院申请宣告甲死亡", "B": "如果甲的父母申请宣告死亡，甲的妻子申请宜告失踪的，法院应当宜告死亡", "C": "如果人民法院宜告甲死亡，则甲的死亡日期为法院判决宜告之日", "D": "如果甲重新出现，只能由甲向人民法院撤销死亡宜告"}, answer: "ACD", explanation: "，A连堆《底法）第13条展定：“自船人从出生叶是吃亡时止，其有府董权利能力，你法集有事权付，世民业义券”，因此大选项正嘴。遇项，自终人账货年协和情净快步分力不同快的民事行能力，集民难存为偿力不是从出生时即产生，因此B选项借误。C、D逐，《民法美>诺S9条境定：“法人的陷董权利能方和民事行办能力，从法人成业时产生，到决人终止时消灭”，因此C、D选项函确。（2012）", chapter: "第二章 自然人"},
  {id: 34, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编皮相关规定，关于民事仅利能力和民事行为能力，下列哪些说法是正确的？多选）", options: {"A": "自然人的民事权利能力出生时产生，死亡时消灭", "B": "自然人的民事行为能力出生时产生，死亡时消灭", "C": "法人的民事权利能力成立时产生，终止时消灭", "D": "法人的民事行为能力成立时产生，终止时消灭"}, answer: "AB", explanation: "。A选项，法人的民业权利力和民事行为能力，从涨人成立时产生，到法人终止时消灭，因此美新公司从其依法成立时具有民事权利能力和民事行为能力，A选项正确。B、C、D选项，《民法典》第60条规定：“法人以其全部财产独立承担民事贵任”：《民法典》第61条规定：“代表法人从事民事活动的负费人，为法人的法定代表人。法定代表人以法人名义从事的民事活动，其法律后果由法人承受…”线某为英新公司的法定代表人，其经营活动以及美新公司在经营活动中的债务均由美新公司独立承担，因此B选项正确，C、D选项错误。（2011）", chapter: "第三章 法人和非法人组织"},
  {id: 35, topic: "专题一 民法典总则编", type: "multiple", question: "村民钱某与村办食品厂共同设立了具有独立法人资格的“美新农副产品有限资任公司\"（以下简称“美新公司\"）.战某担任公司的法定代表人。根据民法典总则编及相关规定，下列说法哪些是正确的？多选）", options: {"A": "美新公司从其依法成立时具有民事权利能力和民事行为能力", "B": "美新公司对钱某的经营活动承担民事责任", "C": "美新公司在经营活动中产生的务由钱某、食品厂按各自的出资比例承担", "D": "钱某和食品厂对美新公司在经营活动中产生的务承担连带责任"}, answer: "ABCD", explanation: "。《民法典》第75条的规定：“设立人为设立法人从事的民事活动，其法律后果由法人承受；法人未成立的，其法律后果由设立人承受，设立人为二人以上的，享有连带债权，承担连带债务。设立人为设立法人以自己的名义从事民事活动产生的民事贵任，第三人有权选择请求法人或者设立人承担”，因此A、B、C选项正确。《民法典》第74条的规定：“法人可以依法设立分支机构…分支机构以自己的名义从事民事活动，产生的民事责任由法人承担………”，D选项正确。（新编）", chapter: "第三章 法人和非法人组织"},
  {id: 36, topic: "专题一 民法典总则编", type: "single", question: "甲乙丙丁戊五个人均为执业两年以上的专利代理师，协商一致打算成立知识产权代理有限责任公司，关于公司设立过程中法律后果的承担，以下说法正确的有哪些？", options: {"A": "该协议仅对乙丙两公司具有约束力，对甲公司的债权人", "B": "该协议无效，应当由乙丙两公司对甲公司的优务承担连", "C": "该协议有效，甲公司的债权人只能请求乙公司对甲公司", "D": "该协议效力待定，应当由甲公司的债权人选择分立后的公司清偿债务"}, answer: "A", explanation: "（民法典》第67条第2款现定：“次人分立的，分立后的法人享有连带借权，承担连带债务，但是债权人和债务人另有约定的除外”。木题中，甲公司分立为乙丙两公司后的约定对内有效，对外并不当然有效，除非债权人和债务人另有约定，因此人选项正确，B、C、D选项错误。（法考2019）", chapter: "第三章 法人和非法人组织"},
  {id: 37, topic: "专题一 民法典总则编", type: "multiple", question: "下列情形中，属于法人解散的原因的有哪些？", options: {"A": "被吊销营业执照", "B": "被吊销登记证书", "C": "章程规定的存续期间届满", "D": "变更名称"}, answer: "ABC", explanation: "。《民法典》第69条规定：“有下列情形之一的，法人解傲：（一）法人章程规定的存续期间届满或者法人章程规定的其他解散事由出现：（二）法人的权力机构决议解：（三）因法人合并或者分立需要解攸：（四）法人依法被吊销营业执照、登记证书，被责令关闭或者被撤销；（五）法律规定的其他情形。”，变更名称不属于上述情形，因此A、B、C选项正确，D选项错误。（新编）", chapter: "第三章 法人和非法人组织"},
  {id: 38, topic: "专题一 民法典总则编", type: "multiple", question: "关于法人，下列哪一表述是正确的？", options: {"A": "社会团体法人均属非营利法人", "B": "基金会法人属于捐助法人", "C": "社会团体法人可以属于营利法人", "D": "民办非企业单位法人属于营利法人"}, answer: "AB", explanation: "。《民法典》第87条规定“非营利法人包括事业单位、社会团体、基金会、社会服务机构等”，因此，A选项正确、C选项错误，D选项中的民办非企业单位属于社会服务机构，因此属于非营利法人，D选项错误。《民法典》第92条规定，“具备法人条件，为公益目的以捐助财产设立的基金会、社会服务机构等，经依法登记成立，取得捐助法人资格”，因此B选项正确。（新编）", chapter: "第三章 法人和非法人组织"},
  {id: 39, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典及相关规定，下列关于事业单位法人的说法哪些是错误的？多选）", options: {"A": "具备法人条件的事业单位从成立之日起取得法人资格", "B": "事业单位法人名誉权遭受侵害的，有权诉请精神损害赔偿", "C": "所有事业单位法人的全部经费均来自国家财政拨款", "D": "国家举办的事业单位对其直接占有的动产享有所有权"}, answer: "ABCD", explanation: "。A选项，《民法典》第88条规定：“具备法人条件，为适应经济社会发展要，提供公益服务设立的事业单位，经依法登记成立，取得事业单位法人资格；依法不需要办理法人登记的，从成立之日起，具有事业单位法人资格”，因此A选项错误。B选项，只有自然人享有主张精神损害赔偿的权利，法人不具有主张精神损害赔偿的权利，因此B选项错误。C选项，事业单位分为全额按款、自负盈亏的事业编制，并非所有事业单位的经费均来自国家财政按款，因此C选项错误。D选项，《民法莫》第256条规定：“国家举办的事业单位对其直接支配", chapter: "第三章 法人和非法人组织"},
  {id: 40, topic: "专题一 民法典总则编", type: "single", question: "关于民法典对法人分类的规定，下列哪些表述是正确的？", options: {"A": "社团法人、营利法人、机关法人", "B": "营利法人、非营利法人、特别法人", "C": "机关法人、企业法人、特别法人", "D": "企业法人、非营利法人、财团法人"}, answer: "B", explanation: ".根据《民法典>第一启则编第三章的规定，对法人分类色榜警利法人、非管利法人、特别法人，因此A、C、D选项借误，B选项正嚼。（2018）", chapter: "第三章 法人和非法人组织"},
  {id: 41, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典及相关规定，下列哪些组织属于非营利法人多选）", options: {"A": "社会服务机构", "B": "事业单位", "C": "金会", "D": "行政机关"}, answer: "ABC", explanation: "。非管利法人包括事业单位、社会团体、基金会、社会服务机构等，因北A、B、C选项正确。D选项，行政机关属于特别法人，D选项带误。（新编）", chapter: "第三章 法人和非法人组织"},
  {id: 42, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，关于非法人组织，下列说法哪些是正确的？多选）", options: {"A": "非法人组织不具有法人资格，不能以自己的名义从事民事活动", "B": "非法人组织的财产不足以清偿债务的，其出资人或者设立人承担无限责任", "C": "非法人组织解散的，应当依法进行清算", "D": "非法人组织只能确定一人代表该组织从事民事活动"}, answer: "BC", explanation: "。A选项，《民法英》第102条铭1款规定：“非法人组织是不具有法人资格，但是能够依法以自己的名义从事民事活动的组织”，因此A选项错误。B选项，《民法典》第104条规定：“非法人组织的财产不足以清偿价务的，其出资人或者设立人承担无限责任…….”，因此B选项正确。C选项，《民法英》第107条规定：“非法人组织解散的，应当依法进行清算”，因此C选项正确。D选项，《民法典》第105条规定：“非法人组织可以确定一人或者数人代表该组织从事民事活动”，因此D选项错误。（新编）", chapter: "第三章 法人和非法人组织"},
  {id: 43, topic: "专题一 民法典总则编", type: "single", question: "甲企业是由自然人安琚与乙企业（个人独资）各出资500万设立的普通合伙企业，甲企业欠丙企业货款50万元，由于经营不善，甲企业全部资产仅剩20万元。现所欠货款到期，相关各方因货款清偿发生纠纷。对此，下列哪一表述是正确的？", options: {"A": "丙企业只能要求安琚与乙企业各自承担15万元的清偿责任", "B": "丙企业只能要求甲企业承担清偿责任", "C": "欠款应先以甲企业的财产偿还，不足部分由安琚与乙企业承担无限连带责任", "D": "就乙企业对丙企业的应偿债务，乙企业投资人不承担责任"}, answer: "C", explanation: "。A、B、C选项，甲为合伙企业，合伙企业属于非法人组织，其债务应先以其全部财产进行清偿，合伙企业财产不能清偿到期债务的，合伙人承担无限连带责任，连带贵任由法律规定或者当事人约定，不只是合伙人平均承担责任，或只要求合伙企业承担清偿责任，因此A、B选项错误，C选项正确。D选项，乙企业为个人独资企业，属于非法人组织，其债务应先以其全部财产进行清偿，个人独资企业财产不能清偿到期债务的，企业主承担无限责任，因此D选项错误。（法考2016）", chapter: "第三章 法人和非法人组织"},
  {id: 44, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，非法人组织享有下列哪些民事权利？", options: {"A": "隐私权", "B": "健康权", "C": "名誉权", "D": "名称权"}, answer: "CD", explanation: "。《民法典》第110条规定：“自包人享有生命权、身体权、健康权、姓名权、肖像权、名誉权、荣誉权、隐私权、婚烟自主权等权利。法人、非法人组织享有名称权、名誉权和荣誉权”，因此A、B选项错误，C、D选项正确。（2019）", chapter: "第四章 民事权利"},
  {id: 45, topic: "专题一 民法典总则编", type: "single", question: "根据民法典总则编及相关规定，下列哪种民事主体享有姓名权？", options: {"A": "法人", "B": "自然人", "C": "个体工商户", "D": "个人合伙企业"}, answer: "B", explanation: "。只有自然人享有姓名权，法人、个体工商户和个人合伙企业享有名称权，四此A、C、D选项错误，B选项正确。（2017）", chapter: "第四章 民事权利"},
  {id: 46, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典及相关规定，下列说法哪些是正确的？", options: {"A": "自然人享有姓名权，有权依法决定、使用、变更自己的姓名，禁止他人干涉、盗用、假冒", "B": "法人享有名称权，但是不得转让自己的名称", "C": "自然人享有肖像权，未经肖像权人同意，不得以任何目的使用公民的肖像", "D": "法人享有名誉权，禁止用侮辱、谤等方式损害法人的名誉"}, answer: "AD", explanation: "。A选项，《民法典》第1012条规定：“自然人享有姓名权，有权依法决定、使用、变更或者许可他人使用自已的姓名，但是不得违背公序良俗”；《民法典》第1014条规定：“任何组织或者个人不得以干涉、盗用、假冒等方式侵害他人的姓名权或者名称权”；因此A选项正确。B选项，《民法典》第1013条规定：“法人、非法人组织享有名称权，有权依法决定：使用：变更、转让或者许可他人使用自己的名称”；因此B选项错误。C选项，《民法典》第1018条第1款规定：“自然人享有肖像权，有权依法制作、使用、公开或者许可他人使用自己的肖你”；根据《民法典》第1020条的规定，合理实施可以不经肖像权人同意，因此C选项错误。D选项，《民法典》第1024条第1款规定：“民事主体享有名誉权。任何组织或者个人不得以侮母、谁谤等方式役害他人的名誉权”，法人作为民事主体享有名誉权，因此D选项正确。（2011）", chapter: "第四章 民事权利"},
  {id: 47, topic: "专题一 民法典总则编", type: "single", question: "根据民法典总则编及相关规定，下列哪项属于不当得利？", options: {"A": "债务人偿还未到期的债务", "B": "债务人清偿已超过诉讼时效的债务", "C": "养子女向生父母给付赡养费", "D": "顾客多付售货员的货款"}, answer: "D", explanation: "。A、B选项，债务人偿还债务是芸于债权，C选项养子女给付赔养费是基于其负有的赠养义务，以上均是依据法律规定应当得到的利益，不属于不当得利；D选项售", chapter: "第四章 民事权利"},
  {id: 48, topic: "专题一 民法典总则编", type: "single", question: "根据民法典总则编及相关规定.下列哪些情形下当事人获得的利益构成不当得利？单选）", options: {"A": "居民何某位于地快沿线的商品房因地供通车大度升值", "B": "乙公司接收了物流公司误送的甲公司的货物", "C": "蒋某走失的宠物狗得到石某的喂养、照顾", "D": "李某屋内的积水由邻居帮助排出"}, answer: "B", explanation: "。A违项，何其的收些属干自增值，不悔虑不当作待。B项，乙公司接收供选的货物设有合法模：属平不当得利。C选埃属干无因管理，不悔成不监得利。D违项属于带里正，不悔成不当排利。(2011)", chapter: "第四章 民事权利"},
  {id: 49, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编对知识产权的相关规定，以下属于知识产权客体的是？多选）", options: {"A": "发明", "B": "网络虚拟财产", "C": "商业秘密", "D": "个人信息"}, answer: "AC", explanation: "。A、C选项，（民法典）第123条第2款规定：知识产权是权待人依法就下列容单有的专有的权科：（二）发明、实用新型、外观设计：：（企）离业秘密：…\"，因此A、C选项正确。B选项网络虚拟财产属于财产权，D选项个人信息属干人身权，均不属于知识产权客体，因此B、D选项错误。（2018）", chapter: "第四章 民事权利"},
  {id: 50, topic: "专题一 民法典总则编", type: "single", question: "甲公司向法院起诉乙公司产品侵犯其专利权，法院未作出判决前，甲公司在社交媒体上对乙公司产品侵犯其专利权的情况进行了宣传，根据民法典总则编规定，甲公司的行为侵犯了乙公司的哪项权利？", options: {"A": "名誉权", "B": "荣誉权", "C": "隐私权", "D": "名称权"}, answer: "A", explanation: "。甲公司在法院未判决前，就在社交媒体上宣传乙公司产品便犯其专利权，可能会使公众对乙公司的商业信誉、产品声誉产生负面评价，犯了乙公司的名权。（新编）为", chapter: "第四章 民事权利"},
  {id: 51, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列关于民事法律行为的哪些说法是正确的？", options: {"A": "民事法律行为是民事主体设立、变更、终止民事法律关系的行为", "B": "意思表示真实是民事法律行为有效的条件之一", "C": "民事法律行为一律不能采取口头形式", "D": "民事法律行为从成立时生效，法律另有规定或当事人另有约定的除外"}, answer: "ABD", explanation: "。A选项，《民法典》第133条规定：“民事法律行为是民事主体通过意思表示设立、变更、终止民事法律关系的行为”，因此A选项正确。B选项，《民法典》第143条规定：“具备下列条件的民事法律行为有效：（二）意思表示真实……，因此B选项正确。C选项，（民法典》第135条规定！“民事法律行为可以采用书面形式、口头形式或者其他形式”，因此C选项仆误。D选项，（民法典）第136条第1救规定：“民事法律行为自成立时生效，但是法律另有规定或者当事人另有约定的除外”，因此D选项正确。（2015改编）", chapter: "第五章 民事法律行为"},
  {id: 52, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列哪些情形构成意思表示？多选）", options: {"A": "孙某临终前在日记中写道：若离人世，愿将个人藏书赠与好友汪某", "B": "何某向一台自动售货机投币购买饮料", "C": "张某对李某说：我儿子如果考上重点大学，我一定请你", "D": "潘某在寻物启事中称，愿向送还失物者付酬金500元"}, answer: "ABD", explanation: "。A选项，孙某通过日记将其个人藏书赠与好友汪某的行为属于遗赠行为，构成意思表示。B选项，自动售货机的价格设亚属于要约，购买人的投币行为属于承诺，因此何某向一台自动售货机投币购买伙料的行为构成意思表示。C选项，请客吃饭属于好意施惠，是日常生活中的人际交往情谊行为，张某的行为不构成意思表示。D选项，悬赏广告属于单方允诺的意思表示，潘某的行为构成意思表示。（新编）", chapter: "第五章 民事法律行为"},
  {id: 53, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列哪些属于无效民事法律行为？", options: {"A": "无民事行为能力人实施的民事法律行为", "B": "恶意申通，损害他人利益的民事法律行为", "C": "行为人对行为内容有重大误解的民事法律行为", "D": "一方当事人利用对方处于危困状态，致使显失公平的民事法律行为"}, answer: "AB", explanation: "。A选项，（民法典》第144条规定：“无民事行为能力人实施的民事法律行为无效”，因此A选项正确。B选项，《民法典》第154条规定：“行为人与相对人恶意串通，损害他人合法权益的民事法律行为无效”，因此B选项正确。C、D选项，（民法）第147条规定：“基于重大误解实施的民事法律行为，行为人有权请求人民法院或者仲装机构予以撤销\"：（民法典>第151条规定：“一方利用对方处于危困状态、缺乏判断能力等情形，致使民事法律行为成立时显失公平的，受损害方有权请求人民法院或者仲裁机构予以撤销”，因此C、D选项属于可撒销的民事法律行为，不属于无效的民事法律行为。（2012改编）", chapter: "第五章 民事法律行为"},
  {id: 54, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列哪些民事行为无效？", options: {"A": "周某因欠赌價而向孟某出具欠条", "B": "甲与乙签订了一份购房合同，后因房价上涨，申申通丙订立了另一份购房合同，并将该房屋过户给丙，致使乙无法获得房屋", "C": "12岁的小学生给游戏账户充值一万元", "D": "王某利用李某没有经验，以1万元的价格从李某手中购进一套价值50万元的旧版人民币"}, answer: "AB", explanation: "。A选项，周某欠赌债属于违反法律规定的民事法律行为，该民事法律行为无效。B选项，甲串通丙恶意损害乙的利益，使乙无法取得房屋的所有权，甲和丙的行为属于思意串通，这行为无效。C选项，", chapter: "第五章 民事法律行为"},
  {id: 55, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典的规定，下列哪些行为属于无效的民事法律行为？", options: {"A": "7岁儿童刘某给游戏主播打赏的民事法律行为", "B": "张某在受欺诈状态下所实施的民事法律行为", "C": "甲装饰公司卖给乙公司100盛吸顶灯，乙公司发现甲公司营业执照上的核准经营范围仅为装饰业务，遂起诉请求法院确认该买卖合同无效", "D": "李某将其合法持有的猎枪出售给未取得持枪许可的朋友"}, answer: "AD", explanation: "。A选项无民事行为能力人实施民事法律行为无效。B选项受欺诈而实施的民事法律行为属于可撤销的民事法体行为。C选项甲销售吸顶灯的行为只是超出营业执照的经管范围，并未违反法律、行政法规的强别性规定，因此不属于无效的民事法律行为。D选项买卖借枪违反了法律、行玫法规的强制性规定，属于无效的民事法律行为。（新编）", chapter: "第五章 民事法律行为"},
  {id: 56, topic: "专题一 民法典总则编", type: "single", question: "中和乙签订了两份房屋买卖合同，第一份约定房屋价款500万元，注明房屋过户备案事项不按此合同履行。第二份合同约定房屋价款200万元，房屋过户备案事项按此合同履行。关于两份合同，下列哪一选项正确？", options: {"A": "第一份合同部分无效，第二份合同无效", "B": "第一份合同有效，第二份合同部分无效", "C": "两份合同均无效", "D": "两份合同均有效"}, answer: "B", explanation: "。（民法典）第146条规定：“行为人与相对人以虚假的意思表示实施的民事法律行为无效。以虚假的意思表示隐的民事法律行为的效力，依照有关法体规定处理。”虚假的意思表示以及隐限的民事法律行为常表现为“阴阳合同”。本题中，甲乙二人为房屋过户备案事项签订的第二份合同为“阳合同”。该合同中关于“房屋价款200万元“的约定系虚假的意思表示，该合同中有关价款的部分无效。以虚假的意思表示隐蓝的民事法律行为的效力，即“阴合同”，本题中第一份房屋买卖合同为甲乙二人真实的意思表示，该份合同有效。因此，B选项正确。（法考2020，思维扩展）", chapter: "第五章 民事法律行为"},
  {id: 57, topic: "专题一 民法典总则编", type: "single", question: "下列属于可撤销合同情形的是？", options: {"A": "违反法律法规强制规定的", "B": "以恶意串通损害他人利益的", "C": "因重大误解签订的", "D": "以虚假的意思表示签订的"}, answer: "C", explanation: "。A选项，违反法律、行政法规的强制性规定的民事法律行为无效。B选项，恶意串通损害他人利益的民事法律行为无效。C选项，基于重大误解实施的民事法律行为可撤销。D选项，以虚假的意思表示实施的民事法律行为无效。（新编）", chapter: "第五章 民事法律行为"},
  {id: 58, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典及相关规定，下列哪些属于当事人可以请求人民法院撤销的合同？多选）", options: {"A": "甲公司与乙公司恶意申通签订的损害丙公司利益的买卖合同", "B": "贾某以欺诈的手段使齐某在违背真实意思的情况下与之订立的买卖合同", "C": "韩某把一个古董花瓶错当成现代仿制花瓶与赵某签订的买卖合同", "D": "非法垄断技术的技术合同"}, answer: "BC", explanation: "。A选项恶意串通损害他人利益的民事法律行为无效。B选项，以欺诈手段实施的民事法律行为可撤俏。C选项，够其的行为构成重大误解，因此C选项属于可撤销合同。D选项，（民法典》第850条规定：“业法垄断技术或者使害他人技术成果的技术分间无效”，因此D选项属于无效合同。（2012）", chapter: "第五章 民事法律行为"},
  {id: 59, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编关于显失公平民事法律行为的相应规定，一方利用对方处于以下哪种情形时，致使民事法律行为成立时显失公平，受损害方有权请求予以撤销？多选）", options: {"A": "无民事行为能力", "B": "处于危困状态", "C": "缺乏判断能力", "D": "虚假意思表示"}, answer: "BC", explanation: "。根据《民法典》第151条的规定，显失公平是指，一方利用对方处于充团状态、缺乏判断能力等情形，致使民事法律行为成立时显失公平，受损事方有权请求人民法院或者仲载机构予以撤销。因此A、D选项错误，B、C选项正确。（2018）", chapter: "第五章 民事法律行为"},
  {id: 60, topic: "专题一 民法典总则编", type: "single", question: "王某明知自己某项专利技术落人他人专利保护范围，仍与不知情的甲公司签订专利权转让合同，并隐了专利侵权的问题。根据民法典及相关规定，下列关于该合同效力的说法哪个是正确的？", options: {"A": "有效", "B": "无效", "C": "效力待定", "D": "可撤销"}, answer: "D", explanation: "。本题中，王某隐萌专利俊权的事实，构成欺诈，基于欺诈所签订的合间属于可撤销的合同，因此A、B、C选项钳误，D选项正确。（2019）", chapter: "第五章 民事法律行为"},
  {id: 61, topic: "专题一 民法典总则编", type: "multiple", question: "金某家中有一块祖传玉佩。当地著名企业家孟某甚是喜爱，多次上门求购，均被金某拒绝。2022年2月1日，孟某的生意伙伴曹某为讨孟某欢心，对金某讲：“三日内不将玉佩卖给孟某，小心金某在某高中上学的女儿”。金某心生恐惧，次日主动以5万元出售给孟某。2025年3月2日，女儿留学德国，金某再无后顾之优，于3月10日向法院起诉要求撤销玉佩买卖合同。关于本案，下列哪一说法是正确的？多选）", options: {"A": "无论孟某是否知道曹某胁迫金某一事，金某均有权请求撤销与孟某的玉佩买卖合同", "B": "只有当孟某知道曹某胁迫金某一事，金某才有权请求撤销与孟某的玉佩买卖合同", "C": "金某基于受胁迫撤销玉佩买卖合同的权利因超过1年除斥期间而不予支持", "D": "金某最迟应当自2022年2月2日起五年内行使撤销权"}, answer: "AD", explanation: "。根据《民法典》第150条的规定：“一方或者第三人以胁迫手段，使对方在违背真实意思的情况下实施的民事法律行为，受胁迫方有权请求人民法院或者仲裁机构予以撤销。”本题属于第三人胁迫，第三人实施胁迫行为不论相对人是否知情，受胁迫方都可以行使撤销权。曹某以金某上商中的女儿相威胁，金某出于恐俱心理，将祖传玉佩出售给了孟某。曹某实施的胁迫行为不论孟某是否知情，金某均有权要求撤销其与孟某问的买卖合同，因此A选项正确，B选项错误。根据（民法典）第152条的规定，当事人受胁迫，自胁迫行为终止之日起一年内没有行使撤销权的，撤销权消灭。当事人自民事法律行为发生之日起五年内没有行使撤销权的，撤销权消灭。本题中，金某的女儿2025年3月2日出国留学，励追行为终止，因此，金某起诉时并未超过除斥期问，C选项错误。金某受胁迫将玉佩出售给孟某的时同为2022年2月2日，因此金某应当自该行为发生之日起5年内行使撤销权，D选项正确。（新编）", chapter: "第五章 民事法律行为"},
  {id: 62, topic: "专题一 民法典总则编", type: "single", question: "齐某扮成建筑工人模样，在工地旁摆放一尊廉价购得的旧蟾蜍石雕，冒充新挖出文物等待买主。甲曾以5000元从齐某处买过一尊同款石雕，发现被骗后正在和齐某交涉时，乙过来对乙说：“我之前从他这买了一个，转手就赚了，这个你不要我就要了。“乙信以为真，以5000元买下石雕。关于所涉民事法律行为的效力，下列哪一说法是正确的？", options: {"A": "乙可向甲主张撤销其购买行为", "B": "乙可向齐某主张撤销其购买行为", "C": "甲不得向齐某主张撤销其购买行为", "D": "乙的撤销权自购买行为发生之日起1年内不行使则消灭"}, answer: "B", explanation: "。A、B，甲关欺诈行为，使乙在违背其实宽愿的情况下以5000元购买了并某的石隐：并某在坊却未作反对获示，应认定为其知道甲实此诈行为，受欺诈方乙可以请求法院成仲裁机构改销与养某的购买行为，因此A选项借误，B选项正确。C选项，齐其将度价石难以5000元的价格出售给甲的行为构成欺谁，甲可以向齐某主张撤销其购买行为，因此，C选项错误。D选项，当事人自知道或者应当知道撤销本由之日起1年内成是当事人自民事法律行为发生之日起5年内没有行使微销权的，撤销权消灭，因此乙应在其知晓受欺诈事实的1年以内行使激销权，且撤销权最迟应在购买行为发生之日起5年内行使，D选项错误。（法考2017）", chapter: "第五章 民事法律行为"},
  {id: 63, topic: "专题一 民法典总则编", type: "multiple", question: "乙公司以国产牛肉为样品，伪称某国进口牛肉，与甲公司签订了买卖合同，后甲公司得知这一事实。此时恰某国流行疯牛病，某国进口牛肉滞销，国产牛肉价格上涨。下列哪些说法是正确的？多选）", options: {"A": "甲公司有权自知道样品为国产牛肉之日起一年内主张撤销该合同", "B": "乙公司有权自合同订立之日起一年内主张撤销该合同", "C": "甲公司有权决定履行该合同，乙公司无权拒绝履行", "D": "在甲公司决定撤销该合同前，乙公司有权按约定向甲公司要求支付货款"}, answer: "ACD", explanation: "。A、B选项，乙公可以国产牛内伪称某国进口牛肉的行为构成欺许，受败诈方即申公司有权向法院主张撤销合同，欺诈方乙公司则无此权利，受欺诈方应当自知道或应当知道撤销事由之日起1年内行使数销权，因此A选项正确，B选项错误。C、D选项，可撤销的民事法律行为（合同）在没有被撤销前是有效的，因此，甲公司有权决定履行该合同，乙公司无权拒绝，乙公司履行合同后也有权按约定向甲公司要求支付货款，因此C、D选项正确。（法考2009）", chapter: "第五章 民事法律行为"},
  {id: 64, topic: "专题一 民法典总则编", type: "multiple", question: "王某与张某签订了一个二手汽车买卖合同，但王某隐瞒了该汽车存在重大质量瑕疵的情况。根据民法典及相关规定，下列说法哪些是正确的？多选）", options: {"A": "张某有权请求人民法院确认该买卖合同无效", "B": "张某有权请求人民法院撤销该买卖合同", "C": "张某有权请求仲裁机构确认该买卖合同无效", "D": "张某有权请求仲裁机构撤销该买卖合同"}, answer: "BD", explanation: "。本题中，王某隐明了该汽车存在重大质量瑕疫，属于欺诈行为，根据《民法典》第148条的规定，张某有权请求人民法院或仲裁机构撤销该买卖合同，因此A、C选项错误，B、D选项正确。（新编）", chapter: "第五章 民事法律行为"},
  {id: 65, topic: "专题一 民法典总则编", type: "multiple", question: "钱某做生意时，因销售商刘某亏损无钱支付货款90余万，于是刘某在2020年2月28日便将其早年拍卖会上以100多万元拍得一幅徐悲鸿奔马图抵价。钱某不喜收藏，欲将该画出售给古玩商高某。2020年3月6日，高某伙同艺术品鉴定家孟某欺骗钱某该画是高仿品，价值不超过10万元、钱某信以为真，非常快恼，但是并未出售。钱某无奈，在2020年3月15日以10万元的价格将该奔马图卖给了不知情的陈某。2020年8月7日，刘某找出了当年拍得奔马图后请徐悲鸿遗端廖静文女士签定为真品的证明书，钱某才知道其售出的奔马图确为真品，目前市场价格为500万元。根据民法典及相关规定，下列说法哪些是正确的？多选）", options: {"A": "钱某因受欺诈而出售奔马图，可以请求人民法院予以撤销", "B": "钱某因重大误解而出售奔马图，可以请求人民法院予以撤销", "C": "钱某可以在知道重大误解事由之日起90日内书面通知陈某，声明因重大误解而撤销奔马图买卖合同", "D": "如果钱某一直不知道撤销事由，自2020年3月15日起5年内没有行使撤销权的，撤销权消灭"}, answer: "BD", explanation: "。本题中，钱某将真品画作误认为质品出售，并未受到陈某欺诈，而高某和孟某欺诈钱某，陈某并不知情，钱某将奔马图低价出售给陈某的行为并不是因欺诈面为的行为，钱某将名画出售给陈某时因受商某、孟某的欺诈而陷入对标的物的认识错误，进而将价值500万元的奔马图以10万元出售于陈某，属于重大误解，可以自知道撒销事由之日（2020年8月7日）起90日内请求人民法院或者仲机构撤销该买实合同，而不是书面通知床某撤销，伐某自民事法律行为发生之日（2020年3月15日）起5年内没有行使撤销权的，撒销权消灭，因此A、C选项错误；B、D选项正确。（新编）", chapter: "第五章 民事法律行为"},
  {id: 66, topic: "专题一 民法典总则编", type: "multiple", question: "某日，李某醉酒搭乘出租车回家，车程20公里。李某下车前用手机支付车费。误将80元输错成8080元。司机收到后，未提醒李某。对此，下列哪些选项是正确的？", options: {"A": "该运输合同因显失公平而可撤销", "B": "对于多付的8000元视为李某对司机的赠与", "C": "醉酒不影响该运输合同的效力", "D": "李某有权请求出租车司机返还8000元不当得利"}, answer: "CD", explanation: "。A、C选项；显失公平，是指一方利用对方处于危困状态、缺乏判断能力等情形，致使民事法律行为成立时显失公平。李某醉酒打车，与出租车公司订立了运输合同。出租车公司的司机并未利用李某因醉酒而缺乏判断力与其实施显失公平的民事法律行为。因此，不影响该运输合同的效力，A选项错误，C选项正确。B、D选项，不当得利是指，因他人没有法律根据，取得不当利益，受损失的人有权请求其返还。李某将8000元给予司机欠缺法律上的依据，且李某并无赠子的意思表示；李某与司机之向、构成了不当得利之债，受损害方李某有权要求司机返还，因此B选项错误，D选项正确。（法考2020）", chapter: "第五章 民事法律行为"},
  {id: 67, topic: "专题一 民法典总则编", type: "single", question: "某日，古玩爱好者王某在本地经常光顾的古玩街花费数万元购买了一对青铜烛台，疑为明代真品。后经鉴定，该烛台为现代仿品，仅值数百元，对此，下列哪一说法是正确的？", options: {"A": "王某可主张存在重大误解，请求撤销合同", "B": "王某意思表示真实有效，无权请求撤销合同", "C": "王某可主张存在显失公平，请求撤销合同", "D": "王某可主张其被出卖人欺诈，请求撤销合同"}, answer: "B", explanation: "。重大误解，是指行为人对行为的性质、对方当事人或标的物的品种、质量、规格、价格、数量等产生错误认识，按照通常理解如果不发生该错误认识行为人就不会作出相应意思表示。本题中，双方当事人交易的标的物是“古玩”，属于特殊商品，由买受人通过实物查看，自行判断商品价值，并与出卖人达成交品合意，即便买受人确实对商品价值存在误判，也不构成法律上所认可的重大误解。因此，A项错误；B项正确。C选项，虽然王某花费数万元购买了仅值数百元的背铜烛台，客观上价格相差悬殊。但是，主观上，出卖人并未“利用”王某处于危困状态、缺乏判断能力。因此，不符合显失", chapter: "第五章 民事法律行为"},
  {id: 68, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列哪些说法是正确的7", options: {"A": "在订立合同时显失公平的，受损害方有权请求人民法院或者仲裁机构撤销", "B": "合同被依法撤销的，该合同自人民法院判决撤销之日起丧失法律约束力", "C": "合同部分无效，不影响其他部分效力的，其他部分仍然有效", "D": "合同被撤销后，因该合同取得的财产应当予以返还；不能返还或者没有必要返还的，应当折价补偿"}, answer: "ACD", explanation: "。A选项，根据《民法典》第151条的规定，显失公平的民事法体行为，受损害方有权请求人民法院或者仲提机构予以收销，因此A选项正确。B选项，（民法典》第155条规定：“无效的或者被激销的民事法律行为自始没有法律约来力”，因此B选项错误。C选项，《民法块》第156条规定：“民事法律行为部分无效，不影响其他部分效力的，其他部分仍然有效”，因此C选项正确。D选项，《民法典》第157条规定：“民事法律行为无效、被撤销或者确定不发生效力后，行为人因该行为取得的财产，应当予以返还：不能返还或者没有必要返还的，应当折价补偿……”，因此D选项正确。（2017）", chapter: "第五章 民事法律行为"},
  {id: 69, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，关于无效、被撤销的民事行为，下列说法正确的是？多选）", options: {"A": "无效的民事行为从行为开始起就没有法律约束力", "B": "无效的民事行为从人民法院确认无效之日起没有法律约束力", "C": "被撤销的民事行为从人民法院撤销该民事行为之日起没有法律约束力", "D": "被撤销的民事行为从行为开始起就没有法律约束力"}, answer: "AD", explanation: "。根据《民法典》第155条的规定，无效的或者被撤销的民事法律行为自始没有法律约束力，因此A、D选项正确，B、C选项错误。（2019)", chapter: "第五章 民事法律行为"},
  {id: 70, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列关于可撤销合同的哪些说法是正确的？多选）", options: {"A": "因重大误解订立的合同，行为人有权请求人民法院或者仲裁机构撤销", "B": "合同被依法撤销的，该合同自人民法院判决撤销之日起丧失法律约束力", "C": "因重大误解订立的合同，具有撤销权的当事人自知道或者应当知道撤销事由之日起90日内没有行使撤销权的，撤销权消灭", "D": "当事人自民事法律行为发生之日起一年内没有行使撤销权的，撤销权消灭"}, answer: "AC", explanation: "。A选项，基于重大误解订立的合同，行为人有权请求人民法院或者仲裁机构予以数销，因此A选项正确。B选项，无效的或者被撤销的民事法律行为自始没有法律约束力，因此B选项错误。C选项，（民法典）第152条规定，重大误解的当事人自知道或者应当知道撤销事由之日起90日内没有行使撤销权的，撒销权消灭，因此C选项正确。D选项，当事人自民事法律行为发生之日起5年内没有行使撤销权的，撒销权消灭，因此D选项错误。（新编）", chapter: "第五章 民事法律行为"},

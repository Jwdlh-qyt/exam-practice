, {"letter": "B", "content": "行政复议机关受理行政复议申请，应当向该专利代理机构收取复议申请费"}, {"letter": "C", "content": "行政复议机关受理行政复议申请，不得向该专利代理机构收取任何费用"}, {"letter": "D", "content": "该专利代理机构可以在法定期限内口头申请"}], "answer": "ABC"}, {"id": 326, "question": "因李某长期在外打工，其存放在路边的一辆电动车被街道办事处当作无主物予以没收处理，以下说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "李某不服该决定的，应当自知道或者应当知道该决定之日起60日内申请行政复议"}, {"letter": "B", "content": "通知书中未载明当事人申请行政复议期限及复议机关，李某可以自知道或者应当知道决定之日起1年内申请行政复议"}, {"letter": "C", "content": "李某一直不知道其电动车被没收，可以自决定作出之日起5年内申请行政复议"}, {"letter": "D", "content": "因不可抗力或者其他正当理由耽误法定申请期限的，申请期限自障碍消除之日起继续计算"}], "answer": "BC"}, {"id": 327, "question": "林某不服县教育局对其作出的某行政行为，欲向行政复议机关申请行政复议。根据行政复议法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "林某若书面申请有困难，可以口头申请行政复议"}, {"letter": "B", "content": "林某可以通过互联网渠道以电子方式书面申请行政复议"}, {"letter": "C", "content": "林某可以通过传真方式申请行政复议"}, {"letter": "D", "content": "林某对县教育局两个以上行政行为不服的，可以一同申请行政复议"}], "answer": "ABCD"}, {"id": 328, "question": "关于行政复议的申请方式，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "申请人可以采取当面递交方式提出行政复议申请"}, {"letter": "B", "content": "有条件的行政复议机构可以接受以电子邮件形式提出的行政复议申请"}, {"letter": "C", "content": "申请人可以采取邮寄方式提出行政复议申请"}, {"letter": "D", "content": "申请人可以采取传真方式提出行政复议申请"}], "answer": "D"}, {"id": 329, "question": "根据行政复议法及相关规定，以下哪些符合行政复议的受理条件？", "type": "多选", "options": [{"letter": "A", "content": "申请人明确"}, {"letter": "B", "content": "行政复议请求和理由具体"}, {"letter": "C", "content": "属于复议机关的管辖范围"}, {"letter": "D", "content": "行政复议机关就同一行政行为受理过申请人提出的行政复议申请对符合条件的于以受理（单选）"}], "answer": "B"}, {"id": 330, "question": "关于行政复议机关收到行政复议申请后，对材料进行审查，以下做法正确的有？多选）", "type": "多选", "options": [{"letter": "A", "content": "行政复议机关认为不属于本机关管辖，应当作出驳回行政复议申请的决定"}, {"letter": "B", "content": "行政复议机关认为不属于本机关管辖，应当作出不予受理的决定"}, {"letter": "C", "content": "行政复议机关认为复议申请材料表述不清楚，无法判断是否符合受理条件，通知申请人进行补正"}, {"letter": "D", "content": "行政复议申请人收到补正通知书后，无正当理由不补正的，行政复议机关应当作出不予受理的决定"}], "answer": "B"}, {"id": 331, "question": "张某对北京市公安局交通管理局依据电子技术监控设备记录的违法事实作出的行政处罚决定不服申请行政复议，以下说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "张某可以直接向北京市政府提交行政复议申请"}, {"letter": "B", "content": "张某可以通过北京市公安局交通管理局向北京市政府提交行政复议申请"}, {"letter": "C", "content": "北京市公安局交通管理局收到复议申请后，认为需要维持行政处罚决定的，应当自收到行政复议申请之日起5日内转送北京市政府"}, {"letter": "D", "content": "北京市公安局交通管理局收到复议申请后，认为决定不合法的，应当变更或撤销原行政处罚决定"}], "answer": "A"}, {"id": 332, "question": "某行政复议机关受理王某提出的行政复议申请后，发现王某在申请行政复议之前已向人民法院提起行政诉讼并被受理。根据行政复议法及相关规定，该行政复议机关应当如何处理？", "type": "单选", "options": [{"letter": "A", "content": "通知人民法院中止审理该行政诉讼"}, {"letter": "B", "content": "将该案移送人民法院一并审理"}, {"letter": "C", "content": "中止审理，在人民法院作出生效判决后维续审理"}, {"letter": "D", "content": "驳回该行政复议申请"}], "answer": "ABCD"}, {"id": 333, "question": "某行政复议机关受理行政复议申请后、发现该行政复议申请不符合行政复议法和行政复议法实施条例规定的受理条件。根据行政复议法及相关规定，该行政复议机关应当如何受理？", "type": "单选", "options": [{"letter": "A", "content": "作出终止行政复议的决定"}, {"letter": "B", "content": "作出驳回行政复议申请的决定"}, {"letter": "C", "content": "作出不予受理的决定"}, {"letter": "D", "content": "作出维持具体行政行为的决定"}], "answer": "BD"}, {"id": 334, "question": "公民、法人或者其他组织依法提出行政复议申请，行政复议机关无正当理由不予受理的情况下，下列说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "上级行政机关应当责令其纠正，但不可以直接受理"}, {"letter": "B", "content": "上级行政机关应当责令其纠正，必要时，上级行政机关也可以直接受理"}, {"letter": "C", "content": "上级行政机关无权责令其纠正，必要时，上级行政机关可以直接受理"}, {"letter": "D", "content": "上级行政机关无权责令其纠正，也不能直接受理"}], "answer": "AB"}, {"id": 335, "question": "行政复议申请材料不齐全或者表述不清楚，无法判断行政复议申请是否符合受理条件的，行政复议机关应当书面通知申请人补正，申请人收到行政机关发出的补正通知书后，应当自收到补正通知之日起（）日内提交补正材料？", "type": "单选", "options": [{"letter": "A", "content": "10"}, {"letter": "B", "content": "7"}, {"letter": "C", "content": "15"}, {"letter": "D", "content": "30"}], "answer": "AD"}, {"id": 336, "question": "以下哪些属于行政复议机关审理行政复议案件的依据？", "type": "多选", "options": [{"letter": "A", "content": "法律"}, {"letter": "B", "content": "法规"}, {"letter": "C", "content": "国务院部门规章"}, {"letter": "D", "content": "地方各级人民政府规章"}], "answer": "CD"}, {"id": 337, "question": "对于行政复议审理过程中举证资任的分配，以下说法正确的有？多选）", "type": "多选", "options": [{"letter": "A", "content": "被申请人只对其作出的行政行为的合法性负有举证责任"}, {"letter": "B", "content": "被申请人对其作出的行政行为的合法性、适当性都负有举证责任"}, {"letter": "C", "content": "申请人不承担举证责任"}, {"letter": "D", "content": "申请人认为被申请人不履行法定职责的，负有举证责任"}], "answer": "BD"}, {"id": 338, "question": "下列有关行政复议机关调查取证说法正确的有？", "type": "多选", "options": [{"letter": "A", "content": "行政复议机关可以主动调查取证"}, {"letter": "B", "content": "行政复议机关可以根据申请人的申请调查取证"}, {"letter": "C", "content": "行政复议机关可以根据行政机关的申请调查取证"}, {"letter": "D", "content": "行政复议机关调查取证时，行政复议人员不得少于3人"}], "answer": "AB"}, {"id": 339, "question": "根据行政复议法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "行政复议决定作出前，申请人可以撤回行政复议申请"}, {"letter": "B", "content": "在行政复议期间，只有申请人才可以查阅、复制被申请人提出的有关材料"}, {"letter": "C", "content": "在行政复议期间，申请人可以查阅、复制所有的证据、提出的书面答复、作出行政行为的证据、依材料"}, {"letter": "D", "content": "在行政复议期间，申请人、第三人及其委托代理人都可以按规定查阅、复制被申请人的证据、材料"}], "answer": "AC"}, {"id": 340, "question": "甲市乙区卫健委因韩某未取得《医疗机构执业许可证》擅自执业，经研究，作出没收违法所得1200元和罚款7000元的决定。韩某不服，申请行政复议。关于此案，下列说法正确的是：", "type": "多选", "options": [{"letter": "A", "content": "乙区政府应当在3日内进行审查，决定是否予以受理"}, {"letter": "B", "content": "乙区政府应当自受理之日起5日内将申请书副本发送给乙区卫健局"}, {"letter": "C", "content": "韩某申请复议材料不齐全的，自收到该行政复议申请之日起5日内书面通知韩某补正"}, {"letter": "D", "content": "乙区卫健局应当自收到行政复议申请副本之日起10日内提交作出行政行为的证据、依据和其他有关材料"}], "answer": "ABC"}, {"id": 341, "question": "关于行政复议委员会，以下说法正确的有？", "type": "多选", "options": [{"letter": "A", "content": "行政复议机构认为审理的行政复议案件案情重大、复杂、疑难，应当提请行政复议委员会作出复议决定"}, {"letter": "B", "content": "省政府对本机关作出的行政行为进行复议，应当提请行政复议委员会作出咨询意见"}, {"letter": "C", "content": "国务院工作部门应当建立行政复议委员会"}, {"letter": "D", "content": "行政复议委员会除对行政复议案件提供咨询意见外，还可以就行政复议工作中的共性问题研究提出意见"}], "answer": "ABC"}, {"id": 342, "question": "根据行政复议法及相关规定，下列关于行政复议证据的说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "在行政复议过程中，被申请人不得自行向申请人和其他有关单位或者个人收集证据"}, {"letter": "B", "content": "被申请人应当自收到行政复议申请书副本15日内，提交作出行政行为的证据"}, {"letter": "C", "content": "被申请人未在规定的期限内提交作出行政行为的证据的，视为该行政行为没有证据，行政复议机关可以决定撤销该行政行为"}, {"letter": "D", "content": "被申请人自行收集的证据可以作为认定行政行为合法性、适当性的依据"}], "answer": "ACD"}, {"id": 343, "question": "根据行政复议法及相关规定，下列哪些情形下行政复议中止？多选）", "type": "多选", "options": [{"letter": "A", "content": "作为申请人的公民丧失参加行政复议的行为能力，尚未确定法定代理人参加行政复议"}, {"letter": "B", "content": "作为申请人的公民下落不明"}, {"letter": "C", "content": "案件审理需要以其他案件的审理结果为依据，而其他案件尚未审结"}, {"letter": "D", "content": "作为申请人的法人或者其他组织终止，其权利义务的承受人放弃行政复议权利"}], "answer": "CD"}, {"id": 344, "question": "行政复议期间出现哪种情形后，行政复议终止？", "type": "多选", "options": [{"letter": "A", "content": "申请人撤回行政复议申请，行政复议机构准予撤回"}, {"letter": "B", "content": "作为申请人的公民死亡，其近亲属放弃行政复议！同有下列情形之一的，行政复议机关决定终止行权利"}, {"letter": "C", "content": "作为申请人的法人终止，没有权利义务承受人"}, {"letter": "D", "content": "申请人对行政拘留不服申请复议后，因其他违法行为涉嫌犯罪，被采取刑事强制措施"}], "answer": "C"}, {"id": 345, "question": "某县公安局以钟某扰乱社会秩序为由对其作出行政处罚决定，钟某不服，向县政府申请行政复议。根据行政复议法及相关规定，关于行政复议期间该行政处罚决定的执行，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "该行政处罚决定应当停正执行"}, {"letter": "B", "content": "该县公安局认为需要停止执行的，应当停止执行该行政处罚决定"}, {"letter": "C", "content": "该县政府认为需要停止执行的，应当停止执行该行政处罚决定"}, {"letter": "D", "content": "钟某申请停止执行，该县政府认为其要求合理决定停止执行的，应当停止执行该行政处罚决定"}], "answer": "A"}, {"id": 346, "question": "关于行政复议案件的审理和决定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "行政复议期间涉及专门事项需要鉴定的，当事人可自行委托鉴定机构进行鉴定"}, {"letter": "B", "content": "审理行政复议案件，申请人提出采取听证方式审理的，行政复议机构应当采取听证方式审理"}, {"letter": "C", "content": "申请人在行政复议决定作出前自愿撤回行政复议申请的，经行政复议机构同意，可以撤回"}, {"letter": "D", "content": "行政复议人员调查取证时应向当事人或者有关人员出示证件"}], "answer": "B"}, {"id": 347, "question": "下列有关行政复议附带审查程序说法正确的有？多选）", "type": "多选", "options": [{"letter": "A", "content": "申请人认为行政机关所依据的规范性文件不合法，向行政复议机关提出附带审查，行政复议机关有权处理的，应当在有关规范性文件的附带审查申请，行政复议10日内进行处理-124 -"}, {"letter": "B", "content": "申请人认为行政机关所依据的规范性文件不合法，向行政复议机关提出附带审查，行政复议机关无权处理的，应当在5日内转送有权处理的行政机关进行处理"}, {"letter": "C", "content": "行政复议机关认为被申请人作出的行政行为所依据的规范性文件不合法，行政复议机关有权处理的，应当在30日内进行处理"}, {"letter": "D", "content": "行政复议机关认为被申请人作出的行政行为所依据的规范性文件不合法，行政复议机关无权处理的，应当在7日内转送有权处理的行政机关进行处理"}], "answer": "AC"}, {"id": 348, "question": "适用普通程序审理的行政复议案件，行政复议机关应当自受理申请之日起最长（）日内作出行政复议决定？", "type": "单选", "options": [{"letter": "A", "content": "30"}, {"letter": "B", "content": "60"}, {"letter": "C", "content": "90"}, {"letter": "D", "content": "45"}], "answer": "ABC"}, {"id": 349, "question": "适用简易程序审理的行政复议案件，行政机关应当自受理申请之日起（）日内作出行政复议决定？", "type": "单选", "options": [{"letter": "A", "content": "30"}, {"letter": "B", "content": "60"}, {"letter": "C", "content": "15"}, {"letter": "D", "content": "10"}], "answer": "ABCD"}, {"id": 350, "question": "王某在未取得营业执照的情况下，在街道上销售活鸡鸭，市城管局查获王某的无照经营行为，扣押了王某的电子秤一个，鸡鸭数只，王某在城管局实施扣押的过程中与城管人员发生冲突阻碍扣押，城管人员报警，区公安局对王某作出行政拘留5日的处罚决定，王某不服，申请行政复议，下列哪一说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "王某申请行政复议，应当向市公安局提出"}, {"letter": "B", "content": "主某可以委托2名代理人参加行政复议"}, {"letter": "C", "content": "复议机关应当在60关内作出复议决定，不延长"}, {"letter": "D", "content": "复议机关可以向王某收取办理行政复议案件所需的费用"}], "answer": "CD"}, {"id": 351, "question": "定中公司在某县建立了一家生鸡养殖场，通过暗管的方式违法排污，县生态环境局对其罚款50万元。定中公司不服，向县政府申请行政复议。本案的下列做法违反法律规定的有：", "type": "多选", "options": [{"letter": "A", "content": "县政府指定县政府法制办干部胡某单独审理此案"}, {"letter": "B", "content": "县政府在60日内作出了复议决定"}, {"letter": "C", "content": "县政府认为处罚过轻，将罚款变更为60万元"}, {"letter": "D", "content": "县政府认为本案疑难复杂，主动组织听证"}], "answer": "ABCD"}, {"id": 352, "question": "根据行政复议法及相关规定，以下哪些情形复议机关应当变更行政行为？", "type": "多选", "options": [{"letter": "A", "content": "事实清楚，证据确凿，适用依据正确，程序合法，但是内容不适当"}, {"letter": "B", "content": "事实清楚，证据确凿，程序合法，但是未正确适用依据"}, {"letter": "C", "content": "事实不清、证据不足，经行政复议机关查清事实和证据"}, {"letter": "D", "content": "违反法定程序"}], "answer": "CD"}, {"id": 353, "question": "根据行政复议法及相关规定，行政行为具有下列哪些情形的，行政复议机关可以决定撤销该行政行为，并可以责令被申请人在一定期限内重新作出行政行为？", "type": "多选", "options": [{"letter": "A", "content": "主要事实不清、证据不足"}, {"letter": "B", "content": "违反法定程序"}, {"letter": "C", "content": "滥用职权"}, {"letter": "D", "content": "适用的依据不合法"}], "answer": "BCD"}, {"id": 354, "question": "根据行政复议法及相关规定，下列关于行政复议决定的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "行政行为认定事实清楚，证据确凿，适用依据正确，程序合法，内容适当的，行政复议机关决定维持该行政行为"}, {"letter": "B", "content": "被申请人不履行法定职资的，行政复议机关决定被申请人在一定期限内股行"}, {"letter": "C", "content": "事实不清、证据不足，经行政复议机关查清事实和证据，决定变更该行政行为"}, {"letter": "D", "content": "主要事实不消、证据不足，行政复议机关可以撤销该行政行为"}], "answer": "ABC"}, {"id": 355, "question": "河北省石家庄市市场监督管理局在市场调查过中，认为某商户所销售的化妆品为假冒专利产品，对该产品予以没收并进行处罚，该商户不服，向石家庄市人民政府提出行政复议请求，在行政复议申请过程中，该商户提交了专利证明文件，石家庄市市场监督管理局取消了处罚决定，并对没收的产品予以归还，关于行政复议机关的处理，以下说法正确的有？多选）", "type": "多选", "options": [{"letter": "A", "content": "由于行政机关已经改变了其行政行为，因此行政复议机关应当终止审理"}, {"letter": "B", "content": "行政复议机关应当撤销原行政行为"}, {"letter": "C", "content": "如果申请人要求撤销原行政行为的，行政复议机关应当确认该行政行为违法"}, {"letter": "D", "content": "如果申请人要求确认该行政行为违法的，行政复议机关应当确认该行政行为违法"}], "answer": "ABC"}, {"id": 356, "question": "甲公司通过暗管的方式直接将污水排人地下，被区生态环境局吊销排污许可证，罚款500万元。甲公司对此不服，申因此B选项错误，C、D选项正确。（新编）请行政复议，下列说法正确的是：", "type": "多选", "options": [{"letter": "A", "content": "复议机关若认定该行为违反法定程序，可以决定变更"}, {"letter": "B", "content": "复议机关若认定罚款500万合法但不适当，可以决定变更"}, {"letter": "C", "content": "复议机关若认定吊销排污许可证和罚款均合法且适当，作出维持决定"}, {"letter": "D", "content": "复议机关可以对双方进行调解"}], "answer": "ABCD"}, {"id": 357, "question": "王某认为某行政机关不履行法定职资而申请行政复议，行政复议机关受理后发现该行政机关没有相应法定职责。根据行政复议法及相关规定，该行政复议机关应当如何处理？", "type": "单选", "options": [{"letter": "A", "content": "作出确认原行政行为无效的决定"}, {"letter": "B", "content": "作出终止该行政复议的决定"}, {"letter": "C", "content": "作出该行政复议申请视为撤回的决定"}, {"letter": "D", "content": "作出驳回该行政复议请求的决定"}], "answer": "D"}, {"id": 358, "question": "行政复议机关在受理行政复议申请后，将有关材料转送至被申请人，要求被申请人在收到材料之日起10日内提出书面答复、提交作出行政行为的证据、依据和有关材料，期满后被申请人未提交，行政复议机关可以作出下列哪些决定？", "type": "多选", "options": [{"letter": "A", "content": "视为该行政行为没有证据、依据，行政复议机关决定撤销或者部分撤销该行政行为"}, {"letter": "B", "content": "视为该行政行为没有证据、依据，行政复议机关确认该行政行为违法"}, {"letter": "C", "content": "视为该行政行为没有证据、依据，行政复议机关确认该行政行为无效"}, {"letter": "D", "content": "如果该行政行为涉及第三人合法权益，第三人提供了被申请人作出行政行为的证据和依据，行政复议机关仍应视为该行政行为没有证据、依据"}], "answer": "ABC"}, {"id": 359, "question": "根据行政复议法及相关规定，下列说法正确的是？！", "type": "多选", "options": [{"letter": "A", "content": "申请人在申请行政复议时可以一并提出行政略偿请求"}, {"letter": "B", "content": "申请人在申请行政复议时没有提出行政赔偿请求的，对财产权的行政行为，行政复议机关也可作出行政偿决定"}, {"letter": "C", "content": "行政复议决定书一经送达，即发生法律效力"}, {"letter": "D", "content": "行政复议决定书送达后，15个工作日后未起诉的，发生法律效力"}], "answer": "D"}, {"id": 360, "question": "关于行政复议过程中的和解或调解，以下说法错误的有？多选）", "type": "多选", "options": [{"letter": "A", "content": "当事人经调解达成协议的，行政复议机关应当制作行政复议调解书，并加盖行政复议机关印章，调解书即具有法律效力"}, {"letter": "B", "content": "当事人达成和解后，申请人应当向行政复议机关撤回行政复议申请，行政复议机关应当予以批准"}, {"letter": "C", "content": "当事人达成和解后，行政复议机关批准撤回行政复议申请的，申请人一律不得再以同一事实和理由提出行政复议申谐"}, {"letter": "D", "content": "调解书生效之前，一方当事人反悔的，行政复议机关应当驳回行政复议请求"}], "answer": "A"}, {"id": 361, "question": "根据《治安管理处罚法》第76条，偷开他人机动车的，处1000元以上2000元以下罚款；情节严重的，处10日以上15日以下拘留，可以并处2000元以下罚款。小王因偷开单位的轿车被县公安局处以拘留12日，并处罚款1500元。小王承认自己确实偷开单位的轿车，但认为县公安局的处罚太重而向县政府申请复议。在复议过程中的下列哪一做法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "在复议过程中，小王申请县政府调解，而县公安局认为为，因此D选项正确。（司法改编）自己的处罚合法、适当，故不愿接受调解，县政府要求县公安局接受调解"}, {"letter": "B", "content": "在复议过程中，经县政府调解，小王与县公安局达成对小王仅罚款1500元的口头调解协议，县政府决定复议终止"}, {"letter": "C", "content": "在复议过程中，经县政府调解，双方达成一致意见，但是小王在调解书生效前反悔，调解书生效"}, {"letter": "D", "content": "在复议过程中，经县政府调解，小王与县公安局达成对定，书面申请的，可以通过邮寄或者行政复小王不罚款的调解协议，县政府认为协议内容违法，不予认可，！议机关指定的互联网果道等方式提交行政并决定撤销拘留12日，维持罚款1500元的决定"}], "answer": "BCD"}, {"id": 362, "question": "某商标代理机构存在严重违法行为，国家知识产权局依法决定永久停止受理其办理商标代理，该商标代理机构不服，依法申请行政复议。根据行政复议法及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "如在复议过程中，该商标代理机构与国家知识产权局达成和解后撤回复议申请，行政复议机构准予撤回行政复议申请、行政复议机关决定终止行政复议的，不得再以同一事实和理由提出复议申请"}, {"letter": "B", "content": "该商标代理机构可以通过行政复议机关指定的互联网渠道提交申请书"}, {"letter": "C", "content": "该商标代理机构如果对行政复议决定不服，可以提起行政诉讼"}, {"letter": "D", "content": "该商标代理机构可以向国务院申请行政复议"}], "answer": "BCD"}, {"id": 363, "question": "某县政府依由某申请作出复议决定，撤销某县公安局对田某车辆的错误登记，责令在30日内重新登记，但某县公安局拒绝进行重新登记。田某可以采取下列哪一项措施？", "type": "单选", "options": [{"letter": "A", "content": "申请法院强制执行"}, {"letter": "B", "content": "对某县公安局的行为申请行政复议"}, {"letter": "C", "content": "向法院提起行政诉讼"}, {"letter": "D", "content": "请求某县政府责令某县公安局登记"}], "answer": "ACD"}, {"id": 364, "question": "张某对县税务局的行政处罚不服，向市税务局申请行政复议，但复议机关维持了原处罚决定，张某逾期不履行该行政复议决定，也未向法院起诉，对此，下列说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "由县税务局依法强制执行，或者申请人民法院强制执行"}, {"letter": "B", "content": "由市税务局依法强制执行，或者申请人民法院强制执行"}, {"letter": "C", "content": "县税务局不能强制执行，只能申请人民法院强制执行"}, {"letter": "D", "content": "市税务局不能强制执行，只能申请人民法院强制执行逾期不起诉又不履行行政复议决定、调解书的，应当如何处理？议法》第10条的规定，对行政复议决定不展（多选）"}], "answer": "AB"}, {"id": 365, "question": "商务部对某一企业作出处以30万元罚款的行政处罚，该企业不服，申请行政复议，下列说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "该企业可以向国务院申请复议"}, {"letter": "B", "content": "该企业可以向商务部申请复议"}, {"letter": "C", "content": "该企业如果对行政复议决定不服，可以提起行政诉讼"}, {"letter": "D", "content": "如在复议过程中，企业自愿撤回复议申请的，不得再以同一事实和理由提出行政复议申请"}], "answer": "D"}, {"id": 366, "question": "国家金融监督管理总局以某银行金融机构未按照规定提供报表、报告等资料，依据《银行业监督管理法》对其处以20万元罚款。该机构不服，申请行政复议，下列说法不正确的是？", "type": "多选", "options": [{"letter": "A", "content": "如果复议期间国家金融监督管理总局将罚款数额改为10万元，行政复议中止"}, {"letter": "B", "content": "复议机关应当是国家金融监督管理总局"}, {"letter": "C", "content": "如果该机构与国家金融监督管理总局在复议决定作出前自愿达成和解协议，行政复议中止"}, {"letter": "D", "content": "申请行政复议期间为行政行为作出之日起6个月"}], "answer": "BC"}, {"id": 367, "question": "县生态环境局以甲公司在生产过程中使用不符合国家标准的锅炉设备，超标排放污染物质为由，查封甲公司用以生产的锅炉，后对甲公司罚款8万元，甲公司不服，向县政府申请复议，下列哪一说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "紧急情况下，查封可以不听取甲公司的陈述申辩"}, {"letter": "B", "content": "如果县政府认为本案事实清楚，证据确凿，适用法律正确，程序合法，但是内容不适当，将对甲公司罚款改为罚款10万元"}, {"letter": "C", "content": "在复议决定作出前当事人达成和解协议，复议程序自动终止"}, {"letter": "D", "content": "如果县政府认为本案事实不清，经审核事实清楚后，可以变更决定"}], "answer": "AD"}, {"id": 368, "question": "下列哪些是行政诉讼法的基本功能？", "type": "多选", "options": [{"letter": "A", "content": "打击行政领城的犯罪现象，维护社会治安"}, {"letter": "B", "content": "保证法院公正、及时地审理行政案件"}, {"letter": "C", "content": "保障公民、法人或者其他组织的合法权益"}, {"letter": "D", "content": "维护和监督行政机关依法行使行政职权"}], "answer": "BCD"}, {"id": 369, "question": "关于行政诉讼中的合法性审查原则，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "只对被诉请的行政行为实体上是否合法进行审查"}, {"letter": "B", "content": "只对被诉请的行政行为做合法性审查，不做合理性审查"}, {"letter": "C", "content": "审查的主体是人民法院"}, {"letter": "D", "content": "只对具体行政行为进行审查，不对抽象行政行为进行审查"}], "answer": "ACD"}, {"id": 370, "question": "根据行政诉讼法及相关规定，关于人民法院审理行政案件应当遵循的基本原则，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "当事人在行政诉讼中的法律地位平等"}, {"letter": "B", "content": "人民法院审理所有行政案件都不适用调解"}, {"letter": "C", "content": "人民法院审理行政案件，对行政行为是否合理进行审查"}, {"letter": "D", "content": "人民法院审理行政案件，以事实为依据，以法律为准绳"}], "answer": "AD"}, {"id": 371, "question": "当事人不服下列行为提起诉讼的，不底于行政诉讼受案范围的有？多选）", "type": "多选", "options": [{"letter": "A", "content": "根据法院的生效判决，国家知识产权局专利局变更了专利权人姓名"}, {"letter": "B", "content": "北京市海淀区市场监督管理局作出的没收违法所得的行政处罚决定"}, {"letter": "C", "content": "根据已作出的行政决定，北京市海淀区市场监督管理局作出了行政决定履行催告书"}, {"letter": "D", "content": "北京市海淀区市场监督管理局作出了撤销行政许可（登记）听证告知书"}], "answer": "BD"}, {"id": 372, "question": "根据行政诉讼法及相关规定，下列哪些不属于行政诉讼的受案范围？多选）", "type": "多选", "options": [{"letter": "A", "content": "公民王某对全国人大常委会修改专利法的决定不服的"}, {"letter": "B", "content": "商标局不受理张某的商标注册申请，张某不眼的"}, {"letter": "C", "content": "乙公司对本市知识产权局责令其停止侵犯丙公司专利权的决定不服的"}, {"letter": "D", "content": "对北京市知识产权局作出的权属纠纷调解不服的"}], "answer": "CD"}, {"id": 373, "question": "人民法院应当受理公民、法人或者其他组织对下列些事项提起的行政诉讼？多选）", "type": "多选", "options": [{"letter": "A", "content": "公安机关对李某作出的刑事拘留的决定"}, {"letter": "B", "content": "地方知识产权执法部门作出的对假冒专利的处罚"}, {"letter": "C", "content": "专利管理部门对专利代理机构的违法行为作出的警告"}, {"letter": "D", "content": "某村民认为当地政府违法变更土地房屋征收补偿协议地、房屋等征收征用补偿协议等行政协议属"}], "answer": "ABCD"}, {"id": 374, "question": "当事人对下列哪些事项既可以申请行政复议又可以提起行政诉讼", "type": "多选", "options": [{"letter": "A", "content": "对行政机关作出民事纠纷调解不服的"}, {"letter": "B", "content": "对公安机关作出的行政拘留决定不服的"}, {"letter": "C", "content": "专利权人对国家知识产权局作出的宣告专利权全部无效的决定不服的"}, {"letter": "D", "content": "对国务院部门作出的具体行政行为不服的"}], "answer": "ACD"}, {"id": 375, "question": "当事人对下列哪些事项既可以申请行政复议也可以提起行政诉讼？", "type": "多选", "options": [{"letter": "A", "content": "行政机关对民事纠纷的调解"}, {"letter": "B", "content": "出人境边防检查机关对外国人采取的遭送出境措施"}, {"letter": "C", "content": "对申请宅基地不予批准的决定"}, {"letter": "D", "content": "对专利局作出的专利申请不予受理的决定"}], "answer": "ABCD"}, {"id": 376, "question": "根据行政诉讼法及相关规定，关于人民法院审理行政案件应当遵循的制度，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "依法实行合议制度"}, {"letter": "B", "content": "依法实行回避制度"}, {"letter": "C", "content": "依法实行公开审判制度"}, {"letter": "D", "content": "依法实行两审终审制度"}], "answer": "ABCD"}, {"id": 377, "question": "江某对某行政机关作出的行政处罚决定不服，向人民法院提起行政诉讼。江某认为本案书记员张某、审判员李某与该行致机关有利益关系可能会影响公正审判。根据行政诉讼法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "江某有权申请李某回避"}, {"letter": "B", "content": "江某无权申请张某回避"}, {"letter": "C", "content": "李某的回避，由院长决定"}, {"letter": "D", "content": "张某的回避，由审判长决定"}], "answer": "AC"}, {"id": 378, "question": "下列可以管辖第一审行政案件的法院有？多选）", "type": "多选", "options": [{"letter": "A", "content": "基层人民法院"}, {"letter": "B", "content": "高级人民法院"}, {"letter": "C", "content": "最高人民法院"}, {"letter": "D", "content": "中级人民法院"}], "answer": "A"}, {"id": 379, "question": "下列哪些案件属于中级人民法院管辖的第一审行政案件？", "type": "多选", "options": [{"letter": "A", "content": "对国务院部门所作的行政行为提起诉讼的案件"}, {"letter": "B", "content": "对县级以上地方人民政府所作的行政行为提起诉讼的案件"}, {"letter": "C", "content": "海关处理的案件"}, {"letter": "D", "content": "本辖区内重大、复杂的案件"}], "answer": "ABD"}, {"id": 380, "question": "根据行政诉讼法及相关规定，中级人民法院对下列哪些一审案件具有管辖权？", "type": "多选", "options": [{"letter": "A", "content": "对某省人民政府作出的具体行政行为不服的案件"}, {"letter": "B", "content": "对国家知识产权局驳回专利申请不服的案件"}, {"letter": "C", "content": "本辖区内社会影响重大的集团诉讼案件"}, {"letter": "D", "content": "辖区内甲县人民法院与乙县人民法院就管辖权产生争议的案件"}], "answer": "ABCD"}, {"id": 381, "question": "对省人民政府工作部门作出的具体行政行为不服提起诉讼的，由下列哪级人民法院管辖？", "type": "单选", "options": [{"letter": "A", "content": "基层人民法院"}, {"letter": "B", "content": "中级人民法院"}, {"letter": "C", "content": "高级人民法院"}, {"letter": "D", "content": "最高人民法院辖的说法哪些是正确的？（多选）"}], "answer": "AC"}, {"id": 382, "question": "关于对限制人身自由的行政强制措施不服提起的行政诉讼，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "可以在原告的户籍所在地提起诉讼"}, {"letter": "B", "content": "可以在被告所在地提起诉讼"}, {"letter": "C", "content": "可以在原告的经常居住地提起诉讼"}, {"letter": "D", "content": "可以在被限制人身自由所在地提起诉讼"}], "answer": "ACD"}, {"id": 383, "question": "根据行政诉讼法及相关规定，下列关于行政诉讼管辖的哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "两个以上人民法院都有管辖权的案件，原告可以选择其中一个人民法院提起诉讼"}, {"letter": "B", "content": "原告向两个以上有管辖权的人民法院提起诉讼的，由最先收到起诉状的人民法院管辖"}, {"letter": "C", "content": "人民法院发现受理的案件不属于本院管辖的，应当移送有管辖权的人民法院，受移送的人民法院应当受理"}, {"letter": "D", "content": "两个以上人民法院都有管辖权的案件，原告应当向其共同的上级人民法院起诉"}], "answer": "A"}, {"id": 384, "question": "根据行政诉讼法及相关规定，下列关于管辖的哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "上级人民法院有权审判由下级人民法院管辖的第一审行政案件"}, {"letter": "B", "content": "两个以上人民法院都有管辖权的案件，原告应当向其共23条规定：“有管辖权的人民法院由于特球同的上级人民法院起诉"}, {"letter": "C", "content": "有管辖权的人民法院由于特殊原因不能行使管辖权的，由上级人民法院指定管辖"}, {"letter": "D", "content": "人民法院发现受理的案件不属于自己管辖时，应当移送有管辖权的人民法院"}], "answer": "ABCD"}, {"id": 385, "question": "人民法院对行政诉讼案件的管辖权发生争议，由争议双方协商解决，协商不成的，报（）指定管辖。", "type": "单选", "options": [{"letter": "A", "content": "共同上级人民法院"}, {"letter": "B", "content": "先立案的法院"}, {"letter": "C", "content": "当地高级人民法院"}, {"letter": "D", "content": "最高人民法院"}], "answer": "ABCD"}, {"id": 386, "question": "根据行政诉讼法及相关规定，下列哪些主体可以依法提起行政诉讼？多选）", "type": "多选", "options": [{"letter": "A", "content": "与被诉的行政复议决定有法律上利害关系的公民"}, {"letter": "B", "content": "被诉的具体行政行为涉及其公平竞争权的法人"}, {"letter": "C", "content": "在复议程序中被追加为第三人的法人"}, {"letter": "D", "content": "要求主管行政机关依法追究加害人法律责任的公民"}], "answer": "A"}, {"id": 387, "question": "下列可以作为行政诉讼中的原告的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "行政行为的相对人"}, {"letter": "B", "content": "已经死亡的有权提起行政诉讼的公民的近亲属"}, {"letter": "C", "content": "与具体行政行为有利害关系的公民、法人或者其他组织"}, {"letter": "D", "content": "人民检察院"}], "answer": "AB"}, {"id": 388, "question": "根据行政诉讼法及相关规定，合伙企业向人民法院提起诉讼的，下列哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "应当以核准登记的字号为原告"}, {"letter": "B", "content": "应当以所有合伙人为共同原告"}, {"letter": "C", "content": "应当以执行合伙企业事务的合伙人为原告"}, {"letter": "D", "content": "可以任一合伙人为原告"}], "answer": "ABCD"}, {"id": 389, "question": "中外合资企业甲认为其企业权益受行政行为使害的，下列说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "外方投资者可以以自己的名义提起行政诉讼"}, {"letter": "B", "content": "企业甲可以以自己的名义提起行政诉讼"}, {"letter": "C", "content": "外方投资者若以保护企业权益为由提起行政诉讼，其应以企业甲的名义提起行政诉讼"}, {"letter": "D", "content": "外方投资者以保护自己的权益为由提起行政诉讼的，其应以企业甲的名义提起行政诉讼"}], "answer": "AD"}, {"id": 390, "question": "根据行政诉讼法及相关规定，下列哪些人员可以被委托为诉讼代理人？多选）", "type": "多选", "options": [{"letter": "A", "content": "当事人所在社区、单位推荐的公民"}, {"letter": "B", "content": "在专利行政案件中，经中华全国专利代理师协会推荐的专利代理师"}, {"letter": "C", "content": "基层法律服务工作者"}, {"letter": "D", "content": "律师"}], "answer": "CD"}, {"id": 391, "question": "根据行政诉讼法及相关规定，下列关于行政诉讼被告的说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "公民、法人或者其他组织直接向人民法院提起诉讼的，作出具体行政行为的行政机关是被告"}, {"letter": "B", "content": "经复议的案件，复议机关决定维持原具体行政行为的，复议机关是被告"}, {"letter": "C", "content": "由行政机关委托的组织所作的具体行政行为，该组织是被告"}, {"letter": "D", "content": "两个以上行政机关作出同一具体行政行为的，共同作出具体行政行为的行政机关是共同被告"}], "answer": "AC"}, {"id": 392, "question": "甲行政机关以违反法律相关规定为由对某公司进行了处罚。该公司不服，向乙复议机关申请行政复议。乙复议机关作出维持原具体行政行为的复议决定。该公司仍不服，哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "应以甲行政机关为被告"}, {"letter": "B", "content": "应以乙复议机关为被告"}, {"letter": "C", "content": "甲行政机关所在地人民法院对此案有管辖权"}, {"letter": "D", "content": "乙复议机关所在地人民法院对此案有管辖权"}], "answer": "BC"}, {"id": 393, "question": "某县公安局对张某作出了一项行政处罚决定。张某不服，遂向该县人民政府申请行政复议，但该县人民政府未在法定期限内作出复议决定。张某欲向人民法院提起行政诉讼。根据行政诉讼法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "张某因对该行政处罚决定不服提起诉讼的，应当以该县公安局为被告"}, {"letter": "B", "content": "张某因对该行政处罚决定不服提起诉讼的，应当以该县人民政府为被告"}, {"letter": "C", "content": "张某因对该县人民政府不作为不服提起诉讼的，应当以该县人民政府为被告"}, {"letter": "D", "content": "张某因对该县人民政府不作为不服提起诉讼的，应当以该县人民政府和县公安局作为共同被告"}], "answer": "B"}, {"id": 394, "question": "王某不服某市公安局作出的对其拘留15天的行政处罚，向市人民政府申请复议，市人民政府改为行政拘留10天，王某仍然不服，欲提起行政诉讼。根据行政诉讼法及相关规定，下列关于被告的哪种说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "应当以该市公安局为被告"}, {"letter": "B", "content": "应当以该市人民政府为被告"}, {"letter": "C", "content": "可以由市公安局所在地中级人民法院管辖"}, {"letter": "D", "content": "可以由市人民政府所在地基层人民法院管辖"}], "answer": "A"}, {"id": 395, "question": "市食药局根据《食品安全法》第一百二十三条，以“用回收食品作为原料生产食品”为由对甲公司作出罚款民政府申请行政复议。市人民政府根据《食品安全法》第一百二十四条，以\"用超过保质期的食品原料生产食品“为由对甲公司作出罚款300万元、资令停产停业一年的决定。甲公司不震，提起行政诉讼。下列说法正确的是：", "type": "单选", "options": [{"letter": "A", "content": "本案的被告是市人民政府"}, {"letter": "B", "content": "本案的被告是市食药局和市人民政府"}, {"letter": "C", "content": "本案的被告是市人民政府，市食药局是第三人"}, {"letter": "D", "content": "若甲拒绝追加市人民政府为被告，人民法院应当通知市人民政府作为第三人参加诉讼"}], "answer": "B"}, {"id": 396, "question": "张某以惠尘肺病为由向区人社局申请工伤认定，区人社局以张某无法提供息病证据为由，作出不予认定工伤的决定，张某向区政府申请行政复议，区政府以不属于工伤为由，下发了《不予认定工伤复议决定书》，张某以区人社局为被告向法院提起诉讼。下列选项中，人民法院哪一做法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "通知张某追加区政府为共同被告"}, {"letter": "B", "content": "告知张某变更被告"}, {"letter": "C", "content": "驳回张某的起诉"}, {"letter": "D", "content": "驳回张某的诉讼请求"}], "answer": "B"}, {"id": 397, "question": "某市市场监督管理局和公安局共同对某公司作出行政处罚决定，该公司不服，以市市场监督管理局为被告向人民法院提起行政诉讼。经过审理，人民法院向原告建议增加市公安局为被告，原告不同意。根据行政诉讼法及相关规定，人民法院应当如何处理？", "type": "单选", "options": [{"letter": "A", "content": "依职权追加市公安局为被告"}, {"letter": "B", "content": "通知市公安局以第三人身份参加诉讼"}, {"letter": "C", "content": "裁定驳回起诉"}, {"letter": "D", "content": "判决驳回原告的诉讼请求"}], "answer": "BD"}, {"id": 398, "question": "甲、乙两村分别位于某市两县境内，因土地权属纠纷向市政府申请解决，市政府裁决争议土地属于甲村所有。诉讼的受案范田，因此A选项错误。B、C选项，于乙村所有。甲村不服行政复议决定，提起行政诉讼。下列哪个法院对本案有管辖权？", "type": "单选", "options": [{"letter": "A", "content": "争议土地所在地的基层人民法院"}, {"letter": "B", "content": "争议土地所在地的中级人民法院"}, {"letter": "C", "content": "市政府所在地的基层人民法院"}, {"letter": "D", "content": "省政府所在地的中级人民法院"}], "answer": "BCD"}, {"id": 399, "question": "市政府对市自然资源局作出批复，同意其提交的收回某公司国有土地使用权方案。市自然资源局收到批复后，将批复交市自然资源局下属的内设机构土地储备中心执行。某公司不服批复，向法院提起行政诉讼。下列说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "批复不属于行政诉讼受案范围"}, {"letter": "B", "content": "被告为市政府"}, {"letter": "C", "content": "被告为市自然资源局"}, {"letter": "D", "content": "若公司对批复不服申请行政复议，市政府为被申请人"}], "answer": "ACD"}, {"id": 400, "question": "根据行政诉讼法及相关规定，下列关于行政诉讼参加人的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "公民、法人或者其他组织同被诉行政行为有利害关系但没有提起诉讼，不得作为第三人申请参加诉讼"}, {"letter": "B", "content": "公民、法人或者其他组织同案件处理结果有利害关系的，可以由人民法院通知参加诉讼"}, {"letter": "C", "content": "人民法院判决第三人承担义务的，第三人有权依法提起上诉"}, {"letter": "D", "content": "人民法院判决减损第三人权益的，第三人有权依法提起上诉"}], "answer": "BD"}, {"id": 401, "question": "甲、乙、丙三友人一同在某餐厅就餐。由于餐品质量与餐厅经理郭某产生纠纷。纠纷过程中，将餐厅经理郭某打伤。区公安局将甲拘留10日，乙拘留5日。甲不服，提起！行政诉讼。关于该案的第三人，下列说法正确的是：", "type": "多选", "options": [{"letter": "A", "content": "法院可以通知乙作为第三人参而诉讼"}, {"letter": "B", "content": "法院可以通知丙作为第三人参加诉讼"}, {"letter": "C", "content": "法院应当通知郭某作为第三人参加诉讼"}, {"letter": "D", "content": "若甲不服向区人民政府复议的，区人民政府可以通知郭某作为第三人参加复议"}], "answer": "BC"}, {"id": 402, "question": "甲、乙、丙三友人一同在某餐厅就餐。由于餐品质量与餐厅经理郭某产生纠纷。纠纷过程中，将餐厅经理郭某打伤。区公安局将甲拘留10日，乙拘留5日。甲不服，摄起行政诉讼。区公安局出庭应诉，下列说法正确的是：", "type": "多选", "options": [{"letter": "A", "content": "区公安局负资人出庭的，应当由区公安局局长出庭应诉"}, {"letter": "B", "content": "区公安局局长出庭应诉的，可以另行委托1-2名诉讼代理人"}, {"letter": "C", "content": "区公安局负资人和工作人员不出庭，委托2名律师出庭"}, {"letter": "D", "content": "主管相关业务的副局长属于行政机关负资人"}], "answer": "BCD"}, {"id": 403, "question": "根据行政诉讼法及相关规定，下列关于行政诉讼参加人的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "当事人一方人数众多的共同诉讼，应当由法院指定代表人进行诉讼"}, {"letter": "B", "content": "当事人一方或者双方为二人以上，因同一行政行为发生的行政案件为共同诉讼"}, {"letter": "C", "content": "公民、法人或者其他组织同被诉行政行为有利害关系但没有提起诉讼的，可以作为第三人申请参加诉讼"}, {"letter": "D", "content": "代表人变更放弃诉讼请求，可以不经被代表的当事人同意"}], "answer": "ABC"}, {"id": 404, "question": "李某以同事王某对其寻蚌滋事为由，向某区公安局报案，某区公安局立案调查后，对王某作出治安拘留十日的行政处罚。王某不服，提起行政诉讼。根据行政诉讼法及相！生且止案件审理的效果”，因此A选项错误。B、关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "当李某作为第三人参加诉讼，其经传票传唤无正当理由拒不到庭，或者未经法庭许可中途退庭的，案件审理中止"}, {"letter": "B", "content": "李某可以由人民法院通知其作为第三人参加诉讼"}, {"letter": "C", "content": "李某可以作为第三人申请参加诉讼"}, {"letter": "D", "content": "李某作为第三人参加诉讼，人民法院判决减损其权益的，李某有权提起上诉"}], "answer": "ABC"}, {"id": 405, "question": "李某对某省公安厅对其作出的行政行为不服，向省人民政府申请行政复议，省人民政府作出的复议决定维持原行政行为。李某仍不服，向人民法院提起诉讼，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "该行政诉讼案件中某省公安厅和省人民政府是共同被告"}, {"letter": "B", "content": "李某可以向省公安厅所在地的基层人民法院提起诉讼"}, {"letter": "C", "content": "李某可以向省人民政府所在地的基层人民法院提起诉讼"}, {"letter": "D", "content": "李某可以向省人民政府所在地的中级人民法院提起诉讼"}], "answer": "C"}, {"id": 406, "question": "贝果公司在生产经营中存在用非食品原料生产食品的违法行为。区市监局对其作出没收用于违法生产经营的非食品原料、没收违法所得、罚款10万元的行政处罚。贝果公司不服，向区政府申请复议，区政府将罚款改为8万元后，维持了其他处罚。贝果公司不服，提起诉讼，下列说法哪些是错误的？", "type": "多选", "options": [{"letter": "A", "content": "本案被告是区市监局"}, {"letter": "B", "content": "本案可以由区市监局所在地的中院管辖"}, {"letter": "C", "content": "本案被告是区政府"}, {"letter": "D", "content": "如果贝果公司以区政府为被告提起诉讼且拒绝追加被告，法院应当追加区市监局为共同被告"}], "answer": "ABCD"}, {"id": 407, "question": "动物卫生监督机构在监督检查过程中，发现甲某涂改了检疫证明的数量和日期，动物卫生监督管理机构对其进行了行政处罚。被涂改的检疫证明在证据的分类上属于？", "type": "单选", "options": [{"letter": "A", "content": "书证"}, {"letter": "B", "content": "视听资料"}, {"letter": "C", "content": "物证"}, {"letter": "D", "content": "当事人陈述"}], "answer": "ACD"}, {"id": 408, "question": "根据行政诉讼法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "鉴定和勘验均是证据保全措施之一"}, {"letter": "B", "content": "鉴定意见和勘验笔录均是证据种类之一"}, {"letter": "C", "content": "审查再审申请期间，再审申请人申请人民法院委托签定、勘验的，人民法院不予准许"}, {"letter": "D", "content": "人民法院可以依当事人申请或者依职权勘验现场"}], "answer": "D"}, {"id": 409, "question": "根据行政诉讼法及相关规定，关于人民法院调查取证，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "涉及商业秘密的证据，原告或者第三人不能自行收集的，可以申请人民法院调取"}, {"letter": "B", "content": "人民法院可以为证明行政行为的合法性调取被告作出行政行为时未收集的证据"}, {"letter": "C", "content": "涉及个人隐私的证据，原告或者第三人不能自行收集的，可以申请人民法院调取"}, {"letter": "D", "content": "由国家机关保存而须由人民法院调取的证据，原告或者第三人不能自行收集的，可以申请人民法院调取"}], "answer": "ACD"}, {"id": 410, "question": "行政诉讼中，原告要求相关行政执法人员作为证人出庭说明，在下列何种情形下，法院通常不予准许？", "type": "单选", "options": [{"letter": "A", "content": "原告对现场笔录的合法性有异议的"}, {"letter": "B", "content": "原告对现场笔录的真实性有异议的"}, {"letter": "C", "content": "原告对行政执法人员身份的合法性有异议的"}, {"letter": "D", "content": "原告对被起诉的行政决定有异议的"}], "answer": "A"}, {"id": 411, "question": "根据行政诉讼法及相关规定、下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "行政诉讼被告对作出的行政行为负有举证责任，应当提供作出该行政行为的证据和所依据的规范性文件"}, {"letter": "B", "content": "行政诉讼被告无正当理由不提供证据的，人民法院应当依职权调查收集相应证据"}, {"letter": "C", "content": "原告在行政诉讼中提出了其在行政处理程序中没有提出的证据的，经人民法院准许，被告可以补充证据"}, {"letter": "D", "content": "原告可以提供证明行政行为违法的证据，原告提供的证据不成立的，不免除被告的举证责任"}], "answer": "ABCD"}, {"id": 412, "question": "根据行政诉讼法及相关规定，行政诉讼的被告应当在何时就其作出的具体行政行为向人民法院提供证据？", "type": "单选", "options": [{"letter": "A", "content": "收到起诉状副本之日起15日内"}, {"letter": "B", "content": "第一审庭审结束前"}, {"letter": "C", "content": "第一审法庭辩论终结前"}, {"letter": "D", "content": "第一审判决作出前"}], "answer": "ABCD"}, {"id": 413, "question": "根据行政诉讼法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "原告应当在开庭审理前或者人民法院指定的交换证据清单之日提供证据"}, {"letter": "B", "content": "第三人应当在开庭审理前或者人民法院指定的交换证据清单之日提供证据"}, {"letter": "C", "content": "原告因正当事由申请延期提供证据的，经人民法院准许，可以在法庭调查中提供"}, {"letter": "D", "content": "第三人在第一审程序中无正当事由未提供而在第二审程序中提供的证据，人民法院不予接纳"}], "answer": "ABCD"}, {"id": 414, "question": "根据行政诉讼法及相关规定，下列哪些说法是正确的？|诉资事放人可以人传法实中进供全证惜，", "type": "多选", "options": [{"letter": "A", "content": "被告应当提供作出被诉具体行政行为的证据"}, {"letter": "B", "content": "被告应当提供作出被诉具体行政行为所依据的规范性文件"}, {"letter": "C", "content": "在证据可能灭失的情况下，原告可以向人民法院申请保全证据"}, {"letter": "D", "content": "在证据可能灭失的情况下，人民法院可以主动采收保全措施"}], "answer": "BD"}, {"id": 415, "question": "根据行政诉讼法及相关规定，下列哪些与本案有关的证", "type": "多选", "options": [{"letter": "A", "content": "由国家机关保存而须由人民法院调取的证据"}, {"letter": "B", "content": "涉及国家秘密的证据"}, {"letter": "C", "content": "涉及商业秘密的证据"}, {"letter": "D", "content": "涉及个人隐私的证据"}], "answer": "ABCD"}, {"id": 416, "question": "某药厂以本厂过期药品作为主原料，更改生产日期和批号生产出售。甲市乙县药监局以该厂违反《药品管理法》第49条第1款关于违法生产药品规定，决定没收药品并处罚款20万元。药厂不服向县政府申请复议，县政府依据《药品管理法》第49条第3款关于生产劣药行为的规定，决定维持处罚决定。药厂起诉。关于本案的举证与审理裁判，下列说法正确的有？", "type": "多选", "options": [{"letter": "A", "content": "法院应对被诉行政行为和药厂的行为是否合法一并审理和裁判"}, {"letter": "B", "content": "药厂提供的证明被诉行政行为违法的证据不成立的，不免除被告对被诉行政行为合法性的举证责任"}, {"letter": "C", "content": "如在本案庭审过程中，药厂要求证人出庭作证的，法院不予准许"}, {"letter": "D", "content": "法院对本案的裁判，应当以证据证明的案件事实为依据"}], "answer": "ABD"}, {"id": 417, "question": "区交警大队以左某逆向行驶为由对其作出罚款500元的处罚决定，左某向区政府申请复议，区政府作出维持决定后，左某不服，提起行政诉讼。对此，下列说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "左某申请法院调取证据应当在举证期限内提出"}, {"letter": "B", "content": "由区交警大队和区政府共同对罚款决定的合法性承担举证责任"}, {"letter": "C", "content": "区政府在复议程序中依法收集和补充的证据，可以作为法院认定罚款决定合法性的依据"}, {"letter": "D", "content": "法院依职权调取的证据不需要进行质证"}], "answer": "D"}, {"id": 418, "question": "根据行政诉讼法及相关规定，对于下列哪些诉讼请求，人民法院不予受理？", "type": "多选", "options": [{"letter": "A", "content": "法律、法规规定应当先申请行政复议，公民、法人或其他组织未申请复议而直接提起诉讼的"}, {"letter": "B", "content": "法律规定由行政机关最终裁决的具体行政行为，公民、法人或其他组织不服该具体行政行为，向人民法院提起诉讼的"}, {"letter": "C", "content": "复议机关在法定期限内不作出复议决定，公民、法人或其他组织不服，依法向人民法院提起诉讼的"}, {"letter": "D", "content": "人民法院裁定准许原告撤诉后，原告以同一事实和理由重新提起诉讼的"}], "answer": "CD"}, {"id": 419, "question": "当事人王某不服某市知识产权局作出的行政处罚决定，直接向人民法院提起诉讼，下列说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "其应当自知道或者应当知道作出行政行为之日起15.日内提出"}, {"letter": "B", "content": "其应当自知道或者应当知道作出行政行为之日起1个月内提出"}, {"letter": "C", "content": "其应当自知道或者应当知道作出行政行为之日起3个月内提出"}, {"letter": "D", "content": "其应当自知道或者应当知道作出行政行为之日起6个月内提出"}], "answer": "AB"}, {"id": 420, "question": "（反不正当竞争法）第29条规定，当事人对监险查部门作出的决定不服的，可以依法申请行政复议或者提起行政诉讼。某县市场监督管理局认定某企业利用广告对商品作引人误解的虚假宜传，构成不正当竞争，处10万元罚款。该企业不服，申复议。下列哪些说法是正确的：", "type": "多选", "options": [{"letter": "A", "content": "复议机关应当为该县市监局的上一级市监局"}, {"letter": "B", "content": "申请复议期限为15日"}, {"letter": "C", "content": "如复议机关作出维持决定，该企业向法院起诉，起诉期限为15日"}, {"letter": "D", "content": "对划款决定，该企业可以不经复议直接向法院起诉"}], "answer": "AB"}, {"id": 421, "question": "刘某向某人民法院提起行政诉讼，受诉人民法院在7日内既不立案，又不作出裁定，根据行政诉讼法及相关规定，刘某可以如何处理？多选）", "type": "多选", "options": [{"letter": "A", "content": "向上一级人民法院投诉"}, {"letter": "B", "content": "向上一级人民法院起诉"}, {"letter": "C", "content": "向上一级人民检察院抗诉"}, {"letter": "D", "content": "请求同级人民检察院抗诉"}], "answer": "C"}, {"id": 422, "question": "关于行政诉讼案件，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "在行政诉讼过程中，被告无权请求调解"}, {"letter": "B", "content": "在行政诉讼过程中，被告无权自行向原告和证人收集证据"}, {"letter": "C", "content": "在行政诉讼过程中，被告无权作出停止执行原具体行政行为的决定"}, {"letter": "D", "content": "在行政诉讼过程中，被告无权改变自已所作的具体行政行为"}], "answer": "B"}, {"id": 423, "question": "某派出所以扰乱公共秩序为由扣押了高某的拖拉机。高不服，以派出所为被告提起行政诉讼。诉讼中，法院认为被告应是县公安局，要求变更被告，高某不同意。法院下列哪种做法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "以派出所为被告继续市理本案"}, {"letter": "B", "content": "以县公安局为被告市理本案"}, {"letter": "C", "content": "裁定驳回起诉"}, {"letter": "D", "content": "裁定终结诉讼"}], "answer": "ABC"}, {"id": 424, "question": "汪某和邻居杨某因集体土地使用权产生争议、2010年3月10日，县政府为注某颁发集体土地使用证并通知了杨某，4月20日，杨某认为该行为侵犯了自已已有的集体土地使用权，向市政府申请复议，市政府认为杨某的复议请求超过了复议申请期，于是驳回了杨某的复议申请，4月25日，杨某就县政府颁发集体土地使用证行为向法院提起行政诉讼。下列哪一说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "杨某申请复议超过了复议申请期"}, {"letter": "B", "content": "法院应当以未经过复议为由，裁定驳回杨某的起诉"}, {"letter": "C", "content": "法院可以受理本案"}, {"letter": "D", "content": "法院应当驳回杨某起诉，并判决确认复议决定违法"}], "answer": "A"}, {"id": 425, "question": "张某不服某市税务局作出的行政处罚决定，起诉至人民法院，根据行政诉讼法及相关规定，下列说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "人民法院应当在立案之日起5日内，将起诉状副本发送某市税务局"}, {"letter": "B", "content": "该市税务局应当在收到起诉状副本之日起15日内向人民法院提交作出行政行为的证据和所依据的规范性文件"}, {"letter": "C", "content": "如果该市税务局不提交答辩状的，不影响人民法院审理"}, {"letter": "D", "content": "合议庭可以全部由审判员组成，也可以由审判员、陪审员组成，或者全部由陪审员组成"}], "answer": "ABCD"}, {"id": 426, "question": "王某不服某行政机关作出的具体行政行为，依法向人民法院提起行政诉讼。根据行政诉讼法及相关规定，下列哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "王某和该行政机关均有权申请审判人员回避"}, {"letter": "B", "content": "王某认为需要停止执行该其体行政行为的，该行政机关应当停止执行"}, {"letter": "C", "content": "在人民法院对该行政案件宜告判决或普裁定前，该行政机关不能改变其所作的具体行政行为"}, {"letter": "D", "content": "人民法院可以根据该行政机关的请求对该行政案件进行调解"}], "answer": "CD"}, {"id": 427, "question": "行政诉讼期间，不停止行政行为的执行，但是下列哪些情况，人民法院应当停正执行？多选）", "type": "多选", "options": [{"letter": "A", "content": "行政行为的执行会给国家利益造成重大损失的"}, {"letter": "B", "content": "被告申请停止执行，人民法院认为该行政行为的执行会给社会公共利益造成重大损害的"}, {"letter": "C", "content": "被告认为需停止执行的"}, {"letter": "D", "content": "原告申请停止执行，人民法院认为该行政行为的执行会造成难以弥补的损失的"}], "answer": "C"}, {"id": 428, "question": "根据行政诉讼法的规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "人民法院审理行政案件，参照行政法规"}, {"letter": "B", "content": "人民法院审理行政案件，参照地方性法规"}, {"letter": "C", "content": "人民法院审理行政案件，参照国务院部委根据法律或者行政法规制定、发布的规章"}, {"letter": "D", "content": "人民法院审理行政案件，参照直辖市人民政府根据法律或者行政法规制定、发布的规章"}], "answer": "AC"}, {"id": 429, "question": "根据行政诉讼法及相关规定，基层人民法院有特殊情况不能在立案之日起6个月内作出第一审行政判决，需要延长期限的，应如何处理？", "type": "单选", "options": [{"letter": "A", "content": "由该基层人民法院院长批准"}, {"letter": "B", "content": "由上一级人民法院批准"}, {"letter": "C", "content": "由高级人民法院批准"}, {"letter": "D", "content": "由最高人民法院批准机关所在地的基层人民法院提起行政诉讼，该法院适用普通程序审理此案并作出判决。下列哪些说法是正确的？（多选）"}], "answer": "BC"}, {"id": 430, "question": "根据行政诉讼法及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "人民法院审理行政案件，以法律和行政法规、部门规章和地方性法规为依据"}, {"letter": "B", "content": "人民法院审理行政案件，地方性法规适用于本行政区域内发生的行政案件"}, {"letter": "C", "content": "人民法院审理行政案件，参照国务院部、委制定、发布的规章"}, {"letter": "D", "content": "人民法院审理行政案件，认为国务院部、委制定、发布的规章之间不一致的，由最高人民法院作出解释或者裁决"}], "answer": "B"}, {"id": 431, "question": "行政诉讼过程中，在下列哪项情形下，人民法院可以按照撤诉处理？", "type": "单选", "options": [{"letter": "A", "content": "外地原告开庭前一天收到传票无法出庭的"}, {"letter": "B", "content": "上诉人认为人民法院偏祖被上诉人，未经法庭许可中途退庭的"}, {"letter": "C", "content": "原告申请撤诉，人民法院裁定不予准许，经合法传唤无正当理由拒不到庭的"}, {"letter": "D", "content": "被告改变原具体行政行为，原告不撤诉的"}], "answer": "ABCD"}, {"id": 432, "question": "根据行政诉讼法及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "被告未经法庭许可中途退庭的，可以缺席审判"}, {"letter": "B", "content": "经人民法院传票传唤，原告无正当理由拒不到處的，可以按照撤诉处理"}, {"letter": "C", "content": "原告未经法庭许可中途退庭的，可以按照监诉处理"}, {"letter": "D", "content": "经人民法院传票传唤，被告无正当理由拒不到庭的，可以缺席审判"}], "answer": "AB"}, {"id": 433, "question": "根据行政诉讼法及相关规定，在下列哪些情形下，人民法院中止行政诉讼？多选）", "type": "多选", "options": [{"letter": "A", "content": "原告死亡，须等待其近亲属表明是否参加诉讼的"}, {"letter": "B", "content": "案件的审判须以相关民事案件的审理结果为依据，而相关案件尚未审结的"}, {"letter": "C", "content": "原告死亡，没有近亲属或者近亲属放弃诉讼权利的"}, {"letter": "D", "content": "作为原告的法人或者其他组织终止后，其权利义务的承受人放弃诉讼权利的"}], "answer": "ABC"}, {"id": 434, "question": "关于行政诉讼中的财产保全，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "对于因一方当事人的行为，可能使人民法院生效裁判难以执行的案件，人民法院可以根据对方当事人的申请作出财产保全的裁定"}, {"letter": "B", "content": "对于因一方当事人的行为，可能使被诉具体行政行为难以执行的案件，人民法院可以根据对方当事人的申请作出财产保全的裁定"}, {"letter": "C", "content": "当事人没有提出财产保全申请的，人民法院在必要时可以依法采取财产保全措施"}, {"letter": "D", "content": "当事人对财产保全的裁定不服的，可以上诉"}], "answer": "ABD"}, {"id": 435, "question": "根据行政诉讼法及相关规定、行政行为有下列哪些情形的，人民法院判决撤销或者部分撤销，并可以判决被告重新作出行政行为？", "type": "多选", "options": [{"letter": "A", "content": "主要证据不足的"}, {"letter": "B", "content": "适用法律、法规错误的"}, {"letter": "C", "content": "行政程序轻微违法，但对原告权利不产生实际影响的"}, {"letter": "D", "content": "明显不当的"}], "answer": "B"}, {"id": 436, "question": "甲某对国家知识产权局作出的宣告其专利权全部无效的审查决定不服提起行政诉讼，经审理查明，无效宣告请求人乙某的身份被盗用，授权委托书上的签名系伪造，下列裁判方式正确的是？", "type": "单选", "options": [{"letter": "A", "content": "撤销无效宜告审查决定，并判令国家知识产权局就该无效请求重新作出审查决定"}, {"letter": "B", "content": "撤销无效宣告审查决定"}, {"letter": "C", "content": "鉴于专利法规定任何人均可以提出无效宜告请求，判决驳回甲的诉讼请求"}, {"letter": "D", "content": "鉴于专利法规定任何人均可以提出无效宣告请求，判决维持无效宣告审查决定"}], "answer": "ABCD"}, {"id": 437, "question": "根据行政诉讼法及相关规定，有关法院判决变更，下列说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "行政处罚明显不当，法院可以判决变更"}, {"letter": "B", "content": "涉及对款额的确定确有错误的行政行为，法院可以判决变更"}, {"letter": "C", "content": "法院判决变更，通常不得加重原告的义务"}, {"letter": "D", "content": "法院判决变更，通常不得减损原告的权益"}], "answer": "ABCD"}, {"id": 438, "question": "根据行政诉讼法及相关规定，下列哪些情况，法院应判决确认违法但不撤销或不需要撤销行政行为？", "type": "多选", "options": [{"letter": "A", "content": "行政行为依法应当撤销，但撤销会给国家利益、社会公共利益造成重大损害的"}, {"letter": "B", "content": "行政行为程序轻微违法，但对原告权利不产生实际影响的"}, {"letter": "C", "content": "被告改变原违法行政行为，原告仍要求确认原行政行为递法的"}, {"letter": "D", "content": "行政行为违法，但不具有可撤销内容的"}], "answer": "ABD"}, {"id": 439, "question": "行政诉讼案件有下列哪些情形的，人民法院应当判决驳回原告的诉讼请求？多选）", "type": "多选", "options": [{"letter": "A", "content": "行政行为证据确凿，适用法律、法规正确"}, {"letter": "B", "content": "符合法定程序"}, {"letter": "C", "content": "合法但明显不当"}, {"letter": "D", "content": "原告申请被告履行法定职责或者给付义务理由不成立"}], "answer": "B"}, {"id": 440, "question": "某镇政府以一公司所建钢架大棚未取得乡村建设规划许可证为由责令限期拆除。该公司逾期不拆除，镇政府现场向其送达强拆通知书，组织人员拆除了大棚。该公司向法院起诉要求撤销强拆行为。如一审法院审理认为强拆行为违反法定程序，可作出的判决有：", "type": "单选", "options": [{"letter": "A", "content": "撤销判决"}, {"letter": "B", "content": "确认违法判决"}, {"letter": "C", "content": "履行判决"}, {"letter": "D", "content": "变更判决"}], "answer": "C"}, {"id": 441, "question": "某公司就某行政机关对其作出的罚款5000元的行政处罚决定向人民法院起诉。在诉讼中，该行政机关变更了原处罚决定，将罚款数额改为3000元，并书面告知了人民法院，但该公司仍要求确认原行政行为违法。根据行政诉讼法及相关规定，！判决不限可以提起上诉，因此D选项正确。下列说法哪项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "人民法院应当裁定终结诉讼，并告知该公司另行起诉"}, {"letter": "B", "content": "人民法院应当对改变后的行政处罚决定进行审理"}, {"letter": "C", "content": "人民法院应当依法作出确认判决"}, {"letter": "D", "content": "人民法院应当对改变后的行政处罚决定和原行政处罚决定一并进行审理"}], "answer": "B"}, {"id": 442, "question": "根据行政诉讼法的规定，如果不存在需要延长审理期限的特殊情况，人民法院应当在下列哪个期限内作出行政案件的第一审判决？", "type": "单选", "options": [{"letter": "A", "content": "收到起诉状之日起6个月"}, {"letter": "B", "content": "立案之日起6个月"}, {"letter": "C", "content": "收到起诉状之日起3个月"}, {"letter": "D", "content": "立案之日起3个月"}], "answer": "BD"}, {"id": 443, "question": "对下列哪些行政裁判，当事人可以提起上诉？", "type": "多选", "options": [{"letter": "A", "content": "裁定不停止执行行政行为"}, {"letter": "B", "content": "裁定不予立案"}, {"letter": "C", "content": "裁定中止诉讼"}, {"letter": "D", "content": "判决驳回原告的诉讼请求"}], "answer": "B"}, {"id": 444, "question": "王某将沈某打成轻微伤，区公安分局给予王某行政拘留5日并罚款2000元的处罚。王某向区政府申请行政复议，区政府经听证以区公安分局超期办案为由作出确认违法决定。王某不服，提起行政诉讼，法院通知沈某作为第三人参加诉讼，下列说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "被告应为区政府"}, {"letter": "B", "content": "区公安分局负责人应当参加复议听证"}, {"letter": "C", "content": "应由区政府所在地中院管辖"}, {"letter": "D", "content": "沈某未经许可中途退庭，法院应中止审理"}], "answer": "BCD"}, {"id": 445, "question": "关于法院适用简易程序审理行政案件，下列哪项说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "法院应当庭宜判"}, {"letter": "B", "content": "应当在立案之日起45日内审结"}, {"letter": "C", "content": "如果中级人民法院是第一审法院，其也可以适用简易序审理行政案件"}, {"letter": "D", "content": "法院可以用电话的方式传唤当事人"}], "answer": "AC"}, {"id": 446, "question": "交警大队以方某闯红灯为由当场处以50元罚款，方某经复议后不服起诉。法院适用简易程序审理。关于简易程序，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "由审判员一人独任审理"}, {"letter": "B", "content": "法院应在立案之日起30日内审结，有特殊情况需延长的经批准可延长"}, {"letter": "C", "content": "法院在审理过程中发现不宜适用简易程序的，减定转为普通程序"}, {"letter": "D", "content": "对适用简易程序作出的判决，当事人不得提出上诉"}], "answer": "ABC"}, {"id": 447, "question": "李某失业后向民政局申请最低生活保障金，民政局在规定期限内未作答复，李某经复议后提起行政诉讼，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "李某可以申请先予执行"}, {"letter": "B", "content": "如果法院作出先予执行裁定，民政局不服可以申请复议"}, {"letter": "C", "content": "李某经行政复议后方能提起行政诉讼"}, {"letter": "D", "content": "本案应适用确认违法判决"}], "answer": "AC"}, {"id": 448, "question": "根据行政诉讼法及相关规定，下列关于行政诉讼第二审程序的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "当事人不服人民法院第一审行政判决的，有权在判决书送达之日起15日内向上一级人民法院提起上诉"}, {"letter": "B", "content": "人民法院对行政上诉案件，一律应当开庭审理"}, {"letter": "C", "content": "人民法院审理上诉案件，应当对原审人民法院的判决、裁定和被诉行政行为进行全面审查"}, {"letter": "D", "content": "原审人民法院对发回重审的案件作出判决后，当事人提起上诉的，第二审人民法院仍然可以再次发回重审"}], "answer": "A"}, {"id": 449, "question": "根据行政诉讼法及相关规定，下列关于行政诉讼第二审程序的说法哪项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "第二审人民法院对没有提出新的事实、证据或者理由，合议庭认为不需要开庭审理的，可以不开庭审理"}, {"letter": "B", "content": "第二审人民法院对行政上诉案件应当一律开庭审理"}, {"letter": "C", "content": "第二审人民法院审理行政上诉案件，只限于审查原审人民法院作出的裁判是否合法"}, {"letter": "D", "content": "第二审人民法院审理行政上诉案件，只限于审查被诉行政行为是否合法"}], "answer": "BC"}, {"id": 450, "question": "人民法院审理行政上诉案件，在下列哪些情形下可以裁定撤销原判，发回重审？多选）", "type": "多选", "options": [{"letter": "A", "content": "原判决认定事实清楚，但适用法律错误"}, {"letter": "B", "content": "原判决遗漏了当事人"}, {"letter": "C", "content": "原判决认定基本事实不清，证据不足"}, {"letter": "D", "content": "原判决是对发回重审的案件作出的"}], "answer": "ABD"}, {"id": 451, "question": "根据行政诉讼法及相关规定，关于法院审理上诉案件，下列说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "原审判决遗漏当事人，第二审法院应裁定撤销原判决，发回原审人民法院重审"}, {"letter": "B", "content": "原审判决违法缺席判决，第二审法院应裁定撤销原判决，发回原审人民法院重审"}, {"letter": "C", "content": "原审判决遗漏行政赔偿请求，第二审法院应裁定撤销原判决，发回原审人民法院重审"}, {"letter": "D", "content": "原审判决中应当回避的审判人员未回避的，第二审法院应裁定撤销原判决，发回原审人民法院重审重为由，决定强制关闭该厂。该厂向法院起诉要求撤销该决定，并提出赔偿请求。一审法院认定县政府决定进法，于以撤销，但未对赔偿请求作出裁判，县政府提出上诉。下列说法正确的是：（多选）"}], "answer": "BCD"}, {"id": 452, "question": "根据民事诉讼法和行政诉讼法的规定，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "民事诉讼可以申请诉前证据保全，而行政诉讼只能在诉讼中提出"}, {"letter": "B", "content": "基层法院一审，双方协商一致可以适用简易程序"}, {"letter": "C", "content": "都遵循谁主张谁举证的原则"}, {"letter": "D", "content": "民事诉讼中当事人的法律地位平等，行政诉讼中当事人的法律地位不平等"}], "answer": "AB"}, {"id": 453, "question": "根据行政复议法、行政诉讼法及相关规定，关于行政复议和行政诉讼，下列说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "行政复议案件和行政诉讼案件都可以审理行政行为的合理性和合法性"}, {"letter": "B", "content": "行政复议案件和行政诉讼案件的审理期限不同"}, {"letter": "C", "content": "行政复议机关收取的复议费用和人民法院收取的诉讼费用相同"}, {"letter": "D", "content": "提出行政复议申请的期限和提起行政诉讼的期限不同"}], "answer": "BD"}, {"id": 454, "question": "根据行政诉讼法及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "当事人对已经发生法律效力的判决、裁定，认为确有错误的，可以向原审人民法院提出再审"}, {"letter": "B", "content": "当事人对已经发生法律效力的判决、裁定，认为确有错误的，可以向原审人民法院的上一级人民法院提出再审"}, {"letter": "C", "content": "人民法院院长对本院已经发生法律效力的判决、裁定，发现违反法律、法规规定认为需要再审的，有权决定再审"}, {"letter": "D", "content": "上级人民法院对下级人民法院已经发生法律效力的判决、裁定，发现违反法律、法规规定的，有权提审或者指令下级人民法院再审"}], "answer": "BD"}, {"id": 455, "question": "根据行政诉讼法及相关规定，下列关于审判监督程序的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "当事人对已经发生法律效力的判决，认为确有错误的，可以向上一级人民法院申请再审"}, {"letter": "B", "content": "原判决遗漏诉讼请求，当事人提出再审申请的，人民法院应当再审"}, {"letter": "C", "content": "据以作出原判决的法律文书被撤销，当事人提出再审申请的，人民法院 , "content": "喷使、放纵他人股打造成公民身体伤害的"}, {"letter": "C", "content": "吸使、放纵他人虐待造成公民身体伤害的"}, {"letter": "D", "content": "违法征用财产的进行查封，给其造成了损失。张某认为该查封行为违法，欲要求国家赔偿。根据国家赔偿法及相关规定，下列哪些说法是正确的？（多选）"}], "answer": "ABCD"}, {"id": 462, "question": "下列可以在我国申请注册的商标种类有？多选）", "type": "多选", "options": [{"letter": "A", "content": "证明商标"}, {"letter": "B", "content": "服务商标"}, {"letter": "C", "content": "集体商标"}, {"letter": "D", "content": "商品商标"}], "answer": "ACD"}, {"id": 463, "question": "根据商标法及相关规定，下列关于证明商标的说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "由对某种商品或者服务具有监督能力的组织所控制"}, {"letter": "B", "content": "由对某种商品或者服务具有监督能力的组织成员内的单位或者个人使用于其商品或者服务"}, {"letter": "C", "content": "用以证明该商品或者服务的原产地、原料、制造方法、质量或者其他特定品质"}, {"letter": "D", "content": "以团体、协会或者其他组织名义注册，供该组织成员在商事活动中使用，以表明使用者在该组织中的成员资格"}], "answer": "ABCD"}, {"id": 464, "question": "根据商标法及相关规定，下列哪些可以作为商标申请注册？", "type": "多选", "options": [{"letter": "A", "content": "三维标志"}, {"letter": "B", "content": "声音"}, {"letter": "C", "content": "气味"}, {"letter": "D", "content": "朗色组合"}], "answer": "AC"}, {"id": 465, "question": "根据商标法及相关规定，下列哪些商标不能在我国获准注册？", "type": "多选", "options": [{"letter": "A", "content": "单一颜色商标"}, {"letter": "B", "content": "立体商标"}, {"letter": "C", "content": "位置商标"}, {"letter": "D", "content": "声音商标"}], "answer": "ABD"}, {"id": 466, "question": "根据前标法及相关规定，下列关于证明商标、集体商标的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "地理标志可以作为证明商标申请注册"}, {"letter": "B", "content": "地理标志可以作为集体商标申请注册"}, {"letter": "C", "content": "集体商标只能是服务商标"}, {"letter": "D", "content": "证明商标只能是商品商标"}], "answer": "AC"}, {"id": 467, "question": "根据商标法及相关规定，关于地理标志的说法正确的是：", "type": "单选", "options": [{"letter": "A", "content": "地理标志注册为商标必须为集体商标或证明商标"}, {"letter": "B", "content": "商标中有商品的地理标志，误导公众的，不予注册但可以使用"}, {"letter": "C", "content": "商标中有商品的地理标志，由于该商品并非来源于该标志所标示的地区，误导公众，即便已经善意取得注册仍可宣告无效"}, {"letter": "D", "content": "地理标志商标与普通商标之间不能进行近似性比较"}], "answer": "AB"}, {"id": 468, "question": "“慈溪蜜梨”产于浙江省宁波市慈溪市，因其不同于一般裂子，果大，水分特别充足 er": "ABCD"}, {"id": 493, "question": "根据商标法及相关规定，商标注册申请等有关文件可以什么方式提出？", "type": "多选", "options": [{"letter": "A", "content": "由申请人本人录音录像"}, {"letter": "B", "content": "书面方式"}, {"letter": "C", "content": "在商标受理窗口口头提出"}, {"letter": "D", "content": "数据电文"}], "answer": "AC"}, {"id": 494, "question": "根据商标法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "注册商标需要在核定使用范围之外的商品上政得商标专用权的，应当提出变更申请"}, {"letter": "B", "content": "注册商标需要改变其标志的，应当提出变更申请"}, {"letter": "C", "content": "注册商标需要变更注册人地址的，应当提出变更申请"}, {"letter": "D", "content": "注册前标需要变更注册人名义的，应当提出变更"}], "answer": "BD"}, {"id": 495, "question": "根据商标法及相关规定，在下列哪些情形下，应当提出新的商标注册申请？多选）", "type": "多选", "options": [{"letter": "A", "content": "注册商标需要在核定使用范围之外的商品上取得商标专用权的"}, {"letter": "B", "content": "商标注册申请人变更其名义的"}, {"letter": "C", "content": "注册商标需要改变其标志的"}, {"letter": "D", "content": "商标注册申请人删减指定的商品的"}], "answer": "CD"}, {"id": 496, "question": "根据商标法的规定，下列哪些情形下，巴黎公约成员国的商标注册申请人可以在中国享有优先权？多选）", "type": "多选", "options": [{"letter": "A", "content": "申请人自其商标在巴黎公约成员国第一次提出商标注册申请之日起6个月内，又在中国就相同商品以同一商标提出商标注册申请的"}, {"letter": "B", "content": "申请人自其商标在巴黎公约成员国第一次提出商标注册申请之日起6个月内，又在中国就类似商品以同一商标提出商标注册申请的"}, {"letter": "C", "content": "申请人在中国政府主办的国际展览会展出的商品上首次使用的商标，自该商品展出之日起6个月内，在中国就相同商品以同一商标提出商标注册申请的"}, {"letter": "D", "content": "申请人在中国政府承认的国际展览会展出的商品上首次使用的商标，自该商品展出之日起6个月内，在中国就相同商品以同一商标提出商标注册申请的"}], "answer": "ACD"}, {"id": 497, "question": "巴黎公约某成员国的公民史密斯，首次将某商标向其所在国提出申请，此后欲就该商标向中国提出商标注册申请并要求优先权。根据商标法及相关规定，下列说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "其优先权期限为自史密斯对该商标在该外国第一次提出商标注册申请之日起十二个月"}, {"letter": "B", "content": "其优先权期限为自史密斯对该商标在该外国第一次获得商标注册之日起六个月"}, {"letter": "C", "content": "为享有优先权，史密斯应当在提出商标注册申请的时候提出要求优先权的书面声明"}, {"letter": "D", "content": "为享有优先权，史密斯应当在中国就相同商品以该商标提出商标注册申请"}], "answer": "CD"}, {"id": 498, "question": "根据商标法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "申请注册的商标，同他人在类似商品上已经注册的商标近似的，可以予以核准注册"}, {"letter": "B", "content": "申请注册的商标，同他人在同一种商品上已经注册的商标近似的，驳回申请，不予公告"}, {"letter": "C", "content": "两个商标注册申请人在类似商品上以相同的商标申请注册的，初步审定并公告申请在先的商标"}, {"letter": "D", "content": "申请商标注册时，不得以不正当手段抢先注册他人已经使用并有一定影响的商标"}], "answer": "BCD"}, {"id": 499, "question": "甲乙两企业都拟在其所生产的服装商品上注册“蓝调\"牌商标，均递交了注册申请。下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "如果二者同一天申请且均未使用或同日使用的，应自行协商确定，协商不成的，将驳回双方申请"}, {"letter": "B", "content": "如果二者在同一天申请的，初步审定并公告使用在先的"}, {"letter": "C", "content": "如果二者在同一天申请的，各申请人应当在60天内交送第一次使用该商标的日期证明"}, {"letter": "D", "content": "如果二者均未使用\"蓝调\"牌商标，应初步审定并公告申请在先的"}], "answer": "BD"}, {"id": 500, "question": "申、乙两公司均在同一种商品上申请注册“伊人”商标。根据商标法及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "如果甲公司先于乙公司一天提出注册申请，但乙公司使用在先，则应初步审定并公告甲公司申请注册的商标"}, {"letter": "B", "content": "如果甲公司先于乙公司一天提出注册申请，但乙公司使用在先，则应初步审定并公告乙公司申请注册的商标"}, {"letter": "C", "content": "如果甲、乙两公司同一天提出注册申请，但乙公司使用在先，则初步审定并公告乙公司申请注册的商标"}, {"letter": "D", "content": "如果甲、乙两公司同一天提出注册审请，且甲、乙公司均未使用该商标，则应直接通知甲、乙两公司以抽签的方式确定一个申请人，驳回另一人的注册申请"}], "answer": "AC"}, {"id": 501, "question": "根据商标法及相关规定，下列哪些情形的商标注册申请应当予以驳回？多选）", "type": "多选", "options": [{"letter": "A", "content": "申请注册的标志用作商标易产生不良影响的"}, {"letter": "B", "content": "申请注册的标志不具有显著特征的"}, {"letter": "C", "content": "申请注册的标志同他人在类似商品上已经注册的商标相同或者近似的"}, {"letter": "D", "content": "未缴纳商标申请费用的"}], "answer": "ABC"}, {"id": 502, "question": "根据商标法及相关规定，下列哪些属于应当驳回商标注册申请的情形？多选）", "type": "多选", "options": [{"letter": "A", "content": "以不正当手段抢先注册他人已经使用并有一定影响的商标"}, {"letter": "B", "content": "两个或者两个以上的申请人，在同一种商品或者选项，根据《商标法》第18条规定，外国人或者外国册，且均未使用"}, {"letter": "C", "content": "不以使用为目的的恶意商标注册申请"}, {"letter": "D", "content": "以不得作为商标使用的标志申请注册商标"}], "answer": "B"}, {"id": 503, "question": "李某对驳回其商标注册申请的决定不服。根据商标法及相关规定，下列说法哪项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "李某可以自收到通知之日起十五日内提出行政复议"}, {"letter": "B", "content": "李某可以自收到通知之日起十五日内申请复审"}, {"letter": "C", "content": "李某可以自收到通知之日起三个月内申请复审"}, {"letter": "D", "content": "李某可以自收到通知之日起三个月内向北京知识产权法院提起行政诉讼"}], "answer": "BC"}, {"id": 504, "question": "澳大利亚人汤姆逊认为我国初步审定并予以公告的某商标和其拥有的中国商标相近，欲提出异议。根据商标法及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "汤姆逊无权对该商标提出异议"}, {"letter": "B", "content": "汤姆逊有权提出异议，提出异议的时间期限为自公告之日起三个月内"}, {"letter": "C", "content": "汤姆逊有权提出异议，但应委托代理机构代为提出"}, {"letter": "D", "content": "汤姆逊有权提出异议，其异议审理期限最长为12个月"}], "answer": "ABCD"}, {"id": 505, "question": "根据商标法及相关规定，对初步审定公告的商标，自公告之日起三个月内，在先权利人、利害关系人可以基于下列哪些理由提起异议？", "type": "多选", "options": [{"letter": "A", "content": "就类似商品申请注册的商标是募仿他人未在中国注册的驰名商标，容易导致混消的"}, {"letter": "B", "content": "就相同商品申请注册的商标是翻译他人未在中国注册的驰名商标，容易导致混消的"}, {"letter": "C", "content": "申请商标注册损害他人现有的在先权利的"}, {"letter": "D", "content": "以不正当手段抢先注册他人已经使用并有一定能不许合言标法带33案定的：（三）无啡崎的算响的商标的"}], "answer": "C"}, {"id": 506, "question": "根据商标法及相关规定，下列关于异议程序的说法哪项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "初步审定的商标，先予以公告，自公告之日起三个月内，任何人均可以对其提出异议"}, {"letter": "B", "content": "经裁定异议不成立而核准注册的，商标注册申请人取得商标专用权的时间自异议裁定生效之日起计算"}, {"letter": "C", "content": "经裁定异议不成立而核准注册的，商标注册申请人取得商标专用权的时间自初审公告三个月期满之日起计算"}, {"letter": "D", "content": "当事人不服异议裁定的，可以自收到通知之日起三十日内向人民法院起诉"}], "answer": "AD"}, {"id": 507, "question": "根据商标法及相关规定，下列哪些选项风于不予受理的商标异议申请的情形？", "type": "多选", "options": [{"letter": "A", "content": "申请人无明确异议理由"}, {"letter": "B", "content": "在先权利人、利害关系人共同提出异议申请"}, {"letter": "C", "content": "同一异议人为补充证据材料以相同的理由针对同一商标再次提出异议申请的"}, {"letter": "D", "content": "在商标初审公告之日起三个月后提出异议申请"}], "answer": "C"}, {"id": 508, "question": "根据商标法及相关规定，经审查对商标异议案件作出决定后，当事人不服的，下列关于救济程序的哪种说法是正确的？单选）", "type": "单选", "options": [{"letter": "A", "content": "作出准予注册决定的，异议人不服的，可以申请复审"}, {"letter": "B", "content": "作出准予注册决定的，异议人不服的，可以申请行政复议"}, {"letter": "C", "content": "作出不予注册决定的，被异议人不服的，可以申请复审"}, {"letter": "D", "content": "作出不予注册决定的，被异议人不服的，可以向人和紫体的区别，属于相同商标。B选项，“Susanna”民法院提起行政诉讼"}], "answer": "C"}, {"id": 509, "question": "根据商标法及相关规定，被异议人对不予注册的复审决定不服的，向人民法院起诉，下列哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "人民法院应当通知异议人作为原告参加诉

有下列哪些情形的，由负资商标执法的部门资令限期改正，期满不改正的，可撤销其注册商标？", "type": "多选", "options": [{"letter": "A", "content": "自行改变注册商标"}, {"letter": "B", "content": "自行改变注册人名义"}, {"letter": "C", "content": "注册商标成为其核定使用的商品的通用名称"}, {"letter": "D", "content": "没有正当理由连续三年不使用"}], "answer": "AB"}, {"id": 535, "question": "根据商标法及相关规定，当事人对下列哪些决定不服可在收到通知之日起十五日内申请复审？", "type": "多选", "options": [{"letter": "A", "content": "对驳回申请、不予公告不服的"}, {"letter": "B", "content": "对不予撤销注册商标的决定不服的"}, {"letter": "C", "content": "对经过异议程序中异议不成立，决定被异议商标准予注册不服的"}, {"letter": "D", "content": "被异议人对商标不予注册决定不服的"}], "answer": "ABD"}, {"id": 536, "question": "根据商标法及相关规定，下列有关注册商标撤销和无效的哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "被撤销的注册商标，应予以公告，该注册商标专用权自公告之日起终止"}, {"letter": "B", "content": "被撤销的注册商标，应予以公告，该注册商标专用权视为自始即不存在"}, {"letter": "C", "content": "被宣告无效的注册商标，应予以公告，该注册商标专用权自公告之日起终止"}, {"letter": "D", "content": "被宣告无效的注册商标，应予以公告，该注册商标专用权视为自始即不存在"}], "answer": "AD"}, {"id": 537, "question": "根据商标法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "注册商标被撤销的，自撤销之日起一年内，与该商标相同的商标注册申请，不予核准"}, {"letter": "B", "content": "被撤销的注册商标，撤销理由仅及于部分指定商品的，在其他部分指定商品上使用的商标注册视为一并撤销"}, {"letter": "C", "content": "注册商标期满不再续展的，自注销之日起一年内，与该商标相同的商标注册申请，不予核准"}, {"letter": "D", "content": "当事人对撤销注册商标的决定不服的，可以自收到通知之日起30日内向人民法院起诉"}], "answer": "AC"}, {"id": 538, "question": "某县甲公司未经漫画家乙许可，将其创作的一幅漫画作品作为商标申请，并于2020年3月3日被核准注册。乙认为其著作权受到侵害，与甲发生纠纷。乙应当采取下列哪种方式保护自己的合法权益？", "type": "单选", "options": [{"letter": "A", "content": "向甲公司所在地基层法院提起侵犯著作权之诉"}, {"letter": "B", "content": "向有管辖权的法院提起撤销甲公司的注册商标之诉"}, {"letter": "C", "content": "请求宜告该注册商标无效"}, {"letter": "D", "content": "请求撤销该注册商标"}], "answer": "C"}, {"id": 539, "question": "个体经营户王小小从事理发服务业，使用“一帅没“作为未注册商标长期使用，享有软高声誉。王小小通过签订书而合同许可其同一城区的表妹张薇使用”一帅没“商标从事理发业务。后张薇以自己的名义申请”一剪没”商标使用于理发业务并获得注册。下列说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "该商标使用许可合同自双方签字之日起生效"}, {"letter": "B", "content": "该商标使用许可合同备案后生效"}, {"letter": "C", "content": "王小小有权自“一前没\"注册之日起5年内请求宜告该注册商标无效"}, {"letter": "D", "content": "主小小无权请求宜告该注册商标无效"}], "answer": "AB"}, {"id": 540, "question": "下列哪些商标在申请注册时，有可能会被商标注册部门认定为不以使用为目的恶意注册申请？", "type": "多选", "options": [{"letter": "A", "content": "某旅游公司在多个类别商品上申请百余件商标注册申请，其中大量为“终南山”、“安地斯”、棕榈岛”、“铜锣湾“字样的注册商标申请"}, {"letter": "B", "content": "某贸易公司在多个类别商品上申请多件商标注册申请，其中一半以上为“十七街”、“宸光文具”、“威斯汀\"字样的注册商标申请"}, {"letter": "C", "content": "某地产公司为其开发的楼盘申请“桂语听”、“意景澜庭”、“清溪”、“云舒”等注册商标"}, {"letter": "D", "content": "某餐饮公司已经注册“李小老”作为其商标，后在相同的类别上又大量申请“张小老”、“王小老”、“刘小老”等不同姓氏百余件商标申请"}], "answer": "ABCD"}, {"id": 541, "question": "甲公司注册了商标“露滴”，使用于日用化妆品等商品上，下列选项说法错误的有？多选）", "type": "多选", "options": [{"letter": "A", "content": "甲公司要将该商标改成“滴露”，应提出变更申请"}, {"letter": "B", "content": "乙公司在化妆品上擅自使用“滴露”为商标，甲公司有权止，四此日造开正。C选项，携《育标禁止"}, {"letter": "C", "content": "甲公司因经营不善连续三年停止使用该商标，该商标可能被注销"}, {"letter": "D", "content": "甲公司签订该商标转让合同后，应单独向国家知识产权局提出转让申请"}], "answer": "AD"}, {"id": 542, "question": "根据商标法及相关规定，下列哪些情形属于国家知识产", "type": "单选", "options": [{"letter": "A", "content": "商标注册人在便用注册商标的过程中，自行改变注册商标"}, {"letter": "B", "content": "注册商标成为其核定使用的商品的通用名称"}, {"letter": "C", "content": "注册商标没有正当理由连续三年不使用"}, {"letter": "D", "content": "商标注册人在使用注册商标的过程中，自行改变注册人名义"}], "answer": "ABCD"}, {"id": 543, "question": "根据商标法及相关规定，下列哪些说法是正确的？！：", "type": "多选", "options": [{"letter": "A", "content": "张某的注册商标含有本商品的通用名称，张某无权禁止他人正当使用"}, {"letter": "B", "content": "王某的注册商标中含有本商品的型号，王某无权禁止他人正当使用"}, {"letter": "C", "content": "李某的注册商标中含有的地名，李某无权禁止他人正当使用"}, {"letter": "D", "content": "赵某的三维标志注册商标中含有的商品自身性质产生的形状，赵某无权禁止他人正当使用"}], "answer": "ABC"}, {"id": 544, "question": "根据商标法及相关规定，下列哪些情形属于商标的正当使用，不构成商标侵权：", "type": "多选", "options": [{"letter": "A", "content": "使用注册商标中含有的“有机\"文字，但书写方式和注册商标中不同"}, {"letter": "B", "content": "使用注册商标中含有的菱形图形"}, {"letter": "C", "content": "使用注册商标中含有的“100%”，但表现形式不同于注！“注册商标中合有的本商品的通用名称、图册商标"}, {"letter": "D", "content": "使用注册商标中含有的“纯爱”文字"}], "answer": "D"}, {"id": 545, "question": "甲公司是某注册商标的专用权人。在甲公司申请该商标注册前，乙公司已经在同一种商品上先于甲公司使用与该注册商标相同并有一定影响的商标。根据商标法及相关规定，下列哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "甲公司有权禁止乙公司继续使用该商标并要求其赔偿损失"}, {"letter": "B", "content": "甲公司有权禁止乙公司继续使用该商标，但无权要求其赔偿损失"}, {"letter": "C", "content": "甲公司无权禁止乙公司在原使用范围内继续使用该商标，但可以要求其支付一定的使用费"}, {"letter": "D", "content": "甲公司无权禁止乙公司在原使用范围内继续使用该商标，但可以要求其附加适当区别标识该酒的包装、装潢和广告中突出宜传酒名，致“逍遥乐\"被消费者熟知，声誉良好。乙公司知道甲公司没有注册“逍遥乐”后，将其作为自己所产白酒的商标使用并抢先注册。该商标注册申请经初步审定后公告。下列哪些说法是正确的？（多选）"}], "answer": "AB"}, {"id": 546, "question": "甲公司许可乙公司独占使用其注册商标，在合同履行期间，市场上出现大量俊犯该注册商标专用权的商品。对此，下列关于侵权诉讼的说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "申公司可以自行提起诉讼"}, {"letter": "B", "content": "乙公司可以自行提起诉讼"}, {"letter": "C", "content": "甲和乙应当共同起诉"}, {"letter": "D", "content": "在甲不起诉的情况下，乙才可以自行提起诉讼"}], "answer": "AB"}, {"id": 547, "question": "甲公司为其牛奶产品注册了“润语\"商标后，通过签订排他许可合同许可乙公司使用。丙公司在其酸奶产品上使用“润雨”商标，甲公司遂起诉丙公司停止侵害并赔偿损失，法院判决支持了甲公司的请求。在该判决执行完毕后，“润语”注册商标因侵犯丁公司的著作权被依法宣告无效。下列哪些选项是错误的？", "type": "多选", "options": [{"letter": "A", "content": "甲公司和乙公司可以作为共同原告起诉丙公司"}, {"letter": "B", "content": "甲公司与乙公司的许可合同应当认定为无效合同，乙公司应当申请返还许可费"}, {"letter": "C", "content": "甲公司获得的侵权赔偿费构成不当得利，应当返还给丙公司"}, {"letter": "D", "content": "甲公司获得的侵权赔偿费应当转付给丁公司"}], "answer": "BCD"}, {"id": 548, "question": "根据商标法及相关规定，对于保全的哪些说法是正确的：多选）", "type": "多选", "options": [{"letter": "A", "content": "为制止侵权行为，在证据可能灭失的情况下，商标注册人可以依法在起诉前向法院申请证据保全"}, {"letter": "B", "content": "为制止侵权行为，在证据以后难以取得的情况下，注册商标的利害关系人可以依法在起诉前向法院申请证据保全"}, {"letter": "C", "content": "商标注册人或者利害关系人有证据证明他人正在实施或者即将实施侵犯其注册商标专用权的行为，如不及时制止将会使其合法权益受到难以弥补的损害的，可以依法在起诉前向人民法院申请采取财产保全的措施"}, {"letter": "D", "content": "商标注册人或者利害关系人有证据证明他人正在实施或者即将实施侵犯其注册商标专用权的行为，如不及时制止将会使其合法权益受到难以弥补的损害的，可以依法在起诉前向人民法院申请采取费令停正有关行为的措施"}], "answer": "ABCD"}, {"id": 549, "question": "根据商标法及相关规定，下列哪项不属于负责商标执法的部门对涉嫌商标侵权行为进行查处时可以行使的职权？", "type": "单选", "options": [{"letter": "A", "content": "询问有关当事人"}, {"letter": "B", "content": "对当事人涉嫌从事侵犯他人注册商标专用权活动的场所实施现场检查"}, {"letter": "C", "content": "检查与侵权活动有关的物品"}, {"letter": "D", "content": "对涉嫌侵权人予以拘留"}], "answer": "D"}, {"id": 550, "question": "根据商标法及相关规定，在侵犯商标专用权纠纷案件中，权利人因被侵权所受到的实际损失、侵权人因侵权所获得的利益、注册商标许可使用费难以确定的，赔偿数额应当如何确定？", "type": "单选", "options": [{"letter": "A", "content": "由人民法院根据侵权行为的情节判决给予五十万以下的赔偿"}, {"letter": "B", "content": "由人民法院根据侵权行为的情节判决给予一百万以下的赔偿"}, {"letter": "C", "content": "由人民法院根据侵权行为的情节判决给予三百万以下的赔偿"}, {"letter": "D", "content": "由人民法院根据侵权行为的情节判决给予五百万以下的赔偿中哪些是合法的？（多选）"}], "answer": "D"}, {"id": 551, "question": "根据商标法及相关规定，下列关于注册商标专用权的说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "注册商标中含有的地名，注册商标专用权人无权禁止他人正当使用"}, {"letter": "B", "content": "注册商标的专用权，以核准注册的商标和核定使用的商品为限"}, {"letter": "C", "content": "侵犯注册商标专用权的赔偿数额应当包括权利人为制止侵权行为所支付的合理开支"}, {"letter": "D", "content": "商标注册人申请商标注册前，他人已经在同一种商品上先于商标注册人使用与注册商标相同的商标的，注册商标专用权人可以禁止该使用人继续使用该商标"}], "answer": "BD"}, {"id": 552, "question": "在某商标侵权案件中，注册商标专用权人请求赔偿的，被控侵权人以什么理由提出抗辩可能会免于承担赔偿责任？", "type": "单选", "options": [{"letter": "A", "content": "注册商标专用权人未使用注册商标"}, {"letter": "B", "content": "注册商标专用权人未合理使用注册商标"}, {"letter": "C", "content": "注册商标专用权人使用注册商标未满三年"}, {"letter": "D", "content": "使用该注册商标的产品质量不达标"}], "answer": "ABC"}, {"id": 553, "question": "根据商标法及相关规定，销售不知道是侵犯注册商标专用权的商品，能证明该商品是自己合法取得并说明提供者的，经查证属实成者供货单位认可的：（二）有供取得的情形？多选）", "type": "多选", "options": [{"letter": "A", "content": "有供货单位合法签章的供货清单和货款收据且经查证属实的"}, {"letter": "B", "content": "有供销双方签订的进货合同且经查证已经真实履行的"}, {"letter": "C", "content": "有合法进货发票且发票记载事项与涉案商品对应的"}, {"letter": "D", "content": "以上都是"}], "answer": "A"}, {"id": 554, "question": "根据商标法及相关规定，关于驰名商标的认定，下列说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "人民法院在审理商标纠纷案件中，根据当事人的请求和案件的具体情况，可以对涉及的注册商标是否驰名依法作出认定"}, {"letter": "B", "content": "在名牌推进战略实施过程中，可由相关行业协会进行认定"}, {"letter": "C", "content": "在商标注册过程中产生争议时，有关当事人认为其商标构成驰名商标的，国务院商标管理部门可以对商标驰名情况作出认定"}, {"letter": "D", "content": "在商标评审过程中产生争议时，有关当事人认为其商标构成驰名商标的，国务院商标管理部门可以对商标驰名情况作出认定"}], "answer": "ABCD"}, {"id": 555, "question": "针对经初步审定公告的某商标，某公司认为该商标募仿其已经在中国注册的驰名商标，误导公众并致使公司利益受到损害。根据商标法及相关规定，该公司可以如何处理？单选）", "type": "单选", "options": [{"letter": "A", "content": "自公告之日起三个月内提出异议"}, {"letter": "B", "content": "自公告之日起三个月内申请复审"}, {"letter": "C", "content": "自公告之日起三个月内申请行政复议"}, {"letter": "D", "content": "自公告之日起三个月内向法院起诉"}], "answer": "ABCD"}, {"id": 556, "question": "根据商标法及相关规定，关于驰名商标说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "对未在中国注册的驰名商标，在相同或者类似商品上予以保护"}, {"letter": "B", "content": "对已在中国注册的驰名商标，在不相同或者不相类似商品上予以跨类保护"}, {"letter": "C", "content": "驰名商标所有人基于相对理由对恶意注册的商标请求宣告无效的申请，其不受五年的时间限制"}, {"letter": "D", "content": "经营者可以将“驰名商标\"字样用于广告宣传"}], "answer": "A"}, {"id": 557, "question": "根据商标法及相关规定，以中国为原属国申请商标国际注册的，应当至少符合以下哪个条件？", "type": "多选", "options": [{"letter": "A", "content": "在中国设有真实有效的营业所"}, {"letter": "B", "content": "在中国有住所"}, {"letter": "C", "content": "拥有中国国籍"}, {"letter": "D", "content": "必须同时符合以上所有条件"}], "answer": "ABC"}, {"id": 558, "question": "关于马德里国际商标注册下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "以中国为原属国申请商标国际注册的可以直接向世界知识产权组织国际局申请办理"}, {"letter": "B", "content": "以中国为原属国，与马德里协定有关的商标国际注册的后期指定可以直接向世界知识产权组织国际局申请办理"}, {"letter": "C", "content": "商标国际注册申请指定的商品或服务不得超过国内基础申请或基础注册商品或服务范围"}, {"letter": "D", "content": "未按照规定填写的商标国际注册申请书的商标申请不予受理"}], "answer": "ABC"}, {"id": 559, "question": "根据商标法及相关规定，下列哪个事务可以直接向世界知识产权组织国际局申请办理？", "type": "单选", "options": [{"letter": "A", "content": "以中国为原属国的，与马德里协定有关的商标国际注册的后期指定"}, {"letter": "B", "content": "以中国为原属国的，与马德里协定有关的商标国际注册的转让"}, {"letter": "C", "content": "以中国为原属国申请商标国际注册的"}, {"letter": "D", "content": "以中国为原属国的，与马德里协定有关的商标国际注册的放弃"}], "answer": "CD"}, {"id": 560, "question": "下列关于地理标志产品的规定，哪些说法是正确的", "type": "多选", "options": [{"letter": "A", "content": "地理标志产品保护申请由国家知识产权局进行形式审查"}, {"letter": "B", "content": "地理标志产品保护申请由国家知识产权局组织开展技术审查"}, {"letter": "C", "content": "地方知识产权管理部门负责本行政区域内的地理标志产品以及专用标志的管理和保护工作"}, {"letter": "D", "content": "国家知识产权局负费全国地理标志产品以及专用标志的管理和保护工作"}], "answer": "ABCD"}, {"id": 561, "question": "下列关于地理标志产品的规定，哪些说法！用地理标志产品名称的”，因此B选项正喻。地理标志是正确的", "type": "多选", "options": [{"letter": "A", "content": "地理标志产品自初步认定公告之日起3个月内，任何人可以向国家知识产权局提出异议"}, {"letter": "B", "content": "连续3年未在生产销售中使用地理标志产品名称的，任何人可以申请请求撤销地理标志产品保护"}, {"letter": "C", "content": "在产地范围外的类似产品上使用受保护的地理标志产品名称的，属于侵犯地理标志产品"}, {"letter": "D", "content": "已迁出地理标志产品产地范围的，国家知识产权局注销其地理标志专用标志使用注册登记"}], "answer": "ABCD"}, {"id": 562, "question": "下列各项中，哪些风于我国著作权法规定的作品？", "type": "多选", "options": [{"letter": "A", "content": "口述作品"}, {"letter": "B", "content": "摄影作品"}, {"letter": "C", "content": "曲艺作品"}, {"letter": "D", "content": "戏剧作品"}], "answer": "BCD"}, {"id": 563, "question": "根据著作权法及相关规定，下列有关作品的说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "作品应当具有独创性并能以一定形式表现"}, {"letter": "B", "content": "文字作品，是指小说、诗词、散文、论文等以文字形式表现的作品"}, {"letter": "C", "content": "反映地理现象、说明事物原理或者结构的地图属于美术作品"}, {"letter": "D", "content": "为展示、试验或者观测等用途，根据物体的形状和结构按照一定比例制成的立体模型属于模型作品"}], "answer": "ABCD"}, {"id": 564, "question": "下列哪些不适用我国著作权法的规定？多选）", "type": "多选", "options": [{"letter": "A", "content": "某9岁儿童创作的短篇小说"}, {"letter": "B", "content": "某电视台报道的单纯事实消息"}, {"letter": "C", "content": "某城市交通电子地图"}, {"letter": "D", "content": "某法律的官方英文译文权保护的作品？（单选）"}], "answer": "ABD"}, {"id": 565, "question": "根据著作权法及相关规定，下列哪些属于我国著作权法保护的客体？", "type": "多选", "options": [{"letter": "A", "content": "某专利审查员发表的关于如何答复审查意见通知书的论文"}, {"letter": "B", "content": "某人民法院就某专利权属纠纷案件作出的民事判决书"}, {"letter": "C", "content": "化学元素周期表"}, {"letter": "D", "content": "某艺术家表演的杂技艺术"}], "answer": "BD"}, {"id": 566, "question": "我国《著作权法》不适用于下列哪些选项？", "type": "多选", "options": [{"letter": "A", "content": "法院判决书"}, {"letter": "B", "content": "《与贸易有关的知识产权协定》的官方中文译文"}, {"letter": "C", "content": "《伯尔尼公约》成员国国民的未发表且未经我国有关部门审批的境外影视作品"}, {"letter": "D", "content": "奥运会开幕式火炬点燃仪式的创意"}], "answer": "A"}, {"id": 567, "question": "根据著作权法及相关规定，关于著作权的保护，下列说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "如果文章不是在我国境内创作的，不受我国著作权法保护"}, {"letter": "B", "content": "外国人在我国境内首先出版的文章受我国著作权法保护"}, {"letter": "C", "content": "中国人首先在非洲某国家发表的文章，是否受我国著作权法保护，取决于该非洲国家是否与我国签订了协议或共同参加了相关国际条约"}, {"letter": "D", "content": "只有已发表的文章受我国著作权法保护"}], "answer": "AD"}, {"id": 568, "question": "作家张某撰写一部短篇小说《专利代理师的率福生活》，日办理了作品登记，2016年10月30日该作品在杂志上发表。根据著作权法及相关规定，该作品著作权从何时起产生？", "type": "单选", "options": [{"letter": "A", "content": "2016年8月9日"}, {"letter": "B", "content": "2016年9月9日"}, {"letter": "C", "content": "2016年10月9日"}, {"letter": "D", "content": "2016年10月30日"}], "answer": "ABD"}, {"id": 569, "question": "甲小学主持起草2015年学校工作总结并上报区教育局。其间，校办公室主任张某接受该小学指派承担了具体提写工作。根据著作权法及相关规定，下列哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "甲小学视为该工作总结的作者"}, {"letter": "B", "content": "该工作总结的作者是张某，该工作总结的著作权人是甲小学"}, {"letter": "C", "content": "该工作总结的署名权由张某享有，该工作总结的复制权由甲小学享有"}, {"letter": "D", "content": "该工作总结的著作权由张某享有"}], "answer": "B"}, {"id": 570, "question": "某公司主持起草新的绩效考核办法，该公司人力资源部王某接受公司指派承担了具体撰写工作，并上报该公司董事会审议通过。根据著作权法及相关规定，下列哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "该公司视为该绩效考核办法的作者"}, {"letter": "B", "content": "该续效考核办法的作者是王某，该绩效考核办法的著作权人也是王某"}, {"letter": "C", "content": "该续效考核办法的作者是王某，该绩效考核办法的著作权人是该公司"}, {"letter": "D", "content": "该续效考核办法的署名权由王某享有，该绩效考核办法的复制权由该公司享有"}], "answer": "A"}, {"id": 571, "question": "李某以专利代理师常某为原型创作了一部小说。在创作过程中，杨某提供了资金，王某提供了一些咨询意见。根据著作权法款规定：“合作作品的落作权由合作作及相关规定，下列关于该小说作者的哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "杨某是作者"}, {"letter": "B", "content": "王某是作者"}, {"letter": "C", "content": "李某是作者"}, {"letter": "D", "content": "常某是作者"}], "answer": "C"}, {"id": 572, "question": "根据著作权法及相关规定，对于不可以分割使用的合作作品，各合作作者就著作权的行使不能协商一致，又无正当理由的，任何一方可以阻止他方行使下列哪些权利？多选）", "type": "多选", "options": [{"letter": "A", "content": "转让"}, {"letter": "B", "content": "发行"}, {"letter": "C", "content": "出质"}, {"letter": "D", "content": "许可他人专有使用"}], "answer": "ACD"}, {"id": 573, "question": "甲提供资金，乙组织丙和丁以乡村教师戊为原型创作小说《小河弯弯》。在创作中丙写提纲，丁写初稿，丙修改，戊提供了生活素材，乙提供了一些咨询意见。下列哪些选项是错误的？", "type": "多选", "options": [{"letter": "A", "content": "甲提供资金是完成创作的保障，应为作者"}, {"letter": "B", "content": "乙作为组织者并提供咨询意见，应为作者"}, {"letter": "C", "content": "戊提供了生活素材，应为作者"}, {"letter": "D", "content": "丁有权不经甲、乙、丙的同意发表该小说"}], "answer": "ABC"}, {"id": 574, "question": "根据著作权法及相关规定，下列关于著作权集体管理组织的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "著作权人可以授权著作权集体管理组织行使著作权"}, {"letter": "B", "content": "著作权集体管理组织被授权后，可以以自已的名义为与著作权有关的权利人主张权利"}, {"letter": "C", "content": "著作权集体管理组织可以作为当事人进行涉及著作权的诉讼活动"}, {"letter": "D", "content": "著作权集体管理组织只能作为诉讼代理人进行涉及与著作权有关的权利的诉讼活动社与赵某联系欲出版该小说，程某表示坚决反对，两人不能协商一用，因此A、C、D选项借误，B选项正响。致。根据著作权法及相关规定，下列哪些说法是正确的？（多选）"}], "answer": "ABC"}, {"id": 575, "question": "甲、乙、丙、丁四人合作创作一部小说，甲欲将该小说许可给某电影制片厂改编后拍成电影，乙则想把它许可给某网站在网络上传播，丙对这两种做法均表示反对，丁则不置可否。对此，下列哪一选项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "如果丙坚持反对，甲、乙均不能将作品许可他人使用"}, {"letter": "B", "content": "甲、乙有权不顾丙的反对，将作品许可他人使用"}, {"letter": "C", "content": "如果丁同意，则甲、乙可以不顾丙的反对将作品许可他人使用"}, {"letter": "D", "content": "如果丁也表示反对，则甲、乙不能将作品许可他人使用"}], "answer": "AD"}, {"id": 576, "question": "金某于2012年12月24日创作完成了某小说，并于2013年2月14日发表于某网络文学网站。经金某许可，张某将该小说改编为电影剧本，甲公司作为电影制作者将该剧本拍摄成电影，导演为周某。根据著作权法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "金某自2013年2月14日起对该小说享有著作权"}, {"letter": "B", "content": "该电影剧本的著作权由张某享有"}, {"letter": "C", "content": "该电影作品的著作权由甲公司享有"}, {"letter": "D", "content": "该电影作品的著作权由张某和周某共同享有"}], "answer": "B"}, {"id": 577, "question": "某学院委托设计师陈某为其设计院徽，双方约定了院徽的使用范围，但未约定其著作权归属。该学院使用院徽一段时间后，双方对该院徽的著作权归属产生了争议。根据著作权法及相关规定，下列哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "该学院享有该院微的著作权"}, {"letter": "B", "content": "该学院和陈某共同享有该院微的著作权"}, {"letter": "C", "content": "陈某享有该院微的著作权、有权要求该学院停止使用"}, {"letter": "D", "content": "陈某享有该院微的著作权，但该学院在约定的使用范围内享有使用的权利"}], "answer": "BC"}, {"id": 578, "question": "《专利代理师的成长历程》是由李某编剧、张某导演的一部电影，制作者为甲公司，音乐人周某创作了可以单独使用的电影音乐。根据著作权法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "甲公司是该电影的著作权人"}, {"letter": "B", "content": "张某是该电的著作权人"}, {"letter": "C", "content": "李某享有署名权，并有权按照与甲公司签订的合同获得报酬"}, {"letter": "D", "content": "周某有权单独行使电影音乐的著作权"}], "answer": "AD"}, {"id": 579, "question": "黄某请李某执笔以黄某的人生经历为素材创作一本自传体小说。在小说写作过程中，黄某给李某提供了素材，在小说完成后，黄某向李某支付了5万元，但双方并未约定著作权的归属。根据著作权法及相关规定，下列说法哪些是正确的？", "type": "单选", "options": [{"letter": "A", "content": "该小说的著作权应当由黄某享有"}, {"letter": "B", "content": "该小说的著作权应当由李某享有"}, {"letter": "C", "content": "该小说的著作权应当由黄某和李某共同享有"}, {"letter": "D", "content": "该小说的著作权应当由李某享有，黄某可以无偿使用"}], "answer": "ACD"}, {"id": 580, "question": "术学院教投王某受某公司委托，创作了一件象征该公司文化和精神的雕塑，并按照合同约定将该雕塑原件交付给该公司，但双方未约定该雕塑著作权的归风。根据著作权法及相关规定，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "王某享有该雕塑的著作权"}, {"letter": "B", "content": "该公司享有该雕塑的著作权"}, {"letter": "C", "content": "王某享有该雕塑原件的展览权"}, {"letter": "D", "content": "该公司享有该雕塑原件的展览权"}], "answer": "A"}, {"id": 581, "question": "张某是一名优秀的传记作家，笔下传记人物深受读者喜爱。某出版社准备出版一本关于古代人物曾国藩的传记，自然人王某拟出版一本关于自已成长历程的传记，二者分别向张某约稿，但均未明确约定著作权归属。对此，下列说法正确的是：", "type": "多选", "options": [{"letter": "A", "content": "曾国藩传记著作权归出版社所有"}, {"letter": "B", "content": "曾国藩传记著作权归张某所有"}, {"letter": "C", "content": "王某传记著作权归张某所有"}, {"letter": "D", "content": "王某传记著作权归王某所有"}], "answer": "AD"}, {"id": 582, "question": "唐某创作了一幅国画，交给某慈善机构拍卖，所得款项全部用于救助失学儿童。齐某在拍卖会上以80万元的价格购得该画。根据著作权法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "齐某享有该画的复制权"}, {"letter": "B", "content": "齐某享有该画原件的所有权"}, {"letter": "C", "content": "齐某享有该画原件的展览权"}, {"letter": "D", "content": "齐某享有该画的发表权"}], "answer": "BD"}, {"id": 583, "question": "甲公司设计师张某为完成该公司的工作任务，主要利用该公司的物质技术条件创作了产品设计图，并由该公司承担责任。根据著作权法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "张某享有该产品设计图的复制权"}, {"letter": "B", "content": "甲公司享有该产品设计图的复制权"}, {"letter": "C", "content": "张某享有该产品设计图的署名权"}, {"letter": "D", "content": "甲公司享有该产品设计图的署名权"}], "answer": "BC"}, {"id": 584, "question": "某设计公司的设计师王某接受该公司指派，绘制了一张产品设计图。该设计图主要是利用设计公司的物质技术条件创作，并由该设计公司承担责任。王某与该设计公司没有就设计图的著作权归属进行约定。根据著作权法及相关规定，下列说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "王某享有该设计图的著作权，该设计公司可无偿使用"}, {"letter": "B", "content": "王某享有该设计图的署名权，该设计公司享有该设计图著作权的其他权利"}, {"letter": "C", "content": "王某享有该设计图的发表权、署名权、修改权和保护作品完整权，该设计公司享有该设计图著作权的其他权利"}, {"letter": "D", "content": "该设计公司享有该设计图除发表权以外的所有著作权，同时应当给予王某相应的奖励"}], "answer": "BC"}, {"id": 585, "question": "中华全国专利代理师协会为提高专利代理师的执业水平，促进我国专利代理行业的健康发展，将2001-2020年国内学者已发表的有关创造性的论文之中的佳作，按照论文发表的时间、创造性判断的顺序等汇编而成了《创造性判断论文选》。下列哪些说法是错误的：", "type": "多选", "options": [{"letter": "A", "content": "被选编人论文选的论文已经发表，故代理师协会不需征得论文著作权人的同意"}, {"letter": "B", "content": "该论文选具有公益性，故代理师协会不需向论文著作权人支付报酬"}, {"letter": "C", "content": "他人复制该论文选只需征得代理师协会同意并支付报酬"}, {"letter": "D", "content": "如代理师协会未经论文著作权人同意而将有关论文收录，代理人协会对该论文集仍享有著作权"}], "answer": "B"}, {"id": 586, "question": "居住在美国的我国公民申创作一部英文小说，乙经许可将该小说翻译成中文小说，丙经许可将该翻译的中文小说改编成电影文学剧本，并向丁杂志社投稿。下列哪些说法是错误的？", "type": "多选", "options": [{"letter": "A", "content": "甲的小说必须在我国或美国发表才能受我国著作权法保护"}, {"letter": "B", "content": "乙翻译的小说和丙改编的电影文学剧本均属于演绎作品"}, {"letter": "C", "content": "丙只需征得乙的同意并向其支付报酬"}, {"letter": "D", "content": "丁杂志社如要使用丙的作品还应当分别征得甲、乙的同意，项，换险后.值悠人物西部形氯发生改但只需向丙支付报酬"}], "answer": "ABC"}, {"id": 587, "question": "周某是厨师和美食博主，拥有相当数量的粉丝。周某制作了一段自己做菜的视频，命名为“周氏爆妙龙虾”上传到网络平台，因为独特的拍摄场布置、角度选择、音像配合以及巧妙的剪辑，受到广大网友的追捧，很快点击量就过千万。李某看到视频后，运用虾”上传至网络平台，点击是过万，李某侵犯了周某的哪些权利？", "type": "多选", "options": [{"letter": "A", "content": "姓名权"}, {"letter": "B", "content": "肖像权"}, {"letter": "C", "content": "名誉权"}, {"letter": "D", "content": "著作权"}], "answer": "ACD"}, {"id": 588, "question": "根据著作权法及相关规定，关于著作权的继承，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "作者死亡后，其著作权无人继承又无人受遗赠的，其署名权、修改权和保护作品完整权不再受著作权法保护"}, {"letter": "B", "content": "作者死亡后，其著作权无人继承又无人受遗赠的，其署名权、修改权和保护作品完整权由著作权行政管理部门保护"}, {"letter": "C", "content": "作者生前未发表的作品，如作者未明确表示不发表，且没有继承人又无人受遗赠的，作者死亡后50年内，其发表权由作品原件的所有人行使"}, {"letter": "D", "content": "合作作品作者之一死亡的，其对合作作品享有的著作权中的财产权无人继承又无人受遗赠的，由其他合作作者享有"}], "answer": "BD"}, {"id": 589, "question": "李某是油画《蓟门烟树图》的作者，该油画创作完成后，李某将其卖给王某并交付油画原件，李某死亡后，没有继承人又无人受遗赠，如果李某生前未发表且未明确表示不发表该油画，根据著作权法及相关规定，在李某死亡后50年内，王某可以行！权的归属，但美术、摄影作品原件的展览权使下列哪些权利？", "type": "多选", "options": [{"letter": "A", "content": "展览权"}, {"letter": "B", "content": "发表权"}, {"letter": "C", "content": "修改权"}, {"letter": "D", "content": "复制权"}], "answer": "BCD"}, {"id": 590, "question": "根据著作权法及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "只有视听作品才享有出租权"}, {"letter": "B", "content": "展览权是指公开陈列美术作品、摄影作品原件或者复制件的权利"}, {"letter": "C", "content": "发表权是决定作品是否公之于众的权利"}, {"letter": "D", "content": "修改权是指改变作品，创作出具有独创性的新作品的权利"}], "answer": "AB"}, {"id": 591, "question": "根据著作权法及相关规定，下列哪项属于著作权中的财产权？", "type": "单选", "options": [{"letter": "A", "content": "决定作品是否公之于众的权利"}, {"letter": "B", "content": "授权他人修改作品的权利"}, {"letter": "C", "content": "公开陈列美术作品复制件的权利"}, {"letter": "D", "content": "表明作者身份，在作品上署名的权利"}], "answer": "BC"}, {"id": 592, "question": "书法家王某为甲饭店题了一幅字，同意其在店内展示。乙食品公司未经王某和甲饭店许可，将该字幅拍摄照片后印制在其生产的产品包装上。根据著作权法及相关规定，下列哪项说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "乙食品公司侵犯了王某的发表权"}, {"letter": "B", "content": "乙食品公司侵犯了王某的复制权"}, {"letter": "C", "content": "乙食品公司侵犯了王某的展览权"}, {"letter": "D", "content": "乙食品公司侵犯了甲饭店的复制权"}], "answer": "C"}, {"id": 593, "question": "根据著作权法及相关规定，下列关于著作人身权的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "署名权是表明作者身份，在作品上署名的权利"}, {"letter": "B", "content": "修改权是修改或者投权他人修改作品的权利"}, {"letter": "C", "content": "作者死亡后，有继承人的，署名权由其继承人继承"}, {"letter": "D", "content": "作者死亡后，有继承人的，修改权由其继承人保护"}], "answer": "B"}, {"id": 594, "question": "根据著作权法及相关规定，下列哪种行为侵犯了著作权人的出租权？", "type": "单选", "options": [{"letter": "A", "content": "甲未经著作权人许可，开设店铺出租其购买的武侠小说"}, {"letter": "B", "content": "乙未经著作权人许可，开设店铺出租其购买的电视剧光盘"}, {"letter": "C", "content": "丙未经著作权人许可，从出租商店租借武侠小说个人阅读"}, {"letter": "D", "content": "丁未经著作权人许可，从出租商店租借电视剧光盘个人观看"}], "answer": "ABD"}, {"id": 595, "question": "根据著作权法及相关规定，下列哪种作品的著作权人享有出租权？", "type": "单选", "options": [{"letter": "A", "content": "武侠小说"}, {"letter": "B", "content": "戏剧剧本"}, {"letter": "C", "content": "计算机软件"}, {"letter": "D", "content": "美术作品"}], "answer": "B"}, {"id": 596, "question": "王某将画家张某赠送给自己的20幅绘画作品，署名王某自已送出版社出版，取得10万元稿酬。王某的行为侵犯了张某的下列哪些权利？多选）", "type": "多选", "options": [{"letter": "A", "content": "张某对其作品的财产所有权"}, {"letter": "B", "content": "张某对其作品的发行权"}, {"letter": "C", "content": "张某对其作品的署名权"}, {"letter": "D", "content": "张某对其作品的复制权"}], "answer": "C"}, {"id": 597, "question": "某网络公司未经许可将张某刚刚创作完成的一幅绘画作品放到其网站上，供在线浏览和下载。根据著作权法及相关规定，该网络公司的行为侵犯了张某的下列哪些权利？相关店强化600题", "type": "多选", "options": [{"letter": "A", "content": "发表权"}, {"letter": "B", "content": "表演权"}, {"letter": "C", "content": "广插权"}, {"letter": "D", "content": "信息网络传插权"}], "answer": "BCD"}, {"id": 598, "question": "文学家张基收集了近现代著名作家的作品，并按照其独特的文学理论进行分类，将上述作品的片段汇集成册，编写了《名人名家写人义名人名家写景X名人名家写事》等三本书。某出版社未经张基的许可复制上述三本书，向社会公开发行。根据著作权法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "该出版社侵犯了张某的复制权"}, {"letter": "B", "content": "该出版社侵犯了张某的发行权"}, {"letter": "C", "content": "该出版社侵犯了张某的改编权"}, {"letter": "D", "content": "该出版社侵犯了张某的汇编权"}], "answer": "AD"}, {"id": 599, "question": "周某在甲网站发表小说《公民的名义》，该网站以故事情节设计不合理为由将小说删除。周某交涉无果后，不得已以“木森“为笔名向乙网站投稿，乙网站认为作者原名更有利于作品的传播，遂直接将小说署名更改为作者原名周某并提供在线阅读。丙编剧征得乙网站许可后，将小说改编为电视剧本，最后由著名导演李大路执导拍摄同名电视剧。该刷播出后，迅速走红。对此，下列哪一说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "甲网站删除小说的行为侵犯了周某发表权"}, {"letter": "B", "content": "乙网站更改署名的行为侵犯了周某署名权"}, {"letter": "C", "content": "丙编剧改编小说的行为符合著作权法规定"}, {"letter": "D", "content": "同名电视剧的著作权人归属于导演李大路"}], "answer": "B"}, {"id": 600, "question": "李某在二手市场购得一张照片，照片上标明其拍摄日期为2022年1月1日，但未标明作者，根据著作权法及相关规定，在作者身份确定之前，李某享有下列哪些权利？", "type": "多选", "options": [{"letter": "A", "content": "发表权"}, {"letter": "B", "content": "复制权"}, {"letter": "C", "content": "爬览权"}, {"letter": "D", "content": "得名权"}], "answer": "ABC"}, {"id": 601, "question": "甲创作并出版的经典童活《大灰狼》超过著作财产权保别上并状准注册。丙出版社随后未经甲和乙同意出版了甲的《大灰狼》窟话，并使用了“大灰狼\"文字及图形，但署名为另一著名歌且丁，丁对此并不知情。关于丙出版社的行为，下列哪一说法是错误的7", "type": "单选", "options": [{"letter": "A", "content": "侵犯了甲的复制权"}, {"letter": "B", "content": "侵犯了甲的署名权"}, {"letter": "C", "content": "侵犯了丁的姓名权"}, {"letter": "D", "content": "侵犯了乙的商标权"}], "answer": "A"}, {"id": 602, "question": "美术馆收藏了一幅山水画的原件，该幅面是1993年创作完成，但原作者不详。美术馆打算举办一场线上展览活动，请展出，并加了水印\"作者：佚名、拍摄者：张某，美术馆收藏”、李某将山水画下截去掉水印后，在自已的公众号发布，下列说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "李某侵犯了张某的信息网络传插权"}, {"letter": "B", "content": "李某侵犯了张某的署名权"}, {"letter": "C", "content": "李某侵犯了张某的发表权"}, {"letter": "D", "content": "李某侵犯了美术馆的信息网络传插权"}], "answer": "D"}, {"id": 603, "question": "根据著作权法及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "作者的名权的保护期不受限制"}, {"letter": "B", "content": "自然人的作品，发表权与发行权保护期一致"}, {"letter": "C", "content": "视听作品自创作完成后五十年内未发表的、其放映权不再受潜作权法保护"}, {"letter": "D", "content": "署名权由作者享有、著作权的其他权利由法人享有的职务作品，保护期为作者终生及死亡后五十年受限制？（单选）"}], "answer": "ABC"}, {"id": 604, "question": "2012年1月1日、张某、韩某共同构思一部小说《波涛消的专利战》。2014年6月1日，张某、韩某共同创作完成该小说。韩某于2016年7月1日去世，张某于2017年10月1日去世。根据著作权法及相关规定，以下说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "该作品著作权自2012年1月1日起产生"}, {"letter": "B", "content": "该作品著作权自2014年6月1日起产生"}, {"letter": "C", "content": "该作品复制权的保护期截止到2067年10月1日"}, {"letter": "D", "content": "该作品复制权的保护期截止到2067年12月31日"}], "answer": "A"}, {"id": 605, "question": "江某早年丧偶，育有两儿一女。其根据自身经历于录。后江某于2018年5月1日去世。下列说法正确的是：版长科节，可以不些落作收人诈T，但应当", "type": "单选", "options": [{"letter": "A", "content": "江某已去世，其著作权不再受到法律保护"}, {"letter": "B", "content": "该回忆录的著作财产权截止于2068年5月1日"}, {"letter": "C", "content": "江某关于回忆录的署名权、发表权、修改权、保护作品完整权的保护期不受限制"}, {"letter": "D", "content": "在江某死亡后50年内，其子女可以决定该回忆录是否发表"}], "answer": "AC"}, {"id": 606, "question": "根据著作权法及相关规定，下列哪些情况下使用作品，可以不经著作权人许可，不向其支付报酬，但不能侵犯著作权人依照著作权法享有的其他权利？多选）", "type": "多选", "options": [{"letter": "A", "content": "为个人欣赏使用他人已经发表的作品"}, {"letter": "B", "content": "将中国公民已经发表的以少数民族语盲文字创作的作品翻译成国家通用语言文学作品在国内出版发行"}, {"letter": "C", "content": "将已经发表的作品改成以阅读障碍者能够感知的无障碍方式提供"}, {"letter": "D", "content": "为实施义务教育和国家教育规划而编写出版教科书"}], "answer": "A"}, {"id": 607, "question": "根据著作权法及相关规定，下列哪项行为可以不经著作权人许可，不向其支付报酬？", "type": "单选", "options": [{"letter": "A", "content": "某大学教授张某为研究某课题，少量复制了已经发表的某篇论文供课题组内部使用"}, {"letter": "B", "content": "王某为说明某一问题，在作品中引用他人未发表的作品"}, {"letter": "C", "content": "某出版社将美国公民李某已经发表的英文论文翻译成少数民族语言文字在我国国内出版"}, {"letter": "D", "content": "某出版社为编写出版大学教科书，汇编已经发表的单幅美术作品"}], "answer": "C"}, {"id": 608, "question": "根据著作权法的规定，关于国家机关为执行公务在合理范围内使用已经发表的作品，下列说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "可以不经著作权人许可"}, {"letter": "B", "content": "应当向著作权人支付报酬"}, {"letter": "C", "content": "可以不向著作权人支付报酬"}, {"letter": "D", "content": "应当指明作者姓名、作品名称"}], "answer": "ACD"}, {"id": 609, "question": "根据著作权法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "著作权转让合同应当采取书面形式"}, {"letter": "B", "content": "著作权人许可录音录像制作者专有使用其作品的，应当订立书面许可使用合同"}, {"letter": "C", "content": "著作权转让合同中著作权人未明确转让的权利，视为一并转让"}, {"letter": "D", "content": "与著作权人订立专有许可使用合同的，可以向著作权行政管理部门备案"}], "answer": "ABD"}, {"id": 610, "question": "根据落作权法及相关规定，下列关于著作权转让的哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "著作权转让合同中若作权人未明确转让的权利，未经著作权人同意，另一方当事人不得行使"}, {"letter": "B", "content": "著作权人只可以转让其依法享有的著作权中的财产权"}, {"letter": "C", "content": "著作权人可以全部或者部分转让其著作权中的财产权"}, {"letter": "D", "content": "著作权转让合同应当采用书面形式"}], "answer": "ABCD"}, {"id": 611, "question": "根据著作权法及相关规定，下列关于著作权转让合同的说法哪项是错误的？单选）", "type": "单选", "options": [{"letter": "A", "content": "著作权转让合同应当采用书面形式"}, {"letter": "B", "content": "著作权中的署名权不得转让"}, {"letter": "C", "content": "著作权中的改编权可以转让"}, {"letter": "D", "content": "著作权转让合同自向著作权行政管理部门备案之日起生效"}], "answer": "D"}, {"id": 612, "question": "根据著作权法及相关规定，著作权许可使用合同包括下列哪些内容？多选）", "type": "多选", "options": [{"letter": "A", "content": "许可使用的权利种类"}, {"letter": "B", "content": "许可使用的权利是专有使用权或者非专有使用权"}, {"letter": "C", "content": "许可使用的地域范围、期间"}, {"letter": "D", "content": "付酬标准和办法"}], "answer": "ABCD"}, {"id": 613, "question": "根据著作权法及相关规定，下列哪些属于著作权法所称与著作权有关的权益？多选）", "type": "多选", "options": [{"letter": "A", "content": "电视台对其播放的电视节目享有的权利"}, {"letter": "B", "content": "录音录像制作者对其制作的录音录像制品享有的权利"}, {"letter": "C", "content": "出版者对其出版的图书的版式设计享有的权利"}, {"letter": "D", "content": "广播电台对其播放的广播节目享有的权利"}], "answer": "ABCD"}, {"id": 614, "question": "李某将自已创作的一部小说交某出版社出版。根据落作权法及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "该出版社应当与李某订立出版合同，并支付报酬"}, {"letter": "B", "content": "经李某许可，该出版社可以对小说进行删节"}, {"letter": "C", "content": "该出版社有权禁止其他出版社使用该小说的版式设计"}, {"letter": "D", "content": "该出版社再版该小说的，可以不通知李某，但应支付报酬"}], "answer": "ABC"}, {"id": 615, "question": "王某将其撰写的一篇论文向某期刊社投稿，且双方没有任何约定。根据著作权法及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "自稿件发出之日起十五日内未收到该期刊社通知决定刊登的，王某可以将该论文向其他期刊社投稿"}, {"letter": "B", "content": "自稿件发出之日起三十日内未收到该期刊社通知决定刊登的，王某可以将该论文向其他期刊社投稿"}, {"letter": "C", "content": "如果该期刊社刊登了该论文，且王某未声明不得转载，则其他期刊社可以不经王某许可转载该论文，不需向其支付报酬"}, {"letter": "D", "content": "该期刊社刊登该论文的，可以对该论文作文字性删节，无需经王某许可"}], "answer": "BD"}, {"id": 616, "question": "刘某授权某期刊社刊登其一篇文章。根据著作权法及相关规定，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "该期刊社对该文章进行文字性删节，可以不经刘某许可"}, {"letter": "B", "content": "该期刊社对该文章内容的修改，可以不经刘某许可"}, {"letter": "C", "content": "该期刊社对该文章进行文字性修改，可以不经刘某许可"}, {"letter": "D", "content": "该期刊社对该文章内容的修改，应当经刘某许可"}], "answer": "ACD"}, {"id": 617, "question": "根据著作权法及相关规定，在作权人没有事先声明不许使用、转载的情况下，下列哪些行为可以不经著作权人许可，但应当按照规定支付报酬？", "type": "单选", "options": [{"letter": "A", "content": "期刊刊登其他期刊已经发表的关于经济问题的时事性文章"}, {"letter": "B", "content": "表演者使用他人已经发表的歌曲进行演出"}, {"letter": "C", "content": "电视台播放他人已经发表的作品"}, {"letter": "D", "content": "录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品"}], "answer": "ACD"}, {"id": 618, "question": "甲创作的一篇杂文，发表后引起较大轰动。该杂文被多家报刊、网站无偿转载。乙将该杂文译成法文，丙将之译成维文，均在国内出版，未征得甲的同意，也未支付报酬。下列哪一观点是正确的？", "type": "单选", "options": [{"letter": "A", "content": "报刊和网站转载该杂文的行为不构成侵权"}, {"letter": "B", "content": "乙和丙的行为均不构成侵权"}, {"letter": "C", "content": "乙的行为不构成侵权，丙的行为构成侵权"}, {"letter": "D", "content": "乙的行为构成侵权，丙的行为不构成侵权"}], "answer": "D"}, {"id": 619, "question": "根据著作权法及相关规定，下列哪些属于表演者对其表演享有的权利？多选）", "type": "多选", "options": [{"letter": "A", "content": "表明表演者身份"}, {"letter": "B", "content": "保护表演形象不受歪曲"}, {"letter": "C", "content": "许可他人从现场直播和公开传送其现场表演，并获得报酬"}, {"letter": "D", "content": "许可他人出租录有其表演的录音录像制品，并获得报酬"}], "answer": "ABCD"}, {"id": 620, "question": "根据著作权法及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "录音录像制作者使用他人作品制作录音录像制品，应当取得著作权人许可，并支付报酬"}, {"letter": "B", "content": "录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品，可以不经著作权人许可，无需支付报酬"}, {"letter": "C", "content": "录音录像制作者制作录音录像制品，应当同表演者订立合同，并支付报酬"}, {"letter": "D", "content": "录音录像制作者对其制作的录音录像制品，享有许可他人通过信息网络向公众传播并获得报酬的权利"}], "answer": "ACD"}, {"id": 621, "question": "某影视中心在一电视连续剧中为衬托剧情，使用了某正版唱片中的局部音乐作品作为背景音乐。中国音乐著作权协会是该唱片授权行使著作权及相关权利组织，以该使用行为未经许可为由要求该影视中心支付酬劳。该协会的要求被拒绝后，遂向法院起诉。以下说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "播放行为侵犯了音乐表演者的权利"}, {"letter": "B", "content": "播放行为侵犯了音乐作品著作权人的权利"}, {"letter": "C", "content": "播放行为侵犯了录音制品制作者的权利"}, {"letter": "D", "content": "中国音乐著作权协会不是正当原告"}], "answer": "ABC"}, {"id": 622, "question": "李某于2016年8月4日创作完成小说《别来烦我》，2017年3月5日发表于某文学刊物后被张某改编成剧本，甲公司根据该剧本拍成同名电视剧，乙电视台将该电视剧进行播放。对此，下列哪一选项是错误的？", "type": "单选", "options": [{"letter": "A", "content": "李某从2017年3月5日起对小说享有著作权"}, {"letter": "B", "content": "张某对剧本享有著作权"}, {"letter": "C", "content": "甲公司将该剧本拍成电视剧应当取得李某和张某的许可并支付报酬"}, {"letter": "D", "content": "乙电视台播放该电视剧应当取得甲公司许可并支付报酬"}], "answer": "A"}, {"id": 623, "question": "甲创作并演唱了《都是玫瑰惹的祸》，乙公司擅自将该歌曲制成彩铃在网络上供免费下载。乙公司侵犯了甲的哪些权利？", "type": "多选", "options": [{"letter": "A", "content": "信息网络传播权"}, {"letter": "B", "content": "广播权"}, {"letter": "C", "content": "表演者权"}, {"letter": "D", "content": "发行权"}], "answer": "AC"}, {"id": 624, "question": "袁某创作完成了一部小说，并发表在某杂志上。此后，经许可，赵某将该小说改编成舞台剧剧本，陈某在某剧院公开演出该舞台剧，某电视台对该演出进行了现场录像并制作成光盘。截止于作者死亡后第50年的12月31日，A根据著作权法及相关规定、下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "袁某对该小说的发行权保护期截止于首次发表后第五十年的12月31日"}, {"letter": "B", "content": "赵某对该舞台剧剧本的修改权保护期截止于首次公开演出后第五十年的12月31日"}, {"letter": "C", "content": "陈某享有许可电视台对其表演的该舞台剧进行录像并获得报酬的权利，此项权利的保护期限截止于该表演发生后第五十年的12月31日"}, {"letter": "D", "content": "该电视台享有许可他人对其制作的该光盘进行复制并获得报酬的权利，此项权利的保护期限截止于该光盘首次制作完成后第五十年的12月31日"}], "answer": "CD"}, {"id": 625, "question": "甲创作了一首歌曲《告白气球》，乙获得许可后在个人演唱会上进行演唱，丙唱片公司制成录音制品并公开发行。针对该录音制品，下列哪些属于侵权行为？多选）", "type": "多选", "options": [{"letter": "A", "content": "某公司翻录后进行销售，同时向甲、乙、丙寄送报酬"}, {"letter": "B", "content": "某航空公司购买正版唱片后在飞机上广播供乘客欣赏，仅经过甲的许可"}, {"letter": "C", "content": "某电影公司将其作为电插曲使用，同时经过乙和丙的许可"}, {"letter": "D", "content": "某学生购买正版唱片试听后将其上传到网上供网友个人欣赏"}], "answer": "ABCD"}, {"id": 626, "question": "叶某创作《星光灿烂》同曲并发表于音乐杂志，郝某在个人举办的赈灾义演中演唱该歌曲，南极熊唱片公司录制并发行郝某的演唱会唱片，星星电台购买该唱片并播放了该歌曲。下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "郝某演唱《星光灿烂》应征得叶某同意并支付报酬"}, {"letter": "B", "content": "南极熊唱片公司录制该歌曲应当征得郝某同意并支付报酬"}, {"letter": "C", "content": "星星电台播放该歌曲应征得叶某同意"}, {"letter": "D", "content": "星星电台播放该歌曲应征得南极熊唱片公司同意"}], "answer": "AB"}, {"id": 627, "question": "陈某创作一部戏剧剧本《等待》，甲剧团安排本单位的演员进行了演出，但没有约定著作权相关的权利归屁。东方卫视经授权对该歌舞剧进行了现场直播，咕咯网未经许可将东方卫视播出的歌舞剧同步至网络供用户付费点播和下载。下列有关说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "咕响网侵犯了陈某的信息网络传播权"}, {"letter": "B", "content": "咕响网侵犯了甲剧团演员们的信息网络传播权"}, {"letter": "C", "content": "咕噜网侵犯了甲剧团的信息网络传播权"}, {"letter": "D", "content": "咕响网侵犯了东方卫视的广播组织者权"}], "answer": "ACD"}, {"id": 628, "question": "根据著作权法的规定，在下列哪些情形下，个人或者组织可以避开技术措施，但不得向他人提供避开技术措施的技术、定：下列情形可以避开技术措施，但不得向装置或者部件，也不得侵犯权利人依法享有的其他权利？多选）", "type": "多选", "options": [{"letter": "A", "content": "为学校课堂教学，向少数教学人员提供少量已经发表的作品，而该作品无法通过正常途径获取"}, {"letter": "B", "content": "不以营利为目的，以阅读障碍者能够感知的无障碍方式向其提供已经发表的作品，而该作品无法通过正常途径获取"}, {"letter": "C", "content": "国家机关依照行政、司法程序执行公务"}, {"letter": "D", "content": "对计算机及其系统或者网络的安全性能进行测试"}], "answer": "ABCD"}, {"id": 629, "question": "根据著作权法及相关规定，下列哪些行为侵犯了著作权或与著作权有关的权利？多选）", "type": "多选", "options": [{"letter": "A", "content": "张某未经王某许可、发表了王某创作完成的小说"}, {"letter": "B", "content": "郑某为谋取个人名利，在许某创作完成的作品上需名"}, {"letter": "C", "content": "甲出版社未经乙出版社的许可、使用了其出版的图书的版式设计"}, {"letter": "D", "content": "丙电视台未经歌是张某许可，录制了其表演"}], "answer": "ABCD"}, {"id": 630, "question": "根据著作权法及相关规定，下列哪些侵权行为损害公共利益的，可由主管著作权的部门给予行政处罚？多选）", "type": "多选", "options": [{"letter": "A", "content": "孙某未经舞蹈家王某许可，现场录制其舞蹈表演并上传到互联网提供免费下载"}, {"letter": "B", "content": "赵某未经作家李某许可，擅自复制、发行其小说"}, {"letter": "C", "content": "甲出版社出版乙出版社享有专有出版权的图书"}, {"letter": "D", "content": "钱某未经丙音像公司许可复制、发行其音像制品"}], "answer": "ABCD"}, {"id": 631, "question": "根据著作权法及相关规定，下列哪些侵权行为损害公共利益的，可由主管著作权的部门给予行政处罚？多选）", "type": "多选", "options": [{"letter": "A", "content": "未经作者许可，发表其论文的"}, {"letter": "B", "content": "未经演唱者许可，对其表演制作录音制品并出版的"}, {"letter": "C", "content": "未经钢琴演奏者许可，从现场直播其独奏音乐会的"}, {"letter": "D", "content": "未经教学视频录像制作者许可，复制发行其制作的录像制品的"}], "answer": "BD"}, {"id": 632, "question": "甲公司委托乙公司设计并制作产品包装盒，未签订书面合同。丙在市场上发现该产品包装盒上未经其许可使用了其面《翠竹》作为背景图案。如果该产品包装盒的整体设计也构成美术图案，下列哪些选项是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "产品包装盒的版权属于甲公司"}, {"letter": "B", "content": "乙公司侵害了丙的复制权"}, {"letter": "C", "content": "甲公司对乙公司的侵权行为不知情，但仍构成侵权"}, {"letter": "D", "content": "甲公司不能对产品包装盒获得外观设计专利申请权"}], "answer": "BCD"}, {"id": 633, "question": "根据著作权法及相关规定，下列哪些属于役犯著作权承担的民事责任？", "type": "多选", "options": [{"letter": "A", "content": "停止侵害"}, {"letter": "B", "content": "赠偿损失"}, {"letter": "C", "content": "消除影响"}, {"letter": "D", "content": "赔礼道数"}], "answer": "ABCD"}, {"id": 634, "question": "根据著作权法及相关规定，因侵犯著作权行为提起的民事诉讼，可以由哪些人民法院管辖？", "type": "多选", "options": [{"letter": "A", "content": "侵权行为的实施地人民法院"}, {"letter": "B", "content": "侵权复制品储藏地人民法院"}, {"letter": "C", "content": "侵权复制品查封扣押地人民法院"}, {"letter": "D", "content": "被告住所地人民法院"}], "answer": "ABCD"}, {"id": 635, "question": "甲制作、出售了大量冒用乙署名的作品，其承担责任的方式可能为：", "type": "多选", "options": [{"letter": "A", "content": "根据情况，甲需承担停止侵害、消除影响、赔礼道款、赔偿损失等民事责任"}, {"letter": "B", "content": "若甲的行为损害了公共利益，可以由主管著作权的部门责令停止侵权行为，没收违法所得，没收、无害化销毁侵权复制品，并可处以罚款"}, {"letter": "C", "content": "若甲的行为损害了公共利益，可以由主管著作权的部门没收主要用于制作侵权复制品的材料、工具、设备等"}, {"letter": "D", "content": "若构成犯罪的，可依法迫究甲的刑事资任"}], "answer": "ABCD"}, {"id": 636, "question": "甲公司开发了一套财务管理软件，乙公司未经甲公司同意复制了大量该软件进行销售。甲公司向人民法院提起诉讼要求乙公司赔偿。下列关于赔偿数额的说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "赔偿数额应当按照甲公司因此受到的实际损失或者乙公司的违法所得计算"}, {"letter": "B", "content": "甲公司的实际损失或者乙公司的违法所得难以计算的，权利人的实际损失成者侵权人的违法所得赔偿数额可以参照该权利使用费计算"}, {"letter": "C", "content": "甲公司的实际损失和乙公司的违法所得不能确定的，由人民法院根据侵权行为的情节判决给于500元以上500万元以下的赔偿"}, {"letter": "D", "content": "赔偿数额还应当包括甲公司为制止役权行为所支付的合理开支"}], "answer": "C"}, {"id": 637, "question": "在某案审理中，人民法院确认了以下事实：甲公司侵犯乙公司的著作权，乙公司因此遭受到的实际损失为200万元，乙公司为制止侵权行为所支付的合理开支为10万元。根据著作权法及相关规定，甲公司应当给予乙公司的赔偿数额是多少？", "type": "单选", "options": [{"letter": "A", "content": "100万元"}, {"letter": "B", "content": "200万元"}, {"letter": "C", "content": "210万元"}, {"letter": "D", "content": "310万元"}], "answer": "AB"}, {"id": 638, "question": "甲公司有证据证明乙网络公司正在非法传播其享有著作权的某部影视作品，如不及时制止将会使其合法权益受到难以弥补的损害。根据著作权法及相关规定，甲公司可以在起诉前向人民法院申请采取下列哪些措施？多选）", "type": "多选", "options": [{"letter": "A", "content": "贵令乙网络公司停止传播行为"}, {"letter": "B", "content": "对乙网络公司采取财产保全措施"}, {"letter": "C", "content": "责令乙网络公司先行赔付"}, {"letter": "D", "content": "没收乙网络公司的服务器"}], "answer": "ABD"}, {"id": 639, "question": "根据著作权法及相关规定，当事人可以通过下列哪些途径解决著作权侵权纠纷？多选）", "type": "多选", "options": [{"letter": "A", "content": "根据著作权合同中的仲裁条款，向仲裁机构申请仲裁"}, {"letter": "B", "content": "调解"}, {"letter": "C", "content": "向国家著作权主管部门申请裁决"}, {"letter": "D", "content": "向人民法院起诉"}], "answer": "AC"}, {"id": 640, "question": "根据计算机软件保护条例的规定，计算机软件著作权的保护不延及下列哪些内容？多选）", "type": "多选", "options": [{"letter": "A", "content": "开发软件所用的思想"}, {"letter": "B", "content": "开发软件所用的处理过程"}, {"letter": "C", "content": "开发软件所用的操作方法"}, {"letter": "D", "content": "开发软件所用的数学概念"}], "answer": "A"}, {"id": 641, "question": "根据计算机软件保护条例的规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "计算机软件要获得著作权保护，应当是权利人独立开发的，剽窃他人的计算机软件不能获得著作权保护"}, {"letter": "B", "content": "计算机软件要获得著作权保护，应当按照规定进行著作权登记"}, {"letter": "C", "content": "计算机软件要获得著作权保护，应当已被固定在某种有形物体上"}, {"letter": "D", "content": "计算机软件要获得著作权保护，首先需要公开"}], "answer": "ABCD"}, {"id": 642, "question": "根据著作权法及相关规定，下列关于计算机软件的哪种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "受著作权保护的计算机软件包括计算机程序及其有关文档"}, {"letter": "B", "content": "同一计算机程序的源程序和目标程序为两个不同的作品"}, {"letter": "C", "content": "未经登记的计算机软件不受我国著作权法保护"}, {"letter": "D", "content": "对软件著作权的保护延及开发软件所用的处理过程和操作方法"}], "answer": "ACD"}, {"id": 643, "question": "下列不属于软件著作权人享有的权利的是：", "type": "单选", "options": [{"letter": "A", "content": "署名权"}, {"letter": "B", "content": "保护作品完整权"}, {"letter": "C", "content": "出租权"}, {"letter": "D", "content": "信息网络传播权"}], "answer": "CD"}, {"id": 644, "question": "根据计算机软件保护条例的规定、计算机软件的合法复制品所有人享有下列哪些权利？", "type": "多选", "options": [{"letter": "A", "content": "根据使用的需要把该计算机软件装入计算机等具有信息处理能力的装置内"}, {"letter": "B", "content": "为了防止复制品损坏而制作备份复制品"}, {"letter": "C", "content": "为了改进计算机软件功能、性能而进行必要的修改"}, {"letter": "D", "content": "为了把该计算机软件用于实际的计算机应用环境而进行必要的修改"}], "answer": "C"}, {"id": 645, "question": "甲公司委托乙公司开发库存产品信息追踪软件，付费50万元，没有明确约定著作权的归属。后甲公司以高价向善意的丙公司出售了该软件的复制品。丙公司安装使用5年后，丙公司自行开发的同类软件已经在试运行中，此时乙公司起诉要求丙公司停正使用并销毁该软件。下列哪些表述是正确的：", "type": "多选", "options": [{"letter": "A", "content": "该软件的著作权属于乙公司"}, {"letter": "B", "content": "乙公司的起诉已超过诉讼时效"}, {"letter": "C", "content": "丙公司可不承担赔偿费任"}, {"letter": "D", "content": "丙公司应停止使用并销毁该软件"}], "answer": "B"}, {"id": 646, "question": "根据计算机软件保护条例的规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "软件著作权人应当向国务院著作权行政管理部门认定的软件登记机构办理登记"}, {"letter": "B", "content": "计算机软件著作权自计算机软件登记之日起产生，保护期为自软件登记之日起50年"}, {"letter": "C", "content": "软件登记机构发放的登记证明文件是登记事项的初步证明"}, {"letter": "D", "content": "法人或者其他组织的软件著作权，自开发完成之日起50年内未发表的不再受保护"}], "answer": "ACD"}, {"id": 647, "question": "根据信息网络传播权保护条例的规定，下列哪些是信息网络传播权的权利人？", "type": "多选", "options": [{"letter": "A", "content": "著作权人"}, {"letter": "B", "content": "表演者"}, {"letter": "C", "content": "录音录像制作者"}, {"letter": "D", "content": "网络用户"}], "answer": "BCD"}, {"id": 648, "question": "甲网站与乙唱片公司签订录音制品的信息网络传插权许可使用合同，按约定支付报酬后，即开展了网上原版音乐下载业务。对甲网站的行为应如何认定？", "type": "单选", "options": [{"letter": "A", "content": "是合法使用行为"}, {"letter": "B", "content": "构成侵权行为，因为该行为应取得著作权人的许可，而不是取得录音制作者的许可"}, {"letter": "C", "content": "构成侵权行为，因为该行为还须取得著作权人、表演者的许可并支付报酬"}, {"letter": "D", "content": "构成侵权行为，因为该行为虽然无须取得著作权人的许可，但必须取得表演者的许可"}], "answer": "AC"}, {"id": 649, "question": "电视剧《一切为了人民》播出后迅速走红。在该电视剧在各大卫视分集热播阶段，甲聘请丙将播放画面中的“李大路出品，复制必究”的水印去除，然后将全集上传至乙网站供公众免费点播，乙网站为提高浏览量默许甲的行为。权利人江东电视台知晓后，要求乙网站断开链接、删除内容，乙网站接到通知立即采取了上述措施。下列哪一说法是错误的？", "type": "单选", "options": [{"letter": "A", "content": "甲侵害了权利人的信息网络传播权"}, {"letter": "B", "content": "乙网站无须对权利人承担侵权责任"}, {"letter": "C", "content": "丙实施了删除权利管理电子信息的行为构成侵权"}, {"letter": "D", "content": "著作权行政管理部门有权要求乙网站提供甲的姓名和网络地址提供的涉及唱片公司享有著作权的某歌曲侵犯了自已的信息网络传播权。唱片公司向千度公司提交书面通知要求其删除侵权作品。对此，下列哪些选项是正确的：（多选）"}], "answer": "AD"}, {"id": 650, "question": "根据反不正当竞争法及相关规定，下列哪种行为属于不正当竞争行为？", "type": "多选", "options": [{"letter": "A", "content": "将他人注册商标作为企业字号，但是并未引起误认为是他人商品或与他人存在特定联系"}, {"letter": "B", "content": "使用与他人有一定影响的商品名称、包装、装满等相同或者近似的标识"}, {"letter": "C", "content": "使用他人有一定影响的新媒体账号名称"}, {"letter": "D", "content": "将他人未注册的驰名商标作为企业字号，引人误认为是他人商品或者与他人存在特定联系"}], "answer": "ABCD"}, {"id": 651, "question": "甲公司在某地电视台投放广告，宣称“甲公司原装进口实木地板质量佳、服务好”，同时捏造虚伪事实宜称“乙公司生产的木地板甲醛严重超标”。此后，乙公司木地板销量锐减。经查明，甲公司生产的实木地板是用国内木材加工而成。根据反不正当竞争法及相关规定，下列关于该广告行为的哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "甲公司宣称“甲公司原装进口实木地板质量佳、服务好”的行为是不正当竞争行为"}, {"letter": "B", "content": "甲公司宣称“甲公司原装进口实木地板质量佳、服务好”的行为是正当竞争行为"}, {"letter": "C", "content": "甲公司宣称“乙公司生产的木地板甲醛严重超标”的行为是不正当竞争行为"}, {"letter": "D", "content": "甲公司宣称“乙公司生产的木地板甲醛严重超标”于编造、传播虚假信息，报害竞争对手的商业信相美片览化600题202年专村代理静资中队的行为是正当财争行为"}], "answer": "ABCD"}, {"id": 652, "question": "王基安取基技术开是公司的技术盈密后、将奋取一事告知丁马某、并应与某的遣求向其披露了该技术秘密。马某此后的下到心些行为属于侵起商业赴密的行为！多选）", "type": "多选", "options": [{"letter": "A", "content": "将读技术隧密通过学术论文会开发表"}, {"letter": "B", "content": "将该技术秘密向其好友赵某披露"}, {"letter": "C", "content": "将该技术秘密用于生产经营"}, {"letter": "D", "content": "将该技术秘密以自己的名义向国家知识产权局申请专利"}], "answer": "BD"}, {"id": 653, "question": "甲公司的饮料配方是甲公司核心商业秘密，甲公司员工秘密窃取该伙料配方后，与甲公司竞争对手乙公司联系，乙公司以高薪聘请该员工，使用其提供的甲公司饮料配方开展生产，获取高额利润。下面说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "该员工役犯了甲公司商业秘密"}, {"letter": "B", "content": "该员工未侵犯甲公司商业秘密"}, {"letter": "C", "content": "乙公司的行为视为侵犯商业秘密行为"}, {"letter": "D", "content": "乙公司未直接窃取甲公司饮料配方，有应佣员工的自由，乙公司行为不视为侵犯商业秘密行为"}], "answer": "CD"}, {"id": 654, "question": "技术信息或者经营信息必须具备下列哪些要件，才能构成反不正当竞争法所称的商业秘密？", "type": "多选", "options": [{"letter": "A", "content": "不为公众所知悉"}, {"letter": "B", "content": "具有实用性"}, {"letter": "C", "content": "权利人对其采取了保密措施"}, {"letter": "D", "content": "具有商业价值"}], "answer": "BD"}, {"id": 655, "question": "甲公司与乙公司数码相机购销协议进行治谈、其间，乙的商业密被甲公司获悉。甲公司将该商业秘密泄漏给乙公司的竞争对手，导致乙的市场份额锐减。据此、下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "甲的行为属于正营的商业行为"}, {"letter": "B", "content": "甲的行为侵犯了乙的商业秘密"}, {"letter": "C", "content": "甲应当承担违约资任"}, {"letter": "D", "content": "甲应当承担损害赔偿资任"}], "answer": "ACD"}, {"id": 656, "question": "根据反不正当竞争法的规定、下列哪些行为属于的商业密，具于使抱商业秘密的行为，A选项侵犯商业秘密的行为？", "type": "多选", "options": [{"letter": "A", "content": "李某通过自行研发获得了某项技术，该技术与他人的技术秘密相同"}, {"letter": "B", "content": "孙某通过反向工程获得了他人的技术秘密"}, {"letter": "C", "content": "唐某违反权利人有关保守商业秘密的要求，向他人披露其掌握的商业秘密"}, {"letter": "D", "content": "赵某明知商业秘密是他人以助迫方式获得的，仍然加以使用"}], "answer": "ACD"}, {"id": 657, "question": "根据反不正当竞争法的规定，下列哪些采取了保密措施的信息属于商业秘密：", "type": "多选", "options": [{"letter": "A", "content": "某社交网络公司将用户在互联网上公开的个人信息收集后形成的数据集合"}, {"letter": "B", "content": "某销售公司将自己多年经营的客户信息整理后形成的信息集合"}, {"letter": "C", "content": "某公司研发一种新的产品后将产品的技术特征写成专利申请文件后向国家知识产权局提交专利申请，在未授权之前专利申请文件中载明的信息属于商业秘密"}, {"letter": "D", "content": "某文化创意公司策划推出一部新的游戏作品，涉及游戏的具体设计、情节、装备、规则、人物等信息在未向社会披露之前属于商业秘密"}], "answer": "ABD"}, {"id": 658, "question": "根据反不正当竞争法的规定，对于侵犯商业秘密的法律责任，下列说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "赔偿数额按照实际损失或者侵权所获得的利益确定"}, {"letter": "B", "content": "经营者故意实施侵犯商业秘密行为，情节严重的，可以在按照法定赔偿额的一倍以上三倍以下确定赔偿数额"}, {"letter": "C", "content": "经营者侵犯商业秘密的，由监督检查部门资令停止违法行为，没收违法所得，处以罚款"}, {"letter": "D", "content": "权利人受到的实际损失、侵权人所获得的利益难以确定的，由人民法院可以判决给予权利人500万元以下的赔偿"}], "answer": "AD"}, {"id": 659, "question": "根据植物新品种保护条例及相关规定，下列哪种说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "申请品种权的植物新品种应当属于国家植物品保护名录中列举的植物的属或者种"}, {"letter": "B", "content": "授子品种权的植物新品种的名称可以仅以数宇组成"}, {"letter": "C", "content": "投予品种权的植物新品种应当具备适当的名称，并与相同或者相近的植物属或者种中已知品种的名称相区别"}, {"letter": "D", "content": "授予品种权的植物新品种应当具备的一致性，是指一个植物品种的特性，除可预期的自然变异外，群体内个体间相关的特征或者特性表现一致"}], "answer": "ABD"}, {"id": 660, "question": "根据植物新品种保护条例及相关规定，下列邮些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "植物新品种是指经过人工选育的或者对发现的野生植物加以改良获得的新品种"}, {"letter": "B", "content": "未列人国家植物品种保护目录中的植物新品种不受植物新品种保护条例保护"}, {"letter": "C", "content": "授予品种权的植物新品种应当同时具备新颖性、创造性、一致性和稳定性"}, {"letter": "D", "content": "违反社会公德的名称不得用于授权品种的命名"}], "answer": "AC"}, {"id": 661, "question": "根据植物新品种保护条例及相关规定，下列些说法是错误的？", "type": "多选", "options": [{"letter": "A", "content": "申请品种权的，应当提交请求书、说明书、该品种的照片以及权利要求书"}, {"letter": "B", "content": "申请人可以在品种权授于前修改或者撤回品种权申请"}, {"letter": "C", "content": "授予品种权的植物新品种应当具备的特异性、是指一个植物品种有一个以上性状明显区别于已知品种"}, {"letter": "D", "content": "授予品种权的植物新品种应当具备的稳定性、是指一个植物品种的特性，除可预期的自然变异外，群体内个体间相关的特征或者特性表现一致。"}], "answer": "A"}, {"id": 662, "question": "根据植物新品种保护条例的规定，下列哪些申请品种权的林木新品种具备新颖性？", "type": "多选", "options": [{"letter": "A", "content": "在申请日前其繁殖材料、收获材料未被销售、推广"}, {"letter": "B", "content": "在申请日前，经申请权人许可，其繁殖材料、收获材料在中国境内销售、推广未超过1年"}, {"letter": "C", "content": "在境外，木本、藤本植物品种销售、推广未超过4年"}, {"letter": "D", "content": "在境外，除木本、藤本植物以外的植物品种销售、推广未超过4年"}], "answer": "ABC"}, {"id": 663, "question": "根据植物新品种保护条例及相关规定，在没有合同约定的情况下，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "执行本单位的任务所完成的职务育种，植物新品种的申请权属于该单位"}, {"letter": "B", "content": "主要是利用本单位的物质条件所完成的职务育种，植物新品种的申请权属于完成育种的个人"}, {"letter": "C", "content": "合作育种，植物新品种的申请权属于共同完成育种的单位和个人"}, {"letter": "D", "content": "委托育种，植物新品种的申请权属于委托人"}], "answer": "AB"}, {"id": 664, "question": "张某于2025年10月11日独立完成了某植物新品种的育种，王某于2026年2月14日也独立完成了该植物新品种的育种。张某和王某均于2026年6月18日分别就该植物新品种申请品种权。如果张某和王某就该植物新品种提交的品种权申请均符合授予品种权的其他条件，则品种权应当授予何人？", "type": "单选", "options": [{"letter": "A", "content": "张某"}, {"letter": "B", "content": "王某"}, {"letter": "C", "content": "由张某和王某协商确定，不愿协商或协商不成的，以抽签的方式确定申请人"}, {"letter": "D", "content": "由张某和王某协商确定，不愿协商或协商不成的，驳回张某和王某的申请"}], "answer": "BCD"}, {"id": 665, "question": "根据《植物新品种条例》及相关规定，对于植物新品种申请需要初步审查哪些内容：", "type": "多选", "options": [{"letter": "A", "content": "是否属于植物品种保护名录列举的植物属或者种的范围"}, {"letter": "B", "content": "是否符合新颖性的规定"}, {"letter": "C", "content": "植物新品种的命名是否适当"}, {"letter": "D", "content": "植物新品种是否具有稳定性"}], "answer": "ABCD"}, {"id": 666, "question": "王某对于审批机关驳回其品种权申请的决定不服，拟提起复审。根据植物新品种保护条例及相关规定，下列关于复审程序的说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "复审请求应当向植物新品种复审委员会提出"}, {"letter": "B", "content": "王某应当自收到通知之日起3个月内提出复审请求"}, {"letter": "C", "content": "植物新品种复审委员会应当在收到复审请求书的3个月内作出决定"}, {"letter": "D", "content": "申请人对复审决定不服的，应当在收到通知之日起3个月内向人民法院提起诉讼"}], "answer": "ACD"}, {"id": 667, "question": "根据植物新品种保护条例及相关规定、下列哪些使用授权品种的繁殖材料的生产行为、应经品种权人许可？", "type": "多选", "options": [{"letter": "A", "content": "为商业目的重复使用授权品种进行生产或者繁殖的另一品种"}, {"letter": "B", "content": "未经许可使用授权品种的繁殖材料而获得的收获材料"}, {"letter": "C", "content": "未经许可使用授权品种的实质性派生品种的繁殖材料"}, {"letter": "D", "content": "未经许可使用授权与授权品种相比，不具备明显区别的品种"}], "answer": "ABC"}, {"id": 668, "question": "根据植物新品种保护条例及相关规定，下列哪些行为应经品种权人许可？", "type": "多选", "options": [{"letter": "A", "content": "许诺销售授权品种的殖材料"}, {"letter": "B", "content": "农民自自用授权品种的繁殖材料"}, {"letter": "C", "content": "出口授权品种的繁殖材料"}, {"letter": "D", "content": "储存为繁殖授权品种的繁殖材料"}], "answer": "A"}, {"id": 669, "question": "根据植物新品种保护条例及相关规定，下列关于品种权的保护期限的说法邮项是正确的？", "type": "多选", "options": [{"letter": "A", "content": "木本的品种权保护期限为25年，自申请之日起算"}, {"letter": "B", "content": "木本的品种权保护期限为25年，自授权之日起算"}, {"letter": "C", "content": "草本植物的品种权保护期限为20年，自授权之日起算"}, {"letter": "D", "content": "藤本植物的品种权保护期限为25年，自申请之日起算"}], "answer": "ABD"}, {"id": 670, "question": "根据集成电路布图设计保护条例及相关规定.下列说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "受保护的集成电路布图设计应当具有独创性"}, {"letter": "B", "content": "集成电路布图设计专有权经国务院知识产权行政部门登记产生"}, {"letter": "C", "content": "对集成电路布图设计的保护不延及思想、处理过程、操作方法或者数学概念等"}, {"letter": "D", "content": "集成电路布图设计专有权的保护期为十五年"}], "answer": "ACD"}, {"id": 671, "question": "关于集成电路布图设计的独创性.下列邮项说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "布图设计是创作者自己独立创作的，也可能不具有独创性"}, {"letter": "B", "content": "是否具有独创性，应以提出登记时为判断时间点"}, {"letter": "C", "content": "是否具有独创性，应从本领域技术人员的角度判断"}, {"letter": "D", "content": "由常规设计组成的布图设计，不具有独创性"}], "answer": "A"}, {"id": 672, "question": "根据集成电路布图设计保护条例及相关规定、下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "除集成电路布图设计保护条例另有规定外、布图设计专有权属于布图设计创作者"}, {"letter": "B", "content": "由法人主持，依据法人的意志而创作，并由法人承担责任的布图设计，该法人是创作者"}, {"letter": "C", "content": "受委托创作的布图设计，委托人和受托人对专有权的归属未作约定或者约定不明的，其专有权由委托人享有"}, {"letter": "D", "content": "两个以上自然人、法人或者其他组织合作创作的布图设计，合作者对专有权的归属未作约定或者约定不明的，其专有权由合作者共同享有Q.积指集成电路布图设计保护条例及相关规定，申資人以书面形式申请集成电路布图设计整记的，应当提交下列些文件或者物品？多选）"}], "answer": "ABD"}, {"id": 673, "question": "根据集成电路布图设计保护条例及相关规定，下列说法哪项是正确的？单选）", "type": "单选", "options": [{"letter": "A", "content": "布图设计专有权经国家知识产权局登记产生"}, {"letter": "B", "content": "布图设计专有权自创作完成之日起自动产生"}, {"letter": "C", "content": "布图设计专有权的保护期为15年，自布图设计登记申请之日起计算"}, {"letter": "D", "content": "布图设计专有权的保护期为15年，自布图设计创作完成之日起计算"}], "answer": "B"}, {"id": 674, "question": "根据《布图设计保护条例》及其他相关规定，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "布图设计首次商业利用之日起2年内，未提出登记申请的，国家知识产权局不予登记"}, {"letter": "B", "content": "国家知识产权局应当对布图设计登记申请进行初步审查"}, {"letter": "C", "content": "国家知识产权局应当对布图设计登记申请进行实质审查"}, {"letter": "D", "content": "布图设计明显不符合该条例所规定的布图设计定义的，国家知识产权局应当作出驳回决定"}], "answer": "BD"}, {"id": 675, "question": "根据集成电路布图设计保护条例及相关规定，布图设计登记申请人对国家知识产权局驳回其登记申请的决定不服的，可以选择下列哪种救济途径？", "type": "单选", "options": [{"letter": "A", "content": "自收到通知之日起3个月内向国家知识产权局申门平以登记，发给企记迁明大件，并平以公告”B请行政复议"}, {"letter": "B", "content": "自收到通知之日起3个月内向国家知识产权局请求复审"}, {"letter": "C", "content": "自收到通知之日起3个月内向国家知识产权局申诉"}, {"letter": "D", "content": "自收到通知之日起3个月内直接向人民法院提起行政诉讼"}], "answer": "ABCD"}, {"id": 676, "question": "当事人对国家知识产权局作出的下列哪项具体行政行为不服的，不能申请复议？", "type": "单选", "options": [{"letter": "A", "content": "不予受理布图设计申请的"}, {"letter": "B", "content": "驳回布图设计登记申请的"}, {"letter": "C", "content": "将布图设计申请视为撤回的"}, {"letter": "D", "content": "给予使用其布图设计的非自愿许可的"}], "answer": "CD"}, {"id": 677, "question": "根据集成电路布图设计保护条例及相关规定，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "布图设计自其在世界任何地方首次商业利用之日起1年内未向国务院知识产权行政部门提出登记申请的，国务院知识产权行政部门不再予以登记"}, {"letter": "B", "content": "布图设计自其在世界任何地方首次商业利用之日起2年内未向国务院知识产权行政部门提出登记申请的，国务院知识产权行政部门不再予以登记"}, {"letter": "C", "content": "无论是否登记或者投人商业利用，布图设计自其创作完成之日起满10年的，不再受保护"}, {"letter": "D", "content": "无论是否登记或者投人商业利用，布图设计自其创作完成之日起满15年的，不再受保护"}], "answer": "BD"}, {"id": 678, "question": "根据集成电路布图设计保护条例及相关规定，布图设计权利人享有下列哪些专有权？", "type": "多选", "options": [{"letter": "A", "content": "将受保护的布图设计投人商业利用"}, {"letter": "B", "content": "将含有受保护布图设计的集成电路以及含有该集！的布图设计的全部或者其中任何具有独创性的部ULL城电露的物品投入而业利用"}, {"letter": "C", "content": "对变保护的布围设计的全部进行复制"}, {"letter": "D", "content": "对受保护的布图设计的任何具有独创性的部分进行复制"}], "answer": "B"}, {"id": 679, "question": "根据集成电路布图设计保护条例及相关规定、集感电路布图设计权利人甲公司可以要求行为人停止下列感些未经其许可的行为？多选）", "type": "多选", "options": [{"letter": "A", "content": "某大学数授赵某为毅学自的而发制甲公司变保护的布图设计"}, {"letter": "B", "content": "乙公司将自己独立创作的与甲公司受保护的布图设计招同的本图设计投人商业利用"}, {"letter": "C", "content": "内公司为商业目的复制甲公司受保护的布图设计中具有创性的部分"}, {"letter": "D", "content": "丁公司为商业目的销售含有甲公司受保护的布图设计的集成电路"}], "answer": "AC"}, {"id": 680, "question": "甲购进一批集成电路用于销售，但不知道也没有合理理由应当知道该集成电路含有受保护的布图设计。甲销售了一半后，收到布图设计权利人乙的明确通知，告知其销售的集成电路中含有非法复制的布图设计。对此，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "甲的行为构成侵权"}, {"letter": "B", "content": "甲的行为不视为侵权"}, {"letter": "C", "content": "甲应当就其在接到乙的明确通知前销售的集成电路，向乙补偿一定的费用"}, {"letter": "D", "content": "甲在接到乙的明确通知后，可以继续销售另一半存货，但应当向乙支付合理的报酬"}], "answer": "ABD"}, {"id": 681, "question": "根据集成电路布图设计保护及相关条例规定，侵犯布图设计专有权，引起纠纷的，布图设计权利人或者利害关系人可以向下列哪一部门请求处理？单选）", "type": "单选", "options": [{"letter": "A", "content": "国务院工商行政管理部门"}, {"letter": "B", "content": "国务院知识产权行政部门"}, {"letter": "C", "content": "国务院科学技术行政部门"}, {"letter": "D", "content": "省级管理专利工作的部门"}], "answer": "BCD"}, {"id": 682, "question": "关于集成电路布图设计的非自愿许可，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "其范围应当限于为公共目的非商业性使用"}, {"letter": "B", "content": "非自愿许可不得给予自然人"}, {"letter": "C", "content": "其原因可以是经人民法院、不正当竞争行为监督检查部门依法认定布图设计权利人有不正当竞争行为而需要给予的补救"}, {"letter": "D", "content": "非自愿许可的理由消除并不再发生时，国务院知识产权行政部门应当主动及时作出终止使用布图设计非自愿许可的决定"}], "answer": "ABC"}, {"id": 683, "question": "根据知识产权海关保护条例及相关规定，下列哪些知识产权的权利人可以请求海关实施知识产权海关保护？", "type": "多选", "options": [{"letter": "A", "content": "注册商标专用权"}, {"letter": "B", "content": "著作权和与著作权有关的权利"}, {"letter": "C", "content": "集成电路布图设计专有权"}, {"letter": "D", "content": "专利权"}], "answer": "ABC"}, {"id": 684, "question": "根据知识产权海关保护条例，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "海关仅对与出口货物有关的知识产权实施保护"}, {"letter": "B", "content": "海关实施保护的知识产权包括专利权、商标专用权、著作权和与著作权有关的权利"}, {"letter": "C", "content": "知识产权权利人请求海关实施知识产权保护的，应当向海关提出采取保护措施的申请"}, {"letter": "D", "content": "海关实施知识产权保护时，应当保守有关当事人的商业秘密"}], "answer": "ABC"}, {"id": 685, "question": "根据知识产权海关保护条例及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "知识产权权利人请求海关扣留侵权嫌疑货物的，应当向海关提供不超过货物等值的担保"}, {"letter": "B", "content": "海关依规定扣留侵权嫌疑货物的、知识产权权利人应当支付有关的仓储、保管和处置费用"}, {"letter": "C", "content": "涉嫌侵犯专利权货物的收货人或者发货人在向海关提供与货物等值的担保金后、请求海关放行其货物的，海关应予放行"}, {"letter": "D", "content": "被扣留的侵权嫌疑货物、经海关调查后认定侵犯知识产权的，海关应将其交给知识产权权利人处理"}], "answer": "BCD"}, {"id": 686, "question": "根据知识产权海关保护条例及相关规定，知识产权权利人可以将其知识产权向海关总署申请备案。申请备案的，应当提交申请书。申请书应当包括下列哪些内容？多选）", "type": "多选", "options": [{"letter": "A", "content": "知识产权许可行使状况"}, {"letter": "B", "content": "知识产权的名称、内容及其相关信息"}, {"letter": "C", "content": "知识产权权利人的名称或者姓名、注册地或者国籍等"}, {"letter": "D", "content": "知识产权稳定性初步证明文件"}], "answer": "ABC"}, {"id": 687, "question": "根据知识产权海关保护条例及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "个人携带或者邮寄进出境的物品，超出自用、合理数量，并侵犯知识产权的，按照侵权货物处理"}, {"letter": "B", "content": "知识产权备案情况发生改变的，知识产权权利人应当自发生改变之日起30个工作日内，向海关总署办理备案变更或者注销手续"}, {"letter": "C", "content": "在海关认定被扣留的侵权嫌疑货物为侵权货物之前，知识产权权利人撤回扣留侵权嫌疑货物的申请的，海关应当放行被扣留的侵权嫌疑货物"}, {"letter": "D", "content": "对被没收的无法用于社会公益事业且知识产权权利人无收购意愿的进口假冒商标货物，在消除货物上的商标标识后！货物为役权货物之前，知识产权权利人撒回海关即可允许其进人商业集道"}], "answer": "ABCD"}, {"id": 688, "question": "根据知识产权海关保护条例及其实施办法的规定.下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "知识产权权利人申请扣留侵权娘疑货物.海关依法扣留侵权娥疑货物后，自扣留之日起15个工作日内未收到人民法院协助执行通知的，海关应当放行被扣留的侵权疑货物"}, {"letter": "B", "content": "知识产权权利人接到海关发现涉娘役犯其备案知识产权的进出口货物的书面通知后，逾期未提出扣留侵权嫩货物申请或者未提供担保的.海关不得扣留货物"}, {"letter": "C", "content": "涉嫌侵犯专利权货物的收货人或者发货人在向海关提供与货物等值的担保金后，请求海关放行其货物的，海关应当放行被扣留的侵权嫌疑货物"}, {"letter": "D", "content": "海关认为收货人或者发货人有充分的证据证明其货物未侵犯知识产权权利人的知识产权的，应当放行被扣留的侵权嫌疑货物"}], "answer": "ABC"}, {"id": 689, "question": "根据展会知识产权保护办法的规定，知识产权权利人向展会知识产权投诉机构投诉的，应当提交下列哪些材料？", "type": "多选", "options": [{"letter": "A", "content": "合法有效的知识产权权属证明"}, {"letter": "B", "content": "涉嫌侵权当事人的基本信息"}, {"letter": "C", "content": "涉嫌侵权的理由和证据"}, {"letter": "D", "content": "财产担保证明"}], "answer": "C"}, {"id": 690, "question": "根据展会知识产权保护办法的规定，下列哪些情形下，地方知识产权局对展品侵犯专利权的投诉或者处理请求不予受理？", "type": "多选", "options": [{"letter": "A", "content": "投诉人或者请求人已经向人民法院提起专利侵权诉讼的"}, {"letter": "B", "content": "专利权正处于无效宣告请求程序之中的"}, {"letter": "C", "content": "专利权存在权属纠纷，正处于人民法院的审理程序之！民法院提起专利使权诉讼的：（二）专利权正中"}, {"letter": "D", "content": "专利权已经终止，专利权人正在办理权利恢复的"}], "answer": "ACD"}, {"id": 691, "question": "根据展会知识产权保护办法的规定，有下列哪些情形的、地方知识产权行政管理部门对侵犯商标权的投诉或者处理请求不子受理？多选）", "type": "多选", "options": [{"letter": "A", "content": "而标权已经被撤销的"}, {"letter": "B", "content": "商标权已经无效的"}, {"letter": "C", "content": "投诉人成者请求人已经向人民法院提起商标侵权诉讼的"}, {"letter": "D", "content": "商标权存在权属纠纷，正处于人民法院的审理程序之中的"}], "answer": "CD"}, {"id": 692, "question": "根据对外贸易法的规定，下列哪项说法是正确的？！", "type": "单选", "options": [{"letter": "A", "content": "进出口属于自由进出口的技术，无需办理任何手续"}, {"letter": "B", "content": "国务院对外贸易主管部门可以对自由进出口的技术实行进出口自动许可"}, {"letter": "C", "content": "进出口属于自由进出口的技术，应当办理合同备案登记"}, {"letter": "D", "content": "进出口属于限制进出口的技术，应当经省级对外贸易主管部门许可"}], "answer": "D"}, {"id": 693, "question": "根据技术进出口管理条例及相关规定，对国务院外经贸主管部门作出的有关技术进出口的批准、许可、登记或者行政处罚决定不服的，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "提起诉讼前必须先复议"}, {"letter": "B", "content": "不可复议，只可诉讼"}, {"letter": "C", "content": "可以向人民法院提起诉讼"}, {"letter": "D", "content": "可以申请行政复议"}], "answer": "B"}, {"id": 694, "question": "根据技术进出口管理条例及相关规定.技术进出口所指的转移技术的行为不包括：", "type": "单选", "options": [{"letter": "A", "content": "专利实施许可"}, {"letter": "B", "content": "技术服务"}, {"letter": "C", "content": "技术秘密转让"}, {"letter": "D", "content": "技术合作开发"}], "answer": "C"}, {"id": 695, "question": "根据刑法及相关规定，下列说法哪些是！正确的？", "type": "多选", "options": [{"letter": "A", "content": "已满12周岁不满18周岁的人犯罪，应当从轻或者减轻处罚"}, {"letter": "B", "content": "已满75周岁的人故意犯罪的，应当从轻或者减轻处罚"}, {"letter": "C", "content": "又聋又哑的人犯罪，可以从轻、减轻或者免除处罚"}, {"letter": "D", "content": "精神病人在不能控制自己行为的时候造成危害结果，经法定程序鉴定确认的，不负刑事责任"}], "answer": "B"}, {"id": 696, "question": "甲喝酒后驾车路过某检查站时，被交通执法部门拦住检查。检查人员乙正登车检查时，甲突然发动汽车夺路而逃。乙抓住汽车车门不放、甲为摆脱乙、在疾驶时突然急刹车，导致乙着地身亡。根据刑法及相关规定，甲对乙死亡的心理态度属于下列哪一选项？", "type": "单选", "options": [{"letter": "A", "content": "直接故意"}, {"letter": "B", "content": "间接故意"}, {"letter": "C", "content": "过于自信的过失"}, {"letter": "D", "content": "疏忽大意的过失"}], "answer": "BD"}, {"id": 697, "question": "王某因婚外情产生杀害妻子张某的想法。某日早晨，王某在给张某炸油条时投放了可以致死的“毒鼠强”。王某为防止其5岁的儿子吃油条中毒，将其子送到幼儿园，并崛咐其子等他来接。不料，张某当日提前下班后，将其子接回来一起吃油条。王某得知后，赶忙回到家中，其妻、子已中毒身亡。根据刑法及相关规定，本案中下列哪项说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "王某对其妻、子的死亡具有直接故意"}, {"letter": "B", "content": "王某对其子的死亡具有间接故意"}, {"letter": "C", "content": "王某对其子的死亡具有过失"}, {"letter": "D", "content": "王某对其子的死亡属于意外事件"}], "answer": "D"}, {"id": 698, "question": "根据刑法及相关规定，下列哪种行为构成侵犯知识产权罪？单选）", "type": "单选", "options": [{"letter": "A", "content": "未经注册商标所有人许可，在同一种商品上使用与其注册商标近似的商标，情节严重的"}, {"letter": "B", "content": "以营利为目的，出版他人享有专有出版权的图书，违法所得数额巨大的"}, {"letter": "C", "content": "未经集成电路布图设计权利人许可，为商业目的销售受保护的布图设计，情节严重的"}, {"letter": "D", "content": "未经植物新品种权人许可，以商业目的上10年以下有期徒刑，并处目金：（二）出般他人享有+销售授权品种的繁殖材料，违法所得数额较大的"}], "answer": "A"}, {"id": 699, "question": "根据刑法及相关规定，下列关于假冒注册商标罪、销售假冒注册商标的商品罪的说法正确的有？", "type": "多选", "options": [{"letter": "A", "content": "只要商品名称不同，则不属于“在同一种商品、服务上使用与其注册商标相同的商标”"}, {"letter": "B", "content": "在注册商标上仅增加商品型号，并未增加注册商标的显著性特征，仍属于“在同一种商品、服务上使用与其注册商标相同的商标”"}, {"letter": "C", "content": "实施假冒注册商标犯罪，又销售该假冒注册商标的商品，构成犯罪的，应当实行数罪并罚"}, {"letter": "D", "content": "无正当理由以明显低于市场价格销售假冒注册商标的商品，属于销售假冒注册商标的商品罪中规定的“明知”"}], "answer": "CD"}, {"id": 700, "question": "根据《促进科技成果转化法》相关规定，以下关于职务科技成果收益分配的说法，正确的是：", "type": "单选", "options": [{"letter": "A", "content": "国家设立的研究开发机构、高等院校转化科技成果所获得的收人需上交一部分至上级主管部门"}, {"letter": "B", "content": "职务科技成果转化后，由科技成果完成单位对所有参与人员给予奖励和报酬"}, {"letter": "C", "content": "科技成果完成单位制定奖励和报酬相关规定时，无需听取本单位科技人员意见"}, {"letter": "D", "content": "若国家设立的研究开发机构将某项职务科技成果作价投资，且未规定奖励报酬方式和数额，应从该项科技成果形成的股份或者出资比例中提取不低于50%的比例给予完成、转化该项成果的重要贡献人员于科技成果持有者可采用的科技成果转化方式的是：（单选）"}], "answer": "AB"}, {"id": 701, "question": "根据《科学技术进步法》的规定，利用财政性资金设立的科学技术计划项目所形成的专利，下列说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "形成的专利应当首先在境内使用"}, {"letter": "B", "content": "形成的专利实施转化前，应当经项目管理机构批准"}, {"letter": "C", "content": "为了重大社会公共利益的需要，国家可以无偿实施"}, {"letter": "D", "content": "形成的专利归项目承担者所有"}], "answer": "D"}, {"id": 702, "question": "下列哪些是（巴繁公约》规定的工业产权", "type": "多选", "options": [{"letter": "A", "content": "专利权"}, {"letter": "B", "content": "商标权"}, {"letter": "C", "content": "版权"}, {"letter": "D", "content": "植物新品种权"}], "answer": "D"}, {"id": 703, "question": "根据（巴黎公约》的规定，下列哪项不属于工业产权的保护对象？", "type": "单选", "options": [{"letter": "A", "content": "外观设计"}, {"letter": "B", "content": "原产地名称"}, {"letter": "C", "content": "货源标记"}, {"letter": "D", "content": "集成电路布图设计"}], "answer": "ABCD"}, {"id": 704, "question": "《巴黎公约》规定，本联盟任何国家的国民，在保护工业产权方面，在本联盟所有其他国家内应享有各该国法律现在授予或今后可能授予国民的各种利益；一切都不应损害本公约特别规定的权利。因此，他们应和国民享有同样的保护，对侵犯他们的权利享有同样的法律上的教济手段，但是他们遵守对国民规定的条件和手续为限。上述规定可以概括为什么原则？", "type": "单选", "options": [{"letter": "A", "content": "对等原则"}, {"letter": "B", "content": "差别待遇原则"}, {"letter": "C", "content": "最惠国待遇原则"}, {"letter": "D", "content": "国民待遇原则"}], "answer": "ABC"}, {"id": 705, "question": "甲国、乙国为《巴黎公约》的成员国，丙国为非成员国。根据该公约的规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "在申国有住所的丙国公民在乙国可以享有国民待遇"}, {"letter": "B", "content": "在乙国没有住所的甲国公民在乙国可以享有国民待遇"}, {"letter": "C", "content": "在丙国有住所的乙国公民在甲国可以享有国民待遇"}, {"letter": "D", "content": "在丙国有住所的甲国公民在乙国可以享有国民待遇"}], "answer": "BCD"}, {"id": 706, "question": "根据《巴黎公约》的规定，在工业产权保护方面、下列哪些人可在该公约成员国之一的美国享有国民待遇？", "type": "多选", "options": [{"letter": "A", "content": "在美国有住所的中国公民"}, {"letter": "B", "content": "在美国没有住所的中国公民"}, {"letter": "C", "content": "在美国有营业所的中国企业"}, {"letter": "D", "content": "在美国没有营业所的中国企业"}], "answer": "C"}, {"id": 707, "question": "根据《巴黎公约》，巴黎联盟成员国的法律可对下列哪些事项作出国民待遇原则的例外规定？", "type": "多选", "options": [{"letter": "A", "content": "司法和行政程序管辖权"}, {"letter": "B", "content": "指定送达地址"}, {"letter": "C", "content": "委派代理人"}, {"letter": "D", "content": "权利受侵犯时法律上的救济手段"}], "answer": "ABD"}, {"id": 708, "question": "根据《巴黎公约》的规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "就同一发明在优先权期限内向不同成员国申请并取得的专利，在某一成员国被无效的，在其他成员国亦被当然无效"}, {"letter": "B", "content": "成员国的国民在某一成员国取得的专利，与在其他成员国或者非成员国就同一发明取得的专利各不相关"}, {"letter": "C", "content": "在同一成员国因享有优先权而取得的专利与不享！确，C选项错误。（2012）有优先权而取得的专利的有效期间相同"}, {"letter": "D", "content": "成员国不得以专利产品的销售受到国内法的限制为由而使专利无效"}], "answer": "ABD"}, {"id": 709, "question": "王某就同一项发明先后在中国和美国提出了专利申请，其美 ent": "成员国可以要求作出优前提出的申请的副本"}, {"letter": "C", "content": "作为产生优先权的基础的首次申请可以是与正规的国家申请相当的任何申请"}, {"letter": "D", "content": "成员国可以准许根据实用新型申请的优先权提出工业品外观设计申请"}], "answer": "BCD"}, {"id": 715, "question": "根据《巴黎公约》关于专利的规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "成员国可以以专利产品的销售受到本国法律禁止为由拒绝授予专利权"}, {"letter": "B", "content": "发明人有在专利中被记载为发明人的权利"}, {"letter": "C", "content": "成员国可以将在商品上载明专利作为取得保护的条件"}, {"letter": "D", "content": "一成员国国民向各成员国申请的专利，与在其他国家就同一发明所取得的专利是相互独立的"}], "answer": "ABCD"}, {"id": 716, "question": "根据《巴黎公约》的规定，关于专利的强制许可，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "成员国不得以不实施专利为由颁发强制许可"}, {"letter": "B", "content": "强制许可是非独占性的"}, {"letter": "C", "content": "强制许可在任何情况下都不可转让"}, {"letter": "D", "content": "强制许可的被许可人应当向专利权人支付使用费"}], "answer": "AD"}, {"id": 717, "question": "根据《巴黎公约》的规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "缴纳规定的工业产权维持费的宽限期不得少于6个月"}, {"letter": "B", "content": "各成员国之间可签订关于保护工业产权的专门协定，其中与《巴黎公约》的规定相抵触的，则各成员国之间应遵照该专门协定的规定"}, {"letter": "C", "content": "美国的船舶暂时进人中国海域过境时，其船舶上配置的酒水吧台与中国某吧台的专利产品相同，该船舶上的吧台不视为侵犯专利权"}, {"letter": "D", "content": "在工商业事务中违反诚实的习惯做法的竞争行为构成不正当竞争的行为，各成员国应予以制止"}], "answer": "BCD"}, {"id": 718, "question": "根据马拉喀什条约及相关规定，下列说法哪个是正确的？", "type": "单选", "options": [{"letter": "A", "content": "该条约中的“作品\"仅指已出版的作品"}, {"letter": "B", "content": "该条约适用于中华人民共和国澳门特别行政区"}, {"letter": "C", "content": "该条约于2016年9月30日在中华人民共和国生效"}, {"letter": "D", "content": "与该条约有关的行政工作由世界知识产权组织国际局履行"}], "answer": "C"}, {"id": 719, "question": "根据《与贸易有关的知识产权协定》，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "世界贸易组织成员应当实施该协定的规定，不得在其法律中规定比该协定的要求更为广泛的保护"}, {"letter": "B", "content": "世界贸易组织成员没有义务在其法律中规定比该协定的要求更为广泛的保护"}, {"letter": "C", "content": "世界贸易组织成员有自由在其法律制度和实践中确定实施该协定规定的适当方法"}, {"letter": "D", "content": "世界贸易组织成员应当将该协定规定的待迎给予其他成员的国民"}], "answer": "C"}, {"id": 720, "question": "根据《与贸易有关的知识产权协定》的规定，在知识产权保护方面，除该协定规定的特殊情形之外，每一成员给予其他成员国民的待遇不应比其给予本国国民的待遇较为不利。上述规定可

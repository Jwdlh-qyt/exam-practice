  {id: 265, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "关于委托专利代理机构办理专利事务，下列说法哪个是正确的？", options: {"A": "在中国内地没有营业所的澳门公司单独在中国申请专利的，可以不委托专利代理机构", "B": "上海某国有企业作为代表人与某英国公司共同在中国申请专利的，应当委托专利代理机构", "C": "在中国内地没有经常居所的香港人单独在中国申请专利的，应当委托专利代理机构", "D": "委托专利代理机构申请专利的，应当在请求书中填写专利代理师的姓名、执业证号码和联系电话"}, answer: "BC", explanation: "A、B选项，发明专利权的期限为20 年，应自申请日（2020年4月26日）起计算；发明专 利权自公告之日（2022年5月15日）起生效，因此A 选项错误，B选项正确。C、D选项，专利申请权（或 专利权）的转移自登记日起生效，记日即上述手 续合格通知书的发文日，因此该专利权的转让生 效日为2023年8月20日，C选项正确、D选项错误。 （新编）"},
  {id: 266, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "在满足其他受理条件的情况下，下列哪个专利申请应当予以受理？", options: {"A": "某台湾地区的个人单独申请专利，其经常居住地和详细地址均位于台湾地区，未委托专利代理机构", "B": "某在中国内地没有营业所的香港企业作为代表人与深圳某企业共同申请专利，未委托专利代理机构", "C": "某澳门居民单独申请专利，其经常居住地和详细地址均位于澳门，未委托专利代理机构，指定居住于中国内地的亲友作为联系人", "D": "某营业所位于上海的外国企业单独申请专利，未委托专利代理机构"}, answer: "ABC", explanation: "A选项，《专利法》第10条第3款规 定：“转让专利申请权或者专利权的，当事人应当 订立书面合同.……”，A选项正确。B选项，（审查 权质押霸同的专利权转移，除应当提交变更所需 的证明文件外，还应当提交质押双方当事人同意 变更的证明文件”，B选项王确。C选项、根据《审 查指>第一部分第一章第6.7.2.4（4)节的规定、专 利申请权（或专利权)转移的，变更后的申请人（或 专利权人)委托原专利代理机构的，只需提交新增 申请人（或专利权人)签字或者盖章的委托书，因 此C选项正确。D选项，受让人和原代理机构并不 存在委托关系，受让人如果不再委托代理机构（当 行办理业务），不雷提交解聘书、D选项错误。 (2019)"},
  {id: 267, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "关于申请人，下列说法正确的是？", options: {"A": "中国内地申请人是个人的，在提交专利申请时应当填写其姓名、地址、身份证件号码等信息", "B": "申请人是外国企业的，其所属国可以是世贸组织成员", "C": "申请人是外国人的，其所属国可以是巴黎公约成员国", "D": "申请人是外国人的，其所属国应当同我国订有互惠协议"}, answer: "ABD", explanation: "A选项，根据《审查指雨》第一部分 第一章第6.7.2.4节的定，办理解除委托或者辞 去委托手续的，应当事先通知对万当事人，A选项 正确。B选项，根据《审查指面》第一郡分第一章策 6.7.2.4节的税定、除委托时、申请人（或专利权 人)应当提交著录项目变更申题书，B选项正。C 选项，根据（审查指南）第一部分第一章第6.7.2.4 节的规定，辞去袭托对，专利代理税构应当提交著 录项目更更甲音，并附具审确人（戚专利权人） 或智其代人学或者蓝的同意辞去委托声 明，或者附具由专利代面机构盖章的表明已通知 申请人(或专相权人)的声明，因此C选项错误。D 审查指南》第一部分第一章第6.7.2.4 变更手续生效（即发出手续合格通知 专利代理委托关系依然有效，D选项正 根据《审查指南》第一部分第一章第 定，对于违反诚实信用原则的相关手 共虚假证明材料的，审查员应当发出视 知书，已经批准的，依法予以撤销，因 正确，B、D选项错误。（新编） 共同完成一种智能穿戴设备的开 的请求书表格，请问该表格中共存 D.6处 此框由国家知识产权局填写 申请号（实用新型） ②分案提交日 ③申请日 ④费减审批 ③向外申请审批 6挂号号码 著录项目变更申报书的初步审查 申请人类型单位 电子邮箱 电话 邮政编码 100083 市县 号 申请人类型 自然人 电子邮箱 电话 邮政编码100080 市县 号 电子邮箱FHS1688@163.com 邮政编码 100080 海淀区曙光街道116号 名申请人为代表人 委托书中相应信息一致 12216 几构代码 原申请日 2023年10月19日 在先申请号 益目的首次公开 式补交缺少或者错误提交的文件。 制造方法”，实用新型不保护方法；错误2： 第0项-申请人（1)-“XX大学课题组”，申 公司”，联系人应当是自然人，且本案已经 请号-“202315634028.X”，其中申请号第5 变专利类别。（新编）"},
  {id: 268, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "有下列哪些情形的，申请人应当在请求书中予以声明或者说明？", options: {"A": "同一申请人就同样的发明创造同日分别提出发明专利申请和实用新型专利申请", "B": "申请专利的发明创造是依赖遗传资源完成的", "C": "要求优先权", "D": "要求提前公布发明专利申请"}, answer: "ACD", explanation: "A、C选项，《专利法》第30条 第1款规定：“申请人要求发明、实用新型专 利优先权的，应当在申请的时候提出书面声 明，并且在第一次提出申请之日起16个月 内，提交第一次提出的专利申请文件的副 本”，A、C选项正确。B选项，根据《细则》第 112条第2款的规定，申请人要求优先权的、 应当在缴纳申请费的同时缴纳优先权要求 费，B选项错误。D选项，根据《审查指南》第 一部分第一章第6.2.1.4节的规定，对于外国 优先权，申请人完全不一致，且在先申请的 申请人将优先权转让给在后申请的申请人 的，应当在提出优先权日（要求多项优先权 的，指最早优先权日）起16个月内提交由在 先申请的全体申请人签字或者盖章的优先 权转让证明文件，D选项正确。（新编）"},
  {id: 269, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "美国企业已经委托中国专利代理机构提交专利申请，该企业可以自行办理以下哪些事务：", options: {"A": "缴纳专利申请费", "B": "提交给中国代理机构的委托书", "C": "请求优先权恢复", "D": "提交优先权在先申请副本"}, answer: "AC", explanation: "A选项，根据《细则》第35条第 3款的规定，发明或实用新型专利申请人要 求本国优先权的、其在先申请自后一申请提 出之日起即视为撤回，A选项正确。B选项、 根据《专利法》第30条的规定，发明、实用新 型应当在第一次提出申请之日起16个月内 提交在先申请文件副本，外观设计应当在提 出申请3个月内提交在先申请文件副本，B 选项说法太笼统，错误。C选项，根据《细 则》第112条第2款的规定，申请人要求优先 权的，应当在级纳申请费的同时缴纳优先权 要求费，C选项正确。D选项，要求优先权的 在后申请中各项权利要求所述的技术方案 应当清楚地记载在在先申请的文件中（包括 说明书和权利要求，不包括摘要），D选项错 误。（2015改编）"},
  {id: 270, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "某公司提交了一件发明专利申请，现该公司欲增加漏填的发明人。该公司应当办理下列哪些手续？", options: {"A": "收到受理通知书之日起一个月内提交著录项目变更申报书", "B": "收到受理通知书之日起一个月内缴纳著录事项变更费", "C": "提交由全体申请人和变更前后全体发明人签章的证明文件", "D": "需要声明变更后的发明人是对本发明创造的实质性特点作出创造性贡献的全体人员"}, answer: "ACD", explanation: "A、B选项，申请人应当自 2023年6月16日起16个月内，即2024年10 月16日前提交在先申请文件副本，A选项正 确，B选项错误。C选项，根据《审查指南》第 五部分第一章第3.3节的规定，当事人在提 交外文证明文件、证据材料（例如优先权证 明文本、转让证明等）时，应当同时附具中文 题录译文，C选项正确。D选项，《细则》第 34条第1款规定：“…依照国务院专利行 政部门与该受理机构签订的协议，国务院专 利行政部门通过电子交换等途径获得在先 申请文件副本的，视为申请人提交了经该受 理机构证明的在先申请文件副本……..”，D 选项正确。（新编）"},
  {id: 271, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "申请人甲委托某代理机构提交了一份专利申请，后欲将该申请转让给乙，乙也想委托该代理机构办理专利相关事务。这种情况下应当如何办理著录项目变更手续，以下说法正确的是？", options: {"A": "办理手续时，应当提交两份著录项目变更申报书", "B": "办理手续时，应当提交申请权由甲转让给乙的转让证明以及乙与代理机构签订的专利代理委托书", "C": "由于代理机构未发生变化，因此不需要提交新的委托书", "D": "该手续可以由乙委托的专利代理机构办理"}, answer: "ACD", explanation: "A选项，在先专利申请文件副 本不是必须和请求书同时提交，A选项说法 错误。B选项，根据《审查指南》第一部分第 一章第6.2.1.4节的规定，要求外国优先权的 先后申请人完全不一致，应当在优先权日 （要求多项优先权的，指最早优先权日）起 16个月内提交由在先申请的全体申请人签 字或者盖章的优先权转让证明文件，B选项 说法正确。C选项，即使申请人放弃已取得 的在先申请专利权，仍会构成重复授权，在 后申请不能享有优先权，C选项说法错误。 D选项，根据《审查指南》第一部分第一章第 6.2.4节的规定，申请人要求撤回优先权要 求的，应当提交全体申请人签字或者盖章的 撤回优先权声明，D选项说法错误。（2018）"},
  {id: 272, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "single", question: "关于著录项目变更手续，下列说法正确的有哪些？", options: {"A": "一件专利申请的专利代理事项发生连续变更的，应当分别提交著录项目变更申报书", "B": "一件专利申请的专利权连续转移的，可以以连续变更的方式办理", "C": "多件专利申请的专利权人事项发生变更，且变更内容完全相同，可以提交批量著录项目变更申报书", "D": "申请人请求变更姓名或者名称的，应当提供身份证件号码或者统一社会信用代码"}, answer: "D", explanation: "A选项，根据《审查指南》第一部 分第一章第6.2.1.4节的规定，对于外国优先 权，在后申请的申请人可以是在先申请文件 副本中记载的申请人之一，因此A选项无需 提交优先权转让证明文件，A选项错误。B 选项，要求优先权对于在先申请和在后申请 的发明人是否一致没有要求，B选项错误。 C选项，根据《细则》第36条的规定，申请人 三涉及优先权专利申请的初步审查 超出专利法第29条规定的期限，向国务院 专利行政部门就相同主题提出发明或者实 用新型专利申请，有正当理由的，可以在期 限届满之日起2个月内请求恢复优先权，而 不是申请日起2个月内请求恢复，因此C选 项错误。D选项，根据《审查指南》第一部分 第一章第6.2.1.3节的规定，在先申请文件副 本期满未提交的，审查员应当发出视为未要 求优先权通知书，因此D选项正确。（新编）"},
  {id: 273, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "申请人甲公司委托A专利代理机构于2024年2月8日提交了一份发明专利申请，在该专利申请公开后，2024年7月19日，欲将其转让给乙公司，乙公司委托B专利代理机构办理专利相关事务。同时，想要增加遗漏的发明人王某。这种情况下应当如何办理手续，以下说法错误的是？", options: {"A": "办理手续时，因申请人和发明人、专利代理机构都发生变化，应当提交多份著录项目变更申报书", "B": "遗漏的发明人王某可以通过补正手续增加", "C": "遗漏的发明人王某可以通过著录项目变更手续增加", "D": "B专利代理机构办理手续时，应当提交甲公司对A代理机构的解聘书"}, answer: "AC", explanation: "A选项，根据《审查指南》第一 部分第一章第6.2.4节的规定，优先权要求 撤回后，导致该专利申请的最早优先权日变 更时，自该优先权日起算的各种期限尚未届 满的，该期限应当自变更后的最早优先权日 或者申请日起算，因此该申请应当自2023 年1月31日起3年内提出实质审查请求，并 缴纳实质审查费，A选项正确。B选项、已数 回的优先权不能请求恢复，B选项错误。C 选项，根据《审查指南》第一部分第一章第 6.2.5节的规定，视为未要求优先权或者 回优先权要求的，已缴纳的优先权要求费不 予退回，C选项正确。D选项，根据《审查指 南》第一部分第一章第6.2.4节的规定，申请 人要求多项优先权之后，可以撤回全部优先 权要求，也可以撤回其中某一项或者几项优 先权要求，D选项错误。（2013改编）"},
  {id: 274, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "北京人韩某将其拥有的一项发明专利权转让给美国某公司，现欲到国家知识产权局办理登记手续。下列说法哪些是正确的？", options: {"A": "登记手续可以由该美国公司委托的中国专利代理机构办理", "B": "办理手续时，应当附具双方当事人签字或者盖章的转让合同", "C": "办理手续时，应当附具《技术出口许可证》或者《技术出口合同登记证》", "D": "登记手续应当在签订专利权转让合同之日起一个月内办理"}, answer: "ABC", explanation: "A、B选项为专利法第29条规 定的要求优先权期限的原则，说法正确。 C、D选项，《细则》第36条规定：“申请人超 出专利法第29条规定的期限，向国务院专 利行政部门就相同主题提出发明或者实用 新型专利申请，有正当理由的、可以在期限 届满之日起2个月内请求恢复优先权”。根 据该规定可知，只有发明和实用新型优先权 超期可以请求恢复，外观设计优先权超期不 能请求恢复，因此C选项正确，D选项错误。 （新编） S.AC。《细则》第37条规定：“发明或者 实用新型专利申请人要求了优先权的，可以 自优先权日起16个月内或者自申请日起4 个月内，请求在请求书中增加或者改正优先 权要求”，因此A选项正确，外观设计专利申 请不适用优先权增加和改正制度，因此B选 项错误。C、D选项，适用优先权的增加和改 正制度的前提条件是在后申请的同时提出 了优先权声明，如果未提出优先权声明，不 能提出优先权的增加和改正，也不能恢复后 提出优先权的增加和改正，因此C选项正 确，D选项错误。（新编）"},
  {id: 275, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "中国内地申请人甲欲将其一件外观设计专利权转让给外国公司乙。下列说法哪些是正确的？", options: {"A": "甲应当提交著录项目变更申报书并在提交申报书之日起一个月内缴纳著录事项变更费", "B": "甲应当提交《技术出口许可证》或者《技术出口合同登记证》，以及双方签字或者盖章的转让合同", "C": "如果乙公司在中国没有营业所，则在办理著录项目变更手续时应当委托专利代理机构", "D": "如果著录项目变更手续合格，则该专利权的转让自公告之日起生效"}, answer: "CD", explanation: "A选项，优先权超期恢复，必须 在提出在后申请的同时要求优先权；在后申 请未要求优先权的，不论是否在优先权期限 内，都不能直接使用《细则》第36请求恢复， 因此A选项错误。B选项，优先权超期请求 恢复的，应当在期限届满之日起2个月内请 求恢复优先权，B选项期限错误。C、D选 项，恢复优先权请求可以与在后申请同时提 出，也可以在递交申请（要求优先权）之后单 独提出，C、D选项正确。（新编）"},
  {id: 276, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "在办理专利申请权或专利权的转让手续时，下列哪些情形应当出具国务院商务主管部门颁发的《技术出口许可证》或者《技术出口合同登记证》，或者地方商务主管部门颁发的《技术出口合同登记证》？", options: {"A": "上海一家国有企业与美国一家公司共同向国家知识产权局提交了一件发明专利申请，之后将该专利申请权转让给一家日本公司", "B": "北京某大学教授王某向国家知识产权局提交了一件发明专利申请并获得了专利权，其在英国期间，将该专利权转让给一家英国公司", "C": "重庆某民营公司向国家知识产权局提交了一件外观设计专利申请并获得了专利权，之后其将该专利权转让给一家韩国公司", "D": "天津市民张某向国家知识产权局提交了一件发明专利申请并获得了专利权，之后其将该专利权转让给一家在中国内地注册的外资公司"}, answer: "AD", explanation: "A选项，李某应当在2023年 11月11日起16个月内，即2025年3月11日 之前提交申请X的在先申请文件副本，A选 项正确。B选项，根据《审查指南》第一部分 第一章第6.2.1.2节的规定，未写明或者错写 在先申请日、申请号和原受理机构名称中的 一项或者两项内容，而申请人已在规定的期 限内提交了在先申请文件副本的，可以补 正，B选项错误。C选项，要求外国优先权的 在后申请的申请人是在先申请文件副本中 记载的申请人之一，因此李某无需提交优先 权转让证明文件，C选项错误。D选项，李某 在提交申请Y时未声明要求优先权，申请Y 不能享有申请X的优先权，也不能请求恢复 或请求增加优先权，只能撤回Y后重新提 交，因此D选项正确。（新编）"},
  {id: 277, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "single", question: "某中国发明专利权人申与乙依法订立专利权转让合同，在向国家知识产权局办理该转让合同的登记手续之前，甲又与丙就同一专利权订立了专利权转让合同，并向国家知识产权局办理了该转让合同的登记手续。则以下说法正确的是？", options: {"A": "该专利权的转让自2023年7月3日起生效", "B": "该专利权的转让自2023年7月4日起生效", "C": "该专利权的转让自2023年7月14日起生效", "D": "该专利权的转让自2023年8月1日起生效"}, answer: "D", explanation: "根据《细则》第37条的规定，发 明或实用新型专利申请人要求了优先权的， 可以自优先权日起16个月内或者申请日起 十三涉及优先权专利申请的初步审查 4个月内。在专利局作好公布准备之前。请 求增加或者改正优先权要求。根据《审查指 亩》第一部分第一章第6.2.3节的规定，申请 人请求增加或者改正优先权要求的，应当在 递交申请时要求优先权并在规定的期限内 提交增加或者改正优先权要求请求书；请求 增加优先权要求的，还应当同时缴纳优先权 要求费。因此、李某在提出申请的时候声明 要求了优先权，且提出增加优先权请求的时 间在规定的期限内，可以增加优先权，无需 提交新的发明专利请求书，因此A、B、C选 项错误.D选项至确、（新编）"},
  {id: 278, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "中国内地的甲公司将其在中国境内完成的一项发明创造向国家知识产权局提出发明专利申请并获得授权，现甲公司拟将该发明专利权转让给美国乙公司，下列说法哪些是正确的？", options: {"A": "甲公司在转让前应当事先获得当地管理专利工作的部门审核批准", "B": "甲公司与乙公司应当订立书面转让合同", "C": "办理转让手续时应当出具《技术出口许可证》或《技术出口合同登记证》", "D": "该专利权的转让自合同签订之日起生效"}, answer: "BCD", explanation: "，（绍则》第45条规定：“宽明或 者实用新型专利申请缺少或者错误提交权 利要求书、说明书或者权利要求书、说明书 的部分内容，包申请人在递交日要求了优先 权的，可以自递交日起2个月内或者在国务 院专利行政部门指定的期限内以引在先 审请文件的方式补交。补交的文件符合有 关规定的，以首次提交文件的递交日为申请 日”。A选项，根据该提引加入的规定，只有 发明、买用新型专利申请在申请时要求了优 先权，才能适用援引加入补交遗漏或谐交的 文件，因此A选项错误。B、C、D选项符合规 定（新编）"},
  {id: 279, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "中国甲公司于2020年4月26日申请一件发明专利,经过实审,国家知识产权局于2022年3月28日发出授予专利权通知书,甲公司收到授权通知后于2022年4月30日办理了登记手续，国家知识产权局于2022年5月15日公告授权。2023年6月27日，甲公司与乙公司签订专利权转让合同,并于2023年7月10日到国家知识产权办理著录项目变更,2023年8月20日国家知识产权发出手续合格通知书,2023年9月13日国家知识产权局对专利权转让进行了公告。以下哪些说法是正确的？", options: {"A": "该专利权期限为20年，自2022年5月15日起算", "B": "该专利权自2022年5月15日起生效", "C": "该专利的转让自2023年8月20日起生效", "D": "该专利的转让自2023年9月13日起生效"}, answer: "AD", explanation: "A选项，提出提引加入请求 的，申请人应在首次递交专利申请之日起2 个月内或者收到补交通漏文件通知书之日 起2个月内提交确认提引加入声明，补交相 关文件、因此A选项正确。B选项、以提引 在先申请文件的方式补交申请文件还应当 提交申请文件的修改替换页，并说明补交的 申请文件内容在在光申请文件副本（副本是 外文的指其中文译文）中的位置、因此B选 项错误。C选项，根据细则第45条的规定， 专利申请可以以授引在先申请文件的方式 补交错误提交的部分，而保留申请日。李某 补交的文件符合规定的，可以保留申请日 （2024年6月3日），因此C选项错误。D选 项，根据《审查指南》第五部分第三章第 2.3.3节的规定，分案申请不适用于专利法 实施细则第45条规定的援引加入，D选项正 确。（新编） 14。ACD。根据《细则》第45条的规定， 发明或者实用新型专利申请缺少或者错误 提交权利要求书、说明书或者权利要求书、 说明书的部分内容，在国务院专利行政部门 指定的期限内可以以援引在先申请文件的 方式补交，因此A选项正确。根据《审查指 南》第一部分第一章第4.7.1节的规定，补交 的申请文件内容应当包含在在先申请文件 副本和其中文译文之中；在请求书中要求外 国优先权的，应当提交原受理机构出具的在 先申请文件副本，同时提交该副本的中文译 文；要求本国优先权，并且写明在先申请号 和申请日的，视为提交了在先申请文件副 本，因此C、D选项正确，B选项错误。（新编）"},
  {id: 280, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "专利权质押期间的专利权转移，应当提交下列哪些文件？", options: {"A": "转让人和受让人签章的转让合同", "B": "质权人和出质人同意变更的证明文件", "C": "如果受让人继续委托同一代理机构，应当重新提交专利代理委托书", "D": "如果受让人不再委托代理机构，应当提交解聘代理机构的解聘书"}, answer: "ABCD", explanation: "根据《审查指南》第一部分 第一章第4.7.1节的规定，属于《细则》第36 条（恢复优先权）和第37条（增加或者改正 优先权）规定的情形，不适用《细则》第45条 （援引在先申请文件的方式补交文件）的规 定，因此A、B选项正确。根据《审查指南》第 一部分第一章第4.7.3节的规定，《细则》第6 条第2款（正当理由延误期限请求恢复）不 适用《细则》第45条（援引在先申请文件的 方式补交文件），因此C选项正确。根据《审 查指南》第一部分第一章第4.7.4节的规定， 申请人应在自申请日起2个月或者收到通 知书之日起1个月内补缴相关费用，期满未 缴纳或者未缴足的，该申请视为撤回，审查 员应当发出视为撤回通知书，因此D选项正 确。（新编）"},
  {id: 281, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "下列关于解除或者辞去专利代理委托的说法哪些是正确的？", options: {"A": "办理解除委托或者辞去委托手续的,应当事先通知对方当事人", "B": "专利申请人解除委托时,应当提交著录项目变更申报书", "C": "专利代理机构辞去委托时,应当提交由全休委托人签字或盖章的同意辞去委托声明", "D": "办理解除委托或者辞去委托的手续生效前,原专利代理关系依然有效- 99 -选项，根据"}, answer: "CD", explanation: "A、B选项，只有发明和实用新 型专利申请文件缺少内容，才能适用援引加 入，外观设计不适用援引加入，分案申请也 不适用援引加入，因此A、B选项错误。C选 项，适用援引加入的应当在申请时声明要求 三涉及优先权专利申请的初步审查 优先权，并在规定的时间内提交在先申请文 件副本，援引加入的内容应当体现在在先申 请文件副本及中文译文之中，因此C选项正 确。D选项，申请文件缺少内容的，补交文 件符合援引加入规定的条件的，保留申请 日，因此D选项正确。（新编）"},
  {id: 282, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "7.5节的", options: {"B": "如果相关手续还未批准，则审查员应当发出审查续，例如提意见通知书为未提出", "C": "如果相关手续已经批准，则审查员应当予以撤销此A、C选：", "D": "如果相关手续已经批准，则审查员应当予以驳回", "A": ""}, answer: "BD", explanation: "《细则》第45条规定：“发明或 者实用新型专利申请缺少或者错误提交权 利要求书、说明书或者权利要求书、说明书 的部分内容。但申请人在递交日要求了优先 权的，可以自递交日起2个月内或者在国务 院专利行政部门指定的期限内以援引在先 申请文件的方式补交。补交的文件符合有 关规定的，以首次提交文件的递交日为申请 日”。因此B选项正确。根据该援引加入的 规定，只有发明、实用新型专利申请在申请 时要求了优先权，才能适用援引加入补交遗 漏或错交的文件。A、D选项，是否符合受理 条件要看申请文件有无要求优先权，如果未 要求优先权，才会不予受理，因此A选项错 误，D选项正确。C选项，外观设计不适用援 引加入。（新编）"},
  {id: 283, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "single", question: "北京天元科技有限公司、XX大学联合雨石花（其是人工智能发，现准备申请专利对发明成果予以保护，以下是他们申请专利所填写在几处错误？", options: {"A": "3处", "B": "4处", "C": "5处实用新型专利请求书?实用一种智能穿戴设备及制造方法新型名称李某某发明人1口不公布姓名⑧发发明人2雨石花(AI)口不公布姓名明人发明人3赵某某不公布姓名9第一发明人国籍或地区中国身份证件号码口全体申请人请求费用减缴且已完成费用减缴资格备案姓名或名称XX大学课题组国籍或注册国家(地区）中国申身份证件号码或统一社会信用代码请经常居经常居所地或营业所所在地人所地或(1)北京市省、自治区、直辖市营业所申所在地城区（乡）、街道、门牌号海淀区清华东路3信息姓名或名称李某某请中国国籍或注册国家（地区）申身份证件号码或统一社会信用代码人请经常居经常居所地或营业所所在地人所地或(2)北京市省、自治区、直辖市营业所所在地海淀区曙光街道1城区（乡）、街道、门牌号信息姓电话名010-6233007北京天元科技有限公司联北京省、自治区、直辖市系城区(乡)街道、门牌市县人代表人为非第一署名申请人时声明特声明第声明已经与申请人签订了专利代理委托书且本表中的信息专名称天津四元知识产权代理有限责任公司利代代代姓姓名韩丰理理理资格证资格证号师师机话电电(1)(2)构原申请号针对的分案申请号分案申请", "D": ""}, answer: "C", explanation: "根据《审查指南》第五部分第三章第 2.3.2.1节的规定，对符合受理条件的分案申请，以 原申请的申请日为申请日，并记载分案申请递交 日；分案申请以母案优先权日为优先权日。本题 中，分案申请以原申请的申请日（2023年8月21 日）为申请日，2024年4月15日为递交日，因此C 选项正确。（新编）"},
  {id: 284, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "王某向国家知识产权局提交了一件发明专利申请,该申请欲要求一项俄罗斯专利申请的优先权。下列说法哪些是正确的？", options: {"A": "王某应当在提出专利申请的同时在请求书中声明要求享有优先权", "B": "王某应当自优先权日起十六个月内缴纳优先权要求费", "C": "王某应当自第一次提出申请之日起十六个月内提交由俄罗斯专利局出具的在先申请文件副本", "D": "如果在先申请文件副本中记载的申请人不是王某，王某应当自优先权日起十六个月内提交优先权转让证明"}, answer: "ACD", explanation: "A选项，《细则》第48条第3款规定： “分案的申请不得改变原申请的类别”，A选项正 确。B选项，根据《审查指南》第一部分第一章第 5.1.1节（3)的规定，对于审查员已发出驳回决定的 原申请，自申请人收到驳回决定之日起3个月内， 不论申请人是否提出复审请求，均可以提出分案 申请；在提出复审请求以后的复审期间、收到复审 决定之日起3个月内以及对复审决定不服提起行 政诉讼期间，申请人也可以提出分案申请，B选项 错误。C选项，根据《审查指南》第二部分第六章第 3.2节（3)的规定，分案以后的原申请与分案申请的 权利要求书应当分别要求保护不同的发明，C选项 正确。D选项，根据《细则》第49条第1款的规定， 分案申请不得超出原申请记载的范围，D选项正 确。(2016)"},
  {id: 285, topic: "专题十三 涉及优先权专利申请的初步审查", type: "single", question: "下列关于优先权的说法哪些是正确的？", options: {"A": "发明或实用新型专利申请人要求本国优先权的，其在先申请自在后申请提出之日起即视为撤回", "B": "申请人要求外国优先权的，应当自在后申请日起三个月内提交在先申请文件副本", "C": "申请人要求优先权的，应当在缴纳申请费的同时缴纳优先权要求费", "D": "要求优先权的申请的权利要求应当与在先申请的权利要求相同"}, answer: "A", explanation: "A选项，《细则》第35条第2款规定： “在先申请的主题有下列情形之一的，不得作 为要求本国优先权的基础：（三）属于按照规 定提出的分案申请的”，A选项正确。B选项，《细 则》第48条第3款规定：“分案的申请不得改变原 申请的类别”，B选项错误。C选项，根据《审查指 南》第一部分第一章第6.2.2.4节的规定，对于本国 优先权，要求优先权的在后申请的申请人与在先 申请中记载的申请人应当一致，对发明人是否一 致或部分一致没有限制，C选项错误。D选项，分 案申请应看作新申请，仍需要声明要求优先权，否 则视为未要求优先权，D选项错误。（2015改编）"},
  {id: 286, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "申请人于2024年6月15日提交一件发明专利申请，并于2024年6月22日收到受理通知书。该申请要求了一项德国优先权，优先权日为2023年6月16日，则以下关于在先申请文件副本的说法正确的是？A，应当在2024年10月16日前提交在先申请文件副本", options: {"B": "应当在2024年9月15日前提交在先申请文件副本", "C": "应当提交在先申请文件副本的中文题录译文", "D": "国家知识产权局通过电子交换等途径从该受理机构获得在先申请文件副本的，可以视为申请人提交了经该受理机构证明的在先申请文件副本", "A": ""}, answer: "CD", explanation: "A选项，根据《审查指南》第一部分第 一章第5.1.1节的规定，对于审查员已发出驳回决 定的原申请，自申请人收到驳回决定之日起3个月 内，不论申请人是否提出复审请求，均可以提出分 案申请；在提出复审请求以后的复审期间、收到复 审决定之日起3个月内以及对复审决定不服提起 的行政诉讼期间、申请人也可以提出分案申请，A 选项错误。B、C选项，根据《审查指南》第五部分第 三章第2.3.2.1节的规定，分案申请请求书中未填 误的，按照一般专利申请受理，B选项错误，C选项 正确。D选项，根据《审查指南》第二部分第六章第 3.2节（1)的规定，分案申请应当在其说明书的起始 部分，即发明所属技术领域之前，说明本申请是哪 一件申请的分案申请，D选项正确。（2017改编）"},
  {id: 287, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "关于优先权的说法，哪些是错误的：", options: {"A": "申请人要求外国优先权的，必须在提出专利申请的同时在请求书中声明并同时提交在先申请文件副本", "B": "申请人要求发明或实用新型外国优先权的，其在先申请文件副本中记载的申请人与在后申请的申请人完全不一致的，应当在优先权日起十六个月内提交优先权转让证明，否则优先权不成立", "C": "申请人提出在后申请之前，其在先申请已被授予专利权的，本国优先权不能成立，申请人声明放弃已取得的在先申请专利权的情形除外", "D": "申请人要求撤回优先权要求的，应当提交全体申请人或其代表人签字或者盖章的撤回优先权声明"}, answer: "AD", explanation: "A选项，《审查指南》第一部分第一章 第5.1.2节规定：“分案申请适用的各种法定期限， 例如提出实质审查请求的期限，应当从原申请日 起算。对于已经届满或者自分案申请递交日起至 期限届满日不足2个月的各种期限，申请人可以自 分案申请递交日起2个月内或者自收到受理通知 书之日起15日内补办各种手续”、本题中，提交分 案申请的时间已经超过了自原申请日起3年实审 期限，因此提交实质审查请求书并激纳实质审查 费应当在提出分案申请递交日起2个月内，即2024 年9月5日前完成，因此A选项正确。B选项，《细 则》第49条第1款规定：“依照本细则第48条规定 提出的分案申请，可以保留原申请日，享有优先权 的，可以保留优先权日…”，因此分案申请的保 护期限应当自2021年5月8日起计算，B选项错 误。C选项，《细则》第48条第3款规定：“分案的申 请不得改变原申请的类别”，C选项错误。D选项， 根据《审查指南》第一部分第一章第5.11节的规 定，原申请中已提交的与分案申请相关的各种证 明文件，视为已提交，例如优先权申请文件副本 等，D选项正确。（新编）"},
  {id: 288, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "张某向国家知识产权局提交一件要求德国优先权的发明专利申请，该德国专利申请的申请人为张某和于某。下列说法哪个是正确的？", options: {"A": "由于该申请与德国专利申请的申请人不完全一致，因此应当提交优先权转让证明文件", "B": "发明人应当与在先申请的发明人一致或者部分一致", "C": "若张某未在请求书中声明要求优先权，可以在提出申请之日起二个月内请求恢复该德国优先权", "D": "若张某未在规定期限内提交在先申请文件副本，该优先权要求将被视为未要求"}, answer: "ABC", explanation: "A、B、C选项，《细则》第48条第1款 规定：“·专利申请已经被驳回、撤回或者视为 撤回的，不能提出分案申请”；《细则》第48条第3 款规定：“分案的申请不得改变原申请的类别”，因 此A、B、C选项均不符合规定。D选项，根据《审查 指南》第一部分第一章第5.1.1节（4)的规定，分案 申请的发明人应当是原申请的发明人或者是其中 的部分成员，D选项符合规定。（2006）"},
  {id: 289, topic: "专题十三 涉及优先权专利申请的初步审查", type: "single", question: "某公司提交了一件申请日为2023年8月9日、优先权日为2022年8月9日和2023年1月31日的发明专利申请。该公司随后撤回了优先权日为2022年8月9日的优先权。下列说法哪专题些是正确的？请求，并缴纳实质审查费", options: {"B": "该公司可以对已撤回的优先权提出恢复请求", "C": "对于已撤回的优先权，缴纳的优先权要求费不予退回", "D": "该公司不能再要求撤回优先权日为2023年1月31日的优先权", "A": ""}, answer: "B", explanation: "根据《审查指南》第一部分第一章第 5.1.1节（3)的规定，申请人最迟应当在收到专利局 对原申请作出授予专利权通知书之日起2个月期 限（即办理登记手续的期限）届满之前提出分案申 请。上述期限届满后，或者原申请已被驳回，或者 原申请已撤回，或者原申请被视为撤回且未被恢复 权利的，一般不得再提出分案申请。对于分案申请 递交日不符合上述规定的，审查员应当发出分案申 请视为未提出通知书，并作结案处理，因此B选项正 确，A、D选项错误。C选项，分案申请还需要审查申 请日、申请号、递交时间、类别等内容。（2019)"},
  {id: 290, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "以下关于优先权的期限，说法正确的有：", options: {"A": "发明或实用新型在外国或中国第一次提出申请之日起12个月内又在中国就相同主题提出专利申请的，可以按照相关规定享有优先权", "B": "外观设计在外国或中国第一次提出申请之日起6个月内又在中国就相同主题提出专利申请的，可以按照相关规定享有优先权", "C": "申请人在中国就相同主题提出发明或者实用新型专利申请超出规定的期限，有正当理由的，可以在期限届满之日起2个月内请求恢复优先权", "D": "申请人在中国就相同主题提出外观设计专利申请超出规定的期限，有正当理由的，可以在期限届满之日起2个月内请求恢复优先权"}, answer: "AB", explanation: "A选项，原申请被视为撤回，需办理恢 复权利手续，再提出分案申请；根据《审查指南》第 一部分第一章第5.1.1节（3)的规定，对于分案申请 递交日不符合规定的，审查员应当发出分案申请 视为未提出通知书，并作结案处理，A选项正确。 （4)规定：“分案申请的申请人应当与提出分案申 请时原申请的申请人相同...不符合规定的，审 查员应当发出分案申请视为未提出通知书。分案 申请的发明人应当是原申请的发明人或者是其中 的部分成员……对于不符合规定的，审查员应当 发出补正通知书，通知申请人补正。期满未补正 的，审查员应当发出视为撤回通知书”，B选项中申 请人不相同，应当发出视为未提出通知书，B选项 正确；C选项中分案申请的发明人是原申请的发明 人部分成员，符合规定，C选项错误。D选项，《审 有误的，审查员应当发出补正通知书，通知申请人 补正”，D选项错误。（新编）"},
  {id: 291, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "以下关于优先权的增加和改正，说法正确的有：", options: {"A": "发明或者实用新型专利申请在优先权期限内要求了优先权的，自优先权日起16个月内或者自申请日起4个月内，可以请求增加或者改正优先权要求", "B": "外观设计专利申请在优先权期限内要求了优先权的，自优先权日起16个月内或者自申请日起4个月内，可以请求增加或者改正优先权要求", "C": "发明或者实用新型专利申请在优先权期限内未要求优先权的，不能自优先权日起16个月内或者自申请日起4个月内请求增加优先权要求", "D": "发明或者实用新型专利申请在优先权期限内未要求优先权的，可以先请求恢复优先权，再自优先权日起16个月内或者自申请日起4个月内，请求增加优先权要求"}, answer: "AC", explanation: "A选项，《审查指南》第一部分第一章 第5.1.1节（3)规定：“申请人最迟应当在收到专利 局对原申请作出授予专利权通知书之日起2个月 期限（即办理登记手续的期限）届满之前提出分案 申请”。A选项以邮寄方式发出通知书的发文日为 2024年5月24日，推定收到日为2024年6月8日，2 个月期限届满日为2024年8月8日，虽然申请人于 2024年7月4日办理授权登记手续，但在2024年8 月8日前仍可以提出分案申请，A选项正确。B选 项，提出分案申请的期限没有12个月的限制，B选 项错误。C选项，刘某收到驳回决定之日起3个月 内，不提复审请求，也可以提出分案申请，但是分 案申请改变类别，不予受理，C选项正确。D选项， 虽然其修改超范围，但是受理阶段不审查修改超 范围的问题，应予以受理，因此D选项错误。（新编）"},
  {id: 292, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "申请人向国务院专利行政部门就相同主题的发明或实用新型提出在后专利申请，但超出了优先权期限，有正当理由请求恢复，以下说法正确的是：", options: {"A": "在自优先权日起12个月内提出申请，但未声明要求优先权的，可以在优先日起14个月内恢复优先权", "B": "在自优先权日起14个月后、16个月内提出申请，同时声明要求优先权，可以恢复优先权", "C": "在自优先权日起12个月后、14个月内提出申请，同时声明要求优先权、要求恢复优先权的，可以恢复优先权", "D": "在自优先权日起12个月后、14个月内提出申请，同时声明要求优先权，并在之后（自优先权日起14个月内）提出要求恢复优先权的，也可以恢复优先权"}, answer: "ACD", explanation: "《审查指南》第二部分第六章第3.2 节(3)规定：“分案以后的原申请与分案申请的权 利要求书应当分别要求保护不同的发明；而它们 的说明书可以允许有不同的情况。例如，分案前 原申请有A、B两项发明；分案之后、原申请的权利 要求书若要求保护A，其说明书可以仍然是A和 B,也可以只保留A；分案申请的权利要求书若要求 保护B，其说明书可以仍然是A和B，也可以只是 B”，A、C、D选项均符合规定。B选项，权利要求书 要求保护X和Y依然不能克服缺乏单一性的缺陷， B选项不符合规定。（2011)"},
  {id: 293, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "李某和张某于2023年11月11日在德国提交一件实用新型专利申请X，并于2024年4月29日被授权。李某于2024年6月27日就相同主题向国家知识产权局提出一件发明专利申请Y,并准备要求申请X的优先权，下列说法正确的是？", options: {"A": "李某在提交申请Y的同时在请求书中提出要求优先权声明，应当在2025年3月11日之前提交申请X的在先申请文件副本", "B": "李某在要求优先权声明中将申请X的申请日和申请号全部写错，将直接视为未要求优先权", "C": "李某在提交申请Y的同时在请求书中提出要求优先权声明，应当在2025年3月11日之前提交优先权转让证明文件", "D": "若李某在提交申请Y的同时未在请求书中提出要求优先权声明，申请Y不能通过请求恢复优先权方式或增加优先权的方式享有申请X的优先权"}, answer: "BCD", explanation: "《审查指南》第二部分第十章第9.2、1 节规定：“国家知识产权局认可的保藏单位是指布 达佩斯条约承认的生物材料样品国际保藏单位， 其中包括位于我国北京的中国微生物菌种保藏管 理委员会普通微生物中心（CGMCC)、位于武汉的 中国典型培养物保藏中心（CCTCC）和位于广州的 广东省微生物菌种保藏中心（GDMCC)。”，因此B、 C、D选项当选。（新编）"},
  {id: 294, topic: "专题十三 涉及优先权专利申请的初步审查", type: "single", question: "李某于2024年2月5日向国家知识产权局提交了一份发明专利申请，该申请要求了其2023年12月1日在日本提交的专题专利申请的优先权。在初审阶段，李某在2024年5月5日又要求增加一项其2023年2月5日在日本提交的专利申请的优先权。下列哪些说法是正确的？", options: {"A": "李某不可以增加优先权要求，优先权要求只能在提交专利申请的同时提出", "B": "李某可以增加优先权要求，但需要提交新的发明专利请求书", "C": "李某不可以增加优先权要求,该增加的优先权要求超出了自优先权日起十二个月的期限", "D": "李某可以增加优先权要求,但应当在请求增加优先权的同时缴纳优先权要求费"}, answer: "C", explanation: "《细则》第27条规定：“申请专利的发明 涉及新的生物材料，该生物材料公众不能得到，并 且对该生物材料的说明不足以使所属领域的技术 人员实施其发明的，除应当符合专利法和本细则 的有关规定外，申请人还应当办理下列手续：（一） 在申请日前或者最迟在申请日（有优先权的，指优 先权日），将该生物材料的样品提交国务院专利行 政部门认可的保藏单位保藏，并在申请时或者最 迟自申请日起4个月内提交保藏单位出具的保藏 证明和存活证明；期满未提交证明的，该样品视为 未提交保藏…….”，因此A、B、D选项不符合规定，C 选项符合规定。（2019)"},
  {id: 295, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "关于援引加人，以下说法正确的是：", options: {"A": "如果发明、实用新型、外观设计申请缺少内容,均可以从优先权文本补入", "B": "如果发明或者实用新型申请缺少权利要求书、说明书。申请人在申请时提出要求优先权声明，可以自递交日起2个月补交合格内容，以首次提交文件的递交日为申请日", "C": "如果审查员发现发明或者实用新型申请缺少权利要求书、说明书，申请人在申请时提出要求优先权声明，可以要求申请人补交", "D": "如果发明或者实用新型申请遗漏缺少权利要求书、说明书,申请人在申请时并未声明要求优先权,则不能补人遗漏内容"}, answer: "BD", explanation: "根据《细则》第27条的规定，申请专 利的发明涉及新的生物材料，申请人应当在申请 日前或者最迟在申请日（有优先权的，指优先权 日），将该生物材料的样品提交国务院专利行政部 门认可的保藏单位保藏，并在申请时或者最迟自 申请日起4个月内提交保藏单位出具的保藏证明 和存活证明；根据《审查指南》第一部分第一章第 5.2.1节（2)的规定，保藏证明写明的保藏日期在所 要求的优先权日之后，并且在申请日之前的，审查 员应当发出办理手续补正通知书，要求申请人在 指定的期限内撤回优先权要求或者声明该保藏证 明涉及的生物材料的内容不要求享受优先权。A 选项，保藏日期晚于优先权日，A选项不符合要求。 B选项，保藏日期在优先权日当天，提交保藏证明 及存活证明的日期在申请日起4个月内，B选项符 合要求。C选项，保藏日期晚于优先权日，C选项 不符合要求。D选项，由于申请人声明放弃优先 权，而使得其保藏日期早于该申请的申请日，D选 项符合要求。（2016)"},
  {id: 296, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "李某委托代理机构于2024年6月3日通过专利局指定的电子系统提交了一件中国发明专利,并声明要求2023年7月30日在德国提交的专利申请的优先权,后发现错误提交说明书部分内容,于2024年7月5日请求以援引加入方式补交说明书的内容，以下说法正确的是：", options: {"A": "李某需要提交确认援引加人声明", "B": "李某提交的文件应当包括说明书的修改替换页，但无需说明补交的内容在在先申请文件副本中的位置", "C": "李某补交说明书内容审核通过后，申请日重新确认为2024年7月5日", "D": "如果该申请属于分案申请，则李某不可以通过援引加入补交说明书"}, answer: "ABD", explanation: "A选项，《细则》第27条第（三）项规 定：“涉及生物材料样品保藏的专利申请应当在请 求书和说明书中写明该生物材料的分类命名（注 明拉丁文名称）、保藏该生物材料样品的单位名 称、地址、保藏日期和保藏编号；申请时未写明的， 应当自申请日起4个月内补正”，A选项正确。 B选项，《细则》第27条第（一）项规定：“在申请日 前或者最迟在申请日(有优先权的，指优先权日）， 将该生物材料的样品提交国务院专利行政部门认 可的保藏单位保藏，并在申请时或者最迟自申请 日起4个月内提交保藏单位出具的保藏证明和存 活证明.”，B选项正确。C选项，保藏日期虽晚 于2023年4月5日，但早于2023年6月10日，因此 可以享有2023年6月10日的优先权，C选项错误。 D选项，申请人可以撤回2023年4月5日的优先 权，只享有2023年6月10日的优先权，或者声明该 保藏证明涉及的生物材料的内容不要求享有优先 权，以满足保藏日期的要求，D选项正确。(2017)"},
  {id: 297, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "通过援引在先申请文件的方式补交申请文件时，下列说法正确的有哪些？", options: {"A": "可以通过援引在先申请文件的方式补交遗漏的权利要求书、说明书", "B": "要求本国优先权，应当写明在先申请号、申请日，以及原受理机构出具的在先申请文件副本", "C": "要求外国优先权的，应当提交原受理机构出具的在先申请文件副本，同时提交该副本的中文译文", "D": "补交的申请文件内容应当包含在在先申请文件副本和其中文译文之中"}, answer: "ABD", explanation: "根据《细则》第27条的规定，申请 人应当在申请日前或者最迟在申请日（有优先权 的，指优先权日）将该生物材料的样品提交国务院 专利行政部门认可的保藏单位保藏，并在申请时 或者最迟自申请日起4个月内提交保藏单位出具 的保藏证明和存活证明，期满未提交证明的，该样 品视为未提交保藏。A选项，保藏日期晚于申请的 优先权日，因此视为未保藏。B选项，提交保藏证 明和存活证明的日期晚于申请日起4个月，因此视 为未保藏。C选项，保藏日期在优先权日之后，但 由于申请人放弃了优先权，保藏日期在申请日之 前，因此符合要求。D选项，记载保裁信息的补正 晚于申请日起4个月内，因此视为未保藏。（2018） 16、ABC。A、B选项，《细则》第27条规定：“申 请专利的发明涉及新的生物材料，该生物材料公 众不能得到，并且对该生物材料的说明不足以使 所属领域的技术人员实施其发明的，除应当符合 专利法和本细则的有关规定外，申请人还应当办 理下列手续：（一）在申请日前或者最迟在申请日 （有优先权的，指优先权日），将该生物材料的样品 提交国务院专利行政部门认可的保藏单位保 藏·（三）涉及生物材料样品保藏的专利申请应 当在请求书和说明书中写明该生物材料的分类命 名（注明拉丁文名称）、保藏该生物材料样品的单 位名称、地址、保藏日期和保藏编号….”，A、B选 项正确。《专利法》第26条第5款规定：“依赖遗传 资源完成的发明创造，申请人应当在专利申请文 件中说明该遗传资源的直接来源和原始来源；申 请人无法说明原始来源的，应当陈述理由”，C选项 正确。D选项，根据《审查指南》第二部分第十章第 9.5.3节的规定，登记表中的内容不属于原说明书 和权利要求书记载的内容，因此不能作为判断说 明书是否充分公开的依据，也不得作为修改说明 书和权利要求书的基础，D选项错误。（2014)"},
  {id: 298, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "关于以援引在先申请文件的方式补交申请文件，下列说法正确的有哪些？", options: {"A": "请求恢复优先权后不能再适用援引在先申请文件的方式补交申请文件", "B": "增加或者改正优先权后不能再适用援引在先申请文件的方式补交申请文件", "C": "申请人因正当理由延误提出援引加入声明，不可以恢复", "D": "申请人在申请日起二个月或者收到通知书之日起一个月内补缴相关费用，期满未补缴的，该申请视为撤回"}, answer: "ABCD", explanation: "A选项，《细则》第29条第2款规 定：“就依赖遗传资源完成的发明创造申请专利 的，申请人应当在请求书中予以说明，并填写国务 院专利行政部门制定的表格”，A选项正确。B、C、 D选项，《审查指南》第一部分第一章第5.3节规定： “就依赖遗传资源完成的发明创造申请专利，申请 人应当在请求书中对于遗传资源的来源予以说 明，并填写遗传资源来源披露登记表，写明该遗传 资源的直接来源和原始来源。申请人无法说明原 始来源的，应当陈述理由。对于不符合规定的，审 查员应当发出补正通知书，通知申请人补正。期 满未补正的，审查员应当发出视为撤回通知书。 补正后仍不符合规定的，该专利申请应当被驳 回”，因此B、C、D选项正确。（2012)"},
  {id: 299, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "关于以援引在先申请的方式补交申请文件的说法，正确的有：", options: {"A": "分案申请要求优先权的可以适用援引加人", "B": "外观设计要求优先权的可以适用援引加人", "C": "补交申请文件的内容应当包含在在先申请文件副本及中文译文之中", "D": "以援引方式补交文件的，保留申请日专题"}, answer: "AD", explanation: "A选项，《专利法》第5条第2款规定： “对违反法律、行政法规的规定获取或者利用遗传 资源，并依赖该遗传资源完成的发明创造，不授予 专利权”，A选项正确。B、D选项，根据《细则》第29 条第1款的规定，专利法所称遗传资源，是指取自 人体、动物、植物或者微生物等含有遗传功能单位 并具有实际或者潜在价值的材料和利用此类材料 产生的遗传信息；专利法所称依赖遗传资源完成 的发明创造，是指利用了遗传资源的遗传功能完 成的发明创造，因此B选项错误，D选项正确。C选 项，遗传资源的直接来源必须进行说明，仅陈述理 由仍然不满足遗传资源披露的要求，C选项错误。 （2019改编）"},
  {id: 300, topic: "专题十三 涉及优先权专利申请的初步审查", type: "multiple", question: "关于专利申请文件遗漏或者缺少内容，以下说法正确的是：", options: {"A": "如果发明或者实用新型申请缺少权利要求书或者说明书，则专利申请不符合受理条件，一律不予受理", "B": "如果发明或者实用新型申请缺少权利要求书、说明书，申请人在申请时提出要求优先权声明和援引加人声明,可以自递交日起两个月补交文件，补交的文件符合有关规定的，以首次提交文件的递交日为申请日", "C": "如果外观设计申请缺少图片或照片以及简要说明，申请人在申请时提出要求优先权声明和援引加人声明，可以自递交日起两个月补交文件，补交的文件符合有关规定的，以首次提交文件的递交日为申请日", "D": "如果发明或者实用新型申请遗漏缺少权利要求书、说明书，申请人在申请时并未声明要求优先权，则专利申请不符合受理条件，不予受理三种特殊专利的审查"}, answer: "BCD", explanation: "A、B选项，《细则》第29条第1款规 定：“专利法所称遗传资源，是指取自人体、动物、 植物或者微生物等含有遗传功能单位并具有实际 或者潜在价值的材料和利用此类材料产生的遗传 信息；专利法所称依赖遗传资源完成的发明创造， 是指利用了遗传资源的遗传功能完成的发明创 造”，因此A选项错误，B选项正确。C选项，就依赖 遗传资源完成的发明创造申请专利的，申请人应 当在请求书中予以说明，并填写国务院专利行政 部门制定的表格，C选项正确。D选项，《审查指 南》第二部分第一章第3.2节规定：“违反法律、行 政法规的规定获取或者利用遗传资源，是指遗传 资源的获取或者利用违反法律、行政法规的禁止 性规定或者未按照我国有关法律、行政法规的规 定事先获得有关行政管理部门的批准或者相关权 利人的许可”，D选项正确。（2013）"},
  {id: 301, topic: "专题十四 三种特殊专利的审查", type: "single", question: "某公司就申请日为2023年8月21日、优先权日为2023年5月21日的专利申请提出分案申请，该分案申请通过专利局指定的特定电子系统以电子形式提交，提交日为2024年4月15日。该分案申请的申请日和优先权日分别是：", options: {"A": "2024年4月15日，2023年8月21日", "B": "2024年4月15日，2023年5月21日", "C": "2023年8月21日，2023年5月21日", "D": "2023年8月21日，无优先权日"}, answer: "A", explanation: "根据《审查指南》第一部分第一章 第6.4.1节的规定，实质审查请求应当在自申 请日（有优先权的，指优先权日）起3年内提 出，并在此期限内缴纳实质审查费，因此申请 人应当在2022年9月27日前提出实质审查请 求，A选项正确。（新编）"},
  {id: 302, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "关于分案申请，下列说法正确的是？", options: {"A": "分案申请的类别应当与原申请的类别一致", "B": "收到原申请的驳回决定后提出的分案申请均应被视为未提出", "C": "分案申请与原申请的权利要求书应当分别保护不同的技术方案", "D": "分案申请所要求保护的技术方案不得超出原申请记载的范围"}, answer: "ACD", explanation: "本题中，优先权日为2020年4 月5日，申请人应当最晚于2023年4月5日前 提出实质审查请求，并在此期限内缴纳实质审 查费。请求实质审查时，应当提交在申请日 （有优先权的，指优先权日）前与其发明有关的 参考资料，A、C选项正确，B选项错误。D选 项，根据《审查指南》第一部分第一章第6.4.2 节(3)的规定，申请人未在规定的期限内提交 实质审查请求书，或者未在规定的期限内缴纳 或者缴足实质审查费的，审查员应当发出视为 撤回通知书，D选项正确。（新编）"},
  {id: 303, topic: "专题十四 三种特殊专利的审查", type: "single", question: "下列说法哪个是正确的？", options: {"A": "分案申请不能作为要求本国优先权的基础", "B": "申请人可以以发明专利申请为基础，提出实用新型专利分案申请", "C": "要求本国优先权的在后申请的发明人应当与在先申请的发明人一致或者部分一致", "D": "原申请要求了优先权，分案申请不需要声明要求优先权"}, answer: "D", explanation: "A选项，根据《审查指南》第二部分 第八章第2.2节的规定实质审查程序应当遵循 请求原则、听证原则、程序节约原则，没有公平 原则，A选项错误。B选项，实审请求和实审请 求费均需要在申请日（有优先权的，指优先权 日）起3年缴纳，但是不需要同时缴纳，B选项 错误。C选项，申请人的答复应当提交至受理 部门，C选项错误。D选项，根据《审查指南》第 二部分第八章第2.1节的规定，在实质审查程 序中可以采用会、电话讨论和现场调查等辅 助手段，D选项正确。（新编）"},
  {id: 304, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "关于分案申请，以下说法正确的是？", options: {"A": "复审程序中可以提出分案申请，但需要在提出复审请求或者收到复审决定之日起三个月内提出", "B": "分案申请的原申请号填写错误的，国家知识产权局将不予受理", "C": "分案申请未填写原申请号的，国家知识产权局将按照一般专利申请受理", "D": "分案申请应当在其说明书的起始部分说明本申请是哪一件申请的分案申请"}, answer: "ABCD", explanation: "《审查指南》第二部分第八章第 4.1节规定：“审查员首次审查所针对的文本通 常是申请人按照专利法及其实施细则规定提 交的原始申请文件或者应专利局初步审查部 门要求补正后的文件【A、B选项】；按照规定以 援引在先申请文件的方式补交的权利要求书 或说明书的内容，是原始申请文件的一部分 【C选项】；审查员应当在初步审查部门审查的 基础上核实补交的内容是否完全包含在在先 申请文件副本和其中文译文之中，未包含的， 应当重新确定申请日，以后补交文件的日期为 申请日【D选项】·”，因此A、B、C、D选项说 法均正确。（新编）"},
  {id: 305, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "德国某公司于2021年5月8日向国家知识产权局提交了一件要求了德国优先权的发明专利申请，并在规定期限内递交了德国在先申请文件副本，办理了实质审查请求的相关手续。由于不符合单一性要求，该公司于2024年7月5日提出了分案申请。下列针对分案申请的哪些说法是正确的？", options: {"A": "虽然该公司针对原申请已经办理了实质审查请求的相关手续，但针对分案申请仍应在2024年9月5日前提交实质审查请求书并缴纳实质审查费", "B": "如果该分案申请被授予专利权，则其专利权的保护期限应当自2024年7月5日起计算", "C": "虽然该公司提出的原申请为发明专利申请，但在提出分案申请时可以将申请类型由发明改为实用新型", "D": "由于该公司已经针对原申请提交了优先权文件副本，因此针对分案申请无需提交优先权文件副本"}, answer: "ABCD", explanation: "A选项，《专利法》第35条第2 款规定：“国务院专利行政部门认为必要的时 侯，可以自行对发明专利申请进行实质审查”， 因此A选项说法错误。B选项，根据听证原 则，即使赠博机属于《专利法》第5条规定的违 反法律的发明创造，审查员也应将该审查意见 告知申请人，给予修改和陈述意见的机会，B 选项说法错误。《审查指南》第二部分第八章第 2.2节（3）规定：“除非确认申请根本没有被授 权的前景，审查员应当在第一次审查意见通知 书中，将申请中不符合专利法及其实施细则规 定的所有问题通知申请人”，因此C选项说法 太绝对，C选项错误。《审查指南》第二部分第 八章第4.10.2.2节（4)规定：“申请由于不具备 新颖性或创造性而不可能被授予专利权的，审 查员在通知书正文中，必须对每项权利要求的 新颖性或者创造性提出反对意见…….”，因此 D选项错误。（新编）"},
  {id: 306, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "下列哪些分案申请不符合规定？", options: {"A": "甲对其已经驳回且已生效的发明专利申请提出的分案申请", "B": "乙对其已经主动撤回的外观设计专利申请提出的分案申请", "C": "丙对其正在初审中的发明专利申请提出的实用新型专利分案申请", "D": "丁将原申请中的发明人A、B和C减少为分案申请中的B和C"}, answer: "BC", explanation: "《审查指南》第二部分第八章第49 节规定：“任何人对不符合专利法规定的发明 专利申请向专利局提出的意见，应当存入该申 请文档中供审查员在实质审查时考虑。如果 公众的意见是在审查员发出授予专利权的通 知之后收到的，就不必考虑。专利局对公众意 见的处理情况，不必通知提出意见的公众”，因 此A、D选项错误，C选项正确。《审查指南》第 二部分第八章第3.2.4节（2)规定：“审查员应 当查对申请文档中是否有公众意见并在审查 过程中予以考虑”，因此B选项正确。（2017 改编） 7、ABC。A选项，根据《审查指南》第二部 分第七章第1节的规定，每一件发明专利申请 在被授予专利权前都应当进行检索，因此A选 项正确。B选项，《专利法》第35条第1款规 定：“发明专利申请自申请日起3年内，国务院 专利行政部门可以根据申请人随时提出的请 求，对其申请进行实质审查；申请人无正当理 由逾期不请求实质审查的，该申请即被视为撤 回”，因此B选项正确。C选项，《专利法》第35 条第2款规定：“国务院专利行政部门认为必 要的时候，可以自行对发明专利申请进行实质 审查”，因此C选项正确。D选项，根据《审查 指南》第二部分第八章第4.10.3节的规定，实 质审查程序中，答复第一次审查意见通知书的 期限为4个月，之后的再次审查意见通知书的 答复期限为2个月，因此D选项错误。（新编）"},
  {id: 307, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "发明专利申请已经被视为撤回且未恢复权利，针对该申请提出的分案申请，下列说法正确的是？", options: {"A": "分案申请视为未提出，该分案申请作新申请处理", "B": "分案申请视为未提出，该分案申请作结案处理", "C": "分案申请成立与否取决于其内容是否超出原申请公开的范围", "D": "分案申请不成立，该分案申请将被驳回"}, answer: "CD", explanation: "根据《审查指南》第二部分第七章 第12节的规定，在检索报告中，审查员采用下 列符号来表示对比文件与权利要求的关系： X：单独影响权利要求的新颖性或创造性的文 件；Y；与检索报告中其他Y类文件组合后影 响权利要求的创造性的文件。因此A选项错 误，C选项正确。Y类文件必须和其他Y类文 献组合评价创造性，因此B选项错误，D选项 正确。（新编）"},
  {id: 308, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "关于分案申请，以下说法正确的是？", options: {"A": "国家知识产权局于2024年5月26日发出专利申请视为撤回通知书，申请人尚未办理权利恢复，于2024年6月3日提出分案申请，国家知识产权局应当发出视为未提出通知书", "B": "原案申请人为甲公司，由于专利申请缺少单一性，甲公司将分案申请转让给乙公司，乙公司提交分案申请并提交转让协议，国家知识产权局应当发出视为未提出通知书", "C": "原申请人为甲公司，发明人为张某，李某，孙某，提交的分案申请的发明人只有张某，国家知识产权局应当发出视为未提出通知书", "D": "原申请为发明专利，申请日为2021年4月23日，在实审阶段，申请人于2023年8月9日提出分案申请，在国家知识产权局应当发出视为未提出通知书"}, answer: "ACD", explanation: "根据《审查指南》第二部分第七 章第12节的规定，符号X、Y和A表示对比文 件与申请的权利要求在内容上的相关程度，A 选项正确。符号E表示单独影响权利要求新 颖性的抵触申请文件，C选项正确。符号R表 示任何单位或个人在申请日向专利局提交的、 属于同样的发明创造的专利或专利申请文件， 因此D选项正确。符号P表示对比文件与申 请在时间上的关系，其后应附带标明文件内容 相关程度的符号X、Y、E或A，因此B选项错 误。（新编）"},
  {id: 309, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "关于分案申请，以下说法哪些是正确的？", options: {"A": "国家知识产权局以邮寄方式向申请人发出了办理登记手续通知书和授予专利权通知书，其发文日为2024年5月24日，申请人李某已经于2024年7月4日办理授权登记手续，仍然可以在2024年8月8日前提出分案申请", "B": "赵某于2023年1月8日向国家知识产权局提交了一件发明专利申请，后于2024年3月30日就该申请提出了分案申请，由于超出了自原申请日起十二个月的期限，国家知识产权局将不受理赵某的分案申请", "C": "刘某于2024年3月8日在电子系统中看到国家知识产权以电子形式送达的发文日为2024年3月5日的发明专利申请驳回通知书，因感到申请复审胜诉无望,于2024年6月3日提出实用新型分案申请，国家知识产权局将不受理刘某的分案申请", "D": "国家知识产权局在驳回通知书中指出，申请文件中关键技术“去皱拉皮”的手段不清楚，申请人提出复审请求，在分案申请中补充具体技术手段，国家知识产权局将不受理"}, answer: "CD", explanation: "，A选项，X类文件只能单独使 用，不可以和其他文件组合，A选项错误。B 选项，A类文件代表现有技术，其公开日必须 早于专利申请的申请日，因此B选项错误。符 号T表示申请日或优先权日当天或之后公布 的，可以对所要求保护发明的理论或原理提供 清楚解释的文件，或者可显示出所要求保护发 明的推理或事实不成立的文件、因此C选项正 确。符号L表示除X、Y、A、R、P、E和T类文件 之外的原因引用的文件，因此D选项正确。 （新编）"},
  {id: 310, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "一件实用新型专利申请要求保护X和Y两个技术方案，X、Y之间缺乏单一性。对于审查员要求分案的通知，申请人的下列哪些做法符合相关规定？", options: {"A": "在原申请的说明书中保留X、Y的内容，权利要求书只要求保护Y", "B": "在原申请的说明书中删除有关X的内容，权利要求书要求保护X和Y", "C": "提交分案申请，在其说明书中删除有关X的内容，权利要求书只要求保护Y", "D": "提交分案申请，在其说明书中保留X、Y的内容，权利要求书只要求保护X"}, answer: "ACD", explanation: "A、B、C选项，（审查指南》第二 部分第八章第4.10.1节规定：“为了使申请人 尽快地作出符合要求的修改，必要时审查员可 以提出修改的建议供申请人修改时参考。如 果申请人接受审查员的建议，应当正式提交经 过修改的文件，.除该申请因存在严重实质 性缺陷而无授权前最或者审查员因申请缺乏 单一性面暂爱滋读审查之外，第一次审查意见 通知书应当写明审查员对申请的实质方面和 形式方面的全部意见。…在审查文本不符 合专利法第33条规定的情况下、审查员也可 以针对审查文本之外的其他文本提出审查意 见，供申请人参考”，因此B选项错误，A、C选 项正确。D选项，根据《审查指南》第二部分第 八章第5,1.1节的规定，申请人的正式答复可 以是无具体答复内容的意见陈述书或补正书， 对此可以理解为申请人未对审查意见提出具 体反对意见，因此D选项正确。（新编）"},
  {id: 311, topic: "专题十四 三种特殊专利的审查", type: "single", question: "下列哪些属于布达佩斯条约承认的生物材料样品国际保藏中心：", options: {"A": "中国工业微生物菌种保藏管理中心（CICC）", "B": "中国微生物菌种保藏管理委员会普通微生物中心(CGMCC)", "C": "中国典型培养物保藏中心（CCTCC）", "D": "广东省微生物菌种保藏中心（GDMCC）"}, answer: "B", explanation: "《审查指南》第二部分第八章第 5.1.2节规定：“申请人未委托专利代理机构 的，其提交的意见陈述书或者补正书，应当有 申请人的签字或者盖章；申请人是单位的，应 当加盖公章；申请人有两个以上的，可以由其 代表人签字或者盖章申请人委托了专利 代理机构的，其答复应当由其所委托的专利代 理机构盖章，并由委托书中指定的专利代理师 签字或者盖章…”。A选项发明人无权签 字；C选项可由代表人签字或者盖章，联系人 无此权限；D选项还需由代理机构盖章，因此 A、C、D选项错误，B选项正确。（2012)"},
  {id: 312, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "下列哪个情形符合生物材料保藏要求？", options: {"A": "申请人自申请日起第四个月在国家知识产权局认可的保藏单位进行了生物保藏，并提交了保藏及存活证明", "B": "申请人于申请日前四个月在国家知识产权局认可的保藏单位进行了生物保藏，在申请日后的第五个月提交了保藏及存活证明", "C": "申请人于申请日前一个月在国家知识产权局认可的保藏单位进行了生物保藏，在申请日后的第二个月提交了保藏及存活证明", "D": "申请人于申请日当天在其学校的国家重点生物实验室自行进行了生物保藏，在申请日后的第二个月提交了保藏及存活证明"}, answer: "ABC", explanation: "A选项，根据《审查指南》第二 部分第八章第4.10.3节的规定，答复发明第一 次审查意见通知书的期限为4个月。通过电 子形式送达的通知和决定，除另有证据外，以 发文日为送达日，本题中期限届满日应为 2024年10月11日，A选项正确。B选项，《审 查指南》第二部分第八章第5.1.2节规定：“申 请人未委托专利代理机构的，其提交的意见陈 述书或者补正书，应当有申请人的签字或者盖 章；申请人是单位的，应当加盖公章；申请人有 两个以上的，可以由其代表人签字或者盖章”， 因此B选项正确。C选项，根据《审查指南》第 二部分第八章第5.1节的规定，申请人的答复 可以仅仅是意见陈述书，也可以进一步包括经 修改的申请文件（替换页和/或补正书），因此C 选项正确。D选项，根据《审查指南》第二部分 第八章第5.1.1节的规定，申请人的答复应当 提交给专利局受理部门。直接提交给审查员 的答复文件或征询意见的信件不视为正式答 复，不具备法律效力，因此D选项错误。（2013 改编）"},
  {id: 313, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "某涉及生物材料的发明专利申请，申请日为2024年5月1日，优先权日为2023年6月1日，申请人将该生物材料的样品提交到国家知识产权局认可的保藏单位进行保藏，下列手续哪些符合要求？", options: {"A": "提交保藏的日期：2024年5月1日，提交保藏证明及存活证明的日期：2024年8月1日", "B": "提交保藏的日期：2023年6月1日，提交保藏证明及存活证明的日期：2024年9月1日", "C": "提交保藏的日期：2023年10月1日，提交保藏证明及存活证明的日期：2024年8月1日", "D": "提交保藏的日期：2023年10月1日，提交保藏证明及存活证明的日期：2024年8月1日，同时申请人提交声明表示放弃优先权"}, answer: "ACD", explanation: "A选项，根据《审查指南》第二 部分第八章第5.1节的规定，申请人的答复可 以仅仅是意见陈述书，也可以进一步包括经修 改的申请文件，A选项正确。B选项、根据《审 查指南》第二部分第八章第5.1节的规定。申请 人可以请求专利局延长指定的答复期限，延长 误。C选项，根据《审查指南》第二部分第八章 第5.1.1节的规定，直接提交给审查员的答复 文件或征询意见的信件不视为正式答复，不具 备法律效力，C选项正确。D选项、根据《审查 指南>第二部分第八章第4.10.3节的规定、发 明专利申请答复第一次审查意见通知书的期 限为4个月，因此D选项正确。（2015）"},
  {id: 314, topic: "专题十四 三种特殊专利的审查", type: "single", question: "申请人甲于2024年2月20日提交了一项发明专利申请，该申请要求了两项外国优先权，优先权日分别是2023年4月5日和2023年6月10日，该申请被受理后，申-114 -请人发现在申请时忘记在请求书和说明书中写明生物材料的样品信息，保藏日是2023年5月20日，如果申请人想补人该生物材料样品信息，下面说法正确的是？", options: {"A": "申请人应当于2024年6月20日前办理补正手续", "B": "申请人应当于2024年6月20日前提交修改后的请求书以及该生物材料的样品保藏证明和存活证明", "C": "该申请中，保藏日期晚于最早优先权日，因此生物材料的内容不能享有任何优先权", "D": "申请人可以声明撤回部分优先权要求或者声明该保藏证明涉及的生物材料的内容不要求享有优先权，以满足保藏日的要求"}, answer: "A", explanation: "《审查指南》第二部分第八章第 4.11.2节规定：“在继续审查（包括复审后的审 查）中，必要时，审查员应当进行补充检索”，因 此A选项正确。B选项，根据《审查指南》第二 部分第八章第4.12节的规定，在实质审查过程 中，只要通过会能达到有益的目的，有利于 澄清问题、消除分歧、促进理解，申请人都可以 提出会要求，即实质审查过程中都可以进行 会语，因此B选项错误。C选项、《审查指南》 第二部分第八章第4.13节规定：“在实质审查 过程中，审查员与申请人可以就发明和现有技 术的理解、申请文件中存在的问题等进行电话 讨论”，C选项错误。D选项，（审查指南》第二 部分第八章第4.12.3节规定：\"会记录不能 代替申请人的正式书面答复或者修改”，D选 项错误。（新编）"},
  {id: 315, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "下列哪些情况视为未保藏生物材料？", options: {"A": "申请日为2024年6月1日，优先权日为2023年9月1日，保藏日期为2024年1月1日，提交保藏证明和存活证明的日期为2024年6月1日", "B": "申请日为2024年6月1日，优先权日为2023年9月1日，保藏日期为2023年9月1日，提交保藏证明和存活证明的日期为2024年12月1日", "C": "申请日为2024年6月1日，优先权日为2023年9月1日，保藏日期为2024年3月1日，提交保藏证明和存活证明的日期为2024年7月1日，同日提交了放弃优先权声明", "D": "申请日为2024年6月1日，优先权日为2023年9月1日，保藏日期为2023年9月1日，提交保藏证明和存活证明的日期为2024年8月1日，后发现请求书和申请文件均没有记载保藏信息，于2024年12月1日提交了补正"}, answer: "ABCD", explanation: "A、B选项，《审查指亩》第二 部分第八章第4.12节规定：“在实质审查过程 中，审查员可以约请申请人会唔，以加快审查 程序。申请人亦可以要求会语…”，因此A、 B选项正确。C、D选项，《审查指南》第二部分 第八章第4.12.2节规定：“申请人委托了专利 代理机构的，会唔必须有代理师参加……..申请 人没有委托专利代理机构的，申请人应当参加 会唔；申请人是单位的，由该单位指定的人员 参加上述规定也适用于共同申请人。除 非另有声明或者委托了代理机构，共有专利申 请的单位或者个人都应当参加会唔”。因此C、 D选项正确。（2018）"},
  {id: 316, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "下列说法哪些是正确的？", options: {"A": "申请专利的发明涉及公众不能得到的新的生物材料，并且对该生物材料的说明不足以使所属领域的技术人员实施其发明的，则应当在申请日前或者最迟在申请日（有优先权的，指优先权日）将该生物材料的样品提交国家知识产权局认可的保藏单位保藏", "B": "涉及生物材料样品保藏的专利申请应当在请求书和说明书中写明该生物材料的分类命名（注明拉丁文名称）、保藏该生物材料样品的单位名称、地址、保藏日期和保藏编号", "C": "依赖遗传资源完成的发明创造，申请人应当在专利申请文件中说明该遗传资源的直接来源和原始来源；申请人无法说明原始来源的，应当陈述理由", "D": "遗传资源来源披露登记表中的内容可被视为原申请记载的内容，可以作为修改说明书和权利要求书的基础"}, answer: "AC", explanation: "《审查指南》第二部分第八章第 4.14节规定：“一般说来，在实质审查程序中审 查员不必要求申请人提供证据，*如果申请 人不同意审查员的意见，那么，由申请人决定 是否提供证据来支持其主张。申请人提 供的证据可以是书面文件或者实物模型， 审查员方可去现场调查。调查所需的费用由 专利局承担”，因此A、C选项正确。B、D选项 错误。（2011)"},
  {id: 317, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "申请人就一件依赖遗传资源完成的发明向国家知识产权局提出了专利申请，并同时提交了遗传资源来源披露登记表。下列说法哪些是正确的？", options: {"A": "申请人应当在请求书中说明该发明是依赖遗传资源完成的", "B": "该登记表中应当写明遗传资源的直接来源", "C": "该登记表中应当写明遗传资源的原始来源，无法说明原始来源的，应当陈述理由", "D": "该登记表经补正仍不符合规定的，国家知识产权局应当驳回该专利申请"}, answer: "BC", explanation: "《细则》第57条第1款规定：“发明 专利申请人在提出实质审查请求时以及在收 到国务院专利行政部门发出的发明专利申请 进入实质审查阶段通知书之日起的3个月内， 可以对发明专利申请主动提出修改”。本题 中，国家知识产权局2024年3月22日发出了 进入实质审查程序通知书；申请人可以于 2024年3月22日至2024年6月22日之间主动 提出修改，也可以于2024年3月1日提出实质 审查请求之时提出主动修改，因此A、D选项 错误，B、C选项正确。（2011改编）"},
  {id: 318, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "下列涉及遗传资源发明专利申请的说法，哪些是正确的？", options: {"A": "对违反法律的规定获取遗传资源，并依赖该遗传资源完成的发明创造，不授予专利权", "B": "专利法所称依赖遗传资源完成的发明创造，是指利用遗传资源完成的发明创造", "C": "依赖遗传资源完成的发明创造，申请人无法说明直接来源的，可以在申请文件中陈述理由", "D": "遗传资源，是指取自人体、动物、植物或者微生物等含有遗传功能单位并具有实际或者潜在价值的材料和利用此类材料产生的遗传信息"}, answer: "ABCD", explanation: "《审查指南》第二部分第八章 第4.1节规定：“按照规定以援引在先申请文件 的方式补交的权利要求书或说明书的内容，是 原始申请文件的一部分。申请人在提出实质 审查请求时，或者在收到专利局发出的发明专 利申请进入实质审查阶段通知书之日起的3 个月内，对发明专利申请进行了主动修改的， 无论修改的内容是否超出原说明书和权利要 求书记载的范围，均应当以申请人提交的经过 该主动修改的申请文件作为审查文本【A、B选 项】。申请人在上述规定期间内多次对申请文 件进行了主动修改的，应当以最后一次提交的 申奇文件为审查文本【D选项】-如果申请 人进行的修改不符合专用法实端细则第57条 第1撤的规定，但审查员在网读该能修改的文 件后认为其周险了原申请文件存在的应当演 原约缺陷、又得争寺得法第33条的规定、且在 该侈改文本的基础上进行审查牌有利于节为 审查程序，则可以接受该丝修改的申请文件作 为审查文本[C选项】”，因此A、B.C、D选项为 正确。（2019改编）"},
  {id: 319, topic: "专题十四 三种特殊专利的审查", type: "multiple", question: "下列说法哪些是正确的？", options: {"A": "专利法所称遗传资源包括取自人体、动物或植物的材料，不包括取自微生物的材料", "B": "专利法所称依赖遗传资源完成的发明创造，是指利用了遗传资源的遗传功能完成的发明创造", "C": "就依赖遗传资源完成的发明创造申请专利的，申请人应当在请求书中予以说明", "D": "违反法律、行政法规的规定获取或者利用遗传资源，是指违反法律、行政法规的禁止性规定或者未按照我国法律、行政法规的规定事先获得有关行政管理部门的批准或者相关权利人的许可实质审查程序"}, answer: "ABC", explanation: "、A选项，主动修改对机表述当 确，B选项、无论何时够波，均不能超出原说 明书及权利要求书的记范围，但主动修改可 以扩大原权利要隶保护的繁器，因此B选项留 确。C选项、（细则》第57条第3股规定：“申请 人在收到国务院专利行政部门发出的审查意 见通知书后对专利申请文件进行修改的、应当 针对通知书指出的缺陷进行修改”，C选项目 确。D选项，针对答复审查意见通知书的修政 不能超范围外，也不能扩大权利要求的保护 范围、不能将仅在说明书中记前的与原来要求 保护的主题缺乏单一性的技术方容作为修改 后权利要求的主题、不能增加在原权利要求我 中未出现过前的权利要求、因此D选项错误。 (2016) 21，ABCD。《甲蛋指丽》第二部分第八章 第5.2.1.3节规定：“当出现下列情况时，即凭修 改的内容没有超出原说明书和权刑要求书记 载的范围，也不能被视为是针对通知书指出跨 缺陷进行的修改，因面不予接觉。（1）主动到 独立权利要求中的技术特径，扩大了试权利要 哀诵求保护的范围。(2)主动改变独立权鹅要 家中的技术持征，导致扩大了请求保护的施 图。（3）主动将仅在说明书中记载的与原来要 求保护的主避乏单一性的技术内容作为修 改后权利要求的主题。….….（5)主动增加的 从图权利要求，该从勇权利要求限定的技术方 案在原权利要求书中未出现过”，A、B、C、D选 项均当选。（2012） 22。AC。A、C选项，本题中，由于化合物 M已被现有技术公开，导致权利要求2-4之间 不具有单一性，因此删掉其他权利要求，仅保 留一个权利要求中的一项技术方案的修改方 式，可以克服不具有单一性的缺陷，A、C选项 正确。B、D选项，删除权利要求1和2，保留权 利要求2和4，或是将权利要求2、3、4的技术 方案合并在一项权利要求中，所获得的技术方 案仍然不包含相同或者相应的特定技术特征， 不属于一个总的发明构思，依然存在不具有单 一性的缺陷，因此B、D选项错误。（2009)"},
  {id: 320, topic: "专题十五 实质审查程序", type: "multiple", question: "一件优先权日为2019年9月27日、申请日为2020年9月27日的PCT国际申请，进人中国国家阶段的日期为2021年9月27日，要求的保护类型为发明专利。申请人应当在哪个日期前向国家知识产权局提出实质审查请求？", options: {"A": "2022年9月27日", "B": "2023年9月27日", "C": "2024年9月27日", "D": "2021年11月27日"}, answer: "ABD", explanation: "根据《审查指南》第二部分第 八章第6.2.2节的规定，修改摘要中明显的错 误、修改明显不适当的发明名称、修改错别字 均属于审查员可以依职权修改的内容，因此 A、B、D选项正确。C选项的修改会引起保护 范围变化，因此不属于审查员可以依职权修改 的内容。（2014)"},
  {id: 321, topic: "专题十五 实质审查程序", type: "single", question: "一件发明专利申请，申请日是2021年3月3日，优先权日是2020年4月5日，申请人欲提交实质审查请求，以下说法正确的是？", options: {"A": "申请人应当最晚于2023年4月5日前提出实质审查请求", "B": "申请人应当最晚于2024年3月3日前提出实质审查请求", "C": "申请人应当提交优先权日前与其发明有关的参考资料", "D": "2023年4月5日前未缴纳实质审查费的，发明专利申请将视为撤回"}, answer: "D", explanation: "A选项，增加的技术特征“该汽车 具有轮胎”在原说明书和权利要求书中有记 载，因此A选项修改没有超范围。B选项， “5.0cm-55cm”数值范围的两个端值在原说明 书和权利要求书中有记载，且修改后的数值范 围在原数值范围之内，因此B选项修改没有超 范围。C选项，将上位概念“弹性材料”修改为 下位概念“橡胶”，橡胶”在原说明书和权利要 求书中有记载，因此C选项修改没有超范围。 D选项，“尾气净化装置”在原说明书和权利要 求书中没有记载，因此D选项修改超范围。 (2012)"},
  {id: 322, topic: "专题十五 实质审查程序", type: "multiple", question: "有关发明专利申请实质审查程序，下列说法正确的是？", options: {"A": "实质审查程序所遵循的原则有程序节约原则、公平原则、听证原则、请求原则", "B": "提出实审请求应当同时缴纳实质审查请求费", "C": "实质审查过程中对审查意见的答复应当提交至实审部门", "D": "在实质审查程序中可以采用会唔、电话讨论和现场调查等辅助手段"}, answer: "ABD", explanation: "A选项，原申请说明书或权利 要求书中未记载“弹性部件”，A选项导致修改 超范围，因此属于不允许的修改。B选项，原 申请说明书或权利要求书中未记载“大于 200℃”，B选项导致修改超范围，因此属于不 允许的修改。C选项，将说明节中的技术特征 补充到权利要求中，是对权利要求的进一步限 定，不会导致修改匈范围也不会扩大保护范 图、因此C选项的修改允许。D选项，将不同 实施例的内容进行组合得到没有记载在原申 请文件的新技术方案，属于新的技术方案，导 致修改超范围，因D选项属于不允详婚修 改。（2018）"},
  {id: 323, topic: "专题十五 实质审查程序", type: "multiple", question: "发明专利申请实质审查程序中有关审查文本的规定，下列说法正确的是？", options: {"A": "审查员首次审查所针对的文本可以是申请人提交的原始申请文件", "B": "审查员首次审查所针对的文本可以是申请人应专利局初步审查部门要求补正后的文件", "C": "以援引在先申请文件的方式补交的说明书的内容，是原始申请文件的一部分", "D": "以援引在先申请文件的方式补交的权利要求书，补交的内容未包含在在先申请文件副本和其中文译文之中，应当重新确定申请日"}, answer: "AC", explanation: "人选项，X=100~250的两个毒 点在原说明书中有记发，且落入X=30～250的 数值范围内，没有超当原始申请约范围，且与 对比文件中数值范围没有合、对比文件不键 坏权利要求的新额性，因此A选项的修改符合 规定，B选项，30≤X≤200的两个竭点在累说 明书中有记载、且落入X=30-250的数值范围 内，没有超出原始申请的范围；但对比文件中 X=30与30≤X<200的一个湾式重合、X=10~ 90与30<X<200部分重会，对比文序破坏权利 要求的额性，因B选项为修设不符合题 定。C选项、X=200一250的两个当点在原记 明书中有记我，且落入X=30一250的数值范围 内、没有超出原始申请的范围；对比文件中X= 10-90、X=30与X=200-250没有重合、对比 文件不破坏权利要求的面额性、因此C选项的 修改符合规定，D选项，X=95～250，其中端点 95在原说明书中没有记载，超出原身蕴 图、因此D选项的修改不符合规定。（2013）"},
  {id: 324, topic: "专题十五 实质审查程序", type: "multiple", question: "关于发明专利申请实质审查程序，以下说法错误的是：", options: {"A": "根据请求原则，只有申请人提出实质审查请求才能启动实质审查程序", "B": "一件发明专利申请涉及一种赌博机，无论申请人如何修改也不可能获得授权，为节约程序，审查员可以直接驳回该发明专利申请", "C": "任何情况下，审查员都应当在第一次审查意见通知书中将不符合规定的所有问题通知申请人", "D": "审查员通过检索认为一件发明专利申请权利要求1-10均不具有新颖性，为节约程序，审查员可以在第一次审查意见通知书中仅指出权利要求1不具有新颖性"}, answer: "BCD", explanation: "A选项、20-40和60-&0的数 值题围落入原权科要求20-90的数值范围 内，且40、60、80在原说明书中有记载，因此修 改符合规定，A选项说法正确。B选项，30～60 的数值范围在原申语中没有记载、因此修改不 符合规定，B选项说法错。C选项，20~60 的数值范围在原申诵中有记裁，因此修改不 符合规定，C选项说法错误。D选项，30~90 的数值范围未落入原权利要求60～90的数值 范围内，在原申请中没有记载，因此修改不符 合规定，D选项说法错误。（2018）"},
  {id: 325, topic: "专题十五 实质审查程序", type: "multiple", question: "申请人王某向专利局提交的发明申请公布后，另一家企业提交了多篇与该专利申请相关的文献，并提出了该申请不应当被授予专利权的意见。以下说法正确的是：", options: {"A": "只有申请人王某或者利害关系人有权就该申请向国务院专利行政部门提出意见", "B": "审查员应当查对申请文档中是否有公众意见并在审查过程中予以考虑", "C": "如果该企业提交的相关文献和意见是在审查员发出授予专利权的通知之后收到的，可以不必考虑", "D": "专利局应当将该意见的处理情况通知该企业"}, answer: "AD", explanation: "A选项，扩大保护范围属于主动 修改的方式之一，但是任何修改都不能超范 围，A选项符合规定。B、C选项，根据《审查指 南》第二部分第八章第5.2.3.1节（6)的规定，在 说明书中补入实验数据以说明发明的有益效 果和/或补入实施方式和实施例以说明在权利 要求请求保护的范围内发明能够实施，属于不 能允许的增加内容的修改，因此B、C选项不符 合规定。D选项，根据《审查指南》第二部分第 八章第5.2.2.2节的规定，申请文件中有附图， 但缺少附图说明的，允许补充所缺的附图说 明，因此D选项符合规定。（新编）"},
  {id: 326, topic: "专题十五 实质审查程序", type: "multiple", question: "下列关于发明专利申请实质审查程序的说法正确的是：", options: {"A": "每一件发明专利申请在被授予专利权之前都应当进行检索", "B": "申请人逾期不请求实质审查的，该申请被视为撤回", "C": "国家知识产权局认为必要时，可以自行对发明专利申请进行实质审查", "D": "申请人收到审查意见通知书后应当在两个月内及时进行答复"}, answer: "CD", explanation: "A选项，增加的内容是通过测量 附图得出的尺寸参数技术特征，修改超出原始 申请文件记载的范围，因此不符合规定。B选 项，根据《审查指南》第二部分第八章第5.2.1.1 节的规定，申请人向专利局提交的申请文件的 外文文本和优先权文件的内容，不能作为判断 申请文件的修改是否符合专利法第33条规定 的依据，B选项不符合规定。C、D选项，根据 《审查指南》第二部分第八章第5.2.2.2节的规 定，对说明书及其摘要的允许的修改包括：删 除附图中不必要的词语和注释，可将其补入说 明书文字部分之中；在文字说明清楚的情况 下，为使局部结构清楚起见，允许增加局部放 大图，C、D选项符合规定。（2012)"},
  {id: 327, topic: "专题十五 实质审查程序", type: "multiple", question: "关于检索报告中文件类型，以下说法正确的有：", options: {"A": "X类文件只能用于单独影响权利要求的新颖性", "B": "Y类文件可以单独影响权利要求的创造性", "C": "X类文件可以单独影响权利要求的创造性", "D": "Y类文件只能与检索报告中其他Y类文件组合后影响权利要求的创造性"}, answer: "ABC", explanation: "A、B选项，补入不能直接从原 始申请中导出的有益效果、未记载的实验数据 会导致修改超范围，因此A、B选项的修改是不 允许的。C选项，摘要中记载的内容不属于发 明或者实用新型原始记载的内容，不能作为修 改说明书或权利要求书的根据，因此C选项的 修改会导致超范围，是不允许的。D选项，增 补背景技术的附图，或者将原附图中的公知技 术附图更换为最接近现有技术的附图，是允许 的。（2017)"},
  {id: 328, topic: "专题十五 实质审查程序", type: "multiple", question: "在检索报告中，关于下列符号的说法正确的是：", options: {"A": "符号X、Y和A表示对比文件与申请的权利要求在内容上的相关程度", "B": "符号P属于在未核实优先权的情况下所做的标记，其后不附带符号X、Y、E或A", "C": "符号E表示单独影响权利要求新颖性的抵触申请-120 -文件", "D": "符号R表示任何单位或个人在申请日向专利局提交的、属于同样的发明创造的专利或专利申请文件"}, answer: "ACD", explanation: "，A选项，补入实施方式或实施 例会早致修改超范围、因此是不允许的，A选 项正确。B选项，已记发的反映发明的有益效 果数据的标准测量方法不会导致悠改超范围， 因此是允许的修改、B选项错误。C选项，增加 局部放大图不会导致修改超范圈，因此是允许 的修改，C选项正确。D选项的修改不会导致 修改超范围，因此是允许的。D选项三确。 (2019)"},
  {id: 329, topic: "专题十五 实质审查程序", type: "single", question: "在检索报告中，关于下列符号的说法正确的是：", options: {"A": "符号X可以和与检索报告中其他X类文件组合后影响权利要求的创造性", "B": "符号A可以表示背景技术文件,其公开日可以晚于权利要求的申请日", "C": "符号T可以表示申请日或优先权日当天或之后公布的，可以对所要求保护发明的论或原理提供清楚解释的文件", "D": "符号L可以表示质疑优先权要求的文件"}, answer: "C", explanation: "A选项，到除“所述资嘴由金属材 料制成”技术特征，将导致扩大权利要求的保 护范图，因此这种修改是不允许的。B选项， 说明书中并没有记载“喷熠由金属合金朝成”， 修改超出原始申请文伟记载的范围，因此这种 修改是不允许的，C选项，“资留出不锈钢制 成”技术特征在说明书中有记载、修改未超出 原权利要求书和说明书记载的范国，同时克服 了得不到说明书的支持的缺路，因此这种修改 是允许的，C选项正确。D选项，根据《审查 南》第二部分第八章第5.2.1.3节的规定，增加 新的独立权利要求，该独立权利要求愚定的技 术方案在原权利要求书中未出现过、即健修改 的内容没有超出原说明书和权刺要求书记载 的范图，这种修改也是不元许的。（2008）"},
  {id: 330, topic: "专题十五 实质审查程序", type: "single", question: "关于审查意见通知书及答复，以下说法正确的有：", options: {"A": "为了使申请人尽快做出修改，必要时审查员可以提出修改建议", "B": "为加快审查程序，审查员第一次审查意见通知书中都应当写明对申请的实质方面和形式方面的全部意见", "C": "在审查文本不符合《专利法》第33条规定的情况下，审查员也可以针对其他文本提出审查意见,供申请人参考", "D": "申请人认可审查员的观点，也可以在答复审查意见陈述书中仅表达同意审查员的意见"}, answer: "B", explanation: "本题考查允许的主动终致。A选 项，将说明书中技术领域的“涉及一种前物词 有记载，没有超出范图，因此式选项的修改是 允许的。B选项，根据《审疫指南》第二部分第 八章第5.2.3.1节的规定，增加的内容是通过测 量附图得出的尺寸参数技术特征，超出了原始 申谢记载的范图，国进B选项的修改是不允许 的。C选项，修改附图中的标记使之与说明书 文字部分相一致，未超出原始申请记载的范 围，因此C选项的修改是允许的。D选项，说 明书附图是说明书的组成部分之一，删除附图 中不必要的词语和注释，将其补入说明书文字 部分之中，没有超出原始申请记载的范围，因 此D选项的修改是允许的。（2008） 34、BCD。A选项，原申请文件中没有记 载关于激光打印机的内容，修改超出了原始记 载的范围，修改不符合规定。B选项，申请人 删除了打气筒的权利要求，没有超出原始记载 的范围，修改符合规定。C选项，修改后的温 度范围在原说明书公开的温度范围之内，符合 修改规定，且具有新颖性。D选项，原始独立 权利要求中的表述为“50℃以上”，申请人修改 为“大于50℃”，与原说明书记载内容相一致， 修改符合规定。（新编）"},
  {id: 331, topic: "专题十五 实质审查程序", type: "multiple", question: "下列关于申请人对审查意见通知书答复的哪种说法是正确的？", options: {"A": "申请人为单位，且未委托专利代理机构的，其答复应当加盖公章并应当有发明人的签字或者盖章", "B": "申请人为单位，但委托了专利代理机构的，其答复应当由其所委托的专利代理机构盖章，并由委托书中指定的专利代理师签字或者盖章", "C": "申请人为个人，且未委托专利代理机构的，其答复只需要由联系人签字或者盖章", "D": "申请人为个人，但委托了专利代理机构的，其答复只需要委托书中指定的专利代理师签字或者盖章"}, answer: "BD", explanation: "A选项，《审查指南》第二部分第 十章第3.5.1节规定：“判断说明书是否充分公 开，以原说明书和权利要求书记载的内容为 准。对于申请日之后申请人为满足专利法第 22条第3款、第26条第3款等要求补交的实验 数据，审查员应当予以审查。补交实验数据所 证明的技术效果应当是所属技术领域的技术 人员能够从专利申请公开的内容中得到的”， 因此A、C选项错误，B、D选项正确。（2017)"},
  {id: 332, topic: "专题十五 实质审查程序", type: "multiple", question: "赵某和李某以电子形式自行提交了一件发明专利申请，赵某是该申请的代表人。2024年6月16日赵某通过电子系统下载了发文日为2024年6月11日的第一次审查意见通知书。下列说法哪些是正确的？", options: {"A": "赵某和李某应当在2024年10月11日前答复该审查意见通知书", "B": "对审查意见通知书的答复可以仅由赵某签字", "C": "对审查意见通知书的答复可以仅仅是意见陈述书", "D": "对审查意见通知书的答复可以直接提交给审查员"}, answer: "AD", explanation: "A选项，将外层的聚乙烯修改为 “聚乙烯或聚丙烯”，增加的聚丙烯在原说明书 中有描述，因此，该修改未超出原说明书和权 利要求书记载的范围，A选项正确。B选项，将 外层的聚乙烯删除，改变产品结构，该修改超 出原说明书和权利要求书记载的范围，B选项 错误。C选项，将外层的聚乙烯修改为“塑 料”，而从原始申请文件中并不能直接地、毫无 疑义地确定修改后的技术方案，因而该修改超 出了原说明书和权利要求记载的范围，C选项 错误。D选项，将外层的聚乙烯或聚丙烯修改 为“聚乙烯”，该修改未超出原说明书和权利要 求书记载的范围，D选项正确。（新编）"},
  {id: 333, topic: "专题十五 实质审查程序", type: "multiple", question: "下列关于申请人答复审查意见通知书的说法哪些是正确的？", options: {"A": "申请人可以仅仅陈述意见，也可以修改申请文件", "B": "申请人可以在答复期限届满后提出延长答复期限的请求", "C": "申请人直接提交给审查员的答复文件不具备法律效力", "D": "发明专利申请答复第一次审查意见通知书的期限是四个月"}, answer: "ABCD", explanation: "《细则》第59条规定：“依照专 利法第38条的规定，发明专利申请经实质审 查应当予以敦回的情形是指：……（二）申请不 符合专利法第2条第2款、第19条第1款、第 22条、第26条第3款、第4款【A选项】、第5款 【D选项】、第31条第1款或者本细则第11条 【C选项】、第23条第2款规定的；（三）申请的 修改不符合专利法第33条规定，或者分案的 申请不符合本细则第49条第1款【B选项】的 规定的”，因此A、B、C、D选项均正确。（2012）"},
  {id: 334, topic: "专题十五 实质审查程序", type: "multiple", question: "关于实质审查程序，以下说法正确的有：", options: {"A": "审查员发出在第一次审查意见通知书中指出，权利要求1-3相对于检索的文件均不具有新颖性或创造性，申请人在答复审查意见陈述书中详细论述了权利要求与对比文件存在的区别，审查员如果认可申请人的观点，仍可以在后续的审查中进行补充检索", "B": "在实审程序中，只有审查员发出第一次审查意见通知书之后，申请人才能提出与审查员进行会的要求", "C": "在实审程序中,审查员与申请人只能就申请文件中的形式问题进行电话讨论", "D": "在实审程序中，申请人与审查员会唔后，审查员应当填写会唔记录；会唔记录中应当记载讨论同意修改的内容，会唔记录可以代替申请人的修改"}, answer: "ABC", explanation: "A选项为《专利法》第5条第2 款规定的不能授予专利权的情形。B选项，同 日双申情形下，申请人如果不放弃实用新型专 利权，发明专利不能获得授权。C选项违反 《专利法》第19条第1款规定，该法条属于驳回 条款。D选项，对于职务发明的发明人私自将 其作出的发明以自己名义申请专利的情形，可 以通过诉讼、仲裁或调解的方式解决，但并不 会影响申请的授权。（2010)"},
  {id: 335, topic: "专题十五 实质审查程序", type: "multiple", question: "有关会唔，下列说法正确的是：", options: {"A": "实质审查过程中都可以进行会", "B": "审查员可以根据案情需要约请申请人会唔，申请人也可以要求会唔", "C": "除非另有声明或者委托了代理机构，共有专利申请的单位或者个人都应当参加会", "D": "申请人委托了专利代理机构的，会唔必须有代理师参加"}, answer: "CD", explanation: "根据《审查指南》第二部分第八 章第7.1节的规定，发明专利申请的实质审查 程序，因审查员作出驳回决定且决定生效，或 者发出授予专利权的通知书，或者因申请人主 动撒回申请，或者因申请被视为撤回而终止， 因此C、D选项正确。A选项属于审查程序中 止，不是终止。B选项提出复审请求也没有终 止。（新编）"},
  {id: 336, topic: "专题十五 实质审查程序", type: "single", question: "下列关于实质审查程序中的取证和现场调查的说法哪些是正确的？", options: {"A": "一般说来，在实质审查程序中审查员不必要求申请人提供证据", "B": "申请人提供的证据只能是书面文件而不能是实物模型", "C": "如果申请人不同意审查员的意见，则由申请人决定是否提供证据来支持其主张", "D": "审查员到现场调查的，调查所需的费用由申请人承担"}, answer: "B", explanation: "A选项，根据《审查指南》第五部 分第九章第4.2.1.1节的规定，专利年度从申 请日起算，与优先权日、授权日无关，因此A 选项错误。B选项，发明专利申请提出实质 审查请求的期限以专利申请的优先权日作 为起算日，B选项正确。C选项，根据《细则》 第112条的规定，申请人要求优先权的，应 当在缴纳申请费的同时缴纳优先权要求费， 该缴费起算日与优先权日无关，C选项错 误。D选项，根据《审查指南》第五部分第九 章第4.2.1节的规定，授予专利权当年的年 费应当在办理登记手续的同时缴纳，以后的 年费应当在上一年度期满前缴纳，缴费期限 届满日是申请日在该年的相应日，由于专利 年度与优先权日无关，因此缴纳专利年费的 期限也与优先权日无关，D选项错误。（2011)"},
  {id: 337, topic: "专题十五 实质审查程序", type: "single", question: "申请人于2024年3月1日提出了实质审查请求，国家知识产权局于2024年3月22日通过电子系统发出进人实质审查程序通知书，申请人在下列哪些日期主动提交修改文件符合相关规定？", options: {"A": "2024年3月12日", "B": "2024年6月15日", "C": "2024年3月1日", "D": "2024年7月6日"}, answer: "A", explanation: "A选项，发明专利申请有优先 权，应自优先权日起满18个月即行公布，A 选项说法错误。B选项，发明专利的申请人 应自申请日（有优先权，从优先权日）起3年 内提出实审请求，B选项说法正确。C选项， 专利权的期限均自申请日起计算，与优先权 日无关，C选项说法正确。D选项，现有技术 包括在申请日（有优先权的，指优先权日)以前 为公众所知的技术，D选项说法正确。（新编）"},
  {id: 338, topic: "专题十五 实质审查程序", type: "multiple", question: "下列哪些修改文本可以作为发明专利申请的审查文本？", options: {"A": "申请人按照规定以援引在先申请文件的方式补交权利要求书或说明书的内容后的文本", "B": "申请人在收到国家知识产权局发出的发明专利申请进人实质审查阶段通知书之日起三个月内提交的经主动修改，但内容超出了原申请文件记载的范围的文本", "C": "申请人提交的修改不符合实施细则第57条第1款的规定，但国家知识产权局审查员认为其消除了原申请文件存在的应当消除的缺陷，并且符合专利法第33条的规定", "D": "申请人在收到国家知识产权局发出的发明专利申请进人实质审查阶段通知书之日起三个月内多次对申请文件进行了主动修改，其最后一次提交的修改文本"}, answer: "BC", explanation: "A选项，发明专利申请应自优 先权日起满18个月即行公布，因此A选项 错误。B选项，专利权的期限均自申请日起 计算，B选项正确。C选项，专利年度从申请 日起算，C选项正确。D选项，实质审查请求 应当在自申请日（有优先权的，指优先权日） 起3年内提出，并在此期限内缴纳实质审查 费，因此D选项错误。（2017)"},
  {id: 339, topic: "专题十五 实质审查程序", type: "multiple", question: "关于申请人对发明专利申请的修改，以下说法哪些是正确的？", options: {"A": "在提出实质审查请求时，以及收到发明申请进入实质审查阶段通知书之日起三个月内，申请人可以对发明专利申请主动提出修改", "B": "主动修改时，可以扩大原权利要求请求保护的范围，但不能超出原说明书及权利要求书的记载范围", "C": "在答复审查意见通知书时对申请文件进行修改的，通常只能针对通知书指出的缺陷进行修改", "D": "答复审查意见通知书时对申请文件进行修改的，只要修改文本未超出原说明书及权利要求书的记载范围均应当被接受"}, answer: "CD", explanation: "《审查指南》第一部分第一章第 6.2.4条规定：“申请人要求优先权之后，可 以撤回优先权要求。优先权要求撤回 后，导致该专利申请的最早优先权日变更 时，自该优先权日起算的各种期限尚未届满 的，该期限应当自变更后的最早优先权日或 者申请日起算…·”。本题中，申请人撤回 2023年3月1日的优先权后，实际优先权日为 2023年6月1日，公布和实质审查期限按照实 际优先权日起算，C、D选项正确。（新编）"},
  {id: 340, topic: "专题十五 实质审查程序", type: "multiple", question: "在下列哪些情况下，申请人在答复审查意见通知书时所作的修改即使没有超出原说明书和权利要求书记载的范围，也不能被视为是针对通知书指出的缺陷进行的修改？", options: {"A": "主动删除独立权利要求中的技术特征，扩大了该权利-124 -要求请求保护的范围", "B": "主动改变独立权利要求中的技术特征，导致扩大了请求保护的范围", "C": "主动将仅在说明书中记载的与原要求保护的主题缺乏单一性的技术内容作为修改后的权利要求的主题", "D": "主动增加新的从属权利要求,该从属权利要求限定的技术方案在原权利要求书中未出现过"}, answer: "ABC", explanation: "A选项，保藏证明和存活证明 应在申请时或者最迟自申请日起4个月内 提交，因此周某应于2024年5月5日前出具 保藏证明和存活证明，A选项符合规定。B 选项，实审请求应自申请日（有优先权的，指 优先权日）起3年内提出、因此吴某应于 2024年11月24日前提出实质审查请求，B 选项符合规定。C选项，申请人应当自收到 通知之日起2个月内办理登记手续。国家 知识产权局于2024年3月2日郎等发出授 予专利权通知书，推定郑某于2024年3月 17日收到，郑某应于2024年5月17日前办 理登记手续，C选项符合规定。D选项，专科 申请人对国务院专利行政部门驳回申请的 决定不服的，可以自收到通知之日起3个月 内向国务院专利行政部门请求复审。国家 知识产权局于2024年2月5日通过指定的特 定电子系统发出驳回决定，推定送达日为 2024年2月5日、王某应于2024年5月5日前 提出复审请求，D选项不符合规定。（新编） 6、B。《审查指南》第五部分第七章第 2.3节规定：“期限届满日是法定休假日或者 移用周休息日的，以法定休假日或者移用周 休息日后的第一个工作日为期限届满日，该 第一个工作日为周休息日的，期限届满日顺 延至周一”。本题第二次审查意见通知书通 过电子形式发出，推定送达日为2024年3月 4日，期限届满日为2024年5月4日，由于5 月4日为周六，届满日顺延至下周一，即 2024年5月6日，因此B选项正确。（新编） 7、B。发明专利权期限为20年，自申 请日起算。本题中，专利权的期限自其申请 日2021年3月25日至2041年3月24日，专 利权期满终止日为2041年3月25日，因此B 选项正确。（新编）"},
  {id: 341, topic: "专题十五 实质审查程序", type: "single", question: "化合物M在制备用于治疗疾病Z的药物中的用途。”审查意见指出：化合物M已经被现有技术公开,权利要求2~4不具有单一性。下列哪些修改方式能够克服上述单一性缺陷？", options: {"A": "保留权利要求2，删除其余三项权利要求", "B": "删除权利要求1和权利要求3，保留权利要求2和4", "C": "保留权利要求4，删除其余三项权利要求", "D": "删除权利要求1,将权利要求2、3和4的技术方案合并在一项权利要求中"}, answer: "C", explanation: "实用新型专利权期限为10年， 自申请日起算。本题中，实用新型专利权的 期限为2023年6月18日至2033年6月17 日，期满终止日为2033年6月18日，遇节假 日不顺延，因此A、B、D选项错误，C选项正 确。（2019改编）"},
  {id: 342, topic: "专题十五 实质审查程序", type: "multiple", question: "在发出授予专利权的通知书前,允许审查员对准备授权的文本依职权作出下列哪些修改?", options: {"A": "修改摘要中明显的错误", "B": "修改明显不适当的发明名称", "C": "将权利要求中洗衣机的高度850m修改为本领域技术人员能够确定", "D": "根据说明书的内容，将权利要求中的“氯化纳”修改为“氯化钠”"}, answer: "CD", explanation: "关于《施行修改后专利法的相 关审查业务处理暂行办法》第11条规定： “申请日为2021年5月31日（含该日）之前 的外观设计专利权的保护期限为10年，自 申请日起算”。本题适用上述办法，外观设 计专利权的保护期为10年，保护期限为 2021年4月26日至2031年4月25日，专利 权期满终止日为2031年4月26日，因此C、 D选项正确。（新编）"},
  {id: 343, topic: "专题十五 实质审查程序", type: "multiple", question: "申请人在原始提交的说明书和权利要求书中仅记载了如下技术内容：一种汽车，该汽车的轮胎由弹性材料如橡胶制成，该轮胎的直径为50cm～60cm、优选为55cm。下列哪种修改超出了原说明书和权利要求书记载的范围？", options: {"A": "在说明书和权利要求书中增加“该汽车具有轮胎”这一技术特征", "B": "将权利要求书中轮胎直径的数值范围修改", "D": "在说明书中增加了对“尾气净化装置”的描述", "C": "在说明书和权利要求书中增加该轮胎的直径为55cm这一技术特征"}, answer: "BD", explanation: "分案申请获得授权的，其保护 期限自原申请的申请日起计算，A选项错误。 国际申请进入国家阶段获得授权的，其专利 权期限自国际申请日起计算，B选项正确。 专利权的期限均自申请日起计算，与优先权 日无关，C选项错误，D选项正确。（2017）"},
  {id: 344, topic: "专题十五 实质审查程序", type: "multiple", question: "以下哪些情况属于不允许的修改：", options: {"A": "原申请文件仅记载了弹簧，将其修改为原说明书或权利要求书中未记载的“弹性部件”", "B": "原申请文件仅记载了较高的温度，将其修改为原申请说明书或权利要求书中未记载的“大", "C": "将说明书中对某一技术特征的具体描述补充到权利要求对应的技术特征部分中", "D": "将不同实施例的内容进行组合得到没有记载在原申请文件的新技术方案"}, answer: "AB", explanation: "该外观设计专利申请日晚于 2021年6月1日，保护期为15年，因此A选 项正确。该外观设计专利授权公告日为 2022年10月23日，专利权自该日起生效， 因此B选项正确，C、D选项错误，（新编）"},
  {id: 345, topic: "专题十五 实质审查程序", type: "multiple", question: "某权利要求中记载了数值范围X=30~250，说明书中还记载了X=30，100,200,250的实施例。某对比文件中公开了数值范围X=10~90和X=30的实施例，该对比文件破坏了该权利要求的新颖性。申请人对该数值范围进行的下列哪些修改既满足了新颖性的要求，又未超出原始申请文件公开的范围？", options: {"A": "X=100~250", "B": "30≤X≤200", "C": "X=200~250", "D": "X=95~250"}, answer: "BC", explanation: "，《审查指南》第五部分第九章 2.3节规定：“经审查后认为专利权期限补偿 清求不符合期限补偿条件的，专利局应当给 予请求人至少一次陈述意见和/或补正文件 的机会【A选项】。经审查后认为专利 权期限补偿请求符合期限补偿条件的、专利 局应当作出给予期限补偿的决定、告知期限 补偿的天数【C选项】“根据国家知识产权局 公告，专利权人对国家知识产权局依照专利 法第42条第2款作出的关于是否给予专利 权期限补偿的决定不级的，可以海国家知识 严权局申请行政复汉[B选项]：（细别》第78 条规定：“同一申请人同日对同样的度明创 造申请实用新型专利又申请发用专利，依 照本细则第47条第4款的规定取得变明专 利权的，该发明专利权的期限不适用专利法 第42条第2款的规定“[D选项】，因此B、C 选项正确，A、D选项错误。（质，思维扩展）"},
  {id: 346, topic: "专题十五 实质审查程序", type: "multiple", question: "实审程序中，关于申请文件中数值范围的修改，以下说法错误的是：", options: {"A": "原权利要求中的数值范围是20～90，原说明书中还记载了特定数值40、60、80，可以允许申请人将其修改为20～40或者60~80的数值范围", "B": "原权利要求中的数值范围是40～90，原说明书中还记载了特定数值20、60、80，可以允许申请人将其修改为20～60或者80~90的数值范围", "C": "原文本中记载了数值为20和60的点值。允许申请人将其修改为20～60的数值范围", "D": "原权利要求中记载了60～90的数值范围，原说明书中还记载了特定数值30,可以允许申请人将其修改成为30~90这一数值范围"}, answer: "AC", explanation: "（审查指南》第五部分第九章第 2.1节规定：“专利权期限补尝请求应当由专 利权人提出【A选项】。专利权人请求给子 专利权期限补偿的，应当自专利授权公告之 日起3个月内向专利局提出请家，并且缴的 相应费用【B选项】、已委托专利代理机构 的，专利权期限补尝请求应当由专利代理机 构办理[C选项】。专利权属于多个专利权 人共有的，且未委托专利代理机纬的，专别 权期限补偿请求应当由代表人办理【D选 项】”。因此A、C选项正确。（新编） 14、CD《审查指南》第五分第九章第 2.2.1节规定：“以下情形引起的延迟属于授 权过程中的合理延巡：张原专利法实惩细则 第66条规定修改专利申请文件的复审程序 【A选项复甫程序中只有修改申请文许以及 基于复审请求人琼述的新理由或提交的新 证据缴捐驳回决定的才离于合理延迟】依 照专利法实施细则第103条规定的中止程 序【C选项】、依照专利法实施细则第104条 规定的保金措施、其他合理情形如行政诉讼 程序等【D选项】”，B选项属于申请人引起的 不合理延迟情形，因此C、D选项正确。 （新编）"},
  {id: 347, topic: "专题十五 实质审查程序", type: "multiple", question: "下列修改哪些符合相关规定？", options: {"A": "主动修改时，可以扩大原权利要求请求保护的范围。但不能超出原说明书及权利要求书的记载范围", "B": "在说明书中补充实验数据以说明发明的有益效果", "C": "在说明书中补人实施方式和实施例以说明在权利要求请求保护的范围内发明能够实施", "D": "申请文件中有附图但缺少附图说明，将所缺附图说明补人说明书中"}, answer: "ABCD", explanation: "《审查指南》第五部分第九 章第2.2.2节规定：“以下由申请人引起的不 合理延迟，延迟的天数为：(1)未在指定期限 内答复专利局发出的通知引起的延迟【A选 项】·…·…（3）援引加入引起的延迟【C选 项】·（4）请求恢复权利引起的延迟【B选 项】……（5）自优先权日起30个月内办理进 入中国国家阶段手续的国际申请，申请人未 要求提前处理引起的延迟【D选项】”，因此 A、B、C、D选项均正确。（新编）"},
  {id: 348, topic: "专题十五 实质审查程序", type: "single", question: "下列关于说明书附图的修改，哪些符合关于修改范围的规定？", options: {"A": "增加的内容是通过测量附图得出的尺寸参数技术特征", "B": "将记载于优先权文件中，但未记载在本申请中的附图追加至本申请中", "C": "将说明书附图中的文字注释删除，并补人到说明书文字部分中", "D": "在文字说明清楚的情况下，为使局部结构清楚起见，增加局部放大图"}, answer: "D", explanation: "《审查指南》第五部分第九章第 3.2节规定：“药品专利权期限补偿请求应当 由专利权人提出。专利权人与药品上市许 可持有人不一致的，应当征得药品上市许可 持有人书面同意”。本题中；甲为专利权人， 乙为药品上市许可持有人，因此药品专利权 期限补偿请求应当由甲提出，同时还应当征 得乙书面同意，因此D选项当选。（新编）"},
  {id: 349, topic: "专题十五 实质审查程序", type: "multiple", question: "申请人在提出实质审查请求时对申请文件作出的以下哪些修改是不被允许的：", options: {"A": "在说明书中补人所属技术领域的技术人员不能直接从原始申请中导出的有益效果", "B": "在说明书中补入原权利要求书和说明书未记载的实验数据以说明发明的有益效果", "C": "将仅在摘要中记载的技术方案补人到说明书中", "D": "将原附图中的公知技术附图更换为最接近现有技术的附图"}, answer: "ABCD", explanation: "《审查指南》第五部分第九 章第3.4节规定：“国务院药品监督管理部门 批准上市的创新药和符合规定的改良型新 药，对于其中药物活性物质的产品发明专 利、制备方法发明专利或者医药用途发明专 利，可以给予药品专利权期限补偿”因此A、 B选项正确。《审查指南》第五部分第九章第 3.3节规定：“提出药品专利权期限补偿请求 时，请求人还应当提交如下材料：（1)专利权 人与药品上市许可持有人不一致的，应当提 交药品上市许可持有人的书面同意书等材 料；(2)用于确定药品专利权期限补偿期间 专利保护范围的相关技术资料…··”，因此 C.D选项正确。（薪缩，思维扩展）"},
  {id: 350, topic: "专题十五 实质审查程序", type: "multiple", question: "下列关于发明专利申请说明书的修改，说法正确的是？", options: {"A": "申请人在进行修改时，不可以在申请文件中补入实施方式和实施例以说明在权利要求请求保护的范围内发明能够实施", "B": "申请人在进行修改时，不可以在申请文件中补人已记载的反映发明的有益效果数据的标准测量方法", "C": "申请人在进行修改时，在文字说明清楚的情况下，为使局部结构清楚可见，允许增加局部放大图", "D": "申请人在进行修改时，在不超出原说明书和权利要求书记载的范围的前提下，可以修改发明内容部分中与该发明所解决的技术问题有关的内容，使其与要求保护的主题相适应"}, answer: "CD", explanation: "，《盲查指南》第五部分第六意第 3.1节规定：“请求药品专利权期补偿应当 满足以下条件：（1)请录补偿的专科授权公 告日应当旱于药品上市许可申请获得我准 之日[A选项】……（4)请录补偿专利的权利 要录包括了获得上方许可的新药相关技术 方案[B选项]：（5)一个药品同时等在多项 专利的，专利权人只觉语及对其中一项专利 给子药品专利权期限补偿[C选项】：(6)一 项专利同时涉及多个药品的，只对一个药 吕就该专利提出药器专用权期限补偿请求 [D选项]\"因此，C、D选项正确，A、B选项措 误、（质编）"},
  {id: 351, topic: "专题十五 实质审查程序", type: "multiple", question: "一件发明专利申请的权利要求1包含“在反应容器底部中心设置喷嘴，所述喷嘴由金属材料制成”的特征，说明书中记载的对应技术内容为“在反应容器底部中心设置喷嘴，所述喷嘴由铜合金、铝合金或不锈钢制成”。在该申请进入实质审查阶段八个月后发出的第一次审查意见通知书中，审查员指出权利要求1中所记载的“所述喷嘴由金属材料制成”概括了一个较宽的保护范围，因而得不到说明书的支持。申请人为答复审查意见对申请文件进行的下列哪些修改是允许的？A：删除权利要求1中记载的“所述喷嘴由金属材料制成”这一技术特征", options: {"B": "将权利要求1修改为“在反应容器底部中心设置喷嘴，所述喷嘴由金属合金制成”", "C": "将权利要求1修改为“在反应容器底部中心设置喷嘴，所述喷嘴由不锈钢制成”", "D": "没有对权利要求1进行修改，将记载于原说明书中的另一技术方案补人权利要求书中作为与权利要求1并列的独立权利要求,同时在意见陈述书中陈述权利要求1可以得到说明书支持的由", "A": ""}, answer: "BC", explanation: "、官四次专利法夜时，新增 专利法第42条第2款，引入关子发明专利 限补偿制度，题干中给出了第回次专法生 效日为2021年6月1日、自当日及以后钧日 期可以提出专利权意限补要请求、因此A、 B、C选项正确，D选项，2020年12月1日处 于生效日期前，不适用专利权题限外偿制 复（新编）"},
  {id: 352, topic: "专题十五 实质审查程序", type: "multiple", question: "在收到进人实质审查阶段通知书后两周内，申请人提交的对申请文件所进行的下列修改哪个是不允许的？", options: {"A": "由于原权利要求1的主题名称为“一种猪饲料”，据此将说明书的发明所属技术领域由“涉及一种动物饲料”修改为“涉及一种猪饲料”", "B": "将未在原权利要求书和原说明书中明确记载，但由原说明书附图2测量得出的“反应容器的高度与直径的比例为3:1\"的技术内容补人说明书实施例中", "C": "将说明书附图中的反应器壁标记由“2\"修改为“5”，使之与原说明书文字部分使用的对应附图标记相一致", "D": "删除附图1中的文字注释,并将所删除的文字注释补和原说明书文字部分中没有记载"}, answer: "ABCD", explanation: "（审查指南》第五部分第七 重第5.2节规定：“回欢误限作出的处分决 定主要包括：视为整回专利申请权、强方政 弃取得专利权的权利、专利权络上、不予受 理、视为未提出求和根方未要求优光权 等”，因此A、B、C、D选项均正确。（20TS） 21，ABC。A选项，根据《细则》第II2 条第1最的规定，未竭纳申请费、公市印刷 费和必要的申请附加费时，其申请报为数 回，A选项正确。B选项，根据《专利法》第 35条第1款的规定，申请人无正当理由逾期 下请求实审查的，该申滑忽报视为搬回， B选项正确。C选项、飛（专利法》第37条 的规定，对审查感见通知书无正当理由逾期 不答复的，该身清即被视为回，C选项正 确。D选项，根据《细则》第60条的规定，期 满未办理登记手续的，视为放弃取得专利权 的权利，D选项错误。（2014)"},
  {id: 353, topic: "专题十五 实质审查程序", type: "single", question: "申请人在答复第一次审查意见通知书时所作的下列哪些修改是符合规定的？", options: {"A": "申请人在原始申请文件中仅记载了喷墨打印机，第一次审查意见通知书指出其权利要求缺乏创造性，于是申请人在答复时将权利要求书修改为要求保护一种激光打印机", "B": "原始权利要求书有两项独立权利要求,分别要求保护打气筒及其制造方法，在答复第一次审查意见通知书时，申请人为了克服原申请涉及打气筒的权利要求缺乏创造性的缺陷，将权利要求书修改为仅要求保护打气筒的制造方法", "C": "在原始说明书和权利要求书中，所记载的某温度范围为0℃～95℃，且说明书中公开了该温度范围内的特定值40℃、60℃和80℃。对比文件所公开的技术内容与该申请的区别仅在于温度范围的不同，对比文件中公开的温度为0℃～100℃。审查员在审查意见通知书中指出该申请的权利要求无新颖性，于是申请人将权利要求中该温度范围修改", "D": "在原说明书中记载的某温度为>50℃，原独立权利要求中相应特征表述为50℃以上，申请人在答复审查意见通知书时按审查员意见将其修改为大"}, answer: "B", explanation: "A选项，不丧失新颖性宽限期、 优先权期限、专利权期限和侵权诉讼时效这 四种期限被耽误而造成权利丧失的，不能请 求恢复，因此A选项错误。B选项，根据《细 则》第5条的规定，期限届满日是法定休假 日的，以休假日后的第一个工作日为期限届 满日，B选项正确（本题考查一般情况，不用 考虑专利权期限不延长的特殊情况）。C选 项，《细则》第75条规定：“在无效宣告请求 审查程序中，国务院专利行政部门指定的期 限不得延长”，因此C选项错误。D选项，根 据《细则》第116条第2款的规定，延长期限 请求费应当在相应期限届满之日前缴纳，因 此D选项错误。（2011)"},
  {id: 354, topic: "专题十五 实质审查程序", type: "multiple", question: "以下说法哪些是正确的？", options: {"A": "对于申请人在申请日之后补交的实验数据，因不是原说明书和权利要求书记载的内容，审查员不应予以考虑", "B": "判断说明书是否充分公开，应当以原说明书和权利要求书记载的内容为准", "C": "对于申请人在申请日之后补交的实验数据，只有在申请人证明了其是在申请日前完成的情况下，审查员才应予以考虑", "D": "申请人在申请日之后补交的实验数据所证明的技术效果应当是所属技术领域的技术人员能够从专利申请公开的内容中得到的"}, answer: "ACD", explanation: "A、B选项，根据《审查指南》 第五部分第七章第4.1节的规定，可以请求 延长的期限仅限于指定期限。但在无效宣 告程序中，国务院专利行政部门指定的期限 不得延长，因此A选项正确，B选项错误。C 选项，《细则》第6条第4款规定：“当事人请 求延长国务院专利行政部门指定的期限的， 应当在期限届满前，向国务院专利行政部门 提交延长期限请求书，说明理由并办理有关 手续”；《细则》第116条第2款规定：“延长期 限请求费应当在相应期限届满之日前缴纳； 期满未缴纳或者未缴足的，视为未提出请 求”，因此C选项正确。D选项，国家知识产 权局对请求人作出不予延长期限的审批属 于具体行政行为，请求人对不予延长期限的 审批通知书不服的，既可以向国家知识产权 局申请行政复议，也可以直接向人民法院提 起行政诉讼，因此D选项正确。（2012）"},
  {id: 355, topic: "专题十五 实质审查程序", type: "multiple", question: "一件有关多层层压板的发明专利申请，其说明书中描述了外层为聚乙烯或聚丙烯的层压板结构，独立权利要求限定的结构外层为聚乙烯。申请人在提出实质审查请求时对申请文件进行了修改。以下哪些修改是允许的？", options: {"A": "修改独立权利要求，将外层的聚乙烯修改为“聚乙烯或聚丙烯”", "B": "修改独立权利要求，将外层的聚乙烯层删除", "C": "修改独立权利要求，将外层的聚乙烯修改为“塑料”", "D": "修改说明书，将外层的聚乙烯或聚丙烯修改为“聚乙烯”"}, answer: "BD", explanation: "国家知识产权局于2024年2 月16日以邮寄的方式发出第二次审查意见 通知书、推定申请人于2024年3月2日收到 该通知书、答复期限届满日为2024年5月2 日，由于是节假日，届满日延长至2024年5月 6日（周一），申请人应当于2024年5月6日前 提交长期浸请京节并缴会，因此A选项错 误，B、D选项正确、C选项，根据《审查指亩》 第五部分第七章第4.2节的规定，延长的期限 不得超过2个月、因此C选项错误。（新编） 25ABD、根据《细则》第6条的规定， 当事人因正当理白延误期及导致美权利要 夫的，可以自收到国务院专利行政部门的通 知之日起2个月内向国务院专利行政部门 请求恢复权有.·一恢复权利痘提交恢复权 利请求书、办理权利费失前应当办理的相应 手续、激纳恢复权利请求费、因此A、B、D选 项正确。固家知识产权易于2024年7月1 日以电子的方式发出视为摄通知书，定 送达日为2024年7月1日，赵某最退应当在 2024年9月1日剪办理权利恢复手续，因此 C选项错误。（2012改编）"},
  {id: 356, topic: "专题十五 实质审查程序", type: "multiple", question: "下列哪些情形属于发明专利申请经审查应当予以驳回的情形？", options: {"A": "权利要求未以说明书为依据", "B": "分案申请超出原说明书和权利要求书记载的范围", "C": "专利申请弄虚作假的", "D": "专利申请是依赖遗传资源完成的发明创造，申请人在专利申请文件中没有说明该遗传资源的直接来源"}, answer: "BD", explanation: "、根据（细则》第6条第5数的规 定，不能请求使复的题限包括：不丧失霸颖 性的宽限期、优先权的题限、专相权的期限 和侵犯专利权的诉讼对效，因此A、C选项键 误，B、D选项正确。（2012改编）"},
  {id: 357, topic: "专题十五 实质审查程序", type: "multiple", question: "在满足其他授权条件的情况下，下列哪些申请仍不能被授予发明专利权？", options: {"A": "申请专利的发明是依赖遗传资源完成的，但该遗传资源的利用违反了行政法规", "B": "同一申请人同日对同样的发明创造既申请实用新型专利又申请发明专利，申请人不放弃其先获得的实用新型专利权的", "C": "未经保密审查，将在中国完成的发明在外国申请专利后，再到中国申请专利的", "D": "职务发明的发明人私自将其作出的发明以自己名义申请专利的"}, answer: "ABCD", explanation: "本题中，阅为未要求优先 汉通知书以部等的方式定出的文日为 2024年2月28日、推定送这日为2024年3 月14日，请求校复期限为2个月，应于2024 年5月14日前办理使复手续，A选项正确。 态理权科技复应当提变技复权利请求书并 说明理由，同时激的复权利请求费，B、C 选项正确。在请求恢复权利的同时，还应当 消除造成权利丧失的原因，同时提交在先申 请文传别本，D送项正确。（新编） 28，ABC。A普项，答复补正通知书的 期限就误可以请求获复权利。B选项，延误 提交证明文件的期限，并未耽误要求新颖性 宽限期的期限，因此可以请求恢复权利。C 选项，根据《审查指南》第一部分第一章第 6.2.6.1节的规定，分案申请的原申请要求了 优先权，可以请求恢复要求优先权的权利。 D选项，要求本国优先权的，其在先申请自 在后申请提出之日起即视为撤回，根据《审 查指南》第一部分第一章第6.2.4节的规定， 撤回优先权后，已被视为撤回的在先申请不 得因优先权要求的撤回而请求恢复。因此 A、B、C选项正确，D选项错误。（2017）"},
  {id: 358, topic: "专题十五 实质审查程序", type: "single", question: "下列哪些情形会导致实质审查程序终止：", options: {"A": "人民法院裁定对专利申请权采取财产保全措施", "B": "国家知识产权局作出驳回决定后，申请人提出复审请求", "C": "申请人未按期对审查意见通知书进行答复，申请被视为撤回", "D": "国家知识产权局发出授予专利权的通知书期限和费用"}, answer: "C", explanation: "《细则》第4条第5款规定：“文件 送交地址不清，无法邮寄的，可以通过公告 的方式送达当事人。自公告之日起满1个 月，该文件视为已经送达”。本题中，国家知 识产权局于2024年4月18日公告，推定送 达日为2024年5月18日，孙某最迟应当在 2024年7月18日办理恢复权利手续，因此C 选项正确。（2019)"},
  {id: 359, topic: "专题十六 期限和费用", type: "single", question: "在专利申请享有优先权的情况下，下列哪些期限是以专利申请的优先权日作为起算日？", options: {"A": "专利权的期限", "B": "发明专利申请提出实质审查请求的期限", "C": "缴纳优先权请求费的期限", "D": "缴纳专利年费的期限"}, answer: "C", explanation: "李某专利申请的申请日为2024 年5月3日，国家知识产权局于2024年6月 23日以邮寄的方式发出受理通知书，推定 送达日为2024年7月8日，李某可以在申请 日起2个月内，即2024年7月3日前，或者收 到受理通知书之日起15日内，即2024年7 月23日前缴纳申请费，因此最迟缴费日为 2024年7月23日，C选项正确。（新编）"},
  {id: 360, topic: "专题十六 期限和费用", type: "single", question: "一件享有外国优先权的发明专利申请，优先权日为2023年2月20日，申请日为2024年2月7日。下列说法哪个是错误的？", options: {"A": "该申请自2024年2月7日起满18个月即行公布", "B": "申请人提出实质审查请求的期限为自2023年2月20日起3年", "C": "如果该项专利申请被授予专利权，则其保护期限自2024年2月7日起算", "D": "2023年2月20日以前公开的相关技术属于该发明专利申请的现有技术"}, answer: "C", explanation: "A选项，延长期限请求费应当 在相应期限届满之日前缴纳，因此A选项错 误。B、C选项，《细则》第112条规定：“申请 人应当自申请日起2个月内或者在收到受 理通知书之日起15日内缴纳申请费、公布 印刷费和必要的申请附加费；申请人要求优 先权的，应当在缴纳申请费的同时缴纳优先 权要求费”，因此B选项错误，C选项正确。 D选项，《审查指南》第五部分第二章第1节 （5）规定：“复审费的缴纳期限是自申请人收 到专利局作出的驳回决定之日起3个月 内”，因此D选项错误。（2013）"},
  {id: 361, topic: "专题十六 期限和费用", type: "single", question: "以下哪些期限是以申请日起算的？", options: {"A": "发明专利申请的公布时间", "B": "专利权的期限", "C": "专利年度的计算", "D": "提交实质审查请求书的期限"}, answer: "C", explanation: "本题中，授权通知书于2024年 1月20日通过指定的特定电子系统发出，推 定送达日为2024年1月20日，申请人应于 2024年3月20日前办理登记手续并缴纳当 年的年费；该专利权期限第一年度为2019 年6月30日-2020年6月29日，第二年度为 2020年6月30日-2021年6月29日，第三年 度为2021年6月30日-2022年6月29日，第 四年度为2022年6月30日-2023年6月29 日，第五年度为2023年6月30日-2024年6 月29日，因此申请人办理登记手续时处于 专利权的第五年度中，应缴纳第五年度的年 费，C选项正确。（2016改编）"},
  {id: 362, topic: "专题十六 期限和费用", type: "multiple", question: "申请人甲于2024年3月1日向国家知识产权局提出一件发明专利申请，并要求两项外国优先权，优先权日分别为2023年3月1日和2023年6月1日。2024年4月1日其请求撤回优先权日为2023年3月1日的优先权。下列期限计算正确的是？", options: {"A": "该申请经初步审查符合要求的，自2023年3月1日起满18个月即行公布", "B": "该申请人提出实质审查请求的期限届满日为2026年3月1日", "C": "该申请经初步审查符合要求的，自2023年6月1日起满18个月即行公布", "D": "该申请人提出实质审查请求的期限届满日为2026年6月1日"}, answer: "CD", explanation: "《审查指南》第五部分第二章第 2节规定：“费用通过邮局或者银行汇付的， 应当在汇单上写明正确的申请号（或者专利 号)以及缴纳的费用名称，且不得设置取款 密码。不符合上述规定的，视为未办理缴费 手续”，因此C、D选项正确。（2007）"},
  {id: 363, topic: "专题十六 期限和费用", type: "single", question: "申请人办理下列相关手续的哪些行为符合相关规定？", options: {"A": "周某的一件涉及生物材料的发明专利申请的申请日为2024年1月5日，周某于2024年4月9日向国家知识产权局提交保藏单位出具的保藏证明和存活证明", "B": "吴某的一件发明专利申请的申请日为2021年11月24日，吴某于2024年5月9日向国家知识产权局提出实质审查请求", "C": "国家知识产权局于2024年3月2日向申请人郑某邮寄发出了授予专利权通知书，郑某于2024年5月9日到国家知识产权局办理登记手续", "D": "国家知识产权局于2024年2月5日向申请人王某通过指定的特定电子系统发出了驳回决定，王某2月12日在系统中看到了该决定，并于2024年5月9日提出复审请求"}, answer: "A", explanation: "《审查指南》第五部分第二章第 3.1节规定：“可以减缴的费用种类：（1)申请 费（不包括公布印刷费、申请附加费）；(2)发明 专利申请实质审查费；(3)复审费；(4)年费”， 因此A选项正确，B、C、D选项错误。（2009)"},
  {id: 364, topic: "专题十六 期限和费用", type: "multiple", question: "国家知识产权局通过电子形式向王某发出了发文日为2024年3月4日的发明专利申请的第二次审查意见通知书，王某2024年3月8日在系统上查收到了该通知书。已知2024年5月1日至3日（周五)放假,4日、5日上班,第二次审查意见通知书的答复期限为两个月。王某在未提出延期请求的情况下应当在下列哪个日期之前答复第二次审查意见通知书？", options: {"A": "2024年5月4日", "B": "2024年5月6日", "C": "2024年5月8日", "D": "2024年5月19日"}, answer: "ACD", explanation: "《审查指南》第五部分第二章 第4.2.1.1条规定：“（3)因缴费不足、逾期 缴费导致权利丧失的，或者权利丧失后激纳 专利费用的，当事人可以提出退款请求【A 选项】；(4)在专利局作出发明专利申请进入 实质审查阶段通知书之前，专利申请已被视 为撤回、分案申请已被视为未提出或者撤回 专利申请的声明已被批准，当事人可以对已 缴纳的实质审查费提出退款请求【D选项】； (5)当事人对于进入实质审查阶段的发明专 利申请，在第一次审查意见通知书答复期限 届满前主动申请撤回的，可以请求退还50% 的发明专利申请实质审查费，已提交答复意 见的除外。【B、C选项】”。因此A、C、D选项 正确，B选项错误。（新编）"},
  {id: 365, topic: "专题十六 期限和费用", type: "multiple", question: "某发明专利申请的申请日为2021年3月25日，优先权日为2020年3月26日。国家知识产权局于2023年11月23日发出授权通知书，2024年2月27日公告授予专利权。该专利权的期满终止日为何日？", options: {"A": "2040年3月26日", "B": "2041年3月25日", "C": "2043年11月23日", "D": "2044年2月27日"}, answer: "ABCD", explanation: "A、B选项，专利申请时（即 自申请日起2个月内，或者自收到受理通知 书之日起15日内）需缴纳申请费、公布印刷 费及申请附加费，若要求优先权，还需要在 上述期限内缴纳优先权要求费，因此A、B选 项正确。C、D选项，《审查指南》第五部分第 二章第1节规定：“申请附加费是指申请文 件的说明书（包括附图、序列表）页数超过 30页或者权利要求超过10项时需要缴纳的 费用，该项费用的数额以页数或者项数计 算。对于符合规定格式提交的计算机可读 形式序列表，不计算页数。”，因此CD选项 正确。（新编）"},
  {id: 366, topic: "专题十六 期限和费用", type: "multiple", question: "一件实用新型专利的申请日为2023年6月18日，授权公告日为2024年7月23日，关于专利权期限，下列说法正确的是？", options: {"A": "该专利的期限为2023年6月18日至2043年6月17日", "B": "该专利的期限为2023年6月19日至2033年6月18日", "C": "该专利期满终止日为2033年6月18日（周六）", "D": "该专利期满终止日为2033年6月20日（周一）"}, answer: "AD", explanation: "A选项，《专利法》第32条规 定：“申请人可以在被授子专利权之前随时 微回其专利申请”、A选项正确。B选项。根 据（审查指南》第一部分第一章第6.6节的规 定，委托专利代理机构的、撤回专利申请的 手续应当由专利代理机构办理，B选项错 误。C选项，撤回专利申请无需缴纳费用，C 选项错误。D选项，《细则》第41条第2款规 定：“撤回专利申请的声明在国务院专利行 政部门作好公布专利申请文件的印刷准备 工作后提出的，申请文件仍子公布..”，D 选项正确。（2013）"},
  {id: 367, topic: "专题十六 期限和费用", type: "multiple", question: "孙某于2021年4月26日向国家知识产权局提交一件外观设计专利申请，授权公告日为2021年10月23日。下列关于该外观设计专利权说法正确的有：", options: {"A": "该外观设计专利权的期限是2021年4月26日至2036年4月25日", "B": "该外观设计专利权期满终止日是2036年4月26日", "C": "该外观设计的专利权期限是2021年4月26日至2031年4月25日", "D": "该外观设计专利权期满终止日是2031年4月26日"}, answer: "BCD", explanation: "A、B、C选项、根据《审查指 南>第一部分第一章第6.6节的规定、撤回专 利申请的生效日为手续合格通知书的发文 日。撤回专利申请的声明是在专利申请作 好公布准备后提出的，申请文件照常公布或 者公告，但审查程序终止，因此A选项错误、 B、C选项正确。D选项，《细则》第41条第2 款规定：“缴回专利申请的声明在国务院专 利行政部门作好公布专利申请文件的印刷 准备工作后提出的，申请文件衍予公布；但 是，撤回专利申请的声明应当在以后出版的 专利公报上予以公告”，因此D选项正确。 (2010) 3、BCD。《审查指南》第一部分第一章 第6.6节规定；“撤回专利申请的生效日为手 续合格通知书的发文日【A、B选项】……申 请人无正当理由不得要求撤销撤回专利申 请的声明；但在申请权非真正拥有人恶意撤 回专利申请后，申请权真正拥有人（应当提 交生效的法律文书来证明)可要求撤销撤回 专利申请的声明【D选项】。撤回专利申请 的声明是在专利申请作好公布准备后提出 的，申请文件照常公布或者公告，但审查程 序终止【C选项】”，因此A选项说法正确，B、 C、D选项说法错误。（2018）"},
  {id: 368, topic: "专题十六 期限和费用", type: "single", question: "下列关于专利权的期限计算的哪些说法是正确的？", options: {"A": "分案申请获得专利权后，其专利权保护期限自分案申请递交日起算", "B": "国际申请进人中国国家阶段获得授权后，其专利权保护期限自国际申请日起算", "C": "享有外国优先权的专利申请获得授权后，其专利权保护期限自优先权日起算", "D": "享有本国优先权的专利申请获得授权后，其专利权保护期限自提出申请之日起算"}, answer: "C", explanation: "根据《专利法》第39条的规定， 发明专利权自公告之日起生效，本题中，发 明公告日为2023年8月17日，因此C选项 正确。（2017改编）"},
  {id: 369, topic: "专题十六 期限和费用", type: "multiple", question: "李某向国家知识产权局提交一件外观设计专利申请，该专利申请的申请日为2022年5月2日，授权公告日为2022年10月23日，李某收到专利证书的日期为2022年11月8日。下列关于该外观设计专利权说法正确的有：", options: {"A": "该外观设计专利权的期限是2022年5月2日至2037年5月1日", "B": "该外观设计的专利权自2022年10月23日起生效", "C": "该外观设计的专利权自2022年5月2日起生效", "D": "该外观设计的专利权自2022年11月8日起生效"}, answer: "AD", explanation: "A、C选项，《专利法》第42条第 1款规定：“发明专利权的期限为20年，实用 新型专利权的期限为10年，外观设计专利 权的期限为15年，均自申请日起计算”。本 题中，刘某的外观设计专利申请日为2023 年6月2日，因此专利权保护期限为15年， 自申请日起算，A选项正确，C选项错误。 B、D选项，根据《专利法》第40条的规定，实 用新型专利权和外观设计专利权自公告之 日起生效。本题中，授权公告日为2023年9 月16日，因此B选项错误，D选项正确。 （新编）"},
  {id: 370, topic: "专题十六 期限和费用", type: "single", question: "下列关于专利权期限补偿哪些说法是正确的？", options: {"A": "经审查后认为专利权期限补偿请求不符合期限补偿条件的，应当直接作出不予期限补偿的决定", "B": "专利权人对国家知识产权局作出不给予专利权期限补偿的决定不服的，可以向国家知识产权局申请行政复议", "C": "经审查后认为专利权期限补偿请求符合期限补偿条件的，专利局应当作出给予期限补偿的决定，告知期限补偿的天数", "D": "同一申请人同日对同样的发明创造既申请实用新型专利又申请发明专利的，放弃实用新型取得发明专利权，该发明专利可以适用专利权期限补偿制度"}, answer: "A", explanation: "A选项，《审查指南》第五部分第 九章第1.3.2节规定：“授予专利权时，专利 登记簿与专利证书上记载的内容是一致的， 在法律上具有同等效力；专利权授予之后， 专利的法律状态的变更仅在专利登记簿上 记载，由此导致专利登记簿与专利证书上记 载的内容不一致的，以专利登记簿上记载的 法律状态为准”，A选项正确，B、C选项错 误。根据《审查指南》第五部分第九章第 1.2.3节的规定，因专利权的转移、专利权人 更名发生专利权人姓名或者名称变更的，均 题十七审查过程中的其他程序事项 不予更换专利证书，因此D选项错误。（2018 改编）"},
  {id: 371, topic: "专题十六 期限和费用", type: "multiple", question: "下列关于专利权期限补偿哪个说法正确的？", options: {"A": "专利权期限补偿请求只能由专利权人提出", "B": "应当自办理专利授权登记手续之日起3个月内提出请求", "C": "已委托专利代理机构的,专利权期限补偿请求应当由专利代理机构办理", "D": "专利权属于多个专利权人共有的，且未委托专利代理机构的，专利权期限补偿请求应当由多个专利权人共同办理"}, answer: "CD", explanation: "根据国家知识产权局公告第 515号公告规定：“国家知识产权局自 2023年2月7日（含当日）起，全面推行专利 证书电子化。当事人以电子形式申请并获 得专利授权的，通过专利业务办理系统下载 电子专利证书…·”，因此A选项错误。根 据《审查指南》第五部分第九章第1.2.2节规 定：“专利权权属纠纷经地方知识产权管理 部门调解或者人民法院调解或者判决 后，…当事人可以在办理变更专利权人手 续合格后，请求专利局更换专利证书。C选 项】专利局发出的原纸质专利证书破损损坏 的，专利权人可以请求更换专利证书。专利 局可以重新制作电子专利证书发送给当事 人，更换后的证书应当与原专利证书的格 式、内容一致。【B选项】专利权终止后，专利 局不再更换专利证书【D选项】”，因此B选 项错误，C、D选项正确。（新编）"},
  {id: 372, topic: "专题十六 期限和费用", type: "multiple", question: "下列属于专利权期限补偿授权过程中合理延迟的情形有？", options: {"A": "因复审程序引起的延迟", "B": "当事人申请延迟审查引起的延迟", "C": "因中止程序引起的延迟", "D": "因对不予受理不服向法院提起行政诉讼引起的延迟"}, answer: "ABCD", explanation: "本题A、B、C、D选项均为 《审查指南》第五部分第九章第1.3.1节规定 的专利登记薄登记的内容，因此A、B、C、D 选项均当选。（新编）"},
  {id: 373, topic: "专题十六 期限和费用", type: "single", question: "下列属于专利权期限补偿中申请人引起的延迟的情形？", options: {"A": "未在指定期限内答复专利局发出的通知", "B": "请求恢复权利", "C": "援引加人", "D": "自优先权日起30个月内办理进人中国国家阶段手续的国际申请，申请人未要求提前处理"}, answer: "B", explanation: "A选项、专利登记薄上记载的法 律状态更为准确，A选项说法正确。B选项、 专利权失效后仍可以谐求出具专利登记副 本，B选项说法错误。C选项，根据《审查指 南>第五部分第九章第1.3.3节的规定，请求 出具专利登记薄副本的，应当提交办理文件 副本请求书并缴纳相关费用，C选项说法正 确。D选项，《审查指南》第五部分第九章第 1.3.1节规定：“专利局授予专利权时应当建 立专利登记簿。专利登记簿登记的内容包 括：专利权的授予，专利申请权、专利权的转 移，专利实蔻许可合同的备案”，因 此D选项说法正确。（2018）"},
  {id: 374, topic: "专题十六 期限和费用", type: "single", question: "甲自行研发出一种化合物，对其申请发明专利并得到授权，乙基于该化合物专利成功研制成一种新药并获批上市，已知该药品专利满足获得期限补偿的其余条件，下列关于该药品专利权补偿期限说法正确的是？", options: {"A": "该期限补偿请求应由甲和乙共同提出", "B": "乙可以单独提出该期限补偿请求", "C": "甲可以单独提出该期限补偿请求", "D": "该期限补偿请求应由甲提出，但还需征得乙书面同意"}, answer: "C", explanation: "根据《审查指南》第五部分第九 章第4.3节的规定，委托专利代理机构的、放 弃专利权的手续应当由专利代理机构办理 【A选项】，并附具全体申请人签字或者盖章 的同意放弃专利权声明【B选项】。放弃专 利权声明经审查符合规定的，审查员应当发 出手续合格通知书，放弃专利权声明的生效 日为手续合格通知书的发文日，放弃的专利 权自该日起终止【D选项】。因此A、B、D选 项错误。C选项、《审查指南》第五部分第七 章第7.2节规定：“中止的范围是指：（3） 暂停办理撤回专利申请、放弃专利权、变更 申请人(或专利权人)的姓名或者名称、转移 专利申请权（或专利权）、专利权质押登记等 手续”，C选项正确。（2009年改编）"},
  {id: 375, topic: "专题十六 期限和费用", type: "single", question: "下列关于药品专利权期限补偿哪些说法正确的？A：对于国务院药品监督管理部门批准上市的创新药的医药用途发明专利，可以给予补偿", options: {"B": "对于符合规定的改良型新药的药物活性物质的产品发明专利，可以给予补偿", "C": "专利权人与药品上市许可持有人不一致的，应当提交药品上市许可持有人的书面同意书等材料", "D": "请求人应当提交用于确定药品专利权期限补偿期间专利保护范围的相关技术资料", "A": ""}, answer: "C", explanation: "《审查指南》第五部分第九章第 2.3节规定：“专利权人放弃专利权的， 委托专利代理机构的，放弃专利权的手续应 当由专利代理机构办理【C选项】…放弃 专利权只能放弃一件专利的全部，放弃部分 专利权的声明视为未提出【B选项】.放 弃专利权声明的生效日为手续合格通知书 的发文日，放弃的专利权自该日起终止[D 选项】”，A选项中，林某无需办理著录事项 变更手续，A、B、D选项错误，C选项正确。 （2015改编）"},
  {id: 376, topic: "专题十六 期限和费用", type: "multiple", question: "下列关于适用药品专利权期限补偿的条件说法正确有哪些？", options: {"A": "请求补偿的药品上市许可申请获得批准之日应当早于请求补偿的专利授权公告日", "B": "请求专利权期限补偿的专利只需要在说明书中包括获得上市许可的新药相关技术方案C：一个药品同时存在多项专利的，专利权人只能请求对其中一项专利给予药品专利权期限补偿", "D": "一项专利同时涉及多个药品的，只能对一个药品就该专利提出药品专利权期限补偿请求", "C": "一个药品同时存在多项专利的，专利权人只能请求对其中一项专利给予药品专利权期限补偿"}, answer: "ABCD", explanation: "A选项，《审查指南》第五 部分第九章第4.3节规定：“授予专利权后， 专利权人随时可以主动要求放弃专利权”， A选项正确。B选项，根据《审查指南》第五 部分第九章第1.1.3节和1.1.5节的规定，申 请人办理登记手续时，应当缴纳授权当年的 年费，否则应当发出视为放弃取得专利权通 知书，B选项正确。C选项，同日双申的发明 专利在满足其他条件的情形下若想获得专 引续仗，需票有仍选立云同箭型专科校，不 国意单的、貌回发明每科申资，C通项王 辅。D盛域，《乡司权商钾是记办法》第17条 授茂：“专利权质何期间，当质人未掘文权 人国致其设牟专科枝的谨明好携钩、国家 经识产权易不手办理专利权旋白李疆”，D 击颂磷、（2019政编） 13ACD、A选项、废年专司权属于玺 溯及有权利的手，因造波声想警等全 住专用权人签字习章首常：A选项说法错 区、B.C、D选，《审委德》部分第九 需第4.3节规定：“贸座专利技声明的生设下 为手质合器通知学的发文，款师的专利授 自续可起日土、专科投人见至当骚彭不得 晏家需误发县号创权的声明，当靠底专别 汉非真正拥有人用意要求放弃争销权后，专 科权真正拥有人（应当提供主的法读文节 来证明）可晏求微银政穿专利权声明”，日选 项说法豆确，C，D选项说法错误。（巍）"},
  {id: 377, topic: "专题十六 期限和费用", type: "multiple", question: "专利法第四次修改的生效日为2021年6月1日，专利法实施细则第三次生效的时间是2024年1月20日，以下哪些日期可以提出专利权期限补偿请求？A，2023年12月1日", options: {"B": "2024年2月1日", "C": "2021年7月1日", "D": "2020年12月1日", "A": ""}, answer: "BC", explanation: "，A、B、C选项属干终上的 形。D选项，宜音无效的专利权方自治郎 不存在，不属于终上，D选项错谈。（2012）"},
  {id: 378, topic: "专题十六 期限和费用", type: "single", question: "下列哪些是国家知识产权局因申请人或专利权人耽误期限而可能作出的处分决定？", options: {"A": "视为未提出请求", "B": "视为未要求优先权", "C": "视为放弃取得专利权的权利", "D": "专利权终止"}, answer: "C", explanation: "，A念项、因令射权霸照险璃导 致专利很终上的，不能应便复较利、A选 项错误。B选项，示特权傅止赌专剂是密 效的，而宣告无效的专利权规力自乘不 在，日选项错课。C、D选项，已慈上因专 利在历史上衍有敏力，因此可以请求专利投 评价报告、请求宜赤无额、因此C递项正确。 D选项逸。（2012员瘤）"},
  {id: 379, topic: "专题十六 期限和费用", type: "multiple", question: "申请人耽误下列哪些期限将导致专利申请被视为撤回？", options: {"A": "缴纳申请费的期限", "B": "提出实质审查请求的期限", "C": "答复第一次审查意见通知书的期限", "D": "办理授予专利权登记手续的期限"}, answer: "ABC", explanation: "A.适项，权氮纠属于请隶 中止的理由，A通项正确。吕选项，《细避》 103条第2数规定”.….请求中土盲美程序 欲，应至购国办跟专构行稳门提资清求 长，激明出，翔具繁理专利工作的部门 顶书人民法跃转避竭单漆考或者专羽号的 有关受理文件副本。国务院专利行政部门 认为当事人提出的中止理由明显不能成立 的，可以不中止有关程序”，因此B、C选项正 确。D选项，《细则》第103条第3款规定： “.自请求中止之日起1年内，有关专利 申请权或者专利权归属的纠纷未能结案，需 要继续中止有关程序的，请求人应当在该期 限内请求延长中止……..”，因此D选项错误。 （2013改编）"},
  {id: 380, topic: "专题十六 期限和费用", type: "multiple", question: "下列关于期限的说法哪些是正确的？", options: {"A": "因不可抗拒事由耽误法定期限的，都可以恢复", "B": "期限届满日是法定休假日的，以休假日后的第一个工作日为期限届满日", "C": "所有的指定期限都可以延长", "D": "申请人请求延长期限的，应当在提出请求的同时缴纳延长期限请求费"}, answer: "ABCD", explanation: "《审查指南》第7.3.1节规定： “具备下列情形之一的，可以不中止专利权 无效宣告程序：(1)根据已进行的审查工作 能够作出无效宣告审查决定的；(2)权属纠 纷当事人依据的理由明显不充分，也未提交 足以证明确有权属纠纷存在的证据的；(3) 有证据表明，中止专利权无效宣告程序将明 显损害当事人利益或者公共利益的；(4)有 证据表明，中止程序的请求明显具有不诚 信、不正当行为的”。因此A、B、C、D选项均 正确。（新编）"},
  {id: 381, topic: "专题十六 期限和费用", type: "multiple", question: "下列关于期限延长的说法哪些是正确的？", options: {"A": "可以延长的期限仅限于指定期限", "B": "无效宣告程序中指定的期限可以延长", "C": "当事人请求延长期限的，最迟应当在期限届满日提出请求并缴纳延长期限请求费", "D": "请求人对不予延长期限的审批通知书不服的，可以直接向人民法院起诉"}, answer: "AB", explanation: "A选项，属于《细则》第6条第 1款规定的请求恢复权利的理由，A选项正 确。B选项，《审查指南》第二部分第八章第 7.3节规定：“对于因专利申请权归属纠纷当 事人的请求而中止的实质审查程序，在专利 局收到发生法律效力的调解书或判决书后， 凡不涉及权利人变动的，应及时予以恢复”， B选项正确。C选项，期满未请求延长的，国 务院专利行政部门自行恢复有关程序，C选 项错误。D选项，根据《审查指南》第五部分 第七章第7节的规定，中止的范围包括暂停 专利权无效宣告程序，因此D选项错误。 （2011改编）"},
  {id: 382, topic: "专题十六 期限和费用", type: "multiple", question: "国家知识产权局于2024年2月16日针对某发明专利申请以邮寄的方式发出第二次审查意见通知书，要求申请人在收到该通知书之日起2个月内陈述意见，申请人于2024年2月20日收到该通知书。2024年5月1日至3日放假，4日（周六）、5日（周日）上班，若申请人请求延长该答复期限，下列说法哪些是正确的？", options: {"A": "申请人应当于2024年4月20日前提交延长期限请求书", "B": "申请人可以于2024年5月6日提交延长期限请求书", "C": "申请人可以请求将该答复期限延长3个月", "D": "申请人应当在2024年5月6日前缴纳延长期限请求费"}, answer: "BCD", explanation: "B选项，中止程序无需缴纳 费用，B选项说法错误。C选项，根据《审查 指南》第五部分第七章第7.4.1节的规定，有 题十七审查过程中的其他程序事项 关专利申请权（或专利权)权属纠纷在中止 期限1年内未能结案，需要继续中止程序 的，中止程序可以延长一次，延长的期限不 得超过6个月，C选项说法错误。A、D选项 涉及权利人变动的，在办理相应的著录项目 变更手续后才予以恢复、A选项正确，D选 项说法错误。（新编）"},
  {id: 383, topic: "专题十六 期限和费用", type: "multiple", question: "申请人赵某由于生病未能按时答复审查意见通知书.国家知识产权局于2024年7月1日以电子形式向赵某发出了视为撤回通知书。赵某欲恢复其申请,下列说法哪些是正确的？", options: {"A": "赵某应当提交恢复权利请求书", "B": "赵某应当缴纳恢复权利请求费", "C": "赵某最迟应当在2024年9月16日前办理权利恢复手续", "D": "赵某应当在提出恢复请求的同时作出答复"}, answer: "BC", explanation: "通知书公告送达日为2024年 6月5日，推定送达日为2024年7月5日，应 于2024年9月5日前办理登记手续、申请人 在规定期限内未办理登记手续的，视为放弃 取得专利权的权利，因此A选项错误，C选 项正确。B选项、根据《细则》第114条的规 定，申请人办理登记手续时，应当缴纳授子 专利权当年的年费，B选项正确。D选项，根 据《专利法》第40条的规定，实用新型专利 权自授权公告之日起生效，因此D选项错 误。（新编）"},
  {id: 384, topic: "专题十六 期限和费用", type: "multiple", question: "下列哪些期限被延误而导致权利丧失的,当事人不能依据《专利法实施细则》第六条的规定请求恢复权利？", options: {"A": "提出实质审查请求的期限", "B": "要求优先权的期限", "C": "答复审查意见通知书的期限", "D": "不丧失新颖性的宽限期"}, answer: "ABCD", explanation: "（专利优先审查管理办法） 第3条规定：“有下列情形之一的、可以请求 优先审查：（一）涉及节能环保、新一代信息 技术、生物、高端装备制造、新能源、新材料、 新能源汽车、智能制造等国家重点发展产 业；（三）涉及互联网、大数据、云计算等 领域且技术或者产品更新速度快；（四）专利 申请人或者复审请求人已经做好实施准备 或者已经开始实施，或者有证据证明他人正 在实施其发明创造；(五)就相同主题首次在 中国提出专利申请又向其他国家或者地区 D选项均正确。(2019)"},
  {id: 385, topic: "专题十六 期限和费用", type: "multiple", question: "李某于2023年10月20日向国家知识产权局提交了一件要求法国优先权的发明专利申请，在先申请的申请日为2022年10月21日。由于李某未在规定期限内提交在先申请文件副本,因此收到了国家知识产权局以邮寄的方式发出的发文日为2024年2月28日的视为未要求优先权通知书。现李某欲恢复权利，下列说法哪些是正确的？", options: {"A": "李某最迟应当在2024年5月14日办理恢复手续", "B": "李某应当提交恢复权利请求书并说明理由", "C": "李某应当缴纳恢复费", "D": "李某应当在提交恢复权利请求书的同时提交在先申请文件副本"}, answer: "AB", explanation: "根据《专利优先审查管理办 法》第3条、第5条的规定、A、B选项正确。C 选项，对于就相同主题首次在中国提出专利 申请又向其他国家或者地区提出申请的该 中国首次申请，优先审查请求书不需要由国 务院相关部门或者省级知识产权局签署推 荐意见，C选项说法错误。D选项，对于优先 审查的专利申请，申请人答复发明专利审查 意见通知书的期限为通知书发文日起2个 月，申请人答复实用新型和外观设计专利审 查意见通知书的期限为通知书发文日起15 日，D选项错误。（2018改编）"},
  {id: 386, topic: "专题十六 期限和费用", type: "multiple", question: "以下哪些情况可以请求恢复权利？", options: {"A": "未在期限内答复补正通知书而造成视为撤回的", "B": "未在期限内提交不丧失新颖性宽限期的证明文件而造成视为未要求不丧失新颖性宽限期的", "C": "分案申请的原申请要求了优先权，而分案申请在提出时未填写优先权声明的", "D": "作为本国优先权的在先申请已经被视为撤回的"}, answer: "BCD", explanation: "《审查指南》第五部分第七章 第8.3节规定：“申请人可以对专利申请提出 延迟审查请求【A选项】。发明专利延迟审 查请求，应当由申请人在提出实质审查请求 的同时提出【B选项】，外观设计延迟审 查请求，应当由申请人在提交外观设计申请 的同时提出【C选项】。延迟期限以月为单 位，最长延迟期限为自延迟审查请求生效之 日起36个月【D选项】。”，因此A选项说法正 确，B、C、D选项说法错误。（新编）"},
  {id: 387, topic: "专题十六 期限和费用", type: "multiple", question: "国家知识产权局于2024年2月13日向申请人孙某以邮寄的方式发出视为放弃取得专利权通知书，但该通知书由于地址不清被退回。国家知识产权局通过公告方式通知申请人孙某，公告日为2024年4月18日，孙某于2024年5月10日得知此公告。孙某最迟应当在哪天办理恢复权利手续？", options: {"A": "2024年6月18日", "B": "2024年7月10日", "C": "2024年7月18日", "D": "2024年6月3日"}, answer: "ABC", explanation: "实用新型专利延迟审查请 求…延迟期限为自延迟审查请求生效之 日起1年，A选项正确。发明专利申请的延 迟审查在发明专利申请进入实审阶段后才 生效，因此B选项正确。外观设计和实用新 型的延迟审查请求，应当由申请人在提交外 观设计或实用新型申请的同时提出，因此C 选项正确。发明延迟期限为自延迟审查请 求生效之日起1年、2年或者3年，因此D选 项错误。（新编）"},
  {id: 388, topic: "专题十六 期限和费用", type: "multiple", question: "李某于2024年5月3日向国家知识产权局寄交了一件专利申请，寄出邮戳日为当天，国家知识产权局2024年5月25日收到了该申请。国家知识产权局以邮寄的方式向李某发出受理通知书，发文日为2024年6月23日。则李某最迟应当于哪一天缴纳申请费？", options: {"A": "2024年7月3日", "B": "2024年7月22日", "C": "2024年7月23日", "D": "2024年7月25日"}, answer: "ABCD", explanation: "，A选项、根据《阅》第7条 第1款的规定、专司申清涉及国访引澄要 保密的，由国防专列机构受理并进行审查、 因北A选项正确。B选项、（细则》第7条写2 数规定：“国务现专利行政部门认为昊受理 的发明或者实用新型专申请涉及国防行 益以外的国家安全或者重大利盈需要保密 约、应当及时作出疫照保密专利申请处理的 决定，并通知半诵人，保密专利申请的审 查、复审以及保密专利权无效宣告的特殊照 序、由国务院专利行政部门规定”，因此B选 项正确。C选项，《细则》第61条规定：“保密 专科审请经审蚕没有支股固理由跨、务 院专创行政部门应当作出授予保密专利权 的决定，须交保留专利证书，登记录密专利 权的有关事项”，回处C选项重确。D选项、 根据《审蚕榆雨》第五部分第五章第4节的 规定，保密专利申请的授极公告假公赤专利 号、甲请日和投权公台日，因此D选项正确。 (2012)"},
  {id: 389, topic: "专题十六 期限和费用", type: "single", question: "下列有关费用缴纳期限的说法哪些是正确的？", options: {"A": "延长期限请求费应当自提出请求之日起一个月内缴纳", "B": "优先权要求费应当自提出优先权要求之日起两个月内缴纳", "C": "申请费应当自申请日起两个月或者自收到受理通知书之日起15日内缴纳", "D": "复审费应当自申请人收到国家知识产权局作出的驳回-140 -决定之日起两个月内缴纳"}, answer: "B", explanation: "，B选项，《国防专利条例》第18条 规定：\"国圩专付申请经审查认为没有裂回 理由或者硕回后经过复审认为不应当固 的、由国务专利行政部门作出授予国防专 倒权的决定，并托国防专利机构调发国慰 专利过书….…”，国目选项淀法错误。A、 C、D选项说法均正确。（2018）"},
  {id: 390, topic: "专题十六 期限和费用", type: "multiple", question: "一件发明专利申请的优先权日为2018年7月18日，申请日为2019年6月30日，国家知识产权局于2024年1月20日通过指定的特定电子系统发出授予发明专利权通知书，告知申请人自收到通知书之日起两个月内办理登记手续，申请人在办理登记手续时，应缴纳第几年度的年费？", options: {"A": "第三年度", "B": "第四年度", "C": "第五年度", "D": "第六年度"}, answer: "AC", explanation: "《细则》第7条第I款规定；“专利 申请涉及国防利益需要保密的，由国防专利 机构受理并进行审查…·.”,A选项正确。B 选项，《国防专利条例》第8条规定：“禁止向 国外的单位和个人以及在国内的外国人和 外国机构转让国防专利申请权和国防专利 权”，B选项错误。C选项，《审查指南》第五 部分第五章第5.4节规定：“专利局接收国防 知识产权局移交的解密国防专利后，应当及 时对该专利进行解密公告、出版发明专利单 行本，并将该专利转为一般专利进行管理”， C选项正确。D选项，《国防专利条例》第16 条第1款规定：“国防专利机构设立国防专 利复审委员会，负责国防专利的复审和无效 宣告工作”，D选项错误。（新编）"},
  {id: 391, topic: "专题十六 期限和费用", type: "multiple", question: "当事人通过邮局汇付专利费用的，应当在汇单上写明下列哪些信息？", options: {"A": "申请日", "B": "发明名称", "C": "缴纳的费用名称", "D": "申请号或者专利号"}, answer: "ABD", explanation: "A、B、D选项，《专利法》第19 条第1款规定：“任何单位或者个人将在中 国完成的发明或者实用新型向外国申请专 利的，应当事先报经国务院专利行政部门进 行保密审查。保密审查的程序、期限等按照 国务院的规定执行”，不包括外观设计，因此 A、B、D选项正确。C选项，《细则》第8条第 1款规定：“专利法第19条所称在中国完成 的发明或者实用新型，是指技术方案的实质 性内容在中国境内完成的发明或者实用新 型”，并非“全部内容”，C选项错误。（2011 改编）"},
  {id: 392, topic: "专题十六 期限和费用", type: "multiple", question: "下列哪些专利费用的种类可以予以减缴？", options: {"A": "申请费、年费、复审费", "B": "申请费、无效宣告请求费、复审费", "C": "申请费、申请附加费、年费、复审费", "D": "申请费、年费、优先权要求费、复审费"}, answer: "ABCD", explanation: "A选项，根据《审查指南》第 五部分第五章第6.2.1节的规定，申请人拟 在向专利局申请专利后又向外国申请专利 的，应当在提交专利申请同时或者之后提交 向外国申请专利保密审查请求书，因此A选 项正确。B选项，《细则》第8条第3款规定： “向国务院专利行政部门提交专利国际申请 的，视为同时提出了保密审查请求”，因此B 选项正确。C选项，根据《细则》第8条第2 敷的规定，直接向外国申请专利或者向有关 国外机构提交专利国际申请的，应当事先向 国务院专利行政部门提出保密审查请求，并 详细说明其技术方案，因此C选项正确。D 选项，根据《专利法》第19条第4款的规定， 对违反本条第1款规定向外国申请专利的 发明或者实用新型，在中国申请专利的，不 授予专利权，D选项正确。（新编）"},
  {id: 393, topic: "专题十六 期限和费用", type: "multiple", question: "以下有关退款请求的说法正确的有？", options: {"A": "因缴费不足导致权利丧失的，当事人可以提出退款请求", "B": "进人实审阶段的发明专利申请，因未答复第一次审查意见通知书导致申请被视为撤回的，可以请求退还50%的实质审查费", "C": "进人实审阶段的发明专利申请，在第一次审查意见通知书答复期限届满前主动申请撤回的，可以请求退还50%的实质审查费", "D": "在专利局作出发明专利申请进人实质审查阶段通知书之前，专利申请已被视为撤回，可以请求退还已缴纳的实质审查费"}, answer: "CD", explanation: "，外观设计不需要进行保密审 查，因此A选项错误。只有在中国境内完成 的发胡或者实用新型才需进行保密审查、因 此B选项错误。C选项，以国家知识产权 局为受理单位的PCT申请视为同时提出了 保密审查请求，C选项正确。根据《专利法》 第19条第1款的规定，任何单位或者个人将 在中国完成的发明或者实用新型向外国申 请专利的，应当事先报经国务院专利行政部 门进行保密审查，因此D选项正确。（2019）"},

  {id: 394, topic: "专题十六 期限和费用", type: "multiple", question: "下列关于专利申请时可能缴纳的费用，说法正确的有？", options: {"A": "申请费和公布印刷费", "B": "优先权要求费", "C": "申请附加费包括申请文件的说明书(包括附图、序列表)页数超过30页时需要缴纳的费用", "D": "申请附加费不计算按照规定格式提交的计算机可读形式序列表的页数审查过程中的其他程序事项"}, answer: "ABD", explanation: "A选项，《审查指甫》第五部分 第五章第6.2.1节规定：“申请人拟在向专利 局申请专利后又向外国申请专利的，应当在 提交专利申请同时或者之后提交向外国申 请专利保密审查请求书。，向外国申请 专利的内容应当与该专利申请的内容一 致”，A选项正确。B选项，根据《细则》第9 冬第1款的规定，国务院专利行政部门 经过审查认为试发明或者实月新型可能涉 及国家安全或者重大利益需要保密的，应当 在请求递交日起2个月内向申请人发出保 密审查通知；情况复杂的，可以延长2个月， B选项正确。C选项，根据《细则》第9条第2 款的规定、国务院专利行政部门依照前款规 定通知进行保密审查的，应当在请求递交日 起4个月内作出是否需要保密的决定，并通 知申请人；情况复杂的，可以延长2个月。 因此C选项错误。D选项，《审查指南》第五 部分第五章第6.3.2节规定：“….国际申请 需要保密的，审查员应当自申请日起3个月 内发出因国家安全原因不再传递登记本和 检索本的通知书……...”，D选项正确。（新编）"},
  {id: 395, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "宋某委托专利代理机构提交了一件发明专利申请,现欲撤回该申请。下列说法哪些是正确的？", options: {"A": "撤回专利申请声明可以在专利申请被授予专利权之前随时提出", "B": "宋某可以不通过专利代理机构自行办理撤回专利申请的手续", "C": "宋某撤回其专利申请应当缴纳相应的费用", "D": "撤回专利申请声明在作好公布专利申请文件的印刷准备工作后提出的，申请文件仍予公布"}, answer: "AC", explanation: "A选项，根据《审查指南》第五 部分第一章第9节的规定，专利业务办理系 统是专利局指定的特定电子系统，A选项正 确。B选项，《审查指南》第五部分第五章第 3.1节规定：“需要保密的其申请文件应 当以纸件形式提交”，B选项错误。C选项， 根据《关于专利电子申请的规定》第4条第2 款的规定，进入中国国家阶段的专利申请。 可以采用电子文件形式提交，C选项正确。 D选项，《细则》第4条第7款规定：“国务院 专利行政部门以电子形式送达的各种文件， 以进入当事人认可的电子系统的日期为送 达日”，因此D选项错误。（新编）"},
  {id: 396, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "申请人李某提出了一件发明专利申请，并同时提交了发明专利申请提前公布声明。该申请初审合格后，李某又提交了撤回专利申请声明，国家知识产权局经审查发出了手续合格通知书。则下列说法哪些是正确的？", options: {"A": "该申请文件将不予公布", "B": "该申请文件将照常公布，但审查程序终止", "C": "撤回专利申请的生效日为手续合格通知书的发文日", "D": "该专利申请的撤回将在以后出版的专利公报上予以公告"}, answer: "ABC", explanation: "A选项，《细则》第4条第2款 规定：“以电子形式向国务院专利行政部门 提交各种文件的，以进入国务院专利行政部 门指定的特定电子系统的日期为递交日”， 因此A选项正确，D选项错误。B选项，根据 《审查指南》第五部分第六章第2.3.1节的规 定，通过电子形式送达的通知和决定，以进 入当事人认可的电子系统的日期为送达日。 进入当事人认可的电子系统的日期与通知 书和决定的发文日不一致时，除当事人能提 供证据外，该通知书和决定的发文日推定为 送达日，因此B选项正确。C选项，《审查指 南》第五部分第一章第9节规定：“申请人有 两人以上且未委托专利代理机构，并以电子 形式提交专利申请文件及其他文件的，应当 由代表人提交”，因此C选项正确。（新编）"},
  {id: 397, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "某申请人于2023年8月25日针对其所提发明专利申请提出撤回专利申请声明，2023年8月30日国家知识产权局公布该申请，国家知识产权局于2023年9月6日针对该撤回专利申请声明发出手续合格通知书，并于2023年10月18日对撤回专利申请声明进行公告，以下说法错误的有？", options: {"A": "撤回专利申请的生效日为2023年9月6日", "B": "撤回专利申请的生效日为2023年10月18日", "C": "撤回专利申请的声明是在专利申请公布前提出的，所以国家知识产权局不应当公布该申请", "D": "国家知识产权局对该撤回专利申请的声明做出审查结论前，该公司有权随时撤回该声明"}, answer: "ABCD", explanation: "A、B选项属于《规范申请 专利行为的规定》第3条规定的非正常申请 专利行为，正确。《规范申请专利行为的规 定》第3条规定：“可以对非正常申请专利行 为采取下网受理报：（一）对设非正常专利 申不于减专利珊写：对于5年白多次实 线非正常告专行为等严重的申请 人，其在该段时间内提出的专玛申请母不平 成借专利费用：已经减最的，要索其补册相 夫最借势用”.C选项正确，（规范单请专刑 行为的规定》事习本节3故规定：“对于违反 本规定涉包独罚、目兰移送司法机关道宽 扫事责任”、D选写正确（瓣编）"},
  {id: 398, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "张某向国家知识产权局提交了一项发明专利申请，2023年7月4日，国家知识产权局向张某发出了授予发明专利权通知书，2023年8月4日，张某到国家知识产权局办理了登记手续，国家知识产权局于2023年8月17日进行了公告，2023年8月24日，张某收到了国家知识产权局颁发的专利证书。那么，张某的专利权应当自何时生效？", options: {"A": "2023年7月4日", "B": "2023年8月4日", "C": "2023年8月17日", "D": "2023年8月24日"}, answer: "ABCD", explanation: "、未翘A.目.已.D选项源寿 （规范申请专到行为的规定》第3各规定所 章正常专利申通行为，因选A、B.C.D选项 当选，（）"},
  {id: 399, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "刘某向国家知识产权局提交一件外观设计专利申请，该专利申请的申请日为2023年6月2日，授权公告日为2023年9月16日，王某收到专利证书的日期为2023年9月23日。下列关于该外观设计专利权说法正确的有：", options: {"A": "该外观设计专利权的期限是2023年6月2日至2038年6月1日", "B": "该外观设计专利权自2023年9月23日起生效", "C": "该外观设计的专利权期限是2023年6月2日至2033年6月1日", "D": "该外观设计专利权自2023年9月16日起生效"}, answer: "AC", explanation: "、代理非正常审谏专网行为的 专用代理机构、以及檀自开展专用代国业务 综机构或者个人、应当当带理守利工作部 门进行处罚、国定A、C选项E.确、B、D选项 旨误。（厨）"},
  {id: 400, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "关于专利证书，以下说法正确的是：", options: {"A": "授予专利权时，专利证书上记载的内容与专利登记簿是一致的，在法律上具有同等效力", "B": "专利权授予之后，专利的法律状态以专利证书记载的法律状态为准- 144 -", "C": "专利权转让之后，专利登记簿与专利证书上记载的内容应当一致", "D": "因专利权的转移、专利权人更名发生专利权人姓名或者名称变更的，可以请求更换专利证书"}, answer: "AB", explanation: "，相曲（四则）第6券第1的 隐定，授子实用型或者外用设计专制投所 冷定公告后、专利法第66条现定的专利规 人、利害关系人、被担侵投人可以请求国务 院专利行政部门作出专利投评份报告、申 遗人可以在办理专测权登记手时求国 务院专利行政门作出专用权评价报告，因 您儿、B选项豆确，D选同措读。C选趣，可以 对已经终止四烫用型专利请动养出专科 权评价报告、C选项错误。（霸通）"},
  {id: 401, topic: "专题十七 审查过程中的其他程序事项", type: "single", question: "下列关于专利证书的说法哪些是正确的：", options: {"A": "当事人通过电子形式申请专利,可以通过专利电子申请网站提出请求，获取一份纸质专利证书", "B": "原纸质专利证书损坏的,专利局可以更换专利纸质证书", "C": "依据人民法院关于专利权权属纠纷的生效判决办理变更专利权人手续的，可以请求更换专利证书", "D": "专利权终止后，专利局不再更换专利证书"}, answer: "A", explanation: "G：侵据《审查指》第玉综合第 十33可（2）的规定，请录人是专利实施 脑占计可合同龄投许可人的，应当提交与专 村权人订立对专将买越过占评可合同反其 超印件，因此A巡巧正题。B选项、专科权 评价报告谱求鱼与专利平费没有关系，因此 B选项错误。C选项，《细则》第57条第2毅 银定；“对同一项实用塑或者外观设计专 利权，有多个请求人请求作出专利权评价报 告的，国务院专利行政部门仅作出一份专利 权评价报告.”，因此C选项正确。D选 项，根据《审查指南》第五部分第十章第1节 的规定，专利权评价报告不是行政决定，因 此请求人不能就此提起行政复议和行政诉 讼，因此D选项错误。（2013）"},
  {id: 402, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "下列哪些属于专利登记簿登记的事项？", options: {"A": "国防专利、保密专利的解密", "B": "专利权期限补偿", "C": "专利实施的开放许可", "D": "专利实施的强制许可"}, answer: "BCD", explanation: "A选项，不可以对发明专利 请求作出专利权评价报告，A选项错误。B 选项，收到专利权人发出的律师函、电商平 台投诉通知书等的单位或者个人属于被控 侵权人，被控侵权人可以请求作出专利权评 价报告，B选项正确。C选项，专利权评价报 告只能由国家知识产权局作出，C选项正 确。D选项，《审查指南》第五部分第十章第 6节规定：“请求人认为专利权评价报告存 在需要更正的错误的，可以请求更正”，D选 项正确。（新编）"},
  {id: 403, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "以下关于专利登记簿的说法，哪一个是错误的？", options: {"A": "专利权授予之后，专利登记簿与专利证书上记载的内容不一致的，以专利登记簿上记载的法律状态为准", "B": "专利权授予公告之后，任何人都可以向国家知识产权局请求出具专利登记簿副本，专利权失效的除外", "C": "请求出具专利登记簿副本的，应当提交办理文件副本请求书并缴纳相关费用", "D": "国家知识产权局授予专利权时建立专利登记簿，授予专利权以前发生的专利申请权转移、专利申请实施许可合同备案等事项均属于专利登记簿登记的内容"}, answer: "AD", explanation: "A选项，申请人最早可以在办 理专利权授权登记时提出专利权评价报告 请求，A选项正确。B选项，已经被宣告无效 的专利权自始不存在，被全部无效的专利无 法对其作出专利权评价报告，B选项错误。 C选项，专利权评价报告只作一次，不能再 次作出，C选项错误。D选项，根据《细则》第 63条第2款的规定，任何单位或者个人可以 查阅或者复制专利权评价报告”，因此D选 项正确。（新编）"},
  {id: 404, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "陈某和李某委托某专利代理机构向国家知识产权局提交了一件专利申请。该申请授予专利权后，陈某和李某欲放弃该专利权，并于2023年12月1日向国家知识产权局当面提交放弃专利权声明。下列说法正确的是：", options: {"A": "放弃专利权的手续既可以由该专利代理机构办理，也可以由陈某或者李某办理", "B": "在办理放弃专利权手续时，应当提交陈某或者李某签字同意的放弃专利权声明", "C": "陈某和李某所在单位以申请专利的权属为由向人民法院提起诉讼，并提出中止请求，在中止期间，陈某和李某放弃该专利权的手续将暂停办理", "D": "如果放弃专利权声明经审查符合规定、则该专利权自2023年12月1日终止"}, answer: "ACD", explanation: "根据《细则》第63条第1款 的规定，国务院专利行政部门应当自收到专 利权评价报告请求书后2个月内作出专利 权评价报告。但申请人在办理专利权登记 手续时请求作出专利权评价报告的，国务院 专利行政部门应当自公告授予专利权之日 起2个月内作出专利权评价报告，因此A选 项正确，B选项错误。根据《审查指南》第五 部分第十章第1节的规定，以实用新型或者 外观设计专利权办理转让、出质登记和专利 实施许可合同备案的，必要时，国家知识产 权局可以要求提交专利权评价报告，因此C 选项正确。根据《审查指南》第五部分第十 章第4节规定：“专利权评价报告作出后，应 当发送给请求人。请求人不是专利权人的， 国家知识产权局应当将专利权评价报告出 具情况告知专利权人”，因此D选项正确。 （新编）"},
  {id: 405, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "林某委托某专利代理机构申请了一项发明专利。下列有关林某放弃该项权利的说法哪些是正确的？", options: {"A": "林某放弃专利权，则应当办理著录事项变更手续", "B": "林某可以要求放弃该项专利权中的某个特定部分", "C": "放弃专利权的手续应当由该专利代理机构办理", "D": "林某放弃专利权后，该专利权视为自始即不存在"}, answer: "CD", explanation: "根据《关于香港回归后中国内 地和香港专利申请若干问题的说明》第2.条 的规定，向中国专利局提出发明专利申请的 申请人，为获得香港标准专利的保护，应当 向香港知识产权署办理标准专利的注册手 续，即：自该申请由中国专利局公布之日起 6个月内向香港知识产权署办理记录请求 手续；并自该申请由中国专利局授予专利权 之日起6个月内向香港知识产权署办理注 册与批予请求手续，因此C、D选项正确，A、 B选项错误。（2013)"},
  {id: 406, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "关于放弃专利权声明的说法，以下说法正确的是？", options: {"A": "专利权人可以随时主动放弃专利权", "B": "申请人在办理授予专利权登记手续程序中，未缴纳年费的，视为放弃取得专利权", "C": "对于同一申请人同日（仅指申请日）对同样的发明创造既申请实用新型又申请发明专利的，发明经审查未发现驳回理由的，申请人若想获得发明授权，应当提交放弃实用新型专利权的声明", "D": "专利权处于质押状态的，未经质权人同意，专利权人无权放弃专利权"}, answer: "BCD", explanation: "根据《关于香港回归后中国 内地和香港专利申请若干问题的说明》第2 条（二）中的规定，要求获得中国发明专利的 国际申请在进入中国国家阶段后，申请人为 获得香港标准专利的保护，应当向香港知识 产权署办理标准专利的注册手续，即：自该 申请由中国专利局以中文公布之日起6个 月内，或者该申请已由国际局以中文公布 的、自中国专利局国家申请号通知书发文日 起6个月内，向香港知识产权署办理记录请 求手续；并自该申请由中国专利局授予专利 权之日起6个月内向香港知识产权署办理 注册与批予请求手续。因此A选项错误，B、 C、D选项正确。(2007）"},
  {id: 407, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "甲、乙、丙三人为一项专利权的共同权利人，其中甲为代表人。2023年8月30日，向国家知识产权局提交放弃专利权书面申请，请求放弃该专利权。甲于2023年12月20日收到国家知识产权局在2023年12月10日发出的手续合格通知书，以下有关放弃专利权的说法中哪些是错误的？", options: {"A": "甲、乙、丙一致放弃该专利权的，可以随时向国家知识产权局交书面声明，并提交由代表人甲签字同意的放弃专利权声明", "B": "放弃专利权的生效日为2023年12月10日", "C": "甲、乙、丙声明放弃专利权后.该专利权视为自始即不存在", "D": "在国家知识产权局对该放弃专利权申请的声明作出审查结论之前，专利权人可以随时撤销该声明"}, answer: "AC", explanation: "向中国专利局提出发明专利 申请的申请人，为获得香港标准专利的保 护，应当向香港知识产权署办理标准专利的 注册手续，即：自该申请由中国专利局公布 之日起6个月内向香港知识产权署办理记 录请求手续，并自该申请由中国专利局授子 专利权之日起6个月内向香港知识产权署 办理注册与批予请求手续，因此A、C选项正 确，B、D选项错误。（新编） I.BD，A、B选项，复市和无效审查员 可以依职权超出当事人提出的理当和证据 的范围进行审查，A选项错误，B选项正确。 C选项，等要保密的案件不能公开，C选项错 误。D选项，请项原则含义为，只有基于当 事人请求才启动复审和无效宣告程序，国务 院专利行政门不能启动，D选项正确。 （新编）"},
  {id: 408, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "下列哪些情形将导致专利权终止？", options: {"A": "未按规定缴纳年费", "B": "以书面声明放弃专利权", "C": "专利权期限届满", "D": "专利权被宣告无效"}, answer: "ABD", explanation: "、（审查指窗》第四部分第一章 第2.3节规定：“复审程序和无效宣合程序均 应当基于当事人的请求自动、请求人交复 审和无效审理部作出复审请老无薇察 告请求审查决定留题回其请求的，其自动的 审查程序终止：但对于无效宣告请液、复审 和无效审理部认为很强已进行的审查工作 能够作出宣合专科权无效或者部分无效的 决定的除外，请求人主审查冷定的结论已 宣市或者节面决定已经宽出之后摄因请求 的，下影响审查决定的有效性”，因此A、B、D 选项正确；C选项的说法适用于无效宣帝诸 求的规定，因此C选项错误。（2017）"},
  {id: 409, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "下列关于专利权终止的哪种说法是正确的？", options: {"A": "专利权终止后都可以请求恢复权利", "B": "终止的专利权视为自始即不存在", "C": "对终止的实用新型仍可以请求专利权评价报告", "D": "对终止的专利权不能提出无效宣告请求"}, answer: "AD", explanation: "、A选项，（审查指商》第四部分 第一章第4节规定；“对于筒单的案件，可以 由一人独任审查”，因此A选项正确。B、D 选项，《审查指南》第四部分第一章第4节规 定：“对下到案件，应当组成五人合议组：（1） 在国内或者国外有重大影响的案件。（2)涉 及重要疑难法律问题的案件。(3)涉及重大 经济利益的案件”，合议组的组成由复审和 无效审理部决定，当事人没有请求途径，因 此B选项错误，D选项正确。C选项；《审查 指南》第四部分第一章第3.1节规定：“对于 审查决定被人民法院的判决撤销后重新审 查的案件，一般应当重新成立合议组”，因此 C选项说法过于绝对，错误。（新编） 4、ABD。A、B选项，《细则》第42条规 定：“·实施审查和审理的人员有下列情 形之一的，应当自行回避，当事人或者其他 利害关系人可以要求其回避：（一）是当事人 或者其代理人的近亲属的；（二）与专利申请 或者专利权有利害关系的（四）复审或 者无效宣告程序中，曾参与原申请的审查 的”，因此A、B、D选项应当回避。C选项不 属于回避的情形。（2016改编）"},
  {id: 410, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "甲乙二人因专利申请权的归属发生纠纷，乙向人民法院提起诉讼。在诉讼过程中，乙请求中止有关专利申请程序。下列说法哪些是正确的？", options: {"A": "应当向国家知识产权局提出中止请求", "B": "乙应当提交中止程序请求书和人民法院的受理文件副本", "C": "专利局认为中止理由不能成立，可以不中止有关程序", "D": "中止的期限为1年，不能延长"}, answer: "ABCD", explanation: "A、C选项，合议组曾作出专 利权评价报告、审查员审查过该案件，都曾 参与原申请的审查，需要回避。B、D选项中 的关系可能会影响案件公正审查和审理，需 要回避，因此A、B、C、D选项均当选。（新编）"},
  {id: 411, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "下列哪些情形可以不中止专利权无效宜告程序？-147→", options: {"A": "根据已进行的审查工作能够作出无效宣告审查决定的", "B": "权属纠纷当事人依据的由明显不充分，也未提交足以证明确有权属纠纷存在的证据的", "C": "有证据表明，中止专利权无效宣告程序将明显损害当事人利益或者公共利益的", "D": "有证据表明，中止程序的请求明显具有不诚信、不正当行为的"}, answer: "BD", explanation: "A、B选项，《审查指南》第四部 分第一章第6.3节规定：“复审和无效宣告请 求审查决定的正文，除所针对的专利申请未 公开的情况以外，应当全部公开”，初审驳回 案件的复审决定不公开，A选项过于绝对， 错误。B选项，外观设计无效宣告请求的案 件针对的是已经授权的外观设计，不会涉及 保密问题，因此B选项正确。C、D选项，无 论复审和无效的审查决定是否生效，除例外 情况，都予以公开，因此C选项错误，D选项 正确。（新编）"},
  {id: 412, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "下列说法哪些是正确的？", options: {"A": "申请人因不可抗拒的事由超出法定期限导致专利申请被视为撤回，专利审查程序终止的，申请人可以请求恢复被终止的审查程序", "B": "对于因专利申请权归属纠纷当事人的请求而中止的实质审查程序，在国家知识产权局收到发生法律效力的调解书或者判决书后，不涉及权利人变动的，应当予以恢复", "C": "自请求中止专利审查程序之日起一年内，专利申请权归属纠纷未能结案，请求人又未请求延长中止的，专利申请将被视为撤回", "D": "无效宣告程序不能因财产保全而中止"}, answer: "AB", explanation: "A选项，《审查指南》第四部分 第二章第1节规定；“复审程序是因申请人 对驳回决定不服而启动的救济程序，同时也 是专利审批程序的延续，合议组一般仅 ！ 针对驳回决定所依据的理由和证据进行审 查，不承担对专利申请全面审查的义务”，因 此A、B选项正确。C选项，《审查指南》第四 部分第二章第3.1节规定：“复审请求书（包 括附具的证明文件和修改后的申请文件）经 形式审查合格后转交给审查部门进行前置 审查，并由审查部门提出前置审查意见”，由 此可见，前置审查是复审程序的必经程序， C选项错误。D选项，对于在专利复审程序 中作出的具体行政行为、程序性决定不服 的，可以依法申请行政复议，因此D选项错 误。（2013改编）"},
  {id: 413, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "甲于2023年10月20日向国家知识产权局提交一份发明专利申请，甲乙二人因专利申请权的归属发生纠纷，乙向人民法院提起诉讼。在诉讼过程中，乙请求中止有关专利申请程序，下列说法哪些是错误的？", options: {"A": "法院判决该专利申请权应归属于乙，乙在收到通知书之日起3个月内办理著录项目变更手续", "B": "乙应当自提出请求之日起两个月内缴纳中止程序请求费", "C": "自请求中止专利审查程序之日起1年内，专利申请权归属纠纷未能结案，乙可以请求延长中止期限1年", "D": "法院判决该专利申请权应归属于乙，国家知识产权局在收到发生法律效力的判决书后，应当及时予以恢复"}, answer: "BC", explanation: "A、B选项，对驳回专利申请的 决定不服的，可以提出复审请求；对不予受 理专利申请的决定不服的案件可依法申请 行政复议或者提起行政诉讼，不能提出复审 请求，因此A选项错误，B选项正确。C选 项，《审查指南》第四部分第一章第2.4节规 定：“复审和无效审理部可以对所审查的案 件依职权进行审查，而不受当事人请求的范 围和提出的理由、证据的限制”，因此C选项 正确。D选项，《审查指南》第四部分第一章 第2.5节规定：“在作出审查决定之前，应当 给予审查决定对其不利的当事人针对审查 决定所依据的理由、证据和认定的事实陈述 意见的机会”，因此D选项错误。（2012 改编）。 9、C。本题中，甲、乙为共同申请人，需 共同提出复审请求，A选项不符合受理条 件，C选项符合受理条件。发明人没有提出 复审请求的权利，因此B、D选项不符合受理 条件。（2015)"},
  {id: 414, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "国家知识产权局于2024年4月10日通过邮寄向申请人吴某发出了授予实用新型专利权通知书和办理登记手续通知书。由于吴某搬家未能及时变更通信地址，两份通知书被退回，国家知识产权局于2024年6月5日对两份通知书进行公告送达。下列说法哪些是正确的？", options: {"A": "吴某最迟应当在2024年8月5日办理登记手续", "B": "吴某在办理登记手续时应当缴纳授予专利权当年的年费", "C": "如果吴某未在规定期限内办理登记手续，则视为其放弃取得专利权的权利", "D": "如果吴某在规定期限内办理了登记手续，则其专利权应当自2024年4月10日起生效"}, answer: "AC", explanation: "A、C选项，《审查指南》第四部 分第二章第2.2节规定：“复审请求人不是被 驳回申请的申请人的，其复审请求不予受 理。被驳回申请的申请人属于共同申请人 的，如果复审请求人不是全部申请人，复审 和无效审理部应当通知复审请求人在指定 期限内补正”，因此A、C选项正确。B选项， 根据《审查指南》第四部分第二章第2.3节的 规定，提出复审请求的期限不符合规定（驳 回决定之日起3个月后）、但在复审和无效 审理部作出不予受理的决定前或决定后，复 审请求人提出恢复权利请求的，如果该恢复 权利请求符合有关规定，则允许恢复，且复 审请求应当予以受理，因此B选项说法过于 绝对，错误。D选项，《细则》第65条第1款 规定：“依照专利法第41条的规定向国务院 专利行政部门请求复审的；应当提交复审请 求书；说明理由，必要时还应当附具有关证 据”，因此复审时不是必须提交证据，D选项 错误。（2011改编）"},
  {id: 415, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "根据国家知识产权局令第76号《专利优先审查管理办法》，下列哪些情形的专利申请或者专利复审案件，可以请求优先审查？", options: {"A": "涉及节能环保、新一代信息技术、生物、高端装备制造、新能源、新材料、新能源汽车、智能制造等国家重点发展产业", "B": "涉及互联网、大数据、云计算等领域且技术或者产品更新速度快", "C": "专利申请人或者复审请求人已经做好实施准备或者已经开始实施，或者有证据证明他人正在实施其发明创造", "D": "就相同主题首次在中国提出专利申请又向其他国家或者地区提出申请的该中国首次申请"}, answer: "AC", explanation: "《专利法》第41条第1款规定： “专利申请人对国务院专利行政部门驳回申 请的决定不服的，可以自收到通知之日起三 个月内向国务院专利行政部门请求复 审……”本题中，国家知识产权局于2024 年3月1日电子发文发出驳回决定，送达日 即为2024年3月1日，张某应在2024年6月 1日前提出复审请求并缴足复审费，因此A、 C选项符合规定。（新编）"},
  {id: 416, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "关于优先审查，以下说法正确的是：", options: {"A": "专利申请人或者复审请求人已经做好实施准备或者已经开始实施，或者有证据证明他人正在实施其发明创造的，属于可以请求优先审查的情形之一", "B": "处理、审理涉案专利侵权纠纷的地方知识产权局、人民法院或者仲裁调解组织可以对无效宣告案件提出优先审查请求", "C": "申请人提出发明或者实用新型专利申请优先审查的，必须提交由国务院相关部门或者省级知识产权局签署推荐意见的优先审查请求书和现有技术材料", "D": "对于优先审查的发明或者实用新型专利申请，申请人应当在审查意见通知书发文日起2个月内进行答复，否则将停止优先审查并按普通程序处理"}, answer: "ACD", explanation: "A选项表述的是复审请求提 出时机的一般情况，超过3个月期限的，复 审请求不予受理，A选项正确。B选项，复审 请求书不符合规定格式的，复审和无效审理 部应当通知复审请求人在指定期限内补正， B选项错误。C选项，复审请求经形式审查 符合相关规定的，复审和无效审理部应当发 出复审请求受理通知书，C选项正确。D选 项，复审请求人是涉外主体未委托专利代理 机构的，其复审请求不予受理，D选项正确。 （2013改编）"},
  {id: 417, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "以下关于延迟审查，哪些说法是错误的？", options: {"A": "申请人可以对发明、实用新型和外观设计专利申请提出延迟审查请求", "B": "发明延迟审查请求应当在提出申请的同时提出申请", "C": "外观设计延迟审查请求应当在提交外观设计的2个月内提出", "D": "外观设计延迟期限为自提出延迟审查请求生效之日起1年"}, answer: "AD", explanation: "A选项，根据《细则》第6条第 2款的规定，延误复审请求期限的，可以自 复审请求期限届满之日起2个月内向国务 院专利行政部门请求恢复权利，因此A选项 正确。B、C选项，《审查指南》第五部分第七 章第4.1节规定：“可以请求延长的期限仅限 于指定期限”，提出复审请求的期限属于法 定期限，不能延长，答复复审审查意见的期 限属于指定期限，可以延长，因此B、C选项 错误。D选项，《审查指南》第四部分第二章 第2.5节（1)规定：“复审请求人在收到驳回 决定之日起3个月内提出了复审请求，但在 此期限内未缴纳或者未缴足复审费的，其复 审请求视为未提出”，因此D选项正确。 (2019)"},
  {id: 418, topic: "专题十七 审查过程中的其他程序事项", type: "multiple", question: "以下关于延迟审查，哪些说法是正确的？", options: {"A": "实用新型的延迟期限为自延迟审查请求生效之日起1年B，发明专利申请延迟审查请求自实质审查请求生效之日起生效", "C": "实用新型延迟审查请求，应当由申请人在提交实用新型申请的同时提出", "D": "发明延迟期限为自提出实质审查请求之日起1年、2年或者3年-150~专利申请中的手续事宜", "B": "发明专利申请延迟审查请求自实质审查请求生效之日起生效"}, answer: "BD", explanation: "专利申请人应当在收到驳回 决定之日起3个月内提出复审请求（期满日 为2024年5月6日）。超出法定期限提出复 审请求的，应当自复审请求期限届满之日起 2个月请求恢复权利（期满日为2024年7月 6日）、缴纳恢复权利请求费，说明理由。超 期提出复审请求的，申请人可以在收到复审 请求不予受理通知书后请求恢复，也可以在 提出复审的同时请求恢复。A选项中缴纳 费用的时间超出期限、C选项提出恢复请求 的时间超出期限，因此A、C选项不符合规 定，错误。B、D选项做法均符合规定，正确。 （新编） 15、ABD。本题中，电子形式驳回决定 的发文日为2024年6月28日，即送达日为 2024年6月28日，李某应当在2024年9月 28日前请求复审，但由于9月28日为周六， 请求复审期满日顾延至9月30日（周一）。 A选项，李某未请求复审，提出分案申请时 间符合规定，但是分案申请改变原申请类型 的不予受理。B选项，李某提出复审请求超 期，不予受理。C选项，李某提出复审请求 和分案申请均符合规定，予以受理。D选 项，甲公司不是被驳回申请的申请人，其提 出复审请求不予受理。（新编，思维扩展）"},
  {id: 419, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "下列关于需要保密的专利申请的说法哪些是正确的?", options: {"A": "专利申请涉及国防利益需要保密的，应当由国防专利机构进行审查", "B": "专利申请涉及国防利益以外的国家安全或者重大利益需要保密的,应当由国家知识产权局进行审查", "C": "保密专利申请经审查未发现驳回理由的,由国家知识产权局作出授予专利权的决定", "D": "保密专利申请的授权公告仅公布专利号、申请日和授权公告日"}, answer: "BCD", explanation: "A选项，复审费无需在提出 复审请求的同时缴足，A选项错误。B、C选 项，根据《审查指南》第四部分第二章第2.6 节(1)的规定，复审请求人在复审程序中委 托专利代理机构，且委托书中写明其委托权 限仅限于办理复审程序有关事务的，其委托 手续或者解除、辞去委托的手续应当参照上 述规定在复审和无效审理部办理，无需办理 著录项目变更手续；若未写明委托权限仅限 于办理复审事务的应当补正，期满未补正 的，视为未委托，因此B、C选项正确。D选 项，根据《审查指南》第四部分第二章第2.6 节（2)的规定，复审请求人与多个专利代理 机构同时存在委托关系的，应当以书面方式 指定其中一个专利代理机构作为收件人，因 此D选项正确。（新编）"},
  {id: 420, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "关于保密专利的审查，以下说法错误的是？", options: {"A": "申请人认为其发明或者实用新型专利申请涉及除国防利益以外的国家安全或者重大利益需要保密的，应当在提出专利申请的同时，在请求书上提出要求保密的请求，其申请文件不得以电子申请的形式提交", "B": "专利申请涉及国防利益需要保密的，由国防专利机构受理并进行审查,经审查没有发现驳回理由的,由国家知识产权局根据国防专利机构的审查意见作出授予国防专利权的决定并颁发国防专利证书", "C": "国家知识产权局认为其受理的发明或者实用新型专利申请涉及国防利益以外的国家安全或者重大利益需要保密的，应及时作出按照保密专利申请处理的决定，并通知申请人", "D": "保密专利申请的授权公告仅公布专利号、申请日和授权公告日，发明或者实用新型专利解密后，应当进行解密公告"}, answer: "AC", explanation: "《审查指南》第四部分第二章第 4.1节规定：“在复审程序中，合议组一般仅 针对驳回决定所依据的理由和证据进行审 查。除驳回决定所依据的理由和证据外，合 议组发现审查文本中存在下列缺陷的，可以 对与之相关的理由及其证据进行审查【B选 项】...（4)驳回决定未指出的其他明显实 质性缺陷【A选项】…在合议审查中，合议 组可以引入所属技术领域的公知常识，或者 补充相应的技术辞典、技术手册、教科书等 所属技术领域中的公知常识性证据【C选 项1”。合议组不能引入新的对比文件，因此 A、C选项正确，B、D选项错误。（2019改编）"},
  {id: 421, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "下列有关国防专利申请和国防专利的说法哪些是正确的？", options: {"A": "专利申请涉及国防利益需要保密的，由国防专利机构受理并进行审查", "B": "经主管部门批准，国防专利权人可以向国外的单位或者个人转让国防专利权", "C": "国防专利解密后应当移交国家专利局，由国家专利局对该专利进行解密公告、出版发明专利单行本，转为一般专利进行管理", "D": "国家知识产权局专利复审和无效审查部负责国防专利的复审和无效宣告工作"}, answer: "ABC", explanation: "《审查指南》第四部分第二章 第4.1节规定：“除驳回决定所依据的理由和 证据外，合议组发现申请中存在下列缺陷 的，可以对与之相关的理由及其证据进行审 查：(1)不符合专利法实施细则第11条的规 定[A选项】。.(4)敦回决定未指出的其 他明显实质性缺陷【C选项】。除上述情形 外，对于与驳回决定指出缺陷相关的证据， 合议组可以适度调整其使用方式，例如，在 驳回决定依据的证据基础上变更最接近的 现有技术或缺省其中的某份证据【B选 项】”，因此A、B、C选项正确。D选项、复审 程序中审查员可以补充公知常识作为证据、 但不能补充检索、D选项错误。（新编）"},
  {id: 422, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "关于向外国申请专利前的保密审查，下列说法哪些是正确的？", options: {"A": "中国人拟就其在外国完成的发明创造向外国申请专利的，不需事先报经国家知识产权局进行保密审查", "B": "不论发明人是中国人还是外国人，只要拟就在中国完成的实用新型向外国申请专利的，都应当事先报经国家知识产权局进行保密审查", "C": "只有技术方案的全部内容在中国完成的发明或者实用密审查D，拟就在中国完成的外观设计向外国申请专利的，不需事先报经国家知识产权局进行保密审查", "D": ""}, answer: "ABC", explanation: "，根据《审查指葡》第四部分 第二章第4.2节的规定，在提出复审请求、答 复复审通知书（包括复审请求口头审理通知 书）或者参加口头审理时，复审请求人可以 对申请文件进行修改、因此A、B、C选项正 确，D选项错误。（2017)"},
  {id: 423, topic: "专题十八 专利申请中的手续事宜", type: "single", question: "某公司拟将其在中国完成的一项发明向外国申请专利。下列说法哪些是正确的？", options: {"A": "该公司可以在向国家知识产权局提交专利申请的同时提出保密审查请求", "B": "该公司向国家知识产权局提出PCT国际申请的，视为同时提出了保密审查请求", "C": "该公司可以直接向国家知识产权局提出向外国申请专利的保密审查请求，待请求获得通过后，再向外国申请专利", "D": "该专利未经国家知识产权局进行保密审查而直接向外国申请专利的，其在中国提出的专利申请不能被授予专利权"}, answer: "C", explanation: "A选项，除权利要家属于复 审程序中允许的修改，且可克服权利要求1 不具备创造性的缺陷。B选项，用从属权利 要求2的特征对权利要求1作进一步的限 定，属于复审程序中允许的修改，既可克服 权利要求1不具备创造性的缺陷，也不会扩 大保护范围或超范图。C选项，复审程序中 改变权利要求的类型是不被允许的、当选。 D选项，陈述独立权利要求I相对于对比文 件1和2的结合具备创造性的理由是允许 的。(2019)"},
  {id: 424, topic: "专题十八 专利申请中的手续事宜", type: "single", question: "关于专利申请的保密审查，下列说法正确的是？", options: {"A": "就发明、实用新型、外观设计向外国申请专利或者证书的，应当事先报经国务院专利行政部门进行保密审查", "B": "任何中国单位或者个人完成的发明或者实用新型向外国申请专利的，应当事先报经国务院专利行政部门进行保密审查", "C": "申请人向国家知识产权局提出专利国际申请的，无需再提出保密审查请求", "D": "任何外国人或外国企业将在中国完成的发明或者实用新型向外国申请专利的，应当事先报经国务院专利行政部门进行保密审查"}, answer: "D", explanation: "A、B选项，在复审程序的修改 中，不允许改变权利要求的类型或者增加权 利要求，因此A、B选项不符合规定。C选 项，删除技术特征，导致修改后的权利要求 相对于驳回决定针对的权利要求扩大了保 护范围，因此C选项不符合规定。D选项， 将说明书中的技术特征补入到权利要求中， 能够克服缺少必要技术特征的缺陷，同时不 会扩大保护范围，也不会超出范围，因此D 选项符合规定。（2015） 22。AB。在复审阶段，为了克服权利要 求不具有新颖性、创造性的缺陷，申请人通 常的修改方式是删除权利要求，或是在独立 权利要求中补入原说明书中的技术特征或 者补入记载于从属权利要求中的特征，因此 A、B选项均属于复审程序中允许的修改方 式，当选。C选项，复审程序中的修改不允 许改变权利要求的类型，因此C选项不符合 规定。D选项，复审程序中不允许将与驳回 决定针对的权利要求所限定的技术方案缺 乏单一性的技术方案作为修改后的权利要 求，因此D选项不符合规定。（2016)"},
  {id: 425, topic: "专题十八 专利申请中的手续事宜", type: "single", question: "美国A公司设立在北京的研发中心科技人员在中国完成了最新研发产品的实质性内容，现准备就该项技术向美国申请专利，以下说法正确的有？", options: {"A": "该中心拟在向国家知识产权局申请专利后又向外国申请专利的，应当在提交专利申请同时或之后向国家知识产权局提交向外国申请专利保密审查请求书，向外国申请专利的内容应当与该专利申请的内容一致", "B": "国家知识产权局经过审查认为该发明可能涉及国家安全或者重大利益需要保密的，最晚应当在请求递交日起4个月内向申请人发出保密审查通知", "C": "国家知识产权局认为发明涉及国家安全或者重大利益需要保密查的，应当在请求递交日起2个月内作出需要保密的决定", "D": "该中心向国家知识产权局提交国际申请的，视为同时提出向外国申请专利保密审查请求，国际申请需要保密的，国家知识产权局审查部门应自申请日起3个月内向该企业发出因国家安全原因不再传送登记本和检索本的通知书"}, answer: "C", explanation: "A选项，增加权利要求属于复 审程序中不允许的修改方式。B选项，修改 后扩大了保护范围，属于复审程序中不允许 的修改方式。C选项，新增说明书中的技术 特征对权利要求进一步限定，既不超出范 围，也不会扩大保护范围，因此C选项的修 改可被接受。D选项，改变权利要求的类型 属于复审程序中不允许的修改方式。（2017）"},
  {id: 426, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "下列关于电子申请的说法哪些是正确的？", options: {"A": "专利业务办理系统是专利局指定的特定电子系统", "B": "申请人可以通过电子申请系统提交包括保密申请在内的各种专利申请", "C": "进人中国国家阶段的PCT国际申请可以采用电子文件形式提交", "D": "国务院专利行政部门以电子形式送达的各种文件，以国务院专利行政部门发出的日期为送达日"}, answer: "AC", explanation: "A选项，将下位概念“铝”修改 为上位概念“金属”，扩大了权利要求的保护 范围，因此A选项的修改不能被允许。B选 项，在提出复审请求时可以陈述权利要求1 与对比文件1的区别技术特征不属于公知 常识，因此B选项的做法是允许的。C选 项，将“一种散热装置”修改为“一种制造散 热装置的方法”，改变了权利要求的类型，因 此C选项的修改不能被允许。D选项，用从 属权利要求2的附加技术特征对独立权利 要求1进一步限定，既不超范围，又不会扩 大保护范围，D选项的修改是允许的。 （新编）"},
  {id: 427, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "下列关于电子申请的说法哪些是正确的？", options: {"A": "以电子形式向国务院专利行政部门提交各种文件的，以进人国务院专利行政部门指定的特定电子系统的日期为递交日", "B": "通过电子形式送达的通知和决定，以该通知书和决定的发文日推定为送达日，当事人能提供证据除外", "C": "未委托专利代理机构的多个申请人以电子文件形式提交申请的，应当由代表人提交", "D": "国家知识产权局以电子文件形式发出通知书的，以申请人查阅并下载该通知书的日期为收到通知书之日"}, answer: "ACD", explanation: "A选项，提出复审请求时，可 以不修改权利要求，只针对驳回意见进行陈 述，因此A选项正确。B选项，陈某修改权 利要求2不是为消除回决定所指出的缺 陷，属于主动修改，因此B选项错误。C选 项，合议组可以引入所属技术领域的公知常 识证据，因此C选项正确。D选项，根据《审 查指南》第四部分第二章第4.3节的规定，合 议组需要引入驳回决定未提出的理由或者 证据，应当发出复审通知书或者进行口头审 理，因此D选项正确。（2012改编）"},
  {id: 428, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "关于非正常申请专利行为的说法，正确的是？", options: {"A": "同一单位或者个人提交多件不同现有材料、组分、配比、部件等简单替换或者拼凑的专利申请，属于非正常申请专利的行为", "B": "同一单位或者个人提交多件实验数据或者技术效果明显编造的专利申请，属于非正常申请专利的行为", "C": "对于5年内多次实施非正常申请专利行为等情节严重的申请人，其在该段时间内提出的专利申请均不予减缴专利费用", "D": "通过非正常申请专利的行为骗取资助和奖励，情节严重构成犯罪的，依法移送有关机关追究刑事责任"}, answer: "BC", explanation: "A选项，《审查指首》第四部分 第一章第2.5节规定：“在作出审查决定之 前，应当给予审查决定对其不利的当事人针 对审查决定所依据的理由、证据和认定的事 实殊述意见的机会”，因此A选项错误。B 选项，所有审查程序中的修改都不能超范 围，复审中修改超范围，合议组应当对缺陷 进行审查，并发出复审意见、B选项正确。 C、D选项，根据《审查指南》第四部分第二章 第4.1节的规定，驳回决定指出权利要求不 具备创造性，经审查认定该权利要求请求保 护的明显是永动机时，合议组应当以该权利 要求不符合专利法第22条第4款的规定为 由裂回复审请求，而不是撤销驳回决定发回 原审查部门重新审理，因此C选项正确，D 选项错误。（2016改编）"},
  {id: 429, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "以下哪些属于非正常申请专利行为？", options: {"A": "申请人无实际研发活动提交多件专利申请，且不能作出-154 -台理解释", "B": "后提交的多件专利申请之间是由不同发明创造特征线要简单组合变化而形成", "C": "专利申请的发明创造系明显不符合技术改进或、设计常理.或者无实际保护价值的变劣、堆砌、非必要缩限保护范围D：将实质上与特定单位、个人或地址关联的多件专利申请分散、先后或异地提交提出", "D": ""}, answer: "AC", explanation: "A、B选项，修改超范围的审查 优先于其他法条的审查，如果文本存在修改 超范围的缺陷且未被修改，应当以修改超范 图为由驳回复审请求，因此A选项正确，B 选项错误。C、D选项，若修改超范围的缺陷 已被克服，应当继续对权利要求书是否具备 实用性进行审查，因此C选项正确，D选项 错误。（2013) 28、ABCD。A选项，由于驳回理由是 不具备创造性，因此复审和无效审理部应当 对被驳回的专利申请进行创造性评价，以有 断取回理由是否恰当，因此A选项正确。8 选项，根据《审查指南》第四部分第二普童 4.1节的规定，在合议审查中，合议组可以引 入所属技术领域的公知常识证据，B选项正 确。C选项，根据《审查指南》第四部分第二 章第4.3节的规定，针对合议组发出的复审 通知书，复审请求人应当在收到该通知书之 日起1个月内针对通知书指出的缺陷进行 书面答复，因此C选项正确。D选项，根据 《审查指南》第四部分第二章第4.1节的规 定，除驳回决定所依据的理由和证据外，合 议组发现审查文本中存在驳回决定未指出 的明显实质性缺陷的，可以对与之相关的理 由及其证据进行审查。权利要求涉及疾病 的治疗方法属于驳回决定未指出的明显实 质性缺陷，因此D选项正确。（2013改编）"},
  {id: 430, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "关于非正常申请专利行为的说法，正确的是？", options: {"A": "专利代理机构存在多次帮助他人提交明显编造内容的专利申请，可由管理专利工作的部门对其进行处罚", "B": "无专利代理资质的某咨询公司多次帮助不具有研发能力公司申请编造的专利，可由国家知识产权局对其进行处罚", "C": "专利代理师张某在某次代理中存在帮助他人提交明显编造内容的专利申请，可由管理专利工作的部门对其进行处罚", "D": "专利代理师刘某多次教唆他人编造数据申请专利，应当由中华全国专利代理师协会对其进行处罚"}, answer: "ABD", explanation: "A、B、D选项，《审查指南》第 四部分第二章第4.3节规定：“有下列情形之 一的，合议组应当发出复审通知书或者进行 口头审理：(1)复审决定将驳回复审请求。 (2)需要复审请求人依照专利法及其实施细 则和审查指南有关规定修改申请文件，才有 可能撤销驳回决定。(3)需要复审请求人进 一步提供证据或者对有关问题予以说明。 (4)需要引入驳回决定未提出的理由或者证 据”，因此A、B、D选项正确。C选项中审查 结论有利于复审请求人，可以直接作出复审 决定，不需要发出复审通知或口审通知。 （2017改编）"},
  {id: 431, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "关于专利权评价报告的说法正确的有？", options: {"A": "授予实用新型或者外观设计专利权的决定公告后，专利权人、利害关系人、被控侵权人可以请求国务院专利行政部门作出专利权评价报告", "B": "申请人在办理专利权登记手续时，可以请求国务院专利行政部门作出专利权评价报告", "C": "不得对已经终止的实用新型专利作出专利权评价报告", "D": "只有专利权人或者利害关系人可以请求国务院专利行政部门作出专利权评价报告"}, answer: "ABC", explanation: "A、B、C选项，《审查指南》第 四部分第二章第4.3节规定：“有下列情形之 一的，合议组应当发出复审通知书（包括复 审请求口头审理通知书）或者进行口头审 理：（1)复审决定将驳回复审请求【C选项】。 (2)需要复审请求人依照专利法及其实施细 同勿重委指自常关规定移致车帝文伴、才有 可能振婴回共定[A垂项]一（4)需要引 入验目决定央致召的理台或者证据【8选 项）°，因或A、B.C选项正满，D选项，根据 （审查转盲）第目分算二显骂5号（2）的规 定，合议母认定敬目理由不反主、则复审请 意我立，自发白被倡原国决定的复审决定、 因此D选项错误。（2014）"},
  {id: 432, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "专利权人甲及其专利实施独占许可合同的被许可人乙分别请求国家知识产权局对甲的实用新型专利作出专利权评价报告：下列说法哪些是正确的？", options: {"A": "乙在提出专利权评价报告请求的同时应当提交其与甲订立的专利实施独占许可合同或其复印件", "B": "甲因缴纳了专利年费，故无需缴纳专利权评价报告请求费", "C": "国家知识产权局仅作出一份专利权评价报告", "D": "请求人认为专利权评价报告存在错误的，可以向国家知识产权局提起行政复议"}, answer: "ABCD", explanation: "、根据（审查指亩》第四部分 窈二靠第5号的规定，复审画成王、错 磁留决定的复审决定包括以下情形：股回决 复通用法律错误的：回理由身必要措誉 楊支持的；审查违反法定福序约，孵姬，获因 决定以申请人放弃的申请义本或者不要求 绿护的技术方宽力依据；投回决定没有评价 警请人提交的与投回理由有关的证据，以至 可能影响公亚审理的，因此A、B、C、D选项 均正确，（编）"},
  {id: 433, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "下列关于专利权评价报告的说法正确的有？", options: {"A": "对发明专利可以请求作出专利权评价报告", "B": "收到涉嫌侵犯专利权的律师函的单位或个人可以请求作出专利权评价报告", "C": "专利权评价报告只能由国家知识产权局作出", "D": "专利权人认为专利权评价报告有错误，可以提出更正请求"}, answer: "BD", explanation: "A选项，专利申请出现权属纠 纷可以请求中主复审，不会导致复审序终 土。B、D选项，（审查指丽）第四药分第二章 易9节规定：“更审请求回未签复变 视为撤目的，复审程序终止。在作出复审 定前，复审请求人猎回其复审海求的、复审 程序终上”，因此B、D选项属于复审程序 止的情形。C选项，根握（审叠指面》第目御 分第四章第3节的规定、当事人应当在口头 审理通知指定的容复期限内提交回执明确 表示是否参加口头审理，逾期夫签复的，视 为不参加口头审理、不会导致复审程序终 止：（2013)"},
  {id: 434, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "关于实用新型专利权评价报告，下列说法哪些是正确的？", options: {"A": "申请人在办理专利权登记手续时可以请求作出专利权评价报告", "B": "对于被宣告全部无效的实用新型专利，专利权人可以请求国家知识产权局对该专利权作出评价报告", "C": "专利权人对于应其请求作出的评价报告结论不服的，由利害关系人再次向国家知识产权局提出评价请求后，国家知识产权局可再次作出专利权评价报告", "D": "专利权评价报告作出后，对该专利提出无效宣告请求的请求人可以查阅并复制该评价报告"}, answer: "AD", explanation: "，A、B选项、（专利法》第41条 第2款规定：“专利申请人对国务院专科行 放部门的复审决定不的，可以自收到通知 之日起三个月内向人民法院起诉”，无论复 审决定对当事人有利还是不利，均有提起诉 讼的权利，A选项正确，B选项错误。C选 项，《国家知识产权局行政复议规程》第5条 规定：“对下列情形之一，不能申请行政复 议：…（二）复审请求人对复审请求审查决 定不服的·”，因此C选项错误。D选项。 对复审决定不服应向北京知识产权法院起 诉，D选项正确。（新编）"},
  {id: 435, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "关于专利权评价报告，以下说法正确的是？", options: {"A": "授予实用新型或者外观设计专利权的决定公告后申请专利权评价报告的，国务院专利行政部门应当自收到专利权评价报告请求书后2个月内作出专利权评价报告", "B": "在办理实用新型或者外观设计专利权登记手续时请求权评价报告请求书后2个月内作出专利权评价报告", "C": "以实用新型或者外观设计专利权办理转让、出质登记和专利实施许可合同备案的，必要时，国家知识产权局可以要求提交专利权评价报告", "D": "专利权评价报告作出后，若请求人不是专利权人，国家知识产权局应当将专利权评价报告出具情况告知专利权人"}, answer: "ACD", explanation: "A、C、D选项，复审程序中可 能因耽误期限导致不予受理而缴纳恢复权 利请求费，提出复审时应当缴纳复审费。复 审程序可以延长答复期限，延长期限需缴纳 延长期限请求费，因此A、C、D选项正确。B 选项，专利登记费已经停收。（新编）"},
  {id: 436, topic: "专题十八 专利申请中的手续事宜", type: "single", question: "某公司就一项技术方案向国家知识产权局提出了发明专利申请，并欲获得香港标准专利的保护。下列说法哪些是正确的？", options: {"A": "该公司应当在向国家知识产权局提出申请的同时声明要求获得香港标准专利保护", "B": "该公司应当自该申请的申请日起6个月内向香港知识产权署办理记录请求手续", "C": "该公司应当自该申请的公布之日起6个月内向香港知识产权署办理记录请求手续", "D": "该公司应当自该申请的授权之日起6个月内向香港知识产权署办理注册与批予请求手续"}, answer: "C", explanation: "，A、B、C选项，（审查指南》第 四部分第三童第1节规定：“无效宣告程 序是专利公告授权后依当事人请求而启 动的，通常为双方当事人参加的程序”， 因此A、B选项说法正确，C选项，无效宣 合程序通常为双方当事人参加的程序， “必须”的说法过于绝对，错误。D选项， 《专利法》第46条第1款规定：“宣告 专利权无效的决定，由国务院专利行政 部门登记和公告”，因此D选项正确。 (2018）"},
  {id: 437, topic: "专题十八 专利申请中的手续事宜", type: "multiple", question: "要求获得中国发明专利的国际申请在进人中国国家阶段后，申请人为获得香港标准专利的保护，应当向香港知识产权署办理下列哪些手续？", options: {"A": "自该申请由国际局公布之日起6个月内，向香港知识产权署办理记录请求手续", "B": "该申请由国际局以英文公布的，自该申请由国家知识产权局以中文公布之日起6个月内，向香港知识产权署办理记录请求手续", "C": "该申请已由国际局以中文公布的，自国家知识产权局国录请求手续", "D": "自该申请由国家知识产权局授予专利权之日起6个月内向香港知识产权署办理注册与批予请求手续"}, answer: "ABD", explanation: "A选项，根据《审查指南》 第四部分第四章第5.3节的规定，在口审 阶段，请求人可以放弃无效宣告请求的 部分理由及相应证据，因此A选项正确。 B选项，根据（审查指富》第四部分第三 章第2.2节的规定，在无效宣告程序中、 当事人有权自行与对方和解、因此B选 项正确。C选项，根据《审查指南》第四 部分第三章第2.2节的规定，专利权人针 对请求人提出的无效宣告请求主动缩小 专利权保护范围且相应的修改文本已被 合议组接受的，视为专利权人承认大于 该保护范图的权利要求自始无效，因此 C选项错误。D选项，根据《审查指南》 第四部分第三章第2.2节的规定，专利权 人声明放弃部分权利要求的，视为专利 权人承认该项权利要求自始无效，并且 承认请求人对该项权利要求的无效宣告 请求，因此D选项正确。（2014) 3。AB。A、B选项，《审查指南》第四 部分第一章第2节规定：“复审请求审查 程序（简称复审程序）和无效宣告请求审 查程序（简称无效宣告程序）中普遍适用 的原则包括：合法原则、公正执法原则、 请求原则、依职权审查原则、听证原则和 公开原则”；《审查指南》第四部分第三章 第2节规定：“在无效宣告程序中，除总 则规定的原则外，还应当遵循一事不再 理原则、当事人处置原则和保密原则”。 因此A、B选项正确。C、D选项，程序节 约原则属于初审程序、实审程序中的审 查原则，禁反言原则通常应用于专利侵 权案件，因此C、D选项错误。（2019）"},
  {id: 438, topic: "专题十八 专利申请中的手续事宜", type: "single", question: "李某于2019年5月16日向国家知识产权局提交了一件发明专利申请，该申请于2020年6月15日公开，并于2021年8月16日公告授予专利权。李某拟就该发明获得香港标准专利的保护，应当如何办理手续？", options: {"A": "自2021年8月16日起6个月内向香港知识产权署办理注册与批予请求手续费", "B": "自2019年5月16日起6个月内向香港知识产权署办理记录请求手续", "C": "自2020年6月15日起6个月内向香港知识产权署办理记录请求手续", "D": "自2021年7月1日起6个月内向香港知识产权署办理注册与批予请求手续复审无效总则及复审程序"}, answer: "A", explanation: "《细则》第70条第2款规定： “在国务院专利行政部门就无效宣告请 求作出决定之后，又以同样的理由和证 据请求无效宣告的，国务院专利行政部 门不予受理”。A选项属于同样的理由 和证据再次提出无效宣告请求，不予受 理。B、C、D选项均引入了新的理由或 证据，可以受理。（新编）"},
  {id: 439, topic: "专题十九 复审无效总则及复审程序", type: "single", question: "以下关于复审和无效的审查原则,说法正确的有：", options: {"A": "请求原则,复审和无效审理部只能对请求人提出的由和证据进行审查", "B": "依职权审查原则,复审和无效审理部可以对所审查的案件依职权进行审查,而不受当事人请求的范围和提出的由、证据的限制", "C": "公开原则，各种案件的口头审理应当公开举行.审查决定应当公开", "D": "请求原则,复审程序和无效宣告程序只能基于当事人的请求启动"}, answer: "B", explanation: "A、B、D选项，《审查指南》第 四部分第三章第3.1节规定：“无效宣告 请求的客体应当是已经公告授权的专 利，包括已经终止或者放弃（自申请日起 放弃的除外）的专利”，因此A、D选项可 以受理。B选项，根据《审查指南》第四 部分第三章第3.2节的规定，无效宣告请 求的提出并非请求人真实意思表示的， 不予受理。C选项，请求宣告无效的专 利因专利权属纠纷被中止不影响无效宣 告请求的受理。（2013改编）"},
  {id: 440, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "关于复审程序中的请求原则，下列说法正确的是？", options: {"A": "复审程序应基于当事人的请求启动", "B": "请求人在复审和无效审理部作出复审请求审查决定前撤回其请求的，复审程序终止", "C": "请求人撤回其请求的，复审程序终止，但是复审和无效除外", "D": "请求人在审查决定已经发出后撤回请求的，不影响审查决定的有效性"}, answer: "BCD", explanation: "A选项，申请专利未遵循 诚实信用原则（不符合细则第11条的规 定）属于规定的无效宣告理由。予以受 理。B选项，对尚未授权的专利申请提 出无效宣告请求，不予受理。C选项，缺 少条件，无效宣告请求人还应当提交证 据，证明其是在先权利人或者利害关系 人，因此C选项当选。D选项，说明书对 现有技术的描述不准确（不符合细则第 20条的规定）。不属于规定的无效宣告 理由，不子受理。（新编）"},
  {id: 441, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "对于专利复审无效的合议审查以下说法正确的有：", options: {"A": "对于简单的案件，可以由一人独任审查，不需要组成合-159 -议组", "B": "如果案件在国内外有重大影响，当事人可以请求成立五人合议组", "C": "对于法院撤销后重新审查的案件，一律应当重新成立合议组", "D": "涉及重要疑难法律问题的案件，国务院专利行政部门可以决定成立五人合议组"}, answer: "ACD", explanation: "A选项，美国某公司驻中 国代表处不具备民事诉讼主体资格；C 选项，专利权人可以针对自已的专利权 提出无效宣告请求，但不能请求宣告全 部无效；D选项，专利权人对自己的专利 提出无效宣告请求的，如果有多个专利 权人，必须所有专利权人共同作为请求 人、因此A、C、D选项正确。B选项中刘 某属于在先权利人，可以作为无效宣告 的请求人。（2011改编）"},
  {id: 442, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "针对甲的发明专利权A，乙提出无效宣告请求，下列哪些情形合议组成员应当自行回避或者当事人有权利请求其回避？", options: {"A": "合议组主审员是乙的近亲属", "B": "合议组参审员是该发明专利权A在实质审查阶段的审查员", "C": "合议组在乙请求宣告甲的另一项发明专利权B无效的案件中担任主审员，且该案审查结论是维持专利权B有效", "D": "合议组在乙针对该发明专利权A的第一次无效宣告请求案中担任主审员，且该第一次无效宣告案件的审查结论是维持专利权A有效"}, answer: "BC", explanation: "A选项，一件无效宣告请求 通常只能有一个请求人，因此A选项错 误。B选项，申和乙应分别作为请求人 各自单独提出无效宣告请求，但可以委 托同一家专利代理机构，B选项正确。 C、D选项、任何单位和个人均有权提出 无效宣告请求，因此C选项正确，D选项 错误。（2016)"},
  {id: 443, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "甲对一项专利权提出了无效宣告请求，下列哪些情形中合议组成员应当回避：", options: {"A": "合议组曾对该专利权做出过专利权评价报告", "B": "参审员是专利权人委托的专利代理师的养子", "C": "主审员审查过该专利并对其发出授予专利权通知书", "D": "专利权人是参审员的在职研究生导师"}, answer: "ACD", explanation: "A、C、D选项，在发明或实 用新型专利获得授权之后可以对其提出 无效宣告请求，即使该实用新型、发明专 利权已经被放弃，也应予以受理，因此 A、C、D选项正确。B选项，在发明专利 获得授权之前提出无效宣告请求，不予 受理。（新编）"},
  {id: 444, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "关于复审和无效宣告请求审查决定的公开，下列说法正确的是？", options: {"A": "复审请求审查决定的正文，应当全部公开", "B": "外观设计无效宣告请求审查决定的正文，应当全部公开", "C": "只有生效的复审和无效宣告请求审查决定的正文公开", "D": "未生效的复审和无效宣告请求审查决定的正文也会-160 -公开"}, answer: "ACD", explanation: "A选项，针对已被宣告无 效的专利权提出的无效宣告请求不予受 理，因此A选项正确。B选项，无效宣告 请求的客体应当是已经公告授权的专 利，包括已经终止或者放弃（自申请日起 放弃的除外）的专利，因此B选项错误。 C选项更换了新的证据，应当被受理；D 选项以同样的理由和证据再次提出无效 宣告请求，不应当被受理，因此C、D选 项正确。（2014改编）"},
  {id: 445, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "下列关于复审程序的说法哪些是正确的？", options: {"A": "复审程序是专利审批程序的延续", "B": "复审阶段不必对专利申请进行全面审查", "C": "专利审查部门的前置审查不是复审程序的必经程序", "D": "对复审程序中作出的决定不服的，均不能申请行政复议"}, answer: "AB", explanation: "本题中，权利要求1、2已 被宣告无效，因此A选项不予受理正确。 B、C、D选项，权利要求3相对于对比文 件1和对比文件2的结合不具备创造性 的理由已被生效决定维持有效，因此B 选项属于一事不再理，不予受理。C选 项增加了新的证据、D选项提出了新的 理由，均予以受理。（2015)"},
  {id: 446, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "下列关于专利复审程序的说法哪些是正确的？", options: {"A": "对不予受理专利申请的决定不服的，可以提出复审请求", "B": "对驳回专利申请的决定不服的，可以提出复审请求", "C": "复审和无效审理部可以对所审查的案件依职权进行审查，而不受当事人请求的范围和提出的由、证据的限制", "D": "复审和无效审理部可以直接作出驳回复审请求的复审决定，无需给予当事人陈述意见的机会"}, answer: "ACD", explanation: "A选项，证据A1因未能 提供原件而未被在先的审查决定所考 虑，则再次提供A1原件不属于一事不再 理，因此A选项予以受理。B选项，以对 比文件D1、D2作为证据证明不具备创 造性，已经过审查并维持有效，属于一事 不再理，因此不予受理。C、D选项均提 出了新的证据D3，不属于一事不再理， 予以受理。注意，证据A1是证明A2真 实性的证据，不是两个对比文件组合评 价新颖性。（2016) 13，BC。根据《细则》第69条第2款 的规定，不符合专利法第22条第2款（新 颖性）、第22条第3款（创造性）均属于无 效宣告请求的理由，因此B、C选项正确。 不具有单一性和未区分前序部分和特征 部分均不属于无效宣告理由，因此A、D 选项错误。（2013） 14，B。根据《审查指南》第四部分 第三章第3.3节（2）的规定。无效宣告理 由仅限于专利法实施约则第69条第2款 规定的理由，因此B选项正确。（2017） 15，D。《审查指南》第四部分第三章 第3.6节规定：“（1)·*在无效宣告程序 中，即使专利权人此前已就其专利委托 了在专利权有效期内的全程代理并继续 委托该全程代理的机构的，也应当提交 无效宣告程序授权委托书。A选项】（2） 在无效宣告程序中，请求人委托专利代 理机构的，或者专利权人委托专利代理 机构且委托书中写明其委托权限仅限于 办理无效宣告程序有关事务的，其委托 手续或者解除、辞去委托的手续应当在 复审和无效审理部办理，无需办理著录 项目变更手续【C选项】。（3)请求人和专 利权人委托了相同的专利代理机构的、 复审和无效审理部应当通知双方当事人 在指定期限内变更委托：【B选项】… （5）同一当事人与多个专利代理机构同 时存在委托关系的，当事人应当以书面 方式指定其中一个专利代理机构作为收 件人；未指定的、复审和无效审理部将在 无效宣告程序中最先委托的专利代理机 构视为收件人[D选项】”，因此A、B、C选 项错误，D选项正确。（2016改编）"},
  {id: 447, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "某件被驳回的发明专利申请，申请人为甲、乙，发明人为丙、丁。下列哪个复审请求应当被受理？", options: {"A": "甲和乙中任何一人或者其二者共同提出的复审请求", "B": "丙和丁中任何一个或者其二者共同提出的复审请求", "C": "甲和乙共同提出的复审请求", "D": "甲、乙、丙、丁共同提出的复审请求"}, answer: "AD", explanation: "根据《审查指南》第四部 分第三章第3.6节的规定，当事人可以委 托其近亲属或者工作人员，但应当提交 劳动合同、社保缴费记录等足以证明与 委托人有合法人事关系的证明材料，因 此A选项说法正确。B选项，张某弟弟 只获得资格证，尚未执业备案，属于公民 代理，除授权书之外，应当提交户口簿等 与委托人身份关系的证明，因此B选项 错误。C选项，代理人为有关社会团体 推荐的公民的，参照人民法院民事诉讼 中的相关规定办理，提交相应证明文件， 不需要提交委托代理协议，C选项错误。 D选项，律师经中华全国律师协会推荐， 可以作公民代理，且权限仅限于在口头 审理中陈述意见和接收当庭转送的文 件，D选项正确。（新编）"},
  {id: 448, topic: "专题十九 复审无效总则及复审程序", type: "single", question: "下列关于复审请求的说法哪些是正确的？", options: {"A": "复审请求人不是被驳回申请的申请人的，复审和无效审理部将不予受理复审请求", "B": "在收到国家知识产权局作出的驳回决定之日起三个月后，专利申请人向复审和无效审理部提出复审请求的，复审请求将一律不予受理", "C": "被驳回的申请有两个以上申请人的，如果复审请求人不是全部申请人，复审和无效审理部将发出补正通知书", "D": "复审请求人提交的复审请求书中未附具证据的，复审和无效审理部将通知复审请求人在指定期限内补正"}, answer: "A", explanation: "《审查指南》第四部分第三章 第3.6节（7)规定：“对于下列事项，代理 人需要具有特别授权的委托书：（i)专利 权人的代理人代为承认请求人的无效宣 告请求；（i)专利权人的代理人代为修 改权利要求书；（ii)代理人代为和解； (iv)请求人的代理人代为撤回无效宣告 请求”，因此A选项正确，B、C、D选项无 需特别授权。（2016)"},
  {id: 449, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "国家知识产权局于2024年3月1日通过电子发文向张某发出了驳回其专利申请的决定。张某不服该驳回决定欲提出复审请求，下列做法哪些是符合相关规定的？", options: {"A": "在2024年6月1日提出复审请求，并同时缴足复审费", "B": "在2024年6月16日提出复审请求，并同时缴足复审费", "C": "在2024年5月1日提出复审请求，并在2024年6月1日缴足复审费", "D": "在2024年6月1日提出复审请求，并在2024年6月20日缴足复审费"}, answer: "ABCD", explanation: "A、B选项属于代为修 改权利要求书，C选项属于代为和解，D 选项属于代为撤回，均需要具有特别授 权的委托书，因此A、B、C、D选项正确。 (2018)"},
  {id: 450, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "下列关于复审请求受理的说法哪些是正确的？", options: {"A": "请求人在收到驳回决定三个月后提出复审请求的，复审和无效审理部将发出复审请求不予受理通知书", "B": "复审请求书不符合规定格式的，复审和无效审理部将发出复审请求视为未提出通知书", "C": "复审请求经形式审查符合相关规定的，复审和无效审理部将发出复审请求受理通知书", "D": "复审请求人是在中国没有经常居所的外国人且未委托专利代理机构的，复审和无效审理部将发出复审请求不予受理通知书"}, answer: "BD", explanation: "根据《审查指南》第四部 分第三章第3.6节（6)的规定，当事人委 托公民代理的，公民代理的权限仅限于 在口头审理中陈述意见和接收当庭转送 的文件。本题中，乙属于公民代理，只能 在口审中陈述意见，接收转送文件，因此 B、D选项正确。（新编）"},
  {id: 451, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "王某对国家知识产权局驳回其发明专利申请的决定不服，请求复审。下列说法正确的是？", options: {"A": "延误复审请求期限的，可以自复审请求期限届满之日起2个月内向国务院专利行政部门请求恢复权利", "B": "王某可以请求延长提出复审请求的期限", "C": "在复审程序中，王某不得请求延长答复审查意见的期限", "D": "王某在收到驳回决定之日起3个月内未缴纳或者未缴足复审费的，其复审请求视为未提出"}, answer: "ABD", explanation: ".。《审查指南》第四部分第 三章第3.7节规定：“当事人提出中止程 序请求，但专利权无效宣告程序未中止 审理的，专利权权属纠纷的当事人可以 请求参加无效宣告程序。专利权权属纠 纷的当事人请求参加无效宣告程序的， 应当提交参加无效宣告程序的请求书， 以及权属纠纷已被人民法院或者地方知 识产权管理部门受理的证明文件【A、B 选项】。……在无效宣告程序中，权属纠 纷当事人可以提出意见，供合议组审理 无效宣告案件时参考【D选项】”，因此 A、B、D选项正确。权属纠纷当事人参 加无效审查程序只是发表意见，并不能 拥有专利权人的权利，因此C选项错误。 （新编）"},
  {id: 452, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "国家知识产权局于2024年2月6日通过电子发文向张某发出了驳回其专利申请的决定，如张某不服驳回决定欲提出复审请求，下列做法哪些是正确的？", options: {"A": "在2024年6月7日提出复审请求，6月14日收到不予受理通知书，7月5日提出恢复请求，7月7日缴纳复审费和恢复权利请求费，说明没有在规定期限内提出复审请求的正当理由", "B": "在2024年7月6日提出复审请求，并同时提交恢复权利请求书，缴足复审费和恢复权利请求费，说明没有在规定期限内提出复审请求的正当理由", "C": "在2024年6月6日提出复审请求，并同时缴纳复审费，7月2日收到不予受理通知书，7月20日提出恢复请求，同时缴纳恢复权利请求费，说明没有在规定期限内提出复审请求的正当理由", "D": "在2024年5月20日提出复审请求，5月21日缴纳复审费，在2024年6月2日收到不予受理通知书，7月5日提出恢复请求，说明没有在规定期限内提出复审请求的正当理由，7月6日缴纳恢复权利请求费"}, answer: "ABCD", explanation: "《审查指南》第四部分第 三章第3.8节规定：“·（3）无效宣告请 求经形式审查符合专利法及其实施细则 和审查指南有关规定的，复审和无效审 理部应当向请求人和专利权人发出无效 宣告请求受理通知书…（4）受理的无 效宣告请求涉及在先作出的无效宣告请 求审查决定而暂时无法审查的，复审和 无效审理部应当发出通知书通知请求人 和专利权人；待影响因素消除后，应当及 时恢复审查。（5)受理的无效宣告请求涉 及专利侵权案件的，复审和无效审理部 可以应人民法院、地方知识产权管理部 门或者当事人的请求，向处理该专利侵 权案件的人民法院或者地方知识产权管 理部门发出无效宣告请求案件审查状态 通知书。（6)受理的无效宣告请求涉及权 属纠纷的，复审和无效审理部应当向被 准予参加无效宣告程序的权属纠纷当事 人发出无效宣告请求案件审查状态通知 书”，因此A、B、C、D选项均正确。（新编） 22、ABCD。《审查指南》第四部分第 三章第4.1节规定：“（1)专利权的取得明 显违背诚实信用原则的，合议组可以引 入细则第11条的无效宣告理由进行审 查………（3）专利权存在请求人未提及的 明显不属于专利保护客体的缺陷，合议 组可以引入相关的无效宣告理由进行审 查。（4)无效宣告理由为独立权利要 求1不具备创造性，但该权利要求因不 清楚而无法确定其保护范围，从而不存 在审查创造性的基础的情形下，合议组 可以引入涉及专利法第26条第4款的无 效宣告理由并进行审查。（5）请求人 以权利要求1不具备新颖性、从属权利 要求2不具备创造性为由请求宣告专利 权无效，如果合议组认定权利要求1具 备新颖性，而从属权利要求2不具备创 造性，则可以依职权对权利要求1的创 造性进行审查”，因此A、B、C、D选项正 确。（新编）"},
  {id: 453, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "国务院规定2024年10月1日至10月7日放假，9月28日（星期六）和9月29日（星期日）上班，李某以个人名义于2023年7月17日首次通过电子形式向国家知识产权局申请一件发明专利申请X，并收到发文日为2024年6月28日的驳回决定，下列哪些情形将不予受理：", options: {"A": "李某未提出复审请求，于2024年9月28日以申请X为基础提出一件实用新型专利申请作为分案申请", "B": "李某于2024年10月9日提出复审请求", "C": "李某于2024年9月30日提出复审请求，又于2024年10月8日以申请X为基础提出一件发明专利申请作为分案申请", "D": "李某就职的甲公司于2024年9月27日提出复审请求"}, answer: "AC", explanation: "《审查指南》第四部分第三 章第4.3.1节规定：“（1)请求人在提出无 效宣告请求之日起1个月内补充证据 的，应当在该期限内结合该证据具体说 明相关的无效宣告理由，否则，合议组不 予考虑.……（3）请求人提交的证据是外 文的，提交其中文译文的期限适用该证 据的举证期限”，因此日本专利文献及译 文均适用1个月的举证期限，应当在 2024年4月4日前提交，A、C选项正确。 （新编）"},
  {id: 454, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "甲委托乙专利代理机构办理申请专利有关事宜，现其申请被驳回，拟委托丙专利代理机构提出复审请求。下列说法哪些是正确的？", options: {"A": "若甲未在提出复审请求同时缴足复审费，则其复审请求视为未提出", "B": "若甲委托专利代理机构丙仅为其办理复审程序有关事务，则应当向复审和无效审查部提交专利代理委托书，无需办理著录项目变更手续", "C": "甲在复审和无效审理部办理委托内的手续，委托书中应写明委托权限仅限于办理复审程序有关事务", "D": "若甲与多个专利代理机构同时存在委托关系，则应当以书面方式指定其中一个专利代理机构作为收件人"}, answer: "ABCD", explanation: "专利权人删除式修改 后，无效宣告请求人没有补充理由、补充 证据的机会，因此A、B、C、D选项均不予 考虑。（新编）"},
  {id: 455, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "复审请求的合议审查中，下列说法正确的是？", options: {"A": "在复审程序中，除驳回决定所依据的由和证据外，合议组发现审查文本中存在其他明显实质性缺陷的，可以依职权对与之相关的由及其证据进行审查", "B": "在复审程序中，合议组只能针对驳回决定所依据的由和证据进行审查", "C": "在合议审查中，合议组可以补充相应的技术辞典、技术手册、教科书等所属技术领域中的公知常识性证据", "D": "为了保证授权专利的质量，合议组可以引入新的对比文件，并告知申请人对此陈述意见"}, answer: "AD", explanation: "A选项，请求人未对所增 加的无效宣告理由具体说明，合议组不 予考虑。B、C选项，对明显与提交的证 据不相对应的无效宣告理由进行变更、 公知常识举证不受1个月举证期限的限 制，因此B、C选项应当予以考虑。D选 项，提交其中文译文的期限适用证据的 举证期限，王某提交中文译文的时间超 出1个月期限，因此D选项的中文译文 不予考虑。（新编）"},
  {id: 456, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "复审请求的合议审查中，下列做法正确的是？", options: {"A": "驳回决定的由为权利要求1-3不具有创造性，但合议组指出该申请不是以真实发明创造活动为基础", "B": "驳回决定的由为权利要求1相对对比文件1、2的组合不具备创造性，合议组将最接近的现有技术改为对比文件2", "C": "驳回决定的由为权利要求1对技术方案的某处限定导致其工作原理不清楚，不符合专利法第26条第4款的规定，但合议组认为上述问题的根源在于说明书缺乏解决技术问题的技术手段，合议组指出该申请不符合专利法第26条第3款的规定", "D": "驳回决定的由为权利要求1-3不具有创造性，但合议组经审查后认为，驳回决定依据的对比文件不足以破坏权利要求的创造性，于是补充检索之后，以补充的对比文件为依据指出权利要求1-3不具有创造性"}, answer: "CD", explanation: "A选项，虽然本题中未给 出无效宣告请求时间，但即使外文证据 的提交符合规定期限，该证据的中文译 文也一定会超出了提出无效宣告请求之 日起1个月的期限，因此不予接受。B、 C、D选项，用于完善证据法定形式的公 证文书和证据的原件可以在口头审理辩 论终结前提交，因此C、D选项的提交应 当予以接受，B选项中作为公知常识性 证据的期刊应在口头审理辩论终结前提 交，因此B选项不当选。（新编）"},
  {id: 457, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "复审请求人在复审程序中何时可以对申请文件进行修改？", options: {"A": "提出复审请求", "B": "答复复审通知书", "C": "参加口头审理", "D": "在复审程序中的任意时间"}, answer: "BCD", explanation: "A选项，由于专利权人进 行了删除式修改，因此请求人新增无效 宣告理由不予考虑、A选项不允许。B 选项，针对专利权人提交的反证，请求人 可以在合议组指定的期限内补充证据。 且不受1个月的限制；C、D选项做法均 符合规定，提交公知常识性证据、不对应 的无效理由变更不受I个月的限制。 （2014改编）"},
  {id: 458, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "甲提出一项发明专利申请，其权利要求书包括独立权利要求1及其从属权利要求2-6。国家知识产权局以独立权利要求1相对于对比文件1和2的结合缺乏创造性为由驳回了该专利申请。甲不服,就此提出复审请求,下列做法不能被允许的是?", options: {"A": "删除独立权利要求1", "B": "用从属权利要求2的部分特征进一步限定独立权利要求1,并在从属权利要求2中删除相应的特征", "C": "将独立权利要求1由产品权利要求改为专用于制造该产品的方法权利要求", "D": "只陈述独立权利要求1相对于对比文件1和2的结合具备创造性的由"}, answer: "ACD", explanation: "A选项的台湾专利文载 提交时间在1个月期限内，符合规定，因 此予以考虑。B选项，韩国专业杂志文 截及其译文提交时间超出1个月期限， 且不属于公知常识性证据，因此不予考 虑。C选项在口审时提交的证据属于公 知常识性证据和用于完善证据法定形式 的公证文书，应当予以考虑。D选项的 证据提交时间符合规定，应当予以考虑。 (2015)"},
  {id: 459, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "复审请求人甲在复审程序中对申请文件进行了修改，下列哪个修改符合相关规定？", options: {"A": "驳回理由是权利要求1不具备创造性，甲对权利要求进行修改时将权利要求1的类型由方法修改为产品", "B": "驳回理由是权利要求1得不到说明书支持，甲对权利要求进行修改时增加了一项从属权利要求", "C": "驳回理由是权利要求1不具备创造性，甲对权利要求进行修改时将权利要求1中的一个技术特征删除", "D": "驳回理由是权利要求1缺少必要技术特征，甲对权利要求进行修改时将说明书中相应技术方案的特征补人到权利要求1中"}, answer: "ABC", explanation: "A、B选项，赵某应于 2024年4月14日前增加理由或补充证 据，但该日是星期日，可以延长至2024 年4月15日（星期一），因此A选项应当 予以考虑；由于专利权人进行了删除之 外的修改，赵某于1个月后针对修改内 容增加的无效宣告理由及该理由的具体 说明符合规定，因此B选项应当予以考 虑。C选项补充的证据属于用于完善证 据法定形式的公证文书证据，符合举证 期限要求，因此C选项应当予以考虑；D 选项补充的专利文献中文译文应当在请 求日起1个月内提交，因此D选项不予 考虑。（2018改编）"},
  {id: 460, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "陈某拥有一项发明专利申请，其中权利要求1及其从属权利要求2涉及一种转笔刀，权利要求3为另一项产品独立权利要求，涉及一种铅笔。实质审查过程中，审查员指出独立权利要求1和3之间缺乏单一性，陈某在答复时删除了权利要求3。最终该申请因权利要求1不具备创造性被驳回。陈某在提出复审请求时对权利要求书进行了修改。下列哪些修改方式符合相关规定？", options: {"A": "根据说明书中的实施例进一步限定权利要求1，即将说明书中记载的某技术特征补人权利要求1", "B": "删除权利要求1，将从属权利要求2作为新的权利要求1", "C": "将权利要求1-2修改为制作转笔刀方法的权利要求", "D": "删除权利要求1-2，将原权利要求3作为新的权利要求1"}, answer: "ABD", explanation: "A、B选项，请求人在提 出无效宣告请求时及在其后的1个月内 没有就证据X1具体说明相关无效宣告 理由，也没有对无效宣告理由Y2进行具 体说明，因此对X1和Y2均不予考虑，A、 B选项正确。C选项，虽然请求人未就无 效宣告理由Y4提交任何证据，但请求人 就Y4的无效宣告理由进行了说明，因此 应当对无效宣告理由Y4予以考虑，C选 项错误。D选项，由于请求人主张证据 X2可用于支持无效宣告理由Y4是在口 审过程中提出的，该主张已超出了自提 出无效宣告请求之日起1个月的期限， 因此不予考虑，D选项正确。（新编）"},
  {id: 461, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "某专利申请由于权利要求1不具备创造性而被驳回，且该申请仅有一项权利要求，申请人提出复审请求时欲对权利要求书进行修改。下列哪种修改方式可被接受？", options: {"A": "权利要求1不变，增加从属权利要求2，权利要求2未超出原权利要求书和说明书记载的范围", "B": "对权利要求1进行了修改，修改后的权利要求1相对于驳回决定针对的权利要求1扩大了保护范围，但并未超出原说明书记载的范围", "C": "对权利要求1进行进一步限定，新增加了说明书的某一技术特征，未超出原说明书记载的范围", "D": "为消除不具备创造性的缺陷，将原产品类权利要求1修改为方法类权利要求，修改内容未超出原说明书记载的范围"}, answer: "AC", explanation: "A、C选项删除权利要求属 于无效宣告程序中允许的修改。B选 项，重新划分前序部分与特征部分不属 于无效宣告程序中允许修改的方式。D 选项，无效宣告程序中不能修改说明书， D选项不被允许。（2016改编）"},
  {id: 462, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "针对李某的一件发明专利申请，国家知识产权局以独立权利要求1相对于对比文件1和公知常识的结合缺乏创造性为由驳回了该专利申请。李某随后提出复审请求，下列做法不能被允许的是：", options: {"A": "将权利要求1中的“散热材料为铝”修改为说明书中记载的“散热材料可以是金属”", "B": "详细陈述权利要求1与对比文件1的区别技术特征不属于公知常识C，将权利要求1的主题“一种散热装置”修改为“一种制造散热装置的方法”D：将从属权利要求2的附加技术特征加人到独立权利要求1中", "C": "将权利要求1的主题一种散热装置修改为一种制造散热装置的方法", "D": "将从属权利要求2的附加技术特征加入到独立权利要求1中"}, answer: "AC", explanation: "A、C选项，《审查指南》第 四部分第三章第4.6.2节规定：“修改权 利要求书的具体方式一般限于权利要求 的删除、技术方案的删除、权利要求的进 一步限定、明显错误的修正”。A选项的 删除技术方案、C选项的用权利要求2、3 的附加技术特征对权利要求1进一步限 定，属于无效宣告程序中允许的修改方 式。B选项，根据《审查指南》第四部分 第三章第4.6.1节的规定，发明或者实用 新型专利文件的修改仅限于权利要求 书，因此B选项修改说明书中的发明名 称属于无效宣告程序中不允许的修改方 式。D选项，增加未记载在原说明书和 权利要求书中的特征P，修改超范围，因 此D选项的修改是不允许的。（2013）"},
  {id: 463, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "针对陈某提出的一项发明专利申请，国家知识产权局以权利要求1相对于对比文件1与公知常识的结合不具备创造性为由作出了驳回决定，陈某对驳回决定不服，提出复审请求。下列说法哪些是正确的？", options: {"A": "陈某在提出复审请求时，可以结合证据说明权利要求1相对于对比文件1与公知常识的结合具备创造性", "B": "陈某在提出复审请求时，可以对独立权利要求2进行修改，以克服权利要求2没有得到说明书支持的缺陷", "C": "合议组在合议审查中可以引人技术辞典作为公知常识证据", "D": "合议组认为权利要求1还存在不清楚的缺陷，拟以此为理由驳回复审请求的，应当发出复审通知书或者进行口头审理"}, answer: "ABCD", explanation: "A、B、C选项均为进一 步限定式的修改方式，且符合修改时间 的规定，因此A、B、C选项属于允许的修 改。D选项的修改方式为删除权利要求 1和2，在口头审理辩论终结前可以通过 删除方式修改权利要求书，因此D选项 属于允许的修改。（2014改编）"},
  {id: 464, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "申请人李某的发明专利申请因不具备创造性被驳回，李某不服该驳回决定，随即提出了复审请求，关于复审合议审查下列哪些说法是正确的？", options: {"A": "如果李某提出复审请求时未修改专利申请文件，合议组经审查后认为该发明不具备创造性，则可以直接做出驳回复审请求的复审决定", "B": "如果李某提出复审请求时提交的申请文件修改内容超出了原始说明书和权利要求书的记载范围，则合议组可以依职权对该缺陷进行审查并向李某发出复审通知书", "C": "如果经审查认定该发明明显是永动机，合议组最终可以以发明不具备实用性为由驳回复审请求", "D": "如果经审查认定该发明明显是永动机,合议组将直接撤销驳回决定，发回原审查部门重新审理"}, answer: "BCD", explanation: "A选项，请求人在提出无 效宣告请求之日起1个月后补充证据， 不予考虑，因此针对A选项，乙无修改机 会。B选项符合时机，且缺少必要技术 特征的无效宣告请求理由不需要补充证 据。C、D选项符合时机，乙可以对权利 要求作出进一步限定。（2015改编）"},
  {id: 465, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "国家知识产权局以李某的发明专利申请权利要求1不具备实用性为由驳回了该申请。李某提出复审请求，同时提交了权利要求书修改替换页。合议组在复审通知书中指出：(1)修改后的权利要求书超出了原始申请文件记载的范围；(2)驳回决定所针对的权利要求1不具备实用性。下列说法哪些是正确的？", options: {"A": "若李某未对申请文件作进一步修改，则复审和无效审理部可以以该修政超范围为由驳回复审请求", "B": "若李某未对申请文件作进一步修改，则复审和无效审理部可以以权利要求1不具备实用性为由驳回复审请求", "C": "若李某对申请文件作一步修改并克服了修改超范围的缺陷，则复审和无效审理部应当对修改后的权利要求书是否具备实用性进行审查", "D": "若李某对申请文件作进一步修改并克服了修改超范围的缺陷，则复审和无效审理部应当撤销驳回决定"}, answer: "CD", explanation: "A选项中日本专利文献的 提交日期超出了1个月的期限，不予考 虑，乙也无机会进行修改，因此A选项错 误。C选项符合举证期限的规定，乙可 以作出进一步限缩性修改，因此C选项 正确。B选项，根据《审查指南》第四部 分第三章第4.6.1节的规定，在无效宣告 程序中，发明或者实用新型专利文件的 修改仅限于权利要求书，不能修改说明 书，因此B选项错误。D选项，在审查决 定作出之前，包括口审过程中，专利权人 可以删除权利要求，因此D选项正确。 （2018改编）"},
  {id: 466, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "国家知识产权局对李某的药物化合物发明专利申请予以驳回，理由是该化合物相对于对比文件1和2的结合不具备创造性。李某提出复审请求。复审和无效审理部经合议组审理后向李某发出复审通知书。下列说法哪些是正确的？", options: {"A": "复审通知书应当对发明专利申请的创造性进行评价", "B": "复审通知书中可以引入所属技术领域的公知常识", "C": "李某应当在收到复审通知书之日起一个月内进行书面答复", "D": "若合议组认为该申请的权利要求涉及疾病的治疗方法，可以在复审通知书中指出"}, answer: "AC", explanation: "A、C选项的修改均被允 许。B选项，在无效宣告程序中，发明或 者实用新型专利文件的修改仅限于权利 要求书，B选项错误。D选项，乙提交证 据的时间超出1个月期限，且不属于公 知常识性证据，不予考虑，甲不能以进一 步限定的方式修改权利要求，D选项错 误。（新编） 37、C。在本题中，无效宣告请求人 其后未补充证据及理由，专利权人只可 以删除权利要求，而不能以删除以外的 方式修改权利要求。A选项中用权利要 求3的附加技术特征对权利要求1进一 步限定、B选项中用权利要求4的附加技 术特征对权利要求2进一步限定，均属 于删除以外的修改方式，不被允许。C 选项中的修改方式属于删除权利要求， 是允许的修改方式。D选项中的修改是 在权利要求中增加了记载于说明书的技 术特征，不允许。（新编）"},
  {id: 467, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "在复审请求审查过程中，在下列哪些情形下，合议组应当发出复审通知书或进行口头审理？", options: {"A": "复审决定将驳回复审请求的", "B": "需要引人驳回决定未提出的由或者证据的", "C": "复审请求的由成立，将撤销驳回决定的", "D": "需要复审请求人进一步提供证据或者对有关问题予以阐明的"}, answer: "ABCD", explanation: "A选项，根据《审查指 南》第四部分第三章第4.6.3节的规定， 针对无效宣告请求书，专利权人可以以 删除以外的方式修改权利要求书，可以 对权利要求作进一步限定，因此A选项 正确。B选项，根据《审查指南》第四部 分第三章第4.3.2节的规定，专利权人应 当在指定的答复期限内提交证据，提交 的证据是外文的，提交其中文译文的期 限适用该证据的举证期限，因此B选项 正确。C选项，在无效宣告程序中，当事 人有权自行与对方和解，因此C选项正 确。D选项，在无效宣告程序中，专利权 人可以委托专利代理机构，并在指定的 答复期限内陈述意见，D选项正确。 （2015改编）"},
  {id: 468, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "国家知识产权局以权利要求（相对于对比文件1和公知常识的结合不具备创造性为由驳回了某申请、申请人提出了复审请求,复审和无效审理部成立合议组进行审查。在下列哪些情形下应当发出复审通知书或者进行口头审理？", options: {"A": "合议组认为复审请求人在提出复审请求时对权利要求1所作的修改超出原申请记载的范围", "B": "合议组经审查认定权利要求1相对于对比文件1不具备新颖性", "C": "合议组经审查认定权利要求1相对于对比文件1和公知常识的结合不具备创造性", "D": "合议组经审查认定驳回理由不成立"}, answer: "AC", explanation: "根据《审查指南》第四部 分第三章第5节的规定，一项专利被宣 告部分无效后，被宣告无效的部分应视 为自始即不存在。但是被维持的部分 （包括修改后的权利要求）也同时应视为 自始即存在。此处的“始”即为申请日。 因此A、C选项正确、B、D选项错误。 （新编）"},
  {id: 469, topic: "专题十九 复审无效总则及复审程序", type: "single", question: "以下哪些情形下，合议组将会作出撤销驳回决定的复审决定？", options: {"A": "驳回决定适用法律错误", "B": "驳回理由缺少必要的证据支持", "C": "驳回决定以申请人放弃的申请文本或者不要求保护的技术方案为依据", "D": "驳回决定没有评价申请人提交的与驳回理由有关的证据，以至可能影响公正审理"}, answer: "B", explanation: "一项专利被宣告部分无效 后，被宣告无效的部分应视为自始即不 存在。但是被维持的部分（包括修改后 的权利要求）也同时应视为自始即存在， 因此应以2023华11月20.日审查决定宣 告维持有效的权利要求书作为审理的基 础，B选项正确。（2018）"},
  {id: 470, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "下列哪些情形会导致复审程序终止？", options: {"A": "复审程序涉及的专利申请出现权属纠纷", "B": "复审请求人在指定期限内未对复审通知书进行答复而被视为撤回", "C": "复审请求人在指定期限内未提交口头审理通知书回执", "D": "复审请求人在复审和无效审理部作出复审决定前撤回复审请求"}, answer: "BC", explanation: "A、B选项，一项专利被宣 告部分无效后，被宣告无效的部分应视 为自始即不存在。但是被维持的部分 （包括修改后的权利要求）也同时应视为 自始即存在，此处的“始”即为申请日、因 此A选项错误，B选项正确。C、D选项， 《专利法》第47条第2款规定：“宣告专利 权无效的决定，对在宣告专利权无效前 人民法院作出并已执行的专利侵权的判 决、调解书，已经履行或者强制执行的专 利侵权纠纷处理决定，以及已经履行的 专利实施许可合同和专利权转让合同， 不具有追溯力.”，因此C选项正确、 D选项错误。（2019)"},
  {id: 471, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "针对复审案件，合议组于2024年2月7日发出撤销驳回决定的复审决定，下列说法中哪些是正确的？", options: {"A": "复审请求人可以在收到通知之日起三个月内向人民法-169 -院起诉", "B": "由于复审决定对复审请求人有利，复审请求人无权向人民法院起诉", "C": "复审请求人可以向国家知识产权局提出行政复议", "D": "对复审决定不服应当向北京知识产权法院提起诉讼"}, answer: "ABD", explanation: "A选项，美国公司属于涉 外主体，海牙国际申请在外观设计授权 过程中可能并未委托中国的专利代理机 构，但如果参加无效审理、应当委托中国 专利代理机构，A选项正确。B、C选项， 《审查指南》第四部分第三章第7节规 定：“在外观设计国际申请的无效宣告程 序中，对于在中国内地没有住所的专利 权人，可以采用电子邮件或者邮寄、传 真、公告等方式送达文件。采用公告送 达的，自公告之日起满1个月，视为已经 送达”，因此B选项正确，C选项错误。D 选项，根据《审查指南》第四部分第三章 第6.2节的规定，宣告专利权无效的审查 决定作出后，当事人未在收到该审查决 定之日起3个月内向人民法院起诉的， 由专利局予以登记和公告，因此D选项 正确。（新编）"},
  {id: 472, topic: "专题十九 复审无效总则及复审程序", type: "multiple", question: "在专利申请的复审程序中，可能需要缴纳的费用种类有：", options: {"A": "恢复权利请求费", "B": "专利登记费", "C": "复审费", "D": "延长期限请求费-170 -无效宣告请求审理程序"}, answer: "AD", explanation: "A选项，根据《审查指南》 第四部分第四章第5.3节的规定，无效宣 告程序中，专利权人可以放弃全部权利 要求，A选项正确。B选项，根据《审查 指南》第四部分第四章第5节的规定，口 头审理应当公开进行，但根据国家法律、 法规等规定需要保密的除外，因此B选 项错误。C选项，根据《审查指南》第四 部分第三章第8节的规定，请求人撤回 无效宣告请求的，合议组认为根据已进 行的审查工作能够作出宣告专利权无效 或者部分无效的不终止，因此C选项错 误。D选项，《审查指南》第四部分第一 章第2.4节规定：“复审和无效审理部可 以对所审查的案件依职权进行审查，而 不受当事人请求的范围和提出的理由、 证据的限制”，因此D选项正确。（新编）"},
  {id: 473, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "关于无效宣告程序，以下说法错误的是？", options: {"A": "无效宣告程序是专利公告授权之后方可请求启动的程序", "B": "无效宣告程序是依当事人请求而启动的程序", "C": "无效宣告程序必须是双方当事人参加的程序", "D": "宣告专利权无效的决定，由国家知识产权局登记和公告"}, answer: "CD", explanation: "A、C、D选项，《审查指南》 第四部分第三章第8节规定：“请求人在 合议组对无效宣告请求作出审查决定之 前，撤回其无效宣告请求的，无效宣告程 序终止，但合议组认为根据已进行的审 查工作能够作出宣告专利权无效或者部 分无效的决定的除外【A选项】··请求 人未在指定的期限内答复口头审理通知 书，并且不参加口头审理，其无效宣告请 求被视为撤回的，无效宣告程序终止，但 合议组认为根据已进行的审查工作能够 作出宣告专利权无效或者部分无效的决 定的除外【C选项】….已受理的无效宣 告请求因不符合受理条件而被驳回请求 的，无效宣告程序终止[D选项】”，因此 A选项错误，C、D选项正确。B选项，根 据《审查指南》第四部分第四章第3节的 规定，专利权人未提交口头审理回执，也 未参加口头审理的，可以缺席审理，因此 B选项不会导致无效宣告程序终止。 （新编）"},
  {id: 474, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "下列关于无效宣告程序的说法哪些是正确的？", options: {"A": "请求人在提出无效宣告请求时提出两项无效理由，在口头审理时可以放弃其中一项无效理由", "B": "当事人有权自行与对方和解", "C": "专利权人针对请求人提出的无效宣告请求主动缩小权利要求保护范围且相应的修改文本被合议组接受的，视为专利权人承认大于该保护范围的权利要求自提交修改之日起无效", "D": "专利权人声明放弃部分权利要求的，视为专利权人承认请求人对该项权利要求的无效宣告请求"}, answer: "AD", explanation: "A选项，根据《专利法》第 46条第2款的规定，对国务院专利行政 部门宣告专利权无效或者维持专利权的 决定不服的，可以自收到通知之日起3 个月内向人民法院起诉，北京知识产权 法院对上述案件具有管辖权，因此A选 项正确。B选项，根据《审查指南》第四 部分第三章第7节的规定，撤回无效宣 告请求应在作出无效宣告请求审查决定 之前，无效宣告决定做出后，不能撤回无 效宣告请求，因此B选项错误。C、D选 项，C选项属于一事不再理，不予受理，D 选项甲提出了新的证据3，应当予以受 理，因此C选项错误，D选项正确。 （新编）"},
  {id: 475, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "下列哪些是无效宣告程序中应当遵循的审查原则？", options: {"A": "公正执法原则、一事不再理原则", "B": "请求原则、当事人处置原则", "C": "程序节约原则、保密原则", "D": "合法原则、禁反言原则"}, answer: "ABCD", explanation: "根据《审查指南》第四 部分第六章第4节的规定，在实用新型 专利创造性的审查中，应当考虑其技术 方案中的所有技术特征，包括材料特征 和方法特征，因此A、B、C、D选项均正 确。（2012) 47、ABCD。A、B、C选项，根据《审 查指南》第四部分第三章第9.1节的规 定，仿制药申请人根据药品专利纠纷早 期解决机制有关规定提出第四类声明后 提出无效宣告请求的，应当在请求书中 明确标注，涉案专利为中国上市药品专 利信息登记平台上登记的专利权，请求 人为相应药品的仿制药申请人，且已经 提出第四类声明，并附具仿制药注册申 请受理通知书和第四类声明文件的副本 等相关证明文件。因此A、B、C选项正 确。D选项，根据《审查指南》第四部分 第三章第9.4节的规定，对于在无效宣告 请求审理开始之前曾通知有关人民法院 或者国务院药品监督管理部门的，审查 决定作出后，合议组应当将审查决定和 无效宣告审查结案通知书送达上述相关 部门，因此D选项正确。（新编，思维 扩展）"},
  {id: 476, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "某发明专利包括两项独立权利要求，张某对该专利提出无效宣告请求，认为权利要求1相对于对比文件1不具备新颖性，权利要求2相对于对比文件1和2的结合不具备创造性。经审查认定，张某的所有无效理由均不成立。在维持专利权有效的审查决定生效后，张某再次提出无效宣告请求。下列哪些情形属于不予受理的情形？", options: {"A": "主张权利要求1相对于对比文件1不具备新颖性", "B": "主张权利要求2缺少必要技术特征", "C": "主张权利要求1相对于对比文件1和2的结合不具备创造性", "D": "主张权利要求2得不到说明书的支持"}, answer: "AC", explanation: "A选项，根据《审查指南》 第四部分第七章第2.1节的规定，对同一 专利权人同日（仅指申请日）申请一项发 明和一项实用新型，在申请时分别说明 对同样的发明创造已申请另一专利的， 且发明专利权授予时实用新型专利权尚 未终止，在此情形下，专利权人可以通过 放弃授权在前的实用新型专利权以保留 被请求宣告无效的发明专利权，因此A 选项正确。B、C选项，《审查指南》第四 部分第七章第2.1节规定：“任何单位或 者个人认为属于同一专利权人的具有相 同申请日（有优先权的，指优先权日）的 两项专利权不符合专利法第9条第1款 的规定而请求宣告其中授权在前的专利 权无效的，在不存在其他无效宣告理由 或者其他理由不成立的情况下，合议组 应当维持该项专利权有效。【B选项】任 何单位或者个人认为属于同一专利权人 的具有相同申请日（有优先权的，指优先 权日）的两项专利权不符合专利法第9 条第1款的规定而请求宣告其中授权在 后的专利权无效的，合议组经审查后认 为构成同样的发明创造的，应当宣告该 项专利权无效【C选项】”，因此B选项错 误，C选项正确。D选项，由于两项专利 在同一天申请，即使发明专利由于提前 公开，使得公开日早于实用新型的授权 公告日，也不构成现有技术或抵触申请 的情形，因而张某提出的无效宣告理由 并不成立。（新编）"},
  {id: 477, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "针对下列哪个专利提出的无效宣告请求不予受理？", options: {"A": "请求宣告无效的专利因未缴纳年费而终止", "B": "无效宣告请求的提出并非请求人真实意思表示的", "C": "请求宣告无效的专利因专利权属纠纷被中正", "D": "请求宣告无效的专利因期满而终止"}, answer: "ABD", explanation: "A、B、D选项，《审查指 南》第四部分第七章第2.1节规定：“任何 单位或者个人认为属于同一专利权人的 具有相同申请日（有优先权的，指优先权 日）的两项专利权不符合专利法第9条 第1款的规定而请求宣告其中授权在前 的专利权无效的，在不存在其他无效宣 告理由或者其他理由不成立的情况下， 合议组应当维持该项专利权有效。【A选 项】任何单位或者个人认为属于同一专 利权人的具有相同申请日（有优先权的， 指优先权日）的两项专利权不符合专利 法第9条第1款的规定而请求宣告其中 授权在后的专利权无效的，合议组经审 查后认为构成同样的发明创造的，应当 宣告该项专利权无效。【B选项】如果上 述两项专利权为同一专利权人同日（仅 指申请日）申请的一项实用新型专利权 和一项发明专利权，专利权人在申请时 根据专利法实施细则第47条第2款的规 定作出过说明，且发明专利权授予时实 用新型专利权尚未终止，在此情形下，专 利权人可以通过放弃授权在前的实用新 型专利权以保留被请求宣告无效的发明 专利权【D选项】”，因此A、B、D选项正 确。C选项，《审查指南》并未规定在该 种情形下，合议组拥有自行选择一项专 利权宣告无效的权利，因此C选项错误。 （2018改编）"},
  {id: 478, topic: "专题二十 无效宣告请求审理程序", type: "single", question: "对下列哪些无效宣告请求不予受理？", options: {"A": "以申请专利未遵循诚实信用原则为由提出的无效宣告请求", "B": "对处于实质审查阶段的专利申请提出的无效宣告请求", "C": "以外观设计专利权与他人在申请日以前已经取得的合法权利相冲突为由请求宣告外观设计专利权无效，并已提交证明权利冲突的证据", "D": "以实用新型专利说明书对现有技术描述不准确为由提出的无效宣告请求"}, answer: "D", explanation: "A选项，根据《审查指南》第四部分第四 第2节的规定，复审请求人提出口头审理请求 ，合议组根据案件的具体情况决定是否进行口 审理，A选项错误。B选项、根据《审查指南》第 部分第四章第2节的规定，针对同一案件已经进 过口头审理的，必要时可以再次进行口头审理， 选项错误。C选项，根据《审查指南》第四部分第 章第3节的规定，复审请求人应当在收到口头审 通知指定的期限内提交回执明确表示是否参加 头审理，因此复审请求人可以选择参加或者不 加口头审理，C选项错误。D选项、口头审理包 线下审理、线上审理以及线下与线上审理相结 等方式，D选项正确。（2012改编）"},
  {id: 479, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "对下列哪些情形，应当发出无效宣告请求不予受理通知书？", options: {"A": "提出无效宣告请求的请求人为美国某公司驻中国代表处", "B": "刘某以某外观设计专利权与其在申请日前已经取得的著作权相冲突为由请求宣告该专利权无效", "C": "郭某针对自已拥有的专利权提出宣告专利权全部无效的请求", "D": "裴某和李某共有一项专利权，裴某单独对该专利权提出无效宣告请求"}, answer: "ABCD", explanation: "《审查指南》第四部分第四章第2节 定：“无效宣告程序的当事人可以依据下列理由 求进行口头审理：（1)当事人一方要求同对方口 质证和辨论。（2)需要向合议组口头说明事实。 ）需要实物演示。（4)需要请出具过证言的证人 庭作证.”，因此A、B、C、D选项均正确。 015)"},
  {id: 480, topic: "专题二十 无效宣告请求审理程序", type: "single", question: "专利权人刘某针对企业甲和乙向法院提起专利侵权民事诉讼，向企业丙发出专利侵权警告律师函。下列说法哪些是正确的？A：企业甲和乙可以共同作为请求人，针对刘某的专利权提出一件无效宣告请求", options: {"B": "企业甲和乙可以委托同一专利代理机构，为甲、乙分别办理无效宣告程序有关事务", "C": "企业丙可以针对刘某的专利权提出无效宣告请求", "D": "企业丁由于未被专利权人刘某提起专利侵权民事诉讼或发出专利侵权警告律师函，故企业丁不能针对刘某的专利权提出无效宣告请求", "A": ""}, answer: "D", explanation: "《审查指南》第四部分第四章第3节规 人，可以选择参加口头审理进行口头答辩，或者 指定的期限内进行书面意见陈述[B、C选 参加口头审理的每方当事人及其代理人 数量不得超过四人【D选项】·….当事人依照专 法第18条规定委托专利代理机构代理的，该机 应当指派专利代理师参加口头审理【A选项】”， 因此A、B、C选项符合规定，D选项不符合规定。 （2015改编）"},
  {id: 481, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "郑某2018年3月1日就同样的发明创造提交了一项实用新实用新型专利申请于2018年9月1日获得授权；其发明专利申请于2019年9月1日被公开，并且经过实质审查，在郑某于2020年2月1日放弃了上述实用新型专利权后，于2020年6月1日获得授权。2023年3月1日该发明专利因未交纳年费而终止。在满足其他受理条件的情况下，下列哪些无效宣告请求应当予以受理？", options: {"A": "2018年12月2日李某针对上述实用新型专利权提出无效宣告请求", "B": "2019年11月9日李某针对上述发明专利申请提出无效宣告请求", "C": "2021年1月10日陈某针对上述实用新型专利权提出无效宣告请求", "D": "2023年10月8日刘某针对该发明专利权提出无效宣告请求"}, answer: "CD", explanation: "根据《审查指南》第四部分第四章第3 节的规定，A选项，无效宣告请求人期满未提交回 执，并且不参加口头审理的，其无效宣告请求才视 为撤回，因此A选项错误。B选项，在发出口头审 理通知后，由于当事人原因未按期举行口头审理 的，合议组可以直接作出审查决定，因此B选项错 误。C、D选项，合议组应当向当事人发出口头审理 通知书，通知进行口头审理的日期和地点等事项； 发出口头审理通知的，可以通过专利局指定的特 定电子系统发送，也可以采取邮寄、传真、电子郎 件、电话、短信等方式告知当事人，因此C、D选项 正确。（新编）"},
  {id: 482, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "甲针对乙的专利权提出无效宣告请求，主张权利要求1相对于对比文件1不具备新颖性，权利要求2相对于对比文件2不具备创造性。国家知识产权局在审查了上述全部无效宣告请求的由和证据后，以权利要求1缺乏新颖性为由作出了宣告权利要求1无效、在权利要求2的基础上维持专利权有效的决定。该无效决定已生效。此后，乙主动放弃了专利权。下列说法哪些是正确的？", options: {"A": "针对已被宣告无效的权利要求1所提出的任何无效宣告请求均不应当被受理", "B": "鉴于乙已主动放弃了专利权，故任何人针对该专利再次提出的无效宣告请求，均不应当被受理", "C": "甲以权利要求2相对于对比文件1不具备创造性为由再次提出无效宣告请求，应当被受理", "D": "丙以权利要求2相对于对比文件2不具备创造性为由再次提出无效宣告请求，不应当被受理"}, answer: "AC", explanation: "A选项，根据《细则》第74条第3款的 规定，专利权人不参加口头审理的，可以缺席审 理，A选项正确。B选项，根据《审查指南》第四部 分第四章第12节的规定，旁听者不得向参加口头 审理的当事人传递有关信息，B选项错误。C选 项，根据《审查指南》第四部分第四章第13节（1)的 规定，无效宣告请求人有权请求撤回无效宣告请 求，放弃无效宣告请求的部分理由及相应证据，以 及缩小无效宣告请求的范围，因此C选项正确。D 选项，根据《审查指南》第四部分第四章第11节的 规定，在重要的审理事项记录完毕后或者在口头 审理终止时，合议组应当将笔录交当事人阅读。 对笔录的差错，当事人有权请求记录人更正，D选 项错误。（2013）"},
  {id: 483, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "张某的专利包括权利要求1-3,李某对张某的专利提出无效宣告请求，其理由是权利要求1-3相对于对比文件1和对比文件2的结合不具备创造性。国家知识产权局作出宣告权利要求1、2无效、在权利要求3的基础上维持该专利权有效的决定。该无效决定生效后，下列哪些无效宣告请求不予受理？", options: {"A": "王某以权利要求1、2不具备创造性为由提出无效宣告请求", "B": "李某以权利要求3相对于对比文件1和对比文件2的结合不具备创造性为由提出无效宣告请求", "C": "李某以权利要求3相对于对比文件1和对比文件3的结合不具备创造性为由提出无效宣告请求", "D": "王某以权利要求3相对于对比文件3不具备新颖性为由提出无效宣告请求"}, answer: "ABCD", explanation: "A选项，根据《审查指南》第四部分 第四章第5.1节的规定，在口审第一阶段，合议组 询问当事人是否请求审案人员回避；根据《审查指 南》第四部分第四章第6节的规定，当事人请求审 案人员回避的，合议组可以宣布中止口头审理，因 此A选项正确。B选项，根据《审查指南》第四部分 第四章第5.2节的规定，当事人当庭增加理由或者 补充证据的，合议组应当根据有关规定判断所述 理由或者证据是否予以考虑，因此B选项正确。 定：“在口头审理辩论时，合议组成员可以提问，但 不得发表自己的倾向性意见，也不得与任何一方 当事人辩论。在复审程序的口头审理调查后。 合议组可以就有关问题发表倾向性意见，必要时 将其认为专利申请不符合专利法及其实施细则和 审查指南有关规定的具体事实、理由和证据告知 复审请求人，并听取复审请求人的意见”，因此C、D 选项正确。（2018改编） 真集集《单电》 节规定：“出具过证言并在口头审理通知书回执中 写明的证人可以就其证言出庭作证【A选项】。当 事人在口头审理中提出证人出庭作证请求的，合 议组可根据案件的具体情况决定是否准许【B选 项】…出庭作证的证人不得旁听案件的审理【C 选项】。询问证人时，其他证人不得在场，但需要 证人对质的除外[D选项I”，因此A、B、C、D选项均 正确。（2018）"},
  {id: 484, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "甲针对某发明专利提出了无效宣告请求，主张(1)依据产品销售发票A1及产品使用说明书A2证明该专利不具备新颖性，（2)依据对比文件DI和D2的结合证明该专利不具备创造性。合议组经审查认定：(1)由于请求人未能提供A1的原件，其真实性不能被确认，故不能证明该专利不具备新颖性；（2)DI、D2的结合不能证明该专利不具备创造性,故作出维持专利权有效的审查决定。在满足其它受理条件的情况下，针对该发明专利再次提出的下列无效宣告请求哪些应当予以受理？", options: {"A": "甲以产品销售发票A1原件及产品使用说明书A2相结合证明该专利不具备新颖性", "B": "乙以对比文件D1、D2作为证据证明该专利不具备创造性", "C": "丙以对比文件DI和对比文件D3相结合证明该专利不具备创造性", "D": "甲以对比文件D2和对比文件D3相结合证明该专利不具备创造"}, answer: "BD", explanation: "《审查指南》第四部分第四章第10节规 定：“当事人在口头审理中提出证人出庭作证请求 的，合议组可根据案件的具体情况决定是否准 许合议组可以对证人进行提问。在双方当事 人参加的口头审理中，双方当事人可以对证人进 行交叉提问。证人应当对合议组提出的问题作出 明确回答，对于当事人提出的与案件无关的问题 可以不回答”，因此A、C选项错误，B、D选项正确。 （新编）"},
  {id: 485, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "某专利权有三项权利要求。下列哪些可以作为请求宣告该专利权无效的由？", options: {"A": "权利要求1和权利要求3之间不具有单一性", "B": "由于存在抵触申请，权利要求1不具备新颖性", "C": "权利要求1与现有技术的区别为公知常识，不具备创造性", "D": "权利要求1的撰写未区分前序部分和特征部分"}, answer: "ABCD", explanation: "《审查指南》第四部分第四章第11 节规定：“在口头审理中，由书记员或者合议组组 长指定的合议组成员进行记录。担任记录的人员 应当记录重要的审理事项…上述重要的审理事 项包括：(1)在无效宣告程序的口头审理中，当事 人声明放弃的权利要求、无效宣告请求的范围、理 由或者证据。（2)在无效宣告程序的口头审理中， 双方当事人均认定的重要事实……（4)其他需要 记录的重要事项”，C选项属于其他需要记录的重 要事项，因此A、B、C、D选项均正确。（新编）"},
  {id: 486, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "无效宣告理由仅限于以下哪项规定的由？", options: {"A": "专利法实施细则第四十四条第一款", "B": "专利法实施细则第六十九条第二款", "C": "专利法实施细则第六十条第一款", "D": "专利法实施细则第六十三条第二款"}, answer: "ABD", explanation: "《审查指南》第四部分第四章第13 节规定：“当事人有权请求审案人员回避发言 和辩论仅限于合议组指定的与审理案件有关的范 围；当事人对自已提出的主张有举证责任，反驳对 方主张的，应当说明理由….”，因此A、B、D选项 正确，C选项，《审查指南》中并未规定当事人有对 另一方当事人提出问题予以正面回答的义务，C选 项错误。（2019，思维扩展）"},
  {id: 487, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "关于无效宣告程序中的委托手续，下列说法哪些是正确的？", options: {"A": "专利权人在专利申请阶段委托的代为办理专利申请以及专利权有效期内全部专利事务的专利代理机构，可以直接代表专利权人在无效宣告程序中办理相关事务，专利权人无需再提交无效宣告程序授权委托书", "B": "请求人和专利权人可以委托相同的专利代理机构", "C": "请求人委托新专利代理机构的，应当办理著录项目变更手续", "D": "请求人先后委托了多个代理机构，可以指定其最先委托的专利代理机构作为收件人"}, answer: "ABCD", explanation: "《审查指南》第四部分第八章第 2.2.1节规定：“当事人提交外文证据的，应当提交 中文译文，未在举证期限内提交中文译文的，该外 文证据视为未提交【A选项】….对方当事人对中 文译文内容有异议的，应当在指定的期限内对有 异议的部分提交中文译文。没有提交中文译文 的，视为无异议【B选项】。对中文译文出现异议 时，双方当事人就异议部分达成一致意见的，以双 方最终认可的中文译文为准【C选项】。双方当事 人就委托翻译达不成协议的，复审和无效审理部 可以指定专业翻译单位进行翻译。所需翻译费用 由双方当事人各承担50%【D选项】”，因此A、B、 C、D选项均正确。（2018改编）"},
  {id: 488, topic: "专题二十 无效宣告请求审理程序", type: "single", question: "甲公司就张某的一项发明专利提出无效宣告请求，针对无效宣告程序中的委托手续，下面说法正确的有：", options: {"A": "甲公司可以委托其公司法务人员李某作为该无效宣告程序的代理人，应当提交证明与委托人有合法人事关系的证明材料", "B": "张某可以委托其刚取得专利代理师资格证的弟弟作为该无效宣告程序的代理人，只需要提交授权书即可", "C": "张某可以委托其有关社会团体推荐的公民作为该无效宣告程序的代理人，应当提交委托代理协议", "D": "甲公司可以委托经中华全国律师协会推荐的律师，其代理权限仅限于在口头审理中陈述意见和接收当庭转送的文件"}, answer: "D", explanation: "《审查指南》第四部分第八章第2.2.2节 规定：“域外证据应当经所在国公证机关予以 证明，··当事人提供的证据是在香港、澳门、台 湾地区形成的，应当履行相关的证明手续。但是 在以下几种情况下，对上述两类证据，当事人可以 在无效宣告程序中不办理相关的证明手续：(1)该 证据是能够从除香港、澳门、台湾地区外的国内公 共渠道获得的，如从专利局获得的国外专利文件， 或者从公共图书馆获得的国外文献资料”，A、B、C 选项的证据应当办理相关证明手续，D选项无需办 理相关证明手续。（2018改编）"},
  {id: 489, topic: "专题二十 无效宣告请求审理程序", type: "single", question: "在无效宣告程序中，专利代理师的哪些行为需要当事人的特别授权？", options: {"A": "专利权人的代理师代为承认请求人的无效宣告请求", "B": "代为放弃无效宣告请求所依据的部分证据", "C": "代为接收口头审理中当庭转送的文件", "D": "代为提出回避请求"}, answer: "B", explanation: "《审查指南》第四部分第八章第2.2.2节 规定：“域外证据应当经所在国公证机关予以 证明【B选项】…但是在以下几种情况下，对上述 两类证据，当事人可以在无效宣告程序中不办理 相关的证明手续：(1)该证据是能够从除香港、澳 门、台湾地区外的国内公共渠道获得的，如从专利 局获得的国外专利文件，或者从公共图书馆获得 的国外文献资料【C选项】…（2）对方当事人认可 该证据的真实性的[D选项】（3)该证据已为生效的 人民法院裁判、行政机关决定或仲裁机构裁决所 确认的【A选项】”，因此A、C、D选项说法正确，B选 项说法错误。（新编）"},
  {id: 490, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "无效宣告程序中，以下哪些事项，专利代理师需要具有特别授权的委托书？", options: {"A": "专利权人的代理人赵某在口头审理中删除两项权利要求", "B": "专利权人的代理人钱某书面答复无效宣告请求时，对权利要求作出进一步限缩性的修改", "C": "口头审理中，请求人的代理人与专利权人商谈和解有关事宜", "D": "复审和无效审理部作出审查决定之前，请求人的代理人撤回无效宣告请求"}, answer: "CD", explanation: "《审查指南》第四部分第八章第4.1节 规定：“证据应当由当事人质证，未经质证的证据、 不能作为认定案件事实的依据。质证时，当事人 应当围绕证据的关联性、合法性、真实性、针对证 据证明力有无以及证明力大小，进行质疑、说明和 辩驳”，证据质证时没有围绕“新颖性、公开性”的 说法，因此A、B选项错误，C、D选项正确。（2017)"},
  {id: 491, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "甲委托符合条件的公民乙代理参加无效宣告请求口头审理，乙的下列做法正确的是：", options: {"A": "承认请求人丙提出的无效宣告请求", "B": "接收了合议组当庭转送的文件，但是认为对方当事人提交的文件超出了举证期限，合议组不应该接受该文件", "C": "认为对方当事人提出的条件较为合理且符合预期，由此跟对方达成和解", "D": "发现权利要求书中的一个技术术语属于明显错误，对其进行正确的解释"}, answer: "ABD", explanation: "A选项，根据《审查指南》第四部分 第八章第2.2.3节的规定，当事人提交物证的，应当 在举证期限内提交足以反映该物证客观情况的照 片和文字说明，具体说明依据该物证所要证明的 事实，A选项正确。B选项，根据《审查指南》第四 部分第八章第2.2.3节的规定、对于经公证机关公 证封存的物证，当事人在举证期限内可以仅提交 公证文书而不提交该物证、但最迟在口头审理辨 论终结前提交该物证，B选项正确。C选项，根据 《审查指南》第四部分第八章第4.3.1节的规定，证 人应当陈述其亲历的具体事实。证人根据其经历 所作的判断、推测或者评论，不能作为认定案件事 实的依据，C选项错误。D选项，根据《审查指南》 第四部分第八章第4.3、1节的规定、未熊出席口头 审理作证的证人所出具的书面证言不能单独作为 认定案件事实的依据，但证人确有困难不能出席 口头审理作证的除外，D选项为无正当理由不出席 口头审理，因此D选项正确。（2013） 16、AB。A选项，根据《审查指南》第四部分第 八章第2.1节的规定，没有证据或者证据不足以证 明当事人的事实主张的，由负有举证责任的当事 人承担不利后果，A选项正确。B选项，根据《审查 指南》第四部分第八章第2.2.1节的规定，对方当事 人对中文译文内容有异议的，应当在指定的期限 内对有异议的部分提交中文译文，B选项正确。C 选项，根据《审查指南》第四部分第八章第4.3.4节 的规定，如果公证文书的结论明显缺乏依据或者 公证文书的内容存在自相矛盾之处，则相应部分 的内容不能作为认定案件事实的依据，C选项错 误。D选项，根据《审查指南》第四部分第八章第 5.2节的规定，申请日后（含申请日）形成的记载有 使用公开或者口头公开内容的书证，或者其他形 式的证据可以用来证明专利在申请日前使用公开 或者口头公开，D选项错误。（2013）"},
  {id: 492, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "甲公司的法定代表人张某就一项新技术向国家知识产权局申请发明专利并获得授权，随后，乙公司对该专利权提出无效宣告请求。在无效宣告程序中，甲公司和张某因该专利权的归属发生纠纷向人民法院提起诉讼，并请求国家知识产权局中止无效宣告程序，但该专利权无效宣告程序未中止审理，甲公司请求参加该无效宣告程序，下面说法正确的是：", options: {"A": "甲公司应当提交参加无效宣告程序的请求书", "B": "甲公司应当提交权属纠纷已被人民法院受理的证明文件", "C": "复审和无效审理部同意甲公司参加无效宣告程序的，甲公司可以参加口头审理，提出对权利要求修改的要求", "D": "甲公司参加无效宣告程序后，可以提出专利权应当维持有效的意见，供合议组审理无效宣告案件时参考"}, answer: "AD", explanation: "A选项，《审查指南》第四部分第八章 第4.3.4节规定：“一方当事人将公证文书作为证据 提交时，有效公证文书所证明的事实，应当作为认 定事实的依据”，甲提供了该公证书原件，在没有 其他证据推翻的情况下，一般应当认定该公证书 的真实性，A选项正确。B、C选项，《审查指南》第 四部分第八章第4.3.4节规定：“如果公证文书的结 论明显缺乏依据或者公证文书的内容存在自相矛 盾之处，则相应部分的内容不能作为认定案件事 实的依据。例如，公证文书仅根据证人的陈述而 得出证人陈述内容具有真实性的结论，则该公证 文书的结论不能作为认定案件事实的依据”，因此 B、C选项错误。D选项，《审查指南》第四部分第八 章第4.3.1节规定；“证人应当出席口头审理作证， 接受质询。未能出席口头审理作证的证人所出具 的书面证言不能单独作为认定案件事实的依据”。 D选项正确。(2016)"},
  {id: 493, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "王某就李某的一项专利权向国家知识产权局提交无效宣告请求书，明确无效宣告请求范围并提供相关证据，下面说法正确的是：", options: {"A": "该无效宣告请求经形式审查符合规定的，复审和无效审理部应当向王某和李某发出无效宣告请求受理通知书", "B": "该无效宣告请求涉及在先作出的无效宣告请求审查决定而暂时无法审查的,复审和无效审理部应当向王某和李某发出通知书", "C": "该无效宣告请求涉及专利侵权案件的，复审和无效审理部可以应人民法院的请求，向处理该专利侵权案件的人民法院发出无效宣告请求案件审查状态通知书", "D": "钱某作为专利权属纠纷的当事人被准予参加该无效宣告程序，复审和无效审理部应当向钱某发出无效宣告请求案件审查状态通知书"}, answer: "AD", explanation: "A选项，《审查指南》第四部分第八章 第5.1节规定：“公众能够浏览互联网信息的最早 时间为该互联网信息的公开时间，一般以互联网 信息的发布时间为准”，A选项正确。B选项，《家 查指南》第四部分第八章第5.2节规定：“申请日后 （舍申请日）形成的记载有使用公开或者口头公开 内容的书证，或者其您形式的证据可以用来证明 专利在申请日前使用公开或者口头公开”，B选项 错误。C选项、《审查指南》第四部分第八章第5.3 节规定：“合议组可以根据需要邀请有关单位或者 专家对案件中涉及的技术内容和问题提供容询性 意见”，C选项错误，D选项、（审查措南》第四部分 第八童第54节规定：“在无效宣告序中，当事人 在提交样品等不作为证据的物品时，有权以书面 方式谱求在其案件审修后联走该场品”、D选项函 嚼，（2017)"},
  {id: 494, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "在无效宣告程序的合议审查中，下列做法正确的有：", options: {"A": "专利权的取得明显违背诚实信用原则的，合议组可以引人细则第11条的无效宣告理由进行审查", "B": "无效宣告理由为独立权利要求1不具备新颖性，但该权利要求保护一种疾病诊断方法，合议组可以引人专利法第25条的无效宣告理由进行审查", "C": "无效宣告理由为独立权利要求1不具备创造性，但该权利要求因不清楚而无法确定其保护范围，合议组可以引入专利法第26条第4款的无效宣告理由进行审查", "D": "无效宣告理由为权利要求1不具备新颖性、从属权利要求2不具备创造性，如果合议组认定权利要求1具备新颖性，而从属权利要求2不具备创造性，则可以依职权对权利要求1的创造性进行审查"}, answer: "BD", explanation: "，A选项、《审查指商》第四部分第八業 第4.3.3节规定：“主张某技术手段是本领域公知常 识的当事人、对其主资演握举证责役。该当得人 未能举证证明或者来急充分说明该技术手段是本 领域公知常识，并且对方当事人不予认可路，会说 组对该技术手段是本领域公知常识的主张不予支 持”，若李某主张区别将征X是所属领域的公如等 识、而张某认可，则李某无须提交证据，因此A选项 错误。B、C选项，根据《审查指商》第四部分第三章 第4.3.1节（2）的规定，公知常识性证据可以在口头 审理辩论终结前提交，口审结束后提交公知寰 识证据将不予接受、因此B选项正确，C选项错误。 D选项，根据《审查指南）第四部分第汽漾第4.3节 的规定，对于一万当事人提出的证掘，另一方当事 人认可或者提出的相反证器不足以反的，合议 组可以确认其证明力，D选项正确。（2015)"},
  {id: 495, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "陈某于2024年3月4日就某专利权提出无效宣告请求，并打算使用某日本专利文献为证据。该无效宣告请求被受理后，于2024年3月6日向双方发出受理通知书。下列说法哪个是正确的？", options: {"A": "陈某应当在2024年4月4日前提交该日本专利文献的译文", "B": "陈某应当在2024年4月6日前提交该日本专利文献的译文", "C": "陈某应当在2024年4月4日前提交该日本专利文献", "D": "陈某可以在2024年6月2日举行口头审理的当天提交该日本专利文献的译文"}, answer: "ABC", explanation: "A、C选项，（审查指南）第四分第 八章第4.3.3节规定：\"主张基技术手段是本领域公 知常识的当事人，对其主张录担举责任…当 事人可以通过教科书或者技术词典、技术手册等 工具书记载的技术内容来证明基项技术手没是本 领域的公知常识”，A、C选项正确。B、D选项、根据 《审查指商》第四部分第三章第4.3.1节（2）的规定， 公知需识性证据可以在口头审理论终结前提 交，不限于提出无效宣告请求的1个月之内，因此 B选项正确，D选项错误。（2019）"},
  {id: 496, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "2024年4月25日，乙针对甲的发明专利提出无效宣告请求，并于2024年5月25日提交了证据，结合证据说明了甲的专利权利要求不具有创造性的由。甲收到证据及理由后，删除了部分权利要求。下列哪些乙增加的证据或理由不予考虑？", options: {"A": "乙针对甲的修改补充提交的一份刊登在中文期刊上的文章", "B": "乙在口头审理时补充提交的一份中文专利文献作为对比文件使用", "C": "乙认为甲的修改超出原始公开范围，在收到甲的修改一个月内提交补充无效宣告理由", "D": "乙在口头审理时，就其提出无效宣告请求时附具的美国专利文献提交中文译文"}, answer: "ABC", explanation: "A、C、D选项，《审查指南》第四部分 第八章第4.3.3节规定：“主张某技术手段是本领域 公知常识的当事人，对其主张承担举证责任【C选 项】。该当事人未能举证证明或者未能充分说明 该技术手段是本领域公知常识，并且对方当事人 不予认可的，合议组对该技术手段是本领域公知 常识的主张不予支持【A选项】。当事人可以通过 教科书或者技术词典、技术手册等工具书记载的 技术内容来证明某项技术手段是本领域的公知常 识[D选项】”，专利文献不属于公知常识性证据，因 此A、C选项正确，D选项错误。B选项，《审查指 南》第四部分第三章第4.1节（8)规定：“合议组可 以依职权认定技术手段是否为公知常识，并可以 引入技术词典、技术手册、教科书等所属技术领域 中的公知常识性证据”，B选项正确。（新编）"},
  {id: 497, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "王某对李某拥有的一项发明专利于2024年3月18日提出无效宣告请求，同时提交了对比文件1和2。对于下列哪些增加的无效宣告理由或者证据，将不予考虑？", options: {"A": "王某在2024年4月18日补充了新的无效宣告理由，但未进行具体说明", "B": "王某在2024年5月8日对明显与所提交的对比文件1和2都不相对应的无效宣告理由进行变更", "C": "李某在口头审理辩论终结前针对其主张的公知常识补充提交了技术词典并进行了具体说明", "D": "王某在2024年4月28日补充提交了对比文件2中的相关段落的中文译文"}, answer: "ABCD", explanation: "A选项，根据《审查指南》第四部 分第八章第4.3.4节的规定，一方当事人将公证文 书作为证据提交时，有效公证文书所证明的事实， 应当作为认定事实的依据，但有相反证据足以推 翻公证证明的除外，A选项正确。B选项，根据《审 查指南》第二部分第三章第2.1节的规定，处于保 密状态的技术内容不属于现有技术，即受保密规 定或协议约束的情形，以及社会观念或者商业习 惯上被认为应当承担保密义务的情形，因此B选项 正确。C选项，根据《审查指南》第四部分第八章第 3节的规定，合议组一般不主动调查收集审查案件 需要的证据，C选项正确。D选项，《审查指南》第 四部分第八章第5.1节规定：“公众能够浏览互联 网信息的最早时间为该互联网信息的公开时间， 一般以互联网信息的发布时间为准”，D选项正确。 （新编）"},
  {id: 498, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "郭某就李某的发明专利提出无效宣告请求，该请求受理后，将有关文件转送给李某。2024年7月8日举行了口头审理。下列哪些证据应当予以接受？", options: {"A": "郭某于2024年4月2日提交的一份外文证据，并于2024年6月2日提交了该证据的中文译文", "B": "郭某于2024年7月9日提交的一本用作公知常识性证据的期刊", "C": "李某在口头审理辩论终结前当庭提交的用于完善证据法定形式的公证文书", "D": "李某在指定的答复期限内提交的某证据的复印件,并于2024年7月7日提交了该证据的原件"}, answer: "AC", explanation: "A选项，《审查指南》第四部分第八章 第5.1节规定：“公众能够浏览互联网信息的最早 时间为该互联网信息的公开时间，一般以互联网 信息的发布时间为准”，A选项正确。B选项，根据 《审查指言》第四部分第八章第2.22节的规定，域 外证据在例外情形中无办理相关正明手续，因 此B选项错误。C选项，根据《审查指言》第四部分 第八章第5.2节的规定，申请日后（含申请日）形成 的记载有使用公开或者口头公开内容的书证，或 者其他形式的证据可以用来证明专利在申请日前 使用公开或者口头公开，C选项正确。D选项，相 关法律法规没有对此作出规定，D选项错误。 （新编）"},
  {id: 499, topic: "专题二十 无效宣告请求审理程序", type: "single", question: "在无效宣告程序中,专利权人对其权利要求进行了删除式修改,同时针对请求人所提交的证据提交了三份反证。请求人采取的下列哪些应对措施是被允许的？", options: {"A": "在指定期限内,针对专利权人修改后的权利要求书增加新的无效宣告理由", "B": "在指定期限内,针对专利权人提交的三份反证补充新的证据，并在该期限内结合该证据具体说明相关的无效宣告理由", "C": "对明显与提交的证据不相对应的无效宣告理由进行变更", "D": "在口审辩论终结前提交教科书等公知常识性证据，并在该期限内结合该证据具体说明相关无效宣告理由"}, answer: "A", explanation: "A选项的“手机”名称符合规定。 B选项的“中型书柜”名称中含有产品规格， C选项的“电子设备”名称过于抽象，D选项 的“人体增高鞋垫”名称中含有技术效果，均 不符合规定。（2014）"},
  {id: 500, topic: "专题二十 无效宣告请求审理程序", type: "single", question: "无效宣告请求人在提出无效宣告请求时提交了施工合同和设计图纸，在之后的1个月内补充提交了台湾专利文献。两个月后，请求人在口头审理时提交了《化工原料手册》、台湾专利文献公证书和韩国出版的专业杂志文献及其译文。对请求人提交的下列哪些证据会予以考虑？", options: {"A": "请求人口头审理之前提交的上述台湾专利文献", "B": "请求人口头审理时提交的上述韩国出版的专业杂志文献及其译文", "C": "请求人口头审理时提交的上述《化工原料手册》和台湾专利文献公证书", "D": "请求人提交的上述施工合同和设计图纸"}, answer: "D", explanation: "A选项，“DVD”无法表明产品类 别，例如是DVD播放器，还是DVD光盘，因 此不符合规定。B选项，“办公用品”过于抽 象，因此不符合规定。C选项，“图形用户界 面”未写明图形用户界面的具体用途或应用 的产品，过于笼统，因此不符合规定。D选 项，“成套沙发”符合规定。（2016）"},
  {id: 501, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "请求人赵某于2024年3月14日提出无效宣告请求并被受理。赵某的无效理由是涉案专利权的全部权利要求均不具备创造性，其提交的现有技术证据包括其从日本获得的某日文期刊出版物A及其中文译文、美国专利公开文献B（英文，但未提交中文译文）等。以下为赵某在无效宣告程序中增加的无效理由或补充的证据，应当予以考虑的有？", options: {"A": "赵某于2024年4月15日（星期一）通过中国邮政EMS向复审和无效审理部寄交意见陈述书，增加了无效宣告的由和证据", "B": "针对专利权人随后对权利要求作出的进一步限缩性修改，在指定的期限内，赵某于2024年5月18日提交意见陈述书，但未提交新的证据，仅增加理由具体说明修改后的权利要求相对于出版物A结合本领域公知常识仍不具备创造性", "C": "口头审理于2024年6月20日举行，赵某在口头审理辩论终结前提交的上述日文期刊出版物A的公证文书", "D": "口头审理于2024年6月20日举行，赵某在口头审理辩论终结前提交的上述美国专利文献B的中文译文"}, answer: "BC", explanation: "A选项，“IPAD”属于商标名， “灯”名称过于抽象，A、D选项错误。B、C选 项符合名称规定，正确。（新编）"},
  {id: 502, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "针对某件发明专利，请求人在提出无效宣告请求时及在其后的一个月内提交了三份证据：X1、X2和X3，提出的无效宣告理由为Y1、Y2、Y3、Y4，请求人用证据X2和X3具体说明了无效宣告理由Y1，用证据X3具体说明了无效宣告理由Y3，并认为对于无效宣告理由Y4只需要考虑说明书和权利要求书即可不需要其他证据。除此之外请求人未进行任何其他具体说明。下列哪些说法是正确的？", options: {"A": "对证据X1不予考虑", "B": "对无效宣告理由Y2不予考虑", "C": "对无效宣告理由Y4不予考虑", "D": "在口审过程中，请求人主张其提出的证据X2可用于支持无效宣告理由Y4，对此不应予以考虑"}, answer: "AD", explanation: "A选项为涉及图形用户界面的 外观设计的名称，“绘图软件”已经写明具体 用途和其所应用的产品，因此A选项符合要 求。B选项，“Type-C”属于型号，因此B选 项不当选。C选项，《审查指南》第一部分第 三章第4.4.1节规定：“申请局部外观设计专 利的，应当在产品名称中写明要求保护的局 部及其所在的整体产品，例如“汽车的车门” “手机的摄像头””，“智能手机的局部”未写 明要求保护的局部，因此C选项不当选。D 选项名称有一定抽象性，但本题为多选，相 比B、C选项，D选项的正确率更高。（新编）"},
  {id: 503, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "在无效宣告程序中，实用新型专利权人在答复无效宣告请求受理通知书时对其专利文件进行修改，下列哪些方式是允许的？", options: {"A": "删除原独立权利要求，将并列从属于原独立权利要求的三项从属权利要求修改为三项并列的独立权利要求", "B": "根据请求人提出的现有技术证据，对独立权利要求重新划分前序部分与特征部分", "C": "删除独立权利要求，将从属权利要求作为新的独立权利要求", "D": "删除独立权利要求，将两项并列从属权利要求作为新的独立权利要求，并对说明书做适应性修改"}, answer: "ABC", explanation: "A选项，《细则》第30条第2款 规定：“申请局部外观设计专利的，应当提交 整体产品的视图，并用虚线与实线相结合或 外观设计的申请文件与初步审查 二夕 者其他方式表明所需要保护部分的内容”。 因此A选项正确。B、C选项，产品设计要点 仅涉及一个或几个面的，应当提交所涉及面 的正投影视图，对于其他面既可以提交正投 影视图，也可以提交立体图。使用时不容易 看到或者看不到的面可以省略视图，因此B、 C选项正确。D选项，局部外观不得以阴影 线、指示线、中心线、尺寸线、点划线等线条表 达外观设计的形状，因此D选项错误。（新编）"},
  {id: 504, topic: "专题二十 无效宣告请求审理程序", type: "single", question: "某专利授权公告的权利要求书如下：“权利要求1：一种牙刷，具有特征L或者特征M。权利要求2：根据权利要求1的牙刷，其特征在于，进一步具有特征N。权利要求3：根据权利要求1的牙刷，其特征在于，进一步具有特征0。权利要求4：权利要求1至3之一的牙刷的制备方法，其特征在于.…..\"在无效宣告程序中，专利权人作出的下列哪些修改能够被允许？", options: {"A": "删除权利要求1中具有特征M的牙刷的技术方案", "B": "删除权利要求4，同时将本发明的发明名称由“一种牙刷及其制备方法”修改为“一种牙刷”", "C": "同时将权利要求2和3的特征N，0加入到权利要求1中", "D": "修改权利要求1，增加未记载在原说明书和权利要求书中的特征P"}, answer: "D", explanation: "A、B选项，《审查指南》第一部分 第三章第4.2.2节规定：“可以用两条平行的 双点划线或自然新裂线表示细长物品的省 略部分。图面上可以用指示线表示剖切位 置和方向、放大部位、透明部位等”，A、B选 项符合规定。C选项，《审查指南》第一部分 第三章第4.2.3节（5）规定：“照片中的产品 通常应当避免包含内装物或者衬托物，但对 于必须依靠内装物或者衬托物才能清楚地 显示产品的外观设计时，则允许保留内装物 或者衬托物”，C选项符合规定。D选项，后 视图与主视图相同或对称时可以省略后视 图，不能省略主视图，D选项不符合规定。 （2017改编）"},
  {id: 505, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "如权利要求1所述的电机，特征还有K和L。在无效宣告程序中，允许专利权人以下列哪些方式修改权利要求书？", options: {"A": "在针对无效宣告请求书的答复期限内，将权利要求书修改为“1、一种电机,特征为H、I、J和L。”", "B": "在针对请求人增加无效宣告理由的答复期限内，将权利要求书修改为“1、一种电机，特征为H、IJ、K和L。”", "C": "在针对合议组引入的请求人未提及的无效宣告理由的答复期限内，将权利要求书修改为“1、一种电机，特征为H、I和L。”", "D": "在口头审理辩论终结前，将权利要求书修改为“1、一种电机,特征为H、K和L。\""}, answer: "ABCD", explanation: "A、C选项，《审查指南》第一 部分第三章第4.2节规定：“就立体产品的外 观设计而言，产品设计要点涉及六个面的， 应当提交六面正投影视图··就平面产品 的外观设计而言，产品设计要点涉及一个面 的，可以仅提交该面正投影视图”，A、C选项 正确。B选项，《审查指南》第一部分第三章 第4.2.1节规定：“对于组装关系唯一的组件 产品，应当提交组合状态的产品视图”，B选 项正确。D选项，《审查指南》第一部分第三 章第4.5.1节规定：“设计要点仅在于图形用 户界面设计的，申请人至少应当提交图形用 户界面所涉及面的产品正投影视图”，D选 项正确。（2019改编） 主视图和立体图正确，下列哪些视图明 图 右视图 图 后视图"},
  {id: 506, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "甲于2024年3月5日针对乙的某项发明专利权提出无效宣告请求。在以下哪些情形下，乙可以在答复期限内对权利要求作进一步限定？", options: {"A": "针对甲于2024年4月7日补充提交的美国专利文献", "B": "针对甲于2024年4月2日补充提交的意见陈述书，其中增加了权利要求1缺必要技术特征的由但没有补充证据", "C": "针对甲的无效宣告请求书", "D": "针对合议组依职权引人的由"}, answer: "ABC", explanation: "A选项，左视图的电饭煲盖子 应当左高右低，B选项，右视图应当右高左 低。C选项，俯视图中的盖子顶部应当有横 条状出气口。D选项仰视图正确。（2018） 和立体视图正确，下列哪些视图明显 右视图 仰视图 立体图正确，结合立体图和主视图判断，该 右侧投影应存在明显的遮挡关系，且立体图 事线，因此A、B选项错误，二者混淆。C选项 仰视图进行判断，仰视图对产品底部的外轮 线从右往左，第一节点和第二节点之间的线 D选项错误。（2008） 外观设计的申请文件与初步审查 二"},
  {id: 507, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "甲于2024年7月24日针对乙的某项发明专利权提出无效宜告请求。乙对其专利文件进行修改的下列情形，哪些是正确的？", options: {"A": "甲于2024年8月28日提交了新的日本专利文献，乙应当在收到该文献后，对独立权利要求作出进一步限缩性修改", "B": "针对甲的无效宣告请求，乙在答复期限内对说明书作出修改", "C": "针对甲于2024年8月22日补充提交的无效理由和证据，乙在答复期限内对该无效理由和证据涉及的独立权利要求作出进一步限缩性修改", "D": "口头审理进行中，乙首次提出删除两项权利要求"}, answer: "ABD", explanation: "A选项，申请局部外观设计 专利的，应当提交整体产品的视图，整体产 品的视图应当清楚地显示要求专利保护的 产品的局部外观设计，以及该局部在整体产 品中的位置和比例关系，因此A选项正确。 B选项，“座椅靠背的花”因属于要求保护 产品不能分割的局部，应当以局部外观设计 的方式提交申请。因此B选项正确。C选 项，申请局部外观设计专利的，可以采用其 他方式表明所需要保护部分的内容，例如用 单一颜色的半透明层覆盖不需要保护的部 分，因此C选项错误。D选项，局部外观设 计专利要求保护的局部与其他部分之间没 有明确分界线的，应当用点划线表示分界 线，因此D选项正确。（新编）"},
  {id: 508, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "针对甲的一项发明专利权，乙于2024年3月27日提出无效宣告请求，甲可以采取下列哪些做法对其专利文件进行修改：", options: {"A": "乙于2024年4月22日补充提交了新的美国专利文献作为证据，甲在收到该专利文献后，以进一步限定的方式修改独立权利要求", "B": "甲在收到无效宣告请求书一个月内，对说明书作出修改", "C": "在口头审理进行中删除独立权利要求", "D": "乙于2024年5月11日补充提交了新的美国专利文献，甲在收到该专利文献后，对独立权利要求作出进一步限定"}, answer: "ABCD", explanation: "A选项，“增高”属于描述 技术效果，不符合规定。B选项，“热效率 高、省电”属于产品性能，不符合规定。C选 项，根据《审查指商》第一部分第三章第4.3 节(3)的规定，设计要点是指与现有设计相 区别的产品的形状、图案及其结合，或者色 彩与形状、图案的结合、或者部位，C选项不 符合规定。D选项，根据《审查指南》第一部 分第三章第4.3节（4)的规定，简要说明中应 当指定一幅最能表明设计要点的图片或者 照片，D选项不符合规定。（2011)"},
  {id: 509, topic: "专题二十 无效宣告请求审理程序", type: "single", question: "如权利要求1所述的发动机，还包括特征e。”2024年5月26日无效宣告请求人提出权利要求1不具有新颖性并提交了证据，其后未补充证据及理由。在2024年12月7日举行的无效宣告口审程序中，下列哪种修改方式是被允许的？", options: {"A": "将权利要求1修改为“一种发动机，其特征为a、b和d”，删除其他权利要求", "B": "权利要求1未作修改，将权利要求2修改为“如权利要求1所述的发动机，还包括特征c和e”", "C": "将权利要求1修改为“一种发动机，其特征为a、b和e”，删除其他权利要求", "D": "将权利要求1修改为“一种发动机，其特征为a、b和f\"，特征f在原说明书中有明确记载"}, answer: "B", explanation: "《细则》第31条第1款规定：“外 观设计的简要说明应当写明外观设计产品 的名称、用途、外观设计的设计要点，并指定 一幅最能表明设计要点的图片或者照片。 省略视图或者请求保护色彩的、应当在简要 说明中写明”，筒要说明不得用来说明产品 的内部结构，因此B选项当选。（2015） 13、BD。《审查指南》第一部分第三章第 4.3节规定：“下列情形应当在简要说明中写 明：……（1)请求保护色彩或者省略视图的 情况.…（5）如果产品的外观设计由透明材 料或者具有特殊视觉效果的新材料制成，必 要时应当在简要说明中写明*简要说明 不得使用商业性宣传用语，也不能用来说明 产品的性能和内部结构”，因此A、C选项错 误，B、D选项正确。（2019)"},
  {id: 510, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "张某针对李某的发明专利提出无效宣告请求，李某在收到无效宣告请求书后，在指定的答复期限内，采取下列哪些做法是符合相关规定的？", options: {"A": "对权利要求作进一步限定的修改", "B": "提交外文期刊及其中文译文作为反证", "C": "与张某接触，商谈和解事宜", "D": "委托专利代理机构，在指定的答复期限内陈述专利权应维持有效的意见"}, answer: "ABCD", explanation: "《审查指南》第一部分第三 章第4.3节规定：“下列情形应当在简要说明 中写明：（1）……使用时底面不常见，省略 仰视图”·…·（3）对于花布、壁纸等平面产 品，必要时应当描述平面产品中的单元图案 两方连续或者四方连续等无限定边界的情 况。(4)对于细长物品，必要时应当写明细长 物品的长度采用省略画法…·.（6)如果外观 设计产品属于成套产品，必要时应当写明各 套件所对应的产品名称”，因此A、B、C、D选 项均正确。（新编）"},
  {id: 511, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "甲于2019年7月1日提交了一项实用新型专利申请，该申请于2019年11月15日被授予专利权，其授权公告的权利要求书包括独立权利要求1及并列从属权利要求2、3，在无效宣告程序中，专利权人删除了原权利要求1，使用权利要求3对权利要求2做进一步限定，形成修改后的独立权利要求1，2024年7月30日发出的审查决定中，在修改后的权利要求1的基础上维持该专利权有效，且双方均未起诉，下列说法正确的是？", options: {"A": "原权利要求1～3视为自2019年7月1日即不存在", "B": "原权利要求1～3视为自2024年7月30日起不存在", "C": "修改后的权利要求1自2019年7月1日起即存在", "D": "修改后的权利要求1自2024年7月30日起生效"}, answer: "ABCD", explanation: "《审查指南》第一部分第三 章第4.4.3节规定：“申请局部外观设计专利 的，简要说明应当符合下列规定：（1)用虚线 与实线相结合以外的方式表示要求保护的 局部外观设计的，应当在简要说明中写明要 求保护的局部。（2)用点划线表示要求保护 的局部与其他部分之间分界线的，必要时应 当在简要说明中写明。(3)必要时应当写明 要求保护的局部的用途，并与产品名称中体 现的用途相对应。(4)指定的最能表明设计 要点的图片或照片中应当包含要求保护的 局部外观设计”。因此A、B、C、D选项均正 确。（新编）"},
  {id: 512, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "某发明专利申请于2022年11月20日获得公告授权，专利权人为甲。针对该专利权，乙于2023年5月20日提出无效宣告请求，甲随后删除了部分权利要求。2023年11月20日作出审查决定，宣告修改后的权利要求维持有效。2024年1月20日，甲将丙公犯了该专利权。请问：在甲与丙公司的侵权纠纷中，应当以哪份权利要求书作为审理的基础？", options: {"A": "2022年11月20日该专利授权公告时的权利要求书", "B": "2023年11月20日决定宣告维持有效的权利要求书", "C": "2023年5月20日乙请求宣告无效的权利要求书", "D": "2023年1月至4月丙公司能够查阅到的权利要求书"}, answer: "ABC", explanation: "A、B、C选项，《审查指南》第 一部分第三章第4.5.2节规定：“对于设计要 点仅在于图形用户界面的产品外观设计，申 请人可以以局部外观设计方式提交申请。 局部外观设计方式包括视图带有或者不带 有图形用户界面所应用产品两种方式”。因 此A、B、C选项正确。D选项，《审查指南》 第一部分第三章第4.5.3节规定：“对于动态 外观设计的申请文件与初步审查 二 图形用户界面，申请人应当提交图形用户界 面起始状态所涉及面的视图作为主视图”， 因此D选项错误。（新编）"},
  {id: 513, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "一件申请日为2012年2月10日的发明专利于2023年3月20日被宜告部分无效。专利权人在收到该无效审查决定之日起3个月内未向人民法院起诉。下列说法正确的是？", options: {"A": "维持有效的权利要求视为自2023年3月20日起有效", "B": "被宣告无效的权利要求视为自2012年2月10日起即不存在", "C": "该无效审查决定对2019年已经履行完毕的与被无效专利权有关的专利实施许可合同不具有追溯力", "D": "该无效审查决定对人民法院2021年针对该专利权作出并已执行的专利侵权的判决具有追溯力"}, answer: "ABC", explanation: "A、B选项，根据《细则》第35 条第2款的规定，外观设计专利申请人要求 本国优先权，在先申请是发明或者实用新型 专利申请的，可以就附图显示的设计提出相 同主题的外观设计专利申请；在先申请是外 观设计专利申请的，可以就相同主题提出外 观设计专利申请，因此A、B选项正确。C、D 选项，根据《审查指南》第一部分第一章第 6.2节的规定，对于要求本国优先权或外国 的优先权的发明或者实用新型专利申请，其 在先申请可以是发明也可以是实用新型，因 此C选项正确，实用新型专利申请的优先权 基础不能是外观设计专利，D选项错误。 （新编）"},
  {id: 514, topic: "专题二十 无效宣告请求审理程序", type: "single", question: "赵某针对美国甲公司的一项外观设计国际申请专利提出无效宣告请求，并结合提交的证据说明了无效理由。该外观设计专利在授权审查过程中并未委托中国专利代理机构处理相关事务。对于该案的审理，下列说法正确的有：", options: {"A": "美国甲公司如果参加无效审查的审理，应当委托中国专利代理机构", "B": "合议组可以采用电子邮件或者邮寄、传真、公告等方式送达文件", "C": "如果合议组以公告送达的方式送达审查决定的，公告日视为送达日", "D": "甲公司未在收到该审查决定之日起3个月内向人民法院起诉的，由专利局予以登记和公告"}, answer: "A", explanation: "2021年6月1日之后的外观设 计专利申请可以享有本国优先权，因此A选 项正确，B、D选项错误。C选项，补入相似 设计会导致修改超范围，因此C选项错误。 （新编）"},
  {id: 515, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "下列关于无效宣告程序的说法哪些是正确的？", options: {"A": "专利权人可以在无效审理程序中放弃全部权利要求", "B": "无效宣告程序中的口头审理都应当公开举行", "C": "请求人撤回无效宣告请求的，无效宣告程序一律终止", "D": "无效宣告程序中对案件的审查不受当事人请求的范围和提出的由、证据的限制"}, answer: "ACD", explanation: "A、B选项，《审查指南》第一 部分第三章第5.2节规定：“外观设计专利申 请的申请人要求外国优先权，其在先申请未 包括对外观设计的简要说明，申请人提交的 简要说明未超出在先申请文件的图片或者 照片表示的范围的，不影响其享有优先权”。 因此A选项说法错误，B选项说法正确。C 选项，《细则》第35条第3款规定：“申请人要 求本国优先权的，其在先申请自后一申请提 出之日起即视为撤回，但外观设计专利申请 人要求以发明或者实用新型专利申请作为 本国优先权基础的除外”。因此C选项说法 错误。D选项，在先申请是整体外观设计， 在后申请可以是局部外观设计；在先申请是 局部外观设计，在后申请可以是整体外观设 计，因此D选项说法错误。（新编）"},
  {id: 516, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "在下列哪个情形下无效宣告程序终止？", options: {"A": "请求人请求撤回其无效宣告请求，但合议组认为根据已进行的审查工作能够作出宣告专利权无效的决定", "B": "专利权人未提交口头审理回执，也未参加口头审理", "C": "请求人未在指定的期限内答复口头审理通知书，并且不参权无效的决定", "D": "合议组在无效宣告请求被受理后发现不符合受理条件而驳回请求"}, answer: "AB", explanation: "A选项，申请局部外观设计专 利的，应当在产品名称中写明要求保护的局 部及其所在的整体产品，甲公司应当在产品 名称中写明要求保护“手机的摄像头”，A选 项正确。B选项，根据《细则》第30条第2款 的规定，申请局部外观设计专利的，应当提 交整体产品的视图，并用虚线与实线相结合 或者其他方式表明所需要保护部分的内容。 采用虚线与实线相结合的方式表明要求保 护的局部时，无需在简要说明中写明要求保 护的局部，因此B选项正确。C选项，根据 《细则》第35条的规定，外观设计专利申请 人要求本国优先权，在先申请是发明或者实 用新型专利申请的，可以就附图显示的设计 提出相同主题的外观设计专利申请，因此C 选项错误。D选项，外观设计专利申请人要 求以发明或者实用新型专利申请作为本国 优先权基础的，在先申请不会因在后申请提 出而视为撤回，因此D选项错误。（新编）"},
  {id: 517, topic: "专题二十 无效宣告请求审理程序", type: "single", question: "甲针对某一发明专利权提出全部权利要求1-10相对于证据1和证据2的结合不具备创造性的无效宣告请求后，国家知识产权局作出宣告权利要求1-5无效，在权利要求6-10的基础上维持专利权有效的审查决定后，甲可以采取下列哪些做法：", options: {"A": "甲向北京知识产权法院起诉", "B": "甲请求撤回该无效宣告请求", "C": "甲以乙的名义，以权利要求6-10相对于证据1和证据2的结合不具备创造性为由，提出新的无效宣告请求", "D": "甲以权利要求6-10相对于证据1和证据3的结合不具备创造性为由，提出新的无效宣告请求"}, answer: "C", explanation: "本题中，设计2、设计3与设计1 相比，除插孔的排列不同外，更明显的不同 在于设计1有开关，而设计2和设计3都没 有，因此设计2、设计3与设计1不属于相似 的外观设计。设计4与设计1相比，其不同 之处仅在于设计单元重复排列，因此二者属 于相似的外观设计。C选项正确。（2010）"},
  {id: 518, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "在无效宣告程序中评价实用新型专利创造性时，应当考虑其技术方案中的下列哪些特征？", options: {"A": "构造特征", "B": "方法特征", "C": "材料特征", "D": "形状特征"}, answer: "ABCD", explanation: "根据《专利法》第31条第2 款的规定，一件外观设计专利申请限于一项 外观设计。根据《审查指南》第一部分第三 章第9节的规定，B、C选项属于由多个构件 相结合构成的一件产品的组件产品，属于一 项外观设计，A、D选项属于同一产品的多个 无连接关系的局部外观设计，也属于一项外 观设计。因此A、B、C、D选项均正确。 （新编）"},
  {id: 519, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "仿制药申请人张某就被仿制药的相关专利权提出无效宣告请求，下列说法正确的是？", options: {"A": "张某应当在请求书中标注涉案专利为中国上市药品专利信息登记平台上登记的专利权", "B": "张某应当在请求书中标注已经提出第四类声明", "C": "张某在提交申请时应附具仿制药注册申请受理通知书和第四类声明文件的副本等相关证明文件", "D": "审查决定作出后，合议组应当将审查决定和无效宣告审查结案通知书送达之前曾通知的有关人民法院或者国务院药品监督管理部门"}, answer: "BD", explanation: "A选项，“轿车”和“轿车车模” 二 外观设计的申请文件与初步审查 二者属于不同类别的产品，不具有单一性， 不能作为一件申请提出。B选项，床和床头 柜设计构思相同，并且在习惯上同时出售或 者同时使用，具有单一性，可以作为一件申 请提出。C选项，《审查指南》第一部分第三 章第9.2.4节规定：“成套产品外观设计专利 申请中不应包含某一件或者几件产品的相 似外观设计”，因此C选项既有成套产品，又 有同一产品相似设计，不能作为一件申请提 出。D选项，仅有色彩差别的产品包装盒的 两项外观设计属于同一产品两项以上的相 似外观设计，具有单一性，可以作为一件申 请提出。(2016)"},
  {id: 520, topic: "专题二十 无效宣告请求审理程序", type: "multiple", question: "李某在同日对同样的发明创造申请了两项专利权，张某欲对李某的专利提出无效宣告请求，以下情形正确的是？", options: {"A": "李某申请了一项发明专利和一项实用新型专利，且在申请时各自进行了声明并最终均获得授权，张某以该发明专利权不符合专利法第九条第一款为由请求宣告无效，若发明专利授权时实用新型专利权尚未终止，李某可以通过放弃实用新型专利权而保留发明专利权", "B": "张某仅以李某的两项发明专利权不符合专利法第九条第一款的规定为由，请求宣告授权在前的专利权无效的，经合议组审查构成同样的发明创造的，应当宣告该项专利权无效", "C": "张某仅以李某的两项实用新型专利权不符合专利法第九条第一款的规定为由，请求宣告授权在后的专利权无效的，经合议组审查构成同样的发明创造的，应当宣告该项专利权无效", "D": "李某申请了一项发明专利和一项实用新型专利，提前公开的发明专利因未缴纳实质审查费用而被视为撤回，张某以发明专利破坏实用新型专利的新颖性为由请求宣告无效，合议组应当宣告实用新型专利权无效"}, answer: "ABCD", explanation: "《审查指南》第一部分第三 章第9.1节规定：“同一产品的两项以上的相 似外观设计可作为一件申请，.一般情况 下，经整体观察，如果其他设计和基本设计 具有相同或者相似的设计特征，并且二者之 间的区别点在于局部细微变化、该类产品的 惯常设计、设计单元重复排列、局部外观设 计在整体中位置和/或比例关系的常规变化 或者仅色彩要素的变化等情形，则通常认为 二者属于相似的外观设计”，因此A、B、C、D 选项均正确。(新编）"},
  {id: 521, topic: "专题二十 无效宣告请求审理程序", type: "single", question: "请求人赵某认为，专利权人钱某所拥有的具有相同申请日（有优先权的，指优先权日）、不同授权日的两项专利权不符合《专利法》第九条第一款的规定，向国家知识产权局提出无效宣告请求并被受理。针对赵某的无效宣告请求，下列说法正确的是？", options: {"A": "赵某请求宣告其中授权在前的专利权无效，在不存在其他无效宣告理由或者其他理由不成立的情况下，合议组应当维持该项专利权有效", "B": "赵某请求宣告其中授权在后的专利权无效，合议组经审查后认为构成同样的发明创造的，应当宣告该项专利权无效", "C": "赵某请求宣告其中任一专利权无效，合议组经审查后认为两者构成同样的发明创造的，合议组可以自行决定选择其中一项专利权宣告无效", "D": "如果上述两项专利权为钱某同日（仅指申请日)申请的一项实用新型专利权和一项发明专利权，钱某在申请时根据《专利法实施细则》第四十七条第二款的规定作出过说明，且发明专利权授予时实用新型专利权尚未终止，在此情形下，钱某可以通过放弃授权在前的实用新型专利权以保留被请求宣告无效的发明专利权口头审理与证据"}, answer: "B", explanation: "根据《专利法》第31条第2款的 规定，合案申请的外观设计包括用于同一类 别并且成套出售或者使用的产品：根据《细 则》第40条第2款的规定、同一类别并且成 套出售或者使用的产品是指各产品属于分 类表中同一大类，习惯上同时出售或者同时 使用，而且具有相同的设计构思。A选项， 鞋柜和书柜在习惯上并不同时出售或者同 时使用，不能合案申请，A选项错误。B选 项，床单、被翠和杭套属于同一类别，并且能 够成套出售或者使用、可以合案申请，B选 项正确。C选项、铅笔和橡皮在习惯上并不 同时出售，不能合案申请，C选项错误。D选 项，皮鞋和鞋盒不属于同一类别，不能合案 申请，D选项错误。（2012）"},
  {id: 522, topic: "专题二十一 口头审理与证据", type: "multiple", question: "下列有关复审程序中口头审理的哪种说法是正确的？", options: {"A": "复审请求人提出口头审理请求后，复审和无效审理部必须进行口头审理", "B": "在一件复审案件的审理过程中，只能进行一次口头审理", "C": "在收到口头审理通知书后，复审请求人必须参加口头审理，否则复审请求视为撤回", "D": "口头审理可以采用线下与线上审理相结合的方式"}, answer: "ABD", explanation: "A选项，“彼此相似的两个电 饭锅”属于同一产品的相似外观设计，可以 合案申请。B选项，“材质相同的餐桌和餐 椅”在习惯上同时出售或使用，可以合案申 请。C选项，“浴缸和沐浴房”在习惯上不属 于同时出售或使用的产品，不能合案申请。 D选项，“沙发和可放在沙发上使用的靠 垫”在习惯上同时出售或使用，可以合案申 请，因此A、B、D选项正确。（2015）"},
  {id: 523, topic: "专题二十一 口头审理与证据", type: "multiple", question: "甲针对乙的某项专利权提出了无效宣告请求，当事人可以依据下列哪些理由请求进行口头审理？", options: {"A": "乙要求同甲当面质证和辩论", "B": "甲需要当面向合议组说明事实", "C": "甲需要实物演示", "D": "乙需要请出具过证言的证人作证"}, answer: "ABD", explanation: "对外观设计专利申请文件 的修改不得超出原图片或者照片表示的范 围。A、B、D选项均为消除原申请文件存在 的缺陷，没有超出原范围。C选项改变图案 位置，构成新的外观设计，修改超出原图片 或者照片表示的范围，不符合专利法第33 条的规定。（2018）"},
  {id: 524, topic: "专题二十一 口头审理与证据", type: "multiple", question: "复审请求人丁某收到复审和无效审理部发出的口头审理通知书后，其下列哪个做法不符合相关规定？", options: {"A": "丁某不参加口头审理，其委托的代理机构指派两名专利代理师参加", "B": "丁某在指定的期限内进行书面意见陈述，不参加口头审理", "C": "丁某未进行书面意见陈述，在指定日期参加口头审理", "D": "丁某与其委托的四名专利代理师在指定的日期参加口头审理"}, answer: "ABC", explanation: "外观设计的初步审查范围 包括申请文件的明显实质性缺陷审查，根据 2023年细则的修改，外观设计明显实质性 缺陷审查范围包括专利法第23条第1款（类 似新颖性）、第2款（类似创造性）、细则第11 条（诚信原则），不包括专利法第23条第3款 （与在先合法权利冲突），因此A、B、C选项 正确，D选项错误。（新编）"},
  {id: 525, topic: "专题二十一 口头审理与证据", type: "multiple", question: "无效宣告请求人张某就李某的一项专利权提出无效宣告请求，下列说法正确的有：", options: {"A": "张某在指定的答复期限届满时仍未提交回执，其无效宣告请求视为撤回", "B": "在发出口头审理通知后，由于张某的原因未按期举行口头审理，无效宣告请求审查程序终止", "C": "合议组可以通过专利局指定的特定电子系统发送口头审理通知书", "D": "合议组可以采取邮寄、传真、电子邮件、电话、短信等方式告知张某进行口头审理的日期和地点等事项"}, answer: "ABD", explanation: "A、B选项，外观设计原申请 为产品整体（或局部）外观设计的，不允许将 其中的一部分（或整体）作为分案申请提出， 因此A、B选项做法不正确。C、D选项，只有 在主动修改期限内，可以在整体外观与局部 外观直接转化，超出主动修改期限，都不被 允许，因此C选项正确，D选项做法不正确。 （新编）"},

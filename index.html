const STORAGE_KEY = 'exam_practice_v2';

function getHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY + '_history') || '[]'); } catch { return []; }
}
function saveHistory(h) { localStorage.setItem(STORAGE_KEY + '_history', JSON.stringify(h)); }
function saveCurrentSession() {
    if (!state.pool.length) return;
    localStorage.setItem(STORAGE_KEY + '_session', JSON.stringify({
        mode: state.mode,
        poolIds: state.pool.map(q => q.id),
        currentIndex: state.currentIndex,
        correctCount: state.correctCount,
        answered: state.answered,
        timestamp: Date.now(),
    }));
}
function loadCurrentSession() {
    try { const r = localStorage.getItem(STORAGE_KEY + '_session'); return r ? JSON.parse(r) : null; } catch { return null; }
}
function clearCurrentSession() { localStorage.removeItem(STORAGE_KEY + '_session'); }
function recordCompletedSession() {
    const history = getHistory();
    const labels = { all: '全部题目', single: '仅单选', multi: '仅多选', random: '随机50题', wrong: '错题练习' };
    history.unshift({
        mode: state.mode, modeLabel: labels[state.mode] || state.mode,
        total: state.pool.length, correct: state.correctCount,
        accuracy: Math.round(state.correctCount / state.pool.length * 100),
        timestamp: Date.now(),
    });
    if (history.length > 50) history.length = 50;
    saveHistory(history);
    clearCurrentSession();
}
function getWrongQuestions() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY + '_wrong') || '{}'); } catch { return {}; }
}
function saveWrongQuestions(w) { localStorage.setItem(STORAGE_KEY + '_wrong', JSON.stringify(w)); }
function markQuestionWrong(qId, userAns, correctAns) {
    const w = getWrongQuestions();
    w[qId] = { userAnswer: userAns, correctAnswer: correctAns, timestamp: Date.now(), count: (w[qId]?.count || 0) + 1 };
    const keys = Object.keys(w);
    if (keys.length > 200) delete w[keys[0]];
    saveWrongQuestions(w);
}
function markQuestionCorrect(qId) {
    const w = getWrongQuestions();
    if (w[qId]) { delete w[qId]; saveWrongQuestions(w); }
}

const ALL_QUESTIONS = [...RAW_QUESTIONS];
let customQuestions = [];  // 手动录入的题目

// ====== 初始化 ======
function init() {
    state.pool = buildPool('all');
    document.getElementById('total-badge').textContent = ALL_QUESTIONS.length + ' 道题目已加载';
    document.getElementById('loaded-count').textContent = ALL_QUESTIONS.length;
    initAddPanel();

    // 恢复上次未完成的练习
    const session = loadCurrentSession();
    if (session && session.poolIds && session.poolIds.length > 0) {
        const allQ = [...ALL_QUESTIONS, ...customQuestions];
        const restored = session.poolIds.map(id => allQ.find(q => q.id === id)).filter(Boolean);
        if (restored.length > 0 && session.currentIndex < restored.length) {
            state.pool = restored;
            state.mode = session.mode || 'all';
            state.currentIndex = session.currentIndex;
            state.correctCount = session.correctCount || 0;
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.mode === state.mode);
            });
        }
    }

    renderPractice();
    updateStats();
}

function buildPool(mode) {
    let base = [...ALL_QUESTIONS, ...customQuestions];
    if (mode === 'single') return base.filter(q => q.type === '单选');
    if (mode === 'multi') return base.filter(q => q.type === '多选');
    if (mode === 'wrong') {
        const wrong = getWrongQuestions();
        const wrongIds = new Set(Object.keys(wrong).map(Number));
        return base.filter(q => wrongIds.has(q.id));
    }
    if (mode === 'random') {
        const shuffled = [...base].sort(() => Math.random() - 0.5);
        return shuffled.slice(0, 50);
    }
    return base;
}

function setMode(btn, mode) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const sameMode = state.mode === mode;
    state.mode = mode;

    if (!sameMode && (state.currentIndex > 0 || state.correctCount > 0)) {
        recordCompletedSession();
    }

    state.pool = buildPool(mode);

    // 同模式切换：保留进度（比如刷新错题列表）
    // 切换到不同模式：从第1题开始
    if (!sameMode) {
        state.currentIndex = 0;
        state.correctCount = 0;
        state.answered = false;
        state.selectedLetters = new Set();
        clearCurrentSession();
    }

    renderPractice();
    updateStats();
}

// ====== 练习逻辑 ======
function renderPractice() {
    const content = document.getElementById('practice-content');
    
    if (state.pool.length === 0) {
        content.innerHTML = `<div class="empty-state"><div class="empty-icon">📚</div><p class="empty-text">暂无题目</p></div>`;
        return;
    }

    if (state.currentIndex >= state.pool.length) {
        // 完成
        const acc = Math.round(state.correctCount / state.pool.length * 100);
        content.innerHTML = `
            <div class="practice-card" style="text-align:center">
                <div style="font-size:3rem;margin-bottom:16px">🎉</div>
                <div style="font-size:1.5rem;font-weight:700;color:var(--accent);margin-bottom:12px">练习完成！</div>
                <p style="color:var(--text-secondary);margin-bottom:8px">
                    共 ${state.pool.length} 题 · 正确 ${state.correctCount} 题 · 正确率 <strong style="color:var(--accent)">${acc}%</strong>
                </p>
                <div style="margin-top:28px;display:flex;gap:12px;justify-content:center">
                    <button class="btn btn-primary" onclick="restartPractice()">重新开始</button>
                    <button class="btn btn-secondary" onclick="restartShuffle()">随机重练</button>
                    <button class="btn btn-ghost" onclick="switchToHistory()">查看记录</button>
                </div>
            </div>`;
        return;
    }

    const q = state.pool[state.currentIndex];
    const isMulti = q.type === '多选';
    state.answered = false;
    state.selectedLetters = new Set();
    saveCurrentSession();

    let hintHtml = isMulti ? `<div class="multi-hint">多选题 — 请选择所有正确选项后点击"提交答案"</div>` : '';
    let submitHtml = isMulti ? `<div class="submit-row"><button class="btn btn-primary" id="submit-btn" onclick="submitMulti()">提交答案</button></div>` : '';

    const optHtml = q.options.map(opt => `
        <div class="practice-option" data-letter="${opt.letter}" onclick="selectOption('${opt.letter}', ${isMulti})">
            <span class="option-letter">${opt.letter}</span>
            <span>${opt.content}</span>
        </div>
    `).join('');

    content.innerHTML = `
        <div class="practice-card">
            <div class="question-meta-row">
                <div class="question-number">第 ${state.currentIndex + 1} 题 / 共 ${state.pool.length} 题</div>
                <span class="type-badge ${isMulti ? 'multi' : 'single'}">${q.type}题</span>
            </div>
            <div class="practice-question">${q.question}</div>
            ${hintHtml}
            <div class="practice-options">${optHtml}</div>
            ${submitHtml}
            <div class="result-box" id="result-box" style="display:none"></div>
            <div class="practice-nav">
                <button class="btn btn-ghost" onclick="prevQuestion()" ${state.currentIndex === 0 ? 'disabled' : ''}>← 上一题</button>
                <span class="progress-info">进度 <strong>${state.currentIndex + 1}</strong> / ${state.pool.length}</span>
                <button class="btn btn-primary" onclick="nextQuestion()">下一题 →</button>
            </div>
        </div>`;
    
    updateStats();
}

function selectOption(letter, isMulti) {
    if (state.answered) return;
    
    if (!isMulti) {
        // 单选：立即判断
        judgeAnswer([letter]);
    } else {
        // 多选：切换选中状态
        const opt = document.querySelector(`.practice-option[data-letter="${letter}"]`);
        if (state.selectedLetters.has(letter)) {
            state.selectedLetters.delete(letter);
            opt.classList.remove('selected');
        } else {
            state.selectedLetters.add(letter);
            opt.classList.add('selected');
        }
    }
}

function submitMulti() {
    if (state.answered) return;
    if (state.selectedLetters.size === 0) {
        alert('请至少选择一个选项');
        return;
    }
    judgeAnswer([...state.selectedLetters]);
}

function judgeAnswer(selectedLetters) {
    if (state.answered) return;
    state.answered = true;
    
    const q = state.pool[state.currentIndex];
    const correctLetters = q.answer.split('');
    const selectedSet = new Set(selectedLetters);
    const correctSet = new Set(correctLetters);
    
    // 判断正确性
    const isCorrect = selectedLetters.length === correctLetters.length &&
        correctLetters.every(l => selectedSet.has(l));
    
    if (isCorrect) state.correctCount++;
    
    // 标记选项颜色
    document.querySelectorAll('.practice-option').forEach(opt => {
        opt.classList.add('disabled');
        const letter = opt.dataset.letter;
        if (correctSet.has(letter)) {
            opt.classList.add('correct');
            opt.classList.remove('selected');
        } else if (selectedSet.has(letter)) {
            opt.classList.add('wrong');
            opt.classList.remove('selected');
        }
    });
    
    // 隐藏提交按钮
    const submitBtn = document.getElementById('submit-btn');
    if (submitBtn) submitBtn.style.display = 'none';
    
    // 显示结果
    const resultBox = document.getElementById('result-box');
    resultBox.style.display = 'block';
    
    const correctDisplay = correctLetters.map(l => {
        const opt = q.options.find(o => o.letter === l);
        return `<strong>${l}</strong> — ${opt ? opt.content.substring(0, 60) : ''}`;
    }).join('<br>');
    
    let cls = 'correct', icon = '✅', title = '回答正确！';
    if (!isCorrect) {
        cls = 'wrong'; icon = '❌'; title = '回答错误';
    }
    
    resultBox.className = `result-box ${cls}`;
    resultBox.innerHTML = `
        <div class="result-header">
            <span class="result-icon">${icon}</span>
            <span class="result-title">${title}</span>
        </div>
        <div class="result-answer">正确答案：<br>${correctDisplay}</div>
    `;
    
    // 记录错题/正确
    if (isCorrect) {
        markQuestionCorrect(q.id);
    } else {
        markQuestionWrong(q.id, selectedLetters.join(''), q.answer);
    }

    updateStats();
    updateWrongCount();
}

function nextQuestion() {
    state.currentIndex++;
    renderPractice();
}
function prevQuestion() {
    if (state.currentIndex > 0) { state.currentIndex--; renderPractice(); }
}
function restartPractice() {
    recordCompletedSession();
    state.currentIndex = 0; state.correctCount = 0;
    state.answered = false; state.selectedLetters = new Set();
    renderPractice();
}
function restartShuffle() {
    recordCompletedSession();
    state.pool = [...state.pool].sort(() => Math.random() - 0.5);
    state.currentIndex = 0; state.correctCount = 0;
    state.answered = false; state.selectedLetters = new Set();
    renderPractice();
}

function updateStats() {
    document.getElementById('total-count').textContent = state.pool.length;
    document.getElementById('current-num').textContent = state.pool.length > 0 ? state.currentIndex + 1 : 0;
    document.getElementById('correct-count').textContent = state.correctCount;
    const answered = state.currentIndex + (state.answered ? 1 : 0);
    const acc = answered > 0 ? Math.round(state.correctCount / answered * 100) : 0;
    document.getElementById('accuracy').textContent = acc + '%';
    // Progress bar
    const pct = state.pool.length > 0 ? Math.round(state.currentIndex / state.pool.length * 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
}

// ====== 题库浏览 ======
function renderList() {
    const keyword = document.getElementById('search-input').value.trim().toLowerCase();
    const typeFilter = document.getElementById('type-filter').value;
    
    let filtered = [...ALL_QUESTIONS, ...customQuestions];
    if (typeFilter !== 'all') filtered = filtered.filter(q => q.type === typeFilter);
    if (keyword) filtered = filtered.filter(q => q.question.toLowerCase().includes(keyword) ||
        q.options.some(o => o.content.toLowerCase().includes(keyword)));
    
    const content = document.getElementById('list-content');
    if (filtered.length === 0) {
        content.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p class="empty-text">没有找到匹配的题目</p></div>`;
        return;
    }
    
    const items = filtered.slice(0, 100).map((q, i) => `
        <div class="question-item">
            <div class="q-text">${i + 1}. ${q.question.length > 100 ? q.question.substring(0, 100) + '...' : q.question}</div>
            <div class="q-meta">
                <span class="q-type-tag ${q.type === '单选' ? 'single' : 'multi'}">${q.type}</span>
                <span>${q.options.length} 个选项</span>
                <span>答案：<strong style="color:var(--accent)">${q.answer}</strong></span>
            </div>
        </div>
    `).join('');
    
    content.innerHTML = `
        <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:12px">共 ${filtered.length} 道${filtered.length > 100 ? '（显示前100道）' : ''}</p>
        <div class="question-list">${items}</div>`;
}

// ====== 手动录入 ======
let addOptionCount = 2;
const addLetters = ['A','B','C','D','E','F','G','H'];

function initAddPanel() {
    const c = document.getElementById('add-options-container');
    c.innerHTML = '';
    addOptionCount = 2;
    for (let i = 0; i < 2; i++) addOptionRowAt(i);
}

function addOptionRowAt(i) {
    const c = document.getElementById('add-options-container');
    const div = document.createElement('div');
    div.id = `add-opt-${i}`;
    div.style.cssText = 'display:flex;gap:8px;align-items:center';
    div.innerHTML = `
        <span style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;font-weight:600;color:var(--text-secondary);flex-shrink:0">${addLetters[i]}</span>
        <input type="text" id="opt-content-${i}" placeholder="选项内容" style="flex:1;padding:9px 12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:inherit">
        <label style="font-size:0.82rem;color:var(--text-secondary);display:flex;align-items:center;gap:4px;cursor:pointer">
            <input type="checkbox" id="opt-correct-${i}" style="accent-color:var(--accent)"> 正确
        </label>`;
    c.appendChild(div);
}

function addOptionRow() {
    if (addOptionCount >= 8) { alert('最多8个选项'); return; }
    addOptionRowAt(addOptionCount++);
}

function saveManualQuestion() {
    const text = document.getElementById('q-text-input').value.trim();
    const type = document.getElementById('q-type-select').value;
    if (!text) { alert('请输入题目内容'); return; }
    
    const options = [];
    const answerLetters = [];
    for (let i = 0; i < addOptionCount; i++) {
        const el = document.getElementById(`opt-content-${i}`);
        const ck = document.getElementById(`opt-correct-${i}`);
        if (el && el.value.trim()) {
            options.push({ letter: addLetters[i], content: el.value.trim() });
            if (ck && ck.checked) answerLetters.push(addLetters[i]);
        }
    }
    if (options.length < 2) { alert('至少需要2个选项'); return; }
    if (answerLetters.length === 0) { alert('请标记正确答案'); return; }
    
    const newQ = {
        id: ALL_QUESTIONS.length + customQuestions.length + 1,
        question: text, type, options,
        answer: answerLetters.join('')
    };
    customQuestions.push(newQ);
    state.pool = buildPool(state.mode);
    
    alert('题目已添加！');
    document.getElementById('q-text-input').value = '';
    initAddPanel();
    updateStats();
    updateWrongCount();
}

function updateWrongCount() {
    const wrong = getWrongQuestions();
    const btn = document.getElementById('wrong-mode-btn');
    if (btn) {
        const count = Object.keys(wrong).length;
        btn.textContent = '错题练习' + (count > 0 ? ' (' + count + ')' : '');
    }
}

// ====== 做题记录 ======
function renderHistory() {
    const history = getHistory();
    const list = document.getElementById('history-list');
    if (history.length === 0) {
        list.innerHTML = '<div class="history-empty">还没有做题记录，开始练习吧！</div>';
    } else {
        let totalQ = 0, totalC = 0;
        history.forEach(h => { totalQ += h.total; totalC += h.correct; });
        const totalAcc = totalQ > 0 ? Math.round(totalC / totalQ * 100) : 0;
        const items = history.slice(0, 20).map(h => {
            const d = new Date(h.timestamp);
            const t = (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
            const c = h.accuracy >= 80 ? 'var(--success)' : h.accuracy >= 60 ? 'var(--warning)' : 'var(--error)';
            return '<div class="history-item"><div class="history-item-left"><div class="history-item-mode">'+h.modeLabel+'</div><div class="history-item-time">'+t+'</div></div><div class="history-item-stats"><div class="history-item-score" style="color:'+c+'">'+h.accuracy+'%</div><div class="history-item-detail">'+h.correct+'/'+h.total+'</div></div></div>';
        }).join('');
        list.innerHTML = '<div style="text-align:center;margin-bottom:16px;padding:16px;background:var(--bg-secondary);border-radius:var(--radius-md)"><div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:4px">累计做题</div><div style="font-size:1.8rem;font-weight:700;color:var(--accent)">'+totalQ+'</div><div style="font-size:0.82rem;color:var(--text-secondary);margin-top:4px">总正确率 <strong style="color:'+(totalAcc>=80?'var(--success)':totalAcc>=60?'var(--warning)':'var(--error)')+'">'+totalAcc+'%</strong>（'+totalC+'/'+totalQ+'）</div></div>'+items+(history.length>20?'<div style="text-align:center;color:var(--text-muted);font-size:0.82rem;margin-top:8px">仅显示最近20条</div>':'');
    }
    renderWrongReview();
}

function renderWrongReview() {
    const wrong = getWrongQuestions();
    const card = document.getElementById('wrong-review-card');
    const list = document.getElementById('wrong-review-list');
    const ids = Object.keys(wrong);
    if (!ids.length) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    const allQ = [...ALL_QUESTIONS, ...customQuestions];
    const qMap = {}; allQ.forEach(q => qMap[q.id] = q);
    const items = ids.slice(0, 100).map(id => {
        const w = wrong[id]; const q = qMap[parseInt(id)];
        if (!q) return '';
        return '<div class="question-item"><div class="q-text">'+(q.question.length>80?q.question.substring(0,80)+'...':q.question)+'</div><div class="q-meta"><span class="q-type-tag '+(q.type==='单选'?'single':'multi')+'">'+q.type+'</span><span style="color:var(--error)">你选：'+w.userAnswer+'</span><span style="color:var(--success)">正确：'+w.correctAnswer+'</span>'+(w.count>1?'<span class="wrong-mark">错'+w.count+'次</span>':'')+'</div></div>';
    }).filter(Boolean).join('');
    list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:8px">共 '+ids.length+' 道错题'+(ids.length>100?'（显示前100道）':'')+'</p><div class="question-list">'+items+'</div>';
}

function startWrongPractice() {
    const wrong = getWrongQuestions();
    const ids = Object.keys(wrong);
    if (ids.length === 0) { alert('暂无错题记录'); return; }
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-tab="practice"]').classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('practice-panel').classList.add('active');
    setMode(document.getElementById('wrong-mode-btn'), 'wrong');
}

function clearAllHistory() {
    if (!confirm('确定清除全部做题记录？此操作不可恢复。')) return;
    localStorage.removeItem(STORAGE_KEY + '_history');
    localStorage.removeItem(STORAGE_KEY + '_wrong');
    localStorage.removeItem(STORAGE_KEY + '_session');
    renderHistory();
}

function switchToHistory() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-tab="history"]').classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('history-panel').classList.add('active');
    renderHistory();
}

// ====== Tab 切换 ======
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(tab + '-panel').classList.add('active');
        if (tab === 'list') renderList();
        if (tab === 'practice') { renderPractice(); updateStats(); }
        if (tab === 'history') renderHistory();
    });
});

// 启动
init();
</script>
</body>
</html>

  {id: 133, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪些情形属于专利权的保护客体？", options: {"A": "一种计算机程序产品，包括计算机程序，其特征在于，该计算机程序被处理器执行时实现橡胶模压成型处理", "B": "一种扩充移动计算设备储存容量的方法，利用虚拟设备文件系统模块在本地计算机上建立虚拟存储空间", "C": "一种电子券使用倾向度的分析方法，通过分析电子券的种类、用户行为等，能够准确地建立电子券使用倾向度识别模型", "D": "一种基于用电特征的经济景气指数分析方法，通过统计各项经济指标和用电指标，来评估待检测地区的经济景气指数"}, answer: "BCD", explanation: "A选项，动物屠宰方法能在产业上 使用，并且能够产生积极效果，具备实用性。B、C 选项均属于《审查指南》第二部分第五章第3.2.4节 规定的非治疗目的外科手术方法，由于是以有 生命的人或者动物为实施对象，无法在产业上使 用，因此不具备实用性。D选项，根据《审查指南》 第二部分第五章第3.2.3节的规定，利用特定的自 然条件建造的自始至终都是不可移动的唯一产品 不具备实用性，因此D选项不具备实用性。（2009）"},
  {id: 134, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列不属于专利权保护的是？", options: {"A": "计算机程序产品", "B": "计算机介质", "C": "计算机装置", "D": "计算机代码"}, answer: "BD", explanation: "A选项，为美容而实施的外科手术方 法属于非治疗目的外科手术方法，不具备实用 性。B选项中利用的喜马拉雅山上的无污染水虽 然是有限的或者特定的，但是生产所获得的饮料 不是独一无二的，可以在产业上制造，因此具备实 用性。C选项利用了长江某段的独特地形这一独 一无二的自然条件，不具备实用性。在D选项的方 法中，人的技术介入对该方法所要达到的目的或 者效果起了主要控制作用，属于非生物学生产方 法，因此具备实用性。（2011）"},
  {id: 135, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列关于实用性的说法正确的是？", options: {"A": "人体的非治疗目的外科手术方法不具备实用性", "B": "违背自然规律的发明创造不具备实用性", "C": "申请发明或实用新型专利的产品的成品率与不具有再现性是有本质区别的", "D": "是否具备实用性与说明书公开的程度无关"}, answer: "AD", explanation: "A选项属于利用独一无二且不可移 动的自然条件的方法，不具备实用性。B选项，在 产业上能够制造或者使用的技术方案，并不一定 意味着使用机器设备，B选项的手工编织方法具有 实用性。C选项，微型机器人属于用于外科手术中 的仪器或装置，具备实用性。D选项属于为美容而 实施的非治疗目的外科手术方法，不具备实用 性。（2015) 39，ABCD。根据《审查指南》第二部分第五章 第3，2.5节的规定，通过逐渐降低人或动物的体温， 以测量人或动物对寒冷耐受程度的测量方法；利 用降低吸入气体中氧气分压的方法逐级增加冠状 动脉的负荷，并通过动脉血压的动态变化观察冠 状动脉的代偿反应，以测量冠状动脉代谢机能的 非侵入性的检查方法，前述测量方法不具有实用 性，因此A、B选项正确。C选项属于利用特定的自 然条件建造的自始至终都是不可移动的唯一产 品，因此不具有实用性。D选项属于在人体上实施 的非治疗目的手术方法，因此不具有实用性。 (2019)"},
  {id: 136, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列有关实用性的说法哪些是正确的？", options: {"A": "判断实用性应当以申请日提交的说明书（包括附图)和权利要求书所公开的整体技术内容为依据，而不仅仅局限于权利要求所记载的内容", "B": "某产品的制备方法，其对环境清洁度有苛刻要求，导致实施时成品率极低，所以该制备方法不具备实用性", "C": "具备实用性的发明或者实用新型应该能够制造或使用，并且应当已经实施", "D": "满足实用性要求的技术方案应当符合自然规律并且具有再现性"}, answer: "AD", explanation: "A选项是利用独一无二的自然条件 的产品，因此不具有实用性。B选项要求保护一种 沙袋，能够在产业上制造，并解决了如何盛装黄河 河沙的技术问题，因此具有实用性。C选项中并未 体现对人体实施剖开、切除、缝合、纹刺等创伤性 或者介入性治疗或处置的方法，能在产业中制造， 并解决了辅助病人进食的技术问题，因此具有实 用性。D选项属于非治疗目的外科手术方法，由 于是以有生命的人为实施对象，无法在产业上使 用，因此不具有实用性。（新编）"},
  {id: 137, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "关于专利申请实用性的判断，以下说法正确的是？", options: {"A": "实用性要求专利申请主题必须能够在产业上制造或使用，因此，专利申请主题为产品的，该产品都需要由机器设备来制造", "B": "一种产品的生产方法，但其成品率极低，仅有", "C": "一项在自然界中不存在的新的化学物质的制造方法，但该方法不能在产业上应用", "D": "违背自然规律的科学原理的发明创造不具有实用性"}, answer: "ABC", explanation: "A选项属于对自然界客观存在的 物质、现象、变化过程及其特性和规律的揭示，是 科学发现，属于不可授权专利权的申请；B选项属 于利用禁止入药的毒性中药材完成的发明，属于 专利法第5条第1款规定的不能被授予专利权的 情形；C选项属于疾病的诊断方法，不属于授权主 题。D选项属于中药材的制药用途，属于可授权的 主题。（新编）"},
  {id: 138, topic: "专题五 专利保护的对象和主题", type: "single", question: "6%，因此属于发明无再现性，不具备实用性", options: {"C": "一种PM2.5净化器，极其昂贵，很少有人购买，因此不具有实用性", "D": "即使专利申请请求保护的产品已经投入生产和销售，也不可依此判断该申请符合有关实用性的规定", "A": "", "B": ""}, answer: "", explanation: "G。A、B、C选项，根据《审查指南》 第一部分第一章第6.2节的规定，对于要求 本国优先权或外国优先权的申请，在先申请 可以是发明也可以是实用新型专利申请，因 此A选项错误，B、C选项正确。D选项，根据 《专利法》第29条第2款的规定，申请人自外 观设计在中国第一次提出专利申请之日起 6个月内，又向国务院专利行政部门就相同 主题提出专利申请的，可以享有优先权，因 此外观设计专利申请可以作为本国优先权 的基础，D选项错误。（2019改编）"},
  {id: 139, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "权利要求3所述的方法，其中所述用针的方向是从上眼脸内眼角向外眼角方向。”上述权利要求请求保护的发明创造哪些具有实用性？", options: {"A": "权利要求1", "B": "权利要求2", "C": "权利要求3", "D": "权利要求4"}, answer: "BC", explanation: "A选项，外观设计不能作为发 明的优先权基础。B选项，虽然申请人已就 在先申请提出分案申请，但分案申请的母案 可以作为要求本国优先权的基础，B选项正 确。C选项，被撤回的在先申请可以作为要 求本国优先权的基础，正确。D选项，在先 申请已要求过外国优先权，因此不能作为要 求本国优先权的基础。（新编）"},
  {id: 140, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪些申请专利的技术方案不具备实用性？", options: {"A": "一种屠宰方法，其特征在于向活牲畜施加1万伏特电压3~7秒", "B": "一种提取黑熊胆汗的方法，其特征在于向活体黑熊体内植人联通胆囊的导管，定时提取", "C": "一种美容方法，其特征在于向人脸部皱纹处注射肉毒素", "D": "亚欧大运河，其特征在于运河由北京一莫斯科一巴黎一伦敦，依照地形地貌特点分段分期建成"}, answer: "BCD", explanation: "A选项中申请未超出优先权 期限，且被视为撤回，可以作为优先权的基 础。B选项中分案申请的子案不能作为优 先权的基础。C选项中已经享有优先权的 申请不能作为优先权的基础。D选项中 PCT国际申请日已经超出12月优先权期 限，不能作为优先权的基础。（新编）"},
  {id: 141, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列发明专利申请所涉及的技术方案哪些具备实用性？", options: {"A": "一种为美容而实施的外科手术方法", "B": "一种利用喜马拉雅山上的无污染水制造的饮料", "C": "一种利用长江某段的独特地形建造水电站的方法", "D": "一种在奶牛饲料中添加含硒物质得到富硒牛奶的方法"}, answer: "ACD", explanation: "A选项已经撤回的外观设计 专利申请可以作为在后的外观设计专利申 请的优先权基础，A选项正确。B选项由于 在先外观设计已经在中国获得授权，无法撤 回，因此无法作为在后申请的优先权基础。 C、D选项，外观设计可以就在先发明、实用 新型专利的附图要求优先权，且由于外观设 计和发明、实用新型要求保护的客体不同， 不会造成重复授权，因此在先发明、实用新 型是否获得专利授权不影响其作为国内优 先权的基础，因此C、D选项正确。（新编）"},
  {id: 142, topic: "专题五 专利保护的对象和主题", type: "single", question: "下列哪些专利申请的技术方案不具备实用性？", options: {"A": "一种南水北调的方法，其特征在于依照地形地貌的特点，由丹江口水库引水，自流供水给黄淮平原地区", "B": "一种手工编织地毯的方法，其特征在于以旧毛线和粗帆布为原料经手工编制而成- 44 -", "C": "一种微型机器人，其特征在于用于外科手术中", "D": "一种纹眉的方法，其特征在于用纹眉针刺人皮肤，注人纹眉液"}, answer: "D", explanation: "A、C选项，根据《细则》第35条第 2.款的规定，A选项中分案申请的子案不能 作为优先权的基础；C选项中已经享有优先 权的申请不能作为优先权的基础。B选项 中在先申请的申请日已经超出12.个月优先 权期限，不能作为优先权的基础。D选项中 申请尚未办理登记手续，还没有被授予专利 权，可以作为本国优先权的基础，正确。 （2010改编） 6、ABCD。根据《审查指南》第二部分 第三章第4.1.3节的规定，申请人在外国首 次申请后，就相同主题的发明创造在优先权 期限内向中国提出的专利申请，都看作是在 该外国首次申请的申请日提出的，不会因为 在优先权期间内，即首次申请的申请日与在 后申请的申请日之间任何单位和个人提出 了相同主题的申请或者公布、利用这种发明 创造而失去效力。因此A、B、C选项中他人 的实施、公开行为都不会损害其新颖性。D 选项，根据《审查指南》第二部分第三章第 4.1.1节的规定，享有外国优先权的发明创 造与外国首次申请审批的最终结果无关，只 要该首次申请在有关国家或政府间组织中 获得了确定的申请日，就可作为要求外国优 先权的基础，因此D选项不会损害其新颖 性。（2006）"},
  {id: 143, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪些专利申请的技术方案不具备实用性？", options: {"A": "一种耐寒测量方法，其特征在于通过逐渐降低动物的体温，以测量动物对寒冷耐受程度", "B": "一种测量冠状动脉代谢机能的非侵人性的检查方法，其特征在于利用降低吸人气体中氧气分压的方法逐级增加冠状动脉的负荷", "C": "一种别墅，其特征在于依据地形地貌的特点进行建造", "D": "一种打耳洞的方法，其特征在于将一次性无菌穿耳器在耳垂上固定后压下"}, answer: "ABCD", explanation: "《审查指南》第二部分第三章 第4.1.2节规定：“专利法第29条所述的相同 主题的发明或者实用新型，是指技术领域、 所解决的技术问题、技术方案和预期的效果 相同的发明或者实用新型。但应注意这里 所谓的相同，并不意味在文字记载或者叙述 方式上完全一致”，这里“相同”包括四个方 面的相同，且不包括“实质相同”和“相似”， 因此A、B、C、D选项均错误。（2014改编）"},
  {id: 144, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "以下哪个选项不具有实用性？", options: {"A": "一种利用新疆吐鲁番日照时间长晾晒葡萄干的方法", "B": "一种盛装黄河里河沙的沙袋", "C": "一种辅助进食的方法，首先将硅胶管放人病人口腔内，然后移动硅胶管，最终使硅胶管未端经口腔插人至食道上端", "D": "一种面部填充方法，可改善面部皱纹使人年轻"}, answer: "ABD", explanation: "本题中，在先中请记载了环 氧树脂的含量数值范围30%～60%，以及 点40%，因此A选项的30%一40%、B选项的 40%、D选项的60%均在在先申请文件记 载，都可以享有在先申请的优先权，A、B、D 选项正确。C选项的50%没有被记载在在 先申请中，不可以享有在先申请的优先权。 (2010)"},
  {id: 145, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "以下哪些属于不可授予专利权的申请？", options: {"A": "经过临床发现黄花蒿可以治疗疤疾", "B": "一种用于抗癌的中药组合物，其中包含础霜及蟾酥", "C": "中医望、闻、问、切判断疾病的方法", "D": "青蒿素用于制备治疗疤疾组合物中的应用- 45 -优先权"}, answer: "BC", explanation: "A选项，在后申请的数值端点 和范围没有记载在在先申请中，不能享受在 先申请的优先权。B选项，在后申请数值范 围（30%～50%）及其端点（30%、50%）在元 申请均已记载，可以享受在先申请的优先 权，当选。C选项，在后申请的数值（30%、 35%、50%）在在先申请均已记载，可以享受 在先申请的优先权，当选。D选项，在后申 请数值范围的端点（20%、50%）在先申请中 已记载，但其范围（20～50%）在先申请没有 记载，不能享受在先申请的优先权。（2018）"},
  {id: 146, topic: "专题六 优先权", type: "multiple", question: "下列关于优先权的说法正确的是？", options: {"A": "要求外国优先权的发明专利申请，其在先申请只能是发明申请", "B": "要求本国优先权的发明专利申请，其在先申请可以是发明专利申请，也可以是实用新型专利申请", "C": "要求外国优先权的实用新型专利申请，其在先申请可以是发明专利申请，也可以是实用新型专利申请", "D": "外观设计专利申请不能作为本国优先权的基础"}, answer: "AC", explanation: "A、B、D选项主题名称与在先 申请相同，但在先申请文件没有记载A选项 中端点5.5%，因此A选项不能享有在先申 请的优先权。B、D选项的数值范围及端点 均已在在先申请文件中记载，可以享有在先 申请的优先权。C选项的主题名称与在先 申请主题名称不一致，在其他技术特征相同 的前提下，不满足“相同主题的发明创造”条 件，不能享有在先申请的优先权。（新编）"},
  {id: 147, topic: "专题六 优先权", type: "multiple", question: "李某于2024年4月6日向国家知识产权局提出一件发明专利申请。下列由李某首次向国家知识产权局提出的相同主题的申请，哪些可以作为该发明专利申请要求本国优先权的基础？", options: {"A": "申请日为2023年6月7日的外观设计专利申请，该申请已被授予专利权", "B": "申请日为2023年6月4日的发明专利申请，申请人已就该申请提出分案申请", "C": "申请日为2023年5月6日的发明专利申请，该申请于2024年4月5日被申请人撤回", "D": "申请日为2023年8月9日的发明专利申请，该申请享有外国优先权"}, answer: "CD", explanation: "A选项，摘要的内容不属于发 明或者实用新型原始记载的内容，记截在摘 要中的内容不能作为优先权基础，因此A选 项错误。B选项，《审查指南》第二部分第八 章第4.6.2.1节规定：“在在后申请中，其技术 方案已在在先申请中清楚记载的权利要求 可以享有优先权；而其技术方案未在在先申 请中记载的权利要求则不能享有优先权，应 当视为是在在后申请的申请日提出的。就 整个申请而盲，这种情况称为部分优先权， 即该申请的部分主题享有优先权，也就是说 部分权利要求所限定的技术方案享有优先 权”，因此B选项可以享有部分优先权，错 误。C选项，《审查指南》第二部分第三章第 4.2.4节规定：“一件中国在后申请中记载了 多个技术方案。例如，记载了A、B和C三个 方案，它们分别在三件中国首次申请中记载 过，则该中国在后申请可以要求多项优先 权”，因此C选项正确。D选项，在后申请技 术方案记载在在先申请的说明书或权利要 求中，都可以享有优先权，因此D选项正确。 (2013)"},
  {id: 148, topic: "专题六 优先权", type: "single", question: "王某于2023年7月2日向国家知识产权局提交了一件发明专利申请。下列哪些申请不能作为该申请要求优先权的基础？", options: {"A": "申请日为2022年9月3日的一件实用新型专利申请，该-46 -申请于2023年3月18日被视为撤回", "B": "2022年7月15日提交的一件发明专利申请，该申请是一件申请日为2020年11月5日的发明专利申请的分案申请该申请享有于2022年8月6日提交的实用新型专利申请的优先权", "D": "申请日为2021年1月2日的PCT国际申请，该申请进人中国国家阶段的时间是2022年7月2日", "C": "该申请享有于2022年8月6日提交的实用新型专利申请的优先权"}, answer: "C", explanation: "本题中，甲的原申请文件没有 记载刀具调节结构，A、B选项的补充修改都 超出原申请的范围，不被允许。C选项采用 在原独立权利要求的基础上增加一项以刀 具调节结构为附加技术特征的从属权利要 求，这样原独立权利要求中的技术方案记载 于原申请中，该技术方案可以享有原申请的 优先权；从属权利要求中的技术方案（包括 刀具调节结构）未记载于原申请中，不能享 有原申请的优先权，C选项可以享有部分优 先权，当选。D选项将刀具调节结构和原独 立权利要求组合为一个新的权利要求（新技 术方案），而原申请中并没有记载该新技术 方案，因此不能享有原申请的优先权。 （新编）"},
  {id: 149, topic: "专题六 优先权", type: "multiple", question: "下列哪些尚处于优先权期限内的专利或专利申请可以作为相同主题的外观设计专利申请的本国优先权基础？", options: {"A": "已经撤回的外观设计专利申请", "B": "已经被授予专利权的外观设计专利", "C": "已经被授予专利权的实用新型专利", "D": "处于实质审查过程中的发明专利申请"}, answer: "ABD", explanation: "A、B、D选项，由于首次申请 F记载技术方案a和b，因此，申请F1中的技 术方案b以及申请F2中的技术方案a和b均 可享有申请F的优先权，因此A、B、D选项正 确。C选项，由于申请F1不是首次申请，因 此申请F2中的技术方案b不能享有申请F1 的优先权，C选项错误。（2011改编）"},
  {id: 150, topic: "专题六 优先权", type: "single", question: "申请人于2024年6月16日向国家知识产权局提出一件发明专利申请。下述由该申请人提出的相同主题的在先申请，哪些可以作为其要求本国优先权的基础？", options: {"A": "2024年1月7日提交的申请日为2023年9月14日的分案申请", "B": "申请日为2023年6月15日的实用新型专利申请", "C": "申请日为2023年7月25日的享有外国优先权的发明专利申请", "D": "申请日为2023年6月18日的实用新型专利申请，国家知识产权局已经对该申请发出授予专利权通知书，申请人尚未办理登记手续"}, answer: "D", explanation: "本题中，申请人在中国提出的 专利申请包括产品、方法和设备三个技术方 案，该产品和方法在英国专利申请中首次公 开，设备在法国专利申请中首次公开，因此 中国专利申请中的产品和方法可以享有英 国专利申请的优先权，设备可以享有法国专 利申请的优先权，A、B、C选项错误，D选项 正确。（2012)"},
  {id: 151, topic: "专题六 优先权", type: "multiple", question: "对于一件要求外国优先权的发明专利申请，在其优先权期限内发生的下列哪些事件不会损害其新颖性？", options: {"A": "他人就相同主题在我国提出另外一件实用新型专利申请", "B": "他人将相同主题的发明创造在一本国外刊物上公开", "C": "一家企业在我国境内实施相同主题的发明创造", "D": "其作为优先权基础的在先申请在外国被授予专利权"}, answer: "AB", explanation: "本题中，记载于在先申请说明 书和权利要求中的a、b方案以及b、c方案均 可以作为优先权基础，而摘要不属于原始申 请文件公开的范围，仅记载于摘要中的a、e 方案不能作为优先权基础，因此，A、B选项 正确，C选项错误。在先申请中没有记载a、 b、c构成的技术方案，D选项不可以要求申 请X的优先权。（2016)"},
  {id: 152, topic: "专题六 优先权", type: "single", question: "在判断是否享有优先权时，下列关于“相同主题的发明创造”的说法哪些是错误的？", options: {"A": "技术领域、所解决的技术问题、技术方案和预期的效果实质相同的发明或者实用新型属于相同主题的发明创造", "B": "技术领域相同、技术方案相似的发明或者实用新型属于相同主题的发明创造", "C": "能够解决完全相同的技术问题的发明或者实用新型都属于相同主题的发明创造", "D": "能够达到完全相同的预期效果的发明或者实用新型都属于相同主题的发明创造"}, answer: "C", explanation: "A、C选项，出版物的印刷日视为 公开日，印刷日只写明年月或者年份的，以 所写月份的最后一日或者所写年份的12月 31日为公开日。A选项中期刊的公开日应 视为2023年12月31日，晚于该申请的申请 日，不破坏其新颖性。B选项中论文的公开 日（发表日）与该申请的申请日是同一天，不 破坏其新颖性。C选项中书籍的公开日（出 版日）应视为2023年11月30日，早于该中 请的申请日，属于现有技术，破坏其新颖性。 纸质出版物和视听资料是否能够获得与出 版发行量多少、是否有人阅读过、申请人是 否知道无关。D选项的申请日早于该申请 的申请日，但该实用新型专利申请由于主动 撤回并未公开，既不属于现有技术，也不构 成抵触申请，不破坏其新颖性。（2016改编）"},
  {id: 153, topic: "专题六 优先权", type: "multiple", question: "在先申请记载了某种粘结剂，其中环氧树脂的含量为30%～60%，该申请还公开了环氧树脂含量为40%的实施例，该粘结剂的其他技术特征与在后申请相同。在后申请要求保护的技术方案中环氧树脂的含量为下列哪些数值的，可以享有在先申请的优先权？", options: {"A": "30% ~ 40%", "D": "60%", "B": "40%", "C": "50%"}, answer: "ABD", explanation: "A选项，某大学举办的学术会 议未采取任何保密措施，因此会议上首次发 表构成公开，该技术属于被公开的技术方 案，A选项正确。B选项，根据《审查指南》第 二部分第三章第2.1.2.1节的规定，印有“内 部资料”“内部发行”等字样的纸质出版物和 视听资料，确系在特定范围内发行并要求保 密的，不属于公开出版物，因此B选项正确。 C选项，存在于互联网或者其他在线数据库 中的资料应当是通过合法途径能够获得的， 资料的获得与是否需要口令或者付费无关， 因此C选项错误。D选项，根据《审查指南》 第二部分第三章第2.1.2.2节的规定，使用公 开的方式包括能够使公众得知其技术内容 的招标投标。因此D选项构成公开。（新编）"},
  {id: 154, topic: "专题六 优先权", type: "multiple", question: "某申请人在12个月内向国家知识产权局先后提交了2载的可燃气体中的氧气体积含量不同、其他特征相同，且该在先申请是申请人在中国的首次申请。则以下情况中，在后申请可以要求享有在先申请的优先权的是：", options: {"A": "在先申请权利要求的氧气体积含量为20%～50%，在后申请权利要求的氧气体积含量为30%～60%。但在先申请既没有记载氧气含量范围为50%～60%、也没明确记载氧气含量为30% 。", "B": "在先申请权利要求的氧气体积含量为20%～50%，并在说明书记载了氧气体积含量可以为30%，在后申请权利要求的氧气体积含量", "C": "在先申请权利要求的氧气体积含量为20%～50%并在说明书记载了氧气体积含量可以为30%、35%，在后申请权利要求的氧气体积含量分别为30%35%50%。", "D": "在先申请权利要求的氧气体积含量分别为20%、50%，但在该在先申请的说明书中没有记载氧气含量为20%～50%之间的范围内的技术方案，在后申请权利要求的氧气体积含量"}, answer: "BC", explanation: "根据《审查指南》第二部分第三 章第2.1.2.1节的规定，专利法意义上的出版 物可以是纸质出版物、视听资料，也可以是 存在于互联网或者其他在线数据库中的资 料等，因此A选项错误。B、C选项，纸质出 版物的印刷日和视听资料的出版日视为公 开日，存在于互联网或者其他在线数据库中 的资料的公开日一般以发布日为准，因此 B、C选项正确。D选项，以网络方式出版的 书籍，其公开日为网页上记载的网络发布 日。如果同时具有内容相同的纸质出版物， 也可以根据纸质出版物的印刷日确定公开 日，通常以能够确定的最早公开日为准，因 此D选项错误。（新编）"},
  {id: 155, topic: "专题六 优先权", type: "multiple", question: "在先申请记载了某种美白牙膏，其中氢氧化铝的含量为2%～7%，该申请还公开了氢氧化铝含量为2%，5%，6.6%和7%的实施例。下列在后申请哪些不能享有在先申请的优先权？", options: {"A": "一种美白牙膏的其他技术特征与在先申请相同，其中氢氧化铝的含量为5.5%～7%", "B": "一种美白牙膏的其他技术特征与在先申请相同，其中氢氧化铝的含量为6.6%～7%", "C": "一种美白漱口液的其他技术特征与在先申请相同，其中氢氧化铝的含量为2%～7%", "D": "一种美白牙膏的其他技术特征与在先申请相同，其中氢氧化铝的含量为2%～5%"}, answer: "BD", explanation: "根据《审查指南》第二部分第三 章第2.1节的规定，现有技术是指申请日（有 优先权的，指优先权日）以前在国内外为公 众所知的技术。A选项，国外科技专著的公 开日（出版日）视为2023年3月31日，晚于 该发明专利申请的优先权日，不构成现有技 术。B选项，该技术在欧洲公开日视为2023 年2月28日，早于该发明专利申请的优先权 日，构成现有技术。C选项，该技术在国内 期刊上的公开日与该发明专利申请的优先 权日为同一天，不构成现有技术。D选项， 国外展览会上公开的技术属于现有技术。 （2015改编）"},
  {id: 156, topic: "专题六 优先权", type: "multiple", question: "在满足其他条件的情况下，下列关于发明专利申请优先权的说法哪些是正确的？", options: {"A": "在判断能否享有优先权时，应当判断在后申请要求保护的技术方案是否记载在在先申请的说明书、权利要求书和摘要中", "B": "在后申请记载两个技术方案，在先申请的只记载了其中的一个技术方案，则在后申请的两个技术方案都不能享有优先权", "C": "在后申请记载了两个技术方案，这两个技术方案分别记载在不同的在先申请中，则该在后申请的两个技术方案都能享有优先权", "D": "如果在后申请的技术方案仅记载在在先申请的说明书-49 -中，而没有记载在权利要求书中，该技术方案也能享有优先权"}, answer: "BD", explanation: "A选项，胡某的公开日与该发 明专利申请的优先权日为同一天，不构成现 有技术。B选项，互联网技术资料发布日视 为公开日，早于该发明专利申请的优先权 日，构成现有技术。C选项，黄某期刊的公 开日视为2023年4月30日，晚于该发明专 利申请的优先权日，不构成现有技术。D选 项，纸质论文印刷日（视为2023年3月31 日）早于互联网发布日（2023年6月2日）， 以纸质出版物公开日为准，因此D选项构成 现有技术。（新编）"},
  {id: 157, topic: "专题六 优先权", type: "single", question: "甲于2024年4月1日提交了关于一种裁剪机的发明专利申请，几个月后，甲又对该裁剪机进行了改进，增加了刀具调节结构，使其更为完善。要使改进后的裁剪机也能够得到有效的专利保护，以下哪种做法是行之有效的？", options: {"A": "修改原申请的权利要求书，将刀具调节结构补充进去", "B": "修改原申请的说明书和权利要求书，将刀具调节结构补充进去", "C": "重新申请一项发明专利，在权利要求书中增加一项以刀具调节结构为附加技术特征的从属权利要求，并要求原申请的本国优先权", "D": "重新申请一项发明专利，将独立权利要求改为包含刀具调节结构在内的裁剪机，并要求原申请的本国优先权"}, answer: "B", explanation: "A选项，王某口头公开的内容以 发生之日为公开日，公开日早于该发明专利 申请的申请日，构成现有技术，破坏该发明 专利申请的新颖性。B选项，王某发表在杂 志上的文章的公开日视为2023年10月31 日，晚于该发明专利申请的申请日，不属于 现有技术，不破坏该发明专利申请的新颖 性。C选项，王某的实用新型专利申请属于 中国专利申请，实用新型的申请日早于该发 明专利申请的申请日，而实用新型专利申请 的授权公告日晚于该发明专利申请的申请 日，内容与该发明专利申请相同，因此构成 抵触申请，破坏该发明专利申请的新颖性。 D选项，某公司销售公开日视为2023年2月 28日，早于该发明专利申请的申请日，构成 现有技术，破坏该发明专利申请的新颗性。 （2013改编）"},
  {id: 158, topic: "专题六 优先权", type: "multiple", question: "韩国人李某于2023年1月12日向美国提交首次发明专利申请F，该申请说明书中记载了技术方案a和b，要求保护技术方案a。2023年7月12日，李某向中国提交了发明专利申请F1，要求保护技术方案b。2023年12月18日，李某向中国提交了发明专利申请F2，要求保护技术方案a和b。若申请F1和申请F2满足其它享有优先权的条件，则下列说法哪些是正确的？", options: {"A": "申请F1可以享有申请F的优先权", "B": "申请F2中的技术方案a可以享有申请F的优先权", "C": "申请F2可以享有申请F1的优先权", "D": "申请F2中的技术方案b可以享有申请F的优先权"}, answer: "AB", explanation: "A选项，陶瓷杯的公开日视为 2023年4月30日，早于该专利申请的优先 权日，属于现有技术。B选项，美国专利中 请的公开日早于该专利申请的优先权日，属 于现有技术。C选项，中国专利申请的公开 日与该专利申请的优先权日为同一天，不属 于现有技术。D选项，由德国进口到中国的 玻璃杯的公开日晚于该专利申请的优先权 日，不属于现有技术。考生注意：现有技术 是指申请日以前在国内外为公众所知的技 术，因此现有技术判断是只限时间先后，不 限主题内容，只要公开日在先的技术都属于 现有技术。（2014改编）"},
  {id: 159, topic: "专题六 优先权", type: "multiple", question: "申请人于2023年10月向英国提出首次申请，要求保护某产品，说明书还记载了该产品的制造方法。申请人于2023年12月向法国提出一件要求保护该产品及其生产设备的申请，该设备是首次公开。2024年5月，申请人向中国国家知识产权局提出要求保护该产品、方法及设备的申请，并要求享有英国申请和法国申请的优先权。下列就申请人向中国提出的专利申请享有优先权的哪种说法是正确的？", options: {"A": "该产品和设备的技术方案能享有优先权，方法的技术案不能享有优先权", "B": "该产品和方法的技术方案能享有优先权，设备的技术案不能享有优先权", "C": "该设备的技术方案能享有优先权，该产品和方法的技方案不能享有优先权", "D": "该产品、方法和设备的技术方案都能享有优先权"}, answer: "ABD", explanation: "A选项，玻璃瓶的公开日视为 2023年5月31日，早于该专利申请的优先 权日，属于现有技术。B选项，塑料瓶的公 开日早于该专利申请的优先权日，属于现有 技术。C选项，中国专利申请的公开日与该 专利申请的优先权日为同一天，不属于现有 技术。D选项，装饰塑料瓶的公开日（使用 公开）早于该专利申请的优先权日，属于现 有技术。（2019)"},
  {id: 160, topic: "专题六 优先权", type: "single", question: "申请X是申请Y所要求优先权的在先申请。申请X说明书中记载了由技术特征a、b构成的技术方案，在权利要书中记载了技术特征b、c构成的技术方案，在说明书摘要中载了技术特征a、c构成的技术方案。申请Y要求保护的下列些技术方案可以要求申请X的优先权？", options: {"A": "技术特征b、c构成的技术方案", "B": "技术特征a、b构成的技术方案", "C": "技术特征a、c构成的技术方案", "D": "技术特征a、b、c构成的技术方案新颖性"}, answer: "C", explanation: "A选项，在先的发明或实用新型 均可能构成在后发明或实用新型的抵触申 请，A选项错误。B选项，同一申请人在先申 请也可能构成自已在后申请的抵触申请，B 选项错误。C、D选项，《审查指南》第二部分 第三章第2.2节规定：“审查员在检索时应当 注意，确定是否存在抵触申请，不仅要查阅 在先专利或专利申请的权利要求书，而且要 查阅其说明书（包括附图)，应当以其全文内 容为准……·另外，抵触申请仅指在申请日以 前提出的，不包含在申请日提出的同样的发 明或者实用新型专利申请”。同日申请用专 利法第9条解决，不构成抵触申请，C选项正 确。确定是否存在抵触申请，不仅限于在先 专利申请的权利要求书，D选项错误。 (2014)"},
  {id: 161, topic: "专题七 新颖性", type: "single", question: "某发明专利申请的申请日为2023年12月25日。下列出版物均记载了与该申请请求保护的技术方案相同的技术内容，哪个会导致该申请丧失新颖性？", options: {"A": "2023年12月印刷并公开发行的某中文期刊", "B": "在2023年12月25日召开的国际会议上发表的学术论文", "C": "2023年11月某教授的学术专著出版后，未销售出一本，同时在情报所的收藏信息中发现该专著也从未被借阅过", "D": "该发明申请人于2023年11月2日向国家知识产权局提日被申请人主动撤回"}, answer: "D", explanation: "A、B选项，由于S申请和F申请 并不是在同一天提交的，不适用《专利法》第 9条第1款的规定，实用新型专利申请S已 被公告授权，即使放弃该专利权，或者将F 修改为要求保护产品，也不能被授权，因此 A、B选项错误。C、D选项，本题中，抵触申 请的申请人指的是“任何单位或者个人”，其 判断和申请人是否相同无关，S申请和F申 请的说明书相同，S申请的申请日早于F申 请的申请日，且S申请在F申请的申请日后 被公告授予了实用新型专利权，因此，即使 是同一申请人，S申请也构成了F申请的抵 触申请，破坏了F申请的新颖性，C选项错 误，D选项正确。（2011）"},
  {id: 162, topic: "专题七 新颖性", type: "multiple", question: "就判断现有技术而言，下列哪些说法是正确的？", options: {"A": "某项新技术在某大学举办的学术会议上首次发表，且会议期间对记载该技术的资料未采取任何保密措施，则该技术属于被公开的技术方案", "B": "在企业内部发行并要求保密的刊物上记载的技术方案属于尚未公开的技术方案", "C": "存在于千度网络文库中的技术资料，该资料的获得需要付费，从付费记录上看没有人付费阅读过，该技术资料属于尚未公开的技术方案", "D": "在国内的招标投标过程中，产品结构图被招标机构公开，构成使用公开"}, answer: "AD", explanation: "A、C选项，技术方案A1记载 在优先权文件中，享有优先权，技术方案A1 的优先权日为2022年10月11日，对比文件 的申请日2022年9月23日早于技术方案A1 的优先权日，公开日2023年9月6日晚于技 术方案A1的优先权日，因此构成了技术方 案A1的抵触申请，A选项正确，C选项错误。 B、D选项，技术方案A2未记载在优先权文 件中，不享有优先权，技术方案A2的申请日 为2023年10月11日，对比文件的公开日 2023年9月6日早于技术方案A2的申请日， 因此构成了技术方案A2的现有技术，B选 项错误，D选项正确。（2018）"},
  {id: 163, topic: "专题七 新颖性", type: "single", question: "对于专利法意义上的出版物，下列说法正确的有：", options: {"A": "出版物可以是纸质出版物、视听资料，存在于互联网的资料不属于出版物", "B": "纸质出版物的印刷日和视听资料的出版日视为公开日", "C": "存在于其他在线数据库中的资料的发布日视为公开日", "D": "以网络方式出版的书籍同时具有内容相同的纸质出版物，如果网络发布日和出版物的印刷日不一致的，以出版物的印刷日视为公开日"}, answer: "B", explanation: "确定是否存在抵触申请，不仅 要查阅在先专利或专利申请的权利要求书， 而且要查阅其说明书（包括附图），应当以其 全文内容为准，但是记载在摘要的内容不能 作为判断抵触申请的依据，摘要仅是一种技 术信息，不具有法律效力，A选项错误。抵 触申请还包括满足条件的进入了中国国家 阶段的国际专利申请，B选项正确。抵触申 请仅能用来评价新颖性，不能评价创造性， C选项错误。抵触申请的申请人指的是“任 何单位或者个人”，同一个人的在先申请也 可能构成其在后申请的抵触申请，D选项错 误。（2017)"},
  {id: 164, topic: "专题七 新颖性", type: "multiple", question: "某发明专利申请的申请日为2024年2月5日，优先权日为2023年3月6日。下列哪些技术构成了该申请的现有技术？", options: {"A": "2023年3月出版的国外某科技专著上公开的与该申请相关的技术", "B": "2023年2月在欧洲公开使用的与该申请相关的技术", "C": "2023年3月6日在国内某期刊上公开的与该申请相关的技术", "D": "2023年2月5日在国外某展览会上公开的与该申请相关的技术"}, answer: "ABD", explanation: "A选项，乙的国际申请日早 于甲发明专利申请的申请日，进入中国国家 阶段的日期晚于甲发明专利申请的申请日， 其国家公布的日期必定晚于甲发明专利申 请的申请日，因此乙的国际申请构成抵触申 请，A选项正确。B选项，甲实用新型专利申 请的申请日早于甲发明专利申请的申请日， 公告日与甲发明专利申请的申请日为同一 天，因此甲实用新型专利申请构成抵触申 请，B选项正确。C选项，由于丙的申请为欧 洲专利申请，不属于中国专利（申请）文件， 因此不构成抵触申请，且公布日晚于甲发明 专利申请的申请日，也不构成现有技术，不 破坏甲发明专利申请的新颖性，C选项错 误。D选项，丁的中国实用新型专利申请的 优先权日早于甲发明专利申请的申请日，授 权公告日晚于甲发明专利申请的申请日，因 此构成抵触申请，破坏甲发明专利申请的新 颖性，D选项正确。（2016改编）"},
  {id: 165, topic: "专题七 新颖性", type: "multiple", question: "黄某于2024年3月8日向国家知识产权局提交了一件优先权日为2023年4月3日的发明专利申请。下列哪一技术构成了该申请的现有技术？", options: {"A": "2022年8月在日本参加一个学术会议时，王某就该种系统进行了口头介绍", "B": "王某在一本2023年10月出版的杂志上发表了一篇介绍该种系统的文章，且无其他证据证明该杂志的具体印刷日", "C": "王某于2023年10月15日向国家知识产权局提交了一件同样内容的实用新型专利申请，该申请于2024年5月8日被授予专利权", "D": "某公司经王某授权于2023年2月在美国销售的新型汽车上使用了该种系统"}, answer: "ACD", explanation: "A选项，实用新型专利申请 的申请日早于该发明专利申请的优先权日， 授权公告日晚于优先权日，因此构成抵触申 请。B选项，德国专利申请不会对中国专利 构成抵触申请。C选项，国际申请的申请日 阜于该中国发明专利申请的优先权日，国家 公布日晚于其优先权日，因此构成抵触申 请。D选项，发明专利申请的申请日早于该 发明专利申请的优先权日，虽然D选项所述 的发明专利申请被主动撤回，但依然被公 开，且公布日仍晚于其优先权日，因此构成 抵触申请。（2012改编）"},
  {id: 166, topic: "专题七 新颖性", type: "multiple", question: "某专利申请涉及一种玻璃杯，其申请日是2023年11月1日，优先权日是2023年5月8日。下列哪些属于该申请的现有技术？", options: {"A": "印刷日为2023年4月的一份出版物，内容涉及一种陶瓷杯", "B": "2023年4月2日公开的一件美国专利申请，该申请涉及一种特殊色彩的玻璃杯", "C": "2023年5月8日公开的一件中国专利申请，该申请涉及一种陶瓷杯", "D": "2023年9月2日由德国进口到中国的玻璃杯"}, answer: "AB", explanation: "A选项，俄罗斯专利申请不是 中国的专利申请，因此不构成抵触申请。B 选项，PCT国际申请的国际公布日早于该中 国发明专利申请的优先权日，因此属于现有 技术，不构成抵触申请。C选项，实用新型 专利申请的申请日早于该中国发明专利申 请的优先权日，授权公告日晚于该中国发明 专利申请的优先权日，因此构成抵触申请。 D选项，法国公司在中国申请的专利属于中 国专利申请，申请日早于该中国发明专利申 请的优先权日，公开日晚于该中国发明专利 申请的优先权日，因此构成抵触申请。 (2019)"},
  {id: 167, topic: "专题七 新颖性", type: "multiple", question: "某专利申请涉及一种塑料瓶，其申请日是2023年12月2日，优先权日是2023年6月9日。下列哪些属于该申请的现有技术？", options: {"A": "印刷日为2023年5月的一份出版物，内容涉及一种玻璃瓶", "B": "2023年5月3日公开的一件日本专利申请，该申请涉及一种特殊色彩的塑料瓶", "C": "2023年6月9日公开的一件中国专利申请，该申请涉及一种玻璃瓶", "D": "2023年6月8日在韩国购买的一种装饰塑料瓶"}, answer: "AC", explanation: "A选项，申请日早于该专利申 请的申请日，公布日晚于该专利申请的申请 日，且说明书中记载了催化剂M，因此构成 抵触申请。B选项，申请日早于该专利申请 日、但说明书中没有记载催化剂M，因此不 构成抵触申请。C选项，申请日早于该专利 请日，且说明书中记载催化剂M1小范围数 值活性成分含量破坏催化剂M大范围数值 活性成分含量的新颖性，因此构成抵触申 请。D选项，申请日早于该专利申请的申请 日，公布日晚于该专利申请的申请日，但仅 在摘要中记载催化剂M，说明书和权利要求 中未记载催化剂M，因此不构成抵触申请。 （2013改编）"},
  {id: 168, topic: "专题七 新颖性", type: "multiple", question: "下列关于“抵触申请”的说法哪个是正确的？", options: {"A": "实用新型专利必然不构成发明专利申请的抵触申请", "B": "同一申请人在先提出的发明专利申请必然不构成其在后提出的发明专利申请的抵触申请", "C": "同一日提出的两件发明专利申请必然互不构成抵触申请", "D": "两件发明专利申请若权利要求不同，则前一申请必然不构成后一申请的抵触申请"}, answer: "AB", explanation: "A选项，权利要求1中的a、b、c 均被对比文件公开，因此权利要求1不具备 新颖性，A选项正确。B选项，权利要求2引 用权利要求1，权利要求2中的a、b、c、d均被 对比文件公开，因此权利要求2不具备新颖 性，B选项正确。C选项，权利要求3中的e 没有被对比文件公开，因此权利要求3具备 新颖性，C选项错误。D选项，权利要求4引 用权利要求3，在权利要求3具有新颖性的 情况下，权利要求4也具有新颖性，D选项错 误。（2015）"},
  {id: 169, topic: "专题七 新颖性", type: "single", question: "刘某分别于2023年2月15日和2023年12月7日提交了说明书相同的实用新型专利申请S和发明专利申请F，说明书记载了一种产品和制造该产品的设备。S申请要求保护该产品，F申请要求保护该设备。F申请未要求优先权。S申请在2024年1月15日被公告授予了实用新型专利权。若F申请满足其它授权条件，则下列说法哪些是正确的？", options: {"A": "在刘某放弃上述实用新型专利权的情况下，F申请可以被授权", "B": "在刘某放弃上述实用新型专利权的情况下，若F申请修改为要求保护该产品，则可以被授权", "C": "由于申请人相同，因此S申请不构成F申请的抵触申请", "D": "S申请破坏F申请的新颖性，因此F申请不能被授权"}, answer: "C", explanation: "本题中，对比文件公开的干燥 温度范围为40℃~100℃，范围的端点将破 坏该申请中40℃和100℃的新颖性，但不会 破坏58℃和75℃的新颖性，C选项正确，A、 B、D选项错误。（2008）"},
  {id: 170, topic: "专题七 新颖性", type: "single", question: "某申请日为2023年10月11日的中国发明专利申请X中，要求保护技术方案A1和A2，该申请优先权日为2022年10月11日，且优先权文本中仅记载了技术方案A1。审查部门检索发明专利申请，其中公开了技术方案A1和A2。则下列说法正确的是：", options: {"A": "该对比文件构成了申请X中技术方案A1的抵触申请", "B": "该对比文件构成了申请X中技术方案A2的抵触申请", "C": "该对比文件构成申请X中技术方案A1的现有技术", "D": "该对比文件构成申请X中技术方案A2的现有技术"}, answer: "C", explanation: "A选项，对比文件的15～90分 钟与权利要求1的10~75分钟部分重合，破 坏权利要求1的新颖性，因此A选项正确。 B选项，对比文件的20~60分钟属于小范 围，破坏权利要求1的10~75分钟大范围新 颖性，因此B选项正确。C选项，对比文件 的20~90分钟属于大范围，不破坏权利要 求2的30～45分钟小范围的新颖性，因此C 选项错误。D选项，对比文件45分钟的数值 点与权利要求2的30~45分钟的数值范围 一个端点重合，破坏权利要求2的新颖，因 此D选项正确。(2018)"},
  {id: 171, topic: "专题七 新颖性", type: "multiple", question: "向国家知识产权局提出的两件发明专利申请甲、乙，如果甲申请构成了乙申请的抵触申请，以下哪个说法正确？", options: {"A": "甲申请只需摘要中记载了乙申请权利要求书内容即可构成乙申请的抵触申请", "B": "甲申请可以是进人中国国家阶段的国际专利申请", "C": "甲申请可作为评价乙申请创造性的对比文件", "D": "甲申请的申请人必须与乙申请的申请人不同"}, answer: "AB", explanation: "A选项，对比文件I的数值范 围（400~700℃）与权利要求1的数值范围 （200～500℃）部分重叠，破坏权利要求1的 新颖性，权利要求2数值点并未在对比文件 1公开，权利要求2具备新颖性，A选项正 确。B选项，对比文件2的数值范围与权利 要求1的数值范围部分重合且有共同的端点 （500℃），破坏权利要求1的新颖性；且端点 350℃破坏权利要求2的新颖性，B选项正 确。C选项，对比文件3的数值范围（200~ 500℃）破坏权利要求1的新颖性，但不能破 坏权利要求2中数值点350℃的新颖性，C选 项错误。D选项，对比文件4的数值点450℃ 落入权利要求1的范围内，破坏权利要求1 的新颖性，但不破坏权利要求2的新颖性，D 选项错误。（新编）"},
  {id: 172, topic: "专题七 新颖性", type: "single", question: "甲拥有一件发明专利申请，其申请日为2022年5月16日，下列专利文献均记载了与该申请中所请求保护的技术方案相同的技术内容，哪些已经公开的专利文献使得该申请不具备新颖性？", options: {"A": "申请人为乙的国际申请，国际申请日为2022年1月15日，国际公布日为2023年7月15日，进人中国国家阶段的日期为2023年8月5日", "B": "申请人为甲本人的中国实用新型专利申请，申请日为2022年1月4日，公告日为2022年5月16日", "C": "申请人为丙的欧洲专利申请，申请日为2022年2月1日，公布日为2022年11月1日", "D": "申请人为丁的中国实用新型专利申请，申请日为2022年6月14日，优先权日为2022年2月4日，授权公告日为2022年10月16日"}, answer: "D", explanation: "组合物权利要求分开放式和封 闭式两种表达方式。权利要求中有“含有” “包括”“包含”等这样的措词，属于开放式权 利要求。本题中，权利要求属于开放式权利 要求，只要对比文件公开了权利要求的组 分，就能破坏权利要求的新颖性。D选项公 开了该权利要求的组分，破坏其新颖性。 A、B、C选项没有公开权利要求的组分，不破 坏权利要求的新颖性。（2009)"},
  {id: 173, topic: "专题七 新颖性", type: "multiple", question: "一件中国发明专利申请的申请日为2023年3月4日，优先权日为2022年4月5日。下列记载相同发明内容的专利文献哪些构成该申请的抵触申请？", options: {"A": "一件中国实用新型专利申请，申请日为2022年3月31日，授权公告日为2022年10月9日", "B": "一件德国专利申请，申请日为2022年1月5日，公布日为2023年7月5日人日为2023年3月4日，中国国家公布日为2023年10月16日", "D": "一件中国发明专利申请，申请日为2022年3月1日，申请人于2023年3月1日主动要求撤回专利申请，但该申请仍于2023年3月9日被公布", "C": "一件PCT国际申请，国际申请日为2023年3月4日，中国国家公布日为2023年10月16日"}, answer: "AD", explanation: "A选项，抗拉强度为530MPa 钢板相对于抗拉强度为350MPa的普通钢 板，其抗拉强度显著提高，隐含了钢板具有 不同的结构和/或组成，因此具有新颖性，A 选项正确。B选项，用于抗病毒的化合物X 与用作洗涤剂的化合物X相比，用途改变， 但该用途由产品本身固有的特性决定，没有 隐含产品在结构和/或组成上发生改变，不 具备新颖性，B选项错误。C选项，用X方法 和Y方法制得的玻璃杯，虽然制造方法不 同，但是题目未明确给出二者在结构、形状、 构成材料、微观结构等方面是否存在差异， 因此并非一定具有新颖性，C选项的说法过 于绝对。D选项，对比文件公开的数值 30mm落在前述限定技术特征的数值范围 25~30mm内，将破坏其新颖性，D选项正 确。（2017，思维扩展）"},
  {id: 174, topic: "专题七 新颖性", type: "single", question: "一件中国发明专利申请的申请日为2023年5月5日，优先权日为2022年5月8日。下列哪项记载了相同发明内容的专利文献不构成该申请的抵触申请？", options: {"A": "一件俄罗斯专利申请，其申请日为2021年3月15日，公开日为2022年10月26日", "B": "一件在日本提出的PCT国际申请，其国际申请日为2020年9月18日，国际公布日为2022年5月3日，进人中国国家阶段的日期为2023年5月18日，中国国家公布日为2023年9月18日", "C": "同一申请人于2022年4月24日向国家知识产权局提交的实用新型专利申请，授权公告日为2022年9月16日", "D": "法国某公司在中国提出的发明专利申请，其申请日为2022年3月11日，公开日为2022年8月21日"}, answer: "D", explanation: "A、C选项属于包含制备方法特 征和用途特征的产品权利要求，该权利要求 所限定的产品与对比文件产品相比，制备方 法特征已公开，且该用途是由产品本身固有 的特性决定，该用途特征没有隐含产品在结 构和/或组成上发生改变，因此A、C权利宴 求相对于对比文件的产品不具有新颖性。 B选项的保护主题为制备杀菌组合物的方 法，该方法已在对比文件中公开，因此B选 项不具备新颖性。D选项的保护主题为杀 菌方法，属于已知物质的新用途，该用途没 有被对比文件公开，因此D选项具备新颖 性。（2013，思维扩展） 月创造"},
  {id: 175, topic: "专题七 新颖性", type: "multiple", question: "一件请求保护催化剂M的专利申请，申请日为2022年7月12日，公布日为2023年12月16日。下列向国家知识产权局提交的哪些申请构成该申请的抵触申请？", options: {"A": "申请日为2022年6月11日，公布日为2023年12月9日的申请，其权利要求请求保护催化剂M的制备方法，说明书中记载了催化剂M及其制备方法", "B": "申请日为2022年6月12日，公布日为2023年12月9日的申请，其权利要求请求保护催化剂M的制备方法，说明书中记载了催化剂M的制备方法", "C": "申请日为2022年6月12日，公布日为2023年12月16日的申请，请求保护催化剂MI，MI和M的区别仅在于，M中活性成分的含量为1～10%，M1中活性成分的含量为2～5%", "D": "申请日为2022年6月12日，公布日为2023年12月16日的申请，仅在说明书摘要中描述了催化剂M"}, answer: "AC", explanation: "《专利法》第24条规定：“申请专 利的发明创造在申请日以前6个月内，有下 列情形之一的，不丧失新颖性：（一）在国家 出现紧急状态或者非常情况时，为公共利益 目的首次公开的；（二）在中国政府主办或者 承认的国际展览会上首次展出的；（三）在规 定的学术会议或者技术会议上首次发表的； （四）他人未经申请人同意而泄露其内容 的”。A选项，申请日前8个月超出了不丧失 新颖性宽限期6个月的期限，因此会导致发 明创造丧失新颖性。C选项，核心期刊上的 发表构成公开，因此会导致发明创造丧失新 颖性。BD选项，规定的学术会议或者技术 会议包括全国性学术团体组织召开的学术 会议或者技术会议，因此B、D选项符合上述 法条规定的不丧失新颖性宽限期的条件。 (2014)"},
  {id: 176, topic: "专题七 新颖性", type: "multiple", question: "根据权利要求3所述的设备，其特征在于还包括部件f。”审查员检索到构成本申请现有技术的一篇对比文件，其技术方案公开了由部件a、b、c、d、f组成的设备。上述a、b、c、d、e、f为实质不同、且不能相互置换的部件。下列哪些选项是正确的？", options: {"A": "权利要求1不具备新颖性", "B": "权利要求2不具备新颖性", "C": "权利要求3不具备新颖性", "D": "权利要求4不具备新颖性"}, answer: "BD", explanation: "A选项属于他人未经申请人同 意而泄露其内容的、C选项属于国家出现紧 急状态或者非常情况时，为公共利益目的首 次公开的，均不会影响该发明的新颖性。B 选项为他人在学术会议上发表，破坏该发明 的新颖性。D选项公开销售，破坏该发明的 新颖性。（新编）"},
  {id: 177, topic: "专题七 新颖性", type: "multiple", question: "某发明专利申请请求保护一种二氧化钛光催化剂的制备方法，该申请的说明书中记载了干燥温度分别为40℃、58℃、75℃、100℃的技术方案。一份对比文件公开了干燥温度为40℃～100℃的二氧化钛光催化剂的制备方法，如果该申请与该对比文件的区别仅在于干燥温度不同，而其余技术特征均相同，则下列哪些说法是正确的？", options: {"A": "该对比文件破坏该申请所有技术方案的新颖性", "B": "该对比文件破坏该申请中干燥温度分别为58℃和75℃的技术方案的新颖性", "C": "该对比文件破坏该申请中干燥温度分别为40℃和100℃的技术方案的新颖性", "D": "无法判断该对比文件是否能够破坏该申请中所记载技术方案的新颖性"}, answer: "AD", explanation: "根据《专利法》第24条的规定， 申请专利的发明创造在申请日以前6个月 内，在中国政府主办或者承认的国际展览会 上首次展出的，不丧失新颖性。本题中，虽 然国际展览会上展出行为发生在申请日之 前6个月内，但是由于行为主体是乙公司， 而不是甲公司自已，因此乙公司在甲公司申 请日前的展出行为破坏了甲公司专利申请 的新颖性，且乙公司展出行为破坏新颖性的 结果均无地域限制；因此A、D选项正确，B、 C选项错误。（2013改编）"},
  {id: 178, topic: "专题七 新颖性", type: "multiple", question: "根据权利要求1所述的复合材料制备方法，其特征在于混合时间为30～45分钟。关于上述权利要求的新颖性，下列说法错误的是？", options: {"A": "对比文件公开的一种复合材料的制备方法，其中混合时间为15~90分钟（其余特征与权利要求1相同），则权利要求1相对于该对比文件不具备新颖性", "B": "对比文件公开的一种复合材料的制备方法，其中混合时间为20～60分钟（其余特征与权利要求1相同），则权利要求1相对于该对比文件不具备新颖性", "C": "对比文件公开的一种复合材料的制备方法，其中混合时间为20～90分钟（其余特征与权利要求2相同），则权利要求2相对于该对比文件不具备新颖性", "D": "对比文件公开的一种复合材料的制备方法，其中混合时间为45分钟（其余特征与权利要求2相同），则权利要求2相对于该对比文件不具备新颖性"}, answer: "AB", explanation: "A选项，在后申请能否享有在 先申请的优先权的判断与专利申请能否要 求宽限期无关，应当表述为“在后中国专利 的申请日应不晚于首次申请的12个月”，A 选项说法错误，当选。B选项，根据《审查指 南》第二部分第三章第5节的规定，发生专 利法第24条规定的任何一种情形之日起6 个月内，申请人提出申请之前，发明创造再 次被公开的，再次公开属于规定情形的，该 申请不会因此而丧失新颖性，B选项说法错 误，当选。C选项，除他人未经申请人同意 而泄露其内容以外，他人在申请日前的任何 公开行为都会破坏专利的新颖性，C选项说 法正确。D选项，对于不丧失新颖性的公 开，习惯上使用“不丧失新颖性”的说法，实 际上这些技术内容既不能评价新颖性，也不 能评价创造性，D选项说法正确。（2018）"},
  {id: 179, topic: "专题七 新颖性", type: "single", question: "根据权利要求1所述的铝钛合金生产方法，其特征在于加热温度为350℃。”下列说法哪些是正确的？", options: {"A": "对比文件1公开的铝钛合金的生产方法中加热温度为400～700℃，则权利要求1相对于对比文件1不具备新颖性，权利要求2具备新颖性", "B": "对比文件2公开的铝钛合金的生产方法中加热温度为350℃～500℃，则权利要求1、2相对于对比文件2不具备新颖性", "C": "对比文件3公开的铝钛合金的生产方法中加热温度为200～500℃，则权利要求1、2相对于对比文件3不具备新颖性", "D": "对比文件4公开的铝钛合金的生产方法中加热温度为450℃，则权利要求1和权利要求2相对于对比文件4均不具备新颖性"}, answer: "B", explanation: "本题中，甲在申请日（2023年8 月2日）以前6个月内在国际展览会上首次 展出，可以享有不丧失新颖性宽限期，展览 会上的公开行为不影响其自已专利申请的 新颖性，因此A选项错误，B选项正确。在 乙提出专利申请之前，甲已经在展览会上展 出，破坏乙专利申请的新颖性，乙无法获得 失新颖性的宽限期及同样的发明创造 专利权；同样的，虽然甲自已在展会上的公 开行为不破坏自己的专利申请新颖性，但是 乙的申请在先，破坏甲申请的新颖性，甲不 能获得专利权，因此C、D选项错误。（2019)"},
  {id: 180, topic: "专题七 新颖性", type: "multiple", question: "一件发明专利申请的权利要求为：“一种治疗心脏病的药物，其特征在于，包括：(1)活性成分X；(2)活性成分Y；(3)着色剂M;和(4)调味剂N。\"在申请日前公开的下列哪些治疗心脏病的药物破坏该权利要求的新颖性？", options: {"A": "由活性成分X和Y组成的药物", "B": "由活性成分X、活性成分Y和着色剂M组成的药物", "C": "由活性成分X、活性成分Z、着色剂M和调味剂N组成的药物", "D": "由活性成分X、活性成分Y、着色剂M、调味剂N和崩解剂0组成的药物"}, answer: "BD", explanation: "A选项，甲的专利享有不丧失 新颖性的宽限期，其展出行为不破坏其自身 专利申请的新颖性，但是乙的公开发表行为 是在甲的申请日前，破坏甲专利的新颖性， A选项错误。B、C选项，甲的展出行为由于 受宽限期的保护不影响其自身专利申请的 新颖性，但由于甲的展出日期早于乙的申请 日，因此破坏乙专利申请的新颖性，B选项 正确，C选项错误。D选项，甲的展出行为和 乙的公开发表行为均破坏对方申请的新颖 性，因此甲和乙的专利申请都不具备新颖 性，D选项正确。（2016改编）"},
  {id: 181, topic: "专题七 新颖性", type: "multiple", question: "以下关于新颖性的判断正确的是？", options: {"A": "一种抗拉强度为530MPa钢板相对于抗拉强度为350MPa的普通钢板具有新颖性", "B": "一种用于抗病毒的化合物X与一种用作洗涤剂的化合物X相比具有新颖性", "C": "一种使用X方法制备的玻璃杯与一种用Y方法制作的玻璃杯相比一定具有新颖性", "D": "一种厚度为25～30mm的托板与一种厚度为30mm的托板相比不具有新颖性"}, answer: "CD", explanation: "本题中，甲的申请专利、乙、丙 的公开都在甲因国家出现非常情况首次公 开时间的6个月内。A、B、D选项，在国家出 现紧急状态或者非常情况时，为公共利益目 的首次公开的发明创造，他人得知后将其再 次公开的，视为专利法第24条第（一）项所 述情形。他人未经申请人同意泄露发明创 造的内容，第三人得知该方式公开的发明创 造后将其再次公开的，视为专利法第24条 第（四）项所述情形，因此乙、丙的公开都不 会破坏甲发明的新颖性，A、B选项错误，D 选项正确。C选项，甲因国家出现非常情况 的首次公开不破坏其发明的新颖性，因此C 选项正确。（新编）"},
  {id: 182, topic: "专题七 新颖性", type: "single", question: "一件专利申请公开了一种组合物，该组合物由植物材来杀菌。该申请的申请日为2024年6月1日。一篇2023年3月1日公开的文献记载了一种由植物材料M经过步骤X、Y和Z加工处理制得的染料组合物，该文献没有公开所得组合物可用来杀菌。相对于该篇文献，该申请下列哪项权利要求具备新颖性？", options: {"A": "一种杀菌组合物，该组合物由植物材料M经过步骤X、Y和乙加工处理制得", "B": "一种制备杀菌组合物的方法，该方法包括将植物材料M经过步骤X、Y和Z加工处理", "C": "一种由植物材料M经过步骤X、Y和Z加工处理制得的组合物，其特征在于该组合物可以杀菌", "D": "一种杀菌方法，包括使用有效量的由植物材料M经过步骤X、Y和Z加工处理制得的一种组合物不丧失新颖性的宽限期及同样的发"}, answer: "D", explanation: "A选项，甲在申请日以后得知他 人未经同意泄露，应当在得知情况后2个月 内，即9月28日之前提.出要求不丧失新颖性 宽限期的声明，并附具证明材料，因此A选 项错误。B选项，宽限期从2023年1月1日 首次公开之日起算，距离申请日2023年7月 18日已经超过6个月，因此甲的申请不享有 宽限期、B选项错误。C、D选项，甲在全国 学术会议上的首次发表符合享有宽限期的 情形，不会破坏甲的专利申请的新颖性，但 乙在2023年3月1日提出的专利申请构成 甲的发明专利申请的在先申请，因此甲不能 取得专利权，同样，甲在由国际组织召开的 学术会议上的公开也破坏乙的专利的新颖 性，乙的申请不能被授予专利权，因此C选 项错误，D选项正确。（2017）"},
  {id: 183, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "multiple", question: "下列哪些情形一定会导致申请专利的发明创造丧失新颖性？", options: {"A": "该发明创造于申请日前8个月在我国政府主办的某国际展览会上首次公开展出", "B": "该发明创造于申请日前3个月在某全国性学术团体组织召开的技术会议上首次公开", "C": "该发明创造于申请日前2个月在国务院有关主管部门主办的核心期刊上首次公开发表", "D": "该发明创造于申请日前1个月被他人未经申请人同意发布在互联网上"}, answer: "BC", explanation: "A、B、C选项，申请人在申请日 前已获知的，应当在提出专利申请时在请求 书中声明，并自申请日起2个月内提交证明 材料；申请人在申请日以后自行得知的，应 当在得知情况后2个月内提出要求不丧失 新颖性宽限期的声明，并附具证明材料，因 此A选项错误，B、C选项正确。D选项，证明 文件应当由政府有关部门作出，不是管理专 利工作部门，D选项错误。（新编，思维扩展）"},
  {id: 184, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "multiple", question: "甲于2024年3月10日提交了有关呼吸机的一件发明专利申请，并提交了不丧失新颖性的声明和有关证明文件。下列哪些情形会影响该发明的新颖性？", options: {"A": "乙违反与甲订立的保密协议，于2023年12月在某国际学术刊物上发表了记载该发明所有内容的论文", "B": "丙将与甲的发明同样的呼吸机结构于2023年11月在美国举办的中国政府承认的学术会议上首次发表", "C": "因国家出现紧急状态，为公共利益目的，甲于2024年1月将呼吸机的结构在网络公开", "D": "甲发明的呼吸机于2024年1月对医院出售"}, answer: "BD", explanation: "A、C选项，同样的发明创造只 能授予一项专利权，对于同一申请人也不能 授予同样的发明创造多项专利权，因此A、C 选项错误。B选项，根据《审查指南》第二部 分第三章第6.1节的规定，为了避免重复授 权，在判断是否为同样的发明创造时，如果 一件专利申请或专利的一项权利要求与另 一件专利申请或专利的某一项权利要求保 护范围相同，应当认为它们是同样的发明创 造，因此B选项正确。D选项；《细则》第47 条第1款规定：“两个以上的申请人同日（指 失新颖性的宽限期及同样的发明创造 申请日；有优先权的，指优先权日）分别就同 样的发明创造申请专利的，应当在收到国务 院专利行政部门的通知后自行协商确定申 请人”，因此D选项正确。（2014) 11。ABC。A、B、D选项，根据《审查指 南》第二部分第三章第6.1节的规定，为了避 免重复授权，在判断是否为同样的发明创造 时，应当将两件发明或者实用新型专利申请 或专利的权利要求书的内容进行比较，而不 是将权利要求书与专利申请或专利文件的 全部内容进行比较。判断时，如果一件专利 申请或专利的一项权利要求与另一件专利 申请或专利的某一项权利要求保护范围相 同，应当认为它们是同样的发明创造。两件 专利申请或专利说明书的内容相同，但其权 利要求保护范围不同的，应当认为所要求保 护的发明创造不同，因此A、B选项正确，D 选项错误。C选项，《专利法》第9条第2款 规定：“两个以上的申请人分别就同样的发 明创造申请专利的，专利权授予最先申请的 人”，因此C选项正确。（2010）"},
  {id: 185, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "multiple", question: "甲公司于2024年1月15日向国家知识产权局提交了一件有关电视机的发明专利申请。乙公司在2023年9月8日举办的中国政府承认的某国际展览会上展出了包含该申请中的技术方案的电视机。下列说法哪些是正确的？", options: {"A": "该展出行为发生在甲公司专利申请提出之前，破坏了甲公司专利申请的新颖性", "B": "该展出行为属于发生在国外的使用公开，不破坏甲公司专利申请的新颖性", "C": "该展出行为发生在申请日之前六个月内举办的中国政府承认的展览会上，不破坏甲公司专利申请新颖性", "D": "由于该展出行为的主体不是甲公司，因此该展出行为破坏甲公司专利申请新颖性"}, answer: "ABCD", explanation: "《审查指南》第二部分第三 章第6.1节规定：“在判断是否为同样的发明 创造时，应当将两件发明或者实用新型专利 申请或专利的权利要求书的内容进行比较， 而不是将权利要求书与专利申请或专利文 件的全部内容进行比较。判断时，如果一件 专利申请或专利的一项权利要求与另一件 专利申请或专利的某一项权利要求保护范 围相同，应当认为它们是同样的发明创造。 两件专利申请或专利说明书的内容相同，但 其权利要求保护范围不同的，应当认为所要 求保护的发明创造不同”。A选项，催化剂 M和催化剂M的制备方法保护主题不同，不 属于同样的发明创造。B选项，催化剂N和 N\'的活性成分的含量不同，不属于同样的 发明创造。C选项，托盘P和P\'由不同材料 制成,不属于同样的发明创造。D选项,玻 璃杯Q和Q\'的结构不同，不属于同样的发 明创造。（2011)"},
  {id: 186, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "single", question: "关于不丧失新颖性的宽限期，下列说法错误的是？", options: {"A": "如果申请人在中国政府主办的国际展会上首次展出其发明创造后6个月内在中国提出首次专利申请，之后又希望基于该首次专利申请作为国内优先权基础提出一份在后中国专利申请，则该在后中国专利申请的申请日应不晚于其首次展出后12个月", "B": "专利法第24条有关宽限期规定中所述的“首次展出”、“首次发表”是指在申请日以前的6个月内仅允许申请人将其发明创造以专利法第24条所规定的方式展出或发表一次，不允许申请人在上述期限内多次发表或展出的情形", "C": "申请人将其发明创造在中国政府主办的国际展览会上首次展出后，他人在该展会获得了该发明创造的信息，进而在宽限期内在出版物上公开发表了该发明创造的，将导致该申请丧失新颖性", "D": "申请人作出的专利法第24条中规定的不丧失新颖性的公开行为，不能作为现有技术评价该申请人在宽限期内所提交专利申请请求保护的相似技术方案的创造性"}, answer: "C", explanation: "A选项，吸尘器X与吸尘器X” 存在区别，即使区别属于惯用手段的直接置 换，也不构成同样的发明创造。B选项，吸 尘器X与清洁系统Y的保护主题不同，因此 不构成同样的发明创造。C选项，张某和刘 某均保护了吸尘器X，因此构成同样的发明 创造。D选项，“吸尘器X”与“吸尘器X在清 洁系统Y中的应用”保护主题不同，因此不 构成同样的发明创造。（2015)"},
  {id: 187, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "single", question: "甲于2023年2月10日在我国政府主办的一个国际展览会上首次展出了其研制的新产品。乙于2023年7月11日独立作出了与甲完全相同的新产品，并于2023年7月16日提出了专利申请。甲于2023年8月2日也提出了专利申请，并提出了不丧失新颖性宽限期声明且附有证据。下列说法中正确的是？", options: {"A": "甲的发明在其申请日前已经被公开，因此不能被授予专利权", "B": "甲于2023年2月10日将其新产品进行展出的行为不影响其获得专利权", "C": "乙的发明是独立作出的，因此可以被授予专利权", "D": "甲的发明享有6个月的不丧失新颖性宽限期，因此可以被授予专利权"}, answer: "D", explanation: "《审查指南》第二部分第三章第6 节规定：“对于发明或实用新型，专利法第9 条或专利法实施细则第47条中所述的“同 样的发明创造\'是指两件或两件以上申请 （或专利）中存在的保护范围相同的权利要 求”。A选项，Y申请仅在说明书中记载了X 申请要求保护的美容水，而且二者要求保护 的主题也不同，不属于同样的发明创造，A 选项错误。B选项，Y申请要求保护一种美 容仪器，乙申请要求保护一种美容水和喷涂 美容水的方法，二者要求保护的主题不同， 不属于同样的发明创造，B选项错误。C选 项，X申请和Z申请都要求保护一种美容 水，但由于X申请和Z申请要求保护的范围 不相同，仅仅部分重合，不属于同样的发明 创造，C选项错误。D选项，从要求保护的主 题和保护范围来看，X、Y和Z两两之间都不 失新颖性的宽限期及同样的发明创造 属于同样的发明创造，因此D选项正确。 （新编）"},
  {id: 188, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "multiple", question: "甲、乙分别独立研发出了技术方案A。甲于2023年6月1日在中国政府主办的一个国际展览会上首次展出了技术A，并于2023年11月1日向国家知识产权局递交了关于技术方案A的发明专利申请X，同时声明要求享有不丧失新颖性宽限期，并按期提交了相关证明文件。乙于2023年8月2日递交了关于技术方案A的发明专利申请Y，并于2023年10月10日公开发表了详细介绍技术方案A的论文。以下说法哪些是正确的？", options: {"A": "甲的专利申请X享受6个月的宽限期，因此甲的展出行为及乙发表的论文均不影响该申请X的新颖性", "B": "甲在展览会上的展出行为不影响专利申请X的新颖性，但影响申请Y的新颖性", "C": "乙独立完成发明并且在甲之前提出了专利申请，因此乙的申请具备新颖性", "D": "甲和乙的专利申请都不具备新颖性"}, answer: "CD", explanation: "A选项，两件专利申请不是同 一天申请，在先申请破坏在后申请的新颖 性，不能通过放弃实用新型或者修改发明申 请权利要求的方式避免重复授权，因此A选 项错误。B选项，同日申请只有在申请时声 明的情况下，授权时才能通过放弃避免重复 授权，因此B选项错误。C选项，实用新型 专利权自同日提交的发明专利申请授权公 告之日起终止，因此C选项正确。D选项， 不同申请人同日申请同样的发明创造，二人 协商后确定申请人，协商不成，二者均驳回， 因此D选项正确。（2016改编）"},
  {id: 189, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "multiple", question: "甲于2024年1月1日因国家出现非常情况首次公开了其研发的新技术，乙得知后未经甲同意于2024年3月12日在某次学术会议上公开了该新技术，随后，乙的学生丙私自将该技术于2024年5月30日发表在某学术期刊上，甲于2024年6月30日就该新技术提出发明专利申请，下面关于甲发明的新颖性说法正确的有？", options: {"A": "乙在学术会议上的公开将破坏甲发明的新颖性", "B": "丙在学术期刊上的发表将破坏甲发明的新颖性", "C": "甲因国家出现非常情况的首次公开不会破坏其发明的新颖性", "D": "丙在乙未经甲同意的公开基础上再次公开，视为专利法规定的不丧失新颖性的情形，不会破坏甲发明的新颖性"}, answer: "BD", explanation: "根据《审查指南》第二部分第 三章第6.2.2节的规定，对于同一申请人同 日（仅指申请日）对同样的发明创造既申请 实用新型又申请发明专利的，申请时作出说 明的，发明专利申请经审查没有发现驳回理 由，应当通知申请人在规定期限内声明放弃 实用新型专利权。申请人声明放弃的，应当 作出授予发明专利权的决定，并在公告授予 发明专利权时一并公告申请人放弃实用新 型专利权声明。因此A选项发明专利申请 不能直接被授权，A选项错误，B选项正确。 C选项，由于2025年《审查指南》新修订中删 除了有关修改发明专利申请获得授权的内 容，因此不当选。D选项，实用新型专利申 请已撤回并生效，不存在重复授权的可能 性，因此D选项正确。（新编）"},
  {id: 190, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "single", question: "甲向国家知识产权局提出发明专利申请，要求保护一种智能手表，申请日为2023年7月18日，以下关于宽限期的说法正确的是？", options: {"A": "乙于2023年5月1日未经申请人甲的同意泄露其专利申请的内容，申请人甲于2023年7月28日得知此事，其应当在2023年10月28日之前提出要求不丧失新颖性宽限期的声明，并附具证明材料", "B": "甲于2023年1月1日在第X届全国电子学术会议上首次发表了该智能手表的技术方案，并于2023年2月1日在广交会上公开展出了其智能手表，则该申请仍可以享有宽限期", "C": "甲于2023年2月1日在第X届全国电子学术会议上首次发表了该智能手表的技术方案，乙独立做出了同样的智能手表，并在2023年3月1日提出了专利申请，但由于甲提出宽限期声明，甲仍可以取得专利权", "D": "甲于2023年2月1日在国务院有关主管部门认可的由国际组织召开的学术会议上首次发表了该智能手表的技术方案，乙独立做出了同样的智能手表，并在2023年3月1日提出专利申请，但2023年2月1日智能手表技术方案的公开破坏了乙的申请的新颖性，乙的申请不能被授予专利权"}, answer: "C", explanation: "《审查指南》第二部分第四章第2.4节 规定：“所属技术领域的技术人员，也可称为本 领域的技术人员，是指一种假设的“人”，假定他 知晓申请日或者优先权日之前发明所属技术领 域所有的普通技术知识，能够获知该领域中所 有的现有技术，并且具有应用该日期之前常规 实验手段的能力，但他不具有创造能力。如果 所要解决的技术问题能够促使本领域的技术人 员在其他技术领域寻找技术手段，他也应具有 从该其他技术领域中获知该申请日或优先权日 之前的相关现有技术、普通技术知识和常规实 验手段的能力”，因此A、B、D选项说法正确。所 属技术领域的技术人员要求知晓“所属技术领 域”的普通技术知识，并非“所有领域”，C选项说 法错误，当选。（2013)"},
  {id: 191, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "multiple", question: "甲提交了一项发明专利申请，其申请日为2024年1月22日，该发明专利申请存在申请日前6个月因国家出现非常情况而公开的情况，以下说法正确的有？", options: {"A": "在申请日前已获知的，应当在提出专利申请时在请求书中声明，并自申请日起三个月内提交证明材料", "B": "申请人在申请日以后自行得知的，应当在得知情况后两个月内提出要求不丧失新颖性宽限期的声明，并附具证明材料", "C": "审查员在审查过程中检索到了申请日前该申请已经被公开的情形，申请人在收到专利局的通知书后认为该公开属于因国家出现非常情况而公开的情况，应当在答复该通知书指定的期限内，提出不丧失新颖性宽限期的答复意见并附具证明文件", "D": "证明材料应当由省级以上人民政府管理专利工作部门出具"}, answer: "ABD", explanation: "A、B选项，根据《审查指南》第二 部分第四章第3.2.1.1节的规定，在确定最接近 的现有技术时，应首先考虑技术领域相同或相 近的现有技术。其中，要优先考虑与发明要解 决的技术问题相关联的现有技术，因此A、B选 项正确。所属技术领域的技术人员，是指一种 假设的“人”，假定他知晓申请日或者优先权日 之前发明所属技术领域所有的普通技术知识， 能够获知该领域中所有的现有技术。因此C选 项错误，D选项正确。（2010改编）"},
  {id: 192, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "multiple", question: "下列说法哪些是正确的？", options: {"A": "同样的发明创造可以同时被授予一项实用新型专利权和一项发明专利权", "B": "在两件发明专利中存在保护范围相同的权利要求就构成重复授权", "C": "为防止权利冲突，对于同样的发明创造，不能将多项专利权分别授予不同的申请人，但可以授予同一申请人", "D": "两个以上的申请人同日（有优先权的，指优先权日)分别就同样的发明创造申请专利的,应当在收到国家知识产权局的通知后自行协商确定申请人"}, answer: "AC", explanation: "A选项，《专利法》第22条第1款规 定：“授予专利权的发明和实用新型，应当具备 新颖性、创造性和实用性”，A选项正确。B选 专题光都 5oSe 项，《审查指南》第二部分第五章第3药规淀：“发 明或者实用新型专利申请是否具备实用性，应 当在新颖性和创造性审查之前首先进行判断”， 章第3节规定：“一件发明专利申请是否具备创 造性，只有在该发明具备新颖性的条件下才予 以考虑”，C选项正确。D选项，如果一项从属权 公 利要求具有创造性，并不能推导出其引用的独 立权利要求也具备创造性，D选项错误。（新编）"},
  {id: 193, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "multiple", question: "下列有关发明或者实用新型是否属于同样的发明创造的说法哪些是正确的？", options: {"A": "在判断是否为同样的发明创造时，应当将两件发明或者实用新型专利申请或专利的权利要求书的内容进行比较", "B": "如果一件专利申请的一项权利要求与另一件具有多项权利要求的专利的某一项权利要求保护范围相同，则它们是同样的发明创造", "C": "两个以上的申请人分别就同样的发明创造申请专利的，专利权授予最先申请的人", "D": "同样的发明创造是指两件或两件以上申请中权利要求书的内容全部相同"}, answer: "CD", explanation: "A选项，抵触申请不是现有技术，不 能用来评价创造性，A选项错误。B选项，某一 技术特征与最接近的现有技术的对应特征仅仅 有区别，并不意味着该技术方案与现有技术相 比具有突出的实质性特点和显著的进步，还要 看是否显而易见，B选项错误。C选项，根据《审 查指南》第二部分第四章第6.1节的规定，不管 发明者在创立发明的过程中是历尽艰辛，还是 睡手而得，都不应当影响对该发明创造性的评 价，C选项正确。D选项，根据《审查指南》第二 部分第四章第3.2.2节（2)的规定，发明提供了一 种技术构思不同的技术方案，其技术效果能够 基本上达到现有技术的水平，通常应当认为发 明具有有益的技术效果，具有显著的进步，D选 项正确。（2012改编）"},
  {id: 194, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "single", question: "甲和乙同日分别向国家知识产权局提交了一件专利申请。在下列哪些情形下甲和乙提交的申请所要求保护的技术方案不构成同样的发明创造？", options: {"A": "两者的说明书相同，甲申请要求保护催化剂M，乙申请要求保护催化剂M的制备方法", "B": "甲申请要求保护催化剂N,乙申请要求保护催化剂N\'，区别仅在于N中活性成分的含量为1～5%，N\'中活性成分的含量为1~10%", "C": "甲申请要求保护托盘P，乙申请要求保护托盘P”，区别仅在于P由钢或铝合金制成，P\'由金属制成", "D": "甲申请要求保护玻璃杯Q，乙申请要求保护玻璃杯Q\'，区别在于二者的结构不同"}, answer: "D", explanation: "A选项，根据《审查指南》第二部分第 四章第3.2.2节的规定，尽管发明在某些方面有 负面效果，但在其他方面具有明显积极的技术 效果，也应当认为发明具有有益的技术效果，具 有显著的进步，因此A选项错误。B选项，申请 日当天公开的技术内容不是现有技术，因此判 断创造性不考虑申请日当天公布的技术内容，B 选项错误。C选项，从属权利要求是否具备创造 性需要另行判断，C选项错误。D选项，《审查指 南》第二部分第四章第2.2节规定：“如果发明是 所属技术领域的技术人员在现有技术的基础上 仅仅通过合乎逻辑的分析、推理或者有限的试 验可以得到的，则该发明是显而易见的，也就不 具备突出的实质性特点”，D选项正确。（2016 改编）"},
  {id: 195, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "single", question: "张某和刘某同日就同样的吸尘器分别向国家知识产权局提交了一件发明专利申请。在下列哪个情形下，张某和刘某的专利申请所要求保护的技术方案构成同样的发明创造？", options: {"A": "张某的申请请求保护吸尘器X，刘某的申请请求保护吸尘器X\'，X与X\"的区别仅仅是所属技术领域的惯用手段的直接置换", "B": "张某的申请请求保护吸尘器X，刘某的申请请求保护包括吸尘器X的清洁系统Y", "C": "张某的申请请求保护吸尘器X，刘某的申请请求保护吸尘器X及包括吸尘器X的清洁系统Y", "D": "张某的申请请求保护吸尘器X，刘某的申请请求保护吸尘器X在清洁系统Y中的应用"}, answer: "D", explanation: "对比文件1中没有公开权利要求中 的技术特征N,对比文件2中没有公开权利要求 中的技术特征L，对比文件3中没有公开权利要 求中的技术特征K、L、M，根据单独对比原则，该 权利要求相对于对比文件1-3均具备新颖性，因 此A选项错误。B、C、D选项，尽管将对比文件 1-3结合在一起公开了该权利要求中的全部技 术特征，但还要分析是否有结合启示，因此B、C 选项错误，D选项正确。(2011)"},
  {id: 196, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "multiple", question: "王某同日提出了X、Y、Z三件发明专利申请：X申请要求保护一种促使皮肤紧缩的美容水，该美容水由水和10%~50%的组分a组成；Y申请要求保护一种美容仪器，说明书描述了所述美容仪用于喷涂美容水,美容水由水和10%～50%的组分a组成;Z申请要求保护一种美容水和喷涂美容水的方法，该美容水由水和11%～49%的组分a组成。下列说法正确的是？", options: {"A": "X、Y申请所要求保护的技术方案属于同样的发明创造", "B": "Y、Z申请所要求保护的技术方案属于同样的发明创造", "C": "X、Z申请所要求保护的技术方案属于同样的发明创造", "D": "X、Y和Z申请所要求保护的技术方案都不属于同样的发明创造"}, answer: "AB", explanation: "A选项的专利文件公开日晚于该申 请的申请日，不能作为判断创造性的对比文件。 B选项所属技术领域和该申请相差过大，不适于 作为判断创造性的对比文件。C、D选项都是肥 皂盒技术领域，且公开日均早于该申请的申请 日，属于现有技术，可用于评价创造性。（2017）"},
  {id: 197, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "multiple", question: "关于同样发明创造，下列说法哪些是正确的？", options: {"A": "李某于2026年5月4日和5月5日先后就同样的发明创造提交了实用新型专利申请A和发明专利申请B，为避免重复授权，李某可以选择放弃已经取得的实用新型A的专利权", "B": "王某在2026年5月5日就同样的发明创造分别提交实用新型申请A和发明专利申请B，但未就存在同日申请进行说明。为避免重复授权，王某可以选择放弃已经取得的实用新型A的专利权", "C": "为避免重复授权，张某依据专利法第9条及细则第47条选择放弃已经获得的实用新型专利权，则该实用新型专利权自同日提交的发明专利申请授权公告之日起终止", "D": "赵某、郑某同日就同样的发明创造分别提出的专利申请，当该两件申请均符合授予专利权的其他条件时，二人应当在收到通知后自行协商确定申请人"}, answer: "BD", explanation: "A选项，《审查指南》第二部分第四 章第3.1节规定：“在评价发明是否具备创造性 时，审查员不仅要考虑发明的技术方案本身，而 且还要考虑发明所属技术领域、所解决的技术 问题和所产生的技术效果，将发明作为一个整 体看待”，A选项错误。B选项，《审查指南》第二 部分第十章第6.2节（1)规定：“对于新的化学产 品，如果该用途不能从结构或者组成相似的已 知产品预见到，可认为这种新产品的用途发明 有创造性”，B选项正确。C、D选项，如果一项独 立权利要求具备创造性，一般情况下该独立权 利要求的从属权利要求也具有创造性，但是在 例外情况下，如部分优先权的情况，从属权利要 求也可能不具有创造性，因此C选项错误，D选 项正确。（新编）"},
  {id: 198, topic: "专题八 不丧失新颖性的宽限期及同样的发明创造", type: "single", question: "甲公司2026年1月26日就同样的发明创造提出了一项实用新型专利申请和一项发明专利申请，2026年4月28日实用新型专利申请获得授权且一直维持有效，以下哪些说法正确？", options: {"A": "无论甲公司在申请时是否就同日双申分别做出说明，都可以通过声明放弃实用新型的方式获得发明专利授权", "B": "甲公司只有在申请时就同日双申分别做出说明，才可以通过声明放弃实用新型的方式获得发明专利授权", "C": "甲公司在申请时作出说明的，发明专利申请经审查没有发现驳回理由，应当通知申请人在规定期限内声明放弃实用新型专利权或修改发明专利的保护范围", "D": "如果在实用新型专利申请授权前，甲公司提交了撤回实用新型专利申请声明并且该撤回声明已经生效，如果该发明申请符合授予专利权的其他条件，该发明专利申请可以被授权创造性"}, answer: "B", explanation: "A选项，《审查指南》第二部分第四章 第5.3节规定：“当发明产生了预料不到的技术 效果时，…·该发明具备创造性”，A选项说法正 确。B选项，发明具有预科不到的技术效果是发 明具有创造性的充分条件，不是必要条件，B选 项说法错误。C选项，《审查指南》第二部分第四 章第6.4节规定：“对发明创造性的评价应当针 对权利要求限定的技术方案进行…*即使说明 书中有记载，评价发明的创造性时也不予考 虑”，C选项说法正确。D选项，《审查指南》第二 部分第四章第4.3节规定：“如果发明仅是从一 些已知的可能性中进行选择，或者发明仅仅是 从一些具有相同可能性的技术方案中选出一 种，而选出的方案未能取得预料不到的技术效 果，则该发明不具备创造性”，D选项说法正确。 （2015)"},
  {id: 199, topic: "专题九 创造性", type: "multiple", question: "专利法中“所属技术领域的技术人员”这一概念不具有下列哪个含义？", options: {"A": "“所属技术领域的技术人员”不是真实存在的人", "B": "“所属技术领域的技术人员\"不具有创造能力日之前所有技术领域的普通技术知识", "D": "“所属技术领域的技术人员”能够获知所属技术领域中所有的现有技术，并且具有应用申请日或者优先权日之前的常规实验手段的能力", "C": "所属技术领域的技术人员能够获知申请日之前所有技术领域的普通技术知识"}, answer: "AB", explanation: "A选项，根据《审查指南》第二部分 第四章第3.2.1节的规定，判断发明是否具有突 出的实质性特点，就是要判断对本领域的技术 人员来说，要求保护的发明相对于现有技术是 否显而易见，A选项正确。B选项，根据《审查指 南》第二部分第四章第3.2.1.1节的规定，判断要 求保护的发明对本领域的技术人员来说是否显 而易见，要从最接近的现有技术和发明实际解 决的技术问题出发，B选项正确。C选项，根据 《审查指南》第二部分第四章第4.4节的规定，在 进行转用发明的创造性判断时通常需要考虑： 转用的技术领域的远近、是否存在相应的技术 启示、转用的难易程度、是否需要克服技术上的 困难、转用所带来的技术效果等，C选项说法过 于绝对，错误。D选项，《审查指南》第二部分第 四章第5.4节规定：“当发明的产品在商业上获 得成功时，……，如果商业上的成功是由于其他 原因所致，例如由于销售技术的改进或者广告 宣传造成的，则不能作为判断创造性的依据”，D 选项错误。（2017)"},
  {id: 200, topic: "专题九 创造性", type: "multiple", question: "某发明专利申请涉及车辆发动机的润滑系统，在判断该项发明的创造性时，下列说法哪些是正确的？", options: {"A": "在确定最接近的现有技术时，应首先考虑技术领域相同或相近的现有技术", "B": "在确定最接近的现有技术时，要优先考虑与发明要解决的技术问题相关联的现有技术", "C": "所属技术领域的技术人员是指在车辆发动机润滑系统技术领域具有至少两年以上工作经验的普通技术人员", "D": "所属技术领域的技术人员能够获知车辆发动机润滑系统技术领域所有的现有技术"}, answer: "ABC", explanation: "本题中，对比文件没有公开权利 要求1中使用催化剂d的技术特征，且使用催化 剂d催化此类反应对本领域技术人员来说不是 显而易见的，并具有提高转化率的有益效果，因 此权利要求1具备创造性；权利要求2和权利要 求3是权利要求1的从属权利要求，在权利要求 1具备创造性的前提下，权利要求2和权利要求 3也具备创造性，A、B、C选项正确。权利要求4 是产品的独立权利要求，其要求保护的化合物b 在对比文件中已经公开，其用于餐具消毒的用 途对化合物b的结构没有限定作用，因此权利要 求4不具备创造性，D选项错误。（2009）"},
  {id: 201, topic: "专题九 创造性", type: "multiple", question: "以下关于新颖性、创造性、实用性的说法哪些是正确的？", options: {"A": "授予专利权的发明应当具备新颖性、创造性和实用性", "B": "一项发明只有在具备新颖性的前提下，才判断其是否具备创造性和实用性", "C": "判断发明是否具备创造性的前提是，该发明一定具备新颖性", "D": "从属权利要求具备创造性，则其引用的独立权利要求也具备创造性"}, answer: "ABCD", explanation: "《审查指南》第二部分第四章第 4.2节规定：“在进行组合发明创造性的判断时通 常需要考虑：组合后的各技术特征在功能上是 否彼此相互支持、组合的难易程度、现有技术中 是否存在组合的启示以及组合后的技术效果 等”，因此A、B、C、D选项均正确。（新编）"},
  {id: 202, topic: "专题九 创造性", type: "multiple", question: "下列关于发明的创造性的说法哪些是正确的？", options: {"A": "抵触申请可以用来评价一项发明的创造性", "B": "发明的某一技术特征与最接近的现有技术的对应特征有区别，则该发明必然具备创造性", "C": "对创造性的评价无需考虑创立发明的途径", "D": "发明提供了一种技术构思不同的技术方案，其技术效果能够基本上达到现有技术的水平，则可以说明该发明具有显著的进步"}, answer: "ABC", explanation: "A选项，省去防腐蚀剂后，防腐 蚀功能也相应地消失，不具备创造性。B选项， 书柜和衣柜技术领域相近，从衣柜转用到书柜 是显而易见的，不具备创造性。C选项，仅仅是 两种产品的简单的叠加，这种组合发明不具备 创造性。D选项，已知产品的新用途发明产生了 预料不到的技术效果，这种用途发明具备创造 性。（2016)"},
  {id: 203, topic: "专题九 创造性", type: "multiple", question: "关于发明的创造性，下列说法哪个是正确的？", options: {"A": "发明具有显著的进步，就是要求发明不能有负面的技术效果", "B": "判断创造性时，应当考虑申请日当天公布的专利文献中的技术内容", "C": "如果某项从属权利要求具备创造性，则从属于同一独立权利要求的其他权利要求一定具备创造性", "D": "如果发明是所属技术领域的技术人员在现有技术的基础上仅仅通过合乎逻辑的分析、推理即可得到，则该发明是显而易见的，也就不具备突出的实质性特点"}, answer: "AC", explanation: "本题考查组合发明，虽然对比文 件1中公开了化合物Y及其用于治疗哮喘病的 用途，对比文件2中公开了化合物W及其用于 治疗哮喘病的用途，但将化合物Y和化合物W 结合使用，其治疗哮喘病的有效率远远超出单 独使用化合物Y或化合物W的有效率，并且能 够使副作用降低，这对本领域技术人员而言不 是显而易见的，同时也取得了预料不到的技术 效果，因此权利要求1和权利要求2相对于对比 文件1和对比文件2的组合均具备创造性，A、C 选项正确，B、D选项错误。（2009）"},
  {id: 204, topic: "专题九 创造性", type: "multiple", question: "一件专利申请的一项权利要求包括K、L、M、N四个技术特征，现检索到公开日早于本专利申请日的三篇对比文件，对比文件1公开了技术特征K、L、M，对比文件2公开了技术特征K、M、N，对比文件3公开了技术特征N。下列说法哪些是正确的？", options: {"A": "该权利要求不具备新颖性", "B": "该权利要求具备新颖性，但不具备创造性", "C": "该权利要求具备新颖性，也具备创造性", "D": "该权利要求具备新颖性，是否具备创造性应根据全部对比文件进行具体分析"}, answer: "ABC", explanation: "根据《审查指南》第二部分第四 章第4.3节的规定，在进行选择发明创造性的判 断时，选择所带来的预料不到的技术效果是考 虑的主要因素，A选项正确。B选项，根据《审查 指南》第二部分第四章第4.3节的规定，如果发 明是可以从现有技术中直接推导出来的选择， 则该发明不具备创造性，B选项正确。C选项， 根据《审查指南》第二部分第四章第4.3节的规 定，如果发明仅仅是从一些具有相同可能性的 技术方案中选出一种，而选出的方案未能取得 预料不到的技术效果，则该发明不具备创造性， C选项正确。D选项，根据《审查指南》第二部分 第四章第4.3节的规定，如果发明是在可能的、 有限的范围内选择具体的温度范围，并且这些 选择可以由本领域的技术人员通过常规手段得 到并且没有产生预料不到的技术效果，则该发 明不具备创造性，因此D选项缺少条件，错误。 (2012)"},
  {id: 205, topic: "专题九 创造性", type: "multiple", question: "李某于2023年4月1日向国家知识产权局提交了一份关于塑料肥皂盒的实用新型申请，该肥皂盒底部具有用于排出积水的椭圆孔，该申请于2023年7月15日获得授权公告，在后续评价该实用新型专利创造性的过程中，下列哪些技术文献不适于作为判断该专利创造性的对比文件？", options: {"A": "由某企业于2023年3月23日提出申请、并于2023年9月28日公布的发明专利申请，该申请公开了一种具有长方孔的储物盒，长方孔用于排出积水", "B": "于2022年3月公开的某美国专利文件，其公开了一种底部具有椭圆形开孔的齿轮箱，椭圆形开孔用于通风散热", "C": "于2012年5月出版的某塑料行业期刊,其中一篇文章介绍了一种注塑成型设备，并公开了使用该设备制造底部具有排水槽的肥皂盒的工艺过程", "D": "于2021年8月公开了中国专利文件，其公开了一种与洗手池固定在一起的陶瓷肥皂盒，该肥皂盒底部具有镂空的排水孔"}, answer: "AD", explanation: "本题中，权利要求2是用途限定的 产品权利要求，用途对产品的结构并无限定作 用。在现有技术已经公开阿司匹林的情况下， 权利要求2不具备新颖性，也不具备创造性，因 此A选项正确，B选项错误。权利要求1是阿司 匹林的用途权利要求，阿司匹林用于预防心脑 血管疾病的新用途未被对比文件公开，权利要 求1具有新颖性和创造性，因此C选项错误，D 选项正确。(2015)"},
  {id: 206, topic: "专题九 创造性", type: "multiple", question: "下列关于创造性的说法哪些是正确的？", options: {"A": "评价发明是否具备创造性，只需要考虑其技术方案和要解决的技术问题", "B": "对于新的化学产品，如果其用途不能从结构或者组成相似的已知产品预见到，可以认为这种用途具备创造性", "C": "一项发明独立权利要求具备创造性，则从属权利要求一定具有创造性", "D": "独立权利要求限定的发明具备创造性，其从属权利要求限定的发明不一定具备创造性"}, answer: "CD", explanation: "根据《审查指南》第二部分第四章 第4.6.3节的规定，要素省略的发明，是指省去已 知产品或者方法中的某一项或多项要素的发 明。如果发明省去一项或多项要素后其功能也 相应地消失，则该发明不具备创造性；如果发明 与现有技术相比，发明省去一项或多项要素后， 依然保持原有的全部功能，或者带来预料不到 的技术效果，则该发明具备创造性，因此A、B选 项不具备创造性，CD选项可能具备创造性。 (2019)"},
  {id: 207, topic: "专题九 创造性", type: "multiple", question: "下列说法哪个是错误的？A：如果一项发明与现有技术相比具有预料不到的技术效果，则该发明具备创造性", options: {"B": "如果一项发明与现有技术相比不具有预料不到的技术效果，则该发明一定不具备创造性", "C": "对发明创造性的评价应当针对权利要求限定的技术方案进行，未写人权利要求中的技术特征不予考虑", "D": "如果发明仅是从一些已知的可能性中进行选择，而选出的方案未能取得预料不到的技术效果，则该发明不具备创造性", "A": ""}, answer: "BCD", explanation: "A选项属于选择发明，其发明 是可以从现有技术中直接推导出来的选择，因 此不具备创造性。B选项属于已知产品的新用 途发明，其新的用途仅仅是使用了已知材料的 已知的性质，因此不具备创造性。C选项属于选 择发明，其发明是可以从现有技术中直接推导 出来的选择，因此不具备创造性。D选项属于转 用发明，其发明是在类似的或者相近的技术领 域之间进行的，并且未产生预料不到的技术效 果，因此不具备创造性。（新编）"},
  {id: 208, topic: "专题九 创造性", type: "multiple", question: "下列对于创造性中有关突出的实质性特点的说法，正确的是？", options: {"A": "判断发明是否具有突出的实质性特点，需要站位本领域技术人员来判断发明相对于现有技术是否显而易见", "B": "判断发明是否显而易见，需要本领域技术人员从最接近的现有技术和发明实际解决的技术问题出发进行判断", "C": "对于转用发明而言，只有所述转用能够产生预料不到的技术效果，该转用发明才具有突出的实质性特点和显著的进步", "D": "只要发明的产品在商业上获得成功时，则这类发明具有突出的实质性特点和显著的进步，具备创造性"}, answer: "ABC", explanation: "A选项，根据《审查指南》第二部 分第四章第3.2.2节的规定，尽管发明在某些方 面有负面效果，但在其他方面具有明显积极的 技术效果，通常应当认为发明具有创造性，A选 项正确。B选项，《审查指南》第二部分第四章第 4.2节规定：“如果要求保护的发明仅仅是将某些 已知产品或方法组合或连接在一起，各自以其 常规的方式工作，而且总的技术效果是各组合 部分效果之总和，组合后的各技术特征之间在 功能上无相互作用关系，仅仅是一种简单的叠 加，则这种组合发明不具备创造性”，B选项正 确。C选项，《审查指南》第二部分第四章第6.4.1 节规定：“对技术问题的解决没有作出贡献的特 征，即使写入权利要求中，通常也不会对技术方 案的创造性产生影响”，C选项正确。D选项，根 据《审查指南》第二部分第四章第6.4节的规定， 发明是否具备创造性是针对要求保护的发明而 言的，因此，对发明创造性的评价应当针对权利 要求限定的技术方案进行，D选项错误。（新编）"},
  {id: 209, topic: "专题九 创造性", type: "multiple", question: "权利要求1所述的方法制得的化合物b，该化合物用于餐具消毒。”一份对比文件中公开了一种以a为底物生产具有抗菌- 71-活性化合物b的方法，使用催化剂c，催化温度为50℃。使用催化剂d催化此类反应对本领域技术人员来说不是显而易见的，且使用d能提高转化率。在上述权利要求得到说明书支持情况下，哪些权利要求相对于对比文件具备创造性？", options: {"A": "权利要求1", "B": "权利要求2", "C": "权利要求3", "D": "权利要求4"}, answer: "ABD", explanation: "A选项，《审查指南》第二部分第 四章第5.1节规定：“如果发明解决了人们一直 渴望解决但始终未能获得成功的技术难题，这 种发明具有突出的实质性特点和显著的进步， 具备创造性”，A选项正确。B选项，创造性的评 判中预料不到的效果不是唯一条件，如果发明 采用了不同的技术方案，取得了有益的效果，也 可能具备创造性，B选项正确。C选项，《审查指 南》第二部分第四章第6.1节规定：“不管发明者 在创立发明的过程中是历尽艰辛，还是唾手而 得，都不应当影响对该发明创造性的评价”，C选 项错误。D选项，根据《审查指南》第二部分第四 章第4.3节的规定，如果选择使得发明取得了预 料不到的技术效果，则该发明具有突出的实质 性特点和显著的进步，具备创造性，D选项正确。 （新编） 21。BCD。A选项，根据《审查指南》第二部 分第四章第5.4节的规定，如果发明的产品商业 上获得成功，且是由技术特征直接带来了，则具 有创造性，因此A选项描述不准确。B、C选项， 《审查指南》第二部分第九章第6.1.3节规定：“如 果发明专利申请的解决方案能够带来用户体验 的提升，并且该用户体验的提升是由技术特征 带来或者产生的，或者是由技术特征以及与其 功能上彼此相互支持、存在相互作用关系的算 法特征或商业规则和方法特征共同带来或者产 生的，在创造性审查时应当予以考虑”，因此B、C 选项正确。D选项，根据《审查指南》第二部分第 四章第5.2节的规定，如果发明克服了技术偏 见，从而解决了技术问题则具备创造性，因此D 选项正确。（新编）"},
  {id: 210, topic: "专题九 创造性", type: "multiple", question: "对组合发明的创造性进行判断时通常需要考虑下列哪些因素？", options: {"A": "组合的难易程度", "B": "现有技术中是否存在组合的启示", "C": "组合后的各技术特征在功能上是否彼此支持", "D": "组合后的技术效果"}, answer: "BCD", explanation: "《审查指南》第二部分第九章第 6.1.3节规定：“（1)在确定最接近的现有技术时， 需要考量发明与现有技术中组合物的“理、法、 方、药”，并从发明实质出发，分析组方结构，选 择所属技术领域、所要解决的技术问题、技术效 果或用途最接近，和/或起主要作用的中药原料 （简称主要药味、主药或君药）相同或相近的现 有技术。(2)在确定区别特征时，通常可以将区 别药味按其在组方中发挥作用的主次地位进行 分层………如果发明的组方结构不明晰，或者同 一层级的中药原料较多，可将它们按功效或作 用进行分类。(3)判断要求保护的发明是否显而 易见时，需要站位本领域技术人员…常见的 技术启示可来源于：最接近的现有技术的其他 部分、教科书、工具书或综述性文献等现有技术 中所公开的相关技术信息，例如药味的加减信 息，药味的功效、用量用法和药理作用，以及发 明所述疾病的病因病机、治法治则、常见病程变 化和兼证等信息”因此A选项的说法并不完整， 且过于绝对。B、C、D选项正确。（新编）"},
  {id: 211, topic: "专题九 创造性", type: "multiple", question: "下列哪些发明不具备创造性？", options: {"A": "将油漆组合物中的防腐蚀剂去掉，得到不具有防腐蚀功能的油漆，节约了成本", "B": "将用于衣柜的自动闭合门结构用到书柜中", "C": "将电子表粘贴在鱼缸上，得到一种带有电子表的鱼缸", "D": "将已知的杀菌剂X用作抛光剂，实现了抛光效果"}, answer: "CD", explanation: "《专利法》第31条 第1款规定：“一件发明或者实 用新型专利申请应当限于一项 发明或者实用新型。属于一个 总的发明构思的两项以上的发 明或者实用新型，可以作为一 件申请提出”；《细则》第39条规 定：“依照专利法第31条第1款 保留在同 规定，可以作为一件专利申请提 出的属于一个总的发明构思的 则允许在 两项以上的发明或者实用新型， 应当在技术上相互关联，包含一 主 个或者多个相同或者相应的特 一性 定技术特征…”，因此A、B选 项错误，C、D选项正确。（2015) 2、C。A选项，中国专利制 度中并无多缴费可以保留不具 有单一性的多项发明的规定。 然具有单 B、D选项，专利分类号、主题名 称不是判断单一性的标准。单 然具有单 一性的唯一判断标准是两项以 上的发明或者实用新型属于一 求的其他 个总的发明构思，C选项正确。 (2014)"},
  {id: 212, topic: "专题九 创造性", type: "single", question: "权利要求1所述的药物，其中化合物Y和化合物W的重量比为4：1。”说明书中记载了所述药物的实验效果，化合物Y和W联合治疗哮喘病的有效率约90%，副作用显著降低。当化合物Y和W之间的比例为4：1时，效果最好，能使药效时间延长。对比文件1公开了化合物Y及其用于治疗哮喘病的用途，副作用小，但疗效差，有效率近30%。对比文件2公开了化合物W及其用于治疗哮喘病的用途，化合物W治疗哮喘病效果较好，有效率约50%,但副作用明显。下列说法哪些是正确的？", options: {"A": "权利要求1相对于对比文件1和2的组合具备创造性", "B": "权利要求1相对于对比文件1和2的组合不具备创造性", "C": "权利要求2相对于对比文件1和2的组合具备创造性", "D": "权利要求2相对于对比文件1和2的组合不具备创造性"}, answer: "C", explanation: "A选项，如果独立权 利要求缺乏新颖性、创造性，则 同一组从属权利要求之间可能 X制成。 不具备单一性，因此A选项错 误。B、C选项，若独立权利要求 料Y制成。 具有新颖性，还需判断独立权利 外壳和由材 要求是否具有创造性，若独立权 利要求具有创造性，则其从属权 活步骤Z。” 利要求之间必然具有单一性，因 支术特征且 此B选项错误，C选项正确。D 选项，只要独立权利要求具有新 颖性和创造性，从属权利要求与 其所从属的独立权利要求之间 不存在缺乏单一性的问题，因此 D选项错误。(2013)"},
  {id: 213, topic: "专题九 创造性", type: "single", question: "在判断选择发明的创造性时，下列说法哪些是正确的？", options: {"A": "在进行选择发明创造性的判断时，选择所带来的预料不到的技术效果是考虑的主要因素", "B": "如果发明是可以从现有技术中直接推导出来的选择，则该发明不具备创造性", "C": "如果发明仅仅是从一些具有相同可能性的技术方案中选出一种，而选出的方案未能取得预料不到的技术效果，则该发明不具备创造性", "D": "如果发明是在可能的、有限的范围内选择具体的温度范围，则该发明不具备创造性"}, answer: "C", explanation: "本题中，权利要求2 中包括特定技术特征X，权利 要求3中包括特定技术特征Y， 权利要求4中包括特定技术特 征Y，权利要求5中包括特定技 术特征Z。A选项，权利要求2、 ” 3之间不包括相同或相应的特 贡献,且a、 定技术特征，因此不具有单一 性。B选项，权利要求2、4之间 不包括相同或相应的特定技术 特征，因此不具有单一性。C 选项，权利要求3、4之间包括 相应的特定技术特征Y，因此 具有单一性，当选。D选项，权 利要求45之间不包括相同或 相应的特定技术特征，因此不 具有单一性。(2014) ，其特征在"},
  {id: 214, topic: "专题九 创造性", type: "multiple", question: "用于预防心脑血管疾病的阿司匹林。”一份现有技术文献公开了阿司匹林用作解热镇痛药物的用途。下列哪些说法是正确的？", options: {"A": "阿司匹林属于现有技术中已知的药物，权利要求2不具备新颖性", "B": "用于预防心脑血管疾病的阿司匹林具有预料不到的疗效，权利要求2具备创造性", "C": "阿司匹林在预防心脑血管疾病方面的新用途并未改变阿司匹林的成份结构，权利要求1不具备新颖性", "D": "权利要求1的用途发明相对于现有技术是非显而易见的，因此具备创造性"}, answer: "AB", explanation: "本题中，权利要求 1中包含特定技术特征a，则引 的用途。 用权利要求1的权利要求2、3 骼，其特征 之间均包含特定技术特征a，因 此权利要求1-3之间具备单一 ，其特征在 性。虽然权利要求4引用权利 要求1，但是以特征e替换特征 那些是正确！a，而特征b不属于特定技术特 征，因此权利要求4与权利要 求1-3之间均不具备单一性， A、B选项正确，C、D选项错误。 (2009)"},
  {id: 215, topic: "专题九 创造性", type: "multiple", question: "一种关于涂料组合物的发明，与现有技术的区别仅在于不含防冻剂。在下列哪些情形下，该发明可能具备创造性？", options: {"A": "该涂料组合物不具有防冻效果，其余性能稍有下降", "B": "该涂料组合物不具有防冻效果，其余性能不变", "C": "该涂料组合物仍具有防冻效果，其余性能不变", "D": "该涂料组合物不具有防冻效果，其余性能显著提高"}, answer: "ABCD", explanation: "权利要求I包 括特征M；权利要求2引用了权 利要求1，包括特征M，X；权利 要求3引用了权利要求1，包括 特征M，人造骨骼应用；权利要 其特征在于 求4引用了权利要求1，包括特 征M，人造骨骼，Y；权利要求5 骼的用途。 引用了权利要求1，包括特征 骨骼，其特 M，茶杯，Z。权利要求1~5都 具有技术特征M，根据题干信 息，M是特定技术特征，因此权 ,其特征在 利要求1~5相互之间均具有 单一性。因此A、B、C、D选项 均正确。(新编） 5一定不具"},
  {id: 216, topic: "专题九 创造性", type: "multiple", question: "下列哪些发明不具有创造性？", options: {"A": "一项改进组合物Y的热稳定性的发明，其特征在于确定了组合物Y中某组分X的最低含量，实际上，该含量可以从组分X的含量与组合物Y的热稳定性关系曲线中推导出来", "B": "将作为润滑油的已知组合物在同一技术领域中用作切削剂", "C": "一项已知反应方法的发明，其特征在于规定一种情性气体的流速，而确定流速是本领域的技术人员能够通过常规计算得到", "D": "将用于柜子的支撑结构转用到桌子的支撑"}, answer: "ACD", explanation: "A选项，权利要 求4、5之间共同的特征是陶瓷 4一定不具 材料M，如果权利要求1不具有 新颖性和创造性，则意味着M 一定具有单 不是特定技术特征，则权利要 求4、5之间一定不具有单一 性，A选项正确。B选项，权利 一定具有单 要求3、4之间具有共同的特 征：材料M在人造骨骼中的应 用，由于题干中没有给出M在 人造骨骼中的应用是否为特定 。 技术特征，因此权利要求3、4 于：包括承 之间可能具有单一性，也可能 不具有单一性，B选项错误。 于：采用一 C、D选项，因为权利要求1具有 新颖性和创造性，意味着M是 特征在于： 特定技术特征，因此引用权利 要求1的权利要求2、3、4、5都 具有特定技术特征M，权利要 造性，下列 求2~4相互之间都具有单一 性，C、D选项正确。（新编）"},
  {id: 217, topic: "专题九 创造性", type: "multiple", question: "以下关于创造性的说法，正确的是：", options: {"A": "尽管发明在某些方面有负面效果，但在其他方面具有明显积极的技术效果，仍可能具有创造性", "B": "将某些已知产品或方法组合在一起，各自以其常规的方式工作，总的技术效果是各组合部分效果的总和，则这种组合不具有创造性", "C": "权利要求中对解决技术问题没有作出贡献的特征，通常不会对技术方案的创造性产生影响", "D": "创造性判断对象应当为说明书记载的技术方案，而不应当仅局限于权利要求书限定的技术方案"}, answer: "CD", explanation: "本题中，“阶梯状 进风管”是特定技术特征，权利 要求1至4中都包含该特征，因 此权利要求1-4之间具有单一 性,C、D选项正确。（新编）"},
  {id: 218, topic: "专题九 创造性", type: "multiple", question: "下列关于发明的创造性的说法哪些是正确的？", options: {"A": "如果发明解决了人们一直渴望解决但始终未能获得成功的技术难题，则该发明具备创造性", "B": "如果发明没有产生预料不到的效果，也可能具备创造性", "C": "如果发明不是历尽艰辛，而是偶然做出的，则该发明不具备创造性", "D": "如果从现有技术公开的宽范围中选择未提到的窄范围或个体，产生预料不到的技术效果，则具有创造性"}, answer: "AB", explanation: "本题中，步骤L和 M分别为两个体现发明对现有 技术作出贡献的特定技术特 征。权利要求1、2.之间包含相 应的特定技术特征L，因此权利 献。下列 要求1、2之间具有单一性；权 利要求1、3之间包含相应的特 定技术特征M，因此权利要求 1、3之间具有单一性；权利要求 2、3之间不包含相同或相应的 特定技术特征，因此权利要求 2、3之间不具有单一性，因此 A、B选项正确，C、D选项错误。 （新编）"},
  {id: 219, topic: "专题九 创造性", type: "single", question: "对包含算法特征或商业规则和方法特征的发明专利申请进行创造性审查时，以下哪些选项在审查时应当予以考虑？", options: {"A": "在确定中药组合物发明的最接近的现有技术时，起主要作用的中药原料相同或相近的就是最接近的现有技术", "B": "药味的加减信息，药味的功效、用量用法和药理作用，以及发明所述疾病的病因病机、治法治则、常见病程变化和兼证等信息都能作为技术效果的启示", "C": "在判断中药组合物的创造性时，通常可以将区别药味按其在组方中发挥作用的主次地位进行分层，也可以按功效或作用进行分类", "D": "判断中药组合物发明是否显而易见时，需要站在本领域技术人员的角度去考虑—76-单一性"}, answer: "B", explanation: "权利要求1和2之 间包含相同的技术特征X，当 产品X具有新颖性和创造性 有单一性 时；权利要求1和2之间具有单 性 一性；当产品X是现有技术时， 还需判断方法Y和方法Z之间 是否包含相同或相应的特定技 术特征，因此A、C、D选项错误， B选项正确。（新编）"},
  {id: 220, topic: "专题十 单一性", type: "multiple", question: "下列选项中的发明哪些一定具有单一性？", options: {"A": "具有相同的技术特征的多项发明", "B": "具有相应的技术特征的多项发明", "C": "属于一个总的发明构思的多项发明", "D": "具有相应的特定技术特征的多项发明"}, answer: "BC", explanation: "权利要求2、3、4 都引用了权利要求1，一般情况 下，权利要求2、3、4都包括权 有一喷嘴 利要求1的所有特征，因此权 利要求1~4中都含有相同的 贾嘴C也 含有防尘物质X的涂料。题干 给出“含有物质X的涂料是新 的并具有创造性”，意味着含有 物质X的涂料属于特定技术特 征，因此权利要求1～4相互之 间都具有单一性，B、C选项正 确。权利要求5要求保护的是 喷涂机，权利要求3中“含有防 全物质X的涂料”没有对喷涂 机的结构产生影响，因此权利 要求5中没有包含特定技术特 、抗氧剂 征X，权利要求1~4任一项与 权利要求5之间均不具有单一 性，A、D选项错误。（新编，思维 、发泡剂 扩展)"},
  {id: 221, topic: "专题十 单一性", type: "multiple", question: "下列关于单一性的说法哪个是正确的？", options: {"A": "申请人可以通过多缴费用而将不具备单一性的多项发一件申请中", "B": "如果不具备单一性的多项发明属于同一个专利分类号一件专利申请中提出", "C": "如果两项发明属于一个总的发明构思，则它们具备单一", "D": "如果两项发明的主题名称完全相同，则它们必然具备单"}, answer: "BCD", explanation: "由题予可知，阻 为圆形。 燃剂d是体现发明对现有技术 的厚度为 作出贡献的技术特征，则显然 剂d为特定技术特征。A、B选 ,对比文 项，权利要求2、3虽然引用了 1相对于 权利要求1、但并非是对权利要 求1的进一步限定，而是两项 独立权利要求。权利要求1、2 之间，权利要求1、3之间，权利 要求2、3之间不具有相同或者 相应的特定技术特征、彼此之 间不具备单一性，A选项错误， B、D选项正确。C选项，权利要 生的结构 求45之间其有相同特定技术 相比，其 特征，具备单一注，C选项正 书包括下 确。（新编，思维扩展） 13、ABC。权利要求1、2 中均记载有特定技术特征X， 合物。 权利要求3引用权利要求1、权 途： 利要求4引用权利要求2，从而 要求2的！也包含特定技术特征X，因此 权利要求1~4之间具备单一 性。权利要求5要求保护一种 戒是使用 医疗器械，而使用权利要求4 所述的方法消毒，对权利要求5 所保护的医疗器械主题不具有 限定作用，因此权利要求5与 权利要求1~4之间不具备单 一性。因此A、B、C选项正确， D选项错误。（新编，思维扩展） I.AD。《审查指南》第五部分第一章第 2节规定：“专利申请手续应当以符合规定 的电子形式、纸件形式等书面形式办理，”因 此A选项正确。《审查指南》第五部分第一章 第2.1节规定：“申请人以电子形式提出专利 申请并被受理的，在审批程序中应当通过专 利局指定的特定电子系统以电子形式提交 相关文件，另有规定的除外”，B选项说法过 于绝对，因此B选项错误。《审查指南》第五 部分第一章第2.2节规定：“申请人以纸件形 式提出专利申请并被受理的，在审批程序中 应当以纸件形式提交相关文件。除另有规 定外，申请人以电子形式提交的相关文件视 为未提交”，C选项说法同样过于绝对，因此 C选项错误。《审查指南》第五部分第三章第 1节规定：“专利局受理部门包括专利局初 审及流程管理部受理处、复审和无效审理部 立案及流程管理处和专利局各代办处”，因 此D选项正确。（新编） 2、ABCD。《审查指南》第五部分第三章 第2.2节规定：“专利申请有下列情形之一 的，专利局不予受理：（1)发明专利申请缺少 请求书、说明书或者权利要求书的：实用新 型专利申请缺少请求书、说明书、说明书附 图或者权利要求书的；外观设计专利申请缺 少请求书、图片或者照片或者简要说明的。 (2)未使用中文的（8）直接从外国向专 利局邮寄的….（11)分案申请改变原申请 的类别的”，因此A、B、C、D选项均不符合受 理条件。（2012）"},
  {id: 222, topic: "专题十 单一性", type: "multiple", question: "下列说法哪个是正确的？", options: {"A": "同一组从属权利要求之间必然具有单一性", "B": "若独立权利要求具有新颖性,则其从属权利要求之间一性", "C": "若独立权利要求具有创造性，则其从属权利要求之间一性", "D": "若从属权利要求的限定部分还包括了不同于独立权利发明，则该从属权利要求和该独立权利要求之间不具有单一性"}, answer: "AB", explanation: "根据《审查指南》第五部分第三 章第2.2节的规定，缺少简要说明的外观设 计专利申请、请求书中缺少申请人姓名或者 名称，或者缺少地址的，均属于不予受理的 情形，因此C、D选项不可以受理。A、B选 项，缺少摘要可以补正，发明专利申请可以 没有附图、因此A、B选项可以受理。（2013 改编）"},
  {id: 223, topic: "专题十 单一性", type: "multiple", question: "用权利要求1所述的装置净化水的方法，其特征在于包已知权利要求1不具备新颖性和创造性，X、Y、Z均为特定互不相关。下列说法哪个是正确的？", options: {"A": "权利要求2、3之间具有单一性", "B": "权利要求2、4之间具有单一性", "C": "权利要求3、4之间具有单一性", "D": "权利要求4、5之间具有单一性"}, answer: "ABC", explanation: "A、B、C选项，根据《审查指 南》第五部分第三章第2.2节的规定，专利申 请类别不明确的、从香港直接邮寄来的发明 专利申请的、改变申请类别的分案申请的， 均属于不予受理的情形。D选项，请求书中 未写发明人信息的，可以受理，后续补正。 （2014改编）"},
  {id: 224, topic: "专题十 单一性", type: "multiple", question: "某件发明专利申请的权利要求撰写如下：“权利要求1：一种产品，具有特征a和b。权利要求2：如权利要求1所述的产品，进一步具有特征c权利要求3：如权利要求1所述的产品，进一步具有特征d权利要求4；如权利要求1所述的产品，以特征e替换特征其中，a是特定技术特征，b不体现发明对现有技术作出b、c、d、e互不相关。下列说法哪些是正确的？", options: {"A": "权利要求1、3之间具有单一性", "B": "权利要求2、3之间具有单一性", "C": "权利要求1、4之间具有单一性", "D": "权利要求2、4之间具有单一性"}, answer: "AB", explanation: "A、B选项，根据《审查指南》第 五部分第三章第2.2节的规定，在中国内地 没有经常居所或者营业所的外国人、外国企 业或者外国其他组织单独申请专利，没有委 托专利代理机构的，均为不予受理的情形。 C、D选项，未提交核苷酸序列表的计算机可 读形式副本的、缺少请求人或代理机构签 章，均可后续补正，可以受理。（2019改编）"},
  {id: 225, topic: "专题十 单一性", type: "multiple", question: "一件发明专利申请的权利要求书包括下列权利要求：权利要求1：一种陶瓷材料M。权利要求2：一种权利要求1所述陶瓷材料的制备方于X。权利要求3：一种权利要求1所述的陶瓷材料作为人造骨权利要求4：一种由权利要求1所述陶瓷材料制成的人造在于Y。权利要求5：一种由权利要求1所述陶瓷材料制成的茶于Z。其中M、X、Y、Z均为特定技术特征且互不相关，下列说法的？", options: {"A": "权利要求12和3具有单一性B：权利要求1、2和5具有单一性", "C": "权利要求2、3和4具有单一性", "D": "权利要求3、4和5具有单一性", "B": "权利要求1、2和5具有单一性"}, answer: "CD", explanation: "A、B、C选项，《审查指南》第五 部分第三章第2.2节规定：“专利申请有下列 情形之一的，专利局不予受理：·（4请求 书中缺少申请人姓名或者名称，或者缺少地 址的…（6在中国内地没有经常居所或者 营业所的外国人、外国企业或者外国其他组 织单独申请专利，或者作为代表人申请专 利，没有委托专利代理机构的..（11）分案 申请改变原申请的类别的”，在中国有经常 居所的外国人可以不委托专利代理机构，因 此A、B选项不予受理，C选项应当受理。D 选项，未提交委托书可补正，因此D选项应 当受理。（新编）"},
  {id: 226, topic: "专题十 单一性", type: "single", question: "一件发明专利申请的权利要求书包括下列权利要求：权利要求1：一种陶瓷材料M。权利要求2：一种权利要求1所述陶瓷材料M的制备方法烧结温度为2000℃。权利要求3：一种权利要求1所述的陶瓷材料M作为人造权利要求4：一种由权利要求1所述陶瓷材料M制成的人征在于具有椭球形空心。权利要求5：一种由权利要求1所述陶瓷材料M制成的茶于具有两个杯把。下列说法哪些是正确的？", options: {"A": "如果权利要求1不具有新颖性和创造性，则权利要求2和3有单一性", "B": "如果权利要求1不具有新颖性和创造性，则权利要求2和3无单一性", "C": "如果权利要求1具有新颖性和创造性，则权利要求2、单一性", "D": "如果权利要求1具有新颖性和创造性，则权利要求3、单一性"}, answer: "B", explanation: "A选项，分案申请以原申请的申 请日作为申请日，A选项错误。B、C、D选 项，《审查指南》第五部分第三章第2.3.1节 (3)规定：“电子申请以符合要求的申请文件 进入专利局指定的特定电子系统的日期为 申请日；通过邮局邮寄递交到专利局受理处 或者代办处的专利申请，以信封上的寄出邮 融日为申请日通过遠送公司递交到专 利局受理处或者代办处的专利申请，以收到 日为申请日”；《审查指南》第五部分第一章 第2节规定：“专利申请手续应当以符合规 定的电子形式、纸件形式等书面形式办理。 以口头、电话、实物、传真、电子邮件等形式 办理的，视为未提出，不产生法律效力”，因 此C、D选项错误，B选项正确。（2017改编）"},
  {id: 227, topic: "专题十 单一性", type: "multiple", question: "一种使用权利要求1的抑尘装置制造粉制品的方法，包括生产组件采用阶梯状进风管。”-79 -经审查，本发明权利要求1因包括阶梯状进风管而具备说法哪些是正确的？", options: {"A": "权利要求1、2之间不具有单一性", "B": "权利要求1、3之间不具有单一性", "C": "权利要求3、4之间具有单一性", "D": "权利要求1、4之间具有单一性"}, answer: "AD", explanation: "根据《审查指南》第五部分第 三章第2.3.1节（3)的规定，通过邮局邮寄递 交到专利局受理部门的专利审请，以信封上 的寄出邮日为申请日；通过速递公司递交 到专利局受理部门的专利申请，以收到日为 申请日，因此审请S1的卑请日应为2024年 3月12日，申请S2的申请日应为2024年3 月14日，因此A、D选项正确，B、C选项错 误。（2008改编）"},
  {id: 228, topic: "专题十 单一性", type: "single", question: "为实施步骤M而专门设计的设备。”没有检索到任何与权利要求1所述方法相关的现有技术说法哪些是正确的？", options: {"A": "权利要求1、2之间具有单一性", "B": "权利要求1、3之间具有单一性", "C": "权利要求1、2、3之间具有单一性", "D": "权利要求2、3之间具有单一性"}, answer: "D", explanation: "根据《审查指南》第五部分第三 章第2.3.1节（3）的规定，邮寄或者递交到专 利局非受理部门或者个人的专利申请，以受 理部门实际收到日为申请日。传达室属于 非受理部门，本题中，受理处实际收到日为 2024年7月10日，因此D选项正确。（2016 改编）"},
  {id: 229, topic: "专题十 单一性", type: "multiple", question: "下列有关单一性的说法正确的是？权利要求1：一种制造产品X的方法Y。权利要求2：一种制造产品X的方法Z。", options: {"A": "权利要求1和2之间一定具有单一性", "B": "当产品X具有新颖性和创造性时，权利要求1和2之间", "C": "当产品X是现有技术时，权利要求1和2之间不具有单", "D": "权利要求1和2之间一定不具有单一性"}, answer: "ACD", explanation: "A、C选项、根据《审查指南》 第五部分第三章第4节的规定，请求更正应 附有收寄专利申请文件的邮局出具的寄出 日期的有效证明，该证明中注明的寄出挂号 号码与请求书中记录的挂号号码一致；申请 日更正请求符合规定的，审查员应当发出修 改更正通知书；A、C选项正确。B、D选项， 以递交专利申请文件之日起2个月期限计 第，期满日为2024年8月3日；受理通知书 以邮寄形式送达的发文日为2024年6月14 日，推定收到日为2024年6月29日，以收到 专利申请受理通知书1个月期限计算，期满 日为2024年7月29日，两者以后到期为准， 李某应当在2024年8月3日前提出申请日 更正的请求，B选项错误，D选项正确。（新 编，思维扩展）"},
  {id: 230, topic: "专题十 单一性", type: "single", question: "一件发明专利申请的权利要求书包括下列权利要求：权利要求1：一种含有防尘物质X的涂料。权利要求2：制备权利要求1的涂料的方法。权利要求3：应用权利要求1的涂料喷涂制品的方法。权利要求4：根据权利要求3的方法喷涂得到的一种制品权利要求5：用于权利要求3方法的一种喷涂机，其特征在C能使涂料均匀分布在制品上。与现有技术相比，含有物质X的涂料是新的并具有创造性是新的并具有创造性。请判断以下哪些结论是正确的？", options: {"A": "权利要求1至5具有单一性", "B": "权利要求1至4具有单一性", "C": "权利要求1至3具有单一性", "D": "权利要求3与权利要求5具有单一性"}, answer: "D", explanation: "根据《审查指南》第五部分第三 章第4节的规定，申请人的申请日更正请求 应当在递交专利申请文件之日起2个月内 或者申请人收到专利申请受理通知书1个 月内提出，因此A选项中“1个月后”超出了 规定的期限，国家知识产权局仍以收到日为 申请日，不会重新确定申请日。B选项，申 请人乙删除附图说明，将保留原申请日。C 选项，缺少说明书摘要可以后续补正，不会 使国家知识产权局重新确定申请日。D选 项，《审查指南》第一部分第一章第5.1.1节 （1）规定：“请求书中应当正确填写原申请的 申请日，申请日填写有误的，审查员应当发 出补正通知书，通知申请人补正··.·.补正符 合规定的，审查员应当发出重新确定申请日 通知书”，因此D选项正确。（2015）"},
  {id: 231, topic: "专题十 单一性", type: "multiple", question: "1~ 0.5mm。\"对比文件1公开了由树脂a、填料b、抗氧剂c组成的复合权件2公开了由树脂a、填料b、发泡剂e组成的复合材料。权利要对比文件1和2具备创造性。下列说法哪些是正确的？", options: {"A": "权利要求1、2之间具有单一性", "B": "权利要求1、3之间不具有单一性", "C": "权利要求4、5之间具有单一性", "D": "权利要求2、3之间不具有单一性"}, answer: "AD", explanation: "根据《审查指南》第五部分第 三章第2.3.3节的规定，申请人以援引在先 申请的方式补交权利要求书或者说明书（实 用新型附图）的，应当在首次递交专利申请 时提出援引加入声明。申请人使用专利局 制定的包含援引加入声明的专利请求书标 准表格，即视为提出援引加入声明。因此， A选项正确。B选项，申请人应该在首次提 交专利申请之日起2个月内提交确认援引 加入声明并补交文件，因此B选项错误。C、 D选项，由于李某在申请时已经声明要求优 先权，并视为提出援引加入声明，在受理程 序中发现该申请缺少权利要求时，专利局应 当发出补交遗漏文件通知书，因此C选项错 误，D选项正确。（新编） 题十一专利申请的受理和初步审查"},
  {id: 232, topic: "专题十 单一性", type: "multiple", question: "一件发明专利申请首次公开了一种具有新颖性和创式为X的化合物，其可以用来对医疗器械进行消毒。与现有消毒效果更好,制造成本明显降低。该发明专利申请的权利要列权利要求：权利要求1：一种化合物，其结构式为X。权利要求2:一种消毒组合物,其活性成分为结构式为X的权利要求3:权利要求1所述的化合物用来消毒医疗器械的权利要求4：一种消毒医疗器械的方法,其特征在于使用权消毒组合物进行消毒。权利要求5：一种医疗器械，包括部件Y，其特征在于所述器权利要求4所述的方法消毒过的。请判断以下哪些结论是正确的？", options: {"A": "权利要求1与权利要求2具有单一性", "B": "权利要求2与权利要求3具有单一性", "C": "权利要求3与权利要求4具有单一性", "D": "权利要求4与权利要求5具有单一性专利申请的受理和初步审查"}, answer: "CD", explanation: "根据《审查指南》第五部分第 三章第2.3.3节的规定，申请人应当在首次 递交专利申请时提出援引加入声明；申请人 在首次递交专利申请之日起2个月内或者 收到补交遗漏文件通知书之日起2个月内 提交确认援引加入声明，因此“提出援引加 入声明”和“提交确认援引加入声明”时间不 同，A选项错误。B、D选项，造用援引加入 补交的文件符合有关规定的，以首次提交文 件的递交日为申请日；不符合规定的，以补 交文件之日为申请日，因此B选项错误，D 选项正确。C选项，本题中的专利申请已要 求享有优先权，且通过电子申请方式提交 （即采用专利局制定的包含援引加入声明的 每利请求书标准表格），视为提交了援引加 入声明，因此在受理程序中发现缺少说明书 时，专利局应当发出补交遗漏文件通知书， C选项正确。（新编）"},
  {id: 233, topic: "专题十一 专利申请的受理和初步审查", type: "single", question: "以下关于专利局受理专利申请,哪些说法正确？", options: {"A": "专利申请手续应当以符合规定的书面形式办理,电子形式、纸件形式等均属于书面形式", "B": "申请人以电子形式提出专利申请并被受理的，在审批程序中只能通过专利局指定的特定电子系统以电子形式提交相关文件", "C": "申请人以纸件形式提出专利申请并被受理的，在审批程序中只能以纸件形式提交相关文件", "D": "专利局受理部门包括专利局初审及流程管理部受理处、复审和无效审理部立案及流程管理处以及专利局各代办处"}, answer: "C", explanation: "，（绍则》第46条规定：“说明书中 写有对附图的说明但无附图或者缺少部分 附图的，申请人应当在国务院专利行政部门 指定的期限内补交附图或者声明取消对附 图的说明。申请人补交附图的，以向国务院 专利行政部门提交或者邮寄附图之日为申 请日；取消对附图的说明的、保留原申请 日”。本题中，补交附图之日为2024年4月 2日，因此C选项正确。补交摘要不影响申 请日的确定，D选项错误。（2012改编）"},
  {id: 234, topic: "专题十一 专利申请的受理和初步审查", type: "single", question: "下列哪些情形的专利申请不符合受理条件？", options: {"A": "直接从外国向国家知识产权局邮寄的专利申请", "B": "缺少说明书附图的实用新型专利申请", "C": "改变申请类别的分案申请", "D": "用外文提交的外观设计专利申请"}, answer: "C", explanation: "本题中，常某于2024年1月18 日提出的申请，提出时新的《细则》尚未实 施，因此该申请不能适用提引加入，此外本 题中仅邀避附图2并非遗磊全部附图，在受 理时，国家知识产权局不会主动适用援引加 入，因此本题无需考虑投引加入的问题，常 某于2024年3月18日补交了附图2，应重新 确定2024年3月18日为其申请日，该实用 新型专利的期限为2024年3月18日至2034 年3月17日，专利权期满终止日为2034年3 月18日，因此C选项正确。（2016改编）"},
  {id: 235, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "对下列哪些申请，国家知识产权局可以受理？", options: {"A": "缺少说明书摘要的发明专利申请", "B": "缺少附图的发明专利申请", "C": "缺少简要说明的外观设计专利申请", "D": "请求书中缺少申请人地址的发明专利申请"}, answer: "AC", explanation: "A、B选项，根据《审查指南》第 五部分第三章第4节(1)的规定，申请人收 到专利申请受理通知书之后认为该通知书 上记载的申请日与邮寄该申请文件日期不 一致的，可以在递交专利申请文件之日起2 个月内或者申请人收到专利申请受理通知 书之日起1个月内请求更正申请日，因此A 选项正确，B选项错误。C、D选项，根据《审 查指南》第五部分第三章第4节（2)的规定， 王某在提出申请日更正请求，应附有收寄专 利申请文件的邮局出具的寄出日期的有效 书中记录的挂号号码一致。无需提交能证 明其为该申请申请人的有效证明材料，因此 C选项正确，D选项错误。（2011）"},
  {id: 236, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "国家知识产权局对下列哪些专利申请不予受理？", options: {"A": "专利申请类别不明确", "B": "从香港直接邮寄来的发明专利申请", "C": "改变申请类别的分案申请", "D": "请求书中未写明发明人信息的发明专利申请"}, answer: "BCD", explanation: "A、B选项，张某补交附图2， 应当重新确定申请日为2024年3月20日，A 选项错误，B选项正确。C选项，由于实用新 型专利申请重新确定了申请日，发明专利申 请的申请日早于实用新型专利申请的申请 日，公开日晚于实用新型专利申请的申请 日，构成实用新型专利申请的抵触申请，从 而破坏实用新型专利申请的新颖性，C选项 正确。D选项，实用新型专利申请已撤回并 生效，不存在重复授权的可能性，D选项正 确。（新编）"},
  {id: 237, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "下列专利申请文件不予受理的是？", options: {"A": "在中国没有经常居所的外国人未委托专利代理机构提出的专利申请", "B": "在中国没有营业所的外国某公司直接向国家知识产权局面交的专利申请", "C": "涉及核苷酸序列的发明专利纸质申请，未提交相应序列表的计算机可读形式的副本", "D": "请求书中没有申请人或代理机构签章"}, answer: "ACD", explanation: "A选项，根据《细则》第44条 的规定，实用新型无附图的，国务院专利行 政部门不予受理，并通知申请人，不可以补 正，A选项说法错误。B选项，根据《审查指 南》第一部分第二章第3.3节的规定，初步审 查中，对于申请文件存在不可能通过补正方 式克服的明显实质性缺陷的专利申请，审查 员应当发出审查意见通知书，B选项说法正 确。C选项，实用新型没有自申请日起18个 月公布的程序，C选项说法错误。D选项，对 于依赖遗传资源完成的发明创造，不符合法 题十一专利申请的受理和初步审查 律规定，将被驳回，但是不能直接驳回，应当 发出审查意见通知书。直接驳回违反听证 原则，D选项说法错误。（新编）"},
  {id: 238, topic: "专题十一 专利申请的受理和初步审查", type: "single", question: "专利申请文件有下列哪些情形时，国家知识产权局应当予以受理？", options: {"A": "请求书缺少申请人姓名或名称，但填写了申请人的地址", "B": "提交分案申请时从原案的实用新型专利申请改变为发明专利申请", "C": "在中国有经常居所的外国人未委托专利代理机构提出的专利申请", "D": "中国专利代理机构提交的一件申请人为在中国内地没有营业所的外国企业，但未提交委托书"}, answer: "D", explanation: "A、C选项，提前公布请求可以 在提出发明申请的同时提出，也可以在进入 公布准备之前提出（作好公布专利申请文件 印刷准备工作的时间一般为自申请日起满 18个月的前1个月），因此A、C选项错误。B 选项，提交提前公布声明无需缴纳费用，B 选项错误。D选项，根据《审查指南》第一部 分第一章第6.5节的规定，申请人提出提前 公布声明不得附有任何条件，D选项正确。 (2013)"},
  {id: 239, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "关于申请日的确定，以下说法正确的是？", options: {"A": "向国家知识产权局受理处窗口直接递交的分案申请，以收到日为申请日", "B": "通过邮局邮寄递交到国家知识产权局受理处的专利申请，以寄出的邮戳日为申请日", "C": "通过速递公司递交到国家知识产权局受理处的专利申请，以寄出的邮戳日为申请日", "D": "通过电子邮件发送到国家知识产权局邮箱的专利申请，以邮箱收到日为申请日"}, answer: "BC", explanation: "《审查指南》第一部分第一章第 6.5节规定：“申请人提出提前公布声明不得 附有任何条件。提前公布声明不符合规定 的，审查员应当发出视为未提出通知书；符 合规定的，在专利申请初步审查合格后立即 进入公布准备。作好公布准备后，申请人要 求撤销提前公布声明的，该要求视为未提 出，申请文件照常公布”，因此A、D选项错 误，B、C选项正确。(2014)"},
  {id: 240, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "成都市民赵某通过邮局向国家知识产权局寄交了一件专利申请S1，邮戳日为2024年3月12日，国家知识产权局受理处于2024年3月15日收到了该申请。赵某于2024年3月13日将另一件专利申请S2交付当地的速递公司，速递公司于次日上午送达成都代办处。在两份申请均符合受理条件的情况下，以下哪些说法是正确的？", options: {"A": "S1的申请日应当是2024年3月12日", "B": "S1的申请日应当是2024年3月15日", "C": "S2的申请日应当是2024年3月13日", "D": "S2的申请日应当是2024年3月14日"}, answer: "AC", explanation: "A选项，根据《审查指南》第五 部分第八章第1.2.1.1节的规定，发明专利申 请人在初步审查合格前，要求提前公布其专 利申请的，自初步审查合格之日起进行公布 准备，即进入予以公布的前期准备工作，A 选项属于对公布的笼统表述，虽不严谨，但 也应当属于正确选项。B、C选项，根据《审 查指南》第五部分第八章第1.2.1.1节的规 定，发明专利申请经初步审查合格后，自申 请日（有优先权的，为优先权日）起满18个 月即行公布，因此B选项错误，C选项正确。 D选项，分案申请应自原案的申请日或优先 权日起满18个月即行公布，如果已经超过 此期限，则在初审合格后立即进入公布准 备，因此D选项错误。（2016)"},
  {id: 241, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "申请人通过EMS给专利局传达室邮寄了一份答复文件，寄出的邮戳日为2024年7月3日，收到地邮局的邮戳日为2024年7月7日，传达室工作人员王某于2024年7月9日收到了该答复文件，并于2024年7月10日转交到专利局受理处，该答复文件的递交日应被认定为哪一天？", options: {"A": "2024年7月3日", "B": "2024年7月7日", "C": "2024年7月9日", "D": "2024年7月10日"}, answer: "ABCD", explanation: "根据《审查指南》第一部分 第二章第1节的规定，实用新型专利申请初 步审查的范围包括：申请文件的明显实质性 缺陷审查；包括专利申请是否不符合专利法 实施细则第11条的规定（诚实信用原则）， 是否明显不符合专利法第22条的规定（新 颖性、创造性、实用性），因此A、B、C、D选项 均正确。（新编）"},
  {id: 242, topic: "专题十一 专利申请的受理和初步审查", type: "single", question: "李某于2024年6月3日使用挂号信邮寄给专利局北京代办处一件专利申请，邮寄该专利申请文件的信封上的邮戳不清晰,专利局北京代办处于2024年6月8日收到该申请文件,李某收到以邮寄形式送达的发文日为2024年6月14日的专利申请受理通知书,该通知书上记载的申请日为2024年6月8日，下列说法正确的是？", options: {"A": "准予更正申请日的,申请人将收到修改更正通知书", "B": "李某应当在2024年7月29日前提出申请日更正请求", "C": "提出申请日更正请求时必须附有收寄专利申请文件的邮局出具的写有寄出日期的有效证明,该证明中注明的寄出挂号号码与请求书中记录的挂号号码一致", "D": "李某应当在2024年8月3日前提出申请日更正的请求"}, answer: "A", explanation: "A、B选项，《细则》第57条第2 款规定：“实用新型或者外观设计专利申请 人自申请日起2个月内，可以对实用新型或 者外观设计专利申请主动提出修改”，因此 A选项正确，B选项错误。C选项，根据《审 查指南》第一部分第二章第8.1节的规定，对 于超过2个月的修改，如果修改的文件消除 了原申请文件存在的缺陷，并且具有被授权 的前景，则该修改文件可以接受，因此C选 项错误。D选项，对于主动修改，以修改不 超出原说明书和权利要求书记载的范围为 限，无修改方式的限制，D选项错误。（2015） 申报书的初步审查"},
  {id: 243, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "在下列哪个情形下，国家知识产权局将重新确定申请日？", options: {"A": "甲通过邮局寄交的专利申请，因邮戳不清，国家知识产权局以收到日作为申请日，甲于收到受理通知书一个月后提交了邮局出具的寄出日期有效证明", "B": "乙的实用新型专利申请的说明书中写有对附图3的说明，但缺少相关附图，接到审查员发出的补正通知后，乙删除了该附图说明", "C": "丙提交的发明专利申请文件中缺少说明书摘要，一个月后丙补交了说明书摘要", "D": "丁提出的分案申请请求书中原案申请日填写错误，三天后经补正符合规定"}, answer: "ABD", explanation: "《审查指南》第一部分第一章第4.1.2 规定：“提出专利申请时请求不公布发明人姓名 应当在请求书‘发明人’一栏所填写的相应发 人后面注明“（不公布姓名）’。不公布姓名的请 提出之后，经审查认为符合规定的，专利局在专 公报、专利申请单行本、专利单行本以及专利证 中均不公布其姓名。……提出专利申请后请求 公布发明人姓名的、应当提交由发明人签字或 盖章的书面声明，但是专利申请作好公布准备 才提出该请求的，视为未提出请求、审查员应当 出视为未提出通知书”，因此A、B、D选项正确，C 项错误。（2017）"},
  {id: 244, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "李某于2024年2月28日向国家知识产权局提交了一件发明专利申请，声明要求享有申请日为2023年3月5日的美国专利的优先权，但是该申请文件缺少权利要求书。李某欲以援引在先申请的方式补交遗漏文件，下列说法正确的有？", options: {"A": "申请人使用国家知识产权局制定的专利请求书标准表格，即视为提出援引加人声明", "B": "申请人应当在首次提交专利申请之日起一个月内补交文件", "C": "如果国家知识产权局在受理程序中发现该申请缺少权利要求书，应当发出不予受理通知书", "D": "如果国家知识产权局在受理程序中发现该申请缺少权利要求书，应当发出补交遗漏文件通知书"}, answer: "BCD", explanation: "A选项的发明名称符合规定。B选 ，根据《审查指南》第一部分第一章第4.1.2节的 定，发明人应当是个人，不能是单位或者集体、 及人工智能名称，请求书中不得填写人工智能 称，因此B选项“人工智熊XX”不合规定。C 项，根据（审查指南》第一部分第一章第4.1.6节 规定，专利代理机构应当依照专利代理条例的 定经国家知识产权局批准成立，即应该为中国 理机构，C选项不符合规定。D选项，大学科研 不具备民事主体资格，不能作为申请人，因此D 项不符合规定。（2015改摄）"},
  {id: 245, topic: "专题十一 专利申请的受理和初步审查", type: "single", question: "某美国专利申请人在2023年1月20日提交了美国发明专利，在2024年1月15日委托中国专利代理机构提交发明专利申请，中国专利代理机构在2024年1月20日以电子申请的方式向国家知识产权局提交了专利申请，声明要求享有美国优先权，并提交了中文权利要求书和摘要以及说明书附图，未提交说明书。以下说法正确的是？", options: {"A": "申请人应当在首次递交专利申请之日起两个月或者收到补交遗漏文件通知书之日起两个月内提交援引加人声明", "B": "申请人可以在专利申请递交之日起两个月内补交遗漏的说明书，以补交遗漏文件之日作为申请日", "C": "国务院专利行政部门发现专利申请遗漏了说明书，应当通知申请人进行补交", "D": "通过援引加人的方式补人符合规定的遗漏文件，以首次提交日为申请日"}, answer: "A", explanation: "A选项，根据《细则》第14条的规定，专 法所称发明人或者设计人，是指对发明创造的 质性特点作出创造性贡献的人，A选项正确。B 项，根据《审查指南》第一部分第一章第4.1.2节 的规定，发明人应当是个人，请求书中不得填写单 位或者集体，以及人工智能名称，例如不得写成 “xx课题组”或者“人工智能×x”等，B选项错误。C 选项，根据《细则》第146条第2款的规定，请求变 更发明人姓名的(包括填错或漏填)，应当向国务 院专利行政部门办理著录事项变更手续，C选项错 误。D选项，职务发明创造的发明人没有申请专利 的权利，因此D选项错误。（2019)"},
  {id: 246, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "赵某向国家知识产权局邮寄了一件发明专利申请，寄出的邮戳日为2024年3月6日。说明书中写有对两幅附图的说明，但附图中仅包含附图1。国家知识产权局于2024年3月12日收到上述文件。2024年4月2日，赵某到国家知识产权局补交了附图2。2024年4月25日，赵某到国家知识产权局补交了摘要。该申请的申请日为哪天？", options: {"A": "2024年3月6日", "B": "2024年3月12日", "C": "2024年4月2日", "D": "2024年4月25日"}, answer: "AB", explanation: "A选项，根据《审查指南》第一部分第 一章第4.1.2节的规定，发明人应当是个人（即自然 人），请求书中应当填写所有发明人的信息，并确 保信息真实，A选项正确。B选项，根据《审查指 南》第一部分第一章第4.1.3.2节的规定，审查员认 为请求书中填写的申请人的国籍、注册地有疑义 时，可以通知申请人提供国籍证明或注册的国家 或者地区的证明文件，B选项正确。C选项，根据 《审查指南》第一部分第一章第4.1.4节的规定，当 申请人是单位且未委托专利代理机构时，才必须 填写联系人，C选项错误。D选项，如果申请人在 中国没有联系地址的，可以填写国外地址，因此D 选项错误。（新编）"},
  {id: 247, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "常某于2024年1月18日向国家知识产权局提交了一件实用新型专利申请，该申请享有2023年8月20日的优先权，后发现所提交申请遗漏了附图2,而说明书中写有对该附图2的说明，常某于2024年3月18日补交了附图2,经审查国家知识产权局接受了该附图2,该申请于2024年5月19日被公告授予专利权。该实用新型专利期满终止日为哪天?", options: {"A": "2033年8月20日", "B": "2034年1月18日", "C": "2034年3月18日", "D": "2034年5月19日"}, answer: "AC", explanation: "A选项，根据《审查指南》第一部分第 一章第4.1.3.2节的规定，请求书中申请人姓名中 不应当含有学位、职务等称号，因此A选项不符合 规定。B选项，根据《审查指南》第一部分第一章第 4.1.2节的规定，提出专利申请时请求不公布发明 人姓名的，应当在请求书“发明人”一栏所填写的 相应发明人后面注明“（不公布姓名）”，因此B选项 符合规定。C选项，根据《审查指南》第一部分第一 章第4.1.4节的规定，联系人只能填写一人，因此C 选项不符合规定。D选项的发明名称符合规定。 (2016)"},
  {id: 248, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "王某通过邮局向国家知识产权局寄交了一件专利申请后，发现国家知识产权局确定的申请日与其实际寄出申请的日期不符。若王某欲请求国家知识产权局更正申请日，则下列说法哪些是正确的？", options: {"A": "王某应当在寄交申请之日起两个月内或者收到受理通知书之日起一个月内提出申请日更正请求", "B": "王某应当在寄交申请之日起两个月内或者收到受理通知书十五日内提出申请日更正请求", "C": "王某在提出申请日更正请求的同时，应当一并提交收寄申请的邮局出具的寄出日期的有效证明", "D": "王某在提出申请日更正请求的同时，应当一并提交能证明其为该申请申请人的有效证明材料"}, answer: "ABCD", explanation: "A、B、D选项，《审查指南》第一部分 第一章第4.1,3.1节规定：“申请人是个人的，应当 使用本人真实姓名，不得使用笔名或者其他非正 、委托书和著录项目变更申报书的初步审查 式的姓名。申请人是单位的，应当使用正式全称， 不得使用缩写或者简称”，因此A选项的简称、B选 项的“科研处”D选项的笔名均不符合规定。C选 项，根据《审查指南》第一部分第一章第4.1.3.2节 的规定，姓名中不应当含有学位、职务等称号，因 此C选项的“教授”不符合规定。(2017)"},
  {id: 249, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "张某于2024年3月2日就同样的发明创造同时提交了实用新型专利申请和发明专利申请。张某发现该实用新型的说明书附图中缺少附图2，并于2024年3月20.日到国家知识产权局补交了附图2。该发明专利申请于2024年10月25日公开。下列哪些说法是正确的？", options: {"A": "该实用新型专利申请可以保留原申请日2024年3月2日", "B": "应重新确定该实用新型专利申请的申请日为2024年3月20日", "C": "该发明专利申请破坏该实用新型专利申请的新颖性", "D": "如果在实用新型专利申请授权前，张某提交了撤回实用新型专利申请声明并且该撤回声明已经生效，如果该发明申请符合授予专利权的其他条件，该发明专利申请可以被授权"}, answer: "BC", explanation: "《审查指南》第一部分第一章第4.1.5节 规定：“除直接涉及共有权利的手续外，代表人可 以代表全体申请人办理在专利局的其他手续。直 接涉及共有权利的手续包括：提出专利申请，委托 专利代理，转让专利申请权、优先权或者专利权， 撒回专利申请，撤回优先权要求，放弃专利权等”， 因此A、D选项涉及共有权利，不能由代表人代表 全体申请人办理，B、C选项可以由代表人代表全体 申请人办理。(2016)"},
  {id: 250, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "下列哪些说法是错误的？", options: {"A": "实用新型专利申请无附图的，国家知识产权局通知申请人进行补正，并重新确定申请日", "B": "对于存在不可能通过补正方式克服的明显实质性缺陷的实用新型专利申请，国家知识产权局将发出审查意见通知书", "C": "实用新型专利申请经过初步审查符合规定的，自申请日起满十八个月即行公布", "D": "依赖遗传资源完成的发明创造专利不符合规定的，在初步审查程序中将直接被驳回"}, answer: "BC", explanation: "A选项，江苏企业作为代表人申请专 利，无需委托专利代理机构，A选项错误。B选项， 申请人是单位且未委托专利代理机构的，应当填 写联系人，联系人应当是本单位的工作人员，B选 项正确。C选项，根据《审查指南》第一部分第一章 第4.1.5节的规定，除直接涉及共有权利的手续外， 代表人可以代表全体申请人办理在专利局的其他 手续，提出提前公开声明、提出实质审查请求、提 交意见陈述书、请求专利权期限补偿均不属于直 接涉及共有权利的手续，代表人可以办理，C选项 正确。D选项，根据《审查指南》第一部分第一章第 4.1,4节的规定，联系人只能填写一人，D选项错 误。（新编）"},
  {id: 251, topic: "专题十一 专利申请的受理和初步审查", type: "single", question: "下列关于发明专利申请提前公布的说法哪个是正确的？", options: {"A": "申请人应当在提出发明专利申请的同时提交提前公布声明", "B": "申请人应当在提交提前公布声明的同时缴纳提前公布费", "C": "申请人应当在发明专利申请初步审查合格之前提交提前公布声明", "D": "申请人提出提前公布声明不能附有任何条件"}, answer: "C", explanation: "《专利法》第18条第1款规定：“在中国没 有经常居所或者营业所的外国人、外国企业或者 外国其他组织在中国申请专利和办理其他专利事 务的，应当委托依法设立的专利代理机构办理”。 本题中，办事处并不是营业所，因此在中国设有办 事处的美国某公司应当委托中国专利代理机构办 理，C选项正确。(2013)"},
  {id: 252, topic: "专题十一 专利申请的受理和初步审查", type: "single", question: "申请人张某在提交一件发明专利申请的同时提交了提前公布声明。下列说法哪些是正确的？", options: {"A": "张某可以在该提前公布声明中附加若干条件", "B": "若该提前公布声明符合规定，则该申请在初步审查合格后立即进人公布准备", "C": "若该提前公布声明符合规定，张某在该申请作好公布准备后要求撤销该提前公布声明的，该要求视为未提出，申请文件照常公布", "D": "若该提前公布声明不符合规定，国家知识产权局应当发出补正通知书"}, answer: "C", explanation: "A、C选项，根据《审查指南》第一部分 第一章第6.1.1节的规定，在中国内地没有经常居 所或者营业所的香港、澳门或者台湾地区的申请 人单独向专利局提出专利申请和办理其他专利事 务，或者作为代表人与中国内地的申请人共同申 请专利和办理其他专利事务的，应当委托专利代 理机构办理，A选项错误，C选项正确。B选项，国 内企业作为代表人可以不委托专利代理机构，B选 项错误。D选项，根据《审查指南》第一部分第一章 第4.1.6节的规定，在请求书中，专利代理师应当使 用其真实姓名，同时填写专利代理资格证号码和 联系电话，因此D选项错误。（2015改编）"},
  {id: 253, topic: "专题十一 专利申请的受理和初步审查", type: "single", question: "对于经初步审查符合相关规定的下列发明专利申请，有关公布的说法哪些是正确的？", options: {"A": "申请人请求早日公布的，应当在初审合格后立即予以公布", "B": "申请人未要求提前公布的，则自申请日起满十八个月即行公布，与优先权日无关", "C": "申请人未要求提前公布的，则自优先权日起满十八个月即行公布", "D": "分案申请自提出分案请求之日起满十八个月即行公布"}, answer: "D", explanation: "A、B、C选项，《审查指南》第五部分第 三章第2.2节规定：“专利申请有下列情形之一的， 专利局不予受理：…（6在中国内地没有经常居 所或者营业所的外国人、外国企业或者外国其他 组织单独申请专利，或者作为代表人申请专利，没 有委托专利代理机构的；(7)在中国内地没有经常 居所或者营业所的香港、澳门或者台湾地区的个 人、企业或者其他组织单独申请专利，或者作为代 表人申请专利，没有委托专利代理机构的……”， 因此A、B、C选项不予受理。D选项，在上海有营 业所的外国企业可以不委托专利代理机构，因此D 选项予以受理。（2016改编）"},
  {id: 254, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "下列哪些选项属于实用新型专利申请初步审查的范围？", options: {"A": "明显未以真实发明创造活动为基础", "B": "明显不具有新颖性", "C": "明显不具有实用性", "D": "明显不具有创造性"}, answer: "ABC", explanation: "A选项，《审查指南》第一部分第一 章第4.1.3.1节规定：“申请人是中国单位或者个人 的，应当填写其名称或者姓名，地址、邮政编码、统 一社会信用代码或者身份证件号码”，A选项正确。 节规定：“只有当申请人所属国不是巴黎公约成员 国或者世界贸易组织成员时，才需审查该国法律 中是否订有依互惠原则给外国人以专利保护的条 款”，因此B、C选项正确，D选项错误。（新编）"},
  {id: 255, topic: "专题十一 专利申请的受理和初步审查", type: "multiple", question: "下列关于实用新型专利申请的主动修改，哪个说法是正确的？", options: {"A": "申请人可以自申请日起二个月内提出主动修改", "B": "申请人可以自收到受理通知书之日起三个月内提出主动修改", "C": "超出修改期限的修改文件，国家知识产权局一律不予接受", "D": "对权利要求书的修改仅限于权利要求的删除、技术方案的删除、对权利要求进一步限定-90 -对请求书、委托书和著录项目变更"}, answer: "ABC", explanation: "A选项，《细则》第47条第2款规 定：“同一申请人在同日（指申请日）对同样的发明 5、委托书和著录项目变更申报书的初步审查 创造既申请实用新型专利又申请发明专利的，应 当在申请时分别说明对同样的发明创造已申请了 另一专利”，A选项正确。B选项；《细则》第29 条第2款规定：“就依赖遗传资源完成的发明创造 申请专利的，申请人应当在请求书中予以说明，并 填写国务院专利行政部门制定的表格”，B选项正 确。C选项，根据《审查指南》第一部分第一章第 6.2.1.2节的规定，申请人要求优先权的，应当在提 出专利申请的同时在请求书中声明；未在请求书 中提出声明的，视为未要求优先权，C选项正确。D 选项，要求提前公布可以在申请时在请求书中声 明，也可以在申请后进入公布准备前提出，因此D 选项错误。（2010)"},
  {id: 256, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "李某作为发明人完成了一项职务发明创造，其所在的甲公司就此项发明创造提出了发明专利申请。那么，以下哪些说法是正确的？", options: {"A": "在提出专利申请后，李某请求不公布其姓名，则应当提交李某签字或盖章的书面声明", "B": "在提出专利申请时，李某请求不公布其姓名，则应当在请求书“发明人”一栏所填写的李某姓名后注明“（不公布姓名）”", "C": "李某不公布其姓名的请求被批准后，专利局在专利公报、专利单行本中不公布其姓名，但在专利证书中公布其姓名", "D": "在专利申请进人公报编辑后，李某请求不公布其姓名，则李某的请求将视为未提出"}, answer: "AD", explanation: "《细则》第18条规定：“依照专利法第 18条第1款的规定委托专利代理机构在中国申请 专利和办理其他专利事务的，涉及下列事务，申请 人或者专利权人可以自行办理：（一）申请要求优 先权的，提交第一次提出的专利申请（以下简称在 先申请）文件副本；（二）缴纳费用；（三）国务院专 利行政部门规定的其他事务”。因此，B、C选项仍 需要专利代理机构办理，A、D选项可由申请人自 行办理。（新编）"},
  {id: 257, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "专利申请请求书中的下列哪些内容不符合相关规定？", options: {"A": "发明名称：一种离心分解装置", "B": "发明人：人工智能XX", "C": "专利代理机构名称：美国XX专利代理事务所", "D": "申请人：XX大学科研处"}, answer: "ACD", explanation: "《审查指南》第一部分第一章第 6.7.2.3节(3)规定：“因漏填或者错填发明人提出变 更请求的，应当自收到受理通知书之日起一个月 内提出，提交由全体申请人(或专利权人)和变更 前后全体发明人签字或者盖章的证明文件，并声 明已依照专利法实施细则第14条规定确认变更后 的发明人是对本发明创造的实质性特点作出创造 性贡献的全体人员”。因此A、C、D选项办理手续 正确。B选项，请求变更发明人的，应当自提出请 求之日起1个月内缴纳著录事项变更费，因此B选 项错误。（新编） 16、BD。A选项，根据《审查指南》第一部分第 一章第6.7.1.1节的规定，一件专利申请的多个著 录项目同时发生变更的，只需提交一份著录项目 变更申报书，因此A选项错误。B、C选项，根据《审 查指南》第一部分第一章第6.7.2.2节（2)的规定， 申请人(或专利权人)因权利的转让或者赠与发生 权利转移提出变更请求的，应当提交双方签字或 者盖章的转让证明或者赠与合同；根据《审查指 南》第一部分第一章第6.7.2.4节（4)的规定，变更 后的申请人(或专利权人)委托原专利代理机构 的，只需提交新增申请人(或专利权人)签字或者 盖章的委托书，因此B选项正确，C选项错误。D选 项，根据《审查指南》第一部分第一章第6.7.1.4节 的规定，因权利转移引起的变更，也可以由新的权 利人或者其委托的专利代理机构办理，D选项正 确。（2017改编）"},
  {id: 258, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "下列关于发明人的说法正确的是？", options: {"A": "发明人是指对发明创造的实质性特点作出创造性贡献的人", "B": "请求书中发明人可以填写为“某课题组”", "C": "申请人提交文件后发现发明人姓名的文字有错误，将“王立”错写成“王丽”，申请人应通过补正更正", "D": "发明人就其完成的任何发明创造均有权申请专利"}, answer: "ACD", explanation: "根据《审查指南》第一部分第一章 第6.7.2.1节的规定，一件专利申请同一著录项目 发生连续变更的，应当分别提交著录项目变更申 报书【A选项】，专利申请权（或专利权)连续转移 的，不应当以连续变更的方式办理【B选项】；多件 专利申请的同一著录项目发生变更，且变更的内 容完全相同可以提交批量著录项目变更申报书【C 选项】，因此A、C选项正确，B选项错误。根据《审 查指南》第一部分第一章第6.7.2.1节的规定，申请 人(或专利权人)请求变更姓名或者名称的，应当 提供身份证件号码或者统一社会信用代码，因此D 选项正确。（新编）"},
  {id: 259, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "下列关于请求书中所填写事项的说法哪些是正确的？", options: {"A": "请求书中应当填写所有发明人的身份信息", "B": "国家知识产权局认为请求书中填写的外国申请人的国籍有疑义时，可以通知申请人提供国籍证明", "C": "申请人是单位的，必须指定本单位的一名工作人员作为联系人", "D": "无论申请人是中国人还是外国人，其填写的地址都应当是中国境内的地址"}, answer: "ABCD", explanation: "A选项，根据《审查指南》第一部 分第一章第6.7.1.1节的规定，一件专利申请的多 个著录项目同时发生变更的，只需提交一份著录 项目变更申报书，A选项说法错误。B、C选项，发 明人遗漏应当办理著录项目变更手续，但是需要 在收到受理通知书之日起一个月内办理，本题想 要增加发明人的时间距收到专利申请受理通知书 之日已经超过一个月，已经无法办理，因此B、C选 项错误。D选项，根据《审查指南》第一部分第一章 、委托书和著录项目变更申报书的初步审查 第6.7.1.4节的规定，因权利转移引起的变更，著录 项目变更手续可以由新的权利人办理；新的权利 人已委托代理机构的，应当由其委托的专利代理 机构办理。因此该手续可以由B专利代理机构办 理，无需办理解除委托的手续，D选项说法错误。 （新编）"},
  {id: 260, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "发明专利申请请求书中出现的下列哪些情形不符合相关规定？", options: {"A": "申请人一栏填写为“李力高级工程师”", "B": "发明人一栏填写为“王明赵伟（不公开姓名）”", "C": "联系人一栏填写为“张宇，王量”", "D": "发明名称一栏填写为“一种发电装置”"}, answer: "ABC", explanation: "A选项，根据《审查指南》第一部分 第一章第6.7.1.4节的规定，因权利转移引起的变 更，可以由新的权利人办理；新的权利人已委托代 理机构的，应当由其委托的专利代理机构办理，A 选项正确。B、C选项，《审查指南》第一部分第一章 第6.7.2.2节（3)（ii)规定：“对于发明或者实用新型 专利申请（或专利），转让方是中国内地的个人或 者单位，受让方是外国人、外国企业或者外国其他 组织的，应当出具国务院商务主管部门颁发的“技 地方商务主管部门颁发的*技术出口合同登记 证”，以及双方签字或者盖章的转让合同”，B、C选 项正确。对于签订专利权转让合同后登记的时间 没有限制，D选项错误。（2012改编）"},
  {id: 261, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "下列哪些情形中专利申请人的填写不符合规定？", options: {"A": "正式全称为北京某电子科技股份有限公司的企业在提交的专利申请中，专利申请人一栏填写的是“北京某电子公司”", "B": "某大学提交的专利申请中，专利申请人一栏填写的是“某大学科研处”", "C": "外国某大学教授约翰·史密斯提交的专利申请中，专利申请人一栏填写的是“约翰·史密斯教授”", "D": "张某在其提交的专利申请中，专利申请人一栏填写的是其笔名“风行”"}, answer: "AC", explanation: "A选项，根据《细则》第116条第3款 的规定，著录事项变更费应当自提出请求之日起1 个月内缴纳，因此A选项正确。B选项，对于中国 向外国转让外观设计专利权无需提交《技术出口 许可证》或《技术出口合同登记证》，B选项错误。C 选项涉外主体应当委托依法设立的专利代理机构 办理，C选项正确。D选项，根据《专利法》第10条 第3款的规定，专利申请权或者专利权的转让自登 记之日起生效，该登记之日是指发出手续合格通 知书之日，D选项错误。（2011改编） 21、AB。《审查指南》第一部分第一章第6.7.2.2 节(3)（ii)规定：“对于发明或者实用新型专利申请 （或专利），转让方是中国内地的个人或者单位，受 让方是外国人、外国企业或者外国其他组织的，应 当出具国务院商务主管部门颁发的“技术出口许 可证\'或者“技术出口合同登记证”，或者地方商务 主管部门颁发的“技术出口合同登记证”，以及双 方签字或者盖章的转让合同，以及双方签字或者 盖章的转让合同”。A、B选项，转让方或转让方之 一有中国内地的单位，应按照上述法条规定办理 手续，A、B选项正确。C选项，向外国转让外观设 计专利无需办理上述法条规定的手续，C选项错 误。D选项，中国内地注册的外资公司属于中国内 地的单位，无需办理上述法条规定的手续，D选项 错误。（2017）"},
  {id: 262, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "专利申请人为多人且未委托专利代理机构的，其代表人可以代表全体申请人办理下列哪些手续？", options: {"A": "委托专利代理", "B": "答复审查意见通知书", "C": "办理延长期限请求", "D": "撤回优先权要求"}, answer: "BD", explanation: "本题中，甲与乙的专利权转让合同 签订后，合同生效，但是未办理登记，权利并不转 移；甲与丙订立了专利权转让合同，并办理了登记 手续，因此甲与丙之间专利权的转让生效，乙可以 请求甲承担合同违约责任，因此A、C选项错误，B、 D选项正确。（2018）"},
  {id: 263, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "single", question: "江苏某企业与国外某公司共同申请专利,江苏企业作为代表人通过其电子账户提出专利申请，并指定叶某为联系人，以下说法正确的是：", options: {"A": "由于共同申请人之一为国外公司，所以应当委托依法设立的专利代理机构提交专利申请", "B": "叶某应当是该江苏企业的工作人员", "C": "该江苏企业可以提出提前公开声明、提交实质审查请求、提交意见陈述书、请求专利权期限补偿", "D": "如果该国外公司在南京设有办事机构，则可以同时指定其办事机构的工作人员为第二联系人"}, answer: "C", explanation: "根据《专利法》第10条第3款的规定， 专利申请权或者专利权的转让自登记之日起生 定：“专利申请权（或专利权）的转移自登记日起生 效，登记日即上述的手续合格通知书的发文日”。 本题中，专利权转让登记日为2023年7月14日（手 续合格发文日），因此C选项正确。（新编）"},
  {id: 264, topic: "专题十二 对请求书、委托书和著录项目变更申报书的初步审查", type: "multiple", question: "在中国设有办事处的美国某公司欲就其一项发明创造在中国申请专利。该公司可以通过下列哪种方式提交其申请？", options: {"A": "直接通过国家知识产权局电子申请系统提交", "B": "委托美国专利代理机构提交", "C": "委托中国专利代理机构提交", "D": "指派其在中国的员工提交"}, answer: "BC", explanation: "A、B、C选项，《审查指南》第一部分 第一章第6.7.2.2节（3)（ii)规定：“对于发明或者实 用新型专利申请（或专利），转让方是中国内地的 个人或者单位，受让方是外国人、外国企业或者外 国其他组织的，应当出具国务院商务主管部门颁 发的《技术出口许可证》或者《技术出口合同登记 证》，或者地方商务主管部门颁发的《技术出口合 同登记证》，以及双方签字或者盖章的转让合同”， 因此B、C选项正确；专利权的转让无需获得管理 专利工作的部门审核批准，因此A选项错误。D选 项，根据《专利法》第10条第3款的规定，专利权的 转让自登记之日起生效，因此D选项错误。（2016） 、委托书和著录项目变更申报书的初步审查"},

  {id: 376, topic: "专题四 行政复议法", type: "multiple", question: "某行政复议机关受理行政复议申请后、发现该行政复议申请不符合行政复议法和行政复议法实施条例规定的受理条件。根据行政复议法及相关规定，该行政复议机关应当如何受理？", options: {"A": "作出终止行政复议的决定", "B": "作出驳回行政复议申请的决定", "C": "作出不予受理的决定", "D": "作出维持具体行政行为的决定"}, answer: "AC", explanation: "。A.D选项，（凭以决》46签第1峡院定：“行攻复以期问，快中请人不得自行句中请人和其他有关单位成着个人收集还借：自行收集的证不作力认定行次行力合法偿、连当性的次语”，四北A选项正确，D选项借候。B选项，（复议法》铭48条规定：”·.使中请人血当自收到行政复以中请节副本成行政复以申请笔染复印体之日起10日内，提出仔留容复，并提交作出行攻行力的证据、依据和其他有关材料”，国此B选项错误。C选项，（复议法》第70条规定：“申请人不授本法第48条、第54条的规定提出卡面答复、提交作出行政行力的证据、依据和其他有关材料的，规为该行政行为没有证据、依物，行政复议机关决定撤销、部分盛销谊行政行劳，确认设行政行方进法、无效或者决定中请人在一定限内是行…”，因此C选项正确（2011改编）", chapter: "第三章 行政复议程序"},
  {id: 377, topic: "专题四 行政复议法", type: "multiple", question: "公民、法人或者其他组织依法提出行政复议申请，行政复议机关无正当理由不予受理的情况下，下列说法正确的是？", options: {"A": "上级行政机关应当责令其纠正，但不可以直接受理", "B": "上级行政机关应当责令其纠正，必要时，上级行政机关也可以直接受理", "C": "上级行政机关无权责令其纠正，必要时，上级行政机关可以直接受理", "D": "上级行政机关无权责令其纠正，也不能直接受理"}, answer: "ABC", explanation: "。（复议法）第39条第1款规定：“行政复议期回有下列情形之一的，行政复议中止：（二）作为申请人的公民丧失参加行政复议的行为能力，尚未确定法定代理人参加行政复以：（三）作为申请人的公民下落不明…（八）行政复议聚件审理需要以其他案件的审理结果为依据，面其他紫件尚未申结”，因此A、B、C选项属复议中止情形，D选项属干复议终止情形。（新福）", chapter: "第三章 行政复议程序"},
  {id: 378, topic: "专题四 行政复议法", type: "multiple", question: "行政复议申请材料不齐全或者表述不清楚，无法判断行政复议申请是否符合受理条件的，行政复议机关应当书面通知申请人补正，申请人收到行政机关发出的补正通知书后，应当自收到补正通知之日起（）日内提交补正材料？", options: {"A": "10", "B": "7", "C": "15", "D": "30"}, answer: "ABC", explanation: "。（复议法）第41条规定：“行改复议期向有下列情形之一的，行政复议机关决定终正行政复议：（一）申请人撤回行政复议申请，行政复议机构准予撒回：（二）作为申请人的公民死亡，没有近亲属或者其近亲属放弃行政复议权利：（三）作为申请人的法人或者其他组织终止，没有权利义务承受人或者其权利义务承受人放弃行政复议权利；（四）申请人对行政拘留或者限制人身自由的行政强制措施不服申请行政复议后，因同一违法行为涉嫌犯罪，被采取刑事强制措施...”，因此A、B、C选项属于可以终止复议情形，D选项因其他违法行为涉嫌犯罪对该行政复议不子终止。（新编）", chapter: "第三章 行政复议程序"},
  {id: 379, topic: "专题四 行政复议法", type: "multiple", question: "以下哪些属于行政复议机关审理行政复议案件的依据？", options: {"A": "法律", "B": "法规", "C": "国务院部门规章", "D": "地方各级人民政府规章"}, answer: "BCD", explanation: "。《复议法》第42条规定：“行政复议期间行政行为不停止执行；但是有下列情形之一的，应当停止执行：（一）被申请人认为需要停止执行；（二）行政复议机关认为需要停止执行；（三）申请人、第三人申请停止执行，行政复议机关认为其要求合理，决定停止执行……”，A选项中的说法过于绝对，因此A选项错误，B、C、D选项正确。（新编）", chapter: "第四章 行政复议审查"},
  {id: 380, topic: "专题四 行政复议法", type: "multiple", question: "对于行政复议审理过程中举证责任的分配，以下说法正确的有？多选）", options: {"A": "被申请人只对其作出的行政行为的合法性负有举证责任", "B": "被申请人对其作出的行政行为的合法性、适当性都负有举证责任", "C": "申请人不承担举证责任", "D": "申请人认为被申请人不履行法定职责的，负有举证责任"}, answer: "ACD", explanation: "。A选项，《复议条例》第37条规定：“行政复议期间涉及专门事项需要鉴定的，当事人可以自行委托鉴定机构进行鉴定，也可以申请行政复议机构委托鉴定机构进行鉴定”，A选项正确。B选项，《复议法》第50条第2款规定：“行政复议机构认为有必要听证，或者申请人请求听证的，行政复议机构可以组织听证”，B选项错误。C选项，根据《复议法》第41条的规定，申请人自愿撤回复议申请，经行政复议机构同意，可以撤回，行政复议终止，C选项正确。D选项，《复议法》第45条第2款规定：“调查取证时，行政复议人员不得少于两人，并应当出示行政复议工作证件”，D选项正确。因此，A、C、D选项正确。（法考2017，思维扩展）", chapter: "第四章 行政复议审查"},
  {id: 381, topic: "专题四 行政复议法", type: "multiple", question: "下列有关行政复议机关调查取证说法正确的有？", options: {"A": "行政复议机关可以主动调查取证", "B": "行政复议机关可以根据申请人的申请调查取证", "C": "行政复议机关可以根据行政机关的申请调查取证", "D": "行政复议机关调查取证时，行政复议人员不得少于3人"}, answer: "CD", explanation: "。A、B选项，《复议法》第56条规定：“申请人依照本法第13条的规定提出对行有关规范性文件的附带审查申请，行政复议在机关有权处理的，应当在30日内依法处理；", chapter: "第四章 行政复议审查"},
  {id: 382, topic: "专题四 行政复议法", type: "single", question: "根据行政复议法及相关规定，下列哪些说法是正确的？", options: {"A": "行政复议决定作出前，申请人可以撤回行政复议申请", "B": "在行政复议期间，只有申请人才可以查阅、复制被申请人提出的有关材料", "C": "在行政复议期间，申请人可以查阅、复制所有的证据、2026年专利北理师资协考伙材料", "D": "在行政复议期间，申请人、第三人及其委托代理人以按规定查阅、复制被申请人的证据、材料"}, answer: "C", explanation: "。根据《复议法》第62条的规定，适用普通程序审理的行政复议案件，行政复议机关应当自受理申请之日起60日内作出行政复议决定，不能在规定期限内作出行政复议决定的，经批准，可以延长，延长期限最多不得超过30日，故最多为90日，因此C选项正确。（新编）", chapter: "第四章 行政复议审查"},
  {id: 383, topic: "专题四 行政复议法", type: "single", question: "甲市乙区卫健委因韩某未取得《医疗机构执业许可证》擅自执业，经研究，作出没收违法所得1200元和罚款7000元的决定。韩某不服，申请行政复议。关于此案，下列说法正确的是：", options: {"A": "乙区政府应当在3日内进行审查，决定是否予以受理", "B": "乙区政府应当自受理之日起5日内将申请书副本发送给乙区卫健局", "C": "韩某申请复议材料不齐全的，自收到该行政复议申请之日起5日内书面通知韩某补正", "D": "乙区卫健局应当自收到行政复议申请副本之日起10日内提交作出行政行为的证据、依据和其他有关材料"}, answer: "A", explanation: "。《复议法》第62条第2款规定：“适用简易程序审理的行政复议案件，行政复议机关应当自受理申请之日起30日内作出行政复议决定”，因此A选项正确。（新编）", chapter: "第四章 行政复议审查"},
  {id: 384, topic: "专题四 行政复议法", type: "single", question: "关于行政复议委员会，以下说法正确的有？", options: {"A": "行政复议机构认为审理的行政复议案件案情重大、复杂、疑难，应当提请行政复议委员会作出复议决定", "B": "省政府对本机关作出的行政行为进行复议，应当提请行政复议委员会作出咨询意见", "C": "国务院工作部门应当建立行政复议委员会", "D": "行政复议委员会除对行政复议案件提供咨询意见外，还可以就行政复议工作中的共性问题研究提出意见"}, answer: "B", explanation: "。A选项，王某对区公安局的行政行为不服，应当向区政府申请复议，因此A选项错误。B选项，《复议法》第17条第1款规定：“申请人、第三人可以委托1至2名律师、基层法律服务工作者或者其他代理人代为参加行政复议”，因此B选项正确。C选项，根据《复议法》第62条的规定，适用普通程序审理的行政复议案件，行政复议机关应当自受理申请之日起60日内作出行政复议决定，不能在规定期限内作出行政复议决定的，经批准，可以延长，因此C选项错误。D选项，《复议法》第87条规定：“行政复议机关受理行政复议申请，不得向中请人收取任何费用“，因此D选项佣误。（2018改纳）", chapter: "第四章 行政复议审查"},
  {id: 385, topic: "专题四 行政复议法", type: "multiple", question: "下列有关行政复议简易程序说法正确的是？", options: {"A": "如果行政复议案件争议较大，经当事人各方同意，也可以适用简易程序", "B": "适用简易程序的行政复议案件，可以只进行书面审理", "C": "适用简易程序的行政复议案件，申请人应当自收到行政复议副本之日起7日内提交作出行政行为的证据、依据和其他有关材料", "D": "案件涉及款额5000元以下的，可以适用简助序"}, answer: "AC", explanation: "。A选项，（复议条例>策32条规定：“行政复议机构审理行政复议案作，应当由2名以上行政复议人员参加”，因此A选项违反规定。日选项，（复议法》第62条第1数规定：“适用普通程序审理的行政复议案件，行政复议机关应当自受理申请之日起60日内作出行政复议决定·”，因此B选项符合规定。C选项，（复议法》第63条第2款规定：“行政复议机关不得作出对申请人更为不利的交更决定…”，因此C选项违反规定。D选项，《复议法》第50条第1款规定：“审理重大、疑难、复杂的行政复议案件，行政复议机构应当组织听证”，因此D选项符合规定。（2018改编）", chapter: "第四章 行政复议审查"},
  {id: 386, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，下列关于行政复议证据的说法哪些是正确的？", options: {"A": "在行政复议过程中，被申请人不得自行向申请人和其他有关单位或者个人收集证据", "B": "被申请人应当自收到行政复议申请书副本15日内，提交作出行政行为的证据", "C": "被申请人未在规定的期限内提交作出行政行为的证据的，视为该行政行为设有证据，行政复议机关可以决定撤销该行政行为", "D": "被申请人自行收集的证据可以作为认定行政行为合法性、适当性的依据"}, answer: "ABC", explanation: "。《复议法》第63条第1款规定：“行政行为有下列情形之一的，行改复议机关决定变更该行政行为：（一）事实清楚，证据确凿，适用依据正确，程序合法，但是内容不适当：（二）事实清楚，证据确凿，程序合法，但是未正确适用依据：（三）事实不清、证据不足，经行政复议机关查清事实和证据”，因此A、B、C选项正确，D选项属于应当撒销行政行为的情形。（新编）", chapter: "第四章 行政复议审查"},
  {id: 387, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，下列哪些情形下行政复议中止？", options: {"A": "作为申请人的公民丧失参加行政复议的行为能力，尚未确定法定代理人参加行政复议", "B": "作为申请人的公民下落不明", "C": "案件审理需要以其他案件的审理结果为依据，而其他案件尚未审结", "D": "作为申请人的法人或者其他组织终止，其权利义务的承受人放弃行政复议权利"}, answer: "ABCD", explanation: "。（复议法》第64条第1数规定：“行政行为有下列情形之一的，行政复议机关决定撤销或者部分撤销该行政行为，并可以责令被申请人在一定期限内重新作出行政行为：（一）主要事实不清、证据不足；（二）违反法定程序：（三）适用的依据不合法：（四）超越职权或者溢用职权”，因此A、B、C、D选项均正确。（2016改编）", chapter: "第四章 行政复议审查"},
  {id: 388, topic: "专题四 行政复议法", type: "multiple", question: "行政复议期间出现哪种情形后，行政复议终止？", options: {"A": "申请人撤回行政复议申请，行政复议机构准予撤回", "B": "作为申请人的公民死亡，其近亲属放弃行政复议权利", "C": "作为申请人的法人终止，没有权利义务承受人", "D": "申请人对行政拘留不服申请复议后，因其他违法行为涉嫌犯罪，被采取刑事强制措施"}, answer: "CD", explanation: "。A、B选项，具体行政行为主要事实不清、证据不足的，超越职权或者巡用职权的，应当决定撤销或者部分撤销该行政行为，并可以责令被申请人在一定期限内重", chapter: "第四章 行政复议审查"},
  {id: 389, topic: "专题四 行政复议法", type: "multiple", question: "某县公安局以钟某扰乱社会秩序为由对其作出行政处罚决定，钟某不服，向县政府申请行政复议。根据行政复议法及相关规定，关于行政复议期间该行政处罚决定的执行，下列哪些说法是正确的？", options: {"A": "该行政处罚决定应当停正执行", "B": "该县公安局认为需要停止执行的，应当停止执行该行政处罚决定", "C": "该县政府认为需要停止执行的，应当停止执行该行政处罚决定", "D": "钟某申请停止执行，该县政府认为其要求合理决定停止执行的，应当停止执行该行政处罚决定"}, answer: "ABCD", explanation: "。A违，《复以法》68靠膜定：“行改柠方认定尊美清是，递借费备，逸用你通正嘴，提序合法：内容迎当的，行次复以机关决定鹰持行政行分”四北人逐项正确。B选项《凭以法》66鲁定：“览中请人不境行法定职费的，行攻凭议机关决定中请人在一定期院内提行”，四北B选项正确。C选项，据《复以法》能63条的现定，事实不清，证据不足，经行改复以机义整清事实和证据，行政凭议机炎决定变更说行政行力，旧此C选项正确。D选项，概据（复仪法》第64条的规定，生是事实不清、证据不足的，决定缴镜或者部分撤销该行政行力，并可以货今被中请人在一定用限内重新作出行政行为，因此D选项正确。（2017改编）", chapter: "第四章 行政复议审查"},
  {id: 390, topic: "专题四 行政复议法", type: "multiple", question: "关于行政复议案件的审理和决定，下列哪些说法是正确的？多选）", options: {"A": "行政复议期间涉及专门事项需要鉴定的，当事人可自行委托鉴定机构进行鉴定", "B": "审理行政复议案件，申请人提出采取听证方式审理的，行政复议机构应当采取听证方式审理", "C": "申请人在行政复议决定作出前自愿撤回行政复议申请的，经行政复议机构同意，可以撤回", "D": "行政复议人员调查取证时应向当事人或者有关人员出示证件"}, answer: "CD", explanation: "。A选项，（复议条例）第39基规定：“行政复议期问按中请人政变原具体行政行为的，不影响行玫复议能件的审理。但是，申请人依法微回行政复议中请的康外”因此A选项借误。报据（复议法）第65条的规定，拉中请人改变原违法行政行为，中请人仍要求撤销或者确认该行政行为违法的，行政复议机关确认该行改行为造法。本题中，石家庄市市场监督管理局取消了处罚决定，井对没收的产品于以归还，已经改受原违法行政行为，申请人仍要求撤销或者确认该行政行为违法，行政复议机关应当确认该行政行为违法，并不要撤销原行政行为，因此B选项错误，C、D选项正确。（新编）", chapter: "第四章 行政复议审查"},
  {id: 391, topic: "专题四 行政复议法", type: "multiple", question: "下列有关行政复议附带审查程序说法正确的有？多", options: {"A": "申请人认为行政机关所依据的规范性文件不合法政复议机关提出附带审查，行政复议机关有权处理的，应10日内进行处理", "B": "申请人认为行政机关所依据的规范性文件不合法，向行政复议机关提出附带审查，行政复议机关无权处理的，应当在5日内转送有权处理的行政机关进行处理", "C": "行政复议机关认为被申请人作出的行政行为所依据的规范性文件不合法，行政复议机关有权处理的，应当在30日内进行处理", "D": "行政复议机关认为被申请人作出的行政行为所依据的规范性文件不合法，行政复议机关无权处理的，应当在7日内转送有权处理的行政机关进行处理"}, answer: "BCD", explanation: "。A选项中违反法定程序复机关可以选择决定撤销或者部分撤销该行政行为、并可以责今被中请人在一定期限内重新作出行政行为，不能进行变更。B选项中行政行为不适当可以变更。C选项中行改行为如果合法且适当可以作出维特决定，D选项，行政复议机关办理行政复议案件，可以进行调解，因此D选项正确。（2018改编）", chapter: "第四章 行政复议审查"},
  {id: 392, topic: "专题四 行政复议法", type: "single", question: "适用普通程序审理的行政复议案件，行政复议机关应当自受理申请之日起最长（）日内作出行政复议决定？", options: {"A": "30", "B": "60", "C": "90", "D": "45"}, answer: "D", explanation: "。（复议法》第69条规定：“行政复议机关受理申请人认为被申请人不履行法定职责的行政复议申请后，发现被申请人汉有相应法定职责或者在受理前已经履行法定职贵的，决定驳回中请人的行政复议请求”，因此A、B、C选项借误，D选项正确。(2012）", chapter: "第五章 行政复议决定"},
  {id: 393, topic: "专题四 行政复议法", type: "multiple", question: "适用简易程序审理的行政复议案件，行政机关应当自受理申请之日起（）日内作出行政复议决定？", options: {"A": "30", "B": "60", "C": "15", "D": "10"}, answer: "ABC", explanation: "。《复议法》第70条规定：“被中请人不按照本法第48条、第54条的规定提出书面答复、提交作出行政行为的证据、依据和其他有关材料的，视为该行政行为没有证据、依据，行政复议机关决定撤销、部分数销该行政行为，确认该行政行为违法、无效或者决定被中请人在一定期限内履行，但是行政行为涉及第三人合法权益，第三人提供证据的除外”，因此A、B、C选项正确。D选项，第三人提交了行政机关作出行政行为的证据，如果能够证明行政行为合法的，应当作为行政行为合法的依据，因此D选项错误。（新编）", chapter: "第五章 行政复议决定"},
  {id: 394, topic: "专题四 行政复议法", type: "multiple", question: "王某在未取得营业执照的情况下，在街道上销售活鸡鸭，市城管局查获王某的无照经营行为，扣押了王某的电子秤一个，鸡鸭数只，王某在城管局实施扣押的过程中与城管人员发生冲突阻碍扣押，城管人员报警，区公安局对王某作出行政拘留5日的处罚决定，王某不服，申请行政复议，下列哪一说法是正确的？", options: {"A": "王某申请行政复议，应当向市公安局提出", "B": "王某可以委托2名代理人参加行政复议", "C": "复议机关应当在60天内作出复议决定，不得延长", "D": "复议机关可以向王某收取办理行政复议案件所需的费用"}, answer: "ABC", explanation: "。A选项，根据（复议法》第72条第1款的规定，申请行政复议时可以一井提出行政赔偿请求，因此A选项正确。B选项，《复议法》第72条第2款规定：“申请人在申请行政复议时没有提出行政赔偿请求的，行政复议机关在依法决定撤销或者部分逝销、变更罚款，撤销或者部分撤销违法集资、没收财物、征收征用、摊派费用以及对财产专圆四行政复议法的益片，世即、请等仟皮行力时，应当同时费个段中请人跌连财户，解座叶对户的计、拍界、亦结借案，良并培偿借应的价校”因出日选项正项、C.D违项，（使议法）第75答常2款定：“行政货议决定节一经进达：即发生法体发力”，因化C连项正崎，D连讯借误（折）", chapter: "第五章 行政复议决定"},
  {id: 395, topic: "专题四 行政复议法", type: "multiple", question: "定中公司在某县建立了一家生鸡养殖场，通过暗管的方式违法排污，县生态环境局对其罚款50万元。定中公司不服，向县政府申请行政复议。本案的下列做法违反法律规定的有：", options: {"A": "县政府指定县政府法制办干部胡某单独审理此案", "B": "县政府在60日内作出了复议决定", "C": "县政府认为处罚过轻，将罚款变更为60万元", "D": "县政府认为本案疑难复杂，主动组织听证"}, answer: "ABCD", explanation: "。A连项，体特经各方普人签半或普签靠生发.井世厉金行政复议机关印集后生发。B选项，如装健议机关认方和解内容造法，或者俱警国求、世会、作人合法权益，应当不于准降。C选项，一版情况下，申请人缴回复议申请的，一事不得，但是中请人德修证明园行攻复议中价违傍其真实危现的除外。D选项，解未达成协议或者阅需传生放前一方反修的，行攻复以机英点当优法审查或者及时作出行攻凭以火定。回此A、B.C、D选项均错俱。（新编）", chapter: "第五章 行政复议决定"},
  {id: 396, topic: "专题四 行政复议法", type: "single", question: "根据行政复议法及相关规定，以下哪些情形复议机关应当变更行政行为？多选）", options: {"A": "事实清楚，证据确凿，适用依据正确，程序合法，但是内容不适当", "B": "事实清楚，证据确凿，程序合法，但是未正确适用依据", "C": "事实不清、证据不足，经行政复议机关查清事实和证据", "D": "违反法定程序"}, answer: "D", explanation: "。A选项，控中请人是否报调解，必须基千自愿，回此人选项徘误。B途项，行政复议调解必须以调解节形式结案，因此B项错误。C选项，小王在调解卡生效前反悔，行政复议机关应当及时作出行政复议决定，因此C选项错误。D选项，行政复议调解要共干合法原则，若违反了合法原则，行政复议机关可决定撤销、变更行政行为，因此D选项正确。（司法改编）", chapter: "第五章 行政复议决定"},
  {id: 397, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，行政行为具有下列哪些情形的，行政复议机关可以决定撤销该行政行为，并可以责令被申请人在一定期限内重新作出行政行为？", options: {"A": "主要事实不清、证据不足", "B": "违反法定程序", "C": "滥用职权", "D": "适用的依据不合法"}, answer: "ABC", explanation: "。A选项，根据（复议法）第74条的规定，当事人达成和解后，由中请人向行政复议机构缴回行政复议申请。行政复议机构准干缴回行政复议申请、行政复议机关决定终止行致复议的，申请人不得再以同一事实和理由提出行政复议中请，因此八选项正确。B选项，根据（复议法）第22条的规定，书面申请的，可以通过邮寄或者行政复议机关指定的互联网集道等方式提交行政复议申请书，因此B选项正确。C选项，对行政复议决定不服的，可以向人民法院提起行政诉讼，因此C选项正确。D选项，国家知识产权局属于国务院部门，该商标代理机构应向国家知识产权局而不是向国务院申请行政复议，因此D选项错误。（新编）", chapter: "第五章 行政复议决定"},
  {id: 398, topic: "专题四 行政复议法", type: "single", question: "行政复议机构对案件进行审查讨论通过后，依据不同情况可以作出哪些复议决定？", options: {"A": "具体行政行为主要事实不清、证据不足，决定确认该具体行政行为违法，并责令被申请人在一定期限内重新作出其体行政行为", "B": "被申请人超越职权的，决定变更该具体行政行为", "C": "具体行政行为违反法定程序，决定撤销该具体行政行为", "D": "被申请人不履行法定职责的，决定其在一定期限内行"}, answer: "D", explanation: "。《复议法》第77条第2款规定：“被申请人不履行或者无正当理由拖延履行行政复议决定书、调解书、意见书的，行政复议机关或者有关上级行政机关应当责令其限期履行”，因此田某可以请求某县政府责令某县公安局登记，A、B、C选项错误，D选项正确。（法考2008）", chapter: "第五章 行政复议决定"},
  {id: 399, topic: "专题四 行政复议法", type: "single", question: "根据行政复议法及相关规定，下列关于行政复议决定的鄂些说法是正确的？", options: {"A": "行政行为认定事实清楚，证据确凿，适用依据正确，程序合法，内容适当的，行政复议机关决定维持该行政行为", "B": "被申请人不股行法定职责的，行政复议机关决定被申请人在一定期限内履行", "C": "事实不清、证据不足，经行政复议机关查清事实和证据。决定变更该行政行为", "D": "主要事实不清、证据不足，行政复议机关可以撤销该行政行为"}, answer: "A", explanation: "。根据《复议法》第78条的规定，申请人、第三人逾期不起诉又不履行维持行政行为的行政复议决定书，由作出行政行为的行政机关依法强制执行，或申请人民法院强制执行。本题中，复议机关维持原决定，应当由作出处罚决定的机关县税务局强制执行或申请人民法院强制执行，因此A选项正确，B、C、D选项错误。（2019改编）", chapter: "第五章 行政复议决定"},
  {id: 400, topic: "专题四 行政复议法", type: "multiple", question: "河北省石家庄市市场监督管理局在市场调查过程中，认为某商户所销售的化妆品为假冒专利产品，对该产品予以设收并进行处罚，该商户不服，向石家庄市人民政府提出行政复议请求，在行政复议申请过程中，该商户提交了专利证明文件，石家庄市市场监督管理局取消了处罚决定，并对没收的产品予以归还，关于行政复议机关的处理，以下说法正确的有？多选）", options: {"A": "由于行政机关已经改变了其行政行为，因此行政复议机关应当终止审理", "B": "行政复议机关应当撤销原行政行为", "C": "如果申请人要求撤销原行政行为的，行政复议机关应当确认该行政行为违法", "D": "如果申请人要求确认该行政行为违法的，行政复议机关应当确认该行政行为违法"}, answer: "BCD", explanation: "。《复议法》第78条规定：“申请人、第三人逾期不起诉又不履行行政复议决定书、调解书的，或者不履行最终裁决的行政复议决定的，按照下列规定分别处理：（一）维持行政行为的行政复议决定书，由作出行政行为的行政机关依法强制执行，或者申请人民法院强制执行：（二）变更行政行为的行政复议决定书，由行政复议机关依法强制执行，或者申请人民法院强制执行：（三）行政复议调解书，由行政复议机关依法强制执行，或者申请人民法院强制执行”，因此A选项缺少条件错误，B、C、D选项正确。（2007改编）", chapter: "第五章 行政复议决定"},
  {id: 401, topic: "专题四 行政复议法", type: "multiple", question: "甲公司通过暗管的方式直接将污水排人地下，被区生态环境局吊销排污许可证，罚款500万元。甲公司对此不服，申请行政复议，下列说法正确的是：", options: {"A": "复议机关若认定该行为违反法定程序，可以决定变更", "B": "复议机关若认定罚款500万合法但不适当，可以决定变更", "C": "复议机关若认定吊销排污许可证和罚款均合法且适当，作出维持决定", "D": "复议机关可以对双方进行调解"}, answer: "BCD", explanation: "。A、B选项，商务部是国务院部门，该企业应当向商务部申请复议，因此A选项错误，B选项正确。C选项，根据《复", chapter: "第五章 行政复议决定"},
  {id: 402, topic: "专题四 行政复议法", type: "multiple", question: "王某认为某行政机关不履行法定职资而申请行政复议，行政复议机关受理后发现该行政机关没有相应法定职责。根据行政复议法及相关规定，该行政复议机关应当如何处理？", options: {"A": "作出确认原行政行为无效的决定", "B": "作出终止该行政复议的决定", "C": "作出该行政复议申请视为撤回的决定", "D": "作出驳回该行政复议请求的决定"}, answer: "ACD", explanation: "。A选项，《复议条例）第39条规定：“行政复议期间被申请人改变原具体行政行为的，不影响行政复议案件的审理。但是，申请人依法撒回行政复议申请的除外”，行政机关改变原行政行为，复议程序并不当然中止，A选项错误，当选。B选项，国家金融监督管理总局作为国务院部门，复议机关应当为国家金融监督管理总局，B选项正确。C选项，根据《复议法》第74条的规定，当事人达成和解后，由申请人向行政复议机构撒回行政复议申请。和解并不是一种复议的结案方式，不能起到中止复议的作用，C选项错误，当选。D选项，根据《复议法）第20条的规定，公民、法人或者其他组织可以自知道或者应当知道该行政行为之日起60日内提出行政复议申请；但是法律规定的申请期限超过60日的除外，D选项错误当选。（新编，思维扩展）", chapter: "第五章 行政复议决定"},
  {id: 403, topic: "专题四 行政复议法", type: "multiple", question: "行政复议机关在受理行政复议申请后，将有关材料转送至被申请人，要求被申请人在收到材料之日起10日内提出书面答复、提交作出行政行为的证据、依据和有关材料，期满后被申请人未提交，行政复议机关可以作出下列哪些决定？", options: {"A": "视为该行政行为没有证据、依据，行政复议机关决定撤销或者部分撤销该行政行为", "B": "视为该行政行为没有证据、依据，行政复议机关确认该行政行为违法", "C": "视为该行政行为没有证据、依据，行政复议机关确认该行政行为无效", "D": "如果该行政行为涉及第三人合法权益，第三人提供了被申请人作出行政行为的证据和依据，行政复议机关仍应视为该行政行为没有证据、依据"}, answer: "AB", explanation: "。A选项，根据《复议法》第17条的规定，申请人、第三人可以委托一至二名代理人代为参加行政复议，A选项正确。B选项，《复议法》第46条第1款规定：“行政复议期间，被申请人不得自行向申请人和其他有关单位或者个人收集证据；自行收集的证据不作为认定行政行为合法性、适当性的依据”，B选项正确。C选项，根据《复议法》第50条的规定，应当听证的情形为，重大、疑难、复杂的行政复议案件，本题中没有相应的情形，因此C选项错误。D选项，根据《复议法》第63条的规定，行政行为内容不适当的，复议机关应当决定变更，D选项错误。因此，A、B选项正确。（新编，思扩展）", chapter: "第五章 行政复议决定"},
  {id: 404, topic: "专题四 行政复议法", type: "single", question: "根据行政复议法及相关规定，下列说法正确的是？", options: {"A": "申请人在申请行政复议时可以一并提出行政赔偿请求", "B": "申请人在申请行政复议时没有提出行政赠偿请求的，对财产权的行政行为，行政复议机关也可作出行政赠偿决定", "C": "行政复议决定书一经送达，即发生法律效力", "D": "行政复议决定书送达后，15个工作日后未起诉的，发生法律效力"}, answer: "D", explanation: "。A选项，（行改处切法》第32条第1数规定：”当事人有权进行陈述和中料。行政机关必须充分听取当事人的意见，对当事人提出的事实、理由和证据进行复核，并采纳合理的部分”，该权利任何时侯都不得被剥夺、A选项借误。B选项，（复议法）绍63条第2款规定：“行政复议机关不得作出对中请人更为不利的变更决定，但是第三人提出相反请求的除外”，交更为10万元罚数属于对申请人更为不利的变更决定，B选项错误。C选项，根据（复议法》第74条的规定，当事人达成和解后，由申请人向行政复议机构撤回行政复议申请。和解井不是一种复议的结案方式，C选项错误。D选项，抵据《复议法》第63条的规定，行政行为事实不清、证据不足，经行政复议机关查清事实和证据，行政复议机关决定变更该行政行为，D选项正确。（新编，思维扩展）况", chapter: "第五章 行政复议决定"},
  {id: 405, topic: "专题四 行政复议法", type: "multiple", question: "关于行政复议过程中的和解或调解，以下说法错谈的有？多选）", options: {"A": "当事人经调解达成协议的，行政复议机关应当制作行政复议调解书，并加盖行政复议机关印章，调解书即具有法律效力", "B": "当事人达成和解后，申请人应当向行政复议机关撤回行政复议申请，行政复议机关应当予以批准", "C": "当事人达成和解后，行政复议机关批准撤回行政复议申请的，申请人一律不得再以同一事实和理由提出行政复议申请", "D": "调解书生效之前，一方当事人反悔的，行政复议机关应当驳回行政复议请求"}, answer: "BC", explanation: "。《行政诉讼法》第1条规定：“力保证人民法院公正、及叶审理行政紧作，解决行攻争议，保护公民、决人和其您雅顶的合法权益，篮督行攻机关依法行使取权，提据光法，划定本海”，四是A.D透项借促，B、C选项正崎。（沂境）", chapter: "第五章 行政复议决定"},
  {id: 406, topic: "专题四 行政复议法", type: "multiple", question: "根据《治安管理处罚法》第76条，偷开他人机动车的，处1000元以上2000元以下罚款；情节严重的，处10日以上15日以下拘留，可以并处2000元以下罚款。小王因偷开单位的轿车被县公安局处以拘留12日，并处罚款1500元。小王承认自己确实偷开单位的轿车，但认为县公安局的处罚太重而向县政府申请复议。在复议过程中的下列哪一做法是正确的？", options: {"A": "在复议过程中，小王申请县政府调解，而县公安局认为自己的处罚合法、适当，故不愿接受调解，县政府要求县公安局接受调解", "B": "在复议过程中，经县政府调解，小王与县公安局达成对小王仅罚款1500元的口头调解协议，县政府决定复议终止", "C": "在复议过程中，经县政府调解，双方达成一致意见，但是小王在调解书生效前反悔，调解书生效", "D": "在复议过程中，经县政府调解，小王与县公安局达成对小王不罚款的调解协议，县政府认为协议内容违法，不予认可，并决定撤销拘留12日，维持罚款1500元的决定"}, answer: "CD", explanation: "。《行攻诉运法》第6签规定：“人民法院审理行政紫件，对行政行力是否合法进行审查”，合法性审查是人民法院对资诉具体行政行为合法性的全面审查，晚审资视伴上的合法性，也审登实体上的合法性，因此A选项错读，C选项正明。B选项差地过干地对，原则上人民法院做合法性审查，但是也不推除在特定情况下进行合理性审资。D选项，（行政诉讼法》第6条所表达的合义为人民法院审查对家为具体行政行为，D选项表进也过于绝对，但是考虑到本题为多选，D选项正确的概申更高。（折编，思维扩展）", chapter: "第五章 行政复议决定"},
  {id: 407, topic: "专题四 行政复议法", type: "multiple", question: "某商标代理机构存在严重违法行为，国家知识产权局依法决定永久停止受理其办理商标代理，该商标代理机构不服，依法申请行政复议。根据行政复议法及相关规定，下列说法哪些是正确的？(多选）", options: {"A": "如在复议过程中，该商标代理机构与国家知识产权局达成和解后撤回复议申请，行政复议机构准予撤回行政复议申请、行政复议机关决定终止行政复议的，不得再以同一事实和理由提出复议申请", "B": "该商标代理机构可以通过行政复议机关指定的互联网渠道提交申请书", "C": "该商标代理机构如果对行政复议决定不服，可以提起行政诉讼", "D": "该商标代理机构可以向国务院申请行政复议"}, answer: "AD", explanation: "。A选项，《行政诉讼法）第8条规定：“当事人在行改诉讼中的法体地位平等”，因此A选项正确。B选项，（行改诉讼法）第60条第1款规定：“人民法院申理行政案件，不适用词解。但是，行政赔偿、补偿以及行改机关行使法体、法规规定的自由披量权的案件可以调解”，因此B选项借误。C选项，（行政诉讼法）第6条规定：“人民法院审理行政案件，对行政行为是否合法进行审查”，因此C选项错误【注意和第2题B选项表达语气上的差异】。D选项，（行政诉论法》第5条规定：“人民法院审理行政案件，以事实为根据，以法体为准绳”，因此D选项正确。（新编）", chapter: "第五章 行政复议决定"},
  {id: 408, topic: "专题四 行政复议法", type: "multiple", question: "某县政府依田某申请作出复议决定，撤销某县公安局对田某车辆的错误登记，责令在30日内重新登记，但某县公安局拒绝进行重新登记。田某可以采取下列哪一项措施？", options: {"A": "申请法院强制执行", "B": "对某县公安局的行为申请行政复议", "C": "向法院提起行政诉讼", "D": "请求某县政府责令某县公安局登记"}, answer: "BCD", explanation: "。A选项是行政机关对民事纠纷的调解，不属于行政诉讼受案范团。B、C、D选项均属于受案范围。（2018）", chapter: "第五章 行政复议决定"},
  {id: 409, topic: "专题四 行政复议法", type: "multiple", question: "张某对县税务局的行政处罚不服，向市税务局申请行政复议，但复议机关维持了原处罚决定，张某逾期不履行该行政复议决定，也未向法院起诉，对此，下列说法正确的是？", options: {"A": "由县税务局依法强制执行，或者申请人民法院强制执行", "B": "由市税务局依法强制执行，或者申请人民法院强制执行", "C": "县税务局不能强制执行，只能申请人民法院强制执行", "D": "市税务局不能强制执行，只能申请人民法院强制执行"}, answer: "ACD", explanation: "。A、D选项，《行政诉讼算）第1条第2款规定：“下列行为不属于人民法院行政诉讼的受案范图：（六）行政机关为作出行政行为而实施的准备、论证、所克、层报、咨询等过程性行为：（七）行政机关短据人民法院的生效载判、协功执行通知书你出的执行行为，但行政机关扩大头行范图放者采取违法方式实施的除外…”，A选灭属于上述第（七）项情形，D选项展于上述第（六）项情形，均不具于行政诉讼受案范显。C选项，行政决定履行值告书不是行最决定，不属于行政诉讼受案范围。日选项行武处罚层于行政诉讼受案范图。（2019）", chapter: "第五章 行政复议决定"},
  {id: 410, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法的规定，行政复议决定作出后申请人逾期不起诉又不履行行政复议决定、调解书的，应当如何处理？", options: {"A": "由作出行政行为的行政机关强制执行", "B": "行政复议调解书由行政复议机关强制执行或申请人民法院强制执行", "C": "维持行政行为的行政复议决定，由作出行政行为的行政机关依法强制执行，或者申请人民法院强制执行", "D": "变更行政行为的行政复议决定，由行政复议机关依法强制执行，或者申请人民法院强制执行"}, answer: "AD", explanation: "。A选项，全国人大常委会表专利法的决定具于其有登退约束方的未定，不属于行致诉讼的受案范围。D选项，为行政调解行为，不具于行致诉讼的受案范。（新摄）", chapter: "第五章 行政复议决定"},
  {id: 411, topic: "专题四 行政复议法", type: "multiple", question: "商务部对某一企业作出处以30万元罚款的行政处罚，该企业不服，申请行政复议，下列说法正确的是？", options: {"A": "该企业可以向国务院申请复议", "B": "该企业可以向商务部申请复议", "C": "该企业如果对行政复议决定不服，可以提起行政诉讼", "D": "如在复议过程中，企业自愿撤回复议申请的，不得再以同一事实和理由提出行政复议申请"}, answer: "BCD", explanation: "。根据（行政诉讼解）第1票的规定，心安、国家安全等机关标利事示讼法的明确投权实庭的行为不属于人民法院行政诉讼的受案距里，因此A选项睡泥。B、C选项、根据（行政诉讼法》黑13素的浆定，对行致按管、暂扣或老昂经许可运示永顾、资令体产供业、烫收迷法所得、没农要法财物、规数、警各零行秋处规不服的，灵于行政诉讼的受案范图，因文，B、C选项三典。D选项、根据（最离人民法既关于审理行欢学议繁件若干月题的竞定）第2条的定，土", chapter: "第五章 行政复议决定"},
  {id: 412, topic: "专题四 行政复议法", type: "multiple", question: "国家金融监督管理总局以某银行金融机构未按照规定提供报表、报告等资料，依据《银行业监督管理法》对其处以20万元罚款。该机构不服，申请行政复议，下列说法不正确的是？", options: {"A": "如果复议期间国家金融监督管理总局将罚款数额改为10万元，行政复议中止", "B": "复议机关应当是国家金融监督管理总局", "C": "如果该机构与国家金融监督管理总局在复议决定作出前自愿达成和解协议，行政复议中止", "D": "申请行政复议期间为行政行为作出之日起6个月"}, answer: "BD", explanation: "。A选项，对民事纠纷河解不展既不能中请行玖复议也不能提起行玖诉讼，A选项错误。B、D选项既可以中请行改复议，也可以提起行政诉讼。C选项，根据（专利法》中相关规定，对无效决定不股只能诉讼，不能申请行政复议。（新编）", chapter: "第五章 行政复议决定"},
  {id: 413, topic: "专题四 行政复议法", type: "multiple", question: "某区市场监督管理局对一公司未取得出版物经营许可证销售电子出版物100套的行为，予以取缔，并罚款6000元。该公司向区政府申请复议。下列哪些说法是正确的？", options: {"A": "公司可委托代理人代为参加行政复议", "B": "在复议过程中区市场监督管理局不得自行向申请人和其他有关组织或个人收集证据", "C": "区政府应采取听证方式审查此案", "D": "如果区市场监督管理局的决定明显不当，区政府应予以撤销"}, answer: "CD", explanation: "。A选项，对民事纠纷调解不股既不能申请行政复议也不能提起行政诉讼。B选项，《出境入境管理法》第64条第1款规定：“外国人对依愿本法规定对其实施的牌续盘问、拘留审查、成制浩动范围、造送出境措施不的，可以依法中请行政复议，该行政复议决定为最终决定”，因此B选项可以复议但不可以提起行政诉讼，B选项错误。C选项，对行政机关作出的关于确认自然资源的所有权或者使用权的决定不股的可以中请行政复议，也可以提起行政诉讼，因此C选项正确。D选项，对国家知识产权局作出的有关专利申请、专利权的行政行为不可以申请行政复议也可以提起行政诉讼，因此D选项正确。（新输）", chapter: "第五章 行政复议决定"},
  {id: 414, topic: "专题四 行政复议法", type: "multiple", question: "县生态环境局以甲公司在生产过程中使用不符合国家标准的锅炉设备，超标排放污染物质为由，查封甲公司用以生产的锅炉，后对甲公司罚款8万元，甲公司不服，向县政府申请复议，下列哪一说法是正确的？", options: {"A": "紧急情况下，查封可以不听取甲公司的陈述申辩", "B": "如果县政府认为本案事实清楚，证据确凿，适用法律正确，程序合法，但是内容不适当，将对甲公司罚款改为罚款10万元", "C": "在复议决定作出前当事人达成和解协议，复议程序自动终止", "D": "如果县政府认为本案事实不清，经审核事实清楚后，可以变更决定"}, answer: "ABCD", explanation: "。《行政诉讼法》第7条规定，人民法院审理行政案件，依法实行合议、回避、公开审判和两审终中制度，因此A、B、C、D选项均正确。（2015）", chapter: "第五章 行政复议决定"},
  {id: 415, topic: "专题五 行政诉讼法", type: "multiple", question: "下列哪些是行政诉讼法的基本功能？", options: {"A": "打击行政领城的犯罪现象，维护社会治安", "B": "保证法院公正、及时地审理行政案件", "C": "保障公民、法人或者其他组织的合法权益", "D": "维护和监督行政机关依法行使行政职权"}, answer: "ACD", explanation: "。《行政诉讼法》第55条规定：“当事人认为申判人员与本案有利害关系或者有其他关系可能影响公正审判，有权中请审判人员回避前两款规定，适用于书记员、译人员、签定人、勘验人……审判人员的回避，由院长决定。其他人员的回避，由审判长决定”，因此审判员辛某的回避由院长决定，书记员张某的回避由审判长决定，A、C、D选项正确，B选项错误。（2016）", chapter: "第一章 行政诉讼法概述"},
  {id: 416, topic: "专题五 行政诉讼法", type: "multiple", question: "关于行政诉讼中的合法性审查原则，下列哪些说法是正确的？", options: {"A": "只对被诉请的行政行为实体上是否合法进行审查", "B": "只对被诉请的行政行为做合法性审查，不做合理性审查", "C": "审查的主体是人民法院", "D": "只对具体行政行为进行审查，不对抽象行政行为进行审查"}, answer: "ABCD", explanation: "。根据（行政诉讼法》第14-17条的规定，基层人民法院、而级人民法院、最高人民法院、中级人民法院对第一审行政案件均有管辖权，因此A、B、C、D选项均正确。（新编）", chapter: "第一章 行政诉讼法概述"},
  {id: 417, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，关于人民法院审理行政案件应当遵循的基本原则，下列说法哪些是正确的？多选）", options: {"A": "当事人在行政诉讼中的法律地位平等", "B": "人民法院审理所有行政案件都不适用调解", "C": "人民法院审理行政案件，对行政行为是否合理进行审查", "D": "人民法院审理行政案件，以事实为依据，以法律为准绳"}, answer: "ABCD", explanation: "。《行政诉讼法》第15条规定：“中级人民法院管辖下列第一审行政案件：（一）对国务院部门或者具级以上地方人民政府所作的行政行为提起诉讼的案件1（二）海关处理的案件：（三）本辖区内重大、复杂的案件……”，因此A、B、C、D选项均正确。(2019)", chapter: "第一章 行政诉讼法概述"},
  {id: 418, topic: "专题五 行政诉讼法", type: "multiple", question: "下列当事人提起的诉讼，属于行政诉讼受案范围的有？", options: {"A": "张某和王某是邻居，因生活琐事产生纠纷，打架斗段，经公安局调解达成调解协议", "B": "李某向生态环境局申请设立垃圾焚烧站，环保局以影响环境为由作出不予准许的决定。李某不服提起诉讼", "C": "张某因卖淫被县公安局处以10日行政拘留，1个月后张某向县政府申请行政复议，县政府不予受理。张某不服起诉", "D": "某公司与县政府签订天然气特许经营协议，双方发生纠纷后该公司以县政府不依法履行协议为由向法院起诉"}, answer: "AC", explanation: "。A、C选项，（行政诉讼法》第15条规定：“中级人民法院管辖下列第一审行政案件：（一）对国务院部门或者县级以上地方人民政府所作的行政行为提起诉讼的案件………（三）本辖区内重大、复杂的案件.”，因此A、C选项正确。B选项，根据《专利法》中相关规定，驳回决定不服·只能复审，不能直接起诉，因此B选项错误。D选项，《行政诉讼法》第23条第2款规定：“人民法院对管辖权发生争议，由争议双方协商解决。协商不成的，报它们的共同上级人民法院指定管辖”，并非一定由中级法院管辖，因此D选项错误。（2018）", chapter: "第一章 行政诉讼法概述"},
  {id: 419, topic: "专题五 行政诉讼法", type: "single", question: "当事人不服下列行为提起诉讼的，不底于行政诉讼受案范围的有？多选）", options: {"A": "根据法院的生效判决，国家知识产权局专利局变更了专利权人姓名", "B": "北京市海淀区市场监督管理局作出的没收违法所得的行政处罚决定", "C": "根据已作出的行政决定，北京市海淀区市场监督管理局作出了行政决定履行催告书", "D": "北京市海淀区市场监督管理局作出了撤销行政许可（登记）听证告知书"}, answer: "A", explanation: "。对省人民政府的工作部门作出的具体行政行为不服提起的诉讼，应由基层人民法院管辖，如果被告是省政府或者国务院工作部门，则由中级人民法院管辖，因此A选项正确，B、C、D选项错误。（2008）", chapter: "第一章 行政诉讼法概述"},
  {id: 420, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列哪些不属于行政诉讼的受案范围？多选）", options: {"A": "公民王某对全国人大常委会修改专利法的决定不服的", "B": "商标局不受理张某的商标注册申请，张某不服的", "C": "乙公司对本市知识产权局责令其停止侵犯丙公司专利权的决定不服的", "D": "对北京市知识产权局作出的权属纠纷调解不眼的"}, answer: "ABD", explanation: "。A选项，（行政诉讼法》第20条规定：“因不动产提起的行改诉讼，由不动", chapter: "第一章 行政诉讼法概述"},
  {id: 421, topic: "专题五 行政诉讼法", type: "multiple", question: "人民法院应当受理公民、法人或者其他组织对下列些事项提起的行政诉讼？多选）", options: {"A": "公安机关对李某作出的刑事拘留的决定", "B": "地方知识产权执法部门作出的对假冒专利的处罚", "C": "专利管理部门对专利代理机构的违法行为作出的警告", "D": "某村民认为当地政府违法变更土地房屋征收补偿协议"}, answer: "ABCD", explanation: "。（行改诉讼法>第19条规定：对限勿人身自山的行攻强制借不服提起的诉讼，由告所在坊戏者厚善所在均人民法院管辖”《行攻诉讼筛馨》第8条规定：“行攻诉讼法第19条规定的\'展售所套所包括原告的户得所在地、经官局售地和健限制人身自由地”，四北A.B、C、D选项均正确。（新）", chapter: "第一章 行政诉讼法概述"},
  {id: 422, topic: "专题五 行政诉讼法", type: "multiple", question: "当事人对下列哪些事项既可以申请行政复议又可以提起行政诉讼", options: {"A": "对行政机关作出民事纠纷调解不服的", "B": "对公安机关作出的行政拘留决定不服的", "C": "专利权人对国家知识产权局作出的宣告专利权全部无效的决定不服的", "D": "对国务院部门作出的具体行政行为不服的"}, answer: "AC", explanation: "。A、B、D选项，《行政诉讼法》第21条规定：“两个以上人民法院都有管辖权的案件，原告可以选择其中一个人民法院起诉，原告向两个以上有管辖权的人民法院提起诉讼的，由最先立案的人民法院管辖”，回此A选项正确，B、D选项借误。C选项，（行政诉讼法》第22条规定：“人民法院发现受理的案件不属于本院管辖的，应当移送有管辖权的人民法院，受移送的人民法院应当受理”，因此C选项正确。（新墙）", chapter: "第一章 行政诉讼法概述"},
  {id: 423, topic: "专题五 行政诉讼法", type: "multiple", question: "当事人对下列哪些事项既可以申请行政复议也可以提起行政诉讼？多选）", options: {"A": "行政机关对民事纠纷的调解", "B": "出人境边防检查机关对外国人采取的遣送出境措施", "C": "对申请宅基地不予批准的决定", "D": "对专利局作出的专利申请不予受理的决定"}, answer: "ACD", explanation: "。A选项，（行政诉讼法》第24条规定：“上级人民法院有权审理下级人民法院管辖的第一审行政案件”，因此A选项正确。B选项，（行政诉讼法》第21条规定：“两个以上人民法院都有管辖权的案件，原告可以选择其中一个人民法院提起诉讼”，因此B选项错误。C选项，（行改诉讼法）第23条规定：“有管辖权的人民法院由干特珠原因不能行使管辖权的，由上级人民法院指定管辖”，因此C选项正确。D选项，《行政诉讼法》第22条规定：“人民法院发现受理的案件不属于木院管辖的，应当移送有管销权的人民法院…”，因此D选项正确。（2012）", chapter: "第一章 行政诉讼法概述"},
  {id: 424, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，关于人民法院审理行政案件应当遵循的制度，下列哪些说法是正确的？", options: {"A": "依法实行合议制度", "B": "依法实行回避制度", "C": "依法实行公开审判制度", "D": "依法实行两审终审制度"}, answer: "A", explanation: "。（行政诉讼法》第23条第2款规定：“人民法院对管辖权发生争议，由中议双方协商解决。协商不成的，报它们的共间上级人民法院指定管辖”，因此A选项正确、（新编）1人", chapter: "第一章 行政诉讼法概述"},
  {id: 425, topic: "专题五 行政诉讼法", type: "multiple", question: "江某对某行政机关作出的行政处罚决定不服，向人民法院提起行政诉讼。江某认为本案书记员张某、审判员李某与该行政机关有利益关系可能会影响公正审判。根据行政诉讼法及相关规定，下列些说法是正确的？多选）", options: {"A": "江某有权申请李某回避", "B": "江某无权申请张某回避", "C": "李某的回避，由院长决定", "D": "张某的回避，由审判长决定"}, answer: "ABCD", explanation: "。A选项，《行政诉讼法》第25条1数规定：“行政行为的相对人以及其他与行行为有利害关系的公民、法人或者其他组织，权提起诉讼”，因此A选项正确。B、C、D选（行政诉讼解释》第12条规定：“有下列情形一的，属于行政诉讼法第25条第1款规定的行政行为有利害关系’：（一）被诉的行政行涉及其相邻权或者公平竞争权的：（二）在行复议等行政程序中被追加为第三人的：（三）求行政机关依法追究加害人法律责任\"，因此B、C、D选项正确。（2011）", chapter: "第一章 行政诉讼法概述"},
  {id: 426, topic: "专题五 行政诉讼法", type: "multiple", question: "下列可以管辖第一审行政案件的法院有？", options: {"A": "基层人民法院", "B": "高级人民法院", "C": "最高人民法院", "D": "中级人民法院"}, answer: "ABCD", explanation: "。A、B、C选项，《行政诉讼法》第条第1、2款规定：“行政行为的相对人以及其与行政行为有利害关系的公民、法人或者其组织，有权提起诉讼。有权提起诉讼的公民亡，其近亲属可以提起诉讼”，因此A、B、C选正确。D选项，（行政诉讼法》第25条第4款定：“人民检察院在履行职责中发现生态环境资源保护、食品药品安全、国有财产保护、国", chapter: "第二章 管辖"},
  {id: 427, topic: "专题五 行政诉讼法", type: "single", question: "下列哪些案件属于中级人民法院管辖的第一审行政案件？", options: {"A": "对国务院部门所作的行政行为提起诉讼的案件", "B": "对县级以上地方人民政府所作的行政行为提起诉讼的案件", "C": "海关处理的案件", "D": "本辖区内重大、复杂的案件"}, answer: "A", explanation: ".《行皮诉讼解带>诺1S等第上放的现定：“合伙企业向人民法院展诉讼的，庄普以核准建记的学守方香”，因北人选项正明8、C、D选项借供，（2012）", chapter: "第二章 管辖"},
  {id: 428, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，中级人民法院对下列哪些一审案件具有管辖权？", options: {"A": "对某省人民政府作出的具体行政行为不服的案件", "B": "对国家知识产权局驳回专利申请不服的案件", "C": "本辖区内社会影响重大的集团诉讼案件", "D": "辖区内甲县人民法院与乙县人民法院就管辖权产生争议的案件"}, answer: "AB", explanation: "，模拖《行攻诉岱得带>管16条的规定，联营企业、中外各资或普合作企业的装售、合资、合作各方，认力联售、合资、合作企业权益或者自己一方合法权意受行攻行力侵害的，可以自己的名久提是诉论。回北人、B选项正，C、D选项借误。（2019）", chapter: "第二章 管辖"},
  {id: 429, topic: "专题五 行政诉讼法", type: "multiple", question: "对省人民政府工作部门作出的具体行政行为不服提起诉讼的，由下列哪级人民法院管辖？", options: {"A": "基层人民法院", "B": "中级人民法院", "C": "高级人民法院", "D": "最高人民法院"}, answer: "ABCD", explanation: "。A、C、D选项，《行攻诉讼法）第31条第2款规定：”下列人员可以要托力诉讼代理人：（一）体师、蓝居法你服务工作（三）当事人所在社区、单位以及有关会团体推券的公民”，因此A、C、D选项正确。B达项，《行政诉讼解称>第33条第2款规定：“专利代理人经中华全国专利代理人协会推荐，可以在专利行政累件中担任诉讼代理人”，国此D选项正确。（新编）", chapter: "第二章 管辖"},
  {id: 430, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列关于行政诉讼地域管辖的说法哪些是正确的？", options: {"A": "因不动产提起的行政诉讼，由不动产所在地人民法院管辖", "B": "行政案件由最初作出具体行政行为的行政机关所在地人民法院管辖", "C": "经复议的行政案件，复议机关改变原具体行政行为的，应由复议机关所在地人民法院管辖", "D": "对限制人身自由的行政强制措施不服提起的诉讼，由被杏所在地或者原告所在地人民法院管辖"}, answer: "AD", explanation: "。《行政诉讼法》第26条规定：“公民、法人或若其他组织直接向人民法院提起诉讼的，作出行玖行为的行政机关是被告。经复议的案件，复议机关决定维持原行改行为的，作出原行政行为的行政机关和复议机关是共同被告.雨个以上行政机关作出同一行政行为的，共同作出行政行为的行改机关是共同被告。行政机关委托的组织所作的行改行为，至托的行政机关是被告”，因此A、D选项正局，B、C选项错误。（2011）", chapter: "第二章 管辖"},
  {id: 431, topic: "专题五 行政诉讼法", type: "multiple", question: "关于对限制人身自由的行政强制措施不服提起的行政诉讼，下列哪些说法是正确的？多选）", options: {"A": "可以在原告的户籍所在地提起诉讼", "B": "可以在被告所在地提起诉讼", "C": "可以在原告的经常居住地提起诉讼", "D": "可以在被限制人身自由所在地提起诉讼"}, answer: "CD", explanation: "。A、B选项，根据（行改诉讼法）第26条的规定，复议机关决定维持原行政行为的，作出原行政行为的行政机关和复议机关是共同顿售，因此，甲、乙行政机关应为共间告，A、B选项错误。根据《行政诉讼法》第18条的规定，经复议的案件，原行政机关所在地、复议机关所在地人民法院均有管辖权。因此，甲地、乙地人民法院均有管辖权，C、D选项正确。（新编）", chapter: "第二章 管辖"},
  {id: 432, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列关于行政诉讼管辖的哪些说法是正确的？多选）", options: {"A": "两个以上人民法院都有管辖权的案件，原告可以选择其中一个人民法院提起诉讼", "B": "原告向两个以上有管辖权的人民法院提起诉讼的，由最先收到起诉状的人民法院管辖", "C": "人民法院发现受理的案件不属于本院管辖的，应当移送有管辖权的人民法院，受移送的人民法院应当受理", "D": "两个以上人民法院都有管辖权的案件，原告应当向其共同的上级人民法院起诉"}, answer: "AC", explanation: "。A、D选项，《行政诉讼法》第26条第3款规定：“复议机关在法定期限内未作出复议决定，公民、法人或者其他组织起诉原行政行为的，作出原行政行为的行政机关是被告：起诉复议机关不作为的，复议机关是被告”，若张某对该行政处罚决定提起诉讼，应以作出原具体行政行为的县公安局为被告，若张某对县人民政府不作为提起诉讼，应以复议机关县人民政府为被告，因此A、C选项正确，B、D选项错误。（2013）", chapter: "第二章 管辖"},
  {id: 433, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列关于管辖的哪些说法是正确的？多选）", options: {"A": "上级人民法院有权审判由下级人民法院管辖的第一审行政案件", "B": "两个以上人民法院都有管辖权的案件，原告应当向其共同的上级人民法院起诉", "C": "有管辖权的人民法院由于特殊原因不能行使管辅权的，由上级人民法院指定管辖", "D": "人民法院发现受理的案件不属于自已管辖时，应当移送有管辖权的人民法院"}, answer: "BC", explanation: "。根据《行政诉讼法》第26条的规定，复议机关改变原行政行为的，复议机关是被告，复议机关市人民政府改判行政拘留期限由15天改为10天，属于改变原行政行为，因此市人民政府为被告，应由中院管辖。本题属于经复议的案件，市公安局及市政府所在地的中级人民法院均有管辖权。综上，A、D选项错误，B、C选项正确。（2015改编）", chapter: "第二章 管辖"},
  {id: 434, topic: "专题五 行政诉讼法", type: "single", question: "人民法院对行政诉讼案件的管辖权发生争议，由争议双方协商解决，协商不成的，报（）指定管辖。", options: {"A": "共同上级人民法院", "B": "先立案的法院", "C": "当地高级人民法院", "D": "最高人民法院"}, answer: "B", explanation: "。A、B、C选项，根据《行政诉讼解释）第22条的规定，“复议机关改变原行政行为”，是指复议机关改变原行政行为的处理结果。复议机关改变原行政行为所认定的主要事实和证据、改变原行政行为所适用的规范依据，但未改变原行政行为处理结果的，视为复议机关维持原行政行为。本题中市人民政府改变了规范依据，但是未改变处罚结果，视为维持原行改行为，因此被告是原行政机关（市食药局）和复议机关（市政府），A、C选项错误，B选项正确。D选项，根据《行政诉讼解释》第134条的规定，原行政机关和复议机关作共同被告，原告只起诉", chapter: "第二章 管辖"},
  {id: 435, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，下列哪些主体可以依法提起行政诉讼？多选）", options: {"A": "与被诉的行政复议决定有法律上利害关系的公民", "B": "被诉的具体行政行为涉及其公平竞争权的法人", "C": "在复议程序中被追加为第三人的法人", "D": "要求主管行政机关依法追究加害人法律责任的公民"}, answer: "A", explanation: "。媒行改行力作出了不平认定工伤的决定，复以机关区政府《不平认定工伤使议决定节）质传改突了行力定性的法带依据，他未改受界行政行力处屋塔集的，悦力复议现关维你原行改行力，本震的告世当力区人局和区政府。但张集以区人社局方善身法院提培诉讼，概据《行政诉讼解希》第134条的规定，法院应当告知即告追加嫂告，原告不同意追加的，法院应当将另一机关列力共回资告。四北A选项正确，B.C、D选项错误。（法考2021改编）", chapter: "第三章 行政诉讼参加人"},
  {id: 436, topic: "专题五 行政诉讼法", type: "single", question: "下列可以作为行政诉讼中的原告的是？", options: {"A": "行政行为的相对人", "B": "已经死亡的有权提起行政诉讼的公民的近亲属", "C": "与具体行政行为有利害关系的公民、法人或者其他组织", "D": "人民检察院"}, answer: "B", explanation: "。《行攻诉讼法》第26条第4旅规定：“调个以上行政机关作出同一行政行有的，共则作出行政行为的行政机关是持同设告”：报据（行政诉讼解帮>第26条的规定，应当追加控告百原告不同意追加的，人民法院应当遗扣其以第三人的身份参加诉论。本题中，市市场监督管理局和公安局共同作出的行政行为，属于共同被告，如果原告不同意追加，人民法院应当通知其以第三人的身份参加诉讼，因此A、C、D选项错误，B选项正确。（2016）", chapter: "第三章 行政诉讼参加人"},
  {id: 437, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，合伙企业向人民法院提起诉讼的，下列哪种说法是正确的？", options: {"A": "应当以核准登记的字号为原告", "B": "应当以所有合伙人为共同原告", "C": "应当以执行合伙企业事务的合伙人为原告", "D": "可以任一合伙人为原告"}, answer: "B", explanation: "。《行政诉讼法》第20条规定：“因不动产提起的行政诉讼，由不动产所在地人民法院管辖”。本题中，省政府复议后改变了原行改行为，复议机关省政府是被告，应由中级人民法院管辖，由于土地权虞纠纷属于不动产案件，应由不动产所在地法院专属管辖，印争议土地所在地的中级人民法院，因此B选项正确。（法考2007）", chapter: "第三章 行政诉讼参加人"},
  {id: 438, topic: "专题五 行政诉讼法", type: "multiple", question: "中外合资企业甲认为其企业权益受行政行为使害的，下列说法正确的是？", options: {"A": "外方投资者可以以自己的名义提起行政诉讼", "B": "企业甲可以以自己的名义提起行政诉讼", "C": "外方投资者若以保护企业权益为由提起行政诉讼，其应以企业甲的名义提起行政诉讼", "D": "外方投资者以保护自己的权益为由提起行政诉讼的，其应以企业甲的名义提起行政诉讼"}, answer: "BD", explanation: "。A选项，市自然资源局直接将市政府的批复予以执行，对某公司的权利义务产生了具体的影响，属干具体行改行为，属于行政诉讼的受案范围，因此A选项错误。B、C选项，1某公罚对批复不服提起行政诉讼，由作出该投复的市政府作为被告，因此B选项正确、C选项销误。D选项，若公可对批复不展中请行政复议，则由你出该批复的市政府作为被中请人，D选项正确。（法考2020改编）", chapter: "第三章 行政诉讼参加人"},
  {id: 439, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列哪些人员可以被委托为诉讼代理人？多选）", options: {"A": "当事人所在社区、单位推荐的公民", "B": "在专利行政案件中，经中华全国专利代理师协会推荐的专利代理师", "C": "基层法律服务工作者", "D": "律师"}, answer: "BCD", explanation: "。（行政诉讼法）第29条规定：“公民、法人或者其他组织同被诉行政行为有利雾关系但没有提起诉讼，或者同案件处理结果有利害关系的，可以作为第三人申请参加诉讼，或者由人民法院通知参加诉讼。人民法院列决第三人承担义务或者减损第三人权益的，第三人有权依法提起上诉”，因此A选项错误，B、C、D选项正确。（2017）", chapter: "第三章 行政诉讼参加人"},
  {id: 440, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列关于行政诉讼被告的说法哪些是正确的？多选）", options: {"A": "公民、法人或者其他组织直接向人民法院提起诉讼的，作出具体行政行为的行政机关是被告", "B": "经复议的案件，复议机关决定维持原具体行政行为的，复议机关是被告", "C": "由行政机关委托的组织所作的具体行政行为，该组织是被告", "D": "两个以上行政机关作出同一具体行政行为的，共同作出具体行政行为的行政机关是共同被告"}, answer: "ACD", explanation: "。《行政诉讼解释》第30条规定：“行政机关的间一行政行为涉及两个以上利客关系人，其中一部分利害关系人对行政行为不服提起诉讼，人民法院应当通知没有起诉的其他利害关系人作为第三人参加诉讼。与行改案件处理结果有利害关系的第三人，可以中请乡加诉讼，或者由人民法院通知其参加诉讼。”。本题中，甲、乙两人被拘留，甲作为原告起诉区公安局，郭某是受害人，属于行政行为中未起诉的利害关系人，法院应当通知郭某作为第三人参加诉讼。乙与甲的诉讼案件处理结果有利害关系，法院可以通知乙作为第三人参加诉讼。丙在该案件中没有受到行政处罚，与甲的诉讼戴判结果没有利害关系，不应作为第三人参加诉讼。因此，A、C选项正确，B选项错误。《行改复议法>第16条规定，申请人以外的同被申请行政复议的行政行为或者行政复议案件处理结果有利害关系的公民、法人或者其他组织，可以作为第三人申请参加行政复议，或者由行政复议机构通知其作为第三人参加行政复议，因此，行政复议机关可以通知郭某作为第三人参加行政复议，D选项正确。（2018改编）", chapter: "第三章 行政诉讼参加人"},
  {id: 441, topic: "专题五 行政诉讼法", type: "multiple", question: "甲行政机关以违反法律相关规定为由对某公司进行了处罚。该公司不服，向乙复议机关申请行政复议。乙复议机关作出维持原具体行政行为的复议决定。该公司仍不服，2026年专利代理部资格考试欲向人民法院提起诉讼。根据行政诉讼法及相关规定，下列哪些说法是正确的？", options: {"A": "应以甲行政机关为被告", "B": "应以乙复议机关为被告", "C": "甲行政机关所在地人民法院对此案有管辖权", "D": "乙复议机关所在地人民法院对此案有管辖权"}, answer: "BD", explanation: "。《行政诉讼法》第3条第3款规定：专五行政诉讼法“饮诉行改抗失负范人应当出底庄诉。不德出庭的，应当安托行政机关借应的工作人质出庭“《行攻诉论解等》第12H等院是：“行政诉论法信3等靠了款规定的行改优关负费人，包情行皮机关的正职、阶职负费人以庆其信鲁与分管的负费人。行政悦关负黄人出庭应诉的，可以芳行委托一至二名诉讼代人。行次机笑费人不出息的，应当委花行改机关相应的工作人员出庭，不停仪委化体奶出庭”。水题中，区公安局货党人不仅限于区公安局局长，还以包格国职负费人以及贷他参与分管的货党人，行政机关的负费人和工作人员不出庭，不得仪要托律师出庭，四此A.C选项误，B、D遗项正。（2018）", chapter: "第三章 行政诉讼参加人"},
  {id: 442, topic: "专题五 行政诉讼法", type: "multiple", question: "某县公安局对张某作出了一项行政处罚决定。张某不服，遂向该县人民政府申请行政复议，但该县人民政府未在法定期限内作出复议决定。张某欲向人民法院提起行政诉讼。根据行政诉讼法及相关规定，下列哪些说法是正确的？多选）", options: {"A": "张某因对该行政处罚决定不服提起诉讼的，应当以该县公安局为被告", "B": "张某因对该行政处罚决定不服提起诉讼的，应当以该县人民政府为被告", "C": "张某因对该县人民政府不作为不服提起诉讼的，应当以该县人民政府为被告", "D": "张某因对该县人民政府不作为不服提起诉讼的，应当以该县人民政府和县公安局作为共同被告"}, answer: "BC", explanation: "。A选项，《行攻诉讼法》馆28条境定：“当事人一方人效众多的共同诉讼，可以出监事人推选代教人进行诉讼”，四此人途项借误。B选项，《行政诉讼法》第2T条规定：“当事人一方成双方为二人以上，四同一行政行为发生的行政案件，或者因回类行政行为发生的行政案件、人民法院认方可以合井审理并经当事人同意的，为共同诉讼”，因此B选项正确。C选项，银据《行政诉讼法》第29条的规定，公民、法人或者共他组织同技诉行政行为有利害关系但没有提起诉讼，或者同案件处理结果有利害关系的，可以作为第三人申请参加诉讼，或右由人民法院通知参加诉讼。因此C选项正确。根据《行政诉讼法》第28条的规定，代表人的诉讼行为对其所代表的当事人发生效力，但代表人变更、放弃诉讼请求或者承认对方当事人的诉讼请求，应当经被代表的当事人同意。因此，D选项错误。（2015改编）", chapter: "第三章 行政诉讼参加人"},
  {id: 443, topic: "专题五 行政诉讼法", type: "multiple", question: "王某不服某市公安局作出的对其拘留15天的行政处罚，向市人民政府申请复议，市人民政府改为行政拘留10天，王某仍然不服，欲提起行政诉讼。根据行政诉讼法及相关规定，下列关于被告的哪种说法是正确的？", options: {"A": "应当以该市公安局为被告", "B": "应当以该市人民政府为被告", "C": "可以由市公安局所在地中级人民法院管辖", "D": "可以由市人民政府所在地基层人民法院管辖"}, answer: "BCD", explanation: "。A选项，（行政诉讼解释》第79条第2款规定：“第三人经传票传唤无正当理由拒不到庭，或者未经法庭许可中途退庭的，不发生阻止案件审理的效果”，因此A选项错误。B、C、D选项，李某同执诉行政行为有别害关系。可以作为第三人中请参加诉讼或者由人民法院项如李某参加诉讼，人民法院判决减报学某权丝的、李某有权提起上诉，因此B、C、D选项说法正确。（新编）", chapter: "第三章 行政诉讼参加人"},
  {id: 444, topic: "专题五 行政诉讼法", type: "multiple", question: "市食药局根据《食品安全法》第一百二十三条，以“用回收食品作为原料生产食品”为由对甲公司作出罚款300万元、责令停产停业一年的决定。甲公司不服，向市人民政府申请行政复议。市人民政府根据《食品安全法》第一百二十四条，以“用超过保质期的食品原料生产食品“为由对申公司作出罚款300万元、资令停产停业一年的决定。甲公司不服，提起行政诉讼。下列说法正确的是：", options: {"A": "本案的被告是市人民政府", "B": "本案的被告是市食药局和市人民政府", "C": "本案的被告是市人民政府，市食药局是第三人", "D": "若甲拒绝追加市人民政府为被告，人民法院应当通知市人民政府作为第三人参加诉讼"}, answer: "ABC", explanation: "。A选项，根据（行政诉讼法）第26条的规定，复议机关决定维持原行政行为的，价出原行政行为的行政机关和复议机关是共同格告，省人民政府作出价持原行政行为的复议决定，省公安厅和省人民政府是共同被告，因此人选项正确。B、C、D选项，根据《行政诉讼法》第18条的规定，经复议的案件，山最初你出行改行为的行政机关所在地成复议机关所在地人民法院管辖，根据《行政诉讼解释》第134条的规定，作出原行政行为的行政机关和复议机关为共同被告的，以作出原行政行为的行政机关确定案件的级别管辖。原行政机关是省公安厅，属于省政府部门，应由基层法院管辖。同时，本题属于经复议的案件，因此，可由该省公安厅所在地或者省玫府所在地的基层法院管辖，因此B、C选项正确，D选项错误。（新编）", chapter: "第三章 行政诉讼参加人"},
  {id: 445, topic: "专题五 行政诉讼法", type: "multiple", question: "张某以患尘肺病为由向区人社局申请工伤认定，区人社局以张某无法提供惠病证据为由，作出不子认定工伤的决定，张某向区政府申请行政复议，区政府以不属于工伤为由，下发了《不予认定工伤复议决定书》，张某以区人社局为被告向法院提起诉讼。下列选项中，人民法院哪一做法是正确的？", options: {"A": "通知张某追加区政府为共同被告", "B": "告知张某变更被告", "C": "驳回张某的起诉", "D": "驳回张某的诉讼请求"}, answer: "ABC", explanation: "。A、C选项，《行政诉讼解释>第134条第2款规定：“行政复议决定既有维持原行政行为内容，又有改变原行政行为内容或者不予受理申请内容的，作出原行政行为的行政机关和复议机关为共同被告”，本案复议决定既有维持，又有改交，则区市监局和区政府为共同被告，A、C选项错误。B选项，复议机关作共同被告的案件，以作出原行政行为的行政机关确定案件的级别管辖，本案中，作出原行政行为的行政机关为市监局，则为基层法院管辖，B选项错误。D选项，根据《行政诉讼解释》第134条的规定，法院应当告知原告追加被告，原告不同意追加的，法院应当将另一机关列为共同被告。因此D选项正确。本题选择错误选项，则A、B、C选项当选。（法考2022改编）专五行政诉讼法", chapter: "第三章 行政诉讼参加人"},
  {id: 446, topic: "专题五 行政诉讼法", type: "single", question: "某市市场监督管理局和公安局共同对某公司作出行政处罚决定，该公司不服，以市市场监督管理局为被告向人民法院提起行政诉讼。经过审理，人民法院向原告建议增加市公安局为被告，原告不同意。根据行政诉讼法及相关规定，人民法院应当如何处理？", options: {"A": "依职权追加市公安局为被告", "B": "通知市公安局以第三人身份参加诉讼", "C": "裁定驳回起诉", "D": "判决驳回原告的诉讼请求"}, answer: "C", explanation: "。物证是借以其外管特任、非成存在块况等米汪明震作事共的皆昌皮底迹，涂改的价交证明是道过收流改的能连未迁明涂改的事实，属千物还，国北A、B、D选项借候，C选项正鸣。（新）", chapter: "第三章 行政诉讼参加人"},
  {id: 447, topic: "专题五 行政诉讼法", type: "multiple", question: "甲、乙两村分别位于某市两县境内，因土地权属纠纷向市政府申请解决，市政府裁决争议土地属于甲村所有。乙村不服，向省政府申请复议，复议机关确认争议的土地属于乙村所有。甲村不服行政复议决定，提起行政诉讼。下列哪个法院对本案有管辖权？", options: {"A": "争议土地所在地的基层人民法院", "B": "争议土地所在地的中级人民法院", "C": "市政府所在地的基层人民法院", "D": "省政府所在地的中级人民法院"}, answer: "ABCD", explanation: "，A选项，《行攻诉讼证惕规定>第28案第1款规是：人民法院依质行改诉讼法第三十六条规定保全匠语的，可以悦据其体情况，采取壹封、扣押、怡质、永音、录像、复勿、签定、助验、外作资问名录等保全借施”，因北A选项正确。B选项，（行攻诉价法》第33条第1收规定：证惕色怡：（七）签定您见：（八）助叠笔录、现场笔录”因此B选项正。C选项，《行攻诉讼解察）第115条第1故规定：“审登亦审中请期间，再中中请人中请人民法院委托婴定、场验的，人民法院不予准许”，回此C选项正喻。D选项，《行政诉讼证据规定）第33条第1款规定：”人民法院可以依当事人中请改者依职权勘验现场”，因此D选项正确。（新）", chapter: "第三章 行政诉讼参加人"},
  {id: 448, topic: "专题五 行政诉讼法", type: "multiple", question: "市政府对市自然资源局作出批复，同意其提交的收回某公司国有土地使用权方案。市自然资源局收到批复后，将批复交市自然资源局下属的内设机构土地储备中心执行。某公司不服批复，向法院提起行政诉讼。下列说法正确的是？", options: {"A": "批复不属于行政诉讼受案范围", "B": "被告为市政府", "C": "被告为市自然资源局", "D": "若公司对批复不服申请行政复议，市政府为被申请人"}, answer: "ACD", explanation: "。A、C、D选项，《行政诉讼法）第41条规定：“与本案有关的下列证，原告或者第三人不能自行收集的，可以申请人民法院调取：（一）由国家机关保存面须由人民法院调取的证据：（二）涉及国家秘密、商业秘密和个人隐私的证据…….”，因此A、C、D选项正确。B选项，《行政诉讼法）第40条规定：“人民法院有权向有关行政机关以及其他组织、公民调取证据。但是，不得为证明行致行为的合法性调取被告作出行政行为时未收集的证据”，因此B选项错误。（新酒）", chapter: "第三章 行政诉讼参加人"},
  {id: 449, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，下列关于行政诉讼参加人的哪些说法是正确的？", options: {"A": "公民、法人或者其他组织同被诉行政行为有利害关系但没有提起诉讼，不得作为第三人申请参加诉讼", "B": "公民、法人或者其他组织同案件处理结果有利害关系的，可以由人民法院通知参加诉讼", "C": "人民法院判决第三人承担义务的，第三人有权依法提起上诉", "D": "人民法院判决减损第三人权益的，第三人有权依法提起上诉"}, answer: "D", explanation: "。（行政诉讼解释》第41条规定：“有下列情形之一，原告或者第三人要求相关行政执法人员出庭说明的，人民法院可以准许：（一）对现场笔录的合法性或者真实性有异议的：（二）对扣押财产的品种或者数量有异议的1（三）对检验的物品取样或者保管有异议的：（四）对行政执法人员身份的合法性有异议的：（五）得要出庭说明的其他情形。“因此A、B、C选项法院于以准许，D选项法院不予准许。（2019）", chapter: "第三章 行政诉讼参加人"},
  {id: 450, topic: "专题五 行政诉讼法", type: "multiple", question: "甲、乙、丙三友人一同在某餐厅就餐。由于餐品质量与餐厅经理郭某产生纠纷。纠纷过程中，将餐厅经理郭某打伤。区公安局将甲拘留10日，乙拘留5日。甲不服，提起行政诉讼。关于该案的第三人，下列说法正确的是：", options: {"A": "法院可以通知乙作为第三人参加诉讼", "B": "法院可以通知丙作为第三人参加诉讼", "C": "法院应当通知郭某作为第三人参加诉讼", "D": "若甲不服向区人民政府复议的，区人民政府可以通知郭某作为第三人参加复议"}, answer: "ACD", explanation: "。A、B选项，《行政诉讼法》第34条规定：“执告对作出的行政行为负有举证责任，应当提供作出该行政行为的证鹅和所依据的规范性文件。被告不提供或者无正当理由逾期提供证据，视为没有相应证据…”，因此A选项正确，B选项借误。C选项，《行政诉讼法》第36.条第2款规定：“原告或者第三人提出了其在行政处理程序中没有提出的理由或者证据的，经人民法院准许，被告可以补充证据”，因此C选项正确。D选项，（行政诉讼法》第37条规定：“原告可以提供证明行政行为违法的证据。原告提供的证据不成立的，不免除被告的举证贵任”，因此D选项正确。（2017）", chapter: "第三章 行政诉讼参加人"},
  {id: 451, topic: "专题五 行政诉讼法", type: "single", question: "甲、乙、丙三友人一同在某餐厅就餐。由于餐品质量与餐厅经理郭某产生纠纷。纠纷过程中，将餐厅经理邪某打伤。区公安局将印拘留10日，乙拘留5日。甲不服，提起行政诉讼。区公安局出庭应诉，下列说法正确的是：", options: {"A": "区公安局负资人出庭的，应当由区公安局局长出庭应诉", "B": "区公安局局长出庭应诉的，可以另行委托1-2名诉讼代理人", "C": "区公安局负资人和工作人员不出庭，委托2名律师出庭", "D": "主管相关业务的副局长属于行政机关负资人"}, answer: "A", explanation: "。（行政诉讼法》第67条第1款规定：“被告应当在收到起诉状副本之日起15日内向人民法院提交作出行政行为的证据和所依据的规范性文件，并提出答料状…….”，因此A选项正确，B、C、D选项错误。（新编）", chapter: "第三章 行政诉讼参加人"},
  {id: 452, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列关于行政诉讼参加人的哪些说法是正确的？多选）", options: {"A": "当事人一方人数众多的共同诉讼，应当由法院指定代表人进行诉讼", "B": "当事人一方或者双方为二人以上，因同一行政行为发生的行政案件为共同诉讼", "C": "公民、法人或者其他组织同被诉行政行为有利害关系但没有提起诉讼的，可以作为第三人申请参加诉讼", "D": "代表人变更放弃诉讼请求，可以不经被代表的当事人同意"}, answer: "ABCD", explanation: "。《行政诉讼解释》第35条规定：“原告或者第三人应当在开庭审理前或者人民法院指定的交换证据清单之日提供证据。因正当事由申请延期提供证据的，经人民法院准许，可以在法庭调查中提供原告或者第三人在第一审程序中无正当事由未提供而在第二审程序中提供的证据，人民法院不子接纳”，因此A、B、C、D选项均正确。（2018）", chapter: "第三章 行政诉讼参加人"},
  {id: 453, topic: "专题五 行政诉讼法", type: "multiple", question: "李某以同事王某对其寻蚌滋事为由，向某区公安局报案，某区公安局立案调查后，对王某作出治安拘留十日的行政处罚。王某不服，提起行政诉讼。根据行政诉讼法及相关规定，下列说法哪些是正确的？", options: {"A": "当李某作为第三人参加诉讼，其经传票传唤无正当理由拒不到庭，或者未经法庭许可中途退庭的，案件审理中止", "B": "李某可以由人民法院通知其作为第三人参加诉讼", "C": "李某可以作为第三人申请参加诉讼", "D": "李某作为第三人参加诉讼，人民法院判决减损其权益的，李某有权提起上诉"}, answer: "ABCD", explanation: "。A、B选项，《行政诉讼法》第34条规定：“被告对作出的行政行为负有举证贵任，应当提供作出该行政行为的证据和所依据的规范性文件”，因此A、B选项正身。C、D选项，《行政诉讼法》第42条规定：“在证据可能灭失或者以后难以取得的情况下，", chapter: "第三章 行政诉讼参加人"},
  {id: 454, topic: "专题五 行政诉讼法", type: "multiple", question: "李某对某省公安厅对其作出的行政行为不服，向省人民政府申请行政复议，省人民政府作出的复议决定维持原行政行为。李某仍不服，向人民法院提起诉讼，下列哪些说法是正确的？多选）", options: {"A": "该行政诉讼案件中某省公安厅和省人民政府是共同被告", "B": "李某可以向省公安厅所在地的基层人民法院提起诉讼", "C": "李某可以向省人民政府所在地的基层人民法院提起诉讼", "D": "李某可以向省人民政府所在地的中级人民法院提起诉讼"}, answer: "ABCD", explanation: ".（行政诉俭法）带41券定：“与长震有失的下列证，展告也普常三人不能自行收联的，可以中请人民法院调放：（一）由国术机失体存诗须由人底法院词放的证据：（二）交国术债、前业债和个人高私的证据.…“，因此A.B、C.D选项片正吻。（2015）", chapter: "第三章 行政诉讼参加人"},
  {id: 455, topic: "专题五 行政诉讼法", type: "multiple", question: "贝果公司在生产经营中存在用非食品原料生产食品的违法行为。区市监局对其作出没收用于违法生产经营的非食品原料、没收违法所得、罚款10万元的行政处罚。贝果公司不服，向区政府申请复议，区政府将罚款改为8万元后，维持了其他处罚。贝果公司不服，提起诉讼，下列说法哪些是错误的？多选）", options: {"A": "本案被告是区市监局", "B": "本案可以由区市监局所在地的中院管辖", "C": "本案被告是区政府", "D": "如果贝果公司以区政府为被告提起诉讼且拒绝追加被告，法院应当追加区市监局为共同被告"}, answer: "BD", explanation: "。A造项，法院审限行改爱体，只有設诉行政行为才可以成疗泌院的审理对象，当事人行为不是法院审理对策，因北法院只审登行攻处罚的合法性，不审登药厂行力的合法作，A选项得候。B选项，（行攻诉讼消》第37条规定：“限告可以提供证明行攻行力违法的证损。原告提供的证据不成立的，不免除告的华证费任”，进北B边项正确。C选项，《行政诉讼证据规定》第43采规定：”当事人中请证人出庭作证的，应当在华证湖度届满前是出，井经人民法院许可。人民法院准许证人出庭作证的，应当在开庭审理前通知证人出庭作证。当事人在庭审过程中要求证人出庭作证的，法可以低据审理案件的其体情况，决定是否准许以及是否延期中理”，C选项的表逃过干绝对，因此C选项册误。D选项，法院投判行玖案件，应当以证据证明的案件事实为依培的说法正确。（法考2012，思维扩晨）L1.ABCD。概据《行政诉讼证据规定》第24条的规定，当事人中请人民法院调取证据的，应当在举证期展内提交调取证据中请节。因此，中请法院调敢证据应当在举证期限届满前提出，A选项正确。根据（行政诉讼解释》第135条的规定，作出原行政行为的行政机关和复议机关对原行政行为合法性共同承担举证贵任，可以由其中一个机关实施举证行为。本题中，应由原行政机关区交警大队和复议机关区改府共同对罚款500元决定的合法性承担举证资任，B选项正确。根据（行政诉讼解释》第135条的约定，复议机关作共同披告的案件，复议机头在复议程序中依法收集和补充的证据，可以作为人民法院认定复议决定和原行政行另合法的依据，因此，C选项正确。D选项，据（行政诉讼证据规定》第38条规定，人民法院依职权调取的证据，由法庭出示，并可就调取该证据的情况进行说明，听取当事人意见。因此，法院依职权调取的证据，不冒要进行质证，D选项正确。（法考2024，给扩展）", chapter: "第三章 行政诉讼参加人"},
  {id: 456, topic: "专题五 行政诉讼法", type: "multiple", question: "动物卫生监督机构在监督检查过程中，发现甲某涂改了检疫证明的数量和日期，动物卫生监督管理机构对其进行了行政处罚。彼涂改的检疫证明在证据的分类上属于7", options: {"A": "书证", "B": "视听资料", "C": "物证", "D": "当事人陈述"}, answer: "ABD", explanation: "。A选项，《行政诉讼解）仍56条第1款规定：“法律、法规规定应当先中请复议，公民、法人或者其他组织未中请复议直接提起诉讼的，人民法院裁定不子立案”，即不子受理，因此A选项正确。B选项，根据《行政诉讼法》第13条的规定，法律规定由行政机关最终裁决的行政行为，人民法院不于受理，因此B选项正确。C选项，根据《行政诉讼法》第45条的规定，复议机关逾期不作决定的，中请人可以在复议期满之日起15日内向人民法院提起诉讼，因比C选项错误。D选项，《行政诉讼解释》第60条第1款规定：“人民法院裁定准许原告缴诉后，原告以同一事实和理由亚新起诉的，人民法院不子立案”，即不予受理，因此D选项正确。（2012）", chapter: "第四章 证据"},
  {id: 457, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，下列哪些说法是正确的？", options: {"A": "鉴定和勘验均是证据保全措施之一", "B": "鉴定意见和勘验笔录均是证据种类之一", "C": "审查再审申请期间，再审申请人申请人民法院委托鉴定、勘验的，人民法院不予准许", "D": "人民法院可以依当事人申请或者依职权勘验现场"}, answer: "D", explanation: "。《行政诉讼法》第46条第1款规定：“公民、法人或者其他组织直接向人民法院提起诉讼的，应当自知道或者应当知道作出行政行为之日起6个月内提出…….”，因此A、B、C选项错误，D选项正确（2019）", chapter: "第四章 证据"},
  {id: 458, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，关于人民法院调查取证，下列说法哪些是正确的？", options: {"A": "涉及商业秘密的证据，原告或者第三人不能自行收集的，可以申请人民法院调取", "B": "人民法院可以为证明行政行为的合法性调取被告作出行政行为时未收集的证据", "C": "涉及个人隐私的证据，原告或者第三人不能自行收集的，可以申请人民法院调取", "D": "由国家机关保存而须由人民法院调取的证据，原告或者第三人不能自行收集的，可以申请人民法院调取"}, answer: "CD", explanation: "。本题针对政府工作部门提出复议，复议机关应当是该县政府，因此A选项错误。B选项，申请复议的期限为60日，B选项错误。C选项，《行政诉讼法》第45条规", chapter: "第四章 证据"},
  {id: 459, topic: "专题五 行政诉讼法", type: "multiple", question: "行政诉讼中，原告要求相关行政执法人员作为证人出庭说明，在下列何种情形下，法院通常不予准许？", options: {"A": "原告对现场笔录的合法性有异议的", "B": "原告对现场笔录的真实性有异议的", "C": "原告对行政执法人员身份的合法性有异议的", "D": "原告对被起诉的行政决定有异议的"}, answer: "AB", explanation: "。提《行政诉会法>籍S1余带4款的增定，对于不收展诉快、收局诉快后不山具传资凭任，以庆不一次佳管如当事人赠婴外正的提诉模内浆的，劳单人可以句上版人民法院悦诉。携借《行改诉论法>铭52条的规定，人民法院既不立案，又不作出不中立案定的，当事人可以向上一便人民浙院起诉，因北A.B选项正，C.D选项误。（2017)", chapter: "第四章 证据"},
  {id: 460, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列哪些说法是正确的？", options: {"A": "行政诉讼被告对作出的行政行为负有举证责任，应当提供作出该行政行为的证据和所依据的规范性文件", "B": "行政诉讼被告无正当理由不提供证据的，人民法院应当依职权调查收集相应证据", "C": "原告在行政诉讼中提出了其在行政处理程序中没有提出的证据的，经人民法院准许，被告可以补充证据", "D": "原告可以提供证明行政行为违法的证据，原告提供的证据不成立的，不免除被告的举证费任"}, answer: "AB", explanation: "，A选项，（行攻诉讼法》第60条第1教现定：”人民法院审理行政装作，不道用调解…….”，因北A选项正。B也项，《行政诉讼法）第35条规定：“在诉讼过程中，被告及其诉讼代理人不得自行向原否、第三人和证人收集证据”，因北B选项正境。C选项，低据《行玫诉讼法》第56条的规定，诉论期同，被告认为需要停止执行的，可以截定停止执行，回此C选项借误。D选项，（行政诉讼法）第62条规定：“人民法院对行政案件宜告判决或者裁定前，原告中请缴诉的，或者被告改变其所作的行政行为，原告同意井中请缴诉的，是否准许，由人民法院发定”，因此D选项错误。（2006）", chapter: "第四章 证据"},
  {id: 461, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，行政诉讼的被告应当在何时就其作出的具体行政行为向人民法院提供证据？", options: {"A": "收到起诉状副本之日起15日内", "B": "第一审庭审结束前", "C": "第一审法庭辩论终结前", "D": "第一审判决作出前"}, answer: "C", explanation: "。《行政诉讼解释）第26条第1款规定：“原告所起诉的被告不适格，人民法院应当告知原告交更被告；原告不同意变更的，定驳回起诉”，法院认为被告应当是县公安局，而原告起诉时认为被告为派出所，法院应当告知原告变更被告，原告不同意变更的，战定取回起诉，因此C选项正确。（法考2007）", chapter: "第四章 证据"},
  {id: 462, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，下列哪些说法是正确的？", options: {"A": "原告应当在开庭审理前或者人民法院指定的交换证据清单之日提供证据", "B": "第三人应当在开庭审理前或者人民法院指定的交换证据清单之日提供证据", "C": "原告因正当事由申请延期提供证据的，经人民法院准许，可以在法庭调查中提供", "D": "第三人在第一审程序中无正当事由未提供而在第二审程序中提供的证据，人民法院不予接纳"}, answer: "B", explanation: "。（行玫复议法）第20条第1款规定：“公民、法人或者共他组执认为行致行分促犯其合法权益的，可以自知道成省应肖道该行政行为之日起60日内提出行改复中请：但是法体规定的中请期限超过60日的除外。“杨某3月10日得知了具政府的行政行为，并于4月20日提起复议，未超过命请行政复议60日的期限，因此，A选项价误。杨某认为县政府为汪某须发集体土地使用证的行为侵犯了其已经取得的集体土地使用权，属于复议前置案件。杨某向市政府申请行政复议，市政府并未对原行政行为进行审理，而是以超过中请期为山驳回了复议中请，属于复议不作为。复议前置的案件，当事人可以起诉复议机关不作为，但是不能直接对原行政行为提起诉讼。因此，法院应当定驳回杨某的起诉，B选项正确。复议前翌的案件，未经复议的，法院不应受理，更不应当进行判决，C、D选项：错误。（法考2020，思维扩展）", chapter: "第四章 证据"},
  {id: 463, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列哪些说法是正确的！", options: {"A": "被告应当提供作出被诉具体行政行为的证据", "B": "被告应当提供作出被诉具体行政行为所依据的规范性文件", "C": "在证据可能灭失的情况下，原告可以向人民法院申请保全证据", "D": "在证据可能灭失的情况下，人民法院可以主动采收保全措施"}, answer: "ABC", explanation: "。A、B选项，根据《行改诉讼法）第67条的规定，人民法院应当在立案之日起5日内，将起诉状副本发送被告。被告应当在收到起诉状副本之日起15日内向人民法院提交作出行政行为的证据和所依据的规范性文件，并提出答辩状，因此A、B选项正确。C选项，《行政诉讼法》第67条第2款规定：“被告不提出答辩状的，不影响人民法院审理”，因此C选项正确。D选项，《行文诉讼法》第68条规定：“人民法院审理行动案件，由审判员组成合议庭，或者由审判目、陪审员组成合议庭，合议庭不仅由陪审员组成，因此D选项错误。（2019）", chapter: "第四章 证据"},
  {id: 464, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，下列哪些与本案有关的证", options: {"A": "由国家机关保存而须由人民法院调取的证据", "B": "涉及国家秘密的证据", "C": "涉及商业秘密的证据", "D": "涉及个人隐私的证据"}, answer: "A", explanation: "。A选项，《行政诉讼法》第55条规定：“当事人认为审判人员与本案有利害关系或者有其他关系可能影响公正审判，有权专圆五行政诉讼法中许市其人回建”：世本人包唐原告使杏，国光人资哦正、日连，供（行改诉险法）常56等内属定，诉资物间质对上不体止行改件方的质行，仪凭原杏认方得要停止不是以世定停止决仟：因光目齿代借供。C医班，（行改诉俭法）带62等居定：“人民法院对行成囊作宜告有决战普债定追：原杏中济胶诉的，或普使告皮受地作的行皮行力，原告同意本中请散诉的，是善准，由人是法院战定”，回北C透次借供。D资珠，（行攻诉浴法>第60崇第1政规定：人店法院审理行该震作，不适用河解”，时北D选项借侠（2012）", chapter: "第四章 证据"},
  {id: 465, topic: "专题五 行政诉讼法", type: "multiple", question: "某药厂以本厂过期药品作为主原料，更改生产日期和批号生产出售。甲市乙县药监局以该厂违反《药品管理法》第49条第1款关于违法生产药品规定，决定没收药品并处罚款20万元。药厂不服向县政府申请复议，县政府依据《药品管理法》第49条第3款关于生产劣药行为的规定，决定维持处罚决定。药厂起诉。关于本案的举证与审理裁判，下列说法正确的有？", options: {"A": "法院应对被诉行政行为和药厂的行为是否合法一并审理和裁判", "B": "药厂提供的证明被诉行政行为违法的证据不成立的，不免除被告对被诉行政行为合法性的举证资任", "C": "如在本案庭审过程中，药厂要求证人出庭作证的，法院不予准许", "D": "法院对本案的裁判，应当以证据证明的案件事实为依据2026年卡利代理师普格考试"}, answer: "ABCD", explanation: "，《行改诉论法>第S6条第1款规定：“诉治期闻，不停止行攻行方的忧行。但有下列情形之一的，截定停止执行：（一）峻告认力需受停止执行的：（二）医合或者付害关展人中请停止执行，人民院认疗该行政行疗的执行会造成准以资外的惯失，并且停止执行不播零团家利签、击会公共村的：（三）人民法院认方谈行政行方的执行会给国家利益，社会公共利监逾成重大惯害的：（四）法律、法规规定停止执行的”，回此A、B、C、D选项均正确。（所编）", chapter: "第四章 证据"},
  {id: 466, topic: "专题五 行政诉讼法", type: "multiple", question: "区交警大队以左某逆向行驶为由对其作出罚款500元的处罚决定，左某向区政府申请复议，区政府作出维持决定后，左某不服，提起行政诉讼。对此，下列说法正确的是？", options: {"A": "左某申请法院调取证据应当在举证期限内提出", "B": "由区交警大队和区政府共同对罚款决定的合法性承担举证责任", "C": "区政府在复议程序中依法收集和补充的证据，可以作为法院认定罚款决定合法性的依据", "D": "法院依职权调取的证据不需要进行质证"}, answer: "CD", explanation: "。批招《行政诉讼法）第63条的规定，人民法院审理行政罪件，以法律和行政法规、地方性法境方依据，参风原章，回此C、D选项正确。（2018）", chapter: "第四章 证据"},
  {id: 467, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，对于下列哪些诉讼请求，人民法院不予受理？", options: {"A": "法律、法规规定应当先申请行政复议，公民、法人或其他组织未申请复议而直接提起诉讼的", "B": "法律规定由行政机关最终裁决的具体行政行为，公民、法人或其他组织不服该具体行政行为，向人民法院提起诉讼的", "C": "复议机关在法定期限内不作出复议决定，公民、法人或其他组织不服，依法向人民法院提起诉讼的", "D": "人民法院裁定准许原告撤诉后，原告以同一事实和理由重新提起诉讼的"}, answer: "C", explanation: "。（行政诉讼法）第81条规定：“人民法院应当在立案之日起6个月内作出第一审判决。有特味情况要延长的，由高圾人民法院批准，而级人民法院审理第一审案件要廷长的，由最商人民法院批准”。本题中，作出第一审行政判决的为基层人民法院，因此A、B、D选项错误，C选项正确。（2015）", chapter: "第五章 起诉与受理"},
  {id: 468, topic: "专题五 行政诉讼法", type: "multiple", question: "当事人王某不服某市知识产权局作出的行政处罚决定，直接向人民法院提起诉讼，下列说法正确的是？", options: {"A": "其应当自知道或者应当知道作出行政行为之日起15.日内提出", "B": "其应当自知道或者应当知道作出行政行为之日起1个月内提出", "C": "其应当自知道或者应当知道作出行政行为之日起3个月内提出", "D": "其应当自知道或者应当知道作出行政行为之日起6个月内提出"}, answer: "AC", explanation: "。（行政诉讼法）第81条规定：“人民法院应当在立案之日起6个月内作出第一审判决。有特珠情况需要廷长的，由高级人民法院批准，高级人民法院审理第一审案件得要延长的，由最商人民法院批准”，因A、C选项正确。B、D选项错误。（新纳）", chapter: "第五章 起诉与受理"},
  {id: 469, topic: "专题五 行政诉讼法", type: "multiple", question: "（反不正当竞争法）第29条规定，当事人对监险查部门作出的决定不服的，可以依法申请行政复议或者提危行政诉讼。某县市场监督管理局认定某企业利用广告对商品作引人误解的假宜传，构成不正当竞争，处10万元罚款。该企业不服，申复议。下列哪些说法是正确的：", options: {"A": "复议机关应当为该县市监局的上一级市监局", "B": "申请复议期限为15日", "C": "如复议机关作出维持决定，该企业向法院起诉，起诉期限为15日", "D": "对划款决定，该企业可以不经复议直接向法院起诉"}, answer: "BC", explanation: "。A、B、C选项，《行政诉讼法》第63条规定：“人民法院审理行政案件，以法律和行政法规、地方性法规为依据。地方性法规适用于本行政区城内发生的行改案件人民法院审理行政案件，参风规章”因此A选项错误，B、C选项正确。D选项，机据《中华人民共和国立法法》第106条第1款第（三）项的规定，部门规章之间、部门规章与地方政府规章之间对间一事项的规定不一致时，由国务院决：最高人民法院不他对规章进行解释或决，因此D选项借误。（2011）", chapter: "第五章 起诉与受理"},
  {id: 470, topic: "专题五 行政诉讼法", type: "single", question: "刘某向某人民法院提起行政诉讼，受诉人民法院在7日内既不立案，又不作出裁定，根据行政诉讼法及相关规定，刘某可以如何处理？多选）", options: {"A": "向上一级人民法院投诉", "B": "向上一级人民法院起诉", "C": "向上一级人民检察院抗诉", "D": "请求同级人民检察院抗诉"}, answer: "B", explanation: "。A选项，根据《行政诉讼解》第71条的规定，人民法院适用节通程序审理案件，应当在开庭三日前用传票传唤当事人。当事人或者其他诉讼参与人在外地的，应当留有必要的在途时问。因此人选项铅误。B选项，根据《行政诉讼法》第58条的规定，经人民法院传票传唤，原告无正当理由拒不到庭，或者未经法庭许可中途退庭的，可以按照撤诉处理。上诉人未经法庭许可中途退庭应当比一审原告处理，因此B选项正确。C选项，（行政诉讼解释》第79条规定：“原告或者上诉人申请撤诉，人民法院报定不予准许的，原告或者上诉人经传票传无正当理由拒不到庭，或者未经法庭许可中途退庭的，人民法院可以缺席判决”，因此C选项错误。D选项，根据《行政诉讼解释》第81条第3款的规定，原告不撤诉的，法院应当依法作出确认判决，不会按照撤诉处理，因此D选项错误。（2018）", chapter: "第五章 起诉与受理"},
  {id: 471, topic: "专题五 行政诉讼法", type: "multiple", question: "关于行政诉讼案件，下列说法哪些是正确的？", options: {"A": "在行政诉讼过程中，被告无权请求调解", "B": "在行政诉讼过程中，被告无权自行向原告和证人收集证据", "C": "在行政诉讼过程中，被告无权作出停止执行原具体行政行为的决定", "D": "在行政诉讼过程中，被告无权改变自己所作的具体行政行为"}, answer: "ABCD", explanation: "。《行政诉讼法》第58条规定：“经人民法院传票传唤，原告无正当理由拒不到庭，或者未经法庭许可中途退庭的，可以按照撤诉处理；被告无正当理由拒不到庭，或者未经法庭许可中途退庭的，可以缺席判决”，因此A、B、C、D选项均正确。（新编）", chapter: "第五章 起诉与受理"},
  {id: 472, topic: "专题五 行政诉讼法", type: "multiple", question: "某派出所以扰乱公共秩序为由扣押了高某的拖拉机。高不服，以派出所为被告提起行政诉讼。诉讼中，法院认为被告应是县公安局，要求变更被告，高某不同意。法院下列哪种做法是正确的？2020年专利代理牌许格考认", options: {"A": "以派出所为被告继续市理本案", "B": "以县公安局为被告市理本案", "C": "裁定驳回起诉", "D": "裁定终结诉讼"}, answer: "AB", explanation: "。《行政诉讼解释》第87条规定：", chapter: "第五章 起诉与受理"},
  {id: 473, topic: "专题五 行政诉讼法", type: "multiple", question: "汪某和邻居杨某因集体土地使用权产生争议、2010年3月10日，县政府为注某颁发集体土地使用证并通知了杨某，4月20日，杨某认为该行为侵犯了自已已有的集体土地使用权，向市政府申请复议，市政府认为杨某的复议请求超过了复议申请期，于是驳回了杨某的复议申请，4月25日，杨某就县政府颁发集体土地使用证行为向法院提起行政诉讼。下列哪一说法是正确的？", options: {"A": "杨某申请复议超过了复议申请期", "B": "法院应当以未经过复议为由，裁定驳回杨某的起诉", "C": "法院可以受理本案", "D": "法院应当驳回杨某起诉，并判决确认复议决定违法"}, answer: "ABC", explanation: "。A、B、C遗项，《皮昨讼解>第16集第（次规定：人民法房对于口一方券事人行力此普其佗账因，个使行攻行方战普人民法院生发貌列不俊戏护准以执行的类作，携对方尊事人的中准，个以定对其财产进行信全、费今其作出一定行为或者止其作出一定行力：尊事人没有提出申请的，人民法院套为婴时世下以微定来取上逃保全惜境”，四北人.B、C迄项正。D选项，提据（行攻诉讼解华）常101条第1.2款的现定，只有不予立需、收回起诉.管信异议这三种截定可以上诉，财产保全德定不上诉，因业D选项信误。（2007）", chapter: "第五章 起诉与受理"},
  {id: 474, topic: "专题五 行政诉讼法", type: "multiple", question: "张某不服某市税务局作出的行政处罚决定，起诉至人民法院，根据行政诉讼法及相关规定，下列说法正确的是？", options: {"A": "人民法院应当在立案之日起5日内，将起诉状副本发送某市税务局", "B": "该市税务局应当在收到起诉状副本之日起15日内向人民法院提交作出行政行为的证据和所依据的规范性文件", "C": "如果该市税务局不提交答辩状的，不影响人民法院审理", "D": "合议庭可以全部由审判员组成，也可以由审判员、陪审员组成，或者全部由陪审员组成"}, answer: "ABD", explanation: "。A、B途项，（行现诉诊法）馆69条规定：“行政行力证据确留，造用法常、法规正确，符合法定程序的，成康告中请被告履行法定职责或者给付义务理由不成立的，人民法院判决驳回原告的诉讼请求”，因此A、B选项正确。C选项，（行政诉讼法）第70条规定：“行改行方有下列情形之一的，人民法院应当判决批销或者部分微销，井可以判决按告重新作出行政行力（三）违反法定租序”，因此C选项借误。D选项，《行政诉讼法》第71条规定：“人民法院判决被告重新作出行改行为的，按告不得以同一的事尖和理由作出与原行政行力基本相同的行政行为”，因此D选项正。(2015)", chapter: "第六章 第一审程序"},
  {id: 475, topic: "专题五 行政诉讼法", type: "multiple", question: "王某不服某行政机关作出的具体行政行为，依法向人民法院提起行政诉讼。根据行政诉讼法及相关规定，下列哪种说法是正确的？", options: {"A": "王某和该行政机关均有权申请审判人员回避", "B": "王某认为需要停止执行该其体行政行为的，该行政机关应当停止执行", "C": "在人民法院对该行政案件宣告判决或者裁定前，该行政机关不能改变其所作的具体行政行为", "D": "人民法院可以根据该行政机关的请求对该行政案件进行调解"}, answer: "ABD", explanation: "。A、B、D选项，（行改诉讼法）第70条规定：“行改行为有下列情形之一的，人民法院判决撒销或者部分虽销，并可以判决被告重新作出行政行为：（一）主县证据不足的：（二）适用法律、法规错退的（六）明显不当的”，因此A、B、D选项正确。C选项，根据（行政诉讼法》第74条的规定，行政行为程序轻微违法，但对原告权利不户生实际影响的，人民法院判决确认违法，但不罚要撤俏或者判决履行，因此C选项错误。（2016）", chapter: "第六章 第一审程序"},
  {id: 476, topic: "专题五 行政诉讼法", type: "single", question: "行政诉讼期间，不停止行政行为的执行，但是下列哪些情况，人民法院应当停止执行？多选）", options: {"A": "行政行为的执行会给国家利益造成重大损失的", "B": "被告申请停止执行，人民法院认为该行政行为的执行会给社会公共利益造成重大损害的", "C": "被告认为需停止执行的", "D": "原告申请停止执行，人民法院认为该行政行为的执行会造成难以弥补的损失的"}, answer: "B", explanation: "。《行政诉讼法》第70条规定：“行政行为有下列情形之一的，人民法院判决撒俏或者部分撤俏，并可以列决被告重新作出行政行为（三）违反法定程序的…本题中，乙某的身份被盗川，属于违反法定程序的情形，应予撤销，撤销无效决定后，因无效请求人不符合请求人资格条件，国家知识产权局应当作出不予受理决定，而不是重新作出无效决定，因此A、C、D选项错误，B选项正确。（2018改编）", chapter: "第六章 第一审程序"},
  {id: 477, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法的规定，下列说法哪些是正确的？", options: {"A": "人民法院审理行政案件，参照行政法规", "B": "人民法院审理行政案件，参照地方性法规", "C": "人民法院审理行政案件，参照国务院部委根据法律或者行政法规制定、发布的规章", "D": "人民法院审理行政案件，参照直辖市人民政府根据法律或者行政法规制定、发布的规章"}, answer: "ABCD", explanation: "。《行政诉讼法》第77条规定：“行政处罚明显不当，或者其他行政行为涉及对款额的确定、认定确有错误的，人民法院可以判决变更。人民法院判决变更，不得加重原告的义务或者减损原告的权益·..….”，因此A、B、C、D选项均正项。(2019)", chapter: "第六章 第一审程序"},
  {id: 478, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，基层人民法院有特殊情况不能在立案之日起6个月内作出第一审行政判决，需要延长期限的，应如何处理？", options: {"A": "由该基层人民法院院长批准", "B": "由上一级人民法院批准", "C": "由高级人民法院批准", "D": "由最高人民法院批准"}, answer: "ABCD", explanation: "。《行政诉讼法》第74条规定：“行政行为有下列情形之一的，人民法院到决确认违法，但不撤销行政行为：（一）行政行为依法应当撤销，但撒销会给国家利益、社会公共利益造成重大损害的；（二）行政行为程序轻微违法，但对原告权利不产生实际影响的。行玫行为有下列情形之一，不要撤销或者判决履行的，人民法院判决确认违法：（一）行政行为违法，但不具有可销内容的：（二）被告改变原违法行政行为，原告仍要求确认原行政行为违法的”，因此A、B、C、D选项均正确。（2019）", chapter: "第六章 第一审程序"},
  {id: 479, topic: "专题五 行政诉讼法", type: "multiple", question: "当事人甲不服某行政机关乙作出的行政处罚决定，向该机关所在地的基层人民法院提起行政诉讼，该法院适用普通程序审理此案并作出判决。下列哪些说法是正确的？", options: {"A": "一般情况下，该基层法院应当在立案之日起的6个月内作出判决", "B": "如果在审理过程中，如有特殊情况，经该基层人民法院申请，中级人民法院可以批准延长审理期限", "C": "如果在审理过程中，如有特殊情况，经该基层人民法院申请，高级人民法院可以批准延长审理期限", "D": "一般情况下，该基层法院应当在立案之日起的1年内作出判决"}, answer: "ABD", explanation: "。A、B、D选项，《行政诉讼法）第69条规定：“行政行为证据确凿，适用法律、法规正确，符合法定程序的，或者原告申", chapter: "第六章 第一审程序"},
  {id: 480, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，下列说法哪些是正确的？", options: {"A": "人民法院审理行政案件，以法律和行政法规、部门规章和地方性法规为依据", "B": "人民法院审理行政案件，地方性法规适用于本行政区域内发生的行政案件", "C": "人民法院审理行政案件，参照国务院部、委制定、发布的规章", "D": "人民法院审理行政案件，认为国务院部、委制定、发布的规章之间不一致的，由最高人民法院作出解释或者裁决"}, answer: "B", explanation: ".《行改诉讼法）74等第2状院定：“行改行力有下列情形之一，不罚要微销或者判决厦行的，人民法院判决喻认造法：（一）行政行力造法，但不其并可微信内名的……”。本题中，货拆行为造反法定程序，房屋已经试拆除，癌决定已经实塘光单，无法微销和变更，应判决确认违法，因北人、C、D选项借误，B选项正喻，（法考2015）", chapter: "第六章 第一审程序"},
  {id: 481, topic: "专题五 行政诉讼法", type: "single", question: "行政诉讼过程中，在下列哪项情形下，人民法院可以按照撤诉处理？", options: {"A": "外地原告开庭前一天收到传票无法出庭的", "B": "上诉人认为人民法院偏祖被上诉人，未经法庭许可中途退庭的", "C": "原告申请撤诉，人民法院裁定不予准许，经合法传唤无正当理由拒不到庭的", "D": "被告改变原具体行政行为，原告不撤诉的"}, answer: "C", explanation: "《行攻诉讼解师>第81条规定：“被客在一审期同改党收诉行政行力的，应当书面告知人民法院。原告或考第三人对政变后的行政行力不服提起诉讼的，人民法院应当就改变后的行政行为进行审理。杏改变原违法行政行力，原售仍要求确认原行政行为违法的，人民法院应资依法作出确认判决。原告起诉被告不作为，在诉讼中被告作出行政行为，原告不缴诉的，人民法院应当就不作为依法作出确认判决”。本题中，行政机关改变了原具体行政行为，将罚款5000元改为罚款3000元，该公可仍要求确认原行政行为违法，人民法院应当依法作出确认判决，因此A、B、D选项错误，C选项正确。（新编）", chapter: "第六章 第一审程序"},
  {id: 482, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，下列说法哪些是正确的？", options: {"A": "被告未经法庭许可中途退庭的，可以缺席市判", "B": "经人民法院传票传唤，原告无正当理由拒不到處的，可以按照撤诉处理", "C": "原告未经法庭许可中途退庭的，可以按照撤诉处理", "D": "经人民法院传票传唤，被告无正当理由拒不到庭的，可以缺席审判"}, answer: "B", explanation: "。（行政诉讼法》第81条规定：“人民法院应当在立案之日起6个月内作出第一审判决，因此A、C、D选项借误，B选项正确。（2007）", chapter: "第六章 第一审程序"},
  {id: 483, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，在下列哪些情形下，人民法院中止行政诉讼？多选）", options: {"A": "原告死亡，须等待其近亲属表明是否参加诉讼的", "B": "案件的审判须以相关民事案件的审理结来为依据，而相关案件尚未审结的", "C": "原告死亡，没有近亲属或者近亲属放弃诉讼权利的", "D": "作为原告的法人或者其他组织终止后，其权利义务的承受人放弃诉讼权利的"}, answer: "BD", explanation: "。A、B、C选项，根据《行政诉讼解释）第101条的规定，仅对不子立案、驳回起诉、管辖异议的投定，当事人可以上诉，因此A、C选项错误，B选项正确。D选项，对干判决不展可以提起上诉，因此D选项正确。(2018)", chapter: "第六章 第一审程序"},
  {id: 484, topic: "专题五 行政诉讼法", type: "single", question: "关于行政诉讼中的财产保全，下列哪些说法是正确的？", options: {"A": "对于因一方当事人的行为，可能使人民法院生效裁判难以执行的案件，人民法院可以根据对方当事人的申请作出财产保全的裁定", "B": "对于因一方当事人的行为，可能使被诉具体行政行为难以执行的案件，人民法院可以根据对方当事人的申请作出财产保全的裁定", "C": "当事人没有提出财产保全申请的，人民法院在必要时可以依法采取财产保全措施", "D": "当事人对财产保全的裁定不服的，可以上诉"}, answer: "B", explanation: "。根据（行政诉讼解》第22的规定，复议机关确认原行改行为违法，周干改变原行政行为，但复议机关以违反法定程序为由确认原行政行为违法的除外。以程序违法为由确认原行为违法应梅其视为维持。因此，原机关区公安分局和复议机关区政府是共同被告，人选项借误。根据（行政复议法）第51条的规定，执申请人的负负人应当参加听证。不能参加的，应当说明由并委托相应的工作人员参加听证。四比，被申请人区公安分局的负贵人应出参加听证，B选项正确。根据《行政诉讼解释》第134条的规定，复议机关作共回被告的案件，以作出原行政行为的行政机关确定案件的级别管辖。应以区公安分局来确定案件的级别管辖为基层法院，因此C选项错误。根据《行政诉讼解释》第79条的规定，第三人经传票传唤无正当理由拒不到庭，或者未经法庭许可中途退庭的，不发生阻止案件审理的效果。因此D选项错误。（法考2024）", chapter: "第六章 第一审程序"},
  {id: 485, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列有关人民法院第一审判决的哪些说法是正确的？多选）", options: {"A": "行政行为证据确凿，适用法律、法规正确，符合法定程序的，人民法院判决驳回原告的诉讼请求", "B": "原告申请被告履行法定职资理由不成立的，人民法院判决驳回原告的诉讼请求", "C": "行政行为违反法定程序、但认定事实清楚且适用法律、法规正确的，人民法院判决维持该行政行为", "D": "人民法院判决被告重新作出行政行为的，被告不得以同一的事实和理由作出与原行政行为基本相同的行政行为"}, answer: "BCD", explanation: "。A选项，相关法律法规没有规定法院适用简品程序应当庭宜判，因此A选项错误。B选项，（行政诉讼法》第83条规定：“适用简易程序审理的行政案件，由审判员一人独任审理，并应当在立案之日起四十五日内审结”，因此B选项正确。C选项，根据《行政诉讼法》第82条的规定，人民法院审理第一审行政案件，认为事实清楚、权利义务关系明确、争议不大的，可以适用简易程序，当事人各方同意适用简易程序的，可以适用简易程序，因此C选项正确。D选项，《行政诉讼解释》第103条第1款规定：“适用简易程序审理的行政案件，人民法院可以用口头通知、电话、短信、传真、电子邮件等简便方式传唤当事人、通知证人、送达裁判文书以外的诉讼文书”，因此D选项正确。（新编）", chapter: "第六章 第一审程序"},
  {id: 486, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定、行政行为有下列哪些情形的，人民法院判决撤销或者部分撤销，并可以判决被告重新作出行政行为？多选）", options: {"A": "主要证据不足的", "B": "适用法律、法规错误的", "C": "行政程序轻微违法，但对原告权利不产生实际影响的", "D": "明显不当的"}, answer: "AC", explanation: "。（行政诉讼法》第83条规定：专五行政诉讼法用店医作中理的行资满作，由审为件人债佳市理，片庄当在立装兰日是45日带告。“因出，A资巩正确，B连项错供。人法实在申理迁使中，发普体不置速用俏但岸的，提定传方等遵偿序，C击项正喷，责项，人民决院审意行改激体，伙法实行审终审制度，简疗健序只定对审应径序的化，世当造用两章终审，当本人仿本上诉权，旧北，D连项借供，（法2016", chapter: "第六章 第一审程序"},
  {id: 487, topic: "专题五 行政诉讼法", type: "multiple", question: "甲某对国家知识产权局作出的宣告其专利权全部无效的审查决定不服提起行政诉讼，经审理查明，无效宜告请求人乙某的身份被盗用，授权委托书上的签名系伪造，下列裁判方式正确的是？", options: {"A": "撤销无效宜告审查决定，并判令国家知识产权局就该无效请求重新作出审查决定", "B": "撤销无效宣告审查决定", "C": "鉴于专利法规定任何人均可以提出无效宣告请求，判决驳回甲的诉讼请求", "D": "鉴于专利法规定任何人均可以提出无效宣告请求，判决维持无效宣告审查决定"}, answer: "ABC", explanation: "。根协《行次诉检法）答S7现定，人民法院对愿诉行政机美改有收法付院世会、歌偏生溶保障金和工份、医疗会保险金的菌件，以符义养关具功项、不予执行将严重影有展告生治的，可以慢鲁的申请，定先予次行。希是可以院题生活保障金申请党予抗行，人选项正确。事人对先予执行我定不展的，可以申请复一次，四北B选项正。行攻机英未厦行定取费的案件，当事人应当先中请行政复才够提起行政诉讼。本题中，民攻局在定期限内未作容复，属于行政机关不行定职费的情形，属于雷要凭议信显的定，因此C选项正确。本题中没有给出判断绝给付最低生活保障金行力是否造法的件，不判所该行政行为是否进法，因此选项错误。（法考2020改编，馬维扩展）C。A选项，《行政诉讼法》第85条规定：不展人民法院第一审判决的，有权在判决日起15日内向上一级人民法院提起上因此A选项正确。B选项，《行政诉讼法）见定：“人民法院对上诉案件，应当组成合庭审理。经过阅卷、调资和询问当事人，出新的事实、证据或者理由，合议庭认为庭审理的，也可以不开庭审理”，因此B选项错误。C选项，（行政诉讼法》第87条规定：“人民法院审理上诉案件、应当对原中人民法院的购决、载定和被诉行政行为进行全面审查”，四比C返项正确。D选项，（行政诉讼法》第89条第2数规定：“原审人民法院对发回重审的案件作出列决后，当事人提起上诉的，第二审人民法院不得再次发回重审”，因此D选项错误。（2017）", chapter: "第六章 第一审程序"},
  {id: 488, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，有关法院判决变更，下列说法正确的是？多选）", options: {"A": "行政处罚明显不当，法院可以判决变更", "B": "涉及对款额的确定确有错误的行政行为，法院可以判决变更", "C": "法院判决变更，通常不得加重原告的义务", "D": "法院判决变更，通常不得减损原告的权益"}, answer: "A", explanation: "。A、B选项，《行政诉讼法》第86条规定：“人民法院对上诉案件，应当组成合议庭，开庭审理。经过间卷、调查和询问当本人，对没有提出新的事实、证据或者理由，合议庭认为不要开庭审理的，也可以不开庭审理”，因此人选项正确，B选项错误。C、D选项，《行政诉讼法》第87条规定：“人民法院审理上诉案件，应当对原审人民法院的判决、裁定和被诉行政行为进行全面审查”，因此C、D选项错误。（2017）", chapter: "第六章 第一审程序"},
  {id: 489, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列哪些情况，法院应判决确认违法但不撤销或不需要撤销行政行为？", options: {"A": "行政行为依法应当撤销，但撤销会给国家利益、社会公共利益造成重大损害的", "B": "行政行为程序轻微违法，但对原告权利不产生实际影响的", "C": "被告改变原违法行政行为，原告仍要求确认原行政行为违法的", "D": "行政行为违法，但不具有可撤销内容的"}, answer: "BC", explanation: "。《行政诉讼法》第89条规定：“人民法院审理上诉案件，按照下列情形，分别处理：（二）原判决、裁定认定事实错误或者适用法律、法规错误的，依法改判、撤销或者变更；（三）原判决认定基本事实不清、证据不足的，发回原审人民法院重审，或者查清事实后改判：（四）原判决遗滴当事人或者违法缺席判决等严重违反法定程序的，裁定撤销原判决，发回原审人民法院重审。原审人民法院对发回重审的案件作出判决后，当事人提起上诉的，第二审人民法院不得再次发回重申…”，因此B、C选项正确，A选项应依法交更，无必要发回重审，D选项原判决是对发回重审的案件作出的，不能再次发回重审。（2018）", chapter: "第六章 第一审程序"},
  {id: 490, topic: "专题五 行政诉讼法", type: "multiple", question: "行政诉讼案件有下列哪些情形的，人民法院应当判决驳回原告的诉讼请求？", options: {"A": "行政行为证据确凿，适用法律、法规正确", "B": "符合法定程序", "C": "合法但明显不当", "D": "原告申请被告履行法定职责或者给付义务理由不成立"}, answer: "ABD", explanation: "。A、B、D选项都属于违反法定程序，应撤销原判，发回重审，因此A、B、D选项正确。C选项，（行政诉讼解释》第109条第4、5款规定：“原审判决遗漏行政赔偿请求，第二审人民法院经审查认为依法不应当子以赔偿的，应当判决驳回行政赔偿请求。原审判决遗漏行政赔偿请求，第二审人民法院经审理认为依法应当子以赔偿的，在确认被诉行政行为违法的同时，可以就行政赔偿专通五行政诉讼法同息进行调解：调解不展的，应当然行改赔价最分史回重审”，回此C连巩错读。（辨）S.BCD，A岛，对干岳改许提局的行次诉，一市庄由中限人民法院管借，人选项借供、目违项，一市进為赔信请求，二市童价捷出，属于个所的理由，二市皮当开庭审理，B连项正确、C逻项，（行政诉论法）第W务现定：“人民法实审理上诉件，应当才度审人民法岗的持决、定在诉行政行力进行全面审益”，因此C这项正吻。D选项（行政诉讼法解称）第109案答4款规定：“原市判决遣希行政赔偿请求，第二审人民法院经申整认力依法不应当予以暗借的，座费身决孜罚行攻赔偿请求”，回北D选项正喻，（淡考2017）", chapter: "第六章 第一审程序"},
  {id: 491, topic: "专题五 行政诉讼法", type: "multiple", question: "某镇政府以一公司所建钢架大棚未取得乡村建设规划许可证为由责令限期拆除。该公司逾期不拆除，镇政府现场向其送达强拆通知书，组织人员拆除了大棚。该公司向法院起诉要求撤销强拆行为。如一审法院审理认为强拆行为违反法定程序，可作出的判决有：", options: {"A": "撤销判决", "B": "确认违法判决", "C": "履行判决", "D": "变更判决"}, answer: "AB", explanation: "。A选项，機物《民事诉语法>的相关别定，当事人可以在诉伦控程中命法院中请保全证德，利害英系人可以左提起诉讼曾有法院中请保全证据。百行政诉讼中证据保全只在诉讼中提出，因此A选项正确。B选项，不论民事诉讼还是行政诉讼，惩层法院一审的定件当事人及方可以约定透用简易租序，因此B途项正确。C选项，民事诉讼中追循谁主张谁华证的原购，行政诉讼中微告对作出的行政行为负有举证费任，回业C选项借误。D选项，（行玖诉讼法》第8名规定：”当事人在行政诉讼中的法律地位平等”，因此D选项错误。（新增）", chapter: "第六章 第一审程序"},
  {id: 492, topic: "专题五 行政诉讼法", type: "multiple", question: "某公司就某行政机关对其作出的罚款5000元的行政处罚决定向人民法院起诉。在诉讼中，该行政机关变更了原处罚决定，将罚款数额改为3000元，并书面告知了人民法院，但该公司仍要求确认原行政行为违法。根据行政诉讼法及相关规定，下列说法哪项是正确的？", options: {"A": "人民法院应当裁定终结诉讼，并告知该公司另行起诉", "B": "人民法院应当对改变后的行政处罚决定进行审理", "C": "人民法院应当依法作出确认判决", "D": "人民法院应当对改变后的行政处罚决定和原行政处罚决定一并进行审理"}, answer: "BD", explanation: "。A选项，行政复议案件审资行政行方的合法性和合理性，行政诉讼案件原则上只申查行政行为的合法性，因此A选项错误。请号生对比", chapter: "第六章 第一审程序"},
  {id: 493, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法的规定，如果不存在需要延长审理期限的特殊情况，人民法院应当在下列哪个期限内作出行政案件的第一审判决？", options: {"A": "收到起诉状之日起6个月", "B": "立案之日起6个月", "C": "收到起诉状之日起3个月", "D": "立案之日起3个月"}, answer: "BD", explanation: "。A、B选项，（行致诉讼法）第90条规定：”当事人对已经发生法律效力的列决、就定，认为确有借误的，可以向上一级人民法院申请再申…”，因此A选项借俱，B选项正确。C、D选项，《行政诉讼法》算92条规定：“各级人民法院院长对本院已经发生法律效力的判决、定，认为需要再审的，应当提交审判委员会讨论决定上级人民法院对下级人民法院已经发生法律效力的判决、定，有权提审或者指令下级人民法院再审”，因此C选项错误，D选项正确。（2011）", chapter: "第六章 第一审程序"},
  {id: 494, topic: "专题五 行政诉讼法", type: "multiple", question: "对下列哪些行政裁判，当事人可以提起上诉？", options: {"A": "裁定不停止执行行政行为", "B": "裁定不予立案", "C": "裁定中止诉讼", "D": "判决驳回原告的诉讼请求"}, answer: "ABCD", explanation: "。A选项，《行政诉讼法》第90条规定：“当事人对已经发生法律效力的列决、裁定，认为确有错误的，可以向上一级人民法院中请再申…….”，因此A选项正确。B、C选项，（行政诉讼法》第91条规定：“当事人的申请符合下列情形之一的，人民法院应当再审：··（六）原判决、裁定遗涌诉讼请求的：（七）据以作出原判决、定的法律文书被撤销或者交更的……”，因此B、C选项正确。D选项，《行政诉讼法》第93条第1款规定：“最商人民检察院对各级人民法院已经发生法律效力的判决、定，上级人民检察院对下级人民法院已经发生法律效力的判决、裁定，发现有本法第91条规定情形之一，或者发现调解书损害国家利益、社会公共利益的，应当提出抗诉”，因此D选项正确。（2017）", chapter: "第六章 第一审程序"},
  {id: 495, topic: "专题五 行政诉讼法", type: "multiple", question: "王某将沈某打成轻微伤，区公安分局给予王某行政拘留5日并罚款2000元的处罚。王某向区政府申请行政复议，区政府经听证以区公安分局超期办案为由作出确认违法决定。王某不服，提起行政诉讼，法院通知沈某作为第三人参加诉讼，下列说法正确的是？", options: {"A": "被告应为区政府", "B": "区公安分局负责人应当参加复议听证", "C": "应由区政府所在地中院管辖", "D": "沈某未经许可中途退庭，法院应中止审理"}, answer: "ABD", explanation: "。A、B选项，《行政诉讼法》第92条第2款规定：…….，上级人民法院对下级人民法院已经发生法律效力的判决、发定，发现有本法第91条规定情形之一，或者发现调解违反自愿原则或者调解书内容违法的，有权提审或者指令下级人民法院再审”，因此A、B选项正确。C、D选项，根据《行政诉讼法》第93条的规定，上级人民检察院对下级人民法院已经发生法律效力的判决、裁定，发现有本法第91条规定情形之专圆五行政诉讼法一，世世甚出抗诉，世是考以定撤销村决，因岳C违式借供，D违项正府.（2014）", chapter: "第六章 第一审程序"},
  {id: 496, topic: "专题五 行政诉讼法", type: "multiple", question: "关于法院适用简易程序审理行政案件，下列哪项说法是正确的？", options: {"A": "法院应当庭宜判", "B": "应当在立案之日起45日内审结", "C": "如果中级人民法院是第一市法院，其也可以适用简易序审理行政案件", "D": "法院可以用电话的方式传唤当事人"}, answer: "BCD", explanation: "，（行皮诉治法）管01等属定：“当华人的中请许合下月情形之一的，人法院皮当再…（六）账列决，定进酒昨俗请求的……（行次诉论法>增93奔第1.2款脱定：“成前人民院对作人民法院已经发生法体放力的列决，截定，上人民检事观对下级人民法院已经发生法体发方的判决、截定，发现有本淡骼91靠院定债形之一，成普发现调解节惯费国发利监、任会公共利监的，应当提出杭诉。方各段人民检察院对回股人民决院已经发生法体效力的列次、盛，发现年法信91景规定情形之一，或者发现创解督惯券国家利点，社会公共利益的，可以向同级人民决院是出检客建议，并报上级人民检事院备期：也习以堤请上级人民检事院向呵级人民法院堤出抗诉”：因此A选项信误，B.C、D选项正确。（2016)", chapter: "第六章 第一审程序"},
  {id: 497, topic: "专题五 行政诉讼法", type: "single", question: "交警大队以方某闯红灯为由当场处以50元罚款，方某经复议后不服起诉。法院适用简易程序审理。关于简易程序，下列哪些说法是正确的？多选）", options: {"A": "由审判员一人独任审理", "B": "法院应在立案之日起30日内审结，有特殊情况需延长的经批准可延长", "C": "法院在审理过程中发现不宜适用简易程序的，减定转为普通程序", "D": "对适用简易程序作出的判决，当事人不得提出上诉"}, answer: "C", explanation: "。《国家赔偿法》第5条规定：“属于下列情一的，回家不承担赔偿费任：（一）行政机关工员与行使职权无关的个人行为”，张某的晨千个人行为，和取务无关，回家不承担赔偿因此A、B、D选项错误，C选项正确。（2019）", chapter: "第六章 第一审程序"},
  {id: 498, topic: "专题五 行政诉讼法", type: "single", question: "李某失业后向民政局申请最低生活保障金，民政局在规定期限内未作答复，李某经复议后提起行政诉讼，下列哪些说法是正确的？多选）", options: {"A": "李某可以申请先予执行", "B": "如果法院作出先予执行裁定，民政局不服可以申请复议", "C": "李某经行政复议后方能提起行政诉讼", "D": "本案应适用确认违法判决"}, answer: "A", explanation: "。A选项，市政府指导定议是展行行政职行为，因此A选项正确。B、C选项，（行政诉讼释）第1条第2款规定：“下列行为不属于人民行政诉讼的受案范图：（三）行政指导行”，因此行政指导行为不属于行政诉讼受案，也无留给予补偿，B、C选项错误。D选项，赔偿法》第3条规定：“行政机关及其工作人行使行政职权时有下列役犯人身权情形之一害人有取得赔偿的权利：……（三）以打、等行为或者使、放纵他人以段打、虑待等行为进成公民身休伤害或者死亡的……”因此稍奖不服黄某人身役权行为的：可以提起行致诉论.D选项错误。（2018）", chapter: "第六章 第一审程序"},
  {id: 499, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列关于行政诉讼“当事第二审程序的哪些说法是正确的？多选）书送", options: {"A": "当事人不服人民法院第一审行政判决的，有权在诉...判决书送达之日起15日内向上一级人民法院提起上诉第86", "B": "人民法院对行政上诉案件，一律应当开庭审理议庭，", "C": "人民法院审理上诉案件，应当对原审人民法院的对没判决、裁定和被诉行政行为进行全面审查不需县", "D": "原审人民法院对发回重审的案件作出判决后，当事人提起上诉的，第二审人民法院仍然可以再次发回审"}, answer: "ABD", explanation: "。A选项，（国家赔偿法》第11条规完：“赔偿请求人根据受到的不同损害，可以同时提出数项赔偿要求”，因此A选项正确。B选项，（国家赔偿法》第9条第2款规定：“赔偿请求人要求赔偿应当先向赔偿义务机关提出，也可以在申请行政复议或者提起行政诉讼时一并提出”，因此B也项正确。C选项，（国家赔偿法》第10条规定：“赔偿请求人可以向共同赔偿义务机关中的任何一个路偿义务机关要求赔偿，该赔偿义务机关应当先子赔偿”，因此C选项错误。D选项，（国家赔偿法）信15条第1款规定：“人民法院审理行政赔偿案件，赔偿请求人和赔偿义务机关对自已提出的主张，应当提供证据”，因此D选项正确。（2014）", chapter: "第七章 第二审程序"},
  {id: 500, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列关于行政诉讼第二审程序的说法哪项是正确的？", options: {"A": "第二审人民法院对没有提出新的事实、证据或者理由，合议庭认为不需要开庭审理的，可以不开庭审理", "B": "第二审人民法院对行政上诉案件应当一律开庭审理", "C": "第二审人民法院审理行政上诉案件，只限于审查原审人民法院作出的裁判是否合法", "D": "第二审人民法院审理行政上诉案件，只限于审查被诉行政行为是否合法"}, answer: "ABC", explanation: "。A、B选项，（国家赔偿法》第4条规定：“行政机关及其工作人员在行使行政职权时有下列役犯财产权情形之一的，受害人有取得赔偿的权利：（一）违法实施罚款、吊销许可证和执烈、责令停产停业、没收财物等行政处罚的：（二）违法对财产采取查封、扣押、冻结等行政强制措施的”，因此A、B选项正确。C选项，《国家赔偿法》第3条规定：“行政机关及其工作人员在行使行政职权时有下列役犯人身权情形之一的，受害人有取得赔偿的权利：（一）违法拘留或者违法采取限制公民人身自由的行政强制措施的……”因比C选项正确。D选项，《国家赔偿法》第5条规定：“属于下列情形之一的，国家不承担赔偿责任：（一）行政机关工作人员与行使职权无关的个人行为…”，因此D选项错误。（新编）", chapter: "第七章 第二审程序"},
  {id: 501, topic: "专题五 行政诉讼法", type: "multiple", question: "人民法院审理行政上诉案件，在下列哪些情形下可以裁定撤销原判，发回重审？多选）", options: {"A": "原判决认定事实清楚，但适用法律错误", "B": "原判决遗漏了当事人", "C": "原判决认定基本事实不清，证据不足", "D": "原判决是对发回重审的案件作出的"}, answer: "ABCD", explanation: "。A、B、C选项，（国家赔偿法）第3条规定：“行政机关及其工作人员在行使行政职权时有下列役犯人身权情形之一的，受害人有取得赔偿的权利：（二）非法拘禁或者以其他方法垂法剥夺公民人身自由的：（三）以段打、虑待等行为", chapter: "第七章 第二审程序"},
  {id: 502, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，关于法院审理上诉案件，下列说法正确的是？多选）", options: {"A": "原审判决遗漏当事人，第二审法院应裁定撤销原判决，发回原审人民法院重审", "B": "原审判决违法缺席判决，第二审法院应裁定撤销原判决，发回原审人民法院重审", "C": "原审判决遗漏行政赔偿请求，第二审法院应裁定撤销原判决，发回原审人民法院重审", "D": "原审判决中应当回避的审判人员未回避的，第二审法院应裁定撤销原判决，发回原审人民法院重审"}, answer: "ABCD", explanation: "。《商标法》第3条第1款中规定，经国务院商标管理部门核准注册的商标为注册商标，包括商品商标、服务商标和集体商标、证明商标，因此A、B、C、D选项均正确。（新编）", chapter: "第七章 第二审程序"},
  {id: 503, topic: "专题五 行政诉讼法", type: "multiple", question: "县政府以某化工厂不符合国家产业政策、污染严重为由，决定强制关闭该厂。该厂向法院起诉要求撤销医决定，并提出赔偿请求。一审法院认定县政府决定进法，于以撤销，但未对赔偿请求作出裁判，县政府提出上诉。下列说法正确的是：", options: {"A": "本案第一审应由县法院管辖", "B": "二审法院不得以不开庭方式审理该上诉案件", "C": "二审法院应对一审法院的判决和被诉行政行为进行全面审查", "D": "如二审法院经审查认为依法不应给予该厂偿的，应判决股回其赔偿请求"}, answer: "AC", explanation: "。A、B、C选项，（商标法）第3条第3数规定：“本法所称证明商标，是指由对某种商品或者股务具有监督能力的组织所控制，而由该组织以外的单位或者个人使用于共商品或者务，用以证明该商品或者服务的原产地、原料、制造方法、质量或者其他特定品质的标志”，因此A、C选项正确，B选项错误。D选项，《商标法》第3条第2款规定：“本法所称集体商标，是指以团体、协会或者其他组织名义注册，供该组织成员在商事活动中使用，以表明使用者在该组织中的成员资格的标志”，因此D选项描述的是集体商标，D选项错误。（2011）", chapter: "第七章 第二审程序"},
  {id: 504, topic: "专题五 行政诉讼法", type: "multiple", question: "根据民事诉讼法和行政诉讼法的规定，下列哪些说法是正确的？", options: {"A": "民事诉讼可以申请诉前证据保全，而行政诉讼只能在诉讼中提出", "B": "基层法院一审，双方协商一致可以适用简易程序", "C": "都遵循谁主张谁举证的原则", "D": "民事诉讼中当事人的法律地位平等，行政诉讼中当事人的法律地位不平等"}, answer: "ABD", explanation: "。A、B、D选项，《商标法>第8条规定：“任何能够将自然人、法人或者其他组织的商品与他人的商品区别开的标志，包括文字、图形、字母、数字、三维标志、顾色组合和市音等，以及上述要素的组合，均可以作为商标申请注册”，因此A、B、D选项正确。C选项，气味不可以作为商标申请注册，因此C选项错误。（2015）", chapter: "第七章 第二审程序"},
  {id: 505, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政复议法、行政诉讼法及相关规定，关于行政复议和行政诉讼，下列说法哪些是正确的？", options: {"A": "行政复议案件和行政诉讼案件都可以审理行政行为的合理性和合法性", "B": "行政复议案件和行政诉讼案件的审理期限不同", "C": "行政复议机关收取的复议费用和人民法院收取的诉讼费用相同", "D": "提出行政复议申请的期限和提起行政诉讼的期限不同"}, answer: "AC", explanation: "。A选项，顾色得要和商标的其他要素组合起来才能作为商标获得注册，单一顾色不作为商标注册。C选项，我国没有位置商标。B、D", chapter: "第七章 第二审程序"},
  {id: 506, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列说法哪些是正确的？", options: {"A": "当事人对已经发生法律效力的判决、裁定，认为确有错误的，可以向原审人民法院提出再审", "B": "当事人对已经发生法律效力的判决、裁定、认为确有错误的，可以向原审人民法院的上一级人民法院提出再审", "C": "人民法院院长对本院已经发生法律效力的判决、裁定，发现违反法律、法规规定认为需要再审的，有权决定再审", "D": "上级人民法院对下级人民法院已经发生法律效力的判决、裁定，发现违反法律、法规规定的，有权提审或者指令下级人民法院再审"}, answer: "AB", explanation: "。A、H走项，《前标等供》第4等第1次昆定：“育标法第16等定的意层标为，个以依贷商标法在术券何的定，作方连啡标成书震体筒标中请迷册“，因出A.B图项正噜。C.D连项，高昌筒标和限券标是换指定使准对算分共，渠体育综和连明谢你是你有人主体分处，休商标、证明你所可以是前品院你设展券官你，旧北C.D选项借谈。（2012）", chapter: "第八章 行政诉讼的审判"},
  {id: 507, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，下列关于审判监督程序的哪些说法是正确的？", options: {"A": "当事人对已经发生法律效力的判决，认为确有错误的，可以向上一级人民法院申请再审", "B": "原判决遗漏诉讼请求，当事人提出再审申请的，人民法院应当再审", "C": "据以作出原判决的法律文书被撤销，当事人提出再审申请的，人民法院应当再审", "D": "上级人民检察院发现下级人民法院已经发生法律效力的判决遗漏诉讼请求的，应当提出抗诉"}, answer: "A", explanation: "。A选项，《商婷条例>诺4条债1款规定：“商标法第16条规定的湾理你考，可以质岗你决和本条例的规定，作力证明前惊选德集体前你中请注后”，因北A选项正。B、C选项，《商桥法）第16条第1散现定：胃你中有品的您理你考，调淡南品井非来源于该你店所标采的坊区，便导公众的，不予注册并禁止使用：但是，已经善念取得法厨的继续有效”，四北B、C选项借供。D选项，（河标法）第30条中现定，中请注感的前标，几不将合本法有关规定或者购他人在罚一种诱昌或者类仅前品上已经注册的或者初少审定的言标相同或指近仅的，由国务院商标管理部门回中请，不子公告，该规定井未将除地理标志，因此D选项错退。(2018)", chapter: "第八章 行政诉讼的审判"},
  {id: 508, topic: "专题五 行政诉讼法", type: "single", question: "根据行政诉讼法及相关规定，下列哪些说法是正确的？", options: {"A": "上级人民法院对下级人民法院已经发生法律效力的判决，发现违反法律、法规规定的，有权提审", "B": "上级人民法院对下级人民法院已经发生法律效力的判决，发现违反法律、法规规定的，有权指令下级人民法院再审", "C": "人民检察院对人民法院已经发生法律效力的判决，裁定撤销判决", "D": "上级人民检察院对下级人民法院已发生法律效力的判决，按照审判监督程序提出抗诉"}, answer: "D", explanation: "。《商标条例》第4条第I致规定：商标法第16条的地理标方，可以依原商标法和本条例的规定，作方证明商标或者集体商标中请注所”，回此A、B、C选项错误，D选项正确。（2019）", chapter: "第八章 行政诉讼的审判"},
  {id: 509, topic: "专题五 行政诉讼法", type: "multiple", question: "根据行政诉讼法及相关规定，下列关于审判监督程序的哪些说法是正确的？", options: {"A": "地方各级人民检察院发现同级人民法院已经发生法律效力的判决遗漏诉讼请求的，可以向同级人民法院提出抗诉", "B": "地方各级人民检察院发现同级人民法院已经发生法律效力的判决进漏诉讼请求的，可以提请上级人民检察院向同级人民法院提出抗诉", "C": "上级人民检察院发现下级人民法院已经发生法律效力的判决遗漏诉讼请求的，应当提出抗诉", "D": "最高人民检察院发现各级人民法院已经发生法律效力的判决遗漏诉讼请求的，应当提出抗诉"}, answer: "ABCD", explanation: "。A选项，《商标法）第11条第I款规定：“下列标志不得作为商标注册：（一）仅有本商品的通用名称、国形、型号的……（三）其他联乏是若特征的”，因此A选项不得作为商标注册。B、C、D选项，《商标法》第12条规定：“以三维标志申请注册简标的，仅由筒品自身的性质产生的形状、为获得技术效果而雷有的商品形状或者使商品具有实质性价值的形状，不得注册”，因此B、C、D选项不得作为商标注册。（新编）", chapter: "第八章 行政诉讼的审判"},
  {id: 510, topic: "专题五 行政诉讼法", type: "multiple", question: "某县公安局干警张某在协助县林业局执行公务形时，遇到往日有嫌隙的王某，张某借故将王某殴打致死，对作王某的死亡承担赔偿义务的是？行", options: {"A": "该县公安局", "B": "该县人民政府", "C": "张某权", "D": "该县林业局为"}, answer: "BC", explanation: "。A、B、D选项，《商标法）第10条第1款规定：“下列标志不得作为而标他用：（一）间中年人民共和国的国家名称、国旗、国徽、国歌、军、军徽、军歌、助章等相同或书近似的·（三）同政府问国际组织的名称、旗积、微记等相同或者近依的，但经该组织同意或者不易误导公众的险外…（五）同红十字、红新月的名称、标志相同或者近似的…”，因此A、D选项不得作为向标使用，B选项经组织同意的可以作为商标使用。C选项，（商标法》第11条第1款规定：“下列标志不得作为商标注册：·（三）其他缺乏显落特征的”，因此C选项缺乏显著特征不得作为而标注册，但是可以使用。（2014）", chapter: "第九章 国家赔偿"},
  {id: 511, topic: "专题五 行政诉讼法", type: "multiple", question: "养殖户梅某根据市政府的建议，扩大了生猪养殖，为结果全国生猪养殖产能过剩，猪肉价格暴跌，该养殖户损范失200万。该市畜牧局执法人员黄某到梅某养殖基地进员行检疫时，梅某阻拦，黄某将梅某打成轻微伤。下列说法的正确的是？", options: {"A": "市政府的行为是履行行政职权的行为", "B": "梅某不服市政府的行为，可以提起行政诉讼", "C": "市政府应当对梅某的养殖损失进行补偿", "D": "梅某不服黄某人身侵权行为的，不可以提起行政诉讼，但可以提起民事诉讼"}, answer: "ABD", explanation: "。A、B、D选项，《商标法》第10条第1数规定：“下列标志不得作为商标使用：（二）同外国的国家名称、国旗、国徽、军旗等相同或者近似的，但经该国政府同意的除外…（六）带有民族歧视性的：（七）带有欺骗性，容易使公众对商品的质量等特点或者产地产生误认的”，因此A、B、D选项不得作为商标使用。C选项，《商标法）第11条第1款规定：“下列标志不得作为商标注册：（二）仅直接表示商品的质量、主要原料、功能、用途、亚量、数量及共他特点的.\"因此C选项不得作为商标注册，但可以使用。（2016）", chapter: "第九章 国家赔偿"},
  {id: 512, topic: "专题五 行政诉讼法", type: "single", question: "根据国家赔偿法及相关规定，下列哪些说法是正确的？多选）", options: {"A": "赔偿请求人根据受到的不同损害，可以同时提出数项行政赔偿请求", "B": "赔偿请求人可以在提起行政复议时一并提出行政赔偿请求", "C": "存在共同赔偿义务机关的，赔偿请求人应当向所有共同赔偿义务机关同时要求赔偿", "D": "人民法院审理行政赔偿案件时，赔偿请求人对自己提出的主张，应当提供证据"}, answer: "B", explanation: "。一般情况下，声音商标需经长期使用才能取得显著特征，因此A、C、D选项错误，B选项正确。（新编）", chapter: "第九章 国家赔偿"},
  {id: 513, topic: "专题五 行政诉讼法", type: "multiple", question: "根据国家赔偿法的规定，行政机关及其工作人员在行使行政职权时，有下列哪些情形时，受害人有取得赔偿的权利？", options: {"A": "违法实施罚款的", "B": "违法对财产采取冻结的", "C": "违法采取限制公民人身自由的行政强制措施的", "D": "行政机关工作人员与行使职权无关的个人行为"}, answer: "BD", explanation: "。A、C选项，申请注册的商标没有新颖性、实用性和美感的要求，因此A、C选项错误。B、D选项，（商标法》第9条第1款规定：“申请注册的商标，应当有显著特征，便于识别，并不得与他人在先取得的合法权利相冲突”，因此B、D选项正确。（2007）", chapter: "第九章 国家赔偿"},
  {id: 514, topic: "专题五 行政诉讼法", type: "multiple", question: "根据国家赔偿法的规定，行政机关及其工作人员在行使行政职权时有下列哪些情形的，受害人有取得赔偿的权利？多选）", options: {"A": "非法拘禁的", "B": "咬使、放纵他人股打造成公民身体伤害的", "C": "咬使、放纵他人虐待造成公民身体伤害的", "D": "违法征用财产的"}, answer: "CD", explanation: "。A、B选项，（商标法》第10条第2款规定：“县级以上行政区划的地名或者公众知晓的外国地名，不得作为商标。但是，地名具有其他合义或者作为集体商标、证明商标组成部分的除外；已经注册的使用地名的商标继续有效”，因此“鸽专六商标法其费集”可以作方跟体言标成骨迁明育标注册，A、日离巩许合法体规定。C选项，当集的形快为产遗川形快，无应等性，不他注府剪标，C遇项不许合官标法的定。D选项，音熊属干前直的透用名停，不信注册，四此D透项不作合言你法的定。（折偏）", chapter: "第九章 国家赔偿"},
  {id: 515, topic: "专题五 行政诉讼法", type: "multiple", question: "某县市场监督管理局和卫生局共同对张某的餐厅进行查封，给其造成了损失。张某认为该查封行为进法，费欲要求国家赔偿。根据国家赔偿法及相关规定，下列哪些说法是正确的？庆", options: {"A": "该县市场监督管理局和卫生局为共同赔偿义务机关（", "B": "该县人民政府为赔偿义务机关", "C": "张某可以在提起行政诉讼时一并提出赠偿要求", "D": "张某可以在申请行政复议时一并提出赔偿要求的养项中此"}, answer: "AD", explanation: "。A、B选项，证明商棕是开放的，直换证明品质，集体前棕是肆闭的，还明年价。“可川“商标是由可川县為技会中请注后，偿定货川在驾校商品上，许可本会成员便用，属产焦保商标因不是证明闻标，因此A选项正嘴，B选项错误。C选项，“河川“闻标顶燃健用了县使以上行改区划名称，但由干“可川“有其他合久，且已经法猎方你，可以他续使用，四北C途项借误。D选项，是市作为品的经售者，力了加以区购，对千自己销售的前品可以另行注册标，使川在产品的包装上，因此D选项正响。（法考2015）", chapter: "第九章 国家赔偿"},
  {id: 516, topic: "专题六 商标法", type: "multiple", question: "下列可以在我国申请注册的商标种类有？多选）", options: {"A": "证明商标", "B": "服务商标", "C": "集体商标", "D": "商品商标"}, answer: "ABCD", explanation: "。A选项，红新月不得作力商标使用。B选项，“叫只府”用在餐等度务中无不民影响，但用在酒店、桑伞等服务中存在不民形响、有害社会主义道德风岗，不得作为商标使用。C途项，国农知识产权局的标志属于中央国家机关的标志，不得作为商标使用。D选项，”中国强勿性产品认证（CCC）”标忘属于与尖施控制、子以保证的官方标志相同或近似的标记，不能作为商标使用。（2018，思维扩展）", chapter: "第一章 注册商标专用权的客体"},
  {id: 517, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列关于证明商标的说法哪些是正确的？", options: {"A": "由对某种商品或者服务具有监督能力的组织所控制", "B": "由对某种商品或者服务具有监督能力的组织成员内的单位或者个人使用于其商品或者服务", "C": "用以证明该商品或者服务的原产地、原料、制造方法、质量或者其他特定品质", "D": "以团体、协会或者其他组织名义注册，供该组织成员在商事活动中使用，以表明使用者在该组织中的成员资格"}, answer: "D", explanation: "。A、C选项，由于2020年新冠情的账响，以雷神山、停市山注册商标属于《商标法>第10条第1款第（八）项规定的有害于社会主义道德风尚或者有其他不良影响的情形，因此A、C选项不可以注册商标。B选项，根据《商标法>第10条第2款的规定，昆山属于县级以上行政区划的地名，不可以注册商标。D选项，本山可以注册商标。（新编，思维扩展）", chapter: "第一章 注册商标专用权的客体"},
  {id: 518, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列哪些可以作为商标申请注册？", options: {"A": "三维标志", "B": "声音", "C": "气味", "D": "朗色组合"}, answer: "ABCD", explanation: "。A选项，国家知识产权局作为国家机关不能申请商标，因此A选项不能作为商标注册。B选项，“扬州炒饭”是中餐莱肴通用名称，因此B选项不能作为而标注册。C选项，中回立任因此C选项不他作为而标注册。D选项，跟值店役犯了居咖呦的姓名权，因此D选项不能作为商标注册。（新编，思维扩展）", chapter: "第一章 注册商标专用权的客体"},
  {id: 519, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列哪些商标不能在我国获准注册？", options: {"A": "单一颜色商标", "B": "立体商标", "C": "位置商标", "D": "声音商标"}, answer: "ACD", explanation: "。A选项，一般商品在市场销售，不一定使用注册商标，目前只有烟草类产品必须使用注册商标，因此A选项错误。D选项，《我不是神》为电影名称，享有著作权，该所标报害其在先权利，不能获得注册，因此B选项正确。C选项，“我不是药神”作为商标能区分出商品或服务的规供者、具有显著性，因此C选项错谈。D选项，由干“我不是药神”享有著作权，一旦在市场上销售，格会役犯若作权，因此D选项错误。（2018，思维扩展）", chapter: "第一章 注册商标专用权的客体"},
  {id: 520, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列关于证明商标、集体商标的哪些说法是正确的？", options: {"A": "地理标志可以作为证明商标申请注册", "B": "地理标志可以作为集体商标申请注册", "C": "集体商标只能是服务商标", "D": "证明商标只能是商品商标"}, answer: "A", explanation: "。《商标法》第32条规定：“申请商标注册不得损害他人现有的在先权利，也不得以不正当手及抢先注册他人已经使用并有一定影响的商标”。本题中，米老风形象属于迪士尼公司的作品，因此侵犯他人的著作权，A选项正确。（新编）", chapter: "第一章 注册商标专用权的客体"},
  {id: 521, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，关于地理标志的说法正确的是：", options: {"A": "地理标志注册为商标必须为集体商标或证明商标", "B": "商标中有商品的地理标志，误导公众的，不予注册但可以使用", "C": "商标中有商品的地理标志，由于该商品并非来源于该标志所标示的地区，误导公众，即便已经善意取得注册仍可宜告无效", "D": "地理标志商标与普通商标之间不能进行近似性比较"}, answer: "BCD", explanation: "。A、B选项，《商·标法》第4条第1数中规定，自然人、法人或者其他组织在生产经营活动中，对其商品或者服务帘要取得商标专用权的，应当向国务院商标管理部门申请商标注册，因此商标申请人不得要在中国实际经营，但是应当有经管的资格，因此A选项错误，B选项正确。C选项，《商标法》第17条规定：“外国人或者外国企业在中国申请商标注册的，应当按其所属国和中华人民共和国签订的协议或者共同参加的国际条约办理，或者按对等原则办理”，外国人中请注舟商标没有居所的限定，因此C选项正确。D选项，（岗标法》第5条中规定，两个以上的自然人、法人或者其他组织可以共同向国务院商标管理部门申请注册同一商标，共同享有和行使该商标专用权，因此D选项正确。（2006）", chapter: "第一章 注册商标专用权的客体"},
  {id: 522, topic: "专题六 商标法", type: "multiple", question: "“慈溪蜜梨”产于浙江省宁波市慈溪市，因其不同于一般裂子，果大，水分特别充足，营养极为丰富而出名。现该地区欲对“慈溪密梨”地理标志进行注册保护，在商标法体系下可以如何申请注册？", options: {"A": "申请注册普通商标", "B": "申请注册地名商标", "C": "申请注册组合商标", "D": "申请注册证明商标"}, answer: "ABD", explanation: "。《商标法>第4条第1款中规定，自人、法人或者其他组织在生产经营活动中，对其商品或者服务留要取得商标专用权的，应当向国务专通六商标法良商标管理细门中济商标连进：资标连用干商业经营，店管进供，企业法人片可以从单生产迹管济，可以作方商标连后中请人，党政机关不能从单生产腔管语动，不中请注册声标，单业单位罚分情况，自负盈亏的华业单位可以从本生产经管，也可以作力前标注府中请人，全设收市业单位你馈国食牧，不能从卓生产径售，但是厚日中并来财事业单位的类登进行区分，只偿您院的说法，事业单位可以作力标注府中请人，因北A、B.D选项正嘴，C选项借误。（新偏）", chapter: "第一章 注册商标专用权的客体"},
  {id: 523, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列哪些不得作为商标注册的三维标志？", options: {"A": "仅有指定使用商品的通用形状、无显著特征的", "B": "仅由商品自身的性质产生的形状", "C": "使商品具有实质性价值的形状", "D": "为获取技术效果而需有的商品形状"}, answer: "BCD", explanation: "，A选项，《离你法》信18象规定：“中请商标注册成普办理其您商场事宜，平以自行办理，也可以类论依设立的商标代是机梅办理。外国人或者外国企业在中国中请场注滑和办理其他商标事宜的，应收费托优法设文的薄标代理机构办理”，四北人选项借视。B选项，（资你决）容19条第2款规定：“要托人中请注册的商标可能存在本法规定不得注册情形的，读坏代理机构应当明确否知委托人”，回此B选项正确。C选项，（闻标法）第19条第4款规定：“薄标代理机将除对其代理股务中请商标注册外，不得中请法册其他商标”，因此C选项正确。D选项，（前标法》第19条馆1款规定：“商标代理机构：对在代理过程中知录的被代理人的商业秘密，负有保密义务”，回此D选项正确。（2014）", chapter: "第一章 注册商标专用权的客体"},
  {id: 524, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列哪些标志可以作为商标使用？多选）", options: {"A": "同中华人民共和国国歌近似的", "B": "同政府间国际组织的名称近似，但经该组织同意的", "C": "缺乏显著特征的标志", "D": "同“红十字”的名称近似的"}, answer: "AB", explanation: "。《商标法》第18条第2款规定：“外国人或者外国企业在中国中请商标注册和亦理其他商标事宜的，应当委托依法设立的商标代理机构办理”，《商标条例》第5条第4款规定：“商标法第18条所称外国人或者外国全业，是指在中国设有经常居所或者营业所的外国人或者外国企业”，国此A、B选项得要委托代理机构，C、D选项元委托代理机构。（2012）", chapter: "第一章 注册商标专用权的客体"},
  {id: 525, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列哪些标志不得作为商标使用？", options: {"A": "带有民族歧视性的", "B": "带有欺骗性，容易使公众对商品的产地产生误认的", "C": "仅直接表示商品的质量、主要原料、功能、用途、重量、数量及其他特点的", "D": "同某国的国旗近似且未获得该国政府同意的"}, answer: "ABCD", explanation: "。根据《商标法》第68冬的规定，商标代理机构有下列行为的，由负资商标执法的部门责令限期改正，给子警告：构成犯罪的，依法迫究刑事资任：以证双其他商标代理机构等手段招休商标代理业务或者以其他不正当手段批乱岗标代理市场秩序的：代理不以他用为目的的吊宽前标注册申请：商标代理机构知道或者应当知通委托人申请注册的而标属于不得接受委托俏形，接收其委托的：商标代理机构除对其代理服务中请商标注册外，申请注册其他商标。四此A、B、C、D选项说法均正确。（新编）", chapter: "第一章 注册商标专用权的客体"},
  {id: 526, topic: "专题六 商标法", type: "multiple", question: "声音商标如何才能取得显著特征？", options: {"A": "可以用文字进行描述的声音", "B": "长期使用", "C": "设计独特", "D": "注册"}, answer: "BD", explanation: "。A选项，根据《商标条例>第85条的规定，商标代理从业人员不得以个人名义自行愤受委托，因此A选项错误。B选项，（商标法》第19条第4款规定：“商标代理机构除对其代理風务中请商标注册外，不得中请注册其他商标”，因此B选项正确。C选项，根据《商标法》第19条的规定，商标代理机构对在代理过程中知悉的被代理人的商业科密，负有保密义务，因此C选项错误。D选项，《商标法》第19条第2款规定：“委托人申请注册的商标可能存在本法规定不得注册情形的，商标代理机构应当明确告知委托人”，因此D选项正确。（新编）", chapter: "第一章 注册商标专用权的客体"},
  {id: 527, topic: "专题六 商标法", type: "multiple", question: "根据商标法的规定，下列哪些说法是正确的？", options: {"A": "申请注册的商标应当有新颖性", "B": "申请注册的商标应当有显著特征，便于识别", "C": "申请注册的商标应当有实用性，富有美", "D": "申请注册的商标不得与他人在先取得的合法权利相冲突"}, answer: "ABC", explanation: "。根据《商标法>第19条第3款的规定，商标代理机构知道或者应当知道委托人中请注册的商标属于商标法第4条（不以使用为目的的恶意申请）、第15条（代理人、代表人或其他特定关系人的抢注）和第32条（损害他人现有的在先权利或抢注已经使用并有一定影响的商标）规定情形的，不得接受其委托，因此A、B、C选项正确，D选项错误。（新编）", chapter: "第一章 注册商标专用权的客体"},
  {id: 528, topic: "专题六 商标法", type: "multiple", question: "河北省魏县出产的鸭梨营养丰富，口感独待，远近闻名，当地有关单位拟对其采取的保护措施中，哪些是不符合商标法规定的？梨上", options: {"B": "将鸭梨的形状申请注册为立体商标，使用于鸭梨上", "C": "将鸭梨的形状申请注册为立体商标，使用于鸭梨上", "D": "将\"香梨\"申请注册为文字商标，使用于鸭梨上", "A": "将\"魏县鸭梨\"申请注册为证明商标，使用于鸭梨上"}, answer: "CD", explanation: "。A选项，商标代理机构的股东不晨于商标代理的从业人员，因此可以以其他公司的名义申请商标，A选项正确。B选项，（商标法》第19条第3款规定：“商标代理机构知道或者应当知道委托人申请注册的商标属于本法第4条、第15条和第32条规定情形的，不得接受其委托”，因此B选项错误。C选项，《商标法》第19条第4款规定：“商标代理机构除对其代理服务申请商标注册外，不得申请注册其他商标”，因此C选项正确。D选项，（商标条例》第85条第2款规定：“商标代理从", chapter: "第一章 注册商标专用权的客体"},
  {id: 529, topic: "专题六 商标法", type: "multiple", question: "河川县盛产荔枝，远近闻名。该县成立了河川县荔枝协会，申请注册了“河川”商标，核定使用在荔枝商品上，许可本协会成员使用。加人该荔枝协会的农户将有“河川\"商标包装的荔枝批发给盛联超市销售。超市在销售该批荔枝时，在荔枝包装上还加贴了自己的注册商标“盛联”。下列哪些说法是正确的？多选）", options: {"A": "“河川”商标是集体商标", "B": "“河川\"商标是证明商标", "C": "“河川”商标使用了县级以上行政区划名称，应被宣告无效", "D": "盛联超市的行为没有侵犯商标权"}, answer: "AC", explanation: "。A.D选项，健<商标代是宣信管理定>第5答的定，商标代屋机梅从非回发加识产权局主管的商标事宜代理业券的，应当依法庆叶向回求知识产权府各震。筒标代理机均等震的有效期力了年。梦次居虎谷紧的有发期力3单，自原各震有效期满次日起计算，因此左遗项正确，D选项借误。B透项，（剪标代理篮管管观规定>第7条虎定：”闻标代理机析各爱信乌交生变化的，应当自实际发生受化虎管有关主管部门促记、他准之日起30日内向国双加识产权局办交更谷案，并提交相应片料”，因此B选项借煲。C选项，（司标代理宣管管理现定》第8条第3款规定：吻你代定不再从事商标代理业务前，成省自接对撤销、吊销决定书、水久停止受理其办理前际代理业务决定之日起30日内，按所法你法规现定和合同所定安客处理未办结的剪标代理业务”国此C选项正确。（新）", chapter: "第一章 注册商标专用权的客体"},
  {id: 530, topic: "专题六 商标法", type: "multiple", question: "根据《商标法》及相关规定，下列哪些标识不得作为商标使用？", options: {"A": "“红新月”名称及标志", "B": "“叫只鸡“在酒店等服务上", "C": "国家知识产权局的标志", "D": "“中国强制性产品认证（CCC）“标志"}, answer: "ABCD", explanation: "。A选项，（商标代理监督管理规定》第21条规定：以下信息应资记入商标代理机构和商标代理从业人员信用档紫：（一）商标代理机构和商标代理从业人员受到行政处罚的信息….”，因此A选项正确。B选项，《商标代理生督管理规定》第22条规定：商标代理机构应当按凤国家有关规定报送年度投告”，因此B选项正确。C选项，《商标代理监督管理规定》第24条规定：“知识产权管理部门依法对商标代理机构和商标代理从业人员代理行为进行监督检查商标代理机构和商标代理从业人员应当干以协助配合”，《商标代理监管管理规定》第25条第2款规定：“对存在商标代理违法违规行为的商标代理机构或者商标代理从业人员，知识产权管理部门可以依职资对其进行约谈、提出意见，督促其及时整改”，因此C选项正确。D选项，《商标代理监督管理规定》第23条规定：“商标代理机构故意犯知识产权，提交恶意商标注册申请，捐社会公共利丝，从事严重违法而标代理行为，性质恶劣、情节严重、社会危害较大，受到较重行政处罚的：按照《市场督管理严重违法失信名单管理办法》等有关规定列入严重违法失信名单”、因此D选项正确。（新编）又的取得", chapter: "第一章 注册商标专用权的客体"},

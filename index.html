<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026专利代理师 · 考试练习系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a24;
            --bg-card: #16161f;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --border: #2a2a3a;
            --patent-accent: #6c9bfb;
            --patent-glow: rgba(108, 155, 251, 0.3);
            --related-accent: #00d4aa;
            --related-glow: rgba(0, 212, 170, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
            padding: 24px;
        }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 80% 50% at 30% -20%, rgba(108, 155, 251, 0.06), transparent),
                radial-gradient(ellipse 60% 40% at 70% 100%, rgba(0, 212, 170, 0.05), transparent);
            pointer-events: none; z-index: -1;
        }
        .container { max-width: 720px; width: 100%; }
        header { text-align: center; margin-bottom: 48px; }
        h1 {
            font-size: 2.4rem; font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--patent-accent) 50%, var(--related-accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 12px;
        }
        .subtitle {
            color: var(--text-secondary); font-size: 1.05rem;
            margin-bottom: 8px;
        }
        .badge-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .badge {
            display: inline-block; padding: 4px 14px; border-radius: 20px;
            font-size: 0.82rem; font-weight: 500;
        }
        .badge-patent { background: rgba(108,155,251,0.12); color: var(--patent-accent); }
        .badge-related { background: rgba(0,212,170,0.12); color: var(--related-accent); }

        .cards { display: flex; flex-direction: column; gap: 20px; }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            border-radius: 16px 16px 0 0;
        }
        .card-patent::before { background: linear-gradient(90deg, var(--patent-accent), #a78bfa); }
        .card-related::before { background: linear-gradient(90deg, var(--related-accent), #6366f1); }

        .card:hover {
            transform: translateY(-4px);
            border-color: transparent;
        }
        .card-patent:hover {
            box-shadow: 0 8px 40px rgba(108,155,251,0.15);
            border-color: rgba(108,155,251,0.3);
        }
        .card-related:hover {
            box-shadow: 0 8px 40px rgba(0,212,170,0.15);
            border-color: rgba(0,212,170,0.3);
        }

        .card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .card-icon {
            width: 56px; height: 56px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; flex-shrink: 0;
        }
        .card-patent .card-icon { background: rgba(108,155,251,0.12); }
        .card-related .card-icon { background: rgba(0,212,170,0.12); }
        .card-title { font-size: 1.3rem; font-weight: 600; }
        .card-desc { color: var(--text-secondary); font-size: 0.92rem; margin-bottom: 16px; }
        .card-patent .card-title { color: var(--patent-accent); }
        .card-related .card-title { color: var(--related-accent); }

        .card-stats {
            display: flex; gap: 20px; flex-wrap: wrap;
        }
        .card-stat {
            font-size: 0.85rem; color: var(--text-muted);
        }
        .card-stat strong {
            color: var(--text-primary); font-weight: 600; font-size: 1rem;
        }

        .card-arrow {
            position: absolute; right: 28px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 1.4rem;
            transition: all 0.3s ease;
        }
        .card:hover .card-arrow {
            transform: translateY(-50%) translateX(4px);
        }
        .card-patent:hover .card-arrow { color: var(--patent-accent); }
        .card-related:hover .card-arrow { color: var(--related-accent); }

        footer {
            text-align: center; margin-top: 48px; padding-top: 24px;
            border-top: 1px solid var(--border);
            color: var(--text-muted); font-size: 0.85rem;
        }
        footer a { color: var(--text-secondary); text-decoration: none; }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .card { padding: 24px; }
            .card-stats { gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>2026专利代理师 · 考试练习系统</h1>
            <p class="subtitle">选择题在线刷题 · 含答案解析 · 韩龙讲专利</p>
            <div class="badge-row">
                <span class="badge badge-patent">专利法 775题</span>
                <span class="badge badge-related">相关法 833题</span>
            </div>
        </header>

        <div class="cards">
            <a href="patent.html" style="text-decoration:none;color:inherit">
                <div class="card card-patent">
                    <div class="card-header">
                        <div class="card-icon">⚖️</div>
                        <div class="card-title">专利法强化600题</div>
                    </div>
                    <div class="card-desc">涵盖专利法及其实施细则全部考点，包括专利申请、审查、授权、无效等核心知识点</div>
                    <div class="card-stats">
                        <div class="card-stat">共 <strong>775</strong> 题</div>
                        <div class="card-stat">单选 <strong>224</strong> 题</div>
                        <div class="card-stat">多选 <strong>551</strong> 题</div>
                        <div class="card-stat">30个专题模块</div>
                    </div>
                    <div class="card-arrow">→</div>
                </div>
            </a>

            <a href="related.html" style="text-decoration:none;color:inherit">
                <div class="card card-related">
                    <div class="card-header">
                        <div class="card-icon">📋</div>
                        <div class="card-title">相关法强化600题</div>
                    </div>
                    <div class="card-desc">覆盖民法、合同法、商标法、著作权法、反不正当竞争法等相关法律法规</div>
                    <div class="card-stats">
                        <div class="card-stat">共 <strong>833</strong> 题</div>
                        <div class="card-stat">单选 <strong>213</strong> 题</div>
                        <div class="card-stat">多选 <strong>589</strong> 题</div>
                        <div class="card-stat">10大专题</div>
                    </div>
                    <div class="card-arrow">→</div>
                </div>
            </a>
        </div>

        <footer>
            <p>题目来源：2026年专利代理师资格考试强化600题</p>
            <p style="margin-top:4px">进度自动保存至浏览器本地 · 刷新不丢失</p>
        </footer>
    </div>
</body>
</html>

  {id: 526, topic: "专题二十一 口头审理与证据", type: "single", question: "张某就李某的专利权提出无效宣告请求。关于该无效宣告请求的口头审理，下列说法哪些是正确的？", options: {"A": "李某不参加口头审理，可以缺席审理", "B": "因口头审理为公开审理，随李某前来旁听口头审理的某公司职员可以向李某传递信息", "C": "张某可以在口头审理的过程中放弃无效宣告请求的部分理由", "D": "口头审理终止后，张某和李某都有权阅读笔录，但对于笔录的差错，不能请求更正"}, answer: "C", explanation: "A选项主要起标识作用、B选项属 于与人机交互无关的显示装置际显示的图 案、D选项属于摄影范畴的作品，均不属于外 观设计的客体，不可获得外观设计专利权。 C选项中艺术花瓶的设计属于外观设计专利 的保护客体，当选。（2016）"},
  {id: 527, topic: "专题二十一 口头审理与证据", type: "multiple", question: "在复审程序和无效宣告程序的口头审理中，以下说法正确的是？", options: {"A": "合议组应当询问当事人是否请求审案人员回避，对于当事人请求审案人员回避的，合议组可以宣布中止口头审理", "B": "在无效宣告程序的口头审理中，当事人当庭增加理由或者补充证据的，合议组应当根据有关规定判断所述理由或者证据是否予以考虑", "C": "在复审程序的口头审理调查后，合议组可以就有关问题发表倾向性意见，必要时将其认为专利申请不符合专利法及其实施细则和审查指南有关规定的具体事实、理由和证据告知复审请求人，并听取复审请求人的意见", "D": "在无效宣告程序的口头审理辩论时，合议组成员不得发表自己的倾向性意见、也不得与任何一方当事人辩论"}, answer: "ABCD", explanation: "A选项的游戏界面、B选项的 层基壁纸、C选项的开机画面、D选项的图文 排版均属于与人机交互无关的显示装置所显 示的图案，不属于外观设计保护的客体，A、 B、C、D选项均正确。（2017改编）"},
  {id: 528, topic: "专题二十一 口头审理与证据", type: "multiple", question: "某无效宣告案件的口头审理，关于证人赵某和钱某出庭作证，以下说法正确的是？", options: {"A": "赵某是出具过证言并在口头审理通知书回执中写明的证人，可以就其证言出庭作证", "B": "钱某是专利权人在口头审理中向合议组提出出庭作证请求的证人，合议组可根据案件的具体情况决定是否准许", "C": "赵某和钱某不得旁听案件的审理", "D": "合议组询问赵某时，钱某不得在场，但需要钱某与赵某对质的除外"}, answer: "AB", explanation: "A选项是对产品的形状作出的 新设计，因此属于外观设计专利保护的客体。 B选项，霓虹灯的图案在不通电的情况下也 能显示，属于对产品的图案作出的设计、因此 属于外观设计专利保护的客体。C选项是美 术作品，属于著作权保护的客体，不属于外观 设计专利保护的客体。D选项，根据《审查指 南>第一部分第三章第7.4节的规定，要求专 利保护的局部外观设计仅为产品表面的图案 或者图案和色彩相结合的设计、不属于外观 设计专利保护的客体。（新编） 4、C。A选项属于司空见惯几何形状、D 选项是起标识作用的设计，因此均不属于外 观设计专利的保护客体。B选项，文字字体 没有以产品为载体，因此不属于外观设计专 利的保护客体。C选项，酒瓶标贴属于外观 设计专利的保护客体。（新编） 5、ABD。A选项，内部夹层设计是电脑 包内部的结构变化，没有改变电脑包的外形， 因此不属于外观设计专利保护的客体。B选 项属于以自然物原有形状作为主体的设计， 不能作为外观设计的保护客体。C选项中糕 点的六边形形状不属于惯常设计，是新设计， 属于外观设计专利保护的客体。D选项，对 于由多个不同特定形状或者图案的构件组成 的产品，如果构件本身不能单独出售且不能 单独使用，则该构件不属于外观设计专利保 护的客体。因此玩具中的一个插接块不属于 外观设计专利保护的客体。（新编，思维扩展）"},
  {id: 529, topic: "专题二十一 口头审理与证据", type: "multiple", question: "甲将在一无效宣告请求口头审理中作为证人出庭作证，下列说法正确的是：", options: {"A": "当事人在口头审理通知书回执中没有写明甲要参加口头审理，而是在口头审理中提出甲作为证人出庭作证请求的，合议组将不予准许", "B": "对方当事人对甲提出的与案件无关的问题，甲可以不回答", "C": "对方当事人无权对甲进行提问", "D": "合议组对甲提问时，甲应当作出明确回答"}, answer: "ACD", explanation: "A、C、D选项，根据《审查指南》 第一部分第三章第7.4节的规定，不能在产品 上形成相对独立的区域或者构成相对完整的 设计单元的局部外观设计。例如，水杯杯把 的一条转折线、任意截取的眼镜镜片的不规 则部分，不能作为外观设计保护的客体；仅为 产品表面的图案或者图案和色彩相结合的设 计，不能作为外观设计保护的客体，因此A、 C、D选项当选。B选项属于产品局部图案的 新设计，能构成相对独立、完整的设计单元， 可以作为外观设计保护的客体。（新编）"},
  {id: 530, topic: "专题二十一 口头审理与证据", type: "single", question: "在无效宣告程序的口头审理中，应当记录在口头审理笔录中的审理事项有：", options: {"A": "专利权人声明放弃的权利要求", "B": "双方当事人均认定的重要事实", "C": "请求人未经合议组许可中途退庭的事实", "D": "当事人声明放弃的无效宣告请求的范围、理由或证据"}, answer: "C", explanation: "A选项，根据《审查指南》第一部 分第三章第7.4节的规定，不能在产品上形成 相对独立的区域或者构成相对完整的设计单 元的局部外观设计不授予专利权，A选项不 当选。B选项，带有随机生成图案的漆扇，不 适于工业应用，不符合《专利法》第2条第4款 中有关外观设计的定义，B选项不当选。C、D 选项，根据《审查指南》第一部分第三章第7.4 节的规定，以自然物原有形状、图案、色彩作 为主体的外观设计（通常指自然物本身或自 然物仿真设计）不授予专利权，以大熊猫“花 花”为原型的玩具属于自然物本身，人体仿真 模型不属于自然物本身或自然物仿真设计的 范畴，因此C选项当选，D选项不当选。 （新编）"},
  {id: 531, topic: "专题二十一 口头审理与证据", type: "multiple", question: "在无效宣告程序口头审理中，当事人有哪些权利和义务？", options: {"A": "有权请求审案人员回避", "B": "发言和辩论仅限于合议组指定的与审理案件有关的范围", "C": "对另一方当事人提出的问题应该予以正面回答", "D": "当事人对自已提出的主张有举证责任，反驳对方主张的，应当说明理由"}, answer: "ABC", explanation: "A选项属于违反法律的外观设 计，不能被授予专利权。B选项属于包含中 国国旗的外观设计，不能被授子专利权。C 选项属于涉及政党的象征和标志、国家重大 政治事件的外观设计，不能被授予专利权。 D选项属于新设计，可以被授权专利权，因此 A、B、C选项正确。（新编）"},
  {id: 532, topic: "专题二十一 口头审理与证据", type: "multiple", question: "请求人赵某认为专利权人钱某拥有的一项实用新型专利权不具备专利法规定的创造性，向复审和无效审理部提出无效宣告请求，并提交了日文专利文献作为现有技术证据之一。以下说法正确的是？", options: {"A": "赵某应当提交该日文专利文献的中文译文，如果赵某未在举证期限内提交中文译文的，视为未提交", "B": "钱某对该日文专利文献的中文译文内容有异议的，应当在指定的期限内对有异议的部分提交中文译文。没有提交中文译文的，视为无异议", "C": "赵某和钱某就中文译文的异议部分达成一致意见的，以双方最终认可的中文译文为准", "D": "赵某和钱某未能就该日文专利文献的中文译文内容的异议部分达成一致意见，必要时复审和无效审理部可以指定翻译，所需翻译费用应由赵某和钱某各自承"}, answer: "ABCD", explanation: "A选项，根据《专利法》第25 条第1款第（六）项的规定，对平面印刷品的 图案、色彩或者二者的结合作出的主要超标 识作用的设计，不授予专利权。B选项，根据 《审查指亩》第一部分第三章第6.1.3节的规 定，涉及政党的象征和标志、国家重大政治事 件、伤害人民感情或者民族感情、宣扬封建 信的外观设计，不能被授予专利权。C选项。 《审查指南》第一部分第三章第6.1.1节规定： “包含中国国旗、国徽内容的外观设计、因违 反《中华人民共和国国旗法》《中华人民共和 国国徽法》，不能被授予专利权”，因此C选项 不当选。D选项，《审查指南》第一部分第三 章第6.1.3节规定：“包含天安门等著名建筑 物或者领袖肖像等内容的外观设计，不能被 授予专利权”，因此D选项不当选。（新编）"},
  {id: 533, topic: "专题二十一 口头审理与证据", type: "multiple", question: "无效宣告程序中，当事人提交的以下哪种证据无需办理公证等相关的证明手续？", options: {"A": "在美国出版、纸质发行的专业期刊", "B": "在德国举办的某展览会的会议图册", "C": "某产品在中国台湾地区公开制造、销售的有关合同和票据", "D": "从中国国家图书馆获得的英国专利文件"}, answer: "AB", explanation: "A、B选项中外观设计产品的公 开日期均早于该专利申请的申请日，因此将 成该申请的现有设计。C选项中外观设计产 品的公开日期与该专利申请的申请日为同一 天，因此不构成该申请的现有设计。D选项 中外观设计专利申请的授权公告日晚于该专 利申请的申请日，因此不构成该申请的现有 设计。（2016改编）"},
  {id: 534, topic: "专题二十一 口头审理与证据", type: "multiple", question: "针对一项有效的中国专利，王某提出无效宣告请求，其中使用了一件在美国形成的域外证据，下列说法错误的是？", options: {"A": "该证据已为生效的人民法院裁判、行政机关决定或仲裁机构裁决所确认的，无需办理有关证明手续", "B": "该证据需经中国公证机关予以证明", "C": "如果该证据可以从国内公共图书馆获得，无需办理有关证明手续", "D": "如果对方当事人认可该证据的真实性，无需办理有关证明手续"}, answer: "AC", explanation: "A、C两个选项属于申请在先公 开在后的外观设计专利，符合构成抵独申请 的条件，因此A、C选项正确。B、D选项，发明 专利、实用新型专利与外观设计之间互相不 构成抵触申请，因此B、D选项错误。（新编） 12、BD。《审查指南》第四部分第五章第 5节规定：“判断对比设计是否构成涉案专利 的抵触申请时，应当以对比设计所公告的专 利文件全部内容为判断依据。与涉案专利要 求保护的产品的外观设计进行比较时，判断 对比设计中是否包含有与涉案专利相同或者 实质相同的外观设计。例如，涉案专利请求 保护色彩，对比设计所公告的为带有色彩的 外观设计，即使对比设计未请求保护色彩，也 可以将对比设计中包含有该色彩要素的外观 设计与涉案专利进行比较；又如，对比设计所 公告的专利文件含有使用状态参考图，即使 该使用状态参考图中包含有不要求保护的外 观设计，也可以将其与涉案专利进行比较，判 断是否为相同或者实质相同的外观设计”，因 此A、C选项错误，B、D选项正确。(2010)"},
  {id: 535, topic: "专题二十一 口头审理与证据", type: "single", question: "无效宣告程序中关于证据的质证，以下哪些说法是正确的？", options: {"A": "证据应当具有新颖性、合法性和真实性，合议组在确定证据具有以上性质之后可以将其作为认定事实的依据", "B": "证据应当具有新颖性、合法性、真实性和公开性，合议组在确定证据具有以上性质之后可以将其作为认定事实的依据", "C": "质证时当事人应当针对证据的证明力有无以及证明力的大小，进行质疑、说明和辩驳D,质证的过程应当围绕证据的关联性、合法性、真实性进行", "D": ""}, answer: "B", explanation: "根据《审查指南》第四部分第五 章第4节的规定，在判断外观设计是否符合 专利法第23条第1款、第2款规定时，应当基 于涉案专利产品的一般消费者的知识水平和 认知能力进行评价，因此B选项正确。（2018）"},
  {id: 536, topic: "专题二十一 口头审理与证据", type: "multiple", question: "在无效宣告程序中，下列有关物证和证人证言的说法哪些是正确的？", options: {"A": "当事人提交物证的，应当在举证期限内提交足以反映该物证客观情况的照片和文字说明，具体说明依据该物证所要证明的事实", "B": "对于经公证机关公证封存的物证，当事人在举证期限内可以仅提交公证文书而不提交该物证", "C": "证人根据其经历所作的判断、推测或者评论可以作为认定案件事实的依据", "D": "证人无正当理由不出席口头审理的，其所出具的书面证言不能单独作为认定案件事实的依据"}, answer: "ABC", explanation: "A选项，单一色彩的外观设计 仅作色彩改变，构成实质相同的外观设计。 B选项，塑料杯与玻璃杯形状、图案、色彩均 相同，仅材质不同，属于常用材料的替换，构 成相同的外观设计。C选项，将某一设计要 素整体置换为该类产品的惯常设计的相应设 计要素，构成实质相同的外观设计。D选项， 电话机与玩具电话的用途不同，二者不属于 相同或者相近种类的产品，不构成相同或实 质相同。（2018）"},
  {id: 537, topic: "专题二十一 口头审理与证据", type: "single", question: "下列关于无效宣告程序中证据的说法哪些是正确的？", options: {"A": "没有证据或者证据不足以证明当事人的事实主张的，由负有举证责任的当事人承担不利后果", "B": "对方当事人对证据的中文译文内容存在异议时，应当在指定的期限内对有异议的部分提交中文译文", "C": "公证文书的结论均可以作为认定案件事实的依据", "D": "申请日后形成的记载有使用公开内容的书证不能用于证明专利在申请日前使用公开"}, answer: "A", explanation: "A选项中座椅与手机支架用途 不同，不属于相同或相近种类的产品，不具有 判断是否属于相同或实质相同的前提条件， 正确。B选项中的圆珠笔和自动铅笔用途相 同，二者在外观设计上的区别属于不易察觉 到的局部的细微差异，属于实质相同的外观 设计。C选项，具有电子时钟和收音机双功 能的产品与另一种纯电子时钟产品，存在部 分相同用途，属于相近种类的产品，且二者的 外观设计相同，因此属于实质相同的外观设 计。D选项的珠宝盒与包装盒均可用于产品 包装，属于相近种类产品，同时形状、图案以 及色彩均相同，属于实质相同的外观设计。 (2016)"},
  {id: 538, topic: "专题二十一 口头审理与证据", type: "multiple", question: "甲对乙的实用新型专利权提出无效宣告请求，甲提供的证据仅为证人张某在公证人员面前作出书面证言的公证书原件，内容为张某在涉案专利申请日前购买了与涉案专利相同的空调。在口头审理中张某未出庭作证，且口头审理当庭调查发现张某不属于确有困难不能出席口头审理作证的情形。下列说法正确的是？", options: {"A": "甲提供了该公证书原件，在没有其他证据推翻的情况下，一般应当认定该公证书的真实性", "B": "该公证书是由公证人员作出，因此该公证书能证明张某在涉案专利申请日前确实购买过空调", "C": "该公证书是由公证人员作出，因此该公证书能证明张某在涉案专利申请日前确实购买了与涉案专利相同的空调", "D": "张某未出席口头审理进行作证，其书面证言不能单独作为认定案件事实的依据"}, answer: "ABCD", explanation: "，根据《审查指言》第四部分 第五章第5.1.2节的规定，如果区别仅属于： 一般注意力不能察觉到的局部的细微差异、 将某一设计要素整体置换为该类产品的惯管 设计的相应设计要素、将对比设计作为设计 单元按照该种类产品的常规排列方式作重复 排列、局部外观设计要求保护部分在产品整 体中的位置和/或比例关系的常规变化，则涉 案专利与对比设计实质相同，因此A、B、C、D 选项均正确。（2012改编）"},
  {id: 539, topic: "专题二十一 口头审理与证据", type: "multiple", question: "无效宣告程序中关于证据，以下哪些说法是正确的？", options: {"A": "对于互联网证据，公众能够浏览互联网信息的最阜时间为该互联网信息的公开时间，一般以互联网信息的发布时间为准", "B": "申请日后形成或公开的证据，不能作为现有技术的证据使用", "C": "合议组在案件审查中不需要有关单位或者专家对案件中涉及的技术内容和问题提供咨询性意见", "D": "在无效宣告程序中，当事人在提交样品等不作为证据的物品时，有权以书面方式请求在其案件审结后取走该物品"}, answer: "ABC", explanation: "A选项中互为镜象对称的椅 子、B选项中难以察觉细微差异的两扇百叶 窗、C选项中图案色彩相同的两个长方体包 装盒高度略有不同，都属于实质相同的情形， 因此A、B、C选项正确。D选项，外观设计实 质相同的判断仅限于相同或者相近种类的产 品外观设计，相近种类的产品是指用途相近 的产品。铅笔和巧克力不属于相同或者相近 种类的产品，不鼻于实质相同判断的对象。 (2014)"},
  {id: 540, topic: "专题二十一 口头审理与证据", type: "multiple", question: "李某对张某的专利权提出无效宣告请求,理由是权利要求1与对比文件1的区别特征X是所属领域的公知常识，权利要求1不具备创造性。下列说法哪些是正确的？", options: {"A": "李某必须提交证据证明区别特征X是所属领域的公知常识", "B": "李某可以在口审时提交公知常识性证据，证明区别特征X是所属领域的公知常识", "C": "李某可以在口审结束后无效决定作出之前，提交公知常识性证据，证明区别特征X是所属领域的公知常识", "D": "张某认可李某提交的公知常识性证据，合议组可以确认其证明力"}, answer: "AB", explanation: "A选项中，区别在于局部外观 设计要求保护部分在产品整体中的位置和！ 或比例关系的常规变化、B选项中甲座柯仅 将乙座椅作为设计单元按照该种类产品的常 规排列方式作重复列，都属于实质相同的 外观设计，因此A、B选项正确。C选项，如果 涉案专利与对比设计仅属于常用材料的替 换，或者仅存在产品功能、内部结构、技术性 能或者尺寸的不同，而未导致产品外观设计 的变化，二者仍于相同的外观设计。C选 项两个玻璃杯仅材料不同，形状、图案以及色 彩均相同，属于相同的外观设计。D选项，浴 巾和地毯的产品种类不相同也不相近，不属 于实质相同判断的对象。（2015改编）"},
  {id: 541, topic: "专题二十一 口头审理与证据", type: "single", question: "王某提出一项无效宣告请求，理由是权利要求1与对比文件1的区别特征A是所属技术领域的公知常识，因此权利要求1不具备创造性。下列说法正确的是？", options: {"A": "王某主张区别特征A是所属技术领域的公知常识，对其主张承担举证责任", "B": "王某可以在口审辩论终结前提交公知常识性证据，证明区别特征A是所属领城的公知常识", "C": "王某可以通过教科书或者技术词典、技术手册等工具书记载的技术内容来证明A是本领域的公知常识", "D": "王某必须在提出无效宣告请求之日起一个月内提交公知常识性证据，证明区别特征A是所属领域的公知常识"}, answer: "C", explanation: "相近种类的产品是指用途相近 的产品。A选项，机械表和电子表的用途相 同，二者属于相同种类的产品。B选项，玩具 汽车和汽车的用途既不相同也不相近，二者 属于不同种类的产品。C选项，带MP3的手 表和普通手表部分用途相同，都具有计时的 用途，二者属于相近种类的产品，当选。D选 项，毛巾和地毯的用途既不相同也不相近，二 者属于不同种类的产品。（2019）"},
  {id: 542, topic: "专题二十一 口头审理与证据", type: "multiple", question: "针对甲的一项专利权，请求人乙提出无效宣告请求，认为权利要求1相对于证据1和公知常识的结合不具备创造性，下列说法正确的有？", options: {"A": "乙未能举证证明或未能充分说明某技术手段是本领域公知常识，且甲不予认可的，合议组对有关公知常识的主张不予认可", "B": "合议组认定某技术手段是本领域公知常识，合议组可以引入公知常识性证据", "C": "乙主张某技术手段是本领域公知常识，乙应当承担举证责任", "D": "教科书、技术手册、专利文献等可以作为公知常识性证据"}, answer: "ABC", explanation: "《审查指南》第四部分第五章 第5.1.1节规定：“在确定产品的种类时，可以 参考产品的名称、国际外观设计分类以及产 品销售时的货架分类位置，但是应当以产品 的用途是否相同为准….”，因此A、B、C选 项正确，D选项错误。（2019）"},
  {id: 543, topic: "专题二十一 口头审理与证据", type: "multiple", question: "关于无效宣告程序中的证据，下列说法正确的是：", options: {"A": "有效公证文书所证明的事实，通常可以作为认定事实的依据", "B": "保密会议中的发言因存在保密义务而不构成专利法意义上的公开", "C": "合议组一般不主动调查收集审查案件需要的证据", "D": "公众能够浏览互联网信息的最早时间为该互联网信息的公开时间"}, answer: "ABCD", explanation: "《审查指南》第四部分第五章 第6.2.2节规定：“以下几种类型的转用属于 明显存在转用手法的启示的情形，由此得到 的外观设计与现有设计相比不具有明显区 别：(1)单纯采用基本几何形状或者对其仅作 细微变化得到的外观设计；(2)单纯模仿自然 物、自然景象的原有形态得到的外观设计； (3)单纯模仿著名建筑物、著名作品的全部或 者部分形状、图案、色彩得到的外观设计；（4) 由其他种类产品的外观设计转用得到的玩 具、装饰品、食品类产品的外观设计。上述情 形中产生独特视觉效果的除外”，因此A、B、 C、D选项均正确。(2011)"},
  {id: 544, topic: "专题二十一 口头审理与证据", type: "multiple", question: "下列关于无效宣告程序中证据的说法正确的是：", options: {"A": "对于互联网证据的公开时间，一般以互联网信息的发布时间为准", "B": "提供域外证据的，当事人必须办理相关的证明手续", "C": "申请日当天形成的记载有使用公开或者口头公开内容的书证，可以用来证明专利在申请日前使用公开或者口头公开", "D": "互联网证据必须在口头审理当庭进行演示才能证明其真实性外观设计的申请文件与初步审查"}, answer: "AC", explanation: "根据《审查指南》第四部分第五 章第6.1节的规定，在判断外观设计是否具有 明显区别时，一般要考虑使用时容易看到的 部位，其中D选项为瓶底，一般不被注意，因 此产生不了明显区别，而A选项为一般消费 者容易关注的区域，通过增加图案产生了明 显区别。B、C选项分别为饮料瓶的瓶颈和瓶 肩，其中瓶颈处的形状属于该类产品的惯常 设计，在判断时其余设计的变化通常对整体 视觉效果更具有显著的影响，因此瓶肩的设 计可以产生明显区别。（新编，思维扩展）"},
  {id: 545, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "下列哪个外观设计专利申请中写明的使用外观设计的产品名称是正确的？", options: {"A": "手机", "B": "中型书柜", "C": "电子设备", "D": "人体增高鞋垫"}, answer: "ABCD", explanation: "A选项属于单纯模仿自然 物的原有形态得到的外观设计，不具有明显 区别。B选项属于由其他种类产品的外观设 计转用得到的玩具，不具有明显区别。C选 项的区别点属于局部细微变化，其对整体视 觉效果不足以产生显著影响，不具有明显区 别。D选项中涉案专利未请求保护色彩，因 此是否具有明显区别的判断仅对比形状与图 崇。盘子公开了形状，布料公开了图案，二者 属于显而易见的组合，与现有设计特征的组 合相比不具有明显区别，因此A、B、C、D选项 均当选。（2018）"},
  {id: 546, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "下列在外观设计请求书中填写的使用外观设计的产品名称哪些是正确的？", options: {"A": "DVD", "B": "办公用品", "C": "图形用户界面", "D": "成套沙发"}, answer: "ABD", explanation: "《审查指南》第四部分第五章 第6.2.2节规定：“以下几种类型的转用属于 明显存在转用手法的启示的情形，（3）单纯 模仿著名建筑物、著名作品的全部或者部分 形状、图案、色彩得到的外观设计；(4)由其他 种类产品的外观设计转用得到的玩具、装饰 品、食品类产品的外观设计。”，因此C选项明 显存在转用。A、B、D选项与上述情形相反， 不属于明显存在转用手法启示的情形。（新 编，思维扩展）"},
  {id: 547, topic: "专题二十二 外观设计的申请文件与初步审查", type: "single", question: "下列在请求书中写明的使用外观设计的产品名称哪些是正确的？", options: {"A": "IPAD", "B": "床上用品", "C": "手风琴", "D": "灯"}, answer: "B", explanation: "《审查指南》第四部分第五章第6 节规定：“现有设计特征，是指现有设计的部 分设计要素或者其结合，如现有设计的形状、 图案、色彩要素或者其结合，或者现有设计的 某组成部分的设计，如整体外观设计产品中 的零部件的设计”，因此A、C、D选项属于现 有设计特征，B选项不属于现有设计特征，当 选。（2017)"},
  {id: 548, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "下列外观设计申请的名称符合要求的是？", options: {"A": "绘图软件的图形用户界面", "B": "Type-C数据线", "C": "智能手机的局部", "D": "一种户外娱乐设施"}, answer: "ACD", explanation: "《审查指南》第四部分第五章 第7节规定：“合法权利，是指依照中华人民 共和国法律享有并且在涉案专利申请日仍然 有效的权利或者权益。包括商标权、著作权、 企业名称权（包括商号权）、肖像权以及知名 商品特有包装或者装潢使用权等”，因此A、 C、D选项正确，B选项不属于《专利法》第23 条第3款中规定的合法权利类型。（2017）"},
  {id: 549, topic: "专题二十二 外观设计的申请文件与初步审查", type: "single", question: "关于外观设计专利申请视图，下列说法正确的有：", options: {"A": "申请局部外观设计专利的，应当提交整体产品的视图，并用虚线与实线相结合的方式或者其他方式表明所需要保护部分的内容", "B": "产品设计要点仅涉及一个或几个面的，应当提交所涉及面的正投影视图", "C": "产品使用时不容易看到或者看不到的面，可以省略相应视图", "D": "局部外观可以用阴影线、指示线、中心线、尺寸线、点划线等线条表达外观设计的形状"}, answer: "B", explanation: "《审查指南》第四部分第五章第 7.2节规定：“在接触或者可能接触他人享有 著作权的作品的情况下，未经着作权人许可， 在涉案专利中使用了与该作品相同或者实质 性相似的设计，从而导致涉案专利的实施将 会损害在先著作权人的相关合法权利或者权 益的，应当判定涉案专利权与在先着作权相 冲突”，因此B选项正确。（2018）"},
  {id: 550, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "下列关于外观设计专利申请中提交的图片或照片，不符合规定的是？", options: {"A": "图片的绘制使用双点划线来表示细长物品的省略部分", "B": "在图片中用指示线表示剖切位置和剖切方向", "C": "对需要依靠衬托物来清楚显示产品外观设计的申请，拍摄照片时保留了衬托物", "D": "后视图与主视图相同时省略主视图"}, answer: "ABCD", explanation: "A选项关于专利排他偿的 表述过于绝对。专利法规定了不视为侵犯 专利权的五种情形，例如专利技术的先用者 可以在原有范围内继续为生产经营目的实 施该专利技术，专利权人无权禁止，A选项 说法错误。B选项，获得专利权的意义并不 在于可以自由地实施专利技术，而是获得了 持他权。能否自由实施专利技术，要看在行 为人申请专利之前，是否有申请日更早的专 利。如果实施的技术落入申请日更早的专 利的保护范围内，其行为仍然构成专利受 权，B选项说法错误。C选项是针对有形财 产排他性的概念，不适用于专利。专利属于 无形财产，专利议的行使不存在占有、妨害 或损毁，说法错误。D选项，有些国家没有 实用新型专利制度，比如美国、D造项说法 误。（2018）"},
  {id: 551, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "提交外观设计申请的视图时，下列说法正确的是？", options: {"A": "对于立体产品的外观设计，产品设计要点涉及六个面的，应当提交六面正投影视图", "B": "对于组装关系唯一的组件产品的外观设计，应当提交组合状态的视图", "C": "对于平面产品的外观设计，产品设计要点涉及一个面的，可以仅提交该面正投影视图", "D": "对于包括图形用户界面的产品外观设计，如果设计要点仅在于图形用户界面，至少应当提交图形用户界面所涉及面的产品正投影视图"}, answer: "BCD", explanation: "A选项，《专利法》第16条第2 款规定：“专利权人有权在其专利产品或者 该产品的包装上标明专利标识”，标注专利 标识是权利，不是必须履行的义务，因此A 选项错误。B选项，根据《专利标识标法办 法》第5条第1款的规定，标注专利标识的， 应当采用中文标明专利权的类别、B选项正 确。C选项，根据《专利标识标注办法》第7 条的规定、专利权效授予前，标注专利申请 号时应标明“专利申请，尚未授权”字样，C 选项正确。D选项，根据《细则》第99条的规 定，专利标识不符合规定的，由县级以上负 责专利执法的部门责令改正，D选项正确。 （2015改编）"},
  {id: 552, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "下列各图是一款电饭煲的外观设计专利申请的视图，已失显错误？立体图主视图左俯视图仰O", options: {"A": "左视图", "C": "俯视图D.仰视图", "B": "右视图", "D": ""}, answer: "B", explanation: "A选项，根据《专利法》第68条 的规定，假冒专利行为由负责专利执法的部 门进行查处，因此A选项错误。B、C选项， 《专利标识标注办法》第5条规定：“标注专 利标识的，应当标明下述内容：（二）国 家知识产权局授予专利权的专利号。除上 述内容之外，可以附加其他文字、图形标记， 但附加的文字、图形标记及其标注方式不得 误导公众”，因此B选项正确，C选项错误。 D选项，根据《专利标识标注办法》第4条的 规定，可以在专利产品、依照专利方法直接 获得的产品、该产品的包装或者该产品的说 明书等材料上标注专利标识，D选项正确。 （2012改编）"},
  {id: 553, topic: "专题二十二 外观设计的申请文件与初步审查", type: "single", question: "ABD。本题中，已知主视图", options: {"A": "左视图产品左低右高、左宽右窄，因此，产", "B": "右视图中产品右侧也存在明显的八字形转", "C": "俯视图俯视图正确。根据主视图和俯视图", "D": "仰视图廊绘制不完整，主视图中产品底部条在仰视图中没有相应的表达，因"}, answer: "A", explanation: "A选项，专利标识标注不当可能 构成假冒专利行为，也可能不构成假冒专利 行为，只是不符合标注规定，需要具体判断， 因此A选项正确。.B、C选项，根据《专利标 识标注办法》第5条第1款的规定，标注专利 标识的，应当标注专利权的类别和专利号， 因此B、C选项错误。D选项，根据《专利标 识标注办法》第8条第1款的规定，专利标识 不符合规定的，由管理专利工作（现改为专 利执法）的部门责令改正，而不是由国务院 专利行政部门责令改正，因此D选项错误。 （2013改编）"},
  {id: 554, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "关于局部外观设计，下列说法哪些是正确的？", options: {"A": "涉及整体产品局部设计的，应当提交整体产品的视图，并清楚地显示该局部在整体产品中的位置和比例关系局部外观设计", "C": "视图中可以用单一颜色的不透明层覆盖不需要保护的部分", "D": "要求保护的局部与其他部分之间没有明确分界线的，应当用点划线表示分界线", "B": "局部外观设计专利申请的视图应包含局部放大图"}, answer: "AD", explanation: "A选项，甲企业为专利权人，有 权在其专利产品或者该产品的包装上标明 专利标识，A选项正确。B、C选项，李某为 职务发明创造的发明人，没有申请专利、实 施专利的权利，因此B、C选项错误。D选 项，李某作为发明人，有权在专利文件（包括 分案申请）中写明自已是发明人，因此D选 项正确。（新编）"},
  {id: 555, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "外观设计专利申请简要说明中含有的下列哪些内容不符合相关规定？", options: {"A": "外观设计产品的名称为“人体增高鞋垫”", "B": "外观设计产品是一种用来烧开水的电器，热效率高、省电", "C": "设计要点在于产品表面的图案美观大方", "D": "指定主视图和俯视图用于出版专利公报"}, answer: "BD", explanation: "A、B选项，根据《专利权质押登 记办法》第3条第3款的规定，专利权质权自 国家知识产权局登记时设立，因此A选项错 误，B选项正确。C、D选项，根据《专利法》 第10条第3款的规定，专利权的转让自登记 之日（手续合格通知书的发文日)起生效，因 此C选项错误，D选项正确。（新编）"},
  {id: 556, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "下列写人外观设计专利申请简要说明中的内容，哪个是错误的？", options: {"A": "外观设计产品名称是沙发", "B": "产品内部设有加热装置", "C": "省略仰视图", "D": "本外观设计的形状是设计要点"}, answer: "BCD", explanation: "A选项，《专利权质押登记办 法》第3条第2款规定：“质押合同可以是单 独订立的合同，也可以是主合同中的担保条 款”，因此A选项错误。B选项，《细则》第15 条第3款规定：“以专利权出质的，由出质人 和质权人共同向国务院专利行政部门办理 出质登记”，因此B选项正确。C选项，《专 利权质押登记办法》第3条第1款规定：“以 专利权出质的，出质人与质权人应当订立书 面合同”，因此C选项正确。D选项，《专利 权质押登记办法》第17条规定：“专利权质 押期间，出质人未提交质权人同意其放弃该 专利权的证明材料的，国家知识产权局不予 办理专利权放弃手续”，因此D选项正确。 （2013改编）"},
  {id: 557, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "以下哪些内容可以在外观设计简要说明中写明？", options: {"A": "外观设计产品的技术效果", "B": "外观设计产品的底部是透明的", "C": "外观设计产品的内部结构", "D": "请求保护的外观设计包含有色彩"}, answer: "AD", explanation: "A、C选项，《专利权质押登记办 法》第11条规定：“经审查发现有下列情形 之一的，国家知识产权局作出不予登记的决 定，并向当事人发送《专利权质押不予登记 通知书》：（八）以共有专利权出质但未 取得全体共有人同意且无特别约定的：（九） 专利权已被申请质押登记且处于质押期间 的”，因此A选项正确，C选项错误。B选项， 申请专利权质押登记一般情况下无需提交 专利权评价报告，B选项错误。D选项，《专 利权质押登记办法》第18条第1款规定：“专 利权质押期间，出质人未提交质权人同意转 让或者许可实施该专利权的证明材料的，国 家知识产权局不予办理专利权转让登记手 续或者专利实施许可合同备案手续”，D选 项正确。(2016）"},
  {id: 558, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "下列哪些属于在外观设计专利申请的简要说明中必要时应当写明的内容：", options: {"A": "花布写明单元图案四方连续无限定边界", "B": "本外观设计套件1为床单，套件2为枕套，套件3为被套", "C": "使用时底面不常见，省略仰视图", "D": "细长物品的长度采用省略画法"}, answer: "ABC", explanation: "《专利权质押登记办法》第11 条规定：“…….·有下列情形之一的，国家知识 产权局作出不予登记的决定….：（一）出质 人不是当事人申请质押登记时专利登记 记载的专利权人的；（二）专利权已终止或名 已被宣告无效的………（四）专利权没有按屋 规定缴纳年费的·….（十一）专利权已被启 动无效宣告程序的，但当事人被告知该情况 后仍声明同意继续办理专利权质押登记的 除外”，A、B选项分别属于上述（一）（二）情 形，C选项处于年费滞纳期的属于没有按照 规定缴纳年费的情形，不予登记。D选项当 事人已经知道专利权处于无效程序中，但仍 然同意继续办理质押登记的，予以登记。 （新编）"},
  {id: 559, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "下列关于局部外观设计申请的简要说明，说法正确的有：", options: {"A": "用虚线与实线相结合以外的方式表示要求保护的局部外观设计的，应当在简要说明中写明要求保护的局部", "B": "用点划线表示要求保护的局部与其他部分之间分界线的，可以不在简要说明中写明", "C": "必要时应当写明要求保护的局部的用途，并与产品名称中体现的用途相对应", "D": "指定的最能表明设计要点的图片或照片中应当包含要求保护的局部外观设计"}, answer: "ACD", explanation: "A选项，根据《专利法》第10 条第3款的规定，转让专利申请权或者专利 权的，当事人应当订立书面合同，并向国务 院专利行政部门登记，A选项正确。B选项， 一般来说，专利实施许可合同自订立之日起 生效，无须登记，B选项错误。C选项，专利 权人放弃其专利权的，经国务院专利行政部 门登记和公告生效，C选项正确。D选项，专 利权质权经国家知识产权局登记生效，D选 项正确。（2013改编）"},
  {id: 560, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "关于涉及图形用户界面的产品外观设计，下列说法正确的有：", options: {"A": "设计要点仅在于图形用户界面的产品外观设计，可以以局部外观设计方式提交申请", "B": "可以通过视图带有图形用户界面所应用产品的方式提交局部外观设计", "C": "可以通过视图不带有图形用户界面所应用产品的方式提交局部外观设计", "D": "对于动态图形用户界面，应当在变化过程中选择任一帧的视图作为主视图"}, answer: "CD", explanation: "本题中，甲的实用新型为基础 专利，乙的发明为改进专利，乙若不经甲许 可实施自己的发明专利，必然会对甲的专利 构成侵权；同样的，甲若实施乙的专利，也需 经乙的许可，否则会对乙的专利构成侵权； 双方可以通过交叉许可的方式互相实施对 方的专利；任何第三方需要实施乙的发明专 利，需经甲、乙都同意才可实施，否则必然会 同时侵犯甲、乙二人的专利权，因此A、B选 项错误，C、D选项正确。（2013）"},
  {id: 561, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "下列关于要求本国优先权的条件说法正确的是？", options: {"A": "要求本国优先权的外观设计专利申请，其在先申请可以是发明，也可以是实用新型", "B": "要求本国优先权的外观设计专利申请，其在先申请可以是外观设计", "C": "要求本国优先权的实用新型专利申请，其在先申请可以是发明，也可以是实用新型", "D": "要求本国优先权的实用新型专利申请，其在先申请可以是外观设计"}, answer: "AC", explanation: "《专利法》第11条规定：“发明 和实用新型专利权被授予后，除本法另有规 定的以外，任何单位或者个人未经专租权人 可，都不得实前美专利，目不得告生产经 管目的制造、使用、并诺售、销售、进口其 专利产品、或者使用美中两方法以及使用、 年销售、销售、进口债图诚专明方直接 获得为产品、观设计专用权损授手，否 钉单位或者个人考自专用权人许可，都不得 美拿专用、日不得为生产目管言的制造、 卡诺销售、销赁、进口击外现造计专利产 品”，C类项的说法符合额策、目造项、 方法发明专利析人有权做土趣人为生产措 能目的制造留其专明方经直指强得的产 马，但关不能期止做人铜秀当但方法通福 同的产品，比如，祖他人保护一中销备等复 结万法，其有权明土他人为生产经营言的 里其专利工法制造正常，但是元见禁止售人 但照其他方法获得相同的主索，因此B选项 错误。D选项，券现设计专用视人不能禁止 他人使用其专用产品、因此的造项错误。 （2017改编）"},
  {id: 562, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "一件中国外观设计专利申请，申请日为2023年12月30日，该申请被授权之前，申请人想增加同一产品相同主题的相似设计，于是在2024年3月30日又提出一件外观设计专利申请，并要求在先申请的优先权，以下说法正确的有：", options: {"A": "2024年3月30日的外观设计专利申请可以享有2023年12月30日的专利申请的国内优先权", "B": "2024年3月30日的外观设计专利申请不可以享有2023年12月30日的专利申请的国内优先权", "C": "不需要再次申请外观设计专利申请，直接在首次申请中通过主动修改的方式补人相似设计即可", "D": "外观设计申请只能享有外国优先权，不能享有本国优先权"}, answer: "ACD", explanation: "、A选项，专用浸呢不曾要行 为人主观美意、因此甲公司以主产经营为目 封未经专利极人许可销售其告网产品稳成 专利侵权。B选项，自用不真面生产经营目 封，不构或侵权。C选项，为显未盈利，但其 创造、错富行为属于为生干创营目的，仍细 式侵权。D选项，医服虽治病人属于专生产 经营目的，因此了的行为构成煲级。（2019）"},
  {id: 563, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "关于外观设计专利申请的优先权，下列说法错误的是：", options: {"A": "外观设计专利申请的申请人要求外国优先权，如果其在先申请未包括对外观设计的简要说明，则不能享有优先权", "B": "外观设计专利申请的申请人要求外国优先权，其在先申请未包括对外观设计的简要说明，如果提交的简要说明未超出在先申请文件的图片或者照片表示的范围的，不影响其享有优先权", "C": "外观设计专利要求本国优先权的，其在先申请自后一申请提出之日起一律视为撤回", "D": "在先申请是整体外观设计，在后申请可以是局部外观设计；但在先申请是局部外观设计，在后申请只能是局部外观设计"}, answer: "ABD", explanation: "A选项，张买元燕投构人许 可进行锁售的金用油是家诉专科方法直 接获得的产品，构成侵权、A选项正确。B选 项，刘某文生严题量国的遗镇曾专利产 三G，传政侵权、因定B选项正确。C选项， 吕某自行食用辰大偿赠送的行为不是为主 产经营目的，不构政使权、因此C选项错误、 经黄某封销售行为属于为生产经营目的，构 民侵权。D选项，食品加工厂在专利审请之 后研制出该方法，并且在专利授权后为生产 经营目的使用专利方法制造专利产品，构成 侵权，因此D选项正确。（2007年）"},
  {id: 564, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "甲公司于2024年4月就一项新研制的手机向国家知识产权局申请实用新型专利，该实用新型专利附图清楚地显示该手机的整体及摄像头局部外观结构。2024年6月，甲公司就该手机的摄像头向国家知识产权局提出局部外观设计专利申请，并要求享有该实用新型专利的优先权，下列关于后一申请说法正确的是？", options: {"A": "甲公司应当在产品名称中写明要求保护“手机的摄像头”", "B": "甲公司应当提交手机整体产品的视图，如用虚线与实线相结合表明所需要保护的局部，则无需在简要说明书中写明", "C": "由于在先申请是实用新型专利，在后外观设计申请不可以要求享有优先权", "D": "如果该外观设计申请获得优先权，则该实用新型专利申请自外观设计申请提出之日起即视为撤回"}, answer: "CD", explanation: "A选项，委托完成的发明创造 无约定的，申请专利的权利属于完或者。根 据《民法典》的规定，委托人有免费实施专利 技术的权利，A选项错误。B选项，乙化工厂 未采用王某的专利方法，其行为不侵犯王某 的专利权，B选项错误。C选项，甲化工厂生 产的乙烯产品并不侵权，因此后续的销售、 使用相关产品都不会构成侵权，C选项正 确。D选项，乙烯生产方法的专利权人为王 某，他人想要使用专利方法，应当得到专利 权人的许可，D选项正确。（新编）"},
  {id: 565, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "简要说明中指定设计1为基本设计，哪些设计能作为设计1的相似设计与设计1在一件外观设计专利申请中提出？设计1设计2设计3设计4", options: {"A": "设计2", "B": "设计3", "C": "设计4", "D": "设计2、设计3、设计4"}, answer: "AD", explanation: "A、B选项，《专利权纠纷应用 法律若干问题的解释》第12条第1款规定： “将侵犯发明或者实用新型专利权的产品作 为零部件，制造另一产品的，人民法院应当 认定属于专利法第11条规定的使用行 为.…...”，因此A选项正确，B选项错误。C 选项，《专利权纠纷应用法律若干问题的解 释》第12条第2款规定：“将侵犯外观设计专 利权的产品作为零部件，制造另一产品并销 售的，人民法院应当认定属于专利法第11 条规定的销售行为，但侵犯外观设计专利权 的产品在该另一产品中仅具有技术功能的 除外”，因此C选项错误。D选项，《专利权 纠纷应用法律若干问题的解释》第13条规 定：“对于使用专利方法获得的原始产品，人 民法院应当认定为专利法第11条规定的依 照专利方法直接获得的产品。对于将上述 原始产品进一步加工、处理而获得后续产品 的行为，人民法院应当认定属于专利法第 11条规定的使用依照该专利方法直接获得 的产品”，因此D选项正确。（2011)"},
  {id: 566, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "以下哪些可以作为一件外观设计专利申请提出？", options: {"A": "手机的四个角的设计", "B": "带灶具、烤箱、洗碗机的整体橱柜", "C": "可插接成不同造型的积木", "D": "眼镜的两个镜腿的设计"}, answer: "BD", explanation: "A选项，乙公司制造橡胶属于 使用甲公司的专利方法，橡胶是依照专利方 法直接获得的产品，乙公司销售橡胶同时还 具有销售专利产品的行为，因此A选项错 误。B、C选项，丙公司以侵权产品为原材料 制造车轮的行为，属于使用依照专利方法直 接获得的产品，构成使用侵权，因此B选项 正确。D选项，由于车轮不属于依照专利方 法直接获得的产品，因此销售车轮不构成专 利侵权，D选项正确。（新编）"},
  {id: 567, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "下列哪些选项所示外观设计可以作为一件外观设计专利申请提出？", options: {"A": "轿车和轿车车模的相似外观设计", "B": "设计构思相同的床、床头柜的外观设计", "C": "咖啡杯和咖啡壶的成套产品外观设计，以及与其中的咖啡杯相似的另一款咖啡杯外观设计", "D": "仅有色彩差别的产品包装盒的两项外观设计"}, answer: "ABD", explanation: "A选项，甲的行为最多构成 间接侵权，任何情况下都不构成直接侵权。 因此A选项正确。B选项，在乙没有直接侵 权的情况下，甲的间接侵权也不存在，也不 构成共同侵权，因此B选项正确。C选项， 乙构成直接侵权的情况下，甲的间接侵权也 成立，甲乙构成共同侵权、因此C选项错误， D选项正确。（2018，思维扩展）"},
  {id: 568, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "一般情况下，经整体观察，如果其他设计和基本设计具有相同或者相似的设计特征，在下列哪些情况下，该其他设计和基本设计可以作为一件外观设计专利申请提出？", options: {"A": "二者之间的区别点在于局部细微变化", "B": "二者之间的区别点在于该类产品的惯常设计", "C": "二者之间的区别点在于局部外观设计在整体中比例关系的常规变化", "D": "二者之间的区别点在于局部外观设计在整体中位置关系的常规变化"}, answer: "ABD", explanation: "A选项，使用专利方法制造 设备的行为不是为了科学研究和实验，而是 为了教学，大学的教学行为具有生产经营目 的，A选项构成专利侵权。B选项，将实用新 型专利权的产品作为零部件，制造汽车、属 于使用专利产品行为，该行为构成专利侵 权。C选项，外观设计专利不保护“使用”， 另外由于该零部件仅为功能性部件、销售电 视机也不构成侵权。D选项属于许诺销售， 构成侵权。（2014改编）"},
  {id: 569, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "在设计构思相同的情况下，下列哪组产品的外观设计可以合案申请？", options: {"A": "鞋柜和书柜", "B": "床单、被罩和枕套组成的多件套床上用品", "C": "铅笔和销售时赠送的橡皮", "D": "皮鞋和销售时用来盛装该皮鞋的鞋盒"}, answer: "BC", explanation: "A选项，王某购买洗涤剂自行 使用，不是为生产经营目的，因此不侵犯吴 某的专利权。B选项，花弃种植公司使用洗 涤剂为了防止其出售的树木姿、属于为生 产经营目的使用专利方法，因此侵犯了吴某 的专利权。C选项，某厂在洗涤剂包装上注 明具有防止树木枯萎的用途，使用了专利权 保护的用途，因此侵犯了吴某的专利权。D 选项，某食品加工厂将洗涤剂用于清洗器 亚，未使用该用迹方法专利，因此不侵犯吴 某的专利权。（2008)"},
  {id: 570, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "在设计构思相同的情况下，下列哪组产品的外观设计可以合案申请？", options: {"A": "彼此相似的两个电饭锅", "B": "材质相同的餐桌和餐椅", "C": "同一商家出售的浴缸和沐浴房", "D": "沙发和可放在沙发上使用的靠垫"}, answer: "ABD", explanation: "本题中，乙公司的制造行 为、丙公司的销售行为均侵犯了甲的专利 权，丁使用外观设计专利产品不构成侵权， 因此A、B、D选项正确，C选项错误。（2019)"},
  {id: 571, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "申请人对外观设计专利申请文件的下列哪些修改符合专利法第三十三条的规定？", options: {"A": "将左视图与右视图的视图名称交换", "B": "将回转体的中心线删除", "C": "将T恤衫胸前的文字图案与后背的卡通图案交换", "D": "将仰视图镜像对称变换，使其与其他视图投影关系对应"}, answer: "BC", explanation: "本题中，乙的制造和销售行为 发生在授权以前，因此不构成侵权，A选项 错误，B选项正确。丙使用外观设计作为零 部件不侵权，但是在授权之后销售，构成侵 权，因此C选项正确，D选项错误。（2018） 23、B。A、C、D选项，《专利法》第75条 规定：“有下列情形之一的，不视为侵犯专利 权：（一）专利产品或者依照专利方法直接获 得的产品，由专利权人或者经其许可的单 位、个人售出后，使用、许诺销售、销售、进口 该产品的……·.（四）专为科学研究和实验而 使用有关专利的….”，A选项属于上述 （四）项的情形，C、D选项属于上述（一）项权 利用尽的情形，因此均不视为侵犯专利权。 B选项，乙未经该公司许可为生产经营目的 许诺销售该打印机的行为，侵犯了该公司的 专利权。（2014)"},
  {id: 572, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "以下哪些属于外观设计初步审查范围：", options: {"A": "明显不符合专利法实施细则第11条的规定", "B": "明显不符合专利法第23条第1款的规定", "C": "明显不符合专利法第23条第2款的规定", "D": "明显不符合专利法第23条第3款的规定"}, answer: "ABCD", explanation: "《专利权纠纷应用法律若于 问题的解释》第15条第23款规定：“有下列 情形之一的，人民法院应当认定属于专利法 第69条第（二）项规定的已经作好制造、使 用的必要准备：（一）已经完成实施发明创造 所必需的主要技术图纸或者工艺文件；（二） 已经制造或者购买实施发明创造所必需的 主要设备或者原材料。专利法第75条第 （二）项规定的原有范围，包括专利申请日前 已有的生产规模以及利用已有的生产设备 或者根据已有的生产准备可以达到的生产 规模”，因此A、B、C、D选项均正确。（2014)"},
  {id: 573, topic: "专题二十二 外观设计的申请文件与初步审查", type: "multiple", question: "申公司于2024年2月10日向国家知识产权局提交一件外观设计专利申请，请求保护汽车座椅的把手的局部外观设计，并提交了该汽车座椅具有靠背和把手的整体产品视图，就该外观设计申请的修改和分案申请，甲公司下列做法不正确的是：", options: {"A": "甲公司在该外观设计授权之前对汽车座椅的整体产品外观提出分案申请", "B": "甲公司在申请日起2个月对座椅靠背提出分案申请", "C": "甲公司在自申请日起2个月内将该外观设计申请保护的内容修改为要求保护汽车座椅靠背的局部外观设计", "D": "甲公司在答复审查意见通知书时，将该外观设计申请保护内容修改为要求保护汽车座椅整体外观设计外观设计专利的授权条件"}, answer: "ACD", explanation: "A、C、D选项均未经专利权 人许可，不属于权利用尽的情形，侵犯专利 权；B选项购买的是专利药品，属于权利用 尽的情形，不侵犯专利权，因此A、C、D选项 正确。（2015)"},
  {id: 574, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列哪个主题可获得外观设计专利权？", options: {"A": "以企业商标标识为主体内容的瓶贴设计", "B": "手机屏幕壁纸的设计", "C": "艺术花瓶的设计", "D": "可批量印制的摄影作品"}, answer: "ABCD", explanation: "《专利法》第75条规定：“有 下列情形之一的，不视为侵犯专利权： （二）在专利申请日前已经制造相同产品、使 用相同方法或者已经作好制造、使用的必要 准备，并且仅在原有范围内继续制造、使用 的；（三）临时通过中国领陆、领水、领空的外 国运输工具，依照其所属国司中国签订的协 议或者共同参加的国际条约，或者依照互惠 原则，为运输工具自身需要而在其装置和设 备中使用有关专利的：（四）专为科学研究和 实验而使用有关专利的；（五）为提供行政审 批所需要的信息、制造、使用、进口专利药品 或者专利医疗器械的、以及专门为其制造、 进口专利药品或者专利医疗器被的”，因此 A、BC、D选项均不视为设犯专利权。 (2019)"},
  {id: 575, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列选项哪些属于不授予外观设计专利的情形？", options: {"A": "“王者荣耀”游戏界面", "B": "带有网格设计的屏幕壁纸", "C": "手机开机画面设计", "D": "与人机交互无关的网站网页的图文排版"}, answer: "ABC", explanation: "临时过境运输工具不构成 侵权抗辩仅限于为运输工具自身的需要而 使用有关专利。对船雨言、为船独自身需 要而使用有关专利，包括在萄的船身、机 器、索具以及其他附件（导航仪器、装载 装卸设备等）上使用，均适用临时过境抗辩、 不构成专利侵权，因业A、B、C选项正确，D 选项错误。（新编）"},
  {id: 576, topic: "专题二十三 外观设计专利的授权条件", type: "single", question: "下列哪些属于外观设计专利保护的客体？", options: {"A": "帽子上的绢花造型设计", "B": "通电后才显示的霓虹灯的彩色图案", "C": "成吉思汗雕像", "D": "局部外观设计为画布的图案"}, answer: "D", explanation: "A选项，乙厂先于甲公司研制 出新装置、并不代表该装置已经被公开，因 此不能因乙厂先研制出同样的装置为由宣 告甲公司专利无效，因此A选项错误。B选 项，甲公司的发明专利申请于2024年3月 10日被授权公告，因此乙厂2021年11月的 销售行为不成对甲公司专利权的侵犯，B 选项错误。C、D选项，乙厂在甲公司专利申 请日前已经开始投产，此后在已有的生产准 备前提下采用加碰加点的方式扩大生产规 模仍属于原有范围内继续制造、使用，因此、 乙厂享有光用权，不视为侵犯甲公司的专利 权，C选项错误，D选项正确。（新编）"},
  {id: 577, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列哪些产品可以授予外观设计专利权：", options: {"A": "具有新颖并富有美感的文字、图案的正方形广告牌", "B": "新设计的文字字体", "C": "形状、图案新颖并富有美感的酒瓶标贴", "D": "新颖并富有美感的标志图案"}, answer: "BD", explanation: "A选项，根据《专利法》第75条 第（二）项的规定，在专利申请日前已经制造 相同产品、使用相同方法或者已经作好制 造、使用的必要准备，并且仅在原有范围内 继续制造、使用的，才不视为侵犯专利权，因 此A选项错误。B选项，《专利权纠纷应用 法律若干问题的解释》第15条第1款规定： “被诉侵权人以非法获得的技术或者设计主 张先用权抗辩的，人民法院不予支持”，因此 B选项正确。C、D选项，《专利权纠纷应用 法律若干问题的解释》第15条第4款规定： “先用权人在专利申请日后将其已经实施或 作好实施必要准备的技术或设计转让或者 许可他人实施，被诉侵权人主张该实施行为 属于在原有范围内继续实施的，人民法院不 予支持，但该技术或设计与原有企业一并转 让或者承继的除外”，因此C选项错误，D选 项正确。（2011）"},
  {id: 578, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列不属于外观设计专利保护的客体的有：", options: {"A": "电脑包的内部夹层设计", "B": "利用了竹子的根部形状设计出来的竹雕", "C": "一种糕点，其设计要点在于采用了六边形的形状", "D": "拼图玩具中的一个插接块"}, answer: "BD", explanation: "A选项，根据题意可知乙侵犯 甲的专利权是由制造X产品的行为导致，即 使乙所使用的设备是合法购得也不能作为 不侵权抗辩的理由，因此A选项错误。B选 项，乙享有先用权，不视为侵犯甲的专利权， B选项正确。C选项，即使乙拥有自已的专 利权，其仅享有独占排他权，并不享有自由 实施的权利，因此拥有自已的专利权不构成 侵权抗辩的理由，因此C选项错误。D选 项，现有技术抗辩可以作为不侵权的理由， 因此D选项正确。（2016）"},
  {id: 579, topic: "专题二十三 外观设计专利的授权条件", type: "single", question: "下列哪些选项不能作为局部外观设计保护的客体？", options: {"A": "任意截取的眼镜镜片的不规则部分", "B": "座椅靠背的雕花", "C": "摩托车表面的图案", "D": "水杯杯把的一条转折线"}, answer: "D", explanation: "A、C选项，无效宣告请求应由 国家知识产权局审理并作出决定，人民法院 没有受理无效宣告请求和作出无效宣告请 求决定的权力，因此A、C选项错误。B选 项，如果李某向国家知识产权局提出无效宣 告请求，人民法院可以根据相关情况决定是 否中止，而不是人民法院中止之后再告知当 事人请求宣告无效，因此B选项错误。D选 项。为节约行政司法资源，当事人提出现有 技术抗辨并成立的，人民法院可以直接作出 不侵权的判决，因此D选项正确。（2014)"},
  {id: 580, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列选项属于外观设计专利保护客体的是？", options: {"A": "不构成完整的设计单元的水杯局部", "B": "带有随机生成图案的漆扇", "C": "用于医学教学的人体仿真模型", "D": "以大熊猫“花花”为原型的毛绒玩具"}, answer: "ABC", explanation: "A选项，只要是现有技术都 可以用于进行不侵权的抗辨，与是否处于保 护期无关，因此A选项说法错误。B选项， 抵触申请不属于现有技术，不能进行现有技 术抗辩，因此B选项说法错误。C选项，不 侵权抗辨的技术特征对比不是将被控侵权 产品的全部特征与现有技术进行对比，而是 将落入专利权保护范围的特征与一项现有 技术进行对比，因此C选项说法错误。D选 项，现有技术抗辨只能用一份现有技术，不 能使用两份以上的现有技术组合对比，因此 D选项说法正确。（2018）"},
  {id: 581, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列哪些外观设计不能被授予专利权？", options: {"A": "吸毒器具", "B": "印有中国国旗的T恤衫", "C": "中国共产党成立100周年纪念章", "D": "某知识产权代理有限责任公司成立40周年纪念章"}, answer: "AD", explanation: "A选项，丙的发明专利申请公 布日早于涉案专利申请日，属于现有技术。 可以用于主张现有技术抗辨，因此A选项正 确。B选项，丙的实用新型专利公告日在甲 的发明专利申请日之后，不构成现有技术， 不能用于现有技术抗辨，B选项错误。C选 项，乙主张现有技术抗辨，只能使用一份现 有技术文件，不能使用两份现有技术文件组 合，因此C选项错误。D选项，乙实施的技 术在甲的申请日前已经在科技期刊上刊载， 因此乙可以主张现有技术抗辩，D选项正 确。（2013改编） 34、CD。A、B选项，《专利权纠纷应用 法律若干问题的解释（二）>第24条第1款规 定：“推荐性国家、行业或者地方标准明示所 涉必要专利的信息，被诉侵权人以实施该标 准无需专利权入许可为由抗辩不侵犯该专 利权的，人民法院一般不予支持”。本题中， 乙公司使用该项专利技术需要获得甲公司 的许可，否则构成侵权，因此A、B选项错误。 D选项，《专利权纠纷应用法律若干问题的 解释（二）》第24条第2款规定：“推荐性国 家、行业或者地方标准明示所涉必要专利的 信息，专利权人、被诉侵权人协商该专利的 实施许可条件时，专利权人故意违反其在标 准制定中承诺的公平、合理、无歧视的许可 义务，导致无法达成专利实施许可合同，且 被诉侵权人在协商中无明显过错的，对于权 利人请求停止标准实施行为的主张，人民法 院一般不予支持”，因此D选项正确。《专利 权纠纷应用法律若干问题的解释（二）》第 24条第3款规定：“本条第二款所称实施许 可条件，应当由专利权人、被诉侵权人协商 确定。经充分协商，仍无法达成一致的，可 以请求人民法院确定”，因此C选项正 确。（新编）"},
  {id: 582, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列哪些选项不能被授予外观设计专利权？", options: {"A": "主要用于识别产品来源的贴标", "B": "用于求神问卜观测风水的模型", "C": "国旗", "D": "天安门"}, answer: "ABCD", explanation: "，A选项、《专利权纠纷应用 法律若于问题的解释》第1条第2款规定： “权利人主张以从属权利要求确定保护范围 的，人民法院应当以该从属权利要求记载的 附加技术特征及其引用的权利要求记载的 技术特征，确定专利权的保护范围”，因此A 遥项正确。B选项，《专利纠纷当用法律罗 于问题的解释》第4条规定：“对于权利要求 宁以功能或者效果表述的技术特征、人民法 院应当结合说明书和附图描述的该功能或 者效果的具体实趣方式及其等司的实無万 亥，确定该技术特征的内容”因此B选项正 确。C选项、《专利纠纷应用法体若干问题 的解释》第5条规定：“对于仅在说明书或者 附图中描述而在权利要求中未记载的技术 方案，权利人在侵犯专利权纠纷案件中将其 纳入专利权保护范围的，人民法院不予支 持”，因此C选项正确。D选项，《专利纠纷 应用法律若干问题的解释》第6条规定：“专 利申请人、专利权人在专利授权或者无效宣 告程序中，通过对权利要求、说明书的修改 或者意见陈述而放弃的技术方案，权利人在 浸犯专利权纠纷案件中又将其纳入专利权 保护范图的，人民法院不予支持”，因此D选 项正确。（2010） 2、ABCD。独立权利要求的保护范图 最宽，一般情况下，以独立权利要求为准判 崭专利的保护范图。A、B、D选项中技术方 案均包含独权的全部技术待征N0、因此均 落入专利权的保护范围。C选项中技术方案 包含了该专利权的相同特征N和等同特征 0”，因此也落入专利权的保护范围。（2019）"},
  {id: 583, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "某外观设计专利申请的申请日为2023年9月30日，下列哪些设计构成了该申请的现有设计？", options: {"A": "2023年6月1日申请人本人在中国政府主办的展览会上展出了该外观设计产品", "B": "2023年7月7日在法国某商场橱窗中陈列的设计", "C": "2023年9月30日公开在某杂志中的设计", "D": "2023年8月12日提出申请、2023年12月20日授权公告的中国外观设计专利申请中的设计"}, answer: "BC", explanation: "A选项，乙制造的研磨机不包 括技术特征d，且技术特征e与d不相同也不 等同，因此没有落入该实用新型专利权的保 护范围。B选项，丙制造的研磨机包括a、b、 c、d\'四个技术特征，且技术特征d”与d等 同，构成等同侵权，因此落入该实用新型专 利权的保护范围。C选项，丁制造的研磨机 包括a、b、c、d四个技术特征，因此落入该实 用新型专利权的保护范围。D选项，戊制造 的研磨机不包括技术特征d，因此没有落入 该实用新型专利权的保护范围。（2016）"},
  {id: 584, topic: "专题二十三 外观设计专利的授权条件", type: "single", question: "一件外观设计专利申请的申请日为2023年8月2日，优先权日为2023年2月9日。在优先权成立的条件下，下列可能会构成该申请的抵触申请的有：", options: {"A": "申请日为2023年1月30日，公告日为2023年8月2日的外观设计专利", "B": "申请日为2022年4月1日，公布日为2023年8月10日的发明专利", "C": "申请日为2023年2月1日，公告日为2024年2月10日的外观设计专利", "D": "申请日为2023年4月1日，公告日为2024年2月10日的实用新型专利"}, answer: "D", explanation: "甲公司的权利要求包括a、b、c、d 四个特征，是否属于必要技术特征不影响权 利要求保护的范围。涉嫌侵权产品应当包 括这四个特征，才构成侵权。A选项，产品不 包括特征d，不构成侵权，特征e记载在说明 书中，不参与侵权保护范围的判断，因此没有 落入甲公司专利权的保护范围，不构成侵权。 B、C选项，产品不包括特征d，没有落入甲公 司专利权的保护范围，不构成侵权。D选项， 产品包括了a、b、c、d四个技术特征，落入甲 公司专利权的保护范围，构成侵权。（新编）"},
  {id: 585, topic: "专题二十三 外观设计专利的授权条件", type: "single", question: "在外观设计专利无效宣告程序中，判断对比设计是否构成涉案专利的抵触申请时，下列说法哪些是正确的？", options: {"A": "涉案专利请求保护色彩，对比设计所公告的为带有色彩的外观设计，但其明确不请求保护色彩，此种情况下不能将对比设计中包含有该色彩要素的外观设计与涉案专利进行比较", "B": "涉案专利请求保护色彩，对比设计所公告的虽然为带有色彩的外观设计，其虽明确不请求保护色彩，但仍可以将对比设计中包含有该色彩要素的外观设计与涉案专利进行比较", "C": "对比设计所公告的使用状态参考图中包含有不要求保护的外观设计，在与涉案专利进行比较时，不考虑该不要求保护的外观设计", "D": "对比设计所公告的使用状态参考图中包含有不要求保护的外观设计，在与涉案专利进行比较时，应当考虑该不要求保护的外观设计"}, answer: "B", explanation: "本题中，专利的保护范围是：J的 浓度为<3.5%，K的浓度为>0.1%。A选 项，K的浓度为0.1%，未落入专利的保护范 围。B选项，J的浓度为0.5%，K的浓度为 0.2%，均落入专利的保护范围。C选项，J的 浓度为4.0%，未落入专利的保护范围。D选 项，J的浓度为3.5%，未落入专利的保护范 围。（2012)"},
  {id: 586, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "判断外观设计是否符合专利法第二十三条第一款、第二款授权条件的判断主体是？", options: {"A": "所属技术领域的技术人员", "B": "一般消费者", "C": "普通设计人员", "D": "实际消费者"}, answer: "ABCD", explanation: "A选项，《专利纠纷应用法 律若干问题的解释》第5条规定：“对于仅在 说明书或者附图中描述而在权利要求中未 记载的技术方案，权利人在侵犯专利权纠纷 案件中将其纳入专利权保护范围的，人民法 院不予支持”，因此A选项正确。B、C选项， 《专利法》第64条规定：“发明或者实用新型 专利权的保护范围以其权利要求的内容为 准，说明书及附图可以用于解释权利要求的 内容。外观设计专利权的保护范围以表示 在图片或者照片中的该产品的外观设计为 准，简要说明可以用于解释图片或者照片所 表示的该产品的外观设计”，因此B、C选项正 确。D选项，《专利纠纷应用法律若干问题的 解释》第7条第1款规定：“人民法院判定被诉 侵权技术方案是否落入专利权的保护范围， 应当审查权利人主张的权利要求所记载的全 部技术特征”，因此D选项正确。（2014)"},
  {id: 587, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列哪些情形构成相同或实质相同的外观设计？", options: {"A": "形状、图案均相同的红色书包和绿色书包", "B": "形状、图案均相同的白色透明塑料杯与白色透明玻璃杯", "C": "图案、色彩均相同的长方体饼干桶和正方体饼干桶", "D": "形状、图案、色彩均相同的电话机与玩具电话，二者的内部结构不同"}, answer: "ABC", explanation: "A、B选项，《专利纠纷应用法 律若干问题的解释（二）》第16条规定：“对 于组装关系唯一的组件产品的外观设计专 利，被诉侵权设计与其组合状态下的外观设 计相同或者近似的，人民法院应当认定被诉 侵权设计落入专利权的保护范图。对于各 构件之间无组装关系或者组装关系不唯一 的组件产品的外观设计专利、效诉侵权设计 与其全部单个构件的外观设计均相同或者 近似的，人民法院应当认定被诉侵权设计落 入专利权的保护范围：被诉侵权设计缺少其 单个构件的外观设计或者与之不相同也不 近似的，人民法院应当认定被诉侵权设计未 落入专利权的保护范围”，因此A、B选项正 确。C、D选项，《专利纠纷应用法律若干问 题的解释（二）第15条规定：“对于或套产 品的外观设计专利，被诉侵权设计与其一项 外观设计相同或者近似的，人民法院应当认 定被诉侵权设计落入专利权的保护范围”， 因此C选项正确，D选项错误。（2018） 8、AD。A选项，外观设计简要说明中 说明请求保护色彩，因此色彩在其保护范围 之内，A选项正确。B选项，虽然简要说明中 说明保护色彩，但是并未说明色彩是设计要 点，因此B选项错误。C、D选项，《专利纠纷 应用法律若干问题的解释》第11条第1款规 定：“人民法院认定外观设计是否相同或者 近似时，应当根据授权外观设计、被诉侵权 设计的设计特征，以外观设计的整体视觉效 果进行综合判断；对于主要由技术功能决定 的设计特征以及对整体视觉效果不产生影 响的产品的材料、内部结构等特征，应当不 予考虑”，本题中，应将色彩设计与其他设计 作整体观察、综合判断，不应重点考虑色彩 对整体视觉效果的影响，因此C选项错误，D 选项正确。（2016)"},
  {id: 588, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列哪个选项中的外观设计不属于相同或实质相同的外观设计？", options: {"A": "一款座椅的外观设计和与该款座椅外观相同的手机支架外观设计", "B": "一款圆珠笔和一款自动铅笔的外观设计，二者除笔尖设计不同外其余设计均相同", "C": "一款具有电子时钟和收音机双功能产品的外观设计，与一款纯电子时钟功能的产品外观设计，二者形状、图案和色彩设计相同", "D": "一件珠宝盒的专利外观设计，与一件包装盒的专利外观设计，二者形状、图案和色彩设计相同"}, answer: "AD", explanation: "A、B选项，《专利纠纷应用法律 若干问题的解释（二）》第15条规定：“对于 成套产品的外观设计专利，被诉侵权设计与 其一项外观设计相同或者近似的，人民法院 应当认定被诉侵权设计落入专利权的保护 范围”，因此A选项正确，B选项错误。C、D 选项，构成外观设计专利侵权的行为中不包 括购买和使用，因此丙购买并使用该茶壶不 侵犯甲的专利权，C选项错误，D选项正确。 (2016)"},
  {id: 589, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "在无效宣告程序中，涉案外观设计专利与对比设计的区别仅属于下列哪些情形时，涉案专利与对比设计实质相同？", options: {"A": "其区别在于施以一般注意力不能察觉到的局部的细微差异", "B": "其区别在于将某一设计要素整体置换为该类产品的惯常设计的相应设计要素", "C": "其区别在于将对比设计作为设计单元按照该种类产品的常规排列方式作重复排列", "D": "其区别在于局部外观设计要求保护部分在产品整体中的位置关系的常规变化"}, answer: "BC", explanation: "《专利纠纷应用法律若干问题 的解释（二）》第17条规定：“对于变化状态 产品的外观设计专利，被诉侵权设计与变化 状态图所示各种使用状态下的外观设计均 相同或者近似的，人民法院应当认定被诉侵 权设计落入专利权的保护范围；被诉侵权设 计缺少其一种使用状态下的外观设计或者 与之不相同也不近似的，人民法院应当认定 被诉侵权设计未落入专利权的保护范围”。 A、B选项，被诉侵权产品缺少一种使用状 态，即不能变化为床，不落入该外观设计专 利权的保护范围，A选项错误，B选项正确。 C、D选项，被诉侵权产品为沙发床，有三个 变化状态，只要与授权专利的两个使用状态 下的外观设计均相同或者近似的，则落入该 外观设计专利权的保护范围，构成侵权，不 需要考虑第三个变化状态是否与授权专利 任一使用状态下的外观设计近似，因此C选 项正确.D选项错误。(2016)"},
  {id: 590, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列哪些情形可以将两件产品的外观设计认定为实质相同的外观设计？", options: {"A": "互为镜像对称的两把椅子", "B": "难以察觉细微差异的两扇百叶窗，其差异仅在于具体叶片数不同", "C": "图案、色彩相同的两个长方体包装盒，其设计差别仅在于盒体的高度略有不同", "D": "形状、图案和色彩均相同的铅笔和巧克力"}, answer: "ABCD", explanation: "A选项.《专利纠纷应用法 律若干问题的解登）第8条规定：“在与外观 设计专利产品相同或者相近种类产品上，采 用与授权外观设计相同或者近似的外观设 计的，人民法吴应当认定被诉侵权设计落入 专利法第64条第2段规定的外观设计专利 权的保护范围”，因此A选项正确，B、C选 项，《专利纠纷应用法律若干问题的解释》第 9条规定：“人民法现应当根据外观设计产 另的用途，认定产品种类是否相同或者相 近，确定产品的用途，可以参考外现设计的 简要说明、国际外观设计分类麦、严品的功能 以及产品销售、实际使用的情况等因素”、因 此B、C选项正确。D选项，《专利纠纷应用涨 律若于问题的解稀》第10条规定；“人民法 应当以外观设计专利产品的一毁消费者的知 识水平和认知意力、判断外观设计是否相同 或者近似”，因此D选项正确。（2012）"},
  {id: 591, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列哪些情形可以将两件产品的外观设计认定为实质相同的外观设计？", options: {"A": "手机摄像头局部外观与包含摄像头的手机，其差异在于比例关系常规变化", "B": "甲影院中的观影座椅为乙影院观影座椅成排重复排列而成", "C": "形状、图案和色彩均相同的两个玻璃杯子，其区别仅在于一个是钢化玻璃的，一个是普通玻璃的", "D": "形状、图案和色彩均相同的浴巾和地毯"}, answer: "ACD", explanation: "，（专利纠纷应用法若干月 题的解释（二））第18条第2爱规定：“发明专 利申请公布时申请人请求保护的范围与文 明专利公告授权时的专利权保护范围不一 致、被诉技术方案勾落入上述两种范围的， 人民法院亚当认定被告在前款所称网内 实施了该文明；被诉技术方案仅落入其中一 种范围的，人民法规应当认定接音在国驗所 称期间内未买意谈文明”。A、B选项，甲的 审请公布的仅利要求保护范围与授权公告 的权利要求保护范图不一致，乙的技术方案 仅落入其中一种，不需要支付任何费用，A 选项说法错误，B选项说法正确。C选项，该 专利公告授权以首乙的行为不属于专利烫 权行为，不承担疑权骼尝责任，C选项说法 蜡误。D选项，乙的产品中不包含特征c、未 落入甲的专利权保护范图，不构成侵权，D 选项说法错误。（2018）"},
  {id: 592, topic: "专题二十三 外观设计专利的授权条件", type: "single", question: "下列属于相近种类的外观设计产品的是？", options: {"A": "机械表和电子表", "B": "玩具汽车和汽车", "C": "带MP3的手表和普通手表", "D": "毛巾和地毯"}, answer: "D", explanation: "根据《专利纠纷应用法律若干 问题的解释（二）》第18条第2款的规定，临 时保护成立与否的判断原则是看被诉技术 方案是否同时落入发明专利公开时权利要 求的保护范围以及授权时权利要求的保护 范围，只有被诉技术方案均落入上述两种范 围的，临时保护才能成立。本题中，只有包 括a、b、c、d、e五个技术特征的产品才同时落 入公布和授权公告的两种范围内，因此甲可 以要求戊支付费用，D选项正确。(2016) 14、BD。A、C选项不作为侵权赔偿数 额的计算依据。B选项，《专利法》第71条第 1款规定：“侵犯专利权的赔偿数额按照权 利人因被侵权所受到的实际损失或者侵权 人因侵权所获得的利益确定”，B选项正确。 D选项，《专利权纠纷应用法律若干问题的 解释（二）》第28条规定：“权利人、侵权人依 法约定专利侵权的赔偿数额或者赔偿计算 方法，并在专利侵权诉讼中主张依据该约定 确定赔偿数额的，人民法院应予支持”，D选 项正确。(2016)"},
  {id: 593, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "在确定外观设计产品种类时，可以参考以下哪些内容？", options: {"A": "产品的名称", "B": "国际外观设计分类", "C": "产品销售时的货架分类位置", "D": "国际商品和服务分类"}, answer: "ABC", explanation: "《专利法》第71条规定：“侵犯 专利权的赔偿数额按照权利人因被侵权所 受到的实际损失或者侵权人因侵权所获得 的利益确定，。对故意侵犯专利权，情 节严重的，可以在按照上述方法确定数额的 1倍以上5倍以下确定赔偿数额。权利人的 损失、侵权人获得的利益和专利许可使用费 均难以确定的，人民法院可以根据专利权的 类型、侵权行为的性质和情节等因素，确定 给予3万元以上500万元以下的赔偿。赔偿 数额还应当包括权利人为制止侵权行为所 支付的合理开支”，因此A、B、C选项正确，D 选项中赔偿数额有误。（新编）"},
  {id: 594, topic: "专题二十三 外观设计专利的授权条件", type: "single", question: "除产生独特视觉效果外，下列哪些外观设计与现有设计相比不具有明显区别？", options: {"A": "单纯采用基本几何形状或者对其仅作细微变化得到的外观设计", "B": "单纯模仿自然物、自然景象的原有形态得到的外观设计", "C": "单纯模仿著名建筑物、著名作品的全部或者部分形状、图案、色彩得到的外观设计", "D": "由其他种类产品的外观设计转用得到的玩具、装饰品、食品类产品的外观设计"}, answer: "C", explanation: "A选项，根据《惩罚性赔偿解 释》第5条的规定，人民法院确定惩罚性赔 偿数额时，应当分别依照相关法律，以原告 实际损失数额、被告违法所得数额或者因侵 权所获得的利益作为计算基数。该基数不 包括原告为制止侵权所支付的合理开支，因 此A选项错误。B、C选项，根据《惩罚性赔 偿解释》第2条的规定，原告在一审法庭辩 论终结前增加惩罚性赔偿请求的，人民法院 应当准许；在二审中增加惩罚性赔偿请求 的，人民法院可以根据当事人自愿的原则进 行调解，调解不成的，告知当事人另行起诉， 因此B选项错误、C选项正确。D选项，根据 《专利法》第71条的规定，对故意侵犯专利 权，情节严重的可以在按照相关方法确定数 额的1倍以上5倍以下确定赔偿数额，因此 D选项错误。（新编）"},
  {id: 595, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "以下哪些设计要素，组合后能使外观产生明显区别？", options: {"A": "形状", "B": "图案", "C": "色彩", "D": "以上全部"}, answer: "D", explanation: "侵权赔偿额按照权利人因 被侵权所受到的实际损失或者侵权人因侵 权所获得的利益确定（可以按照“权利人的 损失=侵权产品镐售量×每件专利产品的合 理利润”计算）；权利人的损失或者侵权人获 得的利益难以确定的，参照该专利许可使用 费的倍数合理确定；赔偿数额还应当包括权 利人为制止侵权行为所支付的合理开支，与 研发投入以及专利权的价值无关，因此A选 项错误，B、C、D选项正确。（2019改编）"},
  {id: 596, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列哪些情形属于涉案专利与现有设计或者现有设计特征的组合相比不具有明显区别？", options: {"A": "涉案专利为蛋糕的外观设计，其设计模仿的是自然界青椒的原有形态", "B": "涉案专利为玩具汽车的外观设计，其形状、图案、色彩与现有甲壳虫汽车的形状、图案、色彩仅有细微差别", "C": "涉案专利为电饭煲的外观设计，其与申请日前已经公开销售的一款电饭煲仅在开盖按钮的形状设计上不同", "D": "涉案专利为盘子的外观设计，其形状与现有的一款盘子的形状相同，其边缘一圈图案与一款布料上的圆环形图案相同，图片显示盘子底色为浅黄色，图案为金色，但简要说明未声明请求保护的外观设计包含有色彩"}, answer: "BC", explanation: "A、B选项、乙、丙的行为均未 经甲许可，乙为客户加工零部件、丙用于企 业的生产均以生产经营为目的，因此乙、丙 均侵犯了甲的专利权，A选项错误，B选项正 确。C选项，（专利法》第77条规定：“为生产 经营目的使用、许诺销售或者销售不知造是 未经专利权人许可而制造并售出的专利曼 权产品，能证明该产品合法来源的，不承担赔 偿贵任”，因此C选项正确。D选项、《专利权 纠纷应用法律昔干问题的解释（二））第25条 第1款规定：“为生产经营目的使用、许诺销 售或者销售不知道是未经专利权人许可而制 造并售出的专利侵权产品，且举证证明该产 品合法来源的，对于权利人请求停止上述使 用、许诺销售、销售行为的主张、人民法院应 予支持，但被诉侵权产品的使用者举证证明 其已支付该产品的合理对价的除外”，因此丙 无需停止使用该机床，D选项错误。（2016）"},
  {id: 597, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "在涉案专利的无效宣告程序中，以下哪些不属于明显存在转用手法的启示的情形？", options: {"A": "涉案专利是救生艇，模仿一种玩具", "B": "涉案专利是酒瓶，模仿一种食物", "C": "涉案专利是一种音响，模仿著名建筑物", "D": "涉案专利是一种麦克风，模仿饰品"}, answer: "BC", explanation: "A选项，乙公司未经甲公司许 可为生产经营目的制造药品的行为构成侵 权，制造行为不能免除赔偿责任，因此A选 项错误。B选项，丙公司在不知情的情况下， 通过合法渠道获得侵权产品并销售，虽构成 侵权，但可以免除赔偿责任，因此B选项正 确。C选项，丁公司在印度购买甲公司制造 的药品并进口，由于甲公司已权利用尽，因此 丁公司的行为不构成侵权，C选项正确。D 选项，戊公司从丁公司处购买药品并销售，同 样属于甲公司权利用尽的情形，因此戊公司 的行为不构成侵权，D选项错误。（2013）"},
  {id: 598, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "下列哪个情形不属于专利法第二十三条第二款所述的“现有设计特征”？", options: {"A": "现有设计的形状、图案、色彩要素或者其结合", "B": "现有设计的产品名称", "C": "现有设计的某组成部分的设计", "D": "现有设计整体外观设计产品中的零部件的设计"}, answer: "ACD", explanation: "A选项，尽管甲不知道他人 就该台灯享有外观设计专利权，但其未经专 利权人许可，为生产经营目的制造和销售台 灯的行为构成了侵犯他人专利权，应承担侵 权责任，因此A选项正确。B选项，乙明知 甲生产的台灯侵犯了他人的专利权，仍然进 行销售，其销售行为构成侵权，不能免予承 担赔偿责任，因此B选项错误。C选项，丙 通过正常的商业渠道从乙处购入了一部分 台灯进行零售，但不知乙批发的是侵权产 品，且在人民法院审理案件过程中，能举证 证明该产品合法来源的，可以不承担赔偿责 任，因此C选项正确。D选项，丁购买台灯 是自行使用，不构成侵权，不承担侵权责任， 因此D选项正确。（2006） 1。ACD。根据《专利法》第65条的规 定，未经专利权人许可实施其专利，即侵犯 其专利权，引起纠纷的，由当事人协商解决； 不愿协商或者协商不成的，专利权人或者利 害关系人可以向人民法院起诉，也可以请求 管理专利工作的部门处理，因此A、C、D选 项正确。B选项，专利侵权仅涉及民事贵 任，不涉及刑事责任，不能向公安机关报案， B选项错误。（新编）"},
  {id: 599, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "专利法第二十三条第三款中授予专利权的外观设计不得与他人在申请日前取得的合法权利相冲突中的合法权利的类型是包括以下哪些？", options: {"A": "商号权", "B": "在先专利权", "C": "肖像权", "D": "著作权"}, answer: "ABCD", explanation: "A选项，人民调解委员会是 政府部门、企事业等单位设立的调解有关纠 纷的机构，因此A选项正确。B选项，人民 法院设置了调解中心，即使起诉后仍可以对 纠纷进行调解，B选项正确。C选项属于行 为保全，D选项属于证据保全，都可以向人 民法院提出申，因此C、D选项正确。 （新编）"},
  {id: 600, topic: "专题二十三 外观设计专利的授权条件", type: "multiple", question: "授予专利权的外观设计不得与他人在申请日以前已经取得的著作权相冲突。判定外观设计专利权与在先著作权相冲突的标准是？", options: {"A": "外观设计与作品中的设计相同或者实质相同", "B": "外观设计与作品中的设计相同或者实质性相似", "C": "外观设计与作品中的设计相同或者相近似", "D": "外观设计与作品中的设计相同或者无明显区别专利权的内容"}, answer: "ABCD", explanation: "A、B、C、D选项均不属于复 议前置的情况，既可以向人民法院起诉、也 可以请求管理专利工作的部门调解，以上四 项均正确。(2019) 4、BCD。A选项的案件只能向国务院 专利行政部门申请复审、不能向人民法院起 诉，A选项错误。B、C、D选项均属于人民法 院受理专利纠纷案件范围，均正确。（新编） 5、AD。《专利纠纷适用法律问题的若 干规定》第3条第1款规定：“原告仅对侵权 产品制造者提起诉讼，未起诉销售者，侵权 产品制造地与销售地不一致的，制造地人民 法院有管辖权；以制造者与销售者为共同被 告起诉的，销售地人民法院有管辖权”。本 题中，A市为制造地，B市为销售地，如果专 利权人仅起诉制造者甲，则制造地A市中级 人民法院具有管辖权，B市中级人民法院不 具有管辖权，因此A选项正确，C选项错误。 如果专利权人仅起诉销售者乙，乙的销售行 为发生在B市，A市没有管辖权，因此B选项 错误。D选项，同时起诉制造者甲和销售者 乙，则制造地A市中级人民法院和销售地B 市中级人民法院均具有管辖权，专利权人可 以择其一起诉，因此D选项正确。（新编）"},
  {id: 601, topic: "专题二十四 专利权的内容", type: "multiple", question: "关于专利权，以下说法错误的有：", options: {"A": "专利权具有排他性，专利权人有权禁止任何人未经其许可为生产经营目的实施该专利技术", "B": "自专利授权之日起，专利权人即获得在专利有效期内不受他人约束、自由实施其专利技术以获利的权利", "C": "专利的排他权本质上是排除对专利权所保护之知识产品的非法侵占、妨害或损毁", "D": "各国专利用度均涵盖发明专利、实用新型和外观设计三种类型的专利"}, answer: "ABC", explanation: "A选项，丙销售行为发生在成 都，重庆市人民法院无管辖权，A选项说法 错误。B选项，丁酒店使用外观设计不构成 侵权，B选项说法错误。C选项，成都市是侵 权产品销售地，只起诉乙公司，销售地无管 辖权，C选项说法错误。D选项，《专利法》第 66条第2款规定：“…专利权人、利害关系 人或者被控侵权人也可以主动出具专利权 评价报告”，D选项说法正确。（新编）"},
  {id: 602, topic: "专题二十四 专利权的内容", type: "single", question: "某公司拥有一项实用新型专利权。下列说法哪些是正确的？", options: {"A": "该公司应当在其生产和销售的该专利产品或产品包装上标注专利标识", "B": "该公司在该专利产品上标注专利标识的，应当采用中文标明专利权的类型", "C": "在该专利权被授予前，该公司可以在产品上标注专利申请号，但应标明“专利申请，尚未授权”字样", "D": "专利标识标注不当的，由县级以上负责专利执法的部门责令改正"}, answer: "C", explanation: "根据《最高人民法院关于知识产 权法庭若干问题的规定》第2条的规定，知 识产权法庭审理发明专利、植物新品种、集 成电路布图设计权属、侵权民事和行政上诉 案件，因此C选项正确。（新编）"},
  {id: 603, topic: "专题二十四 专利权的内容", type: "multiple", question: "下列关于专利标识的说法哪些是正确的？", options: {"A": "标注专利标识不当构成假冒专利行为的，由管理专利工作的部门进行处罚", "B": "标注专利标识的，应当标明国家知识产权局授予专利权的专利号", "C": "标注专利标识的，不得附加专利类别和专利号以外的其他文字、图形标记", "D": "专利标识可以标注在产品上、产品的包装上或者产品说明书上"}, answer: "AC", explanation: "A选项管辖正确。B、C选项， 《最高人民法院关于第一审知识产权民事、 行政案件管辖的若干规定》第1条规定：“发 明专利、实用新型专利、植物新品种、集成电 路布图设计、技术秘密、计算机软件的权属、 侵权纠纷以及垄断纠纷第一审民事、行政案 件由知识产权法院，省、自治区、直辖市人民 政府所在地的中级人民法院和最高人民法 院确定的中级人民法院管辖”，B选项，指定 雪笔必须符合级别管辖的规定，园此B选项 错误。C选项，沈阳市为辽宁省省府，流阳 市中级人民法院对该案有管辖权，C选项正 确。D选项，《专利法》第41条第2款规定； “专利申请人对国务院专利行政部门的复审 决定不服的，可以自收到通知之日起3个月 内向人民法院起诉”，此处人民法院专指北 京知识产权法院，因此D选项错误。（新编）"},
  {id: 604, topic: "专题二十四 专利权的内容", type: "multiple", question: "关于专利标识，下列说法正确的有：", options: {"A": "专利标识标注不当可能构成假冒专利行为", "B": "只需标注“专利产品仿冒必究”，而没有必要标注专利号等相关信息", "C": "只需标注专利号，而没有必要标明专利类别，因为专利类别可以从专利号中获知", "D": "专利标识的标注不符合规定的，由国务院专利行政部门责令改正"}, answer: "ABD", explanation: "（专利法》第73条规定：“为了 制止专利侵权行为，在证据可能灭失或者以 后难以取得的情况下，专利权人或者利害关 系人可以在起诉前依法自人民法院申请保 全证据”，因此A、B、D选项正确，C选项错 误。（新编）"},
  {id: 605, topic: "专题二十四 专利权的内容", type: "multiple", question: "企业甲获得了一项药品的发明专利权，该企业的员工李某是发明人，且该专利权一直维持有效。根据专利法的规定，在专利权的有效期内，依法享有下列哪些权利？", options: {"A": "企业甲可以在该药品的包装上写明专利号", "B": "李某可以单独实施该专利，获得的收益与企业甲共同分配", "C": "李某享有该药品专利的专利申请权", "D": "李某有权要求在相关分案申请中写明其为发明人"}, answer: "BCD", explanation: "A选项，专利财产权利的合 法继承人属于利害关系人、根据《专利法》第 72条的规定，其可以提出诉前停上侵权申 请，因此A选项说法正确。B、C选项，（知识 产权纠纷行为保全适用法律若于问题的规 定》第2条第2款规定：“知识产权许可合同 的被许可人申请诉前责令停止侵害知识产 权行为的，独占许可合同的被许可人可以单 独向人民法院提出申请；排他许可合同的被 许可人在权利人不申请的情况下，可以单独 提出申请；普通许可合同的被许可人经权利 人明确授权以自己的名义起诉的，可以单独 提出申请”。排他许可的被许可人只有在专 利权人不提出的情况下，才可以向法院提出 申请，因此B选项说法错误。普通许可的被 许可人未获得授权的情况下无权向法院提 出申请，因此C选项说法错误。D选项，除 独占许可外，排他计可的被许可人在一定条 件下也可以单独向法院提出申请，因此D选 项说法错误。（2018改编）"},
  {id: 606, topic: "专题二十四 专利权的内容", type: "multiple", question: "甲将一项专利权质押给乙，于2023年3月1日签订了质押合同，国家知识产权局于2023年3月5日进行了登记。后经乙同意，甲于2023年5月10日与丙签订了专利权转让合同，国家知识产权局于2023年5月17日发出手续合格通知书，2023年6月3日进行公告。下列说法哪些是正确的？", options: {"A": "质权自2023年3月1日起生效", "B": "质权自2023年3月5日起生效", "C": "专利权的转让自2023年6月3日起生效", "D": "专利权的转让自2023年5月17日起生效"}, answer: "BCD", explanation: "A选项，《专利纠纷适用法律 问题的若干规定》第7条规定：“人民法院受 理的侵犯发明专利权纠纷案件或者经国务 院专利行政部门审查维持专利权的侵犯实 用新型、外观设计专利权纠纷案件，被告在 答辩期间内请求宣告该项专利权无效的，人 民法院可以不中止诉讼”，A选项错误。B选 项、《细则》第103条第1款规定：“当事人因 专利申请权或者专利权的归属发生纠纷，已 请求管理专利工作的部门调解或者向人民 法院起诉的，可以请求国务院专利行政部门 中止有关程序”，中止无效宣告程序属于中 止有关程序之一，B选项正确。C选项，《专 利纠纷适用法律问题的若干规定》第4条第 1款规定：“人民法院可以要求原告提 交检索报告或者专利权评价报告。原告无 正当理由不提交的，人民法院可以裁定中止 诉讼或者判令原告承担可能的不利后果”， C选项正确。D选项，《专利纠纷适用法律问 题的若干规定》第4条第2款规定：“侵犯实 用新型、外观设计专利权纠纷案件的被告请 求中止诉讼的，应当在答辩期内对原告的专 利权提出宣告无效的请求”，D选项正确。 （2018改编）"},
  {id: 607, topic: "专题二十四 专利权的内容", type: "multiple", question: "甲公司欲向乙银行贷款，将其拥有的一项专利权出质给该银行作为担保，下列说法哪些是正确的？", options: {"A": "甲公司与乙银行应当就专利权质押订立单独的合同", "B": "甲公司应当与乙银行共同向国务院专利行政部门办理由质登记", "C": "甲公司与乙银行应当就专利权质押订立书面质押合同", "D": "专利权质押期间，甲公司未提交乙银行同意其放弃该专利权的证明材料的，国务院专利行政部门不予办理专利权放弃手续"}, answer: "ACD", explanation: "A选项，甲公司以实用新型 专利提起侵权诉讼，被控侵权人乙公司也可 以主动出具专利权评价报告，A选项正确。 B选项，诉前证据保全应向人民法院提出，B 选项错误。C选项，《专利纠纷应用法律若 干问题的解释（二）》第2条第1款规定：“权 利人在专利侵权诉讼中主张的权利要求被 国务院专利行政部门宣告无效的，审理侵犯 专利权纠纷案件的人民法院可以裁定驳回 权利人基于该无效权利要求的起诉”，因此 C选项正确。D选项，《专利法》第46条第2 款规定：“对国务院专用行政部门宣告专利 权无效或者维持专利权的决定不原的，可以 自收到通知之日起三个月内向人民法民起 诉。人民法院应当通知无效宣告请求程序 的对方当事人作为第三人参加诉讼”，D选 项正确。（2016改编）"},
  {id: 608, topic: "专题二十四 专利权的内容", type: "single", question: "甲公司和乙公司共同拥有一项实用新型专利权，其未对权利的行使进行约定，现甲公司欲以该专利权进行质押融资。下列说法哪些是正确的？", options: {"A": "该专利权的质押须取得乙公司的同意", "B": "申请专利权质押登记时，应当向国家知识产权局提交该专利权的评价报告", "C": "在该专利权的质押期间内可以对该专利权再次进行质押", "D": "在该专利权的质押期间内转让该专利权的，须取得质权人的同意"}, answer: "B", explanation: "，A、B选项，《专利法》第13条规 定：“发明专利申请公布后、申请人可以要求 实施其发明的单位或者个人支付适当的费 用”，因此乙、丙均应向甲支付费用，A选项 错误，B选项正确。C、D选项，《专利法》第 74条规定：“设专利权的诉讼对效为3年、 自专利权人或者利害关系人知道或者应当 知道侵权行为以及侵权人之B题计算、发 明专利申请公布至专用权授予前使用该 发明未支付适当使用费的、专利权人要求支 付使用费的诉讼时效为3年，自专利权人知 道或者应当知道他人使用其交明之日起计 算，但是、专利权人于专利权投予之日前即 已知道或者应当知道的，自专利权授予之日 起计算”，因此乙、丙在甲获得专利权之前的 制造和销售不构成侵权，甲在2024年5月1 日前无权要求乙停止制造销售行为、甲的话 讼时效应自2024年5月1日起3年，C、D选 项错误。（2016改编）"},
  {id: 609, topic: "专题二十四 专利权的内容", type: "multiple", question: "下列哪些情况下，专利权质押登记申请不予登记？", options: {"A": "出质人不是专利登记簿记载的专利权人", "B": "专利权已经终止", "C": "专利权处于年费缴纳滞纳期", "D": "专利权已被启动无效宣告程序，而质权人仍要求办理专利权质押登记"}, answer: "CD", explanation: "根据（专利法）第74条第1款 的规定，漫见专利权的诉讼时效为3年，自 专利权人或者相害关系人知道或者应当知 道侵权行为以及侵权人之日起计算，因此 C、D选项正确。（薇编）"},
  {id: 610, topic: "专题二十四 专利权的内容", type: "multiple", question: "下列哪些行为应当经国家知识产权局登记才能生效？", options: {"A": "转让专利权", "B": "许可他人实施专利权", "C": "书面声明放奔专利权", "D": "质抑专利权"}, answer: "ABCD", explanation: "A、C选项，根据《药品专利 纠纷早期决办法》第7条的规定，专利权 人或者利害关系人对四类专利声明有异议 的，可以自国家药品审评机构公开药品上市 可申请之日起45日内，就申请上市药品 的相关技术方案是否落入相关专利权保护 范围向人民法院提起诉讼或者向国务院专 利行政部门请求行政裁决，因此A、C选项正 确。B选项，药品专利纠纷早期解决机制只 涉及仿制药的技术方案是否落入专利权保 护范围，B选项正确。D选项，根据《药品专 利纠纷早期解决办法》第2条第2款的规定， 未在中国上市药品专利信息登记平台登记 相关专利信息的，不适用本办法，因此D选 项正确。（新编）"},
  {id: 611, topic: "专题二十四 专利权的内容", type: "multiple", question: "甲关于冷、热水混水水龙头的发明创造被授予实用新型专利权,乙在该实用新型专利基础上改进了该水龙头的温度调节性能,并就此获得了一项发明专利权、该发明专利的实施依赖于甲的实用新望专利的实施。下列说法哪些是正确的？A，甲可以不经乙同意，实施该发明专利", options: {"B": "乙可以不经甲同意,实施该发明专利", "C": "甲、乙可以通过签订交叉许可合同实施该发明专利", "D": "任何第三方需要经过甲、乙同意，才能实施该发明专利", "A": ""}, answer: "BC", explanation: "A选项，即使甲制药公司没有 在中国上市药品专利信息登记平台上登记 专利信息，只是不能适用药品专利纠纷早期 解决机制，在仿制药上市后，仍然可以通过 诉讼等方式解决侵权纠纷，因此A选项错 误。B选项，药品的新用途可以登记，制备 方法不能登记，B选项正确。C选项，仿制药 申请受理后10个工作日内通知专利权人， 说法正确。D选项，甲制药公司对乙制药公 司四类声明有异议的，应当自国家药品审评 机构公开该药品上市许可申请之日起45日 内提出，因此D选项错误。（新编）"},
  {id: 612, topic: "专题二十四 专利权的内容", type: "single", question: "以下哪些说法符合我国专利法的规定？", options: {"A": "除专利法另有规定外，发明专利权人有权禁止他人为生产经营目的许诺销售其专利产品", "B": "除专利法另有规定外，方法发明专利权人有权禁止他人为生产经营目的制造与依照其专利方法直接获得的产品相同的产品", "C": "除专利法另有规定外，实用新型专利权人有权禁止他人为生产经营目的许诺销售、销售、进口其专利产品", "D": "除专利法另有规定外，外观设计专利权人有权禁止他人为生产经营目的制造、使用、销售其专利产品"}, answer: "C", explanation: "A选项，如果专利权人或者利 害关系人未就上市药品的相关技术方案是 否落入相关专利权保护范围向人民法院提 起诉讼或者向国务院专利行政部门请求行 政裁决，不启动等待期，因此，提出无效宣告 请求不是设置9个月等待期的条件，A选项 错误。B、C、D选项，根据《药品专利纠纷早 期解决办法》第11条的规定，对首个挑战专 利成功并首个获批上市的化学仿制药，给予 市场独占期。国务院药品监督管理部门在 该药品获批之日起12个月内不再批准同品 种仿制药上市。因此C选项正确，B、D选项 错误。（新编）"},
  {id: 613, topic: "专题二十四 专利权的内容", type: "multiple", question: "在未经专利权人同意的情况下，在专利权的有效期内，下列哪些行为侵犯了专利权？", options: {"A": "甲公司从公开渠道获得了一份技术材料，但不知其已经获得发明专利权，甲自行应用该技术生产产品并销售", "B": "乙按照他人的外观设计专利用作了一套沙发以自用", "C": "丙实施了他人的实用新型专利技术方案，将产品以成本价卖给某公司", "D": "医院丁按照一件中药发明专利的技术方案配制汤药用以医治病人"}, answer: "CD", explanation: "A选项，药品专利纠纷早期解 决机制解决的是原研药上市许可持有人与 仿制药申请人之间的纠纷，因此平台登记需 要药品上市许可持有人去登记专利信息，而 不是专利权人去登记。另外，登记时间为获 得药品注册证书的30日内，不是专利授权 的30日内，因此A选项错误。B选项，中间 体、代谢产物、晶型、制备方法、检测方法专 利不属于登记范围，B选项错误。C、D选项 说法正确。（新编）"},
  {id: 614, topic: "专题二十四 专利权的内容", type: "multiple", question: "李禁发期了一种从花生中提炼食用油的新方法，采用该方法提的用油与现有花生食用油没有任何区别、但在提炼过程中厨的产生了一种可用于食品加工的新物质G。李某就该提炼食用的方法及新物质G分别申请了专利并获得了授权。以下哪些说法是正确的？", options: {"A": "王集未经李某许可使用该新方法从花生中提炼食用油、并交由张某进行销售，张某的行为侵犯了李某的专利权", "B": "刘某使用其他方法制造并销售物质C，刘某的行为侵犯了李某的专利权", "C": "吕某未经李某许可使用该新方法从花生中提炼食用油自行食用，并将产生的物质G无偿送给了黄某，黄某将物质C售出，吕某的行为侵犯了李某的专利权", "D": "某食品加工厂在李某的专利申请提出之后公布之前，自行研制出了该种提炼食用油的新方法，并在李某的申请授权后使用该方法来制造物质G用于食品加工，该食品加工厂的行为侵犯了李某的专利权"}, answer: "AB", explanation: "《专利纠纷行政裁决和调解办 法》第6条第1款规定：“专利侵权纠纷案件 由侵权行为地或者被请求人住所地的管理 专利工作的部门管辖。侵权行为地包括侵 权行为实施地和侵权结果发生地”。本题 中，天津市为被请求人住所地，重庆市为侵 权行为地，因此A、B选项正确。（2014改编）"},
  {id: 615, topic: "专题二十四 专利权的内容", type: "single", question: "甲化工厂委托大学教授王某对乙烯生产方法进行了改进，未对该改进方法申请专利的权利作出约定。王某就改进的乙烯生产方法向国家知识产权局提出了专利申请并被授予专利权。甲化工厂使用了王某的技术改进，并将生产出的乙烯销售给丙塑料制品厂。乙化工厂使用传统工艺做出了和甲化工厂同样的乙烯。下列说法哪些是正确的？", options: {"A": "甲化工厂未经王某许可而使用该改进方法生产和销售乙烯产品的行为侵犯了王某的专利权某的专利权", "C": "丙塑料制品厂购买甲化工厂生产的乙烯并生产塑料产品的行为不需要得到王某的许可", "D": "若乙化工厂也想使用甲厂的乙烯生产工艺，需要得到王某的许可", "B": "甲化工厂未经王某许可而使用该改进方法的行为不构成侵权，因为王某的技术改进系利用了甲的设备完成"}, answer: "B", explanation: "根据《专利纠纷行政裁决和调解 办法》第6条第2款的规定，除专利侵权纠纷 以外的调解案件，由被请求人住所地的管理 专利工作的部门管辖。因此B选项正确。 （新编）"},
  {id: 616, topic: "专题二十四 专利权的内容", type: "multiple", question: "下列说法哪些是正确的？", options: {"A": "将侵犯发明专利权的产品作为零部件，制造另一产品的，属于未经专利权人许可的使用专利产品的行为", "B": "将侵犯实用新型专利权的产品作为零部件，制造另一产品的，属于未经专利权人许可制造专利产品的行为", "C": "将侵犯外观设计专利权的产品作为零部件，制造另一产品并销售的，属于未经专利权人许可制造专利产品的行为", "D": "将使用专利方法获得的原始产品进一步加工而获得后续产品的行为，属于使用依照该专利方法直接获得的产品"}, answer: "BCD", explanation: "A、B选项，《专利纠纷行政裁 决和调解办法》第7条第1款规定：“省、自治 区、直辖市管理专利工作的部门可以处理辖 区内涉外、涉港澳台或者侵权行为地涉及两 个以上地级行政区的有重大影响的专利纠 纷行政裁决和调解案件。”，A选项属于涉及 港澳台的专利纠纷，应由广东省市场监督管 理局，因此A选项错误，B选项正确。C选 项，《专利纠纷行政裁决和调解办法》第8条 第2款规定：“上级管理专利工作的部门根 据案件情况可以将下级管理专利工作的部 门管辖的专利纠纷案件提级处理，也可以指 定有管辖权的下级管理专利工作的部门管 辖专利纠纷案件”，因此C选项正确。D选 项，《专利纠纷行政裁决和调解办法》第7条 第2款规定：“专利管理工作量大又有实际 处理能力的地级市、自治州、盟、地区和直辖 市的区管理专利工作的部门负责处理辖区 内发生的专利纠纷行政裁决和调解案件。”， 因此D选项正确。（新编）"},
  {id: 617, topic: "专题二十四 专利权的内容", type: "multiple", question: "甲公司就一项制造橡胶的方法获得发明专利授权，乙公司未经专利权人甲公司的许可，使用该专利方法制造出橡胶并销售给丙公司，丙公司对橡胶作进一步加工，制造成车轮。丁汽车厂和丙公司签订了车轮销售协议，约定于2024年7月1日前交付。2024年3月，甲公司向法院起诉专利侵权，以下说法正确的有：", options: {"A": "乙公司未经许可制造橡胶的行为属于使用专利方法，其销售的橡胶并不属于侵权产品", "B": "虽然甲公司并未获得橡胶产品的相关专利，但是丙公司制造车轮仍属于侵权行为", "C": "丙公司制造车轮的行为不构成对甲公司专利的侵权", "D": "丙公司销售车轮的行为不构成对甲公司专利的侵权"}, answer: "ABC", explanation: "A选项，根据《专利纠纷行政 载决和调解办法》第9条第1款的规定，当事 人对管辖权有异议的，应当在提交答辨书期 同提出，因此A选项正确。B、C、D选项，《专 利纠纷行政裁决和调解办法》第9条第2款 规定：“管理专利工作的部门发现专利纠纷 素件不属于该部门管辖的。不予立案。若立 素后发现不属于管辖范围的，应作撒案处 理；同时，应当将案件线索移送有管辖权的 管理专利工作的部门处理、移送前告知请求 人”，因此B、C选项正确，D选项错误，应当 撤案，并将案件线索移送有管辖权的部门。 （新编）"},
  {id: 618, topic: "专题二十四 专利权的内容", type: "single", question: "丙发明了一种机械装置并获得发明专利权，设计单位甲未经丙许可，为乙设计绘制了该发明专利装置的零件图和总装图，并获取了设计报酬。以下说法正确的是：", options: {"A": "无论乙是否采用甲的设计方案用于生产经营活动，甲的上述行为都不属于直接侵犯丙的专利权的行为", "B": "如果乙没有采用甲的设计方案实际制造并销售该装置，则甲和乙的上述行为均不构成对丙的专利的侵权", "C": "如果乙采用甲的设计方案实际制造并销售该装置，则乙的上述行为侵犯丙专利权，但甲的上述行为不构成对丙的专利的侵权", "D": "如果乙采用甲的设计方案实际制造并销售该装置，则甲乙的上述行为构成对丙的专利的共同侵权"}, answer: "B", explanation: "B选项，甲公司在上海发现侵犯 专利权的产品，上海属于进口地、因此上海 市知识产权局有管辖权，B选项正确。A、C、 D选项，商务部没有处理专利侵权纠纷的职 权，本题中也没有给出属于重大专利侵权纠 给的情形，因此国家知识产权局也没有管辖 权，A、C选项错误。虽然货物被海关查扣、 海关并无判断是否构成专利侵权的职责，D 选项错误。（新编）"},
  {id: 619, topic: "专题二十四 专利权的内容", type: "multiple", question: "下列哪些未经专利权人许可的行为构成了侵犯专利权的行为？", options: {"A": "某大学使用专利方法制造了扩音设备用于教学", "B": "某汽车制造厂将实用新型专利产品用作汽车内部零部件", "C": "某电视机厂将外观设计专利产品用作电视机内部不可见的零部件并进行销售", "D": "某家具厂依照外观设计专利用造了家具在展销会上展出"}, answer: "AC", explanation: "《专利纠纷行政裁决和调解办 法》第28条规定：“有以下情形之一的，管理 专利工作的部门应当依申请或者依职权中 止案件处理：（一）涉案实用新型、外观设计 专利权被申请宣告无效并被国务院专利行 政部门受理的【A选项】·（六）该案必须以 另一案的审理结果为依据，而另一案尚未审 结的【C选项】”。《专利纠纷行政裁决和调解 办法》第29条规定：“有下列情形之一的，管 理专利工作的部门可以不中止案件处理： （二）请求人出具的专利权评价报告未发现 实用新型或者外观设计专利权存在不符合 授予专利权条件的缺陷【B选项】（三）被 请求人撤回无效宣告请求后案件恢复处理， 其再次提出无效宣告请求，并请求中止的 【D选项】”，因此A、C选项属于中止情形。 B、D选项属于不中止情形。（新编）"},
  {id: 620, topic: "专题二十四 专利权的内容", type: "multiple", question: "吴某在一次试验中发现市面上出售的某种洗涤剂具有很好的防止树木枯萎的功效，于是他将这种洗涤剂的新用途申请了专利，并获得了授权。以下哪些未经吴某许可的行为侵犯了吴某的专利权？", options: {"A": "王某从市面上购买了该种洗涤剂用来防止其家中的观赏树木枯萎", "B": "某花卉种植公司自行配制了该种洗涤剂用来防止其出售的树木枯萎", "C": "某厂在其制造的该种洗涤剂包装上注明了该洗涤剂具有防止树木枯萎的用途", "D": "某食品加工厂配制了该洗涤剂用来清洗器皿"}, answer: "AB", explanation: "根据《专利纠纷行政裁决和调 解办法》第30条的规定，侵权行为成立与 否，都应当发出行政裁决书，因此A选项正 确，D选项错误。B选项，根据《专利纠纷行 政裁决和调解办法》第36条的规定，请求人 撤回处理请求，管理专利工作的部门可以撤 销专利侵权纠纷案件，发出撤销专利侵权纠 纷案件决定书，B选项正确。C选项，当事人 达成调解协议的，即使能当场执行，也应作 出专利侵权纠纷调解协议书而非直接结案。 （新编）"},
  {id: 621, topic: "专题二十四 专利权的内容", type: "multiple", question: "甲公司获得一项灯具的外观设计专利权。乙公司未经申公司许可制造了相同外观设计的灯具，并由丙公司出售给丁酒店。丁酒店使用该灯具装饰其酒店大堂。下列说法正确的是？", options: {"A": "乙的制造行为侵犯了甲的专利权", "B": "丙的销售行为侵犯了甲的专利权", "C": "丁的使用行为侵犯了甲的专利权，但因其能证明产品的合法来源，可以不承担侵权赔偿责任", "D": "丁的使用行为未侵犯甲的专利权"}, answer: "ABCD", explanation: "《专利纠纷行政裁决和调解 办法》第36条规定：“出现下列情形之一时， 管理专利工作的部门可以撒销专利侵权纠 纷案件：（一）立案后发现不符合受理条件 的…·（三）请求人死亡或者注销，没有继承人 或者承受人，或者继承人或者承受人放弃处 理请求的；（四）被请求人死亡或者注销，没 有遗产或者剩余财产，或者没有应当承担义 务的人的·涉案专利的权利要求书有两项 以上权利要求的，请求人应当在请求书中载 明据以请求处理被请求人侵犯其专利权的 权利要求项。请求书对此未记载或者记载 不明的，管理专利工作的部门应当要求请求 人明确。经释明，请求人仍不予明确的，可 以撤案处理”。因此A、B、C、D选项均正确。 （新编）"},
  {id: 622, topic: "专题二十四 专利权的内容", type: "multiple", question: "甲获得一项外观设计专利。乙在该专利申请日后、授权公告前未经甲的许可制造了一批该专利产品并销售给丙。丙将该外观设计专利产品作为零部件组装到自已的产品上提升产品美感，并在该外观设计专利授权公告后持续向市场销售。则以下说法正确的是？", options: {"A": "乙的上述行为侵犯甲的外观设计专利权", "B": "乙的上述行为不属于侵犯甲的外观设计专利权的行为", "C": "丙的上述行为侵犯甲的外观设计专利权", "D": "丙的上述行为不侵犯甲的外观设计专利权"}, answer: "ABCD", explanation: "根据《专利纠纷行政裁决和 调解办法》第32条的规定，侵权人未经专利 权人许可使用专利方法的，管理专利工作的 部门认定侵权行为成立的，可责令侵权人立 即停止使用该方法、销毁实施专利方法的专 用设备、停止销售依照专利方法直接获得的 侵权产品；管理专利工作的部门认定电子商 务平台上的专利侵权行为成立的，应通知平 台经营者及时对专利侵权产品相关网页采 取删除、屏、新开链接、终止交易和服务等 必要措施。因此，A、B、C、D选项均正确。 （新编）"},
  {id: 623, topic: "专题二十四 专利权的内容", type: "single", question: "某公司拥有一项3D打印机的专利权。下列哪个行为侵犯了该公司的专利权？", options: {"A": "为了改进该打印机的性能，甲自行制造了一台该种3D打印机用于实验", "B": "乙未获得该公司的许可而在报纸上发布出售该种3D打印机的信息", "C": "丙从该公司购买了一台3D打印机，未经该公司同意，公开出售由该3D打印机打印出的产品", "D": "丁从该公司批发了一批3D打印机，并以高价出口到该公司未获得专利权的国家"}, answer: "C", explanation: "根据《专利纠纷行政载决和调 解办法》第37条的规定，管理专利工作的部 门处理专利侵权纠纷，应当自立美之日起3 个月内结案，类件复杂可延长1个月，延期 后仍不能结案，经上一级部门批准可确定不 超过2个月的延长期限，因此最长应于立案 之日起6个月结案，C选项正确、（新编）"},
  {id: 624, topic: "专题二十四 专利权的内容", type: "single", question: "在专利申请日前已经制造相同产品、使用相同方法或者已经作好制造、使用的必要准备，并且仅在原有范围内继续制造、使用的，不视为侵犯专利权。下列关于上述作好必要准备和原有范围的说法哪些是正确的？", options: {"A": "已经完成实施发明创造所必需的主要技术图纸属于专利法所规定的作好了制造、使用的必要准备", "B": "已经购买实施发明创造所必需的主要设备属于专利法所规定的作好了制造、使用的必要准备", "C": "原有范围包括专利申请日前已有的生产规模", "D": "原有范围包括利用专利申请日前已有的生产设备可以达到的生产规模"}, answer: "B", explanation: "根据《专利法》第65条的规定、 管理专利工作的部门处理侵犯专利权纠纷 时，认定侵权行为成立的，可以责令受权人 立即停止侵权行为，当事人不服的，可以自 收到处理通知之日起15日内依照《中华人 民共和国行政诉讼法》自人民法院起诉。本 题中，王其于2025年5月23日收到处理通 知，其应在2025年6月7日前岗人民法院起 诉，因此B选项正确。本题需要注意的是、 管理专利工作的部门发出的通知以实际收 到日为准，百不是以发文日起满15天为推 定收到日。（新编）"},
  {id: 625, topic: "专题二十四 专利权的内容", type: "multiple", question: "甲公司在中国拥有一项抗癌药品的专利权，并在中国国内进行了制造销售。以下未经甲公司许可的哪些行为侵犯了甲公司的专利权？", options: {"A": "乙是病人，从印度购买仿制的该专利药品自已服用，并将多余的药品带回国内销售", "B": "丙从甲公司购买了该专利药品，将其加价卖给第三人", "C": "丁在国内某报纸上发布印度仿制的该专利药品的销售广告", "D": "戊见甲公司销售的药品价格过于昂贵，自行制造并低价销售该专利药品"}, answer: "AD", explanation: "《专利纠纷行政裁决和调解办 法》第80条规定：“被请求人期满不起诉又 不停止侵权行为的，管理专利工作的部门可 以自被执行人的履行期限届满之日起3个 月内申请人民法院强制执行。管理专利工 作的部门在上述申请执行的期限内未申请 人民法院强制执行的，生效的行政裁决确定 的权利人或者其继承人、权利承受人可以在 6个月内申请人民法院强制执行”。因此A、 D选项正确。（新编）"},
  {id: 626, topic: "专题二十四 专利权的内容", type: "multiple", question: "下列哪些情形不视为侵犯专利权？", options: {"A": "某药厂为提供行政审批所需要的信息进口一批专利药品", "B": "甲获得一项发明专利，乙在该专利申请日前已经实施与之相同的技术并在原有范围内继续实施", "C": "某临时通过中国领空的美联航飞机上为其自身需要而使用有关专利", "D": "某大学实验室使用有关专利进行科学研究以便对其加以改进"}, answer: "ABC", explanation: "A选项，根据《专利纠纷行政 裁决和调解办法》第48条的规定，涉及方法 专利的，可以从涉燎依照该方法直接获得的 产品中抽取一部分作为样品。因此A选项 正确。B选项，根据上述《办法》第51条的规 定，主张权利的一方提供了另一方持有相关 证据的初步证据，另一方不提供相关证据， 可认定主张权利的一方关于该证据的主张 成立，因此B选项正确。C选项，根据上述 《办法》第49条的规定，在证据可能灭失或 者以后难以取得，又无法进行抽样取证的情 况下，经管理专利工作的部门负责人批准， 管理专利工作的部门可以进行登记保存，因 此B选项正确。D选项，根据上述《办法》第 54条的规定，应指定不少于15日的举证期 限，D错误。（新编）"},
  {id: 627, topic: "专题二十四 专利权的内容", type: "multiple", question: "一艘从美国开往韩国的观光旅游船临时在中国大连停靠，以下哪些工具使用了中国有关专利也不构成专利侵权？", options: {"B": "发动机", "A": "船舶索具", "D": "游客房间中的床", "C": "导航仪器"}, answer: "CD", explanation: "A、C选项，对于重大专利侵权 纠纷，除了国务院专利行政部门可以处理 外，管理专利工作的部门也可以处理，A选 项错误，C选项正确。B选项，《专利纠纷行 政裁决和调解办法》第57条规定：“省、自治 区、直辖市管理专利工作的部门对于辖区内 专利侵权纠纷行政裁决请求，认为属于在全 国有重大影响的专利侵权纠纷的，可以报请 国务院专利行政部门进行行政裁决”，因此 B选项错误。D选项，根据《专利纠纷行政裁 决和调解办法》第56条的规定，请求人对在 全国有重大影响的专利侵权纠纷提出行政 裁决请求的，还应当提交被请求人住所地或 者侵权行为地省、自治区、直辖市管理专利 工作的部门出具的符合重大专利侵权纠纷 情形的证明材料，D选项正确。（新编）"},
  {id: 628, topic: "专题二十四 专利权的内容", type: "multiple", question: "甲公司于2021年2月研制出一种用于测试室内空气清洁度的装置，并于2021年6月提交了发明专利申请。乙厂于2021年1月研制出了同样的装置，并于2021年5月作好制造准备后开始投产，于2021年11月将生产出的1500台装置投放市场销售。2024年3月10日，甲公司的发明专利申请被公告授予专利权，此时，随着市场需求量增加，乙厂在现有生产线的基础上组织工人加班加点，生产规模达到2500台。以下说法哪些是正确的？", options: {"A": "甲公司的专利权应当被宣告无效，因为甲公司研制出该装置的时间是在乙厂之后", "B": "乙厂2021年11月的销售行为构成了对甲公司专利权的侵犯", "C": "乙厂在2024年3月10日前的行为并不构成侵权，但其后的生产销售行为侵犯了甲公司的专利权", "D": "乙厂在2024年3月10日后的生产销售行为不视为侵犯甲公司的专利权"}, answer: "ABC", explanation: "《细则》第96条第1款规定： “有下列情形之一的，属于专利法第70条所 称的在全国有重大影响的专利侵权纠纷： （一）涉及重大公共利益的；（二）对行业发展 有重大影响的；（三）跨省、自治区、直辖市区 域的重大案件；（四）国务院专利行政部门认 为可能有重大影响的其他情形”。因此A、 B、C选项正确，D选项错误。（新编）"},
  {id: 629, topic: "专题二十四 专利权的内容", type: "multiple", question: "下列关于先用权的说法哪些是正确的？", options: {"A": "在发明专利的申请日之后、公布之前已经制造相同产品的，享有先用权", "B": "被诉侵权人以非法获得的技术主张先用权抗辩的，人民法院不予支持", "C": "先用权人可以将其先用权单独转让", "D": "先用权人可以将其先用权与原有企业一并转让"}, answer: "ACD", explanation: "根据《专利纠纷行政裁决和 调解办法》第66条的规定，被请求人提交意 见陈述书并同意调解的，管理专利工作的部 门才可以立案，如提交了意见陈述书，但在 陈述书中表示不接受调解的，管理专利工作 的部门也不得立案。因此A选项正确，B选 项错误。《专利纠纷行政裁决和调解办法》第 67条规定；“请求人无正当理由不按照通知 的时间和地点参加调解的，管理专利工作的 部门按照主动搬回请求处理；被请求人无正 当理由不按照通知的时间和地点参加调解 的、管理专利工作的部门按照未能达成协议 处理，以撒销案件的方式结案，并通知双方 当事人”。因此C、D选项正确。（新编）"},
  {id: 630, topic: "专题二十四 专利权的内容", type: "single", question: "甲拥有一项X产品实用新型专利权，其向法院起诉乙制造的产品侵犯自已的专利权，以下哪些可以作为乙不侵权抗辩的由？", options: {"A": "乙用于制造X产品的设备是以合理价格从他人手中购买的", "B": "乙在甲申请专利之前自行完成了研发并开始制造X产品", "C": "乙就其所制造的产品拥有自己的专利权", "D": "乙有证据表明其生产的X产品属于现有技术"}, answer: "D", explanation: "根据《专利纠纷行政裁决和调 解办法》第70条第3款的规定、管理专翔工 作的部门调解专利权权属纠纷、应当在2个 月内结案。案件特别复杂需要延长期限的。 应当由管理专利工作的部门负责人批准，经 批准延长的期限，最长不超过1个月。因此 最长结案时间是3个月。（新编）"},
  {id: 631, topic: "专题二十四 专利权的内容", type: "single", question: "专利权人王某发现李某未经许可而实施其专利，遂向人民法院起诉。李某主张其实施的技术方案属于现有技术，因而不侵犯王某的专利权，同时李某还主张，该专利权不具备新颖性和创造性应当被宣告无效，并提供了充足的证据。下列说法哪个是正确的？", options: {"A": "人民法院应当就该专利权是否有效进行审理", "B": "人民法院应当中止诉讼，告知李某向国务院专利行政部门请求宣告该专利权无效", "C": "人民法院认定李某实施的技术方案为现有技术的，可以直接宣告该专利权无效", "D": "人民法院认定李某实施的技术方案为现有技术的，可以直接判决李某不侵权"}, answer: "B", explanation: "，根据（专利纠纷行政遗决和调 解办法>第75条的规定，发明专利申请公布 时申请人请求保护的范围与发员专利公告 授权时的专利权保护范围不一致，被控技术 方案落入上述两种范围的，管理专利工作的 部门应当认定被请求人在对保护期内买 施了该友明，若涉及分乘申请，该分晃申请 的公布日以原申请和分案申请中早公 的日期为准。本题中、母案公布日（2024年 12月17日）早于子案公布日（2025年2月1 日），因此B选项正确。（新编）"},
  {id: 632, topic: "专题二十四 专利权的内容", type: "multiple", question: "关于现有技术抗辩，以下说法错误的是？", options: {"A": "用于不侵权抗辩的现有技术，必须是可以自由使用的现有技术，不包括仍在有效保护期内的专利技术", "B": "可以使用抵触申请作为不侵权抗辩的现有技术", "C": "仅当被控侵权物的全部技术特征与一份现有技术方案的相应技术特征完全相同时，才可以认为不侵权抗辩成立", "D": "如果被控侵权人主张被控侵权物相对于两份现有技术的结合显而易见，则该抗辩理由不成立"}, answer: "ACD", explanation: "（细则》第I01条规定：“下列 行为属于专利法第68条规定的复曾专利的 行为：（一）在未被授予专利权的产品或者其 包装上标注专利标识，专利权被宣告无效后 或者终止后续在产品或者其包装上标注 专利标识[A选项】，或者未经许可在产品或 者产品包装上标注他人的专利号【D选 项】、（三）在产品说明书等材料中将未 被授予专利权的技术或者设计称为专利技 术或者专利设计【C选项】·专利权终止 前依法在专利产品、依照专利方法直接获得 的产品或者其包装上标注专利标识，在专利 权终止后许诺销售、销售该产品的，不属于 假冒专利行为【B选项】·..”，因此A、C、D 选项属于假冒专利的行为，B选项不属于假 冒专利的行为。（2019）"},
  {id: 633, topic: "专题二十四 专利权的内容", type: "multiple", question: "甲向人民法院起诉乙侵犯其于2021年10月1日申请并于2023年10月10日被授权的产品发明专利权。该专利的权利要求包括特征L、M、N，乙实施的技术包含特征L、M、N、O。乙证明存在下列哪些事实之一，就足以认定其不侵犯甲的专利权？", options: {"A": "乙实施的技术已经记载在2021年8月30日公布的丙的发明专利申请中", "B": "乙实施的技术已经记载在2021年3月1日申请、2021年10月16日公告授权的丙的实用新型专利申请中", "C": "含有特征L、M、0的技术方案已经记载在2020年1月10日公告授权的丙的专利中，含有特征L、N、O的技术方案已经记载在2021年3月10日公告授权的丙的专利中", "D": "乙实施的技术已经在2021年3月1日出版的某科技期刊上刊载"}, answer: "BCD", explanation: "A选项，甲公司销售专利权 终止前依法标注专利标识的产品，不构成假 冒专利的行为。C选项，专利权被终止后继 续在产品说明书上标注专利标识的，构成假 冒专利的行为，因此C选项当选。B选项属 于未经许可标注他人的专利号，D选项属于 变造专利证书，均构成假冒专利的行为，因 此B、D选项当选。（新编）"},
  {id: 634, topic: "专题二十四 专利权的内容", type: "multiple", question: "甲公司拥有一项推荐性行业标准中明示的必要专利技术，乙公司未经甲公司同意，在其制造的产品中使用了该项专利技术，以下说法正确的是？", options: {"A": "由于该专利已被列人推荐性行业标准，因此乙公司使用该项技术无须支付许可费", "B": "由于该专利已被列人推荐性行业标准，因此乙公司使用该项技术不侵犯甲公司专利权", "C": "乙公司多次向甲公司提出请求，希望以合理的条件获得实施许可但无法达成一致的，可以请求人民法院确定", "D": "如果乙公司希望获得实施许可，并提出了合理的实施许可条件，但甲公司不同意，又向人民法院主张乙公司承担停止侵权行为的，人民法院一般不予支持专利侵权判断"}, answer: "BC", explanation: "A、C选项，根据《专利法》第65 条的规定，侵犯专利权的，只承担民事责任， 不会被追究刑事责任，因此A选项错误，C 选项正确。BD选项，根据《专利法》第68 条的规定，假冒专利的，除依法承担民事责 任外，构成犯罪的，依法追究刑事责任，因此 B选项正确，D选项错误。（2018)"},
  {id: 635, topic: "专题二十五 专利侵权判断", type: "multiple", question: "关于侵犯专利权纠纷案件的审理，下列哪些说法是正确的？", options: {"A": "权利人主张以从属权利要求确定保护范围的，人民法院以该从属权利要求记载的附加技术特征及其引用的权利要求记载的技术特征，确定专利权的保护范围", "B": "对于权利要求中以效果表述的技术特征，人民法院结合说明书和附图描述的该效果的具体实施方式及其等同的实施方式，确定该技术特征的内容", "C": "对于仅在说明书中描述而在权利要求中未记载的技术方案，权利人在侵犯专利权纠纷案件中将其纳人专利权保护范围的，人民法院不予支持", "D": "专利申请人在授权程序中通过意见陈述放弃的技术方案，权利人在侵犯专利权纠纷案件中将其纳人专利权保护范围的，人民法院不予支持"}, answer: "ABD", explanation: "A选项，乙公司未经许可标 注甲公司的专利号构成假冒专利行为，丙公 司销售乙公司的假冒专利产品也构成了假 冒专利行为，因此A选项正确。B选项，乙 公司和丙公司未经甲公司许可且以生产经 营为目的制造专利产品的行为均侵犯甲公 司的专利权，B选项正确。C选项，专利执法 部门的执法权力来自于专利法的授权，无需 经人民法院批准，因此C选项错误。D选 项，丙公司销售的产品既属于假冒专利产 品，同时也构成侵权，但是如果其能证明合 法来源，适用善意侵权行为的部分免责，即 不承担赔偿责任，但应停止销售，因此D选 项正确。（2016改编） 23，ABCD。A选项，对于专利侵权行 为，管理专利工作的部门是依申请处理平等 民事主体之间的民事纠纷，属于行政裁决， A选项正确。B选项，查处假冒专利行为是 专利执法的部门依职权进行的单方面具体 行政行为，B选项正确。C选项，对于假冒专 利行为，任何人都可以举报，专利执法的部 门接到举报后可以主动查处，C选项正确。 D选项，只有专利权人或利害关系人才能作 为专利权的权利人提出行政裁决请求（即提 出专利权侵权处理），D选项正确。（新编）"},
  {id: 636, topic: "专题二十五 专利侵权判断", type: "multiple", question: "一项专利的独立权利要求包含N、O两个技术特征，从属权利要求还包括特征P。下列哪些技术方案落人了该专利的保护范围？", options: {"A": "一项由N、O、P三个技术特征构成的技术方案", "B": "一项由N、O、P、Q四个技术特征构成的技术方案", "C": "一项由N、0\'、Q三个技术特征构成的技术方案，其中0是0的等同特征", "D": "一项由N、O、Q三个技术特征构成的技术方案，其中Q不等同于P"}, answer: "ACD", explanation: "A选项，根据《细则》第101 条第2款的规定，未经许可在严品或者产品 包装上标注他人的专利号，属于假冒专利的 行为，因此A选项正确。B、C、D选项，《专科 法》第68条规定：“假冒专利的、除依法承担 民事责任外，由负责专利执法的部门责令设 正并予公告，没收违法所得，可以处违法所 得五倍以下的罚款；没有违法所得或者违法 所得在五万元以下的，可以处二十五万元以 下的罚款；构成犯罪的，依法追究刑事责 任”，国家知识产权局没有处理假冒专利的 职权，因此B选项错误；李某违法所得为5 万元以下，可以处罚25万元以下的罚款，C 选项正确，D选项正确。（新编）"},
  {id: 637, topic: "专题二十五 专利侵权判断", type: "multiple", question: "甲就研磨机获得了一项实用新型专利权，其授权公告的独立权利要求1包括a、b、c、d四个技术特征，以下哪些产品落入该实用新型专利权的保护范围？", options: {"A": "乙制造的研磨机，包括a、b、c、e四个技术特征，其中特征e为记载在甲的授权专利说明书中的特征，并与d不相同也不等同", "B": "丙制造的研磨机，包括a、b、c、d\'四个技术特征，其中特征d\'与甲授权专利中的特征d等同", "C": "丁制造的研磨机，包括a、b、cd、e五个技术特征，其中特征e为记载在甲的授权专利说明书中的特征", "D": "戊制造的研磨机，仅包括a、b、c三个技术特征"}, answer: "BC", explanation: "A、B选项，甲与乙之间的协议 有效，乙制造行为不侵权，乙相对于甲的专 利权利要求的范围删除了一些不必要的部 件，就算没有协议也不构成专利侵权，因此 A选项错误，B选项正确。C、D选项，乙的产 品未落入甲的专利保护范围内，但是乙在未 授予专利权的产品上标注专利号的行为构 成假冒专利，因此C选项正确，D选项错误。 （2018，思维扩展）"},
  {id: 638, topic: "专题二十五 专利侵权判断", type: "single", question: "甲公司拥有一项产品发明专利，其权利要求包括a、b、c、d四个特征，其中a、b、c三个特征属于必要技术特征。未经甲公司许可，乙公司制造的下列哪个产品侵犯甲公司的专利权？", options: {"A": "产品包括特征a、b、c、e,其中特征e是记载在乙公司专利说明书中的特征", "B": "产品包括特征a、b、c、f,f具有创新性", "C": "产品包括特征a、b\'、c，其中b\'与b是等同的技术特征", "D": "产品包括特征a、b、c、d、g,其中特征g是没有记载在甲公司专利说明书中的特征"}, answer: "B", explanation: "A、C、D选项，《国家知识产权局 行政复议规程》第5条规定：“对下列情形之 一，不能申请行政复议：（一）专利申请人对 驳回专利申请的决定不服的；（二）复审请求 人对复审请求审查决定不服的；：（六）集 成电路布图设计登记申请人对驳回登记申 请的决定不服的.…”，因此A、C、D选项错 误。B选项，根据《国家知识产权局行政复 议规程》第4条的规定，对国家知识产权局 作出的有关专利申请、专利权的具体行政行 为不服的，可以依法申请行政复议。复审请 求不予受理通知书属于具体行政行为，可以 申请行政复议，B选项正确。（2016）"},
  {id: 639, topic: "专题二十五 专利侵权判断", type: "multiple", question: "1%~2.0%。”下列含有J和K的衬底组合物，哪个落人了该专利的保护范围？", options: {"A": "J浓度为1.0%，K的浓度为0.1%", "B": "J浓度为0.5%，K的浓度为0.2%", "C": "J浓度为4.0%，K的浓度为1.0%", "D": "J浓度为3.5%，K的浓度为2.0%"}, answer: "ABC", explanation: "A、B、C选项均属于对国家 知识产权局行政行为不服的，可以申请行政 复议。D选项，专利申请人对驳回专利申请 的决定不服的，只能申请复审，因此D选项 错误。（2006）"},
  {id: 640, topic: "专题二十五 专利侵权判断", type: "multiple", question: "下列关于专利权保护范围的说法哪些是正确的？", options: {"A": "仅在发明专利说明书或者附图中描述而在权利要求中未记载的技术方案，权利人在侵犯专利权纠纷案件中将其纳入专利权保护范围的，人民法院不予支持", "B": "实用新型专利权的保护范围以其权利要求的内容为准，说明书及附图可以用于解释权利要求的内容", "C": "外观设计专利权的保护范围以表示在图片或者照片中的该产品的外观设计为准，简要说明可以用于解释图片或者照片所表示的该产品的外观设计", "D": "人民法院判定被诉侵权技术方案是否落人专利权的保护范围，应当审查权利人主张的权利要求所记载的全部技术特征"}, answer: "ABC", explanation: "A选项，对复审和无效审查 决定不服只能起诉，但程序性决定可以申请 复议，A选项正确。根据《关于专利权期限 补偿和专利开放许可相关行政复议事项的 公告（第560号）》新增加两项可以申请复议 的情况：（1)对国家知识产权局作出的关于 是否给予专利权期限补偿的决定不服的， (2)对国家知识产权局作出的关于专利开放 许可实施期间是否予以年费减缴的决定不 服的；以及一项不可以申请复议的情况：专 利权人对国家知识产权局作出的关于是否 予以公告专利开放许可声明的决定不服的， 因此B、C选项正确，D选项错误。（新编）"},
  {id: 641, topic: "专题二十五 专利侵权判断", type: "single", question: "关于外观设计专利，以下说法正确的是？", options: {"A": "对于各构件之间无组装关系或者组装关系不唯一的组件产品的外观设计专利，如果被控侵权设计与其全部单个构件的外观设计相同或近似时，则应当认为构成专利侵权", "B": "对于组装关系唯一的组件产品的外观设计专利，如果被控侵权设计与其组合状态下的外观设计相同或近似时，则应当认为构成专利侵权", "C": "对于成套产品的外观设计专利，如果被诉侵权设计与其一项外观设计相同或者近似的，应当认为构成专利侵权", "D": "对于成套产品的外观设计专利，只有被诉侵权设计与其整套外观设计相同或者近似的，才可认为构成专利侵权"}, answer: "B", explanation: "（专利法》第49条规定：“国有全 业事业单位的发明专利，对国家利益或者公 共利益具有重大意义的，国务完有关主管部 门和省、自治区、直辖市人民政府报经国务 院批准，可以决定在批准的范围内推广宣 用，允许指定的单位实施，当实施单位按照 国家规定自专利权人支付使用费”。A选 项，推广应用仅限子发明专利，因此A选项 错误。B、C选项，仅国有企事业单位的发明 专利才可以被推广应用，因此B选项正确、C 选项错误。D选项、实施单位应向专科权人 支付使用费用，因此D选项错误。（2019）"},
  {id: 642, topic: "专题二十五 专利侵权判断", type: "multiple", question: "某外观设计专利在其简要说明中说明请求保护色彩，下列哪些说法是正确的？", options: {"A": "乙销售的茶壶落入甲的专利权保护范围", "B": "乙销售的茶壶未落人甲的专利权保护范围", "C": "丙购买并使用该茶壶侵犯了甲的专利权", "D": "丙购买并使用该茶壶不侵犯甲的专利权"}, answer: "ABCD", explanation: "专利运用是指行为主体对 专利权或专利情报加以利用，进行研发生 产、商业活动以及其他任何形式谋取利益的 行为。从运用形式面言、包括专利实施、告 可、转让、保险、质押融资、证券化、导航、资 警等，因此A、B、C、D选项均正酶。（暂编） 3,BC。A、B、C选项，自占许可是专科 权人仅许可一个被许可人买蕊，专利权人 自己也不得实避谈专利，因此甲在自行生产 的同时许可乙公司生产，不能将设专利权应 占许可给乙、只能将该专利权隐许可或音 通许可给乙、A选项错误，B、C选项正确。D 选项，专利许可备累不是许可合同的生效条 件，因此D选项错误。（2014输）"},
  {id: 643, topic: "专题二十五 专利侵权判断", type: "multiple", question: "某沙发床的外观设计专利，其授权图片所示该沙发具有沙发和床两个变化状态，下列说法哪些是正确的？", options: {"A": "被诉侵权产品为沙发，不能变化为床，该沙发与授权专利中沙发使用状态下的外观设计相同，则落入该外观设计专利权的保护范围", "B": "被诉侵权产品为沙发，不能变化为床，尽管该沙发与授权专利中沙发使用状态下的外观设计相同，也不会落人该外观设计专利权的保护范围", "C": "被诉侵权产品为沙发床，有三个变化状态，且其中两个变化状态分别与授权专利对应的两个变化状态外观设计近似，尽管其第三个变化状态与授权专利任一状态下的外观设计均不近似，其仍然落人该外观设计专利权的保护范围", "D": "被诉侵权产品为沙发床，有三个变化状态，且其中两个变化状态分别与授权专利对应的两个变化状态外观设计近似，第三个变化状态与授权专利任一状态下的外观设计均不近似，则不会落人该外观设计专利权的保护范围"}, answer: "AC", explanation: "A选项，甲公司的发明专利是 基础专利，实施自已的专利不需要乙公司的 同意，因此A选项正确。B选项，乙公司的 发明专利实施有赖于甲公司的发明专利，因 此乙公司实施其专利需要获得甲公司的同 意，因此B选项错误。C选项，由于乙公司 的发明专利具有进步性，因此甲公司如果想 实施乙公司的发明专利，也需要获得乙公司 的同意，因此甲、乙公司可以通过交叉许可 的方式实施乙公司的发明专利，因此C选项 正确。D选项，甲公司让其子公司实施乙公 司的发明专利属于分许可，需要获得乙公司 的同意，因此D选项错误。（新编）"},
  {id: 644, topic: "专题二十五 专利侵权判断", type: "multiple", question: "下列关于外观设计专利侵权判断的说法哪些是正确的？", options: {"A": "在与外观设计专利产品相同或者相近种类产品上，采用与授权外观设计相同或者近似的外观设计，应当认定被诉侵权设计落人外观设计专利权的保护范围", "B": "应当根据外观设计产品的用途，认定产品种类是否相同或者相近似", "C": "确定产品的用途时，可以参考外观设计的简要说明、国际外观设计分类表、产品的功能以及产品销售、实际使用的情况等因素", "D": "应当以外观设计专利产品的一般消费者的知识水平和认知能力，判断外观设计是否相同或者近似"}, answer: "BD", explanation: "A选项，开放许可声明的书面 形式包括纸质形式和电子形式，因此A选项 错误。B选项，实用新型或者外观设计由于 没有经过实审，在提出开放许可声明时需要 提交专利权评价报告，因此B选项正确。C 选项，有意愿实施开放许可专利的，应当按照 公告中许可使用费支付方式和标准支付，如 果和专利权人协商就不再属于开放许可，因 此C选项错误。D选项，《专利法》第52条规 定：“当事人就实施开放许可发生纠纷的，由 当事人协商解决；不愿协商或者协商不成的， 可以请求国务院专利行政部门进行调解，也 可以向人民法院起诉”，D选项正确。（新编）"},
  {id: 645, topic: "专题二十五 专利侵权判断", type: "multiple", question: "甲于2020年1月1日向国家知识产权局提交了一份发明专利申请，权利要求为：“一种产品W，包含技术特征a和b。”该申请于2021年7月1日公布。乙自2021年10月1日开始、该专利申请公布后未经甲的许可制造、销售相同的产品W，所述产品包含技术特征a和b。2023年1月2日，甲的该专利申请经审查并公告授权，授权的权利要求为：“一种产品W”，包含技术特征a、b和c。”则以下说法错误的是：", options: {"A": "乙应当为其“在该专利授权公告前制造、销售产品W\"的行为向甲支付适当费用", "B": "乙无需为其“在该专利授权公告前制造、销售产品W\"的行为向甲支付适当费用", "C": "乙应当为其“在该专利授权公告前制造、销售产品W\"的行为承担专利侵权赔偿责任", "D": "乙应当在该专利授权公告后立即停止制造、销售产品W的专利侵权行为"}, answer: "ABC", explanation: "A、B选项，《专利法》第50条 第2款规定：“专利权人撤回开放许可声明 的，应当以书面方式提出，并由国务院专利 行政部门予以公告。开放许可声明被公告 撤回的，不影响在先给予的开放许可的效 力”，因此A、B选项说法错误。C、D选项， 《专利法》第51条第2-3款规定：“开放许可 实施期间，对专利权人缴纳专利年费相应给 予减免。实行开放许可的专利权人可以与 被许可人就许可使用费进行协商后给予普 通许可，但不得就该专利给予独占或者排他 许可”，因此C选项说法错误，D选项说法正 确。（新编）"},
  {id: 646, topic: "专题二十五 专利侵权判断", type: "multiple", question: "甲提交了一件发明专利申请，在公布文本中，其权利要求请求保护的技术方案中包括a、b、c、d四个技术特征；该申请经过实质审查后被授权，授权公告的权利要求保护的技术方案中包括了a、b、ce四个技术特征，其中技术特征e是记载在申请文件的说明书中的特征，且与技术特征d不等同。乙、丙、丁、戊在该申请公布日后至授权公告日之前，分别生产制造了下列相关产品。甲可以要求支付费用的是？", options: {"A": "乙生产制造的产品包括了a、b、c三个技术特征", "B": "丙生产制造的产品包括了a、b、c、d四个技术特征", "C": "丁生产制造的产品包括了a、b、c、e四个技术特征", "D": "戊生产制造的产品包括了a、b、c、d、e五个技术特征"}, answer: "AB", explanation: "A选项，专利开放许可只能针 对已授权的专利声明开放许可，不能针对专 利申请声明开放许可，因此A选项正确。B 选项，专利开放许可声明中，专利许可使用 费按固定费用标准支付的，一般不高于 2000万元，超过该标准的，可以用普通许可 方式。因此B选项正确。C选项，开放许可 合同自当事人按照公告支付许可使用费之 日起生效，不是自公告之日起生效，因此C 选项错误。D选项，根据《细则》第100条的 规定，专利权人通过弄虚作假获得专利年费 减免的，由县级以上负责专利执法的部门子 以警告，可以处10万元以下的罚款，因此D 选项错误。（新编）"},
  {id: 647, topic: "专题二十五 专利侵权判断", type: "multiple", question: "甲将自已拥有专利保护的一款运动鞋委托乙代工生产，后发现乙未经其许可，自行生产该款运动鞋并对外销售，甲向法院起诉并请求获得赔偿。以下可以作为侵权赔偿数额计算依据的是？", options: {"A": "甲因研发该专利技术所投入的合理成本", "B": "乙因侵权所获得的利益", "C": "该专利权的市场评估价值", "D": "甲乙双方签订的委托加工合同中约定的专利侵权赔偿条款"}, answer: "CD", explanation: "，A选项，专利开放许可声明自 公告之日生效，A选项错误。B、D选项、对 不予公告决定不服的，不能审请复议，对年 费减缴决定不服的，可以申请复议，因此D 选项正确，B选项错误。C选项有关备案的 主体和备案的效力说法均正确。（新编）"},
  {id: 648, topic: "专题二十五 专利侵权判断", type: "multiple", question: "下列关于侵犯专利权的赔偿数额的说法哪些是正确的？", options: {"A": "侵犯专利权的赔偿数额按照权利人因被侵权所受到的实际损失或者侵权人因侵权所获得的利益确定", "B": "对故意侵犯专利权，情节严重的，可以按照侵权人因侵权所获得的利益的一倍以上五倍以下确定赔偿数额", "C": "赔偿数额应当包括权利人为制止侵权行为所支付的合理开支", "D": "侵犯专利权的法定赔偿数额为1万元以上500万元以下"}, answer: "ABC", explanation: "A选项，专利只有获得授权之 后才能提出开放许可声明。B、C选项属于 细则第86条规定的不得实施开放许可的情 形。D选项专利权被部分无效、维持有效的 部分仍可实行开放许可，因此A、B、C选项 正确，D选项错误。（新编）"},
  {id: 649, topic: "专题二十五 专利侵权判断", type: "multiple", question: "根据专利法和相关司法解释的规定，关于惩罚性赔偿，下列说法正确的是：", options: {"A": "人民法院在依照原告因侵权所受到的实际损失、被告因侵权所获得的利益或者专利的合理倍数确定基数时，该基数包括原告为制止侵权所支付的合理开支", "B": "原告在二审中增加惩罚性赔偿请求的，人民法院可以进行审理", "C": "在一审法庭辩论终结前，原告可以增加惩罚性赔偿请求", "D": "惩罚性赔偿请求倍数可以在一倍以上六倍以下"}, answer: "ABCD", explanation: "A选项、芯片属于半导体 技术，不能以未实施或未充分实施专利为由 请求强制许可。半导体技术只以公共利 益目的或构成断为由请求强制许可，A选 项说法错误。B选项，给予强制许可的决定 应当写明被给予强制许可的交明专利或者 实用新型专利的名称、专利号、申请日及授 权公告日，应该逐项许可，B选项说法错误。 C选项，除出口专利药品的强制许可之外、 为克服至新而给予的强制许可（包括半导体 技术）的发明创造，也可以向国外市场供应、 C选项说法错误。D选项，强制许可限于发 明和实用新型，外观设计不能请求强制许 可，D选项说法错误。（2018）"},
  {id: 650, topic: "专题二十五 专利侵权判断", type: "single", question: "甲向法院起诉乙侵犯了其发明专利权并请求获得赔偿，下列关于侵权赔偿数额的说法正确的是？", options: {"A": "侵权赔偿的数额按照甲因被侵权所受到的实际损失确定，还应包括因研发该专利技术所投人的合理成本", "B": "侵权赔偿的数额可以按照乙侵权的数量和甲的单件产品合理利润的乘积来计算", "C": "侵权赔偿数额应包括甲为制止侵权行为所支付的合理开支", "D": "侵权赔偿数额可以参照该专利许可使用费的数额、许可时间、许可范围合理确定"}, answer: "A", explanation: "根据《专利法》第59条的规定、 强制许可需要提供证据，证明其以合理的条 件请求专利权人许可其实施专利，但未能在 合理的时间内获得许可的，仅限于未实施或 未充分实施，以及从属专利目的交又许可 两种情形，因此A选项符合上述情形。（2011）"},
  {id: 651, topic: "专题二十五 专利侵权判断", type: "multiple", question: "甲拥有一项机床的发明专利权，乙未经甲的许可制造了该机床,用于为自己的客户加工零部件，同时将部分机床对外销售；丙不知道该机床为侵权产品,以合理价格购买了该机床用于企业的生产，以下说法哪些是正确的？", options: {"A": "乙制造该机床供自已使用的行为不侵犯甲的专利权", "B": "丙使用该机床侵犯了甲的专利权", "C": "丙能证明其采购机床的合法来源，无需承担赔偿责任", "D": "法院根据甲的请求，应当判令乙、丙立即停止使用该机床"}, answer: "BD", explanation: "A选项，为公共健康目的，对 取得专利权的药品请求给予制造并出口强 制许可的，不适用听证程序，因此A选项错 误。B选项，根据《专利实施强制许可办法》 第22条第1款第（三）项的规定，给予强制许 可的决定应当写明给予强制许可的范围和 期限，B选项正确。C选项，《专利法》第62 条规定：“取得实施强制许可的单位或者个 人应当付给专利权人合理的使用费” C选项错误。D选项，依据强制许可制造的 药品必须全部出口到该进口方，因此D选项 正确。（2015）"},
  {id: 652, topic: "专题二十五 专利侵权判断", type: "single", question: "甲公司研制了一种新药品，并在中国和印度获得了专利权。乙公司未经甲公司许可而制造了该药品。丙公司在不知乙公司未获得授权的情况下，通过合法渠道从乙公司处购买了该药品并进行销售。丁公司在印度购买了甲公司制造的该药品并进口到中国，戊公司从丁公司处购买了该药品并进行销售。下列说法哪些是正确的？", options: {"A": "乙公司的行为构成侵权，但可以免除赔偿责任", "B": "丙公司的行为构成侵权，但可以免除赔偿责任", "C": "丁公司的行为不构成侵权", "D": "戊公司的行为构成侵权"}, answer: "A", explanation: "A选项，根据《专利实施强制许 可办法》第18条第6款的规定，在国家出现 紧急状态或者非常情况时，或者为了公共利 益的目的给予强制许可的，不适用听证程 序，因此A选项正确。B选项，专利权人对 国务院专利行政部门关于实施强制许可的 决定不服的，可以自收到通知之日起3个月 内向人民法院起诉，但是，在国家知识产权 局作出驳回强制许可申请的决定时，强制许 可的请求人无权提起诉讼，B选项错误。C 选项，对于强制许可使用费，必须先经过国 家知识产权局的裁决，对裁决不服的，可以 向人民法院起诉，C选项错误。D选项，对专 利强制许可的使用费裁决不服的，双方当事 人都可以诉讼，但是不能再提起复议，D选 项错误。（2018）"},
  {id: 653, topic: "专题二十五 专利侵权判断", type: "multiple", question: "甲见市场上某种台灯设计十分独特，便在自已的灯具厂进行了仿制，但甲并不知道他人就该台灯享有外观设计专利权。乙明知甲生产的台灯侵犯了他人的专利权，仍然大量购人并进行批发销售。丙通过正常的商业渠道从乙处购入了一部分台灯进行零售，但始终不知乙批发的是侵权产品。丁从丙处购得一盏台灯自行使用。基于以上事实，下列哪些说法是正确的？", options: {"A": "甲虽然不知道其制造的台灯侵犯了他人的专利权，但仍应当承担侵权责任", "B": "乙如果在人民法院审理案件过程中，能举证证明该产品合法来源的，则可以免予承担赔偿责任", "C": "丙如果在人民法院审理案件过程中，能举证证明该产品合法来源的，则可以免予承担赔偿责任", "D": "丁不承担侵权责任专利纠纷司法程序"}, answer: "ABCD", explanation: "A选项，《专利法》第60条 第1款规定：“国务院专利行政部门作出的 给予实施强制许可的决定，应当及时通知专 利权人，并予以登记和公告”，A选项正确。 B选项，《细则》第90条第3款规定：“国务院 专利行政部门在作出驳回强制许可请求的 决定或者给予强制许可的决定前，应当通知 请求人和专利权人拟作出的决定及其理 由”，B选项正确。C、D选项，《专利法》第63 条规定：“专利权人对国务院专利行政部门 关于实施强制许可的决定不服的，专利权人 和取得实施强制许可的单位或者个人对国 务院专利行政部门关于实施强制许可的使 用费的载决不服的，可以自收到通知之日起 三个月内向人民法院起诉”，因此C、D选项 正确。（2013）"},
  {id: 654, topic: "专题二十六 专利纠纷司法程序", type: "single", question: "甲公司拥有一种产品的发明专利权，甲公司发现乙公未经其许可大量制造该产品并进行销售，针对乙公司的侵权为，甲公司可以：", options: {"A": "请求管理专利工作的部门处理", "B": "向公安机关报案", "C": "与乙协商解决", "D": "向人民法院起诉"}, answer: "C", explanation: "A选项，根据《专利法》第58条 的规定，为消除减少新以及为公共健策目 的给予药品的强制许可，可以自国外市场供 应，因此A选项错误。B选项，（专利法》第61 条规定：“取得实施强制许可的单位或者个人 不享有独占的实施权，并且无权允许他人买 施”，因此B选项错误。C选项，专利权人对 强制许可的决定不服的，可以申请行政复议。 C选项正确。D选项，只有来实施或未充分 实施的强制许可以及交又的强制许可才需要 提供两合理的证据，D选项错误，（2011）"},
  {id: 655, topic: "专题二十六 专利纠纷司法程序", type: "multiple", question: "专利权人发现侵犯其专利权的行为时，可以采取如下施有：", options: {"A": "向人民调解委员会请求调解", "B": "向人民法院起诉后，再向人民法院调解中心请求调解", "C": "向人民法院申请采取责令停止有关行为的措施", "D": "向人民法院申请保全证据"}, answer: "AB", explanation: "A、D选项，（专利法）第56条 规定：“一项取得专利权的定明或者实用新 型比前已经取得专利权的友明或者实用新 型具有显著经济意义的重大技术进步，其实 施又有赖于前一发明或者实用新型的实施 的，国务院专利行政部门根据后一专利权人 的申请，可以给予实施前一支明或者实用新 型的强制许可。在依照前款规定给予实施 强制许可的情形下，国务院专利行政部门根 据前一专利权人的申请，也可以给予实施后 一发明或者实用新型的强制许可”，A选项 正确；乙也需要申请才会获得强制许可、D 选项错误。B选项，根据《专利法》第62条的 规定，许可费达不成一致，可以请求国务院 专利行政部门裁决，B选项正确。C选项， （国家知识产权局行政复议规程）第5条规 定：“对下列情形之一，不能申请行政复 议：（四）专利权人或者专利实慈强制许 可的被许可人对强制许可使用费的裁决不 服的…….”，因此C选项错误。（2016） 的国际条约"},
  {id: 656, topic: "专题二十六 专利纠纷司法程序", type: "multiple", question: "下列哪些纠纷当事人既可以请求管理专利工作的部调解，也可以直接向人民法院起诉？", options: {"A": "专利申请权和专利权归属纠纷", "B": "职务发明创造的发明人、设计人的奖励和报酬纠纷", "C": "发明人或设计人资格纠纷", "D": "在发明专利申请公布后专利权授予前使用发明而未付适当费用的纠纷"}, answer: "CD", explanation: "A、B、C选项，根据PCT第2条的规定， 本条约述及“专利”应解释为述及发明专利、发明 人证书、实用证书、实用新型、增补专利或增补证 书、增补发明人证书和增补实用证书，不述及外观 设计证书。“受理局”是指受理国际申请的国家局 或政府间组织，因此A、B选项错误，C选项正确。 D选项，根据PCT第9条的规定，《专利合作条约》 缔约国或《巴黎公约》缔约国的任何居民或国民均 可提出国际申请，D选项正确。（2013)"},
  {id: 657, topic: "专题二十六 专利纠纷司法程序", type: "single", question: "人民法院可以受理下列哪些专利纠纷案件？", options: {"A": "对国务院专利行政部门发明专利申请驳回决定不服案件", "B": "确认不侵害专利权纠纷案件", "C": "标准必要专利使用费纠纷案件", "D": "诉前申请停止侵权、财产保全案件"}, answer: "A", explanation: "根据PCT实施细则第19.1条（a)的规 定，国际申请应按照申请人的选择，（i)向申请人是 其居民的缔约国的或者代表该国的国家局提出； 或(ii)向申请人是其国民的缔约国的或者代表该 国的国家局提出；（ii)向国际局提出，而不顾申请 人是其居民或者国民的缔约国。有多个申请人， 只需任一人符合要求即可，因此美国、韩国、中国 都可以作为主管受理局，也可以向国际局提交申 请，A选项说法错误，B、C、D选项说法正确。（2019)"},
  {id: 658, topic: "专题二十六 专利纠纷司法程序", type: "multiple", question: "甲未经专利权人许可在A市制造了一批专利产品，并由乙运往B市销售。A市、B市中级人民法院都具有专利纠纷案件的管辖权。下列说法正确的是？", options: {"A": "如果专利权人仅起诉甲、未起诉乙，可向A市中级人民法院起诉", "B": "如果专利权人仅起诉乙、未起诉甲，可向A市中级人民法院起诉", "C": "如果专利权人仅起诉甲、未起诉乙，可向B市中级人民法院起诉", "D": "如果专利权人同时起诉甲和乙，专利权人可以选择A市、B市中级人民法院的其中一个起诉"}, answer: "BD", explanation: "A、C选项，《专利法》第19条第1款规 定：“任何单位或者个人将在中国完成的发明或者 实用新型向外国申请专利的，应当事先报经国务 院专利行政部门进行保密审查。保密审查的程 序、期限等按照国务院的规定执行”，因此张某在 上海完成的发明创造不能直接向美国专利商标局 或国际局提交国际申请，A、C选项错误。B选项， 《细则》第8条第3款规定：“向国务院专利行政部 门提交专利国际申请的，视为同时提出了保密审 查请求”，张某在中国有长期居所，因此可以直接 专利合作条约及其他与专利相关的国际条约 向国家知识产权局提交国际申请，且视为同时提 出了保密审查请求，B选项正确。D选项，《审查指 定中国的，办理进入国家阶段手续时，应当选择要 求获得的是“发明专利”或者“实用新型专利”，两 者择其一”，D选项正确。(2016)"},
  {id: 659, topic: "专题二十六 专利纠纷司法程序", type: "multiple", question: "甲公司拥有一项雨伞的外观设计专利权。未经甲公司许可，重庆的乙公司生产了该专利雨伞，成都市的丙公司将该雨伞销售给当地的丁酒店使用，甲公司遂向人民法院起诉。下列哪些说法是错误的？", options: {"A": "甲公司可以向重庆人民法院起诉丙公司", "B": "甲公司可以向成都人民法院起诉丁酒店", "C": "甲公司可以向成都人民法院起诉乙公司", "D": "甲公司提起诉讼时可以向受理法院提交专利权评价报告"}, answer: "AB", explanation: "A选项，香港居民可以向国家知识产 权局提交国际申请，也可以直接向国际局提交国 际申请，A选项正确。B选项，PCT不涉及外观设 计，B选项正确。C选项，国家知识产权局作为主 管受理局仅接受以中文或英文提出的国际专利申 请，C选项错误。D选项，国际初步审查不是国际 申请的必经程序，而是由申请人自愿选择的程序， D选项错误。（2012)"},
  {id: 660, topic: "专题二十六 专利纠纷司法程序", type: "multiple", question: "发明专利纠纷案件中对常州市中级人民法院作出的一审判决不服的，应当向下列哪个法院提出上诉？", options: {"A": "省府所在地中级人民法院（南京市中级人民法院）", "B": "江苏省高级人民法院", "C": "最高人民法院知识产权法庭", "D": "上海知识产权法院"}, answer: "AD", explanation: "A、D选项，PCT实施细则第19.1条规 定：“国际申请应按照申请人的选择，（i)向申请人 是其居民的缔约国的或者代表该国的国家局提 出；或（i)向申请人是其国民的缔约国的或者代表 该国的国家局提出；(ii)向国际局提出，而不顾申 请人是其居民或者国民的缔约国”，因此A、D选项 正确。B选项，国家知识产权局作为受理局仅指定 本局（目前试点指定欧洲专利局）为主管国际检索 单位，因此B选项错误。C选项，对于向国家知识 产权局提出的PCT国际申请，仅指定国家知识产 权局作为国际初步审查单位，因此C选项错误。 （新编） 6、ACD。在PCT国际申请体系中，中国国家 知识产权局承担的职能包括：(1)作为受理局，受 理PCT国际申请：（2)作为国际检索单位，制定国 际检索报告；（3）作为国际初步审查单位，制定国 际初步审查报告。因此A、C、D选项正确。国际申 请的公布出版是由国际局负责，B选项错误。 (2017) 7、ABCD。A选项，根据PCT实施细则第4.10 条(a)的规定，PCT国际申请可以要求一个或多个 在先申请的优先权，该在先申请可以是在任何世 界贸易组织成员申请的，A选项正确。B选项，根 据PCT实施细则第26条之二.2（a)的规定，PCT国 际申请的优先权日不在国际申请日前12个月内但 在14个月内的，申请人可以提出恢复，B选项正 确。C选项，根据PCT实施细则第26条之二.2(c) 的规定，优先权要求不应仅仅因为没有写明涉及 的在先申请号而被视为未提出，C选项正确。D选 项，根据PCT实施细则第26条之三.1的规定，在自 优先权日起16个月的期限内，申请人可以通过向 国际局提交通知对请求书中优先权任何声明进行 改正或增加，D选项正确。（2013)"},
  {id: 661, topic: "专题二十六 专利纠纷司法程序", type: "multiple", question: "下列关于专利权纠纷案件管辖的说法哪些是正确的？", options: {"A": "李某起诉某公司未按照双方签订的专利权转让合同支付转让费，可以由最高人民法院确定的基层人民法院审理", "B": "成都市中级人民法院在受理一起侵犯发明专利权纠纷案件后，发现被控侵权产品的生产者住所地在成都市锦江区内，考虑到便于查明事实，决定依照民事诉讼法规定将该案指定由锦江区人民法院审理", "C": "锦州市民王某诉铁岭市民吴某侵犯其实用新型专利权的案件应当由沈阳市中级人民法院管辖", "D": "西安市民赵某对国家知识产权局作出维持驳回决定的复审决定不服的案件应当由北京市第一中级人民法院审理"}, answer: "BCD", explanation: "A选项，国际申请要求优先权时，首 次申请超过12个月、但是在14个月内的，可以向 受理局或者指定局请求恢复该优先权。A选项说 法正确。B选项，国际申请中，实用新型可以作为 发明专利优先权基础，B选项说法错误。C选项， 国际申请中在先申请已被授权公告的状态不影响 在后申请的受理，C选项说法错误。D选项，由于 可以请求恢复优先权，将来延伸到承认优先权恢 复的国家仍有意义，D选项说法错误。（新编）"},
  {id: 662, topic: "专题二十六 专利纠纷司法程序", type: "multiple", question: "下列关于为了制止专利侵权行为而申请诉前证据保全的说法正确的是：", options: {"A": "申请的主体是专利权人或者利害关系人", "B": "申请诉前证据保全的，申请人应当向人民法院提出", "C": "诉前证据保全申请可以由管理专利工作的部门受理", "D": "申请的条件是证据可能灭失或者以后难以取得"}, answer: "CD", explanation: "PCT第11条（1)规定：“受理局应以收 到国际申请之日作为国际申请日，但以该局在收 到申请时认定该申请符合下列要求为限：*（(ii) 国际申请是用规定的语言撰写；（ii)国际申请至少 包括下列项目：（a)说明是作为国际申请提出的； (b)至少指定一个缔约国；(c)按规定方式写明的 申请人的姓名或者名称；(d)有一部分表面上看像 是说明书；（e)有一部分表面上看像是一项或几项 权利要求”。A选项，申请人应当使用中文或者英 文向国家知识产权局提出国际申请，A选项不符合 上述（ii)情形。B选项不符合上述（iii)(c)情形。 C、D选项均符合上述规定，可以将收到该申请之日 记录为国际申请日。（2011）"},
  {id: 663, topic: "专题二十六 专利纠纷司法程序", type: "single", question: "发生专利侵权纠纷时，依法向人民法院提出诉前责令停止侵犯专利权行为的申请的，以下说法错误的是？", options: {"A": "专利权人或专利财产权利的合法继承人可以向人民法院提出申请", "B": "无论专利权人是否提出申请，排他实施许可合同的被许可人均可单独向人民法院提出申请", "C": "专利普通实施许可合同的被许可人可以与专利权人一起向人民法院提出申请", "D": "只有独占实施许可合同的被许可人可以单独向人民法院提出申请"}, answer: "D", explanation: "A选项中发明人的姓名、B选项中的 专利合作条约及其他与专利相关的国际条约 签字都可以在受理后扑正，C选项中国际申请费和 手续费可自收到审请后1个月内缴结，因选A，B、C 选项不影响以收到之日作为国际申请日。D选项 中国际申请没有使用规定的语言损写，不能以收 到之日作为国际申请日、（2016改编）"},
  {id: 664, topic: "专题二十六 专利纠纷司法程序", type: "single", question: "以下说法正确的是？", options: {"A": "人民法院受理的侵犯发明专利权纠纷案件，被告在答辩期间内请求宣告该项专利权无效的，人民法院应当中止诉讼", "B": "当事人因专利权的归属发生纠纷，已向人民法院起诉的，可以请求国家知识产权局中止该专利的无效宣告程序", "C": "实用新型和外观设计侵权纠纷案件中，人民法院可以根据案件审理需要要求原告提交检索报告或者专利权评价报告，原告无正当理由不提交的，人民法院可以裁定中止诉讼", "D": "侵犯实用新型、外观设计专利权纠纷案件的被告请求中止诉讼的，应当在答辩期内对原告的专利权提出宣告无效的请求"}, answer: "D", explanation: "A选项，PCT实施细则第26.3条之三 规定：“如果磺要或府固的任何文学为官使用不前 于说明书和权利要求书的语盲提交，受理局道 知申请人提交播要或写图文字内容的语文”，当此 A选项不会导致重新确定国际审请弓、B选项，根 据PCT第14条的规定，如果受理马爱现PCT国际 申请没有发明名称的，应要求申请人在规定珊製 内改正，期满不没王的，该申请即投视为撤回，因 此B选项不会导致重确定国际申请日。C选项， PCT实施细则第16条之二.1规定：“接借螨园 际申请费的，受理局应当向申请人发出通知，要求 申请人在自通知之5起1个月内续相关费用，总 限届满申请人未纳的，PCT国际申请即搜据为效 目”，因此C选项不会导致重新确定国际申请日。 D选项，根据PCT实施细则第20.5条的规定，当受 理局在审查PCT国际申请文件时，交现说明书\\双 利要求书或者附图的一部分变通海，香看烈资 遗遍的、受理局应当通知申请人，如甲请人将遣海 部分提交给受理局的，受理局应当将收到该通海 部分之日确定为国际申请日，因此D选项可能全导 致重新确定国廊申请日。（2013)"},
  {id: 665, topic: "专题二十六 专利纠纷司法程序", type: "single", question: "甲公司发现乙公司未经其许可，制造销售了甲公司拥有实用新型专利权的某产品，向法院提起侵权诉讼；乙公司在被诉后向国家知识产权局提起针对甲公司上述专利权的无效宣告请求；经过审理，国家知识产权局作出宣告甲公司上述实用新型专利权全部无效的审查决定；甲公司不服该决定，向法院提起行政诉讼要求撤销该审查决定。下列说法哪些是正确的？", options: {"A": "乙公司可以向人民法院提交专利权评价报告作为诉讼中止的证据", "B": "甲公司在侵权起诉前可以请求当地管理专利工作的部门采取证据保全措施", "C": "根据国家知识产权局作出的无效宣告审查决定，法院可以裁定驳回甲公司的侵权起诉，无需等待针对上述审查决定的行政诉讼结果", "D": "甲公司提起行政诉讼后，乙公司作为第三人参加诉讼"}, answer: "B", explanation: "本题中，甲请人造漏的是接要和签字， 此缺局可以在受理后进行补正，不会导致置前两 定申请日，应以收到国除市请之日作为国事请 日，不以寄出的日为准，因是日选用正滴。 (2017)"},
  {id: 666, topic: "专题二十六 专利纠纷司法程序", type: "multiple", question: "甲于2021年2月1日提交了一项涉及产品X的发明专利申请，该申请于2022年8月1日被公布，并于2024年5月1日获得授权；乙在2023年1月开始制造销售上述产品X，由于销路不佳，在2024年3月30日停止制造销售行为；丙在2021年4月自行研发了相同产品，并一直进行制造销售。下列说法哪个是正确的？", options: {"A": "由于乙制造销售产品X的期间在甲专利授权之前，因此无需向甲支付费用", "B": "虽然丙是在专利申请公布前独自完成的发明，但也需向甲支付费用", "C": "如果甲在2024年2月1日知道了乙的制造行为，其有权要求乙立即停止制造销售行为", "D": "如果甲在2024年2月1日知道了丙的制造行为，其诉讼时效为自2024年2月1日起3年"}, answer: "ABCD", explanation: "A选项，根据PCT第12条的规定。 国际申请一份由受理局保存（受理本），一合交国 际局（登记本），一份选交主管检贫单位（检索本）， 此时，检索本即原始国际申请文件，A选项正确。B 选项，根据PCT实施细则第48.2条的规定，如果在 国际公布的技术准备工作完成时，国际检索报告 已作出，国际公布的内容应包括国际检索报告，B 选项正确。C选项，根据PCT实施细则第43条之 二的规定，国际检索单位应当在其作出国际检索 报告的同时，作出书面意见，因此C选项正确。D 选项，根据PCT实施细则第42条的规定，制定国际 检索报告的期限应为自国际检索单位收到检索本 起3个月，或者自优先权日起9个月（没有优先权 日的，则指申请日），以后到期者为准。本题中， 2023年3月1日收到检索本，3个月期满为2023年 2023年11月1日，以后到期的为准，则作出国际检 索报告和书面意见的期限是2023年11月1日，D 选项正确。（2018改编）"},

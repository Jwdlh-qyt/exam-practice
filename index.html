  {id: 223, topic: "专题三 民事诉讼法", type: "single", question: "根据民事诉讼法及相关规定，下列哪类民事案件应当由合议庭审理？", options: {"A": "适用简易程序审理的第一审民事案件", "B": "基层人民法院审理的基本事实清楚，权利义务关系明确的第一审民事案件", "C": "发回重审的案件", "D": "中级人民法院审理的第二审民事案件"}, answer: "C", explanation: "。A、B选项，《民事诉讼法》第40条第2规定：“适用简易程序审理的民事案件，由审判一人独任审理。基层人民法院审理的基本事实：楚、权利义务关系明确的第一审民事案件，可以！审判员一人适用普通程序独任审理”，因此A、B项错误。C选项，《民事诉讼法》第41条第3款定：“发回重审的案件，原审人民法院应当按3一审程序另行组成合议庭”，因此C选项正确。[选项，（民事诉讼法》第41条第2款规定：“中级人民法院对第一审适用简易程序审结或者不股板定提起上诉的第二审民事案件，事实清楚、权利义务关系明确的，经双方当事人同意，可以由审判员一人独任审理”，因此D选项错误。（新编）", chapter: "第一章 民事诉讼法概述"},
  {id: 224, topic: "专题三 民事诉讼法", type: "single", question: "星辉公司起诉皓月公司合同纠纷一案，一审法院适用简易程序，由张法官独任审理，判决驳回星辉公司诉讼请求，星辉公司不服一审判决提起上诉，二审法院认为本案一审程序违法，剥夺当事人辩论权，裁定撤销一审判决，发回一审法院重新审理。关于本案重新审理表述正确的是？", options: {"A": "一审法院应当适用普通程序，由张法官以外的法官独任审理", "B": "一审法院应当适用普通程序，张法官不得参与重审合议庭", "C": "一审法院应当适用简易程序，由张法官以外的法官独任审理", "D": "一审法院应当适用普通程序，张法官和人民陪审员不得参与重新审理"}, answer: "B", explanation: "。简易程序仅仅适用于基层法院及其滋", chapter: "第一章 民事诉讼法概述"},
  {id: 225, topic: "专题三 民事诉讼法", type: "single", question: "甲公司因为合同纠纷起诉乙公司，某县人民法院适用简易程序审理后判决甲公司败诉。甲公司不服一审判决，提起上诉，二审法院指定吴法官对本案独任审理，乙公司当庭表示异议，关于本案，下列说法正确的是？", options: {"A": "二审只能组成合议庭审理，不能适用独任制", "B": "简易程序一审终审，不得上诉", "C": "二审法院有权直接指定法官适用独任制审理", "D": "二审法院应裁定转为合议庭审理"}, answer: "D", explanation: "。《民诉法》第41条规定，人民法院审理第二审民事案件，由审判员组成合议庭。合议庭的成员人效，必须是单效。中级人民法院对第一审适用简岛程序审结或者不股裁定提起上诉的第二审民事案件，事实清楚、权利义务关系明确的，经及方当事人同意，可以由审判员一人独任审理。因此，二审程序如果符合条件的可以适用独任制，A选项错误。本题乙公司当庭对二审法院适用独任侧提出异议，即表明未取得双方当事人同意，故本案二审不得适用独任制，C选项错误。法院在审理过程中，发现案件不宜由审判员一人独任审理的，应当裁定转由合议庭审理。本题中，二审不能适用独任制审理，乙公司的异议成立，法院应当裁定将案件转为合议庭审理，D选项正确。简易程序不存在一审终审的相关规定，B选项错误。（法考2022）", chapter: "第一章 民事诉讼法概述"},
  {id: 226, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列哪些情况下，当事人可以申请回避？", options: {"A": "签定人陈某，其与本案有利害关系", "B": "审判人员李某，担任过本案的鉴定人的", "C": "律师韩某是本案当事人近亲属的", "D": "人民陪审员赵某接受过本案当事人宴请的"}, answer: "ABD", explanation: "。A选项，根据《民诉法》及《民诉法解释》的规定，担任过本案的证人、鉴定人、辩护人、诉讼代理人、翻译人员的审判人员，当事人有权申请其回避；与本案有利害关系的鉴定人，当事人有权申请其回避；接受本案当事人及其受托人宴请，或者参加由其支付费用的活动的审判人员，当事人有权申请其回避，因此A、B、D选项正确。C选项，律师属于诉讼代理人，不适用回避的规定。（新编）", chapter: "第一章 民事诉讼法概述"},
  {id: 227, topic: "专题三 民事诉讼法", type: "multiple", question: "某民事案件审理过程中，当事人对合议庭组成人员提出回避请求，根据民事诉讼法及相关规定，下列说法正确的是？多选）", options: {"A": "当事人申请审判人员回避的，应由审判委员会决定", "B": "当事人申请陪审员回避的，应由审判长决定", "C": "当事人对人民法院驳回回避申请的决定不服，可以向原人民法院申请复议一次", "D": "人民法院驳回当事人的回避申请，当事人不服申请复议的，复议期间被申请回避人不停止参与本案的审理工作"}, answer: "CD", explanation: "。A、B选项，根据《民诉法》第49条的规定，审判人员的回避，由院长决定，因此审判员、陪审员的回避均由院长决定，A、B选项错误。C、D选项《民诉法》第50条规定：“人民法院对多率人提出的回避申请，皮当在中请提出的三日内，以口头成书面形式作出决定。申请人对决定不月的、可以在接到决定时申请复议一次。复议别另，被申请回避的人员，不停止参与木案的工作.\"，因此C、D选项正确。（2019）", chapter: "第一章 民事诉讼法概述"},
  {id: 228, topic: "专题三 民事诉讼法", type: "single", question: "某区法院审理原告许某与被告某饭店食物中纠纷一案。审前，法院书面告知许某合议庭由审判员甲、乙和人民陪审员丙组成时，许某未提出回避申请。开庭后，许某始知人民陪审员丙与被告法定代表人是亲兄弟，逆捉出回避申请。关于本案的回避，下列哪一说法是正确的？", options: {"A": "许某可在知道丙与被告法定代表人是亲兄弟时提出回避申请", "B": "法院对回避申请作出决定前，丙不停止参与本案审理", "C": "应由审判长决定丙是否应回避", "D": "法院作出回避决定后，许某可对此提出上诉"}, answer: "A", explanation: "。A进项，根据《民诉法》第47条的期定，审判人员是本案当事人近亲属的，当事人有切申请他们回进：根据（民事诉讼法）第48条第1数的规定，回避事由在案件开始审理后知道的，可以在法庭论终结前提出；A选项中，人民陪审员而属于审判人员，丙与被告法定代表人是亲兄弟属于近亲属，许某在开庭后得知时可以提出回迎申请，因此A选项正确。B选项，《民诉法》第48条多2款规定：“被申请回避的人员在人民法院作出是否回避的决定前，应当暂停参与本案的工作，但累件需要采取紧急措施的除外”，因此丙应当暂停乡与本案的工作，B选项错误。C选项，根据《民诉法》第49条的规定，丙作为审判人员的回造，应白院长决定，因此C选项错误。D选项，根据（民诉法》第50条的规定，申请人对决定不的，可以在接到决定时申请复议一次，因此对于回避决定不服，救济途径是申请复议，而不是上诉，因此·D选项错误。（法考2015）", chapter: "第一章 民事诉讼法概述"},
  {id: 229, topic: "专题三 民事诉讼法", type: "single", question: "王某诉马某侵权损害赔偿纠纷一案，经开庭审理后，合议庭经评议，拟支持王某的诉讼请求。法院通知双方当事人8月1日进行宣判，马某发现本案书记员张某是原告的表妹夫，遂于7月31日向法院提出书记员张某回避的申谓。关于本案，表述正确的是？", options: {"A": "以书记员不属于应当回避人员为由，驳回马某的回避申请", "B": "以马某的申请不符合法定回避的情形为由，驳回马某的回避申请", "C": "因为马某超过了法定申请回避的期限，法院对马某的申请不予审查", "D": "法院应当决定延期宣判，对马某提出的回避申请予以审查"}, answer: "C", explanation: "。《民事诉讼法》第47条规定：“审判人员有下列情形之一的，应当自行回避，当事人有权用口头或者书面方式申请他们回避：（一）是本案当事人或者当事人、诉讼代理人近亲属的首三款规定，适用于法官助理、书记员…”，A、B选项错误。根据《民事诉讼法》第48条的规定，回避申请最迟在法庭料论终结前提出，本案法庭制论已经终结，故马某不能申请回避，法院对马某的回避申请应当不于审查，因此C选项正确、D选项错误。（法考2023）", chapter: "第一章 民事诉讼法概述"},
  {id: 230, topic: "专题三 民事诉讼法", type: "single", question: "根据民事诉讼法及相关规定，下列说法哪项是正确的？", options: {"A": "涉及商业秘密案件不得公开审理", "B": "涉及离婚案件是否公开审理由当事人协商决定", "C": "涉及离婚案件当事人申请不公开审理的，一律不另商公开审理不", "D": "涉及商业秘密案件当事人申请不公开审理的，可公以不公开审理是C"}, answer: "D", explanation: "。《民诉法》第137条规定：“人民法院审理民事案件，除涉及国家科密、个人隐私或者法律", chapter: "第一章 民事诉讼法概述"},
  {id: 231, topic: "专题三 民事诉讼法", type: "single", question: "根据民事诉讼法及相关规定，关于第一审民事案件的级别管辖，下列哪个表述是正确的？", options: {"A": "基层人民法院管辖所有第一审民事案件", "B": "中级人民法院管辖所有涉外的第一审民事案件", "C": "高级人民法院管辖在本辖区有重大影响的第一审民事案件", "D": "最高人民法院仅管辖在全国有重大影响的第一审民事案件"}, answer: "C", explanation: "。A、B选项，根据《民诉法》第18、19条的规定，层人民法院可以管辖一审案件，但是专利纠纷一审和亚大沙外等民事案件基层法院没有管辖权，也不是所有的沙外案件一审都在中级法院，只有重大涉外案件才裔要中级法院管辖，因此A、B选项说法过于货对。C选项《民诉法》第20条规定：“商级人民法院管辖在本辖区有重大影响的第一审民事案件”，因此C选项正确。D选项，根据《民诉法》第21条的规定，最高人民法院不仅管辖在全国有重大影响的案件，还管辖认为应当由本院审理的案件，因此D选项说法错误。（新编）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 232, topic: "专题三 民事诉讼法", type: "single", question: "根据民事诉讼法及相关司法解释，下列关于中级人民法院的哪项说法是正确的？单选）", options: {"A": "对案件所作出的判决均为终审判决", "B": "审理案件均须以开庭审理的方式进行", "C": "既可受理一审涉外案件，也可受理一审非涉外案件", "D": "审理案件组成合议庭时，均不可邀请人民陪审员参加"}, answer: "C", explanation: "。A选项，当中院作为一审法院时，当事人有权对其作出的判决提起上诉，因此A选项错误。B选项，根据《民诉法》第176条第1款的规定，第二审人民法院认为不需要开庭审理的，可以不开庭审理。因此中院作为二审法院时，可以不开庭审理案件，B选项错误。C选项，（民诉法》第19条规定：“中级人民法院管辖下列第一审民事案件：（一）重大涉外案件：（二）在本辖区有重大影响的案件：（三）最高人民法院确定由中级人民法院管辖的案件”，因此C选项正确。D选项，根据《民诉法）第40条的规定，人民法院审理第一审民事案件，由审判员、人民陪审员共同组成合议庭或者由审判员组成合议庭，中院作为一审法院时，可以由审判员、人民陪审员共同组成合议庭，因此D选项销误。（新编）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 233, topic: "专题三 民事诉讼法", type: "single", question: "根据最高人民法院关于第一审知识产权民事、行政案件管辖的若干规定，下列说法哪个是正确的？", options: {"A": "外观设计专利第一审行政案件，经最高人民法院批准，可以由基层人民法院管辖", "B": "外观设计专利的侵权纠纷第一审民事案件，经最高人民法院批准，可以由基层人民法院管辖", "C": "实用新型专利的权属纠纷第一审民事案件可以由最高人民法院确定的基层人民法院管辖", "D": "技术秘密的侵权纠纷第一审民事案件可以由最高人民2026年专利代理即资格考试法院确定的基层人民法院管辖"}, answer: "B", explanation: "。A、B选项，《最高人民法院头第一审如识产权民事、行政案件管综的冬子规定》第2条第1款规定：“外观设计句所权属、促权纠纷以及沙胞名商标认定留一民事、行政案件由知识户权法院和中级人月法院管辖：经最商人民法院批准，也可以么基层人民法院管辖，但外观设计专利行政息件除外”，因此A通项借误，B选项正确。CD选项，（最商人民法院关于第一审如议权民事、行政案件管辖的若干规定》第1号第1款规定：“发明专利、实用新型专利、理物新品种、集成电路布图设计、技术秘密、计算机软件的权属、权纠纷以及垄断纠纷驾一审民事、行政案件由知识产权法院，省、自治区、直辖市人民政府所在地的中级人民法院和最商人民法院确定的中级人民法院管辖”，因此C、D选项错误。（新编）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 234, topic: "专题三 民事诉讼法", type: "multiple", question: "王某欲以刘某和赵某为共同被告提起民事诉讼。经查，王某的住所地和经常居住地均为甲地；刘某的住所地为乙地、经常居住地为丙地；赵某的住所地和经常居住地均为丁地。根据民事诉讼法及相关规定，下列哪些人民法院对该案有管辖权？", options: {"A": "甲地人民法院", "B": "乙地人民法院", "C": "丙地人民法院", "D": "丁地人民法院"}, answer: "CD", explanation: "。《民诉法》第22条规定：“对公民提起的民事诉讼，由被告住所地人民法院管辖；被告住所地与经常居住地不一致的，白经常居住地人民法院管辖.同一诉讼的几个被告住所地、经常居住地在两个以上人民法院辖区的，各该人民法院都有管辖权”，因此被告刘某和赵某的经常居住地丙地示丁地均有管辖权，A、B选项错误，C、D选项正确。（2014）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 235, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列哪些案件由原告住所地或者经常居住地人民法院管辖？", options: {"A": "对宣告失踪的人提起的有关财产关系的诉讼", "B": "对下落不明的人提起的有关身份关系的诉讼", "C": "对不在中华人民共和国领域内居住的人提起的有关身份关系的诉讼", "D": "对不在中华人民共和国领域内居住的人提起的有关财产关系的诉讼"}, answer: "BC", explanation: "。《民事诉讼法》第23条规定：下列民事诉讼，由原告住所地人民法院管辖；原告住所地与经常居住地不一致的，由原台经常居住地人民法院管辖：（一）对不在中华人民共和国领域内居住的人提起的有关身份关系的诉讼：（二）对下落不明或者宜告六踪的人提起的有关身份关系的诉讼：（三）对被采取强制性教育措施的人提起的诉讼：（四）对被监禁的人提起的诉讼”，因此A.D选项错误，B、C选项正确。（新编）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 236, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，关于地域管辖，下列说法正确的是？多选）", options: {"A": "因侵权行为提起的诉讼，由侵权行为地或者被告住所地人民法院管辖", "B": "因合同纠纷提起的诉讼，由被告住所地或者合同履行地人民法院管辖", "C": "因继承遗产纠纷提起的诉讼，由被继承人死亡时住所地或者主要遗产所在地人民法院管辖", "D": "因公司设立纠纷提起的诉讼，由公司住所地人民法院管辖"}, answer: "ABCD", explanation: "。A选项，《民诉法》第29条规", chapter: "第二章 民事诉讼的基本制度"},
  {id: 237, topic: "专题三 民事诉讼法", type: "multiple", question: "住所地在上海市闵行区的原告甲认为住所地在深圳市福田区的被告乙公司在北京市生产的产品使地了自已的专利权，在乙公司设于广州市的销售部购买了破控役权产品，以役咨发明专利权到纷为由提起民事诉讼，下列哪些法院有管辖权？", options: {"A": "上海知识产权法院", "D": "广州知识产权法院", "C": "北京知识产权法院", "B": "广州知识产权法院"}, answer: "BC", explanation: "。《民诉法》第29条规定：“因仪权行为提起的诉讼，由使权行为地或者被告住所地人民法院管辖”。本题中，深圳是披杏住所地，北京是制造地，广州是销售地，北京和广州均属于便权行为地，因此深圳、北京、广州均具有管辖权，A选项错误，B、C、D选项正确。（2018）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 238, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，与信息网络管物说法正确有哪些？多选）", options: {"A": "信息网络方式订立的买卖合同，通过信息网络交付标的的，以买受人住所地为合同履行地", "B": "信息网络方式订立的买卖合同，通过信息网络以外的方式交付标的的，收货地为合同履行地", "C": "信息网络侵权中，实施被诉侵权行为的计算机等信息设备所在地不属于侵权行为实施地", "D": "信息网络侵权中，侵权结果发生地包括被侵权人住所地"}, answer: "ABD", explanation: "。A、B选项，根据《民诉法解释》第20条规定：“以信息网络方式订立的买卖合同，通过信息网络交付标的的，以买受人住所地为合同履行地：通过其他方式交付标的的，收货地为合同履行地。合同对履行地有约定的，从其约定”，因此A、B选项正确。C、D选项，根据（民诉法解释》第25条规定：“信息网络役权行为实施地包括实施被诉设权行为的计算机等信息设备所在地，侵权结果发生地包括被役权人住所地”，因此C选项错误，D选项正确。（新编）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 239, topic: "专题三 民事诉讼法", type: "single", question: "甲和乙是同乡，现都在北京市海淀区工作。甲在深圳市南山区有一套住房，经协商，同意以400万元的价格将房屋卖给乙。双方在北京签订了合同，乙一次性支付了房款，后办理了房屋产权过户手续。现甲之妻以卖房未经其同意为由，要求乙返还房产。据此，本案应当由哪个人民法院管辖？", options: {"A": "北京市海淀区人民法院", "B": "深圳市南山区人民法院", "C": "北京市海淀区人民法院或者深圳市南山区人民法院", "D": "最先受理甲之妻起诉的人民法院"}, answer: "B", explanation: "。根据《民诉法解释》第28条的规定，不动产纠纷是指因不动产的权利确认、分割、相邻关系等引起的物权纠纷。本题的诉讼是对房屋所有权权利的确认，属于专属管辖。B选项正确。（2018）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 240, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，关于专属管辖，下列说法哪些是正确的？", options: {"A": "因商品房相邻关系引起的物权纠纷，由该商品房所在地人民法院管辖2026年专剩代理所资格考试", "B": "商品房买实合同纠纷，由该商品房所在地人民法院管辖", "C": "房屋租货合同纠纷、由该房屋所在地人民法院管辖", "D": "政策性房屋买实合同纠纷，由该房屋所在地人民法院管辖"}, answer: "ACD", explanation: "。《民诉法解释》第28条规定：“不动产纠纷是指因不动产的权别确认、分割、相邻关系等别起的物权纠纷。农村土地承包经营合同纠纷、房屋租货合同纠纷，降设工程施工合同纠纷、政策性房屋买实合目纠纷、按照不动产纠纷确定竹辖”，因化人题项的相邻关系纠纷、C通项的房屋租货合具纠纷、D选项的政策性房屋买实合间纠场目于专属管辖，B选项的前品房买奖合同纠场按一般管辖确定管辖地。（新编）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 241, topic: "专题三 民事诉讼法", type: "multiple", question: "家住天津市河东区的李某，在七夕情人节当天在某宝网上购买了位于天津市西青区的“玫瑰有约”花店的99朵玫瑰花，送给位于天津市和平区的女友，直接由花店送达女友住处。女友收到后发现玫瑰花已经枯萎，经与花店协商未果，李某向天津市河东区法院起诉该花店。法院受理后认为没有管辖权！遂将案件移送天津市和平区法院。关于本案的管辖，下列哪些说法是正确的？", options: {"A": "天津市河东区法院有管辖权", "B": "天津市西青区法院有管辖权", "C": "天津市和平区法院有管辖权", "D": "天津市河东区法院移送管辖不符合法律规定"}, answer: "BC", explanation: "。A、B、C选项，《民诉法>第2条规定：“因合同纠纷提起的诉讼，由被告住所地或者合同履行地人民法院管辖”，《民诉法解释》第20条规定：“以信息网络方式订立的买卖合同，通过信息网络交付标的的，以买受人住所地为合同限行地；通过其他方式交付标的的，收货地为合同履行地。合同对履行地有约定的，从其约定”，A选项为原告所在地法院，无管辖权，B选项为被告所在地、C选项为合同履行地，均有管辖权，因此A选项错误，B、C选项正确。D选项，极部《民诉法》第37条的规定，人民法院发现受理的案件不属于本院管辖的，应当移送有管辖权的人民法院。因此，天津市河东区法院移送符合规定，D选项错误。（新编）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 242, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，在不违反民事诉讼法对级别管辖和专属管辖规定的情况下，合同双方当事人可以就合同纠纷通过书面协议选择下列哪些人民法院管辖？", options: {"A": "被告住所地人民法院", "B": "合同履行地人民法院", "C": "合同签订地人民法院", "D": "标的物所在地人民法院"}, answer: "ABCD", explanation: "。《民诉法》第35条规定：“合同或者其他财产权益纠纷的当事人可以部面协议选择被告住所地、合同履行地、合同签订地、原告住所地、标的物所在地等与争议有实际联系的地点的人民法院管辖，但不得违反本法对级别管辖和专属管辖的规定”，因此A、B、CD选项均正确。（2012）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 243, topic: "专题三 民事诉讼法", type: "multiple", question: "甲公司与乙公司签订了家具买卖合同，并欲就发生合同纠纷时的管辖问题进行约定。根据民事诉讼法及相关规定，在不违反级别管辖和专属管辖规定的情况下，下列哪些约定符合规定？多选）", options: {"A": "双方书面约定由合同签订地人民法院管辖", "B": "双方口头约定由合同签订地人民法院管辖", "C": "双方书面约定由原告住所地人民法院管辖", "D": "双方口头约定由原告住所地人民法院管辖"}, answer: "AC", explanation: "。根据《民诉法》第35条的规定，协议管辖应当采用书面协议，面不是口头协议，并可以选择合同签订地或原告住所地人民法院管辖，因此A、C选项正确，B、D选项错误。（2013）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 244, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，对于两个以上人民法院都有管辖权的民事诉讼案件，下列说法正确的是7多选）", options: {"A": "先立案的人民法院可以将案件移送给另一个有管辖权的人民法院", "B": "人民法院在立案前发现其他有管辖权的人民法院已先立案的，不得重复立案", "C": "人民法院在立案后发现其他有管辖权的人民法院已先立案的，裁定将案件移送给先立案的人民法院", "D": "有管辖权的人民法院受理案件后，不得以行政区城变更为由，将案件移送给变更后有管辖权的人民法院"}, answer: "BCD", explanation: "。A、B、C选项，《民诉法解释）第36条规定：“两个以上人民法院都有管辖", chapter: "第二章 民事诉讼的基本制度"},
  {id: 245, topic: "专题三 民事诉讼法", type: "multiple", question: "李某在北京市海淀区新购一套住房，并请北京市大兴区的装修公司对其新房进行装修。在装修过程中，装修工人不慎将水管弄破，导致楼下住户的家具被淹毁。李某与该装修公司就赔偿问题交涉未果，遂向北京市大兴区法院起诉装修公司侵权。大兴区法院认为该案应由海淀区法院审理，于是裁定将该案移送至海淀区法院，海淀区法院认为该案应由大兴区法院审理，不接受移送，又将案件退回大兴区法院。关于本案的管辖，下列哪些选项是正确的？", options: {"A": "北京市海淀、大兴区法院对该案都有管辖权", "B": "只有北京市海淀区法院有管辖权", "C": "北京市大兴区法院的移送管辖是错误的", "D": "海淀区法院不接受移送，将案件退回大兴区法院是错误的"}, answer: "ACD", explanation: "。A、B选项，《民诉法>第29条规定：“因侵权行为提起的诉讼，由役权行为地或者被告住所地人民法院管辖”：本题中，海淀区是便权行为地，大兴区是被告住所地，两地法院都有管辖权，本题不属于专属管辖范图，因此A选项正确，B选项借误。C选项，根据《民诉法解释>第36条规定，两个以上人民法院都有管辖权的诉讼，先立案的人民法院不得将案件移送给另一个有管辖权的人民法院，因此大兴区法院立案后不能将案件移送海淀区法院，C选项正确。D选项，根据《民事诉讼法》第37条的规定，受移送的人民法院认为受移送的案件依愿规定不属于本院管辖的，应当报请上级人民法院指定管辖，不得再自行移送，因此海淀区法院不能将案件退回，只能报请上级法院指定管辖，D选项正确。（法考2008，思维扩展）ABCD。《民诉法》第52条第1、2款规定：“当权委托代理人，提出回避申请，收集、提供进行辩论，请求调解，提起上诉，申请执行。可以查阅本案有关材料，并可以复制本案料和法律文书。查圆、复制本案有关材料的范围和办法由最商人民法院规定”，四允C、D选项均正确。（2011）", chapter: "第二章 民事诉讼的基本制度"},
  {id: 246, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列说法哪些是正确的？", options: {"A": "民事诉讼当事人有权请求调解证", "B": "民事诉讼当事人有权提出回避申请有", "C": "民事诉讼当事人有权申请执行", "D": "民事诉讼当事人可以按照相关规定查阅本案有关材料"}, answer: "AD", explanation: "《民事诉讼法）第60条规定：“无切为能力人由他的监护人作为法定代理人代讼”（民事诉讼法解释》第67条规定：“无民事能力人、限制民事行为他力人投成他人俱事民事行为他力人、限制民事行为能力人和其人为共同被份”，王某作为役权法律关系中的人，为适格原告：由于起诉时王某尚未成年，由其监护人作为法定代理人提起诉讼。四此王某是原告，王某的父母是原否的法定代习张某为未成年人，应当以役权人张某和其监为共同被告。因此本案中张某和张某的父母同被告。因此A、D选项正确。（新编）", chapter: "第三章 诉讼参加人"},
  {id: 247, topic: "专题三 民事诉讼法", type: "multiple", question: "10岁的张某在公交车上玩耍，不慎将手中的玩具砸到邻座8岁的王某致其受伤、双方父母对损害赔偿问题发生争议，王某的父母决定向法院提起诉讼，关于本案当事人的说法，下列哪些说法正确？多选）", options: {"A": "王某是原告", "B": "王某和王某的父母是共同原告", "C": "张某是被告", "D": "张某和张某的父母是共同被告"}, answer: "ABCD", explanation: "。A选项，《民诉：法》第S9条第1定：“对当事人双方的诉讼标的，第三人认为：立请求权的，有权提起诉讼”，因此A选项正确选项，根据《民诉法解释》第81条第1款的规定独立请求权的第三人有权向人民法院提出诉i求和事实、理由，成为当事人，因此B选项正C、D选项，《民诉法>第59条第2款规定：“对当1双方的诉讼标的，第三人虽然没有独立请求权案件处理结果同他有法律上的利害关系的，司申请参加诉讼，或者由人民法院通知他参加诉人民法院判决承担民事责任的第三人，有当事的诉讼权利义务”，因此C、D选项正确。（2010）", chapter: "第三章 诉讼参加人"},
  {id: 248, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于民事诉讼第三人的说法哪些是正确的？多选）", options: {"A": "对当事人双方的诉讼标的，第三人认为有独立请求权的，有权提起诉讼", "B": "有独立请求权的第三人有权向人民法院提出诉讼请求和事实、理由，成为当事人", "C": "对当事人双方的诉讼标的，第三人虽然没有独立请求权，但案件处理结果同他有法律上的利害关系的，可以申请参加诉讼", "D": "人民法院判决承担民事责任的第三人，有当事人的诉讼权利义务"}, answer: "ACD", explanation: "。《民诉法解释》第82条规定：“在一诉讼中，无独立请求权的第三人无权提出管辖议，无权放弃、变更诉讼请求或者申请撤诉，被决承担民事贵任的，有权提起上诉”，诉讼参加都有提出回避的权利，包括无独立请求权的第人，因此A、C、D选项正确，B选项错误。（20改编）", chapter: "第三章 诉讼参加人"},
  {id: 249, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，在民事诉讼一审程序中，无独立请求权的第三人不享有下列哪项诉讼权利？", options: {"A": "申请撤诉", "B": "提出回避申请", "C": "变更诉讼请求", "D": "对案件的管辖权提出异议"}, answer: "BC", explanation: "。本题中，争议双方主体是乙公司和i公司，申和案件处理结果有利害关系，是无独立i求权的第三人，可以申请参加诉讼，但是不能提", chapter: "第三章 诉讼参加人"},
  {id: 250, topic: "专题三 民事诉讼法", type: "single", question: "专利权人甲与乙公司签订了专利独占实施许可合同，又将专利转让给了丙公司，乙公司因与丙公司就实施许可发生纠纷向人民法院提起诉讼，甲作为第三人在该案中阜有哪些权利？多选）", options: {"A": "提起诉讼", "B": "申请参加诉讼", "C": "若被判决承担民事资任，则有权提起上诉", "D": "在一审诉讼中提出管辖异议"}, answer: "D", explanation: "，本题中，房屋买英合同从方当事人是刘某和除集，河某作为原告，陈集作为被告，赵某不能作为共同原告参加诉讼，但赵某对干除某和测某之间事执的标的物主张所有权，应作为有德立请求权的第三人参与诉讼，因此A、B、C选项错误，D选项正确。（法考2018）", chapter: "第三章 诉讼参加人"},
  {id: 251, topic: "专题三 民事诉讼法", type: "multiple", question: "赵某与刘某将共有商铺出租给陈某。刘某着赵某，与陈某签订房屋买实合同，将商铺转让给陈某，后因该合同履行发生纠纷，刘某将陈某诉至法院。赵某得知后，坚决不同意刘某将商铺让与陈某。关于本案相关人的诉讼地位，下列哪一说法是正确的？", options: {"A": "法院应依职权追加赵某为共同原告", "B": "赵某应以刘某侵权起诉，陈某为无独立请求权第三人", "C": "赵某应作为无独立请求权第三人", "D": "赵某应作为有独立请求权第三人"}, answer: "BC", explanation: "。《民诉法解>第296条规定：“第三人提起撤销之诉，人民泌院应当将该第三人列为原告，生效判决、裁定、调解书的当事人列为被告，但生效判决、我定、调解书中没有承担资任的无独立请求权的第三人列为第三人”。本题中，原审中是原告，丙是被告，乙是无独立请求权的第三人，所以在第三人撤销之诉中，应当以原中原告中和原审被告丙为被货，面原审无独立请求权的第三人乙在第三人撤销之诉中的诉讼地位应当视其在生效裁判文节中是否承担义务而定，原生效调解书约定的内容是“丙将价值100万元的货物交付给申”，显然无独立请求权的第三人乙不承担贵任，因此在第三人撒销之诉中乙应当作为第三人，不能作为被告，A、D选项错误，B、C选项正确。（法考2006，惠维扩展）", chapter: "第三章 诉讼参加人"},
  {id: 252, topic: "专题三 民事诉讼法", type: "multiple", question: "甲公司对乙公司有100万元权到期，乙公司对丙公司有100万债权。甲公司对丙公司提起代位权诉讼，法院依法将乙公司列为第三人。诉讼中甲、丙达成调解协议，约定丙公司将价值100万一批货物交付给甲，用于清偿该笔债务，法院依法制作调解书送达当事人。丁主张货物是自己的，欲提出第三人撤销之诉，该撤销之诉中，下列关于当事人地位的说法哪些是正确的？", options: {"A": "乙是被告", "B": "丙是被告", "C": "乙是第三人", "D": "丙是第三人"}, answer: "AB", explanation: "。《民诉法》第55条规定：“当事人一方或者双方为二人以上，其诉讼标的是共同的，或者诉讼标的是同一种类、人民法院认为可以合并审理并经当事人同意的，为共同诉讼。共同诉讼的一方当事人对诉讼标的有共同权利义务的，其中一人的诉讼行为经其他共同诉讼人承认，对其他共同诉讼人发生效力；对诉讼标的没有共同权利义务的，其中一人的诉讼行为对其他共同诉讼人不发生效力”。由此可知，共同诉讼包括必要共同诉讼和普通共同诉讼，必要共同诉讼当事人的诉讼标的是共同的（只有一个），普通共同诉讼当事人的诉讼标的为同一种类（有若干个），因此A、B选项正确。但是对荫者的诉讼请求数是以及诉诉讼行为一致性没有婴求，因此C、D选项1（新编）9.入。A选项，《民诉法际释》第283务邹规定：“公益诉讼案件由使权行为地成有软介地中级人民决院管辖，但法律、可法解员有的除外”，因此A选项正确。B通项，《民诉次级第288条规定：“公益诉讼案仆的原告在法良终结后申请撤诉的，人民法院不予准许”，国益诉讼案件的原否可以在法庭解论终结前摄选项错误。C、D选项，《民诉法解释》第287数规定：“对公益诉讼案件，当事人可以和解，法院可以调解”，因此C、D选项错误。（2017）", chapter: "第三章 诉讼参加人"},
  {id: 253, topic: "专题三 民事诉讼法", type: "multiple", question: "关于必要共同诉讼与普通共同诉讼的区别，下列哪项说法是正确的？", options: {"A": "必要共同诉讼的诉讼标的是共同的，普通共同诉讼的诉讼标的是同种类的", "B": "必要共同诉讼的诉讼标的只有一个、普通共同诉讼的诉讼标的有若干个", "C": "必要共同诉讼的诉讼请求只有一个，普通共同诉讼的诉讼请求有若干个", "D": "必要共同诉讼中共同诉讼人的诉讼行为必须一致，普通共同诉讼中共同诉讼人的诉讼行为不需要一致"}, answer: "ABCD", explanation: "。《民诉法解释》第87条第1款灯“根据民事诉讼法第61条第2款第（三）项规定关社会团体推荐公民担任诉讼代理人的，应合下列条件：（一）社会团体属于依法登记设者依法免予登记设立的非营利性法人组织；（被代理人属于该社会团体的成员，或者当事，方住所地位于该社会团体的活动地域：（三）事务属于该社会团体章程载明的业务范围；（被推荐的公民是该社会团体的负责人或者与会团体有合法劳动人事关系的工作人员”，因B、C、D选项均正确。（2016）", chapter: "第三章 诉讼参加人"},
  {id: 254, topic: "专题三 民事诉讼法", type: "single", question: "某消费者权益保护协会认为，某手机生产商在手机出厂前预装大量程序，并且未告知消费者卸载方式。该消费者权益保护协会以上述行为侵害众多消费者合法权益、损害社会公共利益为由提起公益诉讼。根据民事诉讼法及相关规定，下列哪种说法是正确的？", options: {"A": "本案可以由侵权行为地或者被告住所地中级人民法院管辖", "B": "作为公益诉讼案件原告的该消费者权益保护协会一律不得申请撤诉", "C": "人民法院不得对该公益诉讼案件进行调解", "D": "该公益诉讼案件的当事人不能和解"}, answer: "B", explanation: "。A选项，《民诉法解释》第85条规“与当事人有夫妻、直系血亲、三代以内旁系血近烟亲关：系以及其他有抚养、养关系的亲属以当事人近亲属的名义作为诉讼代理人”，原岳父属于诉讼当事人的近姻亲，可以作为委书理人。B、D选项，《民诉法》第61条第2数规定：列人员可以被委托为诉讼代理人：（一）律师、签法律服务工作者；（二）当事人的近亲属或者工人员”，公司的实习生不属于单位的工作员，不能作为诉讼代理人，基层法律服务所的工人员可以作为代理人。C选项，《民诉法解释）第条第2数规定：“专利代理人经中华全国专利代", chapter: "第三章 诉讼参加人"},
  {id: 255, topic: "专题三 民事诉讼法", type: "single", question: "根据民事诉讼法及相关规定，下列哪些属于有关社会团体推荐公民担任诉讼代理人应当符合的条件？", options: {"A": "社会团体属于依法登记设立或者依法免予登记设立的非营利性法人组织", "B": "被代理人属于该社会团体的成员，或者当事人一方住所地位于该社会团体的活动地域", "C": "代理事务属于该社会团体章程载明的业务范围", "D": "被推荐的公民是该社会团体的负责人或者与该社会团体有合法劳动人事关系的工作人员"}, answer: "C", explanation: "《民诉法）第60条规定：无诉讼行方能人由您的蓝护人作为法定代理人代力诉讼。张丧失行为能力，应当由其法定代理人代为诉讼。据《民法典）第23条境定，无、限制民事行力能力成年人，由下列有当护能力人的人该序担任炉人：（一）配偶：（二）父、子女：（三）其他近亲（四）其他得惠想任监护人的个人和组织，但必经过微监护人所在地的居民委员会、村民委质或者民政部门同意。故张集的要子是第一顾故应当由张某的姿子超任代理人。因此，本案当追加张集的费子为法定代理人，诉讼继续进.C选项正确，D选项错误。张集的姿子应当是告张某的法定代理人，不是当事人，不能追加其共同原告或者原告，A、B选项错误。（法考2021）", chapter: "第三章 诉讼参加人"},
  {id: 256, topic: "专题三 民事诉讼法", type: "multiple", question: "下列主体中，不可以作为民事诉讼委托代理人的是？", options: {"A": "原告的岳交", "B": "公司的实习生", "C": "专利纠纷诉讼中，由中华全国代理师协会推荐的专利代理师", "D": "离婚诉讼中，某基层法律服务所的工作人员"}, answer: "BCD", explanation: "。《民诉法）第62条第1、2款规定：“委他人代为诉讼，必须向人民法院提交由委托人名或者盖章的授权委托节。投权委托书必须记委托事项和权限。诉讼代理人代为承认、放弃、更诉讼请求，进行和解，提起反诉或者上诉，必有委托人的特别投权”，全权委托代理视为无特授权，A选项提出管辖权异议不需要特别授权，C、D选项的行为需要特别投权。（2019）", chapter: "第三章 诉讼参加人"},
  {id: 257, topic: "专题三 民事诉讼法", type: "multiple", question: "张某因为合同纠纷起诉甲公司，在诉讼中张某突发脑梗，经抢救后，张某仍然丧失行为能力。张某的父亲希望撤回起诉，以专心为张某治疗；张某的妻子表示希望继续诉讼。本案法院应当如何处理？", options: {"A": "法院应当追加张某的妻子为共同原告", "B": "法院应当变更张某的妻子为原告，诉讼继续进行", "C": "追加张某的妻子为法定代理人，诉讼继续进行", "D": "根据张某父亲的请求，裁定准予撤回起诉"}, answer: "ACD", explanation: "。（民诉法解释）第88条规定：“诉讼理人除根据民事诉讼法第62条规定提交授权委书外，还应当按照下列规定向人民法院提交相材料：（一）律师应当提交律师执业证、律师事务证明材料…”，律师作为诉讼代理人不要求提本人身份证件，因此A、C、D选项正确。（新编）", chapter: "第三章 诉讼参加人"},
  {id: 258, topic: "专题三 民事诉讼法", type: "single", question: "王某因与甲公司发生合同纠纷，遂委托李律师全权代理诉讼，但未作具体的授权。此种情况下，李律师在诉讼中无权实施下列哪些行为？多选）", options: {"A": "提出管辖权异议", "B": "提起反诉）C.提起上诉", "D": "部分变更诉讼请求"}, answer: "A", explanation: "。A选项，《民事诉讼法）第64条规定：代理诉讼的律师和其他诉讼代理人有权调查收证据，可以查阅本案有关材料…”，因此A选项确。B选项，（民事诉讼法）第63条规定：“诉讼理人的权限如果变更或者解除，当事人应当书告知人民法院，并由人民法院通知对方当事人”，因此目选项销误。C选项，全权委托代理规为无特别投权，代为变更诉讼请求也应当有特财权，因此C遇项借误。D选项，（民事诉讼法）第条规定：“离婚案件有诉讼代理人的，本人除不表达意思的以外，仍应出庭：确因特珠情况无法也庭的，必须向人民法院提交书调意见”，D选项的象述过于绝对，因此D选项借误。（新编，思维扩展）公证据", chapter: "第三章 诉讼参加人"},
  {id: 259, topic: "专题三 民事诉讼法", type: "single", question: "根据民事诉讼法及相关规定，律师作为诉讼代理人，应当向人民法院提交下列哪些材料？", options: {"A": "律师执业证", "B": "本人身份证件c.律师事务所证明材料", "D": "授权委托书"}, answer: "A", explanation: "。A选项，《民诉法解释）第116条第3数规定：“存储在电子介质中的录音资料和影像资料，适用电子数据的规定”，因此A选项正确。B选项，（民诉法）第75条第1款规定：“凡是知道案件情况的单位和个人，都有义务出庭作证”，因此单位和个人都可以作为证人，B选项错误。C选项，（民诉法解释》第112条规定：“书证在对方当事人控制之下的，承担举证证明责任的当事人可以在举证期限届满前书面申请人民法院责令对方当事人提交。申请理由成立的，人民法院应当责令对方当事人提交，因提交书证所产生的费用，由申请人负担…”，因此C选项错误。D选项，《民诉法）第73条规定：“书证应当提交原件·提交原件或者诉法解释》第111条的规定，提交书证原件有困难的条件包括原件在对方当事人控制之下，经合法通知提交而拒不提交的情形，因此对于原件在对方当事人控制之下的书证，需经合法通知提交页拒不提交的，才可提交复制品，D选项错误。（2018）", chapter: "第三章 诉讼参加人"},
  {id: 260, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，关于诉讼代理人，下列说法哪个是正确的？", options: {"A": "律师之外的其他诉讼代理人有权调查收集证据，查阅本案有关材料", "B": "诉讼代理人的权限变更的，可以由诉讼代理人书面告知人民法院", "C": "当事人委托诉讼代理人全权代理的，诉讼代理人可以代为变更诉讼请求", "D": "离婚案件有诉讼代理人的，本人仍应出庭"}, answer: "ABC", explanation: "。A选项，《民诉法》第66条规定：“证可作为民事诉讼证据，A选项正确。B选项，（民调法》第68条第2数规定：“…当事人在该期限提供证据确有困难的，可以向人民法院申请延步期限，人民法院根据当事人的申请适当多长…”，因此B选项正确。C选项，根据《民诉法第73条的规定，书证提交原件或者原物确有因1", chapter: "第三章 诉讼参加人"},
  {id: 261, topic: "专题三 民事诉讼法", type: "multiple", question: "关于民事诉讼证据的理解，下列选项中正确的有？", options: {"A": "存储在电子介质上的录音资料，适用电子数据的相关规定", "B": "民事诉讼中的证人只能是自然人", "C": "法院责令对方当事人提交相关书证，则因提交书证所产生的费用，应当由申请人垫付，由对方当事人最终承担", "D": "书证应当提交原件，但如果原件在对方当事人控制之下，则可以提交复制品"}, answer: "ABC", explanation: "。《民诉法解释）第123条规定：人民法院可以对出庭的具有专门知识的人进行询问。经法庭准许，当事人可以对出庭的具有专门知识的人进行询问，当事人各自申请的具有专门知识的人可以就案件中的有关问题进行对质。具有专门知识的人不得参与专业问题之外的法庭审理活动”，限据（民诉法解释）第122条的规定，具有专门知识的人在法庭上就专业问题提出的意见，视为当事人的陈述。因此A、B、C选项正确，D选项错误。（2016)", chapter: "第四章 民事证据"},
  {id: 262, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，当事人的下列哪些做法符合关于证据的规定？多选）", options: {"A": "原告赵某以电子数据作为证据来证明提出自己的主张", "B": "原告张某因在人民法院确定的期限内提供证据确有困难，向人民法院申请延长期限", "C": "被告李某因提交某书证原件确有困难，提交了经人民法院核对无异的复制件", "D": "被告王某提交外文书证作为证据，未附中文译本"}, answer: "BC", explanation: "。A选项，有专门知识的人的作用是标助中请方当事人对签定意见进行质证或者就专业问题发表意见，无需保持中立，故不适用回避制度，A选项错误。（民诉法解释）第122条第2款规定：“具有专门知识的人在法庭上就专业问题提出的意见，视为当事人陈述”，当事人陈述属于法定证据种类之一，B选项正确。（民诉法解释》第123条第1款规定：“经法庭准许，当事人可以对出庭的具有专门知识的人进行询问”，C选项正确。《民诉法解释》第122条第3款规定：人民法院准许当事人申请的，相关费用由提出申请的当事人负担”，而非败诉方当事人承担，D选项错误。因此，B、C选项正确。（法考2014）", chapter: "第四章 民事证据"},
  {id: 263, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于具有专门知识的人出庭的哪些说法是正确的？多选）", options: {"A": "人民法院可以对出庭的具有专门知识的人进行询间", "D": "有专门知识的人提出的意见视为证人证言", "C": "经法庭准许，当事人各自申请的具有专门知识的人可以就案件中的有美同题进行对质"}, answer: "CD", explanation: "。A选项，作为证人需要满足两个条件，一是了解案件事实，二是能够正确表达，本案中钱某虽然是乙公司的工作人员，但其具有证人资格，且无需经过对方当事人同意，A选项错误。B选项，证人应当客观陈述其亲身感受的事实，不得宣读事先准备的书面材料，B选项错误。C选项，证人作证应当分别进行，其他证人不得在场，但必要时法院可以安排证人之间进行对质，C选项正确。D选项，《民诉法）第76条规定：“有下列情形之一的，经人民法院许可，可以通过书面证言、视听传输技术或者视听资料等方式作证：··（二）因路途逼远，交通不便不能出庭的”，本案中证人赵某因为路途遇远不能出庭作证，经法院同意后可以通过书而证育、视听传输技术成考税明方式作证，且无需经过对方当事人网意，1)类确。四此，C、D选项正确。（法考2023）", chapter: "第四章 民事证据"},
  {id: 264, topic: "专题三 民事诉讼法", type: "multiple", question: "在一起专利侵权诉讼中，原告申请由其弟袁某（某大学计算机系教授）作为专家辅助人出庭对专业技术问题予以说明。下列哪些表述是正确的？", options: {"A": "被告以袁某是原告的近亲属为由申请其回避，法院应批准", "B": "袁某在庭上的陈述是一种法定证据", "C": "被告可对袁某进行询问", "D": "袁某出庭的费用，由败诉方当事人承担"}, answer: "ABC", explanation: "。A选项，《证据规定）第67年级2规定：“待证事实与其年龄、智力铁况或，康状况相道应的无民事行为能力人和限制民。，为能力人，可以作为证人”，何小某报结为限，事行为能力人，但是可以作为证人，A选项销证人不适用四避制度，B选项错误。证保规定）90条规定：“无民事行为能力人或者限制民事行能力人所作的与其年龄、智力状况或者精神健目状况不相当的证言，与一方当事人或者其代理)有利害关系的证人陈述的证言，不能单独作为定案件事实的根据”，何小某作为限制民事行为力人，即便其所作证官与其年龄智力状况不相或是与当事人有利害关系，依旧具有证明力，只是证明力较小，不能单独作为认定案件事实的根驾C选项错误，D选项正确。本题选择不正确的到项，因此A、B、C选项当选。（法考2017，思维扩展）", chapter: "第四章 民事证据"},
  {id: 265, topic: "专题三 民事诉讼法", type: "multiple", question: "甲、乙两公司因合同纠纷提起诉讼，甲公司申请丙运输公司的赵某作为证人出庭作证，乙公司申请本公司的仓库保管员钱某作为证人出庭作证，以下表述正确的是？", options: {"A": "何小某只有11岁、不具有证人资格", "B": "何小某是何某的弟弟，应回避", "C": "何小某作为未成年人，其所有证言依法都不具有", "D": "何小某作为何某的弟弟，证言具有明显的倾向性、其证言不能单独作为定案依据"}, answer: "AD", explanation: "。A、C选项，《民诉法》第79条第1数物定：“当事人可以就查明事实的专门性问题向人法院中请鉴定。当事人申请鉴定的，由双方当事据.…”，因此B选项错误。D选项，《民诉法》第旨识的人出庭，就鉴定人作出的鉴定意见或者专业问题提出意见”，因此D选项正确。（2018）", chapter: "第四章 民事证据"},
  {id: 266, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列哪些关于鉴定的说法正确的是？多选）", options: {"A": "当事人可以就查明事实的专门性问题向人民法院申请鉴定", "B": "当事人对鉴定意见有异议的，鉴定人不出庭作证，是否采纳该鉴定意见由法院决定", "C": "人民法院准许当事人鉴定申请的，应当在名录中指定鉴定人", "D": "当事人可以申请人民法院通知有专门知识的人出庭，就鉴定人作出的鉴定意见或者专业问题提出意见"}, answer: "BC", explanation: "。A、B、C选项，《民诉法》第81条规定：“当事人对鉴定意见有异议或者人民法院认为差定人有必要出庭的，鉴定人应当出庭作证。经人民法院通知，鉴定人拒不出庭作证的，鉴定意见不得作为认定事实的根据；支付鉴定费用的当事人可以要求返还鉴定费用”，因此A选项错误，B、C项正确。D选项，如果鉴定意见未被采纳，由负有", chapter: "第四章 民事证据"},
  {id: 267, topic: "专题三 民事诉讼法", type: "multiple", question: "在某专利侵权诉讼中，原告张某依法向人民法院申请鉴定。具备资格的某鉴定人依法出具了鉴定意见，张某支付了鉴定费用。案件审理过程中，被告王某对该鉴定意见有异议，人民法院通知该鉴定人出庭作证，但其拒不出庭作证。据此，根据民事诉讼法及相关规定，下列哪些说法是正确的？", options: {"A": "人民法院应当拘传该鉴定人出庭作证", "B": "该鉴定意见不得作为认定事实的根据", "C": "张某可以要求该鉴定人返还鉴定费用", "D": "人民法院应当贵令张某确定其他鉴定人重新作出鉴定"}, answer: "ABCD", explanation: "。（医诉法解华）第93条规定：“下列准买，当事人无须普证证明：（一）自悠规律以及定星、定律：（二）众所周短的事实（三）根据法律规定推定的事实：（四）根据已短的事实和日需生活经验法则推定出的另一事实”，因此A、B、C、D选项均正确。（2015）", chapter: "第四章 民事证据"},
  {id: 268, topic: "专题三 民事诉讼法", type: "single", question: "根据民事诉讼法及相关规定，下列哪些事实当事人无须举证证明？", options: {"A": "众所周知的事实", "C": "自然规律以及定理、定律", "D": "根据已知的事实和日常生活经验法则推定出的另一事实", "B": "根据法律规定推定的事实"}, answer: "A", explanation: "，A、B选项，概据《民诉法解举）第93条的规定，已为人民法院发生法律须力的概判所确认的事实，当事人无须举证证明，但是有相尺证据是以推翻的除外。美干化肥质量与惯害结果之间的因果关系，已有生效的法律文书确认，刘月无须对此事承担举证资任，甲公司可以用相反证据推翻生效判决认定的因果关系这一事实。甲公司应当提供证据证明化院质量问题与农作物生长异常不存在因果关系，因此A选项错误，B选项正确。C、D选项，证明责任只能由法律、司法解释预先规定，不存在法院依职权裁量以及当事人协议分配的可能，因此，C、D选项错误。（法考2016，思维扩展）", chapter: "第四章 民事证据"},
  {id: 269, topic: "专题三 民事诉讼法", type: "multiple", question: "刘月购买甲公司的化肥，便用后农作物生长异常。刘月向法院起诉，要求甲公司退款并赔偿损失，诉讼中甲公司否认刘月的损失是因其出售的化肥质量同题造成的，刘月向法院提供了本村吴某起诉甲公司损害赔偿案件的判决书，以证明甲公司出售的化肥有质量问题且与其所受损害有因果关系。关于本案刘月所受损害与使用甲公司化肥因果关系的证明责任分配，下列哪一选项是正确的？", options: {"A": "应由刘月负担有因果关系的证明资任", "B": "应由甲公司负担无因果关系的证明责任", "C": "应由法院依职权裁量分配证明责任", "D": "应由双方当事人协商分担证明责任"}, answer: "ABC", explanation: "。A、B、C选项，（民诉法）第67条第2款规定：“当事人及其诉讼代理人因客观原因不能自行收集的证据，或者人民法院认为审理案件需要的证据，人民法院应当调查收集”，《民诉法解释》第94条第1款规定：“民事诉讼法第67条第2款规定的当事人及其诉讼代理人因客观原因不能自行收集的证据包括：（一）证据由国家有关部门保存，当事人及其诉讼代理人无权查阅调取的；（二）涉及国家秘密、商业秘密或者个人隐私的；（三）当事人及其诉讼代理人因客观原因不能自行收集的其他证据”，因此A、B、C选项正确。D选项，《民诉法解释）第96条第1款规定：“民事诉讼法第67条第2款规定的人民法院认为审理案件需要的证据包括：（一）涉及可能损害国家利益、社会公共利益的”，因此D选项属于法院主动收集证据的情形，D选项错误。（2019）", chapter: "第四章 民事证据"},
  {id: 270, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列哪些情形当事人及其诉讼代理人可以申请人民法院调查取证？", options: {"A": "申请调查收集的证据属于国家有关机关保存并须人民法院依职权调取的档案材料", "B": "当事人及其诉讼代理人确因客观原因不能自行收集的其他材料", "C": "涉及国家秘密、商业秘密、个人隐私的材料", "D": "涉及可能损害国家利益、社会公共利益或者他人合法权益的事实"}, answer: "ACD", explanation: "。A、C、D选项，《证据规定）第56条规定：“人民法院依照民事诉讼法第133条第4项的规定，通过组织证据交换进行审理前准多据交换之日举证期限居满。证据交换的时所由当事人协商一致并经人民法院认可，他写人民法院指定….，因此A、C、D选项正。B选项错误。（2018）条的规定，证据应当在法庭上出示，由当事人质证。未经当事人质证的证据，不得作为认定76条的规定，对于确有出庭困难的证人，经人民院许可，可以通过书面证官、视听传输技术或者听资料等方式作证，因此D选项说法过于绝对选项错误。（新编）", chapter: "第四章 民事证据"},
  {id: 271, topic: "专题三 民事诉讼法", type: "multiple", question: "关于民事诉讼证据交换，下列说法哪些是正确的？", options: {"A": "人民法院在开庭前可以组织交换证据", "B": "证据交换可以在审判人员或书记员的主持下进行", "C": "交换证据的时间可由人民法院指定", "D": "人民法院组织当事人交换证据的、交换证据之日举证期限届满"}, answer: "ACD", explanation: "。民诉法）第84条第1数规定：“在据可能灭失或者以后难以取得的情况下，当事可以在诉讼过程中向人民法院申请保全证据，民法院也可以主动采取保全措施”因此A选项确，B选项错误。C选项，《民诉法解释》第98条？数规定：“当事人根据民事诉讼法第84条第1期定申请证据保全的，可以在举证期限届满前书提出”，因此C选项正确。D选项，（民诉法解释）98条第2款规定：“证据保全可能对他人造成报的，人民法院应当责令申请人提供相应的担保因此D选项正确。（2017）", chapter: "第四章 民事证据"},
  {id: 272, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定、下列哪种说法是错误的？", options: {"A": "证据应当在法庭上出示，由当事人质证", "B": "未经质证的证据，不能作为认定案件事实的根据", "C": "涉及商业秘密的证据，不得在开庭时公开质证", "D": "未出庭作证的证人证言不能作为认定案件事实的依据"}, answer: "ACD", explanation: "。A选项，（民诉法）第9条的？定：“人民法院审理民事案件，应当根据自正确。B选项，（民诉法）第97条第1数定：“人民法院进行调解，可以由审判员一主持，也可以由合议庭主持，因此！项错误。C选项，（民诉法）第99条规调解协议的内容不得违反法律规定因此C选项正确。D选项，《民诉法）第些", chapter: "第四章 民事证据"},
  {id: 273, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于证据保全的哪些说法是正确的？多选）", options: {"A": "在证据可能灭失的情况下，当事人可以在诉讼过程中申请保全证据", "B": "证据保全只能依当事人申请进行，人民法院不得主动采取保全措施", "C": "当事人申请证据保全的，可以在举证期限届满前书面提出", "D": "证据保全可能对他人造成损失的，人民法院应当责令申请人提供相应的担保"}, answer: "ACD", explanation: "。A选项，（民诉法解释）第147条第1款规定：“人民法院调解案件时，当事人不他出庭的，经其待别收权，可由其委托代理人参加调解….”，因北A透项正确。B选项，（民诉法解释》第142条规定：“人民法院失理案伴后，经审查，认为法律关系明确、事实清楚，在征得当事人及方同意后，可以径行调解”，径行调解应先征得双方当事人同意，因此B选项错误。C选项，（民诉法）第98条规定：“人民法院进行调解，可以邀请有关单位和个人协助”因此C选项正确。D选项，（民诉法）第100条第3款规定：“调解书经及方当事人签收后，即具有法律效力”，因此D选项正确。（2009）", chapter: "第四章 民事证据"},
  {id: 274, topic: "专题三 民事诉讼法", type: "single", question: "关于民事诉讼中的调解，下列哪些说法是正确", options: {"A": "调解应当根据自愿和合法的原则进行", "B": "人民法院进行调解的，应当由合议庭主持", "C": "调解协议的内容不得违反法律的规定", "D": "调解书送达前一方反悔的，人民法院应当及时判决"}, answer: "A", explanation: "。A、B选项，（民诉法）第101条第1款规定：“下列案件调解达成协议，人民法院可以不制作调解书：……（二）调解维持收养关系的案件：（三）能够即时履行的案件………….”，因此A选项正确，B选项错误。C选项，《民诉法》第213条规定：“当事人对已经发生法律效力的解除婚姻关系的判决、调解书，不得申请再审”，因此C选项错误。D选项，《民诉法》第102条规定：“调解未达成协议或者调解书送达前一方反悔的，人民法院应当及时判决”，因此D选项错误。（2017）", chapter: "第五章 调解"},
  {id: 275, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列有关调解的说法是正确的？", options: {"A": "人民法院调解案作时，当事人本人不能出庭的，经特别侵权，可由其委托代理人参加调解", "B": "人民法院受理案件后，经审查，认为法律关系明确、事实清楚，可以检行调解", "C": "人民法院进行调解，可以邀请有关单位和个人协助", "D": "调解书经双方当事人签收后，即具有法律效力"}, answer: "CD", explanation: "。A选项，（民诉法》第96条规定：“人民法院审理民事案件，根据当事人自愿的原则，在事实清楚的基础上，分清是非，进行调解”，因此调解以当事人同意为前提，并不是一律先行调解，A选项错误。B选项，《民诉法》第145条规定：“法庭辩论终结，应当依法作出判决。判决前能够调解的，还可以进行调解，调解不成的，应当及时判决”，因此B选项错误。C选项，《民诉法》第179条规定：“第二审人民法院审理上诉案件，可以进行调解”，因此C选项正确。D选项，（民诉法）第100条第3款规定：“请多列经发方当事人签收后，即具有法律场力此D选项正确（新编）由", chapter: "第五章 调解"},
  {id: 276, topic: "专题三 民事诉讼法", type: "single", question: "根据民事诉讼法及相关规定，下列关于民事诉讼调解的哪种说法是正确的？", options: {"A": "能够即时履行的案件调解达成协议，人民法院可以不制作调解书", "B": "调解维持收养关系的案件调解达成协议，人民法院应当制作调解书", "C": "当事人对已经发生法律效力的解除婚姻关系的调解书，可以申请再审", "D": "调解书送达前一方反悔的，人民法院可以留置送达该调解书"}, answer: "D", explanation: "。《最高人民法院关于人民法院）事调解工作若干问期的规定）第13务组给“当事人以民事调解书与调解协议的限免：一致为由提出异议，人民法院审查后认为议成立的，应当根据调解协议载定补正民调解书的相关内容”，因此A、B、C选项误，D选项正确。（法考2018）", chapter: "第五章 调解"},
  {id: 277, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列有关调解的哪些说法是正确的？多选）", options: {"A": "当事人起诉到人民法院的民事纠纷，一律应当先行调解", "B": "第一审普通程序中法庭辩论终结后，人民法院一律不再进行调解", "C": "第二审人民法院审理上诉案件，可以进行调解", "D": "调解达成协议的，人民法院制作的调解书经双方当事人签收后，即具有法律效力"}, answer: "ABC", explanation: "。A选项，《民诉法》第104条第1数定：利害关系人因情况紧急，不立即申请保全会使其合法权益受到难以弥补的损害的，可以提起诉讼或者中请仲裁前向被保全财产所在业被申请人住所地或者对案件有管辖权的人民法申请采取保全措施…”，因此A选项正确。B项，《民诉法）第103条第1款规定：“人民法院对可能因当事人一方的行为或者其他原因，使判难以执行或者造成当事人其他损害的案件，想对方当事人的申请，可以裁定对其财产进行保贵令其作出一定行为或者禁止其作出一定行当事人没有提出申请的，人民法院在必要时也以载定采取保全措施”，因此B选项正确。C选《民诉法》第108条规定：“申请有错误的，申请人当赔偿被申请人因保全所遗受的损失”，因此（项正确。D选项，民诉法）第104条第3款规“申请人在人民法院采取保全措施后30日内不法提起诉讼或者申请仲裁的，人民法院应当保全”，因此D选项错误。（2017改编）", chapter: "第五章 调解"},
  {id: 278, topic: "专题三 民事诉讼法", type: "multiple", question: "周某（男）与张某（女）婚后因感情纠纷诉至法院，请求离婚。诉讼中双方达成调解协议：约定两个孩子由女方抚养，两套房屋均归女方所有，男方每月支付抚养费1万元，法院依据调解协议制作调解书送达给双方当事人。张某发现法院调解书上关于房屋部分的内容错误，将调解协议中约定都归她所有的两套2026年专利代理师费特专试房屋写成了周某和张某一人一套，遂提出异议。关于本案说法正确的有？", options: {"A": "调解书已经生效，不能提出异议，可以违反自愿原则电址染中", "B": "调解书不生效，法院收回调解书，重新制作后再送双方", "C": "法院审查后认为异议成立的，及时作出判决", "D": "法院审查后认为异议成立的、作出裁定予以补正"}, answer: "BC", explanation: "。A、B选项，人民法院不能主动采前保全措施，可以依申请采取诉前保全，因此！项错误，B选项正确。C选项，《民诉法）第10412数规定：“人民法院接受申请后，必须在48小作出载定·，因此C选项正确。D选项，诉！", chapter: "第五章 调解"},
  {id: 279, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于保全的哪些说法是正确的？", options: {"A": "利害关系人因情况紧急，不立即申请保全将会使其合法权益受到难以弥补的损害的，可以在提起诉讼前向被保全财产所在地或被申请人住所地人民法院申请采取保全措施", "B": "人民法院在民事诉讼中对于可能因一方当事人的原因使判决难以执行的案件，可以根据对方当事人的申请，作出财产保全的裁定", "C": "申请保全有错误的，申请人应当赔偿被申请人因保全所遭受的损失", "D": "申请人在人民法院采取诉前财产保全措施后10日内不起诉的，人民法院应当解除财产保全"}, answer: "CD", explanation: "，A通项，（居诉法）第106条规定第1款：“财产保全采联查片、扣押、冻结成着法体规定的其他方法”，因此A选项正响。B、C适项，（民诉法解称》第154条第1教现定：“人民法院在财产保全中采取查封、扣押、冻结财产增滤叶，应当妥善保管被查封、加押、冻结的财产。不宜由人民法院保管的，人民法院可以指定做保全人负责保管：不宜自被保全人保管的，可以委托他人或者申请保全人保管。查封、扣押、冻结担保物权人占有的担保财产，一版由担保物权人保管：由人民法院保管的，质权、留置权不因采取保全措施而消灭”，因此B选项正确，C选项错误。D选项，（民诉法解释》第155条规定：“由人民法院指定被保全人保管的财产，如果键续使用对该财产的价值无重大影响，可以允许被保全人继续使用…”，因此D选项错误。（2018）", chapter: "第六章 保全"},
  {id: 280, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于诉前财产保全的说法，正确的是？", options: {"A": "人民法院可以依职权主动采取诉前财产保全措施", "B": "利害关系人因情况紧急，不立即申请财产保全将会使其合法权益受到难以弥补的损害的，可以申请诉前财产保全", "C": "人民法院接受申请后，必须在48小时内作出裁定", "D": "申请人可以不提供担保"}, answer: "BD", explanation: "。A选项，王小某并未实施妨码诉讼或者执行的行为，不能对其采取强制措施，因此A选项错误。B、C、D选项，王某急蓄支付住院费，属于情况紧急的情形，王某可以申请法院先予执行，王小某将钱转到朋友账户上，可能导致将来判决难以执行，王某有权向法院申请财产保全，而不是证据保全，因此B、D选项正确，C选项错误。（法考2009，思维扩展）审普通程序事", chapter: "第六章 保全"},
  {id: 281, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于财产保全相关事项说法错误的是：", options: {"A": "财产保全采取查封、扣押、冻结或者法律规定的其德方法", "B": "法院可以指定被保全人负责保管被查封、扣押、冻结的财产", "C": "被查封、扣押、冻结的财产，其上的质权、留置权因采取保全措施而消灭", "D": "由人民法院指定被保全人保管的财产，被保全人不得继续使用"}, answer: "ACD", explanation: "。《民诉法）第122条规定：“起诉必须符合下列条件：（一）原告是与本案有直接利害关系的公民、法人和其他组织；（二）织有明确的被告；（三）有具体的诉讼请求和事织实、理由：（四）属于人民法院受理民事诉讼院的范国和受诉人民法院管辖”，因此A、C、D选项正确。对于被告的要求只要求明确，不要求适格，因此B选项错误（新编）", chapter: "第六章 保全"},
  {id: 282, topic: "专题三 民事诉讼法", type: "multiple", question: "王某早年丧妻，独自一人抚养儿子王小某。王小某成年后，从未支付赠养费。王某起诉王小某支付赠养费，诉讼过程中，王某生病，急需支付住院费。王小某把自已存款3万元转到一个朋友的账户上。对此，王某可以向法院申请采取的措施是？", options: {"A": "对妨害民事诉讼的强制措施", "B": "诉讼保全措施", "C": "证据保全措施", "D": "先予执行措施"}, answer: "AC", explanation: "。A、C选项，王某死亡、乙公司注销后，执告主体不存在，不属于“有明售”。B选项符合起诉条件，应子以多（新编）", chapter: "第六章 保全"},
  {id: 283, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，就发明专利侵权提起诉讼的，起诉必须符合下列哪些条件？", options: {"A": "原告是与本案有直接利害关系的公民、法人和其他", "B": "被告是与本案有直接利害关系的公民、法人和其他", "C": "属于人民法院受理民事诉讼的范围和受诉人民管辖", "D": "有具体的诉讼请求和事实、理由2026年年利代理师资纳考试"}, answer: "AD", explanation: "。A选项，根据《民诉法制208条第3款的规定，立案后发现不的诉条件的，裁定驳回起诉，因此A造项B选项，《民诉法解释》第211条规定：，院没有管辖权的案件，售知原告向有管！的人民法院起诉：原告坚持起诉的，做！予受理：立案后发现本院没有管辖权的当将案件移送有管辖权的人民法院”B选项错误。C选项，（民诉法解释）第条规定：“原告撤诉或者人民法院按据理后，原告以同一诉讼请求再次起诉的民法院应子受理”，因此C选项错误。项，《民诉法解释）第212条规定：“载定受理、驳回起诉的案件，原告再次起诉，起诉条件且不属于民事诉讼法第127定情形的，人民法院应子受理”，因此D正确。（2011）", chapter: "第七章 民事审判第一审程序"},
  {id: 284, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，对于下列哪些情形，法院应当裁定不于受理？", options: {"A": "李集起诉王某，人民法院发现王某已于起诉前死亡", "B": "李某起诉王某，要求王某支付精神损害赔偿金一亿元", "C": "甲公司起诉乙公司，人民法院发现乙公司已经注销", "D": "甲公司起诉乙公司，人民法院发现乙公司与本案没有直接利害关系"}, answer: "BC", explanation: "。《民诉法》中规定的起诉条共有4项：①原告适格：②有明确的被有具体的诉讼请求和事实、理由；④属院主管和受诉法院管辖。A选项，根诉法》第123条的规定，起诉并不要求书面起诉状，也可以口头起诉，由法院笔录，并告知对方当事人，因此A选项B选项，起诉条件中要求有明确的被被告需要具备诉讼权利能力，无诉讼权力的被告，如已经死亡的自然人或已经的公司，属于没有明确的被告，因此B正确。C选项，起诉条件中要求原告：即原告是与本案有直接利害关系的公人和其他组织，C选项正确。D选项，声件中仅要求有具体的诉讼请求和事：由。未要求该事实、理由有证据证明要求该诉讼请求能够得到法律支持，选项错误。（法考2022，思维扩展）", chapter: "第七章 民事审判第一审程序"},
  {id: 285, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于起诉与受理的说法哪些是正确的？", options: {"A": "立案后发现起诉不符合受理条件的，人民法院应当裁定驳回起诉", "B": "对本院没有管辖权的案件，人民法院应当告知原告向有管辖权的人民法院起诉；原告坚持起诉的，应予受理并移送至有管辖权的人民法院", "C": "当事人撤诉后，又以同一诉讼请求再次起诉的，人民法院不予受理", "D": "裁定驳回起诉的案件，原告再次起诉的，如果符合起诉条件的，人民法院应予受理"}, answer: "ABCD", explanation: "，《民诉法）第130条规定：“人民法院受理案体后，当事人对管错权有异议的，应当在提交答障快明间提出，人民法院对当事人提出的靠议，应当市查。算议成立的，越定将案作修透有管辖权的人民法院：异以不成立的，我定驳回。当事人来提出管锯异以，并自诉答降或普提出尺诉的，视为支诉人民法院有管辖权，但造质级别管辖和专属管辖规定的除外”，因此A、B、C、D透项均正确。（2013）", chapter: "第七章 民事审判第一审程序"},
  {id: 286, topic: "专题三 民事诉讼法", type: "multiple", question: "我国实行立案登记制，关于民事第一审普通程序，下列表述正确的是？多选）", options: {"A": "原告必须提交书面起诉状", "B": "被告具有诉讼权利能力", "C": "原告应与案件有直接利害关系", "D": "原告应提供支持自己诉讼请求的证据"}, answer: "BCD", explanation: "。A透项，（民诉法）第137条第1款现定：人民法院审理民事案件，除沙及回家的密、个人隐私或者法律另有规定的以外，应当公开逃行”，因此A选项错误。B选项，（民诉法》第151条第1款规定：“人民法院对公开审理或者不公开审理的案件，一律公开宣告判决”，因此B透项正确。C选项，《民诉法》第139条规定：“人民法院审理民事案件，应当在开庭3日前通知当事人和其他诉讼参与人”，因此C选项正确。D选项，《民诉法》第138条规定：“人民法院审理民事案件，根据要进行巡回审理，就地办案”，因此D选项正确。（2017）", chapter: "第七章 民事审判第一审程序"},
  {id: 287, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，有关管辖权异议的下列哪些说法是正确的？", options: {"A": "人民法院受理案件后，当事人对管辖权有异议的，应当在提交答辩状期间提出", "B": "当事人未提出管辖权异议，并应诉答辩或者提出反诉的，视为受诉人民法院有管辖权，但违反级别管辖和专属管辖规定的除外", "C": "经审查管镇仅异议成立的，人民法院越定将案件移送有管销权的法院", "D": "经申真管辖权异议不成立的，人民法院战定驳回"}, answer: "BD", explanation: "。A选项，涉及商业秘密的案件不公开需依申请，因此A选项错误。B选项，《民诉法》第142条第2款规定：“当事人经法庭许可，可以向证人、鉴定人、勘验人发问”，因此B选项正确。C选项，《民诉法）第146条规定：“原告经传票传唤，无正当理由拒不到庭的，或者未经法庭许可中途退庭的，可以按撒诉处理；被告反诉的，可以缺席判决”，因此C选项错误。D选项，《民诉法）第148条规定：“宣判前，原告申请撒诉的，是否准许，由人民法院裁定。人民法院裁定不准许撤诉的，原告经传票传映，无正当理由拒不到庭的，可以缺席判决”，因此D选项正确。（2018）", chapter: "第七章 民事审判第一审程序"},
  {id: 288, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列美于民事诉讼第一审普通程序的哪些说法是正确的？", options: {"A": "人民法院审理民事案件，一律应当公开进行", "B": "人民法院审理民事案件，一律公开宣告判决", "C": "人民法院审理民事案件，应当在开庭三日前通知当事人和其他诉讼参与人", "D": "人民法院审理民事案件，根据需要进行巡回审理、就地办案"}, answer: "BD", explanation: "。A选项，根据《民诉法）第146条的规定，原告经传票传唤，无正当理由拒不到庭的，可以按撤诉处理，因此A选项错误。B选项，（民诉法）第147条规定：票传映：无正当理由把不到败的，或法庭许可中途逍庭的，可以缺席判决。正确。（2011）定期宣判的，宣判后立即发给判决书”，项正确。因此，D选项正确。（法考2012）", chapter: "第七章 民事审判第一审程序"},
  {id: 289, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于第一审普通程序的说法正确的是？多选）", options: {"A": "涉及商业秘密的案件，应当不公开审理", "B": "当事人经法庭许可，可以向证人、鉴定人、勘验人发问", "C": "原告未经法庭许可中途退庭的，应当缺席判决", "D": "宣判前，原告申请撤诉，人民法院裁定不准许撤诉的，原告经传票传唤，无正当理由拒不到庭的，可以缺席判决"}, answer: "ABC", explanation: "。《民诉法）第149规定：“1列情形之一的，可以延期开庭审理：（-须到庭的当事人和其他诉讼参与人有王理由没有到庭的；（二）当事人临时提出E申请的；（三）需要通知新的证人到庭，调新的证据，重新鉴定、勘验，或者要补充查的；（四）其他应当延期的情形”，因此B、C 选项正确。D选项属于中止诉诊的形。（2012）", chapter: "第七章 民事审判第一审程序"},
  {id: 290, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，关于第一审普通程序，下列说法哪些是正确的？", options: {"A": "原告经传票传唤，无正当理由拒不到庭的，应当缺席判决", "B": "被告未经法庭许可中途退庭的，可以缺席判决", "C": "宣判前，原告申请撤诉的，人民法院应当准许", "D": "宣判前，原告申请撤诉的，是否准许，由人民法院裁定"}, answer: "ABCD", explanation: "。《民诉法解释）第243定：“民事诉讼法第152规定的审限，是有立案之日起至裁判宜告、调解书送达之日的期间，但公告期问、鉴定期间、双方当事和解期间、审理当事人提出的管辖异议以处理人民法院之间的管辖争议期间不应计在内”，因此A、B、C、D选项均正确。（2009）", chapter: "第七章 民事审判第一审程序"},
  {id: 291, topic: "专题三 民事诉讼法", type: "multiple", question: "关于民事案件的开庭审理，下列说法正确的是？", options: {"A": "开庭时由书记员核对当事人身份", "B": "法院收集的证据是否需要进行质证，由法院决定", "C": "合议庭评议实行少数服从多数，形成不了多数意见时以审判长意见为准", "D": "法院定期宣判的，法院应当在宣判后将判决书发给当事人"}, answer: "ABD", explanation: "、D透项，根据《民诉法）第153条的规定，一方当事人先亡，哥要等得继东人表明是否参加诉论的，诉讼中止：本紧必须以另一案的审理结果为依据，而另一紧尚未审结的，诉讼中止。因此，A、D选项正确。B选项，对于肾要通知新的适人到庭，调取新的证据，重新鉴定、助验，或者育要补充调查的，法院可以延期审理，因此B选项正确。C透项，属于当事人的笑更，不属于诉讼终结的情形，应当以合并后的公司作为当事人继续参加诉讼，C选项错误。（法考2008改编，思维扩展）", chapter: "第七章 民事审判第一审程序"},
  {id: 292, topic: "专题三 民事诉讼法", type: "single", question: "根据民事诉讼法及相关规定，下列哪些情形下可以延期开庭审理？", options: {"A": "必须到庭的当事人有正当理由没有到庭的", "B": "当事人临时提出回避申请的", "C": "需要通知新的证人到庭的", "D": "本案必须以另一案的审理结果为依据，而另一案又尚未审结的"}, answer: "B", explanation: "。A选项，根据（民诉法）第149条的规定，当事人临时提出回避申请的，可以延期开庭审理，刘某临时中请回避属于延期审理情形，而不是中止诉讼，因此A选项错误。B选项，（民诉法解释）第248条规定：“城判发生法律效力后，发生新的事实，当事人再次提起诉讼的，人民法院应当依法受理”，法院驳回乙的诉讼请求之后甲的房屋漏水，发生了新的事实，不属于一事不再理的情形，法院依法受理的做法正确，因此B选项正确。C、D选项，根据《民诉法》第154条的规定，高婚案件一方当事人死亡的，终结诉讼：追索赠养费、扶养费、抚养费以及解除收养关系案件的一方当事人死亡的，终结诉讼，C、D选项的时间均发生于诉讼过程中，属于终结诉讼的情形，而不是驳回起诉或驳回诉讼请求，因此C、D选项错误。（法考2019，思维扩展）", chapter: "第七章 民事审判第一审程序"},
  {id: 293, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，人民法院适用普通程序审理民事诉讼案件的期限为六个月，但该期限不包括下列哪些期间？", options: {"A": "公告期间", "B": "鉴定期间", "C": "审理当事人提出的管辖权异议期间", "D": "处理人民法院之间的管辖权争议期间"}, answer: "ABC", explanation: "。《民诉法）第153条规定：“有下列情形之一的，中止诉讼：……（二）一方当事人丧失诉讼行为能力，尚未确定法定代理人的…（四）一方当事人因不可抗拒的事由，不能参加诉讼的：（五）本案必须以另一案的审理结果为依据，而另一案尚未审结的….”，因此A、B、C选项正确，D选项属于诉讼终结的情形。（2016）", chapter: "第七章 民事审判第一审程序"},
  {id: 294, topic: "专题三 民事诉讼法", type: "multiple", question: "法院对于诉讼中有关情况的处理，下列哪做法是正确的？多选）", options: {"A": "杨某与赵某损害赔偿一案，杨某在去往法院开庭的路上，突遇车祸，当场死亡。法院认为需要等待继承人表明是否参加诉讼，遂裁定中止诉讼", "B": "毛某与安某专利侵权纠纷一案，法庭审理过程中，发现需要重新进行鉴定，法院决定延期审理", "C": "甲公司诉乙公司合同纠纷一案，审理过程中，甲公司与其他公司合并，法院裁定诉讼终结", "D": "丙公司诉丁公司租赁纠纷一案，法院审理中，发现本案必须以另一案的审理结果为依据而该案又尚未审结，遂裁定诉讼中止"}, answer: "ACD", explanation: "。《民诉法》第154条规定：“有下列情形之一的，终结诉讼：（一）原告死亡，没有继承人，或者继承人敖葬···（三）高婚案一方当*）（四）追索养费、扶养费、托养费形。（2012）", chapter: "第七章 民事审判第一审程序"},
  {id: 295, topic: "专题三 民事诉讼法", type: "single", question: "下列法院对于诉讼中出现的各种情况的处理，做法正确的是？", options: {"A": "刘某与韩某买卖合同纠纷案，法庭审理过程中，刘某新发国建事项，临时申请回避，法院战定对本案诉讼中止", "D": "老李向小明追索赠养费，在诉讼过程中小明心脏病突发", "C": "陈某（男）和昌某（女）婚后性格不合，陈某诉至法院要求离婚。诉讼过程中，昌某不幸车祸身亡，法院裁定驳回陈某的起诉死亡，法院判决驳回老李的诉讼请求"}, answer: "C", explanation: "。《民诉法》第153条规定，讼的，诉讼中止。本题中法庭料论结欢。等待继承人表明是否维线诉讼，西此时》承人黄小某下落不明，尚无法确定，故本当诉讼中止，C选项正确。（法考2018）", chapter: "第七章 民事审判第一审程序"},
  {id: 296, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列哪些情形下中止诉讼？", options: {"A": "一方当事人丧失诉讼行为能力，尚未确定法定代理人的", "B": "本案必须以另一案的审理结果为依据，而另一案尚未审结的", "C": "一方当事人因不可抗拒的事由，不能参加诉讼的", "D": "解除收养关系案件的一方当事人死亡的"}, answer: "AD", explanation: "。根据《民诉法》第157条的频对于不予受理、管辖权异议、驳回起诉的可以提出上诉，因此A、D选项正确。（2019）我诉讼。A选项，《民诉法》第160条规定：“基层辰出的法庭审理事实清楚、权利义务关大的简单的民事案件，适用本章规定。和它派出的法庭审理前数规定以外的民：双方也可以约定适用简易程序”，因此简去院依职权适用，也可以由当事人协议适现定。B选项，（民诉法解释）第261条第1简易程序审理案件，人民法院可以依照民条、第162条的规定采取销口信、电话、短邮件等简便方式传唤双方当事人、通知公文书”，因此B选项符合规定。C选项，261条第2数规定：“以简便方式送达的当事人确认或者没有其他证据证明当事人民法院不得缺席判决”，因此C选项诉法解释》第140条规定：“适用简易程用公告送达”，因此D选项违法。（法考201CD。A、B、C选项，《民诉法）第166条审理下列民事案件，不适用小额诉论的关系、财产确权案件；（二）涉外案件；（三）定或者对诉前评估、鉴定结果有异议", chapter: "第七章 民事审判第一审程序"},
  {id: 297, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列哪些情形下民事诉讼终结？多选）", options: {"A": "原告死亡，没有继承人的", "B": "一方当事人丧失诉讼行为能力，尚未确定法定代理人的", "C": "离婚案件一方当事人死亡的", "D": "追索赠养费案件的一方当事人死亡的"}, answer: "AC", explanation: "，模据《民诉法）第165条规定，基层人民法院和电最出的法庭审理事实清楚、权利义务美系明确、争以不大的筒单金钱给付民事案件，标的领为各省、自治区、直辖市上年度就业人员年平均工资百分之五十以下的，适用小额诉讼的程序审理，实行一审终审，因此A透项正确，B透项错误。C、D选项，根据（民诉法解释）第275条的规定，小额诉讼案件的举证期限由人民法院确定，也可以由当事人协离一致并经人民法院准许，但一般不超过7日。当事人到庭后表示不需要举证期限和答辩期问的，人民法院可立即开庭审理。因此C选项正确，D选项忽略了法院的审查准许，因此错误。（新编）", chapter: "第七章 民事审判第一审程序"},
  {id: 298, topic: "专题三 民事诉讼法", type: "multiple", question: "黄某向法院起诉陈某，以被欺诈为由请求撤销二人订立的买卖合同，法庭辩论结束第二天，黄某遇车祸死亡，黄某的唯一继承人黄小某一直下落不明，关于本案的处理正确的是？", options: {"A": "裁定诉讼终结", "B": "裁定视为撤诉", "C": "裁定诉讼中止", "D": "根据法庭辩论作出判决"}, answer: "ABCD", explanation: "。（人民法院在线诉讼规则）第21条第1款规定：“人民法院开庭审理的案件，应当根据当事人意愿、案件情况、社会影响、技术条件等因素，决定是否采取视频方式在线庭审，但具有下列情形之一的，不得适用在线庭审：·（三）醫要通过庭审现场查明身份、核对原件、查验实物的：（四）案件疑难复杂、证据繁多，适用在线庭审不利于查明事实和适用法律的：（五）案件涉及国家安全、国家秘密的；（六）案件具有重大社会影响，受到广泛关注的…….…”，因此A、B、C、D选项均正确。（新编）", chapter: "第七章 民事审判第一审程序"},
  {id: 299, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，当事人对人民法院在民事诉讼第一审程序中作出的下列哪些裁定不服的，可以提起上诉？", options: {"A": "不予受理的裁定", "B": "不准许撤诉的裁定", "C": "中止诉讼的裁定", "D": "驳回起诉的裁定"}, answer: "CD", explanation: "。《民诉法）第165条规定，基层人民法院和它派出的法庭审理上述民事案件，标的额超过各省、自治区、直辖市上年度就业人员年平均工资50%但在2倍以下的，当事人双方也可以约定适用小额诉讼的程序。张某起诉李某归还借款6万元，标的额超过了该省上年度就业人员年平均工资的50%，但在2倍以下，当事人可以协议适用小额诉讼的程序，故法院在张某、李某同意适用小额诉讼的程序审理的情况下，法院可以适用小额诉讼的程序审理。但审理过程中李某对张某提出了反诉，根据（民诉法》第166条规定，当事人提出反诉的案件不得适用小额诉讼的程序审理，因此本案不能继续适用小额诉讼的程序审理，应当适用筒易程序的其他规定审理或者裁定将案件转为普通程序。当然，当事人也可以对法院适用小额诉讼的程序提出异议。因此，C、D选项正B选项销误。（法考2022）", chapter: "第七章 民事审判第一审程序"},
  {id: 300, topic: "专题三 民事诉讼法", type: "multiple", question: "法院和楚、权利义务关系明确、争议不大的案件，但双方当事确、争议人约定适用简易程序进行审理，法院同意并以电子邮人民法件的方式向双方当事人通知了开庭时间（双方当事人件，当均未回复）。开庭时被告万雷无正当理由不到庭，法序可以院作出了缺席判决。送达判决书时法院通过各种方选项符定：“适式均未联系上万雷，遂采取了公告送达方式送达了判讼法第决书。对此，法院下列的哪些行为是违法的？传真、电", options: {"A": "同意双方当事人的约定，适用简易程序对案和送达件进行审理法解释", "B": "以电子邮件的方式向双方当事人通知开庭通知，未经收到时间D选项", "C": "作出缺席判决案件，不", "D": "采取公告方式送达判决书"}, answer: "ABD", explanation: "。A、B选项，（民诉法解料）单261信、传真、电子邮件等简便方式传唤双方证人和送达诉讼文书”，小赖诉诊程序作为程序、适用简易程序的一般规定，A、B选理选项，《民诉法》第165条规定：“基层人民法》的法庭审理事实消楚、权利义务关系明确、简单金线给付民事案件，标的额为各省、自为上年度就业人员年平均工资百分之五十以下，额诉讼的程序审理，实行一审终申”，本案属子给付案件，标的额为200元，法院可以适用小审理，实行一审终审，C选项错误，D选项正确、B、D选项正确。（法考2022）程序", chapter: "第八章 简易程序及在线诉讼"},
  {id: 301, topic: "专题三 民事诉讼法", type: "multiple", question: "根据《民事诉讼法》及相关规定，下列哪些案（一）人评估、件不适用小额诉讼程序？多选）", options: {"A": "人身关系案作", "B": "涉外民事案件", "C": "需要评店、鉴定的案件", "D": "发回重审的案件"}, answer: "BD", explanation: "。A选项，（民事诉讼法）第41条第规定：“中级人民法院对第一审适用简易程序或者不服裁定提起上诉的第二审民事案件，清楚、权利义务关系明确的，经双方当事人；可以由审判员一人独任审理”，因此A选项B选项，（民事诉讼法）第175条规定：“第二审法院应当对上诉请求的有关事实和适用法律审查”，因此B选项正确。C选项，（民事诉讼173条第1款规定：“上诉状应当通过原审人民提出……”，因此C选项错误。D选项，《民事法》第177条第1款第（四）项规定：“原判决遗事人或者违法缺席判决等严重违反法定程用戴定撤销原判决，发回原审人民法院重审”，因选项正确。（新编）", chapter: "第八章 简易程序及在线诉讼"},
  {id: 302, topic: "专题三 民事诉讼法", type: "multiple", question: "根据（民事诉讼法）及相关司法解释中关于小额诉会的规定，下列说法正确的有：", options: {"A": "人民法院审理小额诉讼案件，实行一审终审", "B": "标的额为各省、自治区，直辖市上年度就业人员年平均工资百分之三十以下的，适用小额诉讼的程序审理", "C": "小额诉讼程序可以免去举证期限和答解期间", "D": "小额诉讼案件的举证期限，当事人协商一致即可确定"}, answer: "ACD", explanation: "。A、B选项，《民诉法）第179条规“第二审人民法院审理上诉案件，可以造解…”，因此A选项正确，B选项错误。C走《民诉法》第182条规定：“第二审人民法院的判裁定，是终审的判决、裁定”，因此C选项正有选项，《民诉法》第176条第2数规定：第二室", chapter: "第八章 简易程序及在线诉讼"},
  {id: 303, topic: "专题三 民事诉讼法", type: "multiple", question: "根据人民法院在线诉讼规则及相关规定，下列案件哪些不得适用在线庭审？", options: {"A": "需要通过庭审现场查明身份、核对原件、查验实物的", "B": "案件疑难复杂、证据繁多，适用在线庭审不利于查明事实和适用法律的", "C": "案件涉及国家安全、国家秘密的", "D": "案件具有重大社会影响，受到广泛关注的"}, answer: "BD", explanation: "，A选项，（民诉法）等175条观定：“第三审人民法院应普对上诉请求的有关市实和遗用法体进行审查”，因此A连项错误。B选项，（民诉法）第178条规定：“第二审人民法院对不顾第一审人民法院定的上诉案体的处里，一律使用定”，国此B造项正确。C远项，（民诉法）第179条属定：“第二审人民海院审理上诉案件，可以进行调解”，因此C透项错误。D选项，（民诉法）第177条第2教规定：原审人民法院对发回重审的案件作出判决后，当事人提起上诉的，第二审人民法院不得再次发回重审”，因此D选项正确。（2015）", chapter: "第八章 简易程序及在线诉讼"},
  {id: 304, topic: "专题三 民事诉讼法", type: "single", question: "某省上年度就业人员年平均工资为8万元。张某诉李某归还借款6万元，该省某基层法院受理案件后，张某和李某均同意适用小额诉讼的程序审理。在审理过程中，李某对张某提出反诉，要求张某归还欠款8万元，法院应当如何处理？", options: {"A": "法院应当继续适用小额诉讼的程序审理", "B": "如果张某、李某同意适用小额诉讼的程序审理的，法院应当适用小额诉讼的程序审理", "C": "当事人可以对法院适用小额诉讼的程序审理2026年专利代理部费结考试提出异议", "D": "法院应当适用简易程序的其他规定审理或者裁定将案件转为普通程序"}, answer: "D", explanation: "。《民诉法）第179条规定：“第二审人民法院审理上诉案件，可以进行调解。调解达成协议，应当制作调解书调解书送达后，原审人民法院的判决即视为微销”，因此A、B、C选项错误，D选项正确。（2013）", chapter: "第八章 简易程序及在线诉讼"},
  {id: 305, topic: "专题三 民事诉讼法", type: "single", question: "甲起诉乙归还借款200元，某区法院受理后适用小额诉讼的程序审理。关于本案，下列说法正确的是？", options: {"A": "法院可以采用短信方式传唤当事人", "B": "法院可以采用短信送达裁判文书", "C": "本案不得适用小额诉讼的程序审理", "D": "本案法院所作判决一审终审"}, answer: "C", explanation: "。A选项，一审普通程序是（民诉法）规定最为完善的程序，在二审、再审程序中，没有作出特别规定的，都应当适用一审普通程序的规定，因此A选项正确。B选项，（民诉法）第176条第1款规定：“第二审人民法院对上诉案件应当开庭审理。经过回卷、调查和询问当事人，对没有提出新的事实、证据或者理由，人民法院认为不要开庭审理的，可以不开庭审理”，因此B选项正确。C选项，《民诉法）第179条规定：“·调解书送达后，原审人民法院的判决即视为撤销”，即二审调解书有撤销一审判决的效力，但不是在调解书中写明撤销原判，因此C选项错误。D选项，《民诉法）第41条第1款规定：“人民法院审理第二审民事案件，由审判员组成合议庭。合议庭的成员人数，必须是单数”，因此D选项正确。（法考2012）", chapter: "第八章 简易程序及在线诉讼"},
  {id: 306, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，关于第二审程序，下列说法哪些是正确的？多选）", options: {"A": "第二审人民法院审理上诉案件，应当由审判员组成合议庭", "B": "第二审人民法院应当对上诉请求的有关事实和适用法律进行审查", "C": "上诉状可以通过原审人民法院提出，也可以向第二审人民法院直接提出", "D": "原判决严重违反法定程序的，第二审人民法院应当裁定撤销原判决，发回原审人民法院重审"}, answer: "ACD", explanation: "。根据《民诉法》第177的规定，第二审人民法院对上诉案件，经过审理，认为原判决、裁定认定事实错误或者适用法律错误的，以判决、载定方式依法改列、微销或有变更，医气项正聘，B选项销误。（2006）", chapter: "第九章 第二审程序"},
  {id: 307, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于民事诉讼第二审程序的哪些说法是正确的？", options: {"A": "第二审人民法院审理上诉案件，可以进行调解", "B": "第二审人民法院审理上诉案件，不得进行调解", "C": "第二审人民法院的判决、裁定，是终审的判决、裁定", "D": "第二审人民法院审理上诉案件，可以到案件发生地通行"}, answer: "ABCD", explanation: "。（民诉法解释）能331务规货，中人民法院对下列上诉案件，依顾民事药业176条规定可以不开庭审理：（一）不厦管辖权异议和驳回起诉载定的：（二）路的上诉请求明显不能成立的：（三）摩月次、定事实消楚，但适用法律错误的（四）原）遗反法定程序，同要发同重申的”，回此A、B选项均正确。（新编）", chapter: "第九章 第二审程序"},
  {id: 308, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉偿法及相关规定，下列美手第二审程序的易些说法是正确的多选）", options: {"A": "第二审人民法院仅对一审判决的法律适用进行审查", "B": "第二审人民法院对不服第一审人民法院裁定的上诉案件的处理，一律使用裁定", "C": "第二审人民法院审理上诉案件，不得进行调解", "D": "原审人民法院对发回重审的案件作出判决后，当事人提起上诉的，第二审人民法院不得再次发回重审"}, answer: "BD", explanation: "。A选项，二审程序是二申法院根诉人的上诉，就一申法院尚未发生法律效力的决或裁定认定的事实和适用法律进行的审理，审只能基于当事人的上诉而启动，检察院扶诉能启动二审，而是启动再审，A选项错误。B选《民诉法》第175条规定：“第二审人民法院应上诉请求的有关事实和适用法律进行审查”，项正确。C选项，《民诉法》第179条规定：“调送达后，原审人民法院的判决即视为撤销”，用在调解书中写明撤销原判，C选项错误。D项，第二审人民法院对上诉案件应当开庭审月《民诉法解释》第331条规定：“经过阅卷、调查和问当事人，对没有提出新的事实、证据或者理人民法院认为不需要开庭审理的，可以不开良理”，D选项正确。因此，B、D选项正确。（法2014，思维扩展）", chapter: "第九章 第二审程序"},
  {id: 309, topic: "专题三 民事诉讼法", type: "single", question: "民事诉讼第二审人民法院对上诉案件进行调解后达成协议，并依法制作了调解书。根据民事诉讼法及相关规定，对于原审人民法院的判决，下列哪种说法是正确的？", options: {"A": "第二审人民法院应作出裁定，撤销原审人民法院的判决", "B": "第二审人民法院应在调解书中注明撤销原审人民法院的判决", "C": "原审人民法院应主动撤销原判决", "D": "调解书送达后，原审人民法院的判决即视为撤销"}, answer: "D", explanation: "。《民诉法》第173条规定：“上诉状应当：过原审人民法院提出，并按照对方当事人或者：表人的人数提出副本。当事人直接向第二审人！法院上诉的，第二审人民法院应当在5日内共上i状移交原审人民法院”，原审法院接到上诉状后；衢审查，应当向上级法院完成文书送达和案想送工作。上诉案件是否立案应当由二审法院制判断后作出决定，故一审法院没有决定是否主1的权利。本案中，一审法院即使发现上诉人上i期已过，仍应当将上诉状和案卷材料移送至上法院，由上级法院作出是否立案的决定，因此，1", chapter: "第九章 第二审程序"},
  {id: 310, topic: "专题三 民事诉讼法", type: "multiple", question: "关于民事诉讼二审程序的表述，下列哪一选项是错误的？", options: {"A": "二审案件的审理，遇有二审程序没有规定的情形，应当适用一审普通程序的相关规定", "B": "二审案件的审理，以开庭审理为原则", "C": "二审案件调解的结果变更了一审判决内容的，应当在调解书中写明“撤销原判”", "D": "二审案件的审理，应当由法官组成的合议庭进行审理-99.-2020年专利代理普热专认"}, answer: "ABC", explanation: "。（民诉法解释）第321条规定：“第二审人民法院应当国绕当事人的上诉请求进行审理。当事人没有提出请求的，不予审理，但一审判决遗反法律集止性规定，或者损害国家利益、社会公共利益、他人合法权益的除外。“因此，二审法院只能对上诉请求进行审理并作出判决，本题中二审法院超出上诉请求作出判决的做法错误。A、B选项正确。《民诉法解释》第324条规定：“对当事人在第一审程序中已经提出的诉讼请求，原审人民法院未作审理、判决的，第二审人民法院可以根据当事人自愿的原则进行调解；调解不成的，发回重审。”对于一审遗漏的赔礼道款的诉讼请求，二审法院可以组织当事人调解，调解不成的，撤销原判，发回重审。故C选项正确，D选项错误。（法考2020）督程序下", chapter: "第九章 第二审程序"},
  {id: 311, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法的规定，第二审人民法院对上诉案件经过审理，认为原判决认定事实错误或者适用法律错误的，应当如何处理？", options: {"A": "变更原判决", "B": "要求原审人民法院改判", "C": "裁定撤销原判决", "D": "依法改判"}, answer: "ABCD", explanation: "。《民诉法》第211条规定：“当事人的申请符合下列情形之一的，人民法院应当再审：（一）有新的证据，足以推翻原判决、裁定的：：（四）原判决、裁定认定事实的主要证据未经质证的：；（十一）原判决、裁定遗漏或者超出诉讼请求的；（十二）据以作出原判决、裁定的法律文书被撒销或者变更的；….”，因此A、B、C、D选项均正确。（2014改编）", chapter: "第九章 第二审程序"},
  {id: 312, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，对下列哪些上诉案件、第二审人民法院可以不开庭审理？", options: {"A": "原判决严重违反法定程序，需要发回重审的", "B": "当事人提出的上诉请求明显不能成立的", "C": "不服管辖权异议裁定的", "D": "原判决认定事实清楚，但适用法律错误的"}, answer: "BCD", explanation: "。有新证据不一定界的再审的情形，当选。（2018）院申请再中……当事人中请再审申的，不判决、裁定的执行”，因此A选项正确项错误。B选项，（民诉法）第212条规“当事人对已经发生法律效力的调解出证据证明调解违反自阅原则或者满议的内容违反法律的，可以申请再因此B选项正确。C选项，《民诉法）第条规定：“当事人对已经发生法律效力除婚姻关系的判决、调解书，不得中审”，因此C选项正确。（2016）", chapter: "第九章 第二审程序"},
  {id: 313, topic: "专题三 民事诉讼法", type: "multiple", question: "关于民事诉讼二审程序，下列哪些选项是正确的？", options: {"A": "二审既可因为当事人的上诉而发生，也可能因为检察院的抗诉而发生", "B": "二审既是事实审，也是法律审", "C": "二审调解书应当写明撤销原判", "D": "二审原则上应当开庭审理，特殊情况下可不开庭审理"}, answer: "ABC", explanation: "。A、B、D选项，（民诉法）第条规定：“当事人对已经发生法律效力！决、裁定，认为有错误的，可以向上一级人法院申请再审，当事人一方人数众多或事人双方为公民的案件，也可以向原审；法院申请再审。当事人中请再审的，不简判决、裁定的执行，原被告双方均为公可以向原审法院申请，也可以向上一级申请，因此A、B选项正确，D选项错误。项，《民诉法》第216条规定：“当事人申审，应当在判决、裁定发生法律效力后（月内提出”，因此C选项正确。（2019）", chapter: "第九章 第二审程序"},
  {id: 314, topic: "专题三 民事诉讼法", type: "multiple", question: "长江公司向甲市A区法院起诉乙公司，区法院判决驳回甲公司的诉讼请求，长江公司不服一审判决，通过甲市A区法院提交上诉状，A区法院发现长江公司的上诉已经超过上诉期，应当如何处理？", options: {"A": "不予接受上诉材料", "B": "提请上级法院裁定驳回上诉", "C": "裁定驳回上诉", "D": "将上诉状和上诉材料一并移交上级法院"}, answer: "BCD", explanation: "。A选项，如果调解违反自则或者调解协议的内容违反法律的，可以请再审，因此A选项错误。B选项，（民法》第213条规定：“当事人对已经发生法效力的解除婚姻关系的判决、调解书，不申请再审”，B选项正确。C选项，《民第217条规定：“按照审判监督程序决定审的案件，裁定中止原判决、裁定、调解执行……，因此C选项正确。D选项（诉法》第218条第2款规定：“人民法氏", chapter: "第九章 第二审程序"},
  {id: 315, topic: "专题三 民事诉讼法", type: "multiple", question: "垦审理、一审法院判决告王某支付原告刘某欠本息具计22万元，主某不限提出上诉，二审中，双方达和量兽议，的定：王某分三个月向刘某偿付20万元，刘美放身利息请求，案作经正某申请撤回上诉而终结，约定易限属满后，正是只支付了15万元。刘某应当如何教济", options: {"A": "向一审法院重新起诉", "B": "向一审法院申请执行判决", "C": "向一申法院申请执行和解协议", "D": "向二审法院提出上诉"}, answer: "BC", explanation: "《民诉法）第219条规定：“最高人民检察院难各级人民法院已经发生法馆效力的判决、裁定，上级人民检察院对下级人民法院已经发生法律效力的判决、规定，发现有本法第211条规定情形之一的，或者发观调解书惯客国家利益、社会公共利益的，应当提出抗诉。地方各级人民检察院对同级人民法院已经发生法律效力的判决、线定，发现有本法第211条规定情形之一的，或者发现调解书损害国家利益、社会公共利益的，可以向同级人民法院提出检察建议，并报上级人民检察院备案：也可以提请上级人民检察院向同级人民法院提出抗诉”。检察院的检察建议直接向同级人民法院提出，并报上级人民检察院备案，抗诉是提请上一级检察院向同级法院提出的，因此A、D选项错误，B、C选项正确。（2013）", chapter: "第九章 第二审程序"},
  {id: 316, topic: "专题三 民事诉讼法", type: "multiple", question: "2万元，对赔礼道款的诉讼请求未作判决。张某不服一审判决，提起上诉，请求法院改判李某向张某赔偿损失2万元。二审法院维持1.2万的判项，同时判决李某向张某赔礼道歉。关于本案表述正确的是？", options: {"A": "二审法院只能对上诉请求进行审理并作出判决", "B": "二审法院超出上诉请求作出判决的做法错误", "C": "二审法院应当对上诉请求作出判决，对一审遗漏的诉讼请求进行调解，调解不成撤销原判发回重审", "D": "因为一审法院遗漏诉讼请求，故二审法院应当直接撤销原判，发回重审"}, answer: "ACD", explanation: "。A、B选项，（民诉法）第218条第1款规定：“发生法律效力的判决、定是由第二审法院作出的，按照第二审程序审理，所作的判决、裁定，是发生法律效力的判决、裁定；上级人民法院按照审判监督程序提审的，按照第二审程序审理，所作的判决、裁定是发生法律效力的判决、裁定”，原审案件已经经过两审，省高级人民法院提审或者指定再审的，按照第二审程序审理，因此A选项正确，B选项错误。C选项，按照审判监督程序决定再审的案件，应当裁定中止原判决、裁定、调解书中止执行，C选项正确。D选项，（民诉法）第220条第1款规定：“有下列情形之一的，当事人可以向人民检察院申请检察建议或者抗诉：…（三）再审判决、裁定有明显错误的”，如果省高级人民法院作出的再审判决有明显错误的，王某可以向人民检察院申请检察建议或者抗诉，因此D选项正确。（2017）", chapter: "第九章 第二审程序"},
  {id: 317, topic: "专题三 民事诉讼法", type: "single", question: "根据民事诉讼法及相关规定，当事人的再审申请符列哪些情形的，人民法院应当再审？", options: {"A": "有新的证据，足以推翻原判决的", "B": "原判决认定事实的主要证据未经质证的", "C": "据以作出原判决的法律文书被撤销的", "D": "原判决超出诉讼请求的"}, answer: "D", explanation: "。根据《民诉法）第219条的规定，地方各级人民检察院对同级人民法院已经发生法律效力的判决、裁定，发现有本法第211条规定再审情形之一的，应人民检察院向同级人民法院提出轨中，乙市人民检察院拟肩动审的、应当提请上级人民检察院向属级人院提出抗诉，因此A、B、C选项售镇，b正确。（2011，思维扩展）", chapter: "第十章 审判监督程序"},
  {id: 318, topic: "专题三 民事诉讼法", type: "single", question: "甲公司诉乙公司侵害发明专利权纠纷一案，一审法院判决驳回甲公司的全部诉讼请求，甲公司不服提起上诉，二审法院改判乙公司停止被控侵权行为并赔偿甲公司经济损失及合理费用。根据民事诉讼法及相关规定，乙公司的申请符合以下哪些情形的，人民法院应当再审？", options: {"A": "有新的证据", "B": "二审判决认定事实的主要证据未经质证的", "C": "二审判决适用法律确有错误的", "D": "二审判决遗漏或者超出诉讼请求的"}, answer: "A", explanation: "1D。《民诉法）第210条规定人对已经发生法律效力的判决、载定，有错误的，可以向上一级人民法院审：当事人一方人数众多或者当事人双）公民的案件，也可以向原市人民法院中审”，本案中，江苏省高院是作出生效判头徐州中院的上一级法院，故当事人可以一级人民法院申请再审，A选项正确。（法》第222条规定：“人民检察院提出杭济案件，接受抗诉的人民法院应当自收到参书之日起三十日内作出再审的载定”，项错误。《民诉法）第217条规定：“按顾审监督程序决定再审的案件，裁定中业决、裁定、调解书的执行”，裁定再审的同并不撤销原判，在再审的审理阶段经过理，原判确有错误才可以裁定微销原判选项错误，D选项正确。因此，A、D选确。（法考2013，思维扩展）", chapter: "第十章 审判监督程序"},
  {id: 319, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于民事诉讼审判监督程序的哪些说法是正确的？", options: {"A": "当事人对已经发生法律效力的裁定，认为有错误的，可以向上一级人民法院申请再审", "B": "当事人对已经发生法律效力的调解书，提出证据证明调解违反自愿原则的，可以申请再审", "C": "当事人对已经发生法律效力的解除婚姻关系的判决，不电量热申能", "D": "当事人申请再审的，应当停止判决、裁定的执行"}, answer: "BD", explanation: "。A选项，《民诉法）第23S条款规定：“发生法律效力的民事判决、以及刑事判决、裁定中的财产部分，由审人民法院或者与第一审人民法院同！被执行的财产所在地人民法院执行”，A选项错误。B选项，（民诉法）第236定：“当事人、利害关系人认为执行行为：法律规定的，可以向负责执行的人民法！出书面异议………”，因此B选项正确。项，《民诉法》第241条第1款规定：“在：中，双方当事人自行和解达成协议的，员应当将协议内容记入笔录，由双方当", chapter: "第十章 审判监督程序"},
  {id: 320, topic: "专题三 民事诉讼法", type: "single", question: "郑某与王某因专利权属纠纷诉至北京知识产权法院。北京知识产权法院作出的一审判决发生法律效力后，郑某认为一审判决适用法律错误，欲申请再审。根据民事诉讼法及相关规定，下列说法正确的是？多选）", options: {"A": "郑某可以向北京知识产权法院申请再审", "B": "郑某可以向北京知识产权法院的上一级法院申请再审", "C": "郑某申请再审的，应当在一审判决发生法律效力后六个月内提出", "D": "郑某申请再审的，人民法院应当裁定停止原判决的执行"}, answer: "C", explanation: "。（民诉法）第241条第1教院定：“在执行中，从方当事人自行和解达成协议，执行员应当将协议内容记入笔录，由及方当事人签名或者盗章”，因此执行程序中可以和解，C选项正确。（2019）", chapter: "第十章 审判监督程序"},
  {id: 321, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于审判监督程序的哪种说法是正确的？", options: {"A": "当事人对已经发生法律效力的调解书，一律不得申请", "B": "当事人对已经发生法律效力的解除婚姻关系的判决，不电址县中信", "C": "按周审判监督程序决定再审的案件，裁定中止原判决的执行", "D": "人民法院审理再审案件，应当另行组成合议庭"}, answer: "ABCD", explanation: "。A选项，（民诉法）第235条第1款规定：“发生法律效力的民事判决、裁定，以及刑事判决、概定中的财产部分，由第一审人民法院或者与第一审人民法院同级的慎执行的财产所在地人民法院执行”，因此A选项正确。B选项，（民诉法）第237条规定：人民法院自收到申请执行书之日起超过6个月未执行的，申请执行人可以向上一级人民法院申请执行.”，因此B选项正确。C选项，（民诉法》第241条规定：“在执行中，双方当事人自行达成和解协议的，执行员应当将协议内容记入笔录，由双方当事人签名或者盖章”，因此C选项正确。D选项，《民诉法》第268条规定：“有下列情形之一的，人民法院裁定终结执行：……·（二）据以执行的法律文书被撤销的…”，因此D选项正确。（2017）", chapter: "第十章 审判监督程序"},
  {id: 322, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列哪些说法是正确的？", options: {"A": "上级人民检察院对下级人民法院已经发生法律效力的判决，发现适用法律确有错误的，可以向下级人民法院提出检察建议，并报上级人民检察院备案", "B": "上级人民检察院对下级人民法院已经发生法律效力的判决，发现适用法律确有错误的，应当提出抗诉", "C": "地方各级人民检察院对同级人民法院已经发生法律效力的判决，发现适用法律确有错误的，可以向同级人民法院提出检察建议，并报上级人民检察院备案", "D": "地方各级人民检察院对同级人民法院已经发生法律效力的判决，发现适用法律确有错误的，应当提出抗诉"}, answer: "ABCD", explanation: "。A、B选项，《民诉法）第256条第1款的规定：“人民法院查封、扣押财产时，被执行人是公民的，应当通知被执行人或者他的成年家属到场；被执行人是法人或者其他组织的，应当通知其法定代表人或者主要负责人到场”，因此A、B选项正确。C选项，《民诉法》第257条规定：“被查封的财产，执行员可以指定被执行人负责保管”，因此C选项正确。D选项。《民诉法）第256条第2款的规定：“对被查封、扣押的财产，执行员必须造具清单，由在场人签名或者盖章后，交核执行人一份。铁执行人是分正确。（2012）列情形之一的，人民法院应当教党案外人对执行标的提出确有理由的的…（四）你为一方当事人的法人其他组织终止。尚未确定权利义务系的.…\"，因此A、C、D选项正确，B选项执行终结的情形。（2018）", chapter: "第十章 审判监督程序"},
  {id: 323, topic: "专题三 民事诉讼法", type: "multiple", question: "张某起诉王某违约并要求继续履行合同、支付迟延履行违约金，经县市两级人民法院审理均胜诉。王某以生效的二审判决适用法律错误为由申请再审。根据民事诉讼法及相关规定，下列哪些说法是正确的？A：省高级人民法院按照审判监督程序提审的，按照第二审程序审理", options: {"B": "省高级人民法院交原审人民法院再审的，原审人民法院应当按照第一审程序审理", "C": "省高级人民法院决定再审的，裁定中止原判决的执行", "D": "省高级人民法院驳回再审申请的，王某可以向人民检察院申请抗诉", "A": "省高级人民法院接到再审申请书后，应当自收到再审申请书之日起三个月内审查"}, answer: "BCD", explanation: "。《民诉法）第268条规定：下列情形之一的，人民法院载定终结（一）申请人撤销申请的；（二）据以执行律文书被撒销的·（四）追索赠养费养费、抚养费案件的权利人死亡的；（五为被执行人的公民因生活困难无力偿通，无收入来源，又丧失劳动能力的.因此A、B、C、D选项均正确。（2010）", chapter: "第十章 审判监督程序"},
  {id: 324, topic: "专题三 民事诉讼法", type: "single", question: "某债务纠纷案件已由甲县人民法院一审、乙市中级人民法院二审终结，二审判决已发生法律效力。现乙市人民检察院发现该判决确有错误，拟启动审判监督程序。根据民事诉讼法及相关规定，下列说法哪项是正确的？", options: {"A": "乙市人民检察院应当向甲县人民法院提出抗诉", "B": "乙市人民检察院应当向乙市中级人民法院提出抗诉", "C": "乙市人民检察院应当提请上级人民检察院向乙市中级人民法院提出抗诉", "D": "乙市人民检察院应当提请上级人民检察院向同级人民法院提出抗诉"}, answer: "D", explanation: "。《民诉法》第242条规定：“在中，被执行人向人民法院提供担保，并些请执行人同意的，人民法院可以决定暂行及暂缓执行的期限。被执行人逾期履行的，人民法院有权执行被执行人的：担保人的财产时无需另行起诉，执行人！产是否能清偿债权人的财产并不是执保人财产的前提，只要暂缓执行期问层；有履行，即可以恢复执行，因此D选项正（法考2009改编，思维扩展）公程序ABC。《民诉法）第276条规定：“因涉外民1中华人民共和国领域内没有住所的被关系以外的诉讼，如果合同签订地、台见标的物所在地、可供扣押财产所在地、慢！", chapter: "第十章 审判监督程序"},
  {id: 325, topic: "专题三 民事诉讼法", type: "multiple", question: "周某因合同纠纷起诉，江苏省徐州市的县市两级法院均驳回其诉讼请求。周某申请再审，但被驳回。周某又向检察院申请抗诉，检察院以原审主要证据系伪造为由提出抗诉，法院裁定再审。关于启动再审的表述，下列哪些说法是正确的？", options: {"A": "周某可以向江苏省高院申请再审", "B": "检察院抗诉后，应当由接受抗诉的法院审查后，作出是否再审的裁定", "C": "法院应当在裁定再审的同时，裁定撤销原判", "D": "法院应当在裁定再审的同时，裁定中止执行"}, answer: "BCD", explanation: "。A选项，根据《民事诉讼法）第274条境定：“外国人、无国籍人、外国企业和组织在人民法院起诉、应诉，育要委托律师代理诉讼的，必须委托中华人民共和回的律师”，除委托律师外，外国人还可以委托近来属参加诉讼，因此A选项错误。B选项，根据《民事诉讼法》第272条规定：“对享有外交待权与药免的外国人、外国组织或者国际组织提起的民事诉讼，应当依照中华人民共和国有关法律和中华人民共和国缘结或者参加的国际条约的规定办理”，因此B选项正确。C选项，根据（民事诉讼法）第277条规定：“涉外民事纠纷的当事人书面协议选择人民法院管辖的，可以由人民法院管辖”，因此C选项正确。D选项，根据《民事诉讼法）第279条规定：“下列民事案件，由人民法院专属管辖：（二）因与在中华人民共和国领域内审查授子的知识产权的有效性有关的纠纷提起的诉讼”，因此D选项正确。（新编，思维扩展）", chapter: "第十章 审判监督程序"},
  {id: 326, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于发生法律效力的民事判决执行的说法哪些是正确的？", options: {"A": "发生法律效力的民事判决，应当由被执行的财产所在地基层人民法院执行", "B": "当事人认为执行行为违反法律规定的，可以向负责执行的人民法院提出书面异议", "C": "在执行中，双方当事人自行达成的和解协议无效", "D": "在执行中，被执行人向人民法院提供担保，并经申请执行人同意的，人民法院可以决定暂缓执行及暂缓执行的期限"}, answer: "ABCD", explanation: "。A、B选项，根据《民事诉讼法）第279条规定：“下列民事案件，由人民法院专属管辖：（一）因在中华人民共和国领域内设立的法人或者其他组织的设立、解散、清算，以及该法人或者其他组织作出的决议的效力等纠纷提起的诉讼：（二）因与在中华人民共和国领域内审查投子的知识产权的有效性有关的纠纷提起的诉讼：（三）因在中华人民共和国领域内履行中外合资经营企业合同、中外合作经营企业合同、中外合作勘探开发自然资源合同发生纠纷提起的诉讼”，因此A、B选项正确。C选项，根据《民事诉讼法》第277条规定：“涉外民事纠纷的当事人书面协议选择人民法院管辖的，可以由人民法院管辖”，因此C选项正确。D选项，根据《民事诉讼法》第278条的规定：“当事人未提出管辖异议，并应诉答辩或者提出反诉的，视为人民法院有管辖权”，因此D选项正确。（新编，思维扩展）念、基本原则和范围正为复第13条的规定，复议机关对其他规范性文件进附带审查，无权对规章的合法性进行审查，因此选项错误。C选项，根据《复议法》第4条的规定行政复议机关办理行政复议事项的机构是行政期议机构，上级行政复议机构对下级行政复议机时的行政复议工作进行指导、监督，因此C选项正。D选项，《复议法》第5条第1数规定：“行政复议关办理行政复议案件，可以进行调解”，因此D选正确。（新编）", chapter: "第十一章 执行程序"},
  {id: 327, topic: "专题三 民事诉讼法", type: "multiple", question: "人民法院受理甲出版社、乙报社著作权纠纷案，判决乙偿甲十五万元，并登报婚儿道。判决生效后，乙交付十五万元，但来赠礼道款，甲申请握制执行。执行中，甲，乙自行达成和解议，尊定乙免于精礼道款，但另付甲五万元。根据民事诉讼法及相美规定，下月关于人民法院做法的说法，哪个是正确的？", options: {"A": "不免许，因协以内容超出判决范围，应当继续执行生效判决", "B": "允许，人民法院视为申请人敬销执行申请", "C": "允许，将当事人协议内容记人笔录，由甲、乙签字或盖章", "D": "允许，根据当事人协议内容制作调解书"}, answer: "BD", explanation: "。《复议法》第3条规定：“行政复议机关效、便民、为民的原则，坚持有错必纠，保障法律、法规的正确实施。”，因此B、D选项正确。（新编）有？", chapter: "第十一章 执行程序"},
  {id: 328, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于执行程序的哪些说法是正确的？", options: {"A": "发生法律效力的民事判决，由第一审人民法院或者与第一审人民法院同级的被执行的财产所在地人民法院执行", "B": "人民法院自收到申请执行书之日起超过6个月未执行的，申请执行人可以向上一级人民法院申请执行", "C": "双方当事人在执行中自行和解达成协议的，执行员应当将协议内容记人笔录，由双方当事人签名或者盖章", "D": "据以执行的法律文书被撤销的，人民法院裁定终结执行"}, answer: "AD", explanation: "。A选项，根据《复议法》第5 条的规定，调解适用于行政复议案件办理的全过程，即在更行理审查过程中和审理阶段，均可以进行调解，推行政争议的实质性化解，因此A选项正确。B项，原则上，所有的行政复议案件都可以进行解，不限于行政补偿、赔偿及自由裁量案件，因！选项错误。C选项，调解只是行政复议机关可以自", chapter: "第十一章 执行程序"},
  {id: 329, topic: "专题三 民事诉讼法", type: "single", question: "根据民事诉讼法及相关规定，下列关于执行过程中查封、扣押财产的哪些说法是正确的？", options: {"A": "人民法院查封、扣押财产时，被执行人是公民的，应当通知被执行人或者其成年家属到场", "B": "人民法院查封、扣押财产时，被执行人是法人或其他组织的，应当通知其法定代表人或者主要负责人到场", "C": "被查封的财产，执行员可以指定被执行人负责保管", "D": "对被查封、扣押的财产，执行员必须造具清单，由在场人签名或者盖章后，交被执行人一份，被执行人是公民的，也可以交他的成年家属一份"}, answer: "C", explanation: "。A选项，行政复议既审查合法性义审查合理性，A选项错误。B透项，（复议法）第10条规定：“公民、法人或者其他组织对行政复议决定不顺的，可以依照《中华人民共和国行政诉讼法》的规定向人民法院提起行政诉讼，但是法律规定行政复议决定为最终裁决的除外”，因此B选项错误。C选项，《复议法》第5条规定：行政复议机关办理行政复议案件，可以进行调解。”，因此C选项正确。D选项，根据《复议法》第24-25条的规定，省、自治区、直辖市人民政府同时管辖对本机关作出的行政行为不服的行政复议案件，国务院部门管辖对本部门作出的行政行为不服的行政复议案件，因此D选项错误。（新编）", chapter: "第十一章 执行程序"},
  {id: 330, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，以下哪些情形下，人民法院应当裁定中止执行：", options: {"A": "申请人表示可以延期执行的", "B": "据以执行的法律文书被撤销的", "C": "案外人对执行标的提出确有理由的异议的", "D": "作为一方当事人的法人终止，尚未确定权利义务承受人的"}, answer: "ABC", explanation: "。A、B、C选项，（复议法）第23条第1款规定：“有下列情形之一的，申请人应当先向行政复议机关申请行政复议，对行政复议决定不服的，可以再依法向人民法院提起行政诉讼：（一）对当场作出的行政处罚决定不服：（二）对行政机关作出的侵犯其已经依法取得的自然资源的所有权或者使用权的决定不服；（三）认为行政机关存在本法第11条规定的未履行法定职责情形”，因此A、B、C选项正确。D选项，只有已经依法取得的自然资源所有权或使用权受到行政行为侵害的，才属于复议前置情形，因此D选项不属于复议前置情形。（新编）", chapter: "第十一章 执行程序"},
  {id: 331, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，在执行过程中出现下列哪些情形的，人民法院裁定终结执行？", options: {"A": "作为被执行人的公民因生活困难无力偿还借款，无收人来源，又丧失劳动能力的", "B": "追索抚育费案件的权利人死亡的", "C": "申请人撤销执行申请的", "D": "据以执行的法律文书被撤销的"}, answer: "CD", explanation: "。《复议法）第23条第1款第（二）项所规定的侵犯土地资源所有权或使用权复议前置的情形，针对的是已经取得的土地所有权或使用权。本题中，新锐公司尚未取得土地所有权或使用权，不属于复议前置的情形，A、B选项属于对申请行政许可决定不服，当事人可以复议，也可以直接向人民法院提起行政诉讼。C、D选项属于行政机关侵犯已经取得的土地资源所有权、使用权，应当先复议，后起诉，D选项中集体土地使用权被侵犯的，村民以自已名义申请复议是可以的，但是件，考虑到本期考点不在于谁可以提出复认因此C、D选项正确。（2018）", chapter: "第十一章 执行程序"},
  {id: 332, topic: "专题三 民事诉讼法", type: "multiple", question: "在民事执行中，被执行人朱某申请暂缓执行，提出由吴某以自有房屋为其提供担保，申请执行人刘某同意。法院作出暂缓执行裁定，期限为6个月。对于暂缓执行期限届满后朱某仍不履行义务的情形，下列哪一选项是正确的？", options: {"A": "刘某应起诉吴某，取得执行依据可申请执行吴某的担保房产", "B": "朱某财产不能清偿全部债务时刘某方能起诉吴某，取得执行依据可申请执行吴某的担保房产", "C": "朱某财产不能清偿刘某债权时法院方能执行吴某的担保房产", "D": "刘某可申请法院执行吴某的担保房产"}, answer: "ABC", explanation: "。A、B、C选项，根据《复法）11的规定，对行政机关作出的行政强制插路、行制执行决定不服的：申请行政许可，行政机美多。或者在法定期限内不予答复的：对行政机美的征收征用决定及其补偿决定不服的，均量政复议的受案范国，因此A、B、C选项正确。U项，根据《复议法》第12条的规定，行政机关对员纠纷作出的调解不属于行政复议的受案范因，此D选项错误。（2011改编）", chapter: "第十一章 执行程序"},
  {id: 333, topic: "专题三 民事诉讼法", type: "multiple", question: "外国人黄某在中国没有住所，但在海口有一处房产，其加人外国国籍前住所在南宁。中国公民温某与纷，黄某在长沙签订货物买卖合同，约定交货地点为深圳。除身后黄某因货源紧张，未按照合同约定交货。如果温某向地、人民法院起诉，则下列哪些地方的人民法院有权管辖？（多造）", options: {"A": "长沙", "B": "保圳", "C": "海日", "D": "南中"}, answer: "ABCD", explanation: "。根据《复议法》第11条的规定，A项属于第（四）项对行政机关作出的确认自继资》的所有权或者使用权的决定不服；B选项属子（十四）项认为行政机关在政府信息公开工作中学犯其合法权益：C选项属于第（七）项对行政机关出的不予受理工伤认定申请的决定或者工伤认：结论不服；D选项属于第（六）项对行政机关作白赔偿决定或者不子赔偿决定不服；因此A、B、C.选项均属于行政复议受案范围。（新编）", chapter: "第十二章 涉外民事诉讼"},
  {id: 334, topic: "专题三 民事诉讼法", type: "multiple", question: "关于涉外民事诉讼程序，下列说法正确的有哪些？多选）", options: {"A": "外国人在人民法院起诉、应诉，必须委托中华人民共和国的律师", "B": "对享有外交特权与豁免的外国人提起的民事诉讼，应当依照中华人民共和国有关法律和中华人民共和国缔结或者参加的国际条约的规定办理", "C": "涉外民事纠纷的当事人书面协议选择人民法院管辖的，可以由人民法院管辖", "D": "因与在中华人民共和国领域内审查授子的知识产权的有效性有关的纠纷提起的诉讼，由人民法院专属管辖"}, answer: "BCD", explanation: "。A选项，属于《复议法》第11条中定的，认为行政机关不依法订立、不依法履行、未按照约定履行或者违法变更、解除政府特许经协议、土地房屋征收补偿协议等行政协议的情形属于行政复议受案范围，因此A选项正确。B.CJ选项，《复议法》第12条规定：“下列事项不属于政复议范围（二）行政法规、规章或者行政关制定、发布的具有普遍约束力的决定、命令等范性文件；（三）行政机关对行政机关工作人员奖惩、任免等决定；（四）行政机关对民事纠纷作的调解”；B选项属于行政机关对工作人员的惩易决定，C选项属于对民事纠纷作出的调解，D《专利审查指南》属于规章，B、C、D选项均不行政复议受案范围。（2017改编）", chapter: "第十二章 涉外民事诉讼"},
  {id: 335, topic: "专题三 民事诉讼法", type: "multiple", question: "关于涉外民事诉讼程序的管辖，下列说法正确的有哪些？多选）", options: {"A": "因在中华人民共和国领域内履行中外合资经营企业合同、中外合作经营企业合同、中外合作勘探开发自然资源合同发生纠纷提起的诉讼，由人民法院专属管辖", "B": "因在中华人民共和国领域内设立的法人或者其他组织的设立、解散、清算，以及该法人或者其他组织作出的决议的效力等纠纷提起的诉讼，由人民法院专属管辖", "C": "涉外民事纠纷的当事人书面协议选择人民法院管辖的，可以由人民法院管辖", "D": "当事人未提出管辖异议，并应诉答辩或者提出反诉的，视为人民法院有管辖权"}, answer: "BC", explanation: "。《复议法》第13条规定：“公民、法人者其他组织认为行政机关的行政行为所依据的下", chapter: "第十二章 涉外民事诉讼"},
  {id: 336, topic: "专题四 行政复议法", type: "single", question: "根据行政复议法及相关规定，下列说法哪些确的？", options: {"A": "行政复议是解决行政争议的主要渠道", "B": "行政复议机构应当审查申请行政复议的行政所依据的规章是否合法", "C": "上级行政复议机构对下级行政复议机构的行议工作进行指导、监督", "D": "行政复议机关办理行政复议案件可以进行调"}, answer: "D", explanation: "。A选项，（中华人民共和国专利法实施细则）属于行玖法规：B选项，（专利保护条例》属于地方性法规：C选项，（专利行政执法办法）属子国家知识产权局制定的部门规章：因此，A、B、C选项均不属于行政复议可以审查的范图。D选项，省知识产权局制定的（关于加强专利保护的规定）属干县级以上地方各级人民政府及其工作部门的规范性文件，可以一并向行政复议机关提出附带审查申请，因此D选项正确。（新编，思维扩展）", chapter: "第一章 行政复议的相关规定"},
  {id: 337, topic: "专题四 行政复议法", type: "multiple", question: "下列哪些是行政复议机关在履行行政复议职必须遵循的原则？", options: {"A": "合理、合法", "B": "公正、公开", "C": "公平、公正", "D": "高效、便民"}, answer: "ACD", explanation: "。A选项，（复议法）第11条规定：“有下列情形之一的，公民、法人或者其他组织可以依照本法申请行政复议：（三）申请行政许可，行政机关拒绝或者在法定期限内不予答复，或者对行政机关作出的有关行政许可的其他决定不股：（四）对行政机关作出的确认自然资源的所有权或者使用权的决定不服（十四）认为行政机关在政府信息公开工作中侵犯其合法权益……”因此A、C、D选项属于行政复议受案范国。B选项，补正材料通知书属于准备性行政行为，不具有终局性，不必然影响当事人的权利义务，不属于行政复议受案范围。因此，A、C、D选项正确。（新编，思维扩展）行政复议机关", chapter: "第一章 行政复议的相关规定"},
  {id: 338, topic: "专题四 行政复议法", type: "multiple", question: "关于行政复议案件的调解，以下说法正确的", options: {"A": "在行政复议受理过程和审查阶段，均可以调解", "B": "调解限于行政补偿、赔偿及自由裁量案件", "C": "行政复议案件的调解是行政复议的必经程序", "D": "行政复议案件的调解应当遵循合法、自愿的"}, answer: "ACD", explanation: "。（复议法）第14条规定：“有权申请行政复议的公民死亡的，其近亲属可以申请行政复议。有权中请行政请行法人或者其他组织终止的，其权利又多人可以申请行政复议。有权申请行班：其法的公民为无民事行为能力人或者限制！行为能力人的，其法定代理人可以代为，的，其行政复议”，因此法定代理人是以赞代！名义申请复议，B选项错误，A、C、D通权利确。（新编）", chapter: "第一章 行政复议的相关规定"},
  {id: 339, topic: "专题四 行政复议法", type: "multiple", question: "有关行政复议，下列哪项说法是正确的7", options: {"A": "行政复议只申查具体行政行为是否合法", "B": "复议机构依法复议后，不得再提起行政诉讼", "C": "复议机美审理复议案件，可以适用调解", "D": "公民、法人或其他组织认为行政机关的行政行为侵犯其合法权益，不可以向该行政机关申请复议"}, answer: "ABC", explanation: "。A、B选项，（复议条例）第1款规定：“合伙企业申请行政复认的说当以核准登记的企业为申请人，由执行事务的合伙人代表该企业参加行政复训为申他合伙组织申请行政复议的，由合伙人申请行政复议”，因此A、B选项正确。项，根据《复议条例》第7条的规定，股其合企业的股东会、董事会认为行政机关作具体行政行为侵犯企业合法权益的，可行政企业的名义申请行政复议，因此C选行政确，D选项错误。（2011）", chapter: "第一章 行政复议的相关规定"},
  {id: 340, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，下列哪些情形申请人应当先向行政复议机关申请行政复议，对行政复议决定不服的，可以再依法向人民法院提起行政诉讼？多选）", options: {"A": "对当场作出的行政处罚决定不服", "B": "对行政机关作出的侵犯其已经依法取得的自然资源的使用权的决定不服", "C": "认为行政机关未履行其法定职责", "D": "对行政机关作出的确认自然资源的使用权的决定不服"}, answer: "BC", explanation: "。（复议法）第15条规定：“同为侵政复议案件申请人人数众多的，可以由人推选代表人参加行政复议。代表人行政复议的行为对其所代表的申请人正确效力，但是代表人变更行政复议请求、行政复议申请、承认第三人请求的，应被代表的申请人同意”，因此A、D选人均误，B、C选项正确。（新编）", chapter: "第一章 行政复议的相关规定"},
  {id: 341, topic: "专题四 行政复议法", type: "multiple", question: "新锐公司兴建厂房需要一块土地。恰逢甲市政府出让一块土地，新锐公司和好客来公司同时提出申请，市政府拒绝了新锐公司的申请，向好客来公司颁发了国有土地使用权证。此后，丰年村认为政府向好客来公司发放的国有土地使用权证所认定的面积包括了该村的集体土地。下列说法正确的是？", options: {"A": "新锐公司对政府拒绝其申请的行为，应当先申请行政复议才能提起诉讼", "B": "新锐公司对政府向好客来公司颁发国有土地使用权的行为，应当先申请复议才能提起诉讼", "C": "丰年村对政府向好客来公司颁发国有土地使用权的行为，应当先申请复议才能提起诉讼", "D": "集体土地使用权被侵犯的丰年村村民也可以以自已的名义申请行政复议"}, answer: "ACD", explanation: "。A选项，（复议法）第17意定：“申请人、第三人可以委托一至二师、基层法律服务工作者或者其他代理代表为参加行政复议。申请人、第三人委托人的，应当向行政复议机构提交授权书、委托人及被委托人的身份证明文件有？权委托书应当载明委托事项、权限限”，因此A、C、D选项正确，B选误。在行政复议程序可委托的代理人参加", chapter: "第一章 行政复议的相关规定"},
  {id: 342, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，下列哪些情形可以申请行政复议？", options: {"A": "李某对某行政机关作出的行政强制措施执行决定不服", "B": "齐某向某行政机关申请行政许可，在法定期限内，行政机关未予答复", "C": "何某对某行政机关作出的征收征用决定不服", "D": "孙某对某市场监督管理局就其与货某之间的专利侵权纠纷作出的赔偿调解不服"}, answer: "BD", explanation: "。A选项，（复议法）第19条规定：“公民、法人或者其他组织对行政行为不厦申请行政复议的，作出行政行为的行政机关或者法律、法规、规章设权的组织是被申请人。两个以上行政机关以共同的名义作出同一行政行为的，共同作出行政行为的行政机关是被申请人。行政机关委托的组织作出行政行为的，委托的行政机关是被申请人。作出行政行为的行政机关被撤销或者职权变更的，继续行使其职权的行政机关是被中请人”，因此A、C选项错误，B、D选项正确。（新编）", chapter: "第一章 行政复议的相关规定"},
  {id: 343, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，下列哪些情形可以申请行政复议？", options: {"A": "村民李某认为乡政府批准给村民张某的宅基地侵占了其承包的耕地", "B": "孙某认为市公安局发布的其在高铁上与他人争抢座位的处理决定侵害了其隐私权", "C": "赵某对劳动行政部门作出的工伤认定结论不服", "D": "刘某因受到公安机关的刑讯通供而服刑，出狱后要求行政机关给予赔偿，对行政机关作出不予赔偿的决定不服"}, answer: "AC", explanation: "。A、D选项，（复议条例）第14条规定：行政机关设立的派出机构、内设机构或者其他组织，未经法律、法规授权，对外以自己名义作出具体行政行为的，该行政机关为被申请人”，因此A选项正确，D选项错误。B选项，（复议条例）第12条第1款规定：“行政机关与法律、法规授权的组织以共同的名义作出具体行政行为的，行政机关和法律、法规投权的组织为共同被申请人”，因此B选项错误。C选项，（复议条例）第13条规定：“下级行政机关依照法律、法规、规章规定，经上级行政机关批准作出具体行政行为的，批准机关为被申请人”，因此C选项正确。（2011改编）", chapter: "第一章 行政复议的相关规定"},
  {id: 344, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，下列哪些情形不可以申请行政复议？多选）", options: {"A": "王某对县政府解除特许经营协议不服", "B": "公务员李某对其所在的行政机关对其作出的记大过行政处分不服", "C": "赵某对某行政机关就其与周某之间的民事纠纷作出的调解不服", "D": "曾某对国家知识产权局《专利审查指南》中有关创造性判断方法相关规定不服"}, answer: "ABCD", explanation: "。根据（复议法》第17条，申请人、第三人委托代理人的，应当向行政复议机构提交授权委托书、委托人及被委托人的身份证明文件。授权委托书应当载明委托事项、权限和期限。申请人、第三人变更或者解除代理人权限的，应当书面告知行政复议机构。因此A、B、C、D选项正确。（新编）", chapter: "第一章 行政复议的相关规定"},
  {id: 345, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，公民在对具体行政行为申请行政复议时，可以对下列哪些规定一并提出审查申请？", options: {"A": "国务院部门规章", "D": "地方人民政府规章", "C": "乡、镇人民政府的规定", "B": "地方性法规"}, answer: "ACD", explanation: "。《行政复议法实地务纠）规定：“行政复议期问，行政复议机构请人以外的公民、法人或者其他组织与变的具体行政行为有利害关系的，可以其作为第三人参加行政复议。行政问，申请人以外的公民、法人或者其他与被审查的具体行政行为有利害关系的以向行政复议机构申请作为第三人政复议。第三人不参加行政复议，不影政复议案件的审理”，因此A、B、C：确，D选项错误。（新编）", chapter: "第一章 行政复议的相关规定"},
  {id: 346, topic: "专题四 行政复议法", type: "single", question: "当事人对某省知识产权局的行政行为不服提起行政复议时，可以一并请求行政复议机关对该行政行为所依据的下列哪一文件进行审查？", options: {"A": "《中华人民共和国专利法实施细则》", "B": "该省人大常委会制定的《专利保护条例》", "C": "国家知识产权局制定的《专利行政执法办法》", "D": "该省知识产权局制定的《关于加强专利保护的规定》"}, answer: "B", explanation: "。根据《复议法）第24条的频县级以上地方各级人民政府管辖对本民政府工作部门作出的行政行为不展政复议案件。本题中，县农业农村局和林公安局以共同名义作出处罚，应向其县人民政府申请行政复议，因此A、C项错误，B选项正确。（新编）", chapter: "第一章 行政复议的相关规定"},
  {id: 347, topic: "专题四 行政复议法", type: "single", question: "下列当事人提起的复议，哪些属于行政复议受案范围？", options: {"A": "某造纸厂向市水务局申请发放取水许可证，市水务局作出不予许可决定，该厂不服而申请复议", "B": "食品药品监管局向申请餐饮服务许可证的李某告知补正申请材料的通知，李某认为通知内容违法而申请复议", "C": "化肥厂附近居民要求生态环境局提供对该厂排污许可证监督检查记录，遭到拒绝后申请复议大中", "D": "某国土资源局以建城市绿化带为由撤回向甲公司发放的国有土地使用权证，该公司不服而申请复议"}, answer: "B", explanation: "。本题中，区教育局属于人民工作部门，对其行政行为不服，根据（法》第24条的规定，可以向该部门的本民政府即该区政府申请复议，因此A、选项错误，B选项正确。（2012改编）", chapter: "第一章 行政复议的相关规定"},
  {id: 348, topic: "专题四 行政复议法", type: "single", question: "根据行政复议法及相关规定，下列哪些说法是正确", options: {"A": "有权申请行政复议的公民死亡的、其近亲属市政复议", "B": "有权申请行政复议的公民为无民事行为能力定代理人可以以自己的名义申请行政复议", "C": "有权申请行政复议的公民为限制民事行为能法定代理人可以代为申请行政复议", "D": "有权申请行政复议的法人或者其他组织终止义务承受人可以申请行政复议"}, answer: "A", explanation: "。根据（复议法）第24条第1规定，对本级人民政府依法设立的派出作出的行政行为不服的，由本级人民致辖，因此A选项正确，B、C、D选项等（新编）", chapter: "第二章 行政复议参加人"},
  {id: 349, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，下列关于复议申法哪些是正确的？", options: {"A": "合伙企业申请行政复议的，应当以核准登记的请人", "B": "合伙企业以外的其他合伙组织申请行政复议伙人共同申请行政复议", "C": "股份制企业的股东会认为某行政机关作出的行为侵犯该企业合法权益的，可以以该企业的名义复议", "D": "股份制企业的董事会认为行政机关作出的行犯企业合法权益的，可以以董事会的名义申请行政复"}, answer: "AC", explanation: "。A选项，根据（行政诉论法）条的规定，张某对省人民政府的行政行服可以直接向法院提起行政诉讼，因此项正确。B选项，根据（复议法）第26条定，张某可以申请复议，对行政复议决！服可以再提起行政诉讼，也可以向国务！", chapter: "第二章 行政复议参加人"},
  {id: 350, topic: "专题四 行政复议法", type: "single", question: "关于行政复议代表人的行为效力，以下哪些说的？多选）", options: {"A": "代表人参加行政复议的所有行为对其代表的发生效力", "B": "代表人变更行政复议请求应当经被代表的申请", "C": "代表人承认第三人请求应当经被代表的申请人", "D": "代表人承认被申请人提出证据的真实性应当的申请人同意"}, answer: "D", explanation: "。根据（复议法）第26条的规定，对省人民政府、国务院部门作出的（限于省级政府机关成国务院本部门作出的行政行为）行政复议决定不服的，可以向人民法院提起行玖诉讼：也可以向国务院申请裁决，国务院依照本法的规定作出最终裁决，因此D选项正确。（新编）", chapter: "第二章 行政复议参加人"},
  {id: 351, topic: "专题四 行政复议法", type: "single", question: "关于行政复议中的委托代理人，以下说法正", options: {"A": "申请人或第三人最多可以委托2名代理人复议", "B": "申请人或第三人只能委托律师、基层法律服务工作者、近亲属代为参加复议", "C": "委托代理人应当向复议机构提交授权委托书，委托人以及被要托人的身份证明文件", "D": "委托书应当载明委托事项的权限和期限"}, answer: "B", explanation: "。（复议法）第24条第3款规定：“省、自治区人民政府依法设立的派出机关参照设区的市级人民政府的职资权限，管辖相关行政复议案件”，大兴安岭地区行政公暑是黑龙江省人民政府设立的派出机关，对该派出机关下属的区人民玫府行政行为不服，应向该派出机关即大兴安岭地区行政公暑申请行政复议，因此B选项正确。（新编）", chapter: "第二章 行政复议参加人"},
  {id: 352, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，下列关于行政复议被申请人的哪些说法是正确的？", options: {"A": "两个以上行政机关以共同的名义作出同一行政行为的，其中任何一个行政机关可以单独作为被申请人", "B": "法律、法规、规章授权的组织作出行政行为的，该组织是被申请人", "C": "行政机关委托的组织作出行政行为的，被委托的组织是被申请人", "D": "作出行政行为的行政机关被撤销或者职权变更的，继续行使其职权的行政机关是被申请人"}, answer: "ABCD", explanation: "。A、B、C选项，（复议法）第25条规定：“国务院部门管辖下列行政复议案件：（一）对本部门作出的行政行为不服的；（二）对本部门依法设立的派出机构依照法律、行政法规、部门规章规定，以派出机构的名义作出的行政行为不服的：（三）对本部门管理的法律、行政法规、部门规章投权的组织作出的行政行为不服的”，因此A、B、C选项正确。D选项，（复议法）第19条第3款规定：“行政机关委托的组织作出行政行为的，委托的行政机关是被申请人”，国务院部门委托其他单位作出行政行为的，该国务院部门是被申请人，应当向该国务院部门申请复议，因此D选项正确。（新编）", chapter: "第二章 行政复议参加人"},
  {id: 353, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，下列关于行政复议的被申请人的说法哪些是正确的？", options: {"A": "行政机关设立的派出机构，未经法律、法规授权，对外以自己名义作出具体行政行为的，该行政机关为被申请人", "B": "行政机关与法律、法规授权的组织以共同的名义作出具体行政行为的，仅行政机关为被申请人", "C": "下级行政机关依照法律、法规、规章规定，经上级行政机关批准作出具体行政行为的，批准机关为被申请人", "D": "行政机关设立的内设机构，未经法律、法规授权，对外以自己名义作出具体行政行为的，该内设机构为被申请人"}, answer: "BC", explanation: "。根据（复议法》第24条、第25条的规定，省、自治区、直辖市人民政府管辖对本机关作出的行政行为不展的行政件：国务院部门管辖对木部门作出的行票出行政行为的行政机构自身复认的气务院部门和省级政府，因此A、1)选项的B、C选项正确。（新编）", chapter: "第二章 行政复议参加人"},
  {id: 354, topic: "专题四 行政复议法", type: "multiple", question: "对于复议申请人委托代理人参加复议的，以下哪些文件应当提交至行政复议机构？多选）", options: {"A": "载明委托事项、权限和期限的授权委托书", "B": "委托人身份证明文件议", "C": "变更代理人权限的书面文件", "D": "被委托人身份证明文件"}, answer: "AC", explanation: "。A、C选项，（复议法）第27导的行政机关、税务和国家安全机关的行议”，因此A、C选项正确。B选项，根物（1议法》第24条的规定，县级以上地方名级人民政府管辖对本级人民政府工作部门作的行政行为不服的行政复议案件，县级公机关属于县政府的工作部门，应当向县动申请复议，不能向上一级公安机关中请议，因此B选项错误。D选项，根据（复法》第24条的规定，省、自治区、直辖市人员政府管辖对本机关作出的行政行为不原行政复议案件，不能向国务院申请行动议，因此D选项错误。（2011改编）", chapter: "第二章 行政复议参加人"},
  {id: 355, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，有关行政复议第三人，下列说法哪些是正确的？", options: {"A": "行政复议机构可以通知第三人参加复议程序", "B": "第三人可以向行政复议机构申请参加行政复议", "C": "第三人同申请行政复议的具体行政行为应当有利害关系", "D": "第三人不参加行政复议会影响复议案件的申请"}, answer: "BC", explanation: "。《复议法》第28条规定：“对行行政复议机构职责的地方人民政府司行政部门的行政行为不服的，可以向本级人民政府申请行政复议，也可以向上一级司主行政部门申请行政复议”，河西区司法局河西区政府的司法行政部门，并且负责河西区政府的行政复议案件，对该部门作的行政行为，可以向本级政府即河百区政申请复议，也可以向上一级司法行政部门天津市司法局申请复议，因此A、D选误，B、C选项正确。（新编）", chapter: "第二章 行政复议参加人"},
  {id: 356, topic: "专题四 行政复议法", type: "multiple", question: "根据某地级市人民政府关于保护水域生态环境、打击涉渔违法行为的部署安排，某县农业农村局和该县森林公安局对某水库开展联合执法巡查。在巡查过程中，两部门以共同名义对李某非法捕鱼的设备进行了收缴。李某不服，拟申请行政复议。根据行政复议法及相关规定，李某应当向下列哪个机关申请行政复议？", options: {"A": "该市人民政府", "B": "该县人民政府", "C": "该市农业农村局", "D": "该市森林公安局"}, answer: "BC", explanation: "。A选项，必须是侵犯已经发取得的自然资源权益，才属于复议前量的件，肖某是初次申请使用农村宅基地，不！要复议前置，因此A选项错误。B选项，", chapter: "第二章 行政复议参加人"},
  {id: 357, topic: "专题四 行政复议法", type: "multiple", question: "张某对某市辖区教育局作出的一项行政行为不服，欲申请行政复议。根据行政复议法及相关规定，下列哪项说法是正确的？", options: {"A": "张某可向该区教育局申请行政复议", "B": "张某可向该区政府申请行政复议", "C": "张某可向该市教育局申请行政复议", "D": "张某可向该市政府申请行政复议"}, answer: "CD", explanation: "。A选项，提出行政复议有时间限制，因此A选项错误。B、C选项，（复议法》第87条规定：“行政复议机关受理行政复议申请，不得向申请人收取任何费用。”，因此B选项错误，C选项正确。D选项，《复议法》第22条规定：“申请人申请行政复议，可以书面申请：书面申请有困难的，也可以口头申请。”，因此D选项正确。（新编）", chapter: "第二章 行政复议参加人"},
  {id: 358, topic: "专题四 行政复议法", type: "multiple", question: "对本级人民政府设立的派出机关作出的行政行为不服114-的，应当向下列哪个机关申请行政复议？", options: {"A": "本级人民政府", "B": "本级人民政府的上一级政府", "C": "作出该行政行为的派出机关", "D": "人民法院"}, answer: "ABCD", explanation: "。一般情况下，提出行政复议申请的期限为自知道或者应当知道行政行为之日起60日，若行政机关未告知申请行政复议的权利、行政复议机关和申请期限的，申请期限自知道或者应当知道行政行为内容之日起最长不得超过1年，若申请人一直不知道行政行为的，可以自行政行为作出之日起5年内申请行政复议，涉及不动产的，可以自行政行为作出之日起20年内申请行政复议，因不可抗力或者其他正当理由耽误法定申请期限的，申请期限自障碍消除之日起他续计算、因此A、B、C、D孩项均蒸情：（新编）", chapter: "第二章 行政复议参加人"},
  {id: 359, topic: "专题四 行政复议法", type: "multiple", question: "张某不服河北省人民政府作出的征收征用补偿决定，可以通过下列哪些途径寻求救济？多选）", options: {"A": "直接向人民法院提起行政诉讼", "B": "直接向国务院申请裁决", "C": "向该省人民政府提出行政复议申请", "D": "向国务院提出行政复议申请"}, answer: "ABC", explanation: "。A、B选项，根据（复该头）繁22条的规定，申请人申请行政复议，可以面申请：书面申请有图难的，也可以口头请。书丽申请的，可以通过邮寄或者行政复议机关指定的互联网渠道等方式银文行政复议申请书，也可以当团银交行改复议中请书，因此A、B选项正确。C通项，（复议条例）第18条第1款规定：“申请人书5面中请行政复议的，可以采服当面递交、邮寄或者传真等方式提出行政复议申请”，因此C选项正确。D选项，（复议法》第22条第4款规定：“申请人对两个以上行政行为不服的，应当分别申请行政复议”，因此D选项错误。（2013改编）", chapter: "第二章 行政复议参加人"},
  {id: 360, topic: "专题四 行政复议法", type: "multiple", question: "对省级人民政府的复议决定不服的，下列哪项说法是正确的？", options: {"A": "只能向人民法院提起诉讼", "B": "先向国务院申请裁决，如果仍然不服的，向人民法院提起诉讼", "C": "只能向国务院申请作出最终裁决", "D": "向人民法院提起行政诉讼或者申请国务院作出最终裁决"}, answer: "ABCD", explanation: "。《复议条例》第18条规定：中请人书面中请行政复议的，可以采取当面递交、邮寄或者传真等方式提出行政复议申请。有条件的行政复议机构可以接受以电子邮件形式提出的行政复议申请”，因此A、B、C、D选项均正确。（新编）", chapter: "第二章 行政复议参加人"},
  {id: 361, topic: "专题四 行政复议法", type: "multiple", question: "大兴安岭地区行政公署是黑龙江省人民政府设立的派出机关，张某对其下属的加格达奇区人民政府作出的强制拆除房屋附属设施的行政行为不服，应当向下列哪个机关申请复议？", options: {"A": "黑龙江省人民政府", "B": "大兴安岭地区行政公署", "C": "加格达奇区人民政府", "D": "呼伦贝尔市人民政府"}, answer: "ABC", explanation: "。《复议法）第30条第1款规定：“行政复议机关收到行政复议申请后，应当在五日内进行审查。对符合下列规定的，行政复议机关应当子以受理：（一）有明确的中请人和符合本法规定的被申请人（三）有具体的行政复议请求和理由：（六）属于本机关的管辖范围；（七）行政复议机关未受理过该申请人就同一行政行为提出的行政复议申请，并且人民法院未受理过该申请人就同一行政行为提起的行政诉讼”，因此A、B、C选项符合受理条件，D选项不符合受", chapter: "第二章 行政复议参加人"},
  {id: 362, topic: "专题四 行政复议法", type: "single", question: "国务院部门管辖下列哪些行政复议案件？多选）", options: {"A": "对本部门作出的行政行为不服议", "B": "对本部门依法设立的派出机构依照法律、行政法规、部门规章规定，以派出机构的名义作出的行政行为不服", "C": "对本部门管理的法律、行政法规、部门规章授权的组织作出的行政行为不服", "D": "对本部门委托的其他单位作出的行政行为不服"}, answer: "B", explanation: "，根据（复误法）诺30条第1恢的规定，行政复以机关收行政复议中请府，应当在5日内选行审益，因此段选项正确。（祈编）", chapter: "第二章 行政复议参加人"},
  {id: 363, topic: "专题四 行政复议法", type: "multiple", question: "行政复议案件中，下列哪些情形属于原作出行政行为的行政机关自身复议的？", options: {"A": "对副省级城市的市级政府所作行政决定不服而申请行政复议的", "B": "对国务院各部门所作行政决定不服而申请行政复议的", "C": "对省级政府所作行政决定不服而申请行政复议的", "D": "对下级行政机关依法律规定经上级行政机关批准而作出的行政决定不服的，提起行政复议"}, answer: "BC", explanation: "，A.B透项，（复以法）第30条第2款规定：“对不符合规定的行政笑议申请，行政复以机关应当在审查期限内央定不予受理并说明理由：不属干本机美管错的，还应当在不予受理决定中告知申请人有管权的行政复以机美”，国此A选项错误，B选项正确。C、D选项，（复误法）第31条规定：“行玖复议申请材料不齐全或者教递不清施，无法判断行政复议中请是否符合（复议法》有关受理条件规定的，行政复议机关应当自收到申请之日起S日内书面通知申请人补正中请人应当自收到补正通知之日起10日内提交补正材料。有正当理由不能按期补正的，行政复议机关可以延长合理的补正期限。无正当理由逾期不补正的，视为申请人放弃行政复议申请，并记录在案”，因此C选项正确，D选项错误。（新编）", chapter: "第二章 行政复议参加人"},
  {id: 364, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，下列关于行政复议受理机关的说法哪些是正确的？多选）", options: {"A": "对外汇管理行政机关的行政行为不服的，向其上一级主管部门申请行政复议", "B": "对县级公安机关的行政行为不服的，可以向该县人民政府申请行政复议，也可以向上一级公安机关申请行政复议", "C": "对海关的行政行为不服的，向其上一级主管部门申请行政复议", "D": "对省级人民政府的行政行为不服的，可以向省人民政府申请行政复议，也可以向国务院申请行政复议"}, answer: "ABCD", explanation: "。《复议法）第32条规定：“对当场作出或者依据电子技术监控设备记录的违法事实作出的行政处罚决定不服申请行政复议的，可以通过作出行政处罚决定的行政机关提交行政复议申请。行政机关收到行政复议申请后，应当及时处理；认为需要维持行政处罚决定的，应当自收到行政复议申请之日起五日内转送行政复议机关”。本题中，张某除可以直接向复议机关北京市政府提交行政复议申请外，也可以通过原行政机关北京市公安局交通管理局向北京市政府提交行政复议申请，因此A、B、C、选项均正确。D选项，北京市公安局交通管理局收到复议申请后，认为决定不合法的，应当及时处理，即变更或据销原列销决定，因致1选项正确。（新编）", chapter: "第二章 行政复议参加人"},
  {id: 365, topic: "专题四 行政复议法", type: "single", question: "天津市河西区司法局是河西区政府受理的行政复议的复议机构，对河西区司法局针对某律师事务所作出的处罚决定，该律师事务所不服，可以向下列哪些机关申请复议？", options: {"A": "天津市人民政府", "B": "天津市河西区人民政府", "C": "天津市司法局", "D": "天津市河西区司法局"}, answer: "D", explanation: "。根据（复议法）第33条的规货，行政复议机关受理行政复议申请后，发现适行政复议申请不符合《行政复议法）有关受理条件规定的，应当决定股回申请并说明理由。王某在申请行政复议之前已向人民法院提起行政诉讼并被受理，不符合行政复议申请条件，但行政复议机关是在受理该申请后才发现其不符合受理条件，应驳回该行政复议申请，因此A、B、C选项错误，D选项正确。（新编）", chapter: "第二章 行政复议参加人"},
  {id: 366, topic: "专题四 行政复议法", type: "single", question: "育某提出农村宅基地用地申请，乡政府审核后报县政有审批。肖某收到批件后，不满批件所核定的而积。下列哪些选项是正确的7", options: {"A": "肖某频先中请复议，方能提起行政诉讼", "B": "肖某申请行政复议，复议机关为县政府的上一级政府", "C": "肖某中请行政复议，应当自签收批件之日起60日内提出复议申请", "D": "肖某申请行政复议，县政府是被申请人，乡政府为第三人"}, answer: "B", explanation: "。根据（复议条例）第48条第1款的规定，受理行政复议中请后，发现该行玖复议申请不符合行政复议法和本条例规定的受理条件的，行政复议机关应当决定驳回行政复议申请，因此A、C、D选项错误，B选项正确。（新编）", chapter: "第二章 行政复议参加人"},
  {id: 367, topic: "专题四 行政复议法", type: "single", question: "某专利代理机构对吊销其专利代理机构执业许可证的决定不服，拟申请行政复议。根据行政复议法及相关规定，下列说法哪些是正确的？多选）", options: {"A": "该专利代理机构可以随时提出书面申请", "B": "行政复议机关受理行政复议申请，应当向该专利代理机构收取复议申请费", "C": "行政复议机关受理行政复议申请，不得向该专利代理机构收取任何费用", "D": "该专利代理机构可以在法定期限内口头申请"}, answer: "B", explanation: "。《复议法》第35条规定：“公民、法人或者其他组织依法提出行政复议申请，行政复议机关无正当理由不予受理、驳回中请或者受理后超过行政复议期限不作答复的，申请人有权向上级行政机关反映，上级行政机关应当贵令其纠正；必要时，上级行政复议机关也可以直接受理”；因此A、C、D选项错误，B选项正确。（2019改编）", chapter: "第三章 行政复议程序"},
  {id: 368, topic: "专题四 行政复议法", type: "single", question: "因李某长期在外打工，其存放在路边的一辆电动车被街道办事处当作无主物予以没收处理，以下说法哪些是正确的？", options: {"A": "李某不服该决定的，应当自知道或者应当知道该决定之日起60日内申请行政复议", "B": "通知书中未载明当事人申请行政复议期限及复议机关，李某可以自知道或者应当知道决定之日起1年内申请行政复议", "C": "李某一直不知道其电动车被没收，可以自决定作出之日起5年内申请行政复议", "D": "因不可抗力或者其他正当理由耽误法定申请期限的，申请期限自障碍消除之日起继续计算"}, answer: "A", explanation: "。《复议法》第31条第2款规定：中请人应当自收到补正通知之日起10日内提交补正材料”，因此，A选项正确。（新编）", chapter: "第三章 行政复议程序"},
  {id: 369, topic: "专题四 行政复议法", type: "multiple", question: "林某不服县教育局对其作出的某行政行为，欲向行政复议机关申请行政复议。根据行政复议法及相关规定，下列哪些说法是正确的？", options: {"A": "林某若书面申请有困难，可以口头申请行政复议", "B": "林某可以通过互联网渠道以电子方式书面申请行政复议", "C": "林某可以通过传真方式申请行政复议", "D": "林某对县教育局两个以上行政行为不服的，可以一同申请行政复议"}, answer: "ABCD", explanation: "。《复议法）第37条第1款规定：“行政复议机关傲服法律、法规、规章审星行政复以案体”，因此A、B、C、D选项均正确。新编）", chapter: "第三章 行政复议程序"},
  {id: 370, topic: "专题四 行政复议法", type: "multiple", question: "关于行政复议的申请方式，下列说法哪些是正确的？", options: {"A": "申请人可以采取当面递交方式提出行政复议申请", "B": "有条件的行政复议机构可以接受以电子邮件形式提出的行政复议申请", "C": "申请人可以采取邮寄方式提出行政复议申请", "D": "申请人可以采取传真方式提出行政复议申请"}, answer: "BD", explanation: "。A、B透项，（复议法）第44条第1款规定：“被中请人对其作出的行政行为的合法性，适当性负有举证责任”，因此A选项错误，B选项正确。根据（复议法）第44条第2款的规定，中请人认为被申请人不履行法定职责或者提出行政赔偿请求的，申请人负有举证责任，因此C选项错误，D选项正确。（新编）", chapter: "第三章 行政复议程序"},
  {id: 371, topic: "专题四 行政复议法", type: "multiple", question: "根据行政复议法及相关规定，以下哪些符合行政复议的受理条件？多选）", options: {"A": "申请人明确", "B": "行政复议请求和理由具体", "C": "属于复议机关的管辖范围", "D": "行政复议机关就同一行政行为受理过申请人提出的行政复议申请"}, answer: "AB", explanation: "。A、B选项，行政复议机关调查取证方式有两种，一是主动调查取证，二是根据申请人的申请调查取证，因此A、B选项正确。C选项，由于行政机关本身具有较强的调查取证能力，且应当在行政行为作出之前就完成调查取证，因此行政机关不能申请复议机关调查取证，C选项错误。D选项，《复议法》第45条第2款规定：“调查取证时，行政复议人员不得少于两人…”，因此D选项错误。（新编）", chapter: "第三章 行政复议程序"},
  {id: 372, topic: "专题四 行政复议法", type: "multiple", question: "S1", options: {"C": "海关处理的案件由中级人民法院管辖", "D": "本辖区内重大、复杂的案件由中级人民法院管辖", "A": "第一审行政案件由基层人民法院管辖", "B": "中级人民法院管辖对国务院部门所作的行政行为提起诉讼的案件"}, answer: "BCD", explanation: "。A选项，《复议法）第41条规定：“行政复议期间有下列情形之一的，行政复议机关决定终止行玫复议：（一）申请人数回行政复议申请，行政复议机构准予撤回”，因此行政复议申请可以撤回，A选项正确。B、C、D选项，（复议法）第47条规定：“行政复议期间，申请人、第三人及其委托代理人可以按照规定查阅、复制被申请人提出的书面答复、作出行政行为的证据、依操和其他有关材料，除沙及国农秘密、商业秘宙、个人隐私或者可他危及国家安全、公[μ共安全：社会稳定的情形外，行改复议机约应当同意”，因此B、C选项错误，D选项正确。（新编）", chapter: "第三章 行政复议程序"},
  {id: 373, topic: "专题四 行政复议法", type: "multiple", question: "关于行政复议机关收到行政复议申请后，对材料进行审查，以下做法正确的有？", options: {"A": "行政复议机关认为不属于本机关管辖，应当作出驳回行政复议申请的决定", "B": "行政复议机关认为不属于本机关管辖，应当作出不予受理的决定", "C": "行政复议机关认为复议申请材料表述不清楚，无法判断是否符合受理条件，通知申请人进行补正", "D": "行政复议申请人收到补正通知书后，无正当理由不补正的，行政复议机关应当作出不予受理的决定"}, answer: "CD", explanation: "。A选项，行政复议机关应当在收到行政复议中请的5日内审查是否符合受理条件，因此A选项借误。B选项，木题不符合适用简易程序的条件，应当适用普通程序，行政复议机构应当自行政复议中请受理之日起7日内将中请书副水或笔录复印件发送价被中请人，因此B选项借误。C造项，（复议法》第31条第1款规定：“行政复议中请材料不齐全或者表述不清楚，无法判断行政复议中请是否符合本法第30条第1款规定的，行政复议机关应当自收到中请之日起5日内书面通知中请人补正….”，因此C选项正确。D选项，《复议法》第48条规定：“被申请人应当自收到行政复议申请书副本或者行政复议申请笔录复印件之日起10日内，提出书面答复，并提交作出行政行为的证据、依据和其他有关材料”，因此对于适用普通程序的案件，D选项正确。（新编）", chapter: "第三章 行政复议程序"},
  {id: 374, topic: "专题四 行政复议法", type: "multiple", question: "张某对北京市公安局交通管理局依据电子技术监控设备记录的违法事实作出的行政处罚决定不服申请行政复议，以下说法哪些是正确的？多选）", options: {"A": "张某可以直接向北京市政府提交行政复议申请", "B": "张某可以通过北京市公安局交通管理局向北京市政府提交行政复议申请", "C": "北京市公安局交通管理局收到复议申请后，认为需要维持行政处罚决定的，应当自收到行政复议申请之日起5日内转送北京市政府", "D": "北京市公安局交通管理局收到复议申请后，认为决定不合法的，应当变更或撤销原行政处罚决定"}, answer: "BD", explanation: "。《复议法》第52条规定：“县级以上各级人民政府应当建立相关政府部门、专家、学者等参与的行政复议委员会，为办理行政复议案件提供咨询意见，并就行政复议工作中的重大事项和共性问题研究提出意见。行政复议委员会的组成和开展工作的具体办法，由国务院行政复议机构制定。审理行政复议案件涉及下列情形之一的，行政复议机构应当提请行政复议委员会提出咨询意见：（一）案情重大、疑难、复杂；…（三）省、自治区、直辖市对本机关作出的行政行为不服进行管辖的行政复议案件：”，.A选项复议委员会只能作出咨询意见，不能作出复议决定；B选项属于提请复议委员会作出咨询意见的情形：C选项目前并未要求国务院工作部门也成立行政复议委员会：D专圆四行政算议法请明甘关是以委爸质责的选法正喻.（辨循）", chapter: "第三章 行政复议程序"},
  {id: 375, topic: "专题四 行政复议法", type: "multiple", question: "某行政复议机关受理王某提出的行政复议申请后，发现王某在申请行政复议之前已向人民法院提起行政诉讼并被受理。根据行政复议法及相关规定，该行政复议机关应当如何处理？相关店强化600院有认", options: {"A": "通知人民法院中止审理该行政诉讼", "B": "将该案移送人民法院一并审理", "C": "中止审理，在人民法院作出生效判决后维续审理", "D": "驳回该行政复议申请"}, answer: "AB", explanation: "。A违项，干非业济是，付义券失底明高，争以不大的囊作才以连用简疹世庐：光外。非才普非人同意，以个以进用简府偿岸，回光人违府正喻，日通爪，进用简享偿岸的行皮健以其作，可以不当劳散居见、井证，用共进停节普理，因此仔选项正崎。C逐项，简侵序中，民中请人应首自收时行政复以前本之日超今日内提交作出行议行力的证据，做和赁他价英桥，旧北C资项借供。D选项，紧作湾庆获3000完以下俏，米可以造用信身程序，因此D选项借读。（瞬）", chapter: "第三章 行政复议程序"},

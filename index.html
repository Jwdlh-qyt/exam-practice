<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026专利代理师 · 练习系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a24;--card:#16161f;
  --hover:#1e1e2a;--border:#2a2a3a;
  --accent:#6c9bfb;--accent-glow:rgba(108,155,251,0.3);--accent-dim:rgba(108,155,251,0.15);
  --accent2:#a78bfa;--accent2-bg:rgba(167,139,250,0.1);
  --green:#10b981;--green-glow:rgba(16,185,129,0.3);--green-dim:rgba(16,185,129,0.15);
  --text:#f0f0f5;--text2:#8888a0;--text3:#55556a;
  --ok:#22c55e;--ok-bg:rgba(34,197,94,0.1);
  --err:#ef4444;--err-bg:rgba(239,68,68,0.1);
  --warn:#f59e0b;
  --r:8px;--r2:12px;--r3:16px;--r4:24px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(108,155,251,0.07),transparent),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(167,139,250,0.05),transparent);pointer-events:none;z-index:-1}
.container{max-width:960px;margin:0 auto;padding:32px 24px}

/* Header */
header{text-align:center;margin-bottom:32px}
h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.subtitle{color:var(--text2);font-size:0.95rem}
.badges{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.badge{display:inline-block;padding:4px 14px;border-radius:20px;background:var(--accent-dim);color:var(--accent);font-size:0.82rem;font-weight:600}
.badge.g{background:var(--green-dim);color:var(--green)}
.badge.p{background:var(--accent2-bg);color:var(--accent2)}

/* Main tabs - 专利法 / 相关法 */
.main-tabs{display:flex;gap:8px;margin-bottom:24px;background:var(--bg2);padding:6px;border-radius:var(--r3);border:1px solid var(--border)}
.main-tab{flex:1;padding:14px 20px;background:transparent;border:none;color:var(--text2);font-size:1rem;font-weight:600;cursor:pointer;border-radius:var(--r2);transition:all 0.25s}
.main-tab:hover{color:var(--text);background:var(--hover)}
.main-tab.active-patent{background:var(--accent);color:#fff;box-shadow:var(--accent-glow)}
.main-tab.active-related{background:var(--green);color:#fff;box-shadow:var(--green-glow)}

/* Sub tabs */
.tabs{display:flex;gap:6px;margin-bottom:24px;background:var(--bg2);padding:5px;border-radius:var(--r2);border:1px solid var(--border)}
.tab{flex:1;padding:11px 16px;background:transparent;border:none;color:var(--text2);font-size:0.9rem;font-weight:500;cursor:pointer;border-radius:var(--r);transition:all 0.2s}
.tab:hover{color:var(--text);background:var(--hover)}
.tab.active{font-weight:600}
.tab.active-patent{background:var(--accent);color:#fff}
.tab.active-related{background:var(--green);color:#fff}

/* Stats bar */
.stats-bar{display:flex;margin-bottom:20px;background:var(--card);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden}
.stat-item{flex:1;text-align:center;padding:14px 8px;border-right:1px solid var(--border)}
.stat-item:last-child{border-right:none}
.stat-val{font-size:1.5rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-val.patent-color{color:var(--accent)}
.stat-val.related-color{color:var(--green)}
.stat-lbl{font-size:0.78rem;color:var(--text3);margin-top:2px}

/* Progress */
.progress-wrap{margin-bottom:20px}
.progress-info{display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.82rem;color:var(--text2)}
.progress-bar{height:5px;background:var(--bg3);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;transition:width 0.4s ease}
.progress-fill.patent-bg{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.progress-fill.related-bg{background:linear-gradient(90deg,var(--green),#34d399)}

/* Filter row */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-label{color:var(--text2);font-size:0.85rem;margin-right:4px}
.fbtn{padding:6px 14px;border-radius:20px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:0.82rem;cursor:pointer;transition:all 0.2s}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}
.fbtn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600}
.fbtn.active-g{background:var(--green-dim);border-color:var(--green);color:var(--green);font-weight:600}

/* Topic selector */
.topic-panel{display:none;margin-bottom:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2)}
.topic-panel.show{display:block}
.topic-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.topic-chip{padding:5px 12px;border-radius:16px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:0.78rem;cursor:pointer;transition:all 0.2s;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:normal;line-height:1.4}
.topic-chip:hover{border-color:var(--accent);color:var(--accent)}
.topic-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600}

/* Practice card */
.practice-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r4);padding:32px;margin-bottom:16px}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.q-num{font-size:0.82rem;color:var(--text3);font-family:'JetBrains Mono',monospace}
.type-badge{padding:3px 10px;border-radius:16px;font-size:0.78rem;font-weight:600}
.type-badge.single{background:var(--accent-dim);color:var(--accent)}
.type-badge.multi{background:var(--accent2-bg);color:var(--accent2)}
.type-badge.unknown{background:var(--err-bg);color:var(--err)}
.q-text{font-size:1.18rem;font-weight:600;margin-bottom:24px;line-height:1.75}

/* Options */
.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.opt{padding:14px 18px;background:var(--bg2);border:2px solid var(--border);border-radius:var(--r3);cursor:pointer;transition:all 0.25s;display:flex;align-items:flex-start;gap:12px;user-select:none;text-align:left}
.opt:hover:not(.locked){border-color:var(--accent);background:var(--hover);transform:translateX(4px)}
.opt.sel:not(.locked){border-color:var(--accent2);background:var(--accent2-bg)}
.opt.sel:not(.locked) .opt-l{background:var(--accent2);color:#fff}
.opt.ok{border-color:var(--ok);background:var(--ok-bg)}
.opt.ok .opt-l{background:var(--ok);color:#fff}
.opt.err{border-color:var(--err);background:var(--err-bg)}
.opt.err .opt-l{background:var(--err);color:#fff}
.opt.locked{cursor:default}
.opt.locked:hover{transform:none}
.opt-l{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:var(--r);font-weight:600;color:var(--text2);font-size:0.88rem;margin-top:1px}
.opt-t{flex:1;line-height:1.6}

/* Feedback */
.fb{padding:14px 18px;border-radius:var(--r2);margin-bottom:16px;display:none}
.fb.ok{background:var(--ok-bg);border:1px solid var(--ok);display:block}
.fb.err{background:var(--err-bg);border:1px solid var(--err);display:block}
.fb-title{font-weight:600;margin-bottom:4px}
.fb.ok .fb-title{color:var(--ok)}
.fb.err .fb-title{color:var(--err)}
.fb-ans{font-size:0.88rem;color:var(--text2);margin-bottom:6px}
.expl{background:var(--bg3);border-left:3px solid var(--accent);padding:12px 14px;border-radius:0 var(--r) var(--r) 0;font-size:0.85rem;color:var(--text2);line-height:1.7;display:none;margin-top:8px}
.expl-toggle{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:16px;font-size:0.8rem;cursor:pointer;transition:all 0.2s}
.expl-toggle:hover{color:var(--accent);border-color:var(--accent)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:11px 24px;border-radius:var(--r2);border:none;cursor:pointer;font-size:0.92rem;font-weight:600;transition:all 0.25s}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{opacity:0.85;transform:translateY(-2px)}
.btn-g{background:var(--green);color:#fff}
.btn-g:hover{opacity:0.85;transform:translateY(-2px)}
.btn-s{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.btn-s:hover{color:var(--text);border-color:var(--accent)}

/* Bank */
.search-input{width:100%;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:0.92rem;outline:none;transition:border-color 0.2s;margin-bottom:12px}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.bank-list{display:flex;flex-direction:column;gap:6px;max-height:60vh;overflow-y:auto}
.bank-item{padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all 0.2s;display:flex;align-items:flex-start;gap:10px}
.bank-item:hover{border-color:var(--accent);background:var(--hover)}
.bank-num{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--text3);flex-shrink:0;margin-top:2px}
.bank-text{flex:1;font-size:0.88rem;color:var(--text2);line-height:1.5}

/* Complete screen */
.complete{text-align:center;padding:50px 20px}
.complete-icon{font-size:3.5rem;margin-bottom:14px}
.complete-title{font-size:1.6rem;font-weight:700;margin-bottom:6px}
.complete-sub{color:var(--text2);margin-bottom:28px}
.score-ring{display:inline-flex;align-items:center;justify-content:center;width:110px;height:110px;border-radius:50%;border:4px solid var(--accent);margin:0 auto 28px;font-size:1.8rem;font-weight:700;font-family:'JetBrains Mono',monospace}

/* Stats panel */
.stats-panel{padding:20px}
.topic-stat{margin-bottom:16px}
.topic-stat-name{font-size:0.92rem;font-weight:600;margin-bottom:6px}
.topic-stat-bar{height:8px;background:var(--bg3);border-radius:10px;overflow:hidden;margin-bottom:4px}
.topic-stat-fill{height:100%;border-radius:10px;transition:width 0.3s}
.topic-stat-info{font-size:0.78rem;color:var(--text3)}

/* Panel */
.panel{display:none;animation:fadeIn 0.3s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Responsive */
@media(max-width:600px){
  .container{padding:16px}
  h1{font-size:1.5rem}
  .practice-card{padding:20px 14px}
  .stats-bar{flex-wrap:wrap}
  .stat-item{min-width:50%;border-bottom:1px solid var(--border)}
}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>⚖️ 专利代理师练习系统</h1>
    <p class="subtitle">2026年专利代理师资格考试 · 综合强化训练</p>
    <div class="badges" id="header-badges"></div>
  </header>

  <nav class="main-tabs" id="main-tabs">
    <button class="main-tab active-patent" onclick="switchMain('patent')">📖 专利法 <small style="opacity:0.7;font-weight:400">775题</small></button>
    <button class="main-tab" onclick="switchMain('related')">📖 相关法 <small style="opacity:0.7;font-weight:400">833题</small></button>
  </nav>

  <nav class="tabs" id="sub-tabs">
    <button class="tab active" onclick="switchSub('practice')">🎯 练习模式</button>
    <button class="tab" onclick="switchSub('bank')">📚 题库浏览</button>
    <button class="tab" onclick="switchSub('stats')">📊 学习统计</button>
  </nav>

  <!-- 练习面板 -->
  <div id="panel-practice" class="panel active"></div>

  <!-- 题库面板 -->
  <div id="panel-bank" class="panel"></div>

  <!-- 统计面板 -->
  <div id="panel-stats" class="panel"></div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const PATENT_QUESTIONS = [
  {id: 1, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "以下关于专利法及其实施细则的哪些说法是正确的？", options: {"A": "专利法第四次修改自2021年6月1日起施行", "B": "专利法实施细则自2001年7月1日起施行", "C": "中国首部专利法于1985年4月1日公布并开始施行", "D": "专利法实施细则第三次修改自2024年1月20日起施行"}, answer: "ABD", explanation: "AC选项，中国首部专利法 于1984年3月12.日通过，并于1985年4月1 日起施行。一般地，法律公布时间和施行时 间都会有一定间隔，从而方便公众学习其法 律内容。专利法第四次修改自2021年6月 1日起施行，因此A选项正确，C选项错误。 B、D选项，现行专利法实施细则自2001年7 月1日起施行，经历过3次修改，第3次修改 自2024年1月20日起施行，因此B、D选项 正确。（新编，思维扩展）"},
  {id: 2, topic: "专题一 专利法基础知识与权利归属", type: "single", question: "以下哪些外观设计专利权的保护期为15年？", options: {"A": "2021年6月1日（含该日）以后的新申请", "B": "2021年5月31日（不含该日）以前的申请", "C": "2021年6月1日以后授权的外观设计专利", "D": "所有的外观设计专利"}, answer: "A", explanation: "专利法第四次修改将外观设计 专利的保护期从10年修改为15年。作为修 改过渡，根据《关于施行修改后专利法的相 关审查业务处理暂行办法》第11条的规定， 申请日为2021年5月31日（含该日）之前的 外观设计专利权的保护期限为10年，申请 日为2021年6月1日（含该日）以后的外观 设计专利权的保护期限为15年，因此A选 项正确。（新编）"},
  {id: 3, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "下列说法正确的是：", options: {"A": "在2024年1月20日以前可以依据专利法实施细则第11条驳回专利申请", "B": "在2024年1月20日以前实用新型可以不具备创造性", "C": "在2024年1月20日以后实用新型需要审核创造性", "D": "在2024年1月20日以后要求优先权的专利可以补人记载在在先专利申请文件中的技术内容"}, answer: "CD", explanation: "《细则》第三次修改于2024年1 月20日起施行。A选项，新细则施行前，《细 则》第11条尚未生效，审查员不能依据该条 款驳回专利申请，A选项错误。B、C选项， 新细则中规定实用新型专利初步审查中可 以对实用新型是否具有创造性进行审查。 《专利法》自1985年施行以来，一直要求实 用新型专利具有创造性，但是根据原《细则》 的规定，初步审查中不审查实用新型是否具 有创造性，其含义为实用新型应当具有创造 性，但是细则修改之前不审查，自2024年1 月20日起开始审查，因此B选项错误，C选 项正确。D选项的规定为援引加入制度，是 《细则》新增内容，说法正确。（新编）"},
  {id: 4, topic: "专题一 专利法基础知识与权利归属", type: "single", question: "王某于2024年5月3日完成了某项发明创造，并于2024年7月13日申请了专利；李某于2024年5月7日完成了同样的发明创造，并于2024年6月23日申请了专利。如果王、李二人的申请均符合其他授予专利权条件，则专利权应授予何人？", options: {"A": "王某", "B": "李某", "C": "王某和李某", "D": "由王某和李某协商确定"}, answer: "B", explanation: "《专利法》第9条第2款规定：“两 个以上的申请人分别就同样的发明创造申 请专利的，专利权授予最先申请的人”。本 题中，李某申请在先，专利权应授予李某，因 此B选项正确。（新编）"},
  {id: 5, topic: "专题一 专利法基础知识与权利归属", type: "single", question: "甲于2024年2月7日完成一项发明创造，并于2024年2月8日下午通过电子形式提交了专利申请；乙于2024年2月4日独立完成相同发明创造，并于2024年2月7日通过快递公司提交申请文件，专利局受理处于次日上午收到该申请文件。如果两件申请均符合其他授权条件，则专利权应当授予谁？", options: {"A": "甲", "B": "乙", "C": "甲和乙", "D": "甲和乙协商确定的人"}, answer: "D", explanation: "甲通过电子形式提交的专利申 请，以符合要求的申请文件进入专利局指定 的特定电子系统的日期为申请日；乙通过速 递公司递交到专利局受理处的专利申请，以 收到日为申请日，上午或下午收到在申请日 确定上无区别，二者属于同日申请，均为 2024年2月8日。《细则》第47条第1款规 定：“两个以上的申请人同日（指申请日；有 优先权的，指优先权日）分别就同样的发明 创造申请专利的，应当在收到国务院专利行 政部门的通知后自行协商确定申请人”，因 此D选项正确。（新编）"},
  {id: 6, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "下列说法哪些是正确的？", options: {"A": "申请专利过程中都应当遵循诚实信用原则，包括初审、实审、复审、无效程序", "B": "在专利授权之后，专利权人行使专利权也应当遵循诚实信用原则，不能滥用专利权", "C": "国务院专利行政部门应当按照客观、公正、准确、及时的要求，依法处理有关专利的申请和请求", "D": "在专利申请公布或者公告前，国家知识产权局的工作人员及有关人员对其内容负有保密责任"}, answer: "ABCD", explanation: "A、B选项，《专利法》第20条 第1款规定：“申请专利和行使专利权应当 遵循诚实信用原则。不得滥用专利权损害 公共利益或者他人合法权益”，上述规定指 的是申请和行使权利的全过程，包括在专利 的申请、初审、实审、授权办登、复审、无效、 侵权诉讼、许可等各个环节中都要遵循诚实 信用原则，因此A、B选项正确。C选项，《专 利法》第21条第1款规定：“国务院专利行政 部门应当按照客观、公正、准确、及时的要 求，依法处理有关专利的申请和请求”，C选 项正确。D选项，《专利法》第21条第3款规 定：在专利申请公布或者公告前，国务院专 利行政部门的工作人员及有关人员对其内 容负有保密责任”，D选项正确。（新编）"},
  {id: 7, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "关于诚信原则，下列哪些说法是正确的？", options: {"A": "北京市朝阳区知识产权局", "B": "北京市知识产权保护中心", "C": "北京市知识产权局", "D": "锡林郭勒盟知识产权局"}, answer: "ABCD", explanation: "根据《细则》第11条的规定， 申请专利应当遵循诚实信用原则。提出各 类专利申请应当以真实发明创造活动为基 础，不得弄虚作假，因此非正常专利申请的 行为违反了《细则》第11条规定的诚信原 则，因此A选项正确。专利法实施细则的其 他相关规定也明确指出，《细则》第11条属 于初审驳回、实审驳回以及无效宣告请求的 理由。因此B、C、D选项均正确。（新编）"},
  {id: 8, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "下列哪些说法是正确的？", options: {"A": "国务院专利行政部门负责管理全国的专利工作", "B": "管理专利工作的部门处理专利纠纷并责令侵权人对专利权人进行赔偿", "C": "省、自治区、直辖市人民政府管理专利工作的部门负责本行政区域内的专利管理工作", "D": "负责专利执法的部门对涉嫌假冒专利行为进行查处"}, answer: "ACD", explanation: "根据《细则》第95条的规定， 省、自治区、直辖市人民政府管理专利工作 的部门以及专利管理工作量大又有实际处 理能力的地级市、自治州、盟、地区和直辖市 的区人民政府管理专利工作的部门，可以处 理和调解专利纠纷。因此A、C、D选项的行 政部门都可以处理和调解专利纠纷。B选项 中北京市知识产权保护中心不是行政主体， 无权处理和调解专利纠纷。（新编，思维扩展）"},
  {id: 9, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "以下哪些说法是正确的？", options: {"A": "省、自治区、直辖市人民政府管理专利工作的部门，可以处理和调解专利纠纷", "B": "国务院专利行政部门可以应专利权人或者利害关系人的请求受理所有的专利侵权纠纷案件", "C": "地级市、自治州、盟、地区的管理专利的工作部门可以处理和调解专利纠纷", "D": "直辖市的区人民政府管理专利工作的部门，可以处理和调解专利纠纷"}, answer: "ACD", explanation: "A、C选项，《专利法》第3条规 定：“国务院专利行政部门负责管理全国的 专利工作；统一受理和审查专利申请，依法 授予专利权。省、自治区、直辖市人民政府 管理专利工作的部门负责本行政区域内的 专利管理工作”，A、C选项正确。B选项，管 理专利工作的部门在处理专利纠纷时，无权 决定侵权赔偿，只能对侵权赔偿进行调解， 因此，B选项错误。D选项，《专利法》第68 条规定：“假冒专利的，除依法承担民事责任 外，由负责专利执法的部门责令改正并予公 告·.…”，D选项正确。（新编）"},
  {id: 10, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "下列对发明、实用新型专利侵权纠纷第一审案件享有管辖权的是：", options: {"A": "省级人民政府所在地的中级人民法院", "B": "最高人民法院指定的基层人民法院", "C": "地级市人民政府所在地的中级人民法院", "D": "知识产权法院"}, answer: "ACD", explanation: "《细则》第95条规定：“省、自 洽区、直辖市人民政府管理专利工作的部门 以及专利管理工作量大又有实际处理能力 的地级市、自治州、盟、地区和直辖市的区人 民政府管理专利工作的部门，可以处理和调 解专利纠纷”因此A、C、D选项的行政部门 都可以处理和调解专利纠纷，表述正确。B 选项，《专利法》第70条第1款规定：“国务院 专利行政部门可以应专利权人或者利害关 系人的请求处理在全国有重大影响的专利 侵权纠纷”，因此，国务院专利行政部门不能 受理所有的专利侵权纠纷案件，B选项缺少 “重大影响”的表述，因此错误。（新编） 11、AD。根据《最高人民法院关于第 一审知识产权民事、行政案件管辖的若干规 定》第1~2条的规定，发明、实用新型专利 侵权纠纷第一审民事、行政案件由知识产权 法院，省、自治区、直辖市人民政府所在地的 中级人民法院和最高人民法院确定的中级 人民法院管辖。因此A、D选项正确，B、C选 项错误。（新编）"},
  {id: 11, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "下列关于外观设计第一审案件管辖权的说法正确的是？", options: {"A": "外观设计专利的侵权纠纷案件可由最高人民法院确定的基层人民法院管辖", "B": "外观设计专利的权属纠纷案件可由中级人民法院管辖", "C": "外观设计专利的侵权纠纷案件可由知识产权法院管辖", "D": "外观设计专利行政案件可由最高人民法院确定的基层人民法院管辖"}, answer: "ABC", explanation: "《最高人民法院关于第一审 知识产权民事、行政案件管辖的若干规定》 第2条第1款规定：“外观设计专利的权属、 侵权纠纷以及涉驰名商标认定第一审民事、 行政案件由知识产权法院和中级人民法院管 辖；经最高人民法院批准，也可以由基层人民 法院管辖，但外观设计专利行政案件除外”， 因此A、B、C选项正确，D选项错误。（新编）"},
  {id: 12, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "下列有关最高人民法院知识产权法庭的说法正确的是？", options: {"A": "知识产权法庭是最高人民法院派出的常设审判机构，设在北京市", "B": "知识产权法庭可以要求当事人披露涉案知识产权相关权属、侵权、授权确权等关联案件情况", "C": "知识产权法庭主要审理专利等专业技术性较强的知识产权上诉案件", "D": "知识产权法庭作出的判决、裁定、调解书和决定，是最高人民法院的判决、裁定、调解书和决定"}, answer: "ABCD", explanation: "《最高人民法院关于知识产 权法庭若干问题的规定》第1条规定：“最高 人民法院设立知识产权法庭，主要审理专利 等专业技术性较强的知识产权上诉案件。 知识产权法庭是最高人民法院派出的常设 审判机构，设在北京市。知识产权法庭作出 的判决、裁定、调解书和决定，是最高人民法 院的判决、裁定、调解书和决定”，A、C、D选 项正确。上述《规定》第4条规定：“知识产 权法庭可以要求当事人披露涉案知识产权 相关权属、侵权、授权确权等关联案件情况。 当事人拒不如实披露的，可以作为认定其是 否遵循诚实信用原则和构成滥用权利等的 考量因素”，B选项正确。（2019改编）"},
  {id: 13, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "下列有关专利权的说法错误的是？", options: {"A": "专利权的时间性是指专利权的期限届满后一律不得延长", "B": "排他性是指没有法律规定或未经权利人许可，任何人不得实施其发明创造", "C": "排他性是指专利权人就其获得授权的专利有自由实施的权利", "D": "根据地域性原则，专利权人在中国获得授权的专利权，也能在巴藜公约的其他成员国中获得保护"}, answer: "ACD", explanation: "A选项，专利权的期限截止 后一般不得延长，在满足专利权期限补偿的 条件下可以申请延长。B、C选项，专利权具 有排他性，专利权人有权禁止他人实施其专 利，但专利权人实施自已的专利也可能对他 人的在先专利权构成侵权，因此B选项正 确，C选项错误。D选项，专利权地域性是指 一个国家或地区所授予的专利权仅在该国 或地区的范围内有效，除此之外的国家和地 区不发生法律效力。（新编） I5.CD。A选项，某公司知识产权部只 是一个公司的部门，不具备法人资格，不能 作为专利申请人。B选项，《专利代理条例》 第18条规定：“专利代理机构和专利代理师 不得以自己的名义申请专利或者请求宣告 专利权无效”，B选项为专利代理机构，不能 作为专利审请入。C选项，十罗小学生甲虽 然属于限制民事行为能力人，但仍然可以作 为专利申请人、C选项正确。D选项，《专利 法》第17条规定：“在中国没有经常居所或 者营业所的外国人、外国企业或者外国其他 组织在中国申请专利的，依照其所属国同中 国签订的协议或者共同参加的国际条约，或 者依照互惠原则，根据本法办理”，美国是巴 黎公约成员国，美国公司可以作为专利申请 人，D选项正确。(2019)"},
  {id: 14, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "下列哪些可以作为申请人申请专利？", options: {"A": "某公司知识产权部", "B": "某知识产权代理有限责任公司", "C": "北京某十岁小学生甲", "D": "在我国境内没有营业所的美国公司"}, answer: "AB", explanation: "A选项，《专利法》第16条第1 款规定：“发明人或者设计人有权在专利文 件中写明自己是发明人或者设计人”，本题 中，张某为发明人，因此A选项正确。B选 项，根据《专利法》第15条第1款的规定，被授 予专利权的单位应当对职务发明创造的发明 人或者设计人给予奖励，因此B选项正确。C 选项，张某是发明人，电机厂为专利权人，未 经电机厂允许，张某不得实施该专利，C选 项错误。D选项，根据《专利法》第65条的规 定，侵犯其专利权，引起纠纷的，专利权人或 者利害关系人可以向人民法院起诉。张某 不是专利权人或者利害关系人，无权向人民 法院提起诉讼，因此D选项错误。（2010）"},
  {id: 15, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "某电机厂职工张某所作的职务发明被授予了专利权下列说法哪些是正确的？", options: {"A": "张某有权在申请文件中写明自已是发明人", "B": "张某有权从该电机厂获得奖励", "C": "在该电机厂不实施该专利的情况下，张某有权实施专利", "D": "在该专利权被侵犯时，张某有向人民法院提起诉讼权利"}, answer: "ABD", explanation: "A选项中A公司退休返聘的 周某、B选项中从B公司借调到A公司的吴 某、D选项中从A公司辞职半年内的王某， 都是执行A公司任务或本职工作所完成的 发明创造，均属于职务发明创造，申请专利 的权利属于A公司，因此A、B、D选项正确。 C选项，A公司技术人员郑某利用本公司对 外公开的技术资料所作的与本职工作无关 的发明创造，属于非职务发明创造，申请专 利的权利属于发明人郑某，因此C选项错 误。（2007改编）"},
  {id: 16, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "在下列哪些情形中完成的发明创造，申请专利的权属于A公司？", options: {"A": "周某是A公司的退休返聘人员，在执行A公司任务时完成的发明创造", "B": "吴某是A公司从B公司借调的人员，在执行A公司任时所完成的发明创造", "C": "郑某是A公司的技术人员，利用本公司对外公开的技资料所作的与本职工作无关的发明创造", "D": "王某在从A公司辞职后的半年内，作出的与其在A公承担的本职工作有关的发明创造"}, answer: "ABC", explanation: "A选项的金某临时受聘到甲 公司，甲公司是其临时单位，所作的发明创 造属于甲公司职务发明创造；B选项的吕某 在甲公司作出发明创造后离职，仍属于甲公 司职务发明创造；C选项的王某主要利用甲 公司不对外公开的技术信息所作出的发明 创造，属于甲公司职务发明创造，A、B、C选 项均正确。D选项的刘某离开甲公司一年 后作出的，与其在原单位甲公司承担的本职 工作有关的发明创造，不属于甲公司职务发 明创造。由于是受乙公司指派，因此属于乙 公司的职务发明创造。（新编）"},
  {id: 17, topic: "专题一 专利法基础知识与权利归属", type: "single", question: "下列哪些属于甲公司职务发明创造？", options: {"A": "金某临时受聘到甲公司参与某产品的研发所作出的明创造", "B": "吕某在完成本职工作中于2023年1月20日作出一项明创造，2024年6月1日从甲公司辞职", "C": "王某主要利用甲公司未公开的技术信息作出的发创造", "D": "刘某与甲公司于2023年6月5日终止劳动合同，之后2023年6月6日与乙公司订立劳动合同。刘某受乙公司的派，于2024年7月8日作出了一项与其在甲公司的本职工作关的发明"}, answer: "A", explanation: "本题中，甲、乙、丙均为X公司 的工作人员（根据题干给出的情节推知），均 为执行X公司的任务，对发明创造的实质性 特点作出创造性贡献，且甲在申请专利时距 离从X公司离职未满1年，因此该专利申请 权应归X公司所有，甲、乙、丙共为发明人， 均享有发明人的署名权，因此A选项正确， B、C、D选项错误。（2018）"},
  {id: 18, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "甲是X公司的研究人员，与乙、丙共同承担了一种数字交换机的具体研制工作，2023年6月，甲于该研制工作中途辞职继续独自开展相关数字交换机的开发工作。2024年4月，甲完成该研制工作，成功开发出了某型数字交换机，并于2024年5月以甲个人名义申请专利。则以下说法正确的是？", options: {"A": "该专利申请权应归X公司所有，甲、乙、丙均享有发明人的署名权", "B": "该专利申请权应归X公司所有，仅甲享有发明人的署名权", "C": "该专利申请权应归甲个人所有，甲享有发明人的署名权", "D": "该专利申请权应归甲个人所有，但X公司享有免费使用权"}, answer: "BCD", explanation: "根据《细则》第93条的规定， 被授予专利权的单位未与发明人、设计人约 定的，应当自公告授予专利权之日起3个月 内发给发明人或者设计人奖金。一项发明 专利的奖金最低不少于4000元；根据《专利 法》第15条第2款的规定，国家鼓励被授予 专利权的单位实行产权激励，采取股权、期 权、分红等方式，使发明人或者设计人合理 分享创新收益。因此A错误、C选项正确。 B、D选项，公司规定或与发明人约定的奖励 金额或者实际发放的金额、时间可以超过法 定金额或早于法定时间，有约定的约定优 先，因此D正确。（新编）"},
  {id: 19, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "某公司员工张某完成的一项职务发明创造获得了发明专利权，关于奖励和报酬下列说法哪些是正确的？", options: {"A": "对奖励和报酬没有规定也没有约定的，该公司应当自收到授予专利权通知书之日起3个月内发给张某奖金", "B": "对奖励和报酬没有规定也没有约定的，该公司在发明申请之后3个月内给予张某4000元的奖金", "C": "该公司可以通过股权、期权、分红等方式进行产权激励", "D": "该公司可以在规章中规定，发明专利取得专利权3个月内，给予发明人6000元的奖励"}, answer: "BC", explanation: "A、C选项，公司给予王某奖金 时间超出授权公告之日起3个月，A选项错 误。给予王某奖金5000元（高于法定最低 标准4000元）符合法定标准，C选项正确。B 选项，李某未对发明创造的实质性特点作出 创造性贡献，不是发明人，B选项正确。D选 项，根据《中华人民共和国促进科技成果转化 法》第45条的规定，该公司应给予王某不低 于100万元的法定报酬，D选项错误。（新编）"},
  {id: 20, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "某公司员工王某在本职工作中独立完成了一项发明创造。该公司就该发明创造提交了发明专利申请，在提交的专利申请文件中将王某和总经理李某署名为共同发明人。在发明专利权授予1年后，发给王某5000元人民币作为奖金。此外，该公司每年从获得的实施许可费200万元中拿出10万元和1万元分别支付给王某和李某作为报酬。下列哪些说法是正确的？", options: {"A": "该公司给予王某奖金的时间符合法定期限", "B": "该公司不应当将李某署名为发明人", "C": "该公司给予王某5000元的奖金符合法定标准", "D": "该公司给予王某10万元的报酬符合法定标准"}, answer: "ACD", explanation: "《专利法》第14条规定：“专利 申请权或者专利权的共有人对权利的行使 有约定的，从其约定；没有约定的，共有人可 以单独实施或者以普通许可方式许可他人 实施该专利；许可他人实施该专利的，收取 的使用费应当在共有人之间分配。除前款 规定的情形外，行使共有的专利申请权或者 专利权应当取得全体共有人的同意”。本题 中，专利权的转让、入股、出质均涉及共有权 利，需取得全体共有人的同意，A、C、D选项 正确。普通许可无需取得全体共有人的同 意，B选项错误。（2015改编）"},
  {id: 21, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "对于共有的专利权，在共有人无任何约定的情形下，下列哪种行为需要获得全体共有人的同意？", options: {"A": "专利权的转让", "B": "专利权的普通实施许可", "C": "以专利权入股", "D": "专利权的出质"}, answer: "ABD", explanation: "本题中的甲、乙、丙、丁为专 利权共有人，丁可以自行实施，收益独享，A 选项说法错误。甲普通许可无需取得全体 共有人的同意，B选项说法错误，C选项说法 正确。排他许可涉及共有权利，应当取得全 体共有人的同意，D选项说法错误。（2018)"},
  {id: 22, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "甲、乙、丙、丁四人合作研制出新型加湿器，共同申请专利并获得授权，但甲、乙、丙、丁四人未就专利权的行使作出明确约定。甲欲将该专利以普通许可的方式许可A公司使用，乙欲将该专利以排他许可的方式许可B公司使用，丙对这两种许可均表示反对，丁未与甲、乙、丙协商自行实施该专利技术。则下列哪些说法是错误的？", options: {"A": "丁自行实施该专利所获得收益应当与甲、乙、丙分享", "B": "如果丙反对，甲、乙均无权与A公司、B公司签署许可合同", "C": "甲有权不顾丙的反对，将该专利技术以普通许可的方式许可给A公司实施", "D": "只要乙同意与甲、丙、丁分享专利许可费，乙就可以自行与B公司签署排他许可协议"}, answer: "CD", explanation: "本题中，甲乙均可以普通许可 的方式许可他人实施专利，且使用费应当在 共有人之间分配，因此A选项错误。甲可以 单独实施专利，且无需分享其收益，因此C 选项正确。甲的权利转让、独占许可均涉及 共有权利，需取得全体共有人的同意，因此 B选项错误，D选项正确。（2019)"},
  {id: 23, topic: "专题一 专利法基础知识与权利归属", type: "single", question: "甲、乙二人合作开发一项产品，申请了专利并获得专利权。二人未就该专利权的行使进行任何约定，下列说法正确的是？", options: {"A": "甲、乙二人可分别以普通许可的形式许可他人实施专利，并分别收取使用费，使用费无需重新分配", "B": "甲可将自已对该专利享有的权利转让给丙，而无需取得乙的同意", "C": "甲可单独实施该专利，无需取得乙的同意，且获得的收益也无需和乙分配", "D": "甲必须取得乙的同意才能以独占许可的方式许可他人实施该专利"}, answer: "D", explanation: "本题中，乙公司的李某和甲公 司的周某均对发明创造的实质性特点作出 创造性贡献，且受各自公司指派参与研发工 作，均属于职务发明创造，因此申请专利的权 利属于甲公司和乙公司，D选项正确。（2019）"},
  {id: 24, topic: "专题一 专利法基础知识与权利归属", type: "single", question: "甲公司委托乙公司研发某产品，乙公司指定员工李某承担此项研发任务。后来,为了加快研发进度，甲公司又派员工周某参与研发。李某和周某共同在研发过程中完成了一项发明创造。在没有任何约定的情形下，该发明创造申请专利的权利属于下列哪个公司或个人？", options: {"A": "李某和周某", "B": "甲公司", "C": "乙公司", "D": "甲公司和乙公司"}, answer: "C", explanation: "本题中，乙研究所的研究人员 和已退休两年的丙共同完成发明创造，其中 乙研究所的研究人员完成的发明创造为职 务发明创造，其权利归属于单位，丙已退休， 和乙公司为合作关系，其完成的发明创造， 不属于原单位的职务发明创造，归属于个 人。注意题干中给出的信息是乙单位邀请 丙一起开发，而不是聘用丙，因此专利申请 权应属于乙和丙共有，C选项正确。（2018）"},
  {id: 25, topic: "专题一 专利法基础知识与权利归属", type: "multiple", question: "甲钢铁公司委托乙研究所为其开发一种新的钢铁冶炼方法，乙在开发过程中由于研究人员短缺，经甲同意邀请已退休两年的科研人员丙一起进行开发，并共同完成了该项任务。甲、乙、丙之间均未就开发成果申请专利的事宜进行约定。下列关于该钢铁冶炼方法专利申请权归属的说法哪些是正确的？", options: {"A": "属于乙", "B": "属于甲和乙共有", "C": "属于乙和丙共有", "D": "属于甲、乙、丙共有专利代理制度"}, answer: "CD", explanation: "A选项中咨询公司从名称上看 不属于专利代理机构，也未获得国务院专利 行政部门的行政审批，不是专利代理机构； B选项中“某公司的知识产权部”属于公司 内的部门，不是专利代理机构，因此A、B选 项错误。C、D选项中的机构均获得国务院 专利行政部门的行政审批，属于符合规定的 专利代理机构，因此C、D选项正确。（新编）"},
  {id: 26, topic: "专题二 专利代理制度", type: "multiple", question: "下列哪些机构属于专利代理条例中所说的专利代理机构？", options: {"A": "某知识产权咨询公司，该公司由获得专利代理师资格证的王某在工商行政管理部门注册成立", "B": "某公司的知识产权部，该部门的主要职责是为本公司办理专利申请和办理其他专利事务", "C": "某律师事务所，该律师事务所经国务院专利行政部门批准开办专利代理业务", "D": "某知识产权代理有限责任公司，该公司经国务院专利行政部门批准办理专利代理业务，并到工商行政管理部门进行了登记"}, answer: "CD", explanation: "A、B选项中的机构均经国务院 专利行政部门批准获得专利代理机构执业 许可证，可以以自已的名义办理专利代理业 务。C选项中科技服务公司不属于专利代 理机构，D选项是专利代理机构的分支机 构，均不能以自已的名义办理专利代理业 务，因此C、D选项正确。（新编）"},
  {id: 27, topic: "专题二 专利代理制度", type: "multiple", question: "根据《专利代理管理办法》，下列哪些机构不得以自已的名义办理专利代理业务？", options: {"A": "获得专利代理机构执业许可证的某知识产权代理有限公司", "B": "获得专利代理机构执业许可证的某律师事务所", "C": "某科技服务有限公司", "D": "某专利代理事务所石家庄分所"}, answer: "ACD", explanation: "《专利代理师资格考试办法》 第21条规定：“符合以下条件的中国公民， 可以报名参加考试：（一）具有完全民事行为 能力；（二）取得国家承认的理工科大专以上 学历，并获得毕业证书或者学位证书。香港 特别行政区、澳门特别行政区永久性居民中 的中国公民和台湾地区居民可以报名参加 考试”，A选项中台湾地区居民甲、C选项中 丙均符合报名条件，A、C选项正确。B选项 中乙不具备理工科学历，不符合报名条件。 《专利代理师资格考试办法》第23条规定： “有下列情形之一的，不得报名参加考试： （一）因故意犯罪受过刑事处罚，自刑罚执行 完毕之日起未满三年·”，D选项中丁所 犯交通肇事罪属过失犯罪，不受刑满3年时 间限制，服刑期间以及服刑结束后都可以报 名参加考试，符合报名条件，D选项正确。 （2019改编）"},
  {id: 28, topic: "专题二 专利代理制度", type: "multiple", question: "以下哪些人员可以报名参加专利代理师资格考试？", options: {"A": "台湾地区居民甲，22岁，刚刚从北京某大学机械系本科毕业", "B": "中国公民乙，18岁，在中国某大学新闻系读大一", "C": "中国公民丙，30岁，中国某大学物理系毕业，在某律师事务所任职3年", "D": "中国公民丁，28岁，毕业于中国某大学化学系，曾犯交通肇事罪，现已刑满释放"}, answer: "BCD", explanation: "《专利代理管理办法》第26条 规定：“专利代理师执业应当符合下列条件。 （一）具有完全民事行为能力；·（三）在专 利代理机构实习满一年，但具有律师执业经 历或者三年以上专利审查经历的人员除 外；…·（五）能专职从事专利代理业 务………”。B选项中钱某实习未满一年，且 没有律师执业经历或专利审查经历；C选项 中孙某不具有完全行为能力；D选项中该工 作人员不能专职从事专利代理业务，均不符 合执业条件。A选项，执业人员没有年龄的 限制，A选项中赵某的年龄不是执业需要符 合的条件。（2011改编）"},
  {id: 29, topic: "专题二 专利代理制度", type: "multiple", question: "下列获得专利代理师资格证的人员，哪些不符合执业条件？", options: {"A": "73岁的赵某", "B": "实习未满一年的钱某，且没有律师执业经历或专利审查经历", "C": "不具有完全民事行为能力的孙某", "D": "某企业知识产权部工作人员"}, answer: "AC", explanation: "《专利代理管理办法》第10条规 定：“合伙企业形式的专利代理机构申请办 理执业许可证的，应当具备下列条件： （四）有两名以上合伙人…”，合伙企业形 式包括特殊普通合伙，因此A选项正确，B 选项错误。《专利代理管理办法》第11条规 定：“有限责任公司形式的专利代理机构申 请办理执业许可证的，应当具备下列条 件：……（四）有五名以上股东·”，C选项 正确。《专利代理管理办法》第12条规定： “律师事务所申请办理执业许可证的，应当 具备下列条件：…（二）有两名以上合伙人 或者专职律师具有专利代理师资格证”，D 选项错误。（2011改编）"},
  {id: 30, topic: "专题二 专利代理制度", type: "multiple", question: "下列关于专利代理机构的说法哪些是正确的？", options: {"A": "普通合伙制专利代理机构应当由2名以上合伙人共同出资发起设立", "B": "特殊的普通合伙制专利代理机构应当由3名以上合伙人共同出资发起设立", "C": "有限责任制专利代理机构应当由5名以上股东共同出资发起设立", "D": "律师事务所开办专利代理业务的，其具有专利代理师资格的专职律师不得少于3名"}, answer: "CD", explanation: "根据《专利代理管理办法》第 10条的规定，合伙企业形式的专利代理机 构申请办理执业许可证的，应当有2名以上 合伙人；合伙人具有专利代理师资格证，并 有2年以上专利代理师执业经历，因此A选 项错误，D选项正确。根据《专利代理管理 办法》第15条的规定，申请专利代理机构执 业许可证的，应当向国家知识产权局提交申 请，B选项错误。根据《专利代理条例》第16 条的规定，专利代理师不得同时在2个以上 专利代理机构从事专利代理业务。同样，作 为专利代理师的合伙人也不得作为另一专 利代理机构的合伙人，C选项正确。（2015 改编）"},
  {id: 31, topic: "专题二 专利代理制度", type: "multiple", question: "关于合伙企业形式的专利代理机构，下列说法哪些是正确的？", options: {"A": "应当有3名以上合伙人发起", "B": "应当先向省、自治区、直辖市人民政府管理专利工作的部门申请", "C": "作为另一专利代理机构的合伙人不得作为新设立的专利代理机构的合伙人", "D": "合伙人应当作为专利代理师执业2年以上"}, answer: "ABD", explanation: "根据《专利代理管理办法》第 13条的规定，（一）不具有完全民事行为能 力；（二）因故意犯罪受过刑事处罚；（三）不 能专职在专利代理机构工作；（四）所在专利 代理机构解散或者被撤销、吊销执业许可 证，未妥善处理各种尚未办结的专利代理业 务，不得作为专利代理机构的合伙人、股东。 因此A、B、D选项当选。根据《专利代理管 理办法》第11条的规定，代理公司须有五分 之四以上股东以及公司法定代表人具有专 利代理师资格证，因此C选项并非必须。 （新编）"},
  {id: 32, topic: "专题二 专利代理制度", type: "multiple", question: "下列哪些属于知识产权代理公司股东必须满足的条件？", options: {"A": "具有完全民事行为能力", "B": "没有因故意犯罪受过刑事处罚", "C": "具备专利代理师资格证", "D": "专职从事专利代理业务"}, answer: "BD", explanation: "《专利代理管理办法》第14条第 1款规定：“…除律师事务所外，专利代理 机构的名称中应当含有“专利代理”或者“知 识产权代理”等字样。专利代理机构分支机 构的名称由专利代理机构全名称、分支机构 所在城市名称或者所在地区名称和“分公 司”或者“分所”等组成”，因此A、C选项 不符合规定，B、D选项符合规定。（新编）"},
  {id: 33, topic: "专题二 专利代理制度", type: "multiple", question: "依据《专利代理管理办法》的规定，下列专利代理机构名称符合规定的有：", options: {"A": "远航知识产权事务所", "B": "远航知识产权代理有限公司", "C": "远航专利事务所重庆分所", "D": "远航专利代理有限公司重庆分公司"}, answer: "BD", explanation: "《专利代理管理办法》第20条规 定：“专利代理机构设立分支机构办理专利 代理业务的，应当具备下列条件：（一）办理 专利代理业务时间满两年；（二）有十名以上 专利代理师执业，拟设分支机构应当有一名 以上专利代理师执业，并且分支机构负责人 应当具有专利代理师资格证；*（四）设立 分支机构前三年内未受过专利代理行政处 罚；（五）设立分支机构时未被列入经营异常 名录或者严重违法失信名单”。A选项中机 构执业人数不够；C选项中时间未满两年， 因此A、C选项均不符合条件。B选项受过 专利代理行政处罚但在三年前，符合条件， 当选。D选项，机构申请设立分支机构时已 经移出经营异常名录，因此符合条件，当选。 （2011改编）"},
  {id: 34, topic: "专题二 专利代理制度", type: "multiple", question: "下列哪些专利代理机构符合设立分支机构的条件？是否被列人经营专利代理机构专利代理机构类型人数异常名录或严重已设立时间违法名单某专利代理事务所8人两年半否", options: {"A": "(普通合伙）四年前受过省知某专利代理事务所11人七年", "B": "识产权局警告（特殊普通合伙）某知识产权代理有一年13人否", "C": "限公司被列入经营异常某知识产权代理有15人四年", "D": "名录半年前移出限公司"}, answer: "AC", explanation: "A、B选项，《专利代理管理办 法》第21条规定：“专利代理机构的分支机 构不得以自已的名义办理专利代理业务。 专利代理机构应当对其分支机构的执业活 动承担法律责任”，A选项说法错误，B选项 说法正确。C、D选项，《专利代理管理办法》 第22条第1款规定：“专利代理机构设立、变 更或者注销分支机构的；向分支机构所 在地的省、自治区、直辖市人民政府管理专 利工作的部门进行备案”，C选项说法错误， D选项说法正确。（2018改编）"},
  {id: 35, topic: "专题二 专利代理制度", type: "multiple", question: "甲省某专利代理机构在乙省设有分支机构，对于该分支机构的管理，以下做法错误的是？", options: {"A": "为便于该分支机构开展业务活动，该专利代理机构许可该分支机构以自已名义办理专利代理业务", "B": "专利代理机构应当对其分支机构的执业活动承担法律责任", "C": "该专利代理机构拟撤销设该分支机构，应当向甲省知识产权局提出备案", "D": "该专利代理机构变更该分支机构负责人的，应当向乙省知识产权局提出备案"}, answer: "AD", explanation: "《外国专利代理机构在华设立 常驻代表机构管理办法》第7条规定：“外国 专利代理机构申请在华设立常驻代表机构 许可，应当具备下列条件：（一）在国外合法 成立；（二）实质性开展专利代理业务5年以 上，并且没有因执业行为受过自律惩戒或者 行政处罚；（三）代表机构的首席代表具备完 全民事行为能力，具有专利代理师资格，专 利代理执业经历不少于3年，没有因执业行 为受过自律惩戒或者行政处罚，没有因故意 犯罪受过刑事处罚；（四）在其本国有10名 以上专利代理师执业”，因此A、D选项正 确，B、C选项错误。（新编）"},
  {id: 36, topic: "专题二 专利代理制度", type: "multiple", question: "外国专利代理机构申请在华设立常驻代表机构许可，应当具备下列哪些条件？", options: {"A": "该外国专利代理机构在国外已合法成立", "B": "该外国专利代理机构实质性开展专利代理业务2年以上，并且没有因执业行为受过自律惩戒或者行政处罚", "C": "代表机构的首席代表具备完全民事行为能力，具有专利代理师资格，专利代理执业经历不少于2年、没有因执业行为受过自律惩戒或者行政处罚，没有因故意犯罪受过刑事处罚", "D": "该外国专利代理机构在其本国有10名以上专利代理师执业"}, answer: "ABC", explanation: "《外国专利代理机构在华设 立常驻代表机构管理办法》第14条规定： “代表机构可以依法从事下列业务活动： （一）向当事人提供该外国专利代理机构已 获准从事专利代理业务国家或者地区的专 利事务咨询；（二）接受当事人或者中国专利 代理机构的委托，办理在该外国专利代理机 构已获准从事专利代理业务国家或者地区 的专利事务；（三）接受当事人或者中国专利 代理机构的委托，为我国企业海外投资、海外 预警、海外维权等涉专利事务提供专业化咨 询服务；（四）代表外国当事人，委托中国专利 代理机构办理中国专利事务。代表机构应当 依法开展业务活动，不得从事代理专利申请 和宣告专利权无效等中国专利事务以及中 国法律事务”，因此A、B、C选项正确，D选项 不符合上述第（四)项规定，错误。（新编）"},
  {id: 37, topic: "专题二 专利代理制度", type: "multiple", question: "关于外国专利代理机构在华设立的常驻代表机构，下列说法正确的是？", options: {"A": "可以向当事人提供该外国专利代理机构已获准从事专利代理业务国家或者地区的专利事务咨询", "B": "可以接受当事人或者中国专利代理机构的委托，办理在该外国专利代理机构已获准从事专利代理业务国家或者地区的专利事务", "C": "可以接受当事人或者中国专利代理机构的委托，为我国企业海外投资、海外预警、海外维权等涉专利事务提供专业化咨询服务", "D": "可以从事代理专利申请和宣告专利权无效等中国专利事务以及中国法律事务"}, answer: "BCD", explanation: "A选项，根据《专利代理条 例》第14条第1款的规定，专利代理机构接 受委托，应当与委托人订立书面委托合同。 专利代理师不能与委托人签合同，A选项错 误。B选项，《专利代理条例》第2条规定： “本条例所称专利代理，是指专利代理机构 接受委托，以委托人的名义在代理权限范围 内办理专利申请、宣告专利权无效等专利事 务的行为”，B选项正确。C选项，《专利代理 条例》第14条第1款规定：“….专利代理机 构接受委托后，不得就同一专利申请或者专 利权的事务接受有利益冲突的其他当事人 的委托”，C选项正确。D选项，《专利代理条 例》第18条规定：“专利代理机构和专利代 理师不得以自已的名义申请专利或者请求 宣告专利权无效”，D选项正确。（2011）"},
  {id: 38, topic: "专题二 专利代理制度", type: "multiple", question: "下列关于专利代理的说法哪些是正确的？", options: {"A": "专利代理师承办专利代理业务，应当与委托人签订委托合同，写明委托事项和委托权限", "B": "接受委托的专利代理机构应当以委托人的名义，在代理权限范围内办理专利申请或者办理其他专利事务", "C": "专利代理机构接受委托后，不得就同一内容的专利事务接受有利害关系的其他委托人的委托", "D": "专利代理师在从事专利代理业务期间;不得申请专利"}, answer: "ACD", explanation: "A、C选项，《专利代理管理 办法》第29条规定：“专利代理师从专利代 理机构离职的，应当妥善办理业务移交手 续。专利代理师转换执业专利代理机 构的，应当自转换执业之日起三十日内进行 执业备案变更……”，A、C选项正确。B选 项，根据《专利代理条例》第16条的规定，专 利代理师不得同时在两个以上专利代理机 构从事专利代理业务，B选项错误。D选项， 根据《专利代理管理办法》第10条的规定， 合伙人应当具有专利代理师资格证，并有2 年以上专利代理师执业经历。徐某到乙机 构时执业不到2年，不能成为合伙人，D选项 正确。（2012改编）"},
  {id: 39, topic: "专题二 专利代理制度", type: "multiple", question: "徐某2020年通过了全国专利代理师资格考试，2021年3月到甲专利代理机构实习,2022年6月办理了专利代理师执业备案。2023年8月徐某到某市乙专利代理事务所工作。下列说法哪些是正确的？", options: {"A": "徐某离开甲专利代理机构前，必须妥善处理尚未办结的专利代理案件", "B": "徐某到乙专利代理机构工作后，可以兼职在甲专利代理机构从事专利代理业务", "C": "徐某到乙专利代理机构工作时，需要办理专利代理师执业备案变更", "D": "徐某到乙专利代理机构工作时，不能成为合伙人"}, answer: "AC", explanation: "A选项，《专利代理条例》第18 条规定：“专利代理机构和专利代理师不得 以自已的名义申请专利或者请求宣告专利 权无效”。但刘某是在成为执业代理师之前 提交的专利申请，符合规定，A选项正确。B 选项，《专利代理条例》第16条第2款规定： “专利代理师不得同时在两个以上专利代理 机构从事专利代理业务”，专利事务咨询也 属于专利代理业务，且刘某并非由专利代理 机构委派，属于自已兼职，不符合规定，B选 项错误。C选项，《专利代理条例》第17条规 定：“专利代理机构和专利代理师对其在执 业过程中了解的发明创造的内容，除专利申 请已经公布或者公告的以外，负有保守秘密 的义务”，专利代理师对专利公开的技术内 容不再承担保密责任，C选项正确。D选项， 《专利代理条例》第16条第1款规定：“专利 代理师应当根据专利代理机构的指派承办 专利代理业务，不得自行接受委托”，D选项 错误。（2017改编）"},
  {id: 40, topic: "专题二 专利代理制度", type: "multiple", question: "刘某于2021年通过了全国专利代理师资格考试，于2022年5月到某代理公司工作，2023年9月办理了执业备案。刘某的下列哪些行为符合相关规定？", options: {"A": "刘某作为申请人于2022年6月向国家知识产权局提交了一件外观设计专利申请", "B": "刘某在该代理公司任职期间，到另一家专利代理公司兼职从事有关专利事务方面的咨询工作", "C": "刘某在该代理公司任职期间，在国家知识产权局将其代理的一件发明专利申请公布后，将该专利申请的内容告诉了其好友", "D": "刘某在该代理公司任职期间，以自已的名义接受好友的委托，代理其提交了一件实用新型专利申请，并收取了代理费"}, answer: "ABCD", explanation: "A、B选项，《专利代理条 例》第25条第1款规定：“专利代理机构有下 列行为之一的，由省、自治区、直辖市人民政 府管理专利工作的部门责令限期改正，予以 警告，可以处10万元以下的罚款；情节严重 或者逾期未改正的，由国务院专利行政部门 责令停止承接新的专利代理业务6个月至 12个月，直至吊销专利代理机构执业许可 证：…（三）指派专利代理师承办与其本人 或者其近亲属有利益冲突的专利代理业务； 【B选项】..（五）疏于管理，造成严重后 果”。《专利代理管理办法》第51条规定：“专 利代理机构有下列情形之一的，属于《专利 代理条例》第25条规定的“疏于管理，造成 严重后果”的违法行为：··（二）从事非正 常专利申请行为，严重扰乱专利工作秩序 【A选项】….”，因此A、B选项正确。C、D 选项，《专利代理条例》第26条第1款规定： “专利代理师有下列行为之一的，由省、自治 区、直辖市人民政府管理专利工作的部门责 令限期改正，予以警告，可以处5万元以下 的罚款；情节严重或者逾期未改正的，由国 务院专利行政部门责令停止承办新的专利 代理业务6个月至12个月，直至吊销专利代 理师资格证：（二）自行接受委托办理专 利代理业务；（五）泄露委托人的发明创 造内容，或者以自已的名义申请专利或请求 宣告专利权无效”，C、D选项正确。（新编）"},
  {id: 41, topic: "专题二 专利代理制度", type: "multiple", question: "下列关于专利代理说法正确的是？", options: {"A": "专利代理机构从事非正常专利申请行为，严重扰乱专利工作秩序，可以由所在省、自治区、直辖市人民政府管理专利工作的部门责令限期改正，予以警告", "B": "专利代理机构指派专利代理师承办与其本人或者其近亲属有利益冲突的专利代理业务，可以由所在省、自治区、直辖市人民政府管理专利工作的部门处10万元以下的罚款", "C": "专利代理师自行接受委托办理专利代理业务，情节严重的，可以由国务院专利行政部门吊销专利代理师资格证", "D": "专利代理师泄露委托人的发明创造内容，可以由国务院专利行政部门责令停止承办新的专利代理业务6个月至12个月"}, answer: "ACD", explanation: "《专利代理条例》第26条第1 款规定：“专利代理师有下列行为之一的，由 省、自治区、直辖市人民政府管理专利工作 的部门贵令限期改正，予以警告，可以处5 万元以下的罚款；情节严重或者逾期未改正 的，由国务院专利行政部门责令停止承办新 的专利代理业务6个月至12个月，直至吊销 专利代理师资格证…….”，因此A、C、D选项 均正确，B选项应是5万元以下罚款。（2018 改编）"},
  {id: 42, topic: "专题二 专利代理制度", type: "multiple", question: "专利代理师违反有关法律、法规和规章规定的，对专利代理师给予的处罚包括：", options: {"A": "警告", "B": "10万元以下罚款", "C": "责令停止承办新的专利代理业务6个月至12个月", "D": "吊销专利代理师资格证"}, answer: "ABCD", explanation: "根据《专利代理条例》第26 条第1款的规定，对专利代理师处罚的适用 行为包括：自行接受委托办理专利代理业 务；同时在两个以上专利代理机构从事专利 代理业务；泄露委托人的发明创造内容，或 者以自已的名义申请专利或请求宣告专利 权无效。因此A、B、C、D选项均符合规定， 当选。（2016)"},
  {id: 43, topic: "专题二 专利代理制度", type: "multiple", question: "专利代理师有下列哪些情形的应当受到行政处罚？", options: {"A": "同时在两个以上专利代理机构执业的", "B": "自行接受委托", "C": "泄露发明创造内容", "D": "出于公益目的，实名请求宣告某专利无效"}, answer: "ABCD", explanation: "根据《专利代理条例》第25 条第1款的规定，对专利代理机构处罚的适 用行为包括：合伙人、股东或者法定代表人 等事项发生变化未办理变更手续；就同一专 利申请或者专利权的事务接受有利益冲突 的其他当事人的委托；指派专利代理师承办 与其本人或者其近亲属有利益冲突的专利 代理业务；泄露委托人的发明创造内容，或 者以自已的名义申请专利或请求宣告专利 权无效。因此A、B、C、D选项均符合规定， 当选。（2019)"},
  {id: 44, topic: "专题二 专利代理制度", type: "multiple", question: "针对专利代理机构的下列哪些行为，视情节严重程度，主管部门可以做出警告、罚款、责令停业、直至吊销执业许可证的行政处罚？", options: {"A": "合伙人、股东或者法定代表人等事项发生变化未办理变更手续", "B": "就同一专利申请或者专利权的事务接受有利益冲突的其他当事人的委托", "C": "指派专利代理师承办与其本人或者其近亲属有利益冲突的专利代理业务", "D": "泄露委托人的发明创造内容，或者以自已的名义申请专-14 -利或请求宣告专利权无效"}, answer: "ABCD", explanation: "《专利代理管理办法》第37 条规定：“专利代理机构有下列情形之一的， 按照国家有关规定列入经营异常名录：（一） 未在规定的期限提交年度报告…（四）分 支机构设立、变更、注销未按照规定办理备 案手续…（六）专利代理机构公示信息与 其在市场监督管理部门或者司法行政部门 的登记信息不一致…（七）通过登记的经 营场所无法联系”，A、B、C、D选项均符合规 定，当选。（新编）"},
  {id: 45, topic: "专题二 专利代理制度", type: "multiple", question: "根据《专利代理管理办法》，专利代理机构有下列哪些情形时，按照国家有关规定将列人经营异常名录？", options: {"A": "分支机构设立、变更、注销未按照规定办理备案手续", "B": "未在规定的期限提交年度报告", "C": "通过登记的经营场所无法联系", "D": "专利代理机构公示信息与其在市场监督管理部门或者司法行政部门的登记信息不一致"}, answer: "ACD", explanation: "《专利代理管理办法》第38条 规定：“专利代理机构有下列情形之一的，按 照国家有关规定列入严重违法失信名单： （一）被列入经营异常名录满三年仍未履行 相关义务；（二）受到责令停止承接新的专利 代理业务、吊销专利代理机构执业许可证的 专利代理行政处罚”，因此A、C、D选项符合 规定，当选。B选项不属于规定情形。 (2019)"},
  {id: 46, topic: "专题二 专利代理制度", type: "multiple", question: "专利代理机构有下列哪些情形，应按照国家有关规定列人严重违法失信名单？", options: {"A": "被列人经营异常名录满三年仍未履行相关义务", "B": "三年内两次被列人经营异常名录", "C": "受到责令停止承接新的专利代理业务的专利代理行政处罚", "D": "受到吊销专利代理机构执业许可证的专利代理行政处罚"}, answer: "BCD", explanation: "《专利代理条例》第27条规 定：“违反本条例规定擅自开展专利代理业 务的，由省、自治区、直辖市人民政府管理专 利工作的部门责令停止违法行为，没收违法 所得，并处违法所得1倍以上5倍以下的罚 款”，因此B、C、D选项属于规定的处罚措 施，正确。A选项不属于规定的处罚措施。 （新编）"},
  {id: 47, topic: "专题二 专利代理制度", type: "single", question: "根据《专利代理条例》，没有获得专利代理执业许可证的某知识产权代理机构擅自代理专利申请的行为，有可能受到的处罚是？", options: {"A": "被吊销营业执照", "B": "被处以违法所得1倍以上5倍以下的罚款", "C": "被没收违法所得", "D": "被责令停止违法行为"}, answer: "B", explanation: "A、D选项，根据《专利代理条 例》第27条的规定，擅自开展专利代理业务 的，应处违法所得1倍以上5倍以下的罚款， 因此A、D选项错误。B选项，根据《专利代 理条例》第25条第1款的规定，专利代理机 构有违法行为的，处10万元以下的罚 款·.，因此B选项正确。C选项，根据《专 利代理条例》第26条第1款的规定，专利代 理师有违法行为的，处5万元以下的罚款， 因此C选项错误。（新编）"},
  {id: 48, topic: "专题二 专利代理制度", type: "single", question: "依据《专利代理条例》的规定，下列情形中，由所在省级人民政府管理专利工作的部门责令限期改正，予以警告，可以处10万以下罚款的是：", options: {"A": "某教师擅自开展专利代理业务", "B": "某专利代理机构泄露委托人的发明创造内容", "C": "某专利代理师自行接受委托办理专利代理业务", "D": "咨询公司擅自开展专利代理业务"}, answer: "D", explanation: "《专利代理管理办法》第53条规 定：“专利代理师对其签名办理的专利代理 业务负责。对于非经本人办理的专利事务， 专利代理师有权拒绝在相关法律文件上签 名。专利代理师因专利代理质量等原因给 委托人、第三人利益造成损失或者损害社会 公共利益的，省、自治区、直辖市人民政府管 理专利工作的部门可以对签名的专利代理 师予以警告”，因此A、B、C选项错误，D选项 正确。（2018改编）"},
  {id: 49, topic: "专题二 专利代理制度", type: "multiple", question: "关于代理师对其办理的专利签名及承担责任，下列哪个说法是正确的？", options: {"A": "对于非经本人办理的专利事务，专利代理师应当服从所在单位的安排，不能拒绝在相关法律文件上签名", "B": "专利代理师因专利代理质量等原因给委托人利益造成损失的，由国家知识产权局对签名的专利代理师予以警告", "C": "专利代理师因专利代理质量等原因给第三人利益造成损失的，省、自治区、直辖市人民政府管理专利工作的部门可以对其所在的专利代理机构予以警告", "D": "专利代理师因专利代理质量等原因损害社会公共利益的，省、自治区、直辖市人民政府管理专利工作的部门可以对签名的专利代理师予以警告说明书"}, answer: "ABD", explanation: "《审查指南》第一部分第一章第4.3节 规定：“附图一般使用黑色墨水绘制，必要时可以 提交彩色附图.”，因此A选项正确。《审查指南》 第一部分第一章第4.1.1节规定：“发明名称一般不 得超过25个字，必要时可不受此限，但也不得超过 60个字”，因此B选项正确。《审查指南》第一部分 第一章第4.2节规定：“涉及核苷酸或者氨基酸序 列的申请，应当将该序列表作为说明书的一个单 独部分说明书文字部分可以有化学式、数学 式或者表格，但不得有插图…”，因此D选项正 确，C选项错误。（新编）"},
  {id: 50, topic: "专题三 说明书", type: "single", question: "下列关于说明书的说法哪些是正确的？", options: {"A": "说明书附图可以使用彩色附图", "B": "发明名称最多为60个字", "C": "说明书文字部分可以有化学式、数学式或者表格，必要时可以有插图", "D": "核苷酸序列表应作为说明书单独部分"}, answer: "B", explanation: "A选项中名称不能清楚表明其保护类 型是产品或是方法（无法区分是MP3播放器或是 MP3压缩方法等）；C选项中“F-2\"属于产品型号； D选项中“一种技术”未明确要求保护类型（是 产品还是方法），因此A、C、D选项不符合规定，B 选项清楚表明发明保护产品及其制备方法，正确。 （2015改编）"},
  {id: 51, topic: "专题三 说明书", type: "single", question: "下列哪个发明名称符合相关规定？", options: {"A": "MP3", "B": "一种治疗乙型肝炎的药物及其制备方法", "C": "一种F-2痤疮治疗仪", "D": "一种降低能耗的技术"}, answer: "B", explanation: "A选项，“IPAD”是苹果公司的商标，不 能作为产品名称；C选项，“及其系列产品”属于含 糊的词语；D选项，名称包括产品及使用方法，方法 不能作为实用新型专利保护对象，不符合规定，因 此A、C、D选项错误，B选项正确。（2016改编）"},
  {id: 52, topic: "专题三 说明书", type: "single", question: "下列各项所示实用新型的名称，哪个是正确的？", options: {"A": "一种IPAD平板电脑", "B": "一种轮胎及包含该轮胎的汽车", "C": "一种新型晾衣架及其系列产品", "D": "一种睡袋及其使用方法"}, answer: "A", explanation: "根据《审查指南》第二部分第二章第 2.2.2节的规定，发明或者实用新型的技术领域应 当是要求保护的发明或者实用新型技术方案所属 或者直接应用的具体技术领域，而不是上位的或 者相邻的技术领域，也不是发明或者实用新型本 身，因此A选项正确，B、D选项错误。C选项中的 “区别技术特征”属于技术方案及具体实施方式中 应当写明的内容，不应写入说明书中技术领域部 分，C选项错误。（2006）"},
  {id: 53, topic: "专题三 说明书", type: "multiple", question: "下面哪些是说明书“技术领域”部分应当满足的要求？", options: {"A": "技术领域应当是要求保护的发明或者实用新型技术方案所属或者直接应用的具体技术领域", "B": "技术领域应当是要求保护的发明或者实用新型技术方案所属具体技术领域的上位技术领域", "C": "技术领域中需要写人所要求保护的发明或者实用新型独立权利要求技术方案中的区别技术特征", "D": "技术领域应当是要求保护的发明或者实用新型技术方案相邻的技术领域"}, answer: "ABD", explanation: "《审查指南》第二部分第二章第2.2.3 节（2)规定：“所引证的非专利文件的公开日应当 在本申请的申请日之前；所引证的专利文件的公 开日不能晚于本申请的公开日”，因此C选项错误， A、B、D选项正确。（2015改编）"},
  {id: 54, topic: "专题三 说明书", type: "multiple", question: "在满足其他条件的情况下，下列哪些文件可以作为说明书“背景技术”部分的引证文件？", options: {"A": "公开日在本申请的申请日与公开日之间的外国专利文件", "B": "公开日在本申请的申请日与公开日之间的中国专利文件", "C": "公开日在本申请的申请日与公开日之间的非专利文件", "D": "公开日在本申请的申请日之前的非专利文件"}, answer: "ABD", explanation: "A选项中欧洲专利申请公开日在本 申请的公开日之前，可以被引证。B选项中引证的 中国专利申请公开日未晚于本申请的公开日，可 以被引证。C选项的中文期刊是非专利文件，其公 开日（出版日)在本申请的申请日之后，不可以被 引证，C选项错误。D选项中互联网文件是非专利 文件，其公开日在本申请的申请日之前，可以被引 证，D选项正确。（新编）"},
  {id: 55, topic: "专题三 说明书", type: "single", question: "某中国发明专利申请的申请日为2024年2月1日，公布日为2024年8月7日。该申请的说明书背景技术部分可以引证下列哪些文件？", options: {"A": "申请日为2023年5月31日、公布日为2024年2月25日的欧洲专利申请", "B": "申请日为2023年12月1日、公布日为2024年8月7日的中国专利申请", "C": "印刷日为2024年5月的某中文期刊", "D": "公开日为2023年5月19日存在于互联网的相关文件"}, answer: "A", explanation: "《审查指南》第二部分第二章第2.2.4节 规定：“有益效果是指由构成发明或者实用新型的 技术特征直接带来的，或者是由所述的技术特征 必然产生的技术效果。有益效果是确定发明是否 具有‘显著的进步”，实用新型是否具有‘进步”的 重要依据。…..，有益效果可以由产率、质量、精 度和效率的提高，能耗、原材料、工序的节省等方 面反映出来……·.无论用哪种方式说明有益效果， 都应当与现有技术进行比较，指出发明或者实用 新型与现有技术的区别”，因此B、C、D选项说法正 确；有益效果不包含间接产生的效果，A选项说法 错误，当选。（2004改编）"},
  {id: 56, topic: "专题三 说明书", type: "multiple", question: "以下关于发明有益效果的哪个说法是错误的？", options: {"A": "有益效果是指由发明技术特征直接或间接产生的技术效果", "B": "有益效果是确定发明是否具有“显著的进步”，实用新型是否具有“进步”的重要依据", "C": "无论用哪种方式说明有益效果，都应当与现有技术进行比较", "D": "发明所产生的成本降低等经济效益也属于发明的有益效果"}, answer: "ABC", explanation: "A选项，根据《审查指南》第二部分 第二章第2.2.4节（1)的规定，发明或者实用新型所 要解决的技术问题属于说明书的发明或者实用新 型内容部分应当写明的内容，因此不属于背景技 术部分的内容，A选项说法错误。B选项，根据《审 查指南》第二部分第二章第2.2.4节（2)的规定，在 技术方案这一部分，至少应反映包含全部必要技 术特征的独立权利要求的技术方案，还可以给出 包含其他附加技术特征的进一步改进的技术方 案。因此发明内容部分并不要求写明每项权利要 求的技术方案，B选项说法错误。C、D选项，根据 《审查指南》第二部分第二章第2.2.4节（1)（ii)的规 定，发明或者实用新型内容部分应当用正面的、尽 可能简洁的语言客观而有根据地反映发明或者实 用新型要解决的技术问题，也可以进一步说明其 技术效果；一件专利申请的说明书可以列出发明 或者实用新型所要解决的一个或者多个技术问 题。当一件申请包含多项发明或者实用新型时， 说明书中列出的多个要解决的技术问题应当都与 一个总的发明构思相关，因此C选项说法错误，D 选项说法正确。（新编）"},
  {id: 57, topic: "专题三 说明书", type: "multiple", question: "下列关于说明书的撰写说法错误的有：", options: {"A": "说明书的背景技术部分应当写明发明所要解决的技术问题", "B": "说明书中的发明内容部分应当写明每项权利要求的技术方案", "C": "一件专利申请的说明书可以列出发明或者实用新型所要解决的一个或者多个技术问题，即使该多个要解决的技术问题与一个总的发明构思无关", "D": "说明书的发明内容部分应当反映发明所要解决的技术问题，也可以进一步说明其技术效果"}, answer: "ACD", explanation: "《审查指南》第二部分第二章第2.2.6 节规定：“实施例是对发明或者实用新型的优选的 具体实施方式的举例说明.当一个实施例足以 支持权利要求所概括的技术方案时，说明书中可 以只给出一个实施例当权利要求相对于背景 技术的改进涉及数值范围时，通常应给出两端值 附近（最好是两端值）的实施例.…对于那些就 满足专利法第26条第3款的要求（说明书公开充 分）而言必不可少的内容，不能采用引证其他文件 的方式撰写，而应当将其具体内容写入说明书”， 因此A、C、D选项正确，B选项错误。(2013)"},
  {id: 58, topic: "专题三 说明书", type: "multiple", question: "下列关于实施例的说法哪些是正确的？", options: {"A": "实施例是对发明或者实用新型的优选的具体实施方式的举例说明", "B": "一项权利要求涉及数值范围0～100，说明书中必须给出0和100两个端值的实施例", "C": "当一个实施例足以支持权利要求所概括的技术方案时，说明书中可以只给出一个实施例", "D": "说明书中可以有引证文件，但对于那些就满足说明书公开充分的要求而言必不可少的内容，不能采用引证其他文件的方式撰写，而应当将其具体内容写人说明书"}, answer: "ABCD", explanation: "A、B选项，《细则》第20条第3款 规定：“发明或者实用新型说明书应当用词规范、 语句清楚，并不得使用?如权利要求所述 的..一类的引用语，也不得使用商业性宣传用 语”，没有例外，因此A、B选项说法错误。C选项， 根据《审查指南》第二部分第二章第2.2.6节的规 定，对照附图描述发明或者实用新型的优选的具 体实施方式时，使用的附图标记或者符号应当与 附图中所示的一致，并放在相应的技术名称的后 面，不加括号。例如，对涉及电路连接的说明，可 以写成“电阻3通过三极管4的集电极与电容5相 连接”，不得写成“3通过4与5连接”。由此可见， 说明书描述附图所示的技术特征时不可仅采用附 图标记或非中文缩略语形式，因此C选项说法错 误。D选项，根据《审查指南》第二部分第二章第 2.2.7节的规定，说明书应当使用发明或者实用新 型所属技术领域的技术术语，必要时可以采用自 定义词，在这种情况下，应当给出明确的定义或者 说明，D选项说法错误。（2012改编） 11、ABCD。A、B选项，《审查指南》第二部分 第二章第2.2.7节规定：“对于自然科学名词，国家 有规定的，应当采用统一的术语，国家没有规定 的，可以采用所属技术领域约定俗成的术语，·· 在说明书中第一次使用非中文技术名词时，应当 用中文译文加以注释或者使用中文给予说 明….”，因此A、B选项正确。C选项，《审查指南》 第一部分第二章第7.3节（8）规定：“结构框图、逻 辑框图、工艺流程图应当在其框内给出必要的文 字和符号”，C选项正确。D选项，为清楚描述相关 技术内容，说明书的附图可以使用彩色附图，说法 正确。（新编）"},
  {id: 59, topic: "专题三 说明书", type: "multiple", question: "下列说法哪些是错误的？", options: {"A": "除绝对必要外，发明或者实用新型的说明书中不得使用“如权利要求……·所述的.一类的引用语", "B": "发明或者实用新型的摘要中不得使用商业性宣传用语，但说明书中可以使用", "C": "在说明书中提及附图中所示的技术特征时，在不产生歧义的前提下，可以不使用中文技术术语，而用附图-19 -标记或非中文缩略语形式表示", "D": "说明书应当使用国家统一规定的技术术语，不得使用自定义词"}, answer: "BC", explanation: "《审查指南》第二部分第二章第2.2.7 节规定：“本领域技术人员熟知的技术名词可以使 用非中文形式表述，…所引用的外国专利文献、 专利申请、非专利文献的出处和名称应当使用原 文，必要时给出中文译文，并将译文放置在括号 内。说明书中无法避免使用商品名称时，其 后应当注明其型号、规格、性能及制造单位。· 说明书中应当避免使用注册商标来确定物质或者 产品”。A、D选项说法过于绝对，错误，B、C选项正 确。（新编）"},
  {id: 60, topic: "专题三 说明书", type: "multiple", question: "下列关于说明书撰写的说法正确的是？", options: {"A": "对于自然科学名词，国家没有规定的，可以采用所属技术领域约定俗成的术语", "B": "在说明书中第一次使用非中文技术名词时，应当用中文译文加以注释或使用中文给予说明", "C": "结构框图、逻辑框图、工艺流程图应当在其框内给出必要的文字和符号", "D": "为清楚描述相关技术内容，说明书的附图可以使用彩色附图"}, answer: "ABD", explanation: "A选项，说明书具体实施方式中可 以使用商品名称，但是发明名称中不得使用商品 名称，因此A选项错误。B选项，本题中未明确是 发明还是实用新型，从B选项表达语气来看，想要 考查的应当是发明专利申请，在发明专利申请中 可以使用组织细胞照片作为说明书附图。C选项， 说明书中出现附图标记不能加括号。D选项，流程 图不能写在说明书文字部分，但可以作为说明书 附图。（新编）"},
  {id: 61, topic: "专题三 说明书", type: "multiple", question: "以下关于说明书的说法正确的是？", options: {"A": "说明书中不得使用商品名称", "B": "本领域技术人员熟知的技术名词可以使用非中文形式表述", "C": "说明书中引用的外国专利文献的出处和名称应当使用原文，必要时给出中文译文并放置在括号内", "D": "说明书中不能使用注册商标来确定物质或者产品"}, answer: "AB", explanation: "A、B选项，根据《审查指南》第一部 分第二章第7.2节（8)的规定，流程图、方框图、曲 线图、相图等，可以作为说明书的附图，因此A、B 选项正确。C、D选项，《审查指南》第一部分第二章 第7.3节（1)规定：“附图不得使用工程蓝图、照 片”，因此C、D选项错误。（2019年改编）"},
  {id: 62, topic: "专题三 说明书", type: "multiple", question: "以下关于说明书及附图说法正确的有？", options: {"A": "发明名称中不得含有商品名称", "B": "组织细胞照片可以作为说明书附图", "C": "说明书中使用的附图标记应当放在相应的技术名称后面的括号内", "D": "流程图应当作为说明书附图"}, answer: "AC", explanation: "A、B、C选项，《审查指南》第二部分 第二章第2.3节规定：“对发明专利申请，用文字足 以清楚、完整地描述其技术方案的，可以没有附 图；实用新型专利申请的说明书必须有附图， 说明书文字部分中未提及的附图标记不得在附图 中出现，附图中未出现的附图标记也不得在说明 书文字部分中提及…”，因此A、C选项正确，B选 项错误。D选项，《审查指南》第一部分第二章第 7.3节（8)规定：“结构框图、逻辑框图、工艺流程图 应当在其框内给出必要的文字和符号”，因此当附 图为流程图、方框图时，可以出现文字，D选项错 误。（2014)"},
  {id: 63, topic: "专题三 说明书", type: "multiple", question: "下列哪些可以作为实用新型专利申请的说明书附图？", options: {"A": "工艺流程图", "B": "逻辑框图", "C": "照片", "D": "工程蓝图"}, answer: "BD", explanation: "A、B选项，《审查指南》第二部分第 二章第2.4节规定：“说明书摘要可以包含最能说 明发明的化学式，摘要文字部分不得超过300 个字。….…”，因此A选项错误，B选项正确。C、D 选项，根据《审查指南》第二部分第二章第2.4节的 规定，摘要的内容不属于发明或者实用新型原始 记载的内容，不能作为以后修改说明书或者权利 要求书的根据，也不能用来解释专利权的保护范 围，因此C选项错误，D选项正确。（2012)"},
  {id: 64, topic: "专题三 说明书", type: "multiple", question: "下列关于发明或者实用新型说明书附图的说法哪些是正确的？", options: {"A": "如果发明专利申请的文字足以清楚、完整地描述其技术方案，则可以没有附图", "B": "如果实用新型专利申请的文字足以清楚、完整地描述其技术方案，则可以没有附图", "C": "附图中未出现的附图标记不得在说明书文字部分中提及", "D": "附图中不得出现文字"}, answer: "ABCD", explanation: "《审查指南》第二部分第二章第2.4 节规定：“摘要是说明书记载内容的概述，它仅是 一种技术信息，不具有法律效力。摘要的内容（包 括摘要附图)不属于发明或者实用新型原始记载 的内容，摘要应当写明发明或者实用新型的 名称和所属技术领域，并清楚地反映所要解决的 技术问题、解决该问题的技术方案的要点以及主 要用途，应当指定或由审查员指定一幅最能 反映该发明或者实用新型技术方案的主要技术特 征的说明书附图作为摘要附图…”，因此A、B、 C、D选项正确。（新编）"},
  {id: 65, topic: "专题三 说明书", type: "single", question: "下列关于说明书摘要的说法哪些是正确的？", options: {"A": "摘要不得包含化学式", "B": "摘要文字部分（包括标点符号）不得超过300个字", "C": "摘要的内容可以作为修改说明书的依据", "D": "摘要的内容不能用来解释专利权的保护范围"}, answer: "B", explanation: "A选项，根据《审查指南》第二部分第 二章第2.3节的规定，实用新型专利申请的说明书 必须有附图，A选项说法错误。B选项，根据《审查 指南》第一部分第二章第7.3节（10)的规定，说明 书附图中应当有表示要求保护的产品的形状、构 造或者其结合的附图，不得仅有表示现有技术的 附图，也不得仅有表示产品效果、性能的附图，B选 项正确。C选项，实用新型专利申请的附图不能使 用照片，更不能使用彩色照片，C选项说法错误。D 选项，如果申请人补交清晰的说明书附图和原图 一致，修改是允许的，不用重新确定申请日，如果 清晰的附图补充了结构细节，则会超出了原始说 明书及其附图的记载范围，这样的修改是不能被 接受的，D选项错误。考生需要注意，附图不清晰 修改和遗漏附图的处理方式不一样。如果是说明 书中有对附图的说明但无附图或者缺少部分附图 的，可以通过变更申请日补交附图。（新编）"},
  {id: 66, topic: "专题三 说明书", type: "multiple", question: "下列关于实用新型专利申请的说法哪些是正确的？", options: {"A": "说明书摘要仅是一种技术情报，不具有法律效力", "B": "说明书摘要文字部分应写清反映技术方案要点的内容", "C": "说明书摘要和摘要附图不属于实用新型原始记载的内容", "D": "说明书摘要附图可以由申请人或审查员指定"}, answer: "CD", explanation: "A选项中仍然有一种方法能够组装 出该设备，所属技术领域的技术人员按照该组装 方法能够实现该发明的技术方案；B选项中使用公 知产品组分，虽然效果较差，但是能实现该发明的 技术方案，A、B选项满足充分公开发明的要求。C 选项中由于说明书中未记载使用该方法所必需的 参数，导致所属技术领域的技术人员按照说明书 记载的内容无法实现该发明的技术方案；D选项， 根据《审查指南》第二部分第十章第3.1节的规定， 对于保护的发明为化学产品本身的，说明书中应 当记载化学产品的确认、化学产品的制备以及化 学产品的用途。D选项仅记载在说明书摘要中的 用途不能作为判断是否充分公开的依据，不满足 充分公开发明的要求，当选。（2011）"},
  {id: 67, topic: "专题三 说明书", type: "multiple", question: "关于实用新型专利申请，下列说法哪个是正确的?", options: {"A": "如果说明书文字足以清楚的描述所要求保护的产品的形状，可以没有附图", "B": "说明书附图不得仅有表示产品效果、性能的附图", "C": "说明书附图可以是彩色照片", "D": "原始说明书附图不清晰，可以通过重新确定申请日方式补人清晰附图"}, answer: "ABCD", explanation: "A选项中国防专利不属于公开出 版物，本领域技术人员无法获得国防专利的具体 内容，因此存在说明书公开不充分的缺陷；B选项 中没有记载该点烟器的具体结构，只是提出了一 种设想，并未给出实现其设想的技术手段，导致其 无法实现；C选项中说明书给出了相互矛盾的技术 手段，对于所属技术领域的技术人员来说，该手段 是含糊不清的，存在公开不充分的缺陷；D选项仅 记载了绿豆糕的组分，无法证明其具有抗癌效果， 属于公开不充分，因此A、B、C、D选项均存在被驳 回的实质性缺陷。（2018，思维扩展）"},
  {id: 68, topic: "专题三 说明书", type: "multiple", question: "下列哪些情形将导致说明书不能满足充分公开发明的要求？", options: {"A": "一项设备发明，说明书中记载了该设备的结构及三种组装方法，其中两种方法都不能够组装出所述设备", "B": "一项组合物发明，其中一种组分是公知产品，但使用效果不佳，不及采用发明人制备的该组分，说明书中未记载发明人制备该组分的方法", "C": "一项生产方法发明，其中一项工艺参数对于产品性能较为重要，但说明书中未提及该参数，不掌握该参数就不能使用该方法", "D": "一项新化合物发明，说明书摘要中记载了该产品的用途及效果，但说明书中未记载该产品的用途及效果"}, answer: "BC", explanation: "A选项，可以将记载于权利要求书中 的技术内容补入说明书中，以满足说明书充分公 开的要求，A选项的缺陷可以弥补。B选项，摘要 内容不属于发明或者实用新型原始记载的内容， 不能作为以后修改说明书或者权利要求书的根 据，B选项的缺陷不可以弥补，当选。C选项，若将 未记载内容补入说明书以满足公开充分的要求， 会导致修改超范围，C选项的缺陷不可以弥补，当 选。D选项，根据《审查指南》第二部分第二章第 2.2.3节（2）的规定，所引证的专利文件的公开日应 当在本申请的公开日之前，D选项中只要本人在美 国的专利文件公开日不晚于本申请公开日，即可 符合引证文件的规定，相应的内容可认定为已经 记载在本申请说明书中，所导致的缺陷可以弥补。 （新编）"},
  {id: 69, topic: "专题三 说明书", type: "multiple", question: "下列专利申请，存在可能导致该申请被驳回的实质性缺陷的有？", options: {"A": "请求保护的发明是一种固体燃料。该燃料包含助做任何具体说明，仅在背景技术部分指出某国防专利具体权公告日", "B": "请求保护的发明是一种使用交流电的点烟器，其无需将交流电转换为直流电，而是直接使用交流电驱动点烟器。说明书中只记载了该点烟器可使用交流电，而没有记载该点烟器的具体结构", "C": "请求保护的发明是一种有机化合物，但申请说明书中记载的该化合物结构鉴定图谱信息与其化学分子结构明显矛盾，且说明书记载的其他信息不足以澄清该矛盾的", "D": "请求保护的发明是一种抗癌组合物,但说明书中记载的该组合物的全部成分均选自绿豆、淀粉、蔗糖、食用胶"}, answer: "BD", explanation: "A选项，由于阿司匹林是已知的化学 产品，无需在说明书中写入该化学产品的制备方 法，A选项错误。B、C、D选项，《审查指南》第二部 分第十章第3节规定：“对于化学产品用途发明，在 说明书中应当记载所使用的化学产品、使用方法 及所取得的效果，使得本领域技术人员能够实施 该用途发明。如果本领域的技术人员无法根据现 有技术预测该用途，则应当记载对于本领域的技 术人员来说，足以证明该物质可以用于所述用途 并能解决所要解决的技术问题或者达到所述效果 的实验数据”，因此B、D选项正确；阿司匹林解热 镇痛的功效是已知的，无需在说明书中写入相关 的实验数据，C选项错误。（2012) 23、AD。A选项的方法仅仅是一种设想，属于 未充分公开发明的情况，当选。B选项中引证文件 符合要求，满足公开充分的要求。C选项虽然没有 给出最佳实施方案，但给出效果较差的技术方案 也能解决技术问题，满足公开充分的要求。D选 项，在审查期间补充的实验数据可供审查员参考， 但是仍然属于未充分公开发明的情况，当选。 (2006)"},
  {id: 70, topic: "专题三 说明书", type: "multiple", question: "以下哪些情况会导致发明专利申请说明书公开不充分的缺陷无法弥补？", options: {"A": "仅将发明必不可少的技术内容记载于权利要求书中，而在说明书中没有相应的记载", "B": "仅将发明必不可少的技术内容记载于说明书摘要中，而在说明书和权利要求书中没有相应的记载", "C": "为了保留技术秘密，在申请文件中没有记载某些必要技术内容", "D": "在申请中引证了在本申请日后公布的本人在美国的专利申请文件，而该文件与本发明相关的内容在本申请中未作详细展开说明"}, answer: "ABC", explanation: "根据《审查指南》第二部分第十章 第3.1节的规定，要求保护的发明为化学产品本身 的，说明书中应当记载化学产品的确认、化学产品 的制备以及化学产品的用途，因此A、B、C选项正 确，D选项错误。（2009)"},
  {id: 71, topic: "专题三 说明书", type: "multiple", question: "阿司匹林是已知药物，具有解热镇痛的功效，现有技术中用作感冒药的成分。某项发明涉及阿司匹林的新用途，该发明对现有技术的贡献在于：实验证实阿司匹林能有效防治心血管疾病。如对此发明申请专利，说明书中不能缺少下列哪些内容？", options: {"A": "阿司匹林的制备方法", "B": "阿司匹林用于防治心血管疾病的使用方法", "C": "证明阿司匹林具有解热镇痛功效的实验数据", "D": "证明阿司匹林能防治心血管疾病的实验数据"}, answer: "BCD", explanation: "A选项，充分公开要求的是发明创 造整体描述清楚，对于其中某个部件，如果是所属 技术领域技术人员能够从现有技术中直接、唯一 地得出的有关内容，可以不进行详细的描述，A选 项错误。B选项，《审查指南》第二部分第二章第 2.1.2节规定：“对于克服了技术偏见的发明或者实 用新型，说明书中还应当解释为什么说该发明或 者实用新型克服了技术偏见，新的技术方案与技 术偏见之间的差别以及为克服技术偏见所采用的 技术手段”，B选项正确。C选项，根据《审查指南》 第二部分第二章第2.2.6节的规定，在具体实施方 式部分，对最接近的现有技术或者发明或实用新 型与最接近的现有技术共有的技术特征，可以不 作详细的描述，但对发明或者实用新型区别于现 有技术的技术特征以及从属权利要求中的附加技 术特征应当足够详细地描述，C选项正确。D选 项，根据《审查指南》第二部分第十章第3.1节的规 定，要求保护的发明为化学产品本身的，说明书中 应当记载化学产品的确认、化学产品的制备以及 化学产品的用途，D选项正确。（新编）"},
  {id: 72, topic: "专题三 说明书", type: "multiple", question: "下述哪些属于说明书未充分公开发明或实用新型的情况？", options: {"A": "一种在天空中形成一层能阻隔冰降落的屏障而防止冰对农作物伤害的方法，但在说明书中未给出如何形成屏障的技术手段", "B": "一种方法，其中要采用一种催化剂，在说明书中指出该催化剂为由本申请人在先向国家知识产权局提出的发明专利申请（给出了申请号）中的催化剂，该在先申请中给出了该催化剂的化学结构式及其制造方法，并在本申请的申请日后、公开日前公布", "C": "说明书中仅给出了虽能解决技术问题但效果较差的技术方案，却将最佳实施方案作为技术秘密保留而未写入说明书", "D": "一种涉及新蛋白质的发明专利申请，说明书中未提供任何实验数据，但在审查期间补充了实验数据供审查员参考"}, answer: "ABCD", explanation: "根据《审查指南》第二部分第十章 第3.1节的规定，涉及中药领域的发明，说明书的 充分公开要求包括：说明书一般应记载中药的正 名，如果说明书记载的中药材别名对应多种正名， 则应结合说明书和现有技术中有关中药材的植物 基原、拉丁名、药用部位、性味归经和功效等信息； 涉及中药组合物发明，说明书中不仅应当记载该 中药组合物的中药原料组成，还应当记载各中药 原料的用量配比关系；对于新的医药组合物应当 记载中药的医药用途，因此A、B、C选项均属于公 开不充分的情形。D选项，《审查指南》第二部分第 十章第3.1节规定：“如果说明书中的中药材名称 在现有技术中没有明确记载，则应当在说明书中 记载足以使本领域的技术人员能够确认该中药材 的相关信息，如植物基原、拉丁名、要用部位、性味 归经、功效等”，因此D选项属于公开不充分的情 形。（新编）"},
  {id: 73, topic: "专题三 说明书", type: "multiple", question: "某项发明涉及一种新的化合物，如果申请发明专利时要求保护该化合物，则说明书中应当记载下列哪些内容？", options: {"A": "该化合物的确认", "B": "该化合物的制备", "C": "该化合物的用途", "D": "该化合物的商业前景"}, answer: "CD", explanation: "根据《审查指南》第二部分第二 章第3.3.2节的规定，从属权利要求只能引 用在前的权利要求，其包括从属权利要求， A选项错误；在后的多项从属权利要求不得 引用在前的多项从属权利要求，D选项正确； 从属权利要求可进一步限定独立权利要求前 序部分和特征部分中的特征，B选项错误；从 属权利要求的引用部分应写明引用的权利要 求的编号及主题名称，C选项正确。（2012)"},
  {id: 74, topic: "专题三 说明书", type: "multiple", question: "为满足专利法第二十六条第三款关于充分公开要求的规定，下述哪些做法是正确的？", options: {"A": "应对所要求保护的产品的每一个部件作详细的描述", "B": "对于克服技术偏见的发明专利申请，应在说明书中说明为什么克服了技术偏见，以及新技术方案与技术偏见之间的差别", "C": "对所要求保护的产品与现有技术共有的技术特征可以不作详细描述，但对发明区别于现有技术的技术特征应当详细地描述", "D": "对于新的化学产品的发明，在说明书中至少应公开一种制备方法"}, answer: "AC", explanation: "《审查指南》第二部分第二章第 3.1.2节规定：“必要技术特征是指，发明或 者实用新型为解决其技术问题所不可缺少 的技术特征，其总和足以构成发明或者实用 新型的技术方案，使之区别于背景技术中所 述的其他技术方案。判断某一技术特征是 否为必要技术特征，应当从所要解决的技术 问题出发并考虑说明书描述的整体内容，不 应简单地将实施例中的技术特征直接认定 为必要技术特征”，因此A、C选项正确，B选 项错误。必要技术特征的总和才使该技术 方案区别于背景技术的其他技术方案，D选 项错误。（2011)"},
  {id: 75, topic: "专题三 说明书", type: "multiple", question: "以下关于中药领域发明哪些属于公开不充分的情形？", options: {"A": "一种中药组合物发明，说明书中仅记载了该中药组合物中的某中药原料的别名，且该别名对应多种中药材的正名，没有记载确认该中药材的相关信息", "B": "一种中药组合物发明，说明书中仅记载该中药组合物的中药原料组成，没有记载各中药原料的用量配比关系", "C": "一种新的中药组合物发明，说明书中没有记载该中药组合物的医药用途", "D": "一种用于治疗某疾病的中药组合物,其中药原料中包含的“三毛刺”在现有技术中没有记载，且说明书中也未记载该“三毛刺”的植物基原、药用部位、功效等信息权利要求"}, answer: "AB", explanation: "A选项，根据《细则》第二十四 条第1款的规定，独立权利要求前序部分应 写明与现有技术共有的必要技术特征，而特 征部分应写明区别于最接近的现有技术的 技术特征。因此A选项错误。B、D选项，根 据《审查指南》第二部分第二章第3节的规 定，技术特征可以是构成发明或者实用新型 技术方案的组成要素，也可以是要素之间的 相互关系，因此B选项说法错误，D选项说法 正确。C选项，根据《审查指南》第二部分第 二章第3.1.2节的规定，必要技术特征是指， 发明或者实用新型为解决其技术问题所不可 缺少的技术特征，C选项说法正确。（新编）"},
  {id: 76, topic: "专题四 权利要求", type: "multiple", question: "下列关于从属权利要求的说法哪些是正确的？", options: {"A": "从属权利要求只能引用独立权利要求", "B": "从属权利要求只能进一步限定独立权利要求特征部分中的特征", "C": "从属权利要求的引用部分应当写明引用的权利要求的编号，其后应当重述引用的权利要求的主题名称", "D": "一项多项从属权利要求不得作为另一项多项从属权利要求的引用基础"}, answer: "AD", explanation: "A选项，从属权利要求可以进 一步限定前序部分中的特征，因此A选项正 确。B选项，《审查指南》第二部分第二章第 3.3.2节规定：“直接或间接从属于某一项独 立权利要求的所有从属权利要求都应当写 在该独立权利要求之后，另一项独立权利要 求之前”，因此B选项错误。C选项，多项从 属权利要求，只是不得作为另一项多项从属 权利要求引用的基础，但可以作为单项从属 权利要求的引用基础，因此C选项错误。D 选项，从属权利要求中的附加技术特征，可 以是对所引用的权利要求的技术特征作进 一步限定的技术特征，也可以是增加的技术 特征，因此D选项正确。(2009)"},
  {id: 77, topic: "专题四 权利要求", type: "multiple", question: "下列关于必要技术特征的说法哪些是正确的？", options: {"A": "判断某一技术特征是否为必要技术特征，应当从所要解决的技术问题出发并考虑说明书描述的整体内容", "B": "实施例中的技术特征通常可以直接认定为必要技术特征", "C": "必要技术特征的总和足以构成发明或者实用新型的技术方案", "D": "任何一个必要技术特征均可使发明或者实用新型的技术方案区别于背景技术的其他技术方案"}, answer: "BD", explanation: "A选项，《细则》第23条规定： “独立权利要求应当从整体上反映发明或者 实用新型的技术方案，记载解决技术问题的 必要技术特征”，A选项中“所有技术问题” 说法太绝对，错误；从属权利要求可以增加 新的技术特征，B选项正确。C选项，有时并 列独立权利要求也引用在前的独立权利要 求，不能被看作是从属权利要求，C选项错 误。D选项，每个权利要求都包含至少一个 技术方案，且要求所限定的技术方案都应当 是完整的，D选项正确。(2019)"},
  {id: 78, topic: "专题四 权利要求", type: "multiple", question: "下列关于技术特征的说法错误的是？", options: {"A": "必要技术特征就是写在独立权利要求特征部分的特征", "B": "技术特征仅是构成发明或者实用新型技术方案的组成要素", "C": "必要技术特征是发明或者实用新型为解决其技术问题所不可缺少的技术特征", "D": "技术特征不但可以是构成发明或者实用新型技术方案的组成要素，还可以是要素之间的相互关系"}, answer: "AD", explanation: "A选项，根据《审查指南》第二 部分第二章第3.3节的规定，权利要求中使 用的科技术语应当与说明书中使用的科技 术语一致。权利要求中可以有化学式或者 数学式，但是不得有插图，A选项正确。B选 项，根据《审查指南》第二部分第二章第 3.1.2节的规定，如果一项权利要求包含了 另一项同类型权利要求中的所有技术特征， 且对该另一项权利要求的技术方案作了进 一步的限定，则该权利要求为从属权利要 求，B选项缺少“同类型”限定，错误。C选 项，从属权利要求可以进一步限定所引用的 独立权利要求特征部分中的特征，也可以进 一步限定前序部分中的特征，C选项错误。 D选项，《细则》第25条第2款规定：“从属权 利要求只能引用在前的权利要求。引用两 项以上权利要求的多项从属权利要求，只能 以择一方式引用在前的权利要求，并不得作 为另一项多项从属权利要求的基础”，D选 项正确。(2016)"},
  {id: 79, topic: "专题四 权利要求", type: "single", question: "下列关于从属权利要求的说法哪些是正确的？", options: {"A": "从属权利要求可以对独立权利要求前序部分的技术特征进行限定", "B": "从属权利要求必须写在所有独立权利要求之后", "C": "引用两项权利要求的从属权利要求不能作为另一项从属权利要求引用的基础", "D": "从属权利要求可以包含独立权利要求中没有提及的附加技术特征"}, answer: "A", explanation: "A选项，根据《审查指南》第二部 分第二章第3.3节的规定，“超过”应理解为 不包括本数，A选项正确。B选项，根据《审 查指南》第二部分第二章第2.2.6节的规定， 当权利要求相对于背景技术的改进涉及数 值范围时，通常应给出两端值附近（最好是 两端值）的实施例，因此不是必须给出两端 值的实施例，B选项错误。C选项，“一 种……·技术”限定的主题名称不清楚，不能 明确表明保护的是方法还是产品，C选项错 误。D选项，“一种化合物K”属于产品类权 利要求，使用方法权利要求应写为“用化合 物X作为杀虫剂”或者“化合物X作为杀虫 剂的应用”，因此D选项错误。(2016)"},
  {id: 80, topic: "专题四 权利要求", type: "multiple", question: "下列关于权利要求的说法正确的是？", options: {"A": "独立权利要求应当记载解决发明所有技术问题的必要技术特征", "B": "从属权利要求可以增加新的技术特征", "C": "如果一项权利要求引用了在前的其他权利要求，则该权利要求为从属权利要求", "D": "不论是独立权利要求，还是从属权利要求，所限定的技术方案都应当是完整的"}, answer: "AC", explanation: "A选项为开放式权利要求，因 此组合物中并不排除权利要求中未指出的 组分，A选项正确。根据《细则》第22条的规 定，权利要求中的附图标记不能解释为对权 利要求的限制，B选项错误。C选项，“权利 要求1～5所述的”属于非择一引用，导致保 护范围不清楚，C选项正确。D选项，一般情 况下，权利要求中如果使用了“如图··所 示”的用语，会导致保护范围不清楚，但特殊 情况下语盲表达不清时，可以使用该用语， D选项的说法太过绝对，错误。（2018）"},
  {id: 81, topic: "专题四 权利要求", type: "multiple", question: "关于发明专利申请权利要求的撰写，下列哪些说法是正确的？", options: {"A": "权利要求书中使用的科技术语应当与说明书中的一致，权利要求书中可以有数学式", "B": "如果一项权利要求包含了另一项权利要求中的所有技术特征，且对该另一项权利要求的技术方案作进一步限定，则该权利要求为从属权利要求", "C": "某独立权利要求为：“1.一种茶杯，包括部件A和B，其特征在于：还包括部件C”。其从属权利要求可以对部件C进行限定，但不能再对部件A进行限定", "D": "引用两项以上权利要求的多项从属权利要求，可以以择-方式引用在前的权利要求，并不得作为另一项多项从属权利要求的基础"}, answer: "BCD", explanation: "A选项，权利要求2的撰写符 合规定。B选项，权利要求3的主题名称为 “笔帽”，与其引用的权利要求1或2的主题 名称“钢笔”不一致，撰写不正确；C选项，权 利要求4中“权利要求2和3所述的”的引用 方式属于非择一引用，并且“特殊”属于模糊 用语，撰写不正确；D选项，权利要求5中“帽 夹”在其引用的权利要求1中并未出现，缺少 引用基础；且权利要求5是多项从属权利要 求，其引用的权利要求3也是多项从属权利 要求，属于多项引多项，撰写不正确。（2015）"},
  {id: 82, topic: "专题四 权利要求", type: "multiple", question: "下列说法哪个是正确的？", options: {"A": "某项权利要求中记载“温度超过100℃”，是指温度大于100℃，不包括100℃本数在内", "B": "某项组合物权利要求中记载了某组份含量的数值范围“10～20重量份”，为了支持该数值范围，说明书实施例中必须相应给出10重量份和20重量份的实施例", "C": "一项制备方法权利要求可以撰写如下：一种生产薄膜的技术，其特征在于将树脂A、填料B、抗氧剂C加人混合机中混合，然后将混合物热成型为薄膜", "D": "一项使用方法权利要求可以撰写如下：一种化合物K，该化合物用作杀虫剂"}, answer: "ABCD", explanation: "根据《审查指南》第二部分 第二章第3.1.2节的规定，A、B、C选项均属 于引用在前独立权利要求的引用式并列独 立权利要求。D选项用特征Y代替特征X， 特征Y既不是增加的技术特征，也不是对权 利要求1的进一步限定，因此D选项是独立 权利要求。（2013)"},
  {id: 83, topic: "专题四 权利要求", type: "multiple", question: "关于权利要求保护范围的解，以下说法正确的有：", options: {"A": "“一种中药组合物，包括山药、枸杞、西洋参、栀子。”该权利要求解释为该组合物还可以含有除山药、枸杞、西洋参、栀子以外的其他组分", "B": "权利要求中可以使用附图标记，附图标记可以解释为对权利要求的限制", "C": "“根据权利要求1~5所述的制造方法，其特征在于….”，这样的引用关系是不允许的，会导致权利要求的保护范围不清楚", "D": "权利要求中如果使用了“如图所示”的用语，就会导致保护范围的不清楚"}, answer: "ABD", explanation: "A选项引用权利要求1，包 含同类型的权利要求1的全部技术特征，并 用技术特征Y对权利要求1的技术方案作 进一步限定，属于权利要求1的从属权利要 求。BD选项引用权利要求1，包含权利要 求1全部技术特征，并对权利要求1进一步 限定，属于权利要求1的从属权利要求，因 此A、B、D选项正确。C选项用特征Z代替 特征X，特征Z既不是增加的技术特征，也 不是对权利要求1的进一步限定，因此C选 项不是权利要求1的从属权利要求，属于独 立权利要求。（2014)"},
  {id: 84, topic: "专题四 权利要求", type: "single", question: "根据权利要求1或3所述的钢笔，其特征在于,所述帽夹是塑料的。\"上述从属权利要求的撰写哪些是不正确的？", options: {"A": "权利要求2", "B": "权利要求3", "C": "权利要求4", "D": "权利要求5"}, answer: "C", explanation: "本题中，权利要求1为独立权 利要求；权利要求2用“固定支架”代替权利 要求1中的“滑动支架”，“固定支架”既不是 增加技术特征，也不是对权利要求1的进一 步限定，因此权利要求2不是权利要求1的 从属权利要求，属于独立权利要求；权利要 求3保护的主题是“装配线”，属于引用式并 列独立权利要求，因此A、B、D选项错误，C 选项正确。（2012)"},
  {id: 85, topic: "专题四 权利要求", type: "multiple", question: "下列哪些权利要求属于独立权利要求？", options: {"A": "一种实施权利要求1所述方法的设备，", "B": "一种包含权利要求1所述设备的装置，…", "C": "一种与权利要求1所述插座相配合的插头，…", "D": "根据权利要求1所述的组合物，其特征在于用特征Y代替权利要求1中的特征X"}, answer: "ABD", explanation: "A选项，《细则》第22条第1 款规定：“权利要求书应当记载发明或者实 用新型的技术特征”，A选项正确。B选项， 《细则》第22条第2款规定：“权利要求书有 几项权利要求的，应当用阿拉伯数字顺序编 号”，B选项正确。C、D选项，《细则》第22条 第3款规定：“权利要求书中使用的科技术 语应当与说明书中使用的科技术语一致，可 以有化学式或者数学式，但是不得有插 图……...”，因此C选项错误，D选项正确。 (2012)"},
  {id: 86, topic: "专题四 权利要求", type: "single", question: "如果独立权利要求1为“一种机床，包括特征X”，则下列哪些属于该权利要求的从属权利要求？", options: {"A": "根据权利要求1所述的机床，其特征在于该机床还包括特征Y。", "B": "根据权利要求1所述的机床，其特征在于特征X的材料是金属。", "C": "根据权利要求1所述的机床，其特征在于用特征Z代替特征X。", "D": "根据权利要求1所述的机床，其特征在于该机床用于加工刀具。"}, answer: "C", explanation: "根据《审查指南》第二部分第二 章第3.2.2节的规定，权利要求中不得使用 含义不确定的用语，除非这种用语在特定技 术领域具有公认的确切含义，如放大器中的 “高频”；一般也不得使用“约、等、接近、或类 似物”等类似的用语。A、D选项中的“等”、 “约为”属于模糊性用语，B选项中“可”表选 择也属于模糊性用语，均造成保护范围不清 楚。C选项清楚，当选。（2019改编）"},
  {id: 87, topic: "专题四 权利要求", type: "multiple", question: "包含权利要求2的机床的装配线。”对于上述3个权利要求，下列哪种说法是正确的？", options: {"A": "权利要求1为独立权利要求，权利要求2、3为从属权利要求", "B": "权利要求1、2为独立权利要求，权利要求3为从属权利要求", "C": "权利要求12、3皆为独立权利要求", "D": "权利要求1、3为独立权利要求，权利要求2为从属权利要求"}, answer: "AD", explanation: "A选项中权利要求缺少主题 名称，不能清楚地表明权利要求的类型。B 选项中“….作为……...·的应用”、C选项中 “用…作为…”均清楚地表明权利要求 属于用途权利要求，即方法权利要求。D选 项“一种…的技术”不能清楚地表明权利 要求的类型。（2015）"},
  {id: 88, topic: "专题四 权利要求", type: "multiple", question: "下列关于发明专利申请权利要求书的说法哪些是正确的？", options: {"A": "权利要求书应当记载发明的技术特征", "B": "权利要求书有几项权利要求的，应当用阿拉伯数字顺序编号", "C": "权利要求书中可以有插图", "D": "权利要求书中可以有化学式或者数学式"}, answer: "AD", explanation: "A选项中“用于钢水浇铸”的 用途对“模具”具有限定作用，清楚地表明该 权利要求属于含有用途限定的产品权利要 求，正确。B选项中“一种·…..·方案”不能清 楚地表明权利要求的类型。C选项中权利 要求主题名称无法确定权利要求的类型，导 致权利要求主题不清楚。D选项中权利要 求的主题名称能清楚地表明该权利要求属 于方法权利要求，正确。(2019改编）"},
  {id: 89, topic: "专题四 权利要求", type: "single", question: "下列权利要求表述清楚的是？", options: {"A": "一种组合物，其包括A和B，其中，A是C等", "B": "一种燃烧器，其特征在于混合燃烧室可具有沿正切方向的燃料进料口", "C": "一种信号处理装置，包括滤波器和高频放大器", "D": "一种醇，其链长约为3个碳原子"}, answer: "A", explanation: "A选项中括号属于具有通常可 接受含义的括号，是允许的，因此A选项表 述是清楚的。B选项的“一种对……·控制”、 C选项的主题名称中既包含产品又包含了 产品的制备方法，均不能清楚表明权利要求 类型的主题名称。D选项中“金属”和“铜” 属于上下位概念关系，上下位混用造成表述 不清楚。（新编）"},
  {id: 90, topic: "专题四 权利要求", type: "single", question: "下列权利要求的主题名称中，哪些不能清楚表明权利要求的类型？", options: {"A": "根据权利要求1，所述装置包括圆筒", "B": "一种空气净化机作为空气加湿器的应用", "C": "用二氯丙酸作为除草剂", "D": "一种自动修复计算机系统元件的技术"}, answer: "A", explanation: "A选项的括号属于具有通常可 接受含义的括号，是允许的，因此A选项表 述清楚。B选项中“最好是”、D选项中“例 如”使权利要求出现了不同的保护范围，因 此导致权利要求的保护范围不清楚。C选 项，“高温”属于含义不确定的用语，导致权 利要求的保护范围不清楚。（2017改编）"},
  {id: 91, topic: "专题四 权利要求", type: "multiple", question: "下列权利要求的主题名称清楚的是？", options: {"A": "用于钢水浇铸的模具", "B": "一种节约制造成本的方案", "C": "一种气悬浮柔性物质的输送及定位", "D": "一种使用砖坏回转窑传输装置生产保温砖的方法"}, answer: "CD", explanation: "A选项中“低温”属于不确定 用语；由于手机SIM卡具有不同大小，因此 B选项中“大小和形状与手机SIM卡相同” 也属于不确定用语，均造成权利要求表述不 清楚。C选项中“高频放大器”在特定技术 领域中具有公认的确切含义，表述清楚。D 选项虽然出现“优选”，但并没有导致权利要 求出现不同的保护范围，表述清楚。（新编）"},
  {id: 92, topic: "专题四 权利要求", type: "multiple", question: "下列权利要求的主题或表述清楚的是：", options: {"A": "一种杀虫剂，其中含有25%-35%（重量）的活性A", "B": "一种对鼠标指针在屏幕上移动的控制", "C": "一种除草剂及其制备方法", "D": "一种电源外壳，所述外壳是金属材质或铜"}, answer: "ABCD", explanation: "A选项，权利要求2中“金 属（铝）”的括号属于不可接受含义的括号， 造成权利要求的保护范围不清楚，A选项撰 写错误。B选项，除绝对必要外，权利要求 中不得使用“如图…所示”的用语，权利要 求3并不属于绝对必要的情形，因此B选项 撰写错误。C选项，权利要求4中的“最好 为”使权利要求出现了两个不同的保护范 围，导致权利要求的保护范围不清楚，C选 项撰写错误。D选项，权利要求5的主题名 称“散热箔”与其引用的权利要求1的主题 名称“散热装置”不一致，因此D选项撰写错 误。（2015改编）"},
  {id: 93, topic: "专题四 权利要求", type: "multiple", question: "以下哪种撰写方式不会导致所在的权利要求保护范围不清楚？", options: {"A": "组合物中含有（甲基）丙烯酸酯", "B": "传动器由金属制成，最好是铜", "C": "化合物A和化合物B在高温下反应", "D": "操作温度为30～60摄氏度，例如45摄氏度"}, answer: "BCD", explanation: "A选项撰写无问题。虽然权 利要求1缺少“其特征在于”，但考试中从未 将此作为缺陷。B选项，权利要求2中“豆 类”是上位概念，“大豆”“绿豆”是其下位概 念，上下位概念混用导致该权利要求的保护 范围不清楚，撰写错误。C选项，权利要求3 引用权利要求“1和2”时采用了非择一引用 方式，撰写错误。D选项，权利要求4的“菠 菜”在其引用的权利要求1中未出现，导致权 利要求4缺少引用基础，撰写错误。（2016)"},
  {id: 94, topic: "专题四 权利要求", type: "multiple", question: "权利要求中的用词应当含义清楚、确定，下列权利要求表述清楚的是：", options: {"A": "一种等离子焊接机，其特征在于在低温下进行焊接", "B": "一种冷水机，其特征在于所述蒸发器的表面上有一凹块，该凹块的大小和形状与手机SIM卡相同", "C": "一种等离子焊接机，其特征在于其内设置电磁高频放大器", "D": "一种天然酵素护肤沐浴露，其中天然酵素质量份数优选为10-20份"}, answer: "ABCD", explanation: "A选项中“远大于”、B选项 中“很小”属于含义不确定的用语；C选项中 “优选”导致该权利要求限定出两个不同的 保护范围；D选项中“最高”和“不低于”是相 互矛盾的、不清楚的表述。A、B、C、D选项 均会使得所在的权利要求请求保护的范围 不清楚。（2018)"},
  {id: 95, topic: "专题四 权利要求", type: "multiple", question: "根据权利要求1所述的散热箔，其特征在于，所述进气管的形状为螺旋状。”上述权利要求中哪些存在撰写错误？", options: {"B": "权利要求3", "A": "权利要求2", "D": "权利要求5", "C": "权利要求4"}, answer: "BC", explanation: "《细则》第23条第3款规定：“从 属权利要求应当用附加的技术特征，对引用 的权利要求作进一步限定”。A、D选项，一 5℃~-10℃和0℃均包含在0℃~-18℃的数 值范围之内，是对独立权利要求的进一步限 定，因此A、D选项撰写符合规定。B、C选 项，0℃~10℃和-5℃~-20℃均超出了0℃~ -18℃的数值范围，不是对独立权利要求的 进一步限定，因此B、C选项撰写不符合规 定。（2007) 24。ABD。A选项，主题名称采用“. 的技术”，未能明确表示出其保护主题是产 品还是方法，因此A选项存在撰写错误。B 选项，《审查指南》第二部分第二章第3.3节 规定：“权利要求中的技术特征可以引用说 明书附图中相应的标记，以帮助理解权利要 求所记载的技术方案。但是，这些标记应当 用括号括起来，放在相应的技术特征后 面。”，B选项中权利要求的附图标记没有在 括号内，因此B选项存在撰写错误。C选项 的撰写符合规定。D选项，上位概念“有机 溶剂”和下位概念“乙醇”混用，导致权利要 求的保护范围不清楚，因此D选项存在撰写 错误。（2008）"},
  {id: 96, topic: "专题四 权利要求", type: "single", question: "根据权利要求1所述的制作方法，其特征在于：菠菜在烫前要切除根部。”在上述权利要求均得到说明书支持的情况下，哪些权利要求撰写上存在错误？", options: {"B": "权利要求2", "A": "权利要求1", "D": "权利要求4", "C": "权利要求3"}, answer: "D", explanation: "错误一：权利要求2的主题名 称为“枕套”，与其引用的权利要求1的主题 名称“枕头”不一致。错误二：权利要求3中 的“四面”，在其引用的权利要求1中并未出 现，因此权利要求3缺少引用基础。错误 三：权利要求3中的“约”属于模糊性用语， 错误四：权利要求4中“权利要求1和3”属 于非择一引用。错误五：权利要求4中的 “如附图所示”，不属于绝对必要的情形，权 利要求不能引用附图。综上，从属权利要求 共有5处错误，D选项正确。（2016改编）"},
  {id: 97, topic: "专题四 权利要求", type: "multiple", question: "下列发明专利申请的权利要求，哪些请求保护的范围是不清楚的（不考虑选项中省略号部分的内容）？", options: {"A": "一种非易失性存储器的操作方法，包括.….·执行一抹除过程，其中井电压远大于基底电压", "B": "一种装饰照明装置，包括照明灯及连接的导线，该导线的电阻很小", "C": "一种含三水合氧化铝的牙膏，其中三水合氧化铝的平均粒度小于30微米，优选5～20微米", "D": "一种制备产品A的方法，其特征在于.将混合物最高加热到不低于80℃的温度"}, answer: "CD", explanation: "《审查指南》第二部分第二章第 3.2.1节规定：“纯功能性的权利要求得不到 说明书的支持，在判断权利要求是否得 到说明书的支持时，应当考虑说明书的全部 内容，而不是仅限于具体实施方式部分的内 容。独立权利要求得到说明书支持并 不意味着从属权利要求也必然得到支持；方 法权利要求得到说明书支持也并不意味着 产品权利要求必然得到支持”，因此A、B选 项错误，C、D选项正确。（2016改编）"},
  {id: 98, topic: "专题四 权利要求", type: "single", question: "一件专利申请的权利要求1撰写如下：一种冷饮杯，具有以导热材料制成的内杯胆和外杯胆，其特征是：在内、外杯胆之间的夹层内封装有蓄冷剂，所述蓄冷剂选自一种相变温度在0℃～-18℃范围的蓄冷材料。在都能够得到说明书支持的情况下,下列哪些权利要求的撰写形式不符合规定？", options: {"A": "如权利要求1所述的冷饮杯，其特征是：所述蓄冷剂选自一种相变温度在-5℃～-10℃范围的蓄冷材料。", "B": "如权利要求1所述的冷饮杯，其特征是：所述蓄冷剂选自一种相变温度在0℃～10℃范围的蓄冷材料。", "C": "如权利要求1所述的冷饮杯，其特征是：所述蓄冷剂选自一种相变温度在大约-5℃～-20℃范围的蓄冷材料。", "D": "如权利要求1所述的冷饮杯,其特征是：所述蓄冷剂选自一种相变温度为0℃的蓄冷材料。"}, answer: "A", explanation: "A选项，《审查指南》第二部分 第二章第3.2.1节规定：“.….权利要求书中 的每一项权利要求所要求保护的技术方案 应当是所属技术领域的技术人员能够从说 明书充分公开的内容中得到或概括得出的 技术方案：，并且不得超出说明书公开的范 围·….”，因此A选项正确。B选项，根据 《审查指南》第二部分第二章第2.2.6节的规 定，当一个实施例足以支持权利要求所概括 的技术方案时，说明书中可以只给出一个实 施例，因此B选项错误。C、D选项，《审查指 南》第二部分第二章第3.2.1节规定：“权利 要求的技术方案在说明书中存在一致性的 表述，并不意味着权利要求必然得到说明书 的支持。只有当所属技术领域的技术人员 能够从说明书充分公开的内容中得到或概 括得出该项权利要求所要求保护的技术方 案时，记载该技术方案的权利要求才被认为 得到了说明书的支持”，因此C、D选项错误。 （2014改编）"},
  {id: 99, topic: "专题四 权利要求", type: "multiple", question: "请判断下列哪些权利要求存在撰写错误？", options: {"A": "根据权利要求2所述的脱除硫氧化物的技术，其中所述加热步骤中加热温度为20℃～25℃。", "B": "根据权利要求1所述的割草机，其中所述滑块2通过弹性部件7与所述驱动臂5连接。", "C": "根据权利要求1所述的润滑油组合物，其中所述组分X的含量为所述润滑油组合物总重量的75%～80%。", "D": "根据权利要求2所述的方法，其中所述溶剂是有机溶剂、水或乙醇。"}, answer: "AC", explanation: "A选项，《审查指南》第二部分 第二章第2.2.6节规定：“当权利要求相对于 背景技术的改进涉及数值范围时，通常应给 出两端值附近（最好是两端值)的实施例，当 数值范围较宽时，还应当给出至少一个中间 值的实施例”。说明书仅公开了一个酶解反 应液pH值为7.5的实施例，权利要求中的酶 解反应液pH值为5.0和8.0这两个数值及范 围在说明书中没有记载，因此A选项得不到 说明书的支持。B选项，权利要求记载的A 步骤的处理温度是380～400℃，说明书中记 载了A步骤的处理温度是350-400℃，两个 实施例中A步骤的处理温度分别是380℃和 400℃，因此B选项能够得到说明书的支持。 C选项，说明书中仅记载了制作该喷嘴的材 料是铜，并说明用铜制作电纺丝喷嘴是利用 其软金属特性，并未记载任何一种金属都能 够实现其效果，因此C选项得不到说明书的 支持。D选项，虽然在说明书文字部分未提 及触摸屏，但在附图中绘制了具有触摸屏的 图像处理设备，因此D选项能够得到说明书 的支持。（2012)"},
  {id: 100, topic: "专题四 权利要求", type: "single", question: "根据权利要求1和3所述的枕头，其特征在于：枕套两端设置两个如附图所示的不同高度的平面。上述从属权利要求有几处错误？", options: {"D": "5", "C": "4", "A": "2", "B": "3"}, answer: "B", explanation: "气味或者诸如声、光、电、磁、波等信号 或者能量不属于专利保护的客体。A选项中“信 号”C选项中“光”D选项中“能量”均不属于可被 授予专利权的客体。B选项中“装置”为产品，属于 可以授予专利权的主题，B选项正确。（2014)"},
  {id: 101, topic: "专题四 权利要求", type: "multiple", question: "关于权利要求是否得到说明书的支持，下列说法哪些是正确的？", options: {"A": "独立权利要求得到说明书的支持，其从属权利要求必然得到说明书的支持", "B": "方法权利要求得到说明书的支持，产品权利要求必然得到说明书的支持", "C": "纯功能性的权利要求得不到说明书的支持", "D": "在判断权利要求是否得到说明书的支持时，应当考虑说明书的全部内容"}, answer: "BD", explanation: "A选项要求保护的是改良被污染土壤 的方法，可以授予专利权。B选项属于智力活动的 规则和方法，不能被授予专利权。C选项属于利用 气体的性质解决除臭和驱虫的技术问题，可被授 予专利权。考生需注意，气味不属于技术方案，不 属于可授权主题。D选项中的动物品种由其他法 律法规进行保护，不能被授予专利权。（2009)"},
  {id: 102, topic: "专题四 权利要求", type: "multiple", question: "下列关于权利要求是否得到说明书的支持的说法哪些是正确的？", options: {"A": "权利要求概括的技术方案不得超出说明书公开的范围", "B": "为支持权利要求，说明书必须包括至少两个具体实施例", "C": "如果权利要求的技术方案在说明书中存在一致性的表述，则权利要求必然得到说明书的支持", "D": "只要将权利要求的技术方案拷贝到说明书中，就可以克服权利要求得不到说明书支持的缺陷"}, answer: "AB", explanation: "《专利法》第2条第2款规定：“发明，是 指对产品、方法或者其改进所提出的新的技术方 案”，A选项是对材料本身的改进、B选项是对方法 的改进，均属于发明专利保护的客体，A、B选项正 确。C选项是产品设计图、D选项是美术作品，均 属于著作权保护的客体，不属于发明专利保护的 客体。（新编）"},
  {id: 103, topic: "专题四 权利要求", type: "multiple", question: "下列哪些权利要求得不到说明书的支持？权利要求说明书一种碱性蛋白酶酶解蚕蛹仅公开了一个酶解反应液蛋白的方法，其中酶解", options: {"A": "PH值为7.5的实施例反应液PH值为5.0~8.0。技术方案部分所记载的A步一种废渣处理方法，其中骤的处理温度是350～400℃，", "B": "A步骤的处理温度是380~两个实施例中A步骤的处理400℃。温度分别是380℃和400℃仅记载了制作该喷嘴的材料是一种柔性电纺丝喷嘴制", "C": "铜，并明确说明用铜制作电纺作该喷嘴的材料为金属··。丝喷嘴是利用其软金属特性文字部分未提及触摸屏，但一种图像处理设备，包括：", "D": "在附图中绘制了具有触摸屏触摸屏，……。的图像处理设备-34 -专利保护的对象和主题"}, answer: "ACD", explanation: "A选项要求保护的是一种生产消毒 巾的方法，因此不属于实用新型专利保护的客体。 B选项，在长纤维绒毛浆块的表面附有一层无纺 布，涉及产品结构的改进，属于实用新型专利保护 的客体。C选项，涉及组分、含量的材料成分改进， 不属于实用新型专利保护的客体。D选项虽然属 于产品权利要求，但要求保护的是产品的用途，不 属于实用新型专利保护的客体。（2006）"},
  {id: 104, topic: "专题五 专利保护的对象和主题", type: "single", question: "下列哪个属于可以授予专利权的主题？", options: {"A": "一种抗干扰的电波信号", "B": "一种抗干扰的电波信号的发生装置", "C": "一种可对室内环境进行有效消毒的光", "D": "一种通过环保无污染的方式获得的能量"}, answer: "A", explanation: "A选项是对复合板材的产品构造提出 的改进，属于实用新型专利保护的客体。B选项涉 及对复合板材的制造方法提出的改进，不属于实 用新型专利保护的客体。C选项涉及对复合板材 的应用提出的改进，不属于实用新型专利保护的 客体。D选项未采取技术手段，也未解决技术间 题，不属于实用新型专利保护的客体。（2013）"},
  {id: 105, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪些属于不授予专利权的主题？", options: {"A": "一种改良被污染土壤的方法", "B": "一种利用计算机程序求解圆周率的方法", "C": "一种可除臭和驱虫的气体", "D": "一种通过重组DNA技术得到的转基因山羊品种"}, answer: "CD", explanation: "A选项涉及制造方法的改进、B选项 涉及材料的改进，均不属于实用新型专利保护的 客体。C选项各部分按照技术方案所确定的相互 关系将钢带包装起来后形成了确定的空间形状， 属于实用新型专利保护的客体。D选项涉及对产 品构造的改进，即使产品的形状是在某种特定情 况下所具有的确定的空间形状，属于实用新型专 利保护的客体。（2015改编）"},
  {id: 106, topic: "专题五 专利保护的对象和主题", type: "single", question: "下列哪些属于发明专利保护的客体？", options: {"A": "一种用于雕塑的合金材料", "B": "一种制作雕塑的方法", "C": "一幅有结构和形状的雕塑图纸", "D": "一种仅有形状的雕塑"}, answer: "B", explanation: "A选项，“新程序控制”技术方案涉及方 法的改进，不属于实用新型专利保护的客体。B选 项是对产品构造提出的改进，属于实用新型专利 保护客体。C选项涉及“新材料”的改进，不属于实 用新型专利保护的客体。D选项，“动物形象”涉及 生物的或者自然形成的形状作为产品的形状特 征，没有采用技术方案，也没有解决技术问题，不 属于实用新型专利保护的客体。（2016)"},
  {id: 107, topic: "专题五 专利保护的对象和主题", type: "single", question: "下列权利要求所要求保护的发明创造，哪些不属于实用新型专利保护的客体？", options: {"A": "一种消毒巾，其特征在于：该消毒巾先经过消毒处理，然后经过烘干制成干性消毒巾", "B": "一种消毒巾，其特征在于：在长纤维绒毛浆块的表面附有一层无纺布", "C": "一种消毒巾，其特征在于：该消毒巾可以制成干、湿两种类型，湿性消毒巾的湿度", "D": "一种消毒巾，其特征在于：该消毒巾用于手术后消毒医疗器械"}, answer: "A", explanation: "A选项，生活晾绳具有产品的结构和形 状，属于实用新型专.利保护客体。B选项，动物标 本属于生物的或者自然形成的形状，不属于实用 新型专利保护客体。C选项，玻璃水为无确定形状 的产品，不属于实用新型专利保护客体。D选项， 织物中掺入荧光粉没有形成特定的层状结构，不 属于实用新型专利给予保护的产品构造，因此不 属于实用新型专利保护客体。（2017)"},
  {id: 108, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪个属于实用新型专利保护的客体？", options: {"A": "一种复合板材，其特征在于由三层板材构成，板材之间由胶水粘结", "B": "一种复合板材，其特征在于经浸泡、脱水、干燥而成", "C": "一种复合板材，其特征在于可用于制造简易房屋", "D": "一种复合板材，其特征在于板材上印刷有卡通图案"}, answer: "BC", explanation: "A、D选项，属于以摆放、堆积等方法 获得的非确定的形状，不属于实用新型专利保护 的客体，A、D选项错误。B选项，实用新型专利保 护客体允许产品中的某个技术特征为无确定形状 的物质，只要该特征在产品中受产品结构特征限 制即可；因此B选项属于实用新型专利保护客体， B选项正确。C选项，“随着蜡烛的熔化变形”属于 产品的形状在某种特定情况下具有的确定的空间 形状，该开关属于实用新型专利保护客体，C选项 正确。（2017)"},
  {id: 109, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪个属于实用新型专利保护的客体？", options: {"A": "一种复合齿轮，其特征在于将熔制的钢水浇铸到齿模内，冷却、保温后而成", "B": "一种药膏，其特征在于包含凡士林5%～20%、尿素10%~30%水杨酸8%~30%", "C": "一种用于钢带运输的钢带包装壳，其特征在于由内钢圈、外钢圈及捆带捆合在钢带上", "D": "一种降落伞，其特征在于展开后的横截面为半圆形"}, answer: "BCD", explanation: "A选项，一切未经人工制造的自然 存在的物品都不是实用新型专利保护客体。B选 项，包装箱的折叠结构具有可以从外部观察到的 确定的空间形状，属于实用新型专利保护客体，B 选项正确。C选项，充气房屋在完成充气后具有确 定的空间形状，属于在特定情况下具有确定的空 间形状，因此是实用新型专利保护客体，C选项正 确。D选项，焊接属于已知方法的名称，用已知方 法的名称限定产品的形状、构造属于实用新型的 客体，因此D选项正确。（新编）"},
  {id: 110, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪个属于实用新型专利保护的客体？", options: {"A": "一种采用新程序控制的垃圾桶", "B": "一种制作卡通形象垃圾桶的模具", "C": "一种用于制作垃圾桶的新材料", "D": "一种为了美观而将外形设计为动物形象的垃圾桶"}, answer: "BCD", explanation: "根据《审查指南》第一部分第二章 第6.2.2节的规定，产品的渗碳层、氧化层属于复合 层结构，属于实用新型专利保护的客体，而物质的 分子结构、组分、金相结构等不属于实用新型专利 保护的产品的构造，因此A选项错误，B、C、D选项 正确。(2019)"},
  {id: 111, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪个主题属于实用新型的保护客体？", options: {"A": "一种生活晾绳", "B": "动物标本", "C": "一种玻璃水", "D": "织物中掺人荧光粉而形成的荧光织物"}, answer: "ABD", explanation: "题目给出“同时提出发明专利申请 和实用新型专利申请”，即要求判断选项中的权利 要求能否同时满足发明和实用新型的要求。A选 项，涉及对产品组分的改进，不属于实用新型专利 保护客体，A选项不符合规定。B选项为产品制造 方法，不属于实用新型专利保护客体。C选项，涉 及对产品构造的改进，同时属于发明专利和实用 新型专利保护的客体，C选项符合规定。D选项， 涉及对产品材料提出的改进，不属于实用新型专 利保护客体，D选项不符合规定。（新编）"},
  {id: 112, topic: "专题五 专利保护的对象和主题", type: "single", question: "关于实用新型的保护客体，以下说法正确的是？", options: {"A": "将若干一次性水杯摆放成有利于运动员拿取的楔形，这样的水杯造型产品属于实用新型专利保护客体", "B": "含有无确定形状的水银或酒精的温度计，属于实用新型的保护客体", "C": "一种带有棱柱形蜡烛的音乐开关，随着蜡烛的熔化变形而实现电路的转换，该开关属于实用新型的保护客体", "D": "堆积成圆台状的建筑沙子属于实用新型的保护客体"}, answer: "C", explanation: "A选项，根据《审查指南》第二部分第 一章第3.1.1节的规定，法律，是指由全国人民代表 大会或者全国人民代表大会常务委员会依照立法 程序制定和颁布的法律，不包括行政法规和规章， 因此A选项错误；B选项，《细则》第10条规定：“专 利法第5条所称违反法律的发明创造，不包括仅其 实施为法律所禁止的发明创造”，其含义是，如果 仅仅是发明创造的产品的生产、销售或使用受到 法律的限制或约束，则不能说明该产品本身及其 制造方法就属于违反法律的发明创造，因此B选项 错误。C选项，《专利法》第5条第2款规定：“对违 反法律、行政法规的规定获取或者利用遗传资源， 并依赖该遗传资源完成的发明创造，不授予专利 权”，C选项符合上述法条规定的情形，因此C选项 正确。D选项，根据《审查指南》第一部分第一章第 7.2节的规定，《专利法》第5条的审查对象应该包 括专利申请的全部内容，不仅包括权利要求书，也 包括说明书及其附图、说明书摘要等全部申请文 件，因此，即便违反法律的内容仅在申请说明书中 记载而未在权利要求书中请求保护，该专利申请 也不得授予专利权，因此D选项错误。（2018）"},
  {id: 113, topic: "专题五 专利保护的对象和主题", type: "single", question: "下列属于实用新型专利保护的客体的是？", options: {"A": "自然生长的树根", "B": "包装箱的折叠结构", "C": "一种充气房屋", "D": "一种焊接的窗框结构"}, answer: "A", explanation: "警用手枪的生产、销售或使用受到法 律的限制或约束，但其本身并不属于违反法律，因 此A选项属于实用新型保护客体。B选项属于著 作权保护范畴。C选项，带有国徽的鼠标垫违反法 律，不属于实用新型的保护客体。D选项，对该种 凸显祭祀活动奢铺张的产品予以专利保护，有 违社会主义核心价值观及专利法立法宗旨，应认 定其属于专利法第5条第1款规定的违反社会公 德、妨害公共利益的发明创造，不应授予专利权。 （新编）"},
  {id: 114, topic: "专题五 专利保护的对象和主题", type: "single", question: "下列哪些是实用新型专利产品的构造？", options: {"A": "物质的金相结构", "B": "产品的机械构造", "C": "产品的渗碳层", "D": "金属的氧化层"}, answer: "D", explanation: "A选项，激光不属于专利法保护的客 体，但利用其性质解决技术问题的发生器属于可 授予专利权的客体，因此A选项错误。B选项，塑 料薄膜属于实用新型专利保护客体，但其制备方 法不属于实用新型专利保护客体，因此B选项错 误。C选项中带有人民币图案的窗帘违反《中国人 民银行法》，不能被授予专利权，因此C选项错误。 D选项正确。（2017）"},
  {id: 115, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "申请人准备就一项发明创造同时提出发明专利申请和实用新型专利申请，下列哪些权利要求的撰写不符合有关规定？", options: {"A": "一种产品，包括重量百分比为75%的组分X和重量百分比为25%的组分Y", "B": "一种制造产品Z的方法，特征在于产品Z中包括部件P和Q", "C": "一种产品，包括金属部件X,其中X的形状为圆锥形", "D": "一种产品，包括材料X和Y，特征在于对材料X的改进"}, answer: "BD", explanation: "A选项，伪造人民币的设备属于《专 利法》第5条规定的违反法律的发明创造，因此不 能被授予专利权。B选项，根据《审查指南》第二部 分第一章第3.1.1节的规定，该装置的发明创造目 的不违反法律，其可能被用于窃听，属于滥用才违 反法律，属于可授予专利权的主题。C选项，“光” 不属于专利法的保护客体，因此不能被授予专利 权。D选项，原子核变换方法不能被授予专利权， 但为实现核变换方法的各种设备、仪器及其零部 件等，均属于可被授予专利权的客体，D选项正确。 (2015)"},
  {id: 116, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "关于专利法第五条，以下说法正确的是？律”，包括由全国人民代表大会或其常务委员会，以及国务院制定和颁布的法律法规", options: {"B": "只要发明创造的产品的生产、销售或使用违反了法律，则该产品本身及其制造方法就属于违反法律的发明创造", "C": "如果一项在美国完成的发明创造的完成依赖于从中国获取的某畜禽遗传资源，该遗传资源属于列入《中华人民共和国国家级畜禽遗传资源保护名录》的遗传资源，但发明人并未按照《中华人民共和国畜禽遗传资源进出境和对外合作研究利用审批办法》的规定办理审批手续，因此，该项发明向中国申请专利时不能授予专利权", "D": "如果某专利申请说明书包含了违反法律的发明创造，但该申请的权利要求中未请求保护该违反法律的发明创造，则该专利申请不违反专利法第五条第一款的规定", "A": ""}, answer: "BD", explanation: "A选项，如果发明创造因滥用而可能 造成妨害公共利益的，则不能以“妨害公共利益” 为理由拒绝授予专利权，A选项错误。B、C选项， 宣传封建迷信的发明创造因妨害公共利益，不能 被授予专利权，但涉及宗教信仰的发明创造，只有 达到以致妨害公共利益的，才不能被授予专利权， 因此B选择正确，C选项错误。D选项，一件专利申 请中含有违反法律、社会公德或者妨害公共利益 的内容，删除违法的部分，就能被授予专利权，因 此D选项正确。（新编）"},
  {id: 117, topic: "专题五 专利保护的对象和主题", type: "single", question: "下面属于实用新型保护客体的是：", options: {"A": "一把警用手枪", "B": "一种学校操场的规划工程图", "C": "一种带有国徽的鼠标垫", "D": "一种祭祀用的豪华纸屋"}, answer: "B", explanation: "A选项是以有生命的人体为对象，以 诊断心脏疾病为直接目的，属于诊断方法。B选项 是以植物为对象，不属于疾病的诊断和治疗方法。 C选项以治疗伤口为目的，属于疾病治疗方法。D 选项，根据《审查指南》第二部分第一章第4.3.1.1 节的规定，如果一项发明从表述形式上看是以离 体样品为对象，但该发明是以获得同一主体疾病 诊断结果或健康状况为直接目的，则该发明仍然 不能被授予专利权，因此D选项属于疾病的诊断方 法。（2012)"},
  {id: 118, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "以下说法哪个是正确的？", options: {"A": "一种超强超短激光及其发生器均可获得发明专利保护", "B": "塑料薄膜和其制备方法均可获得实用新型专利保护", "C": "带有人民币图案的窗帘的外观设计可获得外观设计专利保护", "D": "以上说法都错误"}, answer: "ABCD", explanation: "A、B、C、D选项均属于《专利法》 第25条第1款第（二）项规定的智力活动的规则和 方法，因此均不属于可授予专利权的主题。（2014) 20、A。A选项，玉米是植物品种，不能授予专 利权。B选项，武器的生产销售及使用受法律限 制，但本身属于专利保护的客体。C选项，用原子 核变换方法所获得的物质，如各种放射性同位素， 不能被授予发明专利权，但这些同位素使用的设 备，属于可被授予专利权的客体。D选项，制造假 肢或假体，及为制造而实施的测量方法不属于治 疗方法，可授予专利权。（2016）"},
  {id: 119, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪些选项属于可以授予专利权的主题？", options: {"A": "伪造人民币的设备", "B": "一种能透过玻璃听到他人谈话的装置", "C": "促进种子发芽的红外光", "D": "原子核裂变的反应器"}, answer: "AC", explanation: "A选项属于科学发现、C选项属于疾 病的诊断方法，均属于不授予专利权的申请。B选 项中的仪器属于用于实施疾病诊断和治疗方法的 仪器或装置、D选项中的中成药属于在疾病诊断和 治疗方法中使用的物质或材料，均属于可被授予 专利权的申请。（2017)"},
  {id: 120, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪些说法是正确的？", options: {"A": "一种含吗啡的药品，因滥用可能造成妨害公共利益的，不能被授予专利权", "B": "宣传封建迷信的发明创造，不能被授予专利权", "C": "涉及宗教信仰的发明创造，不能被授予专利权", "D": "一种投币式弹子游戏机，游戏者如果达到一定的分数，机器则抛出一定数量的钱币，如果将抛出钱币的部分删除则可被授予专利权"}, answer: "BC", explanation: "A选项，《审查指南》第二部分第一章 第4.4节规定：“专利法所称植物品种是指经过人 工选育或者发现并经过改良，形态特征和生物学 特性一致，遗传性状相对稳定的植物群体”，天然 存在的野生植物属于科学发现，因此A选项错误。 根据《审查指南》第二部分第一章第4.4节的规定， 动物和植物品种不能被授予专利权，B选项正确。 C选项，对动物和植物品种非生物学的生产方法， 可以授予专利权，但不包括生产动物和植物主要 是生物学的方法。一种方法是否属于“主要是生 物学的方法”，取决于在该方法中人的技术介入程 度，因此C选项正确。D选项，专利法所称的动物 不包括人，所述动物是指不能自已合成，而只能靠 摄取自然的碳化学合物及蛋白质来维系其生命的 生物，D选项错误。（新编）"},
  {id: 121, topic: "专题五 专利保护的对象和主题", type: "single", question: "下列哪种方法不属于疾病的诊断和治疗方法？", options: {"A": "利用冠状造影判断心脏疾病的操作步骤", "B": "杀灭植物虫害的方法", "C": "对伤口进行拉链式缝合的方法", "D": "检测脱离人体的粪便以判断人体是否有炎症的方法"}, answer: "A", explanation: "A选项，尿液虽然脱离了人体，但检测 的直接目的仍是获得人体诊断结果或健康状况， 因此仍属于疾病的诊断方法，属于不可授予专利 权的主题。B选项，人的技术介入对该方法所要达 到的目的或者效果起了主要的控制作用或者决定 性作用，属于非生物学的方法，属于可授予专利权 的主题。C选项，属于实现核变换方法的装置，可 被授予专利权。D选项，全部步骤由计算机等装置 实施的信息处理方法不属于疾病诊断治疗方法， 可被授予专利权。（2018改编）"},
  {id: 122, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列选项中哪些不属于可授予专利权的主题？", options: {"A": "一种可有效识别抑郁症的心理测验方法", "B": "一种可有效驯服野马的方法", "C": "一种可有效提高婴儿体质的食谱", "D": "一种可有效开发计算机软件的计算机编程语言"}, answer: "ABD", explanation: "A选项的主题“激光”不属于专利 保护的客体；B选项中“质量控制方法”属于智力活 动规则；D选项属于疾病的诊断方法。C选项，根 据《审查指南》第二部分第一章第4.3.1.2节的规 定，直接目的不是获得诊断结果或健康状况，而只 是对已经脱离人体或动物体的组织、体液或排泄 物进行处理或检测以获取作为中间结果的信息的 方法，或处理该信息的方法不属于诊断方法，因此 C选项属于可授予专利权的主题。（2018)"},
  {id: 123, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪个属于不可获得专利权的主题？", options: {"A": "一种用转基因方法培育的黑色玉米品种", "B": "一种必须经主管机关批准方能生产的武器", "C": "一种生产放射性同位素的设备", "D": "一种制造假肢的方法"}, answer: "BCD", explanation: "A选项属于利用激光性质解决技 术问题的方法，可以授予专利权。B选项，涉及改 变人生殖系遗传同一性的方法，违反社会公德，不 能被授予专利权。C选项，疾病治疗效果预测方法 属于疾病的诊断和治疗方法。D选项，用原子核变 换方法获得的物质不能被授予专利权。（2008）"},
  {id: 124, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "钟某的下列有关肺病的预防与治疗方面研究成果中，哪些属于不授予专利权的申请？", options: {"A": "雾霾导致肺癌发生率明显上升的发现", "B": "发明了一套促进肺气肿患者康复的疗仪器", "C": "发明了一种精确诊断早期肺癌的方法", "D": "发明了一种治疗肺结核的中成药制品"}, answer: "AB", explanation: "《审查指南》第二部分第一章第4.3节 规定：“用于实施疾病诊断和治疗方法的仪器或装 置，以及在疾病诊断和治疗方法中使用的物质或 材料属于可被授予专利权的客体”。本题中，“涂 抹该药水可治疗皮肤病的方法”属于疾病的治疗 方法，不能被授予专利权，但药水属于治疗方法中 使用的物质，该产品本身及其制造方法都可以授 予专利权，因此A、B选项正确，C、D选项错误。 （2007改编）"},
  {id: 125, topic: "专题五 专利保护的对象和主题", type: "single", question: "以下哪些选项是正确的？", options: {"A": "专利法所称植物品种，包括野生发现的以及通过人工选育或者发现并经过改良的植物群体", "B": "专利法不保护动物或植物品种", "C": "非生物学的发明创造，主要考察点是人为技术介人的程度", "D": "专利法中所称的动物包括人"}, answer: "D", explanation: "根据《审查指南》第二部分第一章第 4.5节的规定，原子核变换方法不能被授予专利权， 但是为实现原子核变换而增加粒子能量的粒子加 速方法（如电子行波加速法、电子驻波加速法、电 子对撞法、电子环形加速法等)不属于原子核变换 方法，属于可被授予发明专利权的客体，为实现核 变换方法的各种设备、仪器及其零部件等均属于 可被授予专利权的客体，因此A、B、C选项错误，D 选项正确。(2019)"},
  {id: 126, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪些选项属于不授予专利权的主题？", options: {"A": "一种快速检测人类尿液中尿蛋白含量的方法", "B": "一种利用辐照饲养法生产高产牛奶的乳牛的方法", "C": "一种为实现原子核变换而增加粒子能量的粒子加速装置", "D": "全部步骤由计算机等装置实施的涉及疾病诊断信息处理方法"}, answer: "AB", explanation: "A选项，医生处方和医生对处方的调 剂以及仅仅根据医生处方配药的过程，均不能在 产业上制造或者使用，不具有实用性。B选项属于 动物体的非治疗目的外科手术方法，无法在产 业上使用，不具有实用性。C选项，仿制文物本身 并不违反法律规定，属于可以授权的主题。D选项 属于采用计算机程序解决技术问题，并由此取得 一定的技术效果，属于专利权的保护客体，因此D 选项正确。（新编）"},
  {id: 127, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列选项哪些属于不授予专利权的主题？", options: {"A": "一种由稳频单频激光器发出的稳频单频激光，...·", "B": "一种治疗妇科炎症的胶囊制剂的质量控制方法，·.·", "C": "一种测定唾液中酒精含量的方法，·", "D": "一种检测患者患癌症风险的方法,包括如下步·..·酱"}, answer: "ABC", explanation: "A选项，数据专有权属于著作权保 护的客体，不属于专利权的保护客体。B选项，根 据《审查指南》第二部分第一章第4.3.2。1节的规 定，为预防疾病而实施的各种免疫方法属于治疗 方法，不能被授予专利权，不属于专利权的保护客 体。C选项，数据库是一种信息表述方法，属于智 力活动的规则和方法，不属于专利权的保护客体。 D选项，采用计算机程序解决技术问题，并由此取 得一定的技术效果，属于专利权的保护客体。 （新编）"},
  {id: 128, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪些属于不授予专利权的主题？", options: {"A": "一种利用激光测量距离的方法", "B": "一种改变人生殖系遗传同一性的方法", "C": "一种疾病治疗效果预测方法", "D": "一种用原子核变换方法获得的物质"}, answer: "ABC", explanation: "A、B、C选项属于涉及计算机程序 的发明专利申请，其权利要求可以写成一种方法 权利要求，也可以写成一种产品权利要求，A选项 为允许的计算机程序产品主题。B、C选项均可解 决技术问题，获得技术效果，属于技术方案，因此 A、B、C选项正确。D选项仅是依照经济学规律采 用经济管理手段，不受自然规律的约束，因而未利 用技术手段，不属于专利权的保护客体。（新编）"},
  {id: 129, topic: "专题五 专利保护的对象和主题", type: "single", question: "著名皮肤科医生发明了一种用于治疗皮肤病的药水，按照其独特的方法涂抹该药水可解痒。该医生欲就该药水和涂抹方法申请专利。下列说法哪些是正确的？", options: {"A": "该药水成分属于可授予专利权的主题", "B": "该药水的制造方法属于可授予专利权的主题", "C": "使用该药水治疗皮肤病的方法属于可授予专利权的主题", "D": "以上都属于可授予专利权的主题"}, answer: "D", explanation: "A选项，计算机程序产品应当理解为 主要通过计算机程序实现其解决方案的软件产 品，属于专利的保护客体。B选项，计算机介质，可 以理解为其上存储有计算机程序/指令，属于专利 的保护客体。C选项，计算机装置，是一种产品，属 于专利的保护客体。D选项，计算机代码，是智力 活动规则，不属于专利保护的客体。（新编）"},
  {id: 130, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "甲公司发明了一种新的为实现原子核变换而增加粒子能量的粒子加速方法X。同时甲公司发明了一种设备Y,设备Y能以方法X对粒子加速来完成原子核变换。假设方法X和设备Y满足其他授予专利权的条件，下列说法正确的是？", options: {"A": "只有方法X能被授予专利权", "B": "只有设备Y能被授予专利权", "C": "方法X和设备Y都不能被授予专利权", "D": "方法X和设备Y都能被授予专利权"}, answer: "ABCD", explanation: "A选项，根据《审查指南》第二部 分第五章第3.2.4节的规定，非治疗目的外科手 术方法，由于是以有生命的人或者动物为实施对 象，无法在产业上使用，因此不具备实用性，A选项 正确。B选项，根据《审查指南》第二部分第五章第 3.2.2节的规定，违背自然规律的发明或者实用新 型专利申请是不能实施的，因此不具备实用性，B 选项正确。C选项，根据《审查指南》第二部分第五 章第3.2.1节的规定，申请发明或者实用新型专利 的产品的成品率低与不具有再现性是有本质区别 的，因此C选项正确。D选项，根据《审查指南》第 二部分第五章第3.2节的规定，因不能制造或者使 用而不具备实用性是由技术方案本身固有的缺陷 引起的，与说明书公开的程度无关，因此D选项正 确。（新编）"},
  {id: 131, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪些情形不属于专利权的保护客体？", options: {"A": "医生处方", "B": "一种从动物体获取中药原料的方法", "C": "一种仿制文物的方法", "D": "一种计算机程序控制的机器刺绣工艺"}, answer: "AD", explanation: "A选项，《审查指南》第二部分第五章 第3.1节规定：“审查发明或者实用新型专利申请 的实用性时，**不仅仅局限于权利要求所记载 的内容...”，因此A选项正确。B选项，根据《审 查指南》第二部分第五章第3.2.1节的规定，申请发 明或者实用新型专利的产品的成品率低与不具有 再现性是有本质区别的。成品率低只是由于实施 过程中未能确保某些技术条件（例如环境洁净度、 温度等）而导致，是能够重复实施，具备实用性，因 此B选项错误。C选项，根据《审查指南》第二部分 第五章第3.2节的规定，“能够制造或者使用”是指 发明或者实用新型的技术方案具有在产业中被制 造或使用的可能性，而并不要求必须已经实施，因 此C选项错误。D选项，根据《审查指南》第二部分 第五章第3.2节的规定，满足实用性要求的技术方 案不能违背自然规律并且应当具有再现性，因此D 选项正确。(2016) 34。D。A选项，根据《审查指南》第二部分第 五章第2节的规定，在产业上能够制造或者使用的 技术方案，是指符合自然规律、具有技术特征的任 何可实施的技术方案，这些方案并不一定意味着 使用机器设备，因此A选项错误。B选项，成品率 低，但能够重复实施，具备实用性，因此B选项错 误。是否具备实用性与市场销售量无关，C选项错 误。实用性与是否已经实施无关，已经实施的产 二的自然条件”而导致不具备实用性，D选项正确。 （2017改编）"},
  {id: 132, topic: "专题五 专利保护的对象和主题", type: "multiple", question: "下列哪些情形不属于专利权的保护客体？", options: {"A": "数据专有权", "B": "为预防新冠病毒而实施的接种免疫方法", "C": "一种体现创造性劳动的汽车安全数据库", "D": "一种U盘，其上存储有计算机程序，其特征在于，该程序被处理器执行时实现数据获取和数据处理的步骤"}, answer: "AB", explanation: "权利要求1和权利要求2要求保护 的是实施植入双眼皮的用具，是一种产品，能够制 造并能够产生积极效果，具备实用性，因此A、B选 项正确。权利要求3和权利要求4属于非治疗目 的、为美容而实施的外科手术方法，因此不具备实 用性，因此C、D选项错误。（2009）"},

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026专利代理师 · 相关法练习系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a24;
            --bg-card: #16161f;
            --bg-hover: #1e1e2a;
            --accent: #00d4aa;
            --accent-glow: rgba(0, 212, 170, 0.3);
            --accent-dim: rgba(0, 212, 170, 0.15);
            --accent-secondary: #6366f1;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --border: #2a2a3a;
            --success: #22c55e;
            --success-bg: rgba(34, 197, 94, 0.1);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
            --warning: #f59e0b;
            --multi-color: #a78bfa;
            --multi-bg: rgba(167, 139, 250, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow-glow: 0 0 30px var(--accent-glow);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 212, 170, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(99, 102, 241, 0.06), transparent);
            pointer-events: none; z-index: -1;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 40px 24px; }
        header { text-align: center; margin-bottom: 40px; }
        h1 {
            font-size: 2.2rem; font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .subtitle { color: var(--text-secondary); font-size: 1rem; }
        .badge {
            display: inline-block; margin-top: 10px;
            padding: 4px 12px; border-radius: 20px;
            background: var(--accent-dim); color: var(--accent);
            font-size: 0.85rem; font-weight: 600;
        }
        /* Tabs */
        .tabs {
            display: flex; gap: 8px; margin-bottom: 32px;
            background: var(--bg-secondary); padding: 6px;
            border-radius: var(--radius-lg); border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1; padding: 13px 20px;
            background: transparent; border: none;
            color: var(--text-secondary); font-size: 0.95rem; font-weight: 500;
            cursor: pointer; border-radius: var(--radius-md);
            transition: all 0.25s;
        }
        .tab-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
        .tab-btn.active {
            background: var(--accent); color: var(--bg-primary);
            box-shadow: var(--shadow-glow);
        }
        /* Panels */
        .panel { display: none; animation: fadeIn 0.35s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Card */
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-xl); padding: 32px; margin-bottom: 20px;
        }
        /* Stats bar */
        .stats-bar {
            display: flex; gap: 0; margin-bottom: 24px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); overflow: hidden;
        }
        .stat-item {
            flex: 1; text-align: center; padding: 16px 12px;
            border-right: 1px solid var(--border);
        }
        .stat-item:last-child { border-right: none; }
        .stat-value {
            font-size: 1.6rem; font-weight: 700; color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
        /* Practice card */
        .practice-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-xl); padding: 36px;
        }
        .question-meta-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .question-number {
            font-size: 0.85rem; color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }
        .type-badge {
            padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
        }
        .type-badge.single {
            background: var(--accent-dim); color: var(--accent);
        }
        .type-badge.multi {
            background: var(--multi-bg); color: var(--multi-color);
        }
        .practice-question {
            font-size: 1.25rem; font-weight: 600; margin-bottom: 28px;
            color: var(--text-primary); line-height: 1.7;
        }
        .practice-options {
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px;
        }
        .practice-option {
            padding: 16px 20px;
            background: var(--bg-secondary); border: 2px solid var(--border);
            border-radius: var(--radius-lg); cursor: pointer;
            transition: all 0.25s; text-align: left; font-size: 1rem;
            display: flex; align-items: flex-start; gap: 14px;
            user-select: none;
        }
        .practice-option:hover:not(.disabled) {
            border-color: var(--accent); background: var(--bg-hover);
            transform: translateX(4px);
        }
        .practice-option.selected:not(.disabled) {
            border-color: var(--multi-color); background: var(--multi-bg);
        }
        .practice-option .option-letter {
            width: 30px; height: 30px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-tertiary); border-radius: var(--radius-sm);
            font-weight: 600; color: var(--text-secondary); font-size: 0.9rem;
            margin-top: 1px;
        }
        .practice-option.selected:not(.disabled) .option-letter {
            background: var(--multi-color); color: white;
        }
        .practice-option.correct { border-color: var(--success); background: var(--success-bg); }
        .practice-option.correct .option-letter { background: var(--success); color: white; }
        .practice-option.wrong { border-color: var(--error); background: var(--error-bg); }
        .practice-option.wrong .option-letter { background: var(--error); color: white; }
        .practice-option.disabled { cursor: default; }
        .practice-option.disabled:not(.correct):not(.wrong) { opacity: 0.6; }
        /* Multi-select hint */
        .multi-hint {
            font-size: 0.85rem; color: var(--multi-color);
            margin-bottom: 16px; padding: 10px 14px;
            background: var(--multi-bg); border-radius: var(--radius-sm);
            border-left: 3px solid var(--multi-color);
        }
        /* Submit button for multi */
        .submit-row {
            margin-bottom: 20px; text-align: center;
        }
        /* Result box */
        .result-box {
            margin-top: 20px; padding: 20px 24px;
            border-radius: var(--radius-lg);
            animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.93); }
            to { opacity: 1; transform: scale(1); }
        }
        .result-box.correct { background: var(--success-bg); border: 1px solid var(--success); }
        .result-box.wrong { background: var(--error-bg); border: 1px solid var(--error); }
        .result-box.partial { background: rgba(245,158,11,0.1); border: 1px solid var(--warning); }
        .result-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .result-icon { font-size: 1.5rem; }
        .result-title { font-size: 1.1rem; font-weight: 700; }
        .result-box.correct .result-title { color: var(--success); }
        .result-box.wrong .result-title { color: var(--error); }
        .result-box.partial .result-title { color: var(--warning); }
        .result-answer { color: var(--text-secondary); font-size: 0.92rem; line-height: 1.6; }
        .result-answer strong { color: var(--accent); }
        /* Nav */
        .practice-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border);
        }
        .progress-info { color: var(--text-secondary); font-size: 0.9rem; }
        .progress-info strong { color: var(--accent); }
        /* Buttons */
        .btn {
            padding: 12px 24px; border: none; border-radius: var(--radius-md);
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            transition: all 0.25s; display: inline-flex; align-items: center;
            justify-content: center; gap: 8px; font-family: inherit;
        }
        .btn-primary { background: var(--accent); color: var(--bg-primary); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        .btn-secondary {
            background: var(--bg-secondary); color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--bg-hover); border-color: var(--accent); }
        .btn-ghost {
            background: transparent; color: var(--text-secondary); padding: 10px 16px;
        }
        .btn-ghost:hover { color: var(--accent); background: var(--accent-dim); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
        /* Empty state */
        .empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
        .empty-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.5; }
        .empty-text { font-size: 1.05rem; }
        /* Filter/search bar */
        .filter-bar {
            display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .filter-bar input, .filter-bar select {
            padding: 10px 14px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: var(--radius-md);
            color: var(--text-primary); font-size: 0.9rem; font-family: inherit;
        }
        .filter-bar input { flex: 1; min-width: 200px; }
        .filter-bar input:focus, .filter-bar select:focus {
            outline: none; border-color: var(--accent);
        }
        /* Question list */
        .question-list { display: flex; flex-direction: column; gap: 12px; }
        .question-item {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 18px 22px;
            transition: all 0.2s;
        }
        .question-item:hover { border-color: rgba(0, 212, 170, 0.3); }
        .question-item .q-text {
            font-size: 0.95rem; color: var(--text-primary); margin-bottom: 10px;
            line-height: 1.5;
        }
        .question-item .q-meta {
            display: flex; gap: 12px; align-items: center;
            font-size: 0.82rem; color: var(--text-muted);
        }
        .q-type-tag {
            padding: 2px 8px; border-radius: 10px; font-size: 0.78rem; font-weight: 600;
        }
        .q-type-tag.single { background: var(--accent-dim); color: var(--accent); }
        .q-type-tag.multi { background: var(--multi-bg); color: var(--multi-color); }
        /* Progress bar */
        .progress-bar-wrap {
            height: 4px; background: var(--bg-tertiary); border-radius: 2px;
            margin-bottom: 20px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; background: var(--accent);
            border-radius: 2px; transition: width 0.3s ease;
        }
        /* Mode selector */
        .mode-selector {
            display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .mode-btn {
            padding: 8px 16px; border-radius: 20px; font-size: 0.88rem; font-weight: 500;
            cursor: pointer; border: 1px solid var(--border);
            background: var(--bg-secondary); color: var(--text-secondary);
            transition: all 0.2s;
        }
        .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
        .mode-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .container { padding: 20px 14px; }
            .practice-card { padding: 24px 18px; }
            .stats-bar { flex-wrap: wrap; }
            .stat-item { min-width: 80px; }
            .tabs { flex-direction: column; }
        }
    
/* History records */
.history-section { margin-top: 20px; }
.history-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-xl); padding: 24px; margin-bottom: 16px;
}
.history-title {
    font-size: 1.1rem; font-weight: 600; color: var(--text-primary); margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center;
}
.history-empty { color: var(--text-muted); text-align: center; padding: 24px; font-size: 0.9rem; }
.history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border);
}
.history-item:last-child { border-bottom: none; }
.history-item-left { display: flex; flex-direction: column; gap: 2px; }
.history-item-mode { font-weight: 600; color: var(--text-primary); }
.history-item-time { font-size: 0.8rem; color: var(--text-muted); }
.history-item-stats { text-align: right; }
.history-item-score { font-weight: 700; font-size: 1.1rem; }
.history-item-detail { font-size: 0.8rem; color: var(--text-secondary); }
.btn-danger-sm {
    padding: 4px 10px; border-radius: 6px; border: 1px solid var(--error);
    background: transparent; color: var(--error); cursor: pointer;
    font-size: 0.78rem; transition: all 0.2s; font-family: inherit;
}
.btn-danger-sm:hover { background: var(--error); color: white; }
.wrong-mark { color: var(--error); font-size: 0.78rem; margin-left: 4px; }

    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>2026专利代理师 · 相关法强化</h1>
        <p class="subtitle">选择题练习系统 · 韩龙讲专利</p>
        <span class="badge" id="total-badge">加载中...</span>
    </header>

    <div class="tabs">
        <button class="tab-btn active" data-tab="practice">开始练习</button>
            <button class="tab-btn" data-tab="history">做题记录</button>
        <button class="tab-btn" data-tab="list">题库浏览</button>
        <button class="tab-btn" data-tab="add">手动录入</button>
    </div>

    <!-- 练习面板 -->
    <div class="panel active" id="practice-panel">
        <!-- 模式选择 -->
        <div class="mode-selector">
            <span style="color:var(--text-muted);font-size:0.88rem;align-self:center">练习范围：</span>
            <button class="mode-btn active" data-mode="all" onclick="setMode(this,'all')">全部题目</button>
            <button class="mode-btn" data-mode="single" onclick="setMode(this,'single')">仅单选</button>
            <button class="mode-btn" data-mode="multi" onclick="setMode(this,'multi')">仅多选</button>
            <button class="mode-btn" data-mode="random" onclick="setMode(this,'random')">随机50题</button>
            <button class="mode-btn" data-mode="wrong" onclick="setMode(this,'wrong')" id="wrong-mode-btn" style="border-color:var(--error);color:var(--error)">错题练习</button>
        </div>

        <div class="stats-bar" id="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="total-count">0</div>
                <div class="stat-label">总题数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="current-num">0</div>
                <div class="stat-label">当前题号</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="correct-count">0</div>
                <div class="stat-label">正确数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">正确率</div>
            </div>
        </div>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
        </div>
        <div id="practice-content"></div>
    </div>

    <!-- 题库浏览面板 -->
    
        <div class="panel" id="history-panel" style="display:none">
            <div class="history-section">
                <div class="history-card">
                    <div class="history-title">
                        <span>做题历史</span>
                        <button class="btn-danger-sm" onclick="clearAllHistory()">清除全部记录</button>
                    </div>
                    <div id="history-list"></div>
                </div>
                <div class="history-card" id="wrong-review-card" style="display:none">
                    <div class="history-title"><span>错题回顾</span><button class="btn btn-primary" style="padding:8px 18px;font-size:0.88rem" onclick="startWrongPractice()">错题重练</button></div>
                    <div id="wrong-review-list" style="max-height:400px;overflow-y:auto"></div>
                </div>
            </div>
        </div>
<div class="panel" id="list-panel">
        <div class="filter-bar">
            <input type="text" id="search-input" placeholder="搜索题目关键词..." oninput="renderList()">
            <select id="type-filter" onchange="renderList()">
                <option value="all">全部题型</option>
                <option value="单选">单选题</option>
                <option value="多选">多选题</option>
            </select>
        </div>
        <div id="list-content"></div>
    </div>

    <!-- 手动录入面板 -->
    <div class="panel" id="add-panel">
        <div class="card">
            <p style="color:var(--text-secondary);margin-bottom:20px;font-size:0.95rem">
                已预加载 <strong style="color:var(--accent)" id="loaded-count">0</strong> 道题目。
                在此手动添加额外题目（保存后在练习中生效）。
            </p>
            <div style="margin-bottom:16px">
                <label style="display:block;font-size:0.88rem;color:var(--text-secondary);margin-bottom:6px">题目内容</label>
                <textarea id="q-text-input" placeholder="输入题目内容..." style="width:100%;min-height:90px;padding:12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text-primary);font-size:0.95rem;font-family:inherit;resize:vertical"></textarea>
            </div>
            <div style="margin-bottom:16px">
                <label style="display:block;font-size:0.88rem;color:var(--text-secondary);margin-bottom:6px">题型</label>
                <select id="q-type-select" style="padding:10px 14px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text-primary);font-family:inherit">
                    <option value="单选">单选题</option>
                    <option value="多选">多选题</option>
                </select>
            </div>
            <div id="add-options-container" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px"></div>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
                <button class="btn btn-secondary" onclick="addOptionRow()">+ 添加选项</button>
                <button class="btn btn-primary" onclick="saveManualQuestion()">保存题目</button>
            </div>
        </div>
    </div>
</div>

<script>
// ====== 数据 ======
const RAW_QUESTIONS = [{"id": 1, "question": "根据民法典总则编及相关规定，因下列哪些行为所产生的当事人之间的关系属于民法调整的范围？", "type": "单选", "options": [{"letter": "A", "content": "国家知识产权局与商标注册证打印纸供应商之间的关系"}, {"letter": "B", "content": "国家知识产权局与非正常专利申请行为人之间的关系"}, {"letter": "C", "content": "国家知识产权局与外聘专利审查辅助人员之间的关系"}, {"letter": "D", "content": "国家知识产权局与专利代理事务所之间的关系"}], "answer": "A"}, {"id": 2, "question": "根据法律规定，下列哪一种社会关系应由民法调整？", "type": "单选", "options": [{"letter": "A", "content": "甲请求税务机关退还其多缴的个人所得税"}, {"letter": "B", "content": "乙手机丢失后发布寻物启事称：“拾得者送还手机，本人当面酬谢”"}, {"letter": "C", "content": "丙发微信朋友圈承诺：“如我在上海找到工作，就陪女友去欧洲旅游”"}, {"letter": "D", "content": "丁作为青年志愿者，定期去福利院做帮工"}], "answer": "B"}, {"id": 3, "question": "下列哪一情形下，乙的请求依法应得到支持？", "type": "单选", "options": [{"letter": "A", "content": "甲应允乙同看演出，但迟到半小时。乙要求甲赔偿损失"}, {"letter": "B", "content": "甲听说某公司股票可能大涨，便告诉乙，乙信以为真大量购进，事后该支股票大跌。乙要求甲赔偿损失"}, {"letter": "C", "content": "甲与其妻乙约定，如因甲出轨导致离婚，甲应补偿乙50万元，后二人果然因此离婚。乙要求甲依约赔偿"}, {"letter": "D", "content": "甲对乙承诺，如乙比赛夺冠，乙出国旅游时甲将陪同，后乙果然夺冠，甲失约。乙要求甲承担赔偿费任"}], "answer": "C"}, {"id": 4, "question": "甲诉某专利的专利权利人乙专利权权属纠纷一案正在审理中，证据交换阶段乙觉得自已胜诉无望，随即向国家知识产权局提出放弃该专利的申请，乙的行为违背民法典的下列哪一基本原则？", "type": "单选", "options": [{"letter": "A", "content": "平等原则"}, {"letter": "B", "content": "自愿原则"}, {"letter": "C", "content": "公平原则"}, {"letter": "D", "content": "诚信原则"}], "answer": "D"}, {"id": 5, "question": "胡某在自家菜园里发现一只甲虫，非常好奇遂拍照发到网上，！付某出价30万元购买。后来发现该甲虫是濒危动物，国家二级保护用行为。因此，某的行为违反了诚动物。此种情形违反以下民法的哪一个原则？", "type": "多选", "options": [{"letter": "A", "content": "公序良俗原则"}, {"letter": "B", "content": "自愿原则"}, {"letter": "C", "content": "绿色原则"}, {"letter": "D", "content": "诚信原则"}], "answer": "AC"}, {"id": 6, "question": "某公司挖天然气管道途经郝某家耕地，不影响耕地使用。郝某报出高价索赔，否则不让挖掘。经过协商，某公司以行业规定最高标准给予补偿。后郝某觉得补偿太少，要求补上之前索要高价的差额。郝某的行为违反了哪种原则？", "type": "单选", "options": [{"letter": "A", "content": "违反公序良俗原则"}, {"letter": "B", "content": "违反诚信原则"}, {"letter": "C", "content": "违反平等原则"}, {"letter": "D", "content": "违反公平原则"}], "answer": "B"}, {"id": 7, "question": "关于民事法律关系，下列哪一选项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "民事法律关系只能由当事人自主设立"}, {"letter": "B", "content": "民事法律关系的主体即自然人和法人"}, {"letter": "C", "content": "民事法律关系的客体包括不作为"}, {"letter": "D", "content": "民事法律关系的内容均由法律规定"}], "answer": "C"}, {"id": 8, "question": "根据民法典总则编及相关规定，下列哪些属于限制民事行为能力人？", "type": "多选", "options": [{"letter": "A", "content": "6岁上初中的神童甲"}, {"letter": "B", "content": "18岁依靠父母资助上大学的乙"}, {"letter": "C", "content": "9岁在读小学生丙"}, {"letter": "D", "content": "16岁已经掌握一定维修技术的技校生丁"}], "answer": "CD"}, {"id": 9, "question": "根据民法典总则编的规定，关于民事行为能力下列哪些表述是错误的？多选）", "type": "多选", "options": [{"letter": "A", "content": "十六周岁以上的自然人是成年人，具有完全民事行为能力，可以独立进行民事活动，是完全民事行为能力人"}, {"letter": "B", "content": "十四周岁以上不满十六周岁的自然人，以自己的劳动收人为主要生活来源的，视为完全民事行为能力人"}, {"letter": "C", "content": "十周岁以上的未成年人是限制民事行为能力人，进行民事活动应当征得他的法定代理人的同意"}, {"letter": "D", "content": "无民事行为能力人、限制民事行为能力人的监护人是他的法定代理人"}], "answer": "ABC"}, {"id": 10, "question": "下列选项中哪些属于无民事行为能力人？", "type": "多选", "options": [{"letter": "A", "content": "跟随母亲来中国旅游的外国籍7岁儿童"}, {"letter": "B", "content": "30岁的精神病人，经鉴定其智商只有5岁"}, {"letter": "C", "content": "16岁的脑瘫患者，不能辨认自己的行为"}, {"letter": "D", "content": "7岁小学生，已经可以通过网络直播收入为主要生活来源"}], "answer": "ABCD"}, {"id": 11, "question": "根据民法典总则编及相关规定，关于民事权利能力和民事行为能力，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "自然人从出生时起到死亡时止，具有民事权利能力，依法享有民事权利，承担民事义务"}, {"letter": "B", "content": "自然人的民事权利能力一律平等"}, {"letter": "C", "content": "限制民事行为能力人可以进行与其年龄、智力相适应的民事活动"}, {"letter": "D", "content": "无民事行为能力人的民事活动由其法定代理人代理"}], "answer": "ABCD"}, {"id": 12, "question": "甲男、乙女为夫妻、生子丙，甲男去世。丙6岁的时候、甲父赠送给丙一幅价值百万元的名画。丙8岁的时候，甲父再赠送给丙一块价值10万元的名表。以下说法哪些正确？", "type": "多选", "options": [{"letter": "A", "content": "因为是纯获利益的行为，故名画赠与合同有效"}, {"letter": "B", "content": "因为在受赠名画时，丙为无民事行为能力人，故名画赠与合同无效"}, {"letter": "C", "content": "因为是纯获利益的行为，故名表赠与合同有效"}, {"letter": "D", "content": "因为在受赠名表时，丙为限制民事行为能力人，故名表赠与合同无效"}], "answer": "BC"}, {"id": 13, "question": "王某户籍所在地是上海，大学毕业后在北京工作了两年。因身体原因前往广州就医，并在广州某医院住院一年半。痊愈后在深圳居住工作，至今已逾半年。根据民法典总则编及相关规定，王某在下列哪个城市的居住地视为其现在的住所？", "type": "单选", "options": [{"letter": "A", "content": "上海"}, {"letter": "B", "content": "北京"}, {"letter": "C", "content": "广州"}, {"letter": "D", "content": "深圳"}], "answer": "A"}, {"id": 14, "question": "陆某因诈骗罪被判人狱，和妻子协议离婚，双方约定，12岁的儿子由陆某抚养，但实际是由陆某父母抚养。下列哪一说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "陆某是唯一监护人"}, {"letter": "B", "content": "陆某的妻子是唯一监护人"}, {"letter": "C", "content": "夫妻二人均为监护人"}, {"letter": "D", "content": "陆某的父母为监护人"}], "answer": "C"}, {"id": 15, "question": "李某是无民事行为能力的精坤病人，其近亲属对担任李某的监护人有争议，并且对李某住所地居民委员会的指定不服，向人民法院提起诉讼。根据民法典总则编及相关规定，人民法院一般应按照下列哪项中的顺序指定监护人？单选）", "type": "单选", "options": [{"letter": "A", "content": "（1)配偶：(2）交母、子女：(3）其他近亲属"}, {"letter": "B", "content": "（1)配偶、成年子女：（2）父母：（3）其他近亲属"}, {"letter": "C", "content": "（1)父母：（2）配偶、子女：（3）其他近亲属"}, {"letter": "D", "content": "（1)父母、子女；(2）配偶；(3)其他近亲属"}], "answer": "A"}, {"id": 16, "question": "陈某夫妇因意外事故双亡，二人的儿子陈畅刚刚年满3周岁。根据民法典总则编及相关规定，下列关于陈畅的监护人的哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "可以由陈畅的祖父每、外祖父母中的一人或数人担任监护人"}, {"letter": "B", "content": "对担任监护人有争议的，可以由陈畅住所地的居民委员会在近亲属中指定"}, {"letter": "C", "content": "陈畅的祖父被指定担任监护人后，可以自行变更监护人"}, {"letter": "D", "content": "若关系密切的其他亲属、朋友愿意承担监护责任，经陈畅住所地的居民委员会同意，也可以作为陈畅的监护人"}], "answer": "ABD"}, {"id": 17, "question": "余某与其妻婚后很久才育有一女小翠。不久后余某与妻子离婚，小翠由余某抚养。现余某身患重病，为自己和幼女小翠的未来担忧，欲作相应安排。下列哪些选项是正确的？", "type": "多选", "options": [{"letter": "A", "content": "余某可通过遗瞩指定其弟弟在其身故后担任小翠的监护人"}, {"letter": "B", "content": "余某可与前妻协议确定，余某不再承担监护职责"}, {"letter": "C", "content": ".余某可与其堂兄事先协商以书面形式确定堂兄为自己的监护人"}, {"letter": "D", "content": "如余某病故，应由余某父母担任小翠的监护人"}], "answer": "AC"}, {"id": 18, "question": "丧偶的汪某（70岁）有成年子女但独立生活，与同样丧偶的肖某（50岁）十分投缘，汪某与肖某订立书面监护协议约定：！该监护协议生效的时间，肖某取得迁某一半若肖某履行监护义务，汪某死后遗产一半归肖某所有。对此，下列表述正确的是？", "type": "单选", "options": [{"letter": "A", "content": "因注某有成年子女，监护协议无效"}, {"letter": "B", "content": "监护协议中关于遗产处理的部分无效"}, {"letter": "C", "content": "汪某丧失或部分丧失行为能力时，肖某按约定成为注某的监护人"}, {"letter": "D", "content": "监护协议的全部约定于注某死亡时生效"}], "answer": "C"}, {"id": 19, "question": "李小某三岁时，其父母离异，其与父亲李某和祖母王某共同生活，后李某和王某相继离世，其母张某在明知家中已无其他近亲属照料、抚养孩子的情况下，仍不闻不问，拒不履行监护职责，导致李小某处于危困状态。根据民法典总则编及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "指定监护人前，可以由民政部门担任李小某的临时监护人"}, {"letter": "B", "content": "李某、王某和张某均是李小某的监护人"}, {"letter": "C", "content": "张某的监护人资格被撤销后，可以不再履行负担李小某抚养费的义务"}, {"letter": "D", "content": "李小某就读的小学可以向人民法院申请撤销张某的监护人资格"}], "answer": "AD"}, {"id": 20, "question": "监护人因发生突发事件等紧急情况暂时无法履行监护职责，被监护人的生活处于无人照料状态的，应当为被监护人安排必要的临时生活照料措施的组织有？多选）", "type": "多选", "options": [{"letter": "A", "content": "被监护人住所地的居委会"}, {"letter": "B", "content": "被监护人住所地的村委会"}, {"letter": "C", "content": "被监护人住所地的民政部门"}, {"letter": "D", "content": "被监护人住所地的学校"}], "answer": "ABC"}, {"id": 21, "question": "关于监护，下列哪一表述是错误的？", "type": "多选", "options": [{"letter": "A", "content": "市民甲、乙之子丙5周岁，甲乙离婚后对谁担任丙的监护人发生争议，受理离婚案件的人民法院有权指定"}, {"letter": "B", "content": "甲的幼子乙在寄宿删幼儿园期间，甲的监护职资全部转移给幼儿园"}, {"letter": "C", "content": "甲丧夫后携幼子乙改媒，乙的爷爷有权要求法院确定自己为乙的法定监护人"}, {"letter": "D", "content": "市民甲、乙之子丙5周岁，甲乙离婚后对谁担任丙的监护人发生争议，丙住所地的居民委员会有权指定"}], "answer": "ABCD"}, {"id": 22, "question": "甲乙婚后生子丙，乙死亡。在丙12岁时，甲因吸处分被监护人财产而被撤销监护人资格。以下说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "甲的监护资格撤销后，无需再承担对丙的抚养费义务"}, {"letter": "B", "content": "甲的监护资格撤销后，可通过遗指定其母在其死后成为丙的监护人"}, {"letter": "C", "content": "甲戒毒成功后可以申请重新担任丙的监护人"}, {"letter": "D", "content": "甲能否重新担任丙的监护人需尊重丙的意愿"}], "answer": "CD"}, {"id": 23, "question": "张某和李某婚后育有一女，因有智力障碍，遭到父母嫌弃。后张某和李某离婚，女儿由张某抚养。某日张某酒后殴打其女，并将其嘴唇剪破，酒醒后将其女送至医院。以下说法正确的有：", "type": "多选", "options": [{"letter": "A", "content": "医院可以向人民法院申请撤销监护权"}, {"letter": "B", "content": "医院可以向民政部门申请撤销监护权"}, {"letter": "C", "content": "张某的监护权被撤销后，法院应当按照有利于被监护人的原则指定监护人"}, {"letter": "D", "content": "张某的监护权被撤销后，不可恢复"}], "answer": "AD"}, {"id": 24, "question": "有权向法院提出申请，要求撤销监护人资格的主体有？", "type": "多选", "options": [{"letter": "A", "content": "学校"}, {"letter": "B", "content": "医疗机构"}, {"letter": "C", "content": "未成年人保护组织"}, {"letter": "D", "content": "残疾人联合会以下哪些前因？多选）"}], "answer": "ABCD"}, {"id": 25, "question": "李某因所乘飞机失事自2021年6月1日至今下落不明。根据民法典总则编及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "李某的配偶审请宜告其死亡，可以自2021年6月1日起满2年向人民法院申请"}, {"letter": "B", "content": "如果人民法院宜告李某死亡，则判决宣告之日为李某死亡的日期"}, {"letter": "C", "content": "若李某被宜告死亡但并未死亡，其在被宜告死亡期间实施的民事法律行为有效"}, {"letter": "D", "content": "若李某重新出现，经其本人申请，人民法院应当撤销死亡宣告"}], "answer": "ACD"}, {"id": 26, "question": "2020年6月1日，家住北京市通州区的刘某乘坐某航班从马来西亚飞回北京。飞机中途失事，至今下落不明。刘某的父母担心刘某妻子带房改嫁，于2022年8月15日向通州区人民法院申请宜告刘某死亡。下列哪些说法是错误的？", "type": "多选", "options": [{"letter": "A", "content": "如果刘某的妻子不宣告刘某死亡，刘某的父母不能申请宣告刘某死亡"}, {"letter": "B", "content": "刘某的父母申请宣告刘某死亡距刘某下落不明尚不满4年，不符合宣告死亡的要求"}, {"letter": "C", "content": "如通州区法院宣告刘某死亡，则判决作出之日视为刘某死亡的日期"}, {"letter": "D", "content": "如通州区法院宜告刘某死亡但是刘某并未死亡的，在被宣告死亡期间刘某所实施的民事法律行为均有效某县法院宜告死亡、其后乙未再婚，乙是甲唯一的继杖宜告死亡后，作为其一地永人的乙地永了中所有人。2026年3月、乙将家里的一辆轿车赠送给了弟弟丙、交付并办理了过户登记。2026年4月，经商失败的甲返回该县，为还价将登记于自已名下的一套夫妻共有住房私自买给知情的丁。同年7月，甲的死亡宜告被撤销。根据民法典及相关规定，下列哪些说法是正确的？（多选）"}], "answer": "ACD"}, {"id": 27, "question": "袁某和祖某系夫妻，后二人吵架，袁某离家出走。2年后，依祖某申请，法院宣告袁某失踪。四年后，因袁某一直未偿还借款债务，债权人胡某申请法院宣告袁某死亡。关于本案，下列说法正确的有？", "type": "多选", "options": [{"letter": "A", "content": "袁某被宜告失踪后，丧失民事行为能力"}, {"letter": "B", "content": "胡某的宣告申请，法院不应予以支持"}, {"letter": "C", "content": "袁某父母不同意，可以申请撤回失踪宜告"}, {"letter": "D", "content": "祖某提出离婚诉讼的，法院应当准许"}], "answer": "ABCD"}, {"id": 28, "question": "根据民法典总则皮相关规定，关于民事权利能力和民事行为能力，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "自然人的民事权利能力出生时产生，死亡时消灭"}, {"letter": "B", "content": "自然人的民事行为能力出生时产生，死亡时消灭"}, {"letter": "C", "content": "法人的民事权利能力成立时产生，终止时消灾"}, {"letter": "D", "content": "法人的民事行为能力成立时产生，终止时消灭"}], "answer": "BD"}, {"id": 29, "question": "村民钱某与村办食品厂共同设立了具有独立法人资格的“美新农副产品有限资任公司\"（以下简称\"美新公司\"）.饿某担任公司的法定代表人。根据民法典总则编及相关规定，下列说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "美新公司从其依法成立时具有民事权利能力和民事行为能力"}, {"letter": "B", "content": "美新公司对钱某的经营活动承担民事责任"}, {"letter": "C", "content": "美新公司在经营活动中产生的债务由钱某、食品厂按各自的出资比例承担"}, {"letter": "D", "content": "钱某和食品厂对美新公司在经营活动中产生的优务承担连带责任"}], "answer": "AB"}, {"id": 30, "question": "甲乙丙丁戊五个人均为执业两年以上的专利代理师，协商一致打算成立知识产权代理有限责任公司，关于公司设立过程中法律后果的承担，以下说法正确的有哪些？多选）", "type": "多选", "options": [{"letter": "A", "content": "申以自已名义租赁办公场所，但是知识产权代理有限公司并未设立成功，对于房租费用，由五位设立人承担连带责任"}, {"letter": "B", "content": "甲以自已名义租赁办公场所，知识产权代理有限公司设立后，房东可以选择该公司或者甲承担尚未支付的费用"}, {"letter": "C", "content": "乙为将来公司办公购买大型复印机一台，公司设立成功后，该复印机损坏无法使用，公司可以要求厂家进行维修"}, {"letter": "D", "content": "该专利代理公司成立两年后设立分公司，该分公司可以以其自己的名义签订专利代理协议"}], "answer": "ACD"}, {"id": 31, "question": "甲公司分立为乙丙两公司，约定由乙公司承担甲公司全部债务的消偿责任、丙公司继受甲公司全部使权。关于该协议的效力、下列哪一选项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "该协议仅对乙丙两公司具有约束力，对甲公司的债权人并非当然有效"}, {"letter": "B", "content": "该协议无效，应当由乙丙两公司对甲公司的债务承担连带清偿责任"}, {"letter": "C", "content": "该协议有效，甲公司的债权人只能请求乙公司对甲公司的债务承担清偿责任"}, {"letter": "D", "content": "该协议效力待定，应当由甲公司的债权人选择分立后的公司清偿债务"}], "answer": "AB"}, {"id": 32, "question": "下列情形中，属于法人解散的原因的有哪些？多选）", "type": "多选", "options": [{"letter": "A", "content": "被吊销营业执照"}, {"letter": "B", "content": "被吊销登记证书"}, {"letter": "C", "content": "章程规定的存续期间届满"}, {"letter": "D", "content": "变更名称"}], "answer": "ABCD"}, {"id": 33, "question": "关于法人，下列哪一表述是正确的？", "type": "多选", "options": [{"letter": "A", "content": "社会团体法人均属非营利法人"}, {"letter": "B", "content": "基金会法人属于捐助法人"}, {"letter": "C", "content": "社会团体法人可以属于营利法人"}, {"letter": "D", "content": "民办非企业单位法人属于营利法人"}], "answer": "ABC"}, {"id": 34, "question": "根据民法典及相关规定，下列关于事业单位法人的说法哪些是错误的？", "type": "多选", "options": [{"letter": "A", "content": "具备法人条件的事业单位从成立之日起取得法人资格"}, {"letter": "B", "content": "事业单位法人名誉权遭受侵害的，有权诉请精神损害赔偿"}, {"letter": "C", "content": "所有事业单位法人的全部经费均来自国家财政拨款"}, {"letter": "D", "content": "国家举办的事业单位对其直接占有的动产享有所有权的？（单选）"}], "answer": "AB"}, {"id": 35, "question": "根据民法典及相关规定，下列哪些组织属于非营利法人", "type": "多选", "options": [{"letter": "A", "content": "社会服务机构"}, {"letter": "B", "content": "事业单位"}, {"letter": "C", "content": "基金会"}, {"letter": "D", "content": "行政机关"}], "answer": "ABCD"}, {"id": 36, "question": "根据民法典总则编及相关规定，关于非法人组织，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "非法人组织不具有法人资格，不能以自己的名义从事民事活动"}, {"letter": "B", "content": "非法人组织的财产不足以清偿债务的，其出资人或者设立人承担无限责任"}, {"letter": "C", "content": "非法人组织解散的，应当依法进行清算"}, {"letter": "D", "content": "非法人组织只能确定一人代表该组织从事民事活动"}], "answer": "B"}, {"id": 37, "question": "甲企业是由自然人安琚与乙企业（个人独资）各出资500万设立的普通合伙企业，甲企业欠丙企业货款50万元，由于经营不善，甲企业全部资产仅剩20万元。现所欠货款到期，相关各方因货款清偿发生纠纷。对此，下列哪一表述是正确的？", "type": "单选", "options": [{"letter": "A", "content": "丙企业只能要求安琚与乙企业各自承担15万元的清偿责任"}, {"letter": "B", "content": "丙企业只能要求甲企业承担清偿责任"}, {"letter": "C", "content": "欠款应先以甲企业的财产偿还，不足部分由安琚与乙企业承担无限连带责任"}, {"letter": "D", "content": "就乙企业对丙企业的应偿债务，乙企业投资人不承担责任"}], "answer": "ABC"}, {"id": 38, "question": "根据民法典总则编及相关规定，非法人组织享有下列哪些民事权利？", "type": "多选", "options": [{"letter": "A", "content": "隐私权"}, {"letter": "B", "content": "健康权"}, {"letter": "C", "content": "名誉权"}, {"letter": "D", "content": "名称权"}], "answer": "BC"}, {"id": 39, "question": "根据民法典总则编及相关规定，下列哪种民事主体享有姓名权？", "type": "单选", "options": [{"letter": "A", "content": "法人"}, {"letter": "B", "content": "自然人"}, {"letter": "C", "content": "个体工商户"}, {"letter": "D", "content": "个人合伙企业"}], "answer": "C"}, {"id": 40, "question": "根据民法典及相关规定，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "自然人享有姓名权，有权依法决定、使用、变更自己的姓名，禁止他人干涉、盗用、假冒"}, {"letter": "B", "content": "法人享有名称权，但是不得转让自己的名称"}, {"letter": "C", "content": "自然人享有肖像权，未经肖像权人同意，不得以任何目的使用公民的肖像"}, {"letter": "D", "content": "法人享有名誉权，禁止用侮辱、诽谤等方式损害法人的名誉"}], "answer": "CD"}, {"id": 41, "question": "根据民法典总则编及相关规定，下列哪项属于不当得利？", "type": "单选", "options": [{"letter": "A", "content": "债务人偿还未到期的债务"}, {"letter": "B", "content": "债务人清偿已超过诉讼时效的债务"}, {"letter": "C", "content": "养子女向生父母给付赠养费"}, {"letter": "D", "content": "顾客多付售货员的货款"}], "answer": "B"}, {"id": 42, "question": "限据民法典总则编及相关规定.下列哪些情形下当事人获得的利益构成不当得利？", "type": "单选", "options": [{"letter": "A", "content": "居民何某位于地快沿线的商品房因地供通车大幅度升值"}, {"letter": "B", "content": "乙公司接收了物流公司误送的甲公司的货物"}, {"letter": "C", "content": "蒋某走失的宠物狗得到石某的喂养、照顾"}, {"letter": "D", "content": "李某屋内的积水由邻居带助排出"}], "answer": "AD"}, {"id": 43, "question": "根据民法典总则编对知识产权的相关规定，以下属于知识产权客体的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "发明"}, {"letter": "B", "content": "网络虚拟财产"}, {"letter": "C", "content": "商业秘密"}, {"letter": "D", "content": "个人信息"}], "answer": "D"}, {"id": 44, "question": "甲公司向法院起诉乙公司产品侵犯其专利权，法院未作出判决前，甲公司在社交媒体上对乙公司产品侵犯其专利权的情况进行了宣传，根据民法典总则编规定，甲公司的行为侵犯了乙公司的哪项权利？", "type": "单选", "options": [{"letter": "A", "content": "名誉权"}, {"letter": "B", "content": "荣誉权"}, {"letter": "C", "content": "隐私权"}, {"letter": "D", "content": "名称权"}], "answer": "B"}, {"id": 45, "question": "根据民法典总则编及相关规定，下列哪些情形构成意思表示？多选）", "type": "多选", "options": [{"letter": "A", "content": "孙某临终前在日记中写道：若离人世，愿将个人藏书赠与好友汪某"}, {"letter": "B", "content": "何某向一台自动售货机投币购买饮料"}, {"letter": "C", "content": "张某对李某说：我儿子如果考上重点大学，我一定请你"}, {"letter": "D", "content": "潘某在寻物启事中称，愿向送还失物者付酬金500元"}], "answer": "A"}, {"id": 46, "question": "根据民法典总则编及相关规定，下列哪些属于无效民事法律行为？多选）", "type": "多选", "options": [{"letter": "A", "content": "无民事行为能力人实施的民事法律行为"}, {"letter": "B", "content": "恶意申通，损害他人利益的民事法律行为"}, {"letter": "C", "content": "行为人对行为内容有重大误解的民事法律行为"}, {"letter": "D", "content": "一方当事人利用对方处于危困状态，致使显失公平的民事法律行为"}], "answer": "ABD"}, {"id": 47, "question": "根据民法典总则编及相关规定，下列哪些民事行为无效？", "type": "多选", "options": [{"letter": "A", "content": "周某因欠赌优而向孟某出具欠条"}, {"letter": "B", "content": "甲与乙签订了一份购房合同，后因房价上涨，甲申通丙订立了另一份购房合同，并将该房屋过户给丙，致使乙无法获得房屋"}, {"letter": "C", "content": "12岁的小学生给游戏账户充值一万元"}, {"letter": "D", "content": "王某利用李某没有经验，以1万元的价格从李某手中购进一套价值50万元的旧版人民币"}], "answer": "ABD"}, {"id": 48, "question": "根据民法典的规定，下列哪些行为属于无效的民事法律行为？", "type": "多选", "options": [{"letter": "A", "content": "7岁儿童刘某给游戏主播打赏的民事法律行为"}, {"letter": "B", "content": "张某在受欺诈状态下所实施的民事法律行为"}, {"letter": "C", "content": "甲装饰公司卖给乙公司100盏吸顶灯，乙公司发现甲公司营业执照上的核准经营范围仅为装饰业务，遂起诉请求法院确认该买实合同无效"}, {"letter": "D", "content": "李某将其合法持有的猎枪出售给未取得持枪许可的朋发"}], "answer": "AB"}, {"id": 49, "question": "甲和乙签订了两份房屋买卖合同，第一份约定房屋价款500万元，注明房屋过户备案事项不按此合同履行。第二份合同约定房屋价款200万元，房屋过户备案事项按此合同履行。营业执照的经营范图，并未违反法律、行政关于两份合同，下列哪一选项正确？", "type": "单选", "options": [{"letter": "A", "content": "第一份合同部分无效，第二份合同无效"}, {"letter": "B", "content": "第一份合同有效，第二份合同部分无效"}, {"letter": "C", "content": "两份合同均无效"}, {"letter": "D", "content": "两份合同均有效"}], "answer": "AB"}, {"id": 50, "question": "下列属于可撤销合同情形的是？", "type": "单选", "options": [{"letter": "A", "content": "违反法律法规强制规定的"}, {"letter": "B", "content": "以恶意申通损害他人利益的"}, {"letter": "C", "content": "因重大误解签订的"}, {"letter": "D", "content": "以虚假的意思表示签订的"}], "answer": "AD"}, {"id": 51, "question": "根据民法典及相关规定，下列哪些属于当事人可以请求人民法院撤销的合同？", "type": "多选", "options": [{"letter": "A", "content": "甲公司与乙公司恶意申通签订的损害丙公司利益的买卖合同"}, {"letter": "B", "content": "贾某以欺诈的手段使齐某在违背真实意思的情况下与之订立的买卖合同"}, {"letter": "C", "content": "韩某把一个古董花瓶错当成现代仿制花瓶与赵某签订的买卖合同"}, {"letter": "D", "content": "非法垄断技术的技术合同"}], "answer": "B"}, {"id": 52, "question": "根据民法典总则编关于显失公平民事法律行为的相应的民事法律行为无效。B选项，以欺诈手段-17 -立时显失公平、受损害方有权请求予以撤销？", "type": "多选", "options": [{"letter": "A", "content": "无民事行为能力"}, {"letter": "B", "content": "处于危困状态"}, {"letter": "C", "content": "缺乏判断能力"}, {"letter": "D", "content": "虚假意思表示"}], "answer": "C"}, {"id": 53, "question": "王某明知自己某项专利技术落人他人专利保护范围，仍与不知情的甲公司签订专利权转让合同，并隐瞒了专利侵权的问题。根据民法典及相关规定，下列关于该合同效力的说法哪个是正确的？", "type": "单选", "options": [{"letter": "A", "content": "有效"}, {"letter": "B", "content": "无效"}, {"letter": "C", "content": "效力待定"}, {"letter": "D", "content": "可撤销"}], "answer": "BC"}, {"id": 54, "question": "金某家中有一块祖传玉佩。当地著名企业家孟某甚是喜爱，多次上门求购，均被金某拒绝。2022年2月1日，孟某的生意伙伴曹某为讨孟某欢心，对金某讲：“三日内不将玉佩卖给孟某，小心金某在某高中上学的女儿”。金某心生恐惧，次日主动以5万元出售给孟某。2025年3月2日，女儿留学德国，金某再无后顾之优，于3月10日向法院起诉要求撤销玉佩买卖合同。关于本案，下列哪一说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "无论孟某是否知道曹某胁迫金某一事，金某均有权请求撤销与孟某的玉佩买卖合同"}, {"letter": "B", "content": "只有当孟某知道曹某胁迫金某一事，金某才有权请求撤销与孟某的玉佩买卖合同"}, {"letter": "C", "content": "金某基于受胁迫撤销玉佩买卖合同的权利因超过1年除斥期间而不予支持"}, {"letter": "D", "content": "金某最迟应当自2022年2月2日起五年内行使撤销权"}], "answer": "BC"}, {"id": 55, "question": "齐某扮成建筑工人模样，在工地旁摆放一尊廉价购得的旧蟾蜍石雕，冒充新挖出文物等待买主。甲曾以5000元从齐！项正确。（新编）某处买过一尊同款石雕.发现被骗后正在和齐某交涉时，乙过来询问。甲有意让乙也上当，以便要回被骗款项，未等齐某开口便对乙说：“我之前从他这买了一个挑，转手就赚了，这个你不要我就要了。“乙信以为真，以5000元买下石雕。关于所涉民事法律行为的效力，下列哪一说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "乙可向甲主张撤销其购买行为"}, {"letter": "B", "content": "乙可向齐某主张撤销其购买行为"}, {"letter": "C", "content": "甲不得向齐某主张撤销其购买行为"}, {"letter": "D", "content": "乙的撤销权自购买行为发生之日起1年内不行使则消灭"}], "answer": "D"}, {"id": 56, "question": "王某与张某签订了一个二手汽车买卖合同，但王某隐購了该汽车存在重大质量瑕疵的情况。根据民法典及相关规定，下列说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "张某有权请求人民法院确认该买卖合同无效"}, {"letter": "B", "content": "张某有权请求人民法院撤销该买卖合同"}, {"letter": "C", "content": "张某有权请求仲裁机构确认该买卖合同无效"}, {"letter": "D", "content": "张某有权请求仲裁机构撤销该买卖合同"}], "answer": "B"}, {"id": 57, "question": "某日，李某醉酒搭乘出租车回家，车程20公里。李某下车前用手机支付车费。误将80元输错成8080元。司机收到后，未提醒李某。对此，下列哪些选项是正确的？", "type": "多选", "options": [{"letter": "A", "content": "该运输合同因显失公平而可撤销"}, {"letter": "B", "content": "对于多付的8000元视为李某对司机的赠与"}, {"letter": "C", "content": "醉酒不影响该运输合同的效力"}, {"letter": "D", "content": "李某有权请求出租车司机返还8000元不当得利"}], "answer": "BD"}, {"id": 58, "question": "某日，古玩爱好者王某在本地经常光顾的古玩街花费数万元购买了一对青铜烛台，疑为明代真品。后经鉴定，该烛台为现代仿品，仅值数百元，对此，下列哪一说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "王某可主张存在重大误解，请求撤销合同"}, {"letter": "B", "content": "王某意思表示真实有效，无权请求撤销合同"}, {"letter": "C", "content": "王某可主张存在显失公平，请求撤销合同"}, {"letter": "D", "content": "王某可主张其被出卖人欺诈，请求撤销合同"}], "answer": "BD"}, {"id": 59, "question": "根据民法典总则编及相关规定，下列哪些说法是正确公平的主观构成要件，不属于是失公平，因的7", "type": "多选", "options": [{"letter": "A", "content": "在订立合同时显失公平的，受损害方有权请求人民法院成者仲裁机构撤销"}, {"letter": "B", "content": "合同被依法撤销的，该合同自人民法院判决撤销之日起丧失法律约束力"}, {"letter": "C", "content": "合同部分无效，不影响其他部分效力的，其他部分仍然有效"}, {"letter": "D", "content": "合同被撤销后，因该合同取得的财产应当予以返还；不能返还或者没有必耍返还的，应当折价补偿"}], "answer": "CD"}, {"id": 60, "question": "根据民法典总则编及相关规定，关于无效、被撤销的民事行为，下列说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "无效的民事行为从行为开始起就没有法律约束力"}, {"letter": "B", "content": "无效的民事行为从人民法院确认无效之日起没有法律约束力"}, {"letter": "C", "content": "被撤销的民事行为从人民法院撤销该民事行为之日起没有法律约束力"}, {"letter": "D", "content": "被撤销的民事行为从行为开始起就没有法律约束力"}], "answer": "B"}, {"id": 61, "question": "根据民法典总则编及相关规定，下列关于可撤销合同的哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "因重大误解订立的合同，行为人有权请求人民法院或者仲裁机构撤销"}, {"letter": "B", "content": "合同被依法撤销的，该合同自人民法院判决撤销之日起丧失法律约束力"}, {"letter": "C", "content": "因重大误解订立的合同，具有撤销权的当事人自知道或者应当知道撤销事由之日起90日内没有行使撤销权的，撤销权消灭"}, {"letter": "D", "content": "当事人自民事法律行为发生之日起一年内没有行使撤销权的，撤销权消灭"}], "answer": "ACD"}, {"id": 62, "question": "根据民法典及相关规定，合同无效后可能产生下列哪果有：返还财产，折价补偿，赔偿损失，因此- 21 -些法律后果？", "type": "多选", "options": [{"letter": "A", "content": "赔偿损失"}, {"letter": "B", "content": "返还财产"}, {"letter": "C", "content": "折价补偿"}, {"letter": "D", "content": "继续履行"}], "answer": "AD"}, {"id": 63, "question": "十五岁的中学生李某作出了一项发明创造，并就此获得了一项发明专利。某公司认为该项技术市场前景较好，遂与李某签订了专利权转让合同、以50万元的价格受让该项专利。！根据民法典总则编及其他相关规定，该转让合同的效力应当如何认定？", "type": "单选", "options": [{"letter": "A", "content": "合同自签订之日起有效"}, {"letter": "B", "content": "由于李某不具有完全民事行为能力，因此该合同自始无效"}, {"letter": "C", "content": "经李某的法定代理人追认后，该合同方为有效"}, {"letter": "D", "content": "在李某的法定代理人追认之后，该公司有权以李某不具有完全民事行为能力为由撤销该合同"}], "answer": "AC"}, {"id": 64, "question": "小韩从小就显示出很高的文学天赋，九岁时写了小说《隐形翅膀》，并将该小说的网络传播权转让给某网站。小韩的父母反对该转让行为。下列哪一说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "小韩父母享有该小说的著作权，因为小韩是无民事行为能力人"}, {"letter": "B", "content": "小韩及其父母均不享有著作权，因为该小说未发表"}, {"letter": "C", "content": "小韩对该小说享有著作权，但网络传播权转让合同无效"}, {"letter": "D", "content": "因小韩父母反对，网络传播权转让合同自反对意见送到某网站时无效"}], "answer": "ABC"}, {"id": 65, "question": "张某在某专利代理事务所实习，表现优异。该事务所与张某达成约定，如果张某一年内通过专利代理师资格考试，将资助其出国进修三个月。根据民法典总则编及相关规定，在张某通过专利代理师资格考试之前，下列说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "该约定既未成立，也未生效"}, {"letter": "B", "content": "该约定已经成立，但未生效"}, {"letter": "C", "content": "该约定是附期限的民事法律行为"}, {"letter": "D", "content": "该约定是附条件的民事法律行为"}], "answer": "C"}, {"id": 66, "question": "2020年11月1日，李某和赵某签订房屋租赁合同，约定下列关于该合同的哪种说法是正确的？单选）", "type": "单选", "options": [{"letter": "A", "content": "该合同为附生效期限的合同"}, {"letter": "B", "content": "该合同为附终止期限的合同"}, {"letter": "C", "content": "该合同为附生效条件的合同"}, {"letter": "D", "content": "该合同为附解除条件的合同"}], "answer": "ABCD"}, {"id": 67, "question": "刘某与史某约定，如将来刘某不在甲公司上班，刘某即将其在甲公司附近一套自有公寓卖给史某。史某为尽快购得该房屋，贿赂甲公司经理，让其辞退了刘某。刘某和史某关于刘某不在甲公司上班的约定，下列哪一说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "该约定属于附生效条件的约定"}, {"letter": "B", "content": "该约定属于附生效期限的约定"}, {"letter": "C", "content": "应视为条件不成就"}, {"letter": "D", "content": "应视为约定无效"}], "answer": "BD"}, {"id": 68, "question": "甲今年16岁，成绩优异。与其阿姨乙约定，若甲高考成！绩是不确定的事实，该赠与合同明确约定了绩优异，将赠与甲一台价值一万元的笔记本电脑。下列哪些选取得优并成填这一条件、系附生效条件的赠项是正确的？", "type": "单选", "options": [{"letter": "A", "content": "甲为限制民事行为能力人，故该赠与合同无效"}, {"letter": "B", "content": "申与其阿乙约定时，该赠与合同成立未生效"}, {"letter": "C", "content": "甲的母亲丁得知此事后，认为笔记本电脑过于费重，表示坚决反对，该赠与合同因其母亲丁的反对而无效"}, {"letter": "D", "content": "甲受赠电脑的行为需要其父母追认才能生效"}], "answer": "A"}, {"id": 69, "question": "根据民法典总则编及相关规定，下列关于代理的哪种说！法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "民事主体的任何民事法律行为，均可通过代理人实施"}, {"letter": "B", "content": "代理人应当在代理权限内，以自己的名义实施民事法律行为"}, {"letter": "C", "content": "民事法律行为的委托代理，应当采用书面形式"}, {"letter": "D", "content": "代理人不履行职资而给被代理人造成损害的，应当承担民事责任"}], "answer": "AC"}, {"id": 70, "question": "根据民法典总则编及相关规定，下列哪些情形属于代理行为？", "type": "多选", "options": [{"letter": "A", "content": "甲律师接受法院指定担任被告人乙的辩护代理人"}, {"letter": "B", "content": "某明星甲让明星乙代替其参加春节晚会表演节目"}, {"letter": "C", "content": "甲公司法定代表人乙委托员工丙与丁公司签订合同"}, {"letter": "D", "content": "某高校教授甲让教授乙代替他去主持一场学术交流会"}], "answer": "B"}, {"id": 71, "question": "根据民法典总则编及相关规定，下列有关代理的哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "代理人在代理权限内，以被代理人名义实施的民事法律行为，对被代理人发生效力"}, {"letter": "B", "content": "代理人知道或者应当知道代理事项违法仍然实施代理行为，或者被代理人知道或者应当知道代理人的代理行为违法未作反对表示的，被代理人和代理人应当承担连带责任"}, {"letter": "C", "content": "相对人知道或者应当知道行为人无权代理的，相对人和人知进或者世当知进代理人的代星行为造行为人按照各自的过带承担责任"}, {"letter": "D", "content": "代理人和相对人恶意申通，损害被代理人合法权益的，代理人和相对人应当承担连带责任"}], "answer": "D"}, {"id": 72, "question": "根据民法典总则编及相关规定，下列关于代理的哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "代理包括委托代理和法定代理"}, {"letter": "B", "content": "代理人应当在代理权限内，以被代理人的名义实施民事法律行为"}, {"letter": "C", "content": "依照法律规定应当由本人实施的民事法律行为，不得代理"}, {"letter": "D", "content": "委托代理人需要转委托他人代理的，在任何情况下均应当取得被代理人的同意"}], "answer": "AC"}, {"id": 73, "question": "甲公司特邀请知名画家张某为公司庆典创作一书面作品，并明确约定须由张某亲自创作完成。张某在构思过程中因事务繁忙无法在规定期限内完成作品，遂请其学生王某代为完成画作，但并未告知甲公司，甲公司收到画作后支付给张某约定的画款。根据民法典总则编及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "张某因故无法在规定期限内完成作品，可以转委托他人"}, {"letter": "B", "content": "张某系为甲公司利益着想，可以转委托他人完成作品"}, {"letter": "C", "content": "根据甲公司与张某的约定，该画作应当由张某亲自完成，不能转委托他人"}, {"letter": "D", "content": "张某应当对其学生王某的行为承担责任"}], "answer": "ABCD"}, {"id": 74, "question": "某公司的印章由其工作人员刘某保管。刘某未经该公司授权以该公司的名义与张某签订买卖合同，并加盖该公司印章，将该公司的一批产品卖给张某。对此，下列哪些说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "该公司与张某之间的买卖合同无效"}, {"letter": "B", "content": "该公司与张某之间的买卖合同效力待定"}, {"letter": "C", "content": "该公司与张某之间的买卖合同有效"}, {"letter": "D", "content": "如果该公司对该买卖合同不予追认，则该合同的当事人为刘某与张某"}], "answer": "ABC"}, {"id": 75, "question": "根据民法典总则编关于无权代理民事法律行为的相关规定，下列哪些关于无权代理法律后果的表述是错误的？", "type": "多选", "options": [{"letter": "A", "content": "相对人可以催告被代理人自收到通知之日起两个月内予以追认"}, {"letter": "B", "content": "行为人实施的行为未被追认的，普意相对人只能就其受到的损害请求行为人赔偿"}, {"letter": "C", "content": "相对人知道或者应当知道行为人无权代理的，相对人和行为人按照各自的过错承担责任"}, {"letter": "D", "content": "被代理人未作出表示的，视为同意追认"}], "answer": "CD"}, {"id": 76, "question": "甲公司委托乙代理机构与丙公司谈判购买一项专利权，乙代理机构委派代理师王某与丙公司谈判。谈判过程中王某认为丙公司的另一项专利更好，便自作主张以甲公司的名叉与丙公司签订了该项专利的转让合同。丙公司未审核乙代理机构的代理权限，便与之订立了专利权转让合同。根据民法典总则编及相关规定，下列说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "甲公司对该项合同有追认权"}, {"letter": "B", "content": "丙公司对该项合同有催告权"}, {"letter": "C", "content": "丙公司对该项合同有撤销权"}, {"letter": "D", "content": "甲公司对该项合同有撤销权"}], "answer": "C"}, {"id": 77, "question": "根据民法典总则编及相关规定，对于代理人在代理权终正后的代理行为，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "未经被代理人追认的，对被代理人不发生效力"}, {"letter": "B", "content": "相对人有理由相信行为人有代理权的，代理行为有效"}, {"letter": "C", "content": "相对人知道或者应当知道行为人无权代理的，相对人和行为人按照各自的过错承担责任"}, {"letter": "D", "content": "相对人知道或者应当知道行为人无权代理的，相对人和行为人各承担百分之五十的责任"}], "answer": "ABD"}, {"id": 78, "question": "下列哪一情形构成无权代理？", "type": "单选", "options": [{"letter": "A", "content": "甲冒用乙的姓名从某杂志社领取乙的论文橘酬掘为已有"}, {"letter": "B", "content": "某公司法定代表人超越权限以本公司名义为他人提供担保"}, {"letter": "C", "content": "刘某受同学周某之托冒充丁某参加求职面试"}, {"letter": "D", "content": "关某代收某推销员谎称关某的邻居李某订购的保健品并代为付款"}], "answer": "ABC"}, {"id": 79, "question": "肖某系甲烟草公司经理，因违纪被开除，后伪造公章，于2024年5月25日以甲公司名义与不知情的乙公司约定，向乙公司出售烟草50箱，价款50万元。2024年6月1日，乙公司得知肖某被开除，询问甲公司是否认可该合同，2024年6月10日，甲公司通知乙公司不承认肖某所订立的香烟合同。下列说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "2024年6月10日后，乙公司有权请求肖某赔偿损失"}, {"letter": "B", "content": "2024年6月10日后，乙公司有权请求甲公司履行合同"}, {"letter": "C", "content": "2024年6月10日后，乙公司有权请求肖某履行合同"}, {"letter": "D", "content": "2024年6月10日前，乙公司有权通知甲公司撤销"}], "answer": "BC"}, {"id": 80, "question": "根据民法典总则编及相关规定，关于代理，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "行为人超越代理权实施代理行为，相对人有理由相信行！代理，相对人丙享有催告权与撤销权。A、B为人有代理权的.代理行为有效"}, {"letter": "B", "content": "代理人和相对人恶意申通，损害被代理人合法权益的，代理人和相对人按照过错大小承担按份资任"}, {"letter": "C", "content": "代理人知道代理事项违法仍然实施代理行为的、被代理人和代理人承担连带资任"}, {"letter": "D", "content": "行为人代理权终止后、仍然实施代理行为的，对被代理人不发生效力"}], "answer": "D"}, {"id": 81, "question": "甲用伪造的乙公司公章，以乙公司名义与不知情的丙公司签订食用油买卖合同，以次充好，将劣质食用油卖给丙公司。关于该合同，下列哪一表述是正确的？", "type": "单选", "options": [{"letter": "A", "content": "如乙公司追认，则丙公司有权通知乙公司撤销"}, {"letter": "B", "content": "如乙公司追认，则丙公司有权请求法院撤销"}, {"letter": "C", "content": "无论乙公司是否追认，丙公司均有权通知乙公司撤销"}, {"letter": "D", "content": "无论乙公司是否追认，丙公司均有权要求乙公司履行"}], "answer": "ACD"}, {"id": 82, "question": "根据民法典总则编及相关规定，下列哪些情形下委托代理终止？", "type": "多选", "options": [{"letter": "A", "content": "代理期间届满或者代理事务完成"}, {"letter": "B", "content": "被代理人死亡"}, {"letter": "C", "content": "代理人死亡或者作为代理人的法人终止"}, {"letter": "D", "content": "代理人丧失民事行为能力"}], "answer": "AC"}, {"id": 83, "question": "某专利代理机构受孙某的委托代为办理专利申请事务。代理事项尚未完成时，孙某意外身亡。在下列哪些情况下，该代理机构在孙某死亡后实施的代理行为有效？", "type": "多选", "options": [{"letter": "A", "content": "该代理机构在孙某死亡前已经进行，而在孙某死亡后为了孙某的继承人的利益继续完成的"}, {"letter": "B", "content": "该代理机构不知道且不应知道孙某死亡的"}, {"letter": "C", "content": "孙某和该代理机构约定到代理事项完成时代理权终止的"}, {"letter": "D", "content": "孙某的继承人均予以承认的"}], "answer": "B"}, {"id": 84, "question": "王甲委托同某帮忙购买自已曾的且宅，委托合同写止明全权委托，直至买到祖宅为止。同某后来以王甲的名义与祖宅现住人李某达成房屋买卖合间.准备展行合同时发现王甲已于上礼拜过世。王甲的唯一儿子王乙农示对购买祖宅一事不知情，并且拒绝迫认合同。关于此合同，下列说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "李某有权请求周某继续履行合同"}, {"letter": "B", "content": "因为王甲去世，合同无效"}, {"letter": "C", "content": "李某有权请求主乙继续履行合同"}, {"letter": "D", "content": "因为王乙拒绝道认，合同无效"}], "answer": "ABCD"}, {"id": 85, "question": "根据民法典总则编及相关规定，下列哪些情形下法定代理终止？多选）", "type": "多选", "options": [{"letter": "A", "content": "被代理人取得完全民事行为能力"}, {"letter": "B", "content": "被代理人死亡"}, {"letter": "C", "content": "代理人死亡"}, {"letter": "D", "content": "代理人丧失民事行为能力"}], "answer": "ABCD"}, {"id": 86, "question": "甲和乙为丙的连带债务人。后甲和乙约定，甲负资偿还60%的债务，乙负责偿还40%的务。对此，根据民法典总则编的规定，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "丙可以要求甲偿还全部债务"}, {"letter": "B", "content": "丙可以要求乙偿还全部债务"}, {"letter": "C", "content": "甲偿还了全部债务后，有权要求乙偿付其应当承担的40%的债务"}, {"letter": "D", "content": "甲有权拒绝偿还超过60%的债务"}], "answer": "C"}, {"id": 87, "question": "根据民法典总则编及相关规定，下列哪些属于承担民事责任的方式？多选）", "type": "多选", "options": [{"letter": "A", "content": "继续履行"}, {"letter": "B", "content": "恢复原状"}, {"letter": "C", "content": "停止俊害"}, {"letter": "D", "content": "恢复名誉"}], "answer": "ABCD"}, {"id": 88, "question": "根据民法典总则编及相关规定、下列哪些属于侵犯知识产权的民事责任承担方式？", "type": "多选", "options": [{"letter": "A", "content": "赔偿损失"}, {"letter": "B", "content": "没收违法所得"}, {"letter": "C", "content": "停止侵害"}, {"letter": "D", "content": "消除影响"}], "answer": "ABC"}, {"id": 89, "question": "根据民法典总则编及相关规定，下列哪些属于法定减轻或免除民事责任的情形？多选）", "type": "多选", "options": [{"letter": "A", "content": "不可抗力"}, {"letter": "B", "content": "紧急避险"}, {"letter": "C", "content": "正当防卫"}, {"letter": "D", "content": "紧急救助"}], "answer": "ABCD"}, {"id": 90, "question": "何某被恶狗咬，马某用吕某的雨伞打狗，伞坏人伤。经查，恶狗为赵某所养。关于本案，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "马某的医疗费应由何某赔偿"}, {"letter": "B", "content": "马某的医疗费应由赵某赔偿"}, {"letter": "C", "content": "吕某的雨伞损害应由马某赔偿"}, {"letter": "D", "content": "吕某的雨伞损害应由赵某赔偿"}], "answer": "ACD"}, {"id": 91, "question": "根据民法典总则编及相关规定，下列关于诉讼时效期间的哪种说法是错误的？单选）", "type": "单选", "options": [{"letter": "A", "content": "向人民法院请求保护民事权利的诉讼时效期间为3年，法律另有规定的除外"}, {"letter": "B", "content": "诉讼时效期间自权利人知道或者应当知道权利受到损害以及义务人之日起计算"}, {"letter": "C", "content": "自权利受到损害之日起超过二十年的，人民法院不于携之日超超过二十年的，人展法院不中保护"}, {"letter": "D", "content": "诉讼时效期间一律不得延长"}], "answer": "ABCD"}, {"id": 92, "question": "根据民法典总则编及相关规定，下列哪些民事案件不适用诉讼时效的规定？", "type": "单选", "options": [{"letter": "A", "content": "赔偿损失"}, {"letter": "B", "content": "返还财产"}, {"letter": "C", "content": "停止侵害"}, {"letter": "D", "content": "继续履行"}], "answer": "BD"}, {"id": 93, "question": "甲将一辆油罐车擅自停在邻居乙的院子里，还把乙没上锁的自行车骑走了。3年后，乙可采取的措施中，下列哪些选项属于甲可以时效经过为由主张的抗辩？", "type": "多选", "options": [{"letter": "A", "content": "赔偿损失"}, {"letter": "B", "content": "消除危险"}, {"letter": "C", "content": "返还财物"}, {"letter": "D", "content": "停止侵害"}], "answer": "D"}, {"id": 94, "question": "根据民法典总则编及相关规定，以下哪些选项属于不适用诉讼时效的情形？多选）", "type": "多选", "options": [{"letter": "A", "content": "甲购买的别墅附带赠送了地下车库，其同一小区的邻居乙占用该赠送的地下车位，甲要求邻居乙不得占用其车位"}, {"letter": "B", "content": "甲购买商品房获得产权后一直未居住，被物业公司转售给乙，甲要求乙返还"}, {"letter": "C", "content": "甲与妻子离婚后，一直未支付其子的抚养费，甲妻以其子的名义起诉，要求甲支付抚养费"}, {"letter": "D", "content": "甲的自行车被邻居乙长期使用，现要求返还"}], "answer": "AC"}, {"id": 95, "question": "根据民法典总则编及相关规定，下列哪些属于诉讼时效中断的事由？多选）", "type": "多选", "options": [{"letter": "A", "content": "权利人向法院提起诉讼"}, {"letter": "B", "content": "因不可抗力导致权利人不能行使请求权"}, {"letter": "C", "content": "权利人向义务人提出履行请求"}, {"letter": "D", "content": "义务人同意履行债务"}], "answer": "ABC"}, {"id": 96, "question": "甲从其朋友乙处购买一件古董花瓶、约定乙于甲付款后5日内交付花瓶。甲于2018年2月8日付款后，乙一直未交付该花瓶。甲于2021年10月向人民法院起诉、要求乙交付该花瓶。乙得知后，主动将该花瓶交给甲，甲撤诉。后乙反悔，以甲的起诉超过诉讼时效期间为由向人民法院起诉，要求甲返还该花瓶。对此，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "甲的起诉超过诉讼时效期间"}, {"letter": "B", "content": "甲获得该花瓶属于不当得利"}, {"letter": "C", "content": "人民法院对乙的诉讼请求应当不予支持"}, {"letter": "D", "content": "人民法院对乙的诉讼请求应当予以支持"}], "answer": "ACD"}, {"id": 97, "question": "根据民法典总则编及相关规定，在诉讼时效期间的最后6个月内，因下列哪些障碍，不能行使请求权的，诉讼时效中止？", "type": "多选", "options": [{"letter": "A", "content": "限制民事行为能力人没有法定代理人"}, {"letter": "B", "content": "义务人同意履行义务"}, {"letter": "C", "content": "不可抗力"}, {"letter": "D", "content": "权利人提起诉讼或者申请仲裁"}], "answer": "AB"}, {"id": 98, "question": "根据民法典合同编及相关规定，下列哪种情形适用合同编的规定？", "type": "单选", "options": [{"letter": "A", "content": "商标权人林某与某公司签订的商标权转让协议"}, {"letter": "B", "content": "张某与某福利院签订的收养该福利院孤儿的协议"}, {"letter": "C", "content": "房屋征收部门对被征收人郑某作出的征收决定及其补偿决定"}, {"letter": "D", "content": "刘某与徐某签订的解除婚姻关系协议"}], "answer": "AC"}, {"id": 99, "question": "根据民法典合同编及相关规定，下列说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "合同关系是发生在平等的民事主体之间的法律关系"}, {"letter": "B", "content": "当事人缔结合同应当遵循诚实信用的原则"}, {"letter": "C", "content": "合同关系应当为有偿关系"}, {"letter": "D", "content": "合同关系的缔结以当事人间的自愿为基础"}], "answer": "A"}, {"id": 100, "question": "根据民法典合同编及相关规定，当事人对合同条款的理解有争议的，应当按照下列哪些因素确定该条款的真实意思？", "type": "多选", "options": [{"letter": "A", "content": "合同所使用的词句"}, {"letter": "B", "content": "合同的有关条款"}, {"letter": "C", "content": "合同的目的"}, {"letter": "D", "content": "交易习惯以及诚实信用原则"}], "answer": "ABD"}, {"id": 101, "question": "甲丢了一只小狗，发了高价寻狗启事。乙不知道这件事，捡到小拘后归还。甲给了乙200元答谢，乙表示不用。后乙知道了商价寻狗启事，找甲索要报酬，被甲拒绝。关于本案，下列说法正确的有？", "type": "多选", "options": [{"letter": "A", "content": "乙已经拒绝，不得索要报酬"}, {"letter": "B", "content": "乙有权索要报酬"}, {"letter": "C", "content": "甲发布寻狗启事时，该悬货广告生效"}, {"letter": "D", "content": "不论乙是否知晓寻狗启事的内容，甲均应支付报酬"}], "answer": "ABCD"}, {"id": 102, "question": "根据民法典合同编及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "要约是希望和他人订立合同的意思表示"}, {"letter": "B", "content": "要约邀请是希望他人向自己发出要约的意思表示"}, {"letter": "C", "content": "要约在发出时生效"}, {"letter": "D", "content": "要约以对话方式发出的，相对人知道其内容时生效"}], "answer": "BCD"}, {"id": 103, "question": "根据民法典合同编及相关规定，下列哪些选项属于要约？", "type": "多选", "options": [{"letter": "A", "content": "超市货架上的商品标价陈列"}, {"letter": "B", "content": "自动售货机上标明可口可乐2.5元一罐"}, {"letter": "C", "content": "在拍卖现场，举牌竞拍"}, {"letter": "D", "content": "发布招股说明书，募集股份"}], "answer": "AD"}, {"id": 104, "question": "甲公司欲出售一批货物给乙公司，甲公司向乙公司发出要约后，因进货渠道发生困难而欲撤回要约。根据民法典合同编及相关规定，下列哪些情形下，甲公司发出的要约可以被撤回？多选）", "type": "多选", "options": [{"letter": "A", "content": "撤回要约的通知在该要约到达乙公司之前到达乙公司"}, {"letter": "B", "content": "撤回要约的通知在乙公司发出承诺通知之前到达乙公司"}, {"letter": "C", "content": "撤回要约的通知与该要约同时到达乙公司"}, {"letter": "D", "content": "撤回要约的通知在乙公司发出承诺通知的同时到达乙公司邀请。（2019)"}], "answer": "ABC"}, {"id": 105, "question": "甲公司发布招标公告，选择专利代理机构办理专利复审事务。乙专利代理机构根据该招标公告制作并提交了投标书参加投标。根据民法典合同编及相关规定、下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "甲公司发布的招标公告是要约邀请"}, {"letter": "B", "content": "甲公司发布的招标公告是要约"}, {"letter": "C", "content": "乙专利代理机构提交的投标书可以撤回，撤回该投标书的通知应当在申公司发出承诺通知之前到达申公司"}, {"letter": "D", "content": "乙专利代理机构提交的投标书可以撤销，撤销该投标书的通知应当在甲公司发出承诺通知之前到达甲公司"}], "answer": "AC"}, {"id": 106, "question": "根据民法典合同编及相关规定，在下列哪些情形下，要约不得撤销？", "type": "多选", "options": [{"letter": "A", "content": "要约已经到达受要约人"}, {"letter": "B", "content": "要约人确定了承诺期限"}, {"letter": "C", "content": "要约人明示要约不可撤销"}, {"letter": "D", "content": "受要约人有理由认为要约是不可撤销的，并已经为履行合同做了合理准备工作"}], "answer": "AD"}, {"id": 107, "question": "根据民法典合同编及相关规定，有下列哪些情形之一的，要约失效？多选）", "type": "多选", "options": [{"letter": "A", "content": "要约被拒绝"}, {"letter": "B", "content": "要约被依法撤回"}, {"letter": "C", "content": "承诺期限届满，受要约人未作出承诺"}, {"letter": "D", "content": "受要约人对要约的内容做出实质性变更"}], "answer": "BCD"}, {"id": 108, "question": "根据民法典合同编的规定，下列哪些情形下要约失效？", "type": "多选", "options": [{"letter": "A", "content": "甲对乙讲：“我有八成新电脑一台，5000元卖给你，买吗？”乙表示不买"}, {"letter": "B", "content": "甲发传真给乙，表明“现有大米1万吨，批发价格每斤1元，予容复"}, {"letter": "C", "content": "甲为将某物卖给乙而发送电子邮件询间，请乙在一周内回复，发信后即感报价过低而后悔，当天致电乙表明撤销该要约"}, {"letter": "D", "content": "甲对乙表示愿将数码相机30000元转让给乙，乙表示感意以15000元的价格购买"}], "answer": "ACD"}, {"id": 109, "question": "甲公司向乙公司去函表示，“我公司生产的W型路由器，每台单价200元。如果需要请与我公司联系。”乙公司回函，“我公司于一个月内供货。”十天后，甲公司向乙公司发出500台路由器，并要求乙公司按照每台200元的价格付款，乙公司拒收。根据民法典合同编及相关规定，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "甲公司向乙公司的去函是要约"}, {"letter": "B", "content": "甲公司向乙公司的去函是要约邀请"}, {"letter": "C", "content": "乙公司向甲公司的回函是新要约"}, {"letter": "D", "content": "乙公司向甲公司的回函是承诺"}], "answer": "ABD"}, {"id": 110, "question": "甲公司于6月10日向乙公司发出要约订购一批红木，要求乙公司于6月15日前答复。6月12日，甲公司欲改向丙公司订购红木，遂向乙公司发出撤销要约的信件，于6月14日到达乙公司。而6月13日，甲公司收到乙公司的回复，乙公司表示红木缺货，问甲公司能否用杉木代替。甲公司的要约于何时失效？", "type": "单选", "options": [{"letter": "A", "content": "6月12日"}, {"letter": "B", "content": "6月13日"}, {"letter": "C", "content": "6月14日"}, {"letter": "D", "content": "6月15日"}], "answer": "AC"}, {"id": 111, "question": "根据民法典合同编的规定，下列哪些情形中，合同已经成立？多选）", "type": "多选", "options": [{"letter": "A", "content": "张某对杨某说：“我这块手表1000块钱卖给你，要不要？\"杨某说：“好，一言为定。”"}, {"letter": "B", "content": "某电脑公司与某销售公司签订了销售500台电脑的合同，双方就合同的全部条款都已经协商完毕，打印好后各执一份，但没！事人一方已经履行主要义务，对方接受售公司，该销售公司全部予以验收。"}, {"letter": "C", "content": "某超市发传真给某食品厂，上面写着“请速运200箱牛肉味方便面来我超市”。该食品厂立即传真回复：“现有200箱鸡肉味方便而，如需要，明日送货上门。”"}, {"letter": "D", "content": "郭某打电话给马某说：“昨天你想买的那枚珍珠我决定卖给你了、8000块钱。”马某未置可否。"}], "answer": "B"}, {"id": 112, "question": "申在某大学摆设饮料自动贩卖机、乙投入两枚硬币购买了一罐咖啡，咖啡出来后，两枚硬币因机器故障跳出。乙见四处无人，乃取两枚硬币放人口袋。这一场景恰好被甲的职员丙发现，遂产生纠纷。关于本案，下列哪些说法是正确的？多选）·", "type": "多选", "options": [{"letter": "A", "content": "甲摆设自动贩卖机的行为属于要约"}, {"letter": "B", "content": "乙投币购买咖啡的行为属于承诺"}, {"letter": "C", "content": "乙将两枚硬币放人口袋的行为构成不当得利"}, {"letter": "D", "content": "甲有权请求乙返还该两枚硬币"}], "answer": "AB"}, {"id": 113, "question": "甲6月10日向乙发信，表示欲购某型号钢材。6月13日乙与甲通话表示同意，并与之商定了钢材的型号、单价和数量，并约定签订合同确认书，乙随即制作了合同确认书并寄出，甲于6月16日在确认书上签字后寄往乙处，乙收到后于6月19日签字，6月22日双方经商议签订了合同书。甲乙之间的合同于何时成立？", "type": "单选", "options": [{"letter": "A", "content": "6月13日"}, {"letter": "B", "content": "6月16日"}, {"letter": "C", "content": "6月19日"}, {"letter": "D", "content": "6月22日"}], "answer": "ABCD"}, {"id": 114, "question": "京东商家出售某品牌电脑，张三根据网站页面提交了购买订单，随后收到了京东商家发送的订单信息，京东商家于次日发货。关于该合同，下列说法正确有哪些？多选）", "type": "多选", "options": [{"letter": "A", "content": "购物网站页面标价出售电脑属于要约邀请"}, {"letter": "B", "content": "购物网站页面标价出售电脑属于要约"}, {"letter": "C", "content": "张三提交订单成功时，买卖合同成立"}, {"letter": "D", "content": "张三收到商家发送的订单信息：买卖合同成立"}], "answer": "C"}, {"id": 115, "question": "根据民法典合同编及相关规定，关于合同的成立，下列说法正确的是？", "type": "多选", "options": [{"letter": "A", "content": "受要约人在承诺期限内作出承诺，该承诺因送达原因而迟判的，除要约人及时通知受婴约人因承诺超过期限不接受该承诺的以外，该承诺有效"}, {"letter": "B", "content": "采用数据电文形式订立合同的，收件人没有主营业地的，其住所地为合同成立的地点"}, {"letter": "C", "content": "来用数据电文形式订立合同的，发件人有主营业地的，其主营业地为合同成立的地点"}, {"letter": "D", "content": "法律规定采用书面形式订立合同，当事人没有采用书而形式，但一方履行了主要义务，对方也接受的，合同成立"}], "answer": "BC"}, {"id": 116, "question": "根据民法典合同编及相关规定，下列关于格式条款的说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "格式条款是当事人为了重复使用而预先拟定，并在订立合同时未与对方协商确定的条款"}, {"letter": "B", "content": "提供格式条款一方限制对方主要权利的条款一律无效"}, {"letter": "C", "content": "对格式条款有两种以上解释的，应当作出有利于提供格式条款一方的解释"}, {"letter": "D", "content": "格式条款和非格式条款不一致的，应当采用非格式条款"}], "answer": "ABD"}, {"id": 117, "question": "根据民法典合同编及相关规定，下列哪些选项层于无效的格式条款？", "type": "单选", "options": [{"letter": "A", "content": "提供格式条款的一方所提供的格式条款含有加重对方责任的内容"}, {"letter": "B", "content": "提供格式条款的一方采取合理方式提请对方注意减轻其责任的内容"}, {"letter": "C", "content": "违反法律、行政法规强制性规定的"}, {"letter": "D", "content": "内容不够具体确定的"}], "answer": "AD"}, {"id": 118, "question": "某家具制造商与批发商签订的合同是该家具制造商为了重发使用而预光拟定的合同书，订立合同时并未与该批发商协商相关条款。该合同书中规定，如果因为家具质量原因给消费者造成损害的，家具制造商概不负责。根据民法典合同编及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "该资任条款是格式条款"}, {"letter": "B", "content": "如果家具因为质量原因给消费者造成损害，该家具制造商应当承担责任"}, {"letter": "C", "content": "该责任条款无效"}, {"letter": "D", "content": "该合同无效"}], "answer": "C"}, {"id": 119, "question": "根据民法典合同编及相关规定、关于格式条款的合同，下列说法哪些是正确的？", "type": "多选", "options": [{"letter": "A", "content": "提供格式条款一方不合理地加重对方责任的，该格式条款无效"}, {"letter": "B", "content": "提供格式条款一方排除对方主要权利的，该格式条款无效"}, {"letter": "C", "content": "合同中造成对方人身损害的免责条款无效"}, {"letter": "D", "content": "合同中因一般过失造成对方财产损失的免责条款无效"}], "answer": "ABC"}, {"id": 120, "question": "甲驾车起步时不小心撞死了坐在院子里甲的外婆。甲向保险公司索赔，保险公司拒绝赔付，并指出保险合同中约定：“保险车辆造成被保险人或其允许的驾驶员及他们的家庭成员人身伤亡，保险公司均不赔偿”。经查实，在签订保险合同时保险公司并未提示甲注意该格式条款。甲可以主张该条款？", "type": "单选", "options": [{"letter": "A", "content": "可撤销"}, {"letter": "B", "content": "无效"}, {"letter": "C", "content": "效力待定"}, {"letter": "D", "content": "不成为合同内容"}], "answer": "ABC"}, {"id": 121, "question": "刘某在订票网站上提前两周以600元订购了海鸥航空公司全价1000元的六折机票，在订单生成页面，网站提示起飞前2小时内退票按机票价格收取30%手续费，并重点提示因遇天气原因飞机颠簸造成旅客身体损伤的，一律不承担赔偿责任。后刘某因临时列墩些选英延正确的多遇）", "type": "单选", "options": [{"letter": "A", "content": "迎票手续费的规定未尽提示注意与说明义券，是光效格式条款"}, {"letter": "B", "content": "对30失的手续费应当解样为刘某应当支付300元的避票手"}, {"letter": "C", "content": "对30%的手续费应当解样为刘某应当支付180元的退票手续费"}, {"letter": "D", "content": "航空公司规定的因遇关气原因飞机顾巅造成旅客身体损价的，一律不承担赔偿费任属于无效格式系款"}], "answer": "D"}, {"id": 122, "question": "根据民法典合同编及相关规定，合同中出现的下列免费条款，哪些条款会被认定为无效？多选）", "type": "多选", "options": [{"letter": "A", "content": "造成对方人身伤害的"}, {"letter": "B", "content": "因意外事件造成对方财产损失的"}, {"letter": "C", "content": "因故意造成对方财产损失的"}, {"letter": "D", "content": "因过失造成对方财产损失的"}], "answer": "CD"}, {"id": 123, "question": "某日，申公司与乙公司订立《合作意向书》，约定待申公司取得某地建设用地使用权后双方订立《合作开发合同》，并初步约定了出资比例、收益分享等事宜，当日乙公司依《合作意向书》向甲公司支付了100万元预付款。甲公司取得建设用地使用权后，因决定与其他公司合作而拒绝与之签订《合作开发合同》。以下说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "乙公司有权请求甲公司承担违约责任"}, {"letter": "B", "content": "《合作意向书》不具有法律约束力"}, {"letter": "C", "content": "乙公司有权请求甲公司支付《合作开发合同》项下的违约金"}, {"letter": "D", "content": "甲公司应向乙公司双倍返还预付款"}], "answer": "AC"}, {"id": 124, "question": "甲、乙同为儿童玩具生产商。六一节前夕，丙与甲商谈进货事宜。乙知道后向丙提出更优惠条件，并指使丁假借订货与甲接洽，报价高于丙以阻止甲与丙签约。丙经比较与乙签约，丁随即终止与甲的谈判，甲因此遭受损失。对此，下列哪一说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "乙应对甲示担缔约过失责任"}, {"letter": "B", "content": "丙应对甲承担缔约过失责任"}, {"letter": "C", "content": "丁应对甲承担缔约过失责任"}, {"letter": "D", "content": "乙、丙、丁无须对甲承担缔约过失责任"}], "answer": "A"}, {"id": 125, "question": "甲公司于6月5日以传真方式向乙公司求购一台机床，要求“立即回复”。乙公司当日回复“收到传真”。6月10日，甲公司电话催问，乙公司表示同意按申公司报价出售，要其于6月15日来人签订合同书。6月15日，甲公司前往签约，乙公司要求加价，未获同意，乙公司遂拒绝签约。对此、下列哪一种说法是正确的？", "type": "单选", "options": [{"letter": "A", "content": "买卖合同于6月5日成立"}, {"letter": "B", "content": "买卖合同于6月10日成立"}, {"letter": "C", "content": "买卖合同于6月15日成立"}, {"letter": "D", "content": "甲公司有权要求乙公司承担缔约过失责任"}], "answer": "C"}, {"id": 126, "question": "德凯公司拟为新三板上市造势，在无真实交易意图的情况下，短期内以业务合作为由邀请多家公司来其主要办公地点洽谈。其中，真诚公司安排授权代表往返十余次，每次都准备了详尽可操作的合作方案，德凯公司伴装感兴趣并次表达将签署合同的意愿，但均在最后一刻推脱拒签。其间，德凯公司还将知悉的真诚公司的部分商业秘密不当泄露。对此，下列哪些说法是错误的？", "type": "多选", "options": [{"letter": "A", "content": "未缔结合同，则德凯公司就商事宜无需承担责任"}, {"letter": "B", "content": "虽未缔结合同，但德凯公司构成恶意商，应赔偿损失"}, {"letter": "C", "content": "未缔结合同，则商业秘密属于真诚公司自愿披露，不应禁止外泄"}, {"letter": "D", "content": "德凯公司也付出了大量的工作成本，可向真诚公司主张赔偿存在的有关解决争议方法的条款。根据民法典合同编及相律行并无效：《民法典>第507条晨定：合同不坐关规定：下列关于该合间效力的说法哪些是正确的7（单选）"}], "answer": "D"}, {"id": 127, "question": "李某在二手车市场向王某购买了一辆二手车，并签订了军辆买卖合同。该军里程表显示行晚血程3万公重，但实际上该车已经行驶了20万公里。王某明知里程有误，却故意隐瞒该事实，以较高价格将该车卖给李某。李某购买该二手车后发现上述问题，与王某产生纠纷，向人民法院提起诉讼。根据民法典总则编、合同编及相关规定，下列说法哪些是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "如果李某请求撤销车辆买卖合同，可以同时请求王某承担违约责任"}, {"letter": "B", "content": "李某有权请求人民法院予以撤销车辆买卖合同"}, {"letter": "C", "content": "如果李某请求撤销车辆买卖合同，可以同时请求王某承担缔约过失责任"}, {"letter": "D", "content": "车辆买卖合同中有仲裁条款的，李某有权请求仲裁机构予以撤销该合同"}], "answer": "ACD"}, {"id": 128, "question": "关于合同效力，下列说法正确的有哪项？", "type": "单选", "options": [{"letter": "A", "content": "甲是蓝天公司的法定代表人，甲代表蓝天公司订立的所有合同均对蓝天公司发生效力"}, {"letter": "B", "content": "乙是白云公司员工，超越该公司的经营范围与黄沙公司签订合同，该合同无效"}, {"letter": "C", "content": "丙在未被紫云公司授权的情况下，以紫云公司的名义与绿田公司签订电脑买卖合同，绿田公司向紫云公司发货，紫云公司收到货后向绿田公司付款，电脑买卖合同对紫云公司和绿田公司发生效力"}, {"letter": "D", "content": ".丁与黑石公司签订土地买卖合同，约定相关手续由理申请批准等手续的当事人未履行义务的，对-43 -涨，黑石公司拒不办理相关手续，黑石公司因合同未生效因此不用承担违约责任"}], "answer": "BCD"}, {"id": 129, "question": "甲在校园网站发布出售一辆二手自行车的广告，标价1000元。乙认识甲，到甲的宿舍表示以900元购买，甲不同意。乙于是对甲说：“行！就按你说的，1100元。”乙通过手机给甲转账1000元后，甲要求乙再付100元，乙表示刚才口误，本欲说1000元说成了1100元、甲不同意。关于甲、乙间的这一二手自行车的买卖，下列表述正确的是？", "type": "单选", "options": [{"letter": "A", "content": "甲在校园网站发布的广告属于要约邀请"}, {"letter": "B", "content": "甲、乙未达成合意，自行车买卖合同不成立"}, {"letter": "C", "content": "甲、乙间成立售价为1100元的自行车买卖合同"}, {"letter": "D", "content": "甲、乙间成立售价为1000元的自行车买卖合同"}], "answer": "C"}, {"id": 130, "question": "甲公司和乙公司签订钢材购销合同，双方法定代表人经董事会授权签字盖章，后发现甲公司的章是假的。对此，下列说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "合同效力待定"}, {"letter": "B", "content": "有效"}, {"letter": "C", "content": "无效"}, {"letter": "D", "content": "合同不成立买卖合同中未写明高梁质量。关于该合同，下列哪些说法是正确的？多选）"}], "answer": "D"}, {"id": 131, "question": "湖南A工厂向四川B公司购买一批物品，合同对付款地点和交货期限没有约定，事后未能达成补充协议，并且按照合同有关条款或交易习惯也不能确定。根据民法典合同编的规定，下列哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "湖南A工厂付款给四川B公司应在湖南限行"}, {"letter": "B", "content": "湖南A工厂付款给四川B公司应在四川履行"}, {"letter": "C", "content": "四川B公司可以随时交货给湖南A工厂，A工厂不得有异议"}, {"letter": "D", "content": "四川B公司可以随时交货给湖南A工厂，但是应当给该厂必要的准备时间"}], "answer": "B"}, {"id": 132, "question": "根据《民法典》合同编及相关规定，下列说法哪些是正确？", "type": "多选", "options": [{"letter": "A", "content": "合同当事人约定由债务人向第三人履行债务的，债务人未向第三人履行债务，应当向债权人承担违约责任"}, {"letter": "B", "content": "合同当事人约定由债务人向第三人履行债务的，且约定第三人可以直接请求债务人向其履行债务，第三人并未拒绝，债务人向第三人履行债务不符合约定，第三人可以请求债务人承担违约责任"}, {"letter": "C", "content": "合同当事人约定由第三人向债权人履行债务的，第三人不履行债务，价务人应当向价权人承担违约责任"}, {"letter": "D", "content": "合同当事人约定由第三人向债权人履行债务的，第三人履行债务不符合约定，应当由第三人向债权人承担违约责任"}], "answer": "BD"}, {"id": 133, "question": "甲公司因经营不善歇业，欠专职司机潘某工资3万元，潘某多次催要未给，一气之下把公司一辆面包车开走。甲公司的母公司乙公司知道此事主动偿还潘某2万元。关于本案，下列说法正确的是？多选）", "type": "多选", "options": [{"letter": "A", "content": "甲公司尚欠潘某1万元"}, {"letter": "B", "content": "乙公司行为属于第三人代为清偿"}, {"letter": "C", "content": "甲公司尚欠潘某3万元"}, {"letter": "D", "content": "乙公司有权利要求甲公司支付2万元"}], "answer": "ABC"}, {"id": 134, "question": "甲公司与乙公司签订了一份手机买卖合同、约定：甲公司供给乙公司某型号手机1000部，每部单价1000元，乙公司支付定金30万元，任何一方违约应向对方支付合同总价款30%的违约金。合同签订后，乙公司向甲公司支付了30万元定金，并将该批手机转售给丙公司，每部单价1100元，指明由甲公司直接交付给丙公司。但甲公司未按约定期间交货。关于甲、乙、丙公司间违约资任的承担，下列表述正确的是：", "type": "多选", "options": [{"letter": "A", "content": "如乙公司未向丙公司承担违约责任，则丙公司有权请求甲公司向自己承担违约责任"}, {"letter": "B", "content": "如乙公司未向丙公司承担违约责任，则丙公司无权请求甲公司向自己承担违约责任"}, {"letter": "C", "content": "如甲公司迟延向丙公司交货，则丙公司有权请求乙公司承担迟延交货的违约责任"}, {"letter": "D", "content": "如甲公司迟延向丙公司交货，则丙公司无权请求乙公司承担迟延交货的违约责任"}], "answer": "ABD"}, {"id": 135, "question": "甲欠丙100吨钢材，为偿还该债务，甲与乙订立了100吨钢材的买卖合同，约定由乙向丙直接交付钢材，丙也可以直接向乙请求履行，丙对此知情，也未拒绝，以下说法正确的是？", "type": "单选", "options": [{"letter": "A", "content": "如乙不交付，丙可请求其履行且要求承担违约责任"}, {"letter": "B", "content": "甲对乙已经没有任何义务"}, {"letter": "C", "content": "乙不能向丙主张其对甲的抗辩"}, {"letter": "D", "content": "因合同相对性，丙不能直接向乙请求履行交付义务"}], "answer": "A"}, {"id": 136, "question": "甲公司与乙公司达成买卖合同，约定甲公司有偿向乙公司供应原料。根据民法典合同编及相关规定，下列关于合同履行抗辩权的哪些说法是正确的？多选）", "type": "多选", "options": [{"letter": "A", "content": "合同未明确履行顺序，申公司在乙公司付款之前有权拒绝其履行要求"}, {"letter": "B", "content": "合同约定先供货后付款，甲公司未按时供货，乙公司有权拒付货款"}, {"letter": "C", "content": "合同约定先供货后付款，甲公司有确切证据证明乙公司经营状况严重恶化，可以中止履行合同"}, {"letter": "D", "content": "合同约定先供货后付款，甲公司有确切证据证明乙公司丧失商业信誉，可以中正履行合同"}], "answer": "ACD"}, {"id": 137, "question": "甲乙两公司订立合同，约定甲公司送货到乙公司住所。后乙公司变更住所，未及时通知甲公司，导致甲公司无法按照约定地点交货。根据民法典合同编及相关规定，下列哪些说法是正确的？", "type": "多选", "options": [{"letter": "A", "content": "甲公司应当及时联络乙公司并继续履行合同"}, {"letter": "B", "content": "甲公司可以解除合同"}, {"letter": "C", "content": "甲公司可以中止履行- 47 -"}, {"letter": "D", "content": "甲公司可以将标的物提存"}], "answer": "ABCD"}, {"id": 138, "question": "甲公司向乙公司购买小轿车，约定7月1日预付10万元，10月1日预付20万元，12月1日乙公司交车时付清尾款。甲公司按时预付第一

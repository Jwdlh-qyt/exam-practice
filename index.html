  {id: 71, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典及相关规定，合同无效后可能产生下列哪些法律后果？", options: {"A": "赔偿损失", "B": "返还财产", "C": "折价补偿", "D": "继续履行"}, answer: "ABC", explanation: "。民事法律行为无效、被撤销或者确定不发生效力后，可能产生的法律后果有：返还财产，折价补偿，赔偿损失，因此A、B、C选项正确i能续履行不属于合同无效后产生的法体后果、因此D选项相误。（断您）22、C。A、B、C选项，（民法典）第14S条第1款规定：“限制民事行为能力人实施的纯获利益的民事法律行为或者与其年、智力、精神健康状况相适应的民事法律行为有效：实施的其他民事法律行为经法定代理人同意或者迫认后有效”：15当的毕某为限制民事行为能力人，以50万元的价格转让专利不属于与其年龄、智力相适应的民事法律行为，合同效力待定，需经李某的法定代理人追认后，该合同方为有效，因此A、B选项错误，C选项正确。D选项，《民法典》第145条第2数规定：“相对人可以催告法定代理人自收到通知之日起三十日内予以追认。法定代理人未作表示的，视为拒绝追认。民事法律行为被追认前：善意相对人有撤销的权利。撤销应当以通知的方式作出”，该公司可以在李某的法定代理人追认前撤销该合同，追认之后合同即生效；不能再撤销该合同，因此D选项错误。（2007改编）", chapter: "第五章 民事法律行为"},
  {id: 72, topic: "专题一 民法典总则编", type: "single", question: "十五岁的中学生李某作出了一项发明创造，并就此获得了一项发明专利。某公司认为该项技术市场前景较好，遂与李某签订了专利权转让合同，以50万元的价格受让该项专利。根据民法典总则编及其他相关规定，该转让合同的效力应当如何认定？", options: {"A": "合同自签订之日起有效", "B": "由于李某不具有完全民事行为能力，因此该合同自始无效", "C": "经李某的法定代理人追认后，该合同方为有效", "D": "在李某的法定代理人追认之后，该公司有权以李某不具有完全民事行为能力为由撤销该合同"}, answer: "C", explanation: "。本题中，小韩的创作行为在性质上属于事实行为，与民事行为能力无关，小韩是该作品的作者，无论是否发表，都享有该作品的著作权，其父母不享有著作权，但由于九岁的小韩为限制民事行为能力人，其转让行为既不属于纯获利益的民事法律行为，也不属于与其年龄、智力相适应的民事法律行为，其父母作为法定代理人不同意该转让行为，则该网络传播权转让合同自始无效，因此A、B、D选项错误，C选项正确。（法考2009改编）", chapter: "第五章 民事法律行为"},
  {id: 73, topic: "专题一 民法典总则编", type: "multiple", question: "小韩从小就显示出很高的文学天赋，九岁时写了小说《隐形翅膀》，并将该小说的网络传播权转让给某网站。小韩的父母反对该转让行为。下列哪一说法是正确的？", options: {"A": "小韩父母享有该小说的著作权，因为小韩是无民事行为能力人", "B": "小韩及其父母均不享有著作权，因为该小说未发表", "C": "小韩对该小说享有著作权，但网络传播权转让合同无效", "D": "因小韩父母反对，网络传播权转让合同自反对意见送到某网站时无效"}, answer: "ABCD", explanation: "。10岁的李小某属于限制民门事行为能力人，其向游戏账户充值2万元的民事法律行为超出了与其年龄和智力相适应的范围，该行为须经其法定代理人王某同意或者追认后有效，否则该行为无效，若王", chapter: "第五章 民事法律行为"},
  {id: 74, topic: "专题一 民法典总则编", type: "multiple", question: "李某和王某离婚后，其子李小某由王某抚养，李小某于其10岁的一年间，陆续向其游戏账户充值共2万元。游戏公司发现充值人系未成年人后，向王某发出催告要求王某在30日内确认。根据民法典及相关规定，下列说法哪些是正确的？", options: {"A": "对游戏公司的追认催告，王某未作表示的，视为拒绝追认", "B": "李小某的充值行为经王某同意或者追认后有效", "C": "王某明确表示对李小某的充值行为不子追认的，该民事法律行为无效", "D": "李某和王某是李小某的法定代理人"}, answer: "BD", explanation: "。本题中，事务所与张某达成约定时该约定已经成立，但未生效，所附生效条件为张集一年内通过专利代理师资格考试，若该条件成说，则该约定生效，资助张某出国进修三个月，因此A、C选项借误，B、D选项正确。此题考坐疑问较多，此处做进一步说明区分：附条件是不确定的偶然性事实，阶期限是确定的必然性事实。本题中“一年内通过专代考试”，属干不确定的条件，如果题目改为“2026年12月资助出回进修3个月”则因期低是明确的时间点，是一定会到来的，则为附期展的民事法律行为。故此题应为附条件，而不是附期限。（2019）", chapter: "第五章 民事法律行为"},
  {id: 75, topic: "专题一 民法典总则编", type: "single", question: "张某在某专利代理事务所实习，表现优异。该事务所与张某达成约定，如果张某一年内通过专利代理师资格考试，将资助其出国进修三个月。根据民法典总则编及相关规定，在张某通过专利代理师资格考试之前，下列说法正确的是？多选）", options: {"A": "该约定既未成立，也未生效", "B": "该约定已经成立，但未生效", "C": "该约定是附期限的民事法律行为", "D": "该约定是附条件的民事法律行为"}, answer: "A", explanation: "。本题中，李某和赵某的合同约定于2021年3月1日生效，属于附生效期限的合同，因此A选项正确，B、C、D选项错误。（2016改缩）", chapter: "第五章 民事法律行为"},
  {id: 76, topic: "专题一 民法典总则编", type: "multiple", question: "2020年11月1日，李某和赵某签订房屋租赁合同，约定2021年3月1日该合同生效。根据民法典总则编及相关规定，下列关于该合同的哪种说法是正确的？单选）", options: {"A": "该合同为附生效期限的合同", "B": "该合同为附终止期限的合同", "C": "该合同为附生效条件的合同", "D": "该合同为附解除条件的合同"}, answer: "AC", explanation: "。刘某与史某约定不在甲公司上班，将公寓卖给史某，属于附条件生效的约定，因此A选项正确，B选项错误。《民法典）第159条规定：“附条件的民事法律行为，当事人为自己的利益不正当地阻止条件成就的，视为条件已经成就；不正当地促成条件成就的，视为条件不成就”，史某贿路公司经理让刘某被辞退，属于不正当促进条件成就，因此C选项正确，D选项错误。（法考2020）", chapter: "第五章 民事法律行为"},
  {id: 77, topic: "专题一 民法典总则编", type: "single", question: "刘某与史某约定，如将来刘某不在甲公司上班，刘某即将其在甲公司附近一套自有公寓卖给史某。史某为尽快购得该房屋，贿赂甲公司经理，让其辞退了刘某。刘某和史某关于刘某不在甲公司上班的约定，下列哪一说法是正确的？", options: {"A": "该约定属于附生效条件的约定", "B": "该约定属于附生效期限的约定", "C": "应视为条件不成就", "D": "应视为约定无效"}, answer: "B", explanation: "。A选项，甲为限制民事行为能力人，甲获赠电脑为纯获利的民事法律行为，因此不论其法定代理人（父母）追认或是否认，该行为均有效，因此，A、C、D选项错误。B选项，甲高考前，能否取得优异的成绩是不确定的事实，该赠与合同明确约定了取得优异成绩这一条件、系附生效条件的赠与合间，即在甲商考取得优异成绩前，赠与合同成立但未生效。而甲商考取得优异成绩后，条件成就、附生效条件的赠与合同成立并生效，因此、B选项正确。（新编）", chapter: "第五章 民事法律行为"},
  {id: 78, topic: "专题一 民法典总则编", type: "single", question: "甲今年16岁，成绩优异。与其阿姨乙约定，若甲高考成续优异，将赠与甲一台价值一方元的笔记本电脑。下列哪些选项是正确的？", options: {"A": "甲为限制民事行为能力人，故该赠与合同无效", "B": "甲与其阿乙约定时，该赠与合同成立未生效", "C": "甲的母亲丁得知此事后，认为笔记本电脑过于贵重，表示坚决反对，该赠与合同因其母亲丁的反对而无效", "D": "甲受赠电脑的行为需要其父母追认才能生效"}, answer: "D", explanation: "。A选项，《民法典》第161条第2数规定：“依照法律规定、当事人约定：或者民事法律行为的性质，应当由本人亲自实施的民事法律行为，不得代理”，因此A选项错误。B选项，《民法典》第162条规定：“代理人在代理权限内，以被代理人名义实施的民事法律行为，对被代理人发生效力”，因此B选项错误。C选项，《民法典》第135条规定：“民事法律行为可以采用书面形式、口头形式或者其他形式……”，因此C选项错误。D选项，《民法典》第164条第1款规定：“代理人不履行或者不完全履行职责，造成被代理人损害的，应当承担民事贵任”，因此D选项正确。（2014）", chapter: "第五章 民事法律行为"},
  {id: 79, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列关于代理的哪种说法是正确的？", options: {"A": "民事主体的任何民事法律行为，均可通过代理人实施", "B": "代理人应当在代理权限内，以自己的名义实施民事法律行为", "C": "民事法律行为的委托代理，应当采用书面形式", "D": "代理人不履行职责而给被代理人造成损害的，应当承担民事责任"}, answer: "AC", explanation: "。B、D选项；代理是代理人以被代理人的名义在代理权限内与第三人实施法律行为，B、D选项的行为由于具有人身属性，均属于不能代理的行为。A选项为委托代理，C选项属于职务代理行为。（新编）", chapter: "第六章 代理"},
  {id: 80, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列哪些情形属于代理行为？", options: {"A": "甲律师接受法院指定担任被告人乙的辩护代理人", "B": "某明星甲让明星乙代替其参加春节晚会表演节目", "C": "甲公司法定代表人乙委托员工丙与丁公司签订合同", "D": "某高校教授甲让教授乙代替他去主持一场学术交流会"}, answer: "ABCD", explanation: "。A选项，（民法典》第162条规定：“代理人在代理权限内，以被代理人名义实施的民事法律行为，对被代理人发生效力”，因此A选项正确。B选项，《民法典》第167条规定：“代理人知道或者应当知道代理事项违法仍然实施代理行为，或者被代理", chapter: "第六章 代理"},
  {id: 81, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列有关代理的哪些说法是正确的？", options: {"A": "代理人在代理权限内，以被代理人名义实施的民事法律行为，对被代理人发生效力", "B": "代理人知道或者应当知道代理事项违法仍然实施代理行为，或者被代理人知道或者应当知道代理人的代理行为违法未作反对表示的，被代理人和代理人应当承担连带责任", "C": "相对人知道或者应当知道行为人无权代理的，相对人和行为人按照各自的过错承担责任", "D": "代理人和相对人恶意申通，损害被代理人合法权益的，代理人和相对人应当承担连带责任"}, answer: "ABC", explanation: "。A选项，《民法类》第163条第1款规定：“代理包括委托代理和涨定代理”，因此A选项正确。B选项，《民法典>第162条规定：“代理人在代理权限内，以被代理人名义实施的民事法律行为，对被代理人发生效力”，因此B选项正确。C选项，（民法奖》第161条第2款规定：“依凰法律规定、当事人约定或者民事法律行为的性质，应当由本人亲自实施的民事法律行为，不得代理”，因此C选项正确。D选项，《民法典>第169条第3款规定：“转委托代理未经技代理人同意或者追认的，代理人应当对转委托的第三人的行为承担资任：但是，在紧急情况下代理人为了维护被代理人的利益借要转委托第三人代理的除外”，因此D选项错误。（2012）", chapter: "第六章 代理"},
  {id: 82, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列关于代理的哪些说法是正确的？", options: {"A": "代理包括委托代理和法定代理", "B": "代理人应当在代理权限内，以被代理人的名义实施民事法律行为", "C": "依照法律规定应当由本人实施的民事法律行为，不得代理", "D": "委托代理人需要转委托他人代理的，在任何情况下均应当取得被代理人的同意"}, answer: "CD", explanation: "。A、B、C选项，甲公司与张某明确约定须由张某亲自完成书高，张某不得转委托其学生王某代为完成，因此A、B选项错误，C选项正确。D选项，张某的转委托行为未经委托人甲的同意，因此张某应当对王某的行为承担责任，因此D选项正确。（2016）", chapter: "第六章 代理"},
  {id: 83, topic: "专题一 民法典总则编", type: "single", question: "甲公司特邀请知名画家张某为公司庆典创作一幅书画作品，并明确约定须由张某亲自创作完成。张某在构思过程中因事务繁忙无法在规定期限内完成作品，遂请其学生王某代为完成画作，但并未告知甲公司，甲公司收到画作后支付给张某约定的画款。根据民法典总则编及相关规定，下列哪些说法是正确的？多选）", options: {"A": "张某因故无法在规定期限内完成作品，可以转委托他人", "B": "张某系为甲公司利益着想，可以转委托他人完成作品", "C": "根据甲公司与张某的约定，该画作应当由张某亲自完成，不能转委托他人", "D": "张某应当对其学生王某的行为承担责任"}, answer: "C", explanation: "。《民法典》第172条规定：“行为人没有代理权、超越代理权或者代理权终止后，仍然实施代理行为，相对人有理由相信行为人有代理权的，代理行为有效”。本题中，刘某凭借保管公可印案的便利，与张集签订合同并加蓝了其公司的印章，张其有现由相仿刘某是代表其公司签订合同，构成费见代理、刘某签订合同的行为有效、印使该公司对该买实合同不予追认，该合同的当事人仍为该公司与张某，因此A、D、D选项倡误，C选项正确。（2008）7、ABD。A选项，相对人可以催告代理人自收到通知之日起30日内予以追认，因此A选项错误。B也项，曾您相对人有销的权利，因此B选项错误。C选项，相对人知道或者应当知道行为人无权代理的，相对人和行为人按顾各自的过错承担责任，因此C选项正确。D选项，被代理人未作出表示的，视为拒绝追认，因此D选项错误。(2018)", chapter: "第六章 代理"},
  {id: 84, topic: "专题一 民法典总则编", type: "multiple", question: "某公司的印章由其工作人员刘某保管。刘某未经该公司授权以该公司的名义与张某签订买卖合同，并加盖该公司印章，将该公司的一批产品卖给张某。对此，下列哪些说法是正确的？", options: {"A": "该公司与张某之间的买卖合同无效", "B": "该公司与张某之间的买卖合同效力待定", "C": "该公司与张某之间的买卖合同有效", "D": "如果该公司对该买卖合同不予追认，则该合同的当事人为刘某与张某"}, answer: "ABC", explanation: "。本题中，丙公司未审核乙代理公司的代理权限，存在疏忽，不构成表见代理，属于无权代理，因此甲公司有追认权，善意的丙公司有催告权和撤销权，A、B、C选项正确，D选项错误。（2019）", chapter: "第六章 代理"},
  {id: 85, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编关于无权代理民事法律行为的相关规定，下列哪些关于无权代理法律后果的表述是错误的？", options: {"A": "相对人可以催告被代理人自收到通知之日起两个月内予以追认", "B": "行为人实施的行为未被追认的，普意相对人只能就其受到的损害请求行为人赔偿", "C": "相对人知道或者应当知道行为人无权代理的，相对人和行为人按照各自的过错承担责任", "D": "被代理人未作出表示的，视为同意追认"}, answer: "ABC", explanation: "。A选项，行为人代理权终止后，仍然实施代理行为，未经被代理人追认的，对被代理人不发生效力，因此A选项正确。B选项构成表见代理，代理行为有效，B选项正确。C、D选项，相对人知道或者应当知道行为人无权代理的，相对人和行为人按照各自的过错承担贵任，因此C选项正确，D选项错误。（2016)", chapter: "第六章 代理"},
  {id: 86, topic: "专题一 民法典总则编", type: "multiple", question: "甲公司委托乙代理机构与丙公司谈判购买一项专利权，乙代理机构委派代理师王某与丙公司谈判。谈判过程中王某认为丙公司的另一项专利更好，便自作主张以甲公司的名义与丙公司签订了该项专利的转让合同。丙公司未审核乙代理机构的代理权限，便与之订立了专利权转让合同。根据民法典总则编及相关规定，下列说法正确的是？多选）", options: {"A": "申公司对该项合同有追认权", "B": "丙公司对该项合同有催告权", "C": "丙公司对该项合同有撤销权", "D": "甲公司对该项合同有撤销权"}, answer: "BC", explanation: "。甲委托乙代买彩票，虽然款项由乙垫付，彩票也暂由乙保管，但乙是基于甲的委托实施购买彩票的行为，代理行为的后果应由被代理人甲承担，所以奖金应归甲所有，但乙为甲垫付了购买彩票的款项，乙有权要求甲返还该款项，因此，A、D选项错误，B、C选项正确。（新编）", chapter: "第六章 代理"},
  {id: 87, topic: "专题一 民法典总则编", type: "single", question: "根据民法典总则编及相关规定，对于代理人在代理权终止后的代理行为，下列哪些说法是正确的？", options: {"A": "未经被代理人追认的，对被代理人不发生效力", "B": "相对人有理由相信行为人有代理权的，代理行为有效", "C": "相对人知道或者应当知道行为人无权代理的，相对人和行为人按照各自的过错承担责任", "D": "相对人知道或者应当知道行为人无权代理的，相对人和行为人各承担百分之五十的责任"}, answer: "D", explanation: "。A连项，甲官用乙兰省不有成代基。日途项：法是代获人以公可义笑选单行，代农行办，不梅成代隐。C连筑，冒用他人名义不悔成代理，此外资试是其有人终专属性的行务，不优遗过代理实虑。D选项，带集寿代理人，推销货相对人，关集为行券人，但关集并不其有代理权，梅成充权代理。（法考2009改旗，思维护展）", chapter: "第六章 代理"},
  {id: 88, topic: "专题一 民法典总则编", type: "multiple", question: "甲委托乙代其购买彩票，款项由乙垫付，票世暂由乙保管。开奖后、该形票中奖，奖金为1000万，对于奖金归属二人发生纠纷。下列哪一说法是正确的7", options: {"A": "因彩票款项由乙支付，因此奖金应归乙所有", "D": "甲乙对于彩票中奖均有货献，因此应平分奖金", "C": "彩票中奖后，乙无权领取奖金，但有权婴求甲返还购买彩票的款项"}, answer: "ACD", explanation: "。2024年6月1日，相对人乙公可得知行为人肖某惊开除，即没有代理权。因此，肖某为无权代理。无权代理，烟草买奖合同效力待定，在设代理人甲烟章公可追认或否认前，停意相对人乙公可事有撤销权，D选项正确。2024年6月10日，甲烟草公可拒绝追认肖某的无权代理行力，烟靠买实合同对申公司不发生效力。申公可无须履行合同，B选项错误。善意相对人乙有权要求行为人肖某履行合同或是赔偿报失。因此，A、C选项正确。（法考2020）", chapter: "第六章 代理"},
  {id: 89, topic: "专题一 民法典总则编", type: "multiple", question: "下列哪一情形构成无权代理？", options: {"A": "甲冒用乙的姓名从某杂志社领取乙的论文稿酬据为已有", "B": "某公司法定代表人超越权限以本公司名义为他人提供担保", "C": "刘某受同学周某之托冒充丁某参加求职面试", "D": "关某代收某推销员谎称关某的邻居李某订购的保健品并代为付款"}, answer: "AC", explanation: "。A选项，行为人超越代理权实施代理行为，相对人有理由相信行为人有代理权的，代理行为有效，因此A选项正确。B选项，代理人和相对人恶意串通，担害被代理人合法权益的，代理人和相对人应当承担连带责任，因此B选项错误。C选项，代理人知道或者应当知道代理事项违法仍然实施代理行为，被代理人和代理人应当承担连带责任，因此C选项正确。D选项，属于狭义无权代理，是效力待定的民事法律行为，经被代理人追认有效，被代理人不予追认则对被代理人不发生效力，因此D选项错误。（新编）", chapter: "第六章 代理"},
  {id: 90, topic: "专题一 民法典总则编", type: "single", question: "肖某系甲烟草公司经理，因违纪被开除，后伪造公章，于2024年5月25日以甲公司名义与不知情的乙公司约定，向乙公司出售烟草50箱，价款50万元。2024年6月1日，乙公司得知肖某被开除，询问甲公司是否认可该合同，2024年6月10日，甲公司通知乙公司不承认肖某所订立的香烟合同。下列说法正确的是？", options: {"A": "2024年6月10日后，乙公司有权请求肖某赔偿损失", "B": "2024年6月10日后，乙公司有权请求甲公司履行合同", "C": "2024年6月10日后，乙公司有权请求肖某履行合同", "D": "2024年6月10日前，乙公司有权通知甲公司撤销"}, answer: "B", explanation: "。本题中，因公章系伪造，甲的代理行为不构成表见代理，而属于狭义的无权代理，相对人丙享有催告权与撤销权。A、B选项，如果合同由被代理人乙公可追认，日便不将再因无权代理而行使相对人的身权，人选项借误，但是甲的行为还构成对到的欺诉，丙作为被许人享有向法院中请！撤俏权，因此B选项正确。C选项，如果公司追认，丙公可只他向法院中请因你的撤销、不能因无权代理向乙公可通如微价C选项错误。1D选项，如果乙公句拍绝追认丙公司无权娶求乙公句履行，D选项错误，（新编）", chapter: "第六章 代理"},
  {id: 91, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，关于代理，下列说法哪些是正确的？多选）", options: {"A": "行为人超越代理权实施代理行为，相对人有理由相信行为人有代理权的，代理行为有效", "B": "代理人和相对人恶意申通，损害被代理人合法权益的，代理人和相对人按照过错大小承担按份资任", "C": "代理人知道代理事项违法仍然实施代理行为的，被代理人和代理人承担连带责任", "D": "行为人代理权终止后、仍然实施代理行为的，对被代理人不发生效力"}, answer: "ABCD", explanation: "。《民法典》第173条规定：“有下列情形之一的，委托代理终止：（一）代理期问届满或者代理事务完成：（二）被代理人取消委托或者代理人辞去委托：（三）代理人丧失民事行为能力：（四）代理人或者被代理人死亡；（五）作为代理人或者被代理人的法人、非法人组织终止”，因此A、B、C、D选项均正确。（2019）", chapter: "第六章 代理"},
  {id: 92, topic: "专题一 民法典总则编", type: "multiple", question: "甲用伪造的乙公司公章，以乙公司名义与不知情的丙公司签订食用油买卖合同，以次充好，将劣质食用油卖给丙公司。关于该合同，下列哪一表述是正确的？", options: {"A": "如乙公司追认，则丙公司有权通知乙公司撤销", "B": "如乙公司追认，则丙公司有权请求法院撤销", "C": "无论乙公司是否追认，丙公司均有权通知乙公司撤销", "D": "无论乙公司是否追认，丙公司均有权要求乙公司行"}, answer: "ABCD", explanation: "。《民法典》第174条第1款规定：“被代理人死亡后，有下列情形之一的，委托代理人实施的代理行为有效：（一）代理人不知道且不应当知道被代理人死亡；（二）被代理人的继承人子以承认；（三）投权中明确代理权在代理事务完成时终止：（四）被代理人死亡前已经实施，为了被代理人的继承人的利益继续代理”；因此A、B、C、D选项均正确。（2008改编）", chapter: "第六章 代理"},
  {id: 93, topic: "专题一 民法典总则编", type: "single", question: "根据民法典总则编及相关规定，下列哪些情形下委托代理终止？", options: {"A": "代理期间届满或者代理事务完成", "B": "被代理人死亡", "C": "代理人死亡或者作为代理人的法人终止", "D": "代理人丧失民事行为能力"}, answer: "C", explanation: "。被代理人死亡后，投权中明确代理权在代理事务完成时终止的，委托代理人实施的代理行为有效。本题中，王甲委托周某帮忙购买祖宅时明确约定“直至买到祖宅为止”。因此，即使王甲死亡，周某以王甲的名义和李某签订的房屋买卖合同仍然有效，因此B、D选项错误。房屋买卖合同的当事人是王甲和李某，周某为王甲的代理人。因此，李某无权请求周某继续履行合同。因专顺一民法典总则编此，人连填借供。主中七府，共唯一的儿于主乙概情健未主甲的进产（院包唐权利业包糖义券。因此，带集有权济求王乙健读度行合间，C违填正衡。（法考2024）", chapter: "第六章 代理"},
  {id: 94, topic: "专题一 民法典总则编", type: "multiple", question: "某专利代理机构受孙某的委托代为办理专利申请事务。代理事项尚未完成时，孙某意外身亡。在下列哪些情况下，该代理机构在孙某死亡后实施的代理行为有效？", options: {"A": "该代理机构在孙某死亡前已经进行，而在孙某死亡后为了孙某的继承人的利益继续完成的", "B": "该代理机构不知道且不应知道孙某死亡的", "C": "孙某和该代理机构约定到代理事项完成时代理权终止的", "D": "孙某的继承人均予以承认的"}, answer: "ABCD", explanation: ".（底法集>第17S余定：“有下列情形之一的，法定代理终止：（一）代理人收得成普恢建党会民华柠疗他力：（二）代理人丧失民事行为他力：（三）代理人或者收代理人见亡（四）法律境定的其他情形”因此A、B.C、D选项均正确。（2013）", chapter: "第六章 代理"},
  {id: 95, topic: "专题一 民法典总则编", type: "multiple", question: "王甲委托同某带忙购买自已曾经的且宅，委托合间写明全权委托，直至买到祖宅为止。同某后来以王甲的名义与准宅现住人李某达成房屋买卖合间.准备展行合同时发现王甲已于上礼拜过世。王甲的唯一儿子王乙农示对购买祖宅一事不知情，并且拒绝迫认合同。关于此合同，下列说法正确的是？", options: {"A": "李某有权请求周某继续履行合同", "B": "因为王甲去世，合同无效", "C": "李某有权请求王乙继续履行合同", "D": "因为王乙拒绝追认，合同无效"}, answer: "ABC", explanation: "。本题中，甲、乙为连带债务人，丙为债权人，丙有权要求甲或乙清偿全部货务，甲和乙都负有清偿全部债务的义务，甲偿还了全部债务后，有权要求乙偿付乙应当承担的40%的货务，甲和乙之间对债务偿还的约定不得对抗债权人丙，因此人、B、C选项正确，D选项错误。（2007）", chapter: "第六章 代理"},
  {id: 96, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列哪些情形下法定代理终止？多选）", options: {"A": "被代理人取得完全民事行为能力", "B": "被代理人死亡", "C": "代理人死亡", "D": "代理人丧失民事行为能力"}, answer: "ABCD", explanation: "。《民法典》第179条第1款规定：“承担民事贵任的方式主要有：（一）停止促害……（五）恢复原状……·（七）继续展行…（）·恢复名誉…，因此A、B、C、D选项均正确。（新编）", chapter: "第六章 代理"},
  {id: 97, topic: "专题一 民法典总则编", type: "multiple", question: "甲和乙为丙的连带债务人。后甲和乙约定，甲负资偿还60%的债务，乙负责偿还40%的债务。对此，根据民法典总则编的规定，下列哪些说法是正确的？", options: {"A": "丙可以要求甲偿还全部债务", "B": "丙可以要求乙偿还全部债务", "C": "甲偿还了全部债务后，有权要求乙偿付其应当承担的40%的债务", "D": "甲有权拒绝偿还超过60%的债务"}, answer: "ACD", explanation: "。知识产权役权承担方式包括：停止便害；赔偿损失：消除影响，没收违法所得属于行政处罚的方式，因此A、C、D选项正确：B选项错误。（2011）", chapter: "第七章 民事责任"},
  {id: 98, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列哪些属于承担民事责任的方式？多选）", options: {"A": "继续履行", "B": "恢复原状", "C": "停止促害", "D": "恢复名誉"}, answer: "ABCD", explanation: "。A选项，《民法典》第180多第1款规定：“因不可抗力不能规行民事义务的，不承担民事贵任”，因此人选项正码，B选项，（民法典）第182条第1款规定：“罚紧急避险造成捐害的，由引起险情发生的人承担民事贵任”，因此D选项正确。C选项，（民法典》第181条规定：“因正当防卫皮损害的，不承担民事贵任”，因此C选项正确。D选项，（民法典》第184条规定：“四白愿实施紧急救助行为造成受助人损害的，敬助人不承担民事贵任”，因此D选项正确。（2018)", chapter: "第七章 民事责任"},
  {id: 99, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定、下列哪些属于侵犯知识产权的民事责任承担方式？", options: {"A": "赔偿损失", "B": "没收违法所得", "C": "停止侵害", "D": "消除影响"}, answer: "BD", explanation: "。A、B选项，《民法典》第183条规定：“因保护他人民事权益使自已受到损害的，由役权人承担民事资任，受益人可以给予适当补偿。没有役权人、俊权人逃逸或者无力承担民事贵任，受害人请求补偿的，受益人应当给予适当补偿”，马某的行为属于见义勇为，马某的损失应由侵权人赵某赔偿，何某作为受益人，其责任为适当补偿责任，而非赔偿责任，因此A选项错误，B选项正确。C、D选项，因紧急避险造成损害的，由引起险情发生的人承担民事资任，马某用吕某的雨伞打狗，构成紧急避险，吕某的损失也应由引起险情发生的人赵某赔偿，因此C选项错误，D选项正确。（法考2018）", chapter: "第七章 民事责任"},
  {id: 100, topic: "专题一 民法典总则编", type: "single", question: "根据民法典总则编及相关规定，下列哪些属于法定减轻或免除民事责任的情形？", options: {"A": "不可抗力", "B": "紧急避险", "C": "正当防卫", "D": "紧急救助"}, answer: "D", explanation: "。《民法典》第188条规定：“向人民法院请求保护民事权利的诉讼时效期问为三年。法律另有规定的，依照其规定。诉讼时效期问自权利人知道或者应当知道权利受到损害以及义务人之日起计算。法律另有规定的，依照其规定。但是，自权利受到", chapter: "第七章 民事责任"},
  {id: 101, topic: "专题一 民法典总则编", type: "single", question: "何某被恶狗咬，马某用吕某的雨伞打狗，伞坏人伤。经查，恶狗为赵某所蒙养。关于本案，下列哪些说法是正确的？", options: {"A": "马某的医疗费应由何某赔偿", "B": "马某的医疗费应由赵某赔偿", "C": "吕某的雨伞损害应由马某赔偿", "D": "吕某的雨伞损害应由赵某赔偿"}, answer: "C", explanation: "。《民法奥>第196条境定：“下列请求权不选用诉论时发的规定：（一）请求停止便害、排除纺、消除危险：（二）不动产物权和登记的动产省权的权利人请求返还财产：（三）请求文付抚养费、磨养费或者恢养费：（四）依法不追用诉讼时效的其他请求权”，因此A、B、D选项均追用诉讼时发的规定，C选项不追用诉讼时效的规定。（新编）", chapter: "第七章 民事责任"},
  {id: 102, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列关于诉讼时效期间的哪种说法是错误的？", options: {"A": "向人民法院请求保护民事权利的诉讼时效期间为3年，法律另有规定的除外", "B": "诉讼时效期间自权利人知道或者应当知道权利受到损害以及义务人之日起计算", "C": "自权利受到损害之日起超过二十年的，人民法院不予保护", "D": "诉讼时效期间一排不得延长"}, answer: "AC", explanation: "。A选项，赔偿携失请求权，为一股的货权请求权，适用诉讼时效，因此人选项正确。B、C、D选项，请求停止役害、排除妨碍、消除危险不适用诉讼时效的规定：不动产物权和登记的动产物权的权利人请求返还财产不适用诉讼时效的规定，因此B、D选项不适用诉讼时效，面未经登记的动产物权人的返还原物请求权，应适用诉讼时效，因此乙请求申返还自行车适用时效，C选项正确。（法考2020）", chapter: "第八章 诉讼时效"},
  {id: 103, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列哪些民事案件不适用诉讼时效的规定？", options: {"A": "赔偿损失", "B": "返还财产", "C": "停止侵害", "D": "继续履行"}, answer: "ABC", explanation: "。根据（民法莫》第196条的规定，A选项属于请求停止役害，不适用诉讼时效的规定，B选项属于不动产物权的权利人请求返还财产，不适用诉讼时效的规定，C选项属于请求支付抚养费，不适用诉讼时效的规定，因此A、B、C选项正确。D选项的自行车属于不需要登记的动产，适用诉讼时效的规定，D选项错误。（新编）", chapter: "第八章 诉讼时效"},
  {id: 104, topic: "专题一 民法典总则编", type: "multiple", question: "甲将一辆油罐车擅自停在邻居乙的院子里，还把乙没上锁的自行车骑走了。3年后，乙可采取的措施中，下列哪些选项属于甲可以时效经过为由主张的抗辩？", options: {"A": "赔偿损失", "B": "消除危险", "C": "返还财物", "D": "停止侵害"}, answer: "ACD", explanation: "。A、C、D选项，《民法莫》第195条规定：“有下列情形之一的，诉讼时效中断，从中断、有关程序终结时起，诉讼时效期同重新计算：（一）权利人向义务人提出履行请求；（二）义务人同意履行义务：（三）权利人提起诉讼或者申请仲裁：（四）与提起诉讼或者中请仲裁具有同等效力的其化情形因此A、C、D选项正确。B选项展于诉论效中止的情形。（2013）", chapter: "第八章 诉讼时效"},
  {id: 105, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，以下哪些选项属于不适用诉讼时效的情形？多选）", options: {"A": "甲购买的别墅附带赠送了地下车库，其同一小区的邻居乙占用该赠送的地下车位，甲要求邻居乙不得占用其车位", "B": "甲购买商品房获得产权后一直未居住，被物业公司转售给乙，甲要求乙返还", "C": "甲与妻子离婚后，一直未支付其子的抚养费，甲妻以其子的名义起诉，要求甲支付抚养费", "D": "甲的自行车被邻居乙长期使用，现要求返还"}, answer: "AC", explanation: "。甲于2018年2月8日得如其利受到担害，于2021年10月起诉已知过讼时效三年期限，因此A选项正确。B、C选项，（民法典》第192条第2款规定：“时效期问届满后，义务人同意履行的，不以诉讼时效期间届满为山抗解：义务人已自愿履行的，不得请求退还”，甲获得该花不属于不当得利，人民法院对乙的诉讼请应当不予支持，因此B、D选项错误，C选：正确。（2008）", chapter: "第八章 诉讼时效"},
  {id: 106, topic: "专题一 民法典总则编", type: "single", question: "根据民法典总则编及相关规定，下列哪些属于诉讼时效中断的事由？多选）", options: {"A": "权利人向法院提起诉讼", "B": "因不可抗力导致权利人不能行使请求权", "C": "权利人向义务人提出履行请求", "D": "义务人同意履行债务"}, answer: "C", explanation: "。A选项，诉讼时效中断，从中断有关程序终结时起，诉讼时效期问重新i算，A选项错误。B选项，自中止时效的原！消除之日起满六个月，诉讼时效期问届满因此B选项错误。C、D选项，诉讼时效期间届满后，义务人同意履行的，不得以诉讼时效期问届满为由抗辩；义务人已经自愿履行的，不得请求返还，因此C选项正确，D选项错误。（新编）", chapter: "第八章 诉讼时效"},
  {id: 107, topic: "专题一 民法典总则编", type: "multiple", question: "甲从其朋友乙处购买一件古董花瓶、约定乙于甲付款后5日内交付花瓶。甲于2018年2月8日付款后，乙一直未交付该花瓶。甲于2021年10月向人民法院起诉、要求乙交付该花瓶。乙得知后，主动将该花瓶交给甲，甲撤诉。后乙反悔，以甲的起诉超过诉讼时效期间为由向人民法院起诉，要求甲返还该花瓶。对此，下列哪些说法是正确的？", options: {"A": "甲的起诉超过诉讼时效期间", "B": "甲获得该花瓶属于不当得利", "C": "人民法院对乙的诉讼请求应当不予支持", "D": "人民法院对乙的诉讼请求应当予以支持"}, answer: "AB", explanation: "。A选项，甲乙虽离婚，但乙并未丧失监护权，甲在监护期问实施了侵害被监护人的行为，乙可以请求法院撤销甲的监护权，因此A选项正确。B选项，甲段打丙且卖掉了丙的玉佩，役害了丙的合法权益，丙可以请求甲承担赔偿责任，因此B选项正确。C选项，丙对段打及卖掉玉佩的赔偿请求权的诉讼时效为3年，从法定代理终止起算，因此C、D选项错误。（新编）", chapter: "第八章 诉讼时效"},
  {id: 108, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，下列关于诉讼时效的哪项说法是正确的？", options: {"A": "诉讼时效因提起诉讼而中断，从中断的原因消除之日起，诉讼时效期间继续计算", "B": "诉讼时效中止的，从中止时效的原因消除之日起，诉讼时效期间重新计算", "C": "超过诉讼时效期间，当事人自愿履行的，不受诉讼时效限制", "D": "超过诉讼时效期间，义务人履行义务后又以超过诉讼时效为由反悔的，应当予以支持"}, answer: "AC", explanation: "。A、C选项，《民法典》第194条第1款规定：“在诉讼时效期问的最后六个月内，因下列障码，不能行使请求权的，诉讼时效中止：（一）不可抗力；（二）无民事行为能力人或者限制民事行为能力人没有法定", chapter: "第八章 诉讼时效"},
  {id: 109, topic: "专题一 民法典总则编", type: "single", question: "甲乙是夫妻，育有一子丙（4岁）。后甲、乙因感情不和协议离婚，双方约定儿子丙归甲抚养。后甲沉迷赌博，时常殴打丙，并将甲母赠与丙的两块玉佩卖掉做赌资。对比，下列哪些说法正确？", options: {"A": "乙可以申请法院撤销甲的监护权", "B": "丙可以请求甲承担赔偿损失", "C": "丙对甲殴打致损的赔偿请求权不受诉讼时效的限制", "D": "丙对甲卖掉玉佩的赔偿请求权诉讼时效期间为自丙知请之日起3年"}, answer: "A", explanation: "。《民法典》第464条规定：“合同是民事主体之间设立、变更、终止民事法律关系的协议。婚姻、收养、监护等有关身份关系的协议，适用有关该身份关系的法律规定：没有规定的，可以根据其性质参履适用本编规定”。A选项是民事主体之间设立民事法律关系的协议，适用合同编的规定。B选项的收养协议、D选项的婚姻协议均属于身份关系的协议，不适用合同编的规定。C选项属于行政法调整范围，不适用合同编的规定。（2017）", chapter: "第八章 诉讼时效"},
  {id: 110, topic: "专题一 民法典总则编", type: "multiple", question: "根据民法典总则编及相关规定，在诉讼时效期间的最后6个月内，因下列哪些障碍，不能行使请求权的，诉讼时效中止？", options: {"A": "限制民事行为能力人没有法定代理人", "B": "义务人同意履行义务", "C": "不可抗力", "D": "权利人提起诉讼或者申请仲裁"}, answer: "ABD", explanation: "。A选项，《民法典》第464条第1款规定：“合同是民事主体之向设立、交更、终止民事法律关系的协议”，因此A选项正确。B选项，《民法典》第7条规定：“民事主体从事民事活动，应当遵循诚信原则，乘持诚实，恪守承诺”，因此B选项正确。C选项，合同中存在无偿合同，如赠与合同，无偿保管合同等，因此C选项错误。D选项，《民法典》第5条规定：“民事主体从事民事活动，应当遵自愿原则，按照自己的意思设立、变更、终止民事法律关系”，因此D选项正确。（2019）", chapter: "第八章 诉讼时效"},
  {id: 111, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列哪种情形适用合同编的规定？", options: {"A": "商标权人林某与某公司签订的商标权转让协议", "B": "张某与某福利院签订的收养该福利院孤儿的协议", "C": "房屋征收部门对被征收人郑某作出的征收决定及其补偿决定", "D": "刘某与徐某签订的解除婚姻关系协议"}, answer: "ABCD", explanation: "。根据《民法典》第466条第1款的规定，当事人对合同条款的理解有争议的，应当按照所使用的词句，结合相关条款、行为的性质和目的、习惯以及诚信原则，确定争议条款的含义，因此A、B、C、D选项均正确。（2017）", chapter: "第一章 一般规定"},
  {id: 112, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列说法正确的是？", options: {"A": "合同关系是发生在平等的民事主体之间的法律关系", "B": "当事人缔结合同应当遵循诚实信用的原则", "C": "合同关系应当为有偿关系", "D": "合同关系的缔结以当事人间的自愿为基础"}, answer: "BCD", explanation: "。甲发布的平物启本属干恶赏广告，根据《民法类>策499集的脱定，是赏人以公开方式声明对光成特定行为的人文付报的，光成谈行为的人可以请求其支付。甲医狗后发布平狗启事，乙检到约后归还，作为完成特定行为人的乙有权索要报限，即使乙不知道事启事的内容均不影有其向甲家要报酬。因此，A选项错误，B、D选项正确。根据《民法典>第139条的规定，以公告方式作出的意思示，公告变布时生效。因此C选项正确。（法考2024改编）", chapter: "第一章 一般规定"},
  {id: 113, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，当事人对合同条款的理解有争议的，应当按照下列哪些因素确定该条款的真实意思？", options: {"A": "合同所使用的词句", "B": "合同的有关条款", "C": "合同的目的", "D": "交易习惯以及诚实信用原则"}, answer: "AD", explanation: "。A选项，根据《民法典》第472条的规定，要约是希望与他人订立合同的意思表示，因此A选项正确。B选项，根据《民法典》第473条第1款的规定，要约邀请是希望他人向自己发出要约的表示，并非意思表示，因此B选项错误。C、D选项，根据（民法典）第137、第474条的规定，要约在到达受要约人时生效，要约以对话方式发出的，相对人知道其内容时生效，因此C选项错误，D选项正确。（2012改编）", chapter: "第一章 一般规定"},
  {id: 114, topic: "专题二 民法典合同编", type: "multiple", question: "甲丢了一只小狗，发了高价寻狗启事。乙不知道这件事，捡到小狗后归还。甲给了乙200元答谢，乙表示不用。后乙知道了商价寻狗启事，找甲索要报酬，被甲拒绝。关于本案，下列说法正确的有？", options: {"A": "乙已经拒绝，不得索耍报酬", "B": "乙有权索报酬", "C": "甲发布寻狗启事时，该悬赏广告生效", "D": "不论乙是否知晓寻狗启事的内容，甲均应支付报酬"}, answer: "ABC", explanation: "。A、B、C选项符合要约构成条件。D选项，《民法典》第473条第1款规定：“要约邀请是希望他人向自己发出要约的表示。拍卖公告、招标公告、招股说明书、债券募集办法、基金招募说明书、商业广告和宣传、寄送的价目表等为要约邀请”，D选项构成要约邀请。（2019）", chapter: "第二章 合同的订立"},
  {id: 115, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列哪些说法是正确的？", options: {"A": "要约是希望和他人订立合同的意思表示", "B": "要约邀请是希望他人向自己发出要约的意思表示", "C": "要约在发出时生效", "D": "要约以对话方式发出的，相对人知道其内容时生效"}, answer: "AC", explanation: "。根据《民法典》第475务价规定，撤回要约的通如应当在要约到达受要约人之前或者与要约同时到达受要约人，因此A、C选项正确，B、D选项错误。（2009）", chapter: "第二章 合同的订立"},
  {id: 116, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列哪些选项属于要约？", options: {"A": "超市货架上的商品标价陈列B：自动售货机上标明可口可乐2.5元一罐", "C": "在拍卖现场，举牌竞拍", "D": "发布招股说明书，募集股份"}, answer: "AD", explanation: "。A、B选项，根据（民法身）第473条的规定，招标公告为要约通请，因此A选项正确，B选项借误。C选项，撤回要约的通知应当在要约到达受要约人之前或者与要的同时到达受县约人，乙的投标书构成婴约，撤回通知应当在投标书到达甲公司之前或者与投标书同时到达甲公司，因此C选项错误。D选项，《民法典》第477条规定：“撤销要约的意思表示以非对话方式作出的，应当在受要约人作出永诺之前到达受要约人”，撤销通知应当在甲公司发出承诺通知之前到达甲公司，因此D选项正确。（2017）", chapter: "第二章 合同的订立"},
  {id: 117, topic: "专题二 民法典合同编", type: "multiple", question: "申公司欲出售一批货物给乙公司，甲公司向乙公司发出要约后，因进货渠道发生困难而欲撤回要约。根据民法典合同编及相关规定，下列哪些情形下，甲公司发出的要约可以被撤回？多选）", options: {"A": "撤回要约的通知在该要约到达乙公司之前到达乙公司", "B": "撤回要约的通知在乙公司发出承诺通知之前到达乙公司", "C": "撤回要约的通知与该要约同时到达乙公司", "D": "撤回要约的通知在乙公司发出承诺通知的同时到达乙公司"}, answer: "BCD", explanation: "。A选项，根据《民法典》第477条的规定，撤销要约应当在受要约人作出承诺之前到达受要约人，因此A选项要约可以撤销。B、C、D选项，（民法典》第476条规定：“要约可以撤销，但是有下列情形之一的除外：（一）要约人以确定承诺期限或者其他形式明示要约不可撤销：（二）受要约人有理由认为要约是不可撤销的，并已经为履行合同做了合理准备工作”，因此B、C、D选项要约不可撤销。（2014）", chapter: "第二章 合同的订立"},
  {id: 118, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司发布招标公告，选择专利代理机构办理专利复审事务。乙专利代理机构根据该招标公告制作并提交了投标书参加投标。根据民法典合同编及相关规定，下列哪些说法是正确的？", options: {"A": "甲公司发布的招标公告是要约邀请", "B": "甲公司发布的招标公告是要约", "C": "乙专利代理机构提交的投标书可以撤回，撤回该投标书的通知应当在甲公司发出承诺通知之前到达甲公司", "D": "乙专利代理机构提交的投标书可以撤销，撤销该投标书的通知应当在甲公司发出承诺通知之前到达甲公司"}, answer: "ACD", explanation: "。（民法典》第478条规定：“有下列情形之一的，要约失效：（一）要约被拒绝：（二）要约被依法撤销：（三）承诺期限届满，受要约人未作出承诺；（四）受要约人对要约的内容作出实质性交更”，因此A、C、D选项正确，B选项", chapter: "第二章 合同的订立"},
  {id: 119, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，在下列哪些情形下，要约不得撤销？", options: {"A": "要约已经到达受要约人", "B": "要约人确定了承诺期限", "C": "要约人明示要约不可撤销", "D": "受要约人有理由认为要约是不可撤销的，并已经为履行合同做了合理准备工作"}, answer: "ABD", explanation: "。A透项属干要的他绝读要的失发。B选项属于来诺期账届满，史要的人未作出来诺，谈要约失放。D选琪属干受要均人对婴约的内容作出实质性处更，婴约失效。C选项，要已明采诺期限，不可微俏，未失放。（2018改编）", chapter: "第二章 合同的订立"},
  {id: 120, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，有下列哪些情形之一的，要约失效？多选）", options: {"A": "要约被拒绝", "B": "要约被依法撤回", "C": "承诺期限届满，受要约人未作出承诺", "D": "受要约人对要约的内容做出实质性变更"}, answer: "AC", explanation: "。根据<民法集>箔472条规定，婴约是希望与他人订立合同的意您我荣，且内容其体确定，因此甲公司向乙公可的去函是要约百不是要约遂请，A选项正确，B选项借误。《民法实》第488条规定：“承诺的内容应出与婴约的内容一致。受要约人对要约的内容作出实质佐变更的，为新要约。有关合同标的、数量、质量、价款或者报酬、履行期限、履行地点和方式、违约贵任和解决争议方法等的变更，是对要约内容的实质性变更”。C、D选项，乙公可回函变更了价格，属于对要约的内容作出实质性交更，构成新要约，因此C选项正确，D选项错误。（2016改编）", chapter: "第二章 合同的订立"},
  {id: 121, topic: "专题二 民法典合同编", type: "single", question: "根据民法典合同编的规定，下列哪些情形下要约失效？", options: {"A": "甲对乙讲：“我有八成新电脑一台，5000元卖给你，买吗？\"乙表示不买", "B": "甲发传真给乙，表明“现有大米1万吨，批发价格每斤1元，款到发货，请于收到传真后一周内答复”。乙收到该传真后一直未于答复", "C": "甲为将某物卖给乙而发送电子邮件询问，请乙在一周内回复，发信后即感报价过低而后悔，当天致电乙表明撤销该要约", "D": "甲对乙表示愿将数码相机30000元转让给乙，乙表示感意以15000元的价格购买"}, answer: "B", explanation: "。由于甲公司的宴约中规定了承诺期限，因此宴约不可撤销，6月14日的撤销要约达到乙公司，并不能发生要约失效的结果。6月13日乙公司的回复中变更了合同标的，对要约的内容作出实质性变更，到达申公司时，申公司要约失效。因此B选项正确。（法考2008）", chapter: "第二章 合同的订立"},
  {id: 122, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司向乙公司去函表示，“我公司生产的W型路由器，每台单价200元。如果需要请与我公司联系。”乙公司回函，“我公司愿向货公司订购W型路由器500台，每台单价150元，如无异议，请于一个月内供货。”十天后，甲公司向乙公司发出500台路由器，并要求乙公司按照每台200元的价格付款，乙公司拒收。根据民法典合同编及相关规定，下列哪些说法是正确的？多选）", options: {"A": "甲公司向乙公司的去函是要约", "B": "甲公司向乙公司的去函是要约邀请", "C": "乙公司向甲公司的回函是新要约", "D": "乙公司向甲公司的回函是承诺"}, answer: "AB", explanation: "。A选项，张某对杨某发出的是要约，杨某对张某的回复为承诺，承诺一经作出即生效，合同成立。B选项，（民法典》第490条第1款规定：在签名、盖章或者按指印之前，当事人一方已经履行主要义务，对方接受时，该合同成立”，电防公可将电运通到销售公司，已经履行主要义务，且售公司全部予以股收，因此合同成文。C选项，食品厂的回复改变了婴约内息的实质性条件，属于新要约，因此合月不成立。D选项，马某对那某火出的赛约未置可否，没有作出永诺，因此合同不成立。（2007以编）", chapter: "第二章 合同的订立"},
  {id: 123, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司于6月10日向乙公司发出要约订购一批红木，要求乙公司于6月15日前答复。6月12日，甲公司欲改向丙公司订购红木，遂向乙公司发出撤销要约的信件，于6月14日到达乙公司。而6月13日，甲公司收到乙公司的回复，乙公司表示红木缺货，问甲公司能否用杉木代替。甲公司的要约于何时失效？", options: {"A": "6月12日", "B": "6月13日", "C": "6月14日", "D": "6月15日"}, answer: "ABCD", explanation: "。甲摆设自动贩实机的行为属于要约，乙投入硬币的行为属于承诺，合同成立。因此A、B选项正确。C、D选项，乙购买咖啡的两枚硬币已经归属于甲所有，因机器故降跳出，乙将其归为已有，没有法律上的根据，甲因此财产受损，乙构成不当得利，甲有权请求乙返还不当利益，因此C、D选项正确。（法考2018）", chapter: "第二章 合同的订立"},
  {id: 124, topic: "专题二 民法典合同编", type: "single", question: "根据民法典合同编的规定，下列哪些情形中，合同已经成立？", options: {"A": "张某对杨某说：“我这块手表1000块钱卖给你，要不要？\"杨某说：“好，一言为定。”", "B": "某电脑公司与某销售公司签订了销售500台电脑的合同，双方就合同的全部条款都已经协商完毕，打印好后各执一份，但没有签字章。不久该电脑公司便按合同约定将电脑运送到了该销售公司，该销售公司全部予以验收。", "C": "某超市发传其给某食品厂，上面写着“请速运200箱牛肉味方便面来我超市”。该食品厂立即传真回复：“现有200箱鸡肉味方便面，如需要，明日送货上门。”", "D": "郭某打电话给马某说：“昨天你想买的那枚珍珠我决定卖给你了，8000块钱。”马某未置可否。"}, answer: "C", explanation: "。《民法英》第491条第1款规定：“当事人采用信件、数据电文等形式订立合同要求签订确认书的，签订确认书时合同成立”。乙于6月19日在确认书签字，合同成立，因此C选项正确。（新编）", chapter: "第二章 合同的订立"},
  {id: 125, topic: "专题二 民法典合同编", type: "multiple", question: "甲在某大学摆设饮料自动贩卖机，乙投人两枚硬币购买了一咖啡，咖啡出来后，两枚硬市因机器故障跳出。乙见四处无人，乃取两枚硬币放人口袋。这一场景恰好被甲的职员丙发现，遂产生纠纷。关于本案，下列哪些说法是正确的？·", options: {"A": "甲摆设自动贩卖机的行为属于要约", "B": "乙投币购买咖啡的行为底于承诺", "C": "乙将两枚硬币放人口袋的行为构成不当得利", "D": "甲有权请求乙返还该两枚硬币"}, answer: "BC", explanation: "。A、B选项，购物网站标价出售电脑，能够确定电脑的价格、配置、特定品牌等，应认定内容具体确定，属于要约，因此A选项错误，B选项正确。C、D选项，《民法典》第491条第2数规定：“当事人一方通过互联网等信息网络发布的商品或者服务信息符合要约条件的，对方选择该商品或者服务并提交订单成功时合同成立，但是当事人另有约定的除外”。张三提交订单成功后，买卖合同即成立，因此C选项正确，D选项错误。（新编）", chapter: "第二章 合同的订立"},
  {id: 126, topic: "专题二 民法典合同编", type: "multiple", question: "甲6月10日向乙发信，表示欲购某型号钢材。6月13日乙与甲通话表示同意，并与之商定了钢材的型号、单价和数量，并约定签订合同确认书，乙随即制作了合同确认书并寄出，甲于6月16日在确认书上签字后寄往乙处，乙收到后于6月19日签字，6月22日双方经商议签订了合同书。甲乙之间的合同于何时成立？", options: {"A": "6月13日", "B": "6月16日", "C": "6月19日", "D": "6月22日"}, answer: "ABD", explanation: "。A选项，《民法典》第487", chapter: "第二章 合同的订立"},
  {id: 127, topic: "专题二 民法典合同编", type: "multiple", question: "京东商家出售某品牌电脑，张三根据网站页面提交了购买订单，随后收到了京东商家发送的订单信息，京东商家于次日发货。关于该合同，下列说法正确有哪些？", options: {"A": "购物网站页面标价出售电脑属于要约邀请", "B": "购物网站页面标价出售电脑属于要约", "C": "张三提交订单成功时，买卖合同成立", "D": "张三收到商家发送的订单信息，买卖合同成立"}, answer: "AD", explanation: "。A选项，（民法典）第496条第1款规定：“格式条数是当事人为了重复使用面预先拟定，并在订立合同时未与对方协商的条款”，因此A选项正确。B选项，（民法典》第497条规定，提供格式条款一方不合理地免除或者减轻其责任、加重对方贵任、限制对方主要权利的格式条款无效。因此对对方主要权利的限制需要达到不合理程度的格式条款才是无效的，并不是一律无效，B选项错误。C、D选项，（民法典）第498条规定：“对格式条款的理解发生争议的，应当按照通常理解予以解释。对格式条款有两种以上解释的，应当作出不利于提供格式条款一方的解释。格式条款和非格式条款不一致的，应当采用非格式条款”，因此C选项错误，D选项正确。（2019改编）", chapter: "第二章 合同的订立"},
  {id: 128, topic: "专题二 民法典合同编", type: "single", question: "根据民法典合同编及相关规定，关于合同的成立，下列说法正确的是？", options: {"A": "受要约人在承诺期限内作出承诺，该承诺因送达原因而迟判的，除要约人及时通知受婴约人因承诺超过期限不接受该承诺的以外，该承诺有效", "B": "采用数据电文形式订立合同的，收件人没有主营业地的，其住所地为合同成立的地点", "C": "采用数据电文形式订立合同的，发件人有主营业地的，其主营业地为合同成立的地点", "D": "法律规定采用书面形式订立合同，当事人没有采用书面形式，但一方履行了主要义务，对方也接受的，合同成立"}, answer: "C", explanation: "。A选项，加重对方资任需要达到不合理的度，才属于无放的始乐款。B选项已经合理提示减轻的格式条款不一定无效。C选项，张（民法典）第153条的规定，违反法鲁行政法倪的强制性规定的民事法德！为无效，因此C选项的格式条散亢效D选项、根据（民法典》第S10条的规定内算不够具体确定的，可以通过谷订充协议等方式确定，因此D选项的移式条款有效。（新编）", chapter: "第二章 合同的订立"},
  {id: 129, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列关于格式条款的说法正确的是？多选）", options: {"A": "格式条款是当事人为了重复使用而预先拟定，并在订立合同时未与对方协商确定的条款", "B": "提供格式条款一方限制对方主要权利的条款一律无效", "C": "对格式条款有两种以上解释的，应当作出有利于提供格式条款一方的解释", "D": "格式条款和非格式条款不一致的，应当采用非格式条款"}, answer: "ABC", explanation: "。A选项，格式条款是当事人为了重复使用而预先拟定，并在订立合同时未与对方协商的条款，因此读贵任条款属于格式条款，A选项正确。B、C、D选项，根据《民法典》第506条的规定，造成对方人身损害的免责条款无效，因此该责任条款无效，但是并不会影响该合同的效力，B、C选项正确，D选项错误。（2016改编）", chapter: "第二章 合同的订立"},
  {id: 130, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列哪些选项属于无效的格式条款？", options: {"A": "提供格式条款的一方所提供的格式条款含有加重对方责任的内容", "B": "提供格式条款的一方采取合理方式提请对方注意减轻其责任的内容", "C": "违反法律、行政法规强制性规定的", "D": "内容不够具体确定的"}, answer: "ABC", explanation: "。A、B选项，（民法典》第497条规定：“有下列情形之一的，该格式条款无效：（二）提供格式条款一方不合理地免除或者减轻其资任、加重对方贵任、限制对方主要权利：（三）提供格式条款一方排除对方主要权利”，因此A、B选项正确。C、D选项，《民法典》第506条规定：“合同中的下列免责条款无效：（一）造成对方人身损害的；（二）因故意或者重大过失造成对方财产损失的”，因此C选项正确，D选项错误。（新编）", chapter: "第二章 合同的订立"},
  {id: 131, topic: "专题二 民法典合同编", type: "single", question: "某家具制造商与批发商签订的合同是该家具制造商为了2026年专利代理牌井格考试重复使用而预先拟定的合同书，订立合同时并未与该批发商协商相关条款。该合同书中规定，如果因为家具质量原因给消费者造成损害的，家具制造商概不负资。根据民法典合同编及相关规定，下列哪些说法是正确的？", options: {"A": "该资任条款是格式条款", "B": "如果家具因为质量原因给消费者造成损害，该家具制造商应当承担责任", "C": "该责任条款无效", "D": "该合同无效"}, answer: "D", explanation: "。根据《民法典》第496条的规定，提供格式条款的一方未履行提示或者说明义务，致使对方没有注意或者理解与其有重大利害关系的条款的，对方可以主张该条款不成为合同的内容。", chapter: "第二章 合同的订立"},
  {id: 132, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，关于格式条款的合同，下列说法哪些是正确的？多选）", options: {"A": "提供格式条款一方不合理地加重对方资任的，该格式条款无效", "B": "提供格式条款一方排除对方主要权利的，该格式条款无效", "C": "合同中造成对方人身损害的免责条款无效", "D": "合同中因一般过失造成对方财产损失的免责条款无效"}, answer: "CD", explanation: "，A连项，航堂公司美于退票手房费的境定已提注意与说明，并光发条款，大逸货借误。四滑天气原因飞机质缓定成账容身体惯伤的，一体不承世赔信资任，属于免除人身情将费任的条款，读格式条款无效，D选项正。B.C选项，对机票价格的解释有今以，应当资照不利予提供格式条教的一万进行解释，刘集以600元订购了机票，其退累手续费应力600×30%=180元，回此B选项错误，C选项正确。（法考2008改编，思维扩晟）", chapter: "第二章 合同的订立"},
  {id: 133, topic: "专题二 民法典合同编", type: "multiple", question: "甲驾车起步时不小心撞死了坐在院子里甲的外婆。甲向保险公司索赔，保险公司拒绝赔付，并指出保险合同中约定：“保险车辆造成被保险人或其允许的驾驶员及他们的家庭成员人身伤亡，保险公司均不赔偿”。经查实，在签订保险合同时保险公司并未提示甲注意该格式条款。甲可以主张该条款？", options: {"A": "可撤销", "B": "无效", "C": "效力待定", "D": "不成为合同内容"}, answer: "AC", explanation: "。《民法典>第506条规定：“合同中的下列免费条款无效：（一）造成对方人身报害的：（二）回故意或者重大过失造成对方财产损失的”，因此人、C选项正确。（2018改编）", chapter: "第二章 合同的订立"},
  {id: 134, topic: "专题二 民法典合同编", type: "single", question: "刘某在订票网站上提前两周以600元订购了海鸥航空公司全价1000元的六折机票，在订单生成页面，网站提示起飞前2小时内退票按机票价格收取30%手续费，并重点提示因遇天气原因飞机颠簸造成旅客身体损伤的，一律不承担赔偿责任。后刘某因临时改变行程，刘某于航班起飞前1小时在订票网站办理退票手续。下列哪些选项是正响的", options: {"A": "迎票手续费的规定未尽提示注意与说明义券，是无效俗式条款", "B": "对30失的手续费应当解样为刘某应当支付300元的遮票手您费", "C": "对30%的手续费应当解样为刘某应当支付180元的退票手续费", "D": "航空公司规定的因心天气原因飞机巅造成旅客身体损伤的，一律不承担赔偿费任属于无效格式系款"}, answer: "A", explanation: "a《民法典》第495条规定：“当事人约定在将来一定期限内订立合同的认购节、订购节、预订书等，构成预约合同。当事人一方不履行预约合同约定的订立合同义务的，对方可以请求其承担预约合同的违约资任”。本题中，甲公司与乙公司签订的《合作意向节》属于预约合同，《合作开发合同》为本约合同，预约合同具有法律约束力，一方不订立本约合同，另外一方有权追究违约资任，因此A选项正确，B选项错误；甲公司拒绝与乙公司签订《合作开发合同），构成对预约合同的违约，应当承担预约合同的违约责任，不承担本约合同内的违约金：因此C选项带误。乙公依《合作意向书》向甲公司支付了11万元“预付欺”，其性质未明确约定，“定金”，甲公句不应向乙公司“双倍”：还预付款，因此D选项借误。（法2020，思维扩展）", chapter: "第二章 合同的订立"},
  {id: 135, topic: "专题二 民法典合同编", type: "single", question: "根据民法典合同编及相关规定，合同中出现的下列免费条款，哪些条款会被认定为无效？多选）", options: {"A": "造成对方人身伤害的", "B": "因意外事件造成对方财产损失的", "C": "因故意造成对方财产损失的", "D": "因过失造成对方财产损失的"}, answer: "C", explanation: "。A选项，乙始终未曾与甲商，甲、乙之间不存在缔约关系，因图：存在缔约过失贵任，因此A选项错误B选项，丙终止与甲的碰商，并经比1与乙签约，是正常的商业行为，并不反诚信原则，不须承担缔约过失费任因此B选项错误。C、D选项，丁假借立合同：与甲恶意磁商，应向甲承担约过失贵任，因此C选项正确，D选项误。（法考2010，思维扩展）", chapter: "第二章 合同的订立"},
  {id: 136, topic: "专题二 民法典合同编", type: "single", question: "某日，甲公司与乙公司订立《合作意向书》，约定待甲公司取得某地建设用地使用权后双方订立《合作开发合同》，并初步约定了出资比例、收益分享等事宜，当日乙公司依《合作意向书》向甲公司支付了100万元预付款。甲公司取得建设用地使用权后，因决定与其他公司合作而拒绝与之签订《合作开发合同》。以下说法正确的是？", options: {"A": "乙公司有权请求甲公司承担违约责任", "B": "《合作意向书》不具有法律约束力", "C": "乙公司有权请求甲公司支付《合作开发合同》项下的违约金", "D": "甲公司应向乙公司双倍返还预付款"}, answer: "D", explanation: "。A、B、C选项，甲、乙就售已经达成一致，双方商定要签合同节但由于乙拒绝签字，合同的形式要件失未具备，所以甲乙向的合同并未成立因此A、B、C选项均错误。D选项，乙与甲达成合意后又反悔，属于违背诚信目则的行为，应承担缔约过失责任，因此D选项正确。（法考2005）", chapter: "第二章 合同的订立"},
  {id: 137, topic: "专题二 民法典合同编", type: "multiple", question: "甲、乙同为儿童玩具生产商。六一节前夕，丙与甲商谈进货事宜。乙知道后向丙提出更优惠条件，并指使丁假借订货与甲接洽，报价高于丙以阻止甲与丙签约。丙经比较与乙签约，丁随即终止与甲的谈判，甲因此遭受损失。对此，下列哪一说法是正确的？2026年专形代理资格考认", options: {"A": "乙应对甲示担缔约过失责任", "B": "丙应对甲示担缔约过失资任", "C": "丁应对甲承担缔约过失责任", "D": "乙、丙、丁无须对甲承担缔约过失责任"}, answer: "ACD", explanation: "。本题中，德肌公司是贡商，且泄露商业秘密构：成缔约过失应承担赔偿责任，对德凯公司所付出的工作成本，真诚公司并无过错，无留财偿，因此A、C、D选项错误，B选项正确。（法考2017）C。根据《民法典》第153条第1款的规法律、行政法规的强制性规定的民事法", chapter: "第二章 合同的订立"},
  {id: 138, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司于6月5日以传真方式向乙公司求购一台机床，要求“立即回复”。乙公司当日回复“收到传真”。6月10日，甲公司电签订合同书。6月15日，甲公司前往签约，乙公司要求加价，未获同意，乙公司遂拒绝签约。对此、下列哪一种说法是正确的？", options: {"A": "买卖合同于6月5日成立", "B": "买卖合同于6月10日成立", "C": "买卖合同于6月15日成立", "D": "甲公司有权要求乙公司承担缔约过失责任"}, answer: "BCD", explanation: "。A、C选项，《民法类>第1S7条规定：“民事法律行为无效、设微信戏者确定不发生效力后，行为人因该行为取得的财产，应当予以返还：不能返还戏者设有必要返还的，应当折价补偿。有过借的一方应当赔偿对方由北所受到的损失”该买奖合同资微销后，自拍无效，不能再请求承担造约党任，但可以请求王某承担约过失货任，A选项错误，C选项正确。B、D选项，《民法奖》第148条规定：“一方以欺诈乎段，使对方在造背真实意思的情况下实施的民事法律行为，受欺诈方有权请求人民法院戏者仲机构予以逝销”，因此B、D选项正确。（新编）", chapter: "第二章 合同的订立"},
  {id: 139, topic: "专题二 民法典合同编", type: "single", question: "德凯公司拟为新三板上市造势，在无真实交易意图的情况下，短期内以业务合作为由邀请多家公司来其主要办公地点洽谈。其中，真诚公司安排授权代表往返十余次，每次都准备了详尽可操作的合作方案，德凯公司伴装感兴趣并次表达将签署合同的意愿，但均在最后一刻推脱拒签。其间，德凯公司还将知悉的真诚公司的部分商业秘密不当泄露。对此，下列哪些说法是错误的？", options: {"A": "未缔结合同，则德凯公司就商事宜无需承担责任", "B": "虽未缔结合同，但德凯公司构成恶意商，应赔偿损失", "C": "未缔结合同，则商业秘密属于真诚公司自愿披露，不应禁止外泄", "D": "德凯公司也付出了大量的工作成本，可向真诚公司主张赔偿"}, answer: "C", explanation: "。《民法莫》第504条规定：“法人的法定代表人或者非法人组织的负责人起越权限订立的合同，除相对人知道或者应当知道其赵龙权限外，该代表行为有效，订立的合同对法人或者非法人组织发生效力”，因此并不是所有代表行为都发生效力，A选项错误。《民法奠》第505条规定：“当事人起越经营范国订立的合同的效力，应当依煎《民法典》总则编中有关民事法律行为效力的规定以及合同编中的其他相关规定确定，不得仅以超越经营范国确认合同无效”，因此B选项错误。《民法英》第503条规定：“无权代理人以被代理人的名义订立合同，被代理人已经开始履行合同义务或者接受相对人履行的，视为对合同的追认”，紫云公司接受绿田公司的电脑并付款视为对合同的追认，C选项正确。《民法典》第502条第2款规定：“.应当办理申请批准等手续的当事人未履行义务的，对方可以请求其承担违反该义务的资任”，借误。（新编）", chapter: "第二章 合同的订立"},
  {id: 140, topic: "专题二 民法典合同编", type: "single", question: "甲乙两公司签订了一份购销合同，该合同标的是法律禁止流通的物品，其余条款均齐备并符合规定，并有独立！定，存在的有关解决争议方法的条款。根据民法典合同编及相关规定：下列关于该合间效力的说法哪些是正确的7", options: {"A": "该合同所有条款均无效", "B": "该合同有效，但无法履行", "C": "该合同无效，但不影响合同中独立存在的有关解决争议方法的条款的效力", "D": "该合同的效力待定"}, answer: "D", explanation: "。A选项商业广告和宜传原所上婴约遗请，但是，内容具体确定则属于要约在校内二手平台上发布的出售自行车的位容具体确定，履于婴约而非婴约邀请。故A错误。B、C、D选项，甲发布的商业广分和属于要约，价款1000元。乙先出价900元，同意。后乙又给甲发微信“就按你说的价1100元”。其中，如果以“就按你说的价来”！乙的意思表示含义，则价款为1000元，且乙！表示是自己打错了。因此，应当认定两人1立了1000元的合同。故B、C项错误，D项正（法考2023，思维扩展）", chapter: "第三章 合同的效力"},
  {id: 141, topic: "专题二 民法典合同编", type: "single", question: "李某在二手车市场向王某购买了一辆二手车，并签订了车辆买卖合同。该车里程表显示行驶里程3万公里，但实际上该车已经行驶了20万公里。王某明知里程有误，却故意隐瞒该事实，以较高价格将该车卖给李某。李某购买该二手车后发现上述问题，与王某产生纠纷，向人民法院提起诉讼。根据民法典总则编、合同编及相关规定，下列说法哪些是正确的？", options: {"A": "如果李某请求撤销车辆买卖合同，可以同时请求王某承担违约责任", "B": "李某有权请求人民法院予以撤销车辆买卖合同", "C": "如果李某请求撤销车辆买卖合同，可以同时请求王某承担缔约过失责任", "D": "车辆买卖合同中有仲裁条款的，李某有权请求仲裁机构予以撤销该合同"}, answer: "B", explanation: "。《合同编司法解释》第22条规定“5代表人、负责人或者工作人员以法人、非法织的名义订立合同且未超越权限，法人、非注组织仅以合同加盖的印章不是备案印章或我伪造的印章为由主张该合同对其不发生列的，人民法院不予支持。”法定代表人在合同签字并加盖公章的行为，表明其是以法人名签订合同，是其实的意惠表示，属于有权代因此合同已生效，不能仅以公章是假的为白认合同效力。（法考2024，思维扩展）行", chapter: "第三章 合同的效力"},
  {id: 142, topic: "专题二 民法典合同编", type: "multiple", question: "关于合同效力，下列说法正确的有哪项？", options: {"A": "甲是蓝天公司的法定代表人，甲代表蓝天公司订立的所有合同均对蓝天公司发生效力", "B": "乙是白云公司员工，超越该公司的经营范围与黄沙公司签订合同，该合同无效", "C": "丙在未被紫云公司授权的情况下，以紫云公司的名义与绿田公司签订电脑买卖合同，绿田公司向紫云公司发货，紫云公司收到货后向绿田公司付款，电脑买卖合同对紫云公司和绿田公司发生效力", "D": ".丁与黑石公司签订土地买卖合同，约定相关手续由黑石公司办理，手续完成后买卖合同生效，后因土地价格上涨，黑石公司拒不办理相关手续，黑石公司因合同未生效因此不用承担违约责任"}, answer: "CD", explanation: "。A、B、C选项，（民法典）第S：条规定：“合同生效后，当事人就质量、价：或者报酬、履行地点等内容没有约定或者生定不明确的，可以协议补充；不能达成补协议的，按照合同相关条款或者交易习惯定”，因此未明确质量可通过协议补充确定不会导致合同不成立成未生效，因此A、B项错误，C选项正确。D选项，（民法兵）旨", chapter: "第三章 合同的效力"},
  {id: 143, topic: "专题二 民法典合同编", type: "multiple", question: "甲在校园网站发布出售一辆二手自行车的广告，标价1000元。乙认识甲，到甲的宿舍表示以900元购买，甲不同意。乙于是对甲说：“行！就按你说的，1100元。\"乙通过手机给甲转账1000元后，甲要求乙再付100元，乙表示刚才口误，本欲说1000元说成了1100元，甲不同意。关于甲、乙间的这一二手自行车的买卖，下列表述正确的是？", options: {"A": "甲在校园网站发布的广告属于要约邀请", "B": "甲、乙未达成合意，自行车买卖合同不成立", "C": "甲、乙间成立售价为1100元的自行车买卖合同", "D": "甲、乙间成立售价为1000元的自行车买卖合同"}, answer: "BD", explanation: "。根据《民法典>第511条的规定，履行地点不明确，给付货币的，在接受货币一方所在地履行：履行期限不明确的，债务人可以随时履行，债权人也可以随时请求履行，但是应当命对方必要的准备时间。因此A、C选项借误，B、D选项正确。（2006）", chapter: "第三章 合同的效力"},
  {id: 144, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司和乙公司签订钢材购销合同，双方法定代表人经董事会授权签字盖章，后发现甲公司的章是假的。对此，下列说法正确的是？", options: {"A": "合同效力待定", "B": "有效", "C": "无效", "D": "合同不成立"}, answer: "ABC", explanation: "。A选项，《民法典》第S22条第1款规定：”当事人约定由货务人向第三人履行债务，债务人未向第三人履行债务或者履行债务不符合约定的，应当向债权人承担违约责任”，因此A选项正确。B选项，（民法典》第522条第2款规定：“法律规定戎者当事人约定第三人可以直接请求债务人向其履行货务，第三人未在合理期限内明确拒绝，债务人未向第三人履行债务或者履行债务不符合约定的，第三人可以请求债务人承担违约责任”，因此B选项正确。C、D选项，《民法英》第523条规定：“当事人约定由第三人向债权人履行债务，第三人不履行债务或者履行债务不符合约定的，债务人应当向债权人承担违药责任”，因此C选项正确、D选项错误。（新编）", chapter: "第三章 合同的效力"},
  {id: 145, topic: "专题二 民法典合同编", type: "multiple", question: "甲酒厂欲从乙粮库购买一千吨高梁，业务员因为疏忽买卖合同中未写明高梁质量。关于该合同，下列哪些说法是确的？多选）", options: {"A": "质量是民法典合同编规定的合同条款，欠缺该条款的同不成立", "B": "该合同明确了买卖标的物但未明确质量，因此成立但生效", "C": "该合同已经生效，但甲乙仍可就质量条款进行进一步商以确定具体标准", "D": "如果当事人对质量标准达不成一致，可以参考国家标准、行业标准或者通常标准以及按照合同目的确定展行标准"}, answer: "ABD", explanation: "。乙公司的行为依法构成第三人代为清偿。因乙公司仅代为清偿部分债权2万元。因此，甲公司尚欠澄某1万元。第三人乙公司代为履行2万元后，基于“法定的债权转让”享有对甲公司的2万元追偿权。因此，A、B、D选项正确，C选项（法考2023改编）", chapter: "第四章 合同的履行"},
  {id: 146, topic: "专题二 民法典合同编", type: "multiple", question: "湖南A工厂向四川B公司购买一批物品，合同对付款地点和交货期限没有约定，事后未能达成补充协议，并且按照合同有关条款或交易习惯也不能确定。根据民法典合同编的规定，下列哪些说法是正确的？多选）", options: {"A": "湖南A工厂付款给四川B公司应在湖南限行", "B": "湖南A工厂付款给四川B公司应在四川股行", "C": "四川B公司可以随时交货给湖南A工厂，A工厂不得有异议", "D": "四川B公司可以随时交货给湖南A工厂，但是应当给该厂必要的准备时间"}, answer: "BC", explanation: "（民法典》第523条规定：自人约定由第三人向债权人履行债务，第三不履行债务或者履行货务不符合约定价，务人应当向货权人承担违约贵任”。本中，就乙、丙间的买实合同固官，是一个的三人甲履行的合间，甲未履行政跃逸行，应由乙向丙承担违约贵任，闪不能向主张违约资任，因此A、D选项借误，B、C项正确。（法考2010改编）", chapter: "第四章 合同的履行"},
  {id: 147, topic: "专题二 民法典合同编", type: "single", question: "根据《民法典》合同编及相关规定，下列说法哪些是正确？", options: {"A": "合同当事人约定由债务人向第三人履行债务的，债务人未向第三人履行债务，应当向债权人承担违约责任", "B": "合同当事人约定由债务人向第三人履行债务的，且约定第三人可以直接请求债务人向其履行债务，第三人并未拒绝，债担违约责任", "C": "合同当事人约定由第三人向债权人履行债务的，第三人不履行债务，价务人应当向债权人承担违约责任", "D": "合同当事人约定由第三人向债权人履行债务的，第三人履行债务不符合约定，应当由第三人向债权人承担违约责任"}, answer: "A", explanation: "。甲与乙签订钢材买卖合同：约第三人丙可以直接请求债务人乙向其履第三人丙对此知情且未拒绝。因此，第三丙基于债权人甲、债务人乙之间的约定取了独立的请求权；第三人丙可以请求债务乙向其履行100吨钢材，如债务人乙不付，第三人丙可以直接迫究债务人乙的违责任。债务人乙基于买卖合同对债权人的抗辩，可以向第三人丙主张。因此A选正确，C、D选项错误。虽然第三人丙取得立的请求权，但并不会导致合同直接当事甲丧失相应的权利和义务。如乙不交100吨钢材，甲亦可追究乙的违约：贵任。此B选项错误。（法考2020）", chapter: "第四章 合同的履行"},
  {id: 148, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司因经营不善歇业，欠专职司机潘某工资3万元，潘某多次催要未给，一气之下把公司一辆面包车开走。甲公司的母公司乙公司知道此事主动偿还潘某2万元。关于本案，下列说法正确的是？", options: {"A": "甲公司尚欠潘某1万元", "B": "乙公司行为属于第三人代为清偿", "C": "甲公司尚欠潘某3万元", "D": "乙公司有权利要求甲公司支付2万元"}, answer: "ABCD", explanation: "。A选项，《民·法典》第509第1款规定：“当事人应当按照约定全面行自己的义务”，因此A选项正确。B选习（民法典》第525条规定：“当事人互负债务没有先后履行顺序的，应当同时履行因此B选项正确。C选项，《民法）第S:条规定：“当事人互负债务，有先后履行序，应当先履行债务一方未履行的，后月一方有权拒绝其履行请求……”，因此Ci项正确。D选项，《民法典》第527条第11规定：“应当先履行债务的当事人，有确切", chapter: "第四章 合同的履行"},
  {id: 149, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司与乙公司签订了一份手机买卖合同、约定：甲公司供给乙公司某型号手机1000部，每部单价1000元，乙公司支付定金30万元，任何一方违约应向对方支付合同总价款30%的违约金。合同签订后，乙公司向甲公司支付了30万元定金，并将该批手机转售给丙公司，每部单价1100元，指明由甲公司直接交付给丙公司。但甲公司未按约定期间交货。关于甲、乙、丙公司间违约资任的承担，下列表述正确的是：", options: {"A": "如乙公司未向丙公司承担违约责任，则丙公司有权请求甲公司向自己承担违约责任", "B": "如乙公司未向丙公司承担违约责任，则丙公司无权请求申公司向自己承担违约费任", "C": "如甲公司迟延向丙公司交货，则丙公司有权请求乙公司承担迟延交货的违约责任", "D": "如甲公司迟延向丙公司交货，则丙公司无权请求乙公司承担迟延交货的违约费任"}, answer: "ACD", explanation: "。《民法典》第S27集规定：“世游先度行借券的当事人，有切证证明对方有下列情形之一的，可以中止履行：（一）经管状况严重乃化”，（民法典》第S28条规定：“当事人侬据前条规定中止履行的，应当及叶通知对方..”，因此A、C、D选项借供，当逸。（2013改）", chapter: "第四章 合同的履行"},
  {id: 150, topic: "专题二 民法典合同编", type: "multiple", question: "甲欠丙100吨钢材，为偿还该价务，甲与乙订立了100吨钢材的买卖合同，约定由乙向丙直接交付钢材，丙也可以直接向乙请求履行，丙对此知情，也未拒绝，以下说法正确的是？", options: {"A": "如乙不交付，丙可请求其履行且要求承担违约责任", "B": "甲对乙已经没有任何义务", "C": "乙不能向丙主张其对甲的抗辩", "D": "因合同相对性，丙不能直接向乙请求履行交付义务"}, answer: "ABCD", explanation: "。A选项，甲公司、乙公司儿负债务且没有先后履行顺序的，应当回时厦行。甲公司在乙公司履行之前有权拒绝其履行请求，因此人选项正确。B选项，合同约定先供货后付款，应当先履行的甲公司米履行，则后履行一方乙公司有权拒绝其履行请求，因此B选项正确。C、D选项，根据《民法典>第527条的规定，应当先履行债务的当事人，有确切证据证明对方有经营状况产重是化，丧失商业信誉的情形，可以中止履行，因此C、D选项正确。（2015）", chapter: "第四章 合同的履行"},
  {id: 151, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列关于合同履行的哪些说法是正确的？", options: {"A": "甲公司应当无条件地继续履行该合同", "B": "甲公司可以中止履行该合同，并及时通知对方", "C": "甲公司可以直接解除该合同", "D": "甲公司可以要求乙公司承担违约资任"}, answer: "CD", explanation: "。《民法典》第529条规定：“债权人分立、合并或者变更住所没有通知债务人，致使履行债务发生因难的，债务人可以中止展行或者将标的物提存”，因此A、B选项错误，C、D选项正确。（2015，思维扩展）", chapter: "第四章 合同的履行"},
  {id: 152, topic: "专题二 民法典合同编", type: "single", question: "甲公司与乙公司达成买卖合同，约定甲公司有偿向乙公司供应原料。根据民法典合同编及相关规定，下列关于合同履行抗辩权的哪些说法是正确的？", options: {"A": "合同未明确履行顺序，甲公司在乙公司付款之前有权拒绝其履行要求", "B": "合同约定先供货后付款，甲公司未按时供货，乙公司有权拒付货款", "C": "合同约定先供货后付款，甲公司有确切证据证明乙公司经营状况严重恶化，可以中止履行合同", "D": "合同约定先供货后付款，甲公司有确切证据证明乙公司丧失商业信誉，可以中止履行合同"}, answer: "A", explanation: "。A选项，在乙公司表示要涨价的情况下，甲公司有理由认为自己支付价款后，乙公司有可能不交付汽车，甲公司有权行使不安抗辩权，中止支付第二期价款，不构成违约，因此A选项正确。B选项，乙公司并未催告甲公司支付第二期价款，且在乙公司主张解除合同之前，甲公司已经支付了第二期价款，乙公司不得解除合同，因此B选项错误。C选项，甲公司已经交付了第二期价款，乙公司不得主张先履行抗辩权，因此C选项借误。D选项，乙公司主张班乡理由是原材料价格上涨，当事人订立合目应当预见到原材料价格的正常设动，属子常市场风险，乙公可不得主张班价，医年选项错误。（法考2014，思维扩展）", chapter: "第四章 合同的履行"},
  {id: 153, topic: "专题二 民法典合同编", type: "single", question: "甲乙两公司订立合同，约定甲公司送货到乙公司住所。后乙公司变更住所，未及时通知甲公司，导致甲公司无法按照约定地点交货。根据民法典合同编及相关规定，下列哪些说法是正确的？", options: {"A": "甲公司应当及时联络乙公司并继续履行合同", "B": "甲公司可以解除合同", "C": "甲公司可以中止履行", "D": "甲公司可以将标的物提存"}, answer: "C", explanation: "。A选项、在合同关系中，自几则是指双方的自并达成合意，旧0一为事人的单方自民，因此人选项倡议。比项，建设工程合间对于工程款的约定，以疫情对工程款的影响等，均不沙及公共利和善良风俗，因此B选项错识。C选项.（法典》第533条规定：“合同的基础条件发了当事人在订立合同时无法预见的、不具商业风险的重大变化，继续履行合同对于事人一方明显不公平的，受不利影响的当人可以与对方重新协商；在合理期限内协不成的，当事人可以请求人民法院或老机构变更或者解除合同。人民法院或者栽机构应当结合案件的实际情况，抵据公原则变更或者解除合同”，因疫情导致原料价格大幅上涨，后果是合同履行明显不平，不能实现乙建筑公司的缔约目的，属情势变更的范畴，因此C选项正确。D项，情势变更本身即意味若商业风险自负有例外的，因此D选项错误。（新编，息：扩展）", chapter: "第四章 合同的履行"},
  {id: 154, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司向乙公司购买小轿车，约定7月1日预付10万元，10月1日预付20万元，12月1日乙公司交车时付清尾款。甲公司按时预付第一笔款。乙公司于9月30日发函称因原材料价格上涨，需提高小轿车价格。甲公司于10月1日拒绝，等待乙公司答复未果后于10月3日向乙公司汇去20万元。乙公司当即拒收，并称甲公司迟延付款构成违约、要求解除合同，甲公司则要求乙公司继续履行。下列哪一表述是正确的？", options: {"A": "甲公司不构成违约", "B": "乙公司有权解除合同", "C": "乙公司可行使先履行抗辩权", "D": "乙公司可要求提高合同价格"}, answer: "ABCD", explanation: "。《民法典》第535条第1、2日规定：“因债务人息于行使其债权或者与司债权有关的从权利，影响价权人的到期债实现的，债权人可以向人民法院请求以自己的名义代位行使债务人对相对人的权利，且是该权利专属于债务人自身的除外。代组", chapter: "第四章 合同的履行"},
  {id: 155, topic: "专题二 民法典合同编", type: "multiple", question: "甲置业公司与乙建筑公司因某小区业务缔结建设工程承包合同，甲置业公司为发包人，乙建筑公司为总承包人，双方约定了固定款额事项以及不适用的特殊事项。施工期间，因受全球疫情影响，某施工原材料价格上涨至150%，乙建筑公司提出调整申请，遭到甲置业公司拒绝。关于乙建筑公司的主张，下列说法正确的是：", options: {"A": "符合自愿原则", "B": "违背公序良俗", "C": "适用情势变更", "D": "符合商业自担风险"}, answer: "AD", explanation: "。携据《民法典》箔S3S余的规定，甲公司欠乙公可工偿S0万元已期，同时带集欠甲公可80万元货故也已到期，甲公可乌于行使其债权从西影有了乙公司借权的实现。乙公可可以以自己的名义代位行使甲公司对常集的债权，代位权行便的范图为50方元，乙公可行使代位权的必变费用，由货务人甲公可负担，因北A、D选项正确，B、C选项错误。（2014）", chapter: "第四章 合同的履行"},
  {id: 156, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，债权人代位行使债务人的债权，应当同时符合哪些条件？", options: {"A": "债权人对债务人的债权合法", "B": "债务人怠于行使其到期债权，对债权人造成损害", "C": "债务人的债权已经到期", "D": "价务人的债权不是专属于价务人自身的债权"}, answer: "BCD", explanation: "。A、C选项，零某可以以自己的名义起诉张某，不能以王某名义起诉张某，因此A选项正确，C选项带误。B选项，节某诉讼请求效额为80万元，因此B选项借误。D选项，代位权只能向法院起诉，不能仲，因此D选项错误。（2019）", chapter: "第五章 合同的保全"},
  {id: 157, topic: "专题二 民法典合同编", type: "single", question: "甲公司欠乙公司工程款50万元，务到期后甲公司因资金不足人拖不还。同时，李某欠甲公司的80万元货款也已到期，但甲公司未以任何方式催促李某还款，对乙公司造成了损害。根据民法典合同编及相关规定，下列关于乙公司行使代位权的哪些说法是正确的7", options: {"A": "乙公司可以向人民法院请求以自已的名义代位行使甲公司对李某的债权", "B": "乙公司可以向人民法院请求以甲公司的名义代位行他甲公司对李某的债权", "C": "乙公司代位权行使的范围为80万元", "D": "乙公司行使代位权的必要费用，由甲公司负担"}, answer: "D", explanation: "。赠养费、劳动报酬、人身伤害赔偿费均为专属于债务人自身的权利，不可代位行使，因此A、B、C选项错误，D选项正确。（2008)", chapter: "第五章 合同的保全"},
  {id: 158, topic: "专题二 民法典合同编", type: "multiple", question: "王某享有对张某的到期债权100万元，同时，王某欠李某80万元，该债务已到期。此时，王某没有其他财产偿还给李某，但为逃避该笔债务，王某一直不积极催讨对张某的到期债权。根据民法典合同编及相关规定，下列关于李某行使代位权的说法错误的是？多选）", options: {"A": "李某可以以自己的名义起诉张某", "B": "李某的诉讼请求为100万元", "C": "李某既可以以自己的名义起诉张某，也可以以王某的名义起诉张某", "D": "李某可以以张某为被申请人向仲裁机构申请仲裁"}, answer: "AD", explanation: "。A选项，（民法典》第538条规定：“债务人以放弃其债权、放弃债权担保、无偿转让财产等方式无偿处分财产权益，或者恶意延长其到期债权的履行期限，影响债权人的债权实现的，债权人可以请求人民法院撤销债务人的行为”，债务人甲公司将其财产无偿转让给丙公司，给债权人乙公司造成了损害，乙公司可以行使其微销权，因此A选项正确。B选项，《民法典》第541条规定：“撤销权自债权人知道或者应当知道销事由之日起一年内行使。自货务人的行为发生之日起五年内没有行使撤销权的，该撤销权消灭”，因此B选项错误。C、D选项，《民法典》第540条规定：“撒销权的行使范国以值权人的债权为限。信权人行使！权的必要费用，由务人负担”，乙公罚！权行使的范国为100万元，因此C设！误，D选项正确。（2017）", chapter: "第五章 合同的保全"},
  {id: 159, topic: "专题二 民法典合同编", type: "multiple", question: "甲为乙的债权人。对乙享有的已经到期的下列哪项债权，甲可以向人民法院请求以自己的名义代位行使？", options: {"A": "乙的儿子应当给付的赡养费", "B": "丙欠乙的劳动报酬", "C": "丁欠乙的人身伤害赔偿费", "D": "戊欠乙的货款"}, answer: "ABC", explanation: "。A选项，甲将冰柜等物无4与丙、无论丙是否知情，乙均能行使微谢因此A选项正确。B选项，甲将市值10；的店面以5万元的价格实给丁是有信的丁不知情的前提下，乙不能行使撤销权此B选项正确。C、D选项，《民法典》绍条规定：“撤销权自债权人知道或者应！道撤销事由之日起一年内行使。自货：的行为发生之日起五年内没有行使缴的，该撤销权消灭”，甲高价收购戊的厨！备发生于2021年9月5日，乙行使其《的期限至2026年9月5日届满，因此C3正确。D选项申请行使撤销权超出5年限，错误。（2018改编）", chapter: "第五章 合同的保全"},
  {id: 160, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司欠乙公司工程款100万元，务到期后甲公司因资金不足久拖不还。同时，甲公司将价值200万元的200件产品-49 -无偿转让给丙公司，给乙公司造成了损害。根据民法典合同编及相关规定，下列关于乙公司行使撤销权的哪些说法是正确的？", options: {"A": "乙公司可以请求人民法院撤销甲公司的无偿转让行为", "B": "乙公司在其知道或者应当知道撤销事由之日起5年内均可行使撤销权", "C": "乙公司撤销权行使的范围为200万元", "D": "乙公司行使撤销权的必要费用，由甲公司负担"}, answer: "BD", explanation: "。A、B选项，《民法莫》第545的规定，当事人约定金钱债权不得转让！不得对抗第三人，甲公司和乙公司约定了钱债权不得转让，该约定不得对抗第三人公司，因此A选项错误，B选项正确。C、D项，（民法典》第546条第1款规定：“债权转让债权，未通知债务人的，该转让对债人不发生效力”，债权人转让债权只需通专顺二民法典合同编债券人，无臂經债券人回房，因此C遗项借膜，D途项正嘀。（2015以）", chapter: "第五章 合同的保全"},
  {id: 161, topic: "专题二 民法典合同编", type: "multiple", question: "甲因开饭馆向乙借款10万元，2021年8月借款期限届满。因经营不善，甲的饭馆濒临倒闭。为逃避对乙的债务，2021年9月5日，甲将店内的冰柜等物赠与丙，将市值10万元的店面以5万元的价格卖给其亲戚丁，并以两倍于市价的高价收购戊的厨房设备。丙、丁不知道该情形，戊知情。现甲无力清偿欠乙的借款。对此，下列哪些说法是正确的？多选）", options: {"A": "即使丙不知情，乙也能对甲的赠与行为行使撤销权", "B": "因为丁不知情，故乙不能对甲将其中一间店面卖给丁的行为行使撤销权", "C": "若乙于2022年11月8日知道甲高价收购戊的厨房设备，则乙可以自知道之日起1年内向法院申请行使撤销权", "D": "若乙于2027年3月5日知道甲高价收购戊的厨房设备，则乙可以自知道之日起1年内行使撤销权"}, answer: "BC", explanation: "。A选埃，《民法典》策S47条策1款规定：“价权人转让债权的，史让人取得与价权有关的从权有，但是该从权利专属于价权人自所的除外”，因此人选项带误。B选项，《民法典》第S46条第1款规定：“债权人转让价以，未通知价务人的，该转让对债券人不次生级方”，因北B选项正确。C、D选项，《民法典》第551条第1款规定：“价务人将债务的全部或者部分转移给第三人的，应出经货权人同”，因此C选项正确，D选项错误。（2011改编）", chapter: "第五章 合同的保全"},
  {id: 162, topic: "专题二 民法典合同编", type: "single", question: "甲公司和乙公司双方订立买卖合同，并约定价权债务均不得转让。甲公司向乙公司交付后，甲公司欲将其200万货款的债权转让给丙公司。根据民法典合同编及相关规定，下列哪些说法是正确的？多选）", options: {"A": "按照合同约定，甲公司不得转让其债权", "B": "甲公司和乙公司價权不得转让的约定，不得对抗第三人", "C": "如果甲公司转让债权未经债务人乙公司同意，甲公司就不能转让", "D": "如果甲公司将使权转让给丙公司，应当通知优务人乙公司，否则该转让对乙公司不发生效力"}, answer: "C", explanation: "。A选项，演出活动具有人身专属性，歌星乙应当亲自履行演出义务，其未经中同党自行决定让欧手丙代为演出不符合法律规定。B选项，《民法实》第SSS条规定：“当事人一方经对方同意，可以将自己在合同中的权利和义务一井转让给第三人”，乙公司未经甲同意不符合法律规定。C选项，中打电话通知乙，债权转让发生效力。D选项，《民法典》第923条规定：“受托人应当亲自处理委托事务，经委托人同意，受托人可以转委托”乙公司未经甲同意格该货物转由丙公司运输的行为不符合法律规定。（2007改编）", chapter: "第六章 合同的转让"},
  {id: 163, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列关于合同转让的说法哪些是正确的？", options: {"A": "侦权人转让权利的，所有与债权有关的从权利亦由受让人收得", "B": "债权人转让权利的，应当通知侦务人，否则，该转让对价务人不发生效力", "C": "债务人将合同的义务全部转移给第三人的，应当经债权人同意", "D": "债务人将合同的义务部分转移给第三人的，可以不经债权人同意"}, answer: "ABC", explanation: "。A选项，（民法典）第67条第1款规定：“法人合并的，其权利和义务由合并后的法人享有和承担”，因此A选项正确。B选项，根据《民法典》第546条第1款、第548条的规定，债权人转让债权，未通知债务人的，该转让对债务人不发生效力，货务人接到债权转让通知后，债务人对让与人的抗辩，可以向受让人主张，因此B选项正确。C选项，《民法典》第551条第1款规定：“货务人将债务的全部或者部分转移给第三人的，应当经债权人同意”，因此C选项正明。1选项，（民法典》第553条规定：“债务人外多债务的，新债务人可以主张原债务人对货如人的抗排”，因此D选项带误。（2013）", chapter: "第六章 合同的转让"},
  {id: 164, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编的规定，下列哪项合同的转让是合法的？", options: {"A": "甲举办商业演出，邀请歌星乙演唱歌曲，乙表示同意，后因演出当天乙另有演出任务，便自行决定让歌手丙代为演出", "B": "专利权人甲与乙公司签订专利实施许可合同，后乙公司未经甲同意，将合同权利义务一并转让给丙公司", "C": "债权人甲因出国急需用钱便将债务人乙欠自己的两万元债权以1万5千元的价格转让给了丙，并将此事打电话通知了乙", "D": "甲委托乙公司运输货物，后乙公司未经甲同意，将该货物转由丙公司运输"}, answer: "AC", explanation: "。A、B选项，《民法典>第5558规定：“当事人一方经对方同宽，可以络自在合同中的权利和义务一并转让伯館三人”，因此A选项正确，B选项错误。C、DA项，《民法典》第548条规定：“债务人接到台权转让通知后，债务人对让与人的执赔，可以向受让人主张”，《民法典》第553条规定-“债务人转移债务的，新债务人可以主张目债务人对债权人的抗”，因此乙公司有向丙公司主张其对甲公司的抗辩，C选项王确，D选项错误。（2016改编）", chapter: "第六章 合同的转让"},
  {id: 165, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列关于合同权利和义务的哪些说法是正确的？", options: {"A": "当事人订立合同后合并的，由合并后的法人行使合同权利，履行合同义务", "B": "债权人转让权利的，应当通知债务人，货务人接到债权转让通知后，价务人对让与人的抗辩，可以向受让人主张", "C": "价务人将债务全部转移给第三人的，应当经债权人同意", "D": "价务人转移价务的，新债务人不得主张原债务人对债权人的抗辩"}, answer: "AD", explanation: "。A、B选项，《民法典》第546多第1款规定：“货权人转让债权，未通知债务人的，该转让对债务人不发生效力”，乙转训债权通知了甲，对甲发生效力，因此A选习正确，B选项错误。C、D选项，《民法典》氛549条规定：“有下列情形之一的，货务人司以向受让人主张抵销：（一）债务人接到债方转让通知时，债务人对让与人享有债权，且债务人的债权先于转让的债权到期或者目时到期……”，在甲欠乙的10万元中，其中万元可以主张抵销，债务人甲主张抗辩时可以向新债权人丙主张，因此C选项错误，选项正确。（2018改编）", chapter: "第六章 合同的转让"},
  {id: 166, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司和乙公司签订了一份服务器买实合同。在合同履行期间，甲公司拟将其在合同中的全部权利义务转让给丙公司，根据民法典合同编及相关规定，下列哪些说法是正确的？", options: {"A": "该转让需要经过乙公司同意", "B": "该转让需要通知乙公司，但无需经其同意", "C": "转让后，乙公司有权向丙公司主张其对甲公司的抗辩", "D": "转让后，乙公司不得向丙公司主张其对甲公司的抗辩"}, answer: "BC", explanation: "。A选项，甲、丙公司之间依法由立的债权转让协议在甲、丙公司自签订时月18日即生效，因此A选项错误。B选项乙公司接收通知后，货权转让对乙公司生效，因此B选项正确。C选项，《民法》第549条规定：“有下列情形之一的，债务人可以向受让人主张抵销：（一）债务人接到货转让通知时，债务人对让与人享有债权，且", chapter: "第六章 合同的转让"},
  {id: 167, topic: "专题二 民法典合同编", type: "multiple", question: "甲欠乙10万元，后乙通知甲将该债权转让给丙。甲接到该通知时，乙欠甲5万元，并且甲的债权先于转让的债权到期。根据民法典合同编的规定，下列说法哪些是正确的？", options: {"A": "本案中乙的债权转让对甲发生效力", "B": "本案中乙的债权转让不对甲发生效力", "C": "甲可以向乙主张抵销", "D": "甲可以向丙主张抵销"}, answer: "AD", explanation: "。A、B选项，根据《民法臭>铭S46条第1放的规定，价权人转让价权，通加债务人，对债务人发生效力，梁集转让属平合同权利转让，通知即生效，因北A选项逐确，B选项借况。C.D选项，飛据《民法典》第551条第1款的规定，货务人将债务转移倍第三人的，应当经债权人同意，旅行公司转让属于合同义务转让，需零征得权利人韩某的同意才能生效，因此C选项借误，D选项正确。（新编）", chapter: "第六章 合同的转让"},
  {id: 168, topic: "专题二 民法典合同编", type: "multiple", question: "乙公司欠甲公司30万元，于2020年9月20到期。同时甲公司须在2020年9月20日清偿对乙公司的20万元货款。甲公司在同年9月18日与丙公司签订书面协议，转让其对乙公司的30万元债权。同年9月24日，乙公司接到甲公司关于转让债权的通知后，便主张20万元的抵销权。下列说法哪些是正确的？多选）", options: {"A": "甲公司与丙公司之间的债权转让合同于9月24日生效", "B": "乙公司接到债权转让通知后，即负有向丙公司清偿30万元的义务", "C": "乙公司可以向丙公司主张20万元的抵销权", "D": "丙公司可以就30万元债务的清偿，要求甲公司和乙公司承担连带责任"}, answer: "ABC", explanation: "。A选项，《民法典>第548条规定：“货务人接到债权转让通知后，货务人对让与人的抗辩，可以向受让人主张”，因此A选项符合法律规定。B选项，很据《民法典）第549条的规定，债务人对让与人享有的债权，且债务人的债权先于转让的债权到期，债务人可以向受让人主张抵销，因此B选项符合法律规定。C选项，债务人的债权和转让的债权是基于同一合同产生的，因此C选项符合法律规定。D选项，债权人甲转让债权不需要债务人乙同意，通知即生效，因此D选项不符合法律规定。（新缩）", chapter: "第六章 合同的转让"},
  {id: 169, topic: "专题二 民法典合同编", type: "multiple", question: "梁某与甲旅游公司签订合同，约定梁某参加甲公司组织的旅游团赴某地旅游。旅游出发前15日，梁某因出卷通知甲公司，由韩某警代银用旅游。到达限行地后，为保证游客更好体验当地风情，未正得韩某同意，甲公司将其旅游业务转给当他的乙公司。下列郡些表述是正确的？", options: {"A": "山于梁某与甲公司之间签订的合同并未约定不得转让，因此梁某通知甲公司即发生合同转让效力", "B": "由于梁某与甲公司之间签订的合同并未约定不得转让，因此梁某应当与甲公司协商一致后合同转让才生效", "C": "为保证游客更好地体验当地风情，甲公司将其旅游业务转给当地的乙公司，转让有效", "D": "甲公司未与韩某协商，甲公司将其旅游业务转给当地的乙公司不生效"}, answer: "ABC", explanation: "。《民法典》第552条规定：“第三人与债务人约定加入债务并通知债权人，或者第三人向债权人表示愿意加入价务，债权人未在合理期限内明确拒绝的，货权人可以请求第三人在其愿意承担的债务范围内和债务人承担连带债务”，丙公司加入甲公司的债务，通知债权人乙公司时对乙公司生效，甲公司、丙公司示担连带债务，因B、C选项正确，D选项销误。（新编）", chapter: "第六章 合同的转让"},
  {id: 170, topic: "专题二 民法典合同编", type: "multiple", question: "2021年2月1日，甲、乙签订买卖合同并约定半个月后同时履行。合同到期后，甲延迟一周交货，乙收到货物后未付货款10万元。2021年3月1日，甲与丙签订合同，将甲对乙的10万元债权转让给丙。2021年3月3日甲就转让通知乙。根据《民法典》的相关规定，乙的哪些主张符合法律规定：", options: {"A": "乙向丙提出只支付6万元，因为甲交付的货物有40%不合格", "B": "乙提出因甲欠乙4万元债务，且于2021年2月15日到期，因此只需支付丙6万元", "C": "乙主张只需支付6万元，因为合同约定，如果延迟履行合同，甲应当承担4万元违约金", "D": "乙提出因甲并未与其协商即转让债权，转让无效，只能按照合同约定向甲偿还"}, answer: "AB", explanation: "。在甲公司与因公司约定1可加入甲公司对乙公可的值务。该值！担协议自通知乙公司时对乙公可有放。此、A选项正确，D选项错误。中公可人公司约定丙公司加入甲公司对乙公可的务，但只永诺还100万元。因此，第三人公司仅在100万元范困内和价务人甲么一起对债权人乙公句承担述业贵任。用公司偿还了50万元。因此，乙公句有和求丙再支付50万元而非150万元。因此选项正确，C选项错误。（法考2020，甩扩展）终止", chapter: "第六章 合同的转让"},
  {id: 171, topic: "专题二 民法典合同编", type: "multiple", question: "丙公司办公室改建装修，由甲装修公司包工包料进行施工，合同款首付10万元，验收合格后再支付10万元。装修开始后，丙并未支付首付款。甲公司向乙公司购买10万元建材，用于丙公司装修使用，约定货到付款。但是货运到后，甲公司未付款。乙公司向甲公司催款，甲、丙向乙联合发函：丙公司同意就10万元建材款承担还款责任。乙公司收到函件后、未进行回应。根据民法典的相关规定，以下说法哪些是正确：", options: {"A": "乙公司可以就其债权向甲公司主张偿还", "B": "乙公司可以就其价权向丙公司主张偿还", "C": "乙公司可以要求甲、丙承担连带价务", "D": "由于乙公司未同意丙公司还款，基于合同相对性，只能请求甲公司偿还债务"}, answer: "ABD", explanation: "。A选项；《民法典》第S57条2款规定：“合同解除的，该合同的权利义关系终止”，因此A选项正确。B选项，法典》第567条规定：“合同的权利义务关终止，不影响合同中结算和清理条款的力”，因此B选项正确。C、D选项，《民法第566条第：1款规定：“合同解除后，尚未行的，终止履行；已经履行的，根据履行情和合同性质，当事人可以请求恢复原状成采取其他补救措施，并有权请求赔偿损失因此C选项错误，D选项正确。（2015改编）", chapter: "第六章 合同的转让"},
  {id: 172, topic: "专题二 民法典合同编", type: "multiple", question: "申公司欠乙公司200万元货款，甲公司与丙公司约定丙公司加人甲公司对乙公司的债务，但只承诺还100万元，并及时将情况通知了乙公司，乙公司表示同意，后丙公司偿还了50方元。根据《民法典》，下列哪些选项是正确的？", options: {"A": "该务承担协议自通知乙公司时对乙公司有效", "B": "乙公司有权请求丙再支付50万元", "C": "乙公司有权请求丙支付150万元", "D": "该务承担协议自乙公司同意时对乙公司有效"}, answer: "CD", explanation: "。A选项，《民法典》第565条第款规定：“当事人一方未通知对方，直接以起诉讼或者申请仲裁的方式依法主张解目合同，人民法院或者仲裁机构确认该主习的，合同自起诉状副本或者仲裁申请书副送达对方时解除”，A选项缺少“人民法院目专顾二民法典合回编认读解除合可的生张”的前提，因此A违项借误。日途项，非集与乙公可之间的转让及变更平合法合虎，不属千可欧销的民单法体行力：因此B选项借误。C选项，《民法类》诺563集诺1款规定：“有下列情形之一的，单人可以解除合同：·.（二）在质行财限届游前，当事人一方明确示成省以自已的行力农明不履行坐要价务“常袋在甲公司支付转让费启，停谈专利权转让价乙公可并办理完成专利权人变更乎馈，以自已的行为表明不履行对甲公司的债务，甲公可可以单方解除读专利权转让合同，因北C选项正确。D选项，根据《民法典》第566条第2款的规定，甲公可和带某之同的转让合同因学集的违约除，甲公可可以请求帮某承扭造约货任，因此D选项正确。（新编）", chapter: "第六章 合同的转让"},
  {id: 173, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，关于合同解除的效力，下列哪些说法是正确的？", options: {"A": "合同解除的，合同的权利义务关系终止", "B": "合同的权利义务关系终止不影响合同中结算和清理条款的效力", "C": "合同解除后，已经履行的，当事人必须恢复原状", "D": "合同解除后，尚未履行的，终止履行"}, answer: "ABD", explanation: "。《民法奥》第563条第1效规定：“有下列情形之一的，当事人可以解除合同：（一）因不可抗力致使不能实现合同目的：（二）在履行期限届满之前，当事人一方明确表示或者以自己的行为表明不履行主要货务：（三）当事人一方退延履行主要债务，经催告后在合理期限内仍未厦行：（四）当事人一方退延履行债务或者有其他违约行为致使不能实现合同目的：（五）法律规定的其他情形”，因此A、B、D选项属于解除合同的情形，C选项不符合解除合同的条件。（2019）", chapter: "第七章 合同的权利义务终止"},
  {id: 174, topic: "专题二 民法典合同编", type: "multiple", question: "李某和甲公司签订专利权转让合同。合同约定，李某将其名下的专利权转让给甲公司，甲公司支付转让费100万元。在甲公司支付转让费后，李某将该专利权转让给乙公司并办理完成专利权人变更手续。根据民法典合同编的规定，下列哪些说法是正确的？", options: {"A": "甲公司直接以提起诉讼的方式依法主张解除其与李某签订的专利权转让合同的，合同自起诉状刷本送达幸某时解除", "B": "甲公司可以请求人民法院微销李某将专利权转让给乙公司的行为", "C": "申公司可以单方解除其与李某签订的专利权转让合同", "D": "甲公司与李某签订的专利权转让合同解除后，甲公司可以请求李某承担违约责任"}, answer: "ABD", explanation: "。A选项，在尚未导致不能实现合同目的的状况下，甲延迟履行主要债务，乙应当先向甲催告，未催告情形下乙无权解除合同。B选项，合同主要债务已经履行，合同目的已经实现，一方当事人无权解除合同。C选项，电视机没有声音致使不能实现合同目的，一方当事人有权解除合同。D选项，电视机屏幂有坏点可以要求更换，不会致使不能实现合同目的，一方当事人无权解除合同。（2018改编）", chapter: "第七章 合同的权利义务终止"},
  {id: 175, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，有下列哪些情形之一的，当事人可以解除合同？多选）", options: {"A": "因不可抗力致使不能实现合同自的", "B": "当事人一方迟延履行主要债务，经催告后在合理期限内仍未履行", "C": "当事人一方不完全履行，但不影响合同目的的实现", "D": "在履行期限届满之前，当事人一方明确裘示或者以自己的行为表明不履行主要债务"}, answer: "AC", explanation: "。A选项，由于合同尚未到期，甲已将合同的标的物卖给了第三方丙，在甲乙之间的合同到期后，甲无法履行合同，因此甲的行为属于预期违约，人选项正确，选项，甲以自已的行为表明不履行生享多务，乙可以在到期之前除合同，因是项佣误，C选项正确。D遗项，甲与丙之同合同已展行完毕，且不存在《民法身）中知的无效情形：合同是有效的，因此D项年误。（2018）", chapter: "第七章 合同的权利义务终止"},
  {id: 176, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列哪些情况下，一方当事人无权解除合同？", options: {"A": "甲、乙签订钢材购销合同，约定甲在11月1日前向乙交付钢材500吨，货到付款。当过了11月1日，甲仍未向乙履行交付义务", "B": "甲、乙签订钢材购销合同，约定甲在11月1日前向乙交付钢材500吨，货到付款。11月1日，甲向乙交付钢材450吨，剩余50吨经催告后，仍未予交付", "C": "甲从商店购买电视机一台，回家后发现图像正常，但没有声音", "D": "甲从商店购买电视机一台，回家发现品质良好，只是画面边角处有一个“坏点”"}, answer: "BD", explanation: "。本题中，因甲向场到农历八》十五时仍未收到月饼，政使不能实现合同目的，甲商场可以解除合间，但是皮当通知乙食品厂，解除合同后，甲商场可以婴求乙化品厂承担违约费任，因此人、C选项错议，BD选项正确。（2008）", chapter: "第七章 合同的权利义务终止"},
  {id: 177, topic: "专题二 民法典合同编", type: "single", question: "甲、乙订立房屋买卖合同，约定在1个月后甲将其自己的房屋过户登记给乙。但在交房日期到来之前，甲将该房高价出卖给了丙，并且办理了过户登记，下列哪些说法是正确的？2020年专利代现所并格考试", options: {"A": "甲的行为构成预期违约", "B": "乙只能在合同规定的交房日期到来后要求甲承担违约资任", "C": "乙有权解除与甲的房屋买实合同", "D": "甲与丙签订的房屋买卖合同无效"}, answer: "B", explanation: "。根据《民法典》第563条第1款的规定，因不可抗力致使不能实现合同目的的，当事人可以解除合同，农场因发生异司干早颗粒无收属于因不可抗力致使不能3现合同目的，因此农场可以单方解除合同，A选项错误，B选项正确。C选项，合同交更带要当事人协商一致，粮食加工厂不能单方变更合同，C选项错误。D选项，《民法典》580条第1款规定：“当事人一方不履行非会钱债务或者履行非金钱债务不符合约定的，对方可以请求履行，但是有下列情形之一的除外：（一）法律上或者事实上不能履行：（二）债务的标的不适于强制履行或者履行费用过商：（三）债权人在合理期限内未请京履行。”本题中属于事实上不能履行的情形。因此，粮食加工厂不能要求农场继续履行。D选项错误。（新编）", chapter: "第七章 合同的权利义务终止"},
  {id: 178, topic: "专题二 民法典合同编", type: "multiple", question: "甲商场为在中秋节前销售月饼、与乙食品厂签订了一份月饼供销合同，约定乙食品厂在农历八月初五交货。后乙食品厂因人员变动等原因，未能按照约定及时交货。甲商场到农历八月十五时仍未收到月饼。对此，下列哪些说法是正确的？", options: {"A": "甲商场可以解除合同，但必须征得乙食品厂同意", "B": "甲商场可以解除合同，但是应当通知乙食品厂", "C": "甲商场不得解除合同，因为未向乙食品厂进行催告", "D": "甲商场可以要求乙食品厂承担违约责任"}, answer: "AD", explanation: "。《民法典》第568条规定：“当事人互负债务，该债务的标的物种类、品质相同的，任何一方可以将自己的债务与对方的到期债务抵销；但是，根据债务性质、按屋当事人约定或者依照法律规定不得抵销的际外。当事人主张抵销的，应当通知对方。通知自到达对方时生效。抵销不得附条件或者附期限”。本题中，甲公司欠乙商场的货款和乙商场欠甲公司的装修费都属于金债务，债务性质相同，可以主张抵销：申公司专隧二民法典合同编半张错应班加乙商进，无前住萨乙商间唐，出A、D造价正B、C连准借谈。（20tt改）时，", chapter: "第七章 合同的权利义务终止"},
  {id: 179, topic: "专题二 民法典合同编", type: "multiple", question: "东北某农场和某粮食加工厂于2021年2月签订稻谷购销合同，约定农场于2021年12月底向加工厂供应稻谷1000吨，货到后付款。后农场因当地在2021年发生异常干阜而导致颗粒无收，无法履行供货合同。在此情形下，下列说法哪项是正确的？", options: {"A": "农场可以单方中止履行合同", "B": "农场可以单方解除合同", "C": "粮食加工厂可以单方变更合同", "D": "粮食加工厂可以要求农场继续履行合同"}, answer: "AC", explanation: "。A递项，乙以空谢市历仪收疗总法由世危史领的行方属平无正将理世世地处馈，甲听以提体，因比人逸质正喻。B、C选质：携存启的成资以及提存购用应当由乙来俱，调此B选货借，C连项正项，D连价，其若自提存之日是S年内乙不價取坚时，悦情况决定空归甲所有或者归国策所督，因此D途项借供。（法单2003）资任", chapter: "第七章 合同的权利义务终止"},
  {id: 180, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司欠乙商场货款12万元，同时乙商场应付甲公司装修费12万元。现甲公司欠款到期，甲公司欲以已到期的装修费冲抵货款。根据民法典合同编及相关规定，下列说法哪些是正确的？多选）", options: {"A": "甲公司可以将自己的债务与乙商场的债务抵销", "B": "双方债务性质不同，不得抵销", "C": "甲公司主张抵销的，须经乙商场同意", "D": "甲公司主张账前的、应当通知乙而坊"}, answer: "ABCD", explanation: "。《民法奖>第510条规定：“合同生放后，当事人统质业、价款或者报酬、厦行地点等内容没有约定或者约定不明确的，可以协以补完：不能达成补充协以的，按照合同相关条款或交易习惯确定”，《民法失》第582条规定：“履行不符合约定的，应当按凰当事人的约定承担违约责任。对造约贵任没有约定或者约定不明确，依据本法第510条的规定仍不能确定的，受损害方根据标的的性质以及损失的大小，可以合理选择请求对方承担侈理、重作、更换、退货、减少价款或者报酬等违约资任”，因此A、B、C、D选项均正确。（新编）", chapter: "第七章 合同的权利义务终止"},
  {id: 181, topic: "专题二 民法典合同编", type: "multiple", question: "甲与乙签订销售空调100台的合同.但当甲向乙交乙以空调市与软为由，拒绝荣领，要求甲送还货款。下挪型是正确的？多造）", options: {"A": "甲可以向有关部们提存这批空调", "D": "若自提存之日起5年内乙不领取空调，则归甲所有", "C": "提存费用应由乙支付"}, answer: "ACD", explanation: "。A、B、C选项，《民法典>第S7T条规定：“当事人一方不履行合同义务或者履行合同义务不符合约定的，应当承担继续履行、采取补救措施或者赔偿损失等违约资任”，因此A、B、C选项正确。D选项，《民法典》第585条第1款规定：“当事人可以约定一方违约时应当根据违约情况向对方支付一定效额的违约金，也可以约定因违约产生的损失赔偿额的计算方法”，因此D选项正确。（2012）", chapter: "第七章 合同的权利义务终止"},
  {id: 182, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，关于违约资任，下列说法哪些是正确的？", options: {"A": "合同对违约责任没有约定的，当事人可以签订补充协议", "B": "合同对违约责任没有约定又无法依法确定的，可以合理选择请求对方承担减少价款或者报酬等违约责任", "C": "合同对违约责任约定不明确又不能达成补充协议的，可以按照交易习惯确定", "D": "合同对违约责任没有约定又无法依法确定的，可以合理选择请求对方承担修理、重作、更换、退货等违约责任"}, answer: "ABCD", explanation: "。《民法典》第580条第1款规定：“当事人一方不履行非金钱债务或者履行非金钱债务不符合约定的，对方可以请隶规行，但是有下形之一的除外：（一）法律上或者事实上不能局与（二）债务的标的不适于强制履行战者履行费凡！商：（三）债权人在合理期限内未请求履行“，A、B、C、D选项均正确。（2017）", chapter: "第八章 违约责任"},
  {id: 183, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列关于违约责任的哪些说法是正确的？多选）", options: {"A": "当事人一方不履行合同义务的，应当承担违约责任", "B": "当事人一方履行合同义务不符合约定的，应当承担违约责任", "C": "承担违约责任的方式包括继续履行、采取补救措施、赔偿损失等-57.-2020年利代理邮其格考式", "D": "当事人可以约定一方违约时应当根据违约情况间对方支付一定数额的违约金，也可以约定因违约产生的损失赔偿额的计算方法"}, answer: "ABC", explanation: "。A选项，《民法典》第577条朔定：事人一方不履行合同义务或者履行合同义务不合约定的、应当示担他续履行、呆取补收增隐度赔偿损失等违约费任”，乙公句履行义务不特合定，甲公司有权求继续履行并支付违约会，因A选项正确。B、D逃项，根据《民法典》第563条值款的规定，当事人一方退延履行价务或者有其价约行为致使不能实现合同目的的，当事人可以合同，因此B选项正确，D选项错误。C选项，（民典》第566条第12欺规定：“合同解除后，尚未团的，终正履行；已经履行的，根据履行情况和合自质，当事人可以请求恢复原状或者采取其他补变施，并有权请求赔偿损失。合同因违约解除的除权人可以请求违约方承担违约责任，但是当习另有约定的除外”，因此C选项正确。（2008）", chapter: "第八章 违约责任"},
  {id: 184, topic: "专题二 民法典合同编", type: "single", question: "根据民法典合同编及相关规定，合同当事人一方不履行非金钱价务的，下列哪些情形下，另一方当事人不能要求其继续履行？多选）", options: {"A": "该债务的标的不适于强制履行", "B": "债权人在合理期限内未要求履行", "C": "该债务在法律上不能履行", "D": "该债务在事实上不能履行"}, answer: "A", explanation: "。《合同编通则解释》第65条规定：“约1违约金超过造成损失的30%的；人民法院一般1认定为过分高于造成的损失。”本题中约定的金为18万元，未超过实际损失15万元的30%，成约定的违约金过分商于造成的损失的情形，E甲应向乙支付18万元违约金。违约金本身就：偿损失、支付其他费用的作用，且已涵盖15万：损失，支付18万违约金后，无需再赔偿其他损因此A选项正确，B、C、D选项错误。（法考2013）", chapter: "第八章 违约责任"},
  {id: 185, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司和乙公司签订合同，约定：由乙公司按照要求为甲公司制造专用机床一台，甲公司预付款300万元，一方违约的应当向另一方支付违约金。机床交付后，经多次调试，仍不能实现合同目的。据此，下列哪些说法是正确的？多选）", options: {"A": "甲公司有权要求乙公司继续履行合同并支付违约金", "B": "因无法实现合同目的，甲公司有权要求解除合同", "C": "甲公司要求解除合同的，有权要求乙公司返还预付款并赔偿损失", "D": "合同已经履行完毕，甲公司无权要求解除合同"}, answer: "AD", explanation: "。《民法典》第588条第1款规定：“当：既约定违约金，又约定定金的，一方违约时，对：以选择适用违约金或者定金条款”；《民法典》第条规定：“债务人履行债务的，定金应当抵作价：者收回。给付定金的一方不履行债务或者履：务不符合约定，致使不能实现合同目的的，无.求返还定金；收受定金的一方不履行债务或者专隧二民法典合回价体不作合所定：实使不能类成合间自的的，应蓝双倍退还定金”。逃街金和定会个以摊共一，不傲间叶匠用，收变是金的一方乙公可不晨柠价券，使不他其就合同甘的的，世当状借选连定金，回此A、D连质正质：B、C连项借供。（2010收）", chapter: "第八章 违约责任"},
  {id: 186, topic: "专题二 民法典合同编", type: "multiple", question: "甲乙签订一份买卖合同，约定违约方应向对方支付18万元违约金。后甲违约，给乙造成损失15万元。下列哪一表述是正确的？(单选）", options: {"A": "甲应向乙支付违约金18万元，不再支付其他费用或者赔偿损失", "B": "甲应向乙赔偿损失15万元，不再支付其他费用或者赔偿损失", "C": "甲应向乙赔偿损失15万元并支付违约金18万元，共计33万元", "D": "甲应乙偿脚失15万元皮其利息"}, answer: "ABC", explanation: "。根据《南法费>策S88靠第（款的规定：从借监还定金身支件遂均金不能同时进用，毕余造费佳承想券光舟平以并用，因此A、B、C逸货正确，D选项借供。（2017）", chapter: "第八章 违约责任"},
  {id: 187, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司与乙公司签订了一份购销合同，合同总价款为20万元，双方约定，一方进约的，需支付总价款3%的违约金，甲公司还依约定所乙公司支付了定金1万元。后乙公司未殿行合同约定的义。根民法典合同编及相关规定，下列说法挪些是正确的？", options: {"A": "甲公司可以婴求乙公司双借返还定金", "B": "甲公司只能要求乙公司支付违约金", "C": "甲公司可以要求乙公司双倍返还定金，同时支付违约金", "D": "甲公司可以选择适用定金或者违约金条款"}, answer: "AB", explanation: "。A.D途项，（民淤典）铭S93集规定：“当事人一方因铭当人的康因造成选均的，底当货法府财方承据违约费任”因乙公何的原因导甲公可对带集造街的，应山甲公司向带集承推造街费任，因此A选项正确，D途项借供。B、C选项，《民典》第590条规定：”些事人一方因不可抗力不能展行合同的，报据不可抗力的影响，部分或者全部免除费任，但是法你另有规定的除外。因不可抗力不能履行合同的，应当及时通知对方，以减轻可能给对方造成的摄失，并应当在合理期限内是供证明。当事人运延履行后发生不可抗力的，不免除其违约责任。”，突通山洪属干不可抗力因素，但乙公司晚于甲公司要求的时间开始运输，属干退延履行，不能免除其选约责任，因此B选项正确，C选项错误。（新编）", chapter: "第八章 违约责任"},
  {id: 188, topic: "专题二 民法典合同编", type: "single", question: "根据民法典合同编及相关规定，下列哪些属于可以并用的违约责任承担方式？多选）", options: {"A": "继续履行与赔偿损失", "B": "继续履行与支付违约金", "C": "采取补救措施与赔偿损失", "D": "双倍返还定金与支付违约金"}, answer: "A", explanation: "。《民法典》第593条规定：“当事人一方因第三人的原因造成违约的，应当依法向对方承担违药资任。当事人一方和第三人之间的纠纷，依煎法律规定或者按照约定处理”。本题中，汽车买卖合同的当事人双方为甲公司和乙公司，因此当甲公司无法交货，乙公司有权请求甲公司承担违约责任，甲公司可以按照零部件买卖合同要求丙公司承担违约资任，丙公司可以按照运输合同要求丁公司承担违约资任，因此A选项正确，B、C、D选项错误。(2017)", chapter: "第八章 违约责任"},
  {id: 189, topic: "专题二 民法典合同编", type: "single", question: "2022年9月1日，李某在网站上购买甲公司的商品，同年9月2日，甲公司将该商品交付承运人乙公司，要求乙公司于同年9月7日前将该商品送达李某。乙公司迟至同年9月8日开始运输，同年9月9日，乙公司在运输过程中因突巡山洪导致该商品灭失。根据民法典合同编的规定，下列说法哪些是正确的？多选）", options: {"A": "甲公司应当向李某承担违约责任", "B": "乙公司不得免除违约责任", "C": "乙公司可以部分或者全部免除违约责任", "D": "甲公司和乙公司应当向李某承担违约责任"}, answer: "C", explanation: "。根据《民法典》第586条第2款规定，定金的数额由当事人约定；但是，不得超过主合同标的额的20%，翅过部分不户生定会的力，实久付的定金数期多于成非少于约定数额的，税为变贝约定的定金数额。本期中、实际支付定金15万元，并朱超出主合同的20%，以实标文付定金为准。乙公可收受定金后一直未交货，致使不能实现分局的，甲公司可请求乙公司或还双信的定舍即20万元，因此C通项正确。（新编）", chapter: "第八章 违约责任"},
  {id: 190, topic: "专题二 民法典合同编", type: "single", question: "北京甲公司和上海乙公司签订汽车买卖合同，约定甲公司组装生产并向乙公司出售500辆汽车。甲公司递与内公司签订零部件买奖合同.向丙公司购买组装生产汽车所需要的车轮。丙公司与丁公司签订车轮的运输合同，运输途中，由于丁公司驾驶员的疏忽发生交通事故致货物受损，由此导致甲公司无法交货。根据民法典合同编及相关规定，下列哪种说法是正确的？", options: {"A": "乙公司有权请求甲公司承担违约资任", "B": "乙公司有权请求丙公司承担违约责任", "C": "乙公司有权请求丁公司承担违约责任", "D": "乙公司有权请求丁公司驾驶员承担违约责任"}, answer: "C", explanation: "。根据（民法典》第586条、角587线义：“定金的数额由当事人约定1但是，不得超过里合同标的额的20%，超过部分不产生定金的效力。实际交付的定金数额多于或者少于药定数额的，键为变更药定的定金数额。债务人履行债务的，定金应当抵作价款或者收回。给付定金的一方不履行债务或者履行债务不符合约定，致使不他实现合同目的的，无权请求返还定金；收受定金的一方不是行债务或者履行债务不符合约定，致使不能实现合同目的的，应当双倍返还定金。“本题中甲交付给乙的15万元定金超过合同标的的20%，仅只有10万元认定为定金，另外5万元不发生定金效力，在乙违约后双倍退还定金应当退还20万定金，加上5万元，共计应当退还25万元。因此C选项正确。（新编）", chapter: "第八章 违约责任"},
  {id: 191, topic: "专题二 民法典合同编", type: "single", question: "甲公司向乙公司购买价值100万元的货物。合同约定由甲公司向乙公司支付定金10万元，甲公司支付定金15万元。后乙公司未交货，致使不能实现合同目的。根据民法典合同编的规定，甲公司能请求乙公司返还的定金数额是？", options: {"A": "10万元", "B": "15万元", "C": "30万元", "D": "20万元"}, answer: "A", explanation: "。A、D选项，詹某与小翠之间成立合同关系，小翠无正当理由未履行一个月的钢琴投课合同义务，应当承担违约责任。根据《民法典》第581条规定：“当事人一方不履行货务或者履行债务不符合约定，根据债务的性质不得强制履行的，对方可以请求其负担由第三人替代履行的费用。”据此，小翠无正当理由未对詹某履行提供钢琴投课的合同义务，借某可请求第三人履行该义务，并请求小翠承担相应的费用。因此A项正确，D项错误。BC选项，根据《民法典》第584条规定：“当事人一方不履行合同义务或者履行合同义务不符合约定，造成对方损失的，损失赔偿额应当相当于因违约所通成的损失，包括合同履行后可以获得的利益；但是不得超过违约一方订立合同时预见到或者应当五专二民法典合回编其到的因进片才进成的携失。“未题中，小准进时给詹基资成的只骨董境携失（詹基支山的谈借2000元），无叶体付查价失。同时，满格博向小詹提供销禁恢课与小第向小詹他供销季便课，均他送列相间的清借发票，詹集来因北道受惯失。因北，个禁应对詹集采俱造身携步赔售他围仅方2000元。（法考", chapter: "第八章 违约责任"},
  {id: 192, topic: "专题二 民法典合同编", type: "single", question: "甲与乙签订一份货款为人民币50万元的买卖合同，并依约定交付给乙定金人民币15万元。后乙违约没有履行该合同。乙应返还给甲人民币？", options: {"A": "10万元", "B": "20万元", "C": "25万元", "D": "30万元"}, answer: "B", explanation: "维护展）", chapter: "第八章 违约责任"},
  {id: 193, topic: "专题二 民法典合同编", type: "single", question: "詹某将房屋租给音乐生小翠，约定小翠教詹某儿子小詹弹钢琴，每晚一小时，课时费抵房租。上了几个月的课后，小翠消失了一个月，詹某只能另请洪老师上课，一个月课时费2000元。一个月后小翠回来，詹某可以向小翠主张多少数额的违约责任？单选）", options: {"A": "其支出的课酬2000元", "B": "当蜓音乐生的平均课酬3000元", "C": "当越平均房包4000元", "D": "小菜无细支付任何费用"}, answer: "A", explanation: "本题考查违约损害赔偿的计算。根据《民法典》第584条，当事人一方不履行合同义务或者履行合同义务不符合约定，造成对方损失的，损失赔偿额应当相当于因违约所造成的损失，包括合同履行后可以获得的利益。詹某因小翠违约而另行请老师上课，支出2000元课酬，此为实际损失，应作为违约赔偿数额。因此，A选项正确。（新编）", chapter: "第八章 违约责任"},
  {id: 194, topic: "专题二 民法典合同编", type: "multiple", question: "幸某在吉院店发规刘某以「万元出售一只清代烟壶，李某知道这壹是一对。收藏家胡果寻求另一只正以10万元报价在古园内收购，幸集与刘某达成协议以1万元购买，于3日后付款，并向刘某支付5000元定金。零某前往胡某家中以10万元达成协以，3日内交货，胡某向零某支付2万元定金。3日后刘某取出时不小心将紫烟壶碎。关于本案，下列哪一说法是正确的？", options: {"A": "刘某只需将定金返还给李某", "B": "刘某应当向李某返还5000元双倍定金", "C": "刘某应当向李某返还7000元定金", "D": "李某应当向胡某返还20000元双倍定金"}, answer: "ABD", explanation: "。A选项，房地产公司展示的模型与小区实际设计不符，构成对赵某的欺诈，因此购房合同属于可销合同，赵某有权要求退房，A选项正确。B、D选项，撤销后有过错的房地产公司应承担缔约过失责任，如果赵某不中请撤销，则可以违约为由，请求房地产公司承担违约责任，因此B、D选项正确。C选项，买卖合同的解除或者撤销均无双倍返还的规定，因此C选项错误。（新编）合同", chapter: "第八章 违约责任"},
  {id: 195, topic: "专题二 民法典合同编", type: "multiple", question: "喜好网球和游泳的赵某从某房地产公司购买某小区商品房一套，交房时发现购房时该公司售楼部所展示的该小区模型中的网球场和游泳池并不存在。经查，该小区设计中并无网球场和游泳池。根据民法典合同编及相关规定，下列说法正确的是？多选）", options: {"A": "因房地产公司的行为构成欺诈，赵某有权要求退房", "B": "赵某如不要求退房，有权请求该房地产公司承担违约责任", "C": "赵某如要求退房，有权请求该房地产公司双倍返还购房款", "D": "赵某如要求退房，有权请求该房地产公司承担缔约过错责任2020年利代理所并格考供"}, answer: "BD", explanation: "。根据《民法典》所确定的有尔合同典：19种、具体包括：买实合同、供用电、水、气、然为同，赠与合间，借款合同，保证合间，租货合同，租货合同，保理合同，承揽合同，建设工报合同，输合同、技术合间，保管合同，仓储合同，委托合目物业服务合同，行纪合同，中介合同，合伙合同，此B、D选项正确，A、C逃项借误。（2018）", chapter: "第八章 违约责任"},
  {id: 196, topic: "专题二 民法典合同编", type: "multiple", question: "下列哪些合同属于《民法典》中规定的有名合同？", options: {"A": "合作经营合同", "B": "融资租赁合同", "C": "劳务派遗合同", "D": "技术合同"}, answer: "BCD", explanation: "。A遇项，根据《民法典》第859、860的规定，当事人之间可以约定申请专利的权利，！约定优先，因此A选项技术合同有效。B、C、D：项，《民法典》第850条规定：“非法垄断技术或者1害他人技术成果的技术合同无效”，《最高人民法！关于审理技术合同纠纷案件适用法律若干问题解释》第10条规定：“下列情形，属于民法典第8！条所称的·非法垄断技术：…（二）限制当事人方从其他来源获得与技术提供方类似技术或者.其竞争的技术（四）要求技术接受方接受并：实施技术必不可少的附带条件，包括购买非必得！技术、原材料、产品、设备、服务以及接收非必密自人员等…（六）禁止技术接受方对合同标的技知识产权的有效性提出异议或者对提出异议附分条件”，因此B、C、D选项中技术合同均无效。（200改编）", chapter: "第九章 技术合同"},
  {id: 197, topic: "专题二 民法典合同编", type: "single", question: "根据民法典合同编的规定，下列哪些技术合同无效？", options: {"A": "甲公司与乙公司签订的技术开发合同，约定就开发完成的发明创造申请专利的权利属于甲公司", "B": "丙公司与丁公司签订的技术服务合同，约定丁公司不得从其他公司获得类似技术或者其他竞争性技术", "C": "戊公司与已公司签订的技术转让合同，约定已公司购买与实施该技术无关的大型设备五台", "D": "庚公司与辛公司签订的专利实施许可合同，约定辛公司不得对该专利提出无效宜告请求"}, answer: "B", explanation: "。《民法典》第850条规定：“非法垄断技和或者侵害他人技术成果的技术合同无效”。A过项，技术转让合同标的为他人技术秘密，属于侵害他人技术成果的技术合同，合同无效，因此甲公司应当承担缔约过失责任，除返还乙公司支付的对价，还应当赔偿乙公司因此受到的损失，A选项错误。《最高人民法院关于审理技术合同纠纷案件适用法律若干问题的解释》第12条规定：“根据民法典第850条的规定，侵害他人技术秘密的技术合同专随二民法典合回健确认无效府：除法体，行改法展定件规定的以外：等度联阵读长术协管的一方当本人叶以企比放作叶的尚团内腾医使用滨使来传世：但应当身快科人支仟合唐府侠用算并来世依借义养。“B通项：世千七公可本中公可传让的快术债管使府公时府快米成展并不册情且文停了合磨对价：属于善房限件，乙公司呼以在地联得时的范国内應使用该米防：但虚向内公可支停合限的使用，四北B选项正确。C、D选项，甲公可身乙公司雀的收长普转让合同因使事诱公可的术成果府光效，乙公司财甲公可递过不正当币伙从请公司谈得术杨诺并不知情，展善宽的，偿权费任应自让与人甲公司单德承想，面非非有甲公司和乙公司向附公司承扭连带党任，因此C、D选项借误。（新编）", chapter: "第九章 技术合同"},
  {id: 198, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司向乙公司转让了一项技术秘密。技术转让合同履行完毕后，经查该技术秘密是甲公司通过不正当手段从丙公司获得的，但乙公司对此并不知情，且支付了合理对价。下列哪项说法是正确的？", options: {"A": "乙公司有权要求甲公司返还其支付的对价，但不能要求甲公司赔偿其因此受到的损失", "B": "乙公司可在其取得时的范围内继续使用该技术秘密，但应向丙公司支付合理的使用费", "C": "技术转让合同无效，甲公司和乙公司应向丙公司承担连带责任", "D": "技术转让合同有效，但甲公司应向丙公司承担侵权责任"}, answer: "BD", explanation: "。《民法实》第859条规定：“资托开发完成的发明创造，除法另有规定或当事人另有约定外，申请专利的权利属于研克开发人。研兜开发人取得专利权的，委托人可以依法实施该专利。研究开发人转让专利申请权的，交托人享有以同等条件优先受让的权利”。本题中，乙研完所为受托人，实际完成了研发，在甲公司和乙研究所没有约定的前提下，申请专利的权利属于乙研克所，若乙研究所的该专利申请被设予专利权，则甲公司可以依法实施该专利，若乙研究所转让该专利申请权，则甲公司享有以同等条件优先受让的权利，因此A、C选项错误，B、D选项正确。（2013改编）", chapter: "第九章 技术合同"},
  {id: 199, topic: "专题二 民法典合同编", type: "single", question: "甲公司委托乙研究所为其开发一钟技术，井签订了技术开发合同.但双方没有约定提术成果的归属，乙究所按约定文付丁符合要求的技术成果，甲公司按约定支付了胡究并发经费和提酬。后乙研究所就该技术成果交了专利申请。根民法典合同编及相关规定，下列哪些说法是正确的", options: {"A": "乙研究所就该技术成果申销专利的行为侵犯了甲公司就该技术成果申请专利的权利", "B": "乙研究所享有就该技术成果申请专利的权利，但若乙研究所转让该专利申请权，则甲公司享有以同等条件优先受让的权利", "C": "如果乙研究所的该专利申请被授予专利权，则甲公司未经乙研究所许可，不得以生产经营为目的实施该专利", "D": "如果乙研究所的该专利申请被授予专利权，则甲公司可以依法实施该专利"}, answer: "A", explanation: "。《民法实》第860条规定：“合作开发完成的发明创造，申请专利的权利属于合作开发的当事人共有；当事人一方转让其共有的专利中请权的，其他各方享有以同等条件优先受让的权利。但是，当事人另有约定的除外合作开发的当事人一方不同意申请专利的，另一方或者其他各方不得申请专利”，因此A选项正确，B、C、D选项错误。(2015)", chapter: "第九章 技术合同"},
  {id: 200, topic: "专题二 民法典合同编", type: "single", question: "张某和李某合作开发完成一项发明创造，但未约定权利归属。该项发明创造完成后，张某想要申请专利，而李某则想通过商业秘密保护，不同意申请专利。根据民法典合同编及相关规定，下列哪种说法是正确的？", options: {"A": "张某不得申请专利", "B": "张某可以申请专利，获得授权后专利权归张某和李某共有", "C": "张某可以申请专利，获得授权后专利权归张某所有，李某可以免费实施该专利", "D": "张某可以申请专利，获得授权后专利权归张某所有，但获得的收益应在两人之间分配"}, answer: "A", explanation: "。A、B、D选项，《民法典》第860条规定：“合作开发完成的发明创造，申请专利的权利属干合作开发的当事人共有当人一方让实专利申请权的，共他各力享有以何等务作优久的权利，但是，当事人另有约定的除外，台分的当事人一方市明放齐其共有的专利中请软！当事人另有约定外，可以由另一方单验中调其他各方共同中请。中请人取得专利权的，放利申请权的一方可以免费实施慎专利。合什的当事人一方不同意申请专利的、月一力或会各方不得申请专利”，因此A选项销议，B、D通确。C选项，（民法典》第863条邻3款规定：“转让合同和技术许可合同应当染用书面形式此C选项正确。（2018）", chapter: "第九章 技术合同"},
  {id: 201, topic: "专题二 民法典合同编", type: "multiple", question: "甲、乙订立合作开发协议，约定共同完成一项发明，但就该项发明的专利申请权未作约定，下列说法错误的是？2020年专利代理部先格考试", options: {"A": "如果甲不同意申请专利，乙可以自行申请", "B": "如果甲放弃申请专利，乙可以单独申请，但取得专利后，甲有免费使用的权利", "C": "如果甲准备转让其专利申请权、必须订立书面合同", "D": "如果甲准备转让其专利申请权、乙在同等条件下有优先受让的权利"}, answer: "AD", explanation: "。A选项，《民法典》第851条规定：1开发合同是当事人之问就新技术、新产品、新工新品种或者新材料及其系统的研究开发所订！合同。技术开发合同包括委托开发合同和合发合同”，甲公司委托乙公司完成技术开发，为引技术开发合同，因此A选项正确。B选项，甲、2司约定于未来订立设备买卖合同，为买卖合同的约，买卖合同尚未成立，不属于附条件的合同，因B选项错误。C选项，乙公司将设备出卖给丙公不违反法律规定的合同有效要件，其合同有效，此C选项错误。D选项，乙公司将设备出卖给两司，导致无法与甲公司订立买卖合同，构成预约同的违约，乙公司应承担违约资任，因此D选项确。（法考2017改编）", chapter: "第九章 技术合同"},
  {id: 202, topic: "专题二 民法典合同编", type: "multiple", question: "甲、乙两公司约定：甲公司向乙公司付5万元研发费用，乙公司完成某专用设备的研发生产后双方订立买实合同，将该设备出售给甲公司，价格暂定为100万元，具体条款另行商定。乙公司完成研发生产后，却将该设备以120万元实给丙公司，甲公司得知后提出异议。下列哪些选项是正确的？多选）", options: {"A": "甲、乙两公司之间的协议为技术开发合同", "B": "甲、乙两公司之间的协议系附条件的买卖合同", "C": "乙、丙两公司之间的买卖合同无效", "D": "甲公司可请求乙公司承担违约责任"}, answer: "BCD", explanation: "。A选项，相关法律法规没有对技术询合同来用的形式作出限制。B、C选项，（民法身第863条第3款规定：“技术转让合同和技术许可同应当采用书面形式”，因此B、C选项正确。Di项，（民法典》第851条第3款规定：“技术开发合1应当采用书面形式”，因此D选项正确。（2008改编", chapter: "第九章 技术合同"},
  {id: 203, topic: "专题二 民法典合同编", type: "single", question: "根据民法典合同编的规定，下列哪些合同应当采用书面形式？", options: {"A": "技术咨询合同", "B": "技术许可合同", "C": "技术转让合同", "D": "技术开发合同"}, answer: "D", explanation: "。A选项，《民法典》第863条第2、3款短定：“技术许可合同包括专利实施许可、技术秘密债用许可等合同。技术转让合同和技术许可合同应当采用书面形式”，因此A选项错误。BC选项，专避二民法典合同《民法集）举86S等质定：“专村安鼎作叶合间伙在资专科权的华读期展内件收。专村似有农所膜府满或普专利以资堂告无发的，专有以人不阶院设中错黄。D逸质，《民决费》带866靠境定：“专利觉虏降可合同的许可人应当偿展伤定可使才人学唐专利，交件实虏专利体笑的技术费料，提供必限的快术指导”因此D选项正响。（2017改）", chapter: "第九章 技术合同"},
  {id: 204, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列关于专利实施许可合同的哪种说法是正确的？", options: {"A": "专利实施许可合同可以采用口头形式", "B": "专利权有效期限届满的，专利权人仍然可以就该专利与他人订立专利实施许可合同", "C": "专利权被宣布无效的，专利权人仍然可以就该专利与他人订立专利实施许可合同", "D": "专利实施许可合间的许可人应当照约定作可波许可人实施专利，交付实他专利有关的技术贷料，是供必婴的技术指导"}, answer: "ACD", explanation: "。A虑项，《民决质>第863兼第3款比是：”使求转让合同和术毕可合同应当来用恰资形式”，因此A选项正崎。B途项《民决类>第875条规定：当事人审以偿照蓝利的限则，雀合同中街定实属节利、便用提术秘曾后续改进的性术成集的分事办货：没有均定或者钧定不明确，依据木法第510条的规定仍不能确定的，一万后续改进的技术成果，其他各方无权分享”，因此B途项错误。C选项，《民法典》第871条规定：“技术转让合同的受让人和技术许可合同的被许司人应当按履约定的范国和期限，对让与人、许可人提供的技术中尚未公开的密部分，承担保密义务”，因此C选项正确。D选项，《民法实》第865条规定：”专利实施许可合同仅在该专利权的存续期限内有效。专利权有效期限届满或者专利权被宜告无效的，专利权人不得就该专利与他人订立专利实施许可合同”，因此D选项正确。（新编）", chapter: "第九章 技术合同"},
  {id: 205, topic: "专题二 民法典合同编", type: "multiple", question: "供将民法典及相关规定，下列关于技术转让合同的邮些战法局正确的？", options: {"A": "技术秘密转让应当采用书而形式", "D": "专利实施许可合同只在该专利权的存续期限内", "C": "专利实施许可合同的被许可人应当按照约定的范围和期限，对让与人提供的技术中尚未公开的秘密部分，承担保密义务有效"}, answer: "AD", explanation: "。《民法典》第874条规定：“受让人或者被许可人按凰约定实施专利、使用技术秘密侵害他人合法权益的，由让与人或者许可人承担责任，但是当事人另有约定的除外”，如果甲乙公司之间对损害赔偿有约定，则按照约定进行赔偿，如果甲乙公司之间对损害赔偿没有约定，应由让与人乙公司向丙公司承担赔偿资任，因此A、D选项正确，B、C选项错误。（2019）", chapter: "第九章 技术合同"},
  {id: 206, topic: "专题二 民法典合同编", type: "single", question: "甲公司利用从乙公司受让的一项专利技术所生产的专利产品被丙公司指控为侵权，人民法院判决侵权成立，并要求甲公司赔偿损失2000万元。根据民法典合同编及相关规定，下列说法正确的是？多选）", options: {"A": "如果甲乙公司之间对损害赔偿没有约定，应由乙公司向丙公司承担赔偿责任", "B": "如果甲乙公司之间对损害赔偿没有约定，应由甲公司向丙公司承担赔偿责任", "C": "如果甲乙公司之间对损害赔偿没有约定，由甲公司、乙公司承担连带责任", "D": "如果甲乙公司之间对损害赔偿有约定，则按照约定进行赔偿"}, answer: "D", explanation: "。《民法典》第878条第1款规定：“技术咨询合同是当事人一方以技术知识为对方就特定技术项目提供可行性论证、技术预测、专题技术调查、分析评价报告等所订立的合同”，因此A.BC员习储误：D选项正确（新编）", chapter: "第九章 技术合同"},
  {id: 207, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，当事人一方以技术知识为对方就特定技术项目提供可行性论证所订立的合同属于下列哪种合同？", options: {"A": "该合同属于技术咨询合同", "B": "如果乙研究所未按期提供咨询报告，则应当承担", "C": "如果双方没有约定，则乙研究所利用甲单位提供的技术资料和工作条件完成的新的技术成果，属于甲单位", "D": "如果双方没有约定，则甲单位按照乙研究所符合约定要求的咨询报告和意见作出决策所造成的损失，由乙研究所承担"}, answer: "AB", explanation: "。A选项、《民法典》第878条帛1身定：“技术欲询合同是当事人一力以技水识为方就特定技术项目提供可行性论证、收水预思、期技术调查、分析诉价报告等所订立的合同”，经同属于技术咨询合同，因此A选项Ⅱ确。Ⅱ跑具，《民法典》第881条第2数规定：“技术咨询合同的费托人未按期提出咨询报告或提出的咨询银合不符合约定的、应当承担减收或常免收报时等违约受任”，因此B选项正确。C遇项，《民法典》第885告规定：“技术咨询合同、技术服务合同履行过程中，受托人利用委托人提供的技术资料和工作条件究成的新的技术成果，属于受托人”，因此C选习错误。D选项，《民法典》第881条第3款规定：“包术咨询合同的委托人按照受托人符合约定要求药咨询报告和意见作出决策所造成的损失，由委托人承担，但是当事人另有约定的除外”，因此D选项误。（2012改编）合同", chapter: "第九章 技术合同"},
  {id: 208, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编及相关规定，下列关于委托合同的哪些说法是正确的？", options: {"A": "委托合同是委托人和受托人约定，由受托人处理委托人事务的合同", "B": "受托人应当亲自处理委托事务，经委托人同意，受托人可以转委托", "C": "受托人应当按照委托人的要求，报告委托事务的处理情况", "D": "有偿的委托合同，因受托人的过错给委托人造成损失的，委托人可以要求赔偿损失"}, answer: "ABCD", explanation: "。A选项，《民法典》第：919条规定：“委托合同是委托人和受托人约定，由受托人处互委托人事务的合同”，因此A选项正确。B选项，《民法典》第923条规定：“受托人.应当亲自处理委托事务。经委托人同意，受托人可以转委托………”，因此B选项正确。C选项，《民法典》第924条规定：“受光人应当按照委托人的要求，报告委托事务的处理情况·….”，因此C选项正确。D选项，《民法）第929条第1款规定：“有偿的委托合同，因受托人的过错造成委托人损失的，委托人可以请求赔偿损失……”，因此D选项正确。（2012改编）", chapter: "第十章 委托合同"},
  {id: 209, topic: "专题二 民法典合同编", type: "multiple", question: "根据民法典合同编的规定，下列关于委托合同的说法哪些是正确的？", options: {"A": "娄托合间可以来用非书面形式", "B": "委托合间可以是无偿的", "C": "姿托合同可以就一项或教项事务特别委拍受托人处理，也可以低括安托受托人处理一印事务", "D": "学托人处理委托事务收得的财产，应当转交给委托人"}, answer: "ABCD", explanation: "。A选项，委托合同原则上属于不县式合同，当事人可以采用口头形式或书面形式，因此A选项正确。B选项，《民法典》第929条第1款规专二民法典合同是：“有偿的要任合同，回史化人的过借造虎奥任人携失的，要怡人可以请是赠信借失。无借情委格合同，因变人尚齿意成护重大过失逸成食论人价失的，零人可以请来赠借价失”，因此委格合同可以是完信的，日医项正，C连项，（民法类>第920靠现定：“委人听以侍财委坨变化人处理一低业普数项单券，世呼以履倍委倍变化人处理一切单券”因此C速项正衡。D选项，（民决货>铭927常规定：更化人处理委化事务限得的财产，应当传突作资托人“，因此D选项正确。（2007改）", chapter: "第十章 委托合同"},
  {id: 210, topic: "专题二 民法典合同编", type: "multiple", question: "甲农场委托乙运输公司将农场的水果运往集市水果市场。合同签订后，乙运输公司有更大的运输业务，欲将运输甲农场水果的任务委托给丙运输公司。恨民法典合同编及相关规定，下列哪些说法是正确的？", options: {"A": "乙运输公司经甲农场同意，可以转委托丙运输公司运输甲农场的水果", "B": "乙运输公司有权转委托丙运输公司，仅需事后通知甲农场", "C": "转委托未经甲农场同意的，乙运输公司应当对丙运输公司的行为承担责任", "D": "转委托未经甲农场同意的，乙运输公司仅需就其对丙运输公司的指示承担责任"}, answer: "AC", explanation: "。《民溃集》第923养规定：“变坨人应条自处理费坨事务。悠委托人同兔，变人可以转资托。转要托经同意成追认的，委托人可以就资托事务置核指常转委托的第三人，受托人仅就第三人的选任及其对第三人的指示承担费任。转委托未经同意或者追认的，受托人应出对转责托的第三人的行为承担费任：但是，在震忽情况下变托人为了维护委托人的利益得要转变托第三人的除外”，因此A、C选项正确，B、D选项误。（2015改编）", chapter: "第十章 委托合同"},
  {id: 211, topic: "专题二 民法典合同编", type: "multiple", question: "王某委托胡某销售一批货物，双方约定胡某不收取报酬。根据民法典合同编及相关规定，下列说法哪些是正确的？", options: {"A": "胡某有权请求王某偿还为处理委托事务垫付的必要费用及其利息", "B": "胡某因为故意给王某造成损失的，王某可以要求胡某赔偿", "C": "胡某因为重大过失给王某造成损失的，王某可以要求胡某赔偿", "D": "如果胡某转委托第三人处理王某委托的事务，应经过王某同意"}, answer: "ABCD", explanation: "。A选项，（民法典）第92I条规定：“委托人应当预付处理委托事务的费用。受托人为处理委托事务垫付的必要费用，类托人应当偿还该费用并支付利息”，因此A选项正确。B、C选项，《民法美>第929条第1款规定：“…无偿的娄托合同，因受托人的故意或者重大过失造成委托人报失的，委托人可以请求赔偿损失”，因此B、C选项正确。D选项，根据（民法典》第923条的规定，经委托人同意，受托人可以转委托，因此D选项正确。（2010改编）", chapter: "第十章 委托合同"},
  {id: 212, topic: "专题二 民法典合同编", type: "multiple", question: "甲公司委托乙专利代理机构代为处理本公司专利事务。对此，下列说法哪些是正确的？", options: {"A": "即使合同没有提及乙处理相关事务的费用负担，甲公司仍有义务支付乙事务所为处理委托事务而垫付的费用", "B": "经甲公司同意，乙可以转委托，同时对第三人的行为承担责任", "C": "乙可以随时解除与甲公司的合同", "D": "因不可归责于乙的事由，委托事务不能完成的，甲公司应当向乙支付相应的报酬"}, answer: "ACD", explanation: "。A选项，《民法典》第921条规定：“委托人应当预付处理委托事务的费用。受托人为处理委托事务垫付的必要费用，委托人应当偿还该费用并支付利息”，因此A选项正确。B选项，（民法典》第923条规定：“转委托经同意或者追认的，委托人可以就委托事务直接指示转委托的第三人，受托人仅就第三人的选任及其对第三人的指示示担贵任”，受托人就第三人的行为不录抱任、因此B选项佣误：C通项：（民法典>第933多定：“委托人或者受托人可以随时朔除我死同…”因此C通项正确。D选项，（民法典）928条第2款规定：“因不可归贵于受托人的事由委托合同解除或者委托事务不他究成的，委人，当向受托人支付相应的报酬…”，因此D选项.确。（2018）", chapter: "第十章 委托合同"},
  {id: 213, topic: "专题二 民法典合同编", type: "single", question: "甲公司委托姚某购买一批化肥。在甲公司的授权范围内，姚某以自己的名义与乙公司签订了一份化肥买卖合同，并在订立合同的过程中，将他与甲公司之间的代理关系告诉了乙公司。根据民法典合同编及相关规定，下列关于该买卖合同的说法哪项是正确的？", options: {"A": "该合同直接约束姚某和乙公司，但有确切证据证明该合同只约束甲公司和乙公司的除外", "B": "该合同直接约束甲公司和乙公司，但有确切证据证明该合同只约束姚某和乙公司的除外", "C": "该合同直接约束甲公司、乙公司和姚某", "D": "该合同无效，对甲公司、乙公司和姚某均没有约束力"}, answer: "B", explanation: "。（民法典》第925条规定：“受托人以自的名义，在类托人的投权范图内与第三人订立的同，第三人在订立合同时知道受托人与委托人之！的代理关系的，该合间直接约求委托人和第三人但是有确切证据证明该合同只约束受托人和第：人的除外”。本题中，姚某以自已的名：义，在甲公1的投权范围内与乙公司订立合同，并且姚某将他！甲公司之向的代理关系告诉了乙公司，因此该合目直接约束甲公司和乙公司，但有确切证据证明该合同只约束姚某和乙公司的除外，因此A、C、D选项误，B选项正确。（2010改编）", chapter: "第十章 委托合同"},
  {id: 214, topic: "专题二 民法典合同编", type: "single", question: "甲委托乙购买一批货物，但要求以乙的名义签订合同，乙同意，遂与丙签订了买卖合同。后由于甲的原因，乙不能按时向丙支付货款。乙向丙说明了自己是受甲委托向丙购买货物。对此，下列哪项说法是正确的？", options: {"A": "丙只能要求甲支付货款", "B": "丙只能要求乙支付货款", "C": "丙选定甲作为相对人要求其支付货款后，不得再变更为乙", "D": "丙选定乙作为相对人要求其支付货款后，乙的财产不足以清偿债务的，可以重新选择甲作为相对人"}, answer: "C", explanation: "。《民法典）第926条第2款规定：“受托月因委托人的原因对第三人不履行义务，受托人应当向第三人披露委托人，第三人因此可以选择受托人或者委托人作为相对人主张其权利，但是第三人不得变更选定的相对人”。本题中，甲为委托人，乙为受托人，丙为第三人，乙以自己的名义与丙签订合同，但因为甲的原因未能按时履行合同义务，在乙向丙披露了委托人甲后，丙有权选择甲或者乙作为相对人主张其权利，但丙不得变更选定的相对人，因此A、B、D选项错误，C选项正确。（2008）", chapter: "第十章 委托合同"},
  {id: 215, topic: "专题二 民法典合同编", type: "multiple", question: "某律师事务所指派吴律师担任某案件的一、二审姿托代理人。第一次开庭后，吴律师感览案件复杂，本人和该事务所均难以胜任，建议不再继续代理。但该事务所坚持代理。一审判决委托人败诉。下列哪些表述是正确的7", options: {"A": "律师事务所有权单方解除委托合同，但须承担赠偿责任", "B": "律师事务所在委托人一审败诉后不能单方解除合同", "C": "即使一审胜诉，委托人也可解除委托合同，但须承担赔偿责任", "D": "只有存在故意或者重大过失时，该律师事务所才对败诉承担赔偿责任"}, answer: "AC", explanation: "。A、B、C选项，《民法典》第933条规定：“委托人或者受托人可以随时解除委托合同。因解除合同造成对方损失的，除不可归贵于该当事人的事由外，无偿委托合同的解除方应当赔偿因解除时间不当造成的直接损失，有偿委托合同的解除方应当赔偿对方的直接损失和合同履行后可以获得的利益”，律师事务所（受托入）和委托人均有权单方", chapter: "第十章 委托合同"},
  {id: 216, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列哪些说法是正确的？", options: {"A": "民事诉讼当事人有平等的诉讼权利", "B": "当事人有权在法律规定的范围内处分自己的民事权利和诉讼权利", "C": "在少数民族聚居的地区，人民法院应当一律使用汉语言文字审理和发布法律文书", "D": "人民法院审理民事案件，应当根据自愿和合法的原则进行调解；调解不成的，应当及时判决"}, answer: "ABD", explanation: "。A选项，《民诉法》第8条规定：“民事诉讼当事人有平等的诉讼权利…”，因此人选项正确。B选项，《民诉法》第13条第2款规定：“当事人有权在法律规定的范围内处分自己的民事权利和诉讼权利”，因此B选项正确。C选项，《民诉法）第11条第2款规定：“在少数民族聚居或者多民族共同居住的地区，人民法院应当用当地民族通局的语盲、文字进行审理和发布法律文书”，因此C选项错误。D选项，《民诉法》第9条规定：“人民法院审理民事案件，应当根据自愿和合法的原则进行调解；调解不成的，应当及时判决”，因此D选项正确。（2015)", chapter: "第一章 民事诉讼法概述"},
  {id: 217, topic: "专题三 民事诉讼法", type: "single", question: "某县人民法院对王某诉张某侵权纠纷一案未经开庭审理即作出了判决，该审判行为直接违反了民事诉讼法哪一项原则或者制度？", options: {"A": "违反了辩论原则", "B": "违反了处分原则", "C": "违反了合议制度", "D": "违反了回避制度"}, answer: "A", explanation: "。《民诉法》第12条规定：“人民法院审理民事案件时，当事人有权进行辩论”。本题中，未经开庭即作出判决违反了辩论原则，因此A选项正确，B、C、D选项错误。（2019)", chapter: "第一章 民事诉讼法概述"},
  {id: 218, topic: "专题三 民事诉讼法", type: "single", question: "关于民事诉讼法基本原则在民事诉讼中的具体体现，下列哪一说法是正确的？", options: {"A": "当事人有权决定是否委托代理人代为进行诉讼是诉讼权利平等原则的体现", "B": "当事人均有权委托代理人代为进行诉讼，是处分原则的体现", "C": "原告与被告在诉讼中有一些不同但相对应的权利，是同等原则的体现", "D": "当事人达成调解协议不仅要自愿，内容也不得递法，是法院调解自愿和合法原则的体现"}, answer: "D", explanation: "。A选项，委托代理人是当事人的诉讼权利，当事人有权决定是否委托，是处分原则的体现，因此A选项错误。B选项，当事人均有权委托，说明当事人权利相同，是平等原则的体现，因此B选项错误。C选项，原告与被告权利虽然不同，包是相对应，是平等原则的体现，而不是同等原则，因此C选项错误。D选项，调解原则包括自愿和合法，因此D选项正确。（法考2011）", chapter: "第一章 民事诉讼法概述"},
  {id: 219, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法及相关规定，下列关于辩论原则的说法哪些是正确的？多选）", options: {"A": "督促程序不适用辩论原则", "B": "当事人辩论权的行使局限于一、二审程序中开庭审理的法庭辩论阶段", "C": "当事人向法院提出起诉状和答辩状是其行使辩论权的一种表现", "D": "证人出庭陈述证言是证人行使辩论权的一种表现"}, answer: "AC", explanation: "。A选项，辨论原则只适用于诉讼程序，", chapter: "第一章 民事诉讼法概述"},
  {id: 220, topic: "专题三 民事诉讼法", type: "single", question: "吴某通过网络购物平台购买了甲公司销售的电热毯，后来因为电热毯质量问题，吴某起诉甲公司。法院受理案件后就开庭方式征求当事人意见，甲公司明确表示同意通过线上方式开庭，而吴某拒绝通过线上方式开庭。关于本案表述正确的是？", options: {"A": "由于本案是发生在互联网上的纠纷，故应当由互联网法院专属管辖", "B": "法院可以依职权决定通过在线方式开庭审理", "D": "既然吴某不同意线上开庭，故本案不能通过在线开庭方式审理", "C": "法院可以组织甲公司在线上开庭，吴某线下开庭的方式进行审理"}, answer: "B", explanation: "。根据《民事诉讼法》第16条规定，经当事人同意，民事诉讼活动可以通过信息网络平台在线进行。如果一方当事人同意在线诉讼，另外一方当事人不同意在线诉讼，则对同意的一方采取在线方式，对不同意的一方采取线下方式。中公司同意线上开庭，吴某不同意线上开庭，则法院对甲公司组织线上开庭，对吴某组织线下开庭方式审理即可，因此C选项正确，B、D选项错误。互联网法院不存在专属管辖的问题。互联网法院的管辖称为集中管辖。具体的，互联网法院集中管辖所在市（北京、广州、杭州）的辖区内应当由基层法院管辖的发生在互联网上的合同纠纷、役权纠纷等。因此，A选项错误。（法考2022）", chapter: "第一章 民事诉讼法概述"},
  {id: 221, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法的规定，下列说法中哪些说法是正确的？", options: {"A": "人民法院审理第二审民事案件，不能由一名审判人员独任审理", "B": "人民法院审理第一审民事案件，只有简易程序才能由一名市判人员独任审理", "C": "人民陪审员在参加审判活动时，除法律另有规定外，与审判员有同等的权利义务", "D": "合议庭评议案件中的不同意见、必须如实记人笔录"}, answer: "CD", explanation: "。A选项，《民诉法》第41条第2款规定：“中级人民法院对第一审适用简易程序审结或者不展裁定提起上诉的第二审民事案件，事实清楚、权利义务关系明确的，经双方当事人同意，可以由审判员一人独任审理”，因此二审也可以适用独任制。B选项，《民诉法》第40条第2款规定：“适用筒易程序审理的民事案件，由审判员一人独任审理。基层人民法院审理的基本事实清楚、权利义务关系明确的第一审民事案件，可以由审判员一人适用普通程序独任审理”，因此不只有简易程序才适用独任制。C选项，《民诉法》第40条第3款规定：“人民降审贝在参加审判活动时，除法律另布外，与审判员有同等的权利义务”，因此C选确。D选项，（民诉法》第45条规定：“合议息评议中的不同意见，必须如实记入笔录”，因此项正确。（新编）", chapter: "第一章 民事诉讼法概述"},
  {id: 222, topic: "专题三 民事诉讼法", type: "multiple", question: "根据民事诉讼法的规定，下列哪些说法是正确的？", options: {"A": "人民法院审理第一审民事案件，可以由审判员和人民陪审员组成合议庭审理", "B": "人民法院审理第二审民事案件，只能由审判员组成合议庭", "C": "发回重审的案件，原审人民法院应当按照第一审程序另行组成合议庭", "D": "人民法院审理再审案件，只能由审判员另行组成合议庭"}, answer: "ABC", explanation: "。A选项，《民诉法》第40条绍1定：“人民法院审理第一审民事案件，山审判员民陪审员共同组成合议庭或者由审判贝组成庭……”，因此A选项正确。B选项，《民诉法）1条第1款规定：人民法院审理第二审民事案件审判员组成合议庭，因此B选项正确。：衢要注意，B选项强调的二审合议庭的组成人不是考察二审可以组成合议庭，特殊情况下以一名审判员独任。C选项，《民诉法》第41条数规定：“发回重审的案件，原审人民法院应照第一审程序另行组成合议庭”，因此C选项正D选项，《民诉法》第41条第4款规定：“审理再审件，原来是第一审的，按照第一审程序另行组成议庭；原来是第二审的或者是上级人民法院提的，按照第二审程序另行组成合议庭”，因此如按一审程序再审的案件，人民陪审员可以参加审，D选项错误。（新编）", chapter: "第一章 民事诉讼法概述"},

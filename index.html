      }
      
      let fbHtml = '';
      if (isAnswered) {
        const ansStr = Array.isArray(q.answer) ? q.answer.join('') : q.answer;
        if (a.correct === null) {
          // No answer available
          fbHtml = `<div class="fb err">
            <div class="fb-title">⚠️ 暂无答案</div>
            <div class="fb-ans">该题答案待补充，请参考教材自行核对</div>
          </div>`;
        } else {
          fbHtml = `<div class="fb ${a.correct?'ok':'err'}">
            <div class="fb-title">${a.correct?'✅ 回答正确！':'❌ 回答错误'}</div>
            <div class="fb-ans">正确答案：${ansStr}</div>
            ${q.explanation ? `<button class="expl-toggle" onclick="toggleExpl()">💡 查看解析</button><div class="expl" id="expl-box">${escHtml(q.explanation)}</div>` : ''}
          </div>`;
        }
      }
      
      let typeLabel = q.type === 'single' ? '单选' : q.type === 'multiple' ? '多选' : '未知';
      
      document.getElementById('panel-practice').innerHTML = `
        <div class="stats-bar">
          <div class="stat-item"><div class="stat-val ${accentCls}">${totalDone}</div><div class="stat-lbl">已练习</div></div>
          <div class="stat-item"><div class="stat-val ${accentCls}">${totalOk}</div><div class="stat-lbl">正确</div></div>
          <div class="stat-item"><div class="stat-val ${accentCls}">${totalErr}</div><div class="stat-lbl">错误</div></div>
          <div class="stat-item"><div class="stat-val ${accentCls}">${acc}%</div><div class="stat-lbl">正确率</div></div>
          <div class="stat-item"><div class="stat-val ${accentCls}">${total - totalDone}</div><div class="stat-lbl">剩余</div></div>
        </div>
        ${topicHtml}
        ${filterHtml}
        <div class="progress-wrap">
          <div class="progress-info"><span>当前范围进度</span><span id="progress-label">${scopeDone}/${scopeTotal}</span></div>
          <div class="progress-bar"><div class="progress-fill ${progressBg}" style="width:${pct}%"></div></div>
        </div>
        <div class="practice-card">
          <div class="q-meta">
            <span class="q-num">第 ${st.pos+1} / ${scopeTotal} 题 · ID: ${qid}</span>
            <span class="type-badge ${q.type}">{typeLabel}</span>
          </div>
          <div class="q-text">${escHtml(q.question)}</div>
          <div class="opts">${optsHtml}</div>
          ${fbHtml}
          <div class="btn-row" style="margin-top:16px">
            ${isMulti && !isAnswered ? `<button class="btn ${btnCls}" onclick="submitMulti()">提交答案</button>` : ''}
            <button class="btn btn-s" onclick="goPrev()" ${st.pos===0?'disabled style="opacity:0.4"':''}>← 上一题</button>
            <button class="btn btn-s" onclick="goNext()">跳过 →</button>
          </div>
        </div>`;
      return;
    }
  }
  
  // Complete or empty
  const doneCount = st.sessionOk + st.sessionErr;
  const doneAcc = doneCount > 0 ? Math.round(st.sessionOk / doneCount * 100) : 0;
  
  if (st.queue.length === 0) {
    document.getElementById('panel-practice').innerHTML = `
      ${topicHtml}
      ${filterHtml}
      <div class="complete">
        <div class="complete-icon">📭</div>
        <div class="complete-title" style="color:${getAccentVar()}">当前范围无题目</div>
        <div class="complete-sub">请调整筛选条件</div>
        <div class="btn-row" style="justify-content:center">
          <button class="btn ${btnCls}" onclick="setFilter('all')">全部题目</button>
        </div>
      </div>`;
  } else {
    document.getElementById('panel-practice').innerHTML = `
      <div class="stats-bar">
        <div class="stat-item"><div class="stat-val ${accentCls}">${totalDone}</div><div class="stat-lbl">已练习</div></div>
        <div class="stat-item"><div class="stat-val ${accentCls}">${totalOk}</div><div class="stat-lbl">正确</div></div>
        <div class="stat-item"><div class="stat-val ${accentCls}">${totalErr}</div><div class="stat-lbl">错误</div></div>
        <div class="stat-item"><div class="stat-val ${accentCls}">${acc}%</div><div class="stat-lbl">正确率</div></div>
      </div>
      <div class="complete">
        <div class="complete-icon">🎉</div>
        <div class="complete-title" style="color:${getAccentVar()}">本次练习完成！</div>
        <div class="score-ring" style="border-color:${getAccentVar()};color:${getAccentVar()}">${doneAcc}%</div>
        <p style="color:var(--text2);margin-bottom:24px">本次正确 ${st.sessionOk} / 错误 ${st.sessionErr}</p>
        <div class="btn-row" style="justify-content:center">
          <button class="btn ${btnCls}" onclick="setFilter('all')">重新练习全部</button>
          <button class="btn btn-s" onclick="setFilter('wrong')">📌 练习错题</button>
        </div>
      </div>`;
  }
}

// ============================================================
// INTERACTIONS
// ============================================================
function clickOption(el, key, isMulti, qid) {
  const sid = sectionId(qid);
  const a = answers[sid];
  if (a && a.correct !== null) return; // Already answered
  
  if (!isMulti) {
    selectedOptions = [key];
    judgeAnswer(qid, [key]);
  } else {
    const idx = selectedOptions.indexOf(key);
    if (idx >= 0) selectedOptions.splice(idx, 1);
    else selectedOptions.push(key);
    // Update visual
    document.querySelectorAll('.opts .opt').forEach(o => {
      o.classList.toggle('sel', selectedOptions.includes(o.dataset.key));
    });
  }
}

function submitMulti() {
  if (selectedOptions.length === 0) { alert('请至少选择一个选项'); return; }
  const st = state[currentMain];
  if (st.pos < st.queue.length) {
    judgeAnswer(st.queue[st.pos], [...selectedOptions]);
  }
}

function judgeAnswer(qid, selected) {
  const qs = getQuestions();
  const q = qs.find(q => q.id === qid);
  if (!q) return;
  
  const sid = sectionId(qid);
  const ansStr = Array.isArray(q.answer) ? q.answer.join('') : (q.answer || '');
  const selStr = selected.sort().join('');
  
  // If answer is empty, mark as "no answer available" - don't count as correct/wrong
  if (!ansStr) {
    answers[sid] = { selected: [...selected], correct: null };
    selectedOptions = [];
    saveAll();
    renderPractice();
    return;
  }
  
  const correct = selStr === ansStr;
  
  answers[sid] = { selected: [...selected], correct };
  
  if (correct) state[currentMain].sessionOk++;
  else {
    state[currentMain].sessionErr++;
    wrongIds[currentMain].add(qid);
  }
  
  // Also remove from wrong if now correct
  if (correct) wrongIds[currentMain].delete(qid);
  
  selectedOptions = [];
  saveAll();
  renderPractice();
}

function goNext() {
  const st = state[currentMain];
  st.pos++;
  selectedOptions = [];
  saveAll();
  renderPractice();
}

function goPrev() {
  const st = state[currentMain];
  if (st.pos > 0) st.pos--;
  selectedOptions = [];
  saveAll();
  renderPractice();
}

function toggleExpl() {
  const box = document.getElementById('expl-box');
  if (box) box.style.display = box.style.display === 'block' ? 'none' : 'block';
}

function setFilter(f, btn) {
  savePos(); // Remember current position before switching
  state[currentMain].filter = f;
  selectedOptions = [];
  buildQueue();
  saveAll();
  renderPractice();
}

function toggleTopicPanel() {
  const panel = document.getElementById('topic-panel');
  if (panel) panel.classList.toggle('show');
}

function selectTopic(name, el) {
  savePos(); // Remember current position before switching
  state[currentMain].topic = name;
  state[currentMain].chapter = null;
  selectedOptions = [];
  buildQueue();
  saveAll();
  renderPractice();
}

function selectChapter(name, el) {
  savePos(); // Remember current position before switching
  state[currentMain].chapter = name;
  selectedOptions = [];
  buildQueue();
  saveAll();
  renderPractice();
}

// ============================================================
// BANK
// ============================================================
function renderBank() {
  const qs = getQuestions();
  const section = currentMain;
  const isP = section === 'patent';
  const activeCls = isP ? 'active-patent' : 'active-related';
  const activeFbtnCls = isP ? 'active' : 'active-g';
  
  let topicFilter = '';
  const topics = getTopics();
  
  if (isP) {
    topicFilter = '<div class="filter-row"><span class="filter-label">专题：</span>';
    topicFilter += `<button class="fbtn ${activeFbtnCls}" onclick="bankFilter(null,this)" data-bt="all">全部</button>`;
    for (const t of topics) {
      topicFilter += `<button class="fbtn" onclick="bankFilter('${t.name}',this)" data-bt="${t.name}">${t.name}</button>`;
    }
    topicFilter += '</div>';
  } else {
    topicFilter = '<div class="filter-row"><span class="filter-label">专题：</span>';
    topicFilter += `<button class="fbtn ${activeFbtnCls}" onclick="bankFilter(null,this)" data-bt="all">全部</button>`;
    for (const t of topics) {
      const cnt = qs.filter(q => q.topic === t.name).length;
      topicFilter += `<button class="fbtn" onclick="bankFilter('${t.name}',this)" data-bt="${t.name}">${t.name}(${cnt})</button>`;
    }
    topicFilter += '</div>';
  }
  
  document.getElementById('panel-bank').innerHTML = `
    ${topicFilter}
    <input class="search-input" placeholder="搜索题目关键词..." oninput="bankSearch(this.value)">
    <div class="bank-list" id="bank-list"></div>`;
  
  window._bankFilter = null;
  renderBankList(qs);
}

function bankFilter(topic, btn) {
  window._bankFilter = topic;
  document.querySelectorAll('#panel-bank .fbtn').forEach(b => {
    b.classList.remove('active', 'active-g');
  });
  if (btn) {
    btn.classList.add(currentMain === 'patent' ? 'active' : 'active-g');
  }
  const qs = getQuestions();
  const filtered = topic ? qs.filter(q => q.topic === topic) : qs;
  renderBankList(filtered);
}

function bankSearch(keyword) {
  const qs = getQuestions();
  let filtered = window._bankFilter ? qs.filter(q => q.topic === window._bankFilter) : qs;
  if (keyword.trim()) {
    const kw = keyword.trim().toLowerCase();
    filtered = filtered.filter(q => 
      q.question.toLowerCase().includes(kw) || 
      JSON.stringify(q.options).toLowerCase().includes(kw)
    );
  }
  renderBankList(filtered);
}

function renderBankList(list) {
  const el = document.getElementById('bank-list');
  if (!el) return;
  const section = currentMain;
  let html = '';
  for (const q of list) {
    const a = answers[section + '_' + q.id];
    const done = a && a.correct !== null;
    const statusIcon = done ? (a.correct ? '✅' : '❌') : '⬜';
    html += `<div class="bank-item" onclick="jumpFromBank(${q.id})">
      <span class="bank-num">${statusIcon} ${q.id}</span>
      <span class="bank-text">${escHtml(q.question.substring(0,80))}${q.question.length>80?'...':''}</span>
      <span class="type-badge ${q.type}" style="flex-shrink:0;font-size:0.72rem;padding:2px 8px">${q.type==='single'?'单选':q.type==='multiple'?'多选':'?'}</span>
    </div>`;
  }
  el.innerHTML = html || '<p style="color:var(--text3);text-align:center;padding:20px">无匹配题目</p>';
}

function jumpFromBank(qid) {
  // Build queue with all questions (or current topic filter), navigate to qid
  state[currentMain].filter = 'all';
  state[currentMain].topic = window._bankFilter;
  state[currentMain].chapter = null;
  selectedOptions = [];
  buildQueue();
  const idx = state[currentMain].queue.indexOf(qid);
  if (idx >= 0) state[currentMain].pos = idx;
  saveAll();
  switchSub('practice');
}

// ============================================================
// STATS
// ============================================================
function renderStats() {
  const qs = getQuestions();
  const section = currentMain;
  const isP = section === 'patent';
  const accentVar = isP ? 'var(--accent)' : 'var(--green)';
  
  let totalDone = 0, totalOk = 0, totalErr = 0;
  for (const q of qs) {
    const a = answers[section + '_' + q.id];
    if (a && a.correct !== null) {
      totalDone++;
      if (a.correct) totalOk++; else totalErr++;
    }
  }
  const acc = totalDone > 0 ? Math.round(totalOk / totalDone * 100) : 0;
  const pct = Math.round(totalDone / qs.length * 100);
  
  const accentCls = isP ? 'patent-color' : 'related-color';
  const progressBg = isP ? 'patent-bg' : 'related-bg';
  
  let html = `
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-val ${accentCls}">${totalDone}</div><div class="stat-lbl">已练习</div></div>
      <div class="stat-item"><div class="stat-val ${accentCls}">${totalOk}</div><div class="stat-lbl">正确</div></div>
      <div class="stat-item"><div class="stat-val ${accentCls}">${totalErr}</div><div class="stat-lbl">错误</div></div>
      <div class="stat-item"><div class="stat-val ${accentCls}">${acc}%</div><div class="stat-lbl">正确率</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-info"><span>总体进度</span><span>${totalDone} / ${qs.length} (${pct}%)</span></div>
      <div class="progress-bar"><div class="progress-fill ${progressBg}" style="width:${pct}%"></div></div>
    </div>`;
  
  // Per-topic stats
  html += '<div style="margin-top:20px"><h3 style="font-size:1rem;margin-bottom:14px;color:var(--text2)">各专题进度</h3>';
  
  const topics = getTopics();
  for (const t of topics) {
    let tqs;
    if (isP) {
      tqs = qs.filter(q => q.id >= t.idStart && q.id <= t.idEnd);
    } else {
      tqs = qs.filter(q => q.topic === t.name);
    }
    if (tqs.length === 0) continue;
    
    let tDone = 0, tOk = 0;
    for (const q of tqs) {
      const a = answers[section + '_' + q.id];
      if (a && a.correct !== null) {
        tDone++;
        if (a.correct) tOk++;
      }
    }
    const tPct = Math.round(tDone / tqs.length * 100);
    const tAcc = tDone > 0 ? Math.round(tOk / tDone * 100) : 0;
    
    html += `<div class="topic-stat">
      <div class="topic-stat-name">${t.name}</div>
      <div class="topic-stat-bar"><div class="topic-stat-fill" style="width:${tPct}%;background:${accentVar}"></div></div>
      <div class="topic-stat-info">${tDone}/${tqs.length} 已练习 · 正确率 ${tAcc}%</div>
    </div>`;
    
    // Chapter stats for related law
    if (!isP && t.chapters && t.chapters.length > 0) {
      for (const ch of t.chapters) {
        const cqs = tqs.filter(q => q.chapter === ch);
        if (cqs.length === 0) continue;
        let cDone = 0, cOk = 0;
        for (const q of cqs) {
          const a = answers[section + '_' + q.id];
          if (a && a.correct !== null) { cDone++; if (a.correct) cOk++; }
        }
        const cPct = Math.round(cDone / cqs.length * 100);
        const cAcc = cDone > 0 ? Math.round(cOk / cDone * 100) : 0;
        html += `<div class="topic-stat" style="margin-left:16px;margin-bottom:8px">
          <div class="topic-stat-name" style="font-size:0.85rem;color:var(--text3)">${ch}</div>
          <div class="topic-stat-bar"><div class="topic-stat-fill" style="width:${cPct}%;background:${accentVar};opacity:0.6"></div></div>
          <div class="topic-stat-info">${cDone}/${cqs.length} · ${cAcc}%</div>
        </div>`;
      }
    }
  }
  html += '</div>';
  
  // Reset buttons
  html += `<div class="btn-row" style="justify-content:center;margin-top:24px">
    <button class="btn btn-s" onclick="resetWrong()" style="border-color:var(--err);color:var(--err)">清除错题记录</button>
    <button class="btn btn-s" onclick="resetAll()" style="border-color:var(--err);color:var(--err)">重置所有进度</button>
  </div>`;
  
  document.getElementById('panel-stats').innerHTML = html;
}

function resetWrong() {
  if (!confirm('确定清除所有错题记录？')) return;
  wrongIds[currentMain].clear();
  saveAll();
  renderStats();
}

function resetAll() {
  if (!confirm('确定重置所有进度？此操作不可撤销！')) return;
  const qs = getQuestions();
  const section = currentMain;
  for (const q of qs) {
    delete answers[section + '_' + q.id];
  }
  wrongIds[currentMain].clear();
  state[currentMain] = { filter:'all', topic:null, chapter:null, queue:[], pos:0, sessionOk:0, sessionErr:0 };
  selectedOptions = [];
  buildQueue();
  saveAll();
  renderStats();
}

// ============================================================
// NAVIGATION
// ============================================================
function switchMain(main) {
  currentMain = main;
  selectedOptions = [];
  
  // Update main tab visuals
  document.querySelectorAll('.main-tab').forEach(t => {
    t.classList.remove('active-patent', 'active-related');
  });
  const tabs = document.querySelectorAll('.main-tab');
  if (main === 'patent') tabs[0].classList.add('active-patent');
  else tabs[1].classList.add('active-related');
  
  // Update sub tab visuals
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('active-patent', 'active-related', 'active');
  });
  // Will be set in switchSub
  
  // Update header badges
  updateHeaderBadges();
  
  // Build queue if empty
  if (state[main].queue.length === 0) buildQueue();
  
  // Re-render current panel
  if (currentSub === 'practice') renderPractice();
  else if (currentSub === 'bank') renderBank();
  else if (currentSub === 'stats') renderStats();
}

function switchSub(name) {
  currentSub = name;
  
  // Update tab visuals
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('active-patent', 'active-related', 'active');
  });
  const tabs = document.querySelectorAll('.tab');
  const activeCls = currentMain === 'patent' ? 'active-patent' : 'active-related';
  if (name === 'practice') tabs[0].classList.add(activeCls);
  else if (name === 'bank') tabs[1].classList.add(activeCls);
  else if (name === 'stats') tabs[2].classList.add(activeCls);
  
  // Show/hide panels
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  
  // Render
  if (name === 'practice') renderPractice();
  else if (name === 'bank') renderBank();
  else if (name === 'stats') renderStats();
}

function updateHeaderBadges() {
  const el = document.getElementById('header-badges');
  if (currentMain === 'patent') {
    el.innerHTML = '<span class="badge">📚 共 ' + PATENT_QUESTIONS.length + ' 题</span><span class="badge">单选 224 题</span><span class="badge p">多选 551 题</span>';
  } else {
    el.innerHTML = '<span class="badge g">📚 共 ' + RELATED_QUESTIONS.length + ' 题</span><span class="badge g">单选 214 题</span><span class="badge p">多选 588 题</span>';
  }
}

// ============================================================
// INIT
// ============================================================
loadAll();

// Ensure queues exist
if (state.patent.queue.length === 0) buildQueue();
if (state.related.queue.length === 0) buildQueue();

updateHeaderBadges();
renderPractice();
</script>

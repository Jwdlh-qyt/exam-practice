  {id: 531, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列哪项名称可以注册商标？", options: {"A": "雷神山", "B": "昆山", "C": "钟南山", "D": "泰山"}, answer: "ABCD", explanation: "。A选项，《商标条例》第13条第1款中规定，每一件商标注册申请应当向国务院商标管理部门提交《商标注册申请书》1份、商标图样1份，因此A选项正确。B选项，《商标条例>第13条第7款规定：“商标为外文或者包含外文的，应当说明合义”，因此B选项正确。C选项，《商标条例》第15条第2款规定：“商标注册中请等有关文件以纸质方式提出的，应当打字或者印别”，因此C选项正确。D选项，根据《商标条例》第14条的规定，中请商标注册的，申请人应当提交其身份证明文件，因此D选项正确。（2012）", chapter: "第一章 注册商标专用权的客体"},
  {id: 532, topic: "专题六 商标法", type: "multiple", question: "下列哪些标记不能作为商标注册？多选）", options: {"A": "国家知识产权局对其局徽申请商标", "B": "扬州市烹饪协会申请“扬州炒饭”作为地理标志集体商标，指定服务为饭店、餐厅", "C": "中国烹饪协会申请“烹任名师”作为证明商标", "D": "某眼镜店申请“屠呦呦”商标，指定商品为眼镜"}, answer: "AC", explanation: "。《商标法》第22条第2、3款规定：“商标注册申请人可以通过一份申请就多个类别的商品申请注册同一商标。商标注册申请等有关文件，可以以书面方式或者数据电文方式提出”，因此AC选项正确，B、D选项错误。（2016）", chapter: "第一章 注册商标专用权的客体"},
  {id: 533, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，某企业在其生产的人用药品上使用“我不是药神”作为商标使用，但未进行注册，下列哪些说法是错误的：", options: {"A": "该商标未经注册，不得在市场销售", "B": "该商标损害他人在先权利，不能获得注册", "C": "该商标不具备显著性，不能注册", "D": "该商标不需要经过注册即可使用，也可以在市场上销售"}, answer: "BD", explanation: "。《商标法》第22条第3款规定：“商标注册申请等有关文件，可以以书面方式或者数据电文方式提出”，因此B、D选项正确。（新编）", chapter: "第一章 注册商标专用权的客体"},
  {id: 534, topic: "专题六 商标法", type: "multiple", question: "某企业未经许可将迪士尼公司的米老鼠形象擅自作为商标申请注册使用在白酒上，该企业的行为属于？", options: {"A": "侵犯他人的著作权进行注册", "B": "虚构事实真相申请注册", "C": "模仿他人的作品作为商标进行注册", "D": "使用商标法禁止使用的图形进行注册"}, answer: "CD", explanation: "。A选项，《商标法》第23条规定：“注册商标得要在核定使用范图之外的商品上取得商标专用权的，应当另行提出注册申请”，因此A选项错误。B选项，（商标法》第24条规定：“注册商标留要改变其标志的，应当重新提出注册申请”，因此B选项错误。C、D选项，（商标法》第41条规定：“注册商标得要变更注册人的名义、地址或者其他注", chapter: "第一章 注册商标专用权的客体"},
  {id: 535, topic: "专题六 商标法", type: "multiple", question: "根据商标法的规定，下列说法哪些是正确的？", options: {"A": "商标注册申请人应当是已经在我国生产商品或者提供服务的经营者", "B": "商标注册申请人应当有生产经营活动的资格", "C": "商标注册申请人可以是在中国没有经常居所的外国人", "D": "商标注册申请人可以是两个或两个以上的自然人"}, answer: "ACD", explanation: "。A.B选项，（前擦法）第2S茶规定：“商标注册中请人自其前标在外回第一次提出闻标注册中请之日起6个月内，又在中回相同商品以同一商标捷出商标注册中请的，优质该外回向中国签订的协议或者共同多加的回际签约，或者按图相互承认优先权的愿则，可以享有优先权”，享有优先权必须统相回商品以同一商标提出中请的，因此A选项正确，B选项借误。C、D途项，（商标法》第26条规定：“前标在中国政府主办的或者承认的国际展览会展出的商品上首次使用的，自该商品展出之日起6个月内，该商标的注册中请人，可以享有优先权”，因此C、D选项正喻。（2006）", chapter: "第一章 注册商标专用权的客体"},
  {id: 536, topic: "专题六 商标法", type: "multiple", question: "下列哪些法人或组织可以作为商标注册申请人？", options: {"A": "慈普组织", "B": "企业法人", "C": "党政机关", "D": "事业单位"}, answer: "CD", explanation: "。概据《商标法》第25条的规定，商标注册中请人自其商标在外国第一次提出商标注册中请之日起6个月内，又在中国就相同商品以同一商标提出商标注册中请的，依原该外国同中国签订的协议或者共同参加的国际冬约，或者按国相互承认优先权的原则，可以享有优先权，依应前款要求优先权的，应当在提出商标注册中请的时食提出书面声明，并且在3个月内提交第一次提出的商标注册中请文件的副本；未提出书西声明或者逾期未提交商标注册申请文件副本的，视为未要求优先权，因此A、B选项错误，C、D选项正确。(2011)", chapter: "第一章 注册商标专用权的客体"},
  {id: 537, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列关于商标代理机构的哪些说法是正确的？多选）", options: {"A": "申请商标注册或者办理其他商标事宜，应当委托商标代理机构办理", "B": "委托人申请注册的商标可能存在商标法规定不得注册情形的，商标代理机构应当明确告知委托人", "C": "商标代理机构除对其代理服务申请商标注册外，不得申请注册其他商标", "D": "商标代理机构对在代理过程中知悉的被代理人的商业秘密，负有保密义务"}, answer: "BCD", explanation: "。A、B选项，（商标法）第30条中规定，中请注册的商标，凡不符合本法有关规定政同他人在同一种商品或者类似商品上已经注册的戏者初步审定的商标相同或者近似的，由国务院育标管理部门驳回中请，不子公告，因此人选项销识，B选项正确。C选项，《商标法》第31条规定：“两个或者两个以上的商标注册申请人，在同一种商品或者类似商品上，以相同或者近似的商标申请注册的，初步申定并公告中请在先的商标”，因此C选项正确。D选项，（商标法）第32条规定：“中请商标注册不得损害他人现有的在先权利，也不得以不正当手抢先注册他人已经使用并有一定影响的商标”，因此D选项正确。（2017）", chapter: "第一章 注册商标专用权的客体"},
  {id: 538, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，在中国申请注册商标或办理其他商标事宜的，下列哪些应当委托国家认可的具有商标代理资格的组织代理？多选）", options: {"A": "在中国没有经常居所的美国人", "B": "在中国没有营业所的英国企业", "C": "在中国有经常居所的美国人", "D": "在中国有营业所的英国企业"}, answer: "BD", explanation: "。A、B、C选项，《商标条例》第19条中规定，两个或者两个以上的中请人，在同一种商品或者类似商品上，分别以相同或者近似的商标在同一天申请注册的，应当自收到国务院商标管理部门通知之日起30日内提交使用证据。同日使用或者均未使用的，可以自收到通知之日起30日内自行协商，并将书面协议报送国务院商标管理部门；不愿协商或者协商不成的，国务院商标管理部门通知各申请人以抽签的方式确定一个申请人，回其他人的注册申请，国务院商标管理部门已经通知但申请人未参加抽签的，视为放弃申请。因此A、C选项错误，B选项正确。D选项，根据《商标法》第31条的规定，两个或者两个以上的商标注册申请人，在同一种商品或者类似商品上，以相同或者近似的商标申请注册的，初步审定并公告申请在先的商标，因此D选项正确。（新编）", chapter: "第一章 注册商标专用权的客体"},
  {id: 539, topic: "专题六 商标法", type: "multiple", question: "商标代理机构有下列哪些情形的，需要承担法律责任？多选）", options: {"A": "以低毁其他商标代理机构等手段招徕商标代理业务或者以其他不正当手段扰乱商标代理市场秩序的", "B": "代理不以使用为目的的恶意商标注册申请", "C": "商标代理机构知道或者应当知道委托人申请注册的商标风于不得接受委托情形，接受其委托的", "D": "商标代理机构除对其代理服务申请商标注册外，申请注册其他商标"}, answer: "AC", explanation: "。A、B、C选项，《商标法》第31条规定：“两个或者两个以上的商标注册申请人，在同一种商品或者类似商品上，以相同或者近似的商标申请注册的，初步审定并公告申请在先的商标；同一天申请的，初步审定并公告使用在先的商标，回其他人的申请，不予公告”，因此A、C选项正确，B选项错误。D选项，根据《商标条例》第19条的规定，同日申请但均未使用的，各申请人先协商，协", chapter: "第一章 注册商标专用权的客体"},
  {id: 540, topic: "专题六 商标法", type: "multiple", question: "关于商标代理机构，下列哪些说法是正确的？", options: {"A": "商标代理从业人员可以以个人名义自行接受委托", "B": "商标代理机构除对其代理服务申请商标注册外，不得申请注册其他商标", "C": "商标代理机构对在代理过程中知悉的被代理人的商业秘密，没有保密义务", "D": "委托人申请注册的商标可能存在商标法不得注册情形的，商标代理机构应当明确告知委托人"}, answer: "ABC", explanation: "。A去项属于（标法）第10条第1款第（八）项规定的不您作力弯标使用的情形，B透项属千（前标法）第11等路1使信（三）项胱是的不能作力剪标注府的情形，C当项符合《岗标法>第30集造反注府在先限别的敬回理由，四此A.B、C速项均居于段回屋由。D选项，（育标条例）第18等第2放中规定，中请手偿不并各，未接质增是境万申请文件或者未激纳费用的，国务院前标曾师门不千，书面通知申请人并说明由，四北D选项术微费不是改回观由。（2019）[2.CD。A选项，概费《前标法》第32条的现定，以不正当手段抢先注后他人已险使用并有一定影响的商标不得合规定，但不属平政回曝由，通过异议戏无放解决该问题，因北A选项借误，B选项的情况应当先房，协弯不成拍答，不易于敬回情形，因北B选项错误。C选项，（育标法）第4条第1款规定：”不以使用力目的的感意剪坏注册中请，应当子以税回”，因北C念项正。D途项，概据（商标法》第10、30条的规定，以不得作方商标使用的标志中请注册言标不符合规定，应资予以驳回，因此D选项正确。（新缩）", chapter: "第一章 注册商标专用权的客体"},
  {id: 541, topic: "专题六 商标法", type: "single", question: "商标代理机构应当遵循诚实信用原则，知道或者应当知道委托人申请商标注册属于下列哪些情形，不得接受其委托？多选）", options: {"A": "申请人申请注册商标属于不以使用为目的的恶意申请注册的", "B": "恶意抢注他人在先具有一定知名度商标的", "C": "申请人与他人存在合同或业务往来关系，就同一种商品或者类似商品申请注册的商标与他人在先使用的-170 -未注册商标相同或者近似的", "D": "申请人申请注册的商标可能与他人在先已注册商标相同成近似的"}, answer: "B", explanation: "。概据（商标法》第34条的规定，对敬回申请、不子公告的商标，商标注中请人不展的。可以自收到通知之日起15日内向商标评审部门中请复审，当事人对商标评审部门的决定不度的，可以自收到通知之日起30日内向人民法院起诉，因此A、C、D选项错误，B选项正确。（新输）", chapter: "第一章 注册商标专用权的客体"},
  {id: 542, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，关于商标代理机构申请国际注册的说法，下列哪些是正确的？", options: {"A": "商标代理机构的股东可以以其他公司的名义申请商标", "B": "商标代理机构可以接受委托人所有自愿申请商标的委托", "C": "商标代理机构只能申请代理服务上的商标", "D": "商标代理机构从业人员可以以个人名义接受委托"}, answer: "BC", explanation: "。A选项，对初步审定商标提出异议的主体井没有国籍的限创，因此A选项错误。（商标法》第33条中规定，对初步审定公告的商标，自公告之日起3个月内，在先权利人、利害关系人认为违反商标法第30条的，可以向国务院商标管理部门提出异议。公告期满无异议的，于以核准注后，发给商标注册证，并子公告，因此B选项正确。C选项，根据（商标法》第18条规定，外国人或者外国企业在中国中请商标注册和办理共他商标事宣的、应当委托依法设立的商标代理机构办理，团此，汤姆的异议中请应委托代理机构代为提出，C选项正确。D选项，根据《商标法》第35条规定，自公告期满之日起12个月内佩出是否准于注舟的块定，并书面通知异议人和被异议人。有特殊情况蒋要延长的，经批准，可以延长6个月。因此，异议审理期限最长可以为18个月，D选项仆误。（2011改编）", chapter: "第一章 注册商标专用权的客体"},
  {id: 543, topic: "专题六 商标法", type: "multiple", question: "以下关于商标代理机构备案说法正确的是？", options: {"A": "商标代理机构从事国家知识产权局主管的商标事宜代理业务的，应当依法及时向国家知识产权局备案，备案的有效期为3年", "B": "商标代理机构备案信息发生变化的，应当自实际发生变化或者有关主管部门登记、批准之日起3个月内向国家知识产权局办理变更备案，并提交相应材料", "C": "商标代理机构应当在申请市场主体注销登记或者自行决定不再从事商标代理业务前，按照法律法规规定和合同约定妥善处理未办结的商标代理业务", "D": "商标代理机构每次延续备案的有效期为3年，自办理备案之日起计算"}, answer: "ABCD", explanation: "。根据《商标法》第33条的规定，对初步审定公告的商标，自公告之日起3个月内，在先权利人、利害关系人认为违反商标法第13条第2数和第3款（复例、基仿、翻译他人驰名商标）、第15条、第16条第1款、第30条、第31条、第32条（损事他人现有的在先权利或抢注已经使用并有一定影响的商标）规定的，可以向国务院商标管理部门提出异议。因此A、B、C、D选项均正确。（2016）", chapter: "第一章 注册商标专用权的客体"},
  {id: 544, topic: "专题六 商标法", type: "single", question: "以下关于对商标代理机构的监管说法正确的是？", options: {"A": "对商标代理机构和商标代理从业人员受到行政处罚的信息，应记人信用档案", "B": "商标代理机构应当按照国家有关规定报送年度报告", "C": "知识产权管理部门可以对商标代理机构和商标代理从业人员代理行为进行监督检查，对存在商标代理违法违规行为的商标代理机构或者商标代理从业人员，知识产权管理部门可以依职责对其进行约谈", "D": "商标代理机构故意侵犯知识产权，受到较重行政处罚的，应按照有关规定列人严重违法失信名单"}, answer: "C", explanation: "。A选项，只有提出的异议理由属于不符合商标法第10条、第11条等这类绝对理由时，才可由任何人提出异议，如果提出的异议理由属于不符合商标法第13条第2款或第13条第3数等这类相对理由时，只能由利害关系人提出异议，因此A选项错误。B、C选项，根据《商标法》第36条第2数的规定，经审查异议不成立而准子注册的言标，商标注册申请人取得商标专用权的时问自初步审定公告3个月期满之日起计算，因此B选项错误，C选项正确。D选项，根据《商标法》第35条的规定，国务院商标管理部门做出准予注册决定，异议人不服的，可以向商标评审部门请求宣告该注册商标无效；国务院商标管理部门做出不予注册决定，被异议人不服的，可以向商标评审部门申请复申，因此D选项错误。（新编）", chapter: "第一章 注册商标专用权的客体"},
  {id: 545, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列关于商标注册申请的哪些说法是正确的？多选）", options: {"A": "申请商标注册应当提交《商标注册申请书》和商标图样", "B": "申请注册的商标为外文或者包含外文的，应当说明其含义", "C": "商标注册申请等有关文件以纸质方式提出的，应当打字或者印刷", "D": "商标注册申请人应当提交其身份证明文件"}, answer: "AD", explanation: "。根据《商标条例>第26条规定，商标异议申请有下列情形的，国务院商标管理部门不予受理，书面通知申请人并说明理由：（一）未在法定期限内提出的：（二）申请人主体资格、异议理由专圆六商标法不许合前标法常33集定时：（三）无啡的单理山，事实和法律依措的：（四）何一岸议人以惜同的项山，事实和法律依培针对间一资标再次捷出以中请的，因此A.D选明属干不平变理以伪情形，日选项，根赠前标游诺3等的规定，在先权村人，相害关系人可以中请指议。C选项，同一异以人扑充了新证据，比异以可变理，（折）", chapter: "第二章 商标专用权的取得"},
  {id: 546, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列哪些说法是正确的？", options: {"A": "商标注册申请人可以通过一份申请就多个类别的商品申请注册同一商标", "B": "商标注册申请人不得通过一份申请就多个类别的商品申请注册同一商标", "C": "商标注册申请等文件可以以数据电文方式提出", "D": "商标注册申请等文件不得以数据电文方式提出"}, answer: "C", explanation: "。根据（商标法）第35条第2.3次的定，回务院博标管量部门效出准予连册决定的，没给商标注册证，并中公告。异议人不展的，可以依圆本法第44条、第45条的规定句育济审部门请次宜告很泌册前标无效。异议人不度的，可以自收到通扣之日起15日内句育标评审佛门申请凭审，被异议人对商你评审部门的决定不股的，可以自收到通知之日起30日内向人民法院起诉，四北A、B、D选项错误，C选项正确。（新价）", chapter: "第二章 商标专用权的取得"},
  {id: 547, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，商标注册申请等有关文件可以什么方式提出？多选）", options: {"A": "由申请人本人录音录像", "B": "书面方式", "C": "在商标受理窗口口头提出", "D": "数据电文"}, answer: "C", explanation: "。《剪标法》第3S条第3数中现定，国务院标管理部门做出不予注册决定，异议人不度的，可以自收到通知之日起15日内向商标评审部门中请复中，被异议人对商标评审部门的决定不服的，可以自收到通知之日起30日内向人民法院起诉。人民法院应当通知异议人作力第三人多加诉讼，因此A、B、D选项错误，C选项正确。（2017）", chapter: "第二章 商标专用权的取得"},
  {id: 548, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列哪些说法是正确的？", options: {"A": "注册商标需要在核定使用范围之外的商品上取得商标专用权的，应当提出变更申请", "B": "注册商标需要改变其标志的，应当提出变更申请", "C": "注册商标需要变更注册人地址的，应当提出变更申请", "D": "注册商标需婴变更注册人名义的，应当提出变更申请"}, answer: "D", explanation: "。A选项中“精卫”印指“精卫马”，二者合义相同，构成近仅商标。B、C选项中商标文字结构相近，使商标的整体外观近仅，属于近似商标。D选项两件商标虽然读音相同，但是合义与整体外观区别明显，不属于近依商标。（新增，思维扩展）峰”合义相同，构成近似商标。B选项中“北英风情”和“北欧风情”文字读音、字形明是不同，不属于近似商标。C选项虽读音相同，但是合义区别较大，不属于近似商标。D选项“球王”和“球”合义区别明显，不属于近似商标。（新编；思维扩展）", chapter: "第二章 商标专用权的取得"},
  {id: 549, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，在下列哪些情形下，应当提出新的商标注册申请？多选）", options: {"A": "注册商标需要在核定使用范围之外的商品上取得商标专用权的", "B": "商标注册申请人变更其名义的", "C": "注册商标需要改变其标志的", "D": "商标注册申请人删减指定的商品的"}, answer: "ABD", explanation: "。A选项，“凰”和“凤凰“仅为简体和紫体的区别，属于相同商标。B选项，“Susanna”和“SUSANNA“仅为大写和小写的区别，属于和词商标。C选项，“亚美航空“和“美亚医疗”的育标会义成呼叫区别明显，不易使相关公众对商昌或者凰务的来源户生混消，既不是相同商标也不是近似商标。D选项，“新康得“和“新得康”的汉字构成相同，推列顺序不同，属于近似商标。（新编，息维扩展）", chapter: "第二章 商标专用权的取得"},
  {id: 550, topic: "专题六 商标法", type: "multiple", question: "根据商标法的规定，下列哪些情形下，巴黎公约成员国的商标注册申请人可以在中国享有优先权？多选）", options: {"A": "申请人自其商标在巴黎公约成员国第一次提出商标注册申请之日起6个月内，又在中国就相同商品以同一商标提出商标注册申请的", "B": "申请人自其商标在巴黎公约成员国第一次提出商标注册申请之日起6个月内，又在中国就类似商品以同一商标提出商标注册申请的", "C": "申请人在中国政府主办的国际展览会展出的商品上首次使用的商标，自该商品展出之日起6个月内，在中国就相同商品以同一商标提出商标注册申请的", "D": "申请人在中国政府承认的国际展览会展出的商品上首次使用的商标，自该商品展出之日起6个月内，在中国就相同商品以同一商标提出商标注册申请的"}, answer: "AD", explanation: "。A选项，“CATANA”和“KATANA”為然首字母不同，但读并及整体外观近似，属于近位近似，但“喜马拉雅”为公众所熟知，因“享马辣鸭”包合特定设计离意，二者整体外观区别明显，不属于近似商标。C选项，“LOVE”和“EOVE”首字母发音及字形明显不同，区别明显，不易使相关公众产生泥滑，不属于近似商标。D选项，“业拉圆莎”和“梦拉丽莎”虽然首字不同，但读音相近且合义无明显差异，为近似商标。（新编，思维扩展）", chapter: "第二章 商标专用权的取得"},
  {id: 551, topic: "专题六 商标法", type: "multiple", question: "巴黎公约某成员国的公民史密斯，首次将某商标向其所在国提出申请，此后欲就该商标向中国提出商标注册申请并要求优先权。根据商标法及相关规定，下列说法哪些是正确的？", options: {"A": "其优先权期限为自史密斯对该商标在该外国第一次提出商标注册申请之日起十二个月", "B": "其优先权期限为自史密斯对该商标在该外国第一次获得商标注册之日起六个月", "C": "为享有优先权，史密斯应当在提出商标注册申请的时候提出要求优先权的书面声明", "D": "为享有优先权，史密斯应当在中国就相同商品以该商标提出商标注册申请"}, answer: "BD", explanation: "。A选项，相关公众可以区分红旗与我国的国旗、八一军旗，“红旗”文字商标使用于油落商品上可以注册，A选项不当选。B选项，“灭蚊”文字商标使用于整致商品上仅仅直接表示商品的功能，因此不可以注册，应当驳回。C选项，“光明”并非直接表示灯泡商品的功能，可以注册。D选项，红高梁是高梁酿制白酒的主要原料，不能作为文字商标注册，应当驳回，D选项正确。（法考2007，思维扩展）", chapter: "第二章 商标专用权的取得"},
  {id: 552, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列哪些说法是正确的？", options: {"A": "申请注册的商标，同他人在类似商品上已经注册的商标近似的，可以予以核准注册", "B": "申请注册的商标，同他人在同一种商品上已经注册的商标近似的，驳回申请，不予公告", "C": "两个商标注册申请人在类似商品上以相同的商标申请注册的，初步审定并公告申请在先的商标", "D": "申请商标注册时，不得以不正当手段抢先注册他人已经使用并有一定影响的商标"}, answer: "B", explanation: "。A选项，（集体商标、证明商标注册和管理规定》第6条规定：“集体商标、证明商标使用管理规则应当进行公告。注册人修改使用管理规则的，应当提出变更申请，经国家知识产权局审查核准，并自公告之日起生效。”，因此A选项错误。B选项，《集体商标、证明商标注册和管理规定》第13条规定：“证明商标注册人准许他人使用其商标的，注册人应当在许可后3个月内报国家知识产权局备案，并由国家知识产权局公告。”，因此证明商标注册人可以准许他人使用其证明商标，B选项正专圆六商标法，C违啡，（展体育标、注明高标注带管屋期定）赠15茶靠2软定：“晨体商惊注府人不啡件资集体商际作才作旭体此质便用”，因比C资代借供。D选项，（其体前际，注明前标注府和管风定>靠16签展定：“任才标注府人不啡在自已世供的前品上使用还明前标”，因出D选项借读。（昕詹）", chapter: "第二章 商标专用权的取得"},
  {id: 553, topic: "专题六 商标法", type: "multiple", question: "甲乙两企业都拟在其所生产的服装商品上注册“蓝调”牌商标，均递交了注册申请。下列哪些说法是正确的？", options: {"A": "如果二者同一天申请且均未使用或同日使用的，应自行协商确定，协商不成的，将驳回双方申请", "B": "如果二者在同一天申请的，初步审定并公告使用在先的", "C": "如果二者在同一天申请的，各申请人应当在60天内交送第一次使用该商标的日期证明", "D": "如果二者均未使用”蓝调\"牌商标，应初步审定并公告申请在先的"}, answer: "ABCD", explanation: "，A透项.（建保前修、注听前保注后和管理规定>第3等器2发党定：“中请以海是你书作力集体剪标注后的团体、协合或者其您证织，建成质皮业来自谈地理你考你宗的医念谱内。”，因北大选项正噢。F选项，提据《醇你条9）第4条第2放观定：”…以均理标作方集体剪标注后的，其商品符合使用滨地理你考条体的自他人、法人或者其他旧识，可以婴求参如以波场理标名作力集体商标注册的团体、会成管其他旧仅…”，四化B选项正确。C选项，提据（体育标、证明商标注册和管理规定》够5物规定：“申请以地理标志作力证明前标、是体商标注所的，应附送管辖该地理标所标示地区的县级以上人民政府或者主管部门的抵准文件”，国此C选项正确。D选项，低据（集体商标、证明高标注册和管理办法》第7条规定：“以地理标志作方证明责标、怎体商标注册的，可以是该地理标志标示地区的名称，也可以是使修标示某育品来源于该地区的其他标志”，因此D选项说法正确。（新墙）的内容", chapter: "第二章 商标专用权的取得"},
  {id: 554, topic: "专题六 商标法", type: "single", question: "甲、乙两公司均在同一种商品上申请注册“伊人”商标。根据商标法及相关规定，下列说法哪些是正确的？", options: {"A": "如果甲公司先于乙公司一天提出注册申请，但乙公司便用在先，则应初步审定并公告甲公司申请注册的商标", "B": "如果甲公司先于乙公司一天提出注册申请，但乙公司使用在先，则应初步审定并公告乙公司申请注册的商标", "C": "如果甲、乙两公司同一天提出注册申请，但乙公司使用在先，则初步审定并公告乙公司申请注册的商标", "D": "如果甲、乙两公司同一天提出注册申请，且甲、乙公司均未使用该商标，则应直接通知甲、乙两公司以抽签的方式确定一个申请人，驳回另一人的注册申请"}, answer: "C", explanation: "。A、B选项，《商标法》第39条规定：“注册商标的有效期为10年，自核准注册之日起计算”，因此人、B选项错误。C选项，（商标法》第40条规定：“注册商标有效期满，得要继续使用的，商标注册人应当在期满前12个月内按照规定办理续展于续：在此期问未能办理的，可以给予6个月的宽展期。每次续展注册的有效期为10年……”，因此C选项正确。D选项，对续展次数没有限制，因此D选项错误。（2012）", chapter: "第二章 商标专用权的取得"},
  {id: 555, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列哪些情形的商标注册申请应当予以驳回？多选）", options: {"A": "申请注册的标志用作商标易产生不良影响的", "B": "申请注册的标志不具有显著特征的", "C": "申请注册的标志同他人在类似商品上已经注册的商标相同或者近似的", "D": "未缴纳商标申请费用的"}, answer: "D", explanation: "。根据《商标法》第39条的规定，注册商标的有效期为10年，自核准注册之日起计算。本题中，该商标于2017年6月5日公告期满，即该日被核准注册，因此自该日起有效，A、B、C选项错误，D选项正确。（2018）", chapter: "第二章 商标专用权的取得"},
  {id: 556, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列哪些属于应当驳回商标注册申请的情形？", options: {"A": "以不正当手段抢先注册他人已经使用并有一定影响的商标", "B": "两个或者两个以上的申请人，在同一种商品或者类似商品上，分别以相同或者近似的商标在同一天申请注册，且均未使用", "C": "不以使用为目的的恶意商标注册申请", "D": "以不得作为商标使用的标志申请注册商标"}, answer: "A", explanation: "。A、B、D选项，《商标法》第40条规定：“注册商标有效期满，留要继续使用的，商标注册人应当在期满前12个月内按照规定办理续展手续；在此期问未能办理的，可以给予6个月的宽展期。每次续晨注册的有效期为10年，自该商标上一届有效期满次日起计算。期满未办理续展手续的，注销其注册商标”。本题注册商标的届满日为2025年6月1日，某公司可以在该日前12个月期问提出续展注册中请，未办理的，还有6个月宽展期，商标权自该商标上一届有效期满次日起计算，不是从核准续晨注册日起算，因此A选项正确，B、D选项错误。C选项，根据《商标条例》第33条规定，注册商标衢要续展注册的，应当向国务院商标管理部门提交商标续展注册申请书。国务院商标管理部门核准商标注册续展申请的，发给相应证明并于以公告，因此带要经过国家知识产权局核准，不能收到续展注册申请后直接于以公告，C选项错误。（新编）", chapter: "第二章 商标专用权的取得"},
  {id: 557, topic: "专题六 商标法", type: "single", question: "李某对驳回其商标注册申请的决定不服。根据商标法及相关规定，下列说法哪项是正确的？", options: {"A": "李某可以自收到通知之日起十五日内提出行政复议", "B": "李某可以自收到通知之日起十五日内申请复审", "C": "李某可以自收到通知之日起三个月内申请复审", "D": "李某可以自收到通知之日起三个月内向北京知识产权法院提起行政诉讼"}, answer: "D", explanation: "，A违项，中公可的偿准注浩日办年3月23日，有效期至2028年3月22满，四化中公可庄当在2027年3月23028年9月22日期间内是出终晨注册A选项借误。B选项，商你续展后的有应自2028年3月23日是计靠，四北B借识。C选项（敬荡人民法院关于审标民事的份集体透用法律若干同厕的第5条现定：“标注后人或者利事关在注册商标续展定展明内堤出埃展中获核准前，以他人贷犯其注册简你中提起诉论的，人民法院应当史理”，四比项借误。D选项，《醇标法》靠50条中现生册前标微数销、微宜香无效或护期消续展的，自微得、宜告无放戏者注价之1年内，国务院商标管理部门对与该商同或者近似的商标注册中请，不予核自此D选项正确。（2011改编）", chapter: "第二章 商标专用权的取得"},
  {id: 558, topic: "专题六 商标法", type: "multiple", question: "澳大利亚人汤姆逊认为我国初步审定并予以公告的某商标和其拥有的中国商标相近，欲提出异议。根据商标法及相关规定，下列说法哪些是正确的？多选）", options: {"A": "汤姆逊无权对该商标提出异议", "B": "汤姆逊有权提出异议，提出异议的时间期限为自公告之日起三个月内", "C": "汤姆逊有权提出异议，但应委托代理机构代为提出", "D": "汤姆逊有权提出异议，其异议审理期限最长为12个月"}, answer: "BCD", explanation: "。A、B选项.（商标法》靠42条欧规定：“转让注册商标的.首标注形人在同一种商品上注册的近依的商标，成类仅商品上注册的相同或近仅的商应当一并转让”，因此A选项进误，B选确。C选项，低据（商标法）第42条第1定，转让注册商标的，转让人和受让人签订转让协议，并共同向回务比商标管门提出中请，因此C选项正喻。D选商标法》第42条第4款规定：“转让注册经核准后，于以公告。受让人自公告之享有商标专用权”，因此D选项正确。2)", chapter: "第二章 商标专用权的取得"},
  {id: 559, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，对初步审定公告的商标，自公告之日起三个月内，在先权利人、利害关系人可以基于下列哪些理由提起异议？", options: {"A": "就类似商品申请注册的商标是基仿他人未在中国注册的驰名商标，容易导致混消的", "B": "就相同商品申请注册的商标是翻译他人未在中国注册的驰名商标，容易导致混消的", "C": "申请商标注册损害他人现有的在先权利的-176 -", "D": "以不正当手段抢先注册他人已经使用并有一定能响的商标的"}, answer: "ABCD", explanation: "。根据<商标条例>第69条的，许可他人使用其注册商标的，许可人应当在许可合同有效期内向商标局各案斗报送备案材料。备案材料应当说明注册商标使用许可人、被许可人、许可期限、许可使用的商品或者瓜务范国等事项。因此，A、B、C、D均正确。（新编）", chapter: "第二章 商标专用权的取得"},
  {id: 560, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列关于异议程序的说法哪项是正确的？", options: {"A": "初步审定的商标，先予以公告，自公告之日起三个月内，任何人均可以对其提出异议", "B": "经裁定异议不成立而核准注册的，商标注册申请人取得商标专用权的时间自异议裁定生效之日起计算", "C": "经裁定异议不成立而核准注册的，商标注册申请人取得商标专用权的时间自初审公告三个月期满之日起计算", "D": "当事人不服异议裁定的，可以自收到通知之日起三十日内向人民法院起诉"}, answer: "CD", explanation: "。A选项，《最商人民法院关干审理商标民事纠纷案件适用法律若干问期的解释）第19条规定：“而标使用许可合同未经备案的，不影响该许可合回的效力…….因此A选项借误。B、D选项，（最高人民法院关于审理商标民事纠纷案件适用法律若干问题的解释》第4条第2款规定：“在发生注册商标专用权被役害时，独占使用许可合同的被许可人可以向人民法院提起诉讼”，乙公司作为独占被许可人可以单独向人民法院起诉，因此B选项错误，D选项正确。C选项，如无特殊约定，甲公司作为商标注册人有权利向人民法院提起诉论，乙公司作为独占被许可人可以与甲公司共同提起诉讼，因此C选项正确。（2008）", chapter: "第二章 商标专用权的取得"},
  {id: 561, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列哪些选项风于不予受理的商标异议申请的情形？多选）", options: {"A": "申请人无明确异议理由", "B": "在先权利人、利害关系人共同提出异议申请", "C": "同一异议人为补充证据材料以相同的理由针对同一商标再次提出异议申请的", "D": "在商标初审公告之日起三个月后提出异议申请"}, answer: "BCD", explanation: "。A选项，（最高人民法院关于审理商标民事纠纷案件适用法律若干问题的解释>第19条规定：“商标使用许可合同未经备案的，不影响该许可合同的效力.…..”，因此A选项错误。B、C、D选项，《商标法》第43条规定：“许可人应当丝督被许可人使用其注册商标的商品质量。被许可人应当保证使用该注册商标的商品质量。经许可使用他人注册商标的，必须在使用该注册商标的商品上标明被许可人的名称和商品产地…….”，因此B、C、D选项正确。（2018）", chapter: "第二章 商标专用权的取得"},
  {id: 562, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，经审查对商标异议案件作出决定后，当事人不服的，下列关于救济程序的哪种说法是正确的？", options: {"A": "作出准予注册决定的，异议人不服的，可以申请复审", "B": "作出准予注册决定的，异议人不服的，可以申请行政复议", "C": "作出不予注册决定的，被异议人不服的，可以申请复审", "D": "作出不予注册决定的，被异议人不服的，可以向人民法院提起行政诉讼"}, answer: "BCD", explanation: "。《最高人民法院关于审理商标民事纠纷案件适用法律若干问题的解释）第3条第1数规定：“商标法第43条规定的商标使用许可包括以下三类：（一）独占使用许可··…（二）排他使用许可·（三）普通使用许可”，因此A选项错误，B、C、D选项正确。（2019）专圆六商标法权的消灭", chapter: "第二章 商标专用权的取得"},
  {id: 563, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，被异议人对不予注册的复审决定不服的，向人民法院起诉，下列哪种说法是正确的？", options: {"A": "人民法院应当通知异议人作为原告参加诉讼", "B": "人民法院应当通知异议人作为被告参加诉讼", "C": "人民法院应当通知异议人作为第三人参加诉讼", "D": "人民法院应当通知异议人作为证人参加诉讼"}, answer: "ABC", explanation: "。A.B.C选项.根借《商标法>笔44条第1款隐定，已经注所的你，造庆本法第10等定的，或者是以败离平胶改鲁其信不正出平反取注府的，由国务院剪标管理仍门宜告该注府商标无放：其他单位办音个人可以请求前棕评审部门宜杏该注府商标无发，人.B选项均属于违反商标法第10条规定的情形，因北A、B、C选项可以由其他单位戏者个人请求宜告元效。D透项，根易（河标法>第45条第1款规定，已经注后的商将，违庆本法第32条规定的，自商标注府之日起5年内，在免权利人或者利害关系人可以请求前你评审部门宜告该注册商标无放，D选项属于违尺商桥法第32条规定的情形，因北应由在先权利人或者利事关系人请求商标诉审部门宜告无收。（201S）", chapter: "第二章 商标专用权的取得"},
  {id: 564, topic: "专题六 商标法", type: "multiple", question: "下列哪组商标不构成近似商标？", options: {"A": "“精卫鸟”与“精卫”", "B": "“花中王”与“花中玉”", "C": "“酷几”与“酷儿”", "D": "“幸运树”与“幸运数”"}, answer: "ABC", explanation: "。A、B选项，（剪标法）第44条第1款中规定，已经注册的商标是以腐平民或其他不正当手取得注册的，由国务院商标管理部门宜告该注册商标无效：其他单位或者个人可以请求商标评审部门宜告该注府商标无效.因此A、B选项正确。C、D选项，（商标法）第44条中规定，国务院商标管理部门做出宣告注厅商标无效的决定，应当节面通知当事人。当事人对国务院商标管理部门的决定不展的，可以自收到通知之日起15日内向商标评审部门申请复中：当事人对商标评审部门的提定不度的，可以自收到通知之日起30日内向人民法院起诉。当事人对国务院商标管理部门的决定不展的，可以中请复审，但是对于商标评审部门的定不展的，只使向人民法院进行起诉。因此C选项正确，D选项错误。（2016改编）", chapter: "第二章 商标专用权的取得"},
  {id: 565, topic: "专题六 商标法", type: "single", question: "下列哪组商标不构成近似商标？", options: {"A": "“珠穆朗玛”与“珠穆朗玛峰”", "B": "“北美风情”与“北欧风情”", "C": "“好哥”与“好歌”", "D": "“球王”和“球”"}, answer: "C", explanation: "。《商标法》筑45条中规定，已经注册的商标，违反本法第13条第2款和第3款、第15条、第16条第1款、第30条、第31条、第32条规定的，自商标注册之日起5年内，在先权利人或者利害关系人可以请求商标评审部门宜告该注册商标无效，商标代理机构未经投权，以自己的名义将被代理人甲公可的商标进行注册，属于违反了《商标法）第15条规定的情形，甲公司属于利事关系人，可以请求宜告该注册商标无效，因此A、B、D选项错误，C选项正确。（2016改编）", chapter: "第二章 商标专用权的取得"},
  {id: 566, topic: "专题六 商标法", type: "single", question: "下列哪些属于相同或近似的商标？", options: {"A": "“风凰”和“凤凰”", "B": "“Susanna”和“SUSANNA”", "C": "“亚美航空”和“美亚医疗”", "D": "“新康得”和“新得康”"}, answer: "A", explanation: "。A选项，根据《商标法》第45条的规定，已经注册的商标、违反本法第32条规定（拍害他人现有的在先权利成抢注已经使用并有一定影响的商标）的，在先权利人或者利事关系人可以请求商标评审部门宜告该注册商标无效，人选项周某的行为违反商标法第32条规定，在先权利人或者利害关系人可以请求商标评审部门宜告无效，因此人选项正确。B、C、D选项，根据《商标法》第44条第1款的规定，已经注册的商标，违反商标法第11条，由国务院商标管理部门宜告该注册商标无放，B、C、D选项均违反商标法第11条规定，任何单位次者个人都可以请求宜告该注册商标无效，因此B、C、D选项正确。（2017改编）", chapter: "第二章 商标专用权的取得"},
  {id: 567, topic: "专题六 商标法", type: "multiple", question: "下列哪项属于近似的商标？", options: {"A": "“CATANA”和“KATANA”", "B": "“喜马辣鸭”和“喜马拉雅”", "C": "“LOVE\"和\"EOVE”", "D": "“蒙拉丽莎”和“梦拉丽莎”"}, answer: "ABD", explanation: "。（商标法》第47条第2款规定：“宜告注册商标无效的决定或者裁定，对宜告无效前人民法院做出并已执行的商标俊权案件的判决、裁定、调解书和负责商标执法的部门做出并已执行的商标役权案件的处理决定以及已经履行的商标转让或者使用许可合同不具有追溯力。但是，因商标注册人的恶意给他人造成的损失，应当给子赔偿”，因此A、B、D选项正确，C选项错误。（2019）", chapter: "第二章 商标专用权的取得"},
  {id: 568, topic: "专题六 商标法", type: "multiple", question: "下列哪些注册申请应当依法予以驳回7", options: {"A": "将“红旗“文字商标使用于油读商品上", "B": "将“灭蚊\"文字商标使用于昭蚊商品上", "C": "将“光明“文字商标使用于灯泡商品上", "D": "将“红高梁“文字商标使用于高梁酿制的白酒类商品上"}, answer: "ACD", explanation: "。A、C、D选项，《商标法》第52条中规定，将未注册商标冒充注册商标使用的，或者使用未注册商标违反本法第10条规定的，由负贵商标执法的部门予以制止，限期改正，因此A选项正确，C、D选项均属于《商标法》第10条规定的不得作为商标使用的情形，因此C、D选项正确。B选项，缺乏显著特征属于《商标法》第11条规定的不得作为商标注册的情形，因此B选项错误。（2011）", chapter: "第二章 商标专用权的取得"},
  {id: 569, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列说法哪个是正确的？", options: {"A": "集体商标注册人对使用管理规则的任何修改，自修改之日起生效", "B": "证明商标注册人可以准许他人使用其证明商标", "C": "集体商标注册人可以许可非本集体成员使用其集体商标", "D": "证明商标注册人可以在自己提供的商品上使用该证明商标"}, answer: "D", explanation: "。《商标法》第48条规定：“商标法所称商标的使用，是指将商标用于商品、商品包装或者容器以及商品交易文书上，或者将商标用于广告宜传、展览以及其他商业活动中，用于识别商品未源的行为”，使用商标不一定要将商品贴附在商品上，广告宜传时，商标可以脱高商品而使用，商标", chapter: "第二章 商标专用权的取得"},
  {id: 570, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列说法哪些是正确的？", options: {"A": "申请以地理标志作为集体商标注册的团体，应当由来自该地理标志标示的地区范围内的成员组成", "B": "以地理标志作为集体商标注册的，其商品符合使用该地理标志条件的自然人，可以要求参加以该地理标志作为集体商标注册的团体", "C": "申请以地理标志作为集体商标的，还应当附送管辖该地理标志所标示地区的人民政府或者行业主管部门的批准文件", "D": "作为集体商标申请注册的地理标志，可以是该地理标志标示地区的名称，也可以是能够标示某商品来源于该地区的其他可视性标志"}, answer: "ABCD", explanation: "《商标法》能48等属定：“本法所同标的使用，是指桦商标用干商昌，商昌包悠次督容赐以及商品交易文节上，成青体朗标用干广告宣传、展筑以及其伤商业浩动中，消干识别高品米源的行方”，因此A.B、C、D透项均正磷.（辨）", chapter: "第二章 商标专用权的取得"},
  {id: 571, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列关于注册商标有效期的哪种说法是正确的？", options: {"A": "注册商标的有效期自申请之日起计算", "B": "注册商标的有效期为20年", "C": "注册商标有效期满，未办理续展手续的，可以给予6个月的宽展期", "D": "注册商标续展注册最多不得超过5次"}, answer: "AC", explanation: "。A.C项.（商你等例）第63签现定：“使用注册前标，可以在前昌、商品包袋、现明节发者其他附物上标明注府标或普注府擦记。注分标记包括和。使用注册棕记，应当标注在商标的右上俏戏者右下角”，四此人.C选项正确。B选项无标注合义，D选项为事有答作权的标记，四此B、D选项借谈。（2019）", chapter: "第三章 注册商标专用权的维持"},
  {id: 572, topic: "专题六 商标法", type: "multiple", question: "某食品厂于2011年6月5日在其生产的糕点上使用了X商标。2015年10月20日该厂正式申请注册该商标。2017年3月5日该商标经初步审定并予公告。2017年6月5日公告期满；该商标被核准注册。据此，该注册商标有效期自何时起计算？", options: {"A": "2011年6月5日", "B": "2015年10月20日", "C": "2017年3月5日", "D": "2017年6月5日"}, answer: "AB", explanation: "。根据《商标法》第49条规定，商标注册人在使用注册标的过程中，自行改受注滑剪标、注册人名义、地址或者其他注册事项的，由地方负资前标执法的部门资今限期改正：期消不改正的，由回务院前标管现部门销其注册商标。注册商标成为其核定使用的品的通用名称戏者没有正当理由连续3年不使用的，任何单位戏者个人可以向国务院商标管理部门中请批销该注册询标，因此A、B选项正确。C、D选项的情形可宜接向国家知识产权局中请撤销注册商标，无带经负责商标执法的部门责今限期改正，因此.C、D选项错误。（2018改）", chapter: "第三章 注册商标专用权的维持"},
  {id: 573, topic: "专题六 商标法", type: "multiple", question: "某公司注册商标的有效期将于2025年6月1日届满，该公司需要继续使用该商标。对此，下列说法哪项是正确的？", options: {"A": "某公司可以在2025年6月1日前的12个月内申请续展注册", "B": "对于某公司在2025年6月1日之后提出的续展注册申请，该申请不予受理，并注销其注册商标", "C": "续展注册申请送达后即予以公告", "D": "每次续展注册的有效期为10年，自核准续展注册之日起计算"}, answer: "CD", explanation: "。A选项，根据《商标法》第35条的规定，国务院商标管理部门做出准于注册决定，异议人不股的，可以向商标评审部门请求宜告该注册商标无效：国务院商标管理部门做出不子注册块定，被异议人不的，可以自收到通知之日起15日内向商标评审部门中请复审，就商标异议的决定不能直接向人民法院起诉，因此A选项借误。B选项，（商标法》第54条中规定，对国务院商标管理部门撤销或者不子销注册商标的决定，当事人不的，可以自收到通知之日起15日内向商标评审部门申请复审。当事人对商标评审部门的决定不限的，可以自收到通知之日起30日内向人民法院起诉。因此B选项借误，C选项正确。D选项，根据《商标法》第44、45条的规定，当事人对商标评审门的定不瓜的，可以自收到通知之日起30日内向人民法院起诉，因此D选项正确。（2008改编）", chapter: "第三章 注册商标专用权的维持"},
  {id: 574, topic: "专题六 商标法", type: "multiple", question: "甲公司于2009年5月8日提交了一份商标注册申请，该商标于2010年2月8日获准注册，目前该商标仍为有效商标。年如果甲公司需要继续使用该商标，最迟应于哪天提交注册商标续展申请？6个", options: {"A": "2030年2月7日", "B": "2030年2月8日", "C": "2030年8月7日", "D": "2030年8月8日日日"}, answer: "ABD", explanation: "。A选项，根据（商标法>第34条的规定，对驳回中请、不于公告的商标，商标注后中请人不服的，可以自收到通知之日起15日内向商标评审部门中请复审，因此A选项正确。B选项，相据（商标法》第54条的规定，对国务院商标管理部门撒销或者不予撒销注册商标的决定，当事人不服的，可以自收到通如之日起15日内向商标诉申部门中请复申，因此B选项正确。C选项，根据《商标法》第35条第2款规定，国务院商标管理部门做出准予注册决定的，发给商标注册证，并予公告。异议人不服的，可以依照商标法第44条、第45条的规定向商标评审部门请求宜告该注册商标无效。对于不予注册决定，被异议人不股的，可以自收到通知之日起15日内向商标评审部门申请复审。因此C选项错误，D选项正确。（新编）", chapter: "第三章 注册商标专用权的维持"},
  {id: 575, topic: "专题六 商标法", type: "multiple", question: "2018年3月23日，甲公司获得“明解\"商标的核准注册，中核定使用在金属合页商品上。乙公司于2018年6月3日开始在发金属合页商品上使用“明辉”商标。甲公司欲续展其“明解”商逸理标。根据商标法及相关规定，下列说法哪项是正确的？", options: {"A": "甲公司应当在2027年9月23日至2028年3月23日期间内提出续展注册申请", "B": "若甲公司的续展申请获得核准，则该商标的有效期自用2028年3月24日起计算C定", "C": "在甲公司提出续展申请后获得核准前，甲公司以乙公司不侵犯其注册商标专用权提起诉讼的，人民法院可以不子受理日", "D": "若甲公司在商标有效期满后未续展，则对于乙公司2028标年10月对其金属合页商品提出“明辉”商标的注册申请，应不予准核准注册"}, answer: "AD", explanation: "。A、B选项，根据《商标法》第55条第2款规定，被撤销的注册商标，由国务院商标管理部门子以公告，该注册商标专用权自公告之日起终止，因此A选项正确，B选项错误。C、D选项，根据《商标法）第47条第1款规定，依凰商标法第44条、第45条的规定宜告无效的注册商标，由国务院商标管理部门子以公告，该注册商标专用权视为自始即不存在，因此C选项错误，D选项正确。（2014）", chapter: "第三章 注册商标专用权的维持"},
  {id: 576, topic: "专题六 商标法", type: "multiple", question: "张某在同一种商品上注册了两件近似的商标。现其欲者转让给王某。根据商标法及相关规定，下列哪些说法是正确的？标项", options: {"A": "张某可以仅将这两件商标之一转让给王某", "B": "张某应将这两件商标一并转让给王某应", "C": "张某应当和王某签订转让协议，共同提出转让申请理项", "D": "张某和王某的转让注册商标申请经核准后，予以公告，商王某自公告之日起享有商标专用权"}, answer: "AC", explanation: "。A、C选项，（商标法》第50条中规定，注册商标被撤销、被宜告无效或者期满不再续展的，自撤销、宜告无效或者注销之日起1年内，国务院商标管理部门对与该商标相同或者近似的商标注册申请，不予核准，因此A、C选项正确。B选项，《商标条例》第68条规定，国务院商标管理部门销注册商标或者宜告注册商标无效，撤销或者宜告无效的理由仅及于部分指定商品的，对在该部分指定商品上使用的商标注册子以撤销或者宜告无效，因此B选项错误。D选项，根据《商标法》第54条的规定，对国务院商标管理部门销或者不予撤销注册商标的决定，当事人不股的，可以自收到通知之日起15日内向商标评审部门申请复审；", chapter: "第三章 注册商标专用权的维持"},
  {id: 577, topic: "专题六 商标法", type: "multiple", question: "关于商标许可备案，需要向商标局报送的备案材料中必须包括：", options: {"A": "因未进行备案，该许可合同不发生效力", "B": "乙公司无权向人民法院起诉丙公司侵权", "C": "许可使用的商品或服务范围", "D": "乙公司可以单独向人民法院起诉丙公司侵权"}, answer: "ABCD", explanation: "。（商标法》第S7条规定：“有下行为之一的，均属役犯注册商标专用权：）未经商标注册人的许可，在同一种商品使用与其注册商标相同的商标的：（二）未经商标注册人的许可，在同一种商品上使用与其注册商标近依的商标，或者在类仅商品上使用与其注册商标相同或者近仅的商标，容易导致泥滑的…（五）未经商标注舟人同意，更换其注册商标非将该更换商标的育品又投入市场的：（六）故意为役犯他人商标专用权行为提供便利条件，帮助他人实侵犯商标专用权行为的…”，因此A、B、CD选项均属于使犯注册商标专用权的行为。（2014)", chapter: "第三章 注册商标专用权的维持"},
  {id: 578, topic: "专题六 商标法", type: "multiple", question: "甲公司享有“友善熊“注册商标的专用权，核定在玩具上使用。甲公司许可乙公司在其生产玩具上使用该注册商标。对此，下列说法哪些是正确的？多选）", options: {"A": "甲公司对乙公司的商标使用许可备案后生效", "B": "乙公司应当保证使用该商标的玩具的质量", "C": "甲公司应当监督乙公司使用该商标的玩具的质量", "D": "乙公司应当在使用该商标的玩具上，标明乙公司的名称和玩具产地"}, answer: "ABCD", explanation: "。A、C、D选项属于《商标法）第57条规定的役犯注册商标专用权的情形。B选项，《设高人民法院关于审理商标民事纠纷案件适用法律若干问题的解释>第1条规定：“下列行为属于商标法第57条第（七）项规定的给他人注册商标专用权进成其他损害的行为：·（三）将与他人注册商标相同或者相近似的文字注册为域名，井且通过该城名进行相关商品交易的电子商务，容易使相关公众产生误认的”，因此B选项属于役犯注册商标专用权的情形。（2011）", chapter: "第三章 注册商标专用权的维持"},
  {id: 579, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，商标注册人可以通过签订商标使用许可合同，许可他人使用其注册商标。这里规定的商标使用许可包括哪些类型？多选）", options: {"A": "分割使用许可", "B": "独占使用许可", "C": "排他使用许可", "D": "普通使用许可"}, answer: "ACD", explanation: "。A选项，乙公司主观上虽无是意，但仍然构成了《商标法》第57条第（一）、（三）项规定的役权情形。C选项，丁饭店的行为属于《商标法）第57条第（五）项规定的俊权情形。B选项，丙为运输者，主观上无故意，不属于《商标法》第57条中规定的役权情形。D选项，戊公司主观有故意，其仓储行为属于（商标法》第57条第（六）项规定的役权情形。（法考2013改编）", chapter: "第三章 注册商标专用权的维持"},
  {id: 580, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，对于已经注册的商标，下列哪些风于任何单位或个人可以请求宜告该注肝商标无效的理由7", options: {"A": "有害于社会主义道德风尚的", "B": "其标志与我国国旗相同的", "C": "以骗手段或者其他不正当手段取得注册的", "D": "申请商标注册损害他人现有的在先权利的"}, answer: "ACD", explanation: "。A选项，《商标法》第24条规定：“注册商标需要改交其标志的，应当重新提出注册申请”，甲公司将“露滴”商标改成“滴露”属于改交注册标志的行为，应当重新提出注册申请，而不是提出变更申请，因此A选项错误。B选项，根据（商标法）第57条第（二）项的规定，乙公司在同一种商品上使用与甲公司注册商标相近似的商标，属于侵犯注册商标专用权的行为，甲公司有权禁", chapter: "第四章 注册商标专用权的消灭"},
  {id: 581, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列关于注册商标无效宜告的哪些说法是正确的？多选）", options: {"A": "已经注册的商标是以欺骗手段取得注册的，任何单位或个人可以申请宜告该注册商标无效", "B": "已经注册的商标是以欺骗手段取得注册的，国家知识产权局有权宣告该注册商标无效", "C": "宜告注册商标无效的决定，应当书面通知当事人", "D": "当事人对宜告注册商标无效的决定或裁定不服的，都可以申请复审"}, answer: "ABCD", explanation: "。A、B、C选项，（商标法）第S9条第1款规定：“注册商标中合有的本商品的通用名称、图形、型号，或者直接表示商品的质量、主要原料、功他、用途、重量、效量及其他特点，或者合有的地名，注册筒标专用权人无权禁止他人正当使用”，因此A、B、C选项正确。D选项，（商标法）第59条第2款规定：“三维标志注册商标中合有的商品自身的性质产生的形状注开商标专用权人无权禁止他人正当使用”，因此D选项正确。（2017）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 582, topic: "专题六 商标法", type: "multiple", question: "某商标代理机构未经授权，以自己的名义将被代理人甲公司的商标进行注册，在获得核准注册后，甲公司可以自该商标注册之日起五年内采取下列哪种措施维护自身合法权益？", options: {"A": "请求撤销该注册商标", "B": "请求注销该注册商标", "C": "请求宣告该注册商标无效", "D": "对该注册商标提出异议申请"}, answer: "ABC", explanation: "。《商标法》第S9条第1款规定：“注册商标中合有的本商品的通用名称、图形、型号、或者直接表示商品的质量、主婴原料、功能、用途、重量、数量及其他特点，现者含有的地名，注册商标专用权人无权禁止伦人正当使用”。A、B、C选项中的”有机”、“数量的通用内容，可以正当使用。D选项不属于上述法条规定的可以正当使用的情形。（2018)", chapter: "第四章 注册商标专用权的消灭"},
  {id: 583, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列哪些情形仅可以由在先权利人或者利害关系人宣告该注册商标无效？", options: {"A": "周某申请商标注册损害他人现有的在先权利", "B": "李某的注册商标仅有本商品的通用名称", "C": "王某的注册商标仅直接表示商品的质量", "D": "丁某的注册商标仅直接表示商品的主要原料"}, answer: "D", explanation: "。《商标法》第59条第3款规定：“商标注册人申请商标注册前，他人已经在同一种商品或者类似商品上先于商标注册人使用与注册商标相同或者近似并有一定影响的商标的，注册商标专用权人无权势止该使用人在原使用范围内继续使用该商标，但可以要求其附加适当区别标识”，因此A、B、C选项错误，D选项正确。（2014）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 584, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，宜告注册商标无效的决定或者裁定，对哪些法律文书不具有追溯力？", options: {"A": "对宣告无效前人民法院做出并执行的商标侵权案件的判决不具有追溯力", "B": "对宣告无效前人民法院做出并执行的商标侵权案件的调解书不具有追溯力", "C": "对已经具备履行条件的使用许可合同不具有追溯力", "D": "对已经履行的商标转让合同不具有追溯力"}, answer: "AB", explanation: "。A选项，“逍逼乐”被消费者熟知，声誉良好，具有一定影响，乙公司的行为属于恶意注册，甲公司可以在异议期内向国家知识产权局提出异议，A选项正确。B选项，（商标法》第59条第3款规定：“商标注册人申请商标注册前，他人已经在同一种商品或者类似商品上先于商标注册人使用与注册商标相同或者近似井有一定影响的商标的，注册商标专用权人无权禁止该使用人在原使用范国内继续使用该商标，但可以要求其附加造当区别标识”，因此甲公司享有先用权，可以在原有范国内继续使用该商标，B选项正确。C选项，甲公司有权申请宣告该注册商标无效，而不是向国家知识产权局请求撤销该商标，C选项错误。D选项，甲公司的“逍遥乐”属于未注册商标，甲公司没有商标的专用权，对于未注册的商标是不于赔偿的，因此D选项错误。（法考2012）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 585, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，使用未注册商标有下列哪些情形的，由负责商标执法的部门予以制止，限期改正？", options: {"A": "冒充注册商标", "B": "商标标志缺乏显著特征", "C": "带有欺骗性容易使公众产生误认", "D": "同中央国家机关的名称相同"}, answer: "B", explanation: "。A选项使用茉莉花图形不会对文字商标构成侵权。B选项作为赔品进行促销活动仍属于销售行为，构成商标促权。C选项，《商标法》第59条第1款规定：“注册商标中含有的本商品的通用名称、图形、型专随六商标法守，皮普直提老示商告的质盛，生要原科、功信、用遗、重量、数查庆其他件点，次普合价的坞若，注册商标川以人无以热止化人正当使用”，案莉花香是“是指原科气宋，不世成使他中商你专用权的行方，因此C选项借谈。D违项，戊公可具有先用权，不成使权（法考2007改詹）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 586, topic: "专题六 商标法", type: "multiple", question: "关于商标法所称的“商品商标的使用”，以下说法正确的是：", options: {"A": "商标的使用必须将商标贴附在商品上", "B": "商标的使用不能脱离商品而使用", "C": "商标的使用可以在非商业活动中", "D": "商标的使用是指商标能够识别商品来源的行为"}, answer: "AB", explanation: "。《最高人民法院关于市理商标民事纠汾囊件追用法修搭干问厕的解择>信4条第2款规定：“在发生注府阅你专用权效便害时，独占使用许可合回的健许可人可以向人民法院提起诉讼.”因北AB选项正磅，C.D选项借供。（2018）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 587, topic: "专题六 商标法", type: "multiple", question: "根据商标法的相关规定，商标的使用是指（），用以识别来源的行为。", options: {"A": "将商标用于商品上", "B": "将商标用于广告宣传、展览等其他商业活动中", "C": "将商标用在商品包装或容器上", "D": "将商标用于商品交易文书上"}, answer: "BCD", explanation: "。A选项，程据《最高人民法院于审理商标民事纠汾集伟造用法体干问题的解>第4条第2款的规定，在发生法册前标专用权收贷害时，挣他使用许可合同的许可人可以和商标注册人共回起诉，也可以在商标注册人不起诉的情况下，自行提起诉讼，因此人选项正确。B、C选项，（商标法》第47条第2款规定：“宣告注后前标无效的决定或者发定，对宜告无效首人民法院改出井已执行的商标权囊件的判决、定、词解书和工商行政管理部门做出井已执行的商标役权案件的处理决定以及已经行的商标转让或者使用许可合同不具有追测力。但是，因商标注册人的恶意给他人逾成的投失，应当给干赔偿”，注册商标被宜告无效所产生的效力对于此前已经完结的商标设权赔偿、商标许可使用费原则上不具有进湖力，乙公司无权请求返还许可费，丙公司也无权请求返还权赔偿费，因此B、C选项错误。D选项，甲公司的注册商标犯了T公司的落作权，应当承担相应的使权责任，但甲公司获得的使权赔偿费与犯T公司的落作权之同并不具有因果关系，也没有直接的联系，因此甲公司获得的权赔偿费不应转付给T公司，D选项错误。（法考2008）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 588, topic: "专题六 商标法", type: "multiple", question: "根据商标法相关规定，商标注册人可以在其商品上标明以下哪些内容表示其已经注册？多选）", options: {"A": "“注册商标”", "B": "“国家知识产权局商标局”", "C": "@"}, answer: "ABCD", explanation: "。A、B选项，（商标法）第66条规定：为明止便权行为，在证据可他天失或者以后难以取得的情况下，商标注舟人或者利害关系人可以依法在起诉前向人民法院中请保全证据”，因此A、B选项正确。C、D选项，（商标法》第65条规定：“商标注舟人或者利害关系人有证据证明他人正在实或者即将实施役犯其注册商标专用权的行为，如不及时制止将会使其合法权盐文到息以弥补的损事的，可以依法在起诉前向人尺法院申请采取贵令停止有关行为和财产俱全的拼施”，因此C、D选项正确。（2018）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 589, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，商标注册人在使用注册商标的过程中，具有下列哪些情形的，由负资商标执法的部门资令限期改正，期满不改正的，可撤销其注册商标？", options: {"A": "自行改变注册商标", "B": "自行改变注册人名义", "C": "注册商标成为其核定使用的商品的通用名称", "D": "没有正当理由连续三年不使用"}, answer: "D", explanation: "。《商标法》第62杀第1款中规定，负资商标执法的部门根据已经取得的违法嫌疑证据或者举报，对沙嫌役犯他人注册向标专用权的行为进行查处时，可以行使下列职权：（一）询问有关当事人，调查与犯他人注册商标专用权有关的情况···（三）对当事人涉从事侵犯他人注册商标专用权活动的场所实施现场检查：（四）检查与役权活动有关的物品：对有证据证明是役犯他人注册商标专用权的物品，可以查封或者扣押，A、B、C选项属于县级以上工商行政管理部门查处商标侵权可以行使的职权，D选项不属于负责商标执法的部门查处商标侵权可以行使的职权，因此D选项正确。（2016）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 590, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，对于下列哪些裁定或者决定不服的，当事人可以直接向人民法院起诉？A：国家知识产权局针对商标异议作出的决定", options: {"B": "国家知识产权局作出的撤销注册商标的决定", "C": "商标评审部门作出的撤销注册商标的复审决定", "D": "商标评审部门宜告注册商标无效的裁定"}, answer: "D", explanation: "。（商标法》第63条第3款规定：“权利人因被促权所受到的实际损失、役权人因侵权所获得的利益、注册商标许可使用费难以确定的，由人民法院根据俊权行为的情节判决给子500万元以下的赔偿”，因此A、B、C选项错误，D选项正确。（2015）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 591, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，当事人对下列哪些决定不服可在收到通知之日起十五日内申请复审？", options: {"A": "对驳回申请、不予公告不服的", "B": "对不予撤销注册商标的决定不服的", "C": "对经过异议程序中异议不成立，决定被异议商标准予注册不服的", "D": "被异议人对商标不予注册决定不服的"}, answer: "BD", explanation: "。A选项，负贵商标执法的部门有权处理商标役权纠纷，A选项错误。B选项，根据《商标法）第60条第2款规定，负资商标执法的部门处理时，认定促权行为成立的，责令立即停止俊权行为，没收、销毁促权商品和主要用于制造役权商品、伪造注册商标标识的工具，并可以进行罚款，因此B选项符合规定。C、D选项，负资商标执法的部", chapter: "第四章 注册商标专用权的消灭"},
  {id: 592, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列有关注册商标撤销和无效的哪些说法是正确的？多选）", options: {"A": "被撤销的注册商标，应予以公告，该注册商标专用权自公告之日起终止", "B": "被撤销的注册商标，应予以公告，该注册商标专用权视为自始即不存在", "C": "被宣告无效的注册商标，应予以公告，该注册商标专用权自公告之日起终止", "D": "被宣告无效的注册商标，应予以公告，该注册商标专用权视为自始即不存在"}, answer: "A", explanation: "。（商标法》信64条规定：“注册商标专用权人请求偿，披控便权人以注册商标专用权人未使用注册商标提出抗脚的，人民法院可以要求注册商标专用权人提供化前三年内实际使用该注册商标的证据。注册商标专用权人不使证明此首三年内尖际使用过该注行商标，也不能证明因侵权行为受到其他损失的，被控使权人不示担赔偿责任。销售不知道是役犯注册商标专用权的商品，能证明该商昌是自己合法取得并说明提供者的，不承担赔偿资任”，因此人选项正确，B、C、D选项错误。（2019）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 593, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列哪些说法是正确的？", options: {"A": "注册商标被撤销的，自撤销之日起一年内，与该商标相同的商标注册申请，不予核准", "B": "被撤销的注册商标，撤销理由仅及于部分指定商品的，在其他部分指定商品上使用的商标注册视为一并撤销", "C": "注册商标期满不再续展的，自注销之日起一年内，与该商标相同的商标注册申请，不予核准", "D": "当事人对撤销注册商标的决定不服的，可以自收到通知之日起30日内向人民法院起诉"}, answer: "ABCD", explanation: "。（商标条例）第79条规定：“下列情形属于商标法第64条规定的能证明该商品是自己合法取得的情形：（一）有供货单位合法签章的供货清单和货款收据且经查证属实或者供货单位认可的：（二）有供俏双方签订的进货合同且经查证已真实员法行的：（三）有合法进货发票且发票记载事项与沙案商品对应的：（四）其他他够证明合法证取得沙案商品的情形”，因此A、B、C、D选项均正确。（2019）示制度", chapter: "第四章 注册商标专用权的消灭"},
  {id: 594, topic: "专题六 商标法", type: "multiple", question: "某县甲公司未经漫画家乙许可，将其创作的一幅漫画作品作为商标申请，并于2020年3月3日被核准注册。乙认为其著作权受到侵害，与甲发生纠纷。乙应当采取下列哪种方式保护自己的合法权益？", options: {"A": "向甲公司所在地基层法院提起侵犯著作权之诉", "B": "向有管辖权的法院提起撤销甲公司的注册商标之诉", "C": "请求宜告该注册商标无效", "D": "请求撤销该注册商标到进"}, answer: "ACD", explanation: "。A选项，《最商人民法院关于审理商标民事纠纷案件适用法体若干问题的解释》第22条第1款规定：“人民法院在审理商标纠纷案件中，根据当事人的请求和案件的具体情况，可以对涉及的注册商标是否驰名依法作出认定”，因此A选项正确。B选项，根据《商标法》第14条的规定，只有国务院商标管理部门和最商人民法院指定的人民法院可以进行认定，因此B选项错误。C、D选项，根据《商标法>第14条第2、3款规定，在商标注册审查、商标争议处理或者查处商标违法案件过程中，当事人主张驰名商标权利的，国务院商标管理部门根据审查、处理案件的需要，可以对商标驰名情况作出认定。因此C、D选项正确。（2011改编）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 595, topic: "专题六 商标法", type: "multiple", question: "个体经营户王小小从事理发服务业，使用“一帅直措没“作为未注册商标长期使用，享有较高声。王小小通过签订书而合同许可其同一城区的表妹张使用“一帅不即没“商标从事理发业务。后张薇以自己的名义申请”一平使剪没”商标使用于理发业务并获得注册。下列说法正确的你”，日价是？以，", options: {"A": "该商标使用许可合同自双方签字之日起生效乙的", "B": "该商标使用许可合同备案后生效著作", "C": "王小小有权自“一剪没“注册之日起5年内请求宜审奶告该注册商标无效考20", "D": "王小小无权请求宜告该注册商标无效小小同，"}, answer: "AD", explanation: "。A选项，（商标法》第14条第1款规定：“驰名商标应当根据当事人的请求，作为处理涉及商标案件要认定的事实进行认定”，因此A选项正确。B、C选项，根据《商标法》第14条第2、3款的规定，驰名商标只能依照当事人主张，根据审查、处理案件的猎要作出认定，不能主动对商标驰名情况作出认定，因此B、C选项错误。D选项，（商标法》第14条第5款规定：“生产、经营者不得将驰名商标\'字样用于商品、商品包装或者容器上·..”，因此D选项正确。（2014）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 596, topic: "专题六 商标法", type: "multiple", question: "下列哪些商标在申请注册时，有可能会被商标注小册部门认定为不以使用为目的恶意注册申请？张薇", options: {"A": "某旅游公司在多个类别商品上申请百余件商标注行为日起册申请，其中大量为“终南山”、“安地斯”、“棕榈岛”、“铜正确湾”字样的注册商标申请", "B": "某贸易公司在多个类别商品上申请多件商标注册区，申请，其中一半以上为“十七街”、“宸光文具”、“威斯汀”字“十样的注册商标申请其”", "C": "某地产公司为其开发的楼盘申请“桂语听”、意知名是意景澜庭”“清溪”、“云舒”等注册商标请的", "D": "某餐饮公司已经注册“李小老”作为其商标，后在请。相同的类别上又大量申请“张小老”、“王小老”、“刘小老”册岗等不同姓氏百余件商标申请用为"}, answer: "ABCD", explanation: "。《商标法》第14条第1款规定：“驰名商标应当根据当事人的请求，作为处理涉及商标专随六商标法常件得要认定的事实进行认定。认定驰名商标应当出下列四：（一）借关公众对谈商标的加但度：（二）设育标使用的持货叶间：（三）设育标的任何宣传工作的特偿叶间、信度和海理他国：（四）该育标作力确名剪标受保护的记乘…”，因比A、B.C、D选项均正（新）", chapter: "第四章 注册商标专用权的消灭"},
  {id: 597, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列哪些行为属于侵犯注册商标专用权的行为？", options: {"A": "未经商标注册人的许可，在同一种商品上使用与其注册商标相同的商标的", "B": "未经商标注册人同意，更换其注册商标并将该更换商标的商品又投人市场的", "C": "故意为侵犯他人商标专用权行为提供便利条件，帮助他人实施侵犯商标专用权行为的", "D": "未经商标注册人的许可，在类似商品上使用与其注册商标近似的商标，容易导致混淆的"}, answer: "A", explanation: "。模语（商你法）第33条规定，对初少审定公告的郎标，自公告之日起3个月内，在先以科人、科客关系人认力透反本法13条第3款（不相同或者不相类似前品中请注后的前你是复制.基仿戏者自币化人已经在中国注后的驰名岗终）院定的，可以向国务院商棕管增部门提出异议，四此入选项正确，B.C.D选项借供。（2014院）", chapter: "第五章 注册商标专用权的保护"},
  {id: 598, topic: "专题六 商标法", type: "multiple", question: "甲公司在衬衫商品上注册了“百合”文字商标。根据商标法及相关规定，下列哪些行为侵犯其注册商标专用权？多选）", options: {"A": "乙公司未经甲公司许可，在衬衫商品上使用与甲公司“百合”注册商标相近似的文字作为商标品交易的电子商务，使相关公众产生误认", "C": "丁公司购人甲公司生产的“百合”牌衬衫后，未经甲公司同意将商标更换为“茉莉”并将该更换商标的衬衫商品又投人市场销售", "D": "戊公司伪造甲公司的“百合“注册商标标识，但并未将该伪造标识与衬衫商品结合投人市场销售"}, answer: "ACD", explanation: "。A、B选项，（前标法）第13条第2、3款现定：“就相同戏者类似商品中请注后的商场是复制、华仿或者画昂他人兼在中回注册内说名前标，容易导改溉清的，不予注册并情止便用，就不相同或者不相类似商品申请注形的前标是复制、基仿或者幽译他人已经在中回注册的驰名商标，误导公众，政便该施名商标注册人的利应司他变到机害的，不子注册并能止使用”，因此A、B选项正确。C选项，概据《商标法》第45条第1致现定，已经注册的商标，造反本法，自前标注册之日起五年内，在先权利人或者利害关系人可以请求商标评审部门宜告该注册商标无效。对恶危注开的，驰名商标所有人不受五年的时同限制，因此C选项正确。D选项，根据《商标法》第14条第5款的规定，生产、经营者不得将“驰名商标”字样用干广告宣传、展览以及其他商业活动中，因此D选项错误。（2019）注册", chapter: "第五章 注册商标专用权的保护"},
  {id: 599, topic: "专题六 商标法", type: "multiple", question: "甲公司为其生产的啤酒申请注册了“冬雨之恋”商标，但记。下列哪些行为侵犯甲公司的商标权？多选）", options: {"A": "乙公司误认为该商标属于未注册商标，故在自己生产的啤酒产品上也使用“冬雨之恋”商标", "B": "丙公司不知某公司假曾“冬雨之恋”酒而予以运输", "C": "丁饭店将购买的甲公司“冬雨之恋”啤酒倒人自制啤酒桶，自制“侠客”牌散装啤酒出售", "D": "戊公司明知某企业生产假冒“冬雨之恋”酒而向其出租仓库"}, answer: "ABC", explanation: "。（商标条例》第35条规定：“以中国为实有效的营业所，或者在中国有住所，或者拥有中国国箱”，因此A、B、C选项正确，D选项销误。(2019)", chapter: "第五章 注册商标专用权的保护"},
  {id: 600, topic: "专题六 商标法", type: "multiple", question: "甲公司注册了商标“露滴”，使用于日用化妆品等商品上，下列选项说法错误的有？多选）", options: {"A": "甲公司要将该商标改成“滴露”，应提出变更申请", "B": "乙公司在化妆品上擅自使用“滴露”为商标，甲公司有权禁止", "C": "申公司因经营不善连续三年停正使用该商标，该商标可储破注销", "D": "甲公司签订该商标转让合同后，应单独向国家知识产权局提出转让申请"}, answer: "CD", explanation: "。A选项，根据《商标条例》第37条的规定，以中国为原属国中请商标国际注府的，位当遗过国家知识产权局向世界知识产权组织国际局中请办理，因此人选项错误。B选项，根据（商标条例》第37条的规定，以中国为原属国的，与马德里协定有关的商标国际注册的后期指定、放办、江销，应当通过国家知识产权局向国际局申请办理，因此B选项错误。C选项，根据《商标条例》第39条的规定，商标国际注册申请指定的商品或者服务不得超出国内基础申请或者基础注册的商品或者服务的范围，因此C选项正确。D选项，根据《商标条例>第40条的规定，商标国际注册中请手续不齐备或者未按照规定填写申请书的，国家知识产权局不子受理，申请日不予保留，因此D选项正确。（新编）", chapter: "第五章 注册商标专用权的保护"},
  {id: 601, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列哪些情形属于国家知识产权局商标局主动撤销其注册商标的理由？", options: {"A": "商标注册人在便用注册商标的过程中，自行改变注册商标", "B": "注册商标成为其核定使用的商品的通用名称", "C": "注册商标没有正当理由连续三年不使用", "D": "商标注册人在使用注册商标的过程中，自行改变注册人名义"}, answer: "B", explanation: "。A、B、D选项，（商标条例>第37条第2数中规定以中国为原属国的，与马德里协定有关的商标国际注册的后期指定、放弃、注销，应当通过国家知识产权局向国际局申请办理：与马德里协定有关的商标国际注册的转让、刷减、交更、续晨，可以通过国家知识产权局向国际局申请办理，也可以直接向国际局申请办理”，因此A、D选项错误，B选项正确。C选项，《商标条例》第37条第1款规定，以中国为原属国申请商标国际注册的，应当通过国家知识产权局向世界知识产权组织国际局申请办理”，因此C选项错误。（新编）志产品ABC。（地理标志产品保护办法》第2条规定：“地理品，是指产自特定地城，所具有的质量、声誉或者其本质上取决于该产地的自然因素、人文因素的产品。志产品包括：（一）来自本地区的种植、养殖产吕；专随六商标法开科全部来自术地区成青阶分东自共佛逃区，井在安风特定工艺生产和加工的产品”因此A、B违项正标为产品保护办法》第7等2属定：“地理标可以是由具有地理指示功倪的旨你和厌噢产品真为通用名称成的眉合名你，也可以是其有长久使有均定俗成的名你。”因北C选项正喻、《地理惊产办法）第3条规定：海标为产马应当馬谷集实性、特岸性和关联性，因北D透项借供。（新）ABCD，《均理标书产品保护水法》第9条境定：“理品保护中请，由提出产场党语的乒使以上人民改指定的兵有代农性的社会团体、保护中请现梅（以下请人）提出”，因北A选项正确。《均理你志产品保护11条规定：“地理标书产易的集护事请材料应函向识产权管理部门提交。中请种包悟：（一）有关场玫府炎于划定地理标龙产品产地泥围的建以.理标志产品的相关材料，包括：·与产熔的自然因文因素之同关最的说明”，因北，因此B、C、D念（新增）ABCD。《地理标志产品保护办法》第13条现定：“国产权局对收到的中请进行形式审查”，因此人途《地理标志产品保护办法》第14条规定：“对受理的志产品保护中请，国家知识产权局组织开展技术审，因此B选项正确。《地理标忘产品保护办法》第S条国家知识产权局负责全回地理标志产品以及专用标理和保护工作：统一受理和审查地理标志产岳保护农法认定地理标志产品。地方知识产权管理部门负政区城内的地理标志产品以及专用标志的管理和保，因此C、D选项正确。（新输）BCD。《地理标志产品保护办法》第15条规定：“有关者个人对初步认定公告的地理标志产品有异议的，初步认定公告之日起2个月内向国家知识产权局提“，因此A选项错误。《地理标志产品保护办法》第27：“有下列情形之一，自国家知识产权局发市认定公起，任何单位或者个人可以请求国家知识产权局标志产品保护…（二）连续3年未在生产销售中使标志产品名称的”，因此B选项正喻。（地理标志产品保护办法》第30条规定：“有下列行为之一：依据相头法体法规处理：（一）在产地范国外的相同或者类似户品上使用受保护的地理标志产品名称的…”因此C选项正确。《地理标志产品保护办法）第31条规定：…戏者已迁出地理标志产品产地范围的国家如识产权局注销其地理标志专用标志使用注册登记，停止其使用地理标为专用标志并发布公告”，因此D选项正确。（新编）的客体", chapter: "第五章 注册商标专用权的保护"},
  {id: 602, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列哪些说法是正确的？", options: {"A": "张某的注册商标含有本商品的通用名称，张某无权禁止他人正当使用", "B": "王某的注册商标中含有本商品的型号，王某无权禁止他人正当使用", "C": "李某的注册商标中含有的地名，李某无权禁止他人正当使用", "D": "赵某的三维标志注册商标中含有的商品自身性质产生的形状，赵某无权禁止他人正当使用"}, answer: "ABCD", explanation: "。《著作权法》第3条现定：“本法所称的作品，是指文华、艺术和科学领域内具有独创性并能以一定形式农现的智力成果，包怡：…；（二）口述作品：（三）音乐、龙厕、曲艺、焊蹈、杂技艺术作品……（五）摄影作品…，因A、B、C、D选项均正确。（2012）", chapter: "第五章 注册商标专用权的保护"},
  {id: 603, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列哪些情形于商标的正当使用，不构成商标侵权：", options: {"A": "甲公司有权禁止乙公司继续使用该商标并要求其赔偿", "B": "甲公司有权禁止乙公司继续使用该商标，但无权要求其", "C": "甲公司无权禁止乙公司在原使用范围内继续使用该商", "D": "甲公司无权禁止乙公司在原使用范围内继续使用该商标，但可以要求其附加适当区别标识"}, answer: "ABD", explanation: "。A选项符合（容作权法）第3条的规定。B选项，（答作权条例）第4条第（一）项规定：“文字作品，是指小说、诗词、做文、论文等以文字形式表现的作品”，因此B选项正确。C选项，概据《著作权条例》第4条第（十二）项的规定，C选项描迷的属于困形作品，因此C选项借误。D选项，推据《著作权条例》第4条第（十三）项的规定，为晨示、试险或者观测等用途，根据物体的形状和结构按屋一定比例制成的立体作品属于携型作品，因此D选项正确。（2019）", chapter: "第五章 注册商标专用权的保护"},
  {id: 604, topic: "专题六 商标法", type: "multiple", question: "甲公司将其生产的白酒独创性地取名为“逍遥乐”，并在该酒的包装、装潢和广告中突出宜传酒名，致“逍遇乐”被消费者作为自己所产白酒的商标使用并抢先注册。该商标注册申请经初步审定后公告。下列哪些说法是正确的？", options: {"A": "甲公司有权在异议期内提出异议，反对核准乙公司的注册申请", "B": "如“逍遥乐”被核准注册，甲公司有权主张先用权", "C": "如“逍遥乐“被核准注册，甲公司有权请求撤销该商标", "D": "甲公司有权向法院起诉请求乙公司停止使用并赔偿损失"}, answer: "BD", explanation: "。A选项的小说属于文字作品，C选项的地图属于图形作品，均造用著作权法规定。B、D选项，《著作权法》第5条规定：“本法不适用干：（一）法伴、法规，国家机关的决议、决定、命令和其他具有立法、行政、司法性质的文件，及其官方正式译文；（二）单纯事实消息：…，因此B、D选项不适用若作权法规定。（2014)", chapter: "第五章 注册商标专用权的保护"},
  {id: 605, topic: "专题六 商标法", type: "single", question: "甲公司在纸手帕等纸制产品上注册了“茉莉花”文字商标。下列哪项未经许可的行为构成侵权？", options: {"A": "乙公司在其制造的纸手帕包装上突出使用“茉莉花”图形", "C": "丁公司长期制造茉莉花香型的纸手帕，并在包装上标注“茉莉花香型”", "D": "戊公司在甲公司申请商标之前，已经在纸平帕上使用“茉莉花“作为商标，并有一定影响力，但是未注册，在甲公司获得注册后继续使用"}, answer: "A", explanation: "。A选项，《落作权法》第5条规定：“本法不适用于：（三）历法、通用效表、通用表格和公式”因此人选项不属于著作权保护客体。B、C、D选项，根据《著作权法》第3条的规定、工程设计图、产品设计图、地图、示意图等图形作品和模型作品属于著作权法所保护的作品，因此B、C、D选项属于著作权保护客体。（新编）", chapter: "第五章 注册商标专用权的保护"},
  {id: 606, topic: "专题六 商标法", type: "multiple", question: "甲公司许可乙公司独占使用其注册商标，在合同履行期间，市场上出现大量俊犯该注册商标专用权的商品。对此，下列关于俊权诉讼的说法哪些是正确的？多选）", options: {"A": "甲公司可以自行提起诉讼", "B": "乙公司可以自行提起诉讼", "C": "甲和乙应当共同起诉", "D": "在甲不起诉的情况下，乙才可以自行提起诉讼"}, answer: "AD", explanation: "。A、D选项，根据《著作权条例>第4条的规定，A选项的论文属于文字作品，D选项属于杂技艺术作品，均属于著作权法保护的客体。B、C选项，根据《落作权法》第5条的规定，B选项的列决书和C选项的化学元素周期表均不属于著作权法保护的客体。（2016）", chapter: "第五章 注册商标专用权的保护"},
  {id: 607, topic: "专题六 商标法", type: "multiple", question: "甲公司为其牛奶产品注册了“润语”商标后，通过签订排他许可合同许可乙公司使用。丙公司在其酸奶产品上使用“润雨”商标，甲公司遂起诉丙公司停止侵害并赔偿损失，法院判决支持了甲公司的请求。在该判决执行完毕后，“润语”注册商标因侵犯丁公司的著作权被依法宜告无效。下列哪些选项是错误的？", options: {"A": "甲公司和乙公司可以作为共同原告起诉丙公司", "B": "甲公司与乙公司的许可合同应当认定为无效合同，乙公司应当申请返还许可费", "C": "甲公司获得的侵权赔偿费构成不当得利，应当返还给丙公司", "D": "甲公司获得的侵权赔偿费应当转付给丁公司"}, answer: "ABD", explanation: "。A、B选项，法院判决书和《与.贸易有关的知识产权协定》的官方中文译文均属于法律、法规，国家机关的决议、决定、命今和其他具有立法、行政、司法性质的文件，及其官方正式译文，不属于《著作权法》保护客体。C选项，《著作权法》第2条规定：“中国公民、法人或者非法人组织的作品，不论是否发表，依照本法享有落作权。外国人、无国籍人的作品根据其作者所属国或者经营居住地国间中国签订的协议或者共同参加的国际条约享有的著作权，受本法保护”，C选项不当选。D选项，创意属于思想观念的范時，其没有通过一定形式表现出来形成作品，不受《著作权法》的保护。因此，A、B、D选项正确（法考2011）的主体兑法正", chapter: "第五章 注册商标专用权的保护"},
  {id: 608, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，对于保全的哪些说法是正确的：", options: {"A": "为制止侵权行为，在证据可能灭失的情况下，商标注册人可以依法在起诉前向法院申请证据保全", "B": "为制止侵权行为，在证据以后难以取得的情况下，注册商标的利害关系人可以依法在起诉前向法院申请证据保全", "C": "商标注册人或者利害关系人有证据证明他人正在实施或者即将实施侵犯其注册商标专用权的行为，如不及时制止将会使其合法权益受到难以弥补的损害的，可以依法在起诉前向人民法院申请采取财产保全的措施", "D": "商标注册人或者利害关系人有证据证明他人正在实施或者即将实施侵犯其注册商标专用权的行为，如不及时制止将会使其合法权益受到难以弥补的损害的，可以依法在起诉前向人民法院申请采取责令停止有关行为的措施"}, answer: "B", explanation: "。《著作权法》第2条规定：“中国公民、法人或者非法人组织的作品，不论是否发表，依履本法享有若作权。保护外国人、无国籍人的作品根据其作者所保护属国或者经常居住地国同中国签订的普作权协议或者共同参加的国际条约享有的加了相若作权，受本法保护。外国人、无国籍人的作品首先在中国境内出版的，依本法享有著作权。未与中国签订协议", chapter: "第五章 注册商标专用权的保护"},
  {id: 609, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列哪项不属于负责商标执法的部门对涉嫌商标侵权行为进行查处时可以行使的职权？", options: {"A": "询问有关当事人", "B": "对当事人涉嫌从事侵犯他人注册商标专用权活动的场所实施现场检查", "C": "检查与侵权活动有关的物品", "D": "对涉嫌侵权人予以拘留"}, answer: "B", explanation: "《答作以等例>诺6条规定：“普作权自作昌例作完成之日是产生”。本题中，张集作品创作完成之日方2016年9月9日，四此A.C.D选项借供，B选项正确，（2016）", chapter: "第五章 注册商标专用权的保护"},
  {id: 610, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，在侵犯商标专用权纠纷案件中，权利人因被侵权所受到的实际损失、侵权人因侵权所获得的利益、注册商标许可使用费难以确定的，赔偿数额应当如何确定？", options: {"A": "由人民法院根据侵权行为的情节判决给予五十万以下的赔偿", "B": "由人民法院根据侵权行为的情节判决给予一百万以下的赔偿", "C": "由人民法院根据侵权行为的情节判决给予三百万以下的赔偿", "D": "由人民法院根据侵权行为的情节判决给予五百方以下的赔偿"}, answer: "A", explanation: "《著作权法》11条第3款规定：由法人或者非法人组识主持，代袭法人成省事法人组识党惠创作，并由法人或者非法人恒织承推费任的作品，法人或者和法人组织现力作者”。本题中，工作总结由甲小学主持，代教甲小华的意志创作，井由甲小学承担费任，因此甲小学视力谊工作总结的作并且享有著作权，A选项正确，B.C、D透项借误。（2016）", chapter: "第五章 注册商标专用权的保护"},
  {id: 611, topic: "专题六 商标法", type: "single", question: "甲公司以乙公司侵犯其注册商标专用权为由请求负资商标执法的部门处理。对此，负责商标执法的部门的下列做法中哪些是合法的？", options: {"A": "以商标侵权纠纷为民事纠纷、应当由人民法院处理为由拒绝受理甲公司的请求", "B": "认定役权行为成立后，资令乙公司立即停止侵权，议收侵权商品以及主要用于制造役权商品的工具，并处以罚款", "C": "认定役权行为成立后，资令乙公司应向甲公司偿50万元人民币", "D": "认定侵权行为成立后，根据当事人的请求对赔偿数额进行调解"}, answer: "A", explanation: "。本题中，绩效考核办法是由公司主持，代公可危忘创作，由公司承担责任的作品，因此该公司视为该绩效考核办法的作者并享有著作权，A选项正确，B、C、D选项错误。（2017）", chapter: "第五章 注册商标专用权的保护"},
  {id: 612, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列关于注册商标专用权的说法正确的是？多选）", options: {"A": "注册商标中含有的地名，注册商标专用权人无权禁止他人正当使用", "B": "注册商标的专用权，以核准注册的商标和核定使用的商品为限", "C": "侵犯注册商标专用权的赔偿数额应当包括权利人为制止侵权行为所支付的合理开支", "D": "商标注册人申请商标注册前，他人已经在同一种商品上先于商标注册人使用与注册商标相同的商标的，注册商标专用权人可以禁止该使用人继续使用该商标"}, answer: "C", explanation: "。《著作权法》第11条第2款规定：“创作作品的自信人是作者”：《容作权条例）第3条第2款规定：“为他人创作进行组织工作，提供咨询意见、物质条件，或者进行其他辖助工作，均不视为创作”。本题中，提供资会的标某和提供咨询意见的王某均不是作者，该小说由李某完成，且不是常某自传体小说，因此半某是作者，A、B、D选项带误，C选项正确。（2016）", chapter: "第五章 注册商标专用权的保护"},
  {id: 613, topic: "专题六 商标法", type: "multiple", question: "在某商标侵权案件中，注册商标专用权人请求赔偿的，被控侵权人以什么理由提出抗辩可能会免于承担赔偿责任？", options: {"A": "注册商标专用权人未使用注册商标", "B": "注册商标专用权人未合理使用注册商标", "C": "注册商标专用权人使用注册商标未满三年", "D": "使用该注册商标的产品质量不达标"}, answer: "ACD", explanation: "。《落作权法》第14条第2款规定：“合作作品的落作权由合作作者通过协商一致行使：不他协商一致，又无正当理由的，任何一方不得阻止他方行使除转让、许可他人专有使用、出质以外的其他权利，但是所得收丝应当合理分配给所有合作作者”，因此A、C、D选项正确，B选项借误。（新编）", chapter: "第五章 注册商标专用权的保护"},
  {id: 614, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，销售不知道是侵犯注册商标专用权的商品，能证明该商品是自己合法取得并说明提供者的不承担赔偿责任。下列哪些情形属于能证明该商品是自己取得的情形？", options: {"A": "有供货单位合法签章的供货清单和货款收据且经属实的", "B": "有供销双方签订的进货合同且经查证已经真实履行", "C": "有合法进货发票且发票记载事项与涉案商品对应的", "D": "以上都是"}, answer: "ABC", explanation: "。甲、乙、戊都不是作者，完成初稿的丁和修改的丙是你者，丁和可享有若作权。《著作权法》第14条第2款规定：“合作作品的落作权由合作作者通过协商一致行使；不能协商一致，又无正当理由的，任何一方不得阻止他方行使除转让、许可他人专有使用、出质以外的其他权利，但是所得收益应当合理分配给所有合作作者”：因此丁有权不经甲、乙、丙的同意行使发表权，A、B、C选项错误，D选项正确。（法考2007)", chapter: "第五章 注册商标专用权的保护"},
  {id: 615, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，关于驰名商标的认定，下列说法哪些是正确的？多选）", options: {"A": "人民法院在审理商标纠纷案件中，根据当事人的请求和案件的具体情况，可以对涉及的注册商标是否驰名依法作出认定", "B": "在名牌推进战略实施过程中，可由相关行业协会进行认定", "C": "在商标注册过程中产生争议时，有关当事人认为其商标构成驰名商标的，国务院商标管理部门可以对商标驰名情况作出认定", "D": "在商标评审过程中产生争议时，有关当事人认为其商标构成驰名商标的，国务院商标管理部门可以对商标驰名情况作出认定"}, answer: "ABC", explanation: "。《若作权法》第8条第1数规定：“著作权人和与若作权有关的权利人可以投权著作权集体管理组织行使若作权或者与若作权有关的权利。依法设立的著作权集体管理组织是非营利法人，被投权后可以以自己的名义为著作权人和与若作权有关的权利人主张权利，并可以作为当事人进行涉及著作权或者与若作权有关的权利的诉讼、仲裁、调解活动”，因此A、B、C选项正确，D选项错误。（2017）", chapter: "第六章 驰名商标"},
  {id: 616, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，下列有关驰名商标的哪些说法是正确的？", options: {"A": "驰名商标应当根据当事人的请求，作为处理涉及商标案件需要认定的事实进行认定", "B": "在商标注册审查过程中，根据审查需要，可以主动对商标驰名情况作出认定", "C": "在商标争议处理过程中，根据处理案件需要，可以主动对商标驰名情况作出认定", "D": "生产、经营者不得将“驰名商标”字样用于商品、商品包装或者容器上"}, answer: "AD", explanation: "。本题中，赵某和程某为该小说的合作作者，共同享有落作权，许可该出版社出版该小说不属于许可他人专有使用，程某无正当理由不得阻止赵某许可该出版社出版该小说，但赵某由此所得收益应当合理分配给程某，因此A、D选项正确，B、C选项错误。（2014）", chapter: "第六章 驰名商标"},
  {id: 617, topic: "专题六 商标法", type: "single", question: "下列哪些选项属于认定驰名商标应当考虑的因素？", options: {"A": "该商标的持续使用时间", "D": "相关公众对该商标的知晓程度", "C": "该商标作为驰名商标受保护的记录"}, answer: "C", explanation: "。本题中，甲、乙可以不经丙、丁同意以普通许可方式许可他人使", chapter: "第六章 驰名商标"},
  {id: 618, topic: "专题六 商标法", type: "multiple", question: "针对经初步审定公告的某商标，某公司认为该商标仿其已经在中国注册的驰名商标，误导公众并致使公司利益受到损害。根据商标法及相关规定，该公司可以如何处理？", options: {"A": "自公告之日起三个月内提出异议", "B": "自公告之日起三个月内申请审", "C": "自公告之日起三个月内申请行政议", "D": "自公告之日起三个月内向法院起诉"}, answer: "BC", explanation: "。A选项，《等作权杀例》第6条规定：“著作权自作品创作完成之日起产生”，金某千2012年12月24日例作完成了该小说，因此A选项借误。B选项，《著作权法》第13条规定：“改编、留诺、注释、签理已有作品百产生的作品，其著作权由改编、相语、注幕、整理人章有，但行使著作权时不得使现原作品的著作权”，因此张某对其改编的电影剧本享有落作权，B选项正确。C、D选项，《答作权法》第17条第1款规定：“视听作品中的电影作品、电视剧作品的著作权由制作者享有，但编别、导演、摄影、作询、作曲等作者享有署名权，井有权按愿与谢作者签订的合同获得报码”，因此该电影作品的著作权由制作者甲公司享有，C选项正确，D选项错误。（2014）", chapter: "第六章 驰名商标"},
  {id: 619, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，关于驰名商标说法正确的是？多选）", options: {"A": "对未在中国注册的驰名商标，在相同或者类似商品上予以保护", "B": "对已在中国注册的驰名商标，在不相同或者不相类似商品上予以跨类保护", "C": "驰名商标所有人基于相对理由对恶意注册的商标请求宣告无效的申请，其不受五年的时间限制", "D": "经营者可以将“驰名商标”字样用于广告宣传"}, answer: "D", explanation: "。《若作权法》第19条规定：“受委托创作的作品，著作权的归属由资托人和受托人通过合同约定。合同未作明确约定或者没有订立合同的，著作权属于受托人”：《著作权纠纷解释）第12条规定：“按同著作权法第17条规定委托作品若作权具干受托人的情形，委托人在约定的使用范国内享有使用作品的权利…”。本题中，受托人味某享有该院微的著作权，该学院在约定的使用范国内享有使用的权利，因此A、B、C选项错误，D选项正确。（2014）", chapter: "第六章 驰名商标"},
  {id: 620, topic: "专题六 商标法", type: "multiple", question: "根据商标法及相关规定，以中国为原属国申请商标国际注册的，应当至少符合以下哪个条件？", options: {"A": "在中国设有真实有效的营业所2026年专利代理部资格考试", "B": "在中国有住所", "C": "拥有中国国籍", "D": "必须同时符合以上所有条件"}, answer: "AD", explanation: "。（著作权法）第15条规定：“汇编若干作品、作品的片段或者不构成作品的数据或者其他材料，对其内容的选择或者编排体现独创性的作品，为汇编作品，其著作权由汇编人享有，但行使著作权时，不得使犯原作品的著作权”，因此A、D选项正确，B、C选项倡误。（2014）", chapter: "第七章 商标国际注册"},
  {id: 621, topic: "专题六 商标法", type: "multiple", question: "关于马德里国际商标注册下列哪些说法是正确的？多选）", options: {"A": "以中国为原属国申请商标国际注册的可以直接向世界知识产权组织国际局申请办理", "B": "以中国为原属国，与马德里协定有关的商标国际注册的后期指定可以直接向世界知识产权组织国际局申请办理", "C": "商标国际注册申请指定的商品或服务不得超过国内基础申请或基础注册商品或服务范围", "D": "未按照规定填写的商标国际注册申请书的商标申请不予受理"}, answer: "ACD", explanation: "。A、B、C选项，（落作权法》第17条第1款规定：“祝听作品中的电影作品、电视剧作品的著作权由制作者享有，但编剧、导演、摄影、作词、作曲等作者享有署名权，井有权按照与制作者签订的合同获得报酬”，因此例作者甲公司是该电影的落作权人，编剧某享有署名权，并有权按照与甲公司签订的合同获得报图，A、C选项正确，B选项错误。D选项，（落作权法）第17条第3款规定：“视听作品中的剧本、音乐等可以单独使用的作品的作者有权单独行使其落作权”，因此电影音乐创作人周某有权单独行使电影音乐的落作权.D选项正确。（2017）", chapter: "第七章 商标国际注册"},
  {id: 622, topic: "专题六 商标法", type: "single", question: "根据商标法及相关规定，下列哪个事务可以直接向世界知识产权组织国际局申请办理？", options: {"A": "以中国为原属国的，与马德里协定有关的商标国际注册的后期指定", "B": "以中国为原属国的，与马德里协定有关的商标国际注册的转让", "C": "以中国为原属国申请商标国际注册的", "D": "以中国为原属国的，与马德里协定有关的商标国际注册的放弃"}, answer: "A", explanation: "。《溶作权纠纷解释》第14条规定：“当事人合意以特定人物经历为题材完成的自传体作品，当事人对若作权权属有约定的，依其约定：没有约定的，若作权归该特定人物享有，执笔人或整理人对作品完成付出劳动的，若作权人可以向其支付适当的报函”，因此A选项正确，B、C、D选项错误。（2011）", chapter: "第七章 商标国际注册"},
  {id: 623, topic: "专题六 商标法", type: "multiple", question: "下列关于地理标志产品的规定，哪些说法标志是正确的", options: {"A": "地理标志产品是指产自特定地域，所具有他特的质量、声誉或者其他特性本质上取决于该产地的地理（二自然因素、人文因素的产品本", "B": "原材料部分来自其他地区，并在本地区按照特定工艺生产和加工的产品，属于地理标志产品产", "C": "地理标志产品名称可以是由具有地理指示实功能的名称和反映产品真实属性的通用名你构成用的组合名称品", "D": "地理标志产品应当具备新颖性、地城性、待地异性和稳定性标"}, answer: "AD", explanation: "。A、B选项，根据（若作权法>第19条的规定，受委托创作的作品，双方未约定若作权的归属，该随塑著作权属于受托人王某，因此A选项正确，B选项错误。C、D选项，《若作权法）第20条第1款规定：“作品原件所有权的转移，不改变作品若作权的归属，但美术、摄影作品原件的展览权由原件所有人享有”，随塑属于美术作品，原件所有人该公司享有塑原件的展览权，因此C选项错误，D选项正确。（2012）", chapter: "第八章 地理标志"},
  {id: 624, topic: "专题六 商标法", type: "multiple", question: "下列关于地理标志产品申请的规定，哪些成说法是正确的简办", options: {"A": "地理标志产品保护申请可以由县级以上政省府提出方", "B": "地理标志产品保护申请材料应向省级知识（三产权管理部门提交素", "C": "地理标志产品的保护申请材料包括有关地项方人民政府关于划定地理标志产品产地范围的建议京", "D": "地理标志产品的保护申请材料包括与产地项的自然因素和人文因素之间关系的说明地"}, answer: "BD", explanation: "。A、B选项，根据<落作权法>第19条的定，曾国答传记属干委托作品，未约定权利归属的，完成人张某为著作权人，因北A选项借误，B选项正确。C、D选项，王某传记属于特定人物自传体作品，未约定权利归属的，特定人物王某为溶作权人，因北C选项借误，D选项正确。（2018）", chapter: "第八章 地理标志"},
  {id: 625, topic: "专题六 商标法", type: "multiple", question: "下列关于地理标志产品的规定，哪些说法规志是正确的(多选）申", options: {"A": "地理标志产品保护申请由国家知识产权局进行形式审查护", "B": "地理标志产品保护申请由国家知识产权局组织开展技术审查单", "C": "地方知识产权管理部门负责本行政区域内应的地理标志产品以及专用标志的管理和保护工作出", "D": "国家知识产权局负贵全国地理标志产品以条及专用标志的管理和保护工作告销"}, answer: "BC", explanation: "。《著作权法》第20条第1款规定：“作品原件所有权的转移，不改受作品客作权的归属，但美术、摄影作品原件的展览权由原件所有人享有”。本题中，齐其享有该高原件的所有权和展览权，唐某享有除展览权之外著作权中的其他权利.因此A、D选项借误，B、C选项正确。（2016）", chapter: "第八章 地理标志"},
  {id: 626, topic: "专题六 商标法", type: "multiple", question: "下列关于地理标志产品的规定，哪些说法！用是正确的", options: {"A": "地理标志产品自初步认定公告之日起3个月内，任何人可以向国家知识产权局提出异议", "B": "连续3年未在生产销售中使用地理标志产品名称的，任何人可以申请请求撤销地理标志产品保护", "C": "在产地范围外的类似产品上使用受保护的地理标志产品名称的，属于侵犯地理标志产品", "D": "已迁出地理标志产品产地范围的，国家知识产权局注销其地理标志专用标志使用注册登记"}, answer: "BC", explanation: "。《著作权法》第18条规定：“自人为完成法人或者非法人组织工作任务所创作的作品是取务作品.有下列情形之一的职务作品，作者享有暑名权，若作权的其他权利由法人或者非法人组织享有，法人或者非法人组织可以给子作者奖励：（一）主要是利用法人或者非法人组织的物质技术条件创作，并由法人或者非法人组织承担责任的工程设计图、产品设计图、地图、示意图、计算机软件等职务作品…”。本题中，产品设计图为职务作品，张某享有该产品设计图的暑名权，包括复制权在内的若作权的其他权利由甲公司享有，因此A、D选项错误，B、C选项正确。（2017）", chapter: "第八章 地理标志"},
  {id: 627, topic: "专题七 著作权法", type: "single", question: "下列各项中，哪些风于我国著作权法规定的作品？", options: {"A": "口述作品", "B": "摄影作品", "C": "曲艺作品", "D": "戏剧作品"}, answer: "B", explanation: "。根据《著作权法》第18条的规定，本题中的产品设计图作品为职务作品，王某仅享有署名权和获得奖励的权利，其他权利归单位，因此A、C、D选项错误，B选项正确。（2019）", chapter: "第一章 著作权客体"},
  {id: 628, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列有关作品的说法正确的是？", options: {"A": "作品应当具有独创性并能以一定形式表现", "B": "文字作品，是指小说、诗词、散文、论文等以文字形式表现的作品", "C": "反映地理现象、说明事物原理或者结构的地图属于美术作品", "D": "为展示、试验或者观测等用途，根据物体的形状和结构按照一定比例制成的立体模型属于模型作品"}, answer: "ABC", explanation: "。本题中，该论文选属于汇编作品，专利代理师协会是汇编人，享有萧作权，但其行使落作权时，不得便犯原作品的著作权，即汇编权的产生衢要征得原论文萧作权人的回宽，且要支付报酬，他人复制该论文选的问时复们了论文，还应当取得伦文作办的同意，是否俊犯他人的权利和是否对白已的作品享有权利是两个不间的问题，如果代理师协会未经论文落作权人同意而收绿有关论文，则役犯了作者的著作权，但该役权行为并不影响代理师协会对该论文选享有若作权，因此A、B、C选项错误，D选项正确。（2018）", chapter: "第一章 著作权客体"},
  {id: 629, topic: "专题七 著作权法", type: "multiple", question: "下列哪些不适用我国著作权法的规定？", options: {"A": "某9岁儿童创作的短篇小说", "B": "某电视台报道的单纯事实消息", "C": "某城市交通电子地图", "D": "某法律的官方英文译文"}, answer: "ACD", explanation: "。A选项，《若作权法》第2条第1款规定：“中国公民、法人或者非法人组织的作品，不论是否发表，依本法享有著作权”，甲虽然居住在英国，但仍然是我国公民，其著作权自作品创作完成时自动保护，无需发表，因此A选项错误。B选项，《著作权法》第13条规定：“改编、翻译、注释、整理已有作品而产生的作品，其著作权由改编、跑译、注释、整理人享有，但行使著作权时不得役犯原作品的著作权”，翻译、改编均属于对原作品的演绎，因此乙翻译的小，说、丙改编的电影文学剧本均属于演绎作品，B选项正确。C、D选项，《落作权法》第16条规定：“使用改编、翻译、注释、整理、汇编已有作品而产生的作品进行出版、演出和制作录音录像制品，应当取得该作品的著作权人和原作品的著作权人许可，并支付报酬”，因此丙留要征得演绎作品著作权人乙和原作品著作权人甲的同意并向其支付报卧，丁杂志社爵要征得甲、乙、丙均同意并向其支付费用，C、D选项错误。（法考2012）", chapter: "第一章 著作权客体"},
  {id: 630, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪项不属于著作权保护的作品？", options: {"A": "公式", "B": "产品设计图", "C": "模型作品", "D": "地图"}, answer: "BD", explanation: "。A选项，自然人享有姓名权，辛某并未对周某的姓名进行任何操作，没有侵犯姓名权，A选项错误。B选", chapter: "第一章 著作权客体"},
  {id: 631, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪些属于我国著作权法保护的客体？", options: {"A": "某专利审查员发表的关于如何答复审查意见通知书的论文", "B": "某人民法院就某专利权属纠纷案件作出的民事判决书", "C": "化学元素周期表", "D": "某艺术家表演的杂技艺术"}, answer: "BCD", explanation: "。A、B选项，《著作权条例》第15条第2款规定：“若作权无人逃承又无人受遗赠的，其暑名权、改权和保护作品完整权由著作权行玫管理部门保护”，因此A选项错误，B选项正确。C选项，（落作权条例》第17条规定：“作者生前未发表的作品，如果作者未明确表示不发表，作者死亡后50年内，其发表权可由逃示人或者受遗赔人行使：没有继承人又无人受遗赔的，由作品原件的所有人行使”，因此C选项正确。D选项，根据《若作权条例》第14条的规定，合作作者之一死亡后，其对合作作品享有的著作权法第10条第1款第五项至第十七项规定的权利（均属于财产权）无人继承又无人受遗赠的，由其他合作作者享有，因此D选项正确。（2012）", chapter: "第一章 著作权客体"},
  {id: 632, topic: "专题七 著作权法", type: "multiple", question: "我国《著作权法》不适用于下列哪些选项？", options: {"A": "法院判决书", "B": "《与贸易有关的知识产权协定》的官方中文译文", "C": "《伯尔尼公约》成员国国民的未发表且未经我国有关部门审批的境外影视作品", "D": "奥运会开幕式火炬点燃仪式的创意"}, answer: "AB", explanation: "。《若作权法》第20条第1款规定：作品原件所有权的转移，不改变作品著作权的归属，但美术、摄影作品原件的展览权由原件所有人享有”《著作权条例》第17条规定：“作者生前未发表的作品，如果作者未明确表示不发表、作者死亡后50年内，其发表权可由他承人或者受建赠人行使：没有他承人又无人受进赠的，由作品原件的所有人行使”。本题中，李某的关术作品尿件归王某所有，王某享有该作品的展览权，辛某享有除展览权以外的其他权利，学某死亡后没有继承人又无人受道赠，其发表权由作品原件所有人王某行使，因此A、B选项正确，C、D选项借误。（新编）", chapter: "第一章 著作权客体"},
  {id: 633, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，关于著作权的保护，下列确的是？", options: {"A": "如果文章不是在我国境内创作的，不受我国著作权", "B": "外国人在我国境内首先出版的文章受我国著作权法", "C": "中国人首先在非洲某国家发表的文章，是否受我国法保护，取决于该非洲国家是否与我国签订了协议或共同关国际条约", "D": "只有已发表的文章受我国著作权法保护"}, answer: "BC", explanation: "。《若作权法）第10条第1款规定：“著作权包括下列人身权和财产权：（一）发表权，即决定作品是否公之于众的权利（三）修改权，即修改或者投权他人修改作品的权利…（七）出租权，即有偿许可他人临时使用视听作品、计算机软件的原件或者复制件的权利，计算机软件不是出租的主要标的的除外：（八）展览权，即公开陈列美术作品、摄影作品的原件或者复制件的权利…”，祝听作品和计算机软件都享有出租权，因此A、D选项错误，B、C选项正确。(2010)", chapter: "第二章 著作权主体"},
  {id: 634, topic: "专题七 著作权法", type: "single", question: "作家张某撰写一部短篇小说《专利代理师的率福生活》，2016年8月9日开始创作，2016年9月9日创作完成，2016年10月9日办理了作品登记，2016年10月30日该作品在杂志上发表。根据著作权法及相关规定，该作品著作权从何时起产生？", options: {"A": "2016年8月9日", "B": "2016年9月9日", "C": "2016年10月9日", "D": "2016年10月30日"}, answer: "C", explanation: "。根据（若作权法）第10条第1款的规定，A选项的发表权（决定作品是否公之于众的权利）、B选项的修改权（修改或者投权他人修改作品的权利）、D选项的暑名权（表明作者身份，在作品上暑名的权利）均属于人身权。C选项的展览权（公开陈列关术作品、摄影作品的原件或者复制件的权利）属于财产权。（2013）", chapter: "第二章 著作权主体"},
  {id: 635, topic: "专题七 著作权法", type: "single", question: "甲小学主持起革2015年学校工作总结并上报区教育局。其间，校办公室主任张某接受该小学指派承担了具体提写工作。根据著作权法及相关规定，下列哪种说法是正确的？", options: {"A": "甲小学视为该工作总结的作者", "B": "该工作总结的作者是张某，该工作总结的著作权人是甲小学", "C": "该工作总结的署名权由张某享有，该工作总结的复制权由甲小学享有", "D": "该工作总结的著作权由张某享有"}, answer: "B", explanation: "。（著作权法）第10条第1数第（五）项规定：“复制权，即以印刷、复印、拓印、录音、录像、翻录、物拍、数字化等方式将作品制作一份或者多份的权利”。（若作权法）第20条第1款规定：“作品原件所有权的转移，不改交作品若作权的归属，但美术、摄影作品原件的展览权由原件所有人享有”。本题中，王某将字送给申板店，除展览权以外的若作权仍归王某享有，因此乙食品公司犯", chapter: "第二章 著作权主体"},
  {id: 636, topic: "专题七 著作权法", type: "multiple", question: "某公司主持起草新的绩效考核办法，该公司人力资源部王某接受公司指派承担了具体撰写工作，并上报该公司董事会审议通过。根据著作权法及相关规定，下列哪种说法是正确的？单选）", options: {"A": "该公司视为该绩效考核办法的作者", "B": "该续效考核办法的作者是王某，该绩效考核办法的著作权人也是王某", "C": "该续效考核办法的作者是王某，该绩效考核办法的著作权人是该公司", "D": "该续效考核办法的署名权由王某享有，该续效考核办法的复制权由该公司享有"}, answer: "ABD", explanation: "，A.B选项，《答作权法》第10条第1款规定：“等作权他怡下列人身权和财产权：……（二）容名以，即老明作着身份.在作昌上并名的权利：（三）修改权，即修改或者授权人修改作昌的以利”因此A.B选项正喻。C、D选项，《客作以条例》第15条第1故规定：“作省死亡后.其容作权中的署名权、侈改权和保护作高完整权由作誉的承人戏者义造赠人保护”，暑名权不可施杀，因北C选项错误，D选项正确。（2016）", chapter: "第二章 著作权主体"},
  {id: 637, topic: "专题七 著作权法", type: "single", question: "李某以专利代理师常某为原型创作了一部小说。在创作过程中，杨某提供了资金，王某提供了一些咨询意见。根据著作权法及相关规定，下列关于该小说作者的哪种说法是正确的？", options: {"A": "杨某是作者", "B": "王某是作者", "C": "李某是作者", "D": "常某是作者"}, answer: "B", explanation: "。《著作权法）第10条第1款第（七）项规定：出租权，即有借许可他人签时使用现听作品、计算机软件的原伴或者复制体的权利，计算机软件不是出租的主要标的的除外”，只有规听作品、计算机致件享有出租权，小说不享有出租权：电视剧光盘属于现斤作品之一，出租电视则光盘构成侵犯出租权，但租借供个人观看不构成侵犯出租权：因此A、C、D选项错误，B选项正确。（2016）", chapter: "第二章 著作权主体"},
  {id: 638, topic: "专题七 著作权法", type: "single", question: "根据著作权法及相关规定，对于不可以分割使用的合作作品，各合作作者就著作权的行使不能协商一致，又无正当理由的，任何一方可以阻止他方行使下列哪些权利？多选）", options: {"A": "转让", "B": "发行", "C": "出质", "D": "许可他人专有使用"}, answer: "C", explanation: "。《蓉作权法》第10条第1款第（七）项规定：“出租权，印有偿许可他人选时使旧视听作品、计算机软件的原件或者复制件的权利，计算机软件不是出祖的三要标的的隙外”，因此只有视听作品和计算机软件享有出租权，A、B、D选项错误，C选项正明(2017)", chapter: "第二章 著作权主体"},
  {id: 639, topic: "专题七 著作权法", type: "multiple", question: "甲提供资金，乙组织丙和丁以乡村教师戊为原型创作小说《小河弯弯》。在创作中丙写提纲，丁写初稿，丙修改，戊提供了生活素材，乙提供了一些咨询意见。下列哪些选项是错误的？", options: {"A": "甲提供资金是完成创作的保障，应为作者", "B": "乙作为组织者并提供咨询意见，应为作者", "C": "戊提供了生活素材，应为作者", "D": "丁有权不经甲、乙、丙的同意发表该小说"}, answer: "BCD", explanation: "。本题中，张某已经将美术作品送给王某，王某不设犯所有权：王某将总画作品送出版社出版，役犯了张某的发行权和复制权；王某将绘画作品暑名自己，使犯了张某的暑名权：因此A选项错误，B、C、D选项正确。（2019）", chapter: "第二章 著作权主体"},
  {id: 640, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列关于著作权集体管理组织的哪些说法是正确的？多选）", options: {"A": "著作权人可以授权著作权集体管理组织行使著作权", "B": "著作权集体管理组织被授权后，可以以自己的名义为与著作权有关的权利人主张权利", "C": "著作权集体管理组织可以作为当事人进行涉及著作权的诉讼活动", "D": "著作权集体管理组织只能作为诉讼代理人进行涉及与著作权有关的权利的诉讼活动"}, answer: "AD", explanation: "。本题中，网络公司将张某的绘画作品放到网站上，是发表作品的行为，役权作者的发表权：将绘画作品放到网站上供在线询览下载，是网络传播行为，役权作者的信息网络传插权：因此A、D选项正确，B、C选项信化。（2019）", chapter: "第二章 著作权主体"},
  {id: 641, topic: "专题七 著作权法", type: "single", question: "赵某和程某合作创作了一部不可分割使用的小说。某出版社与赵某联系欲出版该小说，程某表示坚决反对，两人不能协商一致。根据著作权法及相关规定，下列哪些说法是正确的？", options: {"A": "赵某和程某为该小说的合作作者，共同享有著作权", "B": "未经程某同意，赵某不得许可该出版社出版该小说", "C": "程某无正当理由不得阻止赵某许可该出版社出版该小说，赵某由此所得收益无需分配给程某", "D": "程某无正当理由不得阻止赵某许可该出版社出版该小说，但赵某由此所得收益应当合理分配给程某"}, answer: "A", explanation: "日。木是中，账某为工偏作品的等作权人，出股社未经张某作可复制井史行的行为、促犯了张某的复制权和发行权，未役犯张某的民编权和汇编权，因此A、日选项正摘，C、D选项错误。（2015）", chapter: "第二章 著作权主体"},
  {id: 642, topic: "专题七 著作权法", type: "single", question: "甲、乙、丙、丁四人合作创作一部小说，甲欲将该小说许可给某电影制片厂改编后拍成电影，乙则想把它许可给某网站在网络上传播，丙对这两种做法均表示反对，丁则不置可否。对此，下列哪一选项是正确的？", options: {"A": "如果丙坚持反对，甲、乙均不能将作品许可他人使用", "B": "甲、乙有权不顾丙的反对，将作品许可他人使用", "C": "如果丁同意，则甲、乙可以不顾丙的反对将作品许可他人使用", "D": "如果丁也表示反对，则甲、乙不能将作品许可他人使用"}, answer: "B", explanation: "。A选项，周某在同站发表小说已经行使发表权，因此网站则除小说不役犯史来权，A选项错议。D选项，网站檀自更改署本便犯丁作者的鼎名权，因此日选项正确。C选项，以编作品还应获得作者许可，因此C选项借误。D选项，电视剧的落作权人皮当为制作者面非导测，D选项倡误。（2018)", chapter: "第二章 著作权主体"},
  {id: 643, topic: "专题七 著作权法", type: "multiple", question: "金某于2012年12月24日创作完成了某小说，并于2013年2月14日发表于某网络文学网站。经金某许可，张某将该小说改编为电影剧本，甲公司作为电影制作者将该剧本拍摄成电影，导演为周某。根据著作权法及相关规定，下列哪些说法是正确的？", options: {"A": "金某自2013年2月14日起对该小说享有著作权", "B": "该电影剧本的著作权由张某享有", "C": "该电影作品的著作权由甲公司享有", "D": "该电影作品的著作权由张某和周某共同享有"}, answer: "ABC", explanation: "。《落作权法实龙条例>第L3条规定：“作者身份不明的作品，由作品原件的所有人行使除名权以外的落作权。作者身份确定后，由作者或者其施承人行使著作权”，因此A、B、C选项正确，D通项借误。（新编）", chapter: "第二章 著作权主体"},
  {id: 644, topic: "专题七 著作权法", type: "single", question: "某学院委托设计师陈某为其设计院徽，双方约定了院徽的使用范围，但未约定其著作权归属。该学院使用院徽一段时间后，双方对该院徽的著作权归属产生了争议。根据著作权法及相关规定，下列哪种说法是正确的？", options: {"A": "该学院享有该院微的著作权", "B": "该学院和陈某共同享有该院微的著作权", "C": "陈某享有该院微的著作权、有权要求该学院停止使用", "D": "陈某享有该院微的著作权，但该学院在约定的使用范围内享有使用的权利"}, answer: "A", explanation: "。A通项，支制权晨于若作财产权，由于港作财产权已经超过保护期，丙的行为不构成役犯甲的复制权，因此A选项错误。B选项，《落作权法>第22条规定：“作者的署名权、修改权、保护作品完整权的保护期不受限制”，因此丙出服署名为另一著名联星丁使犯了甲的署名权，B选项正确。C选项，《民法典》第1014条规定：“任何组织或者个人不得以干涉、盗用、很冒等方式使害他人的姓名权或者名称权”，丙出版社来经丁同意，将自己出版的《大灰>逾话署名为丁，丁对此并不知情，因此丙出版侵犯了丁的姓名权（由于丁没有参与创作，其姓名未经许可被他人使用侵犯的不是名权，因是姓名权），C选项正确。D选项，丙未经乙同意使用其注册商标，使化了乙的商标权，因此D选项正确。（法考2009，思维扩展）", chapter: "第二章 著作权主体"},
  {id: 645, topic: "专题七 著作权法", type: "single", question: "根据著作权法及相关规定，下列哪些说法是正确的？", options: {"A": "汇编若干作品的片段，对其内容的选择或者编排体现独创性的作品，属于汇编作品", "B": "汇编作品不包括对不构成作品的数据或者其他材料进行的汇编", "C": "汇编作品的著作权由汇编人和原作品的著作权人共同享有", "D": "汇编作品的著作权由汇编人享有，但行使著作权时不得侵犯原作品的著作权"}, answer: "D", explanation: "。《著作权条例》第13条规定：“作请身份不明的作品，由你品原件的所有人行使除署名权以外的落作权。作者身份确定专随七普作权法后，由作格或格其他来人行他善作仅”，美术信作为原件所有普，享有阶界告权之外的著作权，僵世仰张其只是得高作自怕成凤片。没有加入摄彭的债创性因款，应当认定为对作的复制，张其不是答作权人。四此，A、B.C透项借误，D通项正响（法考2023.思维扩展）", chapter: "第二章 著作权主体"},
  {id: 646, topic: "专题七 著作权法", type: "multiple", question: "《专利代理师的成长历程》是由李某编剧、张某导演的一部电影，制作者为甲公司，音乐人周某创作了可以单独使用的电影音乐。根据著作权法及相关规定，下列哪些说法是正确的？", options: {"A": "甲公司是该电影的著作权人", "B": "张某是该电影的著作权人", "C": "李某享有署名权，并有权按照与甲公司签订的合同获得报酬", "D": "周某有权单独行使电影音乐的著作权"}, answer: "ABC", explanation: "、A速项，《答作权法》靠22条定：“作普的暑名权、修改权、保护作品完签权的保护期不受限制”.国北人遗项正喻。B图项，自法人的作昌，其发丧权、财产权（爱行权易于时产以之一）的渠护期为作普终生及其死亡后50年，B选项正。C选项，（容你仅法》第23条馆3款规定：“视听作品，其···木法信十条第一款那五项至第十七项规定的权利（包括放映权）的限护划为50年，截止于作品首次变表后第50年的12月31日，但作品自剂作完或后S0年内未发表的，木法不再保护”，C选项正确。D选项，《著作权法》事23条第2款规定：“法人或者非法人组织的作品、答作权（晋名权除外）山法人或者非法人祖织享有的双基作品，其变表权的保护期为50年，数止于作品测作完成后第50年的12月31日……”，因此D过项错误。（2010）", chapter: "第二章 著作权主体"},
  {id: 647, topic: "专题七 著作权法", type: "single", question: "黄某请李某执笔以黄某的人生经历为素材创作一本自传体小说。在小说写作过程中，黄某给李某提供了素材，在小说完成后，黄某向李某支付了5万元，但双方并未约定著作权的归属。根据著作权法及相关规定，下列说法哪些是正确的？", options: {"A": "该小说的著作权应当由黄某享有", "B": "该小说的著作权应当由李某享有", "C": "该小说的著作权应当由黄某和李某共同享有", "D": "该小说的著作权应当由李某享有，黄某可以无偿使用"}, answer: "A", explanation: "。A选项.（著作权法）靠22長现定：“作者的署名权、协改权、保护作品完整权的限护期不处限明”，国此人选项正确。B、C、D选项、根据（著作权法）第23实的规定，发表权以及改输权、发行权等害作财产权均其有一定保护期限，国北B、C、D追项借误。（折）1S.BD。A、B选项，普作权自作品创你完或之日起产生，因此作品著作权自2014年6月1日完成起产生、A边项误、B选项正确。C、D选项，答作财产仪的保护期截止到张某元亡后第50年的12月31日，即2067年12月31日、因此C通项错很，D通项正喻。（2017）", chapter: "第二章 著作权主体"},
  {id: 648, topic: "专题七 著作权法", type: "single", question: "术学院教投王某受某公司委托，创作了一件象征该公司文化和精神的雕塑，并按照合同约定将该雕塑原件交付给该公司，但双方未约定该雕塑著作权的归。根据著作权法及相关规定，下列哪些说法是正确的？", options: {"A": "王某享有该雕塑的著作权", "B": "该公司享有该雕塑的著作权", "C": "王某享有该雕塑原件的展览权", "D": "该公司享有该雕塑原件的展览权"}, answer: "A", explanation: "《若作权条的>第6条规定：“若作权白你品则你究成之日起产生”《哲作权法》第23条第1款规定：“自然人的作品，其发表权、木法第10条第1款第五项至第十七项规定的权利的保护期为作者你生及其死亡后50年，截止于作者死亡后第50年的12月31日1如果是合你作品，截止千最后死亡的作死亡后第50年的12月31日“。木期中，李某的发表权自共作品究成之日2022年1月1日产止，岁某于2022年6月1日办世，发表权保护期截止于2022年6月1日之后第50年的12月31日，即2072年12月31日，因此A选项正确，B、C、D选项借误。（新编）", chapter: "第二章 著作权主体"},
  {id: 649, topic: "专题七 著作权法", type: "single", question: "张某是一名优秀的传记作家，笔下传记人物深受读者喜爱。某出版社准备出版一本关于古代人物曾国藩的传记，自然人王某拟出版一本关于自己成长历程的传记，二者分别向张某约稿，但均未明确约定著作权归属。对此，下列说法正确的是：", options: {"A": "曾国满传记著作权归出版社所有", "B": "曾国藩传记著作权归张某所有", "C": "王某传记著作权归张某所有", "D": "王某传记著作权归王某所有"}, answer: "D", explanation: "。A、B选项，虽然江某已经去世，其著作权仍然受到保护，因此人选项错误。著作财产权的保护期截止于2068年12月31日，B选项错误。C选项，发表权保护期有时问限制，C选项错误。D选项，《若作权法实施条例》第17条规定：“作者生前未发表的作品，如果作者未明确表示不发表，作者死亡后50年内，其发表权可由幽承人或者受遗赠人行使：没有继永人又无人受遗财的，由作品原件的所有人行使”，因此D选项正确。（2018）", chapter: "第二章 著作权主体"},
  {id: 650, topic: "专题七 著作权法", type: "multiple", question: "唐某创作了一幅国画，交给某慈善机构拍卖，所得款项全部用于救助失学儿童。齐某在拍卖会上以80万元的价格购得该画。根据著作权法及相关规定，下列哪些说法是正确的？", options: {"A": "齐某享有该画的复制权", "B": "齐某享有该画原件的所有权", "C": "齐某享有该画原件的展览权", "D": "齐某享有该画的发表权"}, answer: "AC", explanation: "。A、B、C选项，《落作权法》第24条第1款规定：“在下列情况下使用作品，可以不经落作权人许可，不向其支付报，但应当指明作者姓名或者名称、作品名称，并且不得影响该作品的正常使用，也不得不合理地损害著作权人的合法权益：（一）为个人学习、研究或者欣赏，使用他人已经发表的作品…（十一）将中国公民、法人或者非法人组织已经发表的以国家通用语官文字创作的作品翻译成少数民族语首文字作品在国内出版发行：（十二）以回读障母者够感知的无障码方式向其提供已经发表的作品…..”，因此A、C选项正确；B选项的说法与上述法条的规定相反，B选项错误。D选项，根据《若作权法》第25条第1政的规定，为实施义务教育和国家教育规划西给写出", chapter: "第二章 著作权主体"},
  {id: 651, topic: "专题七 著作权法", type: "single", question: "甲公司设计师张某为完成该公司的工作任务，主要利用该公司的物质技术条件创作了产品设计图，并由该公司承担资任。根据著作权法及相关规定，下列哪些说法是正确的？", options: {"A": "张某享有该产品设计图的复制权", "B": "甲公司享有该产品设计图的复制权", "C": "张某享有该产品设计图的署名权", "D": "甲公司享有该产品设计图的署名权"}, answer: "A", explanation: "。A选项符合合理使用的条件，A选项正喻。B选项使用“他人未发花的作品”肾要获得许可，B边项借误。C选项“美回公民”以交“英文论文“不符合曾溶成少歌民族语言的合理使用的情形.C选项借误。D选项条件不全，但即使D选项出股教科书属干国求教育境划，也属干法定许可，应支付投.D选项借误。（2015）", chapter: "第二章 著作权主体"},
  {id: 652, topic: "专题七 著作权法", type: "single", question: "某设计公司的设计师王某接受该公司指派，绘制了一张产品设计图。该设计图主要是利用设计公司的物质技术条件创作，并由该设计公司承担费任。王某与该设计公司没有就设计图的著作权归属进行约定。根据著作权法及相关规定，下列说法正确的是？", options: {"A": "王某享有该设计图的著作权，该设计公司可无偿使用", "B": "王某享有该设计图的署名权，该设计公司享有该设计图著作权的其他权利", "C": "王某享有该设计图的发表权、署名权、修改权和保护作品完整权，该设计公司享有该设计图著作权的其他权利", "D": "该设计公司享有该设计图除发表权以外的所有著作权，同时应当给予王某相应的奖励"}, answer: "C", explanation: "。A选项，《著作权法》第2S茶第1款现定：“为实地义务教育和国家敬育规划百编写出版教科书，可以不经落作权人许可，在教科书中汇编已经发表的作品片段或者短小的文字作品、音乐作品或者单福的炎术作品、摄影作品、田形作品，促应当按规定向答作权人支付报酬…”因此人选项借误。B选项，（等作权法》第46条第2款规定：“广播电台、电视台播放他人已发的作品，可以不经著作权人许可，但应当按卧规定支付投前”，因北B选项借误。C选项，《著作权法》第24条第1款规定：“在下列情况下使用作品，可以不经容作权人许可，不向其支付报酬，但应当指明作者姓名或者名称、作品名称，井且不得形响该作品的正舍使用，也不得不合理地报害著作权人的合法权益：…（十二）以团读障码者能岛知的无障母方式向其提供已经发的作品…”，因此C选项正确。D选项，（落作权法）第42条第2款规定：“录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品，可以不经落作权人许可，但应当按凤规定支付报酬…”，因此D选项错误。（新编）", chapter: "第二章 著作权主体"},
  {id: 653, topic: "专题七 著作权法", type: "multiple", question: "中华全国专利代理师协会为提高专利代理师的执业水平，促进我国专利代理行业的健康发展，将2001-2020年国内学者已发表的有关创造性的论文之中的佳作，按照论文发表的时间、创造性判断的顺序等汇编而成了《创造性判断论文选》。下列哪些说法是错误的：", options: {"A": "被选编人论文选的论文已经发表，故代理师协会不需征得论文著作权人的同意", "B": "该论文选具有公益性，故代理师协会不需向论文著作权人支付报酬", "C": "他人复制该论文选只需征得代理师协会同意并支付报酬", "D": "如代理师协会未经论文著作权人同意而将有关论文收录，代理人协会对该论文集仍享有著作权"}, answer: "ABC", explanation: "。歌曲的落作财产权人为唱片公司。A选项中在个人演唱会的演唱行为设犯了若作权人的活表演权。日选项，将歌曲提供给线上平台点播的行为便犯了著作权人的信息网络传播权。C选项，重唱重拍的MV属于视听作品，郑某享有该作品的萧作权，但是演绎作品的著作权人在行使著作权时不得役犯原作品的著作权，郑某投权KTV损放的行为促犯丁原作品的机械表演权。D选项，根据《落作权法》第42条第2款及《著作权条例>第31条的规定，录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品，可以不经著作权人许可，但应当按照规定支付报酬：若作权人加明不许使用的不得使用。落作权人声明不得对其作品制作录音制品的，应当在该作品合法录制为录音制品时声明。唱片公司在初次录郑某的歌曲为唱片时未声明不允许使用，郑某在重新录制时不得要经过唱片公司的许可，但是应当支付报酬。此时，原唱片公司不许可使用的声明不产生法律效力。因此D选项中郑某的行为未役犯唱片公司的若作权。（新编）", chapter: "第二章 著作权主体"},
  {id: 654, topic: "专题七 著作权法", type: "multiple", question: "居住在美国的我国公民甲创作一部英文小说，乙经许可将该小说翻译成中文小说，丙经许可将该翻译的中文小说改编成电影文学剧本，并向丁杂志社投稿。下列哪些说法是错误的？", options: {"A": "甲的小说必须在我国或美国发表才能受我国著作权法保护", "B": "乙翻译的小说和丙改编的电影文学剧本均属于演绎作品", "C": "丙只需征得乙的同意并向其支付报酬yUu", "D": "丁杂志社如要使用丙的作品还应当分别征得甲、乙的同但只需向丙支付报酬"}, answer: "ACD", explanation: "。《著作权法》第24条第1款规定：“在下列情况下使用作品，可以不经著作权人许可，不向其支付报酬，但应当指明作者姓名或者名称、作品名称，并且不得影响该作品的正常使用，也不得不合理地损害著作权人的合法权益：·（七）国家机关为执行公务在合理范围内使用已经发表的作品….”，因此A、C、D选项正确，B选项错误。（2019）", chapter: "第二章 著作权主体"},
  {id: 655, topic: "专题七 著作权法", type: "multiple", question: "周某是厨师和美食博主，拥有相当数量的粉丝。周某制了一段自己做菜的视频，命名为“周氏爆妙龙虾”上传到网络平因为独特的拍摄场景布置、角度选择、音像配合以及巧妙的剪辑到广大网友的追捧，很快点击量就过千万。李某看到视频后，运虾”上传至网络平台，点击是过万，李某侵犯了周某的哪些权", options: {"A": "姓名权", "B": "肖像权", "C": "名誉权", "D": "著作权"}, answer: "ABD", explanation: "。A选项，《著作权法》第27条第1数规定：“转让本法第10条第1款第（五）项至第（十七）项规定的权利，应当订立书面合同”，因此A选项正确。B选项，《著作权条例》第23条规定：“使用他人作品应当同著作权人订立许可使用合同，许可使用的权利是专有使用权的，应当采取书面形式，但是报社、期刊社刊登作品除外”，因此B选项正确。C选项，《著作权法》第29条规定：“许可使用合同和转让合同中若作权人未明确许可、转让的权利，未经著作权人同意，另一方当事人不得行使”，因此C选项错误。D选项，《若作权条例》第25条规定：“与", chapter: "第二章 著作权主体"},
  {id: 656, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，关于著作权的继承，下列哪些说法是正确的？", options: {"A": "作者死亡后，其著作权无人继承又无人受遗赠的，其署名权、修改权和保护作品完整权不再受著作权法保护", "B": "作者死亡后，其著作权无人继承又无人受遗赠的，其署名权、修改权和保护作品完整权由著作权行政管理部门保护", "C": "作者生前未发表的作品，如作者未明确表示不发表，且没有继承人又无人受遗赠的，作者死亡后50年内，其发表权由作品原件的所有人行使", "D": "合作作品作者之一死亡的，其对合作作品享有的著作权中的财产权无人继承又无人受遗赠的，由其他合作作者享有"}, answer: "ABCD", explanation: "。A选项，（落作权法）第29条规定：“许可使用合同和转让合同中等作权人未明确许可、转让的权利，未经落作权人同意，另一方当事人不得行使”，因此A选项正确。B.C选项，《溶作权法》第10条第3款现定：“著作权人可以全部或省佛分转让本条第I款第（五）项至第（十七）项规定的权利，并做原约定成省本法有关规定获得报图”，上述法条规定的第（五）项至第（十七）项权利属于著作权中的财产权，因此B、C选项正确。D选项，（落作权法》第27条第1款：“转让本法第10条第1款第（五）项至第（十七）项规定的权利，应当订立书面合同”，因此D选项正确。（新编）", chapter: "第三章 著作权的内容"},
  {id: 657, topic: "专题七 著作权法", type: "single", question: "李某是油画《蓟门烟树图》的作者，该油画创作完成后，李某将其卖给王某并交付油面原件，李某死亡后，没有继承人文无人受遗赠，如果李某生前未发表且未明确表示不发表该油画，根据著作权法及相关规定，在李某死亡后50年内，王某可以行使下列哪些权利？", options: {"A": "展览权", "B": "发表权", "C": "修改权", "D": "复制权"}, answer: "D", explanation: "。A选项，客作权转让应当订立书面合同，正确。B选项，寻名权属于人身权，不能转让。C选项，改竭权属于财产权，可以转让。D选项，一般情况下，合同自成立时生效，D选项错误。（2014）", chapter: "第三章 著作权的内容"},
  {id: 658, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列说法哪些是正确的？", options: {"A": "只有视听作品才享有出租权", "B": "展览权是指公开陈列美术作品、摄影作品原件或者复制件的权利", "C": "发表权是决定作品是否公之于众的权利", "D": "修改权是指改变作品，创作出具有独创性的新作品的权利"}, answer: "ABCD", explanation: "。《作权法）第26条第2款规定：“许可使用合同包括下列主要内容：（一）许可使用的权利种类：（二）许可使用的权利是专有使用权或者非专有使用权：（三）许可使用的地城范图、期间：（四）付留标准和办法….”，因此A、B、C、D选项均正确。(2017)权利", chapter: "第三章 著作权的内容"},
  {id: 659, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪项属于著作权中的财产权？", options: {"A": "决定作品是否公之于众的权利", "B": "授权他人修改作品的权利", "C": "公开陈列美术作品复制件的权利", "D": "表明作者身份，在作品上署名的权利"}, answer: "ABCD", explanation: "。（若作权条例）第26条规定：“答作权法和本条例所称与著作权有关的权益，是指出版者对其出版的图书和期刊的版式设计享有的权利，表演者对其表演享有的权利，录音录像制作者对其制作的录音录依制品享有的权利，广播电台、电视台对其播放的广指、电视节目享有的权利”，因此A、B、C、D选项均正确。（新编）", chapter: "第三章 著作权的内容"},
  {id: 660, topic: "专题七 著作权法", type: "multiple", question: "书法家王某为甲饭店题了一幅字，同意其在店内展示。乙食品公司未经王某和甲饭店许可，将该字幅拍摄照片后印制在其生产的产品包装上。根据著作权法及相关规定，下列哪项说法是正确的？", options: {"A": "乙食品公司侵犯了王某的发表权", "B": "乙食品公司侵犯了王某的复制权", "C": "乙食品公司侵犯了王某的展览权", "D": "乙食品公司侵犯了甲饭店的复制权"}, answer: "ABC", explanation: "。A选项，《作权法》第32条规定：“图书出版者出版图书皮当和著作权人订立出版合间，并支付报酬”，因此人选项正确。B选项，《落作权法》第36条第1款规定：“图书出版者经你者许可，可以对作品侈改、删节，因此B选项正确。C选项，《若你权法》第37条第1款规定：“出版者有权许可或者止他人使用其出版的图书、期刊的版式设计”，因此C选项正确。D选项，《若作权法》第34条第3款规定：“图书出版者重印、再版作品的，应当通知落作权人，并支付报酬……”，因此D选项错误。（2011）", chapter: "第三章 著作权的内容"},
  {id: 661, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列关于著作人身权的哪些说法是正确的？多选）", options: {"A": "署名权是表明作者身份，在作品上署名的权利", "B": "修改权是修改或者投权他人修改作品的权利", "C": "作者死亡后，有继承人的，署名权由其继承人继承", "D": "作者死亡后，有继承人的，修改权由其继承人保护"}, answer: "BD", explanation: "。A、B选项，《落作权法》第35条第1款规定：“著作权人向报社、期刊社投的，自稿件发出之日起15日内未收到报社通知决定刊登的，或者自稿件发出之日起30日内未收到期刊社通知决定刊登的，可以将同一作品向其他报社、期刊社投稿。双方另有约定的除外”，因此A选项错误，B选项正确。C选项，《著作权法》第35条第2款规定：“作品刊登后，除若作权人声明不得转载、摘编的外，其他报刊可以转载或者作为文摘、资料刊登，但应当按照规定向落作权人支付报酬”，因此C选项错误。D选项，《著作权法》第36条第2款规定：“报社、期刊社可以对作品作文宇性修改、刷节。对内容的修改，应当经作者许可”，因此D选项正确。（2009）", chapter: "第三章 著作权的内容"},
  {id: 662, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪种行为侵犯了著作权人的出租权？", options: {"A": "甲未经著作权人许可，开设店铺出租其购买的武侠小说", "B": "乙未经著作权人许可，开设店铺出租其购买的电视剧光盘", "C": "丙未经著作权人许可，从出租商店租借武伙小说个人阅读", "D": "丁未经著作权人许可，从出租商店租借电视剧光盘个人观看"}, answer: "ACD", explanation: "。《若作权法》第36条第2款规定：“报社、期刊社可以对作品作文字性修改、刷节。对内容的修改，应当经作者许可”，因此A、C、D选项正确，B选项错误。（新编）", chapter: "第三章 著作权的内容"},
  {id: 663, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪种作品的著作权人享有出租权？", options: {"A": "武侠小说", "B": "戏剧剧本", "C": "计算机软件", "D": "美术作品"}, answer: "ABD", explanation: "。A、B选项，（若作权法）第36条第1款规定：“图书出版者经作者许可，可", chapter: "第三章 著作权的内容"},
  {id: 664, topic: "专题七 著作权法", type: "multiple", question: "王某将画家张某赠送给自己的20幅绘画作品，署名王某自己送出版社出版，取得10万元稿酬。王某的行为侵犯了张某的下列哪些权利？", options: {"A": "张某对其作品的财产所有权", "B": "张某对其作品的发行权", "C": "张某对其作品的署名权", "D": "张某对其作品的复制权"}, answer: "ACD", explanation: "。A选项，《落作权法》第3S条第2款规定：“作品刊登后，除落作权人声明不得转设、指偏的外，其他报刊可以转设戏者作为文指、资斜刊登，但应当按质规定向若作权人支付报图”，因此A选项正确。B选项，《著作权法》第38条规定：“使用他人作品演出，表演者应当取得溶作权人许可，并支付报酬。演出组织者组织演出，由该组织者取得落作权人许可，并支付报酬”，因此B选项错误。C选项，《溶作权法）第46条第2款规定：“广播电台、电视台播放他人已发表的作品，可以不经落作权人许可，但应当按凰规定支付报图”，因此C选项正确。D选项，《著作权法）第42条第3款规定：“录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品，可以不经著作权人许可，但应当按烈规定支付报酬：落作权人声明不许使用的不得使用”，因此D选项正确。（新编）", chapter: "第三章 著作权的内容"},
  {id: 665, topic: "专题七 著作权法", type: "single", question: "某网络公司未经许可将张某刚刚创作完成的一幅绘画作品放到其网站上，供在线浏览和下载。根据著作权法及相关规定，该网络公司的行为侵犯了张某的下列哪些权利？相关店强化600题2026年卡利代理牌货格考认", options: {"A": "该出版社侵犯了张某的复制权", "B": "该出版社侵犯了张某的发行权", "C": "该出版社侵犯了张基的改编权", "D": "该出版社侵犯了张某的汇编权"}, answer: "D", explanation: "。A选项，报刊和网站转载该杂文应向甲支付报酬，无偿转载行为构成使权，A选项错误。B、C、D选项，丙将该杂文译成维文在国内出版，是将中国作者的汉文作品翻译为少数民族语盲在国内发行，属于合理使用，不构成侵权；而乙将该杂文译成法文在国内出版，不属于合理使用，未征得甲的同意，也未支付报酬，构成设权，B、C选项错误，D选项正确。（法考2009）", chapter: "第三章 著作权的内容"},
  {id: 666, topic: "专题七 著作权法", type: "single", question: "周某在甲网站发表小说《公民的名义》，该网站以故事情节设计不合理为由将小说删除。周某交涉无果后，不得已以“木森“为笔名向乙网站投稿，乙网站认为作者原名更有利于作品的传播，遂直接将小说署名更改为作者原名周某并提供在线阅读。丙编剧征得乙网站许可后，将小说改编为电视剧本，最后由著名导演李大路执导拍摄同名电视剧。该剧播出后，迅速走红。对此，下列哪一说法是正确的？", options: {"A": "甲网站删除小说的行为侵犯了周某发表权", "B": "乙网站更改署名的行为侵犯了周某署名权", "C": "丙编剧改编小说的行为符合著作权法规定", "D": "同名电视剧的著作权人归属于导演李大路"}, answer: "C", explanation: "。A选项，作者有权决定署真实姓名也可以界非真实娃名，A选项得评。B型项，发表权是一次性权利，该诗人在甲月的的发表权已经行使完毕，因此B选项得或，C选项，丙的行为属于法定许可，可以不见该诗人同意，但应当按风规定支付报明，罗此C选项正确。D选项，T网站未经过等作权人该诗人同意而转载该作品构成役权，包甲网站并非落作权人，因此不冒要经过甲网站同意，D选项钳误。（法考2011）", chapter: "第三章 著作权的内容"},
  {id: 667, topic: "专题七 著作权法", type: "multiple", question: "李某在二手市场购得一张照片，照片上标明其拍摄日期为2022年1月1日，但未标明作者，根据著作权法及相关规定，在作者身份确定之前，李某享有下列哪些权利？", options: {"A": "发表权", "B": "复制权", "C": "爬览权", "D": "臀名权"}, answer: "ABCD", explanation: "。《著作权法》第39条第1数规定：“表演者对其表演享有下列权利：（一）明表演者身份：（二）保护表演形象不受亚曲：（三）许可他人从现场直播和公开传送其现场表演，并获得报酬（五）许可他人复制、发行、出租录有其表演的录音录像制品，并获得报酬….\"，因此A、B、C、D选项均正确。（2016)", chapter: "第三章 著作权的内容"},
  {id: 668, topic: "专题七 著作权法", type: "multiple", question: "甲创作并出版的经典童活《大灰狼》超过著作财产权保别上并状准注册。丙出版社随后未经甲和乙同意出版了甲的《大灰狼》室话，并使用了“大灰狼“文字及图形，但署名为另一著名歌星丁，丁对此并不知情。关于丙出版社的行为，下列哪一说法是错误的7", options: {"A": "侵犯了甲的复制权", "B": "侵犯了甲的署名权", "C": "侵犯了丁的姓名权", "D": "侵犯了乙的商标权"}, answer: "ACD", explanation: "。A选项，《落作权法）第42条第1款规定：“录音录像制作者使用他人作品制作录音录像制品，应当取得若作权人许可，并支付报酬”，因此A选项正确。B选项，（若作权法》第42条第2款规定：“录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品，可以不经著作权人许可，但应当按照规定支付报酬；著作权人声明不许使用的不得使用”，因此B选项错误。C选项，《著作权法》第43条规定：“录音录像制作者制作录音录像制品，应当同表演者订立合同，并支付报酬”，因此C选项正确。D选项，（若作权法）第44条第1款规定：“录音录像制作者对其制作的录音录像制品，享有许可他人复制、发行、出租、通过信息网络向公众传插并获得报酬的权利·……”，因此D选项正确。（2014）", chapter: "第三章 著作权的内容"},
  {id: 669, topic: "专题七 著作权法", type: "multiple", question: "美术馆收藏了一幅山水画的原件，该幅画是1993年创作完成，但原作者不详。美术馆打算举办一场线上展览活动，请摄影师张某将包括该幅山水画在内的50幅画作拍摄并在网上展出，并加了水印“作者：佚名、拍摄者：张某，美术馆收藏”、李某将山水画下截去掉水印后，在自已的公众号发布，下列说法正确的是？", options: {"A": "李某侵犯了张某的信息网络传插权", "B": "李某侵犯了张某的署名权", "C": "李某侵犯了张某的发表权", "D": "李某侵犯了美术馆的信息网络传插权"}, answer: "ABC", explanation: "。A、B、C选项，电视连续剧中使用音乐作品作为背景音乐，属于复制行为。音乐作品的若作权人、表演者、录音制", chapter: "第三章 著作权的内容"},
  {id: 670, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列说法哪些是正确的？", options: {"A": "作者的名权的保护期不受限制", "B": "自然人的作品，发表权与发行权保护期一致", "C": "视听作品自创作完成后五十年内未发表的，其放映权不再受著作权法保护", "D": "名权由作者享有、著作权的其他权利由法人享有的职务作品，保护期为作者终生及死亡后五十年2026年中利代江体音格考认"}, answer: "AC", explanation: "。A、B选项，（容作权法》第46条第1款规定：“广腾电合、电说台放他人来发的作品，应当联得著作权人许可，并次付投酬”，因此A远项正身，B选项借误。C选项，《落作权法》第46条第2数规定：“广播电台、电视台播放他人已发的作品，可以不经著作权人许可，但应当校履规定支付报酬”，因此C选项正确。D选项，（著作权法）第48条规定：“电视台播放他人的悦听作品、录像制品，应出取得视听作品奢作权人或者录像制作者许可，并支付报酬：播放他人的录像制品，还应当取得客作权人许可，井支付报酬”，因此D选项错误。（2019）", chapter: "第三章 著作权的内容"},
  {id: 671, topic: "专题七 著作权法", type: "single", question: "根据著作权法及相关规定，下列哪项权利的保护期不受限制？", options: {"A": "修改权", "B": "发表权", "C": "改编权", "D": "发行权"}, answer: "A", explanation: "。A选项，李某从2016年8月4日创作完成之日起对小说享有著作权，A选项错误。B选项，张某对其改遍的剧本享有著作权，B选项正确。C选项，甲公司将张某改编的剧本拍成电视剧应取得演译作品著作权人张某以及原作品作者幸某的许可并支付报酬，C选项正确。D选项，乙电视台播放该电视剧（视斤作品）应当取得落作权人甲公司许可并支付报酬，D选项正确。（法考2008)", chapter: "第三章 著作权的内容"},
  {id: 672, topic: "专题七 著作权法", type: "multiple", question: "2012年1月1日，张某、韩某共同构思一部小说《波涛消的专利战》。2014年6月1日，张某、韩某共同创作完成该小说。韩某于2016年7月1日去世，张某于2017年10月1日去世。根据著作权法及相关规定，以下说法正确的是？", options: {"A": "该作品著作权自2012年1月1日起产生", "B": "该作品著作权自2014年6月1日起产生", "C": "该作品复制权的保护期截止到2067年10月1日", "D": "该作品复制权的保护期截止到2067年12月31日"}, answer: "AC", explanation: "。本题中，申既是作者又是表演者，乙公司擅自将该歌曲制成彩铃在网络上提供免费下载的行为，役犯了甲的信息网络传播权和表演者权，因此A、C选项正确，B、D选项错误。（法考2007）", chapter: "第三章 著作权的内容"},
  {id: 673, topic: "专题七 著作权法", type: "multiple", question: "2022年1月1日，作家李某创作完成一部短篇小说。2022年3月1日，李某对该小说办理了版权登记。2022年6月1日，李某因病去世。李某生前未发表该小说，也未明确表示不发表。根据著作权法及相关规定，关于李某发表权的保护期，下列说法哪个是正确的？", options: {"A": "李某的发表权自2022年1月1日产生，截止于2072年12月31日", "B": "李某的发表权自2022年3月1日产生，截止于2072年12月31日", "C": "李某的发表权自2022年3月1日产生，截止于2072年6月1日", "D": "李某的发表权自2022年1月1日产生，截止于2072年6月1日"}, answer: "CD", explanation: "。A选项，发行权属干著作权财产权，保护期为作者终生及其死亡后50年，截止于作者死亡后第50年的12月31日，A选项借误。B选项，修改权属于人身权，保护期不受限制，D选项借误。C选项，表演者对其表演享有的许可他人录音录像：并获得报附的权利，保护期为50年，截止于该表演发生后第50年的12月31日，C选项正确。D选项，录音录像制作者对其制作的录音录像制品，享有许可他人发制、业行、出租、通过信息网络向公众传插并获得报酬的权利：权利的保护期为50年，截止于该制品首次制作完成后第50年的12月31日，D选项正确。（2013）", chapter: "第三章 著作权的内容"},
  {id: 674, topic: "专题七 著作权法", type: "multiple", question: "江某早年丧偶，育有两儿一女。其根据自身经历于2017年12月份撰写完成回忆录一册。但碍于个人隐私，犹豫不决，生前未将该回忆录公之于世，但亦未明确表示不发表该回忆录。后江某于2018年5月1日去世。下列说法正确的是：", options: {"A": "江某已去世，其著作权不再受到法律保护", "B": "该回忆录的著作财产权截止于2068年5月1日", "C": "江某关于回忆录的署名权、发表权、修改权、保护作品完整权的保护期不受限制", "D": "在江某死亡后50年内，其子女可以决定该回忆录是否发表"}, answer: "ABCD", explanation: "。A选项，某公司复制唱片并发行，需要经过著作权人、演唱者、录像制作者的许可并付费，某公司没有经过若作权人的许可，属于役权行为。B选项，某航空公司购买正版录音制品在飞机上插放供乘客欣赏经过了著作权人甲的许可，并未役犯作品的表演权，但是播放录音制品，录音制作者有收取报酬的权利，航空公司仅获得著作权人许可，未向录音制作者支付报酬，仍属于役权行为。C选项，电影公司将歌曲作为插曲，应同时经过甲、乙、丙三人许可，仅经过乙、丙许可，侵犯申的复制权。D选项，某学生役犯了著作权人、录音制作者以及表演者的信息网络传插权。（2018）", chapter: "第三章 著作权的内容"},
  {id: 675, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪些情况下使用作品，可以不经著作权人许可，不向其支付报酬，但不能役犯著作权人依照著作权法享有的其他权利？", options: {"A": "为个人欣赏使用他人已经发表的作品", "B": "将中国公民已经发表的以少数民族语盲文字创作的作品翻译成国家通用语言文字作品在国内出版发行", "C": "将已经发表的作品改成以阅读障碍者能够感知的无障碍方式提供", "D": "为实施义务教育和国家教育规划而编写出版教科书"}, answer: "AB", explanation: "。A选项，广插电台、电视台有转插权，乙电视台未经许可转插，甲电视台有权禁止，A选项正确。B选项，表演者有许可他人从现场直播和公开传送共现场表演的权利，乙电视台未经许可转插其演唱的行为侵犯了其表演者权，因此B选项正确。C选项，音像店出租录音录像制品，应当取得表演者以及录音录像制作者丙的许可并支付报到，不能只获得二者之一的许可，C选项错误。D选项，音乐作品的著作权人、表演者、录音录像制作者均享有信息网络传据权，因此戊通过信息网络向公众传指仅取得", chapter: "第三章 著作权的内容"},
  {id: 676, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪项行为可以不经著作权人许可，不向其支付报酬？", options: {"A": "某大学教授张某为研究某课题，少量复制了已经发表的某篇论文供课题组内部使用", "B": "王某为说明某一问题，在作品中引用他人未发表的作品", "C": "某出版社将美国公民李某已经发表的英文论文翻译成少数民族语言文字在我国国内出版", "D": "某出版社为编写出版大学教科书，汇编已经发表的单幅美术作品"}, answer: "AB", explanation: "。A选项，雁灾义演只是不向滨员文付报厕，仿然要观众文付费用，因此不属于合星使用情形，搬某应征得中某同意并文付报酬，A选项正确。B选项，有级得唱片公可永制谈欧曲应当征得叶某、郝某同意并文付报，B选项正确。C、D迄项，星星电台播放该唱片不妥向落作权人、录音制作者许可，但需要向著作权人、涤音制作者支付报酬，因此无露经叶某和南极解唱片公罚同意，C、D选项错误。（法考2009", chapter: "第三章 著作权的内容"},
  {id: 677, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪个行为可以不经著作权人许可，不向其支付报酬？", options: {"A": "开个人演唱会上演唱歌曲", "B": "将唱片上的歌曲提供给线上平台点播", "C": "重唱重拍MV，授权KTV播放", "D": "重录为黑胶唱片，同时支付原唱片公司报酬，但是原唱片公司拒收并声明不许可使用"}, answer: "ACD", explanation: "。床某是剧本的作者，对剧本享有著作权，有权指止他人将则本通过信息网络传插，A选项正确。甲剧团滨员为完成单位的演出任务面进行的表演活动为识务叛演，表演者权由甲剧团享有，甲剧团有权禁止他人未经许可将该歌剧通过信息网络传据，B选项错误，C正确。东方卫视对于该歌剧据放形成的信号，享有广标组织者权，咕哈网未经许可将其电视信号上传至网络.使犯了东方卫视的广播组织者权，D选项正确。综上所述，A、C、D选项正确。（法考2023）利的保护", chapter: "第三章 著作权的内容"},
  {id: 678, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法的规定，关于国家机关为执行公务在合理范围内使用已经发表的作品，下列说法正确的是？", options: {"A": "可以不经著作权人许可", "B": "应当向著作权人支付报酬", "C": "可以不向著作权人支付报酬", "D": "应当指明作者姓名、作品名称"}, answer: "ABCD", explanation: "。《著作权法）第50条第1款规定：“下列情形可以避开技术措施，但不得向他人提供避开技术措施的技术、装显或者部件，不得役犯权利人依法享有的其他权利：（一）为学校课堂教学或者科学研究，提供少量已经发表的作品，供教学或者科研人员使用，而该作品无法通过正常途径获取：（二）不以管利为目的，以阅读障母者能够感知的无障碍方式向其提供已经发表的作品，而该作品无法通过正常途径获取（三）国农机吴依凰行政、监察、司法权序执行公务：（四）对计算机及其系统或者网络的安全性他理行测试·”，因此A、B、C、D选项均正喻。（2010）", chapter: "第三章 著作权的内容"},
  {id: 679, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪些说法是正确的？", options: {"A": "著作权转让合同应当采取书面形式", "B": "著作权人许可录音录像制作者专有使用其作品的，应当订立书面许可使用合同", "C": "著作权转让合同中著作权人未明确转让的权利，视为一并转让", "D": "与著作权人订立专有许可使用合同的，可以向著作权行政管理部门备案"}, answer: "ABCD", explanation: "。（著作权法>第52条规定：”有下列侵权行为的，皮当根据情况，承担停止便事、消除影响、路礼道默、路偿损失等民事贵任：（一）未经著作权人许可，发表其作品的………（三）没有参加创作，为谋取个人名利，在他人作品上暑名的……（九）未经出版者许可，使用其出版的图书、期刊的版式设计的：（十）未经表演者许可，从现场直据或者公开传送其现场表演，或者录制其表演的…….”，因此A、B、C、D选项均正确。(2013)", chapter: "第三章 著作权的内容"},
  {id: 680, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列关于著作权转让的哪些说法是正确的？", options: {"A": "著作权转让合同中著作权人未明确转让的权利，未经著作权人同意，另一方当事人不得行使", "B": "著作权人只可以转让其依法享有的著作权中的财产权", "C": "著作权人可以全部或者部分转让其著作权中的财产权", "D": "著作权转让合同应当采用书面形式"}, answer: "ABCD", explanation: "。根据《著作权法>第53条的规定，损害公共利益的，可由主管客作权的部门给予行政处罚。A选项属于未经表演者许可，通过信息网络向公众传播其表演；B选项属于未经落作权人许可，复例、发行其作品；C选项属于出版他人享有专有出版权的图书：D选项属于未经录音录像制作者许可，复制、发行录音录像制品；上述A、B、C、D选项均属于著作权法53条规定的情形。（新编）", chapter: "第三章 著作权的内容"},
  {id: 681, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列关于著作权转让合同的说法哪项是错误的？单选）", options: {"A": "著作权转让合同应当采用书面形式", "B": "著作权中的署名权不得转让", "C": "著作权中的改编权可以转让", "D": "著作权转让合同自向著作权行政管理部门备案之日起生效"}, answer: "BD", explanation: "。A、C选项构成侵权但不损害公共利益，仅需承担民事贵任。B、D选项役权同时损害公共利益，可由主管著作权的部门给予行政处罚。（2011改编）", chapter: "第三章 著作权的内容"},
  {id: 682, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，著作权许可使用合同包括下列哪些内容？多选）", options: {"A": "许可使用的权利种类", "B": "许可使用的权利是专有使用权或者非专有使用权", "C": "许可使用的地域范围、期间", "D": "付酬标准和办法"}, answer: "BCD", explanation: "。A、D选项，甲公司和乙公司对产品包装盒的著作权、专利权归属没有约定，著作权、申请专利的权利应属于受托人乙公司，因此A选项错误、D选项正确。B选项，乙在设计、制作包装盒的过程中，未经丙许可复制了丙的画《翠竹》作为背景图案，役", chapter: "第三章 著作权的内容"},
  {id: 683, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪些属于著作权法所称与著作权有关的权益？多选）", options: {"A": "电视台对其播放的电视节目享有的权利", "B": "录音录像制作者对其制作的录音录像制品享有的权利", "C": "出版者对其出版的图书的版式设计享有的权利", "D": "广播电台对其播放的广播节目享有的权利达"}, answer: "ABCD", explanation: ".（容作以法》第S2茶规定：“有下月侵以行为的，应当展据情况，承担停止使事、准除影响、赔礼道歌、陪信横失等民事费任…..因北A、B、C、D选项均正，(2016)", chapter: "第四章 与著作权相关的权利"},

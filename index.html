  {id: 684, topic: "专题七 著作权法", type: "multiple", question: "李某将自已创作的一部小说交某出版社出版。根据著作权法及相关规定，下列说法哪些是正确的？", options: {"A": "该出版社应当与李某订立出版合同，并支付报酬", "B": "经李某许可，该出版社可以对小说进行删节", "C": "该出版社有权禁止其他出版社使用该小说的版式设计", "D": "该出版社再版该小说的，可以不通知李某，但应支付报酬"}, answer: "ABCD", explanation: "。（薯作权纠脉解称>第4条第1收境定：“因使事募作权行赤是起的民事诉讼，由客作权法第S2条、第S3条所现定侵权行力的实境、使权复制品销显地戏者壹对扣押、良告住所地人民法院管管”，因北A、B、C、D选项均正确。（2016）", chapter: "第四章 与著作权相关的权利"},
  {id: 685, topic: "专题七 著作权法", type: "multiple", question: "王某将其撰写的一篇论文向某期刊社投稿，且双方没有任何约定。根据著作权法及相关规定，下列说法哪些是正确的？", options: {"A": "自稿件发出之日起十五日内未收到该期刊社通知决定刊登的，王某可以将该论文向其他期刊社投稿", "B": "自稿件发出之日起三十日内未收到该期刊社通知决定刊登的，王某可以将该论文向其他期刊社投稿", "C": "如果该期刊社刊登了该论文，且王某未声明不得转载，则其他期刊社可以不经王某许可转载该论文，不需向其支付报酬", "D": "该期刊社刊登该论文的，可以对该论文作文字性删节，无需经王某许可"}, answer: "ABCD", explanation: "《容作权法》第S3条规定：“有下列使权行力的，应进根据情况，承推本法第S2条现定的民事费任（停止使害、消康影响、路礼造款、路偿损失）：便权行为同时损害公共利益的，由三管客作权的部门贵令停止便权行为，予以警告，没收造法所得，没收、无营化毁处理使权复明品以及主婴用于制作权复制品的材料、工具、设备等，法经管颌5万元以上的，可以并处违法经营额1倍以上5倍以下的罚款：没有违法经营额、违法经管镇难以计算或者不足5方元的，可以并处25万元以下的罚款：内成犯的，依法追究刑事资任：…（八）制作、出售假冒他人暑名的作品的”，因此A、B、C、D选项均正确。（2018）", chapter: "第四章 与著作权相关的权利"},
  {id: 686, topic: "专题七 著作权法", type: "multiple", question: "刘某授权某期刊社刊登其一篇文章。根据著作权法及相关规定，下列哪些说法是正确的？", options: {"A": "该期刊社对该文章进行文字性删节，可以不经刘某许可", "B": "该期刊社对该文章内容的修改，可以不经刘某许可", "C": "该期刊社对该文章进行文字性修改，可以不经刘某许可", "D": "该期刊社对该文章内容的修改，应当经刘某许可"}, answer: "ABCD", explanation: "。（作权法）第54条第1、2、3款规定：“侵犯著作权或者与作权有关的权利的，便权人应当按尽权利人因此史到的实际损失或者使权人的造法所得给予赔偿；权利人的实际损失或者使权人的违法所得限以计算的，可以参凤该权利使用费给于醇偿。对故竞侵犯著作权或者与等作仅有具的权利，情节严重的，可以在按风上迅方还确定数额的1倍以上S倍以下给于信，仅利人的实际担失、便权人的违法所目、权利使用费难以计算的，由人民法院根据使权行为的情节，判决给予500元以上500万元以下的赔借。赔借数额还应当包括权利人分制止使权行为所支付的合理开支”，因此入.B、C、D选项均正确。（2011）", chapter: "第四章 与著作权相关的权利"},
  {id: 687, topic: "专题七 著作权法", type: "single", question: "王某拍摄了一系列自然风光照片，授权某图书出版社在国内出版该摄影集。根据著作权法及相关规定，下列说法正确的是？多选）", options: {"A": "出版过程中，该出版社对该系列照片的再处理应当经王某许可", "B": "出版过程中，该出版社如果想删除该系列照片中的某些照片，应当经王某同意", "C": "该图书的版式设计完成50年内，该出版社有权禁止他人使用其出版的版式设计", "D": "该图书首次出版后10年内，该出版社有权禁止他人使用其出版的该图书的版式设计"}, answer: "C", explanation: "。（著你权法》第54条规定：“侵忆落作权或者与著作权有关的权利的，便权人应当按凰权利人因此受到的实际投失政者便权人的违法所得给子赔偿赔偿数吸还应当包括权利人为制止使权行为所支付的合理开支”，因此甲公司应当给子乙公司的赔偿数额为乙公司的实际损失与乙公司为制止役权行为所支付合理开支的总额，即200万元+10万元=210万元，A、B、D选项错误，C选项正确。（2019）", chapter: "第四章 与著作权相关的权利"},
  {id: 688, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，在著作权人没有事先声明不许使用、转载的情况下，下列哪些行为可以不经著作权人许可，但应当按照规定支付报酬？", options: {"A": "期刊刊登其他期刊已经发表的关于经济问题的时事性文章", "B": "表演者使用他人已经发表的歌曲进行演出", "C": "电视台播放他人已经发表的作品", "D": "录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品"}, answer: "AB", explanation: "。（若作权法）第56条第1欺规定：“若作权人或者与著作权有关的权利人有证据证明他人正在实施或者即将实施役犯其权利、妨碍其实现权利的行为，如不及时制止将会使其合法权益受到难以弥补的损害的，可以在起诉前依法向人民法院中请采取财产保全、责令作出一定行为或者禁止作出一定行为等措施”，因此A、B选项正确，C、D选项错误。（2010）", chapter: "第四章 与著作权相关的权利"},
  {id: 689, topic: "专题七 著作权法", type: "multiple", question: "甲创作的一篇杂文，发表后引起较大轰动。该杂文被多家报刊、网站无偿转载。乙将该杂文译成法文，丙将之译成维文，均在国内出版，未征得甲的同意，也未支付报酬。下列哪一观点是正确的？", options: {"A": "报刊和网站转载该杂文的行为不构成侵权", "B": "乙和丙的行为均不构成侵权", "C": "乙的行为不构成侵权，丙的行为构成侵权", "D": "乙的行为构成侵权，丙的行为不构成侵权"}, answer: "ABD", explanation: "。《若作权法》第60条规定：“著作权纠纷可以调解，也可以根据当事人达成的书面仲裁协议或者著作权合同中的仲载条款，向仲裁机构中请仲裁。当事人没有书面仲裁协议，也没有在著作权合同中订立仲裁条款的，可以直接向人民法院起诉”，因此A、B、D选项正确，C选项错误。（新编）", chapter: "第四章 与著作权相关的权利"},
  {id: 690, topic: "专题七 著作权法", type: "multiple", question: "某诗人署名“漫动的音符”，在甲网站发表题为“天堂向左”的诗作，乙出版社的《现代诗集》收录该诗，丙义务教材编写单位将该诗作为范文编人《语文》教材，丁文学网站转载了该诗。下列哪一说法是正确的？", options: {"A": "该诗人在甲网站署名方式不合法", "B": "“天堂向左\"在《现代诗集》中被正式发表2026年专利代理邦货格考试", "C": "丙可以不经该诗人同意使用“天堂向左”、但应当按照规定支付报酬", "D": "丁网站未经该诗人和甲网站同意而转载、构成侵权行为"}, answer: "ABCD", explanation: "《牧件答例>第6等规定：“本签列对收体容作权的保护不延及开定您件所用的感得、处理过侵、慢作方法求者敏学股企带，因党A、B、C、D选项均正确。(2016)", chapter: "第四章 与著作权相关的权利"},
  {id: 691, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪些属于表演者对其表演享有的权利？多选）", options: {"A": "表明表演者身份", "B": "保护表演形象不受歪曲", "C": "许可他人从现场直播和公开传送其现场表演，并获得报酬", "D": "许可他人出租录有其表演的录音录像制品，并获得报酬"}, answer: "AC", explanation: "。A、C选项.（软体票例）靠4袋规定：“受本条例保护的软件必须由开食者信立开发，并已国定宿基停有形彻体上”，因北人、C选项正身。B、D连项，《收外条例》第[4条第1款规定：“收停营作权自收件开定完成之日起产生”，无罚是记和公开，因此B、D选项借误。（2020）", chapter: "第四章 与著作权相关的权利"},
  {id: 692, topic: "专题七 著作权法", type: "single", question: "根据著作权法及相关规定，下列哪些说法是正确的？", options: {"A": "录音录像制作者使用他人作品制作录音录像制品，应当取得著作权人许可，并支付报酬", "B": "录音制作者使用他人已经合法录制为录音制品的音乐作品制作录音制品，可以不经著作权人许可，无需支付报酬", "C": "录音录像制作者制作录音录像制品，应当同表演者订立合同，并支付报酬", "D": "录音录像制作者对其制作的录音录像制品，享有许可他人通过信息网络向公众传播并获得报酬的权利"}, answer: "A", explanation: "。A选项.《较件条明》第2条规定：“本条例所称计靠机软件是指计算理序及其有关文格”，因此入选项正喻。日选项，根据《软件票列》馆3景品（一）项的见定，同一计算机提序的源银序和目标但序为同一作品，因此B途项借误。C选项，（软件条明》第14条第1款规定：“软件薯作权自件开发完成之日起产生”，软件著作权与是否登记无关，回此C选项借误。D选项，《农件条例）第6条规定：本条例对表件答作权的保护不延及开发软件所用的思据、处理过理、操作方法或者数学概念等”，回此D选项错误。（2012）", chapter: "第四章 与著作权相关的权利"},
  {id: 693, topic: "专题七 著作权法", type: "single", question: "某影视中心在一电视连续剧中为衬托剧情，使用了某正版唱片中的局部音乐作品作为背景音乐。中国音乐著作权协会是该唱片授权行使著作权及相关权利组织，以该使用行为未经许可为由要求该影视中心支付酬劳。该协会的要求被拒绝后，遂向法院起诉。以下说法哪些是正确的？", options: {"A": "播放行为侵犯了音乐表演者的权利", "B": "播放行为侵犯了音乐作品著作权人的权利", "C": "播放行为侵犯了录音制品制作者的权利", "D": "中国音乐著作权协会不是正当原告"}, answer: "B", explanation: "《软件条例》第8第1款规定“软件著作权人享有下列各项权利：（液权……（二）署名权……（三）修改长（四）复制权…（五）文行权…（六）出权…（七）信息网悠传措以…（八）译以…（九）应当由软件作权人享有的其他权利”，四此A.C、D选项正响、B选项的保扩作品完整权不属于软件著作权人享有的权利。（2018）", chapter: "第四章 与著作权相关的权利"},
  {id: 694, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，关于广播电台电视合播放者的权利义务，下列哪些说法是正确的7", options: {"A": "广播电台播放他人未发表的作品，应当取得著作权人许可.并支付报酬", "B": "广播电台播放他人未发表的作品，应当取得著作权人许可，但无需支付报酬", "C": "电视台播放他人已发表的作品，可以不经著作权人许可，但应当支付报酬", "D": "电视台播放他人的录像制品，可以不经著作权人许可，但应当支付报酬"}, answer: "ABCD", explanation: "。（软件条例>第16条规定：“软件的合法复制品所有人享有下列权利：（一）根据使用的得要把该软件装入计算机等具有信息处理能力的装置内：（二）为了防止复制品损坏而制作备份复们品：（三）为了把该软件用于实际的计算机应用环境或者改进其功能、性能而进行必要的修改：但是，除合同另有约定外，未经该软件落作权人许可，不得向任何第三方提供修改后的软件”，因此A、B、C、D选项均正确。（2007）", chapter: "第四章 与著作权相关的权利"},
  {id: 695, topic: "专题七 著作权法", type: "multiple", question: "李某于2016年8月4日创作完成小说《别来烦我》，2017年3月5日发表于某文学刊物后被张某改编成剧本，甲公司根据该剧本拍成同名电视剧，乙电视台将该电视剧进行播放。对此，下列哪一选项是错误的？", options: {"A": "李某从2017年3月5日起对小说享有著作权", "B": "张某对剧本享有著作权", "C": "甲公司将该剧本拍成电视剧应当取得李某和张某的许可并支付报酬", "D": "乙电视台播放该电视剧应当取得甲公司许可并支付报酬"}, answer: "ACD", explanation: "。A选项，未约定若作权归属，完或者乙公司享有著作权，A选项正确。B选项，丙公司的侵权行为在起诉时仍在持续，因此未过时效，B选项错误。C、D选项，《软件条例》第30条规定：“软件的复制品持有人不知道也没有合理理由应当知道该软件是役权复制品的，不承担赔偿责任；但是，应当停止使用、销毁该促权复制品”丙公司可以不承担役权赔偿资任，但应停止使用并销毁软件，因此C、D选项正确。（2018）", chapter: "第四章 与著作权相关的权利"},
  {id: 696, topic: "专题七 著作权法", type: "multiple", question: "甲创作并演唱了《都是玫瑰惹的祸》，乙公司擅自将该歌曲制成彩铃在网络上供免费下载。乙公司侵犯了甲的哪些权利？", options: {"A": "信息网络传播权", "B": "广播权", "C": "表演者权", "D": "发行权"}, answer: "CD", explanation: "。A、C选项，《软件条例》第7条第1款规定：“软件若作权人可以向国务院著作权行政管理部门认定的软件登记机构办理登记。软件登记机构发放的登记证明文件是登记事项的初步证明”，因此A选项错误，C选项正确。B、D选项，（软件条例）第14条规定：“软件著作权自软件开发完成之日起产生…法人或者其他组织的软件著作权，保护期为50年，截止于软件首次发表后第50年的12月31日，但软件自开发完成之日起50年内未发表的，本条例不再保护”，因此B选项错误，D选项正确。（2010改编）", chapter: "第四章 与著作权相关的权利"},
  {id: 697, topic: "专题七 著作权法", type: "single", question: "袁某创作完成了一部小说，并发表在某杂志上。此后，经许可，赵某将该小说改编成舞台剧剧本，陈某在某剧院公开演出该舞台剧，某电视台对该演出进行了现场录像并制作成光盘。2026年专利代理萨井格考达根据著作权法及相关规定、下列哪些说法是正确的？", options: {"A": "袁某对该小说的发行权保护期截止于首次发表后第五十年的12月31日", "B": "赵某对该舞台剧剧本的修改权保护期截止于首次公开汶出后第五十年的12月31日", "C": "陈某享有许可电视台对其表演的该舞台剧进行录像并获得报酬的权利，此项权利的保护期限藏正于该表演发生后第五十年的12月31日", "D": "该电视台享有许可他人对其制作的该光盘进行复制并获得报酬的权利，此项权利的保护期限截止于该光盘首次制作完成后第五十年的12月31日"}, answer: "C", explanation: "。《网路传播条例>第2条规定：“权利人享有的信息同络传播权受落作权法和本条例保护。除法体、行政法脱另有虎定的外，任何组织或者个人将他人的作品、发演、录音录像制品造过信息网悠向公众提供，应当取得权利人许可，并支付报酬”。本题中中网站没有取得落作权人、表演客的许守，也没有向其支付报酬，构成使权行为，C透项正确。（2005）", chapter: "第四章 与著作权相关的权利"},
  {id: 698, topic: "专题七 著作权法", type: "single", question: "甲创作了一首歌曲《告白气球》，乙获得许可后在个人演唱会上进行演唱，丙唱片公司制成录音制品并公开发行。针对该录音制品，下列哪些属于侵权行为？", options: {"A": "某公司翻录后进行销售，同时向甲、乙、丙寄送报酬", "B": "某航空公司购买正版唱片后在飞机上广播供乘客欣赏，仅经过甲的许可", "C": "某电影公司将其作为电插曲使用，同时经过乙和丙的许可", "D": "某学生购买正版唱片试听后将其上传到网上供网友个人欣赏"}, answer: "B", explanation: "。A选项，平未经许可上传至乙网站，便害了答作权人的信息网络传播权，八选项说法正确。B选项，乙网站属于明知所链接内容设权情况，应当示担共同级权费任，B选项说法错误。C选项，丙的行为具于回除权利管理电子信息的行为，构成使权，C选项说法正确。D选项，《网络传播条例）第13条规定：“著作权行政管理部门为了查处设犯信息网络传措权的行为，可以要求网络展务提供者提供涉堪侵权的服务对象的姓名（名称）、联系方式、网络地址等资料”，D选项说法正确。（2018）", chapter: "第四章 与著作权相关的权利"},
  {id: 699, topic: "专题七 著作权法", type: "multiple", question: "甲电视台获得了某歌星演唱会的现场直播权，乙电视台未经许可对甲电视台直播的演唱会实况进行转播，丙广播电台经过许可将现场演唱制作成CD，丁音像店从正规渠道购买到CD用于出租，戊未经许可将丙广播电台播放的演唱会录音录下后上传到网站上传播。下列哪些选项是正确的？", options: {"A": "甲电视台有权禁止乙电视台的转播", "B": "乙电视台侵犯了该歌星的表演者权", "C": "丁音像店应取得该歌星或丙广播电台的许可并向其支付报酬", "D": "戊的行为只需取得丙广播电台的许可并应向其支付报酬"}, answer: "ACD", explanation: "。A选项，根据《网络传措条例）第14条第1款的规定，对提供信息存储空间或者提供搜索、接限务的网络服务提供者，权利人认为其限务役犯自己的信息网络传播权，可以向该网络股务提供者提交书面通知，通知书应当包合构成侵权的初步证明材料、A选项正确。B选项，根据（网络传播条例>第15条的规定，网络服务提供者接到权利人的通知书后，应当立即删除涉嫌侵权作品，并同时将通知书转送提供作品、表演、录音录像制品的服务对象，B选项借误。C选项，根据（网络传播条例）第16条第1款的规定，服务对象接到网络服务提供者转送的通知书后，认为其提供的作品未侵犯他人权利的，可以向网络服务提供者提交书面说明，要求恢复被刷除的作品，C选项正确。D选项，根据《网络传插条例》第17条的规定，网络服务提供者接到服务对象的书面说明后，应当立即恢复被副除的作品，同时将务对象的书面说明转送权利人。权利人不得再通知网络服务提供者刷除该作品，D选项正确。（2018）竞争法", chapter: "第四章 与著作权相关的权利"},
  {id: 700, topic: "专题七 著作权法", type: "multiple", question: "叶某创作《星光灿烂》同曲并发表于音乐杂志，郝某在个人举办的贩灾义演中演唱该歌曲，南极熊唱片公司录制并发行郝某的演唱会唱片，星星电台购买该唱片并插放了该歌曲。下列哪些说法是正确的？多选）", options: {"A": "郝某演唱《星光灿烂》应征得叶某同意并支付报酬", "B": "南极熊唱片公司录制该歌曲应当征得郝某同意并支付报酬", "C": "星星电台播放该歌曲应征得叶某同意", "D": "星星电台播放该歌曲应征得南极熊唱片公司同意"}, answer: "BCD", explanation: "。《反不正当党争法>第7条规定：“经管者不得实施下列混济行为，引人误认为是他人商品或者与他人存在特定联系：（一）擅自使用与他人有一定影响的商品名称、包装、装溃等相回或者近似的标识：（三）擅自使用他人有一定影响的城名主体部分、网站名称、网页、新城体账号名称、应用程序名称或者图标等：提自将他人注商标、未注册的驰名商标作为企业名称中的字号使用，或者将他人商品名称、企业名称（包括简称、宇号等）、注册商标、未法册的驰名商标等设置为投索关健司，引人误认为是他人商品或者与他人存在特定联系的，属于前款规定的混滑行为。…”，B、C、D选项属于不正当竞争行为。A选项，未引起误认或与他人存在特定联系的，不属于不正当竞争行为。（前竭）", chapter: "第四章 与著作权相关的权利"},
  {id: 701, topic: "专题七 著作权法", type: "multiple", question: "陈某创作一部戏剧剧本《等待》，甲剧团安排本单位的演员进行了演出，但没有约定著作权相关的权利归底。东方卫视经授权对该歌舞剧进行了现场直播，咕响网未经许可将东方卫视播出的歌舞剧同步至网络供用户付费点播和下载。下列有关说法正确的是？", options: {"A": "咕响网侵犯了陈某的信息网络传播权", "B": "咕响网侵犯了甲剧团演员们的信息网络传播权", "C": "咕响网侵犯了甲剧团的信息网络传播权", "D": "咕响网侵犯了东方卫视的广播组织者权"}, answer: "AC", explanation: "。（反不正当竞争法）第9条第1款规定：“经营者不得对其商品的性能、功能、质量、销售状况、用户评价、曾获荣誉等作虚假或者引人误解的商业宣传，疆、误导消费者和其他经营者。”，甲公司宜称“甲公司原装进口实木地板质量佳、服务好”属于虚假宜传，A选项正确，B选项错误。（反不正当竞争法》第12条规定：“经营者不得编造、传措或者指使他人追造、传措虚假信息或者误导性信息，损害其他经营者的商业信誉、商品声誉。”.甲公司宜称“乙公司生产的木地板甲醛严重超标”属于编进、传播虚假信息，报害老争对手的商业信、商品方整，C选项正确，D选项相误。（201G）", chapter: "第四章 与著作权相关的权利"},
  {id: 702, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法的规定，在下列哪些情形下，个人或者组织可以避开技术措施，但不得向他人提供避开技术措施的技术、装置或者部件，也不得侵犯权利人依法享有的其他权利？", options: {"A": "为学校课堂教学，向少数教学人员提供少量已经发表的作品，而该作品无法通过正常途径获取向其提供已经发表的作品，而该作品无法通过正常途径获取", "C": "国家机关依照行政、司法程序执行公务", "D": "对计算机及其系统或者网络的安全性能进行测试2020年专付代理账劳格考试"}, answer: "AD", explanation: "。根据（反不正当竞伞法>第9条的规定，经情者不得通过组织虚交易、虚假评价等方式，每助其他经管者进行虚们或者引人误解的育业宜传。A选项构成不正当伞。日选项具于商标役权，不构成不正当伞。（反不正当充伞法）第11条规定：“经管者进行有奖俏售不得存在下列信形：：（三）拍笑式的有奖俏售，最商奖的金超过五万元”，C选项不具于不正当竞争行为。（反不正当竞伞法>第14条规定：“平台经管者不得强制或者交相强制平合内经营者按应其定价规月，以低于成本的价裕销售商品、扰乱市运竞令铁序。“因此D选项属于不正当竞争行为。（编）", chapter: "第五章 著作权及其相关权利的保护"},
  {id: 703, topic: "专题七 著作权法", type: "multiple", question: "根据作权法及相关规定，下列哪些行为侵犯了著作权或与著作权有关的权利？多选）", options: {"A": "张某未经王某许可、发表了王某创作完成的小说", "B": "郑某为谋取个人名利，在许某创作完成的作品上需名", "C": "甲出版社未经乙出版社的许可，使用了其出版的图书的版式设计", "D": "丙电视台未经歌垦张某许可，录制了其表演"}, answer: "ABCD", explanation: "。《反不正当竞争法》第13条规定：“营者利用网从事生产些营活动，应当速守本法的各项规定。经管老不得利用数据和算生、扶未、平合貌则等，通迁题官用户选择或者其他方式，实选下列呼、缺坏其他是营者合法提供的月络产品或者服务正售运行的行为：（一）未些其运经营者同意，在其合法提供的网些户品成老服务中，插入接、强制进行目标民转：（三）是意对其他点营者合法提供的网些户品或者服务实途不兼客：一些营老不得以欺诉、卧迪、造元式者获坏技术管理垂选等不正当方式，获取、使用其证经當者合注共有的数据，报害其促些管普的合法权益、就至市运竞争表序。些营者不再温用平会完则、直接或老指使他人对其他些营者实运宣尝交及、查额评价或考恶意连贷与行为、额害其继色营誉的合法权益，批至市运变争民序。，国政、B、C、D进步三。（201S）", chapter: "第五章 著作权及其相关权利的保护"},
  {id: 704, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪些侵权行为损害公共利益的，可由主管著作权的部门给予行政处罚？多选）", options: {"A": "孙某未经舞蹈家王某许可，现场录制其舞蹈表演并上传到互联网提供免费下载", "B": "赵某未经作家李某许可，擅自复制、发行其小说", "C": "甲出版社出版乙出版社享有专有出版权的图书", "D": "钱某未经丙音像公司许可复制、发行其音像制品"}, answer: "ACD", explanation: "《天不王当竞争法）条14条规定：干经管套不票亚到或老变祖醒制干合内运雷老按服买定价更则、以低于成本齿价站链售商品，我至市运变争秩序。医武A选项具于不正当变争行为，B选项是页户的促髓手衣，不属于不王当竞争行责。《灭不王当竞争生》票15条题定：“大里全业要经营者不再造用自身变全、技术、交高渠连、行业鄂响方等方重药武带运位、要求中小全业接受", chapter: "第五章 著作权及其相关权利的保护"},
  {id: 705, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，下列哪些侵权行为损害公共利益的，可由主管著作权的部门给予行政处罚？多选）", options: {"A": "未经作者许可，发表其论文的", "B": "未经演唱者许可，对其表演制作录音制品并出版的", "C": "未经钢琴演奏者许可，从现场直播其独奏音乐会的", "D": "未经教学视频录像制作者许可，复制发行其制作的录像制品的"}, answer: "ABCD", explanation: "《反不正当宠争法>第10条昂1-3款规定：“经管哲不师买德下月使范前业是出的行为：（一）以些、购嗒、晚、房追、电于使入戏台其他不正当手及笑取权利人的前业秘曾：（二）惊、使用成告允许他人使用以當项乎贫泉的权利人的南业衍密：（三）造尺保密义务或普造反权利人有关你守剪业良留的要求.捷您、使用或普允许他人便用其所军的前业秘留：（四）教交、引谱、学助他人违反保密义务戏者造反权利人有关保守育业秘密的要求，庆取、校建、便用成智免许他人使用权利人的罚业秘密。盈管著以外的其他自然人、法人和非法人组织实地曾散所列造法行为的，视为使犯育业积密。第三人明知或考应加商业秘密权利人的目工、曾贝工或者其他单位、个人实施本条第一款所列造法行为，仍氏取、按愿、使用或者充许他人使用该商业民世的，现为使见商业长密。“本恩中，第三人马某明如技术民断为王其所有取，仿按露、使用该技术秘密，现力使犯声业长密，A、B、D选项属于被露白取的扶木长密的行为，C选项属亏使用奇双的技木民密的行为，回此A、B、C、D选项均三。（新喻）", chapter: "第五章 著作权及其相关权利的保护"},
  {id: 706, topic: "专题七 著作权法", type: "multiple", question: "甲公司委托乙公司设计并制作产品包装盒，未签订书面合同。内在市场上发现该产品包装盒上未经其许可使用了其画《翠竹》作为背景图案。如果该产品包装盒的整体设计也构成美术图案，下列哪些选项是正确的？多选）", options: {"A": "产品包装盒的版权属于甲公司", "B": "乙公司侵害了丙的复制权", "C": "甲公司对乙公司的侵权行为不知情，但仍构成侵权", "D": "甲公司不能对产品包装盒获得外观设计专利申请权"}, answer: "AC", explanation: "。根据（反不正当党争法）第10条的规定，甲公司员工以安取的手及获得配方、属于经见商业积密，乙公司主明扣的情况下使用该配方，以为使卫贡业长，A、C选项正确（新编）S.ACD。祖据（反不正当竞争法）第10条第4新药现定，贡业长密构或宴件包结：积密世（不为公会所如悉）、保座性（权利人对其采取了担应保密按意）、份值性（其有茵业价值），A、C、D选项正确（新编）", chapter: "第五章 著作权及其相关权利的保护"},
  {id: 707, topic: "专题七 著作权法", type: "multiple", question: "根据落作权法及相关规定，下列哪些属于役犯著作权承担的民事资任？多选）", options: {"A": "停止役害", "B": "赔偿损失", "C": "消除影响", "D": "赔礼道"}, answer: "BD", explanation: "。提据（反不正当竞争法）策10条的规定，违反保密义是或者违反权利人有关保守责业积密的要交，按信、使用或者元许他人使用其所案亚的商业密、具亏便化商业秘密的行为，A选项祺.B选项正确，（民注典）第501基规定：音拿人在订主合同过目中知悉的商业联密或者吴他包宫保密的他息，元论合所是否成立，不师法厚成号不正音地使同：滑厚、不正当地使同试商业账管成看信息，造成对方损失的、应当开胆赔偿费任”.D选项正响。C选项，甲公司与乙公明街未订立合属，因此不罚示提违约费任，C速项健误。（2006）", chapter: "第五章 著作权及其相关权利的保护"},
  {id: 708, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，因侵犯著作权行为提起的民事诉讼，可以由哪些人民法院管辖？多选）", options: {"A": "侵权行为的实施地人民法院", "B": "侵权复制品储藏地人民法院", "C": "侵权复制品查封扣押地人民法院", "D": "被告住所地人民法院"}, answer: "CD", explanation: "。自行开发研制或者反向工程等方式获再的商业长密，属于王含的科研活动，A、B选项不属于使见责业秘密的行为。经据《反不正见命法》第10条第1、3数的规定，C、D选项层于侵死商业密的行为。（2008）", chapter: "第五章 著作权及其相关权利的保护"},
  {id: 709, topic: "专题七 著作权法", type: "multiple", question: "甲制作、出售了大量冒用乙署名的作品，其承担责任的方式可能为：", options: {"A": "根据情况，甲需承担停止侵害、消除影响、赔礼道激、赔偿损失等民事责任", "B": "若甲的行为损害了公共利益，可以由主管著作权的部门责令停止侵权行为，没收违法所得，没收、无害化销毁侵权复制品，并可处以罚款", "C": "若甲的行为损害了公共利益，可以由主管署作权的部门没收主要用于制作侵权复制品的材料、工具、设备等", "D": "若构成犯罪的，可依法道究甲的刑事资任"}, answer: "BD", explanation: "。程据（反不正当竞争法）第10条第4数的规定，克业秘密构成要件之一为它性。A活项收集的公开数据不满足秘密性，不真于商业长密。C选项中如果是发明专利申请，则公元前具示秘密，公开后就不属于积密，题干中只表送“未疫权之首”，该技术可能已起先期公元，不满足性的要求，不晨于商业积密。B、D选项正确。（2018）", chapter: "第五章 著作权及其相关权利的保护"},
  {id: 710, topic: "专题七 著作权法", type: "multiple", question: "甲公司开发了一套财务管理软件，乙公司未经甲公司同意复制了大量该软件进行销售。甲公司向人民法院提起诉讼要求乙公司赔偿。下列关于赔偿数额的说法哪些是正确的？", options: {"A": "赔偿数额应当按照甲公司因此受到的实际损失或者乙公司的违法所得计算", "B": "甲公司的实际损失或者乙公司的违法所得难以计算的，2026年专持代理所井格考试赔偿数额可以参照该权利使用费计算", "C": "甲公司的实际损失和乙公司的违法所得不能确定的，由人民法院根据侵权行为的情节判决给于500元以上500万元以下的赔偿", "D": "赔偿数额还应当包括甲公司为制止役权行为所支付的合理开支"}, answer: "ACD", explanation: "。根据（反不正当竞争法）第22条的规定，因不正当竞争行为受到报害的经管者的赔偿数额，按其因被使权所受到的实际损失或者便权人因侵权所获得的利益确定。管者故意实应役犯商业秘密行为，情节严重的，可以在按巨上述方法确定数的一倍以上五倍以下确定赔俭数额。经管者违反本法第七条、第十条规定，权利人因被使权所受到的实际损失、使权人因侵权所获得的利益难以确定的，由人民法院根据权行为的情节判决给子权利人500万元以下的赔位。因此，A、D选项正确，B选项错误。根据《反不正当竞争法》第26条的规定，经营者以及其他自然人、法人和非法人组织违反本法第十条规定役犯商业长密的，由督检查部门贵令停止违法行为，没收违法所得，处十万元以上一百万元以下的罚款；情节产重的，处一百万元以上五百万元以下的罚款。因此，C选项正确。（新编）", chapter: "第五章 著作权及其相关权利的保护"},
  {id: 711, topic: "专题七 著作权法", type: "multiple", question: "在某案审理中，人民法院确认了以下事实：甲公司侵犯乙公司的著作权，乙公司因此遭受到的实际损失为200万元，乙公司为制止侵权行为所支付的合理开支为10万元。根据作权法及相关规定，甲公司应当给予乙公司的赔偿数额是多少？", options: {"A": "100万元", "B": "200万元", "C": "210万元", "D": "310万元"}, answer: "ACD", explanation: "。A透项，继望（继管品仲客测）14县的现定，中治昌停收的物所高仲应济具于国泉植份昌伸保护名录中阴票的健物内属皮景种.因此人急项三确。B悉项.《馈物昌停是外》第19条信2质观定：下月名账不每用于品障命名：（一）仅以级字良示的”，因元B进项得识。C选项，《催所品种冬例）容19条官1良见定：“变于昌种权的植物阶品应出具各造当的名些，并与初同或者相近的值他局成誉中已口品伸内名称相区到….”.因北C选项正确。D选项，（所品种条明>第17条现定：“授干品神仅的植物歌昌种应进其各一欢性。一致性，是指一个放份品种的持性，录可预用的自感突异外，呼体内个体网相关的持任或者持性费见一致。”，因比D达项正司。（2012改编）", chapter: "第五章 著作权及其相关权利的保护"},
  {id: 712, topic: "专题七 著作权法", type: "multiple", question: "甲公司有证据证明乙网络公司正在非法传播其享有著作权的某部影视作品，如不及时制止将会使其合法权益受到难以弥补的损害。根据著作权法及相关规定，甲公司可以在起诉前向人民法院申请采取下列哪些措施？多选）", options: {"A": "贵令乙网络公司停止传播行为", "B": "对乙网络公司采取财产保全措施", "C": "责令乙网络公司先行赔付", "D": "没收乙网络公司的服务器"}, answer: "ABD", explanation: "。A、C选项，（植物新品种条例）第2条规定：“本买例所称随物所马种，延指经过人工心育或者对发现的好生植物与以改变，具各旨顾性、持异性、一致性、稳定性和造当命名的拉信及种：”，因此A选项正确，C选项进误，B透项、吸险（植物新品种条到）第14桌的昆定，中读互仅的植物新品种应当具于国震植团品种保护名衰中对举的植物的属或者种，回花日遗项王师。D途项，限据（植物所品种条明）第19条第2款的舰定、违反社会公德的名称不得用于受仅高种的命名，回此D选项正硕（新填）", chapter: "第五章 著作权及其相关权利的保护"},
  {id: 713, topic: "专题七 著作权法", type: "multiple", question: "根据著作权法及相关规定，当事人可以通过下列哪些途径解决著作权侵权纠纷？", options: {"A": "根据著作权合同中的仲裁条款，向仲裁机构申请仲裁", "B": "调解", "C": "向国家著作权主管部门申请裁决", "D": "向人民法院起诉"}, answer: "AD", explanation: "。A选项，（拉物新品停条图）邻22基1款想定：中请品种权的，立当商国务民农业衣村、林业草原主管部门提交符合现定倍式县求的中请文件。”主管部门妮定的中请文件中不包合权利要求书，因此A选项误。B选项，（放物所品种条例）第26条规定：“中请人可以在品种权投于前改或者撤回品种权申请。“因此B选项正确。C选项，（植物新品种条例>第16条规定：“投予品种权的植物新品种应当具备特异性。特异性，是指一个植物品种有一个以上性状明显区别于已知品种。”，因此C选项正确。D选项，《植物新品种条例>第18条规定：“投于品种权的植物新品种应当具备稳定性。魏定性，是指一个植物品种经过反复繁殖后或者在特定紫殖周期结求时，其主要性状保持不变。”，D选项描述的是一致性，因此D选项错误。（新编）", chapter: "第五章 著作权及其相关权利的保护"},
  {id: 714, topic: "专题七 著作权法", type: "multiple", question: "根据计算机软件保护条例的规定，计算机软件著作权的保庐不延及下列哪些内容？多选）", options: {"A": "开发软件所用的思想", "B": "开发软件所用的处理过程", "C": "开发软件所用的操作方法", "D": "开发软件所用的数学概念"}, answer: "ABD", explanation: "。《植物新品种条例）第15条规定：“投予品种权的植物新品种应当具备新颖性。新颖性，是指申请品种权的植物新品种在申请日前该品种繁殖材料、收获材料未被销售、推广，或者经申请权人自行或者同意销售、推广该品种繁殖材料、收获材料，在中国境内未超过1年；在境外，木本、藤本植物品种未超过6年，其他植物品种未超过4年。”，因此A、B、D选项正确，C选项错误。（新编）", chapter: "第六章 计算机软件著作权"},
  {id: 715, topic: "专题七 著作权法", type: "multiple", question: "根据计算机软件保护条例的规定.下列哪些说法是正确的？", options: {"A": "计算机软件要获得著作权保护，应当是权利人独立开发的，剩窃他人的计算机软件不能获得著作权保护", "B": "计算机软件要获得著作权保护，应当按照规定进行著作权登记", "C": "计算机软件要获得著作权保护，应当已被固定在某种有形物体上", "D": "计算机软件要获得著作权保护，首先需要公开"}, answer: "AC", explanation: "。A、B选项，根据《植物新品种条例>第9条第1款的规定，执行本单位的任务或者主要是利用本单位的物质技术条件所完成的职务育种，品种权的申请权属于该单位，因此A选项正确，B选项错误。C、D选项，《植物新品种条例》第9条第2款规定：“委托育种或者合作育种，当事人可以在合同中约定品种权的申请权归属：没有合同约定的，品种权的申请权属于受委托完成或者共同完成育种的单位或者个人。”，因此C选项正确，D选项错误。（2013）", chapter: "第六章 计算机软件著作权"},
  {id: 716, topic: "专题七 著作权法", type: "single", question: "根据著作权法及相关规定，下列关于计算机软件的哪种说法是正确的？", options: {"A": "受著作权保护的计算机软件包括计算机程序及其有关文档", "B": "同一计算机程序的源程序和目标程序为两个不同的作品", "C": "未经登记的计算机软件不受我国著作权法保护", "D": "对软件著作权的保护延及开发软件所用的处理过程和操作方法"}, answer: "A", explanation: "。《植物新品种条例》第10条规定：“一个植物新品种只能投子一项品种权。两个以上的申请人分别就同一个植物新品种申请品种权的，品种权投于最先申请的人；同时申请的，品种权投子最先完成该植物新品种育种的人。”。本题中，张某和王某于同日申请，但张某完成育种在先，品种权应当投予张某，A选项正确。（2017）", chapter: "第六章 计算机软件著作权"},
  {id: 717, topic: "专题七 著作权法", type: "multiple", question: "下列不属于软件著作权人享有的权利的是：", options: {"A": "署名权", "B": "保护作品完整权", "C": "出租权", "D": "信息网络传播权"}, answer: "ABC", explanation: "《值物新品种条例>第28茶规定：“中请人缴纳中请费后，国务院农业农村、休业草原主管部门对品种权申请的下列内容进行初少市查：（一）是否属于植物品种保护名录列举的植物具戏者种的范回：（二）是否符合本条例第二十一条的规定：（三）是否符合新额性的规定：（四）值物衍品种的合名是否适当。，A，B、C选项正确。对于易定性，无法通过初步审查符出结论，D选项借误。(2018)", chapter: "第六章 计算机软件著作权"},
  {id: 718, topic: "专题七 著作权法", type: "multiple", question: "根据计算机软件保护条例的规定、计算机软件的合法复制品所有人享有下列哪些权利？多选）", options: {"A": "根据使用的需要把该计算机软件装人计算机等具有信息处理能力的装置内", "B": "为了防止复制品损坏而制作备份复制品", "C": "为了改进计算机软件功能、性能而进行必要的修改", "D": "为了把该计算机软件用于实际的计算机应用环境而进行必要的修改"}, answer: "AB", explanation: "。低据《植物新品神条例》第33条的现定，对驳回品种权中请的决定不展的，申请人可以自收到通知之日起3个月内，向复审变员会请求复审。复审请求符合规定的，复审委员会应当自收到之日起6个月内作出决定，并通知中请人。依法带要检测、测试签定的，所需时同不计算在规定期限内。中请人对复审委员会的复审决定不展的，可以依法提起诉讼。根据《行政诉讼法》的相关规定，对复议决定不服的，可以在收到复议决定书之日起15日内向人民法院提起诉讼，因此A、B选项正确，C、D选项错误。（2011改编）", chapter: "第六章 计算机软件著作权"},
  {id: 719, topic: "专题七 著作权法", type: "multiple", question: "甲公司委托乙公司开发库存产品信息追踪软件，付费50万元，没有明确约定著作权的归属。后甲公司以高价向善意的丙公司出售了该软件的复制品。丙公司安装使用5年后，丙公司自行开发的同类软件已经在试运行中，此时乙公司起诉要求丙公司停正使用并销毁该软件。下列哪些表述是正确的：", options: {"A": "该软件的著作权属于乙公司", "B": "乙公司的起诉已超过诉讼时效", "C": "丙公司可不承担赔偿责任", "D": "丙公司应停止使用并销毁该软件"}, answer: "BCD", explanation: "。根据《植物新品种条例）第38条规定，自公告投子品种权之日起，复审委员会可以依据职权或者依据任何单位或者个人的节面请求，对不符合《植物新品种条例）第15条（所颖性）、第16条（特异性）、第17条（一致性）和第18条（稳定性）规定的，宜告品种权元效。当事人对复审委员会的无效宣告决定不限的，可以依法提起诉讼。因此，自审批机关公告投于品种权之日起，印可请求无效，A选项错误，B、C、D选项正确。（2019）", chapter: "第六章 计算机软件著作权"},
  {id: 720, topic: "专题七 著作权法", type: "multiple", question: "根据计算机软件保护条例的规定，下列说法哪些是正确的？", options: {"A": "软件著作权人应当向国务院著作权行政管理部门认定的软件登记机构办理登记", "B": "计算机软件著作权自计算机软件登记之日起产生，保护期为自软件登记之日起50年", "C": "软件登记机构发放的登记证明文件是登记事项的初步证明", "D": "法人或者其他组织的软件著作权，自开发完成之日起50年内未发表的不再受保护"}, answer: "ABCD", explanation: "。（植物新品种条例）第7条规定，除法律和本条例另有规定外，任何单位或者个人未经品种权人许可，不得对该投权品种的紫殖材料，实施下列行为：①生产、繁殖和为紫殖面进行处理：②许诺销售、销售；③进口、出口：①为实施本款第1项至第3项行为进行储存。实施前款规定的行为，涉及由未经许可使用投权品种的繁殖材料丙获件的纹在村料的、应当供到品种权人的许可：但是，品种权人对警痘材料已有合理机会行使其权利的险外。对下列品种实地努1数、期2数规定的行为、应当得到授权品种的品种权人的许可：①授权品种的实质性派生品种，但该投权品种本身不是实质性液生品种：与投权品种相比，不具备本条例第十六条规定的明是区别的品种：为商业目的重复使用授权品种进行生户或者繁独的另一品种。因比，A、B、C、D选项中的生产行为均应经品种权人的许可。（新编）", chapter: "第六章 计算机软件著作权"},
  {id: 721, topic: "专题七 著作权法", type: "multiple", question: "根据信息网络传播权保护条例的规定，下列哪些是信息网络传播权的权利人？", options: {"A": "著作权人", "B": "表演者", "C": "录音录像制作者", "D": "网络用户"}, answer: "ACD", explanation: "。《植物新品种条例>第7条规定，欧法体和本条例另有规定外，任何单位或者个人未经品种权人许可，不得对该授权品种的繁殖材料，实施下列行为：①生产、紫殖和为繁拉而进行处理：②许诺销售、销售：③进口、出口：④为实施本款第一项至第三项行为进行储存。因此，A、C、D选项的行为应经品种权人许可。（植物新品种条例》第12条规定：“在下别情况下使用授权品种的，可以不经品种权人许可，不向其支付使用费，但是不得便犯品种权人依愿本条例和有关法体、行政法规享有的其他权利：（一）利用投权品种进行育种及其他科研活动；（二）农民自繁自用授权品行的繁殖材料。”，因此B选项具于合理使用的情形。（2016改墙）", chapter: "第七章 信息网络传播权"},
  {id: 722, topic: "专题七 著作权法", type: "multiple", question: "甲网站与乙唱片公司签订录音制品的信息网络传插权许可使用合同，按约定支付报酬后，即开展了网上原版音乐下载业务。对甲网站的行为应如何认定？", options: {"A": "是合法使用行为", "B": "构成侵权行为，因为该行为应取得著作权人的许可，而不是取得录音制作者的许可", "C": "构成侵权行为，因为该行为还须取得著作权人、表演者的许可并支付报酬", "D": "构成侵权行为，因为该行为虽然无须取得著作权人的许可，但必须取得表演者的许可"}, answer: "BC", explanation: "。（植物新品种条例》第35冬规定：“品种权的保护期限，自投权公告之日起，木本、本植物为25年，其他植物为20年。”，因此A、D选项错误，B、C选项正确。（2011改编）", chapter: "第七章 信息网络传播权"},
  {id: 723, topic: "专题七 著作权法", type: "multiple", question: "电视剧《一切为了人民》播出后迅速走红。在该电视剧在各大卫视分集热播阶段，甲聘请丙将播放画面中的“李大路出品，复制必究”的水印去除，然后将全集上传至乙网站供公众免费点播，乙网站为提高浏览量默许甲的行为。权利人江东电视台知晓后，要求乙网站断开链接、删除内容，乙网站接到通知立即采取了上述措施。下列哪一说法是错误的？", options: {"A": "甲侵害了权利人的信息网络传播权", "B": "乙网站无须对权利人承担侵权责任", "C": "丙实施了删除权利管理电子信息的行为构成侵权", "D": "著作权行政管理部门有权要求乙网站提供甲的姓名和网络地址"}, answer: "ABC", explanation: ".A当项，（布设计限护事得）端4集第1收偶定：史须护的与四遗计每多真年值创换，即出步画迎计是创作兽自己的售行勿治见是，年偿具创修时设专四设计出图设计创申普和集现电那创逾想中不是公认的需銀迎计”，人遇项还确，B念项.（与盈设计体护例）愿多品累1歌见建：“与图灸计令有权经国身现如识产设行玻易门望记产生”，B念项五端，C途项，《考图迎计须品明）雷5品见定：本最月鸡市票证计集护，不延及思男、处用过理、地作方遗观数华费分事”，C也项王确，D老项.（句面设计集护易列）B12规定：“布图设计今有权内渠护翻分10年，自年图证计登记身请之已设歌型世很任何地方售次设入商业利用之已起计加，以婴雷三增方增，慢是，无论是咨些记业者受入雨业利司，布回说计自到你完成之日起1S年后，不其更本暑例保护”，D也变德误。（2009）", chapter: "第七章 信息网络传播权"},
  {id: 724, topic: "专题七 著作权法", type: "single", question: "唱片公司认为千度公司作为存储服务提供者，其网站上提供的涉及唱片公司享有著作权的某歌曲侵犯了自己的信息网络传播权。唱片公司向千度公司提交书面通知要求其删除侵权作品。对此，下列哪些选项是正确的：", options: {"A": "唱片公司的通知书应当包含该作品构成侵权的初步证明材料", "B": "千度公司接到书面通知后，可在合理时间内删除涉嫌侵权作品，同时将通知书转送该作品的提供者", "C": "该影视作品提供者接到千度公司转送的书面通知后，认为提供的作品未侵犯唱片公司的权利的，可以向千度公司提出书面说明，要求恢复被删除作品", "D": "千度公司收到该影视作品提供者的书面说明后应即恢复被删除作品，同时将该影视作品提供者的说明转送唱片公司的，则唱片公司不得再通知千度公司删除该作品"}, answer: "A", explanation: ".A选项，创性的布图设计应核是划者自己的看方旁动成果，但是自己恒工创惊的也可施不具有应创位，A选项正确，B、C途项.（司国设计保护条明>第4某第1教或定，变促护的布西设计应当具有独创性，印注市困设计是划作物售己的看方劳动民集，并旦主实到作过设布图证计三布图设计创作者和复成电培制造书中不是公认西常抱设计”，因是月断是百其有位到性，应望以创作对为具断时同点，日选项砸误：延否其有回边性应以市图设计创作者和集成电悠射进普的凭民纠所，C选项链误。D选项，（有困设计保护套明）第4条第2致规定，受保护由由答规记计组成的市图设计，其进合作为整体应当好合首政规定的冬件”，因此由客规设计组或的有图设计，包可吃具有独创性，D选项错误：（暂指）", chapter: "第七章 信息网络传播权"},
  {id: 725, topic: "专题八 其他相关法律", type: "multiple", question: "根据反不正当竞争法及相关规定，下列哪种行为风于不正当竞争行为？", options: {"A": "将他人注册商标作为企业字号，但是并未引起误认为是他人商品或与他人存在特定联系", "B": "使用与他人有一定影响的商品名称、包装、装满等相同或者近似的标识", "C": "使用他人有一定影响的新媒体账号名称", "D": "将他人未注册的驰名商标作为企业字号，引人误认为是他人商品或者与他人存在特定联系"}, answer: "ABD", explanation: "。A、B选项，（布图设计保护条例）第9条第12数规定：“布图设计专有权具于布图设计创作者、本条例另有规定的除外。由法人或者其他组织主持，依据法人或者其他组织的意志因创作、并由法人或者其他组织承担责任的布图设计，该法人成有其他组织是创作书”，A、B选项正确。C选项，《布图设计保护条例>第11条规定：“交委托创作的布图设计，其专有权的归属由姿托人和受托人双方约定：未作的定或者约定不明的，其专有权由受托人享有”，C选项错误。D选项，《布图设计保护条例》第10条规定：“两个以上自然人、法人或者其他组织合作创作的布图设计，其专有权的归属由合作者约定：未作约定或者约定不明的，其专有权由合作者共同享有”，D选项正确。（2010）", chapter: "第一章 反不正当竞争法"},
  {id: 726, topic: "专题八 其他相关法律", type: "multiple", question: "甲公司在某地电视台投放广告，宣称“甲公司原装进口实木地板质量佳、服务好”，同时捏造虚伪事实宣称“乙公司生产的木地板甲醛严重超标”。此后，乙公司木地板销量锐减。经查明，甲公司生产的实木地板是用国内木材加工而成。根据反不正当竞争法及相关规定，下列关于该广告行为的哪些说法是正确的？多选）", options: {"A": "甲公司宣称“甲公司原装进口实木地板质量佳、服务好”的行为是不正当竞争行为", "B": "甲公司宣称“甲公司原装进口实木地板质量佳、服务好”的行为是正当竞争行为", "C": "甲公司宣称“乙公司生产的木地板甲醛严重超标”的行为是不正当竞争行为", "D": "甲公司宣称“乙公司生产的木地板甲醛严重超标”相美片银化600题2020专村代理静资的中队的行为是正当或争行为"}, answer: "ACD", explanation: "。《布图设计保护条例》第16条规定：“中请布图设计登记，应当提交：（一）布图设计登记申请表：（二）布图设计的复制件或者图样：（三）布图设计已投入商业利用的，提交合有该布图设计的集成电路样品：（四）国务院知识产权行政部门规定的其他材料”，A、C、D选项正确。不需要提交权利要求书，B选项错误。（2009）", chapter: "第一章 反不正当竞争法"},
  {id: 727, topic: "专题八 其他相关法律", type: "single", question: "根根尺不正当效争法规定、下列哪种行为属于不正当必争行为兴本意）", options: {"A": "将读技术隧密通过学术论文会开表", "C": "将该技术秘密用于生产经营", "B": "将该技术秘密向其好友赵某披露", "D": "将该技术秘密以自己的名义向国家知识产权局申请专利"}, answer: "A", explanation: "。A、B选项，根据《布图设计保护条例》第8条第1款的规定，布图设计专有权经国务院知识产权行政部门登记产生，A选项正确，B选项错误。C、D选项，根据《布图设计保护条例》第12条的规定，布图设计专有权的保护期为10年，自布图设计登记申请之日或者在世界任何地方首次投入商业利用之日起计算，以较前日期为准，C、D选项错误。(2011)", chapter: "第一章 反不正当竞争法"},
  {id: 728, topic: "专题八 其他相关法律", type: "multiple", question: "甲公司的伙科配方是甲公司核心商业秘密，甲公司员工秘密窃取该科配方后，与甲公司竞争对手乙公司联系，乙公司以高薪聘请该员工，使用其提供的甲公司饮料配方开展生产，获取高额利润。下面说法正确的是？", options: {"A": "该员工役犯了甲公司商业秘密", "B": "该员工未侵犯甲公司商业秘密", "C": "乙公司的行为视为侵犯商业秘密行为", "D": "乙公司未直接窃取甲公司饮料配方，有应佣员工的自由，乙公司行为不视为侵犯商业秘密行为"}, answer: "ABD", explanation: "。A选项，《布图设计保护条例》第17条规定：“布图设计自其在世界任何地方首次商业利用之日起2年内，未向国务院知识产权行政部门提出登记申请的，国务院知识产权行政部门不再予以登记”，A选项正确。B选项，（布图设计保护条例>第18条规定：“布图设计登记申请经初步审查，未发现驳回理由的，由国务院知识产权行政部", chapter: "第一章 反不正当竞争法"},
  {id: 729, topic: "专题八 其他相关法律", type: "single", question: "技术信息或者经营信息必须具备下列哪些要件，才能构成反不正当竞争法所称的商业秘密？多选）", options: {"A": "不为公众所知悉", "B": "具有实用性", "C": "权利人对其采取了保密措施", "D": "具有商业价值"}, answer: "B", explanation: "《布图设计保护条例>第19条现定：“每图设计记中请人对回务院知识产以行攻部门放回其登记中请的决定不的，可以自收到通加之日起3个月内，向国务院知识产权行攻部门请求复审…，B选项正晴，（2014）", chapter: "第一章 反不正当竞争法"},
  {id: 730, topic: "专题八 其他相关法律", type: "single", question: "甲公司与乙公司数码相机购销协议进行治谈，其间，乙的商业密被甲公司获悉。甲公司将该商业秘密泄漏给乙公司的竞争对手，导致乙的市场份额减。据此、下列哪些说法是正确的？多选）", options: {"A": "甲的行为属于正营的商业行为", "B": "甲的行为侵犯了乙的商业秘密", "C": "甲应当承担违约资任", "D": "甲应当承担损害赔偿资任"}, answer: "B", explanation: "。《布回说计保护条例细则）第28案规定：“当事人对国家扣识产权局作出的下列其体行攻行力不服成有争议的，可以向国家知识产权身行政复议部门中请复议：（一）不予变理市图设计中请的：（二）将布图设计中请现力激回的…：（四）其他设犯当事人合法权监的具体行改行为”A、C选项可以申请复议，D选项属干行政决定，是具体行政行为，可以中请复议。报据《布图设计保护条例》第19条的规定，对驳回登记申请的决定不度的尺能复审，B选项不使中请复议。（2018）", chapter: "第一章 反不正当竞争法"},
  {id: 731, topic: "专题八 其他相关法律", type: "multiple", question: "根据反不正当竞争法的规定、下列要些行为属于2026年+H只理排侵犯商业秘密的行为？多选）", options: {"A": "李某通过自行研发获得了某项技术，该技术与他人的技术秘密相同", "B": "孙某通过反向工程获得了他人的技术秘密", "C": "唐某违反权利人有关保守商业秘密的要求，向他人披露其掌握的商业秘密", "D": "赵某明知商业秘密是他人以胁迫方式获得的，仍然加以使用"}, answer: "BD", explanation: "。A、B选项，（布图设计保护条例）第17条规定：“市图设计自其在世界任何地方首次商业利用之日起2年内，未向国务院知识产权行政部门提出登记申请的，国务院知识产权行政部门不再予以登记”，A选项错误，B选项正确。C、D选项，《布图设计保护条例》第12条规定：“市国设计专有权的保护期为10年，自布图设计登记中请之日或者在世界任何地方首次投入商业利用之日起计算，以较前日期为准。但是，无论是否登记或者投入商业利用，市图设计自创作完成之日起15年后，不再受本条例保护”，C选项错误，D选项正确。(2012)", chapter: "第一章 反不正当竞争法"},
  {id: 732, topic: "专题八 其他相关法律", type: "multiple", question: "根据反不正当竞争法的规定，下列哪些采取了保密措施的信息属于商业秘密：", options: {"A": "某社交网络公司将用户在互联网上公开的个人信息收集后形成的数据集合", "B": "某销售公司将自己多年经营的客户信息整理后形成的信息集合", "C": "某公司研发一种新的产品后将产品的技术特征写成专利申请文件后向国家知识产权局提交专利申请，在未授权之前专利申请文件中载明的信息属于商业秘密", "D": "某文化创意公司策划推出一部新的游戏作品，涉及游戏的具体设计、情节、装备、规则、人物等信息在未向社会披露之前属于商业秘密"}, answer: "ABCD", explanation: "。《市图设计保护条例》第7条规定：“布图设计权利人享有下列专有权：（一）对受保护的布图设计的全部或者其中任何具有独创性的部分进行复制：（二）将受保护的布图设计、含有该布图设计的集成电路戏有合有该焦成电路的物品投入商业利用“，因此A、B.C、D选项均正确。（2014）", chapter: "第一章 反不正当竞争法"},
  {id: 733, topic: "专题八 其他相关法律", type: "multiple", question: "根据反不正当竞争法的规定，对于侵犯商业秘密的法律费任，下列说法正确的是？", options: {"A": "赔偿数额按照实际损失或者侵权所获得的利益确定", "B": "经营者故意实施侵犯商业秘密行为，情节严重的，可以在按照法定赔偿额的一倍以上三倍以下确定赔偿数额", "C": "经营者侵犯商业秘密的，由监督检查部门责令停止违法行为，没收违法所得，处以罚款", "D": "权利人受到的实际损失、侵权人所获得的利益难以确定的，由人民法院可以判决给予权利人500万元以下的赔偿"}, answer: "CD", explanation: "。A、B选项，（布图设计保护条例》第23条规定：“下列行为可以不经布图设计权利人许可，不向其支付报酬：（一）为个人目的或者单纯为评价、分析、研究、教学等目的因复制受保护的布图设计的（二）在依据前项评价、分析受保护的布图设计的基础上，创作出具有独例性的布图设计的1（三）对自已独立创作的与他人相同的布图设计进行复制或者将其投入商业利用的”，A、B选项属于合理使用的情形。C、D选项，（布图设计保护条例）第30条第1款规定：“除本条例另有规定的外，未经布图设计权利人许可，有下列行为之一的，行为人必须立即停止便权行为，并承担赔偿责任：（一）复制受保护的布图设计的全部或者其中任何具有独创性的部分的：（二）为商业目的进口、销售或者以其他方式提供受保护的布图设计、含有该布图设计的集成电路或者合有该集成电路的物品的”，C、D选项属于役权行为。（2010）", chapter: "第一章 反不正当竞争法"},
  {id: 734, topic: "专题八 其他相关法律", type: "multiple", question: "根据植物新品种保护条例及相关规定，下列邮种说法是正确的？", options: {"A": "申请品种权的植物新品种应当属于国家植物品种保护名录中列举的植物的属或者种", "B": "授子品种权的植物新品种的名称可以仅以数宇组成", "C": "投予品种权的植物新品种应当具备适当的名称，并与相同或者相近的植物属或者种中已知品种的名称相区别", "D": "授于品种权的植物新品种应当具备的一致性，是指一个植物品种的特性，除可预期的自然变异外，体内个体间相关的特征或者特性表现一致"}, answer: "BD", explanation: "。（布图设计保护条例）第33条规定：“在获得合有受保护的布图设计的集成电路或者含有该集成电路的物品时，不知道也没有合理理由应当知道其中含有非法复制的布图设计，而将其投入商业利用的，不视为使权。，前敷行为人得到其中合有非法复制的布图设计的明确通知后；可以继续将现有的存货或者此前的订货投入商业利用，但应当向布图设计权利人支付合理的报酬”，A、C选项错误，B、D选项正确。（2008）", chapter: "第二章 植物新品种保护"},
  {id: 735, topic: "专题八 其他相关法律", type: "single", question: "根据植物新品种保护条例及相关规定，下列邮些说法是正确的？", options: {"A": "植物新品种是指经过人工选育的或者对发现的野生植物加以改良获得的新品种", "B": "未列人国家植物品种保护目录中的植物新品种不受植物新品种保护条例保护", "C": "授予品种权的植物新品种应当同时具备新额性、创造性、一致性和稳定性", "D": "违反社会公德的名称不得用于授权品种的命名"}, answer: "B", explanation: "。《布图设计保护条例》第31条规定：“未经布图设计权利人许可，使用其布图设计，即犯其布图设计专有权，引起纠纷的也可以请求国务院知识产权行政部门处理”，因此B选项正确。（2013）", chapter: "第二章 植物新品种保护"},
  {id: 736, topic: "专题八 其他相关法律", type: "multiple", question: "根据植物新品种保护条例及相关规定，下列哪些说法是错误的？", options: {"A": "申请品种权的，应当提交请求书、说明书、该品种的照片以及权利要求书", "B": "申请人可以在品种权授于前修改或者撤回品种权申请", "C": "授予品种权的植物新品种应当具备的特异性、是指一个植物品种有一个以上性状明显区别于已知品种", "D": "授予品种权的植物新品种应当具备的稳定性、是指一个植物品种的特性，除可预期的自然变异外、群体内个体间相关的特征或者特性表现一致。"}, answer: "AC", explanation: "。A选项，（布图设计保护条例》第26条第2款规定：“给于使用布图设计非自忍许可的专圈八其他相关法律决定…其范国应当限于为公共目的非前业性便用……”，A违项正崎，B选项（布图设计保护条例>第27条规定：“取佛使用布图设计准自说许可的自修人、法人或者其他理贷不享有偿占的使用仅，并且无权允许他人使用”，因北自您人可以取挥律自限许可，B选项借误。C选项，《布图议计保护条例>第25条规定：“…或者经人民法院、不正当党争行有堂管检查部门银法认定布图设计权利人有不正当免争行力西需要给平补教时，国养院知识产权行攻部门可以俗平使用其布图设计的事自厚许可”，因此C选项正确，D选项，《布图设计保护条例》第26条能3款规定：“事自厚许可的现由消除井不再发生时，国务院扣识产权行攻部门应当限据布图设计权利人的请求，经审查后作出终止使用布图设计你自思许可的决定”，因北D选项借误。（所瑜）关保护条例识", chapter: "第二章 植物新品种保护"},
  {id: 737, topic: "专题八 其他相关法律", type: "multiple", question: "根据植物新品种保护条例的规定，下列哪些申请品种权的林木新品种具备新颖性？多选）", options: {"A": "在申请日前其繁殖材料、收获材料未被销售、推广", "B": "在申请日前，经申请权人许可，其繁殖材料、收获材料在中国境内销售、推广未超过1年", "C": "在境外，木本、藤本植物品种销售、推广未超过4年", "D": "在境外，除木本、藤本植物以外的植物品种销售、推广未超过4年"}, answer: "ABD", explanation: "。《海关保护条例）第2条规定：“本条例所称知识产权海关保护，是指海关对与进出口货物有关井受中华人民共和回法律、行政法规保护的商标专用权、著作权和与著作权有关的权利、专利权（以下统称知识产权）实施的保护”，A、B、D选项正确，C选项不属于知识产权海关保护条例的保护范畴。（2012）", chapter: "第二章 植物新品种保护"},
  {id: 738, topic: "专题八 其他相关法律", type: "multiple", question: "根据植物新品种保护条例及相关规定，在没有合同约定的情况下，下列哪些说法是正确的？多选）", options: {"A": "执行本单位的任务所完成的职务育种，植物新品种的申请权属于该单位", "B": "主要是利用本单位的物质条件所完成的职务育种，植物新品种的申请权属于完成育种的个人", "C": "合作育种，植物新品种的申请权属于共同完成育种的单位和个人", "D": "委托育种，植物新品种的申请权属于委托人"}, answer: "BCD", explanation: "。八选项，低据（海关保护条例）的？第2条的规定，海关对与进口和出口货物有关的知识产权实范保护，A选项借误。B选项，海关实意保护的包括商标专用权、著作著权和与著作权有关的权利、专利权，B选项正确。C选项，《海关保护条例）第+条规定：“知识产权权利人请求海关实施知识产权保向护的，应当向海关提出采取保护措施的中请”，C选项正确。D选项，（海关保护条例）业第6条规定：“海关实施知识产权保护时，应当保守有关当事人的商业密”，D选项正。（2013）", chapter: "第二章 植物新品种保护"},
  {id: 739, topic: "专题八 其他相关法律", type: "multiple", question: "张某于2025年10月11日独立完成了某植物新品种的育种，王某于2026年2月14日也独立完成了该植物新品种的育种。张某和王某均于2026年6月18日分别就该植物新品种申请品种权。如果张某和王某就该植物新品种提交的品种权申请均符合授予品种权的其他条件，则品种权应当授予何人？", options: {"A": "张某", "B": "王某", "C": "由张某和主某协商确定，不愿协商或协商不成的，以抽签的方式确定申请人", "D": "由张某和王某协商确定，不愿协商或协商不成的，驳回张某和王某的申请"}, answer: "ABC", explanation: "。A、B选项，《海关保护条例）第14条规定：“知识产权权利人请求海关扣留侵权嫌疑货物的，应当向海关提供不起过货物等值的担保，用于赔偿可能因申请不当给收货人、发货人造成的捐失，以及支付货物由海关扣留后的仓储、保管和处置等费用·…..”，A、B选项正确。C选项，（海关保护条例>第24条规定：“有下列情形之一的，海关应当放行被扣留的役权疑货物：·（三）涉嫌侵犯专利权货物的收货人或者发货人在向海关提供与货物等值的担保金后，请求海关放行其货物的……”，C选项正确。D选项，（海关保护条例》第27条第1款现定：“被扣留的侵权嫌疑货物，经海关调查后认定役犯知识产权的，由海关子以没收”，D选项错误。（2012）", chapter: "第二章 植物新品种保护"},
  {id: 740, topic: "专题八 其他相关法律", type: "multiple", question: "根据《植物新品种条例》及相关规定，对于植物新品种申请需要初步审查哪些内容：", options: {"A": "是否属于植物品种保护名录列举的植物属或者种的范围", "B": "是否符合新颖性的规定", "C": "植物新品种的命名是否适当", "D": "植物新品种是否具有稳定性"}, answer: "ABC", explanation: "。《海关保护条例》第7条第1款规定：“知识产权权利人可以依原本条例的规定，将其知识产权向海关总暑中请备案：申请备案的，应当提交申请书。申请书应当包括下列内容：（一）知识产权权利人的名称或者姓名、注册地或者国籍等：（二）知识产权的名称、内容及其相关信息：（三）知识产权许可行使状况….”，因此A、B、C选项正确。海关备案不需要稳定性初步证明文件，D选项错误。（新编）", chapter: "第二章 植物新品种保护"},
  {id: 741, topic: "专题八 其他相关法律", type: "multiple", question: "王某对于审批机关驳回其品种权申请的决定不服，拟提起复审。根据植物新品种保护条例及相关规定，下列关于复审程序的说法哪些是正确的？", options: {"A": "复审请求应当向植物新品种复审委员会提出", "B": "王某应当自收到通知之日起3个月内提出复审请求", "C": "植物新品种复审委员会应当在收到复审请求书的3个月内作出决定", "D": "申请人对复审决定不服的，应当在收到通知之日起3个月内向人民法院提起诉讼"}, answer: "ABC", explanation: "。A选项，《海关保护条例》第31条规定：“个人携带或者邮寄进出境的物品，超出自用、合理数量，并役犯本条例第2条规定的知识产权的，按照侵权货物处理”，A选项正确。B选项，（海关保护条例>第11条第1款规定：“知识产权备案情况发生改变的，知识产权权利人应当自发生改交之日起30个工作日内，向海关总署办理备案变更或者注销手续”，B选项正确。C选项，《海关保护条例>第24条规定：“有下列情形之一的，海关应当放行被扣留的侵权嫌疑货物：…（五）在海关认定被扣留的侵权疑货物为役权货物之前，知识产权权利人撒回", chapter: "第二章 植物新品种保护"},
  {id: 742, topic: "专题八 其他相关法律", type: "multiple", question: "根据植物新品种保护条例及相关规定，关于植物新品种权的无效，下列说法正确的是？多选）", options: {"A": "请求宣告品种权无效的期限为自公告授予品种权之日起6个月后", "B": "对于不具备一致性的植物新品种，植物新品种复审委员会可以依据职权宣告品种权无效", "C": "对于不具备稳定性的植物新品种，植物新品种复审委员会可以依据任何单位或个人的书面请求宣告品种权无效235-2028年中科代理师安协考技", "D": "品种权人对于宜告其品种权无效的决定不服的，可以向人民法院起诉"}, answer: "BCD", explanation: "。A选项，根据（海关保护条例）第24条的规定，海关做月本条例第15条的现定口曾权地康货物，自扣留之日起20个工作日内决收到人民法院协助执行通如的，海关血当放行口留的设权地货物。因北，A念项借误，B、C.D选项均局于放行条件，（2007）保护", chapter: "第二章 植物新品种保护"},
  {id: 743, topic: "专题八 其他相关法律", type: "multiple", question: "根据植物新品种保护条例及相关规定、下列哪些使用授权品种的繁殖材料的生产行为、应经品种权人许可？", options: {"A": "为商业目的重复使用授权品种进行生产或者繁殖的另一品种", "B": "未经许可使用授权品种的繁殖材料而获得的收获材料", "C": "未经许可使用授权品种的实质性派生品种的繁殖材料", "D": "未经许可使用授权与授权品种相比，不具备明显区别的品种"}, answer: "ABC", explanation: "（展会扣识产权保护办法》第8票现定：“扣识产权权利人可以向是会如识产权投诉机构投诉也可置提向如识产权行政管理部门投诉、权利人匀投诉机构设诉的，应当是交以下村料：（一）合法有效的识产权权具证明：（二）沙墩便权当事人的基本信息：（三）涉域设权的理由和证语：（四）委托代理人投诉的，应提交投权委托节”，A、B、C选项正同、财产担保证明无提交，D选项错误。（2009）", chapter: "第二章 植物新品种保护"},
  {id: 744, topic: "专题八 其他相关法律", type: "multiple", question: "根据植物新品种保护条例及相关规定，下列哪些行为应经品种权人许可？", options: {"A": "许诺销售授权品种的殖材料", "B": "农民自自用授权品种的殖材料", "C": "出口授权品种的繁殖材料", "D": "储存为繁殖授权品种的繁殖材料"}, answer: "ABCD", explanation: "。（展会扣识产权保护办法）第17亲规定：“有下月情形之一的，地方知识产权局对使见专利权的投诉或者处理请裳不干受理：（一）投诉人或者请求人已经向人民法院提起专利便权诉的：（二）专利权正处于无效宜告请求但序之中的：（三）专利权存在权属纠分，正处于人民法院的审理程序或者管理专利工作的部门的调解程序之中的：（四）专利权已经终止，专利权人正在办理权利恢复的”，因此A、B、C、D选项均正。（2008）", chapter: "第二章 植物新品种保护"},
  {id: 745, topic: "专题八 其他相关法律", type: "multiple", question: "根据植物新品种保护条例及相关规定，下列关于品种权的保护期限的说法哪项是正确的？多选）", options: {"A": "木本的品种权保护期限为25年，自申请之日起算", "B": "木本的品种权保护期限为25年，自授权之日起算", "C": "草本植物的品种权保护期限为20年，自授权之日起算", "D": "藤本植物的品种权保护期限为25年，自申请之日起算"}, answer: "ABC", explanation: "。（展会如识产权保护办法）第20条规定：“有下列情形之一的，地方工商行政管理部门对设犯商标专用权的投诉戏者处理请求不予受理：（一）投诉人或者请求人已经向人民法院提起商标侵权诉讼的：（二）商标权已经无效或者被数销的”，因此A、B、C选项正确，D选项错误。（新编）1.C。A、B、C选项，《对外贸易法》第15条第3定：“进出口属于自由进出口的技术，应当向院对外贸易主管部门或者其委托的机构办理备案登记”，因此A、B选项错误，C选项正确。页，（对外贸易法》第19条第1、2款规定：“国家制进口或者出口的货物，实行配额、许可证等管理：对限制进口或者出口的技术，实行许可理。实行配额、许可证管理的货物、技术，应熟国务院规定经国务院对外贸易主管部门或其会同国务院其他有关部门许可，方可进口出口”，因此D选项错误。（2007）", chapter: "第二章 植物新品种保护"},
  {id: 746, topic: "专题八 其他相关法律", type: "multiple", question: "根据集成电路布图设计保护条例及相关规定.下列说法哪些是正确的？", options: {"A": "受保护的集成电路布图设计应当具有创性", "B": "集成电路布图设计专有权经国务院知识产权行政部门登记产生", "C": "对集成电路布图设计的保护不延及思想、处理过程、操作方法或者数学概念等", "D": "集成电路布图设计专有权的保护期为十五年"}, answer: "ACD", explanation: "。A选项，《技术进出口管理条例》第规定：“属于限制出口的技术，实行许可证管未经许可，不得出口”，因此A选项正确。B选技术进出口管理条例》第34条规定：“技术出请经批准的，由国务院外经贸主管部门发给出口许可意向书。申请人取得技术出口许可书后，方可对外进行实质性谈判，签订技术出同”，因此B选项错误。C、D选项，《技术进出", chapter: "第三章 集成电路布图设计"},
  {id: 747, topic: "专题八 其他相关法律", type: "single", question: "关于集成电路布图设计的独创性.下列邮项说法是正确的？", options: {"A": "布图设计是创作者自己独立创作的，也可能不具有独创性", "B": "是否具有独创性，应以提出登记时为到断时间点", "C": "是否具有独创性，应从本领域技术人员的角度判断", "D": "由常规设计组成的布图设计、不具有独创性"}, answer: "A", explanation: "。（促进科技成果转化法》第16条规定：“科技成果持有者可以采用下列方式进行科技成果转化：①自行投资实施转化：②向伦人转让该科技成果：③许可他人使用该科技成果：④以达科技成果作为合作条件，与他人共同实施转化：G以该科技成果你价投资，折算股份或者出资比例：其他协商确定的方式”，因此，A选项留仪，B、C、D选项正确。（新编）进步法术进步法）第34条的规定：“国家放励利用财政性资目所形成的知识产权首先在境内使用。前款规定或者个人转让，或者许可境外的组织或者个人经占几构批准；法律、行政法规对批准机构另有规定的，错误。根据《科学技术进步法》第32条的规定：：“利技术计划项目所形成的科技成果，在不损害国家安公共利益的前提下，投权项目承担者依法取得相关依法自行投资实施转化、向他人转让、联合他人共或者作价投资等。项目承担者应当依法实施前款取保护措施，并就实施和保护情况向项目管理机构内没有实施且无正当理由的，国家可以无偿实，或者无偿实施。项目承担者依法取得的本条第一家安全、国家利益和重大社会公共利益的需要，国可他人有偿实施或者无偿实施。”因此B选项错误，什条约", chapter: "第三章 集成电路布图设计"},
  {id: 748, topic: "专题八 其他相关法律", type: "multiple", question: "根据集成电路布图设计保护条例及相关规定，下列说法哪些是正确的？", options: {"A": "集成电路布图设计登记申请表", "B": "集成电路布图设计的说明书和权利要求书", "C": "集成电路布图设计的复制件或者图样", "D": "集成电路布图设计已投人商业利用的，提交含有该布图设计的集成电路样品"}, answer: "AB", explanation: "（世慧公>第1茶（=）境定：“工产权的保护对复是专村、关消销登、工安外功计、商标、服券谢券、厂谢名、灸那你记设准产成名以及利止不正当党”，A.B项正境、法意作以和与事作以循关的权利、以庆所失的如识产权們勿情物新品停和集成电专旧设计不任（巴靠公价）保护范谊市.（2013）", chapter: "第三章 集成电路布图设计"},
  {id: 749, topic: "专题八 其他相关法律", type: "single", question: "根据集成电路布图设计保护条例及相关规定，下列说法哪项是正确的？单选）", options: {"A": "布图设计专有权经国家知识产权局登记产生", "B": "布图设计专有权自创作完成之日起自动产生", "C": "布图设计专有权的保护期为15年，自布图设计登记申请之日起计算", "D": "布图设计专有权的保护期为15年，自布图设计创作完成之日起计算"}, answer: "D", explanation: "、提竭（巴掌公》第1条（二）的规定，成电鸡不属于工业产岳的览国，D古项正身，(2014)", chapter: "第三章 集成电路布图设计"},
  {id: 750, topic: "专题八 其他相关法律", type: "single", question: "根据《布图设计保护条例》及其他相关规定，下列哪些说法是正确的？", options: {"A": "布图设计首次商业利用之日起2年内，未提出登记申请的，国家知识产权局不予登记", "B": "国家知识产权局应当对布图设计登记申请进行初步审查", "C": "国家知识产权局应当对布图设计登记申请进行实质审查", "D": "布图设计明显不符合该条例所规定的布图设计定义的，国家知识产权局应当作出驳回决定"}, answer: "D", explanation: "（巴攀公均》第工茶（一）规定：“本跌显任何国农的回民，在保护工业产权万面，应在木司其他国第内享有各该国注体现在成今后可愿的子国民的各种利庄：…“，本随题干地的是回民待通原则，D走项正确。（2017）", chapter: "第三章 集成电路布图设计"},
  {id: 751, topic: "专题八 其他相关法律", type: "multiple", question: "根据集成电路布图设计保护条例及相关规定，布图设计登记申请人对国家知识产权局驳回其登记申请的决定不服的，可以选择下列哪种救济途径？", options: {"A": "自收到通知之日起3个月内向国家知识产权局申请行政复议", "B": "自收到通知之日起3个月内向国家知识产权局请求复审", "C": "自收到通知之日起3个月内向国家知识产权局申诉", "D": "自收到通知之日起3个月内直接向人民法院提起行政诉讼"}, answer: "ABCD", explanation: "。BCD，（已掌公的）第2（二）内规定：“对于本联且回家的回民，不得境足在体实求保护的回京须有住所范董业所才促享有工业产权”。本随中，甲、乙方（已事企）或氏田，回此，他们的国民在对万国部平有回民华进，西不论其住所是在甲国、乙国或丙回，B、C.D项正确。A选项，（巴靠公约）靠3条规定：“本襄互口小各国的国民，在本里一个国家的领土内世有住所或有真实和有效的工商业营业所的，应享有与本联困国家国民间样的侍透\"，丙虽运不是（巴算公约）成员国，但其国民在甲回有住所，他可以享有国民侍遇，A选项正确（2006）", chapter: "第三章 集成电路布图设计"},
  {id: 752, topic: "专题八 其他相关法律", type: "multiple", question: "当事人对国家知识产权局作出的下列哪项具体行政行为不服的，不能申请复议？", options: {"A": "不予受理布图设计申请的", "B": "驳回布图设计登记申请的", "C": "将布图设计申请视为撤回的", "D": "给予使用其布图设计的非自愿许可的"}, answer: "ABCD", explanation: "。根据（巴公约》第3某的规定，中国属于（巴擎公约）成月国，中国国民无论是否在美国有住所成曾业所，在美国均可享有国民侍遇，A、B、C、D选项均正确。（2014）", chapter: "第三章 集成电路布图设计"},
  {id: 753, topic: "专题八 其他相关法律", type: "multiple", question: "根据集成电路布图设计保护条例及相关规定，下列哪些说法是正确的？多选）", options: {"A": "布图设计自其在世界任何地方首次商业利用之日起1年内未向国务院知识产权行政部门提出登记申请的，国务院知识产权行政部门不再予以登记", "B": "布图设计自其在世界任何地方首次商业利用之日起2年内未向国务院知识产权行政部门提出登记申请的，国务院知识产权行政部门不再予以登记", "C": "无论是否登记或者投人商业利用，布图设计自其创作完成之日起满10年的，不再受保护", "D": "无论是否登记或者投人商业利用，布图设计自其创作完成之日起满15年的，不再受保护"}, answer: "ABC", explanation: "。《巴公约》第2条（三）规定：“木联每一国家法律中关于何法和行政程序管辖权以及指定送达地址成委派代理人的规定等，工业产权法中可能有要求的，均明确地予以保留”，木陌考查国民待透的例外规定，因此A、B、C选项正确，D选项不属于例外规定对象。（2013）", chapter: "第三章 集成电路布图设计"},
  {id: 754, topic: "专题八 其他相关法律", type: "multiple", question: "根据集成电路布图设计保护条例及相关规定，布图设计权利人享有下列哪些专有权？", options: {"A": "将受保护的布图设计投人商业利用", "B": "将含有受保护布图设计的集成电路以及含有该集ULL相关法剪化600路2026年科八理结成电路的物品投人商业利用", "C": "对变保护的布图设计的全部进行复制", "D": "对变保护的布图设计的任何具有独创性的部分进行复制"}, answer: "BCD", explanation: "。A、B选项，《巴黎公约>第4条之二规定：“（一）本联显国家的国民向本联固各国中请的专利、与在本联皿其他国家，不论是否本联皿的成员国，就同一发明所取得的专利是相互独立的。（二）上述规定，应从不受限制的意义米理解，特别是指在优先权期间内申请的各项专利，就其无效和丧失权利的理由以及其正常的期问而官，是相互独立的”，A选项错误，B选项正确。C选项，（巴黎公约》第4条之二（五）规定：“在本联显各国，因享有优先权的利益而取得的专利的期限，与没有优先权的利益而申请或投子的专利的期限相同”，C选项正确。D选项，（巴黎公约》第4条之四规定：“不得以专利产品的销售或依专利方法制造的产品的销售受到本国法律的禁止或限制为理由，而拒绝投予专利或使专利无效”，D选项正确。（2008）", chapter: "第三章 集成电路布图设计"},
  {id: 755, topic: "专题八 其他相关法律", type: "single", question: "根据集成电路布图设计保护条例及相关规定、集感电路布图设计权利人甲公司可以要求行为人停止下列感些未经其许可的行为？多选）", options: {"A": "某大学教授赵某为教学目的而复制甲公司受保护的布图设计", "B": "乙公司将自己独立创作的与甲公司受保护的布图设计相同的布图设计投人商业利用", "C": "内公司为商业目的复制甲公司受保护的布图设计中具有创性的部分", "D": "丁公司为商业目的销售含有甲公司受保护的布图设计的集成电路"}, answer: "C", explanation: "。根据（巴黎条约》第4条之二规定的专利独立原则，一件专利在中国被投权或者被驳回，与其在美国的审查结果没有关系。美国的专利中请应当按照美国的专利制度审查，C选项正确。(2019)", chapter: "第三章 集成电路布图设计"},
  {id: 756, topic: "专题八 其他相关法律", type: "multiple", question: "甲购进一批集成电路用于销售，但不知道也没有合理理由应当知道该集成电路含有受保护的布图设计。甲销售了一半后，收到布图设计权利人乙的明确通知，告知其销售的集成电路中含有非法复制的布图设计。对此，下列哪些说法是正确的？多选）", options: {"A": "甲的行为构成侵权", "B": "甲的行为不视为侵权", "C": "甲应当就其在接到乙的明确通知前销售的集成电路，向乙补偿一定的费用", "D": "甲在接到乙的明确通知后，可以继续销售另一半存货，但应当向乙支付合理的报酬"}, answer: "ABD", explanation: "。（巴黎公约》第4条A（1）规定：“已经在本联显的一个国家正式提出专利、实用新型注册、外观设计注册或商标注册的申请的任何人，或其权利继受人，为了在其他国家提出申请，在规定的期同内应享有优先权”，根据本规定，专利、实用新型、外观设计均可享有优先权，A、B、D选项正确，C选项错误。（2012）保护工业产权巴黎公约与马拉喀什条约", chapter: "第三章 集成电路布图设计"},
  {id: 757, topic: "专题八 其他相关法律", type: "multiple", question: "根据集成电路布图设计保护及相关条例规定，侵犯布图设计专有权，引起纠纷的，布图设计权利人或者利害关系人可以向下列哪一部门请求处理？", options: {"A": "国务院工商行政管理部门", "B": "国务院知识产权行政部门", "C": "国务院科学技术行政部门", "D": "省级管理专利工作的部门"}, answer: "ABD", explanation: "。A违班，哲《巴集公约）带4条A（2）的规定，依凤本联旦任何成员国国家的本国立法，成依原本映盟各国之间协结的从进成多边条约，与正规的国农中请借当的任何中请，应收来认为产生优先权，A选项正确。B选项，根哲（巴算公约>第4条D（1）的脱足，佳何人奇型利用以滑是出的一项中请的优先权的，肾是作出声明，说明提出该申请的日期和受该中请的国家。每一国家应定必须作出该项当明的最后日期，B选项正吻。C选项，根据《巴等公伤>第四条C（1）的现定，外观设计的优免权期回为6个月：E（1）的规定，依靠以实用新型中请为基础的优先权百在一个国案提出工业品外观设计中请的，优先权的期间应与对工业品外现设计现定的优免权期间一样，即为6个月，C选项借误。D选项，根据（已馨公约>第四条B（2）规定，做靠以专利中请力基础的优先权资在一个国家提出实用新型的中请是许可的，反之亦一样，D选项正确。（2007）", chapter: "第三章 集成电路布图设计"},
  {id: 758, topic: "专题八 其他相关法律", type: "multiple", question: "关于集成电路布图设计的非自愿许可，下列哪些说法是正确的？", options: {"A": "其范围应当限于为公共目的非商业性使用", "B": "非自愿许可不得给予自然人", "C": "其原因可以是经人民法院、不正当竞争行为监督检查部门依法认定布图设计权利人有不正当竞争行为而需要给予的补救", "D": "非自愿许可的理由消除并不再发生时，国务院知识产权行政部门应当主动及时作出终止使用布图设计非自愿许可的决定"}, answer: "AB", explanation: "。A、B、C选项，根据（巴攀公均）第4条C（1）、E（1）、E（2）的规定，以实用折型专利为基础提出发明专利或者实用新型专利新中请部可以享有优先权，优先权期同为12个月。以实用新型专利为基础提出外观设计专利也可以享有优先权，优先权期间为6个月，A、B选项正确，C选项错误。D选项，（巴攀公约）第四条A（2)、A（3）款规定：“依凤本联回任何国家的本国立法，或依座本联盟名国之间缔结的及边成多边条约，与正规的国家中请相当的任何申请，应被示认为产生优先权。正规的国家中请是指在有关国家中足以确定提出申请日期的任何申请，面不问该申请以后的结局如何”，因此国家申请技驳回或被投权都不影响其作为优先权基础，D选项错误。（新编）", chapter: "第三章 集成电路布图设计"},
  {id: 759, topic: "专题八 其他相关法律", type: "multiple", question: "根据知识产权海关保护条例及相关规定，下列哪些产权的权利人可以请求海关实施知识产权海关保护？多选", options: {"A": "注册商标专用权", "B": "著作权和与著作权有关的权利", "C": "集成电路布图设计专有权", "D": "专利权"}, answer: "ABC", explanation: "。A、B选项，（巴黎公约》第4条C（1）-（3）规定：“优先权的期回…·这些期问应自之内。如果期间的最后一日在请求保护地国家是法定仅日或有是主管局不接受中请的日子，期问应是至其后的第一个工作日”，A、B选项正确。C、D选项，根报（巴靠公约）第11条规定，国际展览会的临时保护不仅适用于发明、实用新型和工业品外观设计，而且适用于商标，但不应延展第4条（优先权）规定的期限，C选项正确，D选项错误。(2011)", chapter: "第四章 知识产权海关保护"},
  {id: 760, topic: "专题八 其他相关法律", type: "multiple", question: "根据知识产权海关保护条例，下列哪些说法是正矿", options: {"A": "海关仅对与出口货物有关的知识产权实施保护", "B": "海关实施保护的知识产权包括专利权、商标专用作权和与著作权有关的权利", "C": "知识产权权利人请求海关实施知识产权保护的，应海关提出采取保护措施的申请", "D": "海关实施知识产权保护时，应当保守有关当事人的秘密状"}, answer: "ABCD", explanation: "。A选项，《巴黎公约》第4条D（1）规定：“任何人希望利用以前提出的一项中请的优先权的，带要作出声明，说明提出该申请的日期和受理该中请的国家……….”，A选项正确。B选项，（巴黎公约》第4条D（3）规定：“本联团国家可以要求作出优先权声明的任何人提交以前提出的申请（说明书、附图等）的副本…”，B选项正确。C选项，（巴黎公约）第4条A（2）规定：“依照本联盟任何国家的本国立法，或依風本联塑各国之间缔结的双边或多边条约，与正规的国家申请相当的任何申请，应当被承认为产生优先权”，C选项正确。D选项，（巴黎公约>第4条E（1）规定：“依靠以实用新型申请为基础的优先权而在一个国家提出工业品外观设计申请的，优先权期问应与工业品外观设计规定的优先权期间一样”，D选项正确。（2016）", chapter: "第四章 知识产权海关保护"},
  {id: 761, topic: "专题八 其他相关法律", type: "multiple", question: "根据知识产权海关保护条例及相关规定，下列哪些说法是正确的？", options: {"A": "知识产权权利人请求海关扣留侵权嫌疑货物的，应当向海关提供不超过货物等值的担保", "B": "海关依规定扣留侵权嫌疑货物的，知识产权权利人应当支付有关的仓储、保管和处置费用", "C": "涉嫌侵犯专利权货物的收货人或者发货人在向海关提供与货物等值的担保金后、请求海关放行其货物的，海关应予放行", "D": "被扣留的侵权嫌疑货物、经海关调查后认定役犯知识产权的，海关应将其交给知识产权权利人处理"}, answer: "BD", explanation: "。A选项，《巴黎公约>第4条之四规定：“不得以专利产品的销售或依专利方法制造的产品的销售受到本国法律的禁止成限制为理由，面拒绝投予专利或体效”，A选项错识定：“中选项，已约保护工业产权巴黎公约与马拉喀什条约", chapter: "第四章 知识产权海关保护"},
  {id: 762, topic: "专题八 其他相关法律", type: "multiple", question: "根据知识产权海关保护条例及相关规定，知识产权权利人可以将其知识产权向海关总署申请备案。申请备案的，应当提交申请书。申请书应当包括下列哪些内容？多选）", options: {"A": "知识产权许可行使状况", "B": "知识产权的名称、内容及其相关信息", "C": "知识产权权利人的名称或者姓名、注册地或者国籍等", "D": "知识产权稳定性初步证明文件"}, answer: "BD", explanation: "。A选项，《巴繁公约>第S条A（2）规定：“本联且各国部有权采取立法指虑况定投干强制许可，以防止由于行使专利所赋于的专有仅面可能产生的溢用，例如：不实施”，A选项错误。B、C选项，（巴靠公约）第5条A放（4）况定：“…这种强制许可是非偿占性的，而且除与利用试许可的部分企业成商替一起转让外，不得转让，甚至以授千分许可证的形式在内”，B选项正确，C选项借误，D选项，尽管《巴睾公约>没有明确规定强制改许可人应当向专利权人支付使用费，但其是许可条体之一，获得强胡许可的微许可人应当向专利权人支付使用费.D迄项正确。（2014）", chapter: "第四章 知识产权海关保护"},
  {id: 763, topic: "专题八 其他相关法律", type: "multiple", question: "根据知识产权海关保护条例及相关规定，下列说法哪些是正确的？", options: {"A": "个人携带或者邮寄进出境的物品，超出自用、合理数量，并侵犯知识产权的，按照侵权货物处理", "B": "知识产权备案情况发生改变的，知识产权权利人应当自发生改变之日起30个工作日内，向海关总署办理备案变更或者注销手续", "C": "在海关认定被扣留的侵权嫌疑货物为侵权货物之前，知识产权权利人撤回扣留侵权嫌疑货物的申请的，海关应当放行被扣留的侵权嫌疑货物", "D": "对被没收的无法用于社会公益事业且知识产权权利人无收购意愿的进口假冒商标货物，在清除货物上的商标标识后海关即可允许其进人商业渠道"}, answer: "BCD", explanation: "。A、B选项，《巴公约>第5条A（2）规定：“本联显各国部有权采取立法措地规定投子强明许可，以防止由于行使专利所款子的专有权百可能产生的温用，例如：不实览”：（巴算公均》第5条A（S）规定：“上述各有规定（即关于强例许可的规定）准用于实用新型”，A选项借误，B选项正确。C选项，《巴幕公约》第5条A（3）规定：“除湿制许可的投于不足以防止上述溢用外，不应规定专利的取消”，C选项正确。D选项，很据（已攀公约）第5条A（4）的规定，针对专利权授予的强制许可是非独占性的，D选项正确。（2012）", chapter: "第四章 知识产权海关保护"},
  {id: 764, topic: "专题八 其他相关法律", type: "multiple", question: "根据知识产权海关保护条例及其实施办法的规定.下列哪些说法是正确的？", options: {"A": "知识产权权利人申请扣留侵权娘疑货物.海关依法扣留侵权嫌疑货物后，自扣留之日起15个工作日内未收到人民法院协助执行通知的，海关应当放行被扣留的侵权娘疑货物", "B": "知识产权权利人接到海关发现涉娘役犯其备案知识产权的进出口货物的书面通知后，逾期未提出扣留侵权货物申请或者未提供担保的，海关不得扣留货物", "C": "涉嫌侵犯专利权货物的收货人或者发货人在向海关提供与货物等值的担保金后，请求海关放行其货物的.海关应当放行被扣留的侵权嫌疑货物", "D": "海关认为收货人或者发货人有充分的证据证明其货物未侵犯知识产权权利人的知识产权的，应当放行被扣留的役权嫌疑货物"}, answer: "ABCD", explanation: "。A选项，根据（已算公约）第7条的规定，使用商标的商品的性质在任何情况下不应妨母该商标的注册，八选项正确。B选项，根据（巴黎公约》第5条A（4)的规定，自提出专利申请之日起4年届满以前，成自设于专利之日起3年届满以前，以后满期的期问为准，不得以不实施成不充分A（5）的规定，有关专利的上述规定准用于实用新型，B选项正确。C选项，根据（巴黎公约）第5条B的规定，对外观设计的保护，在任何情况下，都不得以不实施或进口物品与受保护者相同为理由而使其丧失，C选项正确。D选项，根据《巴黎公约）第5条之二（1）的规定，缴纳规定的工业产权维持费、应给予不少于6个月的宽限期，D选项正确。(2008)", chapter: "第四章 知识产权海关保护"},
  {id: 765, topic: "专题八 其他相关法律", type: "multiple", question: "根据展会知识产权保护办法的规定，知识产权权利人向展会知识产权投诉机构投诉的，应当提交下列哪些材斜？多选）", options: {"A": "合法有效的知识产权权属证明", "B": "涉嫌侵权当事人的基本信息", "C": "涉嫌侵权的理由和证据", "D": "财产担保证明"}, answer: "AD", explanation: "。A选项，（巴黎公约）第5条之二（1）规定：“关于规定的工业产权维持费的缴纳，应给于不少于6个月的宽限期，但是如果木国法律有规定，应缴纳附加费”，因此人选项正确。B选项，（巴黎公约》第19条规定：“木联显国家在与本公约的规定不相抵触的范国内，保留有相互间分别签订关于保护工业产权的专门协定的权利”，因此B选项错误。C选项，《巴黎公约》第5条之三规定：“在本联且任何国家内，下列情况不应认为是役犯专利权人的权利：1.本联型其他国家的船舶暂时成偶然地进入上述国家的领水时，在该船的船身、机器、船具、装备及其他附件上使用构成专利对象的器核，但以专为该船的得要而使用这些器核为限…”，但船舶上的酒水吧台不是以专为该船的雷要而使用，因此构成役权，C选项错误。D选项，《巴黎公约》第10条之二规定：“（1）本联回国家有义务对各该国国民保证给子制止不正当竞争的有效保护。（2）凡在工商业事务中违反诚实的习惯做法的竞争行为构成不正当竞争的行为”，因此D选项正确。（新编）", chapter: "第五章 展会知识产权保护"},
  {id: 766, topic: "专题八 其他相关法律", type: "single", question: "根据展会知识产权保护办法的规定，下列哪些情形下，地方知识产权局对展品侵犯专利权的投诉或者处理请求不予受理？", options: {"A": "投诉人或者请求人已经向人民法院提起专利侵权诉讼的", "B": "专利权正处于无效宣告请求程序之中的", "C": "专利权存在权属纠纷，正处于人民法院的审理程序之2026年事利代理纤告格考校中的", "D": "专利权已经终止，专利权人正在办理权利恢复的"}, answer: "D", explanation: "。A选项，《马拉喀什条约>第2条（一）规定：“作品是指文学和艺术作品，形式为文字、符号和（或）相关图示，不论是已出版的作品，还是以其他方式通过任何媒介公开提供的作品”，因此A选项错误。B选项，香港特别行政区适用《马拉喀什条约），但不适用于澳门特别行政区，因此B选项错误。C选项，（马拉喀什条约》于2013年6月27日在马拉喀什签署，于2016年9月30日生效，并于2022年5月5日对中国生效，因此C选项错误。D选项，（马拉喀什条约》第14条规定：“与本条约有关的行政工作应由世界知识产权组织国际局股行\"，因此D选项正确。（新编）", chapter: "第五章 展会知识产权保护"},
  {id: 767, topic: "专题八 其他相关法律", type: "multiple", question: "根据展会知识产权保护办法的规定，有下列哪些情形的、地方知识产权行政管理部门对侵犯商标权的投诉或者处理请求不予受理？", options: {"A": "而标权已经被撤销的", "B": "商标权已经无效的", "C": "投诉人或者请求人已经向人民法院提起商标侵权诉讼的", "D": "商标权存在权属纠纷，正处于人民法院的审理程序之中的"}, answer: "BCD", explanation: "。A、B、C选项，（与贝易有关的加识产权协定》第1条第1款规定：“各成员应当实地本协定的规定。各成员可以，但没有义务，在其法律中规定比本协定的妥求更为广泛的保护，只要此种保护不造反本协定的现定。各成贝有权在其各自的法体制度和实段中确定实您本协定规定的造当方法”，A选项借误，B、C选项正确。D途项，（与贸易有关的知识产权协定》第1条第3款规定：”各成员应当将该协定规定的待遇给予其他成员的国民”，D选项正确。（2009）", chapter: "第五章 展会知识产权保护"},
  {id: 768, topic: "专题八 其他相关法律", type: "single", question: "根据对外贸易法的规定，下列哪项说法是正确的？数国", options: {"A": "进出口属于自由进出口的技术，无需办理任何合手续D", "B": "国务院对外贸易主管部门可以对自由进出口的技对术实行进出口自动许可方", "C": "进出口属于自由进出口的技术，应当办理合同备证案登记", "D": "进出口属于限制进出口的技术，应当经省级对外者贸易主管部门许可或"}, answer: "C", explanation: "。《与贸易有关的知识产权协定》第3条“国民待通”规定：”每一或贝给子其他成员国民的待通不应比其给子本国国民的待通较为不利”.C选项正确。（2016）", chapter: "第六章 对外贸易法"},
  {id: 769, topic: "专题八 其他相关法律", type: "single", question: "根据技术进出口管理条例的规定，下列说法哪些是正确的？理", options: {"A": "风于限制出口的技术，实行许可证管理；未经许项可，不得出口口", "B": "对于限制出口的技术，应当先签订技术出口合同，技然后再向外经贸主管部门申请技术出口许可意向书意", "C": "技术出口经许可的，由外经贸主管部门颁发技术出口许可证口国", "D": "对于限制出口的技术，技术出口合同自技术出口术许可证颁发之日起生效四"}, answer: "C", explanation: "。《与贸易有关的知识产权定》第4条“最意回侍遵”规定：“关干知识产权的保护，一成员对任何其他国家的国民投子的任何利益、优惠、特权或唇免，应当立即无条件地给于所有其他成员的国民”，C选项正确。（2015）", chapter: "第六章 对外贸易法"},
  {id: 770, topic: "专题八 其他相关法律", type: "multiple", question: "根据技术进出口管理条例及相关规定，对回务院外经贸主管部门作出的有关技术进出口的批准，许可、登记或者行政处罚决定不服的，下列哪些说法是正确的？", options: {"A": "提起诉讼前必须先复议（", "B": "不可复议，只可诉讼", "C": "可以向人民法院提起诉讼外", "D": "可以申请行政复议国"}, answer: "AD", explanation: "。《巴黎公约）没有规定最惠国侍遇原则和造明度原则，（已黎公约）与贸易有关的知识产权协定》均规定了国民侍通原则和防止滋用原则，A、D选项正确，B、C选项错误。（2019）", chapter: "第六章 对外贸易法"},
  {id: 771, topic: "专题八 其他相关法律", type: "multiple", question: "根据技术进出口管理条例及相关规定，技术进出口所指的转移技术的行为不包括：实", options: {"A": "专利实施许可", "B": "技术服务", "C": "技术秘密转让", "D": "技术合作开发"}, answer: "ABC", explanation: "。根据（与贸易有关的知识产权协议）第二部分的规定，知识产权范图包括版权与有关权利、商标、地理标志、工业品外观设计、专利、集成电路的布图设计和未公开信息的保护，A、B、C选项正确，D选项借误。（2006）", chapter: "第六章 对外贸易法"},
  {id: 772, topic: "专题八 其他相关法律", type: "multiple", question: "根据刑法及相关规定，下列说法哪些是见罪，应当负正确的？意杀人、数意", options: {"A": "已满12周岁不满18周岁的人犯罪，应当放火、爆炸、从轻或者减轻处罚岁不消14周", "B": "已满75周岁的人故意犯罪的，应当从轻以持别技忍或者减轻处罚民检察院", "C": "又聋又哑的人犯罪，可以从轻、减轻或者追究事责免除处罚因此A选项", "D": "精神病人在不能控制自己行为的时候造周岁的人故成危害结果，经法定程序鉴定确认的，不负刑事应当从轻交责任第19条规定或者免除处款规定：“精"}, answer: "BCD", explanation: "。A选项，（与易有关的知识产权协定》第9条第2款规定：“版权的保护应当及于表达，而不及于构思、程序、操作方法或者数学概念木身”，A选项佣误。B、C选项，（与贸具有关的知识产权协定）第10条第1款规定：“计算机程序，不论是以源代码还是以目标代码表达，应当根据《伯尔尼公约>（1971年）作为文字作品加以保护”，B、C选项正确。D选项，（与贸易有关的知识产权协定》第14条规定了对表演者、录音制品制作者和广播组织的保护，D选项正确。（2013）", chapter: "第七章 刑法"},
  {id: 773, topic: "专题八 其他相关法律", type: "single", question: "B。放、甲为摆脱乙、在疾驶时突然急刹车，导致乙着危害社会的地身亡。根据刑法及相关规定，甲对乙死亡的心犯罪的，是的理态度属于下列哪一选项？车，甲应该", options: {"A": "直接故意脱乙的检查", "B": "问接故意故任的主观", "C": "过于自信的过失确。（新编）", "D": "疏忽大意的过失"}, answer: "D", explanation: "。（与贸易有关的知识产权协定》第10条第2款规定：“数据或者其他资料的汇编，不论是用机器可读形式还是其他形式，由于对其内容的选择或者安排而构成智力创作，应当加以保护。这种保护不涉及数据或者资料本身，不应损害存在于数据或者资料本身的任何版权”，D选项正确，A、B、C选项错误。（2011）", chapter: "第七章 刑法"},
  {id: 774, topic: "专题八 其他相关法律", type: "multiple", question: "王某因婚外情产生杀害妻子张某的想的儿子中毒法。某日早晨，王某在给张某炸油条时投放了可了他不希望以致死的“毒鼠强”。王某为防止其5岁的儿子的间接故意吃油条中毒，将其子送到幼儿园，并啊咐其子等定：应当预他来接。不料，张某当日提前下班后，将其子接大意面没有回来一起吃油条。王某得知后，赶忙回到家中，种结果的，其妻、子已中毒身亡。根据刑法及相关规定，本能发生其子案中下列哪项说法是正确的？单选）免其子中毒", options: {"A": "王某对其妻、子的死亡具有直接故意心态应当认", "B": "王某对其子的死亡具有间接故意《刑法》第1是不是出于", "C": "王某对其子的死亡具有过失的原因所引", "D": "王某对其子的死亡属于意外事件于竞外事件"}, answer: "BCD", explanation: "。《与贸易有关的知识产权协定》第11条规定：“至少就计算机程序和电影作品而盲，一成员应给予作者及其合法继承人准许成禁止向公众商业性出租其有版权作品的原件或复制品的权利。一成员对电影作品可不承担此义务，除非此种出租已导致对该作品的广泛复制，从而实质性减报该成员投子作者及其合法继示人的专有复制权。就计算机程序而盲，如该程序本身不是出租的主要标的，则这一义务不适用于出租”；（与贸易有关的知识产权协定》第14条第4数规定：“第11条关于计算机程序的规定应当比原适用于录音制品制作者以及成员法体规定的录音制品的任何其他权利持有人。如果在1994年4月15日，成员在录音制品的出租方面已经实施对权利持有人给于", chapter: "第七章 刑法"},
  {id: 775, topic: "专题八 其他相关法律", type: "single", question: "根据刑法及相关规定，下列哪种行为构人许可，在成侵犯知识产权罪？标，情节严", options: {"A": "未经注册商标所有人许可，在同一种商节特别严重品上使用与其注册商标近似的商标，情节严重的选项中为近", "B": "以营利为目的，出版他人享有专有出版《刑法》第2权的图书，违法所得数额巨大的者与若作", "C": "D选项不", "D": "未经植物新品种权人许可，以商业目的有出般权的销售授权品种的繁殖材料，违法所得数额较大的"}, answer: "D", explanation: "。（与贝导有关的知识产仅协定>第I5条第1款规定：“任何标记或标记的组合，他将一企业的商品或质务与其他企业的商品成服务区别开来的，就能构成前标。这类标记，光其是文字（包括人名）、字册、数字、图形赛兼和色彩的组合，以及这类标记的任何组合，均造合于作力商标平以注册，如渠标记缺乏区别有美商品成服务的固有能力，各成员可以将该标记可否注册取决于使用后所获得的显著性。名成员可以要求你说觉可以鸣与的标记作为注册的条件”，D选项正确，A、B、C选项说法过干绝对。（2011）", chapter: "第七章 刑法"},
  {id: 776, topic: "专题八 其他相关法律", type: "multiple", question: "根据刑法及相关规定，下列关于假冒注规定，商品册商标罪、销售假冒注册商标的商品罪的说法正售渠道等力确的有？多选）商品的，应", options: {"A": "只要商品名称不同，则不属于“在同一种服务”。因商品、服务上使用与其注册商标相同的商标”解释>第2", "B": "在注册商标上仅增加商品型号，并未增号等缺乏显加注册商标的显著性特征，仍属于“在同一种商当认定为售标”。因北品、服务上使用与其注册商标相同的商标”释>第8条", "C": "实施假冒注册商标犯罪，又销售该假冒犯罪，又销注册商标的商品，构成犯罪的，应当实行数罪冒注册商并罚标哪定哪久", "D": "无正当理由以明显低于市场价格销售假的规定.销冒注册商标的商品，属于销售假冒注册商标的商场价格进负品罪中规定的“明知”品罪中规定"}, answer: "BC", explanation: "。A、B选项，《与贸易有关的如识产权协定》第15条第3款规定：“各战员可以将可否注府取决干使用。然百，不应将前标的实际使用作力提交注开中请的条件”，A途项错误，B途项正确。C、D途项，（与马有关的知识产权协定》第19条第1款现定：“如果使用是堆持注册的必要条件，只有在至少连续3年不使用以后，才可以取消其注册·…·.”，C选项正确，D选项借误：（2016）", chapter: "第七章 刑法"},
  {id: 777, topic: "专题八 其他相关法律", type: "single", question: "根据《促进科技成果转化法》相关规定，以下关于职务科技成果收益分配的说法，正确的是：", options: {"A": "国家设立的研究开发机构、高等院校转化科技成果所获得的收人需上交一部分至上级主管部门", "B": "职务科技成果转化后，由科技成果完成单位对所有参与人员给予奖励和报酬", "C": "科技成果完成单位制定奖励和报酬相关规定时，无需听取本单位科技人员意见", "D": "若国家设立的研究开发机构将某项职务科技成果作价投资，且未规定奖励报酬方式和数额，应从该项科技成果形成的股份或者出资比例中提取不低于50%的比例给予完成、转化该项成果的重要贡献人员"}, answer: "A", explanation: "。（与贸易有关的知识产权协议》第18条规定：“商标的首次注示和每次块展保护期限不少干7年”，A选项正，B、C、D选项错误。（2006）", chapter: "第八章 促进科技成果转化法"},
  {id: 778, topic: "专题八 其他相关法律", type: "single", question: "根据《促进科技成果转化法》相关规定、下列不属于科技成果持有者可采用的科技成果转化方式的是：", options: {"A": "将科技成果捐赠给公益组织", "B": "以科技成果作价投资，折算股份", "C": "许可他人使用该科技成果", "D": "自行投资实施科技成果转化"}, answer: "B", explanation: "。A选项，（与贸乌有关的知识产权协定》第17条规定：“各成员可以对商标所设干的权利规定有限的例外，诸如说明性词语的合理使用…….”，A选项错误。B选项，（与贸易有关的知识产权协定》第16条第1款规定：“注册商标所有人应当享有排他权…但上述权利不应担害任何现有的在先权利，也不应当影响各成员根据使用投于权利的可能性”，B选项正确。C、D选项，（与贝易有关的如识产权协定）第21条规定：“各成员可以规定商标的许可和转让的条件：这应理解为，商标的强制许可是不允许的，并且注册商标所有人有权将商标连同成不连同其所属的企业一起转让”，C、D选项错误。（2013）", chapter: "第八章 促进科技成果转化法"},
  {id: 779, topic: "专题八 其他相关法律", type: "multiple", question: "根据《科学技术进步法》的金设立的科学技术计规定，利用财政性资金设立的科学的知识产权向境外的技术计划项目所形成的专利，下列实施的，应当经项目管说法正确的是？依照其规定。”因此A选", options: {"A": "形成的专利应当首先在境用财政性资金设立的内使用全、国家利益和重大社", "B": "形成的专利实施转化前，知识产权，项目承担者应当经项目管理机构批准同实施转化、许可他人", "C": "D选项正确（新编）", "D": "形成的专利归项目承担者也可以许可他人有偿数规定的知识产权，为所有家可以无偿实施，也可"}, answer: "ABCD", explanation: "。A、B选项，（与贝易有关的如识产权协定》第22条第2款规定：“就地理标志而盲，各成员应向利害关系方提供法律手及以防止：（一）在商品的名称成外表上使用任何手及标明成暗示所涉货物来源于真实原产地之外的一地理区坡，从而在该货物的地理来源方面使公众产生误解……”.A、B选项正确。C、D选项，（与贸易有关的知识产权协定》第23条第1款规定：“每一成员应为利害关系方提供法律手段，以防止将识别葡萄酒的地理标识用于并非来源于所涉地理标识所标明地方的葡萄酒，或防止将识别烈酒的地理标识用于并非来源于所涉地理标识所标明地方的烈酒，即使对货物的真实原产地已标明……….，C、D选项正确。（2007）", chapter: "第九章 科学技术进步法"},
  {id: 780, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "下列哪些居（巴禁公约》规定的工业产权", options: {"A": "专利权", "B": "商标权", "C": "版权", "D": "植物新品种权"}, answer: "ABCD", explanation: "。（与贸易有关的知识产权协定）第24条第5款规定：“如果（a）在某一成员按第六部分规定适用这些规定以前，或者（b）在地理标志在其米源国获得保护以前，某一商标已经善意地提出申请或者获得注册，或者商标权利已经通过善意使用而获得，则为实施本节规定而采取的措施不应因该商标与某一地理标志相间或类似，而损害商标的注册资格或商标注册的有效性，或者损害使用该商标的权利”。A、B选项属于该条（a）项规定的情形，C、D选项属于该条（b）项规定的情形，A、B、C、D选项均正确。（2009）"},
  {id: 781, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "根据（巴黎公约》的规定，下列哪项不属于工业产权的保护对象？", options: {"A": "外观设计", "B": "原产地名称", "C": "货源标记", "D": "集成电路布图设计"}, answer: "ABCD", explanation: "。A、B、C选项，（与贸易有关的知识产权协定》第25条第1款规定：“各成员应当规定保护独立创作而且是新颖的或者原创的工业品外观设计。各成员可以规定，外观设计如果与已知的外观设计或者已"},
  {id: 782, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "《巴黎公约》规定，本联盟任何国家的国民，在保护工业产权方面，在本联盟所有其他国家内应享有各该国法律现在授予或今后可能授予国民的各种利益；一切都不应损害本公约特别规定的权利。因此，他们应和国民享有同样的保护，对侵犯他们的权利享有同样的法律上的救济手段，但是他们遵守对国民规定的条件和手续为限。上述规定可以概括为什么原则？", options: {"A": "对等原则", "B": "差别待遇原则", "C": "最惠国待遇原则", "D": "国民待遇原则"}, answer: "ABD", explanation: "。《与贸易有关的知识产权协定>第26条第1款规定：“受保护的工业品外现设计所有人，应有权到止第三方未径许可百为前业目的制造、销售或进口零有戏体现有变保护设计的复制品成实质性复制品之物品”.A、B、D选项正项.C选项借误。（2015）"},
  {id: 783, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "甲国、乙国为《巴黎公约》的成员国，丙国为非成员国。根据该公约的规定，下列哪些说法是正确的？", options: {"A": "在甲国有住所的丙国公民在乙国可以享有国民待遇", "B": "在乙国没有住所的甲国公民在乙国可以享有国民待巡", "C": "在丙国有住所的乙国公民在甲国可以享有国民待遇", "D": "在丙国有住所的甲国公民在乙国可以享有国民待遇"}, answer: "BD", explanation: "。A选项，（与贸易有关的知识产权协定》第33条规定：“可获得的保护期限不得在自中请之日起计算的20年期满前结束”，即保护期应当不少于20年，A选项错误。B选项，（与贸易有关的知识产权协定）第27条2规定：“各成员可拒绝对某些发明投于专利权，如在其领土内阻止对这些发明的商业利用是维护公共铁序或道售，包括保护人类、动物或植物的生会或健康或避免对环境造成产重损害所必诺的，只宴此柠拒绝投予井非仅因为此种利用为其法体所禁止”，B选项正确。C选项，（与贸马有关的知识产权协定》第32条规定：“任何有关撤销成宜布一专利无效的决定应可进行司法审查”，C选项错误。D选项，（与贸易有关的知识产权协定》第29条2规定：“各成员可要求专利申请人提供关于中请人相应的国外中请和投予情况的信息”，D选项正确。（2019）"},
  {id: 784, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "根据《巴黎公约》的规定，在工业产权保护方面、下列哪些人可在该公约成员国之一的美国享有国民待遇？", options: {"A": "在美国有住所的中国公民", "B": "在美国没有住所的中国公民", "C": "在美国有营业所的中国企业", "D": "在美国没有营业所的中国企业"}, answer: "ABC", explanation: "。A选项，根据<与贸易有关的知识产权协定》第27条第2款的规定，各成员可以拒绝某些发明投予专利，以这种拒绝并非仅仅因为法律禁止实地为限，人选项正确。日选项，（与贸昌有关的知识产权协定）第29条规定：“1.各成员应当要求专利中请人以足清楚和完整的方式公开发明，使熟恶有关技术的人他实施该发明”，B选项正确。D选项，国外专利的审查情况仅作为投权的参者、不会直接决定是否投权，D选项错误。C选项，（与贸昌有关的知识产权协定》第30条规定：“各成员可以对专利所投于的推他权规定有限的例外，但是，在顾及第三方合法利益的情况下，这些例外以并未与专利的正常利用不合理地相冲突，而且也并未不合理地损害专利所有人的合法利益为限”，C选项正确。（2018）"},
  {id: 785, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "根据《巴黎公约》，巴黎联盟成员国的法律可对下列哪些事项作出国民待遇原则的例外规定？", options: {"A": "司法和行政程序管辖权", "B": "指定送达地址", "C": "委派代理人", "D": "权利受侵犯时法律上的救济手段"}, answer: "ABCD", explanation: "。A选项，（与贸易有关的知识产权协定）第27条第1款规定：“专利的获得和专利权的享有，不应因发明地点、技术领城以及产品是进口还是本国生产的不同而受到歧视”，A选项正确。B选项，（与贸易有关的知识产权协定>第27条第3款规定：“各成员可将医治人或动物的诊断、治疗和手术方法排除在可享专利性以外”，B选项正确。C选项，（与贸易有关的知识产权协定》第33条规定：“权利可享有的保护期间，自专利申请提交之日起计算的20年期间届满前不应终止”，C选项正确。D选项，（与贸易有关的知识产权协定》第32条规定：“对撒销或取消专利的任何决定，均应提供司法审查的机会”，D选项正确。（2012）"},
  {id: 786, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "根据《巴黎公约》的规定，下列哪些说法是正确的？", options: {"A": "就同一发明在优先权期限内向不同成员国申请并取得的专利，在某一成员国被无效的，在其他成员国亦被当然无效", "B": "成员国的国民在某一成员国取得的专利，与在其他成员国或者非成员国就同一发明取得的专利各不相关", "C": "在同一成员国因享有优先权而取得的专利与不享专有优先权而取得的专利的有效期间相同", "D": "成员国不得以专利产品的销售受到国内法的限制为由而使专利无效"}, answer: "AD", explanation: "。（与贸易有关的知识产权协定》第31条规定：“如果成员的法律允许，未经权利持有人许可即可对专利的主题作其他的使用，包括政府使用成经政府许可的第三方使用，则应当尊重下列规定：（a）这种使用的许可应当根据个案情况于以考虑：（b）这种使用应尽快通知权利持有人……（d）这种使用应当是非独占性的（e）这种使用不得转让，但与享有这种使用的企业或者"},
  {id: 787, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "王某就同一项发明先后在中国和美国提出了专利申请，其美国申请以在中国的申请为基础要求了优先权，根据《巴黎公约》的规定，下列说法哪项是正确的？", options: {"A": "如果王某在中国的专利申请被驳回，则其在美国的专利申请同样应当被驳回", "B": "如果王某在中国的专利申请被授予专利权，则其在美国的专利申请同样应当被授子专利权", "C": "对于王某在美国的专利申请，应当按照美国的法律规定来确定能否授予专利权", "D": "对于王某在美国的专利申请，应当按照与中国相同的审查标准来确定能否授予专利权"}, answer: "CD", explanation: "。A选项，根据<与贸易有关的知识产权定>第31条的规定，这种使用不得转让，但与享有这待使用的企业或者商誉一起转让的不在此限，A选项借误。B选项，这种使用只有在使用前，意图使用的人曾经务力按合理的前业条款和条件请求权利持有人给子许可，但在合理的期问内这种务力没有成功的，才能允许。但在回家处干紧忽状态成有其他极培紧急的情形，或者在公共的非商业性使用的情形，成员可以放这一曼求，B选项借误。C选项，这种使用在半导体技术的情形下，只能限于为公共的非商业性使用，或者用于经可法或行政程序确定为反竞争行为面给予的补教，C选项正确。D选项，在对被许可人的合法利益给子足够保护的前提下，如果以及在导致这种许可的情况已不存在，井且不大可能再发生时，这种使用的许可应即终止，D选项正确。（2010）"},
  {id: 788, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "根据《巴黎公约》的规定，成员国国民就其在本国提出的下列哪些工业产权的首次申请，又在其他成员国提出申请的，可以享有优先权？", options: {"A": "专利", "B": "工业品外观设计", "C": "原产地名称", "D": "实用新型"}, answer: "BC", explanation: "。《与贸易有关的知识产权定）第27条第3款（b）规定：….…各成员应当规定依专利或依有效的特别制度，或依二者的结合，保护植物的品种…”，A、D选项措误，B、C选项正确。（2019）"},
  {id: 789, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "根据《巴黎公约》的规定，下列关于优先权的说法哪些是正确的？多选）", options: {"A": "作为产生优先权的基础的首次申请可以是与正规的国家申请相当的任何申请", "B": "要求优先权的，应当在各成员国规定的期限内提出要求优先权的声明", "C": "根据实用新型申请的优先权而在另一成员国提出外观设计申请的，优先权的期间应当为12个月", "D": "成员国可以准许根据实用新型申请的优先权提出专利申请"}, answer: "BCD", explanation: "。（与贸易有关的知识产权协定》第38条规定：“1.在以登记作为保护条件的成员中，布图设计的保护期问自登记申请提交之日算起，或者自其在世界上任何地方第一次商业利用算起10年期同届满前不应终止。2.在不以登记作为保护条件的成员中，布图设计的保护期问自其在世界上任何地方第一次商业利用之日算起不少干10年。3.尽管有本条第1款和第2款，成员可以规定，布图设计自创作以后15年，保护应当终止”，A选项错误，B、C、D选项正确。（2011）"},
  {id: 790, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "王某在中国提出了一件实用新型专利申请、并在自申请日起的第九个月时就相同主题在《巴黎公约》的其他几个成员国分别提出了专利、实用新型和外观设计申请。根据（巴黎公约》的规定，下列说法哪些是正确的？", options: {"A": "王某在其他成员国提出的专利申请，能够以在中国提出的实用新型专利申请为基础享有优先权", "B": "王某在其他成员国提出的实用新型申请，能够以在中国提出的实用新型专利申请为基础享有优先权", "C": "王某在其他成员国提出的外观设计申请，能够以在中国提出的实用新型专利申请为基础享有优先权", "D": "如果王某在中国的实用新型专利申请被驳回，则其在其他成员国的申请均不能以该实用新型专利申请为基础享有优先权"}, answer: "AD", explanation: "）。A选项，（与页易有关的知识产权协定》第31条规定了专利的“未经权利特有人投权的其他使用”，即规定了对专利权的强制许可，人选项正确。D选项，根据（与贸昌有关的知识产权协定）第21条的规定，商标的强制许可是不允许的，日选项错误。C选项，（与页易有关的如识产权协定）未规定工业品外观设计的强制许可成非白愿许可，C选项钳误。D选项，《与贸岛有关的知识产权协定）第37条第2欺规定：“布图设计通有任何非自愿许可，或未经权利持有人许可面由政府成为政府而使用时，应当比风适用第31条（a）项至（k）所列规定的条件”，D选项正确。（2012）"},
  {id: 791, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "根据（巴黎公约》的规定，下列说法哪些是正确的？", options: {"A": "优先权的期间应自第一次提出申请之日起算，申请日不计算在期间之内", "B": "如果优先权期间的最后一日在请求保护地国家是法定假日，该期间应延至其后的第一个工作日", "C": "国际展览会的临时保护不应延展优先权的期间", "D": "国际展览会的临时保护适用于发明、实用新型、工业品外观设计但不适用于商标"}, answer: "ACD", explanation: "。（与贸易有关的知识产权协定》第39条第2款规定：“自然人和法人应有可能制止他人未得其同意，以违反诚实的商业做法的方式，将其合法控制下的信息向他人公开，或者获得或使用此种信息，只要这种信息符合下列条件：（1）符合这样意义的秘密，即该信息的整体或其部分的确切排列和组合，并不是通常从事有关这类信息的人所普遍了解或容易获得的：（2）由于是保密信息面具有商业上的价值：和（3）合法控制该信息的人已经根据情况采取了合理措施予以保密”，A、C、D选项正确。商业科密没有登记备案要求，B选项错误。（2018）"},
  {id: 792, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "根据《巴黎公约》的规定，下列哪些说法的？", options: {"A": "要求优先权的，应当在各成员国出要求优先权的声明", "B": "成员国可以要求作出优前提出的申请的副本专", "C": "作为产生优先权的基础的首次申请可以是与正规的国家申请相当的任何申请", "D": "成员国可以准许根据实用新型申请的优先权提出工业品外观设计申请"}, answer: "ABC", explanation: "。（与贸易有关的知识产权协定》第40条第2款规定：“本协定的任何规定均不得阻止各成员在其立法中明确规定，在特定情况下可构成对知识产权的滋用例如，排他性返投条件、制止对知识产权有效任提出质疑的条件以及强制性一揽子投权许可”，A、B、C选项正确，D选项错误。（2019）"},
  {id: 793, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "根据《巴黎公约》关于专利的规定，下列哪些说法是正确的？", options: {"A": "成员国可以以专利产品的销售受到本国法律禁止为由拒绝授予专利权", "B": "发明人有在专利中被记载为发明人的权利", "C": "成员国可以将在商品上载明专利作为收得保护的条件", "D": "一成员国国民向各成员国申请的专利，与在其他国家就同一发明所取得的专利是相互独立的"}, answer: "BCD", explanation: "。A选项属于刑事措施，B、C、D选项为民事措施。（2006）"},
  {id: 794, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "根据《巴黎公约》的规定，关于专利的强制许可下列说法哪些是正确的？", options: {"A": "成员国不得以不实施专利为由颁发强制许可", "B": "强制许可是非独占性的", "C": "强制许可在任何情况下都不可转让", "D": "强制许可的被许可人应当向专利权人支付使用费"}, answer: "AB", explanation: "。根据（与贸易有关的知识产权协定）第61条的规定，各成员应规定至少将"},
  {id: 795, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "根据《巴黎公约》的规定，下列哪些说法是正确的？多选）", options: {"A": "使用商标的商品的性质在任何情况下不应妨碍该商标的注册", "B": "自提出实用新型申请之日起4年届满以前，或者自投于实用新型之日起3年届满以前、以后届满的期间为准，不得以不实施为理由申请强制许可", "C": "对外观设计的保护，在任何情况下、都不得以不实施为理由而使其丧失", "D": "缴纳规定的工业产权维持费的宽限期不得少于6个月"}, answer: "ABCD", explanation: "。A选项，根据<与贸易有关的知识产权协定>第50条第2款的规定，可法机关应当有权在造当情况下，尤其是在任何退延可能对权利持有人造成不可弥补惯害的情况下，不作预先通知首即采取临时措选，A选项正确。B选项，概据<与贸身有关的知识产权协定>第50条第3效的规定，可法机关应当有权要求中请人提供可以合理地获得的任何证据，并有权要求中请人提供足以保护被告和防止滥用此种措施的保证金成相当的担保，B选项正确。C选项，根据《与贸易有关的知识产权协定》第50条第S数的规定，执行临时措选的主管机关可要求中请人提供确认有关货物的其他必婴信息，C选项正确。D选项，根据（与贸易有关的知识产权协定>第50条第7款的规定，如果造时措施被撒销，则司法机关根据被告的请求，应当有权命今申请人向由于这些措施面受到损害的被告提供适当的补偿，D选项正确。（2007）"},
  {id: 796, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "multiple", question: "根据《巴黎公约》的规定，下列哪些说法是正确的？", options: {"A": "缴纳规定的工业产权维持费的宽限期不得少于6个月", "B": "各成员国之间可签订关于保护工业产权的专门协定，其中与《巴黎公约》的规定相抵触的，则各成员国之间应遵照该专门协定的规定", "C": "美国的船舶暂时进人中国海域过境时，其船舶上配置的酒水吧台与中国某吧台的专利产品相同，该船舶上的吧台不视为侵犯专利权", "D": "在工商业事务中违反诚实的习惯做法的竞争行为构成不正当竞争的行为，各成员国应予以制止"}, answer: "ABCD", explanation: "。A、B选项，根据（与贸易有关的知识产权协定）第50条第1款规定，司法机关应当有权命令采取迅速和有效的临时措施以便：（a）制止任何侵犯知识产权行为的发生：（b）保存被指控设权的有关证据，A、B选项正确。C选项，根据（与贸易有关的知识产权协定》第50条第2款的规定，在适当时，特别是在任何迟延可能对权利持有人造成不可补救的报害时，或存在证据被销毁的显而易见的风险时，司法机关有权采取不作预先通知的临时措施，C选项正确。D选项，根据（与员易有关的知识产权协定》第50条第3款的规定，司法机关应当有权要求申请人提供足以保护被告和防止滋用此种措施的保证金或相当的担保，D选项正确。（2018）"},
  {id: 797, topic: "专题九 保护工业产权巴黎公约与马拉喀什条约", type: "single", question: "根据马拉喀什条约及相关规定，下列说法哪个是正确的？", options: {"A": "该条约中的“作品”仅指已出版的作品", "B": "该条约适用于中华人民共和国澳门特别行政区", "C": "该条约于2016年9月30日在中华人民共和国生效", "D": "与该条约有关的行政工作由世界知识产权组织国际局履行"}, answer: "C", explanation: "。（与贸易有关的知识产权协定）第51条规定：“各成员应当遵照规定制订程序，以便权利持有人在有确实根据的理由怀疑假冒商标货物成盗版货物可能进口时，能向行政成可法主管机关提出书面中请，要求海关当局对这种货物中止放行，以免进入白由流通”，（与贸岛有关的如识产权协定）第S8条规定：允许各成贝县求主管机关在获得初步证据证明知识产权正受到有关货物的侵犯时主动采取行动，中止该货物的放行”，A、B、D选项错误，C选项正确。（2012）"},
  {id: 798, topic: "专题十 与贸易有关的知识产权协定", type: "multiple", question: "根据《与贸易有关的知识产权协定》.下列说法哪些是正确的？多选）", options: {"A": "世界贸易组织成员应当实施该协定的规定，不得在其法律中规定比该协定的要求更为广泛的保护", "B": "世界贸易组织成员没有义务在其法律中规定比该协定的要求更为广泛的保护", "C": "世界贸易组织成员有自由在其法律制度和实践中确定实施该协定规定的适当方法", "D": "世界贸易组织成员应当将该协定规定的待迎给予其他成员的国民"}, answer: "ABC", explanation: "。A选项，根据《与贸易有关的知识产权协定>第41条第2款的规定，知识产权的执法程序应公平合理。它们不得过于复杂或花费过高成包合不合理的时效成无保障的拖延，A选项正确。B选项，根据（与贸易有关的知识产权协定）第41条第3款的规定，就各案的是非作出的判决，最好采取书面形式，并应说明判决的理由，B选项正确。C选项，根据（与贸易有关的知识产权协定>第41条第4数的规定，对于行政的终局决定，诉讼当事人应有机会提交司法当局复审，C选项正确。D选项，根据（与贸易有关的知识产权协定》第41条第5款的规定，本部分之规定被认为并不产生下列义务：为知识产权执法，而代之以不同于一般法律的执行的司法制度，D选项错误。（2015）"},
  {id: 799, topic: "专题十 与贸易有关的知识产权协定", type: "multiple", question: "根据《与贸易有关的知识产权协定》的规定，在知识产权保护方面，除该协定规定的特殊情形之外，每一成员给予其他成员国民的待遇不应比其给予本国国民的待遇较为不利。上述规定可以概括为什么原则？", options: {"A": "对等原则", "B": "差别待遇原则", "C": "国民待巡原则", "D": "最惠国待巡原则"}, answer: "ABC", explanation: "。根据《与贸易有关的知识产权协定》第63条第1款的规定，任何成员已经生效的与该协定内容（即知识产权的备有、范围、获得、执法和防止滥用）有关的法律和规章，以及普遍适用的终局司法判决和终局行政决定，均应以本国语盲公布，如果公布实际上不可行，则应以本国语盲向公众提供，以便各成员政府和权利持有人能够知。任何成员的政府或政府机构和另一成员的政府或政府机构之间有关该协定内容的有"},
  {id: 800, topic: "专题十 与贸易有关的知识产权协定", type: "multiple", question: "根据《与贸易有关的知识产权协定》的规定，关于知识产权的保护，一成员对任何其他国家的国民授予的任何利益、优惠、特权或豁免，除该协定规定的特殊情形之外应当立即无条件地给予所有其他成员的国民。上述规定可以概括为什么原则？", options: {"A": "对等原则", "B": "差别待逃原则", "C": "最惠国待巡原则", "D": "国民待巡原则"}, answer: "ABD", explanation: "。A、B、D选项，概据<与贸易有关的知识产权协定>第63条第4款的规定，不要求各成员公开会妨研法体执行成违反公共利益的机密信息，或者损害特定的公有成私有企业的合法商业利益的机密信息，A、B、D选项正确。C选项，根据《与贝易有关的知识产权协定>第63条第1款的规定，任何成员已经生效的与本协定内容有关的法律和规章，均应以本国语言公布，C选项错误。（2009）"},
  {id: 801, topic: "专题十 与贸易有关的知识产权协定", type: "multiple", question: "下列关于《巴黎公约》和《与贸易有关的知识产权协定》的说法正确的是？多选）", options: {"A": "两者都规定了国民待遇原则", "B": "两者都规定了最惠国待巡原则", "C": "两者都规定了透明度原则", "D": "两者都规定了防止权利滥用的原则"}, answer: "BCD", explanation: "。A选项，（与贸易有关的知识产权协定>由与贸易有关的知识产权理事会管理，A选项借误。B、C选项，（与贸易有关的知识产权协定》第3条、第4条分别规定了国民待通原则和最国待通原则，B、C选项正确。D选项，根据（与贸易有关的知识产权协定>第8条第2款的规定，为了防止权利持有人避用知识产权，或者采用不合理边限例贸易成不利于国际技术转让的做法，可以采取适当措施，但这些措施是以符合本协定规定为限，D选项正确。（2010，思维扩展）"},
  {id: 802, topic: "专题十 与贸易有关的知识产权协定", type: "single", question: "下列哪些属于《与贸易有关的知识产权协议》规定的知识产权的范围？多选）", options: {"A": "版权", "B": "工业品外观设计", "C": "地理标志", "D": "实用新型"}, answer: "A", explanation: "。A选项，《与贸易有关的知识产权协定>第16条第2款对用于服务的驰名商标明确提出了保护要求，A选项正确。B选项，《巴黎公约》第6条之二规定了对驰名商标的保护，但是在巴黎公约中的商标指商品商标，不包拾股务类商标，B选项错误。C、D选项，《洛迎诺协定》及《市达俱斯条约》均不涉及商标保护，C、D选项错误。（2011，思维扩展）"},
  {id: 803, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》，下列哪些应当受版权或者和版权有关的权利的保护？", options: {"A": "数学概念本身", "B": "以源代码表达的计算机程序", "C": "以目标代码表达的计算程序", "D": "录音制品"}, answer: "", explanation: ""},
  {id: 804, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，数据库满足下列哪项条件的，成员应当给予著作权保护？", options: {"A": "该数据库的开发投入了相当的资金", "B": "该数据库包含相当数量的数据", "C": "该数据库的开发投人了相当的资金并且包含有相当数量的数据", "D": "对该数据库内容的选择或者安排构成智力创作"}, answer: "", explanation: ""},
  {id: 805, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》中关于出租权的规定，下列哪些说法是正确的？多选）", options: {"A": "成员有义务对以类似摄制电影的方法创作的作品提供出租权保护", "B": "录音制品本身是商业性出租的主要客体的，成员有义务对其提供出租权保护", "C": "计算机程序本身是商业性出租的主要客体的，成员有义务对其提供出租权保护", "D": "在电影作品的商业性出租已导致对作品的广泛复制，大大损害了权利人的复制排他权时，成员有义务对其提供出租权的保护"}, answer: "", explanation: ""},
  {id: 806, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，下列关于商标的说法哪项是正确的？", options: {"A": "任何标记或者标记的组合都可以构成商标", "B": "只有视觉可以感知的标记或者此类标记的组合才可以构成商标", "C": "只有数字或者文字以及这类标记的组合才可以构成商标", "D": "只要是能将一企业的商品或服务与其他企业的商品或服务区别开来的标记或者标记的组合都可以构成商标"}, answer: "", explanation: ""},
  {id: 807, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，下列哪些说法是正确的？多选）", options: {"A": "各成员可以将商标的实际使用作为提交商标注册申请的条件", "B": "各成员不应将商标的实际使用作为提交商标注册申请的条件", "C": "各成员可以规定使用是维持商标注册的必要条件", "D": "各成员不应规定使用是维持商标注册的必要条件"}, answer: "", explanation: ""},
  {id: 808, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协议》的规定，下列说法哪项是正确的？2026年心利代理师资格考认", options: {"A": "商标的首次注册期限至少为7年", "B": "商标的首次注册期限至多为10年", "C": "注册商标的续展期限每次至少为10年", "D": "注册商标的续展期限每次至多为20年"}, answer: "", explanation: ""},
  {id: 809, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》、下列哪种说法是正确的？", options: {"A": "世界贸易组织成员不得对注册商标所有人享有的权利规定任何例外", "B": "世界贸易组织成员授于注册商标所有人享有的排他权不应损害任何现有的在先权利", "C": "世界贸易组织成员必要时可以规定商标的强制许可", "D": "世界贸易组织成员可以规定商标所有人只能将商标连同其所属的企业一起转让"}, answer: "", explanation: ""},
  {id: 810, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》关于地理标志的规定，各成员应当为有利害关系的各方提供制止下列哪些行为的法律手段？多选）", options: {"A": "在商品的名称上使用任何方法，以明示有关商品来源于真实原产地以外的一个地理区域，在某种意义上对商品的地理来源误导公众", "B": "在商品的外表上使用任何方法，以暗示有关商品来源于真实原产地以外的一个地理区域，在某种意义上对商品的地理来源误导公众", "C": "将识别葡萄酒的地理标志用于标示不是来源于该地理标志所指明地方的葡萄酒", "D": "将识别烈酒的地理标志用于标示不是来源于该地理标志所指明地方的烈酒，但同时标示了商品的真实来源地"}, answer: "", explanation: ""},
  {id: 811, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》有关地理标志保护的规定，如果某一商标和一项地理标志相同，下列哪些情形下，世界贸易组织成员不应因两者相同而驳回该商标注册申请或者撤销该商标？多选）", options: {"A": "《与贸易有关的知识产权协定》关于地理标志的规定在该成员适用之前，某人已经在该成员普意地提出该商标的注册申请", "B": "《与贸易有关的知识产权协定》关于地理标志的规定在该成员适用之前，某人已经在该成员通过善意使用获得该商标权", "C": "在该地理标志的来源国对其给予保护之前，某人已经在该成员善意地提出该商标的注册申请", "D": "在该地理标志的来源国对其给予保护之前，某人已经在该成员通过善意使用获得该商标权"}, answer: "", explanation: ""},
  {id: 812, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，下列关于工业品外观设计的哪些说法是正确的？多选）", options: {"A": "各成员应当规定保护独立创作而且是新额的或者原创的工业品外观设计", "B": "各成员可以规定，外观设计如果与已知的外观设计或者者原创的外观设计", "C": "各成员可以规定，工业品外观设计的保护不应延及主要是根据技术或功能的考虑而作出的外观设计", "D": "受保护的工业品外观设计的所有人，应当有权制止第三方未得所有人同意而为商业目的制造、销售或进口载有或体现受保护的外观设计的复制品或实质上是复制品的物品"}, answer: "", explanation: ""},
  {id: 813, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，受保护的工业品外观设计的所有人，对于载有或体现受保护的外观设计的复制品或者实质上是复制品的物品，应当有权制止第三方未经其同意而为商业目的进行下列哪些行为？多选）", options: {"A": "制造", "B": "进口", "C": "许诺销售", "D": "销售2020年4利代理师资格考试"}, answer: "", explanation: ""},
  {id: 814, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据（与贸易有关的知识产权协定》的规定，下列说法正确的是？多选）", options: {"A": "专利权的保护期限为自授予专利权之日起20年", "B": "如果一项发明的商业性实施会导致对环境的严重损害、各成员可以不授予专利权", "C": "各成员因未缴纳专利年费而撤销专利的决定可以不提供司法审查的机会", "D": "各成员可以要求专利申请人提供关于其相应的外国申请和授予专利的信息"}, answer: "", explanation: ""},
  {id: 815, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，关于专利的规定哪些是正确的：", options: {"A": "各成员可拒绝对某些发明授予专利，只要此种拒绝授予并非仅因为此种利用方式为其法律所禁止", "B": "各成员应要求专利申请人以足够清晰和完整的方式披露其发明，使该专业的技术人员能够实施该发明", "C": "各成员可对专利授予的专有权规定有限的例外，只要此类例外不会对专利的正常利用发生无理抵触，也不会无理损害专利所有权人的合法权益，同时考虑第三方的合法权益", "D": "各成员可以要求专利申请人提供关于申请人相应的国外申请和授予情况的信息，该信息会直接决定在该国是否会给予授权"}, answer: "", explanation: ""},
  {id: 816, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》关于专利的规定，下列哪些说法是正确的？多选）", options: {"A": "专利的获得和专利权的享有，不应因发明地点、技术领域以及产品是进口还是本国生产的不同而受到歧视", "B": "治疗动物疾病的外科手术方法可以被排除在可享专利性以外", "C": "专利权可享有的保护期间，自专利申请提交之日起计算的20年期间届满前不应终止", "D": "对撤销或取消专利的任何决定，均应提供司法审查的机会-uyc-"}, answer: "", explanation: ""},
  {id: 817, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》，如果成员的法律允许未经权利持有人许可即可由政府使用，或者由政府许可第三方使用专利，则这种使用应当遵守下列哪些规定？多选）", options: {"A": "这种使用的许可应当根据个案情况予以考虑", "B": "这种使用应当在合理的期限内通知权利持有人，但无需向其支付报酬", "C": "这种使用应当是独占的，权利持有人不得再许可其他人使用该专利", "D": "这种使用不得转让，除非是与享有这种使用的企业或者商誉一起转让"}, answer: "", explanation: ""},
  {id: 818, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，如果成员的法律允许在未经权利持有人许可的情况下，对其专利的主题作经政府许可的第三方使用，则应当遵守下列哪些规定？", options: {"A": "使用人可以自由转让或者再许可其他人使用，但应当向权利持有人支付足够的报酬", "B": "任何情况下，意图使用的人只有在使用前曾经努力按合理的商业条款和条件请求权利持有人给予许可，但在合理的期间内这种努力没有成功，才能允许这种使用", "C": "在涉及半导体技术的情形下，这种使用只能限于为公共的非商业性使用，或者用于经司法或行政程序确定为反竞争行为而给予的补救", "D": "在对被许可人的合法利益给予足够保护的前提下，如果以及在导致这种许可的情况已不存在，并且不大可能再发生时，这种使用的许可应即终止"}, answer: "", explanation: ""},
  {id: 819, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，下列说法正确的是？多选）", options: {"A": "成员必须利用专利制度对植物新品种给予保护", "B": "成员可以利用专利制度以外的有效的专门制度对植物新品种给予保护", "C": "成员可以将专利制度和其他有效的专门制度相结合对2020年中利代理师开格考试植物新品种给于保护", "D": "成员必须利用不同于专利制度的有效的专门制度对植物新品种给于保护"}, answer: "", explanation: ""},
  {id: 820, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，下列关于集成电路布图设计保护期的说法哪些是正确的？多选）", options: {"A": "在以登记为保护条件的成员中，布图设计的保护期间应为自登记之日起10年", "B": "在不以登记为保护条件的成员中，布图设计的保护期间自其在世界上任何地方第一次商业利用之日算起不少于·10年", "C": "以登记为保护条件的成员可以规定，布图设计自创作以后15年，保护应当终止", "D": "不以登记为保护条件的成员可以规定，布图设计自创作以后15年，保护应当终止"}, answer: "", explanation: ""},
  {id: 821, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，世界贸易组织成员可以针对下列哪些知识产权规定强制许可或者非自愿许可？", options: {"A": "专利", "B": "商标", "C": "工业品外观设计", "D": "集成电路布图设计"}, answer: "", explanation: ""},
  {id: 822, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，未公开信息符合下列哪些条件的，各成员应当对其提供保护？多选）", options: {"A": "该信息的整体或者其各部分的确切排列和组合，并不是通常从事有关这类信息的人所普遍了解或容易获得的", "B": "已经呈送给政府机构登记备案", "C": "由于是保密信息而具有商业价值", "D": "合法控制该信息的人已经根据情况采取了合理的保密措施"}, answer: "", explanation: ""},
  {id: 823, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，下列哪些cy风于该协定列举的可能构成知识产权滥用的情形？多选）", options: {"A": "排他性的返授条件", "B": "制止对知识产权有效性提出质疑的条件", "C": "强迫性的一揽子授予许可", "D": "禁止被许可方将专利产品出口至许可方享有专利的另一成员境内"}, answer: "", explanation: ""},
  {id: 824, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，下列哪些风于针对侵权行为规定的民事救济措施？多选）", options: {"A": "监禁", "B": "资令停止侵权", "C": "损害赔偿", "D": "责令侵权人向权利持有人支付适当的律师费用"}, answer: "", explanation: ""},
  {id: 825, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协议》的规定，成员至少应当对下列哪些故意的、具有商业规模的案件规定刑事程序和处罚？多选）", options: {"A": "假冒商标案件", "B": "盗版案件", "C": "假冒专利案件", "D": "侵犯集成电路布图设计专有权的案件"}, answer: "", explanation: ""},
  {id: 826, topic: "专题十 与贸易有关的知识产权协定", type: "unknown", question: "根据《与贸易有关的知识产权协定》的规定，下列关于临时措施的说法哪些是正确的？", options: {"A": "司法机关应当有权在任何迟延可能对权利持有人造成不可弥补损害的情况下，不听取另一方的意见而即采取临时措施", "B": "司法机关应当有权要求申请人提供足以保护被告和防止滥用临时措施的保证金或相当的担保", "C": "执行临时措施的机关可以要求申请人提供用于辨认有关货物的必要的信息", "D": "临时措施被撤销的，司法机关根据被告的请求，应当有权命令申请人向由于这些措施而受到损害的被告提供适当的2026年专利代理部井格考试补偿"}, answer: "", explanation: ""},

const LS_PREFIX = 'exam_practice_';

let currentMain = 'patent'; // patent | related
let currentSub = 'practice'; // practice | bank | stats

  // Per-section state
  let state = {
  patent: { filter:'all', topic:null, queue:[], pos:0, sessionOk:0, sessionErr:0 },
  related: { filter:'all', topic:null, chapter:null, queue:[], pos:0, sessionOk:0, sessionErr:0 }
};

// Persistent answers: { [section_qid]: { selected:[], correct:bool|null } }
// section_qid = "patent_42" or "related_108"
let answers = {};

// Wrong IDs per section
let wrongIds = { patent: new Set(), related: new Set() };

// Per-filter position memory: { "section_filter_topic_chapter": pos }
let posMemory = {};

// Selected options for current multi-select question
let selectedOptions = [];

// ============================================================
// PERSISTENCE
// ============================================================
function getPosKey(section) {
  const st = state[section];
  const ch = st.chapter || 'null';
  return section + '_' + st.filter + '_' + (st.topic || 'null') + '_' + ch;
}

function savePos() {
  // Save current position to memory before switching
  const section = currentMain;
  posMemory[getPosKey(section)] = state[section].pos;
}

function restorePos(section) {
  const key = getPosKey(section);
  if (posMemory[key] !== undefined) {
    state[section].pos = posMemory[key];
  } else {
    state[section].pos = 0;
  }
}

function saveAll() {
  try {
    // Save current position to memory
    savePos();
    const data = {
      answers: answers,
      wrongIds_patent: [...wrongIds.patent],
      wrongIds_related: [...wrongIds.related],
      posMemory: posMemory,
      // Save current filter/topic state per section (not pos, that's in posMemory)
      state_patent: { filter: state.patent.filter, topic: state.patent.topic, sessionOk: state.patent.sessionOk, sessionErr: state.patent.sessionErr },
      state_related: { filter: state.related.filter, topic: state.related.topic, chapter: state.related.chapter, sessionOk: state.related.sessionOk, sessionErr: state.related.sessionErr },
    };
    localStorage.setItem(LS_PREFIX + 'data', JSON.stringify(data));
  } catch(e) { console.warn('Save failed', e); }
}

function loadAll() {
  try {
    const raw = localStorage.getItem(LS_PREFIX + 'data');
    if (!raw) return;
    const data = JSON.parse(raw);
    
    if (data.answers) answers = data.answers;
    if (data.wrongIds_patent) wrongIds.patent = new Set(data.wrongIds_patent);
    if (data.wrongIds_related) wrongIds.related = new Set(data.wrongIds_related);
    if (data.posMemory) posMemory = data.posMemory;
    
    if (data.state_patent) {
      Object.assign(state.patent, data.state_patent);
      state.patent.pos = 0; // pos will be restored from posMemory after buildQueue
    }
    if (data.state_related) {
      Object.assign(state.related, data.state_related);
      state.related.pos = 0;
    }
  } catch(e) { console.warn('Load failed', e); }
}

// ============================================================
// QUEUE BUILDING
// ============================================================
function buildQueue() {
  const qs = getQuestions();
  const st = state[currentMain];
  let pool = [];
  
  // Topic filter
  if (st.topic) {
    if (currentMain === 'patent') {
      // Patent: filter by topic ID range
      const t = PATENT_TOPICS.find(t => t.name === st.topic);
      if (t) pool = qs.filter(q => q.id >= t.idStart && q.id <= t.idEnd);
    } else {
      // Related: filter by topic name, optionally by chapter
      pool = qs.filter(q => q.topic === st.topic);
      if (st.chapter) pool = pool.filter(q => q.chapter === st.chapter);
    }
  } else {
    pool = [...qs];
  }
  
  // Type filter
  if (st.filter === 'single') pool = pool.filter(q => q.type === 'single');
  else if (st.filter === 'multi') pool = pool.filter(q => q.type === 'multiple');
  else if (st.filter === 'wrong') pool = pool.filter(q => wrongIds[currentMain].has(q.id));
  else if (st.filter === 'rand50') {
    // Shuffle and take 50
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    pool = pool.slice(0, 50);
  }
  
  st.queue = pool.map(q => q.id);
  if (st.pos >= st.queue.length) st.pos = 0;
  st.sessionOk = 0;
  st.sessionErr = 0;
  
  // Restore saved position for this specific filter/topic combination
  restorePos(currentMain);
  if (st.pos >= st.queue.length) st.pos = 0;
}
